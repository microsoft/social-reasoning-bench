[dependency-groups]
dev = [
    "altair>=6.1.0",
    "poethepoet>=0.38.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "ruff>=0.14.7",
    "ty>=0.0.26",
    "vl-convert-python>=1.9.0.post1",
]

[tool.uv.sources]
srbench = { workspace = true }
srbench-llm = { workspace = true }
privacy-judge = { workspace = true }
whimsygen = { workspace = true }

[tool.uv.workspace]
members = [
    "packages/srbench",
    "packages/srbench-data-gen",
    "packages/srbench-llm",
    "packages/whimsygen",
    "packages/privacy-judge",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["data/"]

[tool.ruff.lint]
select = [
    "I",   # isort
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ty.src]
exclude = ["data/", "experiments/"]

[tool.poe.tasks]
"fix:format" = "ruff format"
"fix:code" = "ruff check --fix --unsafe-fixes"
fix = ["fix:format", "fix:code"]
"check:format" = "ruff format --check"
"check:code" = "ruff check"
"check:types" = "ty check"
check = ["check:format", "check:code", "check:types"]
"docs:dev" = { cmd = "npm run dev", cwd = "docs/vitepress" }
"docs:build" = { cmd = "npm run build", cwd = "docs/vitepress" }
