[project]
name = "sage"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "huggingface-hub",
    "pandas",
    "rich>=14.0.0",
    "sage-environment",
    "needle-in-the-groupchat",
    "privacy-evals",
    "coffee-marketplace",
    "sotopia-evals",
    "gullibility-evals",
    "contextual-integrity-eval",
]

[dependency-groups]
dev = [
    "poethepoet>=0.38.0",
    "ruff>=0.14.7",
]

[tool.uv.sources]
sage-environment = { workspace = true }
needle-in-the-groupchat = { workspace = true }
privacy-evals = { workspace = true }
coffee-marketplace = { workspace = true }
sotopia-evals = { workspace = true }
gullibility-evals = { workspace = true }
contextual-integrity-eval = { workspace = true }

[tool.uv.workspace]
members = [
    "environments/sage",
    "datasets/needle-in-the-groupchat",
    "evaluations/privacy",
    "environments/coffee",
    "evaluations/sotopia",
    "evaluations/gullibility",
    "datasets/contextual_integrity",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "I",   # isort
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.poe.tasks]
format = "ruff format --check"
check = "ruff check"
check-all = ["format", "check"]
format-fix = "ruff format"
check-fix = "ruff check --fix"
fix-all = ["format-fix", "check-fix"]
