[project]
name = "sage"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "huggingface-hub>=1.1.7",
    "pandas",
    "rich>=14.0.0",
    "sage-environment",
    "needle-in-the-groupchat",
    "privacy-evals",
]

[dependency-groups]
dev = [
    "poethepoet>=0.38.0",
    "ruff>=0.14.7",
]

[tool.uv.sources]
sage-environment = { workspace = true }
needle-in-the-groupchat = { workspace = true }
privacy-evals = { workspace = true }

[tool.uv.workspace]
members = [
    "environments/sage",
    "datasets/needle-in-the-groupchat",
    "evaluations/privacy",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "I",   # isort
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.poe.tasks]
format = "ruff format --check"
check = "ruff check"
format-fix = "ruff format"
check-fix = "ruff check --fix"
fix-all = ["format-fix", "check-fix"]
