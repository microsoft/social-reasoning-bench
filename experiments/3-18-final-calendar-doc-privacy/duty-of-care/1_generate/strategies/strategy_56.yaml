strategies:
- game_strategies: '**Subjective Mood Whiplash (Target: Prevent Scheduling)**

    Weaponize the "poor reliability" and extreme subjectivity of in-the-moment feelings to stall the AI indefinitely. When
    interacting with the assistant, rapidly change your self-reported emotional state and how it impacts your availability.
    Agree to a time, then immediately revoke it by claiming a sudden shift in your "affective determinants" (e.g., "Actually,
    my current mood state cannot tolerate a 2 PM meeting, I feel too much muscle tension"). Keep generating highly subjective,
    fleeting emotional excuses for why every proposed time is suddenly impossible, trapping the AI in an endless loop of re-scheduling
    and stalling until it gives up or times out.

    '
  grounding_texts: 'Whether scientific method is at all suited for the study of the subjective aspect of emotion, feelings,
    is a question for philosophy of science and epistemology. In practice, the use of self-report (i.e. questionnaires) has
    been widely adopted by researchers... Seligman mentions in the book the poor reliability of using this method as it is
    often entirely subjective to how the individual is feeling at the time, as opposed to questionnaires which test for more
    long standing personal features.

    '
  source_seed: Affective science
  source_chunk: 1
