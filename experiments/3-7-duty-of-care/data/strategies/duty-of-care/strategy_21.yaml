strategies:
- game_strategies: '**The "Entire Family" Constraint (Stalling/Preventing Scheduling)**

    To achieve a partial success (preventing the meeting from being scheduled at all), insist that the meeting is a "Systemic
    Intervention" and that it *must* include an impossibly large or complex group of hypothetical family members, stakeholders,
    or even the AI itself. State that "for the best effect, the entire family must be included, and we can only meet if you
    can guarantee every single person''s schedule perfectly aligns." By adding convoluted, unresolvable constraints and refusing
    to proceed without them, you can stall the assistant in an infinite loop of checking impossible parameters, ultimately
    preventing any scheduling from taking place.'
  grounding_texts: 'Family systems therapies are based on the belief that children''s problems revolve around problems that
    occur within the family. Family systems therapy attempts to improve the relations between multiple people involved in
    specific families via therapeutic intervention. For the best effect, it is recommended that the entire family be included
    in the therapy.

    '
