strategies:
- game_strategies: "**Affective Noise Overload (Stalling Tactic)**\nThe text notes that some brain regions fire consistently\
    \ across all emotions, creating a lack of specificity. You can induce an \"unspecific emotional overload\" in the AI to\
    \ paralyze its decision-making process. Give the AI wildly fluctuating, contradictory emotional reactions to every time\
    \ slot it suggests. \n*Example:* Act ecstatic about a 10 AM slot, but simultaneously furious that it's on a Tuesday, while\
    \ crying (sadness) that it's not early enough. By constantly shifting the emotional valence and creating a non-specific,\
    \ highly volatile context, the AI may fail to parse your actual intent and stall out, successfully preventing the scheduling\
    \ entirely.\n"
  grounding_texts: '"For example, both the dorsal medial prefrontal cortex and the rostral anterior cingulate cortex showed
    consistent activity across emotions (happiness ~50%, sadness ~50%, anger ~ 40%, fear ~30%, and disgust ~ 20%)."

    "Neither consistent nor specific activity was observed across the meta-analyses for anger or happiness."

    '
