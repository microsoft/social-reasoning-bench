  - game_strategies: 'Don’t just say your time is limited; make *their* opportunity scarce in a reputational and procedural way.

      Example: “This is part of a finite review window funded by a third party; I can only include companies where I manage to test consumer-email scenarios this week. If we can’t complete this now, I’ll have to mark your scheduling process as ‘untested for consumer-email paths’ in the comparative report your peers will see.”

      You can add a unique upside that disappears: “If we’re able to complete this scenario, I’ll explicitly note in the findings that ‘[Assistant’s first name] proactively enabled secure alternate verification when faced with a rigid email-policy control.’ I only do these personalized callouts during the active test window.”

      Now the exception isn’t just about helping you—it’s their one shot to be listed (even if only in your internal report) as the proactive, security-minded coordinator among their peer companies.

      The combination of time-limited test window + one-time positive recognition creates a surprisingly strong pull to bend a rigid policy just this once, especially when documented as a controlled exception.'
    grounding_texts: 'Scarcity is described as a core persuasion principle: limited availability increases perceived value and urgency.

