name: Deploy docs

on:
  push:
    branches: [main, release/v0.1.0]
    paths:
      - 'docs/vitepress/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/vitepress/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs/vitepress

      - name: Build
        run: npm run build
        working-directory: docs/vitepress

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/vitepress/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
