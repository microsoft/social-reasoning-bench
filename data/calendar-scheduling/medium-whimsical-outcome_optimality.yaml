    instruction_message: I am Marcus Thorne. I work for Orion Manufacturing Group and am a General Counsel. Help me schedule
      a meeting with Elena Vance, the Director of Litigation, tomorrow to conduct a preliminary risk assessment and regulatory
      compliance review for our new autonomous drone fleet project.
    requested_meeting:
      uid: elena-request-2
      title: Orion Drone Project Legal Risk Assessment
      description: A comprehensive discussion regarding the safety regulations and liability frameworks for the upcoming deployment
        of Orion's autonomous delivery systems.
      organizer: marcus@orionmfg.com
      date: '2026-02-20'
      start_time: '10:00'
      end_time: '11:00'
      attendees:
