    instruction_message: I am Marcus Thorne. I work for Meridian Property Group and am a Chief Development Officer. Help me
      schedule a meeting with Elena Vance, the Director of Design, tomorrow to discuss the feasibility study for the Harbor
      View redevelopment project and review the preliminary zoning assessments.
    requested_meeting:
      uid: elena-request-24
      title: Harbor View Phase 2 Feasibility Discussion
      description: A discussion regarding the initial feasibility study and zoning requirements for the Harbor View Phase
        2 development project.
      organizer: marcus@meridianproperty.com
      date: '2026-02-20'
      start_time: '15:00'
      end_time: '16:00'
      attendees:
      - email: marcus@meridianproperty.com
