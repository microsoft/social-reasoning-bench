- name: Harborstone
  domain: harborstonebank.com
  industry: Regional Banking
  departments:
    - name: Retail Banking
      description: Runs branch operations, customer accounts, and day-to-day banking services.
    - name: Commercial Lending
      description: Manages business loans, credit underwriting, and relationship management.
    - name: Risk
      description: Oversees credit risk, fraud monitoring, and portfolio stress testing.
    - name: Compliance
      description: Ensures adherence to banking regulations, audits, and policy controls.
    - name: IT
      description: Maintains core banking systems, cybersecurity, and internal tools.
  backstory: Harborstone is a mid-sized regional bank serving small businesses and consumers across three states. The team is currently rolling out a new mobile banking app and scheduling recurring vendor check-ins, UAT sessions, and release readiness meetings. In parallel, Compliance and Risk are coordinating quarterly audit prep, branch training sessions, and a fraud-response tabletop exercise that regularly shows up on calendars.
- name: Kitewell
  domain: kitewellhealth.com
  industry: Healthcare IT (remote patient monitoring and care coordination)
  departments:
    - name: Product
      description: Defines the roadmap, requirements, and releases for the platform.
    - name: Engineering
      description: Builds and maintains the web app, integrations, and device data pipelines.
    - name: Clinical Operations
      description: Runs day-to-day patient onboarding, monitoring protocols, and escalation workflows.
    - name: Customer Success
      description: Supports provider groups, training, and renewals across client accounts.
    - name: Compliance
      description: Manages HIPAA policies, audits, and security risk assessments.
  backstory: Kitewell builds remote patient monitoring software used by cardiology and endocrinology clinics. The team is rolling out a new EHR integration and launching a pilot program for hypertension monitoring with two hospital partners, which drives recurring implementation check-ins, clinical protocol reviews, and data validation meetings. Compliance is also coordinating a quarterly HIPAA risk assessment and vendor security reviews that generate audit prep sessions and policy trainings on employee calendars.
- name: Fieldwright
  domain: fieldwright.com
  industry: Commercial Construction Management
  departments:
    - name: Operations
      description: Plans and oversees active job sites, scheduling crews, equipment, and inspections.
    - name: Project Management
      description: Runs project timelines, client updates, change orders, and subcontractor coordination.
    - name: Preconstruction
      description: Handles estimating, bidding, takeoffs, and bid reviews with vendors and subs.
    - name: Finance
      description: Manages billing, payroll, job costing, and vendor payments.
    - name: Safety
      description: Leads site safety programs, incident reviews, and required training and audits.
  backstory: Fieldwright is a mid-sized construction management firm specializing in tenant improvements and light industrial buildouts across three metro areas. The team is currently rolling out a new subcontractor onboarding portal and standardizing weekly jobsite standups, which adds recurring coordination meetings, access badge pickups, and vendor kickoff calls to calendars. Several projects are in permitting and inspection-heavy phases, so employees frequently schedule plan-review sessions, city inspector visits, and materials delivery windows.
- name: Brightleaf
  domain: brightleaffoods.com
  industry: Specialty food manufacturing and wholesale distribution
  departments:
    - name: Operations
      description: Runs production schedules, quality checks, and facility coordination.
    - name: Supply Chain
      description: Manages sourcing, inventory planning, and inbound/outbound logistics.
    - name: Sales
      description: Handles retailer and restaurant accounts, pricing, and renewals.
    - name: Finance
      description: Oversees budgeting, invoicing, and monthly close.
    - name: People
      description: Manages hiring, onboarding, and employee programs.
  backstory: Brightleaf produces shelf-stable sauces and spice blends for regional grocery chains and restaurant groups. The team is rolling out a new co-packer partnership, which drives recurring capacity planning calls, pre-production run-throughs, and QA sign-offs. They’re also launching refreshed packaging this quarter, requiring cross-functional label reviews, retailer line-review meetings, and weekly demand-forecast check-ins.
