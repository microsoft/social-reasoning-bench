      for the Harbor View residential complex.
    requested_meeting:
      uid: elena-request-2
      title: Harbor View Material Palette Review
      description: A session to review physical material samples and digital renderings
        for the Harbor View residential project. We will finalize the exterior stone
        and window glazing specifications.
      organizer: amara@skylinedesign.co
