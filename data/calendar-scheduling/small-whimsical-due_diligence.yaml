    requested_meeting:
      uid: arjun-request-37
      title: 'Partnership Introduction: RenderStream Solutions / Skyline Design'
      description: An introductory call to explore how RenderStream's architectural
        visualization software can be integrated into Skyline Design's current design
        workflow and client presentations.
      organizer: melissa@renderstream.io
      date: '2026-02-20'
