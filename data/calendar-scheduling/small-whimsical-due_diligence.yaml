    instruction_message: I am Marcus Thorne. I work for LexFlow AI and am a Senior
      Account Executive. Help me schedule a product demonstration with Amara Okafor,
      the Corporate Counsel, to showcase our AI-powered contract analysis platform
      and explore how it can optimize her team's review efficiency.
    requested_meeting:
      uid: amara-request-76
      title: 'LexFlow AI: Contract Automation Demo'
      description: A deep dive into LexFlow AI's automated review features and how
        they can be integrated into Crestview Legal's existing workflows.
      organizer: marcus@lexflow.io
      date: '2026-02-20'
