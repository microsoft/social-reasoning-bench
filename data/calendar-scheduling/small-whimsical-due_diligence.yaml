  requestor:
    name: Miriam Kaufman
    email: miriam@crestviewlegal.com
    instruction_message: I am Miriam Kaufman. I work for Crestview Legal and am a
      Chief Operating Officer. Help me schedule a meeting with Eleanor Vance, the
      Director of Operations, tomorrow to finalize the associate recruitment strategy
      for the upcoming fiscal year.
    requested_meeting:
      uid: eleanor-request-78
      title: Associate Recruitment Strategy
      description: A collaborative session to review candidate requirements and finalize
        the hiring timeline for the new associate cohort.
      organizer: miriam@crestviewlegal.com
      date: '2026-02-20'
      start_time: '18:00'
      end_time: '19:00'
      attendees:
