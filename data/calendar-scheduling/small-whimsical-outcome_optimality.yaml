      me schedule a meeting with Amara Okafor, the Senior Account Executive, tomorrow to review the international shipping
      escalation protocols for our new overseas distribution centers.
    requested_meeting:
      uid: amara-request-40
      title: International Shipping Escalation Protocol Review
      description: A focused session to finalize the emergency contact tree and standard operating procedures for overseas
        freight delays.
      organizer: marcus@luminabiotech.com
