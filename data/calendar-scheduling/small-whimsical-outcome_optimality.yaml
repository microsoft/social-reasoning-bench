      uid: amara-request-59
      title: Shadow-X Campaign Report Review
      description: A meeting to discuss the specific attribution evidence found during the Shadow-X investigation and finalize
        the report for internal distribution.
      organizer: arjun@aegiscyber.io
      date: '2026-02-20'
