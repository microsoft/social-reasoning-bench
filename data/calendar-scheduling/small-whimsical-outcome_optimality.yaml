      is consistent with EcoThread's internal standards.
    requested_meeting:
      uid: amara-request-61
      title: Sustainability Impact Data Review
      description: We will review the final metrics for the joint sustainability report to ensure data accuracy. This session
        will also cover the approval workflow for the upcoming media release.
      organizer: julian@greenpulseagency.com
      date: '2026-02-20'
