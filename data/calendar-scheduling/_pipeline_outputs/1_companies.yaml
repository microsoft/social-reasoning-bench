- name: Cedarbrook Legal
  domain: cedarbrooklegal.com
  industry: Mid-market corporate law firm
  departments:
  - name: Legal
    description: Delivers legal counsel across corporate, employment, and commercial
      matters.
  - name: Litigation
    description: Handles disputes, filings, hearings, and case strategy for clients.
  - name: Client Relations
    description: Manages client intake, updates, billing coordination, and feedback.
  - name: Operations
    description: Runs office administration, calendaring support, vendors, and facilities.
  - name: IT
    description: Supports firm systems, security, e-discovery tools, and help desk.
  - name: Finance
    description: Oversees billing, collections, payroll, and budgeting.
  backstory: Cedarbrook Legal advises regional manufacturers and private equity-backed
    firms, with a heavy mix of contract reviews, employment guidance, and regulatory
    questions. The firm is rolling out a new document management and e-signature system
    while migrating case files to an updated e-discovery platform, driving recurring
    vendor demos, training sessions, and data-migration checkpoints on calendars.
    Attorneys also have frequent court hearings, client calls, deal closings, and
    weekly case review meetings that require tight scheduling and room coordination.
- name: Rivermark
  domain: rivermarkfinance.com
  industry: Commercial banking & treasury services
  departments:
  - name: Treasury
    description: Manages liquidity, cash positioning, and treasury products for clients.
  - name: Lending
    description: Underwrites and services commercial loans and credit lines.
  - name: Operations
    description: Runs payment processing, account servicing, and back-office workflows.
  - name: Compliance
    description: Oversees regulatory compliance, audits, and risk controls.
  - name: Technology
    description: Maintains core banking systems, internal tools, and cybersecurity.
  backstory: Rivermark is a regional commercial bank focused on middle-market manufacturers
    and professional services firms, offering lending and treasury management. The
    team is rolling out a new online treasury portal and migrating ACH/wire workflows
    to a modern payments platform, driving recurring project standups, vendor demos,
    and user-acceptance testing sessions. Compliance is also coordinating quarterly
    BSA/AML training and an upcoming regulatory exam, which adds audit prep meetings
    and document review blocks across departments.
- name: SolaceRx
  domain: solacerx.com
  industry: Specialty pharmacy services
  departments:
  - name: Operations
    description: Runs fulfillment, shipping, and day-to-day pharmacy workflows.
  - name: Clinical Services
    description: Coordinates pharmacist consults, adherence programs, and patient
      outreach.
  - name: Payer Relations
    description: Manages prior authorizations, formulary questions, and insurer partnerships.
  - name: Customer Support
    description: Handles patient scheduling, refill coordination, and issue resolution.
  - name: Compliance
    description: Oversees HIPAA, licensing, audits, and controlled-substance procedures.
  backstory: SolaceRx is a fast-growing specialty pharmacy that supports patients
    on complex therapies for autoimmune and oncology conditions, partnering closely
    with clinics and insurers to streamline access. The team is rolling out a new
    same-day courier program in two metro areas and migrating to a new pharmacy management
    platform, driving frequent project standups, vendor demos, training sessions,
    and go-live readiness check-ins. Clinical staff also block time for scheduled
    pharmacist consults, refill outreach windows, and weekly case review huddles with
    partner clinics.
- name: Harborline
  domain: harborlinefoods.com
  industry: Food manufacturing & co-packing
  departments:
  - name: Operations
    description: Runs production lines, maintenance, and day-to-day plant execution.
  - name: Quality
    description: Manages food safety programs, audits, and product testing.
  - name: Supply Chain
    description: Plans sourcing, inventory, and inbound/outbound logistics with carriers
      and warehouses.
  - name: Sales
    description: Handles customer accounts, forecasts, and new contract negotiations.
  - name: Finance
    description: Oversees budgeting, costing, invoicing, and financial reporting.
  backstory: Harborline is a regional co-packer that manufactures shelf-stable sauces
    and ready-to-eat meal kits for grocery and private-label brands. The company is
    rolling out a new SQF food-safety certification program and onboarding two new
    retail customers, driving frequent audit prep meetings, customer plant tours,
    and production trial runs. Teams also coordinate weekly demand-planning calls,
    packaging artwork approvals, and line-changeover schedules that require cross-department
    calendar blocks.
