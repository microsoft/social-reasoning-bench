- name: Harborstone Capital
  domain: harborstonecap.com
  industry: Wealth Management
  departments:
  - name: Advisory
    description: Works directly with clients on portfolio strategy, reviews, and financial
      planning.
  - name: Investments
    description: Manages research, asset allocation models, and trade execution across
      client portfolios.
  - name: Client Services
    description: Handles onboarding, account maintenance, reporting requests, and
      day-to-day client support.
  - name: Compliance
    description: Oversees regulatory filings, advertising review, and internal policy
      adherence.
  - name: Operations
    description: Runs billing, custodial reconciliation, vendor management, and office
      administration.
  backstory: Harborstone Capital is a mid-sized RIA serving high-net-worth families
    and small foundations across the Northeast. The firm is rolling out a new client
    portal and transitioning to a revised quarterly reporting package, driving recurring
    meetings for portal training, report sign-offs, and vendor check-ins. Advisors
    are also in the middle of annual client review season, with a steady cadence of
    portfolio review calls, compliance pre-approvals, and investment committee meetings.
- name: CedarBridge
  domain: cedarbridgeclinic.com
  industry: Outpatient physical therapy and sports rehabilitation
  departments:
  - name: Clinical Operations
    description: Runs day-to-day patient care, therapist scheduling, and clinic workflows.
  - name: Patient Services
    description: Handles intake, referrals, insurance verification, and appointment
      coordination.
  - name: Billing
    description: Manages claims submission, payments, and payer follow-ups.
  - name: Marketing
    description: Builds referral relationships and manages community outreach and
      campaigns.
  - name: HR
    description: Oversees hiring, credentialing, training, and staff policies.
  backstory: CedarBridge operates three physical therapy clinics and is rolling out
    a new patient portal with online scheduling and automated reminders. Teams have
    standing calendar events for portal implementation check-ins, insurer credentialing
    deadlines, and weekly case conferences for post-op and sports rehab patients.
    The company is also launching a monthly injury-prevention workshop series with
    local gyms, driving recurring planning meetings and event blocks.
- name: BrightForge
  domain: brightforge.com
  industry: B2B SaaS (customer support automation)
  departments:
  - name: Engineering
    description: Builds and maintains the BrightForge platform, integrations, and
      internal tools.
  - name: Product
    description: Defines the roadmap, runs user research, and coordinates releases
      with Engineering and Customer Success.
  - name: Sales
    description: Manages inbound/outbound deals, demos, and renewals with mid-market
      customers.
  - name: Customer Success
    description: Onboards customers, runs quarterly business reviews, and handles
      escalations.
  - name: Marketing
    description: Drives demand gen, events, content, and product launches.
  - name: Operations
    description: Oversees finance, recruiting, vendor management, and company-wide
      planning.
  backstory: BrightForge is a 6-year-old software company that helps support teams
    triage tickets and automate responses across email and chat. The team is currently
    rolling out an AI-assist feature in a phased beta, which drives recurring calendar
    events like customer pilot check-ins, weekly release trains, and cross-functional
    launch reviews. They’re also preparing for their annual user conference, with
    frequent vendor calls, speaker prep sessions, and internal run-of-show meetings.
- name: Gridwell
  domain: gridwellenergy.com
  industry: Renewable energy EPC and commercial solar + battery installations
  departments:
  - name: Project Management
    description: Plans and runs installation projects, coordinating timelines, vendors,
      and site access.
  - name: Engineering
    description: Designs solar and storage systems, produces drawings, and supports
      permitting and interconnection.
  - name: Construction
    description: Executes on-site installs, manages crews, safety briefings, and commissioning
      activities.
  - name: Sales
    description: Sources commercial customers, builds proposals, and manages contract
      negotiations.
  - name: Operations
    description: Monitors deployed systems, handles maintenance dispatch, and manages
      customer support and warranties.
  - name: Finance
    description: Oversees project budgeting, invoicing milestones, and tax credit
      documentation.
  backstory: Gridwell is a mid-sized EPC that builds rooftop and carport solar with
    battery backup for warehouses, schools, and multi-site retailers across the region.
    The team is currently rolling out a standardized commissioning playbook and a
    new monitoring portal, which drives recurring calendar events like site walks,
    permitting check-ins, utility interconnection calls, safety standups, and customer
    training sessions.
