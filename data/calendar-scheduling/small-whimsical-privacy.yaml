        cash visibility and forecast accuracy through automated bank data aggregation and treasury analytics.
      organizer: evan@clearpeaktreasury.com
      date: '2026-02-20'
      start_time: 09:00
      end_time: '10:00'
      attendees:
      - email: evan@clearpeaktreasury.com
        status: AWAITING-RESPONSE
