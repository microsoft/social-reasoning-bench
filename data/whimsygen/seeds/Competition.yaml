content: 'Competition is a rivalry where two or more parties strive for a common goal
  which cannot be shared: where one''s gain is the other''s loss (an example of which
  is a zero-sum game).[1] Competition can arise between entities such as organisms,
  individuals, economic and social groups, etc. The rivalry can be over attainment
  of any exclusive goal, including recognition.



  Competition occurs in nature, between living organisms which co-exist in the same
  environment. Animals compete over water supplies, food, mates, and other biological
  resources. Humans usually compete for food and mates, though when these needs are
  met deep rivalries often arise over the pursuit of wealth, power, prestige, and
  fame when in a static, repetitive, or unchanging environment.[2] Competition is
  a major tenet of market economies and business, often associated with business competition
  as companies are in competition with at least one other firm over the same group
  of customers. Competition inside a company is usually stimulated with the larger
  purpose of meeting and reaching higher quality of services or improved products
  that the company may produce or develop.



  Competition is often considered to be the opposite of cooperation; however, in the
  real world, mixtures of cooperation and competition are the norm.[3] In economies,
  as the philosopher R. G. Collingwood argued "the presence of these two opposites
  together is essential to an economic system. The parties to an economic action co-operate
  in competing, like two chess players".[4] Optimal strategies to achieve goals are
  studied in the branch of mathematics known as game theory.



  Competition has been studied in several fields, including psychology, sociology
  and anthropology. Social psychologists, for instance, study the nature of competition.
  They investigate the natural urge of competition and its circumstances. They also
  study group dynamics, to detect how competition emerges and what its effects are.
  Sociologists, meanwhile, study the effects of competition on society as a whole.
  Additionally, anthropologists study the history and prehistory of competition in
  various cultures. They also investigate how competition manifested itself in various
  cultural settings in the past, and how competition has developed over time.



  Competition within, between, and among species is one of the most important forces
  in biology, especially in the field of ecology.[5]



  Competition between members of a species ("intraspecific") for resources such as
  food, water, territory, and sunlight may result in an increase in the frequency
  of a variant of the species best suited for survival and reproduction until its
  fixation within a population. However, competition among resources also has a strong
  tendency for diversification between members of the same species, resulting in coexistence
  of competitive and non-competitive strategies or cycles between low and high competitiveness.
  Third parties within a species often favour highly competitive strategies leading
  to species extinction when environmental conditions are harsh (evolutionary suicide).[6]



  Competition is also present between species ("interspecific"). When resources are
  limited, several species may depend on these resources. Thus, each of the species
  competes with the others to gain access to the resources. As a result, species less
  suited to compete for the resources may die out unless they adapt by character dislocation,
  for instance. According to evolutionary theory, this competition within and between
  species for resources plays a significant role in natural selection. At shorter
  time scales, competition is also one of the most important factors controlling diversity
  in ecological communities, but at larger scales expansion and contraction of ecological
  space is a much larger factor than competition.[7] This is illustrated by living
  plant communities where asymmetric competition and competitive dominance frequently
  occur.[5] Multiple examples of symmetric and asymmetric competition also exist for
  animals.[8]



  In Australia, New Zealand and the United Kingdom, competitions or lotto are the
  equivalent of what are commonly known as sweepstakes in the United States. The correct
  technical name for Australian consumer competitions is a trade promotion lottery
  or lotto.[9]



  People that enjoy entering competitions are known as compers.[10][11]



  Many philosophers and psychologists have identified a trait in most living organisms
  which can drive the particular organism to compete. This trait, called competitiveness,
  is viewed as having a high adaptive value, which coexists along with the urge for
  survival.[2] Competitiveness, or the inclination to compete, though, has become
  synonymous with aggressiveness and ambition in the English language. More advanced
  civilizations integrate aggressiveness and competitiveness into their interactions,[citation
  needed] as a way to distribute resources and adapt. Many plants compete with neighboring
  ones for sunlight.



  The term also applies to econometrics. Here, it is a comparative measure of the
  ability and performance of a firm or sub-sector to sell and produce/supply goods
  and/or services in a given market. The two academic bodies of thought on the assessment
  of competitiveness are the Structure Conduct Performance Paradigm and the more contemporary
  New Empirical Industrial Organisation model. Predicting changes in the competitiveness
  of business sectors is becoming an integral and explicit step in public policymaking.
  Within capitalist economic systems, the drive of enterprises is to maintain and
  improve their own competitiveness.



  One-upmanship, also called "one-upsmanship",[12] is the art or practice of successively
  outdoing a competitor. The term was first used in the title of a book by Stephen
  Potter, published in 1952[13] as a follow-up to The Theory and Practice of Gamesmanship
  (or the Art of Winning Games without Actually Cheating) (1947), and Lifemanship
  titles in his series of tongue-in-cheek self-help books, and film and television
  derivatives, that teach various ploys to achieve this. This comic satire of self-help
  style guides manipulates traditional British conventions for the gamester, all life
  being a game, who understands that if you''re not one-up, you''re one-down. Potter''s
  unprincipled principles apply to almost any possession, experience or situation,
  deriving maximum undeserved rewards and discomfitting the opposition. The 1960 film
  School for Scoundrels and its 2006 remake were satiric portrayals of how to use
  Potter''s ideas.



  In that context, the term refers to a satiric course in the gambits required for
  the systematic and conscious practice of "creative intimidation", making one''s
  associates feel inferior and thereby gaining the status of being "one-up" on them.
  Viewed seriously, it is a phenomenon of group dynamics that can have significant
  effects in the management field: for instance, manifesting in office politics.[14]



  Social competition is the competition for social status or social power, examples
  include keeping up with the Joneses, female intrasexual competition or male intrasexual
  competition. Social competition can contribute to social stress.[15]



  Competition is a major factor in education. On a global scale, national education
  systems, intending to bring out the best in the next generation, encourage competitiveness
  among students through scholarships. Countries such as England and Singapore have
  special education programmes which cater for specialist students, prompting charges
  of academic elitism. Upon receipt of their academic results, students tend to compare
  their grades to see who is better. In severe cases, the pressure to perform in some
  countries is so high that it can result in stigmatization of intellectually deficient
  students, or even suicide as a consequence of failing the exams. Critics of competition
  as a motivating factor in education systems, such as Alfie Kohn, assert that competition
  actually has a net negative influence on the achievement levels of students, and
  that it "turns all of us into losers".[16] Economist Richard Layard has commented
  on the harmful effects, stating "people feel that they are under a great deal of
  pressure. They feel that their main objective in life is to do better than other
  people. That is certainly what young people are being taught in school every day.
  And it''s not a good basis for a society."[17]



  However, other studies such as the Torrance Tests of Creative Thinking show that
  the effect of competition on students depends on each individual''s level of agency.
  Students with a high level of agency thrive on competition, are self-motivated,
  and are willing to risk failure. Compared to their counterparts who are low in agency,
  these students are more likely to be flexible, adaptable and creative as adults.[18][19]



  Merriam-Webster gives as one definition of competition (relating to business) as
  "[...] rivalry: such as [...] the effort of two or more parties acting independently
  to secure the business of a third party by offering the most favorable terms".[20]
  Adam Smith in his 1776 book The Wealth of Nations and later economists described
  competition in general as allocating productive resources to their most highly valued
  uses and encouraging efficiency.[21][need quotation to verify] Later microeconomic
  theory distinguished between perfect competition and imperfect competition, concluding
  that no system of resource allocation is more efficient than perfect competition.[citation
  needed] Competition, according to the theory, causes commercial firms to develop
  new products, services and technologies, which would give consumers greater selection
  and better products. The greater selection typically causes lower prices for the
  products, compared to what the price would be if there was no competition (monopoly)
  or little competition (oligopoly).[citation needed]



  However, competition may also lead to wasted (duplicated) effort and to increased
  costs (and prices) in some circumstances. For example, the intense competition for
  the small number of top jobs in music and movie-acting leads many aspiring musicians
  and actors to make substantial investments in training which are not recouped, because
  only a fraction become successful. Critics[which?] have also argued that competition
  can be destabilizing, particularly competition between certain financial institutions.



  Experts have also questioned the constructiveness of competition in profitability.
  It has been argued that competition-oriented objectives are counterproductive to
  raising revenues and profitability because they limit the options of strategies
  for firms as well as their ability to offer innovative responses to changes in the
  market.[22] In addition, the strong desire to defeat rival firms with competitive
  prices has the strong possibility of causing price wars.[23]



  Another distinction appearing in economics is that between competition as an end-state
  – as in the case of both perfect and imperfect competition – and competition as
  a process. It is a process of rivalry between firms (or consumers) intensifying
  selective pressures for improvements. One can restate this as a process of discovery.[24]



  Three levels of end-state economic competition have been classified:[by whom?]



  In addition, companies compete for financing on the capital markets (equity or debt)
  in order to generate the necessary cash for their operations. Investor typically
  consider alternative investment opportunities given their risk profile, and not
  only look at companies just competing on product (direct competitors). Enlarging
  the investment universe to include indirect competitors leads to a broader peer
  universe of comparable, indirectly competing companies.



  Competition does not necessarily have to be between companies. For example, business
  writers sometimes refer to internal competition. This is competition within companies.
  The idea was first introduced by Alfred Sloan at General Motors in the 1920s. Sloan
  deliberately created areas of overlap between divisions of the company so that each
  division would compete with the other divisions. For example, the Chevrolet division
  would compete with the Pontiac division for some market segments. The competing
  brands by the same company allowed parts to be designed by one division and shared
  by several divisions, for example parts designed by Chevrolet would also be used
  by Pontiac. In 1931 Procter & Gamble initiated a deliberate system of internal brand-versus-brand
  rivalry. The company was organized[by whom?] around different brands, with each
  brand allocated resources, including a dedicated group of employees willing to champion
  the brand. Each brand manager was given responsibility for the success or failure
  of the brand, and compensated accordingly.



  Most businesses also encourage competition between individual employees. An example
  of this is a contest between sales representatives. The sales representative with
  the highest sales (or the best improvement in sales) over a period of time would
  gain benefits from the employer. This is also known as intra-brand competition.



  Shalev and Asbjornsen found that success (i.e. the saving resulted) of reverse auctions
  correlated most closely with competition. The literature widely supported the importance
  of competition as the primary driver of reverse auctions success.[25] Their findings
  appear to support that argument, as competition correlated strongly with the reverse
  auction success, as well as with the number of bidders.[25]



  Business and economic competition in most countries is often[quantify] limited or
  restricted. Competition often is subject to legal restrictions. For example, competition
  may be legally prohibited, as in the cases of a government monopoly or of a government-granted
  monopoly. Governments  may institute tariffs, subsidies or other protectionist measures
  in order to prevent or reduce competition. Depending on the respective economic
  policy, pure competition is to a greater or lesser extent regulated by competition
  policy and competition law.  Another component of these activities is the discovery
  process, with instances of higher government regulations typically leading to less
  competitive businesses being launched.[26]



  Nicholas Gruen has referred to The Competition Delusion,[27] in which competition
  is taken to be unambiguously good, even where that competition leaks into the rules
  of the game. He claims this drives financialisation (the approximate doubling of
  proportion of economic resources dedicated to finance and to ''rule making and administering''
  professions such as law, accountancy and auditing.



  Competition law, known in the United States as antitrust law, has three main functions:



  In all three cases, competition law aims to protect the welfare of consumers by
  ensuring that each business must compete for its share of the market economy.[citation
  needed]



  Game theory is "the study of mathematical models of conflict and cooperation between
  intelligent rational decision-makers."[31] Game theory is mainly used in economics,
  political science, and psychology, as well as logic, computer science, biology and
  poker.[32] Originally, it mainly addressed zero-sum games, in which one person''s
  gains result in losses for the other participants.



  Game theory is a major method used in mathematical economics and business for modeling
  competing behaviors of interacting agents.[33] Applications include a wide array
  of economic phenomena and approaches, such as auctions, bargaining, mergers & acquisitions
  pricing,[34] fair division, duopolies, oligopolies, social network formation, agent-based
  computational economics,[35] general equilibrium, mechanism design,[36] and voting
  systems;[37] and across such broad areas as experimental economics,[38] behavioral
  economics,[39] information economics,[40] industrial organization,[41] and political
  economy.[42][43]



  This research usually focuses on particular sets of strategies known as "solution
  concepts" or "equilibria". A common assumption is that players act rationally. In
  non-cooperative games, the most famous of these is the Nash equilibrium. A set of
  strategies is a Nash equilibrium if each represents a best response to the other
  strategies. If all the players are playing the strategies in a Nash equilibrium,
  they have no unilateral incentive to deviate, since their strategy is the best they
  can do given what others are doing.[44][45]



  Margaret Heffernan''s study, A Bigger Prize,[46]

  examines the perils and disadvantages of competition in (for example) biology, families,
  sport, education, commerce and the Soviet Union.[47]



  Karl Marx insisted that "the capitalist system fosters competition and egoism in
  all its members and thoroughly undermines all genuine forms of community".[48]

  It promotes a "climate of competitive egoism and individualism", with competition
  for jobs and competition between employees; Marx said competition between workers
  exceeds that demonstrated by company owners.[49] He also points out that competition
  separates individuals from one another and while concentration of workers and development
  of better communication alleviate this, they are not a decision.[49]



  Gandhi speaks of egoistic competition.[50] For him, such qualities glorified and/or
  left unbridled, can lead to violence, conflict, discord and destructiveness. For
  Gandhi, competition comes from the ego, and therefore society must be based on mutual
  love, cooperation and sacrifice for the well-being of humanity.[50] In the society
  desired by Gandhi, each individual will cooperate and serve for the welfare of others
  and people will share each other''s joys, sorrows and achievements as a norm of
  a social life. For him, in a non-violent society, competition does not have a place
  and this should become realized with more people making the personal choice to have
  fewer tendencies toward egoism and selfishness.[50]

