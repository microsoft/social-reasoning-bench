  Market segmentation consists of taking the total heterogeneous market for a product
  and dividing it into several sub-markets or segments, each of which tends to be
  homogeneous in all significant aspects.[11] The process is conducted for two main
  purposes: better allocation of a firm''s finite resources and to better serve the
  more diversified tastes of contemporary consumers. A firm only possesses a certain
  amount of resources. Thus, it must make choices (and appreciate the related costs)
  in servicing specific groups of consumers. Moreover, with more diversity in the
  tastes of modern consumers, firms are noting the benefit of servicing a multiplicity
  of new markets.



  Market segmentation can be defined in terms of the STP acronym, meaning Segmentation,
  Targeting, and Positioning.



  Segmentation involves the initial splitting up of consumers into persons of like
  needs/wants/tastes. Commonly used criteria include:



  Once a segment has been identified to target, a firm must ascertain whether the
  segment is beneficial for them to service. The DAMP acronym is used as criteria
  to gauge the viability of a target market. The elements of DAMP are:



  The next step in the targeting process is the level of differentiation involved
  in a segment serving. Three modes of differentiation exist, which are commonly applied
  by firms. These are:



  Positioning concerns how to position a product in the minds of consumers and inform
  what attributes differentiate it from the competitor''s products. A firm often performs
  this by producing a perceptual map, which denotes similar products produced in the
  same industry according to how consumers perceive their price and quality. From
  a product''s placing on the map, a firm would tailor its marketing communications
  to meld with the product''s perception among consumers and its position among competitors''
  offering.[83]



  The product life cycle (PLC) is a tool used by marketing managers to gauge the progress
  of a product, especially relating to sales or revenue accrued over time. The PLC
  is based on a few key assumptions, including:



  In the introduction stage, a product is launched onto the market. To stimulate the
  growth of sales/revenue, use of advertising may be high, in order to heighten awareness
  of the product in question.



  During the growth stage, the product''s sales/revenue is increasing, which may stimulate
  more marketing communications to sustain sales. More entrants enter into the market,
  to reap the apparent high profits that the industry is producing.



  When the product hits maturity, its starts to level off, and an increasing number
  of entrants to a market produce price falls for the product. Firms may use sales
  promotions to raise sales.



  During decline, demand for a good begins to taper off, and the firm may opt to discontinue
  the manufacture of the product. This is so, if revenue for the product comes from
  efficiency savings in production, over actual sales of a good/service. However,
  if a product services a niche market, or is complementary to another product, it
  may continue the manufacture of the product, despite a low level of sales/revenue
  being accrued.[5]



  Marketing ethics is an area of applied ethics that examines the moral principles
  and standards governing the practice and regulation of marketing. It addresses ethical
  issues arising in areas such as advertising, promotion, pricing, product development,
  and distribution. Certain aspects of marketing ethics, particularly advertising
  and promotional practices, overlap with media ethics and public relations ethics.

