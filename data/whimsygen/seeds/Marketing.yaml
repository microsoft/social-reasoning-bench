  Marketing is the act of acquiring, satisfying and retaining customers.[3] It is
  one of the primary components of business management and commerce.[4]



  Marketing is usually conducted by the seller, typically a retailer or manufacturer.
  Products can be marketed to other businesses (B2B) or directly to consumers (B2C).[5]
  Sometimes tasks are contracted to dedicated marketing firms, like a media, market
  research, or advertising agency. Sometimes, a trade association or government agency
  (such as the Agricultural Marketing Service) advertises on behalf of an entire industry
  or locality, often a specific type of food (e.g. Got Milk?), food from a specific
  area, or a city or region as a tourism destination.



  Market orientations are philosophies concerning the factors that should go into
  market planning.[6] The marketing mix, which outlines the specifics of the product
  and how it will be sold, including the channels that will be used to advertise the
  product,[7][8] is affected by the environment surrounding the product,[9] the results
  of marketing research and market research,[10] and the characteristics of the product''s
  target market.[11] Once these factors are determined, marketers must then decide
  what methods of promoting the product,[5] including use of coupons and other price
  inducements.[12]



  Marketing is currently defined by the American Marketing Association (AMA) as "the
  activity, set of institutions, and processes for creating, communicating, delivering,
  and exchanging offerings that have value for customers, clients, partners, and society
  at large".[13] However, the definition of marketing has evolved over the years.
  The AMA reviews this definition and its definition for "marketing research" every
  three years.[13] The interests of "society at large" were added into the definition
  in 2008.[14] The development of the definition may be seen by comparing the 2008
  definition with the AMA''s 1935 version: "Marketing is the performance of business
  activities that direct the flow of goods, and services from producers to consumers".[15]
  The newer definition highlights the increased prominence of other stakeholders in
  the new conception of marketing.



  Recent definitions of marketing place more emphasis on the consumer relationship,
  as opposed to a pure exchange process. For instance, prolific marketing author and
  educator, Philip Kotler has evolved his definition of marketing. In 1980, he defined
  marketing as "satisfying needs and wants through an exchange process",[3] and in
  2018 defined it as "the process by which companies engage customers, build strong
  customer relationships, and create customer value in order to capture value from
  customers in return".[17] A related definition, from the sales process engineering
  perspective, defines marketing as "a set of processes that are interconnected and
  interdependent with other functions of a business aimed at achieving customer interest
  and satisfaction".[18]



  Some definitions of marketing highlight marketing''s ability to produce value to
  shareholders of the firm as well. In this context, marketing can be defined as "the
  management process that seeks to maximise returns to shareholders by developing
  relationships with valued customers and creating a competitive advantage".[19] For
  instance, the Chartered Institute of Marketing defines marketing from a customer-centric
  perspective, focusing on "the management process responsible for identifying, anticipating
  and satisfying customer requirements profitably".[20]



  In the past, marketing practice tended to be seen as a creative industry, which
  included advertising, distribution and selling, and even today many parts of the
  marketing process (e.g. product design, art director, brand management, advertising,
  inbound marketing, copywriting etc.) involve the use of the creative arts.[21] However,
  because marketing makes extensive use of social sciences, psychology, sociology,
  mathematics, economics, anthropology and neuroscience, the profession is now widely
  recognized as a science.[22] Marketing science has developed a concrete process
  that can be followed to create a marketing plan.[23]



  The "marketing concept" proposes that to complete its organizational objectives,
  an organization should anticipate the needs and wants of potential consumers and
  satisfy them more effectively than its competitors. This concept originated from
  Adam Smith''s book The Wealth of Nations but would not become widely used until
  nearly 200 years later.[24] Marketing and Marketing Concepts are directly related.



  Given the centrality of customer needs, and wants in marketing, a rich understanding
  of these concepts is essential:[25]



  Marketing research, conducted for the purpose of new product development or product
  improvement, is often concerned with identifying the consumer''s unmet needs.[26]
  Customer needs are central to market segmentation which is concerned with dividing
  markets into distinct groups of buyers on the basis of "distinct needs, characteristics,
  or behaviors who might require separate products or marketing mixes".[27] Needs-based
  segmentation (also known as benefit segmentation) "places the customers'' desires
  at the forefront of how a company designs and markets products or services".[28]
  Although needs-based segmentation is difficult to do in practice, it has been proved
  to be one of the most effective ways to segment a market.[29][26] In addition, a
  great deal of advertising and promotion is designed to show how a given product''s
  benefits meet the customer''s needs, wants or expectations in a unique way.[30]



  The two major segments of marketing are business-to-business (B2B) marketing and
  business-to-consumer (B2C) marketing.[5]



  B2B (business-to-business) marketing refers to any marketing strategy or content
  that is geared towards a business or organization.[31] Any company that sells products
  or services to other businesses or organizations (vs. consumers) typically uses
  B2B marketing strategies. The 7 P''s of B2B marketing are product, price, place,
  promotion, people, process, and physical evidence.[31] Some of the trends in B2B
  marketing include content such as podcasts, videos, and social media marketing campaigns.[31]



  Examples of products sold through B2B marketing include:



  The four major categories of B2B product purchasers are:



  Business-to-consumer marketing, or B2C marketing, refers to the tactics and strategies
  in which a company promotes its products and services to individual people.[citation
  needed]



  Traditionally, this could refer to individuals shopping for personal products in
  a broad sense. More recently the term B2C refers to the online selling of consumer
  products.[citation needed]



  B2C marketing focuses on appealing directly to consumers. It often uses tailored
  emotional marketing strategies towards individuals.[32]



  Consumer-to-business marketing or C2B marketing is a business model where the end
  consumers create products and services which are consumed by businesses and organizations.
  It is diametrically opposed to the popular concept of B2C or business-to-consumer
  where the companies make goods and services available to the end consumers. In this
  type of business model, businesses profit from consumers'' willingness to name their
  own price or contribute data or marketing to the company, while consumers benefit
  from flexibility, direct payment, or free or reduced-price products and services.
  One of the major benefit of this type of business model is that it offers a company
  a competitive advantage in the market.[33]



  Customer to customer marketing or C2C marketing represents a market environment
  where one customer purchases goods from another customer using a third-party business
  or platform to facilitate the transaction. C2C companies are a new type of model
  that has emerged with e-commerce technology and the sharing economy.[34]



  The different goals of B2B and B2C marketing lead to differences in the B2B and
  B2C markets. The main differences in these markets are demand, purchasing volume,
  number of customers, customer concentration, distribution, buying nature, buying
  influences, negotiations, reciprocity, leasing and promotional methods.[5]



  A marketing orientation has been defined as a "philosophy of business management",[6]
  "a corporate state of mind",[35] or an "organizational culture".[36] Although scholars
  continue to debate the precise nature of specific concepts that inform marketing
  practice, the most commonly cited orientations are as follows:[37]



  The area of marketing planning involves forging a plan for a firm''s marketing activities.
  A marketing plan can also pertain to a specific product, the introduction of a new
  product, the revision of current marketing strategies for existing products, as
  well as an organisation''s overall marketing strategy. The plan is created to accomplish
  specific marketing objectives, outlining a company''s advertising and marketing
  efforts for a given period, describing the current marketing position of a business,
  and discussing the target market and marketing mix to be used to achieve marketing
  goals.



  An organization''s marketing planning process is derived from its overall business
  strategy. Marketing plans start by identifying customer needs through market research
  and how the business can satisfy these needs. The marketing plan also shows what
  actions will be taken and what resources will be used to achieve the planned objectives.



  Marketing objectives are typically broad-based in nature, and pertain to the general
  vision of the firm in the short, medium or long-term. As an example, if one pictures
  a group of companies (or a conglomerate), the objective might be to increase the
  group''s sales by 25% over a ten-year period.



  A marketing mix is a foundational tool used to guide decision making in marketing.
  The marketing mix represents the basic tools that marketers can use to bring their
  products or services to the market. They are the foundation of managerial marketing
  and the marketing plan typically devotes a section to the marketing mix.



  The 4Ps refers to four broad categories of marketing decisions, namely: product,
  price, promotion, and place.[7][51] The origins of the 4 Ps can be traced to the
  late 1940s.[52][53] The first known mention has been attributed to a Professor of
  Marketing at Harvard University, James Culliton.[54]



  The 4 Ps, in its modern form, was first proposed in 1960 by E. Jerome McCarthy;
  who presented them within a managerial approach that covered analysis, consumer
  behavior, market research, market segmentation, and planning.[55][56] Phillip Kotler,
  popularised this approach and helped spread the 4 Ps model.[57][58] McCarthy''s
  4 Ps have been widely adopted by both marketing academics and practitioners.[59][60][61]



  One of the limitations of the 4Ps approach is its emphasis on an inside-out view.[67]
  An inside-out approach is the traditional planning approach where the organization
  identifies its desired goals and objectives, which are often based around what has
  always been done. Marketing''s task then becomes one of "selling" the organization''s
  products and messages to the "outside" or external stakeholders.[62] In contrast,
  an outside-in approach first seeks to understand the needs and wants of the consumer.[68]



  From a model-building perspective, the 4 Ps has attracted a number of criticisms.
  Well-designed models should exhibit clearly defined categories that are mutually
  exclusive, with no overlap. Yet, the 4 Ps model has extensive overlapping problems.
  Several authors stress the hybrid nature of the fourth P, mentioning the presence
  of two important dimensions, "communication" (general and informative communications
  such as public relations and corporate communications) and "promotion" (persuasive
  communications such as advertising and direct selling). Certain marketing activities,
  such as personal selling, may be classified as either promotion or as part of the
  place (i.e., distribution) element.[69] Some pricing tactics, such as promotional
  pricing, can be classified as price variables or promotional variables and, therefore,
  also exhibit some overlap.



  Other important criticisms include that the marketing mix lacks a strategic framework
  and is, therefore, unfit to be a planning instrument, particularly when uncontrollable,
  external elements are an important aspect of the marketing environment.[70]



  To overcome the deficiencies of the 4Ps model, some authors have suggested extensions
  or modifications to the original model. Extensions of the four P''s are often included
  in cases such as services marketing where unique characteristics (i.e. intangibility,
  perishability, heterogeneity and the inseparability of production and consumption)
  warrant additional consideration factors. Other extensions include "people", "process",
  and "physical evidence", i.e. 7 Ps,[71] which are often applied in the case of services
  marketing.[72][73][74] Alternative extensions have been found necessary in retail
  marketing, industrial marketing and internet marketing.[example needed]



  In response to environmental and technological changes in marketing, as well as
  criticisms towards the 4Ps approach, the 4Cs has emerged as a modern marketing mix
  model. Robert F. Lauterborn proposed a 4 Cs classification in 1990.[75] His classification
  is a more consumer-orientated version of the 4 Ps[76][77] that attempts to better
  fit the movement from mass marketing to niche marketing.[75][78][79]



  Consumer (or client)



  The consumer refers to the person or group that will acquire the product. This aspect
  of the model focuses on fulfilling the wants or needs of the consumer.[8]



  Cost



  Cost refers to what is exchanged in return for the product. Cost mainly consists
  of the monetary value of the product. Cost also refers to anything else the consumer
  must sacrifice to attain the product, such as time or money spent on transportation
  to acquire the product.[8]



  Convenience



  Like "Place" in the 4Ps model, convenience refers to where the product will be sold.
  This, however, not only refers to physical stores but also whether the product is
  available in person or online. The convenience aspect emphasizes making it as easy
  as possible for the consumer to attain the product, thus making them more likely
  to do so.[8]



  Communication



  Like "Promotion" in the 4Ps model, communication refers to how consumers find out
  about a product. Unlike promotion, communication not only refers to the one-way
  communication of advertising, but also the two-way communication available through
  social media.[8]



  The term "marketing environment" relates to all of the factors (whether internal,
  external, direct or indirect) that affect a firm''s marketing decision-making/planning.
  A firm''s marketing environment consists of three main areas, which are:



  Marketing research is a systematic process of analyzing data that involves conducting
  research to support marketing activities and the statistical interpretation of data
  into information. This information is then used by managers to plan marketing activities,
  gauge the nature of a firm''s marketing environment and to attain information from
  suppliers. A distinction should be made between marketing research and market research.
  Market research involves gathering information about a particular target market.
  As an example, a firm may conduct research in a target market, after selecting a
  suitable market segment. In contrast, marketing research relates to all research
  conducted within marketing. Market research is a subset of marketing research.[10]
  (Avoiding the word consumer, which shows up in both,[80] market research is about
  distribution, while marketing research encompasses distribution, advertising effectiveness,
  and salesforce effectiveness).[81]



