content: "\n\n\nEmpirical methods\n\n\nPrescriptive and policy\n\n\nBehavioral economics\
  \ is the study of the psychological (e.g. cognitive, behavioral, affective, social)\
  \ factors involved in the decisions of individuals or institutions, and how these\
  \ decisions deviate from those implied by traditional economic theory.[1][2]\n\n\
  \nBehavioral economics is primarily concerned with the bounds of rationality of\
  \ economic agents. Behavioral models typically integrate insights from psychology,\
  \ neuroscience and microeconomic theory.[3][4]\n\n\nBehavioral economics began as\
  \ a distinct field of study in the 1970s and 1980s, but can be traced back to 18th-century\
  \ economists, such as Adam Smith, who deliberated how the economic behavior of individuals\
  \ could be influenced by their desires.[5]\n\n\n\nThe status of behavioral economics\
  \ as a subfield of economics is a fairly recent development; the breakthroughs that\
  \ laid the foundation for it were published through the last three decades of the\
  \ 20th century.[6][7] Behavioral economics is still growing as a field, being used\
  \ increasingly in research and in teaching.[8]\n\nBehavioral economics is widely\
  \ used to understand and improve real-world economic decision-making, particularly\
  \ in areas such as public policy, finance, and market design.[9]\n\n\nThe field\
  \ has become increasingly influential in informing economic analysis and policy\
  \ design by incorporating empirically observed patterns of human behavior into standard\
  \ economic models.[10]\n\n\nEarly classical economists included psychological reasoning\
  \ in much of their writing, though psychology at the time was not a recognized field\
  \ of study.[11] In The Theory of Moral Sentiments, Adam Smith wrote on concepts\
  \ later popularized by modern Behavioral Economic theory, such as loss aversion.[11]\
  \ Jeremy Bentham, a Utilitarian philosopher in the 1700s conceptualized utility\
  \ as a product of psychology.[11] Other economists who incorporated psychological\
  \ explanations in their works included Francis Edgeworth, Vilfredo Pareto and Irving\
  \ Fisher.\n\n\nA rejection and elimination of psychology from economics in the early\
  \ 1900s brought on a period defined by a reliance on empiricism.[11] There was a\
  \ lack of confidence in hedonic theories, which saw pursuance of maximum benefit\
  \ as an essential aspect in understanding human economic behavior.[6] Hedonic analysis\
  \ had shown little success in predicting human behavior, leading many to question\
  \ its viability as a reliable source for prediction.[6]\n\n\nThere was also a fear\
  \ among economists that the involvement of psychology in shaping economic models\
  \ was inordinate and a departure from accepted principles.[12] They feared that\
  \ an increased emphasis on psychology would undermine the mathematic components\
  \ of the field.[13][14]\n\n\nBy the late 1970s, critiques of expected-utility theory\
  \ began to crystallize into formal alternative models, most notably prospect theory.[15]\n\
  \n\nTo boost the ability of economics to predict accurately, economists started\
  \ looking to tangible phenomena rather than theories based on human psychology.[6]\
  \ Psychology was seen as unreliable to many of these economists as it was a new\
  \ field, not regarded as sufficiently scientific.[11] Though a number of scholars\
  \ expressed concern towards the positivism within economics, models of study dependent\
  \ on psychological insights became rare.[11] Economists instead conceptualized humans\
  \ as purely rational and self-interested decision makers, illustrated in the concept\
  \ of homo economicus.[14]\n\n\nA key precursor was the notion of bounded rationality,\
  \ which relaxed the assumption of fully optimal decision-making under cognitive\
  \ and informational constraints.[16]\n\n\nA pivotal early challenge to the dominance\
  \ of expected-utility theory was mounted by French economist Maurice Allais. In\
  \ his seminal 1953 paper, Allais presented empirical examples now known as the Allais\
  \ paradox — notably the “common-ratio” and “common-consequence” effects — which\
  \ demonstrated systematic deviations from expected-utility maximization. Experimental\
  \ evidence summarized in recent meta-analytic work confirms that the common-ratio\
  \ effect remains observable under many conditions. For instance, Blavatskyy, Panchenko\
  \ & Ortmann (2023) re-examined data from 39 prior experiments (14,909 observations)\
  \ and found that about 59.4% of designs reproduced the common-ratio pattern.[17]\n\
  \n\nThe resurgence of psychology within economics, which facilitated the expansion\
  \ of behavioral economics, has been linked to the cognitive revolution.[18][19]\
  \ In the 1960s, cognitive psychology began to shed more light on the brain as an\
  \ information processing device (in contrast to behaviorist models). Psychologists\
  \ in this field, such as Ward Edwards,[20] Amos Tversky and Daniel Kahneman began\
  \ to compare their cognitive models of decision-making under risk and uncertainty\
  \ to economic models of rational behavior. These developments spurred economists\
  \ to reconsider how psychology could be applied to economic models and theories.[11]\
  \ Concurrently, the Expected utility hypothesis and discounted utility models began\
  \ to gain acceptance. In challenging the accuracy of generic utility, these concepts\
  \ established a practice foundational in behavioral economics: Building on standard\
  \ models by applying psychological knowledge.[6]\nThese developments helped set\
  \ the stage for the field’s broader acceptance in mainstream economics in subsequent\
  \ decades, alongside growing research output and incorporation into teaching.[21]\n\
  \n\nOver time, behavioral insights were increasingly applied beyond individual choice\
  \ to policy design, with evidence informing how economic tools and institutions\
  \ affect behavior.[22]\n\n\nMathematical psychology reflects a long-standing interest\
  \ in preference transitivity and the measurement of utility.[23]\n\n\nIts consolidation\
  \ as a distinct area is also reflected in scholarly classification systems, which\
  \ list behavioral economics as a dedicated subject category.[24]\n\n\nIn 2017, Niels\
  \ Geiger, a lecturer in economics at the University of Hohenheim conducted an investigation\
  \ into the proliferation of behavioral economics.[8] Geiger's research looked at\
  \ studies that had quantified the frequency of references to terms specific to behavioral\
  \ economics, and how often influential papers in behavioral economics were cited\
  \ in journals on economics.[8] The quantitative study found that there was a significant\
  \ spread in behavioral economics after Kahneman and Tversky's work in the 1990s\
  \ and into the 2000s.[8]\n\n\nBounded rationality is the idea that when individuals\
  \ make decisions, their rationality is limited by the tractability of the decision\
  \ problem, their cognitive limitations and the time available.\n\n\nHerbert A. Simon\
  \ proposed bounded rationality as an alternative basis for the mathematical modeling\
  \ of decision-making. It complements \"rationality as optimization\", which views\
  \ decision-making as a fully rational process of finding an optimal choice given\
  \ the information available.[25] Simon used the analogy of a pair of scissors, where\
  \ one blade represents human cognitive limitations and the other the \"structures\
  \ of the environment\", illustrating how minds compensate for limited resources\
  \ by exploiting known structural regularity in the environment.[25] Bounded rationality\
  \ implicates the idea that humans take shortcuts that may lead to suboptimal decision-making.\
  \ Behavioral economists engage in mapping the decision shortcuts that agents use\
  \ in order to help increase the effectiveness of human decision-making. Bounded\
  \ rationality finds that actors do not assess all available options appropriately,\
  \ in order to save on search and deliberation costs. As such decisions are not always\
  \ made in the sense of greatest self-reward as limited information is available.\
  \ Instead agents shall choose to settle for an acceptable solution. One approach,\
  \ adopted by Richard M. Cyert and James G. March in their 1963  book A Behavioral\
  \ Theory of the Firm, was to view firms as coalitions of groups whose targets were\
  \ based on satisficing rather than optimizing behaviour.[26][27]  Another treatment\
  \ of this idea comes from Cass Sunstein and Richard Thaler's Nudge.[28][29] Sunstein\
  \ and Thaler recommend that choice architectures are modified in light of human\
  \ agents' bounded rationality. A widely cited proposal from Sunstein and Thaler\
  \ urges that healthier food be placed at sight level in order to increase the likelihood\
  \ that a person will opt for that choice instead of less healthy option. Some critics\
  \ of Nudge have lodged attacks that modifying choice architectures will lead to\
  \ people becoming worse decision-makers.[30][31]\n\n\nIn 1979, Kahneman and Tversky\
  \ published Prospect Theory: An Analysis of Decision Under Risk, that used cognitive\
  \ psychology to explain various divergences of economic decision making from neo-classical\
  \ theory.[32] Kahneman and Tversky utilising prospect theory determined three generalisations;\
  \ gains are treated differently than losses, outcomes received with certainty are\
  \ overweighed relative to uncertain outcomes and the structure of the problem may\
  \ affect choices. These arguments were supported in part by altering a survey question\
  \ so that it was no longer a case of achieving gains but averting losses and the\
  \ majority of respondents altered their answers accordingly. In essence proving\
  \ that emotions such as fear of loss, or greed can alter decisions, indicating the\
  \ presence of an irrational decision-making process. Prospect theory has two stages:\
  \ an editing stage and an evaluation stage. In the editing stage, risky situations\
  \ are simplified using various heuristics. In the evaluation phase, risky alternatives\
  \ are evaluated using various psychological principles that include:\n\n\nIn 1992,\
  \ in the Journal of Risk and Uncertainty, Kahneman and Tversky gave a revised account\
  \ of prospect theory that they called cumulative prospect theory.[33] The new theory\
  \ eliminated the editing phase in prospect theory and focused just on the evaluation\
  \ phase. Its main feature was that it allowed for non-linear probability weighting\
  \ in a cumulative manner, which was originally suggested in John Quiggin's rank-dependent\
  \ utility theory. Psychological traits such as overconfidence, projection bias and\
  \ the effects of limited attention are now part of the theory. Other developments\
  \ include a conference at the University of Chicago,[34] a special behavioral economics\
  \ edition of the Quarterly Journal of Economics (\"In Memory of Amos Tversky\"),\
  \ and Kahneman's 2002 Nobel Prize for having \"integrated insights from psychological\
  \ research into economic science, especially concerning human judgment and decision-making\
  \ under uncertainty.\"[35]\n\n\nA further argument of Behavioural Economics relates\
  \ to the impact of the individual's cognitive limitations as a factor in limiting\
  \ the rationality of people's decisions. Sloan first argued this in his paper 'Bounded\
  \ Rationality' where he stated that our cognitive limitations are somewhat the consequence\
  \ of our limited ability to foresee the future, hampering the rationality of decision.[36]\
  \ Daniel Kahneman further expanded upon the effect cognitive ability and processes\
  \ have on decision making in his book Thinking, Fast and Slow. He delved into two\
  \ forms of thought: fast thinking, which he considered \"operates automatically\
  \ and quickly, with little or no effort and no sense of voluntary control\",[37]\
  \ and slow thinking, the allocation of cognitive ability, choice, and concentration.\
  \ Fast thinking utilises heuristics, or shortcuts, which provide an immediate but\
  \ often irrational and imperfect solution. He proposed that hindsight bias, confirmation\
  \ bias, and outcome bias (among others) originate from such shortcuts. A key example\
  \ of fast thinking and the resultant irrational decisions is the 2008 financial\
  \ crisis.\n\n\nNudge is a concept in behavioral science, political theory and economics\
  \ which proposes designs or changes in decision environments as ways to influence\
  \ the behavior and decision making of groups or individuals—in other words, it's\
  \ \"a way to manipulate people's choices to lead them to make specific decisions\"\
  .[38]\n\n\nThe first formulation of the term and associated principles was developed\
  \ in cybernetics by James Wilk before 1995 and described by Brunel University academic\
  \ D. J. Stewart as \"the art of the nudge\" (sometimes referred to as micronudges[39]).\
  \ It also drew on methodological influences from clinical psychotherapy tracing\
  \ back to Gregory Bateson, including contributions from Milton Erickson, Watzlawick,\
  \ Weakland and Fisch, and Bill O'Hanlon.[40] In this variant, the nudge is a microtargeted\
  \ design geared towards a specific group of people, irrespective of the scale of\
  \ intended intervention.\n\n\nIn 2008, Richard Thaler and Cass Sunstein's book Nudge:\
  \ Improving Decisions About Health, Wealth, and Happiness brought nudge theory to\
  \ prominence.[38] It also gained a following among US and UK politicians, in the\
  \ private sector and in public health.[41] The authors refer to influencing behavior\
  \ without coercion as libertarian paternalism and the influencers as choice architects.[42]\
  \ Thaler and Sunstein defined their concept as:[43]\n\n\nA nudge, as we will use\
  \ the term, is any aspect of the choice architecture that alters people's behavior\
  \ in a predictable way without forbidding any options or significantly changing\
  \ their economic incentives. To count as a mere nudge, the intervention must be\
  \ easy and cheap to avoid. Nudges are not mandates. Putting fruit at eye level counts\
  \ as a nudge. Banning junk food does not.\n\nNudging techniques aim to capitalise\
  \ on the judgemental heuristics of people. In other words, a nudge alters the environment\
  \ so that when heuristic, or System 1, decision-making is used, the resulting choice\
  \ will be the most positive or desired outcome.[44] An example of such a nudge is\
  \ switching the placement of junk food in a store, so that fruit and other healthy\
  \ options are located next to the cash register, while junk food is relocated to\
  \ another part of the store.[45]\n\n\nIn 2008, the United States appointed Sunstein,\
  \ who helped develop the theory, as administrator of the Office of Information and\
  \ Regulatory Affairs.[42][46][47]\n\n\nNotable applications of nudge theory include\
  \ the formation of the British Behavioural Insights Team in 2010. It is often called\
  \ the \"Nudge Unit\", at the British Cabinet Office, headed by David Halpern.[48]\
  \ In addition, the Penn Medicine Nudge Unit is the world's first behavioral design\
  \ team embedded within a health system.\n\n\nNudge theory has also been applied\
  \ to business management and corporate culture, such as in relation to health, safety\
  \ and environment (HSE) and human resources. Regarding its application to HSE, one\
  \ of the primary goals of nudge is to achieve a \"zero accident culture\".[49]\n\
  \n\nIn contrast to nudges, which aim to guide people toward better decisions, Richard\
  \ Thaler and Cass Sunstein also introduced the concept of sludge, which refers to\
  \ unnecessary frictions or barriers that make it harder for individuals to take\
  \ beneficial actions—such as confusing forms or hidden fees.[50]\n\n\nCass Sunstein\
  \ has responded to critiques at length in his The Ethics of Influence[51] making\
  \ the case in favor of nudging against charges that nudges diminish autonomy,[52]\
  \ threaten dignity, violate liberties, or reduce welfare. Ethicists have debated\
  \ this rigorously.[53] These charges have been made by various participants in the\
  \ debate from Bovens[54] to Goodwin.[55] Wilkinson for example charges nudges for\
  \ being manipulative, while others such as Yeung question their scientific credibility.[56]\n\
  \n\nSome, such as Hausman & Welch[57] have inquired whether nudging should be permissible\
  \ on grounds of (distributive[clarification needed]) justice; Lepenies & Malecka[58]\
  \ have questioned whether nudges are compatible with the rule of law. Similarly,\
  \ legal scholars have discussed the role of nudges and the law.[59][60]\n\n\nBehavioral\
  \ economists such as Bob Sugden have pointed out that the underlying normative benchmark\
  \ of nudging is still homo economicus, despite the proponents' claim to the contrary.[61]\n\
  \n\nRecent scholarship has raised concerns about the use of vibrational nudges in\
  \ digital consumer environments, suggesting that haptic feedback—such as subtle\
  \ mobile phone vibrations—can increase purchasing behavior without conscious awareness.\
  \ The study questions whether such subliminal tactics cross ethical boundaries by\
  \ manipulating impulse control in ways that blur the line between persuasion and\
  \ coercion.[62]\n\n\nIt has been remarked that nudging is also a euphemism for psychological\
  \ manipulation as practiced in social engineering.[63][64]\n\n\nThere exists an\
  \ anticipation and, simultaneously, implicit criticism of the nudge theory in works\
  \ of Hungarian social psychologists who emphasize the active participation in the\
  \ nudge of its target (Ferenc Merei[65] and Laszlo Garai[66]).\n\n\nBehavioral economics\
  \ aims to improve or overhaul traditional economic theory by studying failures in\
  \ its assumptions that people are rational and selfish. Specifically, it studies\
  \ the biases, tendencies and heuristics of people's economic decisions. It aids\
  \ in determining whether people make good choices and whether they could be helped\
  \ to make better choices. It can be applied both before and after a decision is\
  \ made.\n\n\nBehavioral economics proposes search heuristics as an aid for evaluating\
  \ options. It is motivated by the fact that it is costly to gain information about\
  \ options and it aims to maximise the utility of searching for information. While\
  \ each heuristic is not wholistic in its explanation of the search process alone,\
  \ a combination of these heuristics may be used in the decision-making process.\
  \ There are three primary search heuristics.\n\n\nSatisficing\n\n\nSatisficing is\
  \ the idea that there is some minimum requirement from the search and once that\
  \ has been met, stop searching. After satisficing, a person may not have the most\
  \ optimal option (i.e. the one with the highest utility), but would have a \"good\
  \ enough\" one. This heuristic may be problematic if the aspiration level is set\
  \ at such a level that no products exist that could meet the requirements.\n\n\n\
  Directed cognition\n\n\nDirected cognition is a search heuristic in which a person\
  \ treats each opportunity to research information as their last. Rather than a contingent\
  \ plan that indicates what will be done based on the results of each search, directed\
  \ cognition considers only if one more search should be conducted and what alternative\
  \ should be researched.\n\n\nElimination by aspects\n\n\nWhereas satisficing and\
  \ directed cognition compare choices, elimination by aspects compares certain qualities.\
  \ A person using the elimination by aspects heuristic first chooses the quality\
  \ that they value most in what they are searching for and sets an aspiration level.\
  \ This may be repeated to refine the search. i.e. identify the second most valued\
  \ quality and set an aspiration level. Using this heuristic, options will be eliminated\
  \ as they fail to meet the minimum requirements of the chosen qualities.[67]\n\n\
  \nBesides searching, behavioral economists and psychologists have identified other\
  \ heuristics and other cognitive effects that affect people's decision making. These\
  \ include:\n\n\nMental accounting\n\n\nMental accounting refers to the propensity\
  \ to allocate resources for specific purposes. Mental accounting is a behavioral\
  \ bias that causes one to separate money into different categories known as mental\
  \ accounts either based on the source or the intention of the money.[68]\n\n\nAnchoring\n\
  \n\nAnchoring describes when people have a mental reference point with which they\
  \ compare results to. For example, a person who anticipates that the weather on\
  \ a particular day would be raining, but finds that on the day it is actually clear\
  \ blue skies, would gain more utility from the pleasant weather because they anticipated\
  \ that it would be bad.[69]\n\n\nHerd behavior\n\n\nThis is a relatively simple\
  \ bias that reflects the tendency of people to mimic what everyone else is doing\
  \ and follow the general consensus.\n\n\nFraming effects\n\n\nPeople tend to choose\
  \ differently depending on how the options are presented to them. People tend to\
  \ have little control over their susceptibility to the framing effect, as often\
  \ their choice-making process is based on intuition.[70]\n\n\nWhile heuristics are\
  \ tactics or mental shortcuts to aid in the decision-making process, people are\
  \ also affected by a number of biases and fallacies. Behavioral economics identifies\
  \ a number of these biases that negatively affect decision making such as:\n\n\n\
  Present bias\n\n\nPresent bias reflects the human tendency to want rewards sooner.\
  \ It describes people who are more likely to forego a greater payoff in the future\
  \ in favour of receiving a smaller benefit sooner. An example of this is a smoker\
  \ who is trying to quit. Although they know that in the future they will suffer\
  \ health consequences, the immediate gain from the nicotine hit is more favourable\
  \ to a person affected by present bias. Present bias is commonly split into people\
  \ who are aware of their present bias (sophisticated) and those who are not (naive).[71]\n\
  \n\nGambler's fallacy\n\n\nThe gambler's fallacy stems from law of small numbers.[72]\
  \ It is the belief that an event that has occurred often in the past is less likely\
  \ to occur in the future, despite the probability remaining constant. For example,\
  \ if a coin had been flipped three times and turned up heads every single time,\
  \ a person influenced by the gambler's fallacy would predict that the next one ought\
  \ to be tails because of the abnormal number of heads flipped in the past, even\
  \ though the probability of a heads occurring is still 50%.[73]\n\n\nHot hand fallacy\n\
  \n\nThe hot hand fallacy is the opposite of the gambler's fallacy. It is the belief\
  \ that an event that has occurred often in the past is more likely to occur again\
  \ in the future such that the streak will continue. This fallacy is particularly\
  \ common within sports. For example, if a football team has consistently won the\
  \ last few games they have participated in, then it is often said that they are\
  \ 'on form' and thus, it is expected that the football team will maintain their\
  \ winning streak.[74]\n\n\nNarrative fallacy\n\n\nNarrative fallacy refers to when\
  \ people use narratives to connect the dots between random events to make sense\
  \ of arbitrary information. The term stems from Nassim Taleb's book The Black Swan:\
  \ The Impact of the Highly Improbable. The narrative fallacy can be problematic\
  \ as it can lead to individuals making false cause-effect relationships between\
  \ events.[75] For example, a startup may get funding because investors are swayed\
  \ by a narrative that sounds plausible, rather than by a more reasoned analysis\
  \ of available evidence.[76]\n\n\nLoss aversion\n\n\nLoss aversion refers to the\
  \ tendency to place greater weight on losses compared to equivalent gains. In other\
  \ words, this means that when an individual receives a loss, this will cause their\
  \ utility to decline more so than the same-sized gain.[77] This means that they\
  \ are far more likely to try to assign a higher priority on avoiding losses than\
  \ making investment gains. As a result, some investors might want a higher payout\
  \ to compensate for losses. If the high payout is not likely, they might try to\
  \ avoid losses altogether even if the investment's risk is acceptable from a rational\
  \ standpoint.[78]\n\n\nRecency bias\n\n\nRecency bias is the belief that a particular\
  \ outcome is more probable simply because it had just occurred. For example, if\
  \ the previous one or two flips were heads, a person affected by recency bias would\
  \ continue to predict that heads would be flipped.[79]\n\n\nConfirmation bias\n\n\
  \nConfirmation bias is the tendency to prefer information consistent with one's\
  \ beliefs and discount evidence inconsistent with them.[80]\n\n\nFamiliarity bias\n\
  \n\nFamiliarity bias simply describes the tendency of people to return to what they\
  \ know and are comfortable with. Familiarity bias discourages affected people from\
  \ exploring new options and may limit their ability to find an optimal solution.[81]\n\
  \n\nStatus quo bias\n\n\nStatus quo bias describes the tendency of people to keep\
  \ things as they are. It is a particular aversion to change in favor of remaining\
  \ comfortable with what is known.[82]\n\n\nConnected to this concept is the endowment\
  \ effect, a theory that people value things more if they own them - they require\
  \ more to give up an object than they would be willing to pay to acquire it.[83]\n\
  \n\nBehavioral finance[84] is the study of the influence of psychology on the behavior\
  \ of investors or financial analysts. It assumes that investors are not always rational,\
  \ have limits to their self-control and are influenced by their own biases.[85]\
  \ For example, behavioral law and economics scholars studying the growth of financial\
  \ firms' technological capabilities have attributed decision science to irrational\
  \ consumer decisions.[86]: 1321  It also includes the subsequent effects on the\
  \ markets. Behavioral Finance attempts to explain the reasoning patterns of investors\
  \ and measures the influential power of these patterns on the investor's decision\
  \ making. The central issue in behavioral finance is explaining why market participants\
  \ make irrational systematic errors contrary to assumption of rational market participants.[1]\
  \ Such errors affect prices and returns, creating market inefficiencies.\n\n\nBehavioral\
  \ game theory, invented by Colin Camerer, analyzes interactive strategic decisions\
  \ and behavior using the methods of game theory,[87] experimental economics, and\
  \ experimental psychology. Experiments include testing deviations from typical simplifications\
  \ of economic theory such as the independence axiom[88] and neglect of altruism,[89]\
  \ fairness,[90] and framing effects.[91] On the positive side, the method has been\
  \ applied to interactive learning[92] and social preferences.[93][94][95] As a research\
  \ program, the subject is a development of the last three decades.[96][97][98][99][100][101][102]\n\
  \n\nMuch of the decisions are more and more made either by human beings with the\
  \ assistance of artificial intelligent machines or wholly made by these machines.\
  \ Tshilidzi Marwala and Evan Hurwitz in their book,[103] studied the utility of\
  \ behavioral economics in such situations and concluded that these intelligent machines\
  \ reduce the impact of bounded rational decision making. In particular, they observed\
  \ that these intelligent machines reduce the degree of information asymmetry in\
  \ the market, improve decision making and thus making markets more rational.\n\n\
  \nThe use of AI machines in the market in applications such as online trading and\
  \ decision making has changed major economic theories.[103] Other theories where\
  \ AI has had impact include in rational choice, rational expectations, game theory,\
  \ Lewis turning point, portfolio optimization and counterfactual thinking.\n\n\n\
  Other branches of behavioral economics enrich the model of the utility function\
  \ without implying inconsistency in preferences. Ernst Fehr, Armin Falk, and Rabin\
  \ studied fairness, inequity aversion and reciprocal altruism, weakening the neoclassical\
  \ assumption of perfect selfishness. This work is particularly applicable to wage\
  \ setting. The work on \"intrinsic motivation by Uri Gneezy and Aldo Rustichini\
  \ and \"identity\" by George Akerlof and Rachel Kranton assumes that agents derive\
  \ utility from adopting personal and social norms in addition to conditional expected\
  \ utility. According to Aggarwal, in addition to behavioral deviations from rational\
  \ equilibrium, markets are also likely to suffer from lagged responses, search costs,\
  \ externalities of the commons, and other frictions making it difficult to disentangle\
  \ behavioral effects in market behavior.[104]\n\n\n\"Conditional expected utility\"\
  \ is a form of reasoning where the individual has an illusion of control, and calculates\
  \ the probabilities of external events and hence their utility as a function of\
  \ their own action, even when they have no causal ability to affect those external\
  \ events.[105][106]\n\n\nBehavioral economics caught on among the general public\
  \ with the success of books such as Dan Ariely's Predictably Irrational. Practitioners\
  \ of the discipline have studied quasi-public policy topics such as broadband mapping.[107][108]\
  \ Behavioral economics has also been applied to public health policies, including\
  \ front-of-pack nutrition labeling, sugar-sweetened beverage taxes, and advertising\
  \ restrictions for unhealthy foods. These measures use behavioral insights to reshape\
  \ consumer decisions without eliminating choice.[109]\n\n\nApplications for behavioral\
  \ economics include the modeling of the consumer decision-making process for applications\
  \ in artificial intelligence and machine learning. The Silicon Valley–based start-up\
  \ Singularities is using the AGM postulates proposed by Alchourrón, Gärdenfors,\
  \ and Makinson—the formalization of the concepts of beliefs and change for rational\
  \ entities—in a symbolic logic to create a \"machine learning and deduction engine\
  \ that uses the latest data science and big data algorithms in order to generate\
  \ the content and conditional rules (counterfactuals) that capture customer's behaviors\
  \ and beliefs.\"[110]\n\n\nThe University of Pennsylvania's Center for Health Incentives\
  \ & Behavioral Economics (CHIBE) looks at how behavioral economics can improve health\
  \ outcomes. CHIBE researchers have found evidence that many behavioral economics\
  \ principles (incentives, patient and clinician nudges, gamification, loss aversion,\
  \ and more) can be helpful to encourage vaccine uptake, smoking cessation, medication\
  \ adherence, and physical activity, for example.[111]\n\n\nApplications of behavioral\
  \ economics also exist in other disciplines, for example in the area of supply chain\
  \ management.[112]\n\n\nIn 1978 Herbert Simon was awarded the Nobel Memorial Prize\
  \ in Economic Sciences \"for his pioneering research into the decision-making process\
  \ within economic organizations\".[113] Simon earned his Bachelor of Arts and his\
  \ Ph.D. in Political Science from the University of Chicago before going on to teach\
  \ at Carnegie Tech.[114] Herbert was praised for his work on bounded rationality,\
  \ a challenge to the assumption that humans are rational actors.[115]\n\n\nIn 2002,\
  \ psychologist Daniel Kahneman and economist Vernon L. Smith were awarded the Nobel\
  \ Memorial Prize in Economic Sciences. Kahneman was awarded the prize \"for having\
  \ integrated insights from psychological research into economic science, especially\
  \ concerning human judgment and decision-making under uncertainty\", while Smith\
  \ was awarded the prize \"for having established laboratory experiments as a tool\
  \ in empirical economic analysis, especially in the study of alternative market\
  \ mechanisms.\"[116]\n\n\nIn 2017, economist Richard Thaler was awarded the Nobel\
  \ Memorial Prize in Economic Sciences for \"his contributions to behavioral economics\
  \ and his pioneering work in establishing that people are predictably irrational\
  \ in ways that defy economic theory.\"[117][118] Thaler was especially recognized\
  \ for presenting inconsistencies in standard Economic theory and for his formulation\
  \ of mental accounting and Libertarian paternalism[119][120]\n\n\nThe work of Andrei\
  \ Shleifer focused on behavioral finance and made observations on the limits of\
  \ the efficient market hypothesis.[7] Shleifer received the 1999 John Bates Clark\
  \ Medal from the American Economic Association for his work.[121]\n\n\nMatthew Rabin\
  \ received the \"genius\" award from the MarArthur Foundation in 2000.[7] The American\
  \ Economic Association chose Rabin as the recipient of the 2001 John Bates Clark\
  \ medal. Rabin's awards were given to him primarily on the basis of his work on\
  \ fairness and reciprocity, and on present bias.[122]\n\n\nSendhil Mullainathan\
  \ was the youngest of the chosen MacArthur Fellows in 2002, receiving a fellowship\
  \ grant of $500,000 in 2003.[123][7] Mullainathan was praised by the MacArthur Foundation\
  \ as working on economics and psychology as an aggregate.[7] Mullainathan's research\
  \ focused on the salaries of executives on Wall Street; he also has looked at the\
  \ implications of racial discrimination in markets in the United States.[124][7]\n\
  \n\nTaken together, two landmark papers in economic theory which were published\
  \ before the field of Behavioral Economics emerged, provide a justification for\
  \ standard neoclassical economic analysis. The first is the paper \"Uncertainty,\
  \ Evolution, and Economic Theory\" by Armen Alchian from 1950 and the second is\
  \ the paper \"Irrational Behavior and Economic Theory\" from 1962 by Gary Becker,\
  \ both of which were published in the Journal of Political Economy.[125][126] Alchian's\
  \ 1950 paper uses the logic of natural selection, the Evolutionary Landscape model,\
  \ stochastic processes, probability theory, and several other lines of reasoning\
  \ to justify many of the results derived from standard supply analysis assuming\
  \ firms which maximizing their profits, are certain about the future, and have accurate\
  \ foresight without having to assume any of those things. Becker's 1962 paper shows\
  \ that downward sloping market demand curves (the most important implication of\
  \ the law of demand) do not actually require an assumption that the consumers in\
  \ that market are rational, as is claimed by behavioral economists and they also\
  \ follow from a wide variety of irrational behavior as well.\n\n\nThe lines of reasoning\
  \ and argumentation used in these two papers is re-expressed and expanded upon in\
  \ (at least) one other professional economic publication for each of them. As for\
  \ Alchian's evolutionary economics via natural selection by way of environmental\
  \ adoption thesis, it is summarized, followed by an explicit exploration of its\
  \ theoretical implications for Behavioral Economic theory, then illustrated via\
  \ examples in several different industries including banking, hospitality, and transportation,\
  \ in the 2014 paper \"Uncertainty, Evolution, and Behavioral Economic Theory,\"\
  \ by Manne and Zywicki.[127] And the argument made in Becker's 1962 paper, that\
  \ a 'pure' increase in the (relative) price (or terms of trade) of good X must reduce\
  \ the amount of X demanded in the market for good X, is explained in greater detail\
  \ in chapters (or as he calls them, \"Lectures\" because this textbook is more or\
  \ less a transcription of his lectures given in his Price Theory course taught to\
  \ 1st year PhD students several years earlier) 4 (called The Opportunity Set) and\
  \ 5 (called Substitution Effects) of Gary Becker's graduate level textbook Economic\
  \ Theory, originally published in 1971.[128]\n\n\nBesides the three critical aforementioned\
  \ articles, critics of behavioral economics typically stress the rationality of\
  \ economic agents.[129] A fundamental critique is provided by Maialeh (2019) who\
  \ argues that no behavioral research can establish an economic theory. Examples\
  \ provided on this account include pillars of behavioral economics such as satisficing\
  \ behavior or prospect theory, which are confronted from the neoclassical perspective\
  \ of utility maximization and expected utility theory respectively. The author shows\
  \ that behavioral findings are hardly generalizable and that they do not disprove\
  \ typical mainstream axioms related to rational behavior.[130]\n\n\nOthers, such\
  \ as the essayist and former trader Nassim Taleb note that cognitive theories, such\
  \ as prospect theory, are models of decision-making, not generalized economic behavior,\
  \ and are only applicable to the sort of once-off decision problems presented to\
  \ experiment participants or survey respondents.[131] It is noteworthy that in the\
  \ episode of EconTalk in which Taleb said this, he and the host, Russ Roberts discuss\
  \ the significance of Gary Becker's 1962 paper cited in the first paragraph in this\
  \ section as an argument against any implications which can be drawn from one shot\
  \ psychological experiments on market level outcomes outside of laboratory settings,\
  \ i.e. in the real world. Others argue that decision-making models, such as the\
  \ endowment effect theory, that have been widely accepted by behavioral economists\
  \ may be erroneously established as a consequence of poor experimental design practices\
  \ that do not adequately control subject misconceptions.[2][132][133][134]\n\n\n\
  Despite a great deal of rhetoric, no unified behavioral theory has yet been espoused:\
  \ behavioral economists have proposed no alternative unified theory of their own\
  \ to replace neoclassical economics with.\n\n\nDavid Gal has argued that many of\
  \ these issues stem from behavioral economics being too concerned with understanding\
  \ how behavior deviates from standard economic models rather than with understanding\
  \ why people behave the way they do. Understanding why behavior occurs is necessary\
  \ for the creation of generalizable knowledge, the goal of science. He has referred\
  \ to behavioral economics as a \"triumph of marketing\" and particularly cited the\
  \ example of loss aversion.[135] David Gal also has argued that loss aversion may\
  \ not be as robust or universal as often claimed. He suggests that alternative explanations,\
  \ such as psychological inertia, better explain certain behaviors like the endowment\
  \ effect and status quo bias.[136]\n\n\nTraditional economists are skeptical of\
  \ the experimental and survey-based techniques that behavioral economics uses extensively.\
  \ Economists typically stress revealed preferences over stated preferences (from\
  \ surveys) in the determination of economic value. Experiments and surveys are at\
  \ risk of systemic biases, strategic behavior and lack of incentive compatibility.\
  \ Some researchers point out that participants of experiments conducted by behavioral\
  \ economists are not representative enough and drawing broad conclusions on the\
  \ basis of such experiments is not possible. An acronym WEIRD has been coined in\
  \ order to describe the studies participants—as those who come from Western, Educated,\
  \ Industrialized, Rich, and Democratic societies.[137] Critics have also highlighted\
  \ that much of behavioral economics research relies on WEIRD  populations, raising\
  \ questions about the generalizability of findings to other cultures and socioeconomic\
  \ groups.[138]\n\n\nMatthew Rabin[139] dismisses these criticisms, countering that\
  \ consistent results typically are obtained in multiple situations and geographies\
  \ and can produce good theoretical insight. Behavioral economists, however, responded\
  \ to these criticisms by focusing on field studies rather than lab experiments.\
  \ Some economists see a fundamental schism between experimental economics and behavioral\
  \ economics, but prominent behavioral and experimental economists tend to share\
  \ techniques and approaches in answering common questions. For example, behavioral\
  \ economists are investigating neuroeconomics, which is entirely experimental and\
  \ has not been verified in the field.[citation needed]\n\n\nThe epistemological,\
  \ ontological, and methodological components of behavioral economics are increasingly\
  \ debated, in particular by historians of economics and economic methodologists.[140]\n\
  \n\nAccording to some researchers,[141] when studying the mechanisms that form the\
  \ basis of decision-making, especially financial decision-making, it is necessary\
  \ to recognize that most decisions are made under stress[142] because, \"Stress\
  \ is the nonspecific body response to any demands presented to it.\"[143]\n\n\n\
  A widely noted concern is the replicability crisis; many behavioral economics studies\
  \ fail to reproduce when repeated. A 2024 WSJ review reports that fewer than half\
  \ of nudging-based experiments sustain long-term impact when re-tested, bringing\
  \ into question their external validity in complex, real-world conditions.[144]\
  \ Supporting this, behavioral economics scholars have acknowledged that \"small\
  \ effect sizes and limited sample diversity\" often hinder the generalizability\
  \ of results.[145]\n\n\nExperimental economics is the application of experimental\
  \ methods, including statistical, econometric, and computational,[146] to study\
  \ economic questions. Data collected in experiments are used to estimate effect\
  \ size, test the validity of economic theories, and illuminate market mechanisms.\
  \ Economic experiments usually use cash to motivate subjects, in order to mimic\
  \ real-world incentives. Experiments are used to help understand how and why markets\
  \ and other exchange systems function as they do. Experimental economics have also\
  \ expanded to understand institutions and the law (experimental law and economics).[147]\n\
  \n\nA fundamental aspect of the subject is design of experiments. Experiments may\
  \ be conducted in the field or in laboratory settings, whether of individual or\
  \ group behavior.[148]\n\n\nVariants of the subject outside such formal confines\
  \ include natural and quasi-natural experiments.[149]\n\n\nNeuroeconomics is an\
  \ interdisciplinary field that seeks to explain human decision making, the ability\
  \ to process multiple alternatives and to follow a course of action. It studies\
  \ how economic behavior can shape our understanding of the brain, and how neuroscientific\
  \ discoveries can constrain and guide models of economics.[150] It combines research\
  \ methods from neuroscience, experimental and behavioral economics, and cognitive\
  \ and social psychology.[151] As research into decision-making behavior becomes\
  \ increasingly computational, it has also incorporated new approaches from theoretical\
  \ biology, computer science, and mathematics.\n\n\nNeuroeconomics studies decision\
  \ making by using a combination of tools from these fields so as to avoid the shortcomings\
  \ that arise from a single-perspective approach. In mainstream economics, expected\
  \ utility (EU) and the concept of rational agents are still being used. Many economic\
  \ behaviors are not fully explained by these models, such as heuristics and framing.[152]\
  \ Behavioral economics emerged to account for these anomalies by integrating social,\
  \ cognitive, and emotional factors in understanding economic decisions. Neuroeconomics\
  \ adds another layer by using neuroscientific methods in understanding the interplay\
  \ between economic behavior and neural mechanisms. By using tools from various fields,\
  \ some scholars claim that neuroeconomics offers a more integrative way of understanding\
  \ decision making.[150]\n\n\nAn evolutionary psychology perspective states that\
  \ many of the perceived limitations in rational choice can be explained as being\
  \ rational in the context of maximizing biological fitness in the ancestral environment,\
  \ but not necessarily in the current one. Thus, when living at subsistence level\
  \ where a reduction of resources may result in death, it may have been rational\
  \ to place a greater value on preventing losses than on obtaining gains. It may\
  \ also explain behavioral differences between groups, such as males being less risk-averse\
  \ than females since males have more variable reproductive success than females.\
  \ While unsuccessful risk-seeking may limit reproductive success for both sexes,\
  \ males may potentially increase their reproductive success from successful risk-seeking\
  \ much more than females can.[153]\n\n\nBehavioral development economics brings\
  \ together the disciplines of behavioral economics and development economics to\
  \ study economic decision-making in low-income countries under the influence of\
  \ cognitive biases and social norms. This is important because while non-standard\
  \ economic behavior exists globally, it is more pronounced in the Global South due\
  \ to interactions with higher poverty rates, financial instability, informal labor\
  \ markets and weaker formal institutions. The understanding of these regional differences\
  \ is vital for effective policy-making in the Global South.[154]\n\n\nRecent research\
  \ in behavioral development economics highlights how the experience of poverty itself\
  \ can impair cognitive function and economic decision-making, potentially perpetuating\
  \ poverty through behavioral channels. Scarcity captures attention, narrowing focus\
  \ on immediate financial concerns while reducing mental “bandwidth” for other tasks.[155]\
  \ While this focused attention may improve decision-making in some contexts—such\
  \ as heightened price awareness [156]—the overall effect of constant financial stress\
  \ is detrimental. A study provides experimental evidence of this cognitive burden:\
  \ when exposed to scenarios involving large financial stakes, low-income individuals\
  \ in the U.S. exhibited reduced cognitive performance, while high-income individuals\
  \ did not.[157] Complementary field evidence from Indian sugarcane farmers showed\
  \ significantly lower cognitive performance before harvest (when finances are tight)\
  \ compared to post-harvest, suggesting that poverty-induced cognitive load, rather\
  \ than fixed individual traits, drives decision-making quality.\n\n\nFinancial inclusion\
  \ remains low in the Global South despite several attempts to improve the situation\
  \ through financial literacy campaigns. This is unlikely to suffice in low-income\
  \ setting because of behavioral barriers. Trust in financial institutions is much\
  \ lower in the Global South as a result of historical experiences with inflation,\
  \ bank failures and corruption. Accordingly, economic agents exhibit stronger status\
  \ quo bias relying mostly on informal financial institutions through their social\
  \ networks such as rotating savings and credit associations (ROSCAs). \nAccordingly,\
  \ interventions that aimed at strengthening these informal institutions such as\
  \ mobile money platforms like M-Pesa in Kenya and village savings and loans associations\
  \ (VSLAs) have performed much better than financial literacy programs.[158] These\
  \ interventions leveraged the existing trust structures and social networks to encourage\
  \ adoption.\n\n\nBehavioral challenges in health decision-making also differ in\
  \ developing contexts. While procrastination in preventive health care is universal,\
  \ it is exacerbated in low-income countries where immediate financial costs often\
  \ outweigh perceived future benefits. For example, while vaccine hesitancy exists\
  \ globally, in the Global South, uptake is also hindered by limited access, misinformation,\
  \ and lack of trust in public health institutions.[159] Compared to developed countries,\
  \ where reminder systems or behavioral nudges can improve compliance, in the Global\
  \ South, additional interventions, such as financial incentives or subsidized transportation,\
  \ are often necessary to achieve significant behavioral change.\n\n\nHistorical\
  \ experiences with colonial medicine have also created persistent mistrust in the\
  \ health sector. A study shows that regions in Central Africa that were more exposed\
  \ to cruel French colonial medical campaigns between 1921 and 1956 exhibit today\
  \ lower vaccination rates and willingness to undertake non-invasive blood tests.\
  \ Moreover, World Bank health projects in those regions have shown lower success\
  \ rates. It is important here to note that within the same culture, different behavioral\
  \ barriers exist because of different historical experiences.[160]\n\n\nLabor markets\
  \ differ substantially in the Global South compared to high-income countries because\
  \ of higher rates of informal employment, self-employment and casual labor. For\
  \ instance, an experiment that randomly assigned workers to industrial jobs in Ethiopia\
  \ found that workers quickly quit or move to different sectors.[161] This low preference\
  \ for full-time jobs is driven by unpredictable demands on one's time where workers\
  \ prefer flexibility to be able to meet family demands. On the other hand, US workers\
  \ show little valuation of work hours flexibility.[162] Given less formal contracts\
  \ and fixed schedules, workers are more prone to behavioral biases. Self-control\
  \ problems are especially relevant in labor markets. For instance, many low-income\
  \ workers in India are inebriated on the job because they are self-employed.[163]\
  \ Without external monitoring or standardized hours, self-employed individuals must\
  \ rely on internal discipline, which is often limited. Evidence from Indian data-entry\
  \ workers shows that many voluntarily opt into contracts that penalize them for\
  \ underperformance—known as dominated contracts—in order to commit themselves to\
  \ working harder.[164] This suggests that workers are aware of their own time-inconsistency\
  \ and use commitment mechanisms to increase productivity. Additionally, many workers\
  \ engage in income-targeting behavior, adjusting labor supply based on daily financial\
  \ needs rather than wage levels. For example, bicycle-taxi drivers in Kenya work\
  \ longer when they have specific cash needs but do not reduce labor supply when\
  \ given cash in the morning, indicating reference-dependent preferences focused\
  \ on earned income.[165]\n\n\nBehavioral frictions also extend to the workplace\
  \ environment. While noise and heat are common in urban areas of the Global South,\
  \ workers often underestimate how these factors affect their productivity, reflecting\
  \ bounded rationality. In Kenya, exposure to moderate increases in noise significantly\
  \ reduced textile output, yet workers were unaware of the impact and unwilling to\
  \ pay for quieter conditions even when earnings depended on output.[166] Similar\
  \ results are found for heat exposure in Indian factories, where temperature reductions\
  \ improved output but were only implemented to save energy, not to boost productivity.[167]\
  \ These findings show that misperceptions about environmental effects on work performance\
  \ can lead to suboptimal decisions by both workers and firms.\n\n\nWage-setting\
  \ also reflects behavioral elements. In informal labor markets, wage rigidity persists\
  \ despite the absence of formal institutions like unions. In Indian agriculture,\
  \ wages rise with positive productivity shocks but are rarely reduced when shocks\
  \ are negative, due to fairness concerns and social norms.[168] Similarly, low-wage\
  \ offers are accepted more often when made privately rather than publicly, as workers\
  \ face social pressure to reject “unfair” wages in public settings.[169] Furthermore,\
  \ even small wage differences within work teams can reduce attendance and productivity,\
  \ not only among lower-paid workers but also among those paid more, indicating that\
  \ inequality itself demotivates workers through social comparison.[170]\n\n\nBehavioral\
  \ constraints are also relevant for female labor-force participation (FLFP), which\
  \ remains low in many developing countries. Psychological factors such as low self-efficacy\
  \ and misperceptions about social norms contribute to this. In India, an intervention\
  \ to raise self-efficacy significantly increased women's employment,[171] while\
  \ in Saudi Arabia, correcting men's beliefs about their peers' support for women\
  \ working outside the home led to greater spousal support for job-seeking.[172]\
  \ These findings show how behavioral interventions can shift labor supply decisions,\
  \ particularly for marginalized groups.\n"
