content: "A cognitive bias is a systematic pattern of deviation from norm or rationality\
  \ in judgment.[1][2] Individuals create their own \"subjective reality\" from their\
  \ perception of the input. An individual's construction of reality, not the objective\
  \ input, may dictate their behavior in the world. Thus, cognitive biases may sometimes\
  \ lead to perceptual distortion, inaccurate judgment, illogical interpretation,\
  \ and irrationality.[3][4][5]\n\n\nWhile cognitive biases may initially appear to\
  \ be negative, some are adaptive. They may lead to more effective actions in a given\
  \ context.[6] Furthermore, allowing cognitive biases enables faster decisions which\
  \ can be desirable when timeliness is more valuable than accuracy, as illustrated\
  \ in heuristics.[7] Other cognitive biases are a \"by-product\" of human processing\
  \ limitations,[1] resulting from a lack of appropriate mental mechanisms (bounded\
  \ rationality), the impact of an individual's constitution and biological state\
  \ (see embodied cognition), or simply from a limited capacity for information processing.[8][9]\
  \ Cognitive biases can make individuals more inclined to endorsing pseudoscientific\
  \ beliefs by requiring less evidence for claims that confirm their preconceptions.\
  \ This can potentially distort their perceptions and lead to inaccurate judgments.[10]\n\
  \n\nA continually evolving list of cognitive biases has been identified over the\
  \ last six decades of research on human judgment and decision-making in cognitive\
  \ science, social psychology, and behavioral economics. The study of cognitive biases\
  \ has practical implications for areas including clinical judgment, entrepreneurship,\
  \ finance, and management.[11][12]\n\n\nWhen making judgments under uncertainty,\
  \ people rely on mental shortcuts or heuristics, which provide swift estimates about\
  \ the possibility of uncertain occurrences. For example, \nthe representativeness\
  \ heuristic is defined as the tendency to judge the frequency or likelihood of an\
  \ occurrence by the extent of which the event resembles the typical case.[13] Similarly\
  \ the availability heuristic is that individuals estimate the likelihood of events\
  \ by how easy they are to recall, and the anchoring heuristic prefers the initial\
  \ reference points that are recalled.[14] While these heuristics are efficient and\
  \ simple for the brain to compute, they sometimes introduce predictable and systematic\
  \ cognitive errors, or biases.[7]\n\n\nThe \"Linda Problem\" illustrates the representativeness\
  \ heuristic and corresponding bias. Participants were given a description of \"\
  Linda\" that suggests Linda might well be a feminist (e.g., she is said to be concerned\
  \ about discrimination and social justice issues). They were then asked whether\
  \ they thought Linda was more likely to be (a) a \"bank teller\" or (b) a \"bank\
  \ teller and active in the feminist movement.\" A majority chose answer (b). Independent\
  \ of the information given about Linda, though, the more restrictive answer (b)\
  \ is under any circumstance statistically less likely than answer (a). This is an\
  \ example of the conjunction fallacy: respondents chose (b) because it seemed more\
  \ \"representative\" or typical of persons who might fit the description of Linda.[15]\
  \ The representativeness heuristic may lead to errors such as activating stereotypes\
  \ and inaccurate judgments of others.[16]\n\n\nGerd Gigerenzer argues that heuristics\
  \ should not lead us to conceive of human thinking as riddled with irrational cognitive\
  \ biases. They should rather conceive rationality as an adaptive tool, not identical\
  \ to the rules of formal logic or the probability calculus.[17]  Gigerenzer believes\
  \ that cognitive biases are not biases, but rules of thumb, or as he would put it\
  \ \"gut feelings\" that can actually help us make accurate decisions in our lives.\
  \ There is not clear evidence that these behaviors are genuinely, severely biased\
  \ once the actual problems people face are understood. Advances in economics and\
  \ cognitive neuroscience now suggest that many behaviors previously labeled as biases\
  \ might instead represent optimal decision-making strategies.[18]\n\n\nThe notion\
  \ of cognitive biases was introduced by Amos Tversky and Daniel Kahneman in 1972[22]\
  \ and grew out of their experience of people's innumeracy, or inability to reason\
  \ intuitively with the greater orders of magnitude. Tversky, Kahneman, and colleagues\
  \ demonstrated several replicable ways in which human judgments and decisions differ\
  \ from rational choice theory. Their 1974 paper, Judgment under Uncertainty: Heuristics\
  \ and Biases, outlined how people rely on mental shortcuts when making judgments\
  \ under uncertainty.[14] Experiments such as the \"Linda problem\" grew into heuristics\
  \ and biases research programs, which spread beyond academic psychology into other\
  \ disciplines including medicine and political science.\n\n\nThe list of cognitive\
  \ biases has long been a topic of critique. In psychology a \"rationality war\"\
  \ unfolded between Gerd Gigerenzer and the Kahneman and Tversky school,[23] which\
  \ pivoted on whether biases are primarily defects of human cognition or the result\
  \ of behavioural patterns that are actually adaptive or \"ecologically rational\"\
  .[24] Gerd Gigerenzer has historically been one of the main opponents to cognitive\
  \ biases and heuristics.[25][26][27] This debate has recently reignited, with critiques\
  \ arguing there has been an overemphasis on biases in human cognition.[18]\n\n\n\
  Koster, Fox & MacLeod (2009) introduced the concept of cognitive bias modification,\
  \ which focuses on reducing maladaptive cognitive patterns through computer-based\
  \ attention training and behavioral tasks.[28]\n\n\nBiases can be distinguished\
  \ on a number of dimensions. Examples of cognitive biases include -\n\n\nOther biases\
  \ are due to the particular way the brain perceives, forms memories and makes judgments.\
  \ This distinction is sometimes described as \"hot cognition\" versus \"cold cognition\"\
  , as motivated reasoning can involve a state of arousal. Among the \"cold\" biases,\n\
  \n\nAs some biases reflect motivation specifically the motivation to have positive\
  \ attitudes to oneself.[31] It accounts for the fact that many biases are self-motivated\
  \ or self-directed (e.g., illusion of asymmetric insight, self-serving bias). There\
  \ are also biases in how subjects evaluate in-groups or out-groups; evaluating in-groups\
  \ as more diverse and \"better\" in many respects, even when those groups are arbitrarily\
  \ defined (ingroup bias, outgroup homogeneity bias).\n\n\nSome cognitive biases\
  \ belong to the subgroup of attentional biases, which refers to paying increased\
  \ attention to certain stimuli. It has been shown, for example, that people addicted\
  \ to alcohol and other drugs pay more attention to drug-related stimuli. Common\
  \ psychological tests to measure those biases are the Stroop task[32][33] and the\
  \ dot probe task.\n\n\nIndividuals' susceptibility to some types of cognitive biases\
  \ can be measured by the Cognitive Reflection Test (CRT) developed by Shane Frederick\
  \ (2005).[34][35]\n\n\nThe following is a list of the more commonly studied cognitive\
  \ biases:\n\n\nMany social institutions rely on individuals to make rational judgments.\
  \ Across management, finance, medicine, and law, the most recurrent bias is overconfidence,\
  \ though anchoring and framing also play substantial roles. While research in finance\
  \ often uses large-scale data, studies in medicine and law frequently rely on vignette-based\
  \ designs. Berthet highlights the lack of ecological validity in many studies and\
  \ the need for deeper exploration of individual differences in susceptibility to\
  \ bias.[47] The securities regulation regime largely assumes that all investors\
  \ act as perfectly rational persons. In truth, actual investors face cognitive limitations\
  \ from biases, heuristics, and framing effects. In some academic disciplines, the\
  \ study of bias is very popular. For instance, bias is a wide spread and well studied\
  \ phenomenon because most decisions that concern the minds and hearts of entrepreneurs\
  \ are computationally intractable.[12]\n\n\nIn law enforcement and legal decision-making,\
  \ confirmation bias and related errors frequently influence investigative decisions\
  \ and evidence evaluation. Structured intervention strategies, such as accountability\
  \ measures and checklists, show some promise in reducing bias during case evaluations.[48]\
  \ A fair jury trial, for example, requires that the jury ignore irrelevant features\
  \ of the case, weigh the relevant features appropriately, consider different possibilities\
  \ open-mindedly and resist fallacies such as appeal to emotion. The various biases\
  \ demonstrated in these psychological experiments suggest that people will frequently\
  \ fail to do all these things.[49] However, they fail to do so in systematic, directional\
  \ ways that are predictable.[5]\n\n\nCognitive biases can create other issues that\
  \ arise in everyday life. Study participants who ate more unhealthy snack food tended\
  \ to have less inhibitory control and more reliance on approach bias.[50] Cognitive\
  \ biases could be linked to various eating disorders and how people view their bodies\
  \ and their body image.[51][52]\n\n\nCognitive biases can be used in destructive\
  \ ways.[53] Some believe that there are people in authority who use cognitive biases\
  \ and heuristics in order to manipulate others so that they can reach their end\
  \ goals. Some medications and other health care treatments rely on cognitive biases\
  \ in order to persuade others who are susceptible to cognitive biases to use their\
  \ products. Many see this as taking advantage of one's natural struggle of judgement\
  \ and decision-making. They also believe that it is the government's responsibility\
  \ to regulate these misleading ads.\n\n\nCognitive biases also seem to play a role\
  \ in property sale price and value. Participants in the experiment were shown a\
  \ residential property.[54] Afterwards, they were shown another property that was\
  \ completely unrelated to the first property. They were asked to say what they believed\
  \ the value and the sale price of the second property would be. They found that\
  \ showing the participants an unrelated property did have an effect on how they\
  \ valued the second property.\n\n\nCognitive biases can be used in non-destructive\
  \ ways. In team science and collective problem-solving, the superiority bias can\
  \ be beneficial. It leads to a diversity of solutions within a group, especially\
  \ in complex problems, by preventing premature consensus on suboptimal solutions.\
  \ This example demonstrates how a cognitive bias, typically seen as a hindrance,\
  \ can enhance collective decision-making by encouraging a wider exploration of possibilities.[55]\n\
  \n\nCognitive biases are interlinked with collective illusions, a phenomenon where\
  \ a group of people mistakenly believe that their views and preferences are shared\
  \ by the majority, when in reality, they are not. These illusions often arise from\
  \ various cognitive biases that misrepresent our perception of social norms and\
  \ influence how we assess the beliefs of others.[56]\n\n\nCognitive biases also\
  \ influence the spread of misinformation, particularly in digital environments.\
  \ Lazer, Baum, and Grinberg (2018) analyzed over 16,000 false news stories shared\
  \ by millions of Twitter users during the 2016 U.S. election and found that false\
  \ information spread significantly faster than accurate news.[57] This occurs partly\
  \ because misinformation aligns with existing beliefs and triggers emotional reactions,\
  \ both of which are linked to confirmation and availability biases. These findings\
  \ illustrate how cognitive biases can distort public understanding and contribute\
  \ to the rapid dissemination of false narratives.[57]\n\n\nThe content and direction\
  \ of cognitive biases are not \"arbitrary\".[58][59] Debiasing is the reduction\
  \ of biases in judgment and decision-making through incentives, nudges, and training.\
  \ Cognitive bias mitigation and cognitive bias modification are forms of debiasing\
  \ specifically applicable to cognitive biases and their effects. One debiasing technique\
  \ aims to decrease biases by encouraging individuals to use controlled processing\
  \ compared to automatic processing.[36] Because they cause systematic errors, cognitive\
  \ biases cannot be compensated for using a wisdom of the crowd technique of averaging\
  \ answers from several people.[60] Reference class forecasting is a method for systematically\
  \ debiasing estimates and decisions, based on what Daniel Kahneman has dubbed the\
  \ outside view.\n\n\nCognitive bias modification (CBM) refers to the process of\
  \ modifying cognitive biases in healthy people and also refers to a growing area\
  \ of psychological (non-pharmaceutical) therapies for anxiety, depression and addiction\
  \ called cognitive bias modification therapy (CBMT). CBMT is sub-group of therapies\
  \ within a growing area of psychological therapies based on modifying cognitive\
  \ processes with or without accompanying medication and talk therapy, sometimes\
  \ referred to as applied cognitive processing therapies (ACPT). Although cognitive\
  \ bias modification can refer to modifying cognitive processes in healthy individuals,\
  \ CBMT is a growing area of evidence-based psychological therapy, in which cognitive\
  \ processes are modified to relieve suffering[61][62] from serious depression,[63]\
  \ anxiety,[64][28] and addiction.[65] CBMT techniques are technology-assisted therapies\
  \ that are delivered via a computer with or without clinician support. CBM combines\
  \ evidence and theory from the cognitive model of anxiety,[66] cognitive neuroscience,[67]\
  \ and attentional models.[68] Even one-shot training interventions, such as educational\
  \ videos and debiasing games that taught mitigating strategies, significantly reduced\
  \ the commission of several cognitive biases.[69]\n\n\nCognitive bias modification\
  \ has also been used to help those with obsessive-compulsive beliefs and obsessive-compulsive\
  \ disorder.[70][71] This therapy has shown that it decreases the obsessive-compulsive\
  \ beliefs and behaviors.\n\n\nIn relation to reducing the fundamental attribution\
  \ error, monetary incentives and informing participants they will be held accountable\
  \ for their attributions have been linked to the increase of accurate attributions.[72][73]\n\
  \n\nBias arises from various processes that are sometimes difficult to distinguish.\
  \ These include:\n\n\nPeople do appear to have stable individual differences in\
  \ their susceptibility to decision biases such as overconfidence, temporal discounting,\
  \ and bias blind spot.[81] That said, these stable levels of bias within individuals\
  \ are possible to change. Participants in experiments who watched training videos\
  \ and played debiasing games showed medium to large reductions both immediately\
  \ and up to three months later in the extent to which they exhibited susceptibility\
  \ to six cognitive biases: anchoring, bias blind spot, confirmation bias, fundamental\
  \ attribution error, projection bias, and representativeness.[82]\n\n\nIndividual\
  \ differences in cognitive bias have also been linked to varying levels of cognitive\
  \ abilities and functions.[83] The Cognitive Reflection Test (CRT) has been used\
  \ to help understand the connection between cognitive biases and cognitive ability.\
  \ There have been inconclusive results when using the Cognitive Reflection Test\
  \ to understand ability. However, there does seem to be a correlation; those who\
  \ gain a higher score on the Cognitive Reflection Test, have higher cognitive ability\
  \ and rational-thinking skills. This in turn helps predict the performance on cognitive\
  \ bias and heuristic tests. Those with higher CRT scores tend to be able to answer\
  \ more correctly on different heuristic and cognitive bias tests and tasks.[84]\n\
  \n\nAge is another individual difference that has an effect on one's ability to\
  \ be susceptible to cognitive bias. Older individuals tend to be more susceptible\
  \ to cognitive biases and have less cognitive flexibility. However, older individuals\
  \ were able to decrease their susceptibility to cognitive biases throughout ongoing\
  \ trials.[85] These experiments had both young and older adults complete a framing\
  \ task. Younger adults had more cognitive flexibility than older adults. Cognitive\
  \ flexibility is linked to helping overcome pre-existing biases.\n"
