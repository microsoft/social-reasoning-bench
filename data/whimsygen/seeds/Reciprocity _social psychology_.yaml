  The topic of reciprocity in non-human primates has been a field with a lot of research
  contradictions and opposite findings; however, in a recent meta-analysis, the researchers
  concluded that primates have the cognitive and social prerequisites needed to use
  reciprocity.[52] They evaluated previous findings and found that there are more
  positive than negative findings.[52] They added that reciprocity could have been
  misrepresented in some research studies because it also includes acting between
  relatives and trading.[52]



  Researchers also identified that many of the negative findings come from articles
  where researchers did not measure the primate''s understanding of the task or studies
  where the primates did not show an understanding of the activity.[52] Previous researchers
  interpreted  studies that did not display reciprocity as a failure to prove its
  existence in primates, rather than assessing the situations where reciprocity  occurred
  versus the situations where it did not.[52] Different species also take different
  time periods to reciprocate an action which may be short or long-term.[52] Some
  specific behaviors also seem less likely to be reciprocated.[52] For example, it
  is less likely for a non-human primate to reciprocate food donations.[52]



  Overall, the researchers concluded that non-human primate reciprocity is more common
  than it has previously been regarded and that negative findings should not be thrown
  out but instead embraced to foster  a better comprehension of their use of reciprocity.[52]
  News sources also support these findings suggesting that other primates use reciprocity
  in food sharing and other domains; and some of them, like chimpanzees, are more
  likely to do so if the other chimpanzee had also helped them in the past, which
  also supports the connection between trust and reciprocity in non-human primates.[53]

