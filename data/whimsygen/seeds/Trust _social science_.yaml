content: "Trust is the belief that another person will do what is expected and is\
  \ built through repeated consistency. It brings with it a willingness for one party\
  \ (the trustor) to become vulnerable to another party (the trustee), on the presumption\
  \ that the trustee will act in ways that benefit the trustor.[1][2][3] In addition,\
  \ the trustor does not have control over the actions of the trustee; however, those\
  \ actions influence the trustor's positive, neutral, or negative evaluations regarding\
  \ the trustworthiness of the trustee.[1] Scholars distinguish between generalized\
  \ trust (also known as social trust), which is the extension of trust to a relatively\
  \ large circle of unfamiliar others, and particularized trust, which is contingent\
  \ on a specific situation or a specific relationship.[1]\n\n\nAs the outcome of\
  \ trust is uncertain and depends on what one chooses to believe, the trustor can\
  \ only evaluate and develop expectations based on the trustee’s actions. Such expectations\
  \ are formed with a view to the motivations of the trustee, dependent on their characteristics,\
  \ the situation, and their interaction.[4][page needed] The trustor’s risk perception\
  \ of failure or harm to themselves stems from the uncertainty of the trustee’s behavior.\n\
  \n\nIn the social sciences, the subtleties of trust are a subject of ongoing research.\
  \ In sociology and psychology, the degree to which one party trusts another is a\
  \ measure of belief in the honesty, fairness, or benevolence of another party. The\
  \ term \"confidence\" is more appropriate for a belief in the competence of the\
  \ other party.[5][6][citation needed] A failure in trust may be forgiven more easily\
  \ if it is interpreted as a failure of competence rather than a lack of benevolence\
  \ or honesty.[7][page needed] In economics, trust is often conceptualized as reliability\
  \ in transactions. In all cases, trust is a heuristic decision rule, allowing a\
  \ person to deal with complexities that would require unrealistic effort in rational\
  \ reasoning.[8]\n\n\nTypes of trust identified in academic literature include contractual\
  \ trust, competence trust and goodwill trust. American lawyer Charles Fried speaks\
  \ of \"contractual trust\" as a \"humdrum\" experience based on the voluntary acceptance\
  \ of contractual obligations: for example, people keep appointments and undertake\
  \ commercial transactions.[9] \"Competence trust\" can be defined as \"a belief\
  \ in the other's ability to do the job or complete a task\"; this term is applied,\
  \ for example, in relation to cultural competence in healthcare.[10] In working\
  \ relationships, \"goodwill trust\" has been described as \"trust regarding the\
  \ benevolence and integrity of [a] counterpart\".[11]\nFour types of social trust\
  \ are recognized:[12]\n\n\nSociology claims trust is one of several social constructs;\
  \ an element of the social reality.[15] Other constructs frequently discussed together\
  \ with trust include control, confidence, risk, meaning and power. Trust is attributable\
  \ to relationships between social actors, both individuals and groups (social systems).\
  \ Sociology is concerned with the position and role of trust in social systems.\
  \ Interest in trust has grown significantly since the early 1980s, from the early\
  \ works of Luhmann,[16] Barber,[17] and Giddens[18] (see Sztompka[19] for a more\
  \ detailed overview). This growth of interest in trust has been stimulated by ongoing\
  \ changes in society, known as late modernity and post-modernity.\n\n\nSviatoslav\
  \ contended that society needs trust because it increasingly finds itself operating\
  \ at the edge between confidence in what is known from everyday experience and contingency\
  \ of new possibilities. Without trust, one should always consider all contingent\
  \ possibilities, leading to paralysis by analysis.[20] Trust acts as a decisional\
  \ heuristic, allowing the decision-maker to overcome bounded rationality[21] and\
  \ process what would otherwise be an excessively complex situation. Trust can be\
  \ seen as a bet on one of many contingent futures, specifically, the one that appears\
  \ to deliver the greatest benefits. Once the bet is decided (i.e. trust is granted),\
  \ the trustor suspends his or her disbelief, and the possibility of a negative course\
  \ of action is not considered at all. Hence trust acts as a reducing agent of social\
  \ complexity, allowing for cooperation.[22]\n\n\nSociology tends to focus on two\
  \ distinct views: the macro view of social systems, and a micro view of individual\
  \ social actors (where it borders with social psychology). Views on trust follow\
  \ this dichotomy. On one side, the systemic role of trust can be discussed with\
  \ a certain disregard to the psychological complexity underpinning individual trust.\
  \ The behavioral approach to trust is usually assumed[23][page needed] while actions\
  \ of social actors are measurable, allowing for statistical modelling of trust.\
  \ This systemic approach can be contrasted[24] with studies on social actors and\
  \ their decision-making process, in anticipation that understanding of such a process\
  \ will explain (and allow to model) the emergence of trust.\n\n\nSociology acknowledges\
  \ that the contingency of the future creates a dependency between social actors\
  \ and, specifically, that the trustor becomes dependent on the trustee. Trust is\
  \ seen as one of the possible methods to resolve such a dependency, being an attractive\
  \ alternative to control.[25] Trust is valuable if the trustee is much more powerful\
  \ than the trustor, yet the trustor is under social obligation to support the trustee.[26]\n\
  \n\nModern information technologies have not only facilitated the transition to\
  \ a post-modern society but have also challenged traditional views on trust. Information\
  \ systems research has identified that people have come to trust in technology via\
  \ two primary constructs: The first consists of human-like constructs, including\
  \ benevolence, honesty, and competence, whilst the second employs system-like constructs,\
  \ such as usefulness, reliability, and functionality.[27] The discussion surrounding\
  \ the relationship between information technologies and trust is still in progress\
  \ as research remains in its infant stages.[may be outdated as of August 2023]\n\
  \n\nA low-trust society is defined as one in which interpersonal trust is relatively\
  \ low, and shared ethical values are lacking.[28] Conversely, a high-trust society\
  \ is one where interpersonal trust is relatively high, and where ethical values\
  \ are strongly shared.\n\n\nSeveral dozen studies have examined the impact of ethnic\
  \ diversity on social trust. Research published in the Annual Review of Political\
  \ Science[12] concluded that there were three key debates on the subject:\n\n\n\
  The review's meta-analysis of 87 studies showed a consistent, though modest, negative\
  \ relationship between ethnic diversity and social trust. Ethnic diversity has the\
  \ strongest negative impact on neighbor trust, in-group trust, and generalized trust.\
  \ It did not appear to have a significant impact on out-group trust. The authors\
  \ present a warning about the modest size of the effect, stating, \"However, the\
  \ rather modest size of the [overall negative relationship] implies that apocalyptic\
  \ claims regarding the severe threat of ethnic diversity for social trust in contemporary\
  \ societies are exaggerated.\"[12]\n\n\nIn psychology, trust is believing that the\
  \ trusted person will do what is expected. According to the psychoanalyst Erik Erikson,\
  \ development of basic trust is the first state of psychosocial development occurring,\
  \ or failing, during the first two years of life. Success results in feelings of\
  \ security and optimism, while failure leads towards an orientation of insecurity\
  \ and mistrust[29] possibly resulting in attachment disorders.[30] A person's dispositional\
  \ tendency to trust others can be considered a personality trait and as such is\
  \ one of the strongest predictors of subjective well-being.[31] Trust increases\
  \ subjective well-being because it enhances the quality of one's interpersonal relationships;\
  \ happy people are skilled at fostering good relationships.[32]\n\n\nTrust is integral\
  \ to the idea of social influence: it is easier to influence or persuade someone\
  \ who is trusting. The notion of trust is increasingly adopted to predict acceptance\
  \ of behaviors by others, institutions (e.g. government agencies), and objects such\
  \ as machines. Yet once again, perceptions of honesty, competence and value similarity[33]\
  \ (slightly similar to benevolence) are essential.[clarification needed]\n\n\nThere\
  \ are three forms of trust commonly studied in psychology:\n\n\nThese three factors\
  \ can counteract each other. Sometimes, trust can be reduced by being more transparent\
  \ about failed expectation, which increases trustworthiness but may reduce trust.[36]\n\
  \n\nOnce trust is lost by violation of some combination of these three determinants,\
  \ it is very hard to regain. There is asymmetry in the building versus destruction\
  \ of trust. \n\n\nResearch has been conducted into the social implications of trust,\
  \ for instance:\n\n\nDespite the centrality of trust to the positive functioning\
  \ of people and relationships, very little is known about how and why trust evolves,\
  \ is maintained, and is destroyed.[44]\n\n\nOne factor that enhances trust among\
  \ people is facial resemblance. Experimenters who digitally manipulated facial resemblance\
  \ in a two-person sequential trust game found evidence that people have more trust\
  \ in a partner who has similar facial features.[45] Facial resemblance also decreased\
  \ sexual desire for a partner. In a series of tests, digitally manipulated faces\
  \ were presented to subjects who evaluated them for attractiveness within a long-term\
  \ or short-term relationship. The results showed that within the context of a short-term\
  \ relationship dependent on sexual desire, similar facial features caused a decrease\
  \ in desire. Within the context of a long-term relationship, which is dependent\
  \ on trust, similar facial features increased a person's attractiveness. This suggests\
  \ that facial resemblance and trust have great effects on relationships.[46]\n\n\
  \nInterpersonal trust literature[44] investigates \"trust-diagnostic situations\"\
  : situations that test partners' abilities to act in the best interests of the other\
  \ person or the relationship while rejecting a conflicting option which is merely\
  \ in their self-interest.[47] Trust-diagnostic situations occur throughout everyday\
  \ life, though they can also be deliberately engineered by people who want to test\
  \ the current level of trust in a relationship.[44]\n\n\nA low-trust relationship\
  \ is one in which a person has little confidence their partner is truly concerned\
  \ about them or the relationship.[48] People in low trust relationships tend to\
  \ make distress-maintaining attributions[jargon][49] whereby they place their greatest\
  \ focus on the consequences of their partner's negative behavior, and any impacts\
  \ of positive actions are minimized. This feeds into the overarching notion that\
  \ the person's partner is uninterested in the relationship, and any positive acts\
  \ on their part are met with skepticism, leading to further negative outcomes.[48]\n\
  \n\nDistrusting people may miss opportunities for trusting relationships. Someone\
  \ subject to an abusive childhood may have been deprived of any evidence that trust\
  \ is warranted in future relationships.[4][page needed] An important key to treating\
  \ sexual victimization of a child is the rebuilding of trust between parent and\
  \ child. Failure by adults to validate that sexual abuse occurred contributes to\
  \ the child's difficulty in trusting self and others.[50] A child's trust can also\
  \ be affected by the erosion of the marriage of their parents.[51] Children of divorce\
  \ do not exhibit less trust in mothers, partners, spouses, friends, and associates\
  \ than their peers of intact families. The impact of parental divorce is limited\
  \ to trust in the father.[52]\n\n\nPeople may trust non-human agents. For instance,\
  \ people may trust animals,[53] the scientific process,[54] and social machines[clarification\
  \ needed]. Trust helps create a social contract that allows humans and domestic\
  \ animals to live together.[55]  Trust in the scientific process is associated with\
  \ increased trust in innovations such as biotechnology.[54] When it comes to trust\
  \ in social machines, people are more willing to trust intelligent machines with\
  \ humanoid morphologies[56] and female cues,[57] when they are focused on tasks\
  \ (versus socialization),[58] and when they behave morally well.[59][58] More generally,\
  \ they may be trusted as a function of the \"machine heuristic\"—a mental shortcut\
  \ with which people assume that machines are less biased, more accurate, and more\
  \ reliable than people[60]—such that people may sometimes trust a robot more than\
  \ a person.[61]\n\n\nPeople are disposed to trust and to judge the trustworthiness\
  \ of other people or groups—for instance, in developing relationships with potential\
  \ mentors. One example would be as part of interprofessional work in the referral\
  \ pathway from an emergency department to a hospital ward.[62] Another would be\
  \ building knowledge on whether new practices, people, and things introduced into\
  \ our lives are indeed accountable or worthy of investing confidence and trust in.\
  \ This process is captured by the empirically grounded construct of \"Relational\
  \ Integration\" within Normalization Process Theory.[63] This can be traced in neuroscience\
  \ terms to the neurobiological structure and activity of a human brain.[citation\
  \ needed] Some studies indicate that trust can be altered by the application of\
  \ oxytocin.[64]\n\n\nThe social identity approach explains a person's trust in strangers\
  \ as a function of their group-based stereotypes or in-group favoring behaviors\
  \ which they base on salient group memberships. With regard to ingroup favoritism,\
  \ people generally think well of strangers but expect better treatment from in-group\
  \ members in comparison to out-group members. This greater expectation translates\
  \ into a propensity to trust a member of the in-group more than a member of the\
  \ out-group.[41][43][65] It is only advantageous for one to form such expectations\
  \ of an in-group stranger if the stranger also knows one's own group membership.[65]\n\
  \n\nThe social identity approach has been empirically investigated. Researchers\
  \ have employed allocator studies[jargon] to understand group-based trust in strangers.[41][42][65][66]\
  \ They[ambiguous] may be operationalized[specify] as unilateral or bilateral relationships\
  \ of exchange. General social categories such as university affiliation, course\
  \ majors, and even ad-hoc groups have been used to distinguish between in-group\
  \ and out-group members. In unilateral studies of trust, the participant is asked\
  \ to choose between envelopes containing money that an in-group or out-group member\
  \ previously allocated.[65] Participants have no prior or future opportunities for\
  \ interaction, thereby testing Brewer's notion that group membership is sufficient\
  \ to bring about group-based trust and hence cooperation.[67] Participants could\
  \ expect an amount ranging from nothing to the maximum value an allocator could\
  \ give out. Bilateral studies of trust have employed an investment game devised\
  \ by Berg and colleagues in which people choose to give a portion or none of their\
  \ money to another.[68] Any amount given would be tripled and the receiver would\
  \ then decide whether they would return the favor by giving money back to the sender.\
  \ This was meant to test trusting behavior on the sender's part and the receiver's\
  \ eventual trustworthiness.[43][65]\n\n\nEmpirical research demonstrates that when\
  \ group membership is salient to both parties, trust is granted more readily to\
  \ in-group members than out-group members.[42][65][66] This occurs even when the\
  \ in-group's stereotype was comparatively less positive than the out-group's (e.g.\
  \ psychology versus nursing majors)[clarification needed],[42] in the absence of\
  \ personal identity cues[clarification needed],[43] and when participants had the\
  \ option of a sure sum of money (i.e. in essence opting out of the need to trust\
  \ a stranger to gain some monetary reward).[41] When only the recipient[clarification\
  \ needed] was made aware of group membership, trust[specify] becomes reliant upon\
  \ group stereotypes.[42][43] The group with the more positive stereotype was trusted\
  \ (e.g. one's university affiliation over another's)[43] even over that of the in-group\
  \ (e.g. nursing over psychology majors).[42]\n\n\nAnother explanation for in-group-favoring\
  \ behaviors could be the need to maintain in-group positive distinctiveness, particularly\
  \ in the presence of social identity threat.[66] Trust in out-group strangers increased\
  \ when personal cues to identity[specify] were revealed[specify].[43]\n\n\nMany\
  \ philosophers have written about different forms of trust. Most agree that interpersonal\
  \ trust is the foundation on which these forms can be modeled.[69] For an act to\
  \ be an expression of trust, it must not betray the expectations of the trustee.\
  \ Some philosophers, such as Lagerspetz, argue that trust is a kind of reliance,\
  \ though not merely reliance.[70] Gambetta argued that trust is the inherent belief\
  \ that others generally have good intentions, which is the foundation for our reliance\
  \ on them.[71] Philosophers such as Annette Baier challenged this view, asserting\
  \ a difference between trust and reliance by saying that trust can be betrayed,\
  \ whereas reliance can only be disappointed.[72] Carolyn McLeod explains Baier's\
  \ argument with the following examples: we can rely on our clock to give the time,\
  \ but we do not feel betrayed when it breaks, thus, we cannot say that we trusted\
  \ it; we are not trusting when we are suspicious of another person, because this\
  \ is in fact an expression of distrust.[clarification needed][69] The violation\
  \ of trust warrants this sense of betrayal.[clarification needed][73] Thus, trust\
  \ is different from reliance in the sense that a trustor accepts the risk of being\
  \ betrayed.\n\n\nKaren Jones proposed an emotional aspect to trust—optimism[74]\
  \ that the trustee will do the right thing by the trustor, which is also described\
  \ as \"affective trust\".[75] People sometimes trust others even without this optimistic\
  \ expectation, instead hoping that by extending trust this will prompt trustworthy\
  \ behavior in the trustee. This is known as \"therapeutic trust\"[76] and gives\
  \ both the trustee a reason to be trustworthy, and the trustor a reason to believe\
  \ they are trustworthy.\n\n\nThe definition of trust as a belief in something or\
  \ a confident expectation about something[77] eliminates the notion of risk because\
  \ it does not include whether the expectation or belief is favorable or unfavorable.\
  \ For example, to expect a friend to arrive to dinner late because she has habitually\
  \ arrived late for the last fifteen years is a confident expectation (whether or\
  \ not we find her late arrivals to be annoying). The trust is not about what we\
  \ wish for, but rather it is in the consistency of the data. As a result, there\
  \ is no risk or sense of betrayal because the data exists as collective knowledge.\
  \ Faulkner contrasts such \"predictive trust\" with the aforementioned affective\
  \ trust, proposing that predictive trust may only warrant disappointment as a consequence\
  \ of an inaccurate prediction, not a sense of betrayal.[75]\n\n\nTrust in economics\
  \ explains the difference between actual human behavior and behavior that could\
  \ be explained by people's desire to maximize utility. In economic terms, trust\
  \ can explain a difference between Nash equilibrium and the observed equilibrium.\
  \ Such an approach can be applied to individual people as well as to societies.\n\
  \n\nTrust is important to economists for many reasons. Taking the \"Market for Lemons\"\
  \ transaction popularized by George Akerlof as an example,[79] if a potential buyer\
  \ of a car does not trust the seller not to sell a lemon, the transaction will not\
  \ take place. The buyer will not buy without trust, even if the product would be\
  \ of great value to the buyer. Trust can act as an economic lubricant, reducing\
  \ the cost of transactions between parties, enabling new forms of cooperation, and\
  \ generally furthering business activities,[80] employment, and prosperity. This\
  \ observation prompted interest in trust as a form of social capital and research\
  \ into the process of creation and distribution of such capital.[81] A higher level\
  \ of social trust may be positively correlated with economic development: Even though\
  \ the original concept of \"high trust\" and \"low trust\" societies may not necessarily\
  \ hold, social trust benefits the economy[82] and a low level of trust inhibits\
  \ economic growth. The absence of trust restricts growth in employment, wages, and\
  \ profits, thus reducing the overall welfare of society.[83] The World Economic\
  \ Forums of 2022 and 2024 both adopted the rebuilding of trust as their themes.[84]\n\
  \n\nTheoretical economical modelling demonstrates that the optimum level of trust\
  \ that a rational economic agent should exhibit in transactions is equal to the\
  \ trustworthiness of the other party.[85] Such a level of trust leads to an efficient\
  \ market. Trusting less leads to losing economic opportunities, while trusting more\
  \ leads to unnecessary vulnerabilities and potential exploitation. Economics is\
  \ also interested in quantifying trust, usually in monetary terms. The level of\
  \ correlation between an increase in profit margin and a decrease in transactional\
  \ costs can be used as an indicator of the economic value of trust.[86]\n\n\nEconomic\
  \ \"trust games\" empirically quantify trust in relationships under laboratory conditions.\
  \ Several games and game-like scenarios related to trust have been tried, with certain\
  \ preferences to[clarification needed] those that allow the estimation[specify]\
  \ of confidence in monetary terms.[87] In games of trust the Nash equilibrium differs\
  \ from Pareto optimum so that no player alone can maximize their own utility by\
  \ altering their selfish strategy without cooperation. Cooperating partners can\
  \ also benefit. The classical version of the game of trust has been described as\
  \ an abstract investment game, using the scenario of an investor and a broker.[88]\
  \ The investor can invest some fraction of his money, and the broker can return\
  \ to the investor some fraction of the investor's gains. If both players follow\
  \ their naive economic best interest, the investor should never invest, and the\
  \ broker will never be able to repay anything. Thus the flow of money, its volume,\
  \ and its character[clarification needed] is attributable entirely to the existence\
  \ of trust. Such a game can be played as a once-off, or repeatedly with the same\
  \ or different sets of players to distinguish between a general propensity to trust\
  \ and trust within particular relationships. Several variants of this game exist.\
  \ Reversing rules leads to the game of distrust, pre-declarations can be used to\
  \ establish intentions of players,[89] while alterations to the distribution of\
  \ gains can be used to manipulate the perceptions of both players. The game can\
  \ be played by several players on the closed market,[jargon] with or without information\
  \ about reputation.[90]\n\n\nOther interesting games include binary-choice trust\
  \ games[91] and the gift-exchange game.[92] Games based on the Prisoner's Dilemma\
  \ link trust with economic utility and demonstrate the rationality behind reciprocity.[93]\n\
  \n\nThe popularization of e-commerce led to new challenges related to trust within\
  \ the digital economy and the desire to understand buyers' and sellers' decisions\
  \ to trust one another.[94] For example, interpersonal relationships between buyers\
  \ and sellers have been disintermediated by the technology,[95] and consequentially\
  \ they required improvement.[96] Websites can influence the buyer to trust the seller,\
  \ regardless of the seller's actual trustworthiness.[97] Reputation-based systems\
  \ can improve trust assessment by capturing a collective perception of trustworthiness;\
  \ this has generated interest in various models of reputation.[98]\n\n\nIn management\
  \ and organization science, trust is studied as a factor which organizational actors\
  \ can manage and influence. Scholars have researched how trust develops across individual\
  \ and organizational levels of analysis.[99] They suggest a reciprocal process in\
  \ which organizational structures influence people's trust and, at the same time,\
  \ people's trust manifests in organizational structures. Trust, sometimes referred\
  \ to as trust capital, is also one of the conditions of an organizational culture\
  \ that supports knowledge sharing.[100] An organizational culture that supports\
  \ knowledge sharing allows employees to feel secure and comfortable to share their\
  \ knowledge, their work, and their expertise.[100][101] Structure often creates\
  \ trust in a person, and this encourages them to feel comfortable and excel in the\
  \ workplace; it makes an otherwise stressful environment manageable.\n\n\nManagement\
  \ and organization science scholars have also studied how trust is influenced by\
  \ contracts and how trust interacts with formal mechanisms.[102] Scholars in management\
  \ and related disciplines have also made a case for the importance of distrust as\
  \ a related but distinct construct.[103] Similarly scholars have assessed the relationship\
  \ between monitoring and trust, for example in a trust game context,[104] and in\
  \ shareholder-management relations.[105]\n\n\nSince the mid-1990s, organizational\
  \ research has followed two distinct but nonexclusive paradigms of trust research:[106]\n\
  \n\nTogether, these paradigms predict how different dimensions of trust form in\
  \ organizations by demonstrating various trustworthiness attributes.[106]\n\n\n\
  Beyond interpersonal trust among leaders, system trust, a background confidence\
  \ in the international order rooted in the idea of states acting as coherent state\
  \ persons, underpins diplomacy and diplomatic stability.[108] In systems, a trusted\
  \ component has a set of properties that another component can rely on. If A trusts\
  \ B, a violation in B's properties might compromise A's correct operation. Observe\
  \ that those properties of B trusted by A might not correspond quantitatively or\
  \ qualitatively to B's actual properties. This occurs when the designer of the overall\
  \ system does not consider the relation. Consequently, trust should be placed to\
  \ the extent of the component's trustworthiness. The trustworthiness of a component\
  \ is thus, not surprisingly, defined by how well it secures a set of functional\
  \ and non-functional properties, deriving from its architecture, construction, and\
  \ environment, and evaluated as appropriate.[109]\n\n\nTrust in politics is political\
  \ efficacy.[110]\n"
