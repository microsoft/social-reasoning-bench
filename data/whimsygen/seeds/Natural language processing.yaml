content: '



  Natural language processing (NLP) is the processing of natural language information
  by a computer. NLP is a subfield of computer science and is closely associated with
  artificial intelligence. NLP is also related to information retrieval, knowledge
  representation, computational linguistics, and linguistics more broadly.[1]



  Major processing tasks in an NLP system include: speech recognition, text classification,
  natural language understanding, and natural language generation.



  Natural language processing has its roots in the 1950s.[2] Already in 1950, Alan
  Turing published an article titled "Computing Machinery and Intelligence," which
  proposed what is now called the Turing test as a criterion of intelligence, though
  at the time that was not articulated as a problem separate from artificial intelligence.
  The proposed test includes a task that involves the automated interpretation and
  generation of natural language.



  The premise of symbolic NLP is often illustrated using John Searle''s Chinese room
  thought experiment: Given a collection of rules (e.g., a Chinese phrasebook, with
  questions and matching answers), the computer emulates natural language understanding
  (or other NLP tasks) by applying those rules to the data it confronts.



  Up until the 1980s, most natural language processing systems were based on complex
  sets of hand-written rules. Starting in the late 1980s, however, there was a revolution
  in natural language processing with the introduction of machine learning algorithms
  for language processing. This shift was influenced by increasing computational power
  (see Moore''s law) and a decline in the dominance of Chomskyan linguistic theories
  (e.g. transformational grammar), whose theoretical underpinnings discouraged the
  sort of corpus linguistics that underlies the machine-learning approach to language
  processing.[9]



  Symbolic approach, i.e., the hand-coding of a set of rules for manipulating symbols,
  coupled with a dictionary lookup, was historically the first approach used both
  by AI in general and by NLP in particular:[19][20] such as by writing grammars or
  devising heuristic rules for stemming.



  Machine learning approaches, which include both statistical and neural networks,
  on the other hand, have many advantages over the symbolic approach:



  Rule-based systems are commonly used:



  In the late 1980s and mid-1990s, the statistical approach ended a period of AI winter,
  which was caused by the inefficiencies of the rule-based approaches.[21][22]



  The earliest decision trees, producing systems of hard if–then rules, were still
  very similar to the old rule-based approaches.

  Only the introduction of hidden Markov models, applied to part-of-speech tagging,
  announced the end of the old rule-based approach.



  A major drawback of statistical methods is that they require elaborate feature engineering.
  Since 2015,[23] neural network–based methods have increasingly replaced traditional
  statistical approaches, using semantic networks[24] and word embeddings to capture
  semantic properties of words.



  Intermediate tasks (e.g., part-of-speech tagging and dependency parsing) are not
  needed anymore.



  Neural machine translation, based on then-newly invented sequence-to-sequence transformations,
  made obsolete the intermediate steps, such as word alignment, previously necessary
  for statistical machine translation.



  The following is a list of some of the most commonly researched tasks in natural
  language processing. Some of these tasks have direct real-world applications, while
  others more commonly serve as subtasks that are used to aid in solving larger tasks.



  Though natural language processing tasks are closely intertwined, they can be subdivided
  into categories for convenience. A coarse division is given below.



  Based on long-standing trends in the field, it is possible to extrapolate future
  directions of NLP. As of 2020, three trends among the topics of the long-standing
  series of CoNLL Shared Tasks can be observed:[49]



  Most higher-level NLP applications involve aspects that emulate intelligent behavior
  and apparent comprehension of natural language. More broadly speaking, the technical
  operationalization of increasingly advanced aspects of cognitive behavior represents
  one of the developmental trajectories of NLP (see trends among CoNLL shared tasks
  above).



  Cognition refers to "the mental action or process of acquiring knowledge and understanding
  through thought, experience, and the senses."[50] Cognitive science is the interdisciplinary,
  scientific study of the mind and its processes.[51] Cognitive linguistics is an
  interdisciplinary branch of linguistics, combining knowledge and research from both
  psychology and linguistics.[52] Especially during the age of symbolic NLP, the area
  of computational linguistics maintained strong ties with cognitive studies.



  As an example, George Lakoff offers a methodology to build natural language processing
  (NLP) algorithms through the perspective of cognitive science, along with the findings
  of cognitive linguistics,[53] with two defining aspects:



  Ties with cognitive linguistics are part of the historical heritage of NLP, but
  they have been less frequently addressed since the statistical turn during the 1990s.
  Nevertheless, approaches to develop cognitive models towards technically operationalizable
  frameworks have been pursued in the context of various frameworks, e.g., of cognitive
  grammar,[56] functional grammar,[57] construction grammar,[58] computational psycholinguistics
  and cognitive neuroscience (e.g., ACT-R), however, with limited uptake in mainstream
  NLP (as measured by presence on major conferences[59] of the ACL). More recently,
  ideas of cognitive NLP have been revived as an approach to achieve explainability,
  e.g., under the notion of "cognitive AI".[60] Likewise, ideas of cognitive NLP are
  inherent to neural models multimodal NLP (although rarely made explicit)[61] and
  developments in artificial intelligence, specifically tools and technologies using
  large language model approaches[62] and new directions in artificial general intelligence
  based on the free energy principle[63] by British neuroscientist and theoretician
  at University College London Karl J. Friston.

