  The Joint Comprehensive Plan of Action (JCPOA; Persian: برنامه جامع اقدام مشترک,
  romanized: barnāmeye jāme''e eqdāme moshtarak (برجام, BARJAM)),[5][6] more commonly
  known as the Iran nuclear deal or Iran deal, was an agreement to limit the Iranian
  nuclear program in return for sanctions relief and other provisions. The agreement
  was finalized in Vienna on 14 July 2015, between Iran and the P5+1 (the five permanent
  members of the United Nations Security Council (UNSC)—China, France, Russia, the
  U.K., U.S.—plus Germany)[a] together with the European Union.



  Formal negotiations began with the adoption of the Joint Plan of Action, an interim
  agreement signed between Iran and the P5+1 countries in November 2013. Iran and
  the P5+1 countries engaged in negotiations for the following 20 months and, in April
  2015, agreed on a framework, which later led to JCPOA, along with a Roadmap Agreement
  between Iran and the International Atomic Energy Agency (IAEA).[9]



  Under the JCPOA, Iran agreed to constrain its nuclear program by limiting fuel cycle
  activities that could lead to the production of weapons-grade uranium or plutonium.
  The JCPOA restricted the number and type of centrifuges in operation, the level
  of uranium enrichment, and the size of Iran''s enriched uranium stockpile. Key facilities
  at Fordow, Natanz and Arak were repurposed for civilian uses such as medical and
  industrial research. Iran agreed to accept more intrusive IAEA monitoring measures
  of its fuel-cycle related activities. In exchange for complying with these restrictions,
  Iran received relief from nuclear-related sanctions imposed by the United Nations,
  the EU, and the United States, but many U.S. sanctions unrelated to the nuclear
  issue—targeting Iran''s missile program, support for militant groups, and human
  rights record—remained in place, limiting the economic effect of sanctions relief.
  The agreement also set a timetable to lift the UN arms embargo, contingent on Iran''s
  continued compliance with civilian nuclear commitments.



  The agreement took effect on 20 January 2016.[10] It was criticized and opposed
  by Israel, Saudi Arabia, Iranian principlists, and the Republican Party in the United
  States.[11][12]



  The United States withdrew from the pact in 2018, imposing sanctions under its maximum
  pressure campaign. In a symbolic response, members of Iran''s Islamic Consultative
  Assembly burned the text of JCPOA in the Assembly.[13][14][15] The sanctions applied
  to all countries and companies doing business with Iran and cut it off from the
  international financial system, rendering the nuclear deal''s economic provisions
  null.[16] On 18 October 2025, in the aftermath of the Twelve-Day War, Iran officially
  announced the termination of the agreement after 10 years.[3]



  A fission-based "atomic" nuclear weapon uses a fissile material to cause a nuclear
  chain reaction. The most commonly used materials are uranium 235 (235U) and plutonium
  239 (239Pu). Both uranium 233 (233U) and reactor-grade plutonium have also been
  used.[17][18][19] The amount of uranium or plutonium needed depends on the sophistication
  of the design, with a simple design requiring approximately 15 kg of uranium or
  6 kg of plutonium and a sophisticated design requiring as little as 9 kg of uranium
  or 2 kg of plutonium.[20] Plutonium is almost nonexistent in nature, and natural
  uranium is about 99.3% uranium 238 (238U) and only 0.7% 235U.



  To make a weapon, either uranium must be enriched or plutonium must be produced.
  Uranium enrichment is required for nuclear power, although not to the same purity.
  For this reason, uranium enrichment is a dual-use technology required for both civilian
  and military purposes.[21] Key strategies to prevent proliferation of nuclear arms
  include limiting the number of operating uranium enrichment plants and controlling
  the export of nuclear technology and fissile material.[19][21]



  Iranian development of nuclear technology began in the 1970s, when the U.S. Atoms
  for Peace program began providing assistance. Iran ratified the Treaty on the Non-Proliferation
  of Nuclear Weapons (NPT) in 1970.[22]



  After the 1979 Iranian Revolution, Iran''s nuclear program fell into disarray as
  "much of Iran''s nuclear talent fled the country in the wake of the Revolution".
  The new leader, Ayatollah Ruhollah Khomeini, initially opposed nuclear technology.[22]



  In the late 1980s Iran reinstated its nuclear program, with assistance from China
  (which entered into an agreement with Iran in 1990), Pakistan (which did the same
  in 1992), and Russia (which did the same in 1992 and 1995), and from the A.Q. Khan
  network. Iran began pursuing nuclear capability, including uranium mining and experimenting
  with uranium enrichment.[22]



  In August 2002 the Paris-based Iranian dissident group National Council of Resistance
  of Iran publicly revealed the existence of two undeclared nuclear facilities, the
  Arak heavy-water production facility and the Natanz enrichment facility.[22][23]
  In February 2003, Iranian President Mohammad Khatami acknowledged the existence
  of the facilities and acknowledged that Iran had undertaken "small-scale enrichment
  experiments" to produce low-enriched uranium for power plants.[22] IAEA inspectors
  visited Natanz.[23] In May 2003 Iran allowed IAEA inspectors to visit the Kalaye
  Electric Company, but not to take samples.[23]



  In June 2003, an IAEA report concluded that Iran had failed to meet its obligations
  under the safeguards agreement.[23] Iran, faced with the prospect of a U.N. S.C.
  referral, entered negotiations with France, Germany, and the United Kingdom (the
  E.U. 3).[22][23] The U.S. took no part.[23] In October 2003, Iran and the E.U. 3
  agreed to the Tehran Declaration. Iran agreed to full IAEA cooperation, to sign
  the Additional Protocol, and to temporarily suspend uranium enrichment.[22][23]
  In September and October 2003 the IAEA inspected several facilities.[22] This was
  followed by the Paris Agreement in November 2004, in which Iran agreed to temporarily
  suspend enrichment and conversion activities, including those related to centrifuges,
  and committed to working with the EU-3 to find a diplomatic solution".[22]



  In August 2005, Iranian President Mahmoud Ahmadinejad accused the Iranian negotiators
  of treason.[23][24] Over the following two months, the E.U. 3 agreement fell apart
  as talks over the Long Term Agreement broke down; the Iranian government "felt that
  the proposal was heavy on demands, light on incentives, did not incorporate Iran''s
  proposals, and violated the Paris Agreement".[22][23] Iran notified IAEA that it
  would resume enrichment at Esfahan.[22][23]



  In February 2006, Iran ended its implementation of the Additional Protocol and resumed
  enrichment at Natanz, prompting IAEA to refer Iran to the S.C.[22][23] In April
  2006 Ahmadinejad claimed that Iran had explored nuclear technology for power generation,
  not weapons.[23] In June 2006 the E.U. 3 joined China, Russia, and the U.S., to
  form the P5+1.[23] That July, the S.C. passed its first resolution (nr. 1696), demanding
  Iran stop uranium enrichment and processing.[25][23] S.C. resolution 1737 was adopted
  in December; followed by others.[26] The legal authority for IAEA referral and the
  S.C. resolutions derived from the IAEA Statute and the United Nations Charter.[26]
  The resolutions demanded that Iran cease enrichment activities, and imposed sanctions,
  including bans on the transfer of nuclear and missile technology to the country
  and freezes on the assets of certain Iranian individuals and entities.[22][23]



  In July 2006, Iran opened the Arak heavy water production plant, which led to another
  S.C. resolution.[22]



  Four more S.C. resolutions followed: 1747 (March 2007), 1803 (March 2008), 1835
  (September 2008), and 1929 (June 2010).[26] In Resolution 1803 and elsewhere the
  S.C. acknowledged Iran''s rights under Article IV of the NPT, which provides the
  "inalienable right... to develop research, production and use of nuclear energy
  for peaceful purposes".[26][b]



  In 2007, IAEA director-general Mohamed ElBaradei said that military action against
  Iran "would be catastrophic, counterproductive" and called for negotiations.[32]
  ElBaradei specifically proposed a "double, simultaneous suspension, a time out"
  as a confidence-building measure, under which sanctions and enrichment would be
  suspended.[32]



  A November 2007 U.S. National Intelligence Estimate assessed that Iran had halted
  its nuclear weapons program in 2003; that estimate and U.S. Intelligence Community
  statements assessed that Iran was maintaining its option to develop nuclear weapons".[33]



  In September 2009 U.S. President Barack Obama revealed the existence of an underground
  enrichment facility in Fordow, near Qom.[34] Israel threatened military action.[23]



  In March 2013, the U.S. and Iran began talks in Oman, led by William Burns and Jake
  Sullivan (U.S.) and Ali Asghar Khaji (Iran).[23][35] In June, Hassan Rouhani was
  elected president of Iran.[23][36] In a 2006 negotiation with Europe, Rouhani said
  that Iran had used the negotiations to dupe the Europeans, saying that during the
  negotiations, Iran had mastered the conversion of uranium yellowcake at Isfahan.[37]
  In August, three days after his inauguration, Rouhani called for negotiations with
  the P5+1.[38]



  In September, Obama and Rouhani spoke by telephone, the first high-level contact
  between U.S. and Iranian leaders since 1979, and Secretary of State John Kerry met
  with Foreign Minister Mohammad Javad Zarif.[23][38]



  On 24 November, after several rounds of negotiations, the interim Joint Plan of
  Action was signed between Iran and the P5+1. It consisted of a short-term program
  freeze in exchange for decreased economic sanctions.[39] The IAEA began inspections
  under this interim agreement.[38] The agreement was formally activated on 20 January
  2014.[40] That day, an IAEA report stated that Iran was adhering to the interim
  agreement, including stopping enrichment of uranium to 20%, beginning to dilute
  half of the stockpile of 20% enriched uranium to 3.5%, and halting work on the Arak
  heavy-water reactor.[38][40]



  A major focus of the negotiations was limitations on the Arak IR-40 heavy water
  reactor and production plant (which was under construction, but never became operational).
  Iran agreed in the Joint Plan of Action not to commission or fuel the reactor; the
  Bushehr Nuclear Power Plant; the Gachin uranium mine; the Fordow Uranium Enrichment
  Plant; the Isfahan uranium-conversion plant; the Natanz uranium enrichment plant;
  and the Parchin military research and development complex.[41]



  JCPOA was the culmination of a 20-month negotiation.[42][43] The parties extended
  their talks, first to 24 November 2014[44] and then to 1 July 2015.[45]



  A framework was agreed on 2 April 2015 at Lausanne. Under this framework Iran tentatively
  agreed to accept restrictions, all of which would last a decade or longer, and to
  submit to increased inspections. Negotiations continued, ending in Vienna at the
  Palais Coburg.[10] On 14 July 2015, all parties agreed.[46]



  The agreement reflects the impact of a June 2015 public letter by a bipartisan group
  of U.S. diplomats, experts, and others[47][48] that outlined concerns about various
  provisions and called for strengthening the agreement.[47] After the agreement was
  reached, one of the negotiators, Robert Einhorn, a former U.S. Department of State
  official, said: "Analysts will be pleasantly surprised. The more things are agreed
  to, the less opportunity there is for implementation difficulties later on."[47]



  An analysis by the Carnegie Endowment for International Peace claimed that the final
  agreement was based upon (and buttressed) "the rules-based nonproliferation regime
  created by the Nuclear Non-Proliferation Treaty (NPT) and including especially the
  IAEA safeguards system".[49]



  In November 2015, U.S. State Department Assistant Secretary for Legislative Affairs
  Julia Frifield said: "The JCPOA is not a treaty or an executive agreement, and is
  not a signed document. The JCPOA reflects political commitments between Iran, the
  P5+1, and the EU."[51]



  The Joint Comprehensive Plan of Action (JCPOA) covered 109 pages, including five
  annexes.[43] The major provisions are:[43][52][53]



  Over 15 years, Iran would reduce its stockpile of low-enriched uranium by 97%, from
  10,000 kg to 300 kg,[56][43][57][58][59] and limit enrichment to 3.67%, sufficient
  for civilian nuclear power and research, but not for weaponry.[57][58][60] This
  represented a "major decline" in Iran''s nuclear activity. Iran had produced stockpiles
  near 20% (medium-enriched uranium).[57][58][59] Stocks in excess of 300 kg enriched
  up to 3.67% would be diluted to 0.7% or sold in return for uranium ore, while uranium
  enriched to between 5% and 20% was to be fabricated into fuel plates for the Tehran
  Research Reactor or sold or diluted to 3.67%. P5+1 agreed to facilitate commercial
  contracts.



  After 15 years, all limits on enrichment would be removed, including limits on the
  type and number of centrifuges, Iran''s stocks of enriched uranium, and enrichment
  sites. According to Belfer, at this point Iran could "expand its nuclear program
  to create more practical overt and covert nuclear weapons options".[55][61]



  Iran initially possessed centrifuges sufficient for one nuclear weapon, but not
  for nuclear power.[62] Over ten years, Iran would secure over two-thirds of its
  centrifuges in storage, reducing active units to 6,104 centrifuges, with only 5,060
  allowed to enrich uranium.[43][57] Enrichment would be restricted to the Natanz
  plant. The centrifuges there were limited to IR-1 centrifuges, Iran''s oldest and
  least efficient; Iran would warehouse its advanced IR-2M centrifuges during this
  period.[41][58][59] Non-operating centrifuges would be stored in Natanz and monitored
  by IAEA, but could be used to replace failed centrifuges.[63][64] Iran agreed to
  build no enrichment facilities for 15 years.[57]



  Iran could continue research and development work on enrichment only at the Natanz
  facility and had to respect specific limitations for eight years.[41] The intent
  was to maintain a one-year breakout interval.[57]



  With cooperation from the "Working Group" (the P5+1 and possibly other countries),
  Iran was permitted to modernize the Arak heavy water research reactor based on an
  agreed design. Arak was to be limited to 20 MW (thermal) to support allowed research
  and production, while minimizing plutonium production and avoiding weapons-grade
  plutonium.[65] Spent fuel was to be sent out of the country.[41] All heavy water
  beyond Iran''s reactor needs was to be exportable. In exchange, Iran imported 130
  tonnes of uranium ore in 2015 and in late 2016 was approved to import 130 tonnes
  in 2017.[66] For 15 years Iran agreed not to research or engage in spent fuel reprocessing,[67]
  build additional heavy-water reactors, or accumulate heavy water.[41]



  Fordow would stop researching and enriching uranium for at least 15 years. The facility
  was to be converted into a nuclear physics and technology center. For 15 years Fordow
  would maintain no more than 1,044 IR-1 centrifuges in six cascades in one wing.
  Two of the six cascades would be transitioned for stable radioisotope production
  for medical, agricultural, industrial, and scientific use. The other four would
  remain idle. Iran agreed to keep no fissile material there.[41][57][59]



  A comprehensive inspections regime would monitor and confirm Iranian compliance.
  The monitoring and inspections regime included provisional implementation of the
  Additional Protocol and additional measures to monitor centrifuge rotor production
  and stockpiles, and uranium mining.[57][58][c]



  The IAEA was to have multilayered[78] oversight "over Iran''s entire nuclear supply
  chain, from uranium mills to its procurement of nuclear-related technologies".[79]
  For sites such as Fordow and Natanz, the IAEA was to have 24-hour access to nuclear
  facilities and maintain continuous monitoring (including via surveillance equipment).[79][80]
  The agreement authorized the IAEA to use sophisticated monitoring technology, such
  as fiber-optic equipment seals that could send the IAEA information; satellite imagery
  to detect covert sites; sensors to detect minute nuclear specimens; and tamper-
  and radiation-resistant cameras.[47][81] Other tools included software to gather
  information and detect anomalies, and datasets on imports.[78] The number of inspectors
  tripled to 150.[47]



  Inspectors could request access, informing Iran of the basis of the request, to
  verify the absence of prohibited activities and nuclear materials.[80] The inspectors
  were to come only from countries with which Iran had diplomatic relations.[82] Iran
  could either allow the inspection or propose alternatives that satisfied the IAEA''s
  concerns.[80] If the inspectors were not satisfied, a 24-day process would ensue.[80]
  Iran and the IAEA were to have 14 days to reach agreement.[80] For the following
  week a majority of the commission could require Iran to take specific actions within
  three more days.[83][84] This allowed the U.S. and its allies to insist on responses
  that Iran, Russia or China could not veto.[83][85] After three days of non-compliance,
  sanctions would be automatically reimposed.[84]



  These provisions were intended to extend the "breakout time"—the interval during
  which Iran could prepare enough material for a single nuclear weapon—from two to
  three months to one year.[43][57][86][d] Harvard University''s Belfer Center for
  Science and International Affairs[55] and Center for Arms Control and Non-Proliferation[88][89]
  supported these estimates. By contrast, Alan J. Kuperman, coordinator of the Nuclear
  Proliferation Prevention Project at University of Texas at Austin, disagreed, arguing
  that the breakout time would be only three months.[90]



  After ten years or more, the breakout time would gradually decrease.[43][86] By
  the 15th year, U.S. officials said the breakout time would return to the status
  quo ante of a few months.[43][86] The Belfer Center report stated: "Some contributors
  to this report believe that breakout time by year 15 could be comparable to what
  it is today—a few months—while others believe it could be reduced to a few weeks."[55]



  Iran was granted exemptions prior to 16 January 2016. Their reported purpose was
  to enable sanctions relief and other benefits to start by that date. The exemptions
  allowed Iran to:[91]



  Iran had to submit a full report on its nuclear history before it could receive
  any sanctions relief.[93] At the time of the agreement, Iran was subject to a variety
  of sanctions imposed by an array of organizations. Once IAEA verified compliance
  with the nuclear-related measures, U.N. sanctions would terminate. Some E.U. sanctions
  would terminate and some would suspend. That would allow Iran to recover approximately
  $100 billion of its assets frozen in overseas banks.[94] No U.N. or E.U. nuclear-related
  sanctions or restrictive measures were to be imposed.[95]



  Additional E.U. sanctions would be lifted after eight years of compliance, including
  some on the Revolutionary Guards.[96]



  The U.S. agreed to suspend its nuclear-related secondary sanctions.[97][98] This
  was not tied to a date or compliance but was expected to occur "roughly in the first
  half of 2016".[97][99][100] Some sanctions would continue: those on conventional
  weapon sales for five years; those on ballistic missile technologies for eight.[43][101]
  But sanctions related to human rights, missiles, and support for terrorism remained
  in effect.[59][102] Many U.S. sanctions apply worldwide; E.U. sanctions apply only
  in Europe.[96]



  Under the JCPOA, any of the P5+1 countries could invoke a "snapback" mechanism,
  allowing for the automatic reimposition of UN sanctions if Iran was found to be
  in significant non-compliance with the deal.[57][58][95] Snapback sanctions would
  not apply retroactively to contracts that were lawful at the time they were signed.[63]



  Any party could refer allegations of non-compliance to the Joint Commission monitoring
  body.[59][103] Complaints by a non-Iran party that were not resolved to the complainant''s
  satisfaction within 35 days would allow the complainant to cease performing its
  commitments, notify the S.C., or both.[103] The S.C. would then have 30 days to
  adopt a resolution to continue the sanctions relief. Absent such a resolution, nuclear-related
  U.N. sanctions would automatically be reimposed. Iran said it would then cease performing
  its nuclear obligations.[104][103] This would allow any permanent S.C. member (U.S.,
  United Kingdom, China, Russia or France) to veto sanctions relief.



  This procedure implied that the U.S., U.K., or France could reinstitute sanctions
  if it concluded that Iran was non-compliant,[103] though since that might cause
  Iran to withdraw from the agreement, they might be reluctant to do so.[105]



  "Transition Day" was to occur either eight years after Adoption Day or earlier if
  the IAEA reached its broader conclusion on Iran''s nuclear program. At that point,
  the UN would lift restrictions on missiles, Iran was expected to pursue ratification
  of its Additional Protocol, the EU must end its remaining nuclear-related sanctions,
  and the United States would remove specific items from its sanctions list and work
  toward ending certain sanctions through legislative means.[106]



  "Termination Day" was set for October 18, 2025—ten years after Adoption Day. It
  would mark the end of UN Security Council Resolution 2231 and the council''s formal
  closure of Iran''s nuclear file. With this, the mechanism allowing any participant
  to unilaterally reimpose prior UN sanctions on Iran''s nuclear program without risk
  of veto, known as the snapback provision, would also expire.[106]



  After 15 years, many provisions of the JCPOA would expire, including most enrichment
  provisions.[107]



  The JCPOA received a mixed international reaction. Many countries expressed hope
  that it could achieve its goals,[109][110][111] while Iranian adversaries in the
  Middle East, including Israel and Saudi Arabia,[11][12] and some U.S. lawmakers
  saw it as defective and appeasing Iran.[112][113][114]



  JCPOA was the first of its kind in the annals of non-proliferation.[115][116][117][118][119]
  The 159-page JCPOA document and its five appendices is the longest text of a multinational
  agreement since World War II, according to BBC Persian.[120]



  It was the first time that the Security Council had recognized a developing country''s
  nuclear enrichment program[120][121] and backed a multinational agreement within
  the framework of a resolution (2231).[120][122] For the first time in U.N. history,
  a country—Iran—was able to rid itself of six U.N. resolutions—1696, 1737, 1747,
  1803, 1835, 1929—without abiding by them for a single day.[120] Sanctions against
  Iran were lifted for the first time.[120]



  Iran was the first country subject to Chapter VII of the United Nations Charter
  that ended its case by diplomacy.[120][123][124] All other cases ended by regime
  change, war, or acquiescence.[125]



  Gary Sick said that during the history of the Nuclear Non-Proliferation Treaty (NPT),
  no country other than Iran had ever voluntarily agreed to such restrictions.[126]



  During the final negotiations, Kerry stayed in Vienna for 17 days, the longest interval
  a Cabinet official had devoted to a single international negotiation in more than
  four decades.[127] Zarif broke the record for an Iranian Foreign Minister staying
  far from home with an 18-day stay in Vienna,[120] and set the record of 106 days
  of negotiations over 687 days, more than any other chief nuclear negotiator in 12
  years.[128] The negotiations became the longest continuous negotiations with the
  presence of all five foreign ministers of the permanent Security Council members.[120]



  The negotiations included "rare events" in Iran–U.S. relations over their entire
  history. Kerry and Zarif met on 18 different dates—sometimes more than once per
  day—and in 11 different cities.[129] On 27 April 2015, Kerry visited the official
  residence of the Permanent Representative of Iran to the United Nations to meet
  his counterpart. The encounter was the first since the Iran hostage crisis.[129][130]
  On the sidelines of the 70th session of the United Nations General Assembly, President
  Obama shook hands with Zarif, the first such greeting in history. The event was
  unique in the form of diplomatic ranks, as a head of state shook hands with a minister.[131]
  Obama said, "Too much effort has been put into the JCPOA and we all should be diligent
  to implement it."[132]



  The S.C. formally endorsed the agreement on 20 July 2015.[133][134][135]



  On 15 July, U.S. Ambassador to the UN Samantha Power circulated a 14-page draft
  to Council members.[134] On 20 July, the S.C. approved resolution 2231[136] by a
  15–0 vote.[135] The resolution delayed implementation for 90 days to allow for U.S.
  Congressional consideration under the Iran Nuclear Agreement Review Act of 2015.[137][135]



  Speaking immediately after the vote, Power told the S.C. that sanctions relief would
  start only when Iran "verifiably" met its obligations. She also called upon Iran
  "to immediately release all unjustly detained Americans", specifically naming Amir
  Hekmati, Saeed Abedini, and Jason Rezaian, who were detained at the time, and Robert
  A. Levinson, who had been missing in the country.[135][138] Hekmati, Abedini, and
  Rezaian were released in a January 2016 prisoner exchange, which Kerry said the
  nuclear agreement had accelerated.[139]



  Supreme Leader Ali Khamenei gave President Hassan Rouhani guidelines for how to
  proceed.[140][141] On 21 June 2015, the Iranian Parliament (Majlis) formed a committee
  to study the JCPOA and decided to wait at least 80 days before voting.[142] Zarif
  and Atomic Energy Organization of Iran (AEOI) chief Ali Akbar Salehi defended the
  deal in Parliament.[142]



  In televised remarks on 23 July 2015, Rouhani rejected domestic criticism by Iranian
  hardliners, such as the Islamic Revolutionary Guard Corps.[143] He claimed a popular
  mandate to make an agreement based on his election in 2013 and said the alternative
  was suffering under continued sanctions.[143] A two-page, top-secret directive from
  Iran''s Supreme National Security Council instructed newspapers to avoid criticism
  or giving any impression of disagreement at the highest levels of government.[144]



  On 2 September, Iranian defense minister Hossein Dehqan said that Iran would not
  allow the IAEA to visit every site or facility it wished.[145] On 3 September, Khamenei
  said that the Majlis should make the final decision.[146] The same day, Parliament
  Speaker Ali Larijani voiced his support.[146] Former presidents Akbar Hashemi Rafsanjani
  and Mohammad Khatami and moderates within parliament announced their support.[147]
  Most prominent opposition leaders, including Mir-Hossein Mousavi, a 2009 presidential
  candidate under house arrest for his role as a leader of the Green Movement, also
  announced their support.[147]



  The anti-agreement coalition included former president Mahmoud Ahmadinejad, former
  head of AEOI Fereydoon Abbasi, ex-nuclear negotiator Saeed Jalili, and various conservative
  clerics and IRGC commanders. This group claimed that Iranian negotiators caved on
  many key issues and were outmaneuvered.[147]



  The Majlis commission for examining the JCPOA invited Ali Shamkhani, as well as
  members of a former nuclear negotiation team including Ali Bagheri and Abbasi, to
  a hearing.[149] During the session, ex-chief negotiator Saeed Jalili said that "approximately
  100 absolute rights" of Iran had been conceded and that the deal turned Iran''s
  right to adopt nuclear technology under the NPT into mere permission.[150] He claimed
  that the deal violated the terms Khamenei set. Commission members Masoud Pezeshkian
  and Abbas Ali Mansouri Arani criticized Jalili''s testimony.[151] In another session,
  negotiators Abbas Araqchi and Majid Takht-Ravanchi defended the deal.[152]



  The leading reformist newspapers, Etemad and Shargh, supported the deal.[153] The
  leading conservative papers, Ettelaat and Kayhan, criticized its terms.[153]



  Many Iranian dissidents, including Nobel Peace Prize laureate, human rights activist,
  and Iranian exile Shirin Ebadi and former political prisoner Akbar Ganji came out
  in support.[147] Others opposed the agreement, including Ahmad Batebi, Nazanin Afshin-Jam,
  and Roozbeh Farahanipour.[154]



  On 13 October the Iranian Parliament approved the JCPOA supplemented by text unilaterally
  added by Iran and not agreed to by the P5+1, with 161 votes in favor, 59 against,
  and 13 abstentions.[155][156][157][158]



  The agreement''s legal status in the U.S. was disputed.[e] Under U.S. law, the JCPOA
  is a non-binding political commitment.[165][166] According to the State Department,
  it is neither an executive agreement nor a treaty (as defined in U.S. law). In contrast
  to treaties, which require two-thirds of the Senate to consent to ratification,
  executive commitments require no congressional approval and are not legally binding
  under domestic law, though they may carry weight under international law.[167][f]



  In May 2015, the U.S. enacted the Iran Nuclear Agreement Review Act (INARA),[g][176]
  which gave Congress a defined period to review any nuclear agreement with Iran.
  Under the Act, once the JCPOA was submitted, Congress had 60 days to pass a resolution
  of approval or disapproval or take no action.[177] Additional time was allotted
  to allow for potential presidential vetoes and override votes.[178][177][179]



  On 19 July 2015, the State Department formally transmitted the JCPOA to Congress,[180]
  along with an unclassified verification report and a classified annex from the Intelligence
  Community.[180] The 60-day review period began on 20 July[180][181][177] and ended
  on 17 September.[182] A resolution of disapproval failed in the Senate, as did a
  resolution of approval in the House. As a result, the agreement went into effect
  after the congressional review period expired.[183]



  Obama repeatedly urged Congress to support the agreement, noting the inspections
  regime''s vigor and criticizing opponents for failing to offer a viable alternative.[184]
  Vice President Joe Biden met with Senate Foreign Relations Committee Democrats,
  seeking their support.[185]



  Republicans generally rejected the deal. Cruz said that under the agreement "the
  Obama administration will become the financier of terrorism against America in the
  world."[186] Former Governor Mike Huckabee of Arkansas, a candidate for the 2016
  Republican presidential nomination, called Obama "naive".[187] Obama cited the support
  of Democrats typically associated with strong defense backgrounds, saying, "This
  is a deal that has been endorsed by people like Brent Scowcroft and Sam Nunn...
  historic Democratic and Republican leaders on arms control and on keeping America
  safe".[188]



  Senate Majority Leader Mitch McConnell promised that Republicans would discuss the
  agreement respectfully in September.[189][190] Democrat Senate Minority Leader Chuck
  Schumer distinguished the nuclear and non-nuclear aspects. His conclusion was: "when
  it comes to the nuclear aspects of the agreement within ten years, we might be slightly
  better off with it. However, when it comes to the nuclear aspects after ten years
  and the non-nuclear aspects, we would be better off without it."[191]



  Director of National Intelligence James Clapper said that JCPOA "puts U.S. in a
  far better place in terms of insight and access" than no agreement.[192]



  A Senate Foreign Relations Committee hearing took place on 23 July. Kerry, Treasury
  Secretary Jack Lew, and Moniz testified.[193][194] Chair Bob Corker said the agreement
  codified rather than dismantled the Iranian program.[195][196] Ranking member Benjamin
  Cardin remained neutral.[197] Other Democrats, led by Barbara Boxer, expressed support.
  Corker and Cardin requested to review the IAEA-Iran document.[198] Kerry, Lew, and
  Moniz said that without JCPOA, international sanctions would collapse.[193] Republican
  senators gave vociferous speeches denouncing the deal.[198]



  The three also testified before the House Committee on Foreign Affairs.[199] Republican
  Committee chair Ed Royce claimed that the deal traded permanent sanctions relief
  for temporary restrictions[199][200] and criticized the inspection regime.[201]
  Ranking member Eliot Engel was not in support.[201][202]



  Secretary of Defense Ashton Carter, General Martin Dempsey, the chairman of the
  Joint Chiefs of Staff, Kerry, Moniz, and Lew appeared before the Senate Armed Services
  Committee.[203] Carter and Dempsey had been invited to testify by Republican Chair
  John McCain, who opposed the deal.[204] Ranking member Jack Reed stressed the need
  to independently validate the deal.[205][206]



  Carter assured the committee that the U.S. could employ military force if needed
  and that he did not expect other Iranian misbehavior to stop,[207] another reason
  to limit its nuclear program.[208][209] Dempsey testified that the agreement reduced
  the chances of a near-term military conflict.[203]



  IAEA has confidential technical arrangements with many countries.[93][210][211]
  Some Republican lawmakers called such agreements "secret side deals" that restructured
  the deal.[210] Cruz introduced an unsuccessful resolution seeking a delay in the
  review period, arguing that the review period should begin upon receipt of all relevant
  documents.[212][213]



  State Department spokesman John Kirby responded the P5+1 had been fully briefed
  and that related questions could be addressed in a classified setting.[211] Various
  experts lined up on both sides of the controversy.[93][75][214][215]



  The Washington Post listed 12 issues raised by U.S. senators including Corker, Bob
  Menendez, Jim Risch, Marco Rubio, and Ron Johnson, including the efficacy of inspections
  at undeclared sites; the effectiveness of the snapback sanctions; the significance
  of limits on enrichment; the significance of IAEA side agreements; the effectiveness
  of inspections of military sites; the consequences of walking away from an agreement;
  and the effects of lifting sanctions.[216][h]



  Republican leaders vowed to kill the agreement.[224][225]



  One area of disagreement was the consequences of walking away, and whether renegotiation
  was a realistic option.[216] Schumer, an opponent, called for retaining and strengthening
  sanctions, and to continue negotiating.[191] President Obama argued that renegotiation
  was unrealistic, that the Iranian people would see further concessions as "total
  surrender of their sovereignty",[226] and that other countries would not continue
  to support the existing sanctions regime.[226] Senator Al Franken accepted the claim
  that no better deal was feasible.[227][i] Representative Sander M. Levin announced
  his support.[231] Senator Cardin said that if the agreement were implemented, the
  U.S. should increase military aid to Israel and friendly Gulf states.[179] Senator
  Bill Nelson and Foreign Relations Committee members Tim Kaine and Barbara Boxer
  announced their support.[232]



  The Associated Press reported that the classified U.S. Intelligence Community assessment
  concluded the agreed inspection regime would diminish Iran''s ability to conceal
  a covert weapons program.[233][234] Ten active and former Democratic members of
  the House Select Committee on Intelligence (including Minority Leader Nancy Pelosi
  and Intelligence Committee ranking member Adam Schiff) cited this assessment, which
  was available for members of Congress to read, as a reason to support the agreement.[234][235]



  In June 2025, both Republicans and Democrats expressed concern that the Trump administration
  would start another war because of its misplaced objectives in the Middle East.
  Subsequently, U.S. congress moved to limit the president''s power to wage war there
  because of the experience of the War in Iraq (2013–2017).[236]



  A resolution of disapproval was initially expected to pass both the House and Senate.[237][238]



  Two-thirds of both houses are required to override a presidential veto.[239][240]
  On 20 August 2015, Pelosi claimed that House Democrats had the votes to sustain
  a veto of a resolution of disapproval.[241] By 20 August, about 60 House Democrats
  had announced their support,[242] versus about 12 opponents.[241]



  By early September 2015, 34 senators had confirmed their support, ensuring that
  the Senate could sustain a veto.[243] This proved to be moot, since by 8 September,
  all senators had announced their commitments, with 42 in support (40 Democrats and
  two independents) and 58 opposed (54 Republicans and four Democrats).[243] Without
  60 votes on either side, the other could filibuster any resolution.[243] A key part
  of obtaining even limited support came during an August 2015 meeting at which top
  diplomats from the UK, Russia, China, Germany, and France told 10 undecided Democratic
  senators they had no intention of returning to negotiations.[244]



  Initially, the House leadership planned to vote on a resolution of disapproval.[245][j]
  Speaker John Boehner instead chose to advance a resolution of approval to force
  Democratic supporters to formally register their views.[248] On 11 September 2015
  the resolution of approval failed on a 162–269 vote; 244 Republicans and 25 Democrats
  voted no, while 162 Democrats and no Republicans voted yes.[248][249] The same day,
  Congress passed resolutions claiming that the requirements of a congressional review
  period were not met (by party-line vote) and that that would prevent the U.S. from
  lifting any sanctions[248][250] (all Republicans and two Democrats in favor).[248][250][251]



  The discussion extended to the wider public.[252] Major campaign donors took sides,
  with opponents (Sheldon Adelson, Paul Singer, and Haim Saban) outspending supporters
  (Ploughshares Fund, Rockefeller Brothers Fund, George Soros, S. Daniel Abraham,
  Tim Gill, Norman Lear, Margery Tabankin, and Arnold Hiatt) by millions of dollars.[253][254]



  Some groups welcomed the JCPOA,[255] such as the National Iranian American Council
  (NIAC), and Iranian American Bar Association.[256]



  Public letters of support abounded (often bipartisan):



  Public letters from opponents included:



  U.S. pro-Israel lobby groups were divided.[275] American Israel Public Affairs Committee
  spent millions opposing it.[276][275][277][278] J Street came out in support, and
  planned a $5 million advertising effort.[279][280] In the first week of August J
  Street launched a $2 million, three-week ad campaign in support of the agreement,
  with TV ads in Colorado, Maryland, Michigan, Oregon, and Pennsylvania.[281][282]



  Leaders of the Reform Jewish movement stayed neutral.[283][284]



  Conversely, in late August a group of 900 rabbis signed an open letter by Kalman
  Topp and Yonah Bookstein calling upon Congress to reject the agreement.[285] The
  Orthodox Union and American Jewish Committee also announced opposition to the agreement.[286][287]



  Supporters included MoveOn.org, Americans United for Change, and Global Zero.[291]
  Iran Project, and the United Nations Association of the U.S.supported the agreement.[292]
  Colin Powell expressed support.[293]



  Retired U.S. Senators Carl Levin and John Warner published a supporting op-ed.[294]
  Retired Republican Richard Lugar and Democrat J. Bennett Johnston wrote in support
  of the agreement.[295]



  Foreign diplomats joined the debate. Israeli ambassador to the U.S. Ron Dermer was
  an opponent. European ambassadors including Sir Peter Westmacott supported it.[296]



  The Roman Catholic Church expressed support, led by Bishop Oscar Cantú.[297][298]



  Michael Mandelbaum claimed that nonproliferation ultimately depended on deterrence,
  not agreements.[299] Alan Dershowitz claimed that the involvement of Russia and
  China made the deal irrelevant.[300]



  On the same day that the S.C. approved its resolution, the E.U. formally approved
  the JCPOA via a vote of the E.U. Foreign Affairs Council (the group of E.U. foreign
  ministers) meeting in Brussels. This set into motion the lifting of certain E.U.
  sanctions, including those prohibiting the purchase of Iranian oil.[135][301] The
  E.U. continued its sanctions relating to human rights and prohibiting the export
  of ballistic missile technology.[135]



  On 18 October 2015 E.U. High Representative Mogherini and Iranian Foreign Minister
  Zarif jointly announced "Adoption Day".[302]



  On 20 September 2015, Director-General Yukiya Amano of the IAEA went to the Parchin
  missile production facility, along with Director of Safeguards Tero Varjoranta,
  to obtain clarifications on the site''s nuclear activities.[303][304][305] The next
  day, Amano professed satisfaction with the samples submitted by the Iranians to
  the IAEA. IAEA experts were not physically present during the sampling, but Amano
  said the procedure met "strict agency criteria".[306] In June 2016, IAEA investigators
  reported that they had reported traces of uranium found at the Parchin facility
  in December 2015.[307]



  After the IAEA certified that Iran had met the relevant JCPOA requirements, all
  nuclear sanctions were lifted by the UN, the E.U. and the U.S. on 16 January 2016,
  "Implementation Day".[308]



  That day Washington imposed sanctions on 11 companies and individuals for supplying
  Iran''s ballistic missile program.[309][310] According to Kerry, $1.7 billion in
  debt with interest was to be paid to Tehran. But some Iranian financial institutions,
  including Ansar Bank, Bank Saderat, Bank Saderat PLC, and Mehr Bank, remained on
  the SDN List[311] and U.S. sanctions with respect to Iran, including existing terrorism,
  human rights and ballistic missiles-related sanctions, remained in effect.[312]



  In a letter sent to then Representative Mike Pompeo, the State Department said that
  the JCPOA "is not a treaty or an executive agreement, and is not a signed document".[313]



  According to the Congressional Research Service, different definitions of "treaty"
  are used in international and U.S. law. According to the Vienna Convention on the
  Law of Treaties, "The term ''treaty'' has a broader meaning under international
  law than under domestic law. Under international law, ''treaty'' refers to any binding
  international agreement.[314] Under domestic U.S. law, ''treaty'' signifies only
  those binding international agreements that have received the advice and consent
  of the Senate."[315]



  Michael Eisenstadt, Director of the Military and Security Studies Program at the
  Washington Institute for Near East Policy, wrote that deterrence must remain the
  "core imperative" for U.S. policy.[316] Einhorn wrote that maintaining a credible
  deterrent was essential.[317]



  Obama stated that the U.S. would continue its policy of deterring any Iranian efforts
  to develop nuclear weapons, including via military force.[318] Flexibility meant
  that Obama rejected specifying "the penalties for smaller violations of the accord"
  in advance.[319]



  Dennis Ross and David Petraeus said that deterrence including military force was
  essential to preventing Iran from nuclear weapons and called on Obama to clearly
  state that policy.[320][321]



  According to Khamenei, his fatwa and not JCPOA was the reason Iran would not acquire
  nuclear weapons.[322]



  The U.S. certified in April 2017 and in July 2017 that Iran was complying with the
  deal.[323][324]



  On 13 October 2017, President Trump announced that he would not make the certification
  required under the Iran Nuclear Agreement Review Act, accusing Iran of violating
  the spirit of the deal and calling on Congress and international partners to "address
  the deal''s many serious flaws", though he stopped short of terminating the agreement.[325][326]



  Trump left Congress to decide whether to reimpose sanctions. His aides sought to
  enact rules indicating how the U.S. could reimpose sanctions. Trump listed three
  items that could provoke the U.S. to reject the deal: intercontinental ballistic
  missile development, Iranian refusal to extend the constraint period, and evidence
  that Iran had reduced the time needed to manufacture a bomb to fewer than 12 months.[327]



  Rouhani,[328] Theresa May, Emmanuel Macron, Angela Merkel, and European Union foreign
  policy chief Federica Mogherini said the agreement was working well and that no
  one country could break it, reconfirming support for the deal. Russian foreign minister
  Sergey Lavrov confirmed that Iran was in compliance.[328]



  In 2018, IAEA inspectors spent an aggregate of 3,000 calendar [person-]days in Iran,
  installing seals and collecting surveillance camera photos, measurement data, and
  documents for further analysis. In March 2018, IAEA Director Yukiya Amano said that
  the organization had verified that Iran was implementing its nuclear-related commitments.[329]
  On April 30, the U.S. and Israel said that Iran had not disclosed a past covert
  nuclear weapons program to the IAEA, as required.[330][331]



  Project Cassandra was a U.S. Drug Enforcement Administration (DEA) initiative launched
  in 2008 to disrupt Hezbollah''s funding networks by targeting its involvement in
  international drug trafficking and money laundering.[332] The operation uncovered
  significant links between Hezbollah and organized crime, but its later years were
  marked by controversy over allegations that enforcement efforts were slowed to protect
  the JCPOA negotiations—a claim former officials disputed.[333]



  On 8 May 2018, the U.S. officially withdrew from the JCPOA after Trump signed a
  Presidential Memorandum ordering reinstatement of sanctions.[334][335][336][337]
  The IAEA continued to certify Iranian compliance.[338] Other signatories said they
  would comply with the deal even absent the U.S.[339]



  I am announcing today that the United States will withdraw from the Iran nuclear
  deal. In a few moments, I will sign a presidential memorandum to begin reinstating
  U.S. nuclear sanctions on the Iranian regime. We will be instituting the highest
  level of economic sanction. Any nation that helps Iran in its quest for nuclear
  weapons could also be strongly sanctioned by the United States.


  — Donald Trump[340]


  The U.S. adopted a policy of "maximum pressure", led by global sanctions.[16][341][342]



  The Iranian rial fell by 20%,[343] from 35,000 to the dollar to 42,000 in 2021.[344]
  International banks that traded with Iran paid heavy fines.[345] The U.S. flag was
  set on fire in Iran''s Parliament.[346] According to Israel Defense Forces sources,
  IRGC Quds Forces based in Syria launched rockets at Israeli military targets the
  next evening, the first time Iran had directly targeted Israel.[347] All major European
  companies abandoned doing business with Iran out of fear of U.S. punishment.[348]



  Khamenei presented seven conditions for Europe to sustain JCPOA. Among them was
  that European powers must take steps to preserve business relations with Iranian
  banks and purchase Iranian oil. He rejected holding discussions about Iran''s ballistic
  missile program and regional activities.[349]



  On 7 August 2018, the E.U. enacted a blocking statute to defeat U.S. sanctions on
  countries trading with Iran.[350] In November 2018, U.S. sanctions came back into
  effect, intended to force Iran to alter its policies, including its support for
  militant groups in the region and its development of ballistic missiles.[351]



  One year after the U.S. withdrawal, Iran took countermeasures. Iran halted its required
  sales of excess enriched uranium and heavy water to other countries. Rouhani said
  that Iran would resume enrichment beyond 3.67% if other parties could not let Iran
  benefit from JCPOA''s economic provisions.[348]



  In May 2019, IAEA certified that Iran was abiding by the deal''s main terms, but
  raised questions about how many advanced centrifuges Iran was allowed to have, which
  was only loosely specified in the deal.[352]



  On 8 May, Iran announced it would suspend implementation of parts of JCPOA, threatening
  further action in 60 days absent exemption from U.S. sanctions.[353]



  On 1 July 2019, Iran announced that it had breached the limit set on its stockpile
  of low-enriched uranium,[354] which the IAEA confirmed.[355] On 7 July, Iran announced
  that it had started to increase uranium enrichment beyond the agreed 3.67% limit.
  IAEA said its inspectors would verify Iran''s actions. Zarif sent a letter to Mogherini
  notifying her about Iran''s noncompliance.[356]



  On 4 November, Iran doubled the number of advanced centrifuges it operated. It began
  enriching uranium to 4.5%. On 5 November 2019, Iranian nuclear chief Ali Akbar Salehi
  announced that Iran would enrich uranium to 5% at Fordow, adding that it already
  had the capability to enrich uranium to 20%.[357]



  On 5 January 2020, Iran declared that it would no longer abide by the deal''s limitations
  but would continue to coordinate with IAEA.[358]



  In 2020, Trump and Pompeo asserted that the U.S. remained a "participant" in the
  agreement, despite having formally withdrawn, in an effort to persuade the S.C.
  to reimpose pre-agreement sanctions on Iran for its breaches.[359]



  New U.S. President Joe Biden stated his intention to reinstate the deal.[360] Israeli
  Prime Minister Naftali Bennett advised against this, saying that stopping Iran''s
  aggression and preventing Iran from building nuclear weapons should be the priority.[361]



  In April, talks between the original parties started in Vienna. Biden put the meetings
  on hold in June. Enrique Mora, E.U. coordinator for reviving negotiations with Iran,
  attended President Ebrahim Raisi''s inauguration. Iran sought E.U. assurances that
  the U.S. withdrawal would not be repeated. On 14 October, Iran and the E.U. agreed
  to further negotiations. Iranian deputy foreign minister Ali Bagheri reiterated
  Mora''s statement that "the E.U. was ready to collaborate with Iran and the other
  parties".[362]



  A joint statement by French, German, U.K., and U.S. leaders on 30 October welcomed
  Biden''s interest in reestablishing JCPOA.[363] Talks resumed on 29 November, with
  representatives from Iran, China, France, Germany, Russia, and the U.K.[364]



  Bagheri presented Iran''s draft.[365] Western negotiators rejected it. Iranian negotiators
  insisted that the U.S. lift all sanctions before Iran would scale back its nuclear
  program.[366] On 9 December, negotiations continued, with Russia and China pushing
  Iran to revise its stance.[367]



  On 20 February, 250 members of the 290-member Iranian parliament, which had been
  controlled by hardliners since 2020, issued a statement urging Raisi to comply with
  their requirements for reestablishing JCPOA.[368]



  The U.S. engaged in indirect talks with Iran, mediated by China, Russia and E.U.
  JCPOA revival became a priority for the Biden administration when the Russian invasion
  of Ukraine spiked global energy prices. JCPOA would add about a million barrels/day
  of Iranian oil to the international market, which would lower crude oil prices.[369]



  Throughout the year, leaders on both sides made statements assessing the state of
  talks.[370][371][372][373][374][375] Points of contention included:



  By May, talks had stalled.[384] On 7 May, Mora visited Iran to restart them.[385]



  In June, Tehran said it was removing 27 U.N. surveillance cameras.[386]



  On 16 June, the Biden administration announced sanctions against Iran''s petrochemical
  industry.[387] On 6 July, the U.S. initiated legal proceedings against entities
  based in Singapore, Vietnam, and the United Arab Emirates for evading sanctions.[388]



  In July, indirect talks between the U.S. and Iran failed.[389]



  In August European negotiators presented a "final" text, after another round.[390]
  The draft did not include removal of the IRGC''s terrorism designation.[391]



  In September, Iran increased its oil exports to China, circumventing sanctions.[392]



  A delegation visited Tehran on 18 December to discuss the nuclear material discovered
  at three sites. Earlier Iran reported it had enriched uranium to its highest level
  of 60%, one step away from weapons grade.[393]



  On 20 December, a meeting was held in Amman, Jordan.[394]



  The IAEA censured Iran twice in 2022 for failing to cooperate.[395]



  An IAEA report on the Fordow Uranium Enrichment Plant found that two cascades of
  IR-6 centrifuges were configured in a way "substantially different" from what Iran
  had previously declared. Iran claimed the difference was due to a human error. On
  31 January, the U.S. State Department authorized a sanctions waiver, which allowed
  Russia to develop the enrichment site, a move that some criticized[who?] because
  it allowed Iran to develop its nuclear program with Russian-state controlled firms.



  On 4 March, Grossi met with Raisi and other top Iranian officials. Earlier, IAEA
  had detected uranium particles enriched up to 83.7% at Fordow. In the meantime,
  Iran gave assurances that it would reinstall monitoring equipment at sensitive locations.



  In early June, European powers resumed internal talks. Preliminary negotiations
  with France, Germany, the U.K., and Ali Bagheri Kani again took place in Oslo. A
  U.S. State Department official acknowledged that direct connections had been under
  way, the first since 2018.[396] Both sides had released prisoners accused of espionage
  and terrorism.[397]



  On 18 June, indirect talks between Iran and the U.S. began in Oman after the U.S.
  allowed the release of blocked Iraqi payments to Iran.[398] On 4 July, Iran-Iraq
  Joint Chamber of Commerce chairman Yahya Ale Eshaq confirmed the release of $10
  billion, to be used for unsanctioned goods. This allowed Iran to double its trade
  with Iraq.[399] As a consequence, IAEA imposed no additional punitive measures on
  Iran, as European allies saw no benefit. Israel said it opposed "mini-agreements"
  with Iran, as well as the original agreement.[400]



  In late August, after months of negotiations, first in Oman and then with Qatari
  officials in New York, agreements between the U.S. and Iran led to a gradual easing
  of sanctions on Iranian oil sales, particularly for eastern markets such as China.
  Iranian oil sales reached their highest since 2018, allowing prices to drop below
  $85 a barrel. Skeptical analysts claimed this was simply to keep U.S. gasoline prices
  in check for the 2024 election. The U.S. State Department insisted on continued
  sanctions enforcement, while some reports indicated that Iran was slowing its uranium
  enrichment. Iranian oil production reached 3 million barrels per day in July, with
  a further increase to at least 3.4 million barrels in August.[401]



  In late August, IAEA confirmed that Iran had slowed its program to enrich uranium
  to 60%. Concurrently, the sale of Iranian crude increased. Some oil sanctions were
  lifted.[402]



  In the first week of September, the U.S. State Department officially released $6
  billion in frozen assets and finalized an exchange of five prisoners each. The funds
  could be used only for unsanctioned goods.[403]



  A September IAEA report confirmed an enrichment slowdown, but claimed that no reporting
  progress had been made and that the camera equipment at the enrichment site remained
  inaccessible.[404][405]



  In mid-September, the IAEA/Iran relationship further deteriorated when Iran rejected
  IAEA nuclear inspectors. This was formally permitted by Iran''s safeguards agreement.[406]



  On 18 September, Raisi spoke at the U.N. General Assembly and said that Iran would
  never give up its right to peaceful nuclear energy. He urged Western powers to return
  to the nuclear deal. Israel left the assembly hall in protest.[407][408]



  In October, Qatar and the U.S. put Iran''s access to blocked funds on hold due to
  the Gaza war, although Iran denied any involvement in the attack.[409][410][411]



  Additional sanctions were imposed on the Iranian aviation sector due to its involvement
  with exports of missile components to Russia. Iran denied any deliveries. An IAEA
  report confirmed the expansion of Iran''s enrichment program. Fordow was routinely
  enriching uranium to 60%. The report said that Iran informed the agency that eight
  clusters of advanced IR-6 centrifuges had been installed at the site but not brought
  online. The larger site at Natanz added 15 cascades, allowing an enrichment purity
  of 5%. IAEA board resolutions required Iran to cooperate with its investigations
  into uranium traces and called for inspectors to enter nuclear sites.[412][413]



  AEOI spokesman Behrouz Kamalvandi met with representatives of Russia''s Joint Institute
  for Nuclear Research to exchange technical details.[414]



  On November 13, IAEA director Rafael Grossi visited Tehran, where he was welcomed
  by Behrouz Kamalvandi, spokesman for the Atomic Energy Organization of Iran (AEOI).
  Grossi, holding talks with Foreign Minister Abbas Araghchi and AEOI Chief Mohammad
  Eslami, had earlier said the JCPOA was an "empty shell" but that IAEA inspectors
  had no evidence that Iran was building a nuclear bomb. During the COP29 climate
  summit in Baku, he warned that "the international situation is becoming increasingly
  tense".[415][416]



  In February 2025, Khamenei criticized the JCPOA, saying the Iranian team had been
  too generous and the U.S. had failed to uphold its commitments and ultimately withdrew
  from the deal. He said the JCPOA left a constant threat hanging over Iran (the snapback
  mechanism). He concluded that negotiating with such a government "is neither wise,
  nor intelligent, nor honorable".[417][418]



  In September 2025, the UN security council rejected a resolution by China and Russia
  to delay "snapback sanctions" triggered by France, the UK, and Germany. European
  powers still adhere to agreements set forth by the JCPOA, and demand direct negotiations
  between Iran and the U.S. At the same time, Iran has welcomed IAEA inspectors to
  control the remaining undamaged nuclear sites. Iran has called the snapback sanctions
  "procedurally flawed" because they rely on terms of the 2015 agreement long abandoned
  by the U.S.[419] Russia called the reimposition of sanctions "clumsy blackmail"
  and dismissed it as "null and void".[420]



  Also in September 2025, Iran signed a $25 billion agreement with Russia to build
  four nuclear power reactors in Sirik, Iran. The Generation III reactors are expected
  to produce 5 GW of electricity. Iran, which suffers power shortages at times of
  high demand, currently has one operating nuclear power plant, in Bushehr. Also built
  by Russia, it has a capacity of 1 GW.[421] On 28 September, UN sanctions were officially
  reimposed on Iran.[422]



  On September 10, 2025, Grossi reached a confidential agreement with Araghchi in
  Cairo on practical steps to restore safeguards implementation.[423] In November
  2025, Araghchi said Iran was no longer enriching uranium.[424] On November 30, 2025
  the IAEA Board of Governors adopted a resolution asking the Director General to
  report on implementation of the UN Security Council resolutions that were reimposed
  by the snapback, and said that "Iran must ... provide the agency without delay with
  precise information on nuclear material accountancy and safeguarded nuclear facilities
  in Iran, and grant the agency all access it requires to verify this information."
  Iran responded by declaring the Cairo agreement null and void.[425][426][427] In
  December 2025, Grossi told an Austrian newspaper that IAEA inspectors remained in
  Iran but were unable to access damaged facilities in Natanz, Isfahan, and Fordo.[citation
  needed]



  On 28 September 2025, UN sanctions were officially reimposed on Iran.[428] China
  and Russia rejected snapback sanctions.[429]



  On June 13, 2025, the consequences of the U.S. withdrawal from the agreement became
  acutely evident when Israel attacked Iran. According to the IAEA, Iran did not disclose
  "traces of uranium", which led to the conclusion that Iran might have developed
  nuclear weapons. The lack of support for the initial resolution complicated enforcement
  agreements. The Trump administration''s inability to craft a new agreement with
  Iran has been viewed by some commentators as a major setback for U.S. foreign policy.
  According to the UN, Iran''s nuclear programme was "exclusively peaceful", per the
  terms of the JCPOA, but inspectors later said they had been "unable to determine
  whether Iran''s nuclear programme was exclusively peaceful". According to a June
  2025 IAEA report, there had been no indication of a physical attack on the underground
  cascade hall containing part of the Pilot Fuel Enrichment Plant at Fordow and the
  main Fuel Enrichment Plant, but a power loss due to the attack might have caused
  the centrifuges there to malfunction.[430][431]



  On June 21, 2025, the U.S. bombed three Iranian nuclear sites, Fordow, Natanz, and
  Isfahan, and claimed it had totally destroyed them, but according to Iranian news
  agencies, all three locations had been abandoned and equipment moved elsewhere.
  Damage to the deep underground Fordow site could not be confirmed, and no release
  of radioactive materials was reported. Iranian nuclear facilities are under IAEA
  routine inspection, and the atomic agency strongly discouraged military attacks
  on these facilities.[432]

