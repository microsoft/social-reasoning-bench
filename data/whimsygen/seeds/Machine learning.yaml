content: "\n\n\nMachine learning (ML) is a field of study in artificial intelligence\
  \ concerned with the development and study of statistical algorithms that can learn\
  \ from data and generalize to unseen data, and thus perform tasks without explicit\
  \ programming language instructions.[1] Within a subdiscipline of machine learning,\
  \ advances in the field of deep learning have allowed neural networks, a class of\
  \ statistical algorithms, to surpass many previous machine learning approaches in\
  \ performance.\n\n\nStatistics and mathematical optimisation (mathematical programming)\
  \ methods compose the foundations of machine learning. Data mining is a related\
  \ field of study, focusing on exploratory data analysis (EDA) through unsupervised\
  \ learning.[3][4]\n\n\nFrom a theoretical viewpoint, probably approximately correct\
  \ learning provides a mathematical and statistical framework for describing machine\
  \ learning. Most traditional machine learning and deep learning algorithms can be\
  \ described as empirical risk minimisation under this framework.\n\n\nThe term machine\
  \ learning was coined in 1959 by Arthur Samuel, an IBM employee and pioneer in the\
  \ field of computer gaming and artificial intelligence.[5][6] The synonym self-teaching\
  \ computers was also used during this time period.[7][8]\n\n\nThe earliest machine\
  \ learning program was introduced in the 1950s when Arthur Samuel invented a computer\
  \ program that calculated the winning chance in checkers for each side, but the\
  \ history of machine learning roots back to decades of human desire and effort to\
  \ study human cognitive processes.[9] In 1949, Canadian psychologist Donald Hebb\
  \ published the book The Organization of Behavior, in which he introduced a theoretical\
  \ neural structure formed by certain interactions among nerve cells.[10] Hebb's\
  \ model of neurons interacting with one another set a groundwork for how AIs and\
  \ machine learning algorithms work under nodes, or artificial neurons used by computers\
  \ to communicate data.[9] Other researchers who have studied human cognitive systems\
  \ contributed to the modern machine learning technologies as well, including logician\
  \ Walter Pitts and Warren McCulloch, who proposed the early mathematical models\
  \ of neural networks to come up with algorithms that mirror human thought processes.[9]\n\
  \n\nBy the early 1960s, an experimental \"learning machine\" with punched tape memory,\
  \ called Cybertron, had been developed by Raytheon Company to analyse sonar signals,\
  \ electrocardiograms, and speech patterns using rudimentary reinforcement learning.\
  \ It was repetitively \"trained\" by a human operator/teacher to recognise patterns\
  \ and equipped with a \"goof\" button to cause it to reevaluate incorrect decisions.[11]\
  \ A representative book on research into machine learning during the 1960s was Nils\
  \ Nilsson's book on Learning Machines, dealing mostly with machine learning for\
  \ pattern classification.[12] Interest related to pattern recognition continued\
  \ into the 1970s, as described by Duda and Hart in 1973.[13] In 1981, a report was\
  \ given on using teaching strategies so that an artificial neural network learns\
  \ to recognise 40 characters (26 letters, 10 digits, and 4 special symbols) from\
  \ a computer terminal.[14]\n\n\nTom M. Mitchell provided a widely quoted, more formal\
  \ definition of the algorithms studied in the machine learning field: \"A computer\
  \ program is said to learn from experience E with respect to some class of tasks\
  \ T and performance measure P if its performance at tasks in T, as measured by P,\
  \  improves with experience E.\"[15] This definition of the tasks in which machine\
  \ learning is concerned offers a fundamentally operational definition rather than\
  \ defining the field in cognitive terms. This follows Alan Turing's proposal in\
  \ his paper \"Computing Machinery and Intelligence\", in which the question, \"\
  Can machines think?\", is replaced by asking whether machines can convincingly imitate\
  \ a human in its responses to human-posed questions.[16][17]\n\n\nModern-day Machine\
  \ Learning algorithms are broken into 3 algorithm types: Supervised Learning Algorithms,\
  \ Unsupervised Learning Algorithms, and Reinforcement Learning Algorithms.[18]\n\
  \n\nIn 2014 Ian Goodfellow and others introduced generative adversarial networks\
  \ (GANs) with realistic data synthesis.[19] By 2016 AlphaGo obtained victory against\
  \ top human players using reinforcement learning techniques.[20]\n\n\nAs a scientific\
  \ endeavour, machine learning grew out of the quest for artificial intelligence\
  \ (AI). In the early days of AI as an academic discipline, some researchers were\
  \ interested in having machines learn from data. They attempted to approach the\
  \ problem with various symbolic methods, as well as what were then termed \"neural\
  \ networks\"; these were mostly perceptrons and other models that were later found\
  \ to be reinventions of the generalised linear models of statistics.[22] Probabilistic\
  \ reasoning was also employed, especially in automated medical diagnosis.[23]: 488 \n\
  \n\nHowever, an increasing emphasis on the logical, knowledge-based approach caused\
  \ a rift between AI and machine learning. Probabilistic systems were plagued by\
  \ theoretical and practical problems of data acquisition and representation.[23]: 488 \
  \ By 1980, expert systems had come to dominate AI, and statistics was out of favour.[24]\
  \ Work on symbolic/knowledge-based learning did continue within AI, leading to inductive\
  \ logic programming(ILP), but the more statistical line of research was now outside\
  \ the field of AI proper, in pattern recognition and information retrieval.[23]: 708–710, 755 \
  \ Neural networks research had been abandoned by AI and computer science around\
  \ the same time. This line, too, was continued outside the AI/CS field, as \"connectionism\"\
  , by researchers from other disciplines, including John Hopfield, David Rumelhart,\
  \ and Geoffrey Hinton. Their main success came in the mid-1980s with the reinvention\
  \ of backpropagation.[23]: 25 \n\n\nMachine learning (ML), reorganised and recognised\
  \ as its own field, started to flourish in the 1990s. The field changed its goal\
  \ from achieving artificial intelligence to tackling solvable problems of a practical\
  \ nature. It shifted focus away from the symbolic approaches it had inherited from\
  \ AI, and toward methods and models borrowed from statistics, fuzzy logic, and probability\
  \ theory.[24]\n\n\nThere is a close connection between machine learning and compression.\
  \ A system that predicts the posterior probabilities of a sequence given its entire\
  \ history can be used for optimal data compression (by using arithmetic coding on\
  \ the output distribution). Conversely, an optimal compressor can be used for prediction\
  \ (by finding the symbol that compresses best, given the previous history). This\
  \ equivalence has been used as a justification for using data compression as a benchmark\
  \ for \"general intelligence\".[25][26][27]\n\n\nAn alternative view can show compression\
  \ algorithms implicitly map strings into implicit feature space vectors, and compression-based\
  \ similarity measures compute similarity within these feature spaces. For each compressor\
  \ C(.) we define an associated vector space ℵ, such that C(.) maps an input string\
  \ x, corresponding to the vector norm ||~x||. An exhaustive examination of the feature\
  \ spaces underlying all compression algorithms is precluded by space; instead, feature\
  \ vectors chooses to examine three representative lossless compression methods,\
  \ LZW, LZ77, and PPM.[28]\n\n\nAccording to AIXI theory, a connection more directly\
  \ explained in Hutter Prize, the best possible compression of x is the smallest\
  \ possible software that generates x. For example, in that model, a zip file's compressed\
  \ size includes both the zip file and the unzipping software, since you can not\
  \ unzip it without both, but there may be an even smaller combined form.\n\n\nExamples\
  \ of AI-powered audio/video compression software include NVIDIA Maxine, AIVC.[29]\
  \ Examples of software that can perform AI-powered image compression include OpenCV,\
  \ TensorFlow, MATLAB's Image Processing Toolbox (IPT) and High-Fidelity Generative\
  \ Image Compression.[30]\n\n\nIn unsupervised machine learning, k-means clustering\
  \ can be utilized to compress data by grouping similar data points into clusters.\
  \ This technique simplifies handling extensive datasets that lack predefined labels\
  \ and finds widespread use in fields such as image compression.[31]\n\n\nData compression\
  \ aims to reduce the size of data files, enhancing storage efficiency and speeding\
  \ up data transmission. K-means clustering, an unsupervised machine learning algorithm,\
  \ is employed to partition a dataset into a specified number of clusters, k, each\
  \ represented by the centroid of its points. This process condenses extensive datasets\
  \ into a more compact set of representative points. Particularly beneficial in image\
  \ and signal processing, k-means clustering aids in data reduction by replacing\
  \ groups of data points with their centroids, thereby preserving the core information\
  \ of the original data while significantly decreasing the required storage space.[32]\n\
  \n\nLarge language models (LLMs) are also efficient lossless data compressors on\
  \ some data sets, as demonstrated by DeepMind's research with the Chinchilla 70B\
  \ model. Developed by DeepMind, Chinchilla 70B effectively compressed data, outperforming\
  \ conventional methods such as Portable Network Graphics (PNG) for images and Free\
  \ Lossless Audio Codec (FLAC) for audio. It achieved compression of image and audio\
  \ data to 43.4% and 16.4% of their original sizes, respectively. There is, however,\
  \ some reason to be concerned that the data set used for testing overlaps the LLM\
  \ training data set, making it possible that the Chinchilla 70B model is only an\
  \ efficient compression tool on data it has already been trained on.[33][34]\n\n\
  \nMachine learning and data mining often employ the same methods and overlap significantly,\
  \ but while machine learning focuses on prediction, based on known properties learned\
  \ from the training data, data mining focuses on the discovery of (previously) unknown\
  \ properties in the data (this is the analysis step of knowledge discovery in databases).\
  \ Data mining uses many machine learning methods, but with different goals; on the\
  \ other hand, machine learning also employs data mining methods as \"unsupervised\
  \ learning\" or as a preprocessing step to improve learner accuracy. Much of the\
  \ confusion between these two research communities (which do often have separate\
  \ conferences and separate journals, ECML PKDD being a major exception) comes from\
  \ the basic assumptions they work with: in machine learning, performance is usually\
  \ evaluated with respect to the ability to reproduce known knowledge, while in knowledge\
  \ discovery and data mining (KDD) the key task is the discovery of previously unknown\
  \ knowledge. Evaluated with respect to known knowledge, an uninformed (unsupervised)\
  \ method will easily be outperformed by other supervised methods, while in a typical\
  \ KDD task, supervised methods cannot be used due to the unavailability of training\
  \ data.[citation needed]\n\n\nMachine learning also has intimate ties to optimization:\
  \ Many learning problems are formulated as minimisation of some loss function on\
  \ a training set of examples. Loss functions express the discrepancy between the\
  \ predictions of the model being trained and the actual problem instances (for example,\
  \ in classification, one wants to assign a label to instances, and models are trained\
  \ to correctly predict the preassigned labels of a set of examples).[35]\n\n\nCharacterizing\
  \ the generalisation of various learning algorithms is an active topic of current\
  \ research, especially for deep learning algorithms.[citation needed]\n\n\nMachine\
  \ learning and statistics are closely related fields in terms of methods, but distinct\
  \ in their principal goal: statistics draws population inferences from a sample,\
  \ while machine learning finds generalisable predictive patterns.[36]\n\n\nConventional\
  \ statistical analyses require the a priori selection of a model most suitable for\
  \ the study data set. In addition, only significant or theoretically relevant variables\
  \ based on previous experience are included for analysis. In contrast, machine learning\
  \ is not built on a pre-structured model; rather, the data shape the model by detecting\
  \ underlying patterns. The more variables (input) used to train the model, the more\
  \ accurate the ultimate model will be.[37]\n\n\nLeo Breiman distinguished two statistical\
  \ modelling paradigms: data model and algorithmic model,[38] wherein \"algorithmic\
  \ model\" means more or less the machine learning algorithms like Random Forest.[clarification\
  \ needed]\n\n\nSome statisticians have adopted methods from machine learning, leading\
  \ to a combined field that they call statistical learning.[39]\n\n\nAnalytical and\
  \ computational techniques derived from deep-rooted physics of disordered systems\
  \ can be extended to large-scale problems, including machine learning, e.g., to\
  \ analyse the weight space of deep neural networks.[40] Statistical physics is thus\
  \ finding applications in the area of medical diagnostics.[41]\n\n\nA core objective\
  \ of a learner is to generalise from its experience.[2][42] Generalisation in this\
  \ context is the ability of a learning machine to perform accurately on new, unseen\
  \ examples/tasks after having experienced a learning data set. The training examples\
  \ come from some generally unknown probability distribution (considered representative\
  \ of the space of occurrences) and the learner has to build a general model about\
  \ this space that enables it to produce sufficiently accurate predictions in new\
  \ cases.\n\n\nThe computational analysis of machine learning algorithms and their\
  \ performance is a branch of theoretical computer science known as computational\
  \ learning theory via the probably approximately correct learning  model. Because\
  \ training sets are finite and the future is uncertain, learning theory usually\
  \ does not yield guarantees of the performance of algorithms. Instead, probabilistic\
  \ bounds on the performance are quite common. The bias–variance decomposition is\
  \ one way to quantify generalisation error.\n\n\nFor the best performance in the\
  \ context of generalisation, the complexity of the hypothesis should match the complexity\
  \ of the function underlying the data. If the hypothesis is less complex than the\
  \ function, then the model has underfitted the data. If the complexity of the model\
  \ is increased in response, then the training error decreases. But if the hypothesis\
  \ is too complex, then the model is subject to overfitting and generalisation will\
  \ be poorer.[43]\n\n\nIn addition to performance bounds, learning theorists study\
  \ the time complexity and feasibility of learning. In computational learning theory,\
  \ a computation is considered feasible if it can be done in polynomial time. There\
  \ are two kinds of time complexity results: Positive results show that a certain\
  \ class of functions can be learned in polynomial time. Negative results show that\
  \ certain classes cannot be learned in polynomial time.[citation needed]\n\n\n\n\
  \n\nMachine learning approaches are traditionally divided into three broad categories,\
  \ which correspond to learning paradigms, depending on the nature of the \"signal\"\
  \ or \"feedback\" available to the learning system:\n\n\nAlthough each algorithm\
  \ has advantages and limitations, no single algorithm works for all problems.[44][45][46]\n\
  \n\nSupervised learning algorithms build a mathematical model of a set of data that\
  \ contains both the inputs and the desired outputs.[47] The data, known as training\
  \ data, consists of a set of training examples. Each training example has one or\
  \ more inputs and the desired output, also known as a supervisory signal. In the\
  \ mathematical model, each training example is represented by an array or vector,\
  \ sometimes called a feature vector, and the training data is represented by a matrix.\
  \ Through iterative optimisation of an objective function, supervised learning algorithms\
  \ learn a function that can be used to predict the output associated with new inputs.[48]\
  \ An optimal function allows the algorithm to correctly determine the output for\
  \ inputs that were not a part of the training data. An algorithm that improves the\
  \ accuracy of its outputs or predictions over time is said to have learned to perform\
  \ that task.[15]\n\n\nTypes of supervised-learning algorithms include active learning,\
  \ classification and regression.[49] Classification algorithms are used when the\
  \ outputs are restricted to a limited set of values, while regression algorithms\
  \ are used when the outputs can take any numerical value within a range. For example,\
  \ in a classification algorithm that filters emails, the input is an incoming email,\
  \ and the output is the folder in which to file the email. In contrast, regression\
  \ is used for tasks such as predicting a person's height based on factors like age\
  \ and genetics or forecasting future temperatures based on historical data.[50]\n\
  \n\nSimilarity learning is an area of supervised machine learning closely related\
  \ to regression and classification, but the goal is to learn from examples using\
  \ a similarity function that measures how similar or related two objects are. It\
  \ has applications in ranking, recommendation systems, visual identity tracking,\
  \ face verification, and speaker verification.\n\n\nUnsupervised learning algorithms\
  \ find structures in data that has not been labelled, classified or categorised.\
  \ Instead of responding to feedback, unsupervised learning algorithms identify commonalities\
  \ in the data and react based on the presence or absence of such commonalities in\
  \ each new piece of data. Central applications of unsupervised machine learning\
  \ include clustering, dimensionality reduction,[4] and density estimation.[51]\n\
  \n\nCluster analysis is the assignment of a set of observations into subsets (called\
  \ clusters) so that observations within the same cluster are similar according to\
  \ one or more predesignated criteria, while observations drawn from different clusters\
  \ are dissimilar. Different clustering techniques make different assumptions on\
  \ the structure of the data, often defined by some similarity metric and evaluated,\
  \ for example, by internal compactness, or the similarity between members of the\
  \ same cluster, and separation, the difference between clusters. Other methods are\
  \ based on estimated density and graph connectivity.\n\n\nA special type of unsupervised\
  \ learning called self-supervised learning involves training a model by generating\
  \ the supervisory signal from the data itself.[52][53]\n\n\nDimensionality reduction\
  \ is a process of reducing the number of random variables under consideration by\
  \ obtaining a set of principal variables.[54] In other words, it is a process of\
  \ reducing the dimension of the feature set, also called the \"number of features\"\
  . Most of the dimensionality reduction techniques can be considered as either feature\
  \ elimination or extraction. One of the popular methods of dimensionality reduction\
  \ is principal component analysis (PCA). PCA involves changing higher-dimensional\
  \ data (e.g., 3D) to a smaller space (e.g., 2D).\nThe manifold hypothesis proposes\
  \ that high-dimensional data sets lie along low-dimensional manifolds, and many\
  \ dimensionality reduction techniques make this assumption, leading to the areas\
  \ of manifold learning and manifold regularisation.\n\n\nSemi-supervised learning\
  \ falls between unsupervised learning (without any labelled training data) and supervised\
  \ learning (with completely labelled training data). Some of the training examples\
  \ are missing training labels, yet many machine-learning researchers have found\
  \ that unlabelled data, when used in conjunction with a small amount of labelled\
  \ data, can produce a considerable improvement in learning accuracy.\n\n\nIn weakly\
  \ supervised learning, the training labels are noisy, limited, or imprecise; however,\
  \ these labels are often cheaper to obtain, resulting in larger effective training\
  \ sets.[55]\n\n\nReinforcement learning is an area of machine learning concerned\
  \ with how software agents ought to take actions in an environment to maximise some\
  \ notion of cumulative reward. Due to its generality, the field is studied in many\
  \ other disciplines, such as game theory, control theory, operations research, information\
  \ theory, simulation-based optimisation, multi-agent systems, swarm intelligence,\
  \ statistics and genetic algorithms. In reinforcement learning, the environment\
  \ is typically represented as a Markov decision process (MDP). Many reinforcement\
  \ learning algorithms use dynamic programming techniques.[56] Reinforcement learning\
  \ algorithms do not assume knowledge of an exact mathematical model of the MDP and\
  \ are used when exact models are infeasible. Reinforcement learning algorithms are\
  \ used in autonomous vehicles or in learning to play a game against a human opponent.\n\
  \n\nOther approaches have been developed which do not fit neatly into this three-fold\
  \ categorisation, and sometimes more than one is used by the same machine learning\
  \ system. For example, topic modelling, meta-learning.[57]\n\n\nSelf-learning, as\
  \ a machine learning paradigm, was introduced in 1982 along with a neural network\
  \ capable of self-learning, named crossbar adaptive array (CAA).[58][59] It gives\
  \ a solution to the problem learning without any external reward, by introducing\
  \ emotion as an internal reward. Emotion is used as a state evaluation of a self-learning\
  \ agent. The CAA self-learning algorithm computes, in a crossbar fashion, both decisions\
  \ about actions and emotions (feelings) about consequence situations. The system\
  \ is driven by the interaction between cognition and emotion.[60]\nThe self-learning\
  \ algorithm updates a memory matrix W =||w(a,s)|| such that in each iteration executes\
  \ the following machine learning routine: \n\n\nIt is a system with only one input,\
  \ situation, and only one output, action (or behaviour) a. There is neither a separate\
  \ reinforcement input nor an advice input from the environment. The backpropagated\
  \ value (secondary reinforcement) is the emotion toward the consequence situation.\
  \ The CAA exists in two environments, one is the behavioural environment where it\
  \ behaves, and the other is the genetic environment, wherefrom it initially and\
  \ only once receives initial emotions about situations to be encountered in the\
  \ behavioural environment. After receiving the genome (species) vector from the\
  \ genetic environment, the CAA learns a goal-seeking behaviour in an environment\
  \ that contains both desirable and undesirable situations.[61]\n\n\nSeveral learning\
  \ algorithms aim at discovering better representations of the inputs provided during\
  \ training.[62] Classic examples include principal component analysis and cluster\
  \ analysis. Feature learning algorithms, also called representation learning algorithms,\
  \ often attempt to preserve the information in their input but also transform it\
  \ in a way that makes it useful, often as a pre-processing step before performing\
  \ classification or predictions. This technique allows reconstruction of the inputs\
  \ coming from the unknown data-generating distribution, while not being necessarily\
  \ faithful to configurations that are implausible under that distribution. This\
  \ replaces manual feature engineering, and allows a machine to both learn the features\
  \ and use them to perform a specific task.\n\n\nFeature learning can be either supervised\
  \ or unsupervised. In supervised feature learning, features are learned using labelled\
  \ input data. Examples include artificial neural networks, multilayer perceptrons,\
  \ and supervised dictionary learning. In unsupervised feature learning, features\
  \ are learned with unlabelled input data.  Examples include dictionary learning,\
  \ independent component analysis, autoencoders, matrix factorisation[63] and various\
  \ forms of clustering.[64][65][66]\n\n\nManifold learning algorithms attempt to\
  \ do so under the constraint that the learned representation is low-dimensional.\
  \ Sparse coding algorithms attempt to do so under the constraint that the learned\
  \ representation is sparse, meaning that the mathematical model has many zeros.\
  \ Multilinear subspace learning algorithms aim to learn low-dimensional representations\
  \ directly from tensor representations for multidimensional data, without reshaping\
  \ them into higher-dimensional vectors.[67] Deep learning algorithms discover multiple\
  \ levels of representation, or a hierarchy of features, with higher-level, more\
  \ abstract features defined in terms of (or generating) lower-level features. It\
  \ has been argued that an intelligent machine learns a representation that disentangles\
  \ the underlying factors of variation that explain the observed data.[68]\n\n\n\
  Feature learning is motivated by the fact that machine learning tasks such as classification\
  \ often require input that is mathematically and computationally convenient to process.\
  \ However, real-world data such as images, video, and sensory data have not yielded\
  \ attempts to algorithmically define specific features. An alternative is to discover\
  \ such features or representations through examination, without relying on explicit\
  \ algorithms.\n\n\nSparse dictionary learning is a feature learning method where\
  \ a training example is represented as a linear combination of basis functions and\
  \ assumed to be a sparse matrix. The method is strongly NP-hard and difficult to\
  \ solve approximately.[69] A popular heuristic method for sparse dictionary learning\
  \ is the k-SVD algorithm. Sparse dictionary learning has been applied in several\
  \ contexts. In classification, the problem is to determine the class to which a\
  \ previously unseen training example belongs. For a dictionary where each class\
  \ has already been built, a new training example is associated with the class that\
  \ is best sparsely represented by the corresponding dictionary. Sparse dictionary\
  \ learning has also been applied in image denoising. The key idea is that a clean\
  \ image patch can be sparsely represented by an image dictionary, but the noise\
  \ cannot.[70]\n\n\nIn data mining, anomaly detection, also known as outlier detection,\
  \ is the identification of rare items, events or observations that raise suspicions\
  \ by differing significantly from the majority of the data.[71] Typically, the anomalous\
  \ items represent an issue such as bank fraud, a structural defect, medical problems\
  \ or errors in a text. Anomalies are referred to as outliers, novelties, noise,\
  \ deviations and exceptions.[72]\n\n\nIn particular, in the context of abuse and\
  \ network intrusion detection, the interesting objects are often not rare, but unexpected\
  \ bursts of inactivity. This pattern does not adhere to the common statistical definition\
  \ of an outlier as a rare object. Many outlier detection methods (in particular,\
  \ unsupervised algorithms) will fail on such data unless aggregated appropriately.\
  \ Instead, a cluster analysis algorithm may be able to detect the micro-clusters\
  \ formed by these patterns.[73]\n\n\nThree broad categories of anomaly detection\
  \ techniques exist.[74] Unsupervised anomaly detection techniques detect anomalies\
  \ in an unlabelled test data set under the assumption that the majority of the instances\
  \ in the data set are normal, by looking for instances that seem to fit the least\
  \ to the remainder of the data set. Supervised anomaly detection techniques require\
  \ a data set that has been labelled as \"normal\" and \"abnormal\" and involves\
  \ training a classifier (the key difference from many other statistical classification\
  \ problems is the inherently unbalanced nature of outlier detection). Semi-supervised\
  \ anomaly detection techniques construct a model representing normal behaviour from\
  \ a given normal training data set and then test the likelihood of a test instance\
  \ being generated by the model.\n\n\nRobot learning is inspired by a multitude of\
  \ machine learning methods, starting from supervised learning, reinforcement learning,[75][76]\
  \ and finally meta-learning (e.g. MAML).\n\n\nAssociation rule learning is a rule-based\
  \ machine learning method for discovering relationships between variables in large\
  \ databases. It is intended to identify strong rules discovered in databases using\
  \ some measure of \"interestingness\".[77]\n\n\nRule-based machine learning is a\
  \ general term for any machine learning method that identifies, learns, or evolves\
  \ \"rules\" to store, manipulate or apply knowledge. The defining characteristic\
  \ of a rule-based machine learning algorithm is the identification and utilisation\
  \ of a set of relational rules that collectively represent the knowledge captured\
  \ by the system. This is in contrast to other machine learning algorithms that commonly\
  \ identify a singular model that can be universally applied to any instance in order\
  \ to make a prediction.[78] Rule-based machine learning approaches include learning\
  \ classifier systems, association rule learning, and artificial immune systems.\n\
  \n\nBased on the concept of strong rules, Rakesh Agrawal, Tomasz Imieliński and\
  \ Arun Swami introduced association rules for discovering regularities between products\
  \ in large-scale transaction data recorded by point-of-sale (POS) systems in supermarkets.[79]\
  \ For example, the rule \n\n\n\n{\n\no\nn\ni\no\nn\ns\n,\np\no\nt\na\nt\no\ne\n\
  s\n\n}\n⇒\n{\n\nb\nu\nr\ng\ne\nr\n\n}\n\n\n{\\displaystyle \\{\\mathrm {onions,potatoes}\
  \ \\}\\Rightarrow \\{\\mathrm {burger} \\}}\n\n found in the sales data of a supermarket\
  \ would indicate that if a customer buys onions and potatoes together, they are\
  \ likely to also buy hamburger meat. Such information can be used as the basis for\
  \ decisions about marketing activities such as promotional pricing or product placements.\
  \ In addition to market basket analysis, association rules are employed today in\
  \ application areas including Web usage mining, intrusion detection, continuous\
  \ production, and bioinformatics. In contrast with sequence mining, association\
  \ rule learning typically does not consider the order of items either within a transaction\
  \ or across transactions.\n\n\nLearning classifier systems (LCS) are a family of\
  \ rule-based machine learning algorithms that combine a discovery component, typically\
  \ a genetic algorithm, with a learning component, performing either supervised learning,\
  \ reinforcement learning, or unsupervised learning. They seek to identify a set\
  \ of context-dependent rules that collectively store and apply knowledge in a piecewise\
  \ manner to make predictions.[80]\n\n\nInductive logic programming (ILP) is an approach\
  \ to rule learning using logic programming as a uniform representation for input\
  \ examples, background knowledge, and hypotheses. Given an encoding of the known\
  \ background knowledge and a set of examples represented as a logical database of\
  \ facts, an ILP system will derive a hypothesized logic program that entails all\
  \ positive and no negative examples. Inductive programming is a related field that\
  \ considers any kind of programming language for representing hypotheses (and not\
  \ only logic programming), such as functional programs.\n\n\nInductive logic programming\
  \ is particularly useful in bioinformatics and natural language processing. Gordon\
  \ Plotkin and Ehud Shapiro laid the initial theoretical foundation for inductive\
  \ machine learning in a logical setting.[81][82][83] Shapiro built their first implementation\
  \ (Model Inference System) in 1981: a Prolog program that inductively inferred logic\
  \ programs from positive and negative examples.[84] The term inductive here refers\
  \ to philosophical induction, suggesting a theory to explain observed facts, rather\
  \ than mathematical induction, proving a property for all members of a well-ordered\
  \ set.\n\n\nA machine learning model is a type of mathematical model that, once\
  \ \"trained\" on a given dataset, can be used to make predictions or classifications\
  \ on new data. During training, a learning algorithm iteratively adjusts the model's\
  \ internal parameters to minimise errors in its predictions.[85] By extension, the\
  \ term \"model\" can refer to several levels of specificity, from a general class\
  \ of models and their associated learning algorithms to a fully trained model with\
  \ all its internal parameters tuned.[86]\n\n\nVarious types of models have been\
  \ used and researched for machine learning systems, picking the best model for a\
  \ task is called model selection.\n\n\nArtificial neural networks (ANNs), or connectionist\
  \ systems, are computing systems vaguely inspired by the biological neural networks\
  \ that constitute animal brains. Such systems \"learn\" to perform tasks by considering\
  \ examples, generally without being programmed with any task-specific rules.\n\n\
  \nAn ANN is a model based on a collection of connected units or nodes called \"\
  artificial neurons\", which loosely model the neurons in a biological brain. Each\
  \ connection, like the synapses in a biological brain, can transmit information,\
  \ a \"signal\", from one artificial neuron to another. An artificial neuron that\
  \ receives a signal can process it and then signal additional artificial neurons\
  \ connected to it. In common ANN implementations, the signal at a connection between\
  \ artificial neurons is a real number, and the output of each artificial neuron\
  \ is computed by some non-linear function of the sum of its inputs. The connections\
  \ between artificial neurons are called \"edges\". Artificial neurons and edges\
  \ typically have a weight that adjusts as learning proceeds. The weight increases\
  \ or decreases the strength of the signal at a connection. Artificial neurons may\
  \ have a threshold such that the signal is only sent if the aggregate signal crosses\
  \ that threshold. Typically, artificial neurons are aggregated into layers. Different\
  \ layers may perform different kinds of transformations on their inputs. Signals\
  \ travel from the first layer (the input layer) to the last layer (the output layer),\
  \ possibly after traversing the layers multiple times.\n\n\nThe original goal of\
  \ the ANN approach was to solve problems in the same way that a human brain would.\
  \ However, over time, attention moved to performing specific tasks, leading to deviations\
  \ from biology. Artificial neural networks have been used on a variety of tasks,\
  \ including computer vision, speech recognition, machine translation, social network\
  \ filtering, playing board and video games and medical diagnosis.\n\n\nDeep learning\
  \ consists of multiple hidden layers in an artificial neural network. This approach\
  \ tries to model the way the human brain processes light and sound into vision and\
  \ hearing. Some successful applications of deep learning are computer vision and\
  \ speech recognition.[87]\n\n\nDecision tree learning uses a decision tree as a\
  \ predictive model to go from observations about an item (represented in the branches)\
  \ to conclusions about the item's target value (represented in the leaves). It is\
  \ one of the predictive modelling approaches used in statistics, data mining, and\
  \ machine learning. Tree models where the target variable can take a discrete set\
  \ of values are called classification trees; in these tree structures, leaves represent\
  \ class labels, and branches represent conjunctions of features that lead to those\
  \ class labels. Decision trees where the target variable can take continuous values\
  \ (typically real numbers) are called regression trees. In decision analysis, a\
  \ decision tree can be used to visually and explicitly represent decisions and decision\
  \ making. In data mining, a decision tree describes data, but the resulting classification\
  \ tree can be an input for decision-making.\n\n\nRandom forest regression (RFR)\
  \ falls under the umbrella of decision tree-based models. RFR is an ensemble learning\
  \ method that builds multiple decision trees and averages their predictions to improve\
  \ accuracy and to avoid overfitting. To build decision trees, RFR uses bootstrapped\
  \ sampling; for instance, each decision tree is trained on random data from the\
  \ training set. This random selection of RFR for training enables the model to reduce\
  \ biased predictions and achieve a higher degree of accuracy. RFR generates independent\
  \ decision trees, and it can work on single-output data as well as multiple regressor\
  \ tasks. This makes RFR compatible to be use in various applications.[88][89]\n\n\
  \nSupport-vector machines (SVMs), also known as support-vector networks, are a set\
  \ of related supervised learning methods used for classification and regression.\
  \ Given a set of training examples, each marked as belonging to one of two categories,\
  \ an SVM training algorithm builds a model that predicts whether a new example falls\
  \ into one category.[90] An SVM training algorithm is a non-probabilistic, binary,\
  \ linear classifier, although methods such as Platt scaling exist to use SVM in\
  \ a probabilistic classification setting. In addition to performing linear classification,\
  \ SVMs can efficiently perform a non-linear classification using what is called\
  \ the kernel trick, implicitly mapping their inputs into high-dimensional feature\
  \ spaces.\n\n\nRegression analysis encompasses a large variety of statistical methods\
  \ to estimate the relationship between input variables and their associated features.\
  \ Its most common form is linear regression, where a single line is drawn to best\
  \ fit the given data according to a mathematical criterion such as ordinary least\
  \ squares. The latter is often extended by regularisation methods to mitigate overfitting\
  \ and bias, as in ridge regression. When dealing with non-linear problems, go-to\
  \ models include polynomial regression (for example, used for trendline fitting\
  \ in Microsoft Excel[91]), logistic regression (often used in statistical classification)\
  \ or even kernel regression, which introduces non-linearity by taking advantage\
  \ of the kernel trick to implicitly map input variables to higher-dimensional space.\n\
  \n\nMultivariate linear regression extends the concept of linear regression to handle\
  \ multiple dependent variables simultaneously. This approach estimates the relationships\
  \ between a set of input variables and several output variables by fitting a multidimensional\
  \ linear model. It is particularly useful in scenarios where outputs are interdependent\
  \ or share underlying patterns, such as predicting multiple economic indicators\
  \ or reconstructing images,[92] which are inherently multi-dimensional.\n\n\nA Bayesian\
  \ network, belief network, or directed acyclic graphical model is a probabilistic\
  \ graphical model that represents a set of random variables and their conditional\
  \ independence with a directed acyclic graph (DAG). For example, a Bayesian network\
  \ could represent the probabilistic relationships between diseases and symptoms.\
  \ Given symptoms, the network can be used to compute the probabilities of the presence\
  \ of various diseases. Efficient algorithms exist that perform inference and learning.\
  \ Bayesian networks that model sequences of variables, like speech signals or protein\
  \ sequences, are called dynamic Bayesian networks. Generalisations of Bayesian networks\
  \ that can represent and solve decision problems under uncertainty are called influence\
  \ diagrams.\n\n\nA Gaussian process is a stochastic process in which every finite\
  \ collection of the random variables in the process has a multivariate normal distribution,\
  \ and it relies on a pre-defined covariance function, or kernel, that models how\
  \ pairs of points relate to each other depending on their locations.\n\n\nGiven\
  \ a set of observed points, or input–output examples, the distribution of the (unobserved)\
  \ output of a new point as a function of its input data can be directly computed\
  \ by looking at the observed points and the covariances between those points and\
  \ the new, unobserved point.\n\n\nGaussian processes are popular surrogate models\
  \ in Bayesian optimisation used to do hyperparameter optimisation.\n\n\nA genetic\
  \ algorithm (GA) is a search algorithm and heuristic technique that mimics the process\
  \ of natural selection, using methods such as mutation and crossover to generate\
  \ new genotypes in the hope of finding good solutions to a given problem. In machine\
  \ learning, genetic algorithms were used in the 1980s and 1990s.[94][95] Conversely,\
  \ machine learning techniques have been used to improve the performance of genetic\
  \ and evolutionary algorithms.[96]\n\n\nThe theory of belief functions, also referred\
  \ to as evidence theory or Dempster–Shafer theory, is a general framework for reasoning\
  \ with uncertainty, with understood connections to other frameworks such as probability,\
  \ possibility and  imprecise probability theories. These theoretical frameworks\
  \ can be thought of as a kind of learner and have some analogous properties of how\
  \ evidence is combined (e.g.,  Dempster's rule of combination), just like how in\
  \ a pmf-based Bayesian approach would combine probabilities.[97] However, there\
  \ are many caveats to these beliefs functions when compared to Bayesian approaches\
  \ to incorporate ignorance and uncertainty quantification. These belief function\
  \ approaches that are implemented within the machine learning domain typically leverage\
  \ a fusion approach of various ensemble methods to better handle the learner's decision\
  \ boundary, low samples, and ambiguous class issues that standard machine learning\
  \ approach tend to have difficulty resolving.[98][6] However, the computational\
  \ complexity of these algorithms is dependent on the number of propositions (classes),\
  \ and can lead to a much higher computation time when compared to other machine\
  \ learning approaches.\n\n\nRule-based machine learning (RBML) is a branch of machine\
  \ learning that automatically discovers and learns 'rules' from data. It provides\
  \ interpretable models, making it useful for decision-making in fields like healthcare,\
  \ fraud detection, and cybersecurity. Key RBML techniques includes learning classifier\
  \ systems,[99] association rule learning,[100] artificial immune systems,[101] and\
  \ other similar models. These methods extract patterns from data and evolve rules\
  \ over time.\n\n\nTypically, machine learning models require a high quantity of\
  \ reliable data to perform accurate predictions. When training a machine learning\
  \ model, machine learning engineers need to target and collect a large and representative\
  \ sample of data. Data from the training set can be as varied as a corpus of text,\
  \ a collection of images, sensor data, and data collected from individual users\
  \ of a service. Overfitting is something to watch out for when training a machine\
  \ learning model. Trained models derived from biased or non-evaluated data can result\
  \ in skewed or undesired predictions. Biased models may result in detrimental outcomes,\
  \ thereby furthering the negative impacts on society or objectives. Algorithmic\
  \ bias is a potential result of data not being fully prepared for training. Machine\
  \ learning ethics is becoming a field of study and, notably, becoming integrated\
  \ within machine learning engineering teams.\n\n\nFederated learning is an adapted\
  \ form of distributed artificial intelligence to train machine learning models that\
  \ decentralises the training process, allowing for users' privacy to be maintained\
  \ by not needing to send their data to a centralised server. This also increases\
  \ efficiency by decentralising the training process to many devices. For example,\
  \ Gboard uses federated machine learning to train search query prediction models\
  \ on users' mobile phones without having to send individual searches back to Google.[102]\n\
  \n\nThere are many applications for machine learning, including:\n\n\nIn 2006, the\
  \ media-services provider Netflix held the first \"Netflix Prize\" competition to\
  \ find a program to better predict user preferences and improve the accuracy of\
  \ its existing Cinematch movie recommendation algorithm by at least 10%. A joint\
  \ team made up of researchers from AT&T Labs-Research in collaboration with the\
  \ teams Big Chaos and Pragmatic Theory built an ensemble model to win the Grand\
  \ Prize in 2009 for $1 million.[106] Shortly after the prize was awarded, Netflix\
  \ realised that viewers' ratings were not the best indicators of their viewing patterns\
  \ (\"everything is a recommendation\") and they changed their recommendation engine\
  \ accordingly.[107] In 2010, an article in The Wall Street Journal noted the use\
  \ of machine learning by Rebellion Research to predict the 2008 financial crisis.[108]\
  \ In 2012, co-founder of Sun Microsystems, Vinod Khosla, predicted that 80% of medical\
  \ doctors jobs would be lost in the next two decades to automated machine learning\
  \ medical diagnostic software.[109] In 2014, it was reported that a machine learning\
  \ algorithm had been applied in the field of art history to study fine art paintings\
  \ and that it may have revealed previously unrecognised influences among artists.[110]\
  \ In 2019 Springer Nature published the first research book created using machine\
  \ learning.[111] In 2020, machine learning technology was used to help make diagnoses\
  \ and aid researchers in developing a cure for COVID-19.[112] Machine learning was\
  \ recently applied to predict the pro-environmental behaviour of travellers.[113]\
  \ Recently, machine learning technology was also applied to optimise smartphone's\
  \ performance and thermal behaviour based on the user's interaction with the phone.[114][115][116]\
  \ When applied correctly, machine learning algorithms (MLAs) can utilise a wide\
  \ range of company characteristics to predict stock returns without overfitting.\
  \ By employing effective feature engineering and combining forecasts, MLAs can generate\
  \ results that far surpass those obtained from basic linear techniques like OLS.[117]\n\
  \n\nRecent advancements in machine learning have extended into the field of quantum\
  \ chemistry, where novel algorithms now enable the prediction of solvent effects\
  \ on chemical reactions, thereby offering new tools for chemists to tailor experimental\
  \ conditions for optimal outcomes.[118]\n\n\nMachine Learning is becoming a useful\
  \ tool to investigate and predict evacuation decision-making in large-scale and\
  \ small-scale disasters. Different solutions have been tested to predict if and\
  \ when householders decide to evacuate during wildfires and hurricanes.[119][120][121]\
  \ Other applications have been focusing on pre evacuation decisions in building\
  \ fires.[122][123]\n\n\nAlthough machine learning has been transformative in some\
  \ fields, machine-learning programs often fail to deliver expected results.[124][125][126]\
  \ Reasons for this are numerous: lack of (suitable) data, lack of access to the\
  \ data, data bias, privacy problems, badly chosen tasks and algorithms, wrong tools\
  \ and people, lack of resources, and evaluation problems.[127]\n\n\nThe \"black\
  \ box theory\" poses another yet significant challenge. Black box refers to a situation\
  \ where the algorithm or the process of producing an output is entirely opaque,\
  \ meaning that even the coders of the algorithm cannot audit the pattern that the\
  \ machine extracted from the data.[128] The House of Lords Select Committee, which\
  \ claimed that such an \"intelligence system\" that could have a \"substantial impact\
  \ on an individual's life\" would not be considered acceptable unless it provided\
  \ \"a full and satisfactory explanation for the decisions\" it makes.[128]\n\n\n\
  In 2018, a self-driving car from Uber failed to detect a pedestrian, who was killed\
  \ after a collision.[129] Attempts to use machine learning in healthcare with the\
  \ IBM Watson system failed to deliver even after years of time and billions of dollars\
  \ invested.[130][131] Microsoft's Bing Chat chatbot has been reported to produce\
  \ hostile and offensive response against its users.[132]\n\n\nMachine learning has\
  \ been used as a strategy to update the evidence related to a systematic review\
  \ and increased reviewer burden related to the growth of biomedical literature.\
  \ While it has improved with training sets, it has not yet developed sufficiently\
  \ to reduce the workload burden without limiting the necessary sensitivity for the\
  \ findings research itself.[133]\n\n\nExplainable AI (XAI), or Interpretable AI,\
  \ or Explainable Machine Learning (XML), is artificial intelligence (AI) in which\
  \ humans can understand the decisions or predictions made by the AI.[134] It contrasts\
  \ with the \"black box\" concept in machine learning where even its designers cannot\
  \ explain why an AI arrived at a specific decision.[135] By refining the mental\
  \ models of users of AI-powered systems and dismantling their misconceptions, XAI\
  \ promises to help users perform more effectively. XAI may be an implementation\
  \ of the social right to explanation.\n\n\nSettling on a bad, overly complex theory\
  \ gerrymandered to fit all the past training data is known as overfitting. Many\
  \ systems attempt to reduce overfitting by rewarding a theory in accordance with\
  \ how well it fits the data but penalising the theory in accordance with how complex\
  \ the theory is.[136]\n\n\nLearners can also be disappointed by \"learning the wrong\
  \ lesson\". A toy example is that an image classifier trained only on pictures of\
  \ brown horses and black cats might conclude that all brown patches are likely to\
  \ be horses.[137] A real-world example is that, unlike humans, current image classifiers\
  \ often do not primarily make judgments from the spatial relationship between components\
  \ of the picture, and they learn relationships between pixels that humans are oblivious\
  \ to, but that still correlate with images of certain types of real objects. Modifying\
  \ these patterns on a legitimate image can result in \"adversarial\" images that\
  \ the system misclassifies.[138][139]\n\n\nAdversarial vulnerabilities can also\
  \ result in nonlinear systems or from non-pattern perturbations. For some systems,\
  \ it is possible to change the output by only changing a single adversarially chosen\
  \ pixel.[140] Machine learning models are often vulnerable to manipulation or evasion\
  \ via adversarial machine learning.[141]\n\n\nResearchers have demonstrated how\
  \ backdoors can be placed undetectably into classifying (e.g., for categories \"\
  spam\" and \"not spam\" of posts) machine learning models that are often developed\
  \ or trained by third parties. Parties can change the classification of any input,\
  \ including in cases for which a type of data/software transparency is provided,\
  \ possibly including white-box access.[142][143][144]\n\n\nClassification of machine\
  \ learning models can be validated by accuracy estimation techniques like the holdout\
  \ method, which splits the data into a training and test set (conventionally 2/3\
  \ training set and 1/3 test set designation) and evaluates the performance of the\
  \ training model on the test set. In comparison, the K-fold-cross-validation method\
  \ randomly partitions the data into K subsets and then K experiments are performed\
  \ each considering 1 subset for evaluation and the remaining K-1 subsets for training\
  \ the model. In addition to the holdout and cross-validation methods, bootstrap,\
  \ which samples n instances with replacement from the dataset, can be used to assess\
  \ model accuracy.[145]\n\n\nIn addition to overall accuracy, investigators frequently\
  \ report sensitivity and specificity, meaning true positive rate (TPR) and true\
  \ negative rate (TNR), respectively. Similarly, investigators sometimes report the\
  \ false positive rate (FPR) as well as the false negative rate (FNR). However, these\
  \ rates are ratios that fail to reveal their numerators and denominators. Receiver\
  \ operating characteristic (ROC), along with the accompanying Area Under the ROC\
  \ Curve (AUC), offer additional tools for classification model assessment. Higher\
  \ AUC is associated with a better performing model.[146]\n\n\n\n\n\nThe ethics of\
  \ artificial intelligence covers a broad range of topics within AI that are considered\
  \ to have particular ethical stakes.[147] This includes algorithmic biases, fairness,\
  \ accountability, transparency, privacy, and regulation, particularly where systems\
  \ influence or automate human decision-making. It also covers various emerging or\
  \ potential future challenges such as machine ethics (how to make machines that\
  \ behave ethically), lethal autonomous weapon systems, arms race dynamics, AI safety\
  \ and alignment, technological unemployment, AI-enabled misinformation,[148] how\
  \ to treat certain AI systems if they have a moral status (AI welfare and rights),\
  \ artificial superintelligence and existential risks.[147]\n\n\nSome application\
  \ areas may also have particularly important ethical implications, like healthcare,\
  \ education, criminal justice, or the military.\n\n\nDifferent machine learning\
  \ approaches can suffer from different data biases. A machine learning system trained\
  \ specifically on current customers may not be able to predict the needs of new\
  \ customer groups that are not represented in the training data. When trained on\
  \ human-made data, machine learning is likely to pick up the constitutional and\
  \ unconscious biases already present in society.[149]\n\n\nSystems that are trained\
  \ on datasets collected with biases may exhibit these biases upon use (algorithmic\
  \ bias), thus digitising cultural prejudices.[150] For example, in 1988, the UK's\
  \ Commission for Racial Equality found that St. George's Medical School had been\
  \ using a computer program trained from data of previous admissions staff and this\
  \ program had denied nearly 60 candidates who were found to either be women or have\
  \ non-European-sounding names.[149] Using job hiring data from a firm with racist\
  \ hiring policies may lead to a machine learning system duplicating the bias by\
  \ scoring job applicants by similarity to previous successful applicants.[151][152]\
  \ Another example includes predictive policing company Geolitica's predictive algorithm\
  \ that resulted in \"disproportionately high levels of over-policing in low-income\
  \ and minority communities\" after being trained with historical crime data.[153]\n\
  \n\nWhile responsible collection of data and documentation of algorithmic rules\
  \ used by a system is considered a critical part of machine learning, some researchers\
  \ blame the lack of participation and representation of minority populations in\
  \ the field of AI for machine learning's vulnerability to biases.[154] In fact,\
  \ according to research carried out by the Computing Research Association in 2021,\
  \ \"female faculty make up just 16.1%\" of all faculty members who focus on AI among\
  \ several universities around the world.[155] Furthermore, among the group of \"\
  new U.S. resident AI PhD graduates,\" 45% identified as white, 22.4% as Asian, 3.2%\
  \ as Hispanic, and 2.4% as African American, which further demonstrates a lack of\
  \ diversity in the field of AI.[155]\n\n\nLanguage models learned from data have\
  \ been shown to contain human-like biases.[156][157] Because human languages contain\
  \ biases, machines trained on language corpora will necessarily also learn these\
  \ biases.[158][159] In 2016, Microsoft tested Tay, a chatbot that learned from Twitter,\
  \ and it quickly picked up racist and sexist language.[160]\n\n\nIn an experiment\
  \ carried out by ProPublica, an investigative journalism organisation, a machine\
  \ learning algorithm's insight into the recidivism rates among prisoners falsely\
  \ flagged \"black defendants high risk twice as often as white defendants\".[153]\
  \ In 2015, Google Photos once tagged a couple of black people as gorillas, which\
  \ caused controversy. The gorilla label was subsequently removed, and in 2023, it\
  \ still cannot recognise gorillas.[161] Similar issues with recognising non-white\
  \ people have been found in many other systems.[162]\n\n\nBecause of such challenges,\
  \ the effective use of machine learning may take longer to be adopted in other domains.[163]\
  \ Concern for fairness in machine learning, that is, reducing bias in machine learning\
  \ and propelling its use for human good, is increasingly expressed by artificial\
  \ intelligence scientists, including Fei-Fei Li, who said that \"[t]here's nothing\
  \ artificial about AI. It's inspired by people, it's created by people, and—most\
  \ importantly—it impacts people. It is a powerful tool we are only just beginning\
  \ to understand, and that is a profound responsibility.\"[164]\n\n\nThere are concerns\
  \ among health care professionals that these systems might not be designed in the\
  \ public's interest but as income-generating machines. This is especially true in\
  \ the United States, where there is a long-standing ethical dilemma of improving\
  \ health care, but also increasing profits. For example, the algorithms could be\
  \ designed to provide patients with unnecessary tests or medication in which the\
  \ algorithm's proprietary owners hold stakes. There is potential for machine learning\
  \ in health care to provide professionals with an additional tool to diagnose, medicate,\
  \ and plan recovery paths for patients, but this requires these biases to be mitigated.[165]\n\
  \n\nSince the 2010s, advances in both machine learning algorithms and computer hardware\
  \ have led to more efficient methods for training deep neural networks (a particular\
  \ narrow subdomain of machine learning) that contain many layers of nonlinear hidden\
  \ units.[166] By 2019, graphics processing units (GPUs), often with AI-specific\
  \ enhancements, had displaced CPUs as the dominant method of training large-scale\
  \ commercial cloud AI.[167] OpenAI estimated the hardware compute used in the largest\
  \ deep learning projects from AlexNet (2012) to AlphaZero (2017), and found a 300,000-fold\
  \ increase in the amount of compute required, with a doubling-time trendline of\
  \ 3.4 months.[168][169]\n\n\nTensor Processing Units (TPUs) are specialised hardware\
  \ accelerators developed by Google specifically for machine learning workloads.\
  \ Unlike general-purpose GPUs and FPGAs, TPUs are optimised for tensor computations,\
  \ making them particularly efficient for deep learning tasks such as training and\
  \ inference. They are widely used in Google Cloud AI services and large-scale machine\
  \ learning models like Google's DeepMind AlphaFold and large language models. TPUs\
  \ leverage matrix multiplication units and high-bandwidth memory to accelerate computations\
  \ while maintaining energy efficiency.[170] Since their introduction in 2016, TPUs\
  \ have become a key component of AI infrastructure, especially in cloud-based environments.\n\
  \n\nNeuromorphic computing refers to a class of computing systems designed to emulate\
  \ the structure and functionality of biological neural networks. These systems may\
  \ be implemented through software-based simulations on conventional hardware or\
  \ through specialised hardware architectures.[171]\n\n\nA physical neural network\
  \ is a specific type of neuromorphic hardware that relies on electrically adjustable\
  \ materials, such as memristors, to emulate the function of neural synapses. The\
  \ term \"physical neural network\" highlights the use of physical hardware for computation,\
  \ as opposed to software-based implementations. It broadly refers to artificial\
  \ neural networks that use materials with adjustable resistance to replicate neural\
  \ synapses.[172][173]\n\n\nEmbedded machine learning is a sub-field of machine learning\
  \ where models are deployed on embedded systems with limited computing resources,\
  \ such as wearable computers, edge devices and microcontrollers.[174][175][176][177]\
  \ Running models directly on these devices eliminates the need to transfer and store\
  \ data on cloud servers for further processing, thereby reducing the risk of data\
  \ breaches, privacy leaks and theft of intellectual property, personal data and\
  \ business secrets. Embedded machine learning can be achieved through various techniques,\
  \ such as hardware acceleration,[178][179] approximate computing,[180] and model\
  \ optimisation.[181][182] Common optimisation techniques include pruning, quantisation,\
  \ knowledge distillation, low-rank factorisation, network architecture search, and\
  \ parameter sharing.\n"
