content: "Moral psychology is the study of human thought and behavior in ethical contexts.[1]\
  \ Historically, the term \"moral psychology\" was used relatively narrowly to refer\
  \ to the study of moral development.[2][3] This field of study is interdisciplinary\
  \ between the application of philosophy and psychology. Moral psychology eventually\
  \ came to refer more broadly to various topics at the intersection of ethics, psychology,\
  \ and philosophy of mind.[4][5][6] Some of the main topics of the field are moral\
  \ judgment, moral reasoning, moral satisficing, moral sensitivity, moral responsibility,\
  \ moral motivation, moral identity, moral action, moral development, moral diversity,\
  \ moral character (especially as related to virtue ethics), altruism, psychological\
  \ egoism, moral luck, moral forecasting, moral emotion, affective forecasting, and\
  \ moral disagreement.[7][8]\n\n\nToday, moral psychology is a thriving area of research\
  \ spanning many disciplines,[9] with major bodies of research on the biological,[10][11]\
  \ cognitive/computational[12][13][14] and cultural[15][16] basis of moral judgment\
  \ and behavior, and a growing body of research on moral judgment in the context\
  \ of artificial intelligence.[17][18]\n\n\nThe origins of moral psychology can be\
  \ traced back to early philosophical works, largely concerned with moral education,\
  \ such as by Plato and Aristotle in Ancient Greece,[19][20] as well as from the\
  \ Buddhist[21] and Confucian traditions.[22][23][24] Empirical studies of moral\
  \ judgment go back at least as far as the 1890s with the work of Frank Chapman Sharp,[25]\
  \ coinciding with the development of psychology as a discipline separate from philosophy.\
  \ Since at least 1894, philosophers and psychologists attempted to empirically evaluate\
  \ the morality of an individual,[26][27] especially attempting to distinguish adults\
  \ from children in terms of their judgment. Unfortunately, these efforts failed\
  \ because they \"attempted to quantify how much morality an individual had—a notably\
  \ contentious idea—rather than understand the individual's psychological representation\
  \ of morality\".[28]: 284 \n\n\n[I]f you said that you studied moral psychology\
  \ in the 1980s, then you probably studied the development of moral reasoning. You\
  \ didn't need to agree with Kohlberg on any particular claim, but you lived and\
  \ worked on land that Kohlberg had cleared.\n\n\nIn most introductory psychology\
  \ courses, students learn about moral psychology by studying the psychologist Lawrence\
  \ Kohlberg,[30][31][32] who proposed a highly influential theory of moral development,\
  \ developed throughout the 1950s and 1960s. This theory was built on Piaget's observation\
  \ that children develop intuitions about justice that they can later articulate.[citation\
  \ needed] Kohlberg proposed six stages broken into three categories of moral reasoning\
  \ that he believed to be universal to all people in all cultures.[33] The increasing\
  \ sophistication of justice-based reasoning was taken as a sign of development.\
  \ Moral cognitive development, in turn, was assumed to be a necessary (but not sufficient)\
  \ condition for moral action.[34]\n\n\nBut researchers using the Kohlberg model\
  \ found a gap between what people said was most moral and actions they took. In\
  \ response, Augusto Blasi proposed his self-model[35] that links ideas of moral\
  \ judgment and action through moral commitment. Those with moral goals central to\
  \ the self-concept are more likely to take moral action, as they feel a greater\
  \ obligation to do so. Those who are motivated will attain a unique moral identity.[36]\n\
  \n\nFollowing the independent publication of a pair of landmark papers in 2001 (respectively\
  \ led by Jonathan Haidt and Joshua Greene),[37][38] there was a surge in interest\
  \ in moral psychology across a broad range of subfields of psychology, with interest\
  \ shifting away from developmental processes towards a greater emphasis on social,\
  \ cognitive, affective and neural processes involved in moral judgment.[2][6][39]\n\
  \n\nPhilosophers, psychologists and researchers from other fields have created various\
  \ methods for studying topics in moral psychology, with empirical studies dating\
  \ back to at least the 1890s.[28] The methods used in these studies include moral\
  \ dilemmas such as the trolley problem,[25][38] structured interviews and surveys\
  \ as a means to study moral psychology and its development, as well as the use of\
  \ economic games,[40] neuroimaging,[41] and studies of natural language use.[42]\n\
  \n\nIn 1963, Lawrence Kohlberg presented an approach to studying differences in\
  \ moral judgment by modeling evaluative diversity as reflecting a series of developmental\
  \ stages (à la Jean Piaget). Lawrence Kohlberg's stages of moral development are:[43]\n\
  \n\nStages 1 and 2 are combined into a single stage labeled \"pre-conventional\"\
  , and stages 5 and 6 are combined into a single stage labeled \"post-conventional\"\
  \ for the same reason; psychologists can consistently categorize subjects into the\
  \ resulting four stages using the \"Moral Judgement Interview\" which asks subjects\
  \ why they endorse the answers they do to a standard set of moral dilemmas.[31]\n\
  \n\nBetween 1910 and 1930, in the United States and Europe, several morality tests\
  \ were developed to classify subjects as either fit or unfit to make moral judgments.[28][44]\
  \ Test-takers would classify or rank standardized lists of personality traits, hypothetical\
  \ actions, or pictures of hypothetical scenes. As early as 1926, catalogs of personality\
  \ tests included sections specifically for morality tests, though critics persuasively\
  \ argued that they merely measured intelligence or awareness of social expectations.[28]\n\
  \n\nMeanwhile, Kohlberg inspired a new series of morality tests. The Defining Issues\
  \ Test (dubbed \"Neo-Kohlbergian\" by its constituents) scores relative preference\
  \ for post-conventional justifications,[45][46] and the Moral Judgment Test scores\
  \ consistency of one's preferred justifications.[47][48] Both treat evaluative ability\
  \ as similar to IQ (hence the single score), allowing categorization by high score\
  \ vs. low score.\n\n\nAmong the more recently developed survey measures, the Moral\
  \ Foundations Questionnaire[49] is a widely used survey measure of the five moral\
  \ intuitions proposed by Moral Foundations Theory: care/harm, fairness/cheating,\
  \ loyalty/betrayal, authority/subversion, and sanctity/degradation. The questions\
  \ ask respondents to rate various considerations in terms of how relevant they are\
  \ to the respondent's moral judgments. The purpose of the questionnaire is to measure\
  \ the degree to which people rely upon each of the five moral intuitions (which\
  \ may coexist). The new and improved version of this instrument (i.e., Moral Foundations\
  \ Questionnaire-2; MFQ-2) was developed in 2023. In this version, Fairness was split\
  \ to Equality and Proportionality. Hence, the MFQ-2 measures Care, Equality, Proportionality,\
  \ Loyalty, Authority, and Purity.[50] In addition to survey instruments measuring\
  \ endorsement of moral foundations, a number of other contemporary survey measures\
  \ exist relating to other broad taxonomies of moral values,[51][52][53] as well\
  \ as more specific moral beliefs,[54][55] or concerns.[56][57]\n\n\nAccording to\
  \ Haidt,[29] the belief that morality is not innate was one of the few theoretical\
  \ commitments uniting many of the prominent psychologists studying morality in the\
  \ twentieth century (with some exceptions[58][59]). A substantial amount of research\
  \ in recent decades has focused on the evolutionary origins of various aspects of\
  \ morality.[60][61][62][63]\n\n\nIn Unto Others: the Evolution and Psychology of\
  \ Unselfish Behavior (1998), Elliott Sober and David Sloan Wilson demonstrated that\
  \ diverse moralities could evolve through group selection.[64] In particular, they\
  \ dismantled the idea that natural selection will favor a homogeneous population\
  \ in which all creatures care only about their own personal welfare and/or behave\
  \ only in ways which advance their own personal reproduction.[64]\n\n\nTim Dean\
  \ has advanced the more general claim that moral diversity would evolve through\
  \ frequency-dependent selection because each moral approach is vulnerable to a different\
  \ set of situations which threatened our ancestors.[65]\n\n\nMoral identity refers\
  \ to the importance of morality to a person's identity, typically construed as either\
  \ a trait-like individual difference, or set of chronically accessible schemas.[36][66]\
  \ There are considered to be two main levels of perspective on moral identity. One\
  \ of them the trait-based perspective theory where certain personality traits are\
  \ triggered during moral situations. The second perspective is the socio-cognitive\
  \ perspective where these moral identities are a \"self-schema\" that will occur\
  \ due to the social environment.[67] Moral identity is theorized to be one of the\
  \ key motivational forces connecting moral reasoning to moral behavior,[66] as suggested\
  \ by a 2016 meta-analysis reporting that moral identity is positively (albeit only\
  \ modestly) associated with moral behavior.[68] Although moral identity mainly focuses\
  \ on a moral action there is sometimes \"moral disengagement\" that will take place\
  \ to reduce the negative consequences of an action or lack of action.[67]\n\n\n\
  The theory of moral satisficing applies the study of ecological rationality to moral\
  \ behavior.[69][70] In this view, much of moral behavior is based on social heuristics\
  \ rather than traits, virtues, or utilitarian calculations. Social heuristics are\
  \ a form of satisficing, a term coined by Nobel laureate Herbert Simon.[71] Social\
  \ heuristics are not good or bad, or beneficial or harmful, per se, but solely in\
  \ relation to the environments in which they are used. For instance, an adolescent\
  \ may commit a crime not because of an evil character or a utilitarian calculation\
  \ but due to following the social heuristic \"do what your peers do.\" After shifting\
  \ to a different peer group, the same person's behavior may shift to a more socially\
  \ desirable outcome – by relying on the very same heuristic. From this perspective,\
  \ moral behavior is thus not simply a consequence of inner virtue or traits, but\
  \ a function of both the mind and the environment, a view based on Simon's scissors\
  \ analogy.[72] Many other moral theories, in contrast, consider the mind alone,\
  \ such as Kohlberg's state theory, identity theories, virtue theories, and willpower\
  \ theories.\n\n\nThe ecological perspective has methodological implications for\
  \ the study of morality: According to it, behavior needs to be studied in social\
  \ groups and not only in individuals, in natural environments and not only in labs.\
  \ Both principles are violated, for instance, by the study of how individuals respond\
  \ to artificial trolley problems. The theory of moral satisficing also has implications\
  \ for moral policy, implying that problematic behavior can be changed by changing\
  \ the environment, not only the individual.\n\n\nDarwin argued that one original\
  \ function of morality was the coherence and coordination of groups.[73] This suggests\
  \ that social heuristics that generate coherence and coordination are also those\
  \ that guide moral behavior. These social heuristics include imitate-your-peers,\
  \ equality (divide a resource equally), and tit-for-tat (be kind first, then imitate\
  \ your partner's behavior).[74][75] In general, the social heuristics of individuals\
  \ or institutions shape their moral fabric.\n\n\nMoral satisficing explains two\
  \ phenomena that pose a puzzle for virtue and trait theories: moral luck and systematic\
  \ inconsistencies, as when teens who voluntarily made a virginity pledge were just\
  \ as likely to have premarital sex as their peers who did not.[76] From an ecological\
  \ view of morality, such inconsistencies are to be expected when individuals move\
  \ from one environment to another.\n\n\nNagel (1979, p. 59) defines moral luck as\
  \ follows: Where a significant aspect of what someone does depends on factors beyond\
  \ his control, yet we continue to treat him in that respect as an object of moral\
  \ judgment, it can be called moral luck.[77] Others voiced concerns that moral luck\
  \ poses a limit to improving our moral behavior and makes it difficult to evaluate\
  \ behavior as right or wrong.[78] Yet this concern is based on an internal view\
  \ of the causes of moral behavior; from an ecological view, moral luck is an inevitable\
  \ consequence of the interaction between mind and environment. A teen is morally\
  \ lucky to have not grown up in a criminal peer group, and an adult is morally lucky\
  \ to have not been conscripted into an army.\n\n\nMoral satisficing postulates that\
  \ behavior is guided by social heuristics, not by moral rules such as \"don't kill\"\
  , as assumed in theories of moral heuristics[79] or in Hauser's \"moral grammar\"\
  \ with hard-wired moral rules.[80] Moral satisficing postulates that moral rules\
  \ are essentially social heuristics that ultimately serve the coordination and cooperation\
  \ of social groups.\n\n\nPsychologist Shalom Schwartz defines individual values\
  \ as \"conceptions of the desirable that guide the way social actors (e.g. organisational\
  \ leaders, policymakers, individual persons) select actions, evaluate people at\
  \ events, and explain their actions and evaluations.\"[81] Cultural values form\
  \ the basis for social norms, laws, customs and practices. While individual values\
  \ vary case by case (a result of unique life experience), the average of these values\
  \ point to widely held cultural beliefs (a result of shared cultural values).\n\n\
  \nKristiansen and Hotte[82] reviewed many research articles regarding people's values\
  \ and attitudes and whether they guide behavior. With the research they reviewed\
  \ and their own extension of Ajzen and Fishbein's theory of reasoned action, they\
  \ conclude that value-attitude-behavior depends on the individual and their moral\
  \ reasoning. Another issue that Kristiansen and Hotte discovered through their research\
  \ was that individuals tended to \"create\" values to justify their reactions to\
  \ certain situations, which they called the \"value justification hypothesis\".[82]\
  \ Their theory is comparable to Jonathan Haidt's social intuitionist theory,[37]\
  \ where individuals justify their intuitive emotions and actions through post-hoc\
  \ moral reasoning.\n\n\nKristiansen and Hotte also found that independent selves\
  \ had actions and behaviors that are influenced by their own thoughts and feelings,\
  \ but Interdependent selves have actions, behaviors and self-concepts that were\
  \ based on the thoughts and feelings of others. Westerners have two dimensions of\
  \ emotions, activation and pleasantness. The Japanese have one more, the range of\
  \ their interdependent relationships. Markus and Kitayama found that these two different\
  \ types of values had different motives. Westerners, in their explanations, show\
  \ self-bettering biases. Easterners, on the other hand, tend to focus on \"other-oriented\"\
  \ biases.[82]\n\n\nMoral foundations theory, first proposed in 2004 by Jonathan\
  \ Haidt and Craig Joseph,[83] attempts to explain the origins of and variation in\
  \ human moral reasoning on the basis of innate, modular foundations.[84] Notably,\
  \ moral foundations theory has been used to describe the difference between the\
  \ moral foundations of political liberals and political conservatives.[85][86] Haidt\
  \ and Joseph expanded on previous research done by Shweder and his three ethics\
  \ theory.[83] Shweder's theory consisted of three moral ethics: the ethics of community,\
  \ autonomy, and divinity.[87] Haidt and Joseph's original formulation proposed four\
  \ candidate foundations (suffering, hierarchy, reciprocity, and purity).[83] Haidt\
  \ and Graham took this theory and extended it to discuss the five psychological\
  \ systems that more specifically make up the three moral ethics theory. These Five\
  \ Foundations of Morality and their importance vary throughout each culture and\
  \ construct virtues based on their emphasized foundation. \nThe five psychological\
  \ foundations are:\n\n\nThe five foundations theory is both a nativist and cultural-psychological\
  \ theory. Modern moral psychology concedes that \"morality is about protecting individuals\"\
  \ and focuses primarily on issues of justice (harm/care and fairness/reciprocity).[85]: 99 \
  \ Their research found that \"justice and related virtues...make up half of the\
  \ moral world for liberals, while justice-related concerns make up only one fifth\
  \ of the moral world for conservatives\".[85]: 99  Liberals value harm/care and\
  \ fairness/reciprocity significantly more than the other moralities, while conservatives\
  \ value all five equally. Ownership has also been argued to be a strong candidate\
  \ to be a moral foundation.[88]\n\n\nIn 2004, D. Lapsley and D. Narvaez outlined\
  \ how social cognition explains aspects of moral functioning.[89] Their social cognitive\
  \ approach to personality has six critical resources of moral personality: cognition,\
  \ self-processes, affective elements of personality, changing social context, lawful\
  \ situational variability, and the integration of other literature. Lapsley and\
  \ Narvaez suggest that moral values and actions stem from more than our virtues\
  \ and are controlled by a set of self-created schemas (cognitive structures that\
  \ organize related concepts and integrate past events). They claim that schemas\
  \ are \"fundamental to our very ability to notice dilemmas as we appraise the moral\
  \ landscape\" and that over time, people develop greater \"moral expertise\".[90]\n\
  \n\nThe triune ethics meta-theory (TEM) has been proposed by Darcia Narvaez as a\
  \ metatheory that highlights the relative contributions to moral development of\
  \ biological inheritance (including human evolutionary adaptations), environmental\
  \ influences on neurobiology, and the role of culture.[91] TET proposes three basic\
  \ mindsets that shape ethical behavior: self-protectionism (a variety of types),\
  \ engagement, and imagination (a variety of types that are fueled by protectionism\
  \ or engagement). A mindset influences perception, affordances, and rhetorical preferences.\
  \ Actions taken within a mindset become an ethic when they trump other values. Engagement\
  \ and communal imagination represent optimal human functioning that are shaped by\
  \ the evolved developmental niche (evolved nest) that supports optimal psychosocial\
  \ neurobiological development.[92]  Based on worldwide anthropological research\
  \ (e.g., Hewlett and Lamb's Hunter-Gatherer Childhoods), Narvaez uses small-band\
  \ hunter-gatherers as a baseline for the evolved nest and its effects.\n\n\nMoral\
  \ development and reasoning are two overlapping topics of study in moral psychology\
  \ that have historically received a great amount of attention, even preceding the\
  \ influential work of Piaget and Kohlberg.[28] Moral reasoning refers specifically\
  \ to the study of how people think about right and wrong and how they acquire and\
  \ apply moral rules.[93] Moral development refers more broadly to age-related changes\
  \ in thoughts and emotions that guide moral beliefs, judgments and behaviors.[94]\n\
  \n\nJean Piaget, in watching children play games, noted how their rationales for\
  \ cooperation changed with experience and maturation.[95] He identified two stages,\
  \ heteronomous (morality centered outside the self) and autonomous (internalized\
  \ morality). Lawrence Kohlberg sought to expand Piaget's work. His cognitive developmental\
  \ theory of moral reasoning dominated the field for decades. He focused on moral\
  \ development as one's progression in the capacity to reason about justice. Kohlberg's\
  \ interview method included hypothetical moral dilemmas or conflicts of interest\
  \ (most notably, the Heinz dilemma). He proposed six stages and three levels of\
  \ development (claiming that \"anyone who interviewed children about dilemmas and\
  \ who followed them longitudinally in time would come to our six stages and no others).[96]\
  \ At the Preconventional level, the first two stages included the punishment-and-obedience\
  \ orientation and the instrumental-relativist orientation. The next level, the conventional\
  \ level, included the interpersonal concordance or \"good boy – nice girl\" orientation,\
  \ along with the \"law and order\" orientation. Lastly, the final Postconventional\
  \ level consisted of the social-contract, legalistic orientation and the universal-ethical-principle\
  \ orientation.[97] According to Kohlberg, an individual is considered more cognitively\
  \ mature depending on their stage of moral reasoning, which grows as they advance\
  \ in education and world experience.\n\n\nCritics of Kohlberg's approach (such as\
  \ Carol Gilligan and Jane Attanucci) argue that there is an over-emphasis on justice\
  \ and an under-emphasis on an additional perspective to moral reasoning, known as\
  \ the care perspective. The justice perspective draws attention to inequality and\
  \ oppression, while striving for reciprocal rights and equal respect for all. The\
  \ care perspective draws attention to the ideas of detachment and abandonment, while\
  \ striving for attention and response to people who need it. Care Orientation is\
  \ relationally based. It has a more situational focus that is dependent on the needs\
  \ of others as opposed to Justice Orientation's objectivity.[98] However, reviews\
  \ by others have found that Gilligan's theory was not supported by empirical studies\
  \ since orientations are individual dependent.[99][100] In fact, in neo-Kohlbergian\
  \ studies with the Defining Issues Test, females tend to get slightly higher scores\
  \ than males.[101][page needed]\n\n\nAner Govrin's attachment approach to moral\
  \ judgment[102][103][104] proposes that, through early interactions with the caregiver,\
  \ the child acquires an internal representation of a system of rules that determine\
  \ how right/wrong judgments are to be construed, used, and understood. By breaking\
  \ moral situations down into their defining features, the attachment model of moral\
  \ judgment outlines a framework for a universal moral faculty based on a universal,\
  \ innate, deep structure that appears uniformly in the structure of almost all moral\
  \ judgments regardless of their content.\n\n\nHistorically, major topics of study\
  \ in the domain of moral behavior have included violence and altruism,[105][106]\
  \ bystander intervention and obedience to authority (e.g., the Milgram experiment[107]\
  \ and Stanford prison experiment[108]).[2][109] Recent research on moral behavior\
  \ uses a wide range of methods, including using experience sampling to try and estimate\
  \ the actual prevalence of various kinds of moral behavior in everyday life.[110][111]\
  \ Research has also focused on variation in moral behavior over time, through studies\
  \ of phenomena such as moral licensing.[112][113] Yet other studies focusing on\
  \ social preferences examine various kinds of resource allocation decisions,[15][114]\
  \ or use incentivized behavioral experiments to investigate the way people weighted\
  \ their own interests against other people's when deciding whether to harm others,\
  \ for example, by examining how willing people are to administer electric shocks\
  \ to themselves vs. others in exchange for money.[115]\n\n\nJames Rest reviewed\
  \ the literature on moral functioning and identified at least four components necessary\
  \ for a moral behavior to take place:[116][117]\n\n\nReynolds and Ceranic researched\
  \ the effects of social consensus on one's moral behavior. Depending on the level\
  \ of social consensus (high vs. low), moral behaviors will require greater or lesser\
  \ degrees of moral identity to motivate an individual to make a choice and endorse\
  \ a behavior. Also, depending on social consensus, particular behaviors may require\
  \ different levels of moral reasoning.[118]\n\n\nMore recent attempts to develop\
  \ an integrated model of moral motivation[119] have identified at least six different\
  \ levels of moral functioning, each of which has been shown to predict some type\
  \ of moral or pro-social behavior: moral intuitions, moral emotions, moral virtues/vices\
  \ (behavioral capacities), moral values, moral reasoning, and moral willpower. This\
  \ social intuitionist model of moral motivation[120] suggests that moral behaviors\
  \ are typically the product of multiple levels of moral functioning, and are usually\
  \ energized by the \"hotter\" levels of intuition, emotion, and behavioral virtue/vice.\
  \ The \"cooler\" levels of values, reasoning, and willpower, while still important,\
  \ are proposed to be secondary to the more affect-intensive processes.\n\n\nMoral\
  \ behavior is also studied under the umbrella of personality psychology. Topics\
  \ within personality psychology include the traits or individual differences underlying\
  \ moral behavior, such as generativity, self-control, agreeableness, cooperativeness\
  \ and honesty/humility,[121][122][123] as well as moral change goals,[124] among\
  \ many other topics.\n\n\nRegarding interventions aimed at shaping moral behavior,\
  \ a 2009 meta analysis of business ethics instruction programs found that such programs\
  \ have only \"a minimal impact on increasing outcomes related to ethical perceptions,\
  \ behavior, or awareness.\"[125] A 2005 meta analysis[126] suggested that positive\
  \ affect can at least momentarily increase prosocial behavior (with subsequent meta\
  \ analyses also showing that prosocial behavior reciprocally increases positive\
  \ affect in the actor[127][128]).\n\n\nIn looking at the relations between moral\
  \ values, attitudes, and behaviors, previous research asserts that there is less\
  \ correspondence between these three aspects than one might assume.[129] In fact,\
  \ it seems to be more common for people to label their behaviors with a justifying\
  \ value rather than having a value beforehand and then acting on it. There are some\
  \ people that are more likely to act on their personal values: those low in self-monitoring\
  \ and high in self-consciousness, due to the fact that they are more aware of themselves\
  \ and less aware of how others may perceive them. Self-consciousness here means\
  \ being literally more conscious of yourself, not fearing judgement or feeling anxiety\
  \ from others. Social situations and the different categories of norms can be telling\
  \ of when people may act in accordance with their values, but this still is not\
  \ concrete either. People will typically act in accordance with social, contextual\
  \ and personal norms, and there is a likelihood that these norms can also follow\
  \ one's moral values. Though there are certain assumptions and situations that would\
  \ suggest a major value-attitude-behavior relation, there is not enough research\
  \ to confirm this phenomenon.\n\n\nBuilding on earlier work by Metcalfe and Mischel\
  \ on delayed gratification,[130] Baumeister, Miller, and Delaney explored the notion\
  \ of willpower by first defining the self as being made up of three parts: reflexive\
  \ consciousness, or the person's awareness of their environment and of himself as\
  \ an individual; interpersonal being, which seeks to mold the self into one that\
  \ will be accepted by others; and executive function.[131] They stated, \"[T]he\
  \ self can free its actions from being determined by particular influences, especially\
  \ those of which it is aware\".[132] The three prevalent theories of willpower describe\
  \ it as a limited supply of energy, as a cognitive process, and as a skill that\
  \ is developed over time. Research has largely supported that willpower works like\
  \ a \"moral muscle\" with a limited supply of strength that may be depleted (a process\
  \ referred to as Ego depletion), conserved, or replenished, and that a single act\
  \ requiring much self-control can significantly deplete the \"supply\" of willpower.[131]\
  \ While exertion reduces the ability to engage in further acts of willpower in the\
  \ short term, such exertions actually improve a person's ability to exert willpower\
  \ for extended periods in the long run.[133] Additional research has been conducted\
  \ that may cast doubt on the idea of ego-depletion.[134]\n\n\nIn 2001, Jonathan\
  \ Haidt introduced his social intuitionist model which claimed that with few exceptions,\
  \ moral judgments are made based upon socially derived intuitions. Moral intuitions\
  \ happen immediately, automatically, and unconsciously, with reasoning largely serving\
  \ to generate post-hoc rationalizations to justify one's instinctual reactions.[37]\
  \ He provides four arguments to doubt causal importance of reason. Firstly, Haidt\
  \ argues that since there is a dual process system in the brain when making automatic\
  \ evaluations or assessments, this same process must be applicable to moral judgement\
  \ as well. The second argument, based on research on motivated reasoning, claims\
  \ that people behave like \"intuitive lawyers\", searching primarily for evidence\
  \ that will serve motives for social relatedness and attitudinal coherence. Thirdly,\
  \ Haidt found that people have post hoc reasoning when faced with a moral situation,\
  \ this a posteriori (after the fact) explanation gives the illusion of objective\
  \ moral judgement but in reality is subjective to one's gut feeling. Lastly, research\
  \ has shown that moral emotion has a stronger link to moral action than moral reasoning,\
  \ citing Damasio's research on the somatic marker hypothesis and Batson's empathy-altruism\
  \ hypothesis.[37]\n\n\nSimilarly, in his theory of moral satisficing, Gerd Gigerenzer\
  \ argues that moral behavior is not solely a result of deliberate reasoning but\
  \ also of social heuristics that are embedded in social environments. In other words,\
  \ intuitionist theories can use heuristics to explain intuition. He emphasizes that\
  \ these are key to understanding moral behavior.  Modifying moral behavior therefore\
  \ entails changing heuristics and/or modifying environments rather than focussing\
  \ on individuals. In this way, moral satisficing extends social intuitionism by\
  \ adding both concrete heuristics and a focus on the environments with which the\
  \ heuristics interact to produce behavior.[135][136]\n\n\nFollowing the publication\
  \ of a landmark fMRI study in 2001,[38] Joshua Greene separately proposed his dual\
  \ process theory of moral judgment, according to which intuitive/emotional and deliberative\
  \ processes respectively give rise to characteristically deontological and consequentialist\
  \ moral judgments. A \"deontologist\" is someone who has rule-based morality that\
  \ is mainly focused on duties and rights; in contrast, a \"consequentialist\" is\
  \ someone who believes that only the best overall consequences ultimately matter.[137]\n\
  \n\nMoral emotions are a variety of social emotion that are involved in forming\
  \ and communicating moral judgments and decisions, and in motivating behavioral\
  \ responses to one's own and others' moral behavior.[138][139][140]\nWhile moral\
  \ reasoning has been the focus of most study of morality dating back to Plato and\
  \ Aristotle, the emotive side of morality was historically looked upon with disdain\
  \ in early moral psychology research.[138] However, in the last 30–40 years, there\
  \ has been a rise in a new front of research: moral emotions as the basis for moral\
  \ behavior.[140] This development began with a focus on empathy and guilt, but has\
  \ since moved on to encompass new scholarship on emotions such as anger, shame,\
  \ disgust, awe, and elevation. While different moral transgressions have been linked\
  \ to different emotional reactions, bodily reactions to such transgressions are\
  \ not too different and can be characterized by some felt activations in the gut\
  \ area as well as the head area.[141]\n\n\nMoralization, a term introduced to moral\
  \ psychology by Paul Rozin, refers to the process through which preferences are\
  \ converted into values.[142][143][144] Relatedly, Linda Skitka and colleagues have\
  \ introduced the concept of moral conviction, which refers to a \"strong and absolute\
  \ belief that something is right or wrong, moral or immoral.\"[145][146] According\
  \ to Skitka's integrated theory of moral conviction (ITMC), attitudes held with\
  \ moral conviction, known as moral mandates, differ from strong but non-moral attitudes\
  \ in a number of important ways. Namely, moral mandates derive their motivational\
  \ force from their perceived universality, perceived objectivity, and strong ties\
  \ to emotion.[147] Perceived universality refers to the notion that individuals\
  \ experience moral mandates as transcending persons and cultures; additionally,\
  \ they are regarded as matters of fact. Regarding association with emotion, ITMC\
  \ is consistent with Jonathan Haidt's social intuitionist model in stating that\
  \ moral judgments are accompanied by discrete moral emotions (i.e., disgust, shame,\
  \ guilt). Importantly, Skitka maintains that moral mandates are not the same thing\
  \ as moral values. Whether an issue will be associated with moral conviction varies\
  \ across persons.\n\n\nOne of the main lines of IMTC research addresses the behavioral\
  \ implications of moral mandates. Individuals prefer greater social and physical\
  \ distance from attitudinally dissimilar others when moral conviction was high.\
  \ This effect of moral conviction could not be explained by traditional measures\
  \ of attitude strength, extremity, or centrality. Skitka, Bauman, and Sargis placed\
  \ participants in either attitudinally heterogeneous or homogenous groups to discuss\
  \ procedures regarding two morally mandated issues, abortion and capital punishment.\
  \ Those in attitudinally heterogeneous groups demonstrated the least amount of goodwill\
  \ towards other group members, the least amount of cooperation, and the most tension/defensiveness.\
  \ Furthermore, individuals discussing a morally mandated issue were less likely\
  \ to reach a consensus compared to those discussing non-moral issues.[148]\n\n\n\
  Main Article: Moral enhancement\n\n\nMoral Enhancement (abbreviated ME), also called\
  \ moral bioenhancement (abbreviated MBE), is the use of biomedical technology to\
  \ morally improve individuals.[149] There is another subdiscipline under moral enhancement\
  \ which is denoted as Traditional Moral Enhancement (TME).  [150] Moral Enhancement\
  \ is also considered the altering of moral behavior, moral traits, moral decision\
  \ making, and or cognitive abilities but there hasn't been a clear cut definition\
  \ of what it all entails. A scholar by the name of J.B.S. Haldane made a statement\
  \ \"it is only hopeful if mankind can adjust its morality to its powers.\" Haldane\
  \ had a focus on using moral enhancement to improve the way society as whole functioned\
  \ to increase the balance between morality and the usage of science.[150]\n\n\n\
  Some research shows that people tend to self-segregate based on moral and political\
  \ views,[151][152] exaggerate the magnitude of moral disagreements across political\
  \ divides,[153] and avoid exposure to the opinions of those with opposing political\
  \ views.[154]\n\n\nResearchers have begun to debate the implications (if any) moral\
  \ psychology research has for other subfields of ethics such as normative ethics\
  \ and meta-ethics.[155][156][157][158][159] For example Peter Singer, citing Haidt's\
  \ work on social intuitionism and Greene's dual process theory, presented an \"\
  evolutionary debunking argument\" suggesting that the normative force of our moral\
  \ intuitions is undermined by their being the \"biological residue of our evolutionary\
  \ history.\"[160] John Michael Doris discusses the way in which social psychological\
  \ experiments—such as the Stanford prison experiments involving the idea of situationism—call\
  \ into question a key component in virtue ethics: the idea that individuals have\
  \ a single, environment-independent moral character.[161][page needed] As a further\
  \ example, Shaun Nichols (2004) examines how empirical data on psychopathology suggests\
  \ that moral rationalism is false.[162][page needed]\n\n\nAdditionally, research\
  \ in moral psychology is being used to inform debates in applied ethics around moral\
  \ enhancement.[163][164]\n\n\nAt the intersection of moral psychology and machine\
  \ ethics, researchers have begun to study people's views regarding the potentially\
  \ ethically significant decisions that will be made by self-driving cars.[18][17][165][166]\n\
  \n\nMohammad Atari and his colleagues recently examined the moral psychology of\
  \ the famous chatbot, ChatGPT. These authors asked in their title, \"which humans?\"\
  \ — rhetorically pointing out that people should not ask how \"human-like\" machine\
  \ morality is, but to which humans it resembles.[167] These authors discovered that\
  \ Large Language Models (LLMs), especially ChatGPT, tend to echo moral values endorsed\
  \ by Westerners, as their training datasets originate predominantly from Western,\
  \ Educated, Industrialized, Rich, and Democratic (WEIRD) societies.[168] This study\
  \ points out that compared to the global average, people from WEIRD societies are\
  \ more inclined toward individualism and impersonal prosocial behaviors while showing\
  \ less traditionalism and group loyalty. The authors further highlighted that societies\
  \ less aligned with these WEIRD moral values tend to experience greater misalignment\
  \ with the moral values and outputs of ChatGPT.[169]\n\n\nGerd Gigerenzer argued\
  \ that the focus of AI ethics should reach far beyond the question whether an AI\
  \ system has a moral bias or is able to exhibit human-like moral responses. It also\
  \ needs to investigate the actual motives and ethical behavior of the people behind\
  \ the AI. Contrary to the 1990s dream of an egalitarian internet providing honest\
  \ and accurate information to all, various tech billionaires and politicians have\
  \ highly succeeded in leveraging AI for their own purposes of surveillance and control,\
  \ for tolerating systematic misinformation for profit, and for increasing their\
  \ individual power to the detriment of a democracy.[170]\n"
