content: 'In marketing and consumer behaviour, brand loyalty refers to a consumer''s
  consistent preference for a particular brand and their commitment to repeatedly
  purchasing its products or services despite competing alternatives, market changes,
  or product shortcomings. It may also be reflected in behaviors such as positive
  word-of-mouth advocacy.[1]



  Corporate brand loyalty describes a pattern in which consumers repeatedly purchase
  products from the same manufacturer rather than switching to competitors.[2] In
  business-to-business contexts, a similar concept is sometimes referred to as source
  loyalty.[3]



  Brand loyalty implies an attitudinal commitment and should be distinguished from
  habitual purchasing, which may occur without emotional attachment or deliberate
  preference.



  Organizations whose financial performance and ethical positioning rely significantly
  on maintaining strong customer loyalty are sometimes described as operating under
  a loyalty-driven business model.



  Brand loyalty, in marketing, consists of a consumer''s commitment to repurchase
  or continue to use the brand. Consumers can demonstrate brand loyalty by repeatedly
  buying a product, service, or by other positive behaviors such as by engaging in
  word of mouth advocacy.[1] This concept of a brand displays imagery and symbolism
  for a product or range of products.[clarification needed] Brands can engage[when
  defined as?] consumers and make them feel emotionally attached.[citation needed]
  Consumers'' beliefs and attitudes make up brand images, and these affect how they
  will view brands with which they come into contact.[2] Brand experience occurs when
  consumers shop or search for, and consume products.[3] Holistic[when defined as?]
  experiences such as sense, relation,[clarification needed] acting, and feeling occur
  when one comes into contact with brands. The stronger and more relational[when defined
  as?] these senses are to the individual, the more likely it is that individual will
  make repeat purchases. After contact has been made,[clarification needed] psychological
  reasoning[when defined as?] will occur, followed by a decision to buy or not to
  buy. This can result in repeat purchase behavior, thus incurring the beginning[clarification
  needed] brand loyalty.[citation needed] Brand loyalty is not limited to repeat purchase
  behavior, as there is deeper psychological reasoning[when defined as?] as to why
  an individual will continuously re-purchase products from one brand. Brand loyalty
  can be defined as the "behavioral willingness" to consistently maintain relations
  with a particular brand.[4] In a survey of nearly 200 senior marketing managers,
  68 percent responded that they found the "loyalty" metric[clarification needed]
  very useful.[5]



  Brand loyalty occurs when consumers are willing to pay higher prices for a certain
  brand and go out of their way for the brand, or think highly of it.[6]



  Brand loyalty can predict brand performance[clarification needed] outcomes. It also
  highlights the importance[clarification needed] of marketing communication when
  trying[who?] to promote a certain product that''s not doing as well as other brands.
  Marketers are able to look at the patterns[when defined as?] of brand loyalty and
  pick out characteristics that make that product thrive.[7]



  Examples of brand loyalty promotions include My Coke Rewards, Pepsi Stuff, and Marriott
  Rewards.[non sequitur]



  Brand loyalty in marketing consists of a consumer''s devotion, bond, and commitment
  to repurchase and continue to use a brand''s product or service over time, regardless
  of changes with competitors'' pricing or changes in the external environment. Brand
  loyalty reflects a customer''s commitment to remain in a relationship for a long
  period of time with a brand.[8]



  A critical factor of building brand loyalty is developing a connection or relationship
  between the consumer and the brand. When an emotional relationship is created between
  the consumer and the brand, this leads to a strong bond and a competitive advantage
  for that particular brand. Loyalty consists of both attitudinal and behavioral components.
  Attitudinal loyalty relates to the customer''s willingness to purchase a product
  or service from the brand at any reasonable cost. Behavioral loyalty is re-purchasing.  Both
  behavioral and attitudinal components are important. One example is that a consumer
  displays behavioral loyalty by buying Coke when there are few alternatives available
  and attitudinal loyalty when they will not buy an alternative brand when Coke is
  not available. The attitudinal component is psychological, this leads to the behavioral
  action of repeat purchase. It is the attitudinal loyalty that drives most loyalty
  behavior and ensures loyalty over time, not just with one purchase. “Brand loyalty
  is desired by firms because retention of existing customers is less costly than
  obtaining new ones. Firms profit from having loyal customers”.[9]



  Brand loyalty profits firms by saving them money. Benefits for companies associated
  with loyal consumers include:



  Generally speaking, brand loyalty will increase profit over time as firms do not
  have to spend as much time and money on maintaining relationships or marketing to
  existing consumers.[citation needed] Loyal long-term customers spend more money
  with a firm.



  Brand loyalty leads not only to repurchasing. Customers may repurchase a brand due
  to situational constraints (such as vendor lock-in), a lack of viable alternatives,
  or out of convenience.[10]  Such loyalty is referred to as "spurious loyalty".



  Previous studies showed that customer loyalty is affected by customer satisfaction,[clarification
  needed] but the association differs[clarification needed] based on customer switching
  costs (procedural, relational, and financial).[11][12] Real brand loyalty exists
  when customers have a high relative attitude[when defined as?] toward the brand
  which they then exhibit through repurchase behavior.[1] This type of loyalty can
  be a great asset to the firm: customers are willing to pay higher prices, they may
  cost less to serve, and can[who?] bring new customers to the firm.[13][14] For example,
  if Joe has brand loyalty to Company A, he will purchase Company A''s products even
  if Company B''s are cheaper and/or of a higher quality. From the point of view of
  many marketers, loyalty to the brand — in terms of consumer usage[when defined as?]
  — is a key factor. However, companies often ensure that they are not spending resources
  to retain loyal but unprofitable customers.[15]



  Most important is usually[weasel words] the ''rate'' of usage,[who?] to which the
  Pareto 80-20 rule applies: Kotler''s[clarification needed] "heavy users" are likely
  to be[weasel words] disproportionately important to the brand (typically, 20 percent
  of users accounting for 80 percent of usage — and of suppliers'' profit). As a result,
  suppliers often segment their customers into "heavy", "medium", and "light" users;
  as far as they can, they target[when defined as?] "heavy users". However, research
  shows that heavy users of a brand are not always the most profitable for a company.[15]



  A second dimension, is whether the customer is committed to the brand. Philip Kotler,
  again, defines four status of loyalty:[16]



  A person''s psychological disposition affects which brands they are attracted to.
  Cognitive responses can be matched with brand personalities.[clarification needed]
  Brand personalities are[who?] broken down into five categories of traits: sincerity,
  ruggedness, competence, sophistication and excitement.[2] Consumers are usually[weasel words]
  drawn to a brand because the brand strongly conveys one of these traits, and that
  trait resonates in the consumer''s mind. These traits are[who?] matched to the five
  psychological factors that the consumers are influenced by: perception, learning,
  motivation, beliefs, and attitudes.[2] In relation to brand loyalty, the most important
  factors are beliefs and attitudes. A belief can be based on real knowledge, faith,
  or opinion and has the ability to carry an emotional charge.[2] Consumers use beliefs
  to form a brand image in their minds, and marketers try to either change or enhance
  people''s beliefs to draw them to their brand.[2] Marketers can advertise messages
  such as "no added sugar" and then, if this statement resonates in the consumer''s
  mind, the consumer will believe that this brand''s beliefs[clarification needed]
  matches theirs.[2] Beliefs that consumers hold against brands can also be false,
  as word of mouth, false advertising, and so forth can create false impressions.[non
  sequitur] Marketers will try to counteract these negative beliefs so the consumer
  feels like they hold similar beliefs as the brand. Attitudes can be[who?] based
  on brand salience[clarification needed] and accessibility.[clarification needed][17]
  Consumers make constant evaluations on every aspect of their lives and these make
  up attitudes.[2] Ones attitude is usually difficult to change, so marketers try
  to fit their brands and products into categorical attitudes.[2] Each time a consumer
  makes contact with a brand (through advertising and promotion), they reflect on
  their attitudes to make judgements and decisions about that particular brand.[17]
  If a person''s attitude coincides with what a brand is trying to convey, the consumer
  will put the brand into a "liking" category in their mind. The consumer will then
  be more likely to increase involvement with this brand, and because attitudes are
  difficult to change, the chances of brand loyalty occurring increase.



  Other advertising techniques such as comparative advertising have shown to increase[clarification
  needed] the brand attitudes one might have.[17] When a brand praises a competitor,
  rather than using a negative comparison, consumers are shown to have more positive
  brand attitudes, therefore drawing them to the brand.[17] Brands may advertise themselves
  in ways that have nothing to do with their product, but by using emotional influences
  that they know the average consumer will engage with. For example, they may use
  religion, world peace, love, death, children and other symbols that humans can feel
  sentimental about to attract consumers to their brand.[citation needed] Through
  advertising, marketers may focus more on implicit emotional messages, rather than
  the actual content or information about their brand.[18] Consumers take notice of
  campaigns, and a wave effect[when defined as?] can occur, due to the relational
  sense[when defined as?] of the campaign to the common person''s emotions. Once a
  consumer establishes an emotional bond with a brand, the consumer is more likely
  to be able to recall the brand than consumers who have been subject to a large amount
  of content information.[18] Because of this increased level of recall, brand loyalty
  is more likely to occur, as the brand name is resonating in the consumer''s mind
  due to a feeling of emotional attachment.[citation needed] Furthermore, consumers
  are willing to pay more for a product that has a brand name that resonates with
  them emotionally.[citation needed]



  Buying decisions from consumers can be dependent[clarification needed] on their
  level of involvement[when defined as?] with the product or brand. Brand loyalty
  can stem from whether the consumer has a high or low level of involvement with the
  brand. High-involvement consumers interact with brands and products that are important
  to them, are risky or expensive and products that people who are important to the
  consumer have strong opinions on.[clarification needed][2] High-involvement consumers
  will usually progress through complex buying behavior to decide whether they want
  to purchase a product whose brand greatly differs from others. Such behavior involves
  gaining knowledge of the product, specifications and attributes, and furthermore
  creating attitudes that lead to the buyer''s decision.[2] Similarly, dissonance[when
  defined as?]-reducing buying behavior occurs in the same situation, but instead
  with brands they see little differences between.[2] This process consists of consumers
  finding purchase convenience, attractive pricing, and shopping around.[clarification
  needed] High-involvement consumers search for more product attributes and engage
  in more product-related activities, such as searching for more information on a
  product and researching the brand''s background.[19] This engagement makes consumers
  aware and knowledgeable of the brand''s attributes, so this engagement can shape
  behavioral brand loyalty, as the consumer feels that they know the brand well.[19]



  Low-involvement consumers take on habitual buying behavior or variety-seeking behavior.[2]
  These processes occur when a consumer is purchasing fast-moving[when defined as?]
  goods and requires a low product-involvement level.[2] Habitual behavior occurs
  when the consumer doesn''t see large differences between brands, and therefore doesn''t
  search for information. Consumers usually purchase because advertising or promotion
  created familiarity.[2] The attitudes formed by being exposed to advertisements
  and promotions cause brand loyalty to occur.[19] Because consumers do less mental
  work to assess each brand, they may stick with a brand simply because it takes less
  work to do so.[19] Low-involvement consumers use short-cut evaluations, so, for
  example, a known brand name that they haven''t thought about deeply enough to find
  faults in will be an easy buy decision. Habitual buying behavior can result in brand
  loyalty subconsciously. The consumer isn''t actively aware they want to purchase
  repeatedly from a particular brand, it is just in their habitual nature to do so.[2]
  Alternatively, low-involvement consumers who are using variety-seeking behavior
  see differences between brands and tend to do a lot of switching.[2] To attempt
  to persuade these consumers into habitual buying behavior, marketers will try to
  dominate shelf space, cut prices, or introduce new products.[2] If a low-involvement
  consumer continues to use variety-seeking behavior, brand loyalty is unlikely to
  be established.



  Loyalty includes some degree of predisposition toward a brand. It is determined
  by several distinct psychological processes, and it entails multivariate measurements.
  Customer perceived value, brand trust, customer satisfaction, repeat purchase behavior,
  and commitment are found[weasel words] to be the key influencing factors of brand
  loyalty. Commitment and repeated purchase behavior are considered[weasel words]
  as necessary conditions for brand loyalty followed by perceived value, satisfaction,
  and brand trust.[20]



  Fred Reichheld,[21] one of the most influential writers on brand loyalty, claimed
  that enhancing customer loyalty could have dramatic effects on profitability. However,
  new research shows that the association between customer loyalty and financial outcomes
  such as firm profitability and stock-market outcomes is not so straightforward.[22]



  An organization''s ability to attract and retain customers is vital to its success.
  Customer loyalty requires a strong appetite by the customer for a product.[citation
  needed] Marketing tools such as integrated marketing communications (IMC) and branding
  can increase perceived attraction between the consumer and the brand. These tools
  boost emotional response and attachment to the brand, and influence feelings the
  customer has for a brand; both are important for congruency[when defined as?] and
  a relationship[when defined as?]. This in turn leads to the development of brand
  loyalty. Relationship development and maintenance can also be achieved through the
  use of loyalty programs or a celebrity endorser. These can help to increase a bond
  between a brand and a consumer.[23]



  IMC is defined as "integrating a variety of convincing messages across various forms
  to communicate with and develop relationships with customers."[24] IMC can convey
  the brand image, increase awareness, build brand equity, and achieve shared values
  between the consumer and the brand.



  IMC and branding are both marketing tools for increasing the brand loyalty of consumers.
  The decisions made[who?] around communications and branding should be based on solid[when
  defined as?] and factual market research about the consumers. If the brand or the
  IMC do not seem[who?] to be relevant to the target market, consumers will not pay
  attention. An example of this is that high customization, creativity, and a more
  direct voice is recommended for messages directed towards Generation Y consumers
  as Generation Y want to be treated differently from the rest of the market and marketers
  should acknowledge this.[25]



  Loyalty programs reward and encourage customers, which is necessary for customers
  to want to repurchase.[citation needed] The consumer should feel a connection[when
  defined as?] with the brand to want repeat purchase and to exhibit other brand loyalty
  behaviors such as positive word of mouth. "A loyalty program is an integrated system
  of marketing actions that aims to make member customers more loyal to a brand."[9]
  The main goal of a loyalty program is to create or enhance customer loyalty towards
  a brand whilst being[who?] sustained even after a loyalty program is discontinued.[9]



  Marketers use such tactics as a loyalty program to increase likelihood of repeat
  purchase and to retrieve information about the spending habits of the consumer.
  Loyalty programs that enhance the consumer''s opinion about how much the firm can
  offer them may be essential for building a relationship[when defined as?]. Even
  though these programs can cost a lot of money, they help to create a relationship
  between the brand and the consumer.[9] An example of a loyalty program is a point
  system: Frequent customers earn points which transform into freebies, discounts,
  rewards, or special treatment of some sort; customers work toward a specific number
  of points to redeem their benefit.[26]



  Celebrity endorsers moderate the relationship between the consumer and the brand
  by personifying the brand to match the perceptions of the consumer. Using a celebrity
  endorser can build a relationship between consumers and a brand because endorsers
  can represent similarities between themselves and the consumer, and themselves and
  the brand. Celebrities make marketing tactics more convincing and marketing communications
  more effective.[24]



  For example, a celebrity may be influential to a Generation Y consumer because that
  generation views[clarification needed] them as likeable, real, and beautiful. In
  order for celebrity endorsers to effectively reach the audience, they must connect
  and identify with the audience.[clarification needed][27] The use of a popular celebrity
  endorser could personalize the brand for the consumer and create the relationship
  between the consumer and the brand. To ensure endorsement is successful, the celebrity
  should match the brand and the consumer.[28] The effect of using a celebrity endorser
  that consumers look up to and want to emulate can lead to increased congruence between
  the values of the consumers and the brand, and improve the relationship between
  the two.



  Andrew Ehrenberg, then of the London Business School said that consumers buy "portfolios
  of brands".[citation needed] They switch regularly between brands, often because
  they simply want a change. Thus, "brand penetration" or "brand share" reflects only
  a statistical chance that customers will buy that brand next time as part of a portfolio
  of brands they prefer. It does not guarantee that they will stay loyal.



  Influencing the statistical probabilities facing a consumer choosing from a portfolio
  of preferred brands, which is required in this context, is a very different role
  for a brand manager; compared with the much simpler one, traditionally described,
  of recruiting and holding dedicated customers. The concept also emphasizes the need
  for managing continuity.[clarification needed]



  Once brands have become well established and have a steady flow of consumers, problems
  may arise such as slips in product quality or in safety of products, or lack of
  customer care. Such problems can be detrimental to a brand that has become too confident.[clarification
  needed] Many brands continue to get away with scandals, and it does not affect their
  image in any way.[citation needed] For example, the Coca-Cola brand has been involved
  in[weasel words] scandals including murders in Colombia, crimes in India, and various
  health dangers; all of which relate back to the company name.[citation needed] Yet
  the power of the Coca-Cola brand puts it at the top of its field. The reputation
  of such a massive organization is sometimes slow to negatively change with the powerful
  distribution rights[clarification needed] and funds to create some of the most effective
  ad campaigns.[citation needed]



  In industrial and other business markets, Yoram Wind noted in 1970 that at the time,
  source loyalty among industrial buyers had not received the level of academic interest
  paid to consumer brand loyalty. A study he conducted on loyalty in the purchase
  of electronic components on the United States west coast found "substantial evidence"
  that buyers in that sector remained loyal to certain brands.[29]



  Some organizations may regard "heavy users" as "major accounts" to be handled by
  senior sales personnel and managers; whereas "light users" may be handled by the
  general sales force or by a dealer.[clarification needed]

