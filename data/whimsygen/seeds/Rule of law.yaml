content: "The rule of law entails that the law is clear, consistent and open; individuals\
  \ and groups have access to justice (such as fair, independent judiciaries); and\
  \ that government institutions (such as the executive, legislature and judiciary)\
  \ are subject to the law.[2] It entails that all people and institutions within\
  \ a political body are subject to the same law.[3][4] This concept is sometimes\
  \ stated simply as \"no one is above the law\" or \"all are equal before the law\"\
  . According to Encyclopædia Britannica, it is \"the mechanism, process, institution,\
  \ practice, or norm that supports the equality of all citizens before the law, secures\
  \ a nonarbitrary form of government, and more generally prevents the arbitrary use\
  \ of power.\"[5]\n\n\nLegal scholars have expanded the basic rule of law concept\
  \ to encompass, first and foremost, a requirement that laws apply equally to everyone.\
  \ \"Formalists\" add that the laws must be stable, accessible and clear. More recently,\
  \ \"substantivists\" expand the concept to include rights, such as human rights,\
  \ and compliance with international law.[6][7][8]\n\n\nUse of the phrase can be\
  \ traced to 16th-century Britain. In the following century, Scottish theologian\
  \ Samuel Rutherford employed it in arguing against the divine right of kings.[9]\
  \ John Locke wrote that freedom in society means being subject only to laws written\
  \ by a legislature that apply to everyone, with a person being otherwise free from\
  \ both governmental and private restrictions of liberty. The phrase \"rule of law\"\
  \ was further popularized in the 19th century by British jurist A. V. Dicey. However,\
  \ the principle, if not the phrase itself, was recognized by ancient thinkers. Aristotle\
  \ wrote: \"It is more proper that law should govern than any one of the citizens.\"\
  [10][11]\n\n\nThe term rule of law is closely related to constitutionalism as well\
  \ as Rechtsstaat. It refers to a political situation, not to any specific legal\
  \ rule.[12][13][14] Distinct is the rule of man, where one person or group of persons\
  \ rule arbitrarily.[15]\n\n\nAlthough credit for popularizing the expression \"\
  the rule of law\" in modern times is usually given to A. V. Dicey,[16][17] development\
  \ of the legal concept can be traced through history to many ancient civilizations,\
  \ including ancient Greece, Mesopotamia, India, and Rome.[18][19]\n\n\nThe earliest\
  \ conception of rule of law can be traced back to the Indian epics Ramayana and\
  \ Mahabharata - the earliest versions of which date around to 8th or 9th centuries\
  \ BC.[20][21][22] The Mahabharata deals with the concepts of Dharma (used to mean\
  \ law and duty interchangeably), Rajdharma (duty of the king) and Dharmaraja. It\
  \ states in one of its slokas that,\"The people should execute a king who does not\
  \ protect them, but deprives them of their property and assets and who takes no\
  \ advice or guidance from any one. Such a king is not a king but misfortune.\"[23][24]\n\
  \n\nOther sources for the philosophy of rule of law can be traced to the Upanishads\
  \ which state that, \"The law is the king of the kings. No one is higher than the\
  \ law. Not even the king.\" Other commentaries include Kautilya's Arthashastra (4th-century\
  \ BC), Manusmriti (dated to the 1st to 3rd century CE), Yajnavalkya-Smriti (dated\
  \ between the 3rd and 5th century CE), Brihaspati Smriti (dated between 15 CE and\
  \ 16 CE).[25][24]\n\n\nSeveral scholars have also traced the concept of the rule\
  \ of law back to 4th-century BC Athens, seeing it either as the dominant value of\
  \ the Athenian democracy,[26] or as one held in conjunction with the concept of\
  \ popular sovereignty.[27] However, these arguments have been challenged and the\
  \ present consensus is that upholding an abstract concept of the rule of law was\
  \ not \"the predominant consideration\" of the Athenian legal system.[28] Aristotle,\
  \ in his Politics, wrote: \"It is more proper that law should govern than any one\
  \ of the citizens: upon the same principle, if it is advantageous to place the supreme\
  \ power in some particular persons, they should be appointed to be only guardians,\
  \ and the servants of the laws.\"[29]\n\n\nThe idea of the rule of law can be regarded\
  \ as a modern iteration of the ideas of ancient Greek philosophers, who argued that\
  \ the best form of government was rule by the best men.[30] Plato advocated a benevolent\
  \ monarchy ruled by an idealized philosopher king, who was above the law.[30] Plato\
  \ nevertheless hoped that the best men would be good at respecting established laws,\
  \ explaining that \"Where the law is subject to some other authority and has none\
  \ of its own, the collapse of the state, in my view, is not far off; but if law\
  \ is the master of the government and the government is its slave, then the situation\
  \ is full of promise and men enjoy all the blessings that the gods shower on a state.\"\
  [31] Similarly, Aristotle flatly opposed letting the highest officials wield power\
  \ beyond guarding and serving the laws.[30] In other words, Aristotle advocated\
  \ the rule of law:\n\n\nIt is more proper that law should govern than any one of\
  \ the citizens: upon the same principle, if it is advantageous to place the supreme\
  \ power in some particular persons, they should be appointed to be only guardians,\
  \ and the servants of the laws.[29]\n\nThe Roman statesman Cicero is often cited\
  \ as saying, roughly: \"We are all servants of the laws in order to be free.\"[32]\
  \ During the Roman Republic, controversial magistrates might be put on trial when\
  \ their terms of office expired. Under the Roman Empire, the sovereign was personally\
  \ immune (legibus solutus), but those with grievances could sue the treasury.[16]\n\
  \n\nIn China, members of the school of legalism during the 3rd century BC argued\
  \ for using law as a tool of governance, but they promoted \"rule by law\" as opposed\
  \ to \"rule of law,\" meaning that they placed the aristocrats and emperor above\
  \ the law.[33] In contrast, the Huang–Lao school of Daoism rejected legal positivism\
  \ in favor of a natural law that even the ruler would be subject to.[34]\n\n\nThe\
  \ ancient concept of rule of law can be distinguished from rule by law, according\
  \ to political science professor Li Shuguang: \"The difference ... is that, under\
  \ the rule of law, the law is preeminent and can serve as a check against the abuse\
  \ of power. Under rule by law, the law is a mere tool for a government, that suppresses\
  \ in a legalistic fashion.\"[35]\n\n\nAlfred the Great, Anglo-Saxon king in the\
  \ 9th century, reformed the law of his kingdom and assembled a law code (the Doom\
  \ Book) which he grounded on biblical commandments. He held that the same law had\
  \ to be applied to all persons, whether rich or poor, friends or enemies. This was\
  \ likely inspired by Leviticus 19:15: \"You shall do no iniquity in judgment. You\
  \ shall not favor the wretched and you shall not defer to the rich. In righteousness\
  \ you are to judge your fellow.\"[36][better source needed]\n\n\nIn 1215, Archbishop\
  \ Stephen Langton gathered the Barons in England and restricted the powers of King\
  \ John and future sovereigns and magistrates under the rule of law, preserving ancient\
  \ liberties by Magna Carta in return for exacting taxes.[37][38] The influence of\
  \ Magna Carta ebbed and waned across centuries. The weakening of royal power it\
  \ demonstrated was based more upon the instability presented by contested claims\
  \ than thoughtful adherence to constitutional principles. Until 1534, the Church\
  \ excommunicated people for violations, but after a time Magna Carta was simply\
  \ replaced by other statutes considered binding upon the king to act according to\
  \ \"process of the law\". Magna Carta's influence is considered greatly diminished\
  \ by the reign of Henry VI, after the Wars of the Roses.[39] The ideas contained\
  \ in Magna Carta are widely considered to have influenced the United States Constitution.[40]\n\
  \n\nThe first known use of this English phrase occurred around 1500.[41] Another\
  \ early example of the phrase \"rule of law\" is found in a petition to James I\
  \ of England in 1610, from the House of Commons:\n\n\nAmongst many other points\
  \ of happiness and freedom which your majesty's subjects of this kingdom have enjoyed\
  \ under your royal progenitors, kings and queens of this realm, there is none which\
  \ they have accounted more dear and precious than this, to be guided and governed\
  \ by the certain rule of the law which giveth both to the head and members that\
  \ which of right belongeth to them, and not by any uncertain or arbitrary form of\
  \ government ...[42]\n\nIn 1481, during the reign of Ferdinand II of Aragon, the\
  \ Constitució de l'Observança was approved by the General Court of Catalonia, establishing\
  \ the submission of royal power (included its officers) to the laws of the Principality\
  \ of Catalonia.[43]\n\n\nIn 1607, English Chief Justice Sir Edward Coke said in\
  \ the Case of Prohibitions \"that the law was the golden met-wand and measure to\
  \ try the causes of the subjects; and which protected His Majesty in safety and\
  \ peace: with which the King (James I) was greatly offended, and said, that then\
  \ he should be under the law, which was treason to affirm, as he said; to which\
  \ I said, that Bracton saith, quod Rex non debet esse sub homine, sed sub Deo et\
  \ lege (that the King ought not to be under any man but under God and the law.).\"\
  \n\n\nAmong the first modern authors to use the term and give the principle theoretical\
  \ foundations was Samuel Rutherford in Lex, Rex (1644).[9] The title, Latin for\
  \ \"the law is king\", subverts the traditional formulation rex lex (\"the king\
  \ is law\").[44] James Harrington wrote in Oceana (1656), drawing principally on\
  \ Aristotle's Politics, that among forms of government an \"Empire of Laws, and\
  \ not of Men\" was preferable to an \"Empire of Men, and not of Laws\".[45]\n\n\n\
  John Locke also discussed this issue in his Second Treatise of Government (1690):\n\
  \n\nThe natural liberty of man is to be free from any superior power on earth, and\
  \ not to be under the will or legislative authority of man, but to have only the\
  \ law of nature for his rule. The liberty of man, in society, is to be under no\
  \ other legislative power, but that established, by consent, in the commonwealth;\
  \ nor under the dominion of any will, or restraint of any law, but what that legislative\
  \ shall enact, according to the trust put in it. Freedom then is not what Sir Robert\
  \ Filmer tells us, Observations, A. 55. a liberty for every one to do what he lists,\
  \ to live as he pleases, and not to be tied by any laws: but freedom of men under\
  \ government is, to have a standing rule to live by, common to every one of that\
  \ society, and made by the legislative power erected in it; a liberty to follow\
  \ my own will in all things, where the rule prescribes not; and not to be subject\
  \ to the inconstant, uncertain, unknown, arbitrary will of another man: as freedom\
  \ of nature is, to be under no other restraint but the law of nature.[46]\n\nThe\
  \ principle was also discussed by Montesquieu in The Spirit of Law (1748).[47] The\
  \ phrase \"rule of law\" appears in Samuel Johnson's Dictionary (1755).[48]\n\n\n\
  \nIn 1776, the notion that no one is above the law was popular during the founding\
  \ of the United States. For example, Thomas Paine wrote in his pamphlet Common Sense\
  \ that \"in America, the law is king. For as in absolute governments the King is\
  \ law, so in free countries the law ought to be king; and there ought to be no other.\"\
  [49] In 1780, John Adams enshrined this principle in Article VI of the Declaration\
  \ of Rights in the Constitution of the Commonwealth of Massachusetts:\n\nNo man,\
  \ nor corporation, or association of men, have any other title to obtain advantages,\
  \ or particular and exclusive privileges, distinct from those of the community,\
  \ than what arises from the consideration of services rendered to the public; and\
  \ this title being in nature neither hereditary, nor transmissible to children,\
  \ or descendants, or relations by blood, the idea of a man born a magistrate, lawgiver,\
  \ or judge, is absurd and unnatural.[50]\n\n\nThe term \"rule of law\" was popularised\
  \ by British jurist A. V. Dicey,[16] who viewed the rule of law in common law systems\
  \ as comprising three principles. First, that government must follow the law that\
  \ it makes; second, that no one is exempt from the operation of the law and that\
  \ it applies equally to all; and third, that general rights emerge from particular\
  \ cases decided by the courts.[51]\n\n\nThe influence of Britain, France and the\
  \ United States contributed to spreading the principle of the rule of law to other\
  \ countries around the world.[52][53]\n\n\nThe Oxford English Dictionary has defined\
  \ rule of law as:[54]\n\n\nThe authority and influence of law in society, esp. when\
  \ viewed as a constraint on individual and institutional behaviour; (hence) the\
  \ principle whereby all members of a society (including those in government) are\
  \ considered equally subject to publicly disclosed legal codes and processes.\n\n\
  Despite wide use by politicians, judges and academics, the rule of law has been\
  \ described as \"an exceedingly elusive notion\".[55] In modern legal theory, there\
  \ are at least two principal conceptions of the rule of law: a formalist or \"thin\"\
  \ definition, and a substantive or \"thick\" definition. Formalist definitions of\
  \ the rule of law do not make a judgment about the justness of law itself, but define\
  \ specific procedural attributes that a legal framework must have in order to be\
  \ in compliance with the rule of law. Substantive conceptions of the rule of law,\
  \ generally from more recent authors, go beyond this and include certain substantive\
  \ rights that are said to be based on, or derived from, the rule of law.[56] One\
  \ occasionally encounters a third \"functional\" conception.[57]\n\n\nThe functional\
  \ interpretation of the term rule of law contrasts the rule of law with the rule\
  \ of man.[58] According to the functional view, a society in which government officers\
  \ have a great deal of discretion has a low degree of \"rule of law\", whereas a\
  \ society in which government officers have little discretion has a high degree\
  \ of \"rule of law\".[58] Upholding the rule of law can sometimes require the punishment\
  \ of those who commit offenses that are justifiable under natural law but not statutory\
  \ law.[59] The rule of law is thus somewhat at odds with flexibility, even when\
  \ flexibility may be preferable.[58]\n\n\n\nFormalist theorists claim that the rule\
  \ of law requires procedural generality (general rules that apply to classes of\
  \ persons and behaviors as opposed to individuals), publicity (no secret laws),\
  \ prospective application (little or no retroactive laws), consistency (no contradictory\
  \ laws),[60] equality (applied equally throughout all society), and certainty (certainty\
  \ of application for a given situation), but that there are no requirements with\
  \ regard to the substantive content of the law.[57][61] Formalists include A. V.\
  \ Dicey, F. A. Hayek, Joseph Raz, and Joseph Unger.\n\nAccording to Dicey, the rule\
  \ of law in the United Kingdom has three dominant characteristics:[62] First, the\
  \ absolute supremacy of regular law – a person is to be judged by a fixed set of\
  \ rules and punished for breaching only the law, and is not to be subject to \"\
  the exercise by persons in authority of wide, arbitrary, or discretionary powers\
  \ of constraint\".[63] Second, the equality of law — \"the universal subjection\
  \ of all classes to one law administered by the ordinary Courts\".[64] Third, the\
  \ fact that, in the United Kingdom, the constitution is the result of the common\
  \ law, being not the source but the consequence of citizens' rights.[65]\n\n\nA\
  \ 1977 article by Joseph Raz argued that the rule of law means that people should\
  \ obey the law and be ruled by it.[66] Construed more narrowly, the rule of law\
  \ would also mean that the government should be ruled by and subjected to the law.\
  \ Following from Raz's general conception of the rule of law, he argued for the\
  \ existence of two groups of principles of the rule of law: First, that the law\
  \ is capable of guiding the behaviour of its subjects; second, that there exists\
  \ an effective legal machinery that secures actual compliance with the rule of law.[67]\
  \ The first group comprises principles such as the accessibility, clarity, and prospective\
  \ nature of the law;[68] the stability of the law;[69] and the compliance of lawmaking\
  \ with \"open, stable, clear and general rules\" that create a stable framework,[70]\
  \ with such rules empowering authorities to make orders and providing guidelines\
  \ for the exercise of such powers.[70] The second group includes principles including\
  \ judicial independence,[71] natural justice,[72] judicial review,[72] and limited\
  \ administrative discretion.[73]\n\n\nIn Raz's view, one of the virtues of the rule\
  \ of law is the restraint it imposes on authorities. It aims to exclude arbitrary\
  \ power, as most of the exercises of arbitrary power violate the rule of law. Arbitrary\
  \ power is excluded when courts hold themselves accountable only to the law and\
  \ observe \"fairly strict procedures\". Another virtue is the protection it accords\
  \ to individual freedom, namely, \"the sense of freedom in which it is identified\
  \ with an effective ability to choose between as many options as possible\". Most\
  \ importantly, to adhere to the rule of law is to respect human dignity by \"treating\
  \ humans as persons capable of planning and plotting their future\".[74]\n\n\nRaz\
  \ also used the \"sharpness of a knife\" analogy to show that the rule of law is\
  \ a neutral tool. He argued that just as a sharp knife makes both a surgeon and\
  \ a murderer more efficient, the rule of law makes a legal system better at reaching\
  \ its goals, regardless of whether those goals are actually moral.[75]\n\n\nRaz\
  \ also identified some of the potential pitfalls of the rule of law. He opined that\
  \ as the rule of law is designed \"to minimise the harm to freedom and dignity which\
  \ the law may cause in its pursuit of its goals however laudable these may be\"\
  , the strict pursuit of the rule of law may prevent one from achieving certain social\
  \ goals which may be preferable to the rule of law: \"Sacrificing too many social\
  \ goals on the altar of the rule of law may make the law barren and empty\".[76]\n\
  \n\n\nSubstantive theorists believe that the rule of law necessarily entails protection\
  \ of individual rights. Some substantive theorists believe that democracy is part\
  \ of the rule of law.[58] Substantivists include Ronald Dworkin, Sir John Laws,\
  \ Lon Fuller, Trevor Allan, and Tom Bingham holding that the rule of law intrinsically\
  \ protects some or all individual rights.\n\nRonald Dworkin defines what he terms\
  \ the \"rights conception\" of the rule of law as follows:[77]\n\n\nIt assumes that\
  \ citizens have moral rights and duties with respect to one another, and political\
  \ rights against the state as a whole. It insists that these moral and political\
  \ rights be recognized in positive law, so that they may be enforced upon the demand\
  \ of individual citizens through courts or other judicial institutions of the familiar\
  \ type, so far as this is practicable. The rule of law on this conception is the\
  \ ideal of rule by an accurate public conception of individual rights. It does not\
  \ distinguish, as the rule book conception does, between the rule of law and substantive\
  \ justice; on the contrary it requires, as part of the ideal of law, that the rules\
  \ in the book capture and enforce moral rights.\n\nPaul Craig, in analysing Dworkin's\
  \ view, drew three conclusions. First, Dworkin rejects the need to distinguish between\
  \ \"legal\" rules and a more complete political philosophy, since the rule of law\
  \ is basically the theory of law and adjudication that he believes is correct. Secondly,\
  \ the rule of law is not simply the thin or formal rule of law; the latter forms\
  \ part of Dworkin's theory of law and adjudication. Thirdly, since taking a substantive\
  \ view of the rule of law requires choosing what the best theory of justice is,\
  \ it is necessary to articulate particular conceptions of what liberty, equality\
  \ and other freedoms require.[78]\n\n\nIn his book, \"What Is the Rule of Law?\"\
  \ Lon Fuller rejects legal positivism, the idea that law is no higher than a particular\
  \ authority, that the law is morally neutral, and he sets out a list of requirements\
  \ to include in his definition of the rule of law.[79]\n\n\nIn his book, \"The rule\
  \ of law\" Tom Bingham further has requirements not only on how the laws must be\
  \ handled, but also requirements that the laws must follow to include in his definition\
  \ of the rule of law.[80]\n\n\nEconomists and lawyers have studied and analysed\
  \ the rule of law's impact on economic development. In particular, a major question\
  \ in the area of law and economics is whether the rule of law matters to economic\
  \ development, particularly in developing nations.[81] The economist F. A. Hayek\
  \ analyzed how the rule of law might be beneficial to the free market. Hayek proposed\
  \ that under the rule of law, individuals would be able to make wise investments\
  \ and future plans with some confidence in a successful return on investment when\
  \ he stated: \"under the Rule of Law the government is prevented from stultifying\
  \ individual efforts by ad hoc action. Within the known rules of the game the individual\
  \ is free to pursue his personal ends and desires, certain that the powers of government\
  \ will not be used deliberately to frustrate his efforts.\"[82]\n\n\nStudies have\
  \ shown that weak rule of law (for example, discretionary regulatory enforcement)\
  \ discourages investment. Economists have found, for example, that a rise in discretionary\
  \ regulatory enforcement caused US firms to abandon international investments.[83]\n\
  \n\nConstitutional economics is the study of the compatibility of economic and financial\
  \ decisions within existing constitutional law frameworks. Aspects of constitutional\
  \ frameworks relevant to both the rule of law and public economics include government\
  \ spending on the judiciary, which, in many transitional and developing countries,\
  \ is completely controlled by the executive. Additionally, judicial corruption may\
  \ arise from both the executive branch and private actors. Standards of constitutional\
  \ economics such as transparency can also be used during annual budget processes\
  \ for the benefit of the rule of law. Further, the availability of an effective\
  \ court system in situations of unfair government spending and executive impoundment\
  \ of previously authorized appropriations is a key element for the success of the\
  \ rule of law.[84]\n\n\nNobel laureates Daron Acemoglu and James A. Robinson emphasize\
  \ the importance of the rule of law for promoting inclusive institutions, which\
  \ are key to sustained economic growth and prosperity by ensuring that laws apply\
  \ equally to everyone, including elites and government officials.[85] The authors\
  \ highlight historical examples, such as the French Revolution, where the rule of\
  \ law helped dismantle absolutism and feudal privileges, paving the way for inclusive\
  \ institutions. They also discuss how pluralistic political institutions are essential\
  \ for the rule of law to thrive, as they create broad coalitions that support fairness\
  \ and equality.\n\n\nThe term \"rule of law\" has been used primarily in the English-speaking\
  \ countries, and it is not yet fully clarified with regard to such well-established\
  \ democracies such as Sweden, Denmark, France, Germany, or Japan. A common language\
  \ between lawyers of common law and civil law countries is critically important\
  \ for research of links between the rule of law and real economy.[87]\n\n\nThe rule\
  \ of law can be hampered when there is a disconnect between legal and popular consensus.\
  \ For example, under the auspices of the World Intellectual Property Organization,\
  \ nominally strong copyright laws have been implemented throughout most of the world;\
  \ but because the attitude of much of the population does not conform to these laws,\
  \ a rebellion against ownership rights has manifested in rampant piracy, including\
  \ an increase in peer-to-peer file sharing.[88] Similarly, in Russia, tax evasion\
  \ is common and a person who admits he does not pay taxes is not judged or criticized\
  \ by his colleagues and friends, because the tax system is viewed as unreasonable.[89]\
  \ Bribery likewise has different normative implications across cultures.[90]\n\n\
  \nUNESCO has argued that education has an important role in promoting the rule of\
  \ law and a culture of lawfulness, providing an important protective function by\
  \ strengthening learners' abilities to face and overcome difficult life situations.\
  \ Young people can be important contributors to a culture of lawfulness, and governments\
  \ can provide educational support that nurtures positive values and attitudes in\
  \ future generations.[91] A movement towards education for justice seeks to promote\
  \ the rule of law in schools.[91]\n\n\nFrancis Fukuyama in his book The Origins\
  \ of Political Order states the rule of law is a requirement for stability.\n\n\n\
  The rule of law has been considered one of the key dimensions that determine the\
  \ quality and good governance of a country.[92] Research, like the Worldwide Governance\
  \ Indicators, defines the rule of law as \"the extent to which agents have confidence\
  \ and abide by the rules of society, and in particular the quality of contract enforcement,\
  \ the police and the courts, as well as the likelihood of crime or violence.\"[92]\
  \ Based on this definition the Worldwide Governance Indicators project has developed\
  \ aggregate measurements for the rule of law in more than 200 countries, as seen\
  \ in the map at right.[93] Other evaluations such as the World Justice Project Rule\
  \ of Law Index[94] show that adherence to rule of law fell in 61% of countries in\
  \ 2022. Globally, this means that 4.4 billion people live in countries where rule\
  \ of law declined in 2021.[95]\n\n\nLapses in the rule of law can arise in conflict\
  \ between two or more countries.[96]\n\n\nThe preamble of the rule of law European\
  \ Convention for the Protection of Human Rights and Fundamental Freedoms says \"\
  the governments of European countries which are like-minded and have a common heritage\
  \ of political traditions, ideals, freedom and the rule of law\".\n\n\nIn France\
  \ and Germany the concepts of rule of law (Etat de droit and Rechtsstaat respectively)\
  \ are analogous to the principles of constitutional supremacy and protection of\
  \ fundamental rights from public authorities, particularly the legislature.[97][98]\
  \ France was one of the early pioneers of the ideas of the rule of law.[99] The\
  \ German interpretation is more rigid but similar to that of France and the United\
  \ Kingdom.[100][101]\n\n\nIn the United Kingdom the rule of law is a long-standing\
  \ principle of the way the country is governed, dating from England's Magna Carta\
  \ in 1215 and the Bill of Rights 1689.[44][102][103] In the 19th century classic\
  \ work Introduction to the Study of the Law of the Constitution (1885), A. V. Dicey,\
  \ a constitutional scholar and lawyer, wrote of the twin pillars of the British\
  \ constitution: the rule of law and parliamentary sovereignty.[104]\n\n\nAll government\
  \ officers of the United States, including the President, Justices of the Supreme\
  \ Court, state judges and legislators, and all members of Congress, pledge first\
  \ and foremost to uphold the Constitution, affirming that the rule of law is superior\
  \ to the rule of any human leader.[105] At the same time, the federal government\
  \ has considerable discretion: the legislative branch is free to decide what statutes\
  \ it will write, as long as it stays within its enumerated powers and respects the\
  \ constitutionally protected rights of individuals. Likewise, the judicial branch\
  \ has a degree of judicial discretion,[106] and the executive branch also has various\
  \ discretionary powers including prosecutorial discretion. \n\n\nJames Wilson said\
  \ during the Philadelphia Convention in 1787 that, \"Laws may be unjust, may be\
  \ unwise, may be dangerous, may be destructive; and yet not be so unconstitutional\
  \ as to justify the Judges in refusing to give them effect.\" George Mason agreed\
  \ that judges \"could declare an unconstitutional law void. But with regard to every\
  \ law, however unjust, oppressive or pernicious, which did not come plainly under\
  \ this description, they would be under the necessity as judges to give it a free\
  \ course.\"[107] Chief Justice John Marshall a similar position in 1827: \"When\
  \ its existence as law is denied, that existence cannot be proved by showing what\
  \ are the qualities of a law.\"[108]\n\n\nScholars continue to debate whether the\
  \ U.S. Constitution adopted a particular interpretation of the \"rule of law\",\
  \ and if so, which one. For example, John Harrison asserts that the word \"law\"\
  \ in the Constitution is simply defined as that which is legally binding, rather\
  \ than being \"defined by formal or substantive criteria\", and therefore judges\
  \ do not have discretion to decide that laws fail to satisfy such unwritten and\
  \ vague criteria.[109] Law professor Frederick Mark Gedicks disagrees, writing that\
  \ Cicero, Augustine, Thomas Aquinas, and the framers of the U.S. Constitution believed\
  \ that \"an unjust law was not really a law at all\".[110]\n\n\nSome modern scholars\
  \ contend that the rule of law has been corroded during the past century by the\
  \ instrumental view of law promoted by legal realists such as Oliver Wendell Holmes\
  \ and Roscoe Pound. For example, Brian Tamanaha asserts: \"The rule of law is a\
  \ centuries-old ideal, but the notion that law is a means to an end became entrenched\
  \ only in the course of the nineteenth and twentieth centuries.\"[111]\n\n\nOthers\
  \ argue that the rule of law has survived but was transformed to allow for the exercise\
  \ of discretion by administrators. For much of American history, the dominant notion\
  \ of the rule of law in administrative law has been some version of Dicey's, that\
  \ is, individuals should be able to challenge an administrative order by bringing\
  \ suit in a court of general jurisdiction. The increased number of administrative\
  \ cases led to fears that excess judicial oversight over administrative decisions\
  \ would overwhelm the courts and destroy the advantages of specialization that led\
  \ to the creation of administrative agencies in the first place. By 1941, a compromise\
  \ had emerged. If administrators adopted procedures that more or less tracked \"\
  the ordinary legal manner\" of the courts, further review of the facts by \"the\
  \ ordinary Courts of the land\" was unnecessary. Thus Dicey's rule of law was recast\
  \ into a purely procedural form.[112]\n\n\nNumerous definitions of \"rule of law\"\
  \ are used in United States governmental bodies. An organization's definition might\
  \ depend on that organization's goal. For instance, military occupation or counterinsurgency\
  \ campaigns may necessitate prioritising physical security over human rights.[113]\
  \ U.S. Army doctrine and U.S. Government (USG) interagency agreements might see\
  \ the rule of law as a principle of governance:[113] Outlines of different definitions\
  \ are given in a JAG Corps handbook for judge advocates deployed with the US Army.[113][non-primary\
  \ source needed][original research?]\n\n\nOn July 1, 2024, in Trump v. United States,\
  \ the Supreme Court held that presidents have absolute immunity for acts committed\
  \ as president within their core constitutional purview, at least presumptive immunity\
  \ for official acts within the outer perimeter of their official responsibility,\
  \ and no immunity for unofficial acts.[114][115] Legal scholars have warned of the\
  \ negative impact of this decision on the status of rule of law in the United States.[116]\
  \ Prior to that, in 1973 and 2000 the Office of Legal Counsel within the Department\
  \ of Justice issued opinions saying that a sitting president cannot be indicted\
  \ or prosecuted,[117][118] but it is constitutional to indict and try a former president\
  \ for the same offenses for which the President was impeached by the House of Representatives\
  \ and acquitted by the Senate under the Impeachment Disqualification Clause of Article\
  \ I, Section III.[119][120][121]\n\n\nTrump's second term has raised concerns among\
  \ experts, including the American Bar Association,[122] that the rule of law in\
  \ the United States is seriously threatened.[123][124][125][126][127] A particular\
  \ point of concern is whether the administration will follow court orders.[128]\n\
  \n\nIn Canada, the rule of law is associated with A.V. Dicey's view. It is mentioned\
  \ in the preamble to the Constitution Act, 1982. The Constitution of Canada is \"\
  similar in principle\" to the British constitution, and includes unwritten constitutional\
  \ principles of democracy, judicial independence, federalism, constitutionalism\
  \ and the rule of law, and the protection of minorities.[129]\n\n\nIn 1959, Roncarelli\
  \ v Duplessis, the Supreme Court of Canada called the Rule of Law a \"fundamental\
  \ postulate\" of the Canadian Constitution. According to Reference Re Secession\
  \ of Quebec, it encompasses, \"a sense of orderliness, of subjection to known legal\
  \ rules and of executive accountability to legal authority.\" In Canadian law, it\
  \ means that the relationship between the state and the individual must be regulated\
  \ by law and that the Constitution binds all governments, both federal and provincial,\
  \ including the executive. With the adoption of the Canadian Charter of Rights and\
  \ Freedoms, the Canadian system of government was transformed to a significant extent\
  \ from a system of Parliamentary supremacy to one of constitutional supremacy. The\
  \ principle of the rule of law and constitutionalism is aided by acknowledging that\
  \ the constitution is entrenched beyond simple majority rule.[130] However, the\
  \ notwithstanding clause operates to provide a limited \"legislative override\"\
  \ of certain fundamental freedoms contained in the Charter, and has been invoked\
  \ at different times by provincial legislatures.\n\n\nIn Canadian administrative\
  \ law, \"all exercises of public authority must find their source in law. All decision-making\
  \ powers have legal limits, derived from the enabling statute itself, the common\
  \ or civil law or the Constitution. Judicial review is the means by which the courts\
  \ supervise those who exercise statutory powers, to ensure that they do not overstep\
  \ their legal authority. The function of judicial review is therefore to ensure\
  \ the legality, the reasonableness and the fairness of the administrative process\
  \ and its outcomes.\"[131] Administrative decision makers must adopt a culture of\
  \ justification and demonstrate that their exercise of delegated public power can\
  \ be “justified to citizens in terms of rationality and fairness.”[132]\n\n\nEast\
  \ Asian cultures are influenced by two schools of thought, Confucianism, which advocated\
  \ good governance as rule by leaders who are benevolent and virtuous, and legalism,\
  \ which advocated strict adherence to law. The influence of one school of thought\
  \ over the other has varied throughout the centuries. One study indicates that throughout\
  \ East Asia, only South Korea, Singapore, Japan, Taiwan and Hong Kong have societies\
  \ that are robustly committed to a law-bound state.[133] According to Awzar Thi,\
  \ a member of the Asian Human Rights Commission, the rule of law in Cambodia and\
  \ most of Asia is weak or nonexistent:\n\n\nApart from a number of states and territories,\
  \ across the continent there is a huge gulf between the rule of law rhetoric and\
  \ reality. In Thailand, the police force is favor over the rich and corrupted. In\
  \ Cambodia, judges are proxies for the ruling political party ... That a judge may\
  \ harbor political prejudice or apply the law unevenly are the smallest worries\
  \ for an ordinary criminal defendant in Asia. More likely ones are: Will the police\
  \ fabricate the evidence? Will the prosecutor bother to show up? Will the judge\
  \ fall asleep? Will I be poisoned in prison? Will my case be completed within a\
  \ decade?[134]\n\nIn countries such as China and Vietnam, the transition to a market\
  \ economy has been a major factor in a move toward the rule of law, because the\
  \ rule of law is important to foreign investors and to economic development. It\
  \ remains unclear whether the rule of law in countries like China and Vietnam will\
  \ be limited to commercial matters or will spill into other areas as well, and if\
  \ so whether that spillover will enhance prospects for related values such as democracy\
  \ and human rights.[135]\n\n\nIn China, the phrase fǎzhì (法治), which can be translated\
  \ as \"rule of law,\" means using the law as an instrument to facilitate social\
  \ control.[136]\n\n\nLate Qing dynasty legal reforms unsuccessfully sought to implement\
  \ Western legal principles including the rule of law and judicial independence.[137]: 122–123 \
  \ Judicial independence further decreased in the Republic of China under Chiang\
  \ Kai-shek per the Kuomintang's policy of particization (danghua), under which administrative\
  \ judges were required to have \"deep comprehension\" of the KMT's principles.[137]: 123 \n\
  \n\nAfter China's reform and opening-up, the Communist Party emphasized the rule\
  \ of law as a basic strategy and method for state management of society.[138]: 110 \
  \ Jiang Zemin first called for establishing a socialist rule of law at the Fifteenth\
  \ Party Congress in 1997.[138]: 110  Despite the CCP's Document 9 arguing that Western\
  \ values have corrupted many people's understanding of the rule of law, the CCP\
  \ has simultaneously endorsed governing the country in accordance with the rule\
  \ of law.[139] These factors likely suggest that the CCP is creating a rule of law\
  \ with Chinese characteristics, which may simply entail modifying the Western notion\
  \ of rule of law to best match China's unique political, social, and historical\
  \ conditions. As Document 9 suggests, the CCP does not see judicial independence,\
  \ separation of power, or constitutional forms of governance as defined by Western\
  \ society, as suiting China's unique form of governance.[140][141] This unique version\
  \ of the rule of law with Chinese characteristics has led to different attempts\
  \ to define China's method of governing the country by rule of law domestically\
  \ and internationally.[142][141]\n\n\nIn his writings on socialist rule of law in\
  \ China, Xi Jinping has emphasized traditional Chinese concepts including people\
  \ as the root of the state (mingben), \"the ideal of no lawsuit\" (tianxia wusong),\
  \ \"respecting rite and stressing law\" (longli zhongfa), \"virtue first, penalty\
  \ second\" (dezhu xingfu), and \"promoting virtue and being prudent in punishment\"\
  \ (mingde shenfa).[138]: 110–111  Xi states that the two fundamental aspects of\
  \ the socialist rule of law are: that the political and legal organs (including\
  \ courts, the police, and the procuratorate) must believe in the law and uphold\
  \ the law; and all political and legal officials must follow the Communist Party.[138]: 115 \n\
  \n\nThe Constitution of India is intended to limit opportunities for governmental\
  \ discretion, and the judiciary uses judicial review to uphold the Constitution,\
  \ especially the Fundamental Rights.[143] Although some people have criticized the\
  \ Indian judiciary for its judicial activism,[144] others believe such actions are\
  \ needed to safeguard the rule of law based on the Constitution as well as to preserve\
  \ judicial independence, an important part of the basic structure doctrine.[145]\n\
  \n\nJapan had centuries of tradition prior to World War II, during which there were\
  \ laws, but they did not provide a central organizing principle for society, and\
  \ they did not constrain the powers of government.[146] As the 21st century began,\
  \ the percentage of people who were lawyers and judges in Japan remained very low\
  \ relative to western Europe and the United States, and legislation in Japan tended\
  \ to be terse and general, leaving much discretion in the hands of bureaucrats.[147][148]\n\
  \n\nVarious organizations are involved in promoting the rule of law.\n\n\nThe rule\
  \ of law is enshrined in Article 2 of the Treaty on European Union as one of the\
  \ common values for all Member States. Under the rule of law, all public powers\
  \ always act within the constraints set out by law, in accordance with the values\
  \ of democracy and fundamental rights, and under the control of independent and\
  \ impartial courts. The rule of law includes principles such as legality, implying\
  \ a transparent, accountable, democratic and pluralistic process for enacting laws;\
  \ legal certainty; prohibiting the arbitrary exercise of executive power; effective\
  \ judicial protection by independent and impartial courts, effective judicial review\
  \ including respect for fundamental rights; separation of powers; and equality before\
  \ the law. These principles have been recognised by the European Court of Justice\
  \ and the European Court of Human Rights. In addition, the Council of Europe has\
  \ developed standards and issued opinions and recommendations which provide well-established\
  \ guidance to promote and uphold the rule of law.[149]\n\n\nThe Statute of the Council\
  \ of Europe characterizes the rule of law as one of the core principles which the\
  \ establishment of the organization based on. The paragraph 3 of the preamble of\
  \ the Statute of the Council of Europe states: \"Reaffirming their devotion to the\
  \ spiritual and moral values which are the common heritage of their peoples and\
  \ the true source of individual freedom, political liberty and the rule of law,\
  \ principles which form the basis of all genuine democracy.\" The Statute lays the\
  \ compliance with the rule of law principles as a condition for the European states\
  \ to be a full member of the organization.[150]\n\n\nIn 1959, an event took place\
  \ in New Delhi and speaking as the International Commission of Jurists, made a declaration\
  \ as to the fundamental principle of the rule of law. The event consisted of over\
  \ 185 judges, lawyers, and law professors from 53 countries. This later became known\
  \ as the Declaration of Delhi. During the declaration they declared that the rule\
  \ of law implied certain rights and freedoms, an independent judiciary, and social,\
  \ economic and cultural conditions conducive to human dignity. One aspect not included\
  \ in The Declaration of Delhi was for rule of law requiring legislative power to\
  \ be subject to judicial review.[151]\n\n\nUpholding the rule of law is at the heart\
  \ of the United Nations' mission. The Secretary-General of the United Nations defines\
  \ the concept as:[152]\n\n\n\na principle of governance in which all persons, institutions\
  \ and entities, public and private, including the State itself, are accountable\
  \ to laws that are publicly promulgated, equally enforced and independently adjudicated,\
  \ and which are consistent with international human rights norms and standards.\
  \ It requires, as well, measures to ensure adherence to the principles of supremacy\
  \ of law, equality before the law, accountability to the law, fairness in the application\
  \ of the law, separation of powers, participation in decision-making, legal certainty,\
  \ avoidance of arbitrariness and procedural and legal transparency.\n\nThe General\
  \ Assembly has considered rule of law an agenda item since 1992, with renewed interest\
  \ since 2006 and has adopted resolutions at its last three sessions.[153] The Security\
  \ Council has held a number of thematic debates on the rule of law,[154] and adopted\
  \ resolutions emphasizing the importance of these issues in the context of women,\
  \ peace and security,[155] children in armed conflict,[156] and the protection of\
  \ civilians in armed conflict.[157] The Peacebuilding Commission has also regularly\
  \ addressed rule of law issues with respect to countries on its agenda.[158] The\
  \ Vienna Declaration and Programme of Action also requires the rule of law be included\
  \ in human rights education.[159] Additionally, the Sustainable Development Goal\
  \ 16, a component of the 2030 Agenda is aimed at promoting the rule of law at national\
  \ and international levels.[160]\n\n\nIn Our Common Agenda, the United Nations Secretary\
  \ General announced that \"in support of efforts to put people at the center of\
  \ justice systems, I will promote a new vision for the rule of law, building on\
  \ Sustainable Development Goal 16 and the 2012 Declaration of the High-level Meeting\
  \ of the General Assembly on the Rule of Law at the National and International Levels.\"\
  [161] He published his new, action-oriented vision in 2023.[162]\n\n\nThe Council\
  \ of the International Bar Association passed a resolution in 2009 endorsing a substantive\
  \ or \"thick\" definition of the rule of law:[163]\n\n\nAn independent, impartial\
  \ judiciary; the presumption of innocence; the right to a fair and public trial\
  \ without undue delay; a rational and proportionate approach to punishment; a strong\
  \ and independent legal profession; strict protection of confidential communications\
  \ between lawyer and client; equality of all before the law; these are all fundamental\
  \ principles of the Rule of Law. Accordingly, arbitrary arrests; secret trials;\
  \ indefinite detention without trial; cruel or degrading treatment or punishment;\
  \ intimidation or corruption in the electoral process, are all unacceptable. The\
  \ Rule of Law is the foundation of a civilised society. It establishes a transparent\
  \ process accessible and equal to all. It ensures adherence to principles that both\
  \ liberate and protect. The IBA calls upon all countries to respect these fundamental\
  \ principles. It also calls upon its members to speak out in support of the Rule\
  \ of Law within their respective communities.\n\nThe World Justice Project (WJP)[165]\
  \ is an international organization that produces independent research and data,\
  \ in order to build awareness, and stimulate action to advance the rule of law.[166]\n\
  \n\nThe World Justice Project defines the rule of law as a durable system of laws,\
  \ institutions, norms, and country commitment that uphold four universal principles:[167]\n\
  \n\nTheir flagship WJP Rule of Law Index,[168] measures the extent to which 140\
  \ countries and jurisdictions[169] adhere to the rule of law across eight dimensions:[170]\
  \ Constraints on Government Powers, Absence of Corruption, Open Government, Fundamental\
  \ Rights, Order and Security, Regulatory Enforcement, Civil Justice, and Criminal\
  \ Justice.\n\n\nThe International Development Law Organization (IDLO) is an intergovernmental\
  \ organization with a joint focus on the promotion of rule of law and development.\
  \ It works to empower people and communities to claim their rights, and provides\
  \ governments with the know-how to realize them.[171] It supports emerging economies\
  \ and middle-income countries to strengthen their legal capacity and rule of law\
  \ framework for sustainable development and economic opportunity.[172] It is the\
  \ only intergovernmental organization with an exclusive mandate to promote the rule\
  \ of law and has experience working in more than 90 countries around the world.[173]\n\
  \n\nThe International Development Law Organization has a holistic definition of\
  \ the rule of law:\n\n\nMore than a matter of due process, the rule of law is an\
  \ enabler of justice and development. The three notions are interdependent; when\
  \ realized, they are mutually reinforcing. For IDLO, as much as a question of laws\
  \ and procedure, the rule of law is a culture and daily practice. It is inseparable\
  \ from equality, from access to justice and education, from access to health and\
  \ the protection of the most vulnerable. It is crucial for the viability of communities\
  \ and nations, and for the environment that sustains them.[174]\n\nThe International\
  \ Network to Promote the Rule of Law is an international network of law practitioners\
  \ working on rule of law issues in post-conflict and developing countries from a\
  \ policy, practice and research perspective. INPROL is based at the US Institute\
  \ of Peace in partnership with the US Department of State Bureau of International\
  \ Narcotics and Law Enforcement, the Organization for Security and Cooperation in\
  \ Europe Strategic Police Matters Unit, the Center of Excellence for Police Stability\
  \ Unit, and William and Mary School of Law in the United States.[175]\n\n\n This\
  \ article incorporates text from a free content work. Licensed under CC BY-SA (license\
  \ statement/permission). Text taken from Strengthening the rule of law through education:\
  \ A guide for policymakers​, 63, UNESCO.  \n"
