  Although evidence of public speaking training exists in ancient Egypt,[21] the first
  known writing on oratory[22] is 2,000 years old from ancient Greece. This work elaborates
  on principles drawn from the practices and experiences of ancient Greek orators.



  Aristotle, one of the first oratory teachers to use definitive rules and models,
  believed that successful speakers combined, to varying degrees, three qualities
  in their speech: reasoning, which he called Logos; credentials, which he called
  Ethos; and emotion, which he called Pathos.[23] Aristotle''s work became an essential
  part of a liberal arts education during the Middle Ages and the Renaissance. The
  classical antiquity works by the ancient Greeks capture how they taught and developed
  the art of public speaking thousands of years ago.



  In classical Greece and Rome, rhetoric was the main component of composition and
  speech delivery, both critical skills for use in public and private life. In ancient
  Greece, citizens spoke for themselves rather than having professionals, such as
  modern lawyers, speak for them. Any citizen who wished to succeed in court, politics,
  or social life had to learn public speaking techniques. Rhetorical tools were first
  taught by a group of teachers called Sophists, who taught paying students how to
  speak effectively using their methods.[24]



  Separately from the Sophists, Socrates, Plato, and Aristotle developed their theories
  of public speaking, teaching these principles to students interested in learning
  rhetorical skills. Plato founded The Academy and Aristotle founded The Lyceum to
  teach these skills.[25]



  Demosthenes was a well-known orator from Athens. After his father died when he was
  7, he had three legal guardians: Aphobus, Demophon, and Theryppides.[26] His inspiration
  for public speaking came from learning that his guardians had robbed him of the
  money his father left for his education.[27] His first public speech was in the
  court proceeding he brought against his three guardians.[28] After that, Demosthenes
  continued to practice public speaking. He is known for sticking pebbles into his
  mouth to improve his pronunciation, talking while running so that he would not lose
  his breath, and practicing speaking in front of a mirror to improve his delivery.[28]



  When Philip II, the ruler of Macedon, tried to conquer the Greeks, Demosthenes made
  a speech called Kata Philippou A. In this speech, he spoke about why he opposed
  Philip II as a threat to all of Greece.[26] This was the first of several speeches
  known as the Philippics.[28] He made other speeches known as the Olynthiacs. Both
  series of speeches favored independence and rallied Athenians against Philip II.[28][27]



  During the political rise of the Roman Republic, Roman orators copied and modified
  the ancient Greek techniques of public speaking. Instruction in rhetoric developed
  into a full curriculum, including instruction in grammar (study of the poets), preliminary
  exercises (progymnasmata), and preparation of public speeches (declamation) in both
  forensic and deliberative genres.



  In Latin, rhetoric was heavily influenced by Cicero, an orator during the Roman
  Empire, and emphasized a broad education in all areas of the humanities. Other areas
  of rhetorical study included the use of wit and humor, the appeal to the listener''s
  emotions, and the use of digressions. Oratory in the Roman Empire, though less central
  to political life than during the Republic, remained important in law and entertainment.
  Famous orators were celebrities in ancient Rome, becoming wealthy and prominent
  in society.



  The ornate Latin style was the primary form of oration through the mid-20th century.
  After World War II and the increased use of film and television, the Latin oration
  style began to fall out of favor. This cultural change likely had to do with the
  rise of the scientific method and the emphasis on a "plain" style of speaking and
  writing. Even today''s formal oratory is much less ornate than in the Classical
  Era.



  In one of his most famed writings, "Rhetoric", written in 350 BCE, Aristotle described
  mastering the art of public speaking. In this and other works by Aristotle, rhetoric
  is the act of publicly persuading an audience.[29] Rhetoric is similar to dialect:
  he defines both as being acts of persuasion. However, dialect is the act of persuading
  someone in private, whereas rhetoric is about persuading people in a public setting.[29]
  Aristotle defines someone who practices rhetoric or a "rhetorician" as an individual
  who can comprehend persuasion and how it is applied.[29]



  Aristotle divides rhetoric into three elements: (i) the speaker; (ii) the topic
  or point of the speech; and (iii) the audience.[29][30] Aristotle also classifies
  oration into three types: (i) political, used to convince people to take or not
  take action; (ii) forensic, usually used in law related to accusing or defending
  someone; and (iii) ceremonial, which recognizes someone positively or negatively.[30]



  Aristotle breaks down the political category into five focuses or themes: "ways
  and means, war and peace, national defense, imports and exports, and legislation."[30]
  These focuses are broken down into detail so that the speaker can effectively influence
  an audience to agree and support the speaker''s ideas.[30]



  In Aristotle''s "Rhetoric" writing, he mentions three strategies someone can use
  to try to persuade an audience:[29] Establishing the character of a speaker (Ethos),
  influencing the emotional element of the audience (Pathos), and focusing on the
  argument specifically (Logos).[29][31] Aristotle believes establishing the character
  of a speaker is effective in persuasion because the audience will believe what the
  speaker is saying to be true if the speaker is credible and trustworthy.[29] With
  the audience''s emotional state, Aristotle believes that individuals do not make
  the same decisions when in different moods.[29] Because of this, one needs to try
  to influence the audience by being in control of one''s emotions, making persuasion
  effective.[29] The argument itself can affect the attempt to persuade by making
  the argument of the case so clear and valid that the audience will understand and
  believe that the speaker''s point is real.[29]



  In the last part of "Rhetoric", Aristotle mentions that the most critical piece
  of persuasion is to know in detail what makes up government and to attack what makes
  it unique: "customs, institutions, and interest".[30] Aristotle also states that
  everyone is persuaded by considering people''s interests and how the society in
  which they live influences their interests.[30]



  In his writing De Inventione, Cicero explained the five canons or tenets of rhetoric.
  The five canons apply to rhetoric and public speaking. The five canons are invention,
  arrangement, style, memory, and delivery.[32]



  Invention is the process of coming up with what to say to persuade the audience
  of the key points. Individuals will need to understand their topic, brainstorm their
  ideas, and discover effective research strategies that they can use to get their
  point across. Arrangement is the process of structuring ideas together. Cicero and
  the Roman rhetorician Quintilian identified the structure of a text as Exordium,
  Narrative, Partition, Confirmation, Refutation, and Peroration (or conclusion).
  In today''s text, the structure has been reduced to introduction, body, and conclusion.
  Style is the process of choosing language and constructing your presentation to
  create an emotional response from the audience. Individuals can achieve this by
  using language and rhetoric devices like analogy, allusion and alliteration.[32][33]



  Memory is remembering enough so that individuals are able to fully and fluently
  present without reading off a paper or note cards. This includes figures of speech,
  which can be used to improve memory. Roman rhetoricians made a distinction between
  natural memory (an innate ability) and artificial memory (particular techniques
  that enhanced natural abilities).[33]  Delivery is the last of the five canons of
  rhetoric. It Involves using all the tools available to effectively communicate.
  Methods and tools like tone of voice, change of pace, pauses, volume, body language,
  positioning and props are all effective in delivering the point. [32]



  The fear of speaking in public, known as glossophobia[34] or public speaking anxiety,
  is often mentioned as one of the most common phobias.[34] The reason is uncertain,
  but it has been speculated that this fear is primal, similar to how animals fear
  being seen by predators.[35]



  The apprehension experienced when speaking in public can have several causes,[34]
  such as social anxiety disorder, or a prior experience of public humiliation. This
  can be related to stage fright.[36]



  Effective public speaking can be developed by joining a club such as Rostrum, Toastmasters
  International, Association of Speakers Clubs (ASC), or Speaking Circles, in which
  members are assigned exercises to improve their speaking skills. Members learn by
  observation and practice and hone their skills by listening to constructive suggestions,
  followed by new public speaking exercises.



  Tips for improving public speaking:



  Toastmasters International is a public speaking organization with over 15,000 clubs
  worldwide and more than 300,000 members.[37] This organization helps individuals
  with their public speaking skills, as well as leadership skills necessary to become
  effective public speakers such as content development, club development, and speech
  contests.[38] Members of the club meet and work together on their skills; each member
  practices giving speeches, while the other members evaluate and provide feedback.
  A typical meeting also includes Table Topics, which refers to impromptu speaking,
  that is, talking about different topics without having anything planned.[39] Members
  can volunteer to serve as a meeting functionary to help facilitate the meeting using
  their public speaking and leadership skills. The functionary roles enable each member
  the opportunity to speak at least one time at the meetings.[37] Members can participate
  in a variety of speech contests, in which the winners can compete in the annual
  World Championship of Public Speaking.[40]



  Rostrum is another public speaking organization, founded in Australia, with more
  than 100 clubs all over the country.[41] This organization aims at helping people
  become better communicators, no matter the occasion.[41] At the meetings, speakers
  can gain skills by presenting speeches, while members provide feedback to those
  presenting.[42] Qualified speaking trainers attend these meetings as well, and provide
  professional feedback at the end of the meetings.[42] There are competitions that
  are held for members to participate in.[41] An online club is also available for
  members, no matter where they live.[43]



  The new millennium has seen a notable increase in the number of training solutions
  offered in the form of video and online courses. Videos can provide simulated examples
  of behaviors to emulate. Professional public speakers often engage in ongoing training
  and education to refine their craft. This may include seeking guidance to improve
  their speaking skills, such as learning better storytelling techniques, learning
  how to use humor effectively as a communication tool, and continuously researching
  their topic area of focus.[44] They also recognize that content is king and advocate
  writing as a self-training exercise because it requires a speaker to focus on developing
  the content, not just speaking techniques.[38]



  Public speaking for business and commercial events is often done by professionals,
  whose expertise is well established. These speakers can be contracted independently,
  through representation by a speakers bureau, or by other means. Public speaking
  plays a large role in the professional world. It is believed that 70 percent of
  all jobs involve some form of public speaking.[45] Most professional roles require
  some sort of public speaking skills. Individuals will often be expected to perform
  tasks like training staff, leading meetings, and pitching proposals.[46]



  New technology has opened different forms of public speaking that are non-traditional
  such as TED Talks, which are conferences that are broadcast globally. This form
  of public speaking has created a wider audience base because public speaking can
  now reach both physical and virtual audiences.[47] These audiences can be watching
  from all around the world. YouTube is another platform that allows public speaking
  to reach a larger audience. On YouTube, people can post videos of themselves. Audiences
  can watch these videos for all types of purposes.[48]



  Multimedia presentations can contain different video clips, sound effects, animation,
  laser pointers, remote control clickers, and endless bullet points.[49] All adding
  to the presentation and evolving our traditional views of public speaking.



  Public speakers may use audience response systems. For large assemblies, the speaker
  will usually speak with the aid of a public address system or microphone and loudspeaker.



  Telecommunication and videoconferencing are also forms of public speaking. David
  M. Fetterman of Stanford University wrote in his 1997 article Videoconferencing
  over the Internet: "Videoconferencing technology allows geographically disparate
  parties to hear and see each other usually through satellite or telephone communication
  systems."[50] This technology is helpful for large conference meetings and face-to-face
  communication between parties without demanding the inconvenience of travel.



  An organization called the Penguin Club of Australia was founded in Sydney in 1937
  and aimed at developing women''s communication skills.[51] Led by Jean Ellis, the
  organization spread to other territories of Australia and current-day Papua New
  Guinea over time.[52] A main premise of the organization was that it was created
  "for women by women." They renamed to "Speaking Made Easy" in 2020.[53]



  The British political activist, Emmeline Pankhurst, founded the Women''s Social
  and Political Union (WSPU) on October 10, 1903.[54] The organization was aimed towards
  fighting for women''s right to a parliamentary vote, which only men were granted
  at the time.[55] Emmeline was known for being a powerful orator, who led many women
  to rebel through militant forms until the outbreak of World War I in 1914.[54]



  Kishida Toshiko (1861–1901) was a female speaker during the Meiji era in Japan.
  In October 1883, she publicly delivered a speech entitled ''Hakoiri Musume'' (Daughters
  Kept in Boxes) in front of approximately 600 people.[56] Presented in Yotsu no Miya
  Theater in Kyoto, she criticized the action of parents that shelter their daughters
  from the outside world. Despite her prompt arrest, Kishida demonstrated the ability
  of Japanese women to evoke women''s issues, experiences, and liberation in public
  spaces, through the use of public speaking.[57]



  Malala Yousafzai, a public speaker born in the Swat Valley in Pakistan, is an educational
  activist for women and girls.[58] After the Taliban restricted the educational rights
  of women in the Swat Valley, Yousafzai presented her first speech, How Dare the
  Taliban Take Away My Basic Right to Education?, in which she protested the shutdowns
  of the schools.[59] She presented this speech to the press in Peshawar,[59] bringing
  more awareness to the situation in Pakistan.[59] She is known for her "inspiring
  and passionate speech" about educational rights given at the United Nations.[58]
  She is the youngest person ever to receive the Nobel Peace Prize, at the age of
  17, which was awarded to her in 2014.[58] Her public speaking has brought worldwide
  attention to the difficulties of young girls in Pakistan. She continues to advocate
  for educational rights for women and girls worldwide through the Malala Fund,[58]
  to help girls around the world receive 12 years of education.[59]



  During the 18th and 19th centuries in the United States, a prohibition was instituted
  whereby women were precluded from engaging in public discourse within the confines
  of the courtroom, the Senate floor, and the pulpit.[60] It was deemed improper for
  a woman to be heard in a public setting. Exceptions existed for women from the Quaker
  religion, allowing them to speak publicly in meetings of the church.[61][pages needed]



  Frances Wright was one of the first female public speakers in the United States,
  advocating equal education for both women and men through large audiences and the
  press.[62] Maria Stewart, a woman of African American descent, was also one of the
  first female speakers of the United States, lecturing in Boston in front of both
  men and women just four years after Wright, in 1832 and 1833, on educational opportunities
  and abolition for young girls.[61][pages needed]



  The first female agents and sisters of the American Anti-Slavery Society Angelina
  Grimké and Sarah Grimké created a platform for public lectures to women and conducted
  tours between 1837 and 1839. The sisters advocated that slavery relates to women''s
  rights and that women need equality.[63] They came to a disagreement with churches
  that did not want the two speaking publicly due to them being women.[64]

