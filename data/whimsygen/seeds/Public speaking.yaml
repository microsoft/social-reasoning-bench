content: 'Public speaking, or oratory, is the delivering of a speech to a live audience.[1]
  Throughout history, public speaking has held significant cultural, religious, and
  political importance, emphasizing the necessity of effective rhetorical skills.
  It allows individuals to connect with a group of people to discuss any topic. The
  goal as a public speaker may be to educate, teach, or influence an audience. Public
  speakers often utilize visual such as slideshows, images, and short videos to enhance
  audience understanding.



  The ancient Chinese philosopher Confucius, a key figure in the study of public speaking,
  advocated for speeches that could profoundly affect individuals, including those
  not present in the audience. He believed that words possess the power to inspire
  actions capable of changing the world[citation needed]. In the Western tradition,
  public speaking was extensively studied in Ancient Greece and Ancient Rome, where
  it was a fundamental component of rhetoric and analyzed by prominent thinkers.



  Aristotle, the ancient Greek philosopher, identified three types of speeches: deliberative
  (political), forensic (judicial), and epideictic (ceremonial or demonstrative).[2]
  Similarly, the Roman philosopher and orator Cicero categorized public speaking into
  three purposes: judicial (courtroom), deliberative (political), and demonstrative
  (ceremonial), closely aligning with Aristotle''s classifications.[2]



  In modern times, public speaking remains a highly valued skill in various sectors,
  including government, industry, and advocacy. It has also evolved with the advent
  of digital technologies, incorporating video conferencing, multimedia presentations,
  and other innovative forms of communication.



  The main objective of public speaking is to inform or change the audience''s thoughts
  and actions.[3] The function of public speaking is determined by the speaker''s
  intent, but it is possible for the same speaker, with the same intent, to deliver
  substantially different speeches to different audiences.[4]



  Public speaking is frequently directed at a select and sometimes restricted audience,
  consisting of individuals who may hold different perspectives. This audience can
  encompass enthusiastic supporters of the speaker, reluctant attendees with opposing
  views, or strangers with varying levels of interest in the speaker''s topic. Proficient
  speakers recognize that even a modest-sized audience is not a uniform entity but
  rather a diverse assembly of individuals.[5]



  Public speaking aims to either reassure an anxious audience or alert a complacent
  audience to something important. Once the speaker has determined which of these
  approaches is required, they will use a combination of storytelling and informational
  approaches to achieve their goals.[6]



  The purposes of speech can vary depending on the targeted audience. Speeches during
  ceremonies may incorporate humor or stories from moments in the life of the person
  being celebrated. Speeches focusing on politics often use persuasion to encourage
  listeners to take a course of action, while forensic speeches involve debates in
  which participants take sides, defend certain beliefs, and are judged on how well
  they support their arguments.[7]



  Persuasion is a term that is derived from the Latin word "persuadere."[10] Persuasive
  speaking aims to change the audience''s beliefs and is commonly used in political
  debates. Leaders use such public forums in an attempt to persuade their audience,
  whether they be the general public or government officials.[10]



  Persuasive speaking involves four essential elements: (i) the speaker or persuader;
  (ii) the audience; (iii) the speaking method; and (iv) the message the speaker is
  trying to convey. When attempting to persuade an audience to change their opinions,
  a speaker appeals to their emotions and beliefs.[10]



  Various techniques exist for speakers to gain audience support. Speakers can demand
  action from the audience, use inclusive language like ''we'' and ''us'' to create
  unity between the speaker and the audience, and choose words with strong connotations
  to intensify a message''s impact.[10] Rhetorical questions, anecdotes, generalizations,
  exaggerations, metaphors, and irony may be employed to increase the likelihood of
  persuading an audience.



  Though historically uncommon, speakers today are enabled to utilise statistics,
  data as well as other sources of information, such as the internet, in order to
  strengthen their argument, stance or proposal; This has only evolved during the
  modern era, having been generally unavailable at the current rate in the years beforehand
  with the exception of media via newspapers, television, although claims given by
  speakers have often been subject to inaccurate information provided by the aforementioned,
  often in direct correlation with the big lie means of oratory. This has been further
  intensified through the recent evolution of mass media in most nations.[citation
  needed]



  Public speaking can often take an educational form, where the speaker transfers
  knowledge to an audience. TED Talks are an example of educational public speaking.
  The speakers inform their audience about different topics, such as science, technology,
  religion, economics, human society, and psychology. TED speakers can use the platform
  to share personal experiences with traumatic events, such as abuse, bullying, grief,
  assault, suicidal ideation, near-death encounters, and mental illness. They may
  attempt to raise awareness and acceptance of stigmatizing issues, such as disabilities,
  racial differences, LGBTQ rights, children''s rights, and women''s rights.[11]



  TED Conferences, LLC, is a media organization that posts talks online for free distribution
  under the slogan: "ideas worth spreading". TED was originally built by Richard Saul
  Furman in February 1984 as a conference and has been held annually since 1990. Talks
  delivered in these conferences are usually posted online. The videos of these recorded
  speeches and talks inspire native and non-native speakers of English to learn the
  language and presentation style that is used. As such, TED Talk videos can help
  improve speaking skills and vocabulary retention. [12]



  Numerous studies have highlighted the benefits of teaching public speaking strategies
  in academic settings, including increased self-confidence, and improved access to
  information. [13] Harvard University offers a range of courses in public speaking,
  including persuasive communication and personal narratives.[14] With the continued
  popularity of academic conferences and TED talks taking place worldwide, public
  speaking has become an essential subject in academia for scholarly and professional
  advancement. Additionally, work meetings and presentations require proficiency in
  public speaking to actively formulate ideas and solutions, and modern technology
  helps companies release information to a wider audience.[15]



  The intervention style of speaking is a relatively new method proposed by rhetorical
  theorist William R. Brown. This style revolves around the theory of idealism, which
  holds that humans create a symbolic meaning for life and the things around them.[16]
  Due to this, the symbolic meaning of everything changes based on the way one communicates.
  When approaching communication with an intervention style, communication is understood
  to be responsible for the constant changes in society, behaviors, and how one considers
  the meaning behind objects, ideologies, and everyday life.[16]



  From an interventional perspective, when individuals communicate, they are intervening
  with what is already a reality and might "shift symbolic reality."[16] This approach
  to communication encompasses the possibility or idea that one may be responsible
  for unexpected outcomes due to what and how one communicates.



  This perspective widens the scope of focus from a single speaker who is intervening
  to a multitude of speakers all communicating and intervening, simultaneously affecting
  the world around us.[16]



  The literature of Ancient India is richly endowed with contributions to the development
  of a sui generis theory of rhetoric.[17] In ancient India, around 700 BCE, public
  debates by Indian rhetors on the topic of religion were a popular form of entertainment.[18]
  The Vedic hymns, composed over three millennia ago, demonstrate a refined sense
  of rhetoric possessed by the intellectual stratum of the society, as seen in their
  effective employment of similes.[18]



  The Ramayana and the Mahabharata, India''s iconic epics, provide valuable insights
  into the country''s ancient rhetorical traditions, featuring numerous speeches and
  debates that employ sophisticated systems of categorization.[18] The Upanishads,
  a seminal work of Vedic philosophical dialogues, exhibit a thoughtful approach to
  categorizing technical terms, underscoring the value of clear classification.[18]
  The famed Hindu discourse known as the Bhagavad Gita (in the Mahabharata) serves
  as a classic example of deliberative rhetoric.[19]



  The Buddhist tradition of India places emphasis on the value of engaging in calm
  and humorous discourse.[18]



  In Ancient China, the use of rhetoric was delayed, largely because the country then
  lacked rhetoricians who could train students.[20] It was understood that Chinese
  rhetoric was part of Chinese philosophy, which schools taught focusing on two concepts:
  "Wen" (rhetoric); and "Zhi" (thoughtful content).[20] Ancient Chinese rhetoric shows
  strong connections with modern public speaking, as Chinese rhetoric placed a high
  value on ethics.[20]



  Ancient Chinese rhetoric had three objectives: (i) using language to reflect people''s
  feelings; (ii) using language to be more pointed, effective, and impactful; and
  (iii) using rhetoric as an "aesthetic tool."[20] Chinese rhetoric traditionally
  focused more on the written than the spoken word, but both share similar characteristics
  of construction.[20]



  A unique and key difference between Chinese and Western rhetoric is the audience
  targeted for persuasion.[20] In Chinese rhetoric, state rulers were the audience,
  whereas Western rhetoric targets the public.[20] Another difference between Chinese
  and Western rhetoric practices is how a speaker establishes credibility or Ethos.[20]
  In Chinese rhetoric, the speaker does not focus on individual credibility, like
  Western rhetoric. Instead, the speaker focuses on collectivism[20] by sharing personal
  experiences and establishing a connection between the speaker''s concern and the
  audience''s interest.[20]



