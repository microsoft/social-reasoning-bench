content: "\n\n\nRisk assessment is a process for identifying hazards, potential (future)\
  \ events which may negatively impact on individuals, assets, and/or the environment\
  \ because of those hazards, their likelihood and consequences, and actions which\
  \ can mitigate these effects. The output from such a process may also be called\
  \ a risk assessment. Hazard analysis forms the first stage of a risk assessment\
  \ process. Judgments \"on the tolerability of the risk on the basis of a risk analysis\"\
  \ (i.e. risk evaluation) also form part of the process.[1][2] The results of a risk\
  \ assessment process may be expressed in a quantitative or qualitative fashion.[3]\n\
  \n\nRisk assessment forms a key part of a broader risk management strategy to help\
  \ reduce any potential risk-related consequences.[1][2]\n\n\nRisk assessments can\
  \ be undertaken in individual cases, including in patient and physician interactions.[4]\
  \ In the narrow sense chemical risk assessment is the assessment of a health risk\
  \ in response to environmental exposures.[5]\nThe ways statistics are expressed\
  \ and communicated to an individual, both through words and numbers impact his or\
  \ her interpretation of benefit and harm. For example, a fatality rate may be interpreted\
  \ as less benign than the corresponding survival rate.[4]\nA systematic review of\
  \ patients and doctors from 2017 found that overstatement of benefits and understatement\
  \ of risks occurred more often than the alternative.[4][6]\nA systematic review\
  \ from the Cochrane collaboration suggested \"well-documented decision aids\" are\
  \ helpful in reducing effects of such tendencies or biases.[4][7] Aids may help\
  \ people come to a decision about their care based on evidence informed information\
  \ that align with their values.[7] Decision aids may also help people understand\
  \ the risks more clearly, and they empower people to take an active role when making\
  \ medical decisions.[7] The systematic review did not find a difference in people\
  \ who regretted their decisions between those who used decision aids and those who\
  \ had the usual standard treatment.[7]\n\n\nAn individual's own risk perception\
  \ may be affected by psychological, ideological, religious or otherwise subjective\
  \ factors, which impact rationality of the process.[4] Individuals tend to be less\
  \ rational when risks and exposures concern themselves as opposed to others.[4]\
  \ There is also a tendency to underestimate risks that are voluntary or where the\
  \ individual sees themselves as being in control, such as smoking.[4]\n\n\nRisk\
  \ assessment can also be made on a much larger systems theory scale, for example\
  \ assessing the risks of an ecosystem or an interactively complex mechanical, electronic,\
  \ nuclear, and biological system or a hurricane (a complex meteorological and geographical\
  \ system). Systems may be defined as linear and nonlinear (or complex), where linear\
  \ systems are predictable and relatively easy to understand given a change in input,\
  \ and non-linear systems unpredictable when inputs are changed.[8] As such, risk\
  \ assessments of non-linear/complex systems tend to be more challenging.\n\n\nIn\
  \ the engineering of complex systems, sophisticated risk assessments are often made\
  \ within safety engineering and reliability engineering when it concerns threats\
  \ to life, natural environment, or machine functioning. The agriculture, nuclear,\
  \ aerospace, oil, chemical, railroad, and military industries have a long history\
  \ of dealing with risk assessment.[9] Also, medical, hospital, social service,[10]\
  \ and food industries control risks and perform risk assessments on a continual\
  \ basis. Methods for assessment of risk may differ between industries and whether\
  \ it pertains to general financial decisions or environmental, ecological, or public\
  \ health risk assessment.[9]\n\n\nRapid technological change, increasing scale of\
  \ industrial complexes, increased system integration, market competition, and other\
  \ factors have been shown to increase societal risk in the past few decades.[1]\
  \ As such, risk assessments become increasingly critical in mitigating accidents,\
  \ improving safety, and improving outcomes. Risk assessment consists of an objective\
  \ evaluation of risk in which assumptions and uncertainties are clearly considered\
  \ and presented. This involves identification of risk (what can happen and why),\
  \ the potential consequences, the probability of occurrence, the tolerability or\
  \ acceptability of the risk, and ways to mitigate or reduce the probability of the\
  \ risk.[2] Optimally, it also involves documentation of the risk assessment and\
  \ its findings, implementation of mitigation methods, and review of the assessment\
  \ (or risk management plan), coupled with updates when necessary.[1] Sometimes risks\
  \ can be deemed acceptable, meaning the risk \"is understood and tolerated ... usually\
  \ because the cost or difficulty of implementing an effective countermeasure for\
  \ the associated vulnerability exceeds the expectation of loss.\"[11]\n\n\nBenoit\
  \ Mandelbrot distinguished between \"mild\" and \"wild\" risk and argued that risk\
  \ assessment and risk management must be fundamentally different for the two types\
  \ of risk.[12] Mild risk follows normal or near-normal probability distributions,\
  \ is subject to regression to the mean and the law of large numbers, and is therefore\
  \ relatively predictable. Wild risk follows fat-tailed distributions, e.g., Pareto\
  \ or power-law distributions, is subject to regression to the tail (infinite mean\
  \ or variance, rendering the law of large numbers invalid or ineffective), and is\
  \ therefore difficult or impossible to predict. A common error in risk assessment\
  \ and management is to underestimate the wildness of risk, assuming risk to be mild\
  \ when in fact it is wild, which must be avoided if risk assessment and management\
  \ are to be valid and reliable, according to Mandelbrot.\n\n\nTo see the risk management\
  \ process expressed mathematically, one can define expected risk as the sum over\
  \ individual risks, \n\n\n\n\nR\n\ni\n\n\n\n\n{\\displaystyle R_{i}}\n\n, which\
  \ can be computed as the product of potential losses, \n\n\n\n\nL\n\ni\n\n\n\n\n\
  {\\displaystyle L_{i}}\n\n, and their probabilities, \n\n\n\np\n(\n\nL\n\ni\n\n\n\
  )\n\n\n{\\displaystyle p(L_{i})}\n\n:\n\n\nEven though for some risks \n\n\n\n\n\
  R\n\ni\n\n\n,\n\nR\n\nj\n\n\n\n\n{\\displaystyle R_{i},R_{j}}\n\n, we might have\
  \ \n\n\n\n\nR\n\ni\n\n\n=\n\nR\n\nj\n\n\n\n\n{\\displaystyle R_{i}=R_{j}}\n\n, if\
  \ the probability \n\n\n\np\n(\n\nL\n\nj\n\n\n)\n\n\n{\\displaystyle p(L_{j})}\n\
  \n is small compared to \n\n\n\np\n(\n\nL\n\ni\n\n\n)\n\n\n{\\displaystyle p(L_{i})}\n\
  \n, its estimation might be based only on a smaller number of prior events, and\
  \ hence, more uncertain. On the other hand, since \n\n\n\n\nR\n\ni\n\n\n=\n\nR\n\
  \nj\n\n\n\n\n{\\displaystyle R_{i}=R_{j}}\n\n, \n\n\n\n\nL\n\nj\n\n\n\n\n{\\displaystyle\
  \ L_{j}}\n\n must be larger than \n\n\n\n\nL\n\ni\n\n\n\n\n{\\displaystyle L_{i}}\n\
  \n, so decisions based on this uncertainty would be more consequential, and hence,\
  \ warrant a different approach.\n\n\nThis becomes important when we consider the\
  \ variance of risk\n\n\nas a large \n\n\n\n\nL\n\ni\n\n\n\n\n{\\displaystyle L_{i}}\n\
  \n changes the value.\n\n\nFinancial decisions, such as insurance, express loss\
  \ in terms of dollar amounts.  When risk assessment is used for public health or\
  \ environmental decisions, the loss can be quantified in a common metric such as\
  \ a country's currency or some numerical measure of a location's quality of life.\
  \  For public health and environmental decisions, the loss is simply a verbal description\
  \ of the outcome, such as increased cancer incidence or incidence of birth defects.\
  \ In that case, the \"risk\" is expressed as\n\n\nIf the risk estimate takes into\
  \ account information on the number of individuals exposed, it is termed a \"population\
  \ risk\" and is in units of expected increased cases per time period. If the risk\
  \ estimate does not take into account the number of individuals exposed, it is termed\
  \ an \"individual risk\" and is in units of incidence rate per time period.  Population\
  \ risks are of more use for cost/benefit analysis; individual risks are of more\
  \ use for evaluating whether risks to individuals are \"acceptable\".\n\n\nIn quantitative\
  \ risk assessment, an annualized loss expectancy (ALE) may be used to justify the\
  \ cost of implementing countermeasures to protect an asset. This may be calculated\
  \ by multiplying the single loss expectancy (SLE), which is the loss of value based\
  \ on a single security incident, with the annualized rate of occurrence (ARO), which\
  \ is an estimate of how often a threat would be successful in exploiting a vulnerability.\n\
  \n\nThe usefulness of quantitative risk assessment has been questioned, however.\
  \ Barry Commoner, Brian Wynne and other critics have expressed concerns that risk\
  \ assessment tends to be overly quantitative and reductive. For example, they argue\
  \ that risk assessments ignore qualitative differences among risks. Some charge\
  \ that assessments may drop out important non-quantifiable or inaccessible information,\
  \ such as variations among the classes of people exposed to hazards, or social amplification.[13]\
  \ Furthermore, Commoner[14] and O'Brien[15] claim that quantitative approaches divert\
  \ attention from precautionary or preventative measures.[16] Others, like Nassim\
  \ Nicholas Taleb consider risk managers little more than \"blind users\" of statistical\
  \ tools and methods.[17]\n\n\nRisk engineering is central to the assessment phase,\
  \ where risks are not only identified but rigorously analyzed, quantified, and modeled.\
  \ In the context of financial systems—particularly credit risk—risk engineering\
  \ involves understanding the dynamic behavior of risk parameters such as probability\
  \ of default, exposure at default, and loss given default.[18] These are not treated\
  \ as isolated figures but as interconnected components that respond to systemic\
  \ and idiosyncratic changes. As individual risks aggregate into portfolios or larger\
  \ systems, risk engineers deploy statistical models and simulation techniques to\
  \ uncover dependencies and potential cascade effects. This systems-level view enables\
  \ the modeling of stress scenarios and rare, high-impact events—what some refer\
  \ to as \"wild risk.\" It also supports the design of robust structures capable\
  \ of absorbing shocks and preventing systemic collapse.[19] Regulatory frameworks\
  \ add another layer to the assessment process, requiring that risk engineering efforts\
  \ not only reflect real-world complexity but also align with institutional constraints.\n\
  \n\nOlder textbooks distinguish between the term risk analysis and risk evaluation;\n\
  a risk analysis includes the following 4 steps:[1]\n\n\nA risk evaluation means\
  \ that judgements are made on the tolerability of the identified risks, leading\
  \ to risk acceptance. When risk analysis and risk evaluation are made at the same\
  \ time, it is called risk assessment.[1]\n\n\nAs of 2023, chemical risk assessment\
  \ follows these 4 steps:[5]\n\n\nThere is tremendous variability in the dose-response\
  \ relationship between a chemical and human health outcome in particularly susceptible\
  \ subgroups, such as pregnant women, developing fetuses, children up to adolescence,\
  \ people with low socioeconomic status, those with preexisting diseases, disabilities,\
  \ genetic susceptibility, and those with other environmental exposures.[5]\n\n\n\
  The process of risk assessment may be somewhat informal at the individual social\
  \ level, assessing economic and household risks,[20][21] or a sophisticated process\
  \ at the strategic corporate level. However, in both cases, ability to anticipate\
  \ future events and create effective strategies for mitigating them when deemed\
  \ unacceptable is vital.\n\n\nAt the individual level, identifying objectives and\
  \ risks, weighing their importance, and creating plans, may be all that is necessary.\n\
  At the strategic organisational level, more elaborate policies are necessary, specifying\
  \ acceptable levels of risk, procedures to be followed within the organisation,\
  \ priorities, and allocation of resources.[22]: 10 \n\n\nAt the strategic corporate\
  \ level, management involved with the project produce project level risk assessments\
  \ with the assistance of the available expertise as part of the planning process\
  \ and set up systems to ensure that required actions to manage the assessed risk\
  \ are in place. At the dynamic level, the personnel directly involved may be required\
  \ to deal with unforeseen problems in real time. The tactical decisions made at\
  \ this level should be reviewed after the operation to provide feedback on the effectiveness\
  \ of both the planned procedures and decisions made in response to the contingency.\n\
  \n\nThe results of these steps are combined to produce an estimate of risk. Because\
  \ of the different susceptibilities and exposures, this risk will vary within a\
  \ population. An uncertainty analysis is usually included in a health risk assessment.\n\
  \n\nDuring an emergency response, the situation and hazards are often inherently\
  \ less predictable than for planned activities (non-linear). In general, if the\
  \ situation and hazards are predictable (linear), standard operating procedures\
  \ should deal with them adequately. In some emergencies, this may also hold true,\
  \ with the preparation and trained responses being adequate to manage the situation.\
  \ In these situations, the operator can manage risk without outside assistance,\
  \ or with the assistance of a backup team who are prepared and available to step\
  \ in at short notice.\n\n\nOther emergencies occur where there is no previously\
  \ planned protocol, or when an outsider group is brought in to handle the situation,\
  \ and they are not specifically prepared for the scenario that exists but must deal\
  \ with it without undue delay. Examples include police, fire department, disaster\
  \ response, and other public service rescue teams. In these cases, ongoing risk\
  \ assessment by the involved personnel can advise appropriate action to reduce risk.[22]\
  \ HM Fire Services Inspectorate has defined dynamic risk assessment (DRA) as:\n\n\
  \nThe continuous assessment of risk in the rapidly changing circumstances of an\
  \ operational incident, in order to implement the control measures necessary to\
  \ ensure an acceptable level of safety.[22]\n\nDynamic risk assessment is the final\
  \ stage of an integrated safety management system that can provide an appropriate\
  \ response during changing circumstances. It relies on experience, training and\
  \ continuing education, including effective debriefing to analyse not only what\
  \ went wrong, but also what went right, and why, and to share this with other members\
  \ of the team and the personnel responsible for the planning level risk assessment.[22]\n\
  \n\nThe application of risk assessment procedures is common in a wide range of fields,\
  \ and these may have specific legal obligations, codes of practice, and standardised\
  \ procedures. Some of these are listed here.\n\n\nThere are many resources that\
  \ provide human health risk information:\n\n\nThe National Library of Medicine provides\
  \ risk assessment and regulation information tools for a varied audience.[23] These\
  \ include:\n\n\nThe United States Environmental Protection Agency provides basic\
  \ information about environmental health risk assessments for the public for a wide\
  \ variety of possible environmental exposures.[26]\n\n\nThe Environmental Protection\
  \ Agency began actively using risk assessment methods to protect drinking water\
  \ in the United States after the passage of the Safe Drinking Water Act of 1974.\
  \ The law required the National Academy of Sciences to conduct a study on drinking\
  \ water issues, and in its report, the NAS described some methodologies for doing\
  \ risk assessments for chemicals that were suspected carcinogens, recommendations\
  \ that top EPA officials have described as perhaps the study's most important part.[27]\n\
  \n\nConsidering the increase in junk food and its toxicity, FDA required in 1973\
  \ that cancer-causing compounds must not be present in meat at concentrations that\
  \ would cause a cancer risk greater than 1 in a million over a lifetime. The US\
  \ Environmental Protection Agency provides extensive information about ecological\
  \ and environmental risk assessments for the public via its risk assessment portal.[28]\
  \ The Stockholm Convention on persistent organic pollutants (POPs) supports a qualitative\
  \ risk framework for public health protection from chemicals that display environmental\
  \ and biological persistence, bioaccumulation, toxicity (PBT) and long range transport;\
  \ most global chemicals that meet this criterion have been previously assessed quantitatively\
  \ by national and international health agencies.[29]\n\n\nFor non-cancer health\
  \ effects, the terms reference dose (RfD)   or reference concentration (RfC) are\
  \ used to describe the safe level of exposure in a dichotomous fashion. Newer ways\
  \ of communicating the risk is the probabilistic risk assessment.[30]\n\n\nWhen\
  \ risks apply mainly to small sub-populations, it can be difficult to determine\
  \ when intervention is necessary. For example, there may be a risk that is very\
  \ low for everyone, other than 0.1% of the population. It is necessary to determine\
  \ whether this 0.1% is represented by:\n\n\nIf the risk is higher for a particular\
  \ sub-population because of abnormal exposure rather than susceptibility, strategies\
  \ to further reduce the exposure of that subgroup are considered.  If an identifiable\
  \ sub-population is more susceptible due to inherent genetic or other factors, public\
  \ policy choices must be made. The choices are:\n\n\nAcceptable risk is a risk that\
  \ is understood and tolerated usually because the cost or difficulty of implementing\
  \ an effective countermeasure for the associated vulnerability exceeds the expectation\
  \ of loss.[31]\n\n\nThe idea of not increasing lifetime risk by more than one in\
  \ a million has become commonplace in public health discourse and policy.[32] It\
  \ is a heuristic measure. It provides a numerical basis for establishing a negligible\
  \ increase in risk.\n\n\nEnvironmental decision making allows some discretion for\
  \ deeming individual risks potentially \"acceptable\" if less than one in ten thousand\
  \ chance of increased lifetime risk. Low risk criteria such as these provide some\
  \ protection for a case where individuals may be exposed to multiple chemicals e.g.\
  \ pollutants, food additives, or other chemicals.[citation needed]\n\n\nIn practice,\
  \ a true zero-risk is possible only with the suppression of the risk-causing activity.[citation\
  \ needed]\n\n\nStringent requirements of 1 in a million may not be technologically\
  \ feasible or may be so prohibitively expensive as to render the risk-causing activity\
  \ unsustainable, resulting in the optimal degree of intervention being a balance\
  \ between risks vs. benefit.[citation needed] For example, emissions from hospital\
  \ incinerators result in a certain number of deaths per year. However, this risk\
  \ must be balanced against the alternatives.  There are public health risks, as\
  \ well as economic costs, associated with all options. The risk associated with\
  \ no incineration is the potential spread of infectious diseases or even no hospitals.\
  \ Further investigation identifies options such as separating noninfectious from\
  \ infectious wastes, or air pollution controls on a medical incinerator.\n\n\nIntelligent\
  \ thought about a reasonably full set of options is essential.  Thus, it is not\
  \ unusual for there to be an iterative process between analysis, consideration of\
  \ options, and follow up analysis.[citation needed]\n\n\nIn the context of public\
  \ health, risk assessment is the process of characterizing the nature and likelihood\
  \ of a harmful effect to individuals or populations from certain human activities.\
  \ Health risk assessment can be mostly qualitative or can include statistical estimates\
  \ of probabilities for specific populations. In most countries, the use of specific\
  \ chemicals or the operations of specific facilities (e.g. power plants, manufacturing\
  \ plants) is not allowed unless it can be shown that they do not increase the risk\
  \ of death or illness above a specific threshold. For example, the American Food\
  \ and Drug Administration (FDA) regulates food safety through risk assessment, while\
  \ the EFSA does the same in EU.[33]\n\n\nAn occupational risk assessment is an evaluation\
  \ of how much potential danger a hazard can have to a person in a workplace environment.\
  \ The assessment takes into account possible scenarios in addition to the probability\
  \ of their occurrence and the results.[34] The six types of hazards to be aware\
  \ of are safety (those that can cause injury), chemicals, biological, physical,\
  \ psychosocial (those that cause stress, harassment) and ergonomic (those that can\
  \ cause musculoskeletal disorders).[35] To appropriately access hazards there are\
  \ two parts that must occur. Firstly, there must be an \"exposure assessment\" which\
  \ measures the likelihood of worker contact and the level of contact. Secondly,\
  \ a \"risk characterization\" must be made which measures the probability and severity\
  \ of the possible health risks.[36]\n\n\nThe importance of risk assessments to manage\
  \ the consequences of climate change and variability is recalled in the global frameworks\
  \ for disaster risk reduction, adopted by the member countries of the United Nations\
  \ at the end of the World Conferences held in Kobe (2005) and Sendai (2015). The\
  \ Sendai Framework for Disaster Risk Reduction brings attention to the local scale\
  \ and encourages a holistic risk approach, which should consider all the hazards\
  \ to which a community is exposed, the integration of technical-scientific knowledge\
  \ with local knowledge, and the inclusion of the concept of risk in local plans\
  \ to achieve a significant disaster reduction by 2030. Taking these principles into\
  \ daily practice poses a challenge for many countries. The Sendai framework monitoring\
  \ system highlights how little is known about the progress made from 2015 to 2019\
  \ in local disaster risk reduction.[37]\n\n\nAs of 2019, in the South of the Sahara,\
  \ risk assessment is not yet an institutionalized practice. The exposure of human\
  \ settlements to multiple hazards (hydrological and agricultural drought, pluvial,\
  \ fluvial and coastal floods) is frequent and requires risk assessments on a regional,\
  \ municipal, and sometimes individual human settlement scale. The multidisciplinary\
  \ approach and the integration of local and technical-scientific knowledge are necessary\
  \ from the first steps of the assessment. Local knowledge remains unavoidable to\
  \ understand the hazards that threaten individual communities, the critical thresholds\
  \ in which they turn into disasters, for the validation of hydraulic models, and\
  \ in the decision-making process on risk reduction. On the other hand, local knowledge\
  \ alone is not enough to understand the impacts of future changes and climatic variability\
  \ and to know the areas exposed to infrequent hazards.\nThe availability of new\
  \ technologies and open access information (high resolution satellite images, daily\
  \ rainfall data) allow assessment today with an accuracy that only 10 years ago\
  \ was unimaginable. The images taken by unmanned vehicle technologies allow to produce\
  \ very high resolution digital elevation models and to accurately identify the receptors.[38]\
  \ Based on this information, the hydraulic models allow the identification of flood\
  \ areas with precision even at the scale of small settlements.[39] The information\
  \ on loss and damages and on cereal crop at individual settlement scale allow to\
  \ determine the level of multi-hazard risk on a regional scale.The multi-temporal\
  \ high-resolution satellite images allow to assess the hydrological drought and\
  \ the dynamics of human settlements in the flood zone.[40]\nRisk assessment is more\
  \ than an aid to informed decision making about risk reduction or acceptance.[41]\
  \ It integrates early warning systems by highlighting the hot spots where disaster\
  \ prevention and preparedness are most urgent.[42] When risk assessment considers\
  \ the dynamics of exposure over time, it helps to identify risk reduction policies\
  \ that are more appropriate to the local context. Despite these potentials, the\
  \ risk assessment is not yet integrated into the local planning in the South of\
  \ the Sahara which, in the best of cases, uses only the analysis of vulnerability\
  \ to climate change and variability.[42]\n\n\nFor audits performed by an outside\
  \ audit firm, risk assessment is a crucial stage before accepting an audit engagement.\
  \ According to ISA315 Understanding the Entity and its Environment and Assessing\
  \ the Risks of Material Misstatement, \"the auditor should perform risk assessment\
  \ procedures to obtain an understanding of the entity and its environment, including\
  \ its internal control\". Evidence relating to the auditor's risk assessment of\
  \ a material misstatement in the client's financial statements. Then, the auditor\
  \ obtains initial evidence regarding the classes of transactions at the client and\
  \ the operating effectiveness of the client's internal controls. Audit risk is defined\
  \ as the risk that the auditor will issue a clean unmodified opinion regarding the\
  \ financial statements, when in fact the financial statements are materially misstated,\
  \ and therefore do not qualify for a clean unmodified opinion. As a formula, audit\
  \ risk is the product of two other risks: risk of material misstatement and detection\
  \ risk. This formula can be further broken down as follows:  inherent risk × control\
  \ risk × detection risk.\n\n\nBanks and other financial institutions undertake risk\
  \ assessments before lending money to consumers and businesses. The UK's Small Business,\
  \ Enterprise and Employment Act 2015 recognised that many small businesses are refused\
  \ bank loans because their business activities did not fit with the risk profiles\
  \ of the larger financial institutions, and made legislative provision for credit\
  \ information to be made available to other lenders to allow them also to conduct\
  \ accurate risk assessments.[43]\n\n\nIn project management, risk assessment is\
  \ an integral part of the risk management plan, studying the probability, the impact,\
  \ and the effect of every known risk on the project, as well as the corrective action\
  \ to take should an incident be implied by a risk occur.[44] Of special consideration\
  \ in this area are the relevant codes of practice that are enforced in the specific\
  \ jurisdiction. Understanding the regime of regulations that risk management must\
  \ abide by is integral to formulating safe and compliant risk assessment practices.\n\
  \n\nIn high-hazard industries, risk assessment is often conducted by multi-disciplinary\
  \ process safety and risk practitioners like IRESC Global, who apply systematic\
  \ methods to identify and control low-probability, high-consequence events such\
  \ as fires, explosions, and hazardous material releases in complex industrial systems.\n\
  \n\nTheir work integrates engineering, systems safety, human factors, and reliability\
  \ disciplines, commonly using structured techniques such as process hazard analysis\
  \ (PHA) and hazard and operability studies (HAZOP) to evaluate and reduce process-related\
  \ risks.\n\n\nInformation technology risk assessment can be performed by a qualitative\
  \ or quantitative approach, following different methodologies. One important difference[clarification\
  \ needed] in risk assessments in information security is modifying the threat model\
  \ to account for the fact that any adversarial system connected to the Internet\
  \ has access to threaten any other connected system.[45] Risk assessments may therefore\
  \ need to be modified to account for the threats from all adversaries, instead of\
  \ just those with reasonable access as is done in other fields.\n\n\nNIST Definition:\
  \ The process of identifying risks to organizational operations (including mission,\
  \ functions, image, reputation), organizational assets, individuals, other organizations,\
  \ and the Nation, resulting from the operation of an information system. Part of\
  \ risk management incorporates threat and vulnerability analyses and considers mitigations\
  \ provided by security controls planned or in place.[46]\n\n\nThere are various\
  \ risk assessment methodologies and frameworks available which include NIST Risk\
  \ Management Framework (RMF),[47] Control Objectives for Information and Related\
  \ Technologies (COBIT),[48] Factor Analysis of Information Risk (FAIR),[49] Operationally\
  \ Critical Threat, Asset, and Vulnerability Evaluation (OCTAVE),[50] The Center\
  \ for Internet Security Risk Assessment Method (CIS RAM),[51] and The Duty of Care\
  \ Risk Analysis (DoCRA) Standard,[52] which helps define 'reasonable' security.\n\
  \n\nThe Threat and Risk Assessment (TRA) process is part of risk management referring\
  \ to risks related to cyber threats. The TRA process will identify cyber risks,\
  \ assess risks' severities, and may recommend activities to reduce risks to an acceptable\
  \ level.\n\n\nThere are different methodologies for performing TRA (e.g., Harmonized\
  \ TRA Methodology[53]), all utilize the following elements:[54][55][56] identifying\
  \ of assets (what should be protected), identifying and assessing of the threats\
  \ and vulnerabilities for the identified assets, determining the exploitability\
  \ of the vulnerabilities, determining the levels of risk associated with the vulnerabilities\
  \ (what are the implications if the assets were damaged or lost), and recommending\
  \ a risk mitigation program.\n\n\nMegaprojects (sometimes also called \"major programs\"\
  ) are extremely large-scale investment projects, typically costing more than US$1\
  \ billion per project. They include bridges, tunnels, highways, railways, airports,\
  \ seaports, power plants, dams, wastewater projects, coastal flood protection, oil\
  \ and natural gas extraction projects, public buildings, information technology\
  \ systems, aerospace projects, and defence systems. Megaprojects have been shown\
  \ to be particularly risky in terms of finance, safety, and social and environmental\
  \ impacts.\n\n\nStudies have shown that early parts of the system development cycle\
  \ such as requirements and design specifications are especially prone to error.\
  \ This effect is particularly notorious in projects involving multiple stakeholders\
  \ with different points of view. Evolutionary software processes offer an iterative\
  \ approach to requirement engineering to alleviate the problems of uncertainty,\
  \ ambiguity, and inconsistency inherent in software developments, including uncertainty,\
  \ ambiguity, and inconsistency inherent in software developments.[clarification\
  \ needed]\n\n\nIn July 2010, shipping companies agreed to use standardized procedures\
  \ in order to assess risk in key shipboard operations. These procedures were implemented\
  \ as part of the amended International Safety Management Code.[57]\n\n\nFormal risk\
  \ assessment is a required component of most professional dive planning, but the\
  \ format and methodology may vary. Consequences of an incident due to an identified\
  \ hazard are generally chosen from a small number of standardised categories, and\
  \ probability is estimated based on statistical data on the rare occasions when\
  \ it is available, and on a best guess estimate based on personal experience and\
  \ company policy in most cases. A simple risk matrix is often used to transform\
  \ these inputs into a level of risk, generally expressed as unacceptable, marginal\
  \ or acceptable. If unacceptable, measures must be taken to reduce the risk to an\
  \ acceptable level, and the outcome of the risk assessment must be accepted by the\
  \ affected parties before a dive commences. Higher levels of risk may be acceptable\
  \ in special circumstances, such as military or search and rescue operations when\
  \ there is a chance of recovering a survivor. Diving supervisors are trained in\
  \ the procedures of hazard identification and risk assessment, and it is part of\
  \ their planning and operational responsibility. Both health and safety hazards\
  \ must be considered. Several stages may be identified. There is risk assessment\
  \ done as part of the diving project planning, on site risk assessment which takes\
  \ into account the specific conditions of the day, and dynamic risk assessment which\
  \ is ongoing during the operation by the members of the dive team, particularly\
  \ the supervisor and the working diver.[58][59]\n\n\nIn recreational scuba diving,\
  \ the extent of risk assessment expected of the diver is relatively basic and is\
  \ included in the pre-dive checks. Several mnemonics have been developed by diver\
  \ certification agencies to remind the diver to pay some attention to risk, but\
  \ the training is rudimentary. Diving service providers are expected to provide\
  \ a higher level of care for their customers, and diving instructors and divemasters\
  \ are expected to assess risk on behalf of their customers and warn them of site-specific\
  \ hazards and the competence considered appropriate for the planned dive. Technical\
  \ divers are expected to make a more thorough assessment of risk, but as they will\
  \ be making an informed choice for a recreational activity, the level of acceptable\
  \ risk may be considerably higher than that permitted for occupational divers under\
  \ the direction of an employer.[60][61]\n\n\nIn outdoor activities including commercial\
  \ outdoor education, wilderness expeditions, and outdoor recreation, risk assessment\
  \ refers to the analysis of the probability and magnitude of unfavorable outcomes\
  \ such as injury, illness, or property damage due to environmental and related causes,\
  \ compared to the human development or other benefits of outdoor activity. This\
  \ is of particular importance as school programs and others weigh the benefits of\
  \ youth and adult participation in various outdoor learning activities against the\
  \ inherent and other hazards present in those activities. Schools, corporate entities\
  \ seeking team-building experiences, parents/guardians, and others considering outdoor\
  \ experiences expect or require[62] organizations to assess the hazards and risks\
  \ of different outdoor activities—such as sailing, target shooting, hunting, mountaineering,\
  \ or camping—and select activities with acceptable risk profiles.\n\n\nOutdoor education,\
  \ wilderness adventure, and other outdoor-related organizations should, and are\
  \ in some jurisdictions required, to conduct risk assessments prior to offering\
  \ programs for commercial purposes.[63][64][65]\n\n\nSuch organizations are given\
  \ guidance on how to provide their risk assessments.[66]\n\n\nRisk assessments for\
  \ led outdoor activities form only one component of a comprehensive risk management\
  \ plan, as many risk assessments use a basic linear-style thinking that does not\
  \ employ more modern risk management practice employing complex socio-technical\
  \ systems theory.[67][68]\n\n\nEnvironmental Risk Assessment (ERA) aims to assess\
  \ the effects of stressors, usually chemicals, on the local environment. A risk\
  \ is an integrated assessment of the likelihood and severity of an undesired event.\
  \ In ERA, the undesired event often depends on the chemical of interest and on the\
  \ risk assessment scenario.[69] This undesired event is usually a detrimental effect\
  \ on organisms, populations or ecosystems. Current ERAs usually compare an exposure\
  \ to a no-effect level, such as the Predicted Environmental Concentration/Predicted\
  \ No-Effect Concentration (PEC/PNEC) ratio in Europe. Although this type of ratio\
  \ is useful and often used in regulation purposes, it is only an indication of an\
  \ exceeded apparent threshold.[70] New approaches start to be developed in ERA in\
  \ order to quantify this risk and to communicate effectively on it with both the\
  \ managers and the general public.[69]\n\n\nEcological risk assessment is complicated\
  \ by the fact that there are many nonchemical stressors that substantially influence\
  \ ecosystems, communities, and individual plants and animals, as well as across\
  \ landscapes and regions.[71][72]  Defining the undesired (adverse) event is a political\
  \ or policy judgment, further complicating applying traditional risk analysis tools\
  \ to ecological systems.  Much of the policy debate surrounding ecological risk\
  \ assessment is over defining precisely what is an adverse event.[73]\n\n\nBiodiversity\
  \ Risk Assessments evaluate risks to biological diversity, specially the risk of\
  \ species extinction or the risk of ecosystem collapse. The units of assessments\
  \ are the biological (species, subspecies or populations) or ecological entities\
  \ (habitats, ecosystems, etc.), and the risk are often related to human actions\
  \ and interventions (threats and pressures). Regional and national protocols have\
  \ been proposed by multiple academic or governmental institutions and working groups,[74]\
  \ but global standards such as the Red List of Threatened Species and the IUCN Red\
  \ List of Ecosystems have been widely adopted, and are recognized or proposed as\
  \ official indicators of progress toward international policy targets and goals,\
  \ such as the Aichi targets and the Sustainable Development Goals.[75][76]\n\n\n\
  Risk assessments are used in numerous stages during the legal process and are developed\
  \ to measure a wide variety of items, such as recidivism rates, potential pretrial\
  \ issues, probation/parole, and to identify potential interventions for defendants.[77]\
  \ Clinical psychologists, forensic psychologists, and other practitioners are responsible\
  \ for conducting risk assessments.[77][78][79] Depending on the risk assessment\
  \ tool, practitioners are required to gather a variety of background information\
  \ on the defendant or individual being assessed. This information includes their\
  \ previous criminal history (if applicable) and other records (i.e. Demographics,\
  \ Education, Job Status, Medical History), which can be accessed through direct\
  \ interview with the defendant or on-file records.[77]\n\n\nIn the pre-trial stage,\
  \ a widely used risk assessment tool is the Public Safety Assessment,[80] which\
  \ predicts failure to appear in court, likelihood of a new criminal arrest while\
  \ on pretrial release, and likelihood of a new violent criminal arrest while on\
  \ pretrial release. Multiple items are observed and taken into account based on\
  \ which aspect of the PSA is being focused, and like all other actuarial risk assessments,\
  \ each item is assigned a weighted amount to produce a final score.[77] Detailed\
  \ information such as transparency on the items the PSA factors and how scores are\
  \ distributed are accessible online.[81]\n\n\nFor defendants who have been incarcerated,\
  \ risk assessments are used to determine their likelihood of recidivism and inform\
  \ sentence length decisions. Risk assessments also aid parole/probation officers\
  \ in determining the level of supervision a probationer should be subjected to and\
  \ what interventions could be implemented to improve offender risk status.[78] The\
  \ Correctional Offender Management Profiling for Alternative Sanctions (COMPAS)\
  \ is a risk assessment too designed to measure pretrial release risk, general recidivism\
  \ risk, and violent recidivism risk. Detailed information on scoring and algorithms\
  \ for COMPAS are not accessible to the general public.\n\n\n\n\n\n\n"
