content: "\nVirtue ethics (also aretaic ethics,[a][1] from Greek ἀρετή [aretḗ]) is\
  \ a philosophical approach that treats dispositional virtue and character as the\
  \ primary subjects of ethics, in contrast to other ethical systems that put consequences\
  \ of voluntary acts, principles or rules of conduct, or obedience to divine authority\
  \ in the primary role.[2]\n\n\nVirtue ethics is usually contrasted with two other\
  \ major approaches in ethics, consequentialism and deontology, which make the goodness\
  \ of outcomes of an action (consequentialism) and the concept of moral duty (deontology)\
  \ central. While virtue ethics does not necessarily deny the importance to ethics\
  \ of goodness of states of affairs or of moral duties, it emphasizes virtue and\
  \ sometimes other concepts, like eudaimonia, to an extent that other ethics theories\
  \ do not.[citation needed]\n\n\nIn virtue ethics, a virtue is a characteristic disposition\
  \ to think, feel, and act well in some domain of life.[3] In contrast, a vice is\
  \ a characteristic disposition to think, feel, and act poorly in some domain of\
  \ life. Virtues are not everyday habits; they are character traits, in the sense\
  \ that they are central to someone's personality and what they are like as a person.\n\
  \n\nIn early versions and some modern versions of virtue ethics, a virtue is defined\
  \ as a character trait that promotes or exhibits human \"flourishing and well being\"\
  \ in the person who exhibits it.[4] Some modern versions of virtue ethics do not\
  \ define virtues in terms of well being or flourishing, and some go so far as to\
  \ define virtues as traits that tend to promote some other good that is defined\
  \ independently of the virtues, thereby subsuming virtue ethics under (or somehow\
  \ merging it with) consequentialist ethics.[5]\n\n\nTo Aristotle, a virtue was not\
  \ a skill that made you better able to achieve eudaimonia but was itself an expression\
  \ of eudaimonia.[6]\n\n\nIn ancient Greek and modern eudaimonic virtue ethics, virtues\
  \ and vices are complex dispositions that involve both affective and intellectual\
  \ components.[7] That is, they are dispositions that involve both being able to\
  \ reason well about the right thing to do (see below on phronesis), and also to\
  \ engage emotions and feelings correctly.\n\n\nFor example, a generous person can\
  \ reason well about when and how to help people, and such a person also helps people\
  \ with pleasure and without conflict. In this, virtuous people are contrasted not\
  \ only with vicious people (who reason poorly about what to do and are emotionally\
  \ attached to the wrong things) and with the incontinent (who are tempted by their\
  \ feelings into doing the wrong thing even though they know what is right), but\
  \ also with the merely continent (whose emotions tempt them toward doing the wrong\
  \ thing but whose strength of will lets them do what they know is right).\n\n\n\
  According to Rosalind Hursthouse, in Aristotelian virtue ethics, the emotions have\
  \ moral significance because \"virtues (and vices) are all dispositions not only\
  \ to act, but to feel emotions, as reactions as well as impulses to action... [and]\
  \ In the person with the virtues, these emotions will be felt on the right occasions,\
  \ toward the right people or objects, for the right reasons, where 'right' means\
  \ 'correct'...\"[8]\n\n\nPhronesis (φρόνησις; prudence, practical virtue, or practical\
  \ wisdom) is an acquired trait that enables its possessor to identify the best thing\
  \ to do in any given situation.[9] Unlike theoretical wisdom, practical reason results\
  \ in action or decision.[10] As John McDowell puts it, practical wisdom involves\
  \ a \"perceptual sensitivity\" to what a situation requires.[11]\n\n\nEudaimonia\
  \ (εὐδαιμονία) is a state variously translated from Greek as 'well-being', 'happiness',\
  \ 'blessedness', and in the context of virtue ethics, 'human flourishing'.[12] Eudaimonia\
  \ in this sense is not a subjective, but an objective, state.[citation needed] It\
  \ characterizes the well-lived life.\n\n\nAccording to Aristotle, the most prominent\
  \ exponent of eudaimonia in the Western philosophical tradition, eudaimonia defines\
  \ the goal of human life. It consists of exercising the characteristic human quality—reason—as\
  \ the soul's most proper and nourishing activity. In his Nicomachean Ethics, Aristotle,\
  \ like Plato before him, argued that the pursuit of eudaimonia is an \"activity\
  \ of the soul in accordance with perfect virtue\",[13]: I  which further could only\
  \ properly be exercised in the characteristic human community—the polis or city-state.[14]\n\
  \n\nAlthough eudaimonia was first popularized by Aristotle, it now belongs to the\
  \ tradition of virtue theories generally.[15] For the virtue theorist, eudaimonia\
  \ describes that state achieved by the person who lives the proper human life, an\
  \ outcome that can be reached by practicing the virtues. A virtue is a habit or\
  \ quality that allows the bearer to succeed at his, her, or its purpose. The virtue\
  \ of a knife, for example, is sharpness; among the virtues of a racehorse is speed.\
  \ Thus, to identify the virtues for human beings, one must have an account of what\
  \ is the human purpose.\n\n\nNot all modern virtue ethics theories are eudaimonic;\
  \ some propose another end in place of eudaimonia, while others are non-teleological:\
  \ that is, they do not account for virtues in terms of the results that the practice\
  \ of the virtues produce or tend to produce.[16]\n\n\nLike much of the Western tradition,\
  \ virtue theory originated in ancient Greek philosophy.\n\n\nVirtue ethics began\
  \ with Socrates, and was subsequently developed further by Plato, Aristotle, and\
  \ the Stoics.[17] Virtue ethics concentrates on the character of the individual,\
  \ rather than the acts (or consequences thereof) of the individual. There is debate\
  \ among adherents of virtue ethics concerning what specific virtues are praiseworthy.\
  \ However, most theorists agree that ethics is demonstrated by the practice of virtues.\
  \ \n\n\nPlato and Aristotle's treatments of virtues are not the same. Plato believes\
  \ virtue is effectively an end to be sought, for which a friend might be a useful\
  \ means. Aristotle states that the virtues function more as means to safeguard human\
  \ relations, particularly authentic friendship, without which one's quest for happiness\
  \ is frustrated.\n\n\nDiscussion of what were known as the four cardinal virtues—wisdom,\
  \ justice, fortitude, and temperance—can be found in Plato's Republic. The virtues\
  \ also figure prominently in Aristotle's ethical theory found in Nicomachean Ethics.[13]\n\
  \n\nGod\n\n\n\nSchools\n\n\nRelations with:\n\n\nVirtue theory was inserted into\
  \ the study of history by moralistic historians such as Livy, Plutarch, and Tacitus.\
  \ The Greek idea of the virtues was passed on in Roman philosophy through Cicero\
  \ and later incorporated into Christian moral theology by Ambrose of Milan. During\
  \ the scholastic period, the most comprehensive consideration of the virtues from\
  \ a theological perspective was provided by Thomas Aquinas in his Summa Theologiae\
  \ and his Commentaries on the Nicomachean Ethics.[18]\n\n\nAfter the Reformation,\
  \ Aristotle's Nicomachean Ethics continued to be the main authority for the discipline\
  \ of ethics at Protestant universities until the late seventeenth century, with\
  \ over fifty Protestant commentaries published on the Nicomachean Ethics before\
  \ 1682.[19]\n\n\nThough the tradition receded into the background of European philosophical\
  \ thought in the next few centuries, the term \"virtue\" remained current during\
  \ this period, and in fact appears prominently in the tradition of classical republicanism\
  \ or classical liberalism. This tradition was prominent in the intellectual life\
  \ of 16th-century Italy, as well as 17th- and 18th-century Britain and America.\
  \ The term \"virtue\" appears frequently in the work of Tomás Fernández de Medrano,\
  \ Niccolò Machiavelli, David Hume, the republicans of the English Civil War period,\
  \ the 18th-century English Whigs, and the prominent figures among the Scottish Enlightenment\
  \ and the American Founding Fathers.\n\n\nAlthough some Enlightenment philosophers\
  \ (e.g. Hume) continued to emphasise the virtues, with the ascendancy of utilitarianism\
  \ and deontological ethics, virtue theory moved to the margins of Western philosophy.\
  \ The contemporary revival of virtue theory is frequently traced to the philosopher\
  \ Elizabeth Anscombe's 1958 essay \"Modern Moral Philosophy\".[20] Following this:\n\
  \n\nThe aretaic turn in moral philosophy is paralleled by analogous developments\
  \ in other philosophical disciplines. One of these is epistemology, where a distinctive\
  \ virtue epistemology was developed by Linda Zagzebski and others. In political\
  \ theory, there has been discussion of \"virtue politics\", and in legal theory,\
  \ there is a small but growing body of literature on virtue jurisprudence. The aretaic\
  \ turn also exists in American constitutional theory, where proponents argue for\
  \ an emphasis on virtue and vice of constitutional adjudicators[clarification needed].[citation\
  \ needed]\n\n\nAretaic approaches to morality, epistemology, and jurisprudence have\
  \ been the subject of intense debates. One criticism focuses on the problem of guidance;\
  \ one opponent, Robert Louden in his article \"Some Vices of Virtue Ethics\", questions\
  \ whether the idea of a virtuous moral actor, believer, or judge can provide the\
  \ guidance necessary for action, belief formation, or the resolution of legal disputes.[32]\n\
  \n\nThere are several lists of virtues. Socrates argued that virtue is knowledge,\
  \ which suggests that there is really only one virtue.[33] The Stoics identified\
  \ four cardinal virtues: wisdom, justice, courage, and temperance. Wisdom is subdivided\
  \ into good sense, good calculation, quick-wittedness, discretion, and resourcefulness.\
  \ Justice is subdivided into piety, honesty, equity, and fair dealing. Courage is\
  \ subdivided into endurance, confidence, high-mindedness, cheerfulness, and industriousness.\
  \ Temperance or moderation is subdivided into good discipline, seemliness, modesty,\
  \ and self-control.[34]\n\n\nJohn McDowell argues that virtue is a \"perceptual\
  \ capacity\" to identify how one ought to act, and that all particular virtues are\
  \ merely \"specialized sensitivities\" to a range of reasons for acting.[35]\n\n\
  \nAristotle identifies 12 virtues that demonstrate a person is performing their\
  \ human function well.[13][unreliable source?] He distinguished virtues pertaining\
  \ to emotion and desire from those relating to the mind.[13]: II  The first he calls\
  \ moral virtues, and the second intellectual virtues (though both are \"moral\"\
  \ in the modern sense of the word).\n\n\nAristotle suggested that each moral virtue\
  \ was a golden mean between two corresponding vices, one of excess and one of deficiency.\
  \ Each intellectual virtue is a mental skill or habit by which the mind arrives\
  \ at truth, affirming what is or denying what is not.[13]: VI  In the Nicomachean\
  \ Ethics. he discusses 11 moral virtues:\n\n\nAristotle also mentions several other\
  \ traits: \n\n\nAristotle's list is not the only list, however. As Alasdair MacIntyre\
  \ observed in After Virtue, thinkers as diverse as Homer, the authors of the New\
  \ Testament, Thomas Aquinas, and Benjamin Franklin have all proposed lists.[36]\
  \ Walter Kaufmann proposed as the four cardinal virtues: ambition/humility (\"humbition\"\
  ), love, courage, and honesty.[37]\n\n\nMartha Nussbaum suggested that while virtue\
  \ ethics is often considered to be anti-Enlightenment, \"suspicious of theory and\
  \ respectful of the wisdom embodied in local practices\",[38] it is actually neither\
  \ fundamentally distinct from, nor does it qualify as a rival approach to deontology\
  \ and utilitarianism. She argues that philosophers from these two Enlightenment\
  \ traditions often include theories of virtue. She pointed out that Kant's \"Doctrine\
  \ of Virtue\" (in The Metaphysics of Morals) \"covers most of the same topics as\
  \ do classical Greek theories\", \"that he offers a general account of virtue, in\
  \ terms of the strength of the will in overcoming wayward and selfish inclinations;\
  \ that he offers detailed analyses of standard virtues such as courage and self-control,\
  \ and of vices, such as avarice, mendacity, servility, and pride; that, although\
  \ in general, he portrays inclination as inimical to virtue, he also recognizes\
  \ that sympathetic inclinations offer crucial support to virtue, and urges their\
  \ deliberate cultivation.\"[38]\n\n\nNussbaum also points to considerations of virtue\
  \ by utilitarians such as Henry Sidgwick (The Methods of Ethics), Jeremy Bentham\
  \ (The Principles of Morals and Legislation), and John Stuart Mill, who writes of\
  \ moral development as part of an argument for the moral equality of women (The\
  \ Subjection of Women). She argues that contemporary virtue ethicists such as Alasdair\
  \ MacIntyre, Bernard Williams, Philippa Foot, and John McDowell have few points\
  \ of agreement and that the common core of their work does not represent a break\
  \ from Kant.\n\n\nImmanuel Kant's position on virtue ethics is contested. Those\
  \ who argue that Kantian deontology conflicts with virtue ethics include Alasdair\
  \ MacIntyre, Philippa Foot, and Bernard Williams.[39] In the Groundwork of the Metaphysics\
  \ of Morals and the Critique of Practical Reason, Immanuel Kant offers many different\
  \ criticisms of ethical frameworks and against moral theories before him.[citation\
  \ needed] Kant rarely mentioned Aristotle by name but did not exclude his moral\
  \ philosophy of virtue ethics from his critique. Many Kantian arguments against\
  \ virtue ethics claim that virtue ethics is inconsistent, or sometimes that it is\
  \ not a real moral theory at all.[40]\n\n\nIn \"What Is Virtue Ethics All About?\"\
  ,[41] Gregory Velazco y Trianosky identified the key points of divergence between\
  \ virtue ethicists and what he called \"neo-Kantianism\", in the form these nine\
  \ neo-Kantian moral assertions:\n\n\nTrianosky says that modern sympathizers with\
  \ virtue ethics almost all reject neo-Kantian claim #1, and many of them also reject\
  \ certain of the other claims.\n\n\nRobert B. Louden criticizes virtue ethics on\
  \ the basis that it promotes a form of unsustainable utopianism. Trying to arrive\
  \ at a single set of virtues is immensely difficult in contemporary societies as,\
  \ according to Louden, they contain \"more ethnic, religious, and class groups than\
  \ did the moral community which Aristotle theorized about\" with each of these groups\
  \ having \"not only its own interests but its own set of virtues as well\". Louden\
  \ notes in passing that MacIntyre, a supporter of virtue-based ethics, has grappled\
  \ with this in After Virtue but that ethics cannot dispense with building rules\
  \ around acts and rely only on discussing the moral character of persons.[42]\n\n\
  \nVirtue contrasts with deontological and consequentialist ethics; the three are\
  \ the most predominant contemporary normative-ethical theories. Deontological ethics,\
  \ sometimes referred to as duty ethics, emphasizes adherence to ethical principles\
  \ or duties. How these duties are defined, however, is often a subject of debate.\
  \ One rule scheme used by deontologists is divine command theory. Deontology also\
  \ depends upon meta-ethical realism in postulating the existence of moral absolutes,\
  \ regardless of circumstances. Immanuel Kant is considered a foremost theorist of\
  \ deontological ethics.\n\n\nThe next predominant school of thought in normative\
  \ ethics is consequentialism. While deontology emphasizes doing one's duty, consequentialism\
  \ bases the morality of an action on its outcome. Instead of saying that one has\
  \ a moral duty to abstain from murder, a consequentialist would say that we should\
  \ abstain from murder because it has undesirable effects. The main contention is\
  \ what outcomes should (or can) be identified as objectively desirable.\n\n\nJohn\
  \ Stuart Mill's greatest happiness principle is a commonly-adopted criterion of\
  \ what is objectively desirable. Mill asserts that the desirability of an action\
  \ is the net amount of happiness it brings, the number of people it brings happiness\
  \ to, and the duration of that happiness. He tries to delineate classes of happiness,\
  \ some preferable to others, but classifying such a concept is difficult.\n\n\n\
  A virtue ethicist identifies virtues (also known as desirable characteristics) that\
  \ a good person embodies. Exhibiting these virtues is the aim of ethics, and one's\
  \ actions are a reflection of one's virtues. To the virtue philosopher, action cannot\
  \ be used as a demarcation of morality because a virtue encompasses more than a\
  \ selection of an action; it is a way of being that leads the person exhibiting\
  \ the virtue to consistently make certain types of choices. There is disagreement\
  \ in virtue ethics about what are, and what are not, virtues. There are also difficulties\
  \ in identifying the \"virtuous\" action to take in all circumstances, and how to\
  \ define a virtue.\n\n\nConsequentialist and deontological theories often still\
  \ employ the term virtue in a restricted sense: as a tendency (or disposition) to\
  \ adhere to the system's principles or rules. In those theories, virtue is secondary\
  \ and the principles (or rules) are primary. These differing senses of what constitutes\
  \ virtue are a potential source of confusion.[43]\nDogmatic claims about the purpose\
  \ of human life, or about what a good life is for human beings, are typically controversial.\n\
  \n\nVirtue theory emphasizes Aristotle's belief in the polis as the acme of political\
  \ organization,[citation needed] and the role of the virtues in enabling human beings\
  \ to flourish in that environment. In contrast, classical republicanism emphasizes\
  \ Tacitus's concern that power and luxury can corrupt individuals and destroy liberty,\
  \ as Tacitus perceived in the transformation of the Roman Republic into the Roman\
  \ Empire. Virtue for classical republicans is a shield against this sort of corruption\
  \ and a means to preserve the good life one has, rather than a means by which to\
  \ achieve the good life one does not yet have. Another way to put the distinction\
  \ between the two traditions is that virtue ethics relies on Aristotle's fundamental\
  \ distinction between the human-being-as-he-is from the human-being-as-he-should-be,\
  \ while classical republicanism relies on the Tacitean distinction of the risk-of-becoming.[44]\n\
  \n\nVirtue ethics has a number of contemporary applications:\n\n\nWithin the field\
  \ of social ethics, Deirdre McCloskey argues that virtue ethics can provide a basis\
  \ for a balanced approach to understanding capitalism and capitalist societies.[45][46]\n\
  \n\nWithin the field of philosophy of education, James Page argues that virtue ethics\
  \ can provide a rationale and foundation for peace education.[47]\n\n\nThomas Alured\
  \ Faunce argued that whistleblowing in healthcare settings would be more respected\
  \ within clinical governance pathways if it had a firmer academic foundation in\
  \ virtue ethics.[48] He called for whistleblowing to be expressly supported in the\
  \ UNESCO Universal Declaration on Bioethics and Human Rights.[49] Barry Schwartz\
  \ argues that \"practical wisdom\" is an antidote to much of the inefficient and\
  \ inhumane bureaucracy of modern health care systems.[50]\n\n\nIn her book Technology\
  \ and the Virtues,[51] Shannon Vallor proposed a series of \"technomoral\" virtues\
  \ that people need to cultivate in order to flourish in our socio-technological\
  \ world: honesty (respecting truth), self-control (becoming the author of our desires),\
  \ humility (knowing what we do not know), justice (upholding rightness), courage\
  \ (intelligent fear and hope), empathy (compassionate concern for others), care\
  \ (loving service to others), civility (making common cause), flexibility (skillful\
  \ adaptation to change), perspective (holding on to the moral whole), and magnanimity\
  \ (moral leadership and nobility of spirit).\n"
