  Deception is the act of convincing of one or many recipients of untrue information.
  The person creating the deception knows it to be false while the receiver of the
  information does not.[1] It is often done for personal gain or advantage.[2][3]



  Deceit and dishonesty can also form grounds for civil litigation in tort, or contract
  law (where it is known as misrepresentation or fraudulent misrepresentation if deliberate),
  or give rise to criminal prosecution for fraud.[4]



  The Interpersonal Deception Theory explores the interrelation between communicative
  context and sender and receiver cognitions and behaviors in deceptive exchanges.



