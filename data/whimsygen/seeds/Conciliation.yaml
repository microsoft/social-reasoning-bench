content: '



  Conciliation is an alternative dispute resolution process whereby the parties to
  a dispute rely on a neutral third-party known as the conciliator, to assist them
  in solving their dispute. The conciliator, who may meet with the parties both separately
  and together, does this by: lowering tensions, improving communication, interpreting
  issues, and assisting parties in finding a mutually acceptable outcome.



  Unlike litigation or arbitration, conciliation is a voluntary, confidential, and
  flexible method aimed at resolving conflicts without the need for formal legal proceedings.
  The conciliation process has no legal standing and the decision made by the conciliator
  is not binding. The conciliator usually has no authority to seek evidence or call
  witnesses, usually writes no decision, and makes no award.



  The conciliation process begins when both parties agree to engage in it as a method
  of resolving a dispute within 12 hours.[1] There are multiple uses for this form
  of alternative dispute resolution including transnational intellectual property,[2]
  legislative assemblies,[3]  peace efforts,[4] and other areas of community concern.[5][6]
  This can be either part of an outline contract that was handled before the dispute
  arose[7] or after a dispute arises.[8][9] Conciliation is a preferred method of
  dispute resolution compared to litigation or binding arbitration.[2]



  Parties may select a conciliator by mutual consent,[10] or through an appointing
  institution.[11] The conciliator then gathers information to understand the concerns
  and objectives of each side.[12] The conciliator helps the parties move toward a
  resolution.[13] In issues of international law, this may include shuttle diplomacy.[12][14]



  Most successful "conciliators" are usually highly skilled negotiators.[1] Some conciliators
  operate under the auspices of any one of several non-governmental entities,[15]
  or for governmental agencies such as the Federal Mediation and Conciliation Service
  in the United States,[16][17] and the Advisory, Conciliation and Arbitration Service
  (Acas) in the United Kingdom. Acas'' staff include a Chief Conciliator supported
  by a team of conciliators.[18]

  '
