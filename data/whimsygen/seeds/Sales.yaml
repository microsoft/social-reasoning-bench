content: 'Sales are activities related to selling or the number of goods sold in a
  given targeted time period. The delivery of a service for a cost is also considered
  a sale. A period during which goods are sold for a reduced price may also be referred
  to as a "sale".[1]



  The seller, or the provider of the goods or services, completes a sale in an interaction
  with a buyer, which may occur at the point of sale or in response to a purchase
  order from a customer. There is a passing of title (property or ownership) of the
  item, and the settlement of a price, in which agreement is reached on a price for
  which transfer of ownership of the item will occur. The seller, not the purchaser,
  typically executes the sale and it may be completed prior to the obligation of payment.
  In the case of indirect interaction, a person who sells goods or service on behalf
  of the owner is known as a salesman or saleswoman or salesperson, but this often
  refers to someone selling goods in a store/shop, in which case other terms are also
  common, including salesclerk, shop assistant, and retail clerk.



  In common law countries, sales are governed generally by the common law and commercial
  codes. In the United States, the laws governing sales of goods are mostly uniform
  to the extent that most jurisdictions have adopted Article 2 of the Uniform Commercial
  Code, albeit with some non-uniform variations.



  A person or organization expressing an interest in acquiring the offered item of
  value is referred to as a potential buyer, prospective customer, or prospect. Buying
  and selling are understood to be two sides of the same "coin" or transaction. Both
  seller and buyer engage in a process of negotiation to consummate the exchange of
  values. The exchange, or selling, process has implied rules and identifiable stages.
  Sales transactions are generally expected to follow legal and ethical standards,
  although practices vary across industries and jurisdictions. The stages of selling,
  and buying, involve getting acquainted, assessing each party''s need for the other''s
  item of value, and determining if the values to be exchanged are equivalent or nearly
  so, or, in buyer''s terms, "worth the price". Sometimes, sellers have to use their
  own experiences when selling products with appropriate discounts.[2]



  Although the skills required are different, from a management viewpoint, sales is
  a part of marketing.[3] Sales often form a separate grouping in a corporate structure,
  employing separate specialist operatives known as salespersons (singular: salesperson).
  Selling has been described as both an interpersonal skill and a structured business
  process.[4] Contrary to popular belief, the methodological approach of selling refers
  to a systematic process of repetitive and measurable milestones, by which a salesman
  relates his or her offering of a product or service in return enabling the buyer
  to achieve their goal in an economic way.[5]



  The sales process consists of a series of measurable milestones. However, the definition
  of selling is often unclear due to its close relationship with advertising, promotion,
  public relations, and direct marketing.



  Selling is the profession-wide term, much like marketing defines a profession. Recently,
  attempts have been made to clearly understand who is in the sales profession, and
  who is not. There are many articles looking at marketing, advertising, promotions,
  and even public relations as ways to create a unique transaction.



  Many believe that the focus of selling is on the human agents involved in the exchange
  between buyer and seller. Effective selling also requires a systems approach, at
  minimum involving roles that sell, enable selling, and develop sales capabilities.
  Selling also involves salespeople who possess a specific set of sales skills and
  the knowledge required to facilitate the exchange of value between buyers and sellers
  that is unique from marketing and advertising.



  Within these three tenets, the following definition of professional selling is offered
  by the American Society for Training and Development (ASTD):



  The holistic business system required to effectively develop, manage, enable, and
  execute a mutually beneficial, interpersonal exchange of goods or services for equitable
  value.[6]


  Team selling is one way to influence sales. Team selling is "a group of people representing
  the sales department and other functional areas in the firm, such as finance, production,
  and research and development". (Spiro) Team selling came about in the 1990s through
  total quality management (TQM). TQM occurs when companies work to improve their
  customer satisfaction by constantly improving all their operations.



  Marketing and sales differ greatly, but they generally have the same goal. Selling
  is the final stage in marketing which puts the plan into effect. A marketing plan
  includes pricing, promotion, place, and product (the 4 P''s). A marketing department
  in an organization has the goals of increasing the desirability and value of the
  products and services to the customer and increasing the number and engagement of
  successful interactions between potential customers and the organization. Achieving
  this goal may involve the sales team using promotional techniques such as advertising,
  sales promotion, publicity, and public relations, creating new sales channels, or
  creating new products. It can also include encouraging the potential customer to
  visit the organization''s website, contact the organization for more information,
  or interact with the organization via social media channels such as Twitter, Facebook
  and blogs. Social values play a major role in consumer decision processes. Marketing
  is the whole of the work on persuasion made for the whole of the target people.
  Sales is the process of persuasion and effort from one person to one person (B2C),
  or one person to a corporation (B2B), in order to make a living resource enter the
  company. This may occur in person, over the phone or digitally.



  The field of sales process engineering views "sales" as the output of a larger system,
  not just as the output of one department. The larger system includes many functional
  areas within an organization. From this perspective, the labels "sales" and "marketing"
  cover several processes whose inputs and outputs supply one another. In this context,
  improving an "output" (such as sales) involves studying and improving the broader
  sales process, since the component functional areas interact and are interdependent.[7]



  Many large corporations structure their marketing departments so that they are integrated
  with all areas of the business. They create multiple teams with a singular focus,
  and the managers of these teams must coordinate efforts to drive profits and business
  success. For example, an "inbound" campaign seeks to drive more customers "through
  the door", giving the sales department a better chance of selling their product
  to the consumer.



  The sales department would aim to improve the interaction between the customer and
  the sales channel or salesperson. As sales is the forefront of any organization,
  this would always need to take place before any other business process may begin.
  Sales management involves breaking down the selling process and increasing the effectiveness
  of the discrete processes, as well as improving the interactions between processes.
  For example, in an outbound sales environment, the typical process includes outbound
  calling, the sales pitch, handling objections, opportunity identification, and the
  close. Each step of the process has sales-related issues, skills, and training needs,
  as well as marketing solutions to improve each discrete step.



  One further common complication of marketing is the difficulty in measuring results
  for some marketing initiatives. Some marketing and advertising executives focus
  on creativity and innovation without concern for the top or bottom lines – a fundamental
  pitfall of marketing for marketing''s sake.



  Coordination between sales and marketing departments has been identified as a challenge
  in some organisations.[8] The two departments, although different in nature, handle
  very similar concepts and have to work together to achieve the business''s goals.
  Building a good relationship between the two teams that encourages communication
  can be the key to success.[9]



  The idea that marketing can potentially eliminate the need for salespeople depends
  entirely on context.  For example, this may be possible in some B2C situations;
  however, for many B2B transactions (for example, those involving industrial organizations)
  this is mostly impossible.[10] Another dimension is the value of the goods being
  sold. Fast-moving consumer-goods (FMCG) require no salespeople at the point of sale
  to get them to jump off the supermarket shelf and into the customer''s trolley.
  However, the purchase of large mining equipment worth millions of dollars will require
  a salesperson to manage the sales process – particularly in the face of competitors.
  Small and medium businesses selling such large ticket items to a geographically
  dispersed client base use manufacturers'' representatives to provide this highly
  personal service while avoiding the large expense of a captive sales force.



  Another area of discussion involves the need for alignment and integration of corporate
  sales and marketing functions. According to a report from the Chief Marketing Officer
  (CMO) Council, only 40 percent of companies have formal programs, systems or processes
  in place to align and integrate the two critical functions.



  With the increase of the use of the internet today, sales functions of several enterprises
  are finding traditional methods of marketing quite old fashioned and less efficient.
  So the use of automated marketing applications is on the rise ranging from customer
  relationship management (CRM) to sales force management.



  Traditionally, these two functions, as referred above, have operated separately,
  left in siloed areas of tactical responsibility. Glen Petersen''s book The Profit
  Maximization Paradox[11] sees the changes in the competitive landscape between the
  1950s and the time of writing as so dramatic that the complexity of choice, price,
  and opportunities for the customer forced this seemingly simple and integrated relationship
  between sales and marketing to change forever. Petersen goes on to highlight that
  salespeople spend approximately 40 percent of their time preparing customer-facing
  deliverables while using less than 50 percent of the materials created by marketing,
  adding to perceptions that marketing is out of touch with the customer and that
  sales is resistant to messaging and strategy.



  The sales process is a structured series of steps that a salesperson or sales organization
  follows to guide a prospect from initial awareness to a closed sale. While specific
  models can vary by industry and company, a typical sales process includes the following
  stages:[12]



  A sale can take place through face-to-face contact, via mail order, through a vending
  machine or through online selling. Other methods of selling include:[13]



  Agents in the sales process can represent either of two parties in the sales process;
  for example:



  In the United States, the Fair Labor Standards Act defines outside sales representatives
  as "employees [who] sell their employer''s products, services, or facilities to
  customers away from their employer''s place(s) of business, in general, either at
  the customer''s place of business or by selling door-to-door at the customer''s
  home" while defining those who work "from the employer''s location" as inside sales.[16]
  Inside sales generally involves attempting to close business primarily over the
  phone via telemarketing, while outside sales (or "field" sales) will usually involve
  initial phone work to book sales calls at the potential buyer''s location to attempt
  to close the deal in person. Some companies have an inside sales department that
  works with outside representatives and book their appointments for them. Inside
  sales sometimes refers to upselling to existing customers.[17]



  Sales coaching is a one-on-one coaching process by high-performing sales professionals
  and consultants with salespeople, managers, and executives. The process involves
  equipping them with the knowledge, abilities, and skills needed to become more effective
  sales professionals. Unlike sales training, sales coaching is typically an individualized,
  ongoing endeavor.[18]



  Artificial intelligence (AI) is increasingly used in sales to automate routine tasks,
  analyse customer data, and support decision-making. AI tools can assist with lead
  scoring, market segmentation, sales forecasting, personalised recommendations, and
  automated communication.[19]



  Many organisations use AI-powered customer relationship management (CRM) systems
  to identify prospective customers and predict which leads are most likely to convert
  into sales. AI may also be used to analyse purchasing behaviour, recommend products,
  and generate sales insights from large datasets.[20]



  Generative AI systems have also become more common in sales functions. These systems
  can be used to draft emails, create sales scripts, summarise meetings, and respond
  to customer enquiries through chatbots and virtual assistants.[21] Some companies
  use AI to monitor customer interactions and recommend next steps for sales representatives
  as a way of increasing close rates.



  The use of AI in sales has raised concerns about data privacy, transparency, bias
  in automated decision-making, and the potential replacement of some administrative
  sales roles.[22] Critics have also argued that over-reliance on automated systems
  may reduce the importance of interpersonal communication and relationship-building
  in the sales process.[23]



  Despite these concerns, AI is generally regarded as a tool intended to support rather
  than replace sales professionals, particularly in complex business-to-business transactions
  where human judgement and negotiation remain important.[24]



  In common law countries, sales are governed generally by the common law and commercial
  codes. In the United States, the laws governing sales of goods are mostly uniform
  to the extent that most jurisdictions have adopted Article 2 of the Uniform Commercial
  Code, albeit with some non-uniform variations.



  The European Commission proposed adoption of a Common European Sales Law in 2011
  and set out a proposed regulation on this area of law in 2014. Whilst remaining
  optional, the Commission''s intention was to offer traders a means of breaking down
  barriers occasioned by the different legal systems of its (then) 28 member states.[25]
  A 2012 Communication from the Commission argued that a Common European Sales Law
  would help to address some of the concerns which it had identified in the development
  of a market for cloud computing services.[26] However, the proposal was withdrawn
  in December 2014 when the Commission''s work plan was rationalised.[27]

