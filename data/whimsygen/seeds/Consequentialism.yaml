content: 'In moral philosophy, consequentialism is a class of normative, teleological
  ethical theories that holds that the consequences of one''s conduct are the ultimate
  basis for judgement about the rightness or wrongness of that conduct. Thus, from
  a consequentialist standpoint, a morally right act (including omission from acting)
  is one that will produce a good outcome. Consequentialism, along with eudaimonism,
  falls under the broader category of teleological ethics, a group of views which
  claim that the moral value of any act consists in its tendency to produce things
  of intrinsic value.[1] Consequentialists hold in general that an act is right if
  and only if the act (or in some views, the rule under which it falls) will produce,
  will probably produce, or is intended to produce, a greater balance of good over
  evil than any available alternative. Different consequentialist theories differ
  in how they define moral goods, with chief candidates including pleasure, the absence
  of pain, the satisfaction of one''s preferences, and broader notions of the "general
  good".



  Consequentialism is usually contrasted with deontological ethics (or deontology):
  deontology, in which rules and moral duty are central, derives the rightness or
  wrongness of one''s conduct from the character of the behaviour itself, rather than
  the outcomes of the conduct. It is also contrasted with both virtue ethics, which
  is concerned with the character of the agent rather than on the nature or consequences
  of the act (or omission) itself, and pragmatic ethics, which treats morality like
  science: advancing collectively as a society over the course of many lifetimes,
  such that any moral criterion is subject to revision.



  Some argue that consequentialist theories (such as utilitarianism) and deontological
  theories (such as Kantian ethics) are not necessarily mutually exclusive. For example,
  T. M. Scanlon advances the idea that human rights, which are commonly considered
  to be deontological in nature, can only be justified with reference to the consequences
  of having those rights.[2] Similarly, Robert Nozick argued for a theory that is
  mostly consequentialist, but incorporates inviolable "side-constraints" which restrict
  the sort of actions agents are permitted to do.[2] Derek Parfit argued that, in
  practice, when understood properly, rule consequentialism, Kantian deontology, and
  contractualism would all end up prescribing the same behavior.[3]



  The term consequentialism was coined by G. E. M. Anscombe in her essay "Modern Moral
  Philosophy" in 1958.[4][5] However, the meaning of the word has changed over the
  time since Anscombe used it: in the sense she coined it, she had explicitly placed
  J. S. Mill in the nonconsequentialist and W. D. Ross in the consequentialist camp,
  whereas, in the contemporary sense of the word, they would be classified the other
  way round.[4][6] This is due to changes in the meaning of the word, not due to changes
  in perceptions of W.D. Ross''s and J.S. Mill''s views.[4][6]



  One common view is to classify consequentialism, together with virtue ethics, under
  a broader label of "teleological ethics".[7][1] Proponents of teleological ethics
  (Greek: telos, ''end, purpose'' and logos, ''science'') argue that the moral value
  of any act consists in its tendency to produce things of intrinsic value,[1] meaning
  that an act is right if and only if it, or the rule under which it falls, produces,
  will probably produce, or is intended to produce, a greater balance of good over
  evil than any alternative act. This concept is exemplified by the famous aphorism,
  "the end justifies the means," variously attributed to Machiavelli or Ovid[8] i.e.
  if a goal is morally important enough, any method of achieving it is acceptable.[9][10]



  Teleological ethical theories are contrasted with deontological ethical theories,
  which hold that acts themselves are inherently good or bad, rather than good or
  bad because of extrinsic factors (such as the act''s consequences or the moral character
  of the person who acts).[11]



  Nature has placed mankind under the governance of two sovereign masters, pain and
  pleasure. It is for them alone to point out what we ought to do, as well as to determine
  what we shall do. On the one hand the standard of right and wrong, on the other
  the chain of causes and effects, are fastened to their throne. They govern us in
  all we do, in all we say, in all we think...


  — Jeremy Bentham, The Principles of Morals and Legislation (1789) Ch I, p 1


  In summary, Jeremy Bentham states that people are driven by their interests and
  their fears, but their interests take precedence over their fears; their interests
  are carried out in accordance with how people view the consequences that might be
  involved with their interests. Happiness, in this account, is defined as the maximization
  of pleasure and the minimization of pain. It can be argued that the existence of
  phenomenal consciousness and "qualia" is required for the experience of pleasure
  or pain to have an ethical significance.[12][13]



  Historically, hedonistic utilitarianism is the paradigmatic example of a consequentialist
  moral theory. This form of utilitarianism holds that what matters is to aggregate
  happiness; the happiness of everyone, and not the happiness of any particular person.
  John Stuart Mill, in his exposition of hedonistic utilitarianism, proposed a hierarchy
  of pleasures, meaning that the pursuit of certain kinds of pleasure is more highly
  valued than the pursuit of other pleasures.[14] However, some contemporary utilitarians,
  such as Peter Singer, are concerned with maximizing the satisfaction of preferences,
  hence preference utilitarianism. Other contemporary forms of utilitarianism mirror
  the forms of consequentialism outlined below.



  In general, consequentialist theories focus on actions. However, this need not be
  the case. Rule consequentialism is a theory that is sometimes seen as an attempt
  to reconcile consequentialism with deontology, or rules-based ethics[15]—and in
  some cases, this is stated as a criticism of rule consequentialism.[16] Like deontology,
  rule consequentialism holds that moral behavior involves following certain rules.
  However, rule consequentialism chooses rules based on the consequences that the
  selection of those rules has. Rule consequentialism exists in the forms of rule
  utilitarianism and rule egoism.



  Various theorists are split as to whether the rules are the only determinant of
  moral behavior or not. For example, Robert Nozick held that a certain set of minimal
  rules, which he calls "side-constraints," are necessary to ensure appropriate actions.[2]
  There are also differences as to how absolute these moral rules are. Thus, while
  Nozick''s side-constraints are absolute restrictions on behavior, Amartya Sen proposes
  a theory that recognizes the importance of certain rules, but these rules are not
  absolute.[2] That is, they may be violated if strict adherence to the rule would
  lead to much more undesirable consequences.



  One of the most common objections to rule-consequentialism is that it is incoherent,
  because it is based on the consequentialist principle that what we should be concerned
  with is maximizing the good, but then it tells us not to act to maximize the good,
  but to follow rules (even in cases where we know that breaking the rule could produce
  better results).



  In Ideal Code, Real World, Brad Hooker avoids this objection by not basing his form
  of rule-consequentialism on the ideal of maximizing the good. He writes:[17]



  [T]he best argument for rule-consequentialism is not that it derives from an overarching
  commitment to maximise the good. The best argument for rule-consequentialism is
  that it does a better job than its rivals of matching and tying together our moral
  convictions, as well as offering us help with our moral disagreements and uncertainties.


  Derek Parfit described Hooker''s book as the "best statement and defence, so far,
  of one of the most important moral theories."[18]



  It is the business of the benevolent man to seek to promote what is beneficial to
  the world and to eliminate what is harmful, and to provide a model for the world.
  What benefits he will carry out; what does not benefit men he will leave alone (Chinese:
  仁之事者, 必务求于天下之利, 除天下之害, 将以为法乎天下. 利人乎, 即为; 不利人乎, 即止).[19]


  — Mozi, Mozi (5th century BC) (Chapter 8: Against Music Part I)


  State consequentialism, also known as Mohist consequentialism,[20] is an ethical
  theory that evaluates the moral worth of an action based on how much it contributes
  to the welfare of a state.[20] According to the Stanford Encyclopedia of Philosophy,
  Mohist consequentialism, dating back to the 5th century BCE, is the "world''s earliest
  form of consequentialism, a remarkably sophisticated version based on a plurality
  of intrinsic goods taken as constitutive of human welfare."[21]



  Unlike utilitarianism, which views utility as the sole moral good, "the basic goods
  in Mohist consequentialist thinking are...order, material wealth, and increase in
  population."[22] The word "order" refers to Mozi''s stance against warfare and violence,
  which he viewed as pointless and a threat to social stability; "material wealth"
  of Mohist consequentialism refers to basic needs, like shelter and clothing; and
  "increase in population" relates to the time of Mozi, war and famine were common,
  and population growth was seen as a moral necessity for a harmonious society.[23]
  In The Cambridge History of Ancient China, Stanford sinologist David Shepherd Nivison
  writes that the moral goods of Mohism "are interrelated: more basic wealth, then
  more reproduction; more people, then more production and wealth...if people have
  plenty, they would be good, filial, kind, and so on unproblematically."[22]



  The Mohists believed that morality is based on "promoting the benefit of all under
  heaven and eliminating harm to all under heaven." In contrast to Jeremy Bentham''s
  views, state consequentialism is not utilitarian because it is not hedonistic or
  individualistic. The importance of outcomes that are good for the community outweigh
  the importance of individual pleasure and pain.[24] The term state consequentialism
  has also been applied to the political philosophy of the Confucian philosopher Xunzi.[25]
  On the other hand, "legalist" Han Fei "is motivated almost totally from the ruler''s
  point of view."[26]



  Ethical egoism can be understood as a consequentialist theory according to which
  the consequences for the individual agent are taken to matter more than any other
  result. Thus, egoism will prescribe actions that may be beneficial, detrimental,
  or neutral to the welfare of others. Some, like Henry Sidgwick, argue that a certain
  degree of egoism promotes the general welfare of society for two reasons: because
  individuals know how to please themselves best, and because if everyone were an
  austere altruist then general welfare would inevitably decrease.[27]



  The two-level approach involves engaging in critical reasoning and considering all
  the possible ramifications of one''s actions before making an ethical decision,
  but reverting to generally reliable moral rules when one is not in a position to
  stand back and examine the dilemma as a whole. In practice, this equates to adhering
  to rule consequentialism when one can only reason on an intuitive level, and to
  act consequentialism when in a position to stand back and reason on a more critical
  level.[28]



  This position can be described as a reconciliation between act consequentialism—in
  which the morality of an action is determined by that action''s effects—and rule
  consequentialism—in which moral behavior is derived from following rules that lead
  to positive outcomes.[28]



  The two-level approach to consequentialism is most often associated with R. M. Hare
  and Peter Singer.[28]



  Another consequentialist application view is motive consequentialism, which looks
  at whether the state of affairs that results from the motive to choose an action
  is better or at least as good as each alternative state of affairs that would have
  resulted from alternative actions. This version gives relevance to the motive of
  an act and links it to its consequences. An act can therefore not be wrong if the
  decision to act was based on a right motive. A possible inference is that one can
  not be blamed for mistaken judgments if the motivation was to do good.[29]



  One important characteristic of many normative moral theories such as consequentialism
  is the ability to produce practical moral judgements. At the very least, any moral
  theory needs to define the standpoint from which the goodness of the consequences
  are to be determined. What is primarily at stake here is the responsibility of the
  agent.[30]



  One common tactic among consequentialists, particularly those committed to an altruistic
  (selfless) account of consequentialism, is to employ an ideal, neutral observer
  from which moral judgements can be made. John Rawls, a critic of utilitarianism,
  argues that utilitarianism, in common with other forms of consequentialism, relies
  on the perspective of such an ideal observer.[2] The particular characteristics
  of this ideal observer can vary from an omniscient observer, who would grasp all
  the consequences of any action, to an ideally informed observer, who knows as much
  as could reasonably be expected, but not necessarily all the circumstances or all
  the possible consequences. Consequentialist theories that adopt this paradigm hold
  that right action is the action that will bring about the best consequences from
  this ideal observer''s perspective.[citation needed]



  In practice, it is very difficult, and at times arguably impossible, to adopt the
  point of view of an ideal observer. Individual moral agents do not know everything
  about their particular situations, and thus do not know all the possible consequences
  of their potential actions. For this reason, some theorists have argued that consequentialist
  theories can only require agents to choose the best action in line with what they
  know about the situation.[31] However, if this approach is naïvely adopted, then
  moral agents who, for example, recklessly fail to reflect on their situation, and
  act in a way that brings about terrible results, could be said to be acting in a
  morally justifiable way. Acting in a situation without first informing oneself of
  the circumstances of the situation can lead to even the most well-intended actions
  yielding miserable consequences. As a result, it could be argued that there is a
  moral imperative for agents to inform themselves as much as possible about a situation
  before judging the appropriate course of action. This imperative, of course, is
  derived from consequential thinking: a better-informed agent is able to bring about
  better consequences.[citation needed]



  Since pure consequentialism holds that an action is to be judged solely by its result,
  most consequentialist theories hold that a deliberate action is no different from
  a deliberate decision not to act. This contrasts with the "acts and omissions doctrine",
  which is upheld by some medical ethicists and some religions: it asserts there is
  a significant moral distinction between acts and deliberate non-actions which lead
  to the same outcome. This contrast is brought out in issues such as voluntary euthanasia.



  The normative status of an action depends on its consequences according to consequentialism.
  The consequences of the actions of an agent may include other actions by this agent.
  Actualism and possibilism disagree on how later possible actions impact the normative
  status of the current action by the same agent. Actualists assert that it is only
  relevant what the agent would actually do later for assessing the value of an alternative.
  Possibilists, on the other hand, hold that we should also take into account what
  the agent could do, even if she would not do it.[32][33][34][35]



  For example, assume that Gifre has the choice between two alternatives, eating a
  cookie or not eating anything. Having eaten the first cookie, Gifre could stop eating
  cookies, which is the best alternative. But after having tasted one cookie, Gifre
  would freely decide to continue eating cookies until the whole bag is finished,
  which would result in a terrible stomach ache and would be the worst alternative.
  Not eating any cookies at all, on the other hand, would be the second-best alternative.
  Now the question is: should Gifre eat the first cookie or not? Actualists are only
  concerned with the actual consequences. According to them, Gifre should not eat
  any cookies at all since it is better than the alternative leading to a stomach
  ache. Possibilists, however, contend that the best possible course of action involves
  eating the first cookie and this is therefore what Gifre should do.[36]



  One counterintuitive consequence of actualism is that agents can avoid moral obligations
  simply by having an imperfect moral character.[32][34] For example, a lazy person
  might justify rejecting a request to help a friend by arguing that, due to her lazy
  character, she would not have done the work anyway, even if she had accepted the
  request. By rejecting the offer right away, she managed at least not to waste anyone''s
  time. Actualists might even consider her behavior praiseworthy since she did what,
  according to actualism, she ought to have done. This seems to be a very easy way
  to "get off the hook" that is avoided by possibilism. But possibilism has to face
  the objection that in some cases it sanctions and even recommends what actually
  leads to the worst outcome.[32][37]



  Douglas W. Portmore has suggested that these and other problems of actualism and
  possibilism can be avoided by constraining what counts as a genuine alternative
  for the agent.[38] On his view, it is a requirement that the agent has rational
  control over the event in question. For example, eating only one cookie and stopping
  afterward only is an option for Gifre if she has the rational capacity to repress
  her temptation to continue eating. If the temptation is irrepressible then this
  course of action is not considered to be an option and is therefore not relevant
  when assessing what the best alternative is. Portmore suggests that, given this
  adjustment, we should prefer a view very closely associated with possibilism called
  maximalism.[36]



  Moral action always has consequences for certain people or things. Varieties of
  consequentialism can be differentiated by the beneficiary of the good consequences.
  That is, one might ask "Consequences for whom?"



  A fundamental distinction can be drawn between theories which require that agents
  act for ends perhaps disconnected from their own interests and drives, and theories
  which permit that agents act for ends in which they have some personal interest
  or motivation.  These are called "agent-neutral" and "agent-focused" theories respectively.



  Agent-neutral consequentialism ignores the specific value a state of affairs has
  for any particular agent. Thus, in an agent-neutral theory, an actor''s personal
  goals do not count any more than anyone else''s goals in evaluating what action
  the actor should take. Agent-focused consequentialism, on the other hand, focuses
  on the particular needs of the moral agent. Thus, in an agent-focused account, such
  as one that Peter Railton outlines, the agent might be concerned with the general
  welfare, but the agent is more concerned with the immediate welfare of herself and
  her friends and family.[2]



  These two approaches could be reconciled by acknowledging the tension between an
  agent''s interests as an individual and as a member of various groups, and seeking
  to somehow optimize among all of these interests.[citation needed] For example,
  it may be meaningful to speak of an action as being good for someone as an individual,
  but bad for them as a citizen of their town.



  Many consequentialist theories may seem primarily concerned with human beings and
  their relationships with other human beings. However, some philosophers argue that
  we should not limit our ethical consideration to the interests of human beings alone.
  Jeremy Bentham, who is regarded as the founder of utilitarianism, argues that animals
  can experience pleasure and pain, thus demanding that ''non-human animals'' should
  be a serious object of moral concern.[39]



  More recently, Peter Singer has argued that it is unreasonable that we do not give
  equal consideration to the interests of animals as to those of human beings when
  we choose the way we are to treat them.[40] Such equal consideration does not necessarily
  imply identical treatment of humans and non-humans, any more than it necessarily
  implies identical treatment of all humans.



  One way to divide various consequentialisms is by the types of consequences that
  are taken to matter most, that is, which consequences count as good states of affairs.
  According to utilitarianism, a good action is one that results in an increase in
  pleasure, and the best action is one that results in the most pleasure for the greatest
  number. Closely related is eudaimonic consequentialism, according to which a full,
  flourishing life, which may or may not be the same as enjoying a great deal of pleasure,
  is the ultimate aim. Similarly, one might adopt an aesthetic consequentialism, in
  which the ultimate aim is to produce beauty. However, one might fix on non-psychological
  goods as the relevant effect. Thus, one might pursue an increase in material equality
  or political liberty instead of something like the more ephemeral "pleasure". Other
  theories adopt a package of several goods, all to be promoted equally. As the consequentialist
  approach contains an inherent assumption that the outcomes of a moral decision can
  be quantified in terms of "goodness" or "badness," or at least put in order of increasing
  preference, it is an especially suited moral theory for a probabilistic and decision
  theoretical approach.[41][42]



  G. E. M. Anscombe objects to the consequentialism of Sidgwick on the grounds that
  the moral worth of an action is premised on the predictive capabilities of the individual,
  relieving them of the responsibility for the "badness" of an act should they "make
  out a case for not having foreseen" negative consequences.[5]



  Immanuel Kant makes a similar argument against consequentialism in the case of the
  inquiring murder. The example asks whether or not it would be right to give false
  statement to an inquiring murderer in order to misdirect the individual away from
  the intended victim. He argues, in On a Supposed Right to Tell Lies from Benevolent
  Motives, that lying from "benevolent motives," here the motive to maximize the good
  consequences by protecting the intended victim, should then make the liar responsible
  for the consequences of the act. For example, it could be that by misdirecting the
  inquiring murder away from where one thought the intended victim was actually directed
  the murder to the intended victim.[43] That such an act is immoral mirrors Anscombe''s
  objection to Sidgwick that his consequentialism would problematically absolve the
  consequentalist of moral responsibility when the consequentalist fails to foresee
  the true consequences of an act.



  The future amplification of the effects of small decisions[44] is an important factor
  that makes it more difficult to predict the ethical value of consequences,[45] even
  though most would agree that only predictable consequences are charged with a moral
  responsibility.[46]



  Bernard Williams has argued that consequentialism is alienating because it requires
  moral agents to put too much distance between themselves and their own projects
  and commitments. Williams argues that consequentialism requires moral agents to
  take a strictly impersonal view of all actions, since it is only the consequences,
  and not who produces them, that are said to matter. Williams argues that this demands
  too much of moral agents—since (he claims) consequentialism demands that they be
  willing to sacrifice any and all personal projects and commitments in any given
  circumstance in order to pursue the most beneficent course of action possible. He
  argues further that consequentialism fails to make sense of intuitions that it can
  matter whether or not someone is personally the author of a particular consequence.
  For example, that participating in a crime can matter, even if the crime would have
  been committed anyway, or would even have been worse, without the agent''s participation.[47]



  Some consequentialists—most notably Peter Railton—have attempted to develop a form
  of consequentialism that acknowledges and avoids the objections raised by Williams.
  Railton argues that Williams''s criticisms can be avoided by adopting a form of
  consequentialism in which moral decisions are to be determined by the sort of life
  that they express. On his account, the agent should choose the sort of life that
  will, on the whole, produce the best overall effects.[2]

