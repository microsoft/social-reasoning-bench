content: "\n\n\nArbitration is a formal method of dispute resolution involving a neutral\
  \ person or entity who makes a binding decision (commonly called binding arbitration).\
  \ The neutral third party (the 'arbitrator', 'arbiter' or 'arbitral tribunal') renders\
  \ the decision in the form of an 'arbitration award'.[1] An arbitration award is\
  \ legally binding on both sides and enforceable in local courts, unless all parties\
  \ stipulate that the arbitration process and decision are non-binding.[2]\n\n\n\
  Arbitration is often used for the resolution of commercial disputes, particularly\
  \ in the context of international commercial transactions.  In certain countries,\
  \ such as the United States, arbitration is also frequently employed in consumer\
  \ and employment matters, where arbitration may be mandated by the terms of employment\
  \ or commercial contracts and may include a waiver of the right to bring a class\
  \ action claim. Mandatory consumer and employment arbitration should be distinguished\
  \ from consensual arbitration, particularly commercial arbitration.\n\n\nThere are\
  \ limited rights of review and appeal of arbitration awards. Arbitration is not\
  \ the same as judicial proceedings (although in some jurisdictions, court proceedings\
  \ are sometimes referred as arbitrations[3]), alternative dispute resolution,[4]\
  \ expert determination, or mediation (a form of settlement negotiation facilitated\
  \ by a neutral third party).\n\n\nParties often seek to resolve disputes through\
  \ arbitration because of a number of perceived potential advantages over judicial\
  \ proceedings. Companies often require arbitration with their customers, but prefer\
  \ the advantages of courts in disputes with competitors.[5][failed verification]\
  \ Prevalent advantages of arbitration over litigation involve:\n\n\nSome of the\
  \ disadvantages include:\n\n\nBy their nature, the subject matter of some disputes\
  \ is not capable of arbitration. In general, two groups of legal procedures cannot\
  \ be subjected to arbitration:\n\n\nArbitration agreements are generally divided\
  \ into two types:[citation needed]\n\n\nThe former is the far more prevalent type\
  \ of arbitration agreement. Sometimes, legal significance attaches to the type of\
  \ arbitration agreement. For example, in certain Commonwealth countries (not including\
  \ England and Wales), it is possible to provide that each party should bear their\
  \ own costs in a conventional arbitration clause, but not in a submission agreement.\n\
  \n\nParties to a non-contractual dispute may enact a submission agreement where\
  \ the circumstances for an advance agreement to submit to arbitration did not arise,\
  \ for example in tort cases such as personal injury claims.[19]\n\n\nIn keeping\
  \ with the informality of the arbitration process, the law is generally keen to\
  \ uphold the validity of arbitration clauses even when they lack the normal formal\
  \ language associated with legal contracts. Clauses which have been upheld include:\n\
  \n\nThe courts have also upheld clauses which specify resolution of disputes other\
  \ than in accordance with a specific legal system. These include provision indicating:\n\
  \n\nAgreements to refer disputes to arbitration are generally presumed to be separable\
  \ from the rest of the contract. This means that an issue of validity pertaining\
  \ to the contract as a whole will not automatically vitiate the validity of the\
  \ agreement to arbitrate.[6] For example, in disputes on a contract, a common defence\
  \ is to plead the contract is void and thus any claim based upon it fails. It follows\
  \ that if a party successfully claims that a contract is void, then each clause\
  \ contained within the contract, including the arbitration clause, would be void.\
  \ However, in most countries, the courts have accepted that:\n\n\nThis protects\
  \ the tribunal's ability to arbitrate beyond termination of the contract.[6] Arguably,\
  \ it is necessary to ensure that disputes are arbitrated rather than litigated—without\
  \ such a clause, a dispute arising out of a contract will necessarily be litigated.\n\
  \n\nArguably, either position is potentially unfair; if a person is made to sign\
  \ a contract under duress, and the contract contains an arbitration clause highly\
  \ favourable to the other party, the dispute may still referred to that arbitration\
  \ tribunal.[citation needed] Conversely a court may be persuaded that the arbitration\
  \ agreement itself is void having been signed under duress. However, most courts\
  \ will be reluctant to interfere with the general rule which does allow for commercial\
  \ expediency; any other solution (where one first had to go to court to decide whether\
  \ one had to go to arbitration) would be self-defeating.\n\n\nCompanies' articles\
  \ of association may include an arbitration clause, for example under Swiss company\
  \ law.[26] In the UK, the Association of British Insurers and the National Association\
  \ of Pension Funds have both argued for restricted use of arbitration clauses in\
  \ articles of association unless clear benefits and shareholder consent can both\
  \ be evidenced.[27]\n\n\nNations regulate arbitration through a variety of laws.\
  \ The main body of law applicable to arbitration is normally contained either in\
  \ the national private international law statute, as is the case in Switzerland's\
  \ Private International Law Statute (PILA),[28] or in a separate law on arbitration,\
  \ as is the case in England and Wales,[29] the Republic of Korea and Jordan.[30]\
  \ In addition to this, a number of national procedural laws may also contain provisions\
  \ relating to arbitration.\n\n\nPresently, Singapore maintains two distinct frameworks\
  \ under which contractual disputes can be arbitrated, which differ primarily in\
  \ regard to the extent to which parties to the proceedings may resort to the courts.\
  \ Under section 45 of the Arbitration Act 2001, either party or the arbitral tribunal\
  \ itself may apply to the court to issue a ruling on \"any question of law arising\
  \ in the course of the proceedings which the Court is satisfied substantially affects\
  \ the rights of one or more of the parties\" and under section 49, either party\
  \ may appeal an arbitral award on any question of law unless the parties have expressly\
  \ excluded appeals the section.[31] Either action is only permitted with the consent\
  \ of the other parties or either the arbitral tribunal (for rulings on preliminary\
  \ points of law) or the Court (with regard to appeals. This is in contrast to the\
  \ International Arbitration Act 1994, which generally replicates the provisions\
  \ of the UNCITRAL Model Law on International Commercial Arbitration and provides\
  \ more restricted access to the courts.[32]\n\n\nIn 2020, the Singapore Academy\
  \ of Law published a report on the right of appeal in arbitral proceedings evaluating\
  \ the advantages and disadvantages of the two distinct frameworks, concluding that\
  \ the existence of appeals enables the development of case law and consequently\
  \ provides greater certainty for parties to arbitral proceedings.[33] The report\
  \ identifies the availability of appeals by default under section 69 of England's\
  \ Arbitration Act 1996[34] as a factor contributing to the popularity of London\
  \ as a seat of arbitration in international contract disputes. Consequently, the\
  \ report recommends amending the International Arbitration Act 1994 to enable parties\
  \ to opt for a right of appeal in their arbitration agreement, thus enabling the\
  \ development of case law and providing greater certainty for parties who desire\
  \ it while maintaining an absence of appeals as the default position in order to\
  \ cater to parties who desire a completely extrajudicial resolution of contractual\
  \ disputes.[33]\n\n\nUniquely, both the International Arbitration Act 1994 and the\
  \ Arbitration Act 2001 contain provisions (Part 2A and Part 9A, respectively) explicitly\
  \ authorising the arbitration of intellectual property disputes regardless of the\
  \ extent to which the law of Singapore or any other jurisdiction expressly confers\
  \ jurisdiction upon any designated body.[32][31] This contrasts with the general\
  \ approach taken by the majority of other jurisdictions and enables parties to foreign\
  \ intellectual property disputes to seek resolution offshore without affecting the\
  \ recognition of intellectual property rights in the jurisdictions in which they\
  \ are issued.[35]\n\n\nItaly takes a modern and open approach to arbitration, the\
  \ main law on which is contained in Book IV, Chapter VIII of the Code of Civil Procedure\
  \ (CCP). A number of provisions take their inspiration from the United Nations Commission\
  \ on International Trade Law (UNCITRAL) Model Law on International Commercial Arbitration\
  \ (the UNCITRAL Model Law). The provisions allow for proceedings to be conducted\
  \ abroad and for the parties to agree to conduct an arbitration in any language.\
  \ In March 2023, an important further mini-reform of the arbitration law entered\
  \ into force, intended to remove some last remaining potential issues for foreign\
  \ parties. In particular, the Italian Council of Ministers, through the recent reform\
  \ known as \"Cartabia\", has introduced significant innovations in the field of\
  \ arbitration by reorganising various institutions of civil procedure. The purpose\
  \ of the reform, in accordance with the Recovery Plan for Europe, is to simplify\
  \ and increase the overall efficiency of the Italian legal system. The amendments\
  \ to the Fourth Book of the Italian Code of Civil Procedure (ICCP)[clarification\
  \ needed] aim to bring the arbitral decision (\"lodo arbitrale\") as close as possible\
  \ to the judicial judgment (\"sentenza\"). In this respect, the reform constitutes\
  \ the first major change to the Code since 2006, when the Italian system was, for\
  \ the first time, partially aligned with the UNCITRAL Model Law. However, the last\
  \ intervention is limited to specific aspects of the arbitral discipline, such as\
  \ translatio iudicii, the principle of impartiality and independence of arbitrators,\
  \ and the power to issue precautionary measures. It also pertains to corporate arbitration,\
  \ which is now governed by the ICCP.[36]\n\n\nThe U.S. Supreme Court has held that\
  \ the Federal Arbitration Act (FAA) of 1925 established a public policy in favor\
  \ of arbitration. For the first six decades of its existence, courts did not allow\
  \ arbitration for \"federal statutory claims\" through a bright-line \"nonarbitrability\"\
  \ doctrine, but in the 1980s the Supreme Court of the United States reversed and\
  \ began to use the act to require arbitration if included in the contract for federal\
  \ statutory claims. Although some legal scholars believe that it was originally\
  \ intended to apply to federal courts only, courts now routinely require arbitration\
  \ due to the FAA regardless of state statutes or public policy unconscionability\
  \ determinations by state courts. In consumer law, standard form contracts often\
  \ include mandatory predispute arbitration clauses which require consumer arbitration.\
  \ Under these agreements the consumer may waive their right to a lawsuit and a class\
  \ action. In 2011, one of these clauses was upheld in AT&T Mobility v. Concepcion.[37]\n\
  \n\nSeveral arbitration organizations exist, including the American Arbitration\
  \ Association and JAMS. The National Arbitration Forum also conducts arbitrations,\
  \ but it no longer conducts consumer arbitrations pursuant to a consent decree entered\
  \ into in 2009 because of evidence that it had been biased toward, and had incentives\
  \ that favored, credit card companies over cardholders. The AAA was also asked to\
  \ exit the business,[38] but has not done so.\n\n\nThe Korean Arbitration Act is\
  \ the main law governing arbitration in the Republic of Korea. The official body\
  \ which resolves disputes via arbitration is the Korean Commercial Arbitration Board.\
  \ Legal professionals and corporations, in Korea, are increasingly preferring arbitration\
  \ to litigation.[39] The number of arbitrations, in Korea, is increasing year on\
  \ year.[40]\n\n\nAccording to Michael Hay, a lawyer who specialised in North Korean\
  \ law, North Korea has an advanced arbitration system even compared to developed\
  \ countries, and foreign companies face an even playing field in dispute resolution.\
  \ Arbitration cases could be concluded in as little as six months. According to\
  \ Hay, North Korea maintains an advanced dispute resolution system in order to facilitate\
  \ foreign investment.[41]\n\n\nThe United States and Great Britain were pioneers\
  \ in the use of arbitration to resolve their differences. It was first used in the\
  \ Jay Treaty of 1795 negotiated by John Jay, and played a major role in the Alabama\
  \ Claims case of 1872 whereby major tensions regarding British support for the Confederacy\
  \ during the American Civil War were resolved.  At the First International Conference\
  \ of American States in 1890, a plan for systematic arbitration was developed, but\
  \ not accepted. The Hague Peace Conference of 1899 saw the major world powers agree\
  \ to a system of arbitration and the creation of the Permanent Court of Arbitration.\
  \  \nArbitration was widely discussed among diplomats and elites in the 1890–1914\
  \ era. The 1895 dispute between the United States and Britain over Venezuela was\
  \ peacefully resolved through arbitration. Both nations realized that a mechanism\
  \ was desirable to avoid possible future conflicts. The Olney-Pauncefote Treaty\
  \ of 1897 was a proposed treaty between the United States and Britain in 1897 that\
  \ required arbitration of major disputes.  The treaty was rejected by the U.S. Senate\
  \ and never went into effect.[42]\n\n\nAmerican President William Howard Taft (1909–1913)\
  \ was a major advocate of arbitration as a major reform of the Progressive Era.\
  \  In 1911, Taft and his Secretary of State Philander C. Knox negotiated major treaties\
  \ with Great Britain and with France  providing that differences be arbitrated.\
  \ Disputes had to be submitted to the Hague Court or other tribunal. These were\
  \ signed in August 1911 but had to be ratified by a two thirds vote of the Senate.\
  \ Neither Taft nor Knox consulted with members of the Senate during the negotiating\
  \ process. By then multiple Republicans were opposed to Taft, and the president\
  \ felt that lobbying too hard for the treaties might cause their defeat. He made\
  \ some speeches supporting the treaties in October, but the Senate added amendments\
  \ Taft could not accept, killing the agreements.[43]\n\n\nThe arbitration issue\
  \ opens a window on a bitter philosophical dispute among American progressives.\
  \ Some, led by Taft, looked to legal arbitration as the best alternative to warfare.\
  \  Taft was a constitutional lawyer who later became Chief Justice; he had a deep\
  \ understanding of the legal issues.[44] Taft's political base was the conservative\
  \ business community which largely supported peace movements before 1914. However,\
  \ his mistake in this case was a failure to mobilize that base. The businessmen\
  \ believed that economic rivalries were cause of war, and that extensive trade led\
  \ to an interdependent world that would make war an expensive and useless anachronism.\n\
  \n\nHowever, an opposing faction of American progressives, led by ex-president Theodore\
  \ Roosevelt, ridiculed arbitration as foolhardy idealism, and insisted on the realism\
  \ of warfare as the only solution to serious disputes. Taft's treaties with France\
  \ and Britain were killed by Roosevelt, who had broken with his protégé Taft in\
  \ 1910. They were dueling for control of the Republican Party. Roosevelt worked\
  \ with his close friend Senator Henry Cabot Lodge to impose those amendments that\
  \ ruined the goals of the treaties.  Lodge thought the treaties impinge too much\
  \ on senatorial prerogatives.[45] Roosevelt, however, was acting to sabotage Taft's\
  \ campaign promises.[46] At a deeper level, Roosevelt truly believed that arbitration\
  \ was a naïve solution and the great issues had to be decided by warfare. The Rooseveltian\
  \ approach had a near-mystical faith of the ennobling nature of war. It endorsed\
  \ jingoistic nationalism as opposed to the businessmen's calculation of profit and\
  \ national interest.[47]\n\n\nAlthough no general arbitration treaty was entered\
  \ into, Taft's administration settled several disputes with Great Britain by peaceful\
  \ means, often involving arbitration. These included a settlement of the boundary\
  \ between Maine and New Brunswick, a long-running dispute over seal hunting in the\
  \ Bering Sea that also involved Japan, and a similar disagreement regarding fishing\
  \ off Newfoundland.[48]\n\n\nAmerican Secretary of State William Jennings Bryan\
  \ (1913–1915) worked energetically to promote international arbitration agreements,\
  \ but his efforts were frustrated by the outbreak of World War I. Bryan negotiated\
  \ 28 treaties that promised arbitration of disputes before war broke out between\
  \ the signatory countries and the United States. He made several attempts to negotiate\
  \ a treaty with Germany, but ultimately was never able to succeed. The agreements,\
  \ known officially as \"Treaties for the Advancement of Peace\", set up procedures\
  \ for conciliation rather than for arbitration.[49]  Arbitration treaties were negotiated\
  \ after the war, but attracted much less attention than the negotiation mechanism\
  \ created by the League of Nations.\n\n\nThe major international instrument on arbitration\
  \ law is the 1958 New York Convention on Recognition and Enforcement of Foreign\
  \ Arbitral Awards, usually simply referred to as the \"New York Convention\".  Virtually\
  \ every significant commercial country is a signatory, and only a handful of countries\
  \ are not parties to the New York Convention.\n\n\nSome other relevant international\
  \ instruments are:\n\n\nIt is often easier to enforce arbitration awards in a foreign\
  \ country than court judgments. Under the New York Convention 1958, an award issued\
  \ in a contracting state can generally be freely enforced in any other contracting\
  \ state, only subject to certain, limited defenses. Only foreign arbitration awards\
  \ are enforced pursuant to the New York Convention. An arbitral decision is foreign\
  \ where the award was made in a state other than the state of recognition or where\
  \ foreign procedural law was used.[51] In most cases, these disputes are settled\
  \ with no public record of their existence as the loser complies voluntarily, although\
  \ in 2014 UNCITRAL promulgated a rule for public disclosure of investor-state disputes.[52]\n\
  \n\nVirtually every significant commercial country in the world is a party to the\
  \ Convention while relatively few countries have a comprehensive network for cross-border\
  \ enforcement of judgments their courts. Additionally, the awards not limited to\
  \ damages. Whereas typically only monetary judgments by national courts are enforceable\
  \ in the cross-border context, it is theoretically possible (although unusual in\
  \ practice) to obtain an enforceable order for specific performance in an arbitration\
  \ proceeding under the New York Convention.\n\n\nArticle V of the New York Convention\
  \ provides an exhaustive list of grounds on which enforcement can be challenged.\
  \ These are generally narrowly construed to uphold the pro-enforcement bias of the\
  \ Convention.\n\n\nCertain international conventions exist in relation to the enforcement\
  \ of awards against states.\n\n\nThe arbitrators who determine the outcome of the\
  \ dispute are called the arbitral tribunal. The composition of the arbitral tribunal\
  \ can vary enormously, with either a sole arbitrator sitting, two or more arbitrators,\
  \ with or without a chairman or umpire, and various other combinations. In most\
  \ jurisdictions, an arbitrator enjoys immunity from liability for anything done\
  \ or omitted whilst acting as arbitrator unless the arbitrator acts in bad faith.\n\
  \n\nArbitrations are usually divided into two types: ad hoc arbitrations and administered\
  \ (or institutional) arbitrations.\n\n\nIn ad hoc arbitrations, the arbitral tribunals\
  \ are appointed by the parties or by an appointing authority chosen by the parties.\
  \ After the tribunal has been formed, the appointing authority will normally have\
  \ no other role and the arbitration will be managed by the tribunal.\n\n\nIn administered\
  \ arbitration, the arbitration is administered by a professional arbitration institution\
  \ providing arbitration services, such as the LCIA in London, or the ICC in Paris,\
  \ or the American Arbitration Association in the United States. Normally the arbitration\
  \ institution also will be the appointing authority. Arbitration institutions tend\
  \ to have their own rules and procedures, and may be more formal. They also tend\
  \ to be more expensive, and, for procedural reasons, slower.[54]\n\n\nThe duties\
  \ of a tribunal will be determined by a combination of the provisions of the arbitration\
  \ agreement and by the procedural laws which apply in the seat of the arbitration.\
  \ The extent to which the laws of the seat of the arbitration permit \"party autonomy\"\
  \ (the ability of the parties to set out their own procedures and regulations) determines\
  \ the interplay between the two.\n\n\nHowever, in almost all countries the tribunal\
  \ owes several non-derogable duties. These will normally be:\n\n\nThe definition\
  \ of Arbitral Award given in sec 2(1)(c) is clearly not exhaustive. It merely points\
  \ out that an Arbitral Award includes both a final award and an interim award. Although\
  \ arbitration awards are characteristically an award of damages against a party,\
  \ in a number of jurisdictions tribunals have a range of remedies that can form\
  \ a part of the award. These may include:\n\n\nGenerally speaking, by their nature,\
  \ arbitration proceedings tend not to be subject to appeal, in the ordinary sense\
  \ of the word. However, in most countries, the court maintains a supervisory role\
  \ to set aside awards in extreme cases, such as fraud[56] or in the case of some\
  \ serious legal irregularity on the part of the tribunal. Only domestic arbitral\
  \ awards are subject to set aside procedure.[citation needed]\n\n\nIn American arbitration\
  \ law there exists a small but significant body of case law which deals with the\
  \ power of the courts to intervene where the decision of an arbitrator is in fundamental\
  \ disaccord with the applicable principles of law or the contract.[57] However,\
  \ this body of case law has been called into question by recent decisions of the\
  \ Supreme Court.[58]\n\n\nUnfortunately, there is little agreement amongst the different\
  \ American judgments and textbooks as to whether such a separate doctrine exists\
  \ at all, or the circumstances in which it would apply. There does not appear to\
  \ be any recorded judicial decision in which it has been applied. However, conceptually,\
  \ to the extent it exists, the doctrine would be an important derogation from the\
  \ general principle that awards are not subject to review by the courts.\n\n\nThe\
  \ overall costs of arbitration can be estimated on the websites of international\
  \ arbitration institutions, such as that of the ICC,[59] the website of the SIAC[60]\
  \ and the website of the International Arbitration Attorney Network.[61] The overall\
  \ cost of administrative and arbitrator fees is, on average, less than 20% of the\
  \ total cost of international arbitration.[62]\n\n\nIn multiple legal systems –\
  \ both common law and civil law – it is normal practice for the courts to award\
  \ legal costs against a losing party, with the winner becoming entitled to recover\
  \ an approximation of what it spent in pursuing its claim (or in defense of a claim).\
  \ The United States is a notable exception to this rule, as except for certain extreme\
  \ cases, a prevailing party in a US legal proceeding does not become entitled to\
  \ recoup its legal fees from the losing party.[63]\n\n\nLike the courts, arbitral\
  \ tribunals generally have the same power to award costs in relation to the determination\
  \ of the dispute. In international arbitration as well as domestic arbitrations\
  \ governed by the laws of countries in which courts may award costs against a losing\
  \ party, the arbitral tribunal will also determine the portion of the arbitrators'\
  \ fees that the losing party is required to bear.\n\n\nAs methods of dispute resolution,\
  \ arbitration procedure can be varied to suit the needs of the parties. Certain\
  \ specific \"types\" of arbitration procedure have developed, particularly in North\
  \ America.\n\n\nSuch forms of \"Last Offer Arbitration\" can also be combined with\
  \ mediation to create MEDALOA hybrid processes (Mediation followed by Last Offer\
  \ Arbitration).[66]\n\n\nArbitration in its common law form developed in England;\
  \ in the Middle Ages, tribunals such as the courts of the boroughs, of the fair\
  \ and of the staple arose as the royal courts were not designed for trade disputes,\
  \ and trade with foreigners was otherwise unenforceable.[67] In the mid-16th century,\
  \ common law courts developed contract law and the Admiralty court became accessible\
  \ for disputes with foreign merchants, broadening the venues for trade disputes.[67]\
  \ Courts became suspicious of arbitration; for example, in Kill v. Hollister (1746),\
  \ an English court ruled that the arbitration agreement could 'oust' courts of law\
  \ and equity of jurisdiction.[68] Merchants, however, retained provisions to settle\
  \ disputes among themselves, but tension between the arbitration proceedings and\
  \ courts eventually resulted in the Common Law Procedure Act 1854 (17 & 18 Vict.\
  \ c. 125) which provided for the appointment of arbitrators and umpires, allowed\
  \ courts to 'stay proceedings' when a disputant filed a suit despite an agreement\
  \ to arbitrate, and provided a process for arbitrators to submit questions to a\
  \ court.[67] Later, the Arbitration Act 1889 (52 & 53 Vict. c. 49) was passed, followed\
  \ by other Arbitration Acts in 1950, 1975, 1979 and the Arbitration Act 1996 (c.\
  \ 23). The Arbitration Act 1979 (c. 42) in particular limited judicial review for\
  \ arbitration awards.[67]\n\n\nArbitration was common in the early United States,\
  \ with George Washington serving as an arbiter on an occasion.[67] The United States\
  \ had a notable difference from England, however, in that unlike England, its courts\
  \ generally did not enforce executory agreements (binding predispute agreements)\
  \ to arbitrate.[69] This meant that prior to an award, a claimant could sue in court\
  \ even if they had contractually agreed to settle disputes by arbitration. After\
  \ the award, courts reviewed the judgment, but generally deferred to the arbitration,[69]\
  \ although the practice was not consistent.[68]\n\n\nThe lack of enforcement of\
  \ predispute agreements led to the Federal Arbitration Act of 1925,[68][69] with\
  \ New York leading with a state law enforcing predispute agreements.[67] In 1921,\
  \ the American Bar Association drafted the Federal Arbitration Act based on the\
  \ New York law, which was passed in 1925 with minor changes.[67] In the next decade,\
  \ the American Arbitration Association promoted rules and facilitated arbitrations\
  \ through appointments.[67]\n\n\nIn the 21st century, arbitration has been frequently\
  \ given negative media coverage, especially during and after the Me Too movement\
  \ and the US Supreme Court case Epic Systems Corp. v. Lewis.[70][71] In response,\
  \ Democratic U.S. Representative Hank Johnson introduced the Forced Arbitration\
  \ Injustice Repeal Act (FAIR Act) into the 116th United States Congress, which was\
  \ cosponsored by Republican Representative Matt Gaetz and 220 other Democrats. The\
  \ FAIR Act passed the House in the 116th Congress but did not pass the Senate;[72]\
  \ Both Johnson and Democratic Senator Richard Blumenthal reintroduced the act in\
  \ the 117th United States Congress.[73][74] In addition, Americans have also increasingly\
  \ participated in \"mass arbitration\", a practice where consumers facing similar\
  \ issues normally barred from participating in a class action lawsuit file multiple\
  \ arbitration demands at once in an attempt to overwhelm a company's legal team.\
  \ This has resulted in Amazon removing arbitration provisions from its terms of\
  \ service,[75] and mass arbitration has additionally hit Chipotle Mexican Grill,\
  \ Uber, Lyft, Intuit, Facebook, and JPMorgan Chase.[76][77]\n"
