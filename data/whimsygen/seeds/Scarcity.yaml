content: 'In economics, scarcity refers to the basic fact of life that there exists
  only a finite amount of human and nonhuman resources which the best technical knowledge
  is capable of using to produce only limited maximum amounts of each economic good.[1]
  If the conditions of scarcity did not exist and an "infinite amount of every good
  could be produced or human wants fully satisfied ... there would be no economic
  goods, i.e. goods that are relatively scarce..."[1] Scarcity is the limited availability
  of a commodity, which may be in demand in the market or by the commons. Scarcity
  also includes an individual''s lack of resources to buy commodities.[2] The opposite
  of scarcity is abundance. Scarcity plays a key role in economic theory, and it is
  essential for a "proper definition of economics itself".[3]



  "The best example is perhaps Walras'' definition of social wealth, i.e., economic
  goods.[3] ''By social wealth'', says Walras, ''I mean all things, material or immaterial
  (it does not matter which in this context), that are scarce, that is to say, on
  the one hand, useful to us and, on the other hand, only available to us in limited
  quantity''."[4]


  — Guido Montani (1987)


  British economist Lionel Robbins is famous for his definition of economics which
  uses scarcity: "Economics is the science which studies human behaviour as a relationship
  between ends and scarce means which have alternative uses."[5] Economic theory views
  absolute and relative scarcity as distinct concepts and is "quick in emphasizing
  that it is relative scarcity that defines economics."[6] Current economic theory
  is derived in large part from the concept of relative scarcity which "states that
  goods are scarce because there are not enough resources to produce all the goods
  that people want to consume".[6]



  Economic scarcity as defined by Samuelson in Economics, a "canonical textbook" of
  mainstream economic thought[7] "refers to the basic fact of life that there exists
  only a finite amount of human and nonhuman resources which the best technical knowledge
  is capable of using to produce only limited maximum amounts of each economic good
  ... (outlined in the production possibility curve (PPC))."[1] If the conditions
  of scarcity did not exist and an "infinite amount of every good could be produced
  or human wants fully satisfied ... there would be no economic goods, i.e. goods
  that are relatively scarce..."[1]



  This economic scarcity is not solely due to resource limits, but a consequence of
  human activity or social provisioning.[8][9] There are two types of scarcity, relative
  and absolute scarcity.[8]



  Thomas Robert Malthus laid "the theoretical foundation of the conventional wisdom
  that has dominated the debate, both scientifically and ideologically,[8][10] on
  global hunger and famines for almost two centuries."[8] In his 1798 book An Essay
  on the Principle of Population, Malthus observed that an increase in a nation''s
  food production improved the well-being of the populace, but the improvement was
  temporary because it led to population growth, which in turn restored the original
  per capita production level. In other words, humans had a propensity to utilize
  abundance for population growth rather than for maintaining a high standard of living,
  a view that has become known as the "Malthusian trap" or the "Malthusian spectre".  Populations
  had a tendency to grow until the lower class suffered hardship, want and greater
  susceptibility to famine and disease, a view that is sometimes referred to as a
  Malthusian catastrophe. Malthus wrote in opposition to the popular view in 18th-century
  Europe that saw society as improving and in principle as perfectible.[11]


  Malthusianism is the idea that population growth is potentially exponential while
  the growth of the food supply or other resources is linear, which eventually reduces
  living standards to the point of triggering a population die off. It derives from
  the political and economic thought of Malthus, as laid out in his 1798 writings,
  An Essay on the Principle of Population. Malthus believed there were two types of
  ever-present "checks" that are continuously at work, limiting population growth
  based on food supply at any given time:[12]



