  or "requirements" and objects that provide direct satisfaction of these food needs
  or "available quantities".[8] These are absolute in nature and define economic concepts
  of scarcity, abundance, and sufficiency as follows:[8]



  Lionel Robbins was prominent member of the economics department at the London School
  of Economics. He is famous for the quote, "Humans want what they can''t have." Robbins
  is noted as a free market economist, and for his definition of economics. The definition
  appears in the Essay by Robbins as:



  Robbins found that four conditions were necessary to support this definition:[14]



  Therefore, the decision-maker must exercise choice, i.e., "economize." Robbins argues
  that the "disposition of the ... (stakeholder''s)... time and resources has a relationship
  to (their) system of wants."[14] The definition is not classificatory in "pick[ing]
  out certain kinds of behavior" but rather analytical in "focus[ing] attention on
  a particular aspect of behavior, the form imposed by the influence of scarcity."[15]



  These are relative in nature and define economic concepts of scarcity, abundance,
  and sufficiency as follows:[8]



  Economic theory views absolute and relative scarcity as distinct concepts and "...quick
  in emphasizing that it is relative scarcity that defines economics."[6] Relative
  scarcity is the starting point for economics.[8][17]



  Samuelson tied the notion of relative scarcity to that of economic goods when he
  observed that if the conditions of scarcity did not exist and an "infinite amount
  of every good could be produced or human wants fully satisfied ... there would be
  no economic goods, i.e. goods that are relatively scarce..."[1] The basic economic
  fact is that this "limitation of the total resources capable of producing different
  (goods) makes necessary a choice between relatively scarce commodities."[1]



  Scarcity refers to a gap between limited resources and theoretically limitless wants.[18]
  The notion of scarcity is that there is never enough (of something) to satisfy all
  conceivable human wants, even at advanced states of human technology.  Scarcity
  involves making a sacrifice—giving something up, or making a trade-off—in order
  to obtain more of the scarce resource that is wanted.[19]



  The condition of scarcity in the real world necessitates competition for scarce
  resources, and competition occurs "when people strive to meet the criteria that
  are being used to determine who gets what".[19]: p. 105   The price system, or market
  prices, are one way to allocate scarce resources.  "If a society coordinates economic
  plans on the basis of willingness to pay money, members of that society will [strive
  to compete] to make money"[19]: p. 105   If other criteria are used, we would expect
  to see competition in terms of those other criteria.[19]



  For example, although air is more important to us than gold, it is less scarce simply
  because the production cost of air is zero. Gold, on the other hand, has a high
  production cost. It has to be found and processed, both of which require a lot of
  resources. Additionally, scarcity implies that not all of society''s goals can be
  pursued at the same time; trade-offs are made of one goal against others. In an
  influential 1932 essay, Lionel Robbins defined economics as "the science which studies
  human behavior as a relationship between ends and scarce means which have alternative
  uses".[15] In cases of monopoly or monopsony an artificial scarcity can be created.  Scarcity
  can also occur through stockpiling, either as an attempt to corner the market  or
  for other reasons.  Temporary scarcity can be caused by (and cause) panic buying.



  A scarce good is a good that has more quantity demanded than quantity supplied at
  a price of $0. The term scarcity refers to the possible existence of conflict over
  the possession of a finite good.  One can say that, for any scarce good, someone''s
  ownership and control excludes someone else''s control.[20] Scarcity falls into
  three distinctive categories: demand-induced, supply-induced, and structural.[21]
  Demand-induced scarcity happens when the demand of the resource increases and the
  supply stays the same.[21] Supply-induced scarcity happens when a supply is very
  low in comparison to the demand.[21] This happens mostly due to environmental degradation
  like deforestation and drought. Lastly, structural scarcity occurs when part of
  a population does not have equal access to resources due to political conflicts
  or location.[21] This happens in Africa where desert countries do not have access
  to water. To get the water, they have to travel and make agreements with countries
  that have water resources. In some countries, political groups hold necessary resources
  hostage for concessions or money.[21] Supply-induced and structural scarcity demands
  for resources cause the most conflict for a country.[21]



  On the opposite side of the coin, there are nonscarce goods. These goods do not
  need to be valueless, and some can even be indispensable for one''s existence. As
  Frank Fetter explains in his Economic Principles:

  "Some things, even such as are indispensable to existence, may yet, because of their
  abundance, fail to be objects of desire and of choice. Such things are called free
  goods. They have no value in the sense in which the economist uses that term. Free
  goods are things which exist in superfluity; that is, in quantities sufficient not
  only to gratify but also to satisfy all the desires which may depend on them."

  As compared with the scarce goods, nonscarce goods are the ones where there can
  be no contest over its ownership. The fact that someone is using something does
  not prevent anyone else from using it. For a good to be considered nonscarce, it
  can either have an infinite existence, no sense of possession, or it can be infinitely
  replicated.[20]

