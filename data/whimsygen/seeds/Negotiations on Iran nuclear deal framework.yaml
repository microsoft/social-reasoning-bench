content: "\n\n\nThe Iran nuclear deal framework was a preliminary framework agreement\
  \ reached in 2015 between the Islamic Republic of Iran and a group of world powers:\
  \ the P5+1 (the permanent members of the United Nations Security Council—the United\
  \ States, the United Kingdom, Russia, France, and China—plus Germany) and the European\
  \ Union.\n\n\nBased on the April 2015 Iran nuclear deal framework, the Joint Comprehensive\
  \ Plan of Action between Iran and the P5+1 and EU was announced on July 14, 2015\
  \ in Vienna.[1]\n\n\nNegotiations for a framework deal over the nuclear program\
  \ of Iran took place between the foreign ministers of the countries at a series\
  \ of meetings held from March 26 to April 2, 2015 in Lausanne, Switzerland. On April\
  \ 2, the talks came to a conclusion and a press conference was held by Federica\
  \ Mogherini (High Representative of the Union for Foreign Affairs and Security Policy)\
  \ and Mohammad Javad Zarif (Minister of Foreign Affairs of Iran) to announce that\
  \ the eight parties had reached an agreement on a framework deal. The parties announced,\
  \ \"Today, we have taken a decisive step: we have reached solutions on key parameters\
  \ of a Joint Comprehensive Plan of Action,\" which they intended to complete by\
  \ June 30.[2][3][4][5] Announcing the framework, Foreign Minister Zarif stated:\
  \ \"No agreement has been reached so we do not have any obligation yet. Nobody has\
  \ obligations now other than obligations that we already undertook under the Joint\
  \ Plan of Action that we adopted in Geneva in November 2013.\"[6]\n\n\nThe framework\
  \ deal was embodied in a document published by the EU's European External Action\
  \ Service titled Joint Statement by EU High Representative Federica Mogherini and\
  \ Iranian Foreign Minister Javad Zarif Switzerland,[2] and in a document published\
  \ by the U.S. Department of State titled Parameters for a Joint Comprehensive Plan\
  \ of Action Regarding the Islamic Republic of Iran's Nuclear Program.[7]\n\n\nAccording\
  \ to the joint statement in Switzerland, the P5+1 countries and Iran agreed on a\
  \ framework for a deal. According to this framework, Iran would redesign, convert,\
  \ and reduce its nuclear facilities and accept the Additional Protocol (with provisional\
  \ application) in order to lift all nuclear-related economic sanctions, freeing\
  \ up tens of billions of dollars in oil revenue and frozen assets.[8] In addition\
  \ to the joint statement, the United States and Iran issued fact sheets of their\
  \ own.[9]\n\n\nThe joint statement outlines the following:[8]\n\n\nWhen the IAEA\
  \ verifies Iran's implementation of its key nuclear commitments:\n\n\nIn addition\
  \ to the final statement, both the United States and Iran have made public more\
  \ detailed descriptions of their agreement.  Officials of both sides acknowledge\
  \ that they have different narratives on this draft.[9]  The U.S. government has\
  \ published a fact sheet summarizing the main points of the deal.[11] Shortly after\
  \ it was published, top Iranian officials, including Supreme Leader Ali Khamenei\
  \ and Defense Minister Hossein Dehghan , have disputed the document on key points\
  \ which remain unresolved.[12][13][14]\n\n\nOn 22 July 2015, Abbas Araghchi, Iran's\
  \ deputy foreign minister who led the negotiations, made an announcement on state-controlled\
  \ television that the recently reached nuclear deal with the world powers did not\
  \ include limitations on Iran's weapons capabilities or missile power and that Tehran\
  \ would keep arming its regional allies. \"We have told them [the P5+1 world powers]\
  \ in the negotiations that we will supply arms to anyone and anywhere necessary\
  \ and will import weapons from anywhere we want and we have clarified this during\
  \ the negotiations,\" Araghchi said.[15]\n\n\nIn a speech the following Saturday,\
  \ Supreme Leader Khamenei added, \"Our policy will not change with regards to the\
  \ arrogant US government.\"[15]\n\n\nAccording to details of the deal published\
  \ by the US government, Iran's uranium stockpile will be reduced by 98% to 300 kg\
  \ (660 lbs) for 15 years. The level of enrichment must also remain at 3.67%. Iran\
  \ will retain no more than 6,104 out of almost 20,000 centrifuges it possesses.\
  \ There are two uranium enrichment facilities in Iran—Natanz and Fordo. Under the\
  \ Joint Comprehensive Plan of Action (JCPOA) agreed on 14 July, the Natanz facility\
  \ will be limited to installing no more than 5,060 of the oldest and least efficient\
  \ centrifuges for 10 years. At Fordo, no enrichment will be permitted for 15 years,\
  \ and the underground facility will be converted into a nuclear, physics and technology\
  \ centre. 1,044 centrifuges at the site will produce radioisotopes for use in medicine,\
  \ agriculture, industry and science.[16][5] This level of enrichment, 3.67%, would\
  \ be enough just for peaceful and civil use to power parts of country and therefore\
  \ is not sufficient for building a nuclear bomb.[17]\n\n\nAccording to press TV\
  \ report based on Joint Comprehensive Plan of Action (JCPOA), Iran's extra centrifuges\
  \ and the related infrastructure in the Natanz facility will be collected by the\
  \ International Atomic Energy Agency (IAEA) in order to be replaced by new machines\
  \ consistent with the allowed standards. Iran will be allowed to allocate the current\
  \ stockpile of enriched materials for the purpose of producing nuclear fuel or swapping\
  \ it with uranium in the international markets. These comprehensive solutions permit\
  \ Iran to continue its enrichment program inside its territory and also allowed\
  \ to continue its production of nuclear fuel for running its nuclear power plants.[citation\
  \ needed]\n\n\nAccording to the U.S. State Department fact sheet and a joint statement\
  \ by Iran and the EU, Iran has agreed to convert its underground Fordo facility\
  \ into a research centre for nuclear science and physics and about half of the Fordo\
  \ facility would be dedicated to advanced nuclear research and production of stable\
  \ radioisotopes which have important applications in medicine, agriculture, industry\
  \ and science.[5] Furthermore, Iran would maintain no more than 1,044 centrifuges\
  \ for this purpose.[citation needed]\n\n\nAccording to Press TV[unreliable source?],\
  \ the implementation of JCPOA followed by lifting of all the UN Security Council\
  \ sanctions as well as all economic and financial embargoes by the United States\
  \ and the European Union imposed on Iran's banks, insurance, investment, and all\
  \ other related services in different fields, including petrochemical, oil, gas\
  \ and automobile industries will be immediately lifted all at once.[citation needed]\
  \ However, according to the fact sheet which is published by the U.S. government,\
  \ U.S. and EU nuclear-related sanctions will be suspended after the IAEA has verified\
  \ the implementation of the key nuclear-related steps by Iran.[5]\n\n\nIran will\
  \ be required to provide the International Atomic Energy Agency access to all of\
  \ its declared facilities so that the agency can be assured of the peaceful nature\
  \ of the nuclear program.[17] According to details of the deal published by the\
  \ U.S. government, IAEA inspectors would have access to all of the nuclear facilities\
  \ including enrichment facilities, the supply chain that supports the nuclear program\
  \ and uranium mines as well as  continuous surveillance at uranium mills, centrifuge\
  \ rotors and bellows production and storage facilities. Iran will be required to\
  \ grant access to the IAEA to investigate suspicious sites or allegations of a covert\
  \ enrichment facility, conversion facility, centrifuge production facility, or yellowcake\
  \ production facility anywhere in the country. Iran will implement an agreed set\
  \ of measures to address the IAEA's concerns regarding the Possible Military Dimensions\
  \ (PMD) of its program.[5]\n\n\nAccording to the Iranian fact sheet, Iran will implement\
  \ the Additional Protocol temporarily and voluntarily in line with its confidence-building\
  \ measures and after that the protocol will be ratified in a time frame by the Iranian\
  \ government and parliament (Majlis).[citation needed]\n\n\n United Nations – Ban\
  \ Ki-moon, the Secretary-General of the United Nations, welcomed this agreement.[20]\
  \ \"A comprehensive, negotiated solution to the Iranian nuclear issue will contribute\
  \ to peace and stability in the region.\" he said.[21]\n\n\n – Yukiya Amano, the\
  \ Director-General of the International Atomic Energy Agency (IAEA), with the release\
  \ a manifest welcomed the compromise. \"The IAEA welcomes the announcement by E3+3\
  \ [the 5+1 group] and Iran on the key parameters for a joint Comprehensive Plan\
  \ of Action,\" Amano said in his manifest.[22]\n\n\n Germany – German Chancellor\
  \ Angela Merkel pointed out that the agreement reflected well on negotiating partners.[23]\n\
  \n\n Holy See – Pope Francis praised the deal in his Easter Urbi et Orbi blessing\
  \ message on Sunday, 5 April 2015, saying: \"... At the same time, in hope we entrust\
  \ to the merciful Lord the framework recently agreed to in Lausanne, that it may\
  \ be a definitive step toward a more secure and fraternal world. ...\"[24]\n\n\n\
  \ Iran – Iran's President Hassan Rouhani welcomed the development on Twitter.[25]\
  \ He said the nuclear agreement is just a step toward interaction with the world\
  \ and all those countries that want to respect the Iranian nation.[26] One week\
  \ after Lausanne negotiations, Iran's Supreme Leader, Ali Khamenei, explained his\
  \ idea about the negotiations. He neither accepted nor rejected the framework deal\
  \ and stated that: \"nothing has happened yet.\" About sanctions, he proclaimed\
  \ all sanctions must be completely lifted on the day when the nuclear deal is signed.[27][28][29]\n\
  \n\n Israel – Israeli Prime Minister Benjamin Netanyahu strongly opposed the framework\
  \ and claims that the current plan of action threatens the survival of Israel.[30][31][32][33]\
  \ He also wrote that \"Such a deal would not block Iran’s path to the bomb. It would\
  \ pave it.\"[34] Benjamin Netanyahu demanded that any final deal include a \"clear\
  \ and unambiguous Iranian recognition of Israel's right to exist,\" and that Iran\
  \ stop its aggression in the region.[34][35][36]\n\n\n Italy – Italian Foreign Minister\
  \ Paolo Gentiloni said that the agreement could have positive consequences and effects\
  \ both with Iran and also for developments in other crisis areas.[23]\n\n\n Oman –\
  \ Omani Minister Responsible for Foreign Affairs Yusuf bin Alawi bin Abdullah welcomed\
  \ the framework deal between the Group 5+1 framework deal with Iran on its nuclear\
  \ program, describing it \"an historic agreement\". He urged all sides to work out\
  \ a final agreement before the 30 June deadline.[37]\n\n\n Pakistan – The spokeswoman\
  \ of foreign ministry of Pakistan, hoped that the negotiations between Iran and\
  \ the six world powers would come to a favorable result.[38]\n\n\n Russia – Sergey\
  \ Lavrov Foreign Minister of Russia considered this agreement a positive development\
  \ in the security of the Middle East.[citation needed]\n\n\n Saudi Arabia –  the\
  \ Saudi Press Agency reported King Salman bin Abdulaziz Al Saud was cautious but\
  \ \"expressed his hope that reaching a final binding deal would strengthen the stability\
  \ and security of the region and the world.\"[39]\n\n\n South Korea – welcomed this\
  \ framework for a nuclear deal.[40]\n\n\n Turkey – Ministry of Foreign Affairs welcomed\
  \ the nuclear deal and stated that Turkey had actively supported the processes for\
  \ a peaceful solution through dialogue and had contributed to them through finalising\
  \ of the Tehran Joint Declaration in 2010.[41]\n\n\n United Kingdom – Foreign Secretary\
  \ Philip Hammond said that the framework agreement with Iran was well beyond what\
  \ many thought possible even 18 months earlier.[42]\n\n\n United States – President\
  \ Barack Obama said a \"historic understanding\" had been reached with Iran,[6]\
  \ and pointed out that the deal with Iran is a good deal if the deal could meet\
  \ core objectives of the United States.[43] 150 Democratic House members signaled\
  \ that they supported reaching a deal, enough to sustain a Presidential Veto. A\
  \ majority of Congress including all Republicans and some Democrats opposed the\
  \ deal.[44]\n\n\nPDKI – In September 2016, PDKI released a statement that their\
  \ return to militancy was motivated by Iran's nuclear deal.[45]\n"
