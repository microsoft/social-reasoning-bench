content: 'Strategic thinking is a mental or thinking process applied by individuals
  and within organizations in the context of achieving a goal or set of goals.



  When applied in an organizational strategic management process, strategic thinking
  involves the generation and application of unique business insights and opportunities
  intended to create competitive advantage for a firm or organization.[1][2][3] It
  can be done individually, as well as collaboratively among key people who can positively
  alter an organization''s future. Group strategic thinking may create more value
  by enabling a proactive and creative dialogue, where individuals gain other people''s
  perspectives on critical and complex issues. This is regarded as a benefit in highly
  competitive and fast-changing business landscapes.[4][5][6]



  There is a generally accepted definition for strategic thinking, a common agreement
  as to its role or importance, and a standardised list of key competencies of strategic
  thinkers.[7] There is also a consensus on whether strategic thinking is an uncommon
  ideal or a common and observable property of strategy. It includes finding and developing
  a strategic foresight capacity for an organization, by exploring all possible organizational
  futures, and challenging conventional thinking to foster decision making today.[8][9]
  Research on strategic thought indicates that the critical strategic question is
  not the conventional "What?",[10] but "Why?" or "How?".[10] The work of Henry Mintzberg[11][12]
  and other authors,[13][14][15] further support the conclusion; and also draw a clear
  distinction between strategic thinking and strategic planning, another important
  strategic management thought process.[6][16]



  General Andre Beaufre wrote in 1963 that strategic thinking "is a mental process,
  at once abstract and rational, which must be capable of synthesizing both psychological
  and material data.  The strategist must have a great capacity for both analysis
  and synthesis; analysis is necessary to assemble the data on which he makes his
  diagnosis, synthesis in order to produce from these data the diagnosis itself—and
  the diagnosis in fact amounts to a choice between alternative courses of action."[17]



  Most agree that traditional models of strategy making, which are primarily based
  on strategic planning, are not working.[18][19][20] Strategy in today''s competitive
  business landscape is moving away from the basic ''strategic planning'' to more
  of ''strategic thinking'' in order to remain competitive.[21] However, both thought
  processes must work hand-in-hand in order to reap maximum benefit.[6] It has been
  argued that the real heart of strategy is the ''strategist''; and for a better strategy
  execution requires a strategic thinker who can discover novel, imaginative strategies
  which can re-write the rules of the competitive game; and set in motion the chain
  of events that will shape and "define the future".[22][23]



  In the view of Fiona Graetz, strategic thinking and planning are "distinct, but
  interrelated and complementary thought processes" that must sustain and support
  one another for effective strategic management. Graetz''s model holds that the role
  of strategic thinking is "to seek innovation and imagine new and very different
  futures that may lead the company to redefine its core strategies and even its industry".
  Strategic planning''s role is "to realise and to support strategies developed through
  the strategic thinking process and to integrate these back into the business".[14]



  Henry Mintzberg wrote in 1994 that strategic thinking is more about synthesis (i.e.,
  "connecting the dots") than analysis (i.e., "finding the dots"). It is about "capturing
  what the manager learns from all sources (both the soft insights from their personal
  experiences and the experiences of others throughout the organization and the hard
  data from market research and the like) and then synthesizing that learning into
  a vision of the direction that the business should pursue." Mintzberg argued that
  strategic thinking cannot be systematized and is the critical part of strategy formation,
  as opposed to strategic planning exercises. In his view, strategic planning happens
  around the strategy formation or strategic thinking activity, by providing inputs
  for the strategist to consider and providing plans for controlling the implementation
  of the strategy after it is formed.[24]



  According to Jeanne Liedtka, strategic thinking differs from strategic planning
  along the following dimensions of strategic management:[15]



  In a complex scenario, organizational actions are intensified by a global network
  of interactions, leading to diverse environmental, economic, and social challenges.[25][26][27][28]
  This complexity is characterized by intricate networks and recursive cause-and-effect
  relationships, diverging from the linear logic of Cartesian thought and the punctual
  logic of dialectical thought. Within such systems, seemingly trivial actions can
  produce unexpected outcomes or be magnified by intricate relationship networks,
  resulting in entirely unpredictable consequences.[27][28][29]



  To address this context, Terra and Passador[27] advocate for strategic thinking
  capable of: (1) reconnecting phenomena across different levels and disciplines and
  treating them holistically; (2) addressing objects of study subjected to recursive
  causality; (3) understanding facts through their dynamics; (4) approaching problems
  through mappings and negative approaches; (5) integrating non-empirical elements;
  and (6) incorporating a new mathematical rationale to navigate the non-linearity
  of such systems and the continuous transition between certainty and uncertainty
  inherent in their dynamics.



  In the realm of academic research, Stacey [26] suggests that this reality demands
  studies in the field of strategic thinking to focus on explanation, hypotheses about
  whole systems, their dynamics, and the relationship between dynamic behavior and
  innovative success. In this type of study, methods such as scheme construction,
  phenomenological approaches based on deductions and metaphors [30][27] and integrative
  frameworks [31][32] have been employed to understand the dynamics of various organizational
  problems by assimilating concepts common to several fields of science.[27] In the
  field of studies on strategic thinking, several authors have developed multidisciplinary
  approaches based on these premises, utilizing systems thinking and cybernetics,[28][33]
  integrative approaches,[31] new mathematics of chaos,[28][29][34] and concepts such
  as order through noise, autopoiesis, and self-organization.[28][34]



  Liedtka observed five "major attributes of strategic thinking in practice" that
  resemble competencies:[15][35]



  The main focus of strategic thinking is on long-term opportunities to achieve a
  purpose, goal, or set of goals, the broad view of opportunities includes taking
  a look at the entirety of a concept instead of merely focusing on individual details
  and seeing beyond the details to focus on the larger vision or organizational goals
  to produce long-term successes.[37][38][39]



