content: 'In economics, a luxury good (or upmarket good) is a product or item or service  for
  which demand increases more than what is proportional as income rises, so that expenditures
  on the good become a more significant proportion of overall spending. Luxury goods
  are in contrast to necessity goods, where demand increases proportionally less than
  income.[1] Whereas people consume necessity goods to meet basic survival needs,
  luxury goods are consumed both for their "intrinsic quality and to signal their
  wealth and confirm social status."[2] In economics, luxury goods is often used synonymously
  with superior goods.



  The word "luxury" comes from the Latin term "luxuria", which meant "excess, extravagant
  living, profusion; delicacy." The meaning gained different implications as the word
  became part of Old French as "luxurie" in the 12th century, taking on the sense
  of "debauchery, dissoluteness, [or] lust."[3]



  The word "luxury" has an etymological cognate in the Latin verb luctor meaning "to
  overextend" or "to strain".[4]

  From this, the noun luxuria and the verb luxurio developed, "indicating immoderate
  growth, swelling, ... in persons and animals, willful or unruly behavior, disregard
  for moral restraints, and licentiousness", and the term has had negative connotations
  for most of its long history.[5] One definition in the OED is a "thing desirable
  but not indispensable".[6] As the word became part of the English language it "lost
  its pejorative taint"; by the 1630s, the English word meant "habit of indulgence
  in what is choice or costly" and by 1704 it meant "sumptuous surroundings." By 1780,
  the word was defined as "something choice or comfortable beyond life''s necessities."[7]



  Economists can identify a luxury good by comparing the demand for the good at one
  point in time against the demand for the good at a different time, at a different
  income level. When personal income increases, demand for luxury goods increases
  even more than income does. Conversely, when personal income decreases, demand for
  luxury goods drops even more than income does.[8] For example, if income rises 1%,
  and the demand for a product rises 2%, then the product is a luxury good. This contrasts
  with necessity goods, or basic goods, for which demand stays the same or decreases
  only slightly as income decreases.[8]



  With increasing accessibility to luxury goods,[9] new product categories[which?]
  have been created within the luxury market, called "accessible luxury" or "mass
  luxury". These are meant specifically for the middle class, sometimes called the
  "aspiring class" in this context. Because luxury has diffused into the masses, defining
  the word has become more difficult.[10]



  Whereas "luxury" often refers to certain types of products, luxury is not restricted
  to physical goods; services can also be luxury. Likewise, from the consumer perspective,
  luxury is an experience defined as "hedonic escapism".[11]



  In economics, "superior goods" is the gradable antonym of "inferior good". If the
  quantity of an item demanded increases with income, but not by enough to increase
  the share of the budget spent on it, then it is only a normal good and is not a
  superior good. Consumption of all normal goods increases as income increases. For
  example, if income increases by 50%, then consumption will increase (maybe by only
  1%, maybe by 40%, maybe by 70%). A superior good is a normal good for which the
  proportional consumption increase exceeds the proportional income increase. So,
  if income increases by 50%, then consumption of a superior good will increase by
  more than 50% (maybe 51%, maybe 70%).



  In economics terminology, all goods with an income elasticity of demand greater
  than zero are "normal", but only the subset having income elasticity of demand >
  1 are "superior".[12]



  Some articles in the microeconomics discipline use the term superior good as an
  alternative to an inferior good, thus making "superior goods" and "normal goods"
  synonymous. Where this is done, a product making up an increasing share of spending
  under income increases is often called an ultra-superior good.[citation needed]



  Though often verging on the meaningless in modern marketing, "luxury" remains a
  legitimate and current technical term in art history for objects which are especially
  highly decorated to very high standards and which use expensive materials. Luxuries
  like this can play a role in developing trade-relations with colonies.[13]



  The term is especially used for medieval manuscripts to distinguish between practical
  working books (for normal use) and fully illuminated manuscripts, that were often
  bound in treasure bindings with metalwork and jewels. These are often much larger,
  with less text on each page and many illustrations, and (if liturgical texts) were
  originally usually kept on the altar or in the sacristy rather than in any library
  that the church or monastery who owned them may have had. Secular luxury manuscripts
  were commissioned by the very wealthy and differed in the same ways from cheaper
  books.[14]



  "Luxury" and "luxury arts" may be used for other applied arts where both utilitarian
  and luxury versions of the same types of objects were made. This might cover metalwork,
  ceramics, glass, arms and armor, and various objects.[15] It is much less used for
  objects from the fine arts, with no function beyond being an artwork: paintings,
  drawings, and sculpture, even though the disparity in cost between an expensive
  and cheap work may have been as large.[16]



  An awareness of a concept of luxury dates back at least as far as Plato.[17] The
  issue of luxury was also considered by John Locke, Adam Smith, Karl Marx, George
  Simmel, and Max Weber.



  Luxury goods have high income elasticity of demand: as people become wealthier,
  they will buy proportionately more luxury goods. This also means that should there
  be a decline in income, its demand will drop more than proportionately. The income
  elasticity of demand is not constant with respect to income and may change signs
  at different income levels. That is to say, a luxury good may become a necessity
  good or even an inferior good at different income levels.



  Some luxury products have been claimed to be examples of Veblen goods, with a positive
  price elasticity of demand: for example, making a perfume more expensive can increase
  its perceived value as a luxury good to such an extent that sales can go up, rather
  than down. However, Veblen goods are not synonymous with luxury goods.



  Although the technical term luxury good is independent of the goods'' quality, they
  are generally considered to be goods at the highest end of the market in terms of
  quality and price. Many markets have a luxury segment including, for example, luxury
  versions of automobiles, yachts, wine, bottled water, coffee, tea, foods, watches,
  clothes, jewelry, cosmetics and high fidelity sound equipment.[18] Luxuries may
  be services. Hiring full-time or live-in domestic servants is a luxury reflecting
  income disparities. Some financial services, especially in some brokerage houses,
  can be considered luxury services by default because persons in lower-income brackets
  generally do not use them.



  Luxury goods often have special luxury packaging to differentiate the products from
  mainstream competitors.



  Originally, luxury goods were available only to the very wealthy and "aristocratic
  world of old money" that offered them a history of tradition, superior quality,
  and a pampered buying experience.[19] Luxury goods have been transformed by a shift
  from custom-made (bespoke) works with exclusive distribution practices by specialized,
  quality-minded family-run and small businesses to a mass production of specialty
  branded goods by profit-focused large corporations and marketers.[19] The trend
  in modern luxury is simply a product or service that is marketed, packaged, and
  sold by global corporations that are focused "on growth, visibility, brand awareness,
  advertising, and, above all, profits."[19] Increasingly, luxury logos are now available
  to all consumers at a premium price across the world, including online.[20]



  Global consumer companies, such as Procter & Gamble, are also attracted to the industry
  due to the difficulty of making a profit in the mass consumer goods market.[21]
  The customer base for various luxury goods continue to be more culturally diversified,
  and this presents more unseen challenges and new opportunities to companies in this
  industry.[22]



  There are several trends in luxury:[23]



  The luxury goods market has been on an upward climb for many years. Apart from the
  setback caused by the 1997 Asian financial crisis, the industry has performed well,
  particularly in 2000. That year, the world luxury goods market was worth nearly
  $170 billion and grew 7.9 percent.[30] The United States has been the largest regional
  market for luxury goods. The largest sector in this category was luxury drinks,
  including premium whisky, champagne, and cognac.[citation needed] The watches and
  jewelry section showed the strongest performance, growing in value by 23.3 percent,
  while the clothing and accessories section grew 11.6 percent between 1996 and 2000,
  to $32.8 billion. The largest ten markets for luxury goods account for 83 percent
  of overall sales and include Brazil, China, France, Germany, Italy, Japan, Russia,
  Spain, Switzerland and United Kingdom, and United States.[citation needed]



  In 2012, China surpassed Japan as the world''s largest luxury market.[31] China''s
  luxury consumption accounts for over 25% of the global market.[32] According to
  the Global Wealth and Lifestyle Report 2020, Hong Kong, Shanghai, Tokyo and Singapore
  were four of the five most expensive cities for luxury goods in Asia.[33] In 2014,
  the luxury sector was expected to grow over the following ten years because of 440
  million consumers spending a total of 880 billion euros, or $1.2 trillion.[34]



  The advertising expenditure for the average luxury brand is 5-15% of sales revenue,
  or about 25% with the inclusion of other communications such as public relations,
  events, and sponsorships.[35]



  A rather small group in comparison, the wealthy tend to be extremely influential.[36]
  Once a brand gets an "endorsement" from members of this group, then the brand can
  be defined as a true "luxury" brand. An example of different product lines in the
  same brand is found in the automotive industry, with "entry-level" cars marketed
  to younger, less wealthy consumers, and higher-cost models for older and more wealthy
  consumers.[37]



  In economics, superior goods or luxury goods make up a larger proportion of consumption
  as income rises, and therefore are a type of normal goods in consumer theory. Such
  a good must possess two economic characteristics: it must be scarce, and, along
  with that, it must have a high price.[38] The scarcity of the good can be natural
  or artificial; however, the general population (i.e., consumers) must recognize
  the good as distinguishably better. Possession of such a good usually signifies
  "superiority" in resources and is usually accompanied by prestige.



  A Veblen good is a superior good with a prestige value so high that a price decline
  might lower demand. Veblen''s contribution is demonstrated by the significance of
  the Veblen effect, which refers to the phenomenon of people purchasing costly items
  even when more affordable options that provide similar levels of satisfaction are
  available.[39]



  The income elasticity of a superior good is above one by definition because it raises
  the expenditure share as income rises. A superior good may also be a luxury good
  that is not purchased below a certain income level. Examples would include smoked
  salmon, caviar,[38] and most other delicacies. On the other hand, superior goods
  may have a wide quality distribution, such as wine and holidays. However, though
  the number of such goods consumed may stay constant even with rising wealth, the
  level of spending will go up to secure a better experience.



  A higher income inequality leads to higher consumption of luxury goods because of
  status anxiety.[40][41]



  Several manufactured products attain the status of "luxury goods" due to their design,
  quality, durability, or performance, which are superior to comparable substitutes.[42]



  Some goods are perceived as luxurious by the public simply because they play the
  role of status symbols, as such goods tend to signify the purchasing power of those
  who acquire them.[citation needed] These items, while not necessarily being better
  (in quality, performance, or appearance) than their less expensive substitutes,
  are purchased with the main purpose of displaying wealth or income of their owners.[citation
  needed] These kinds of goods are the objects of a socio-economic phenomenon called
  conspicuous consumption and commonly include luxury apartments, luxury cars, watches,
  jewelry, designer clothing, yachts, private jets, corporate helicopters as well
  as large residences, urban mansions, and country houses.[citation needed]



  The idea of a luxury brand is not necessarily a product or a price point, but a
  mindset where core values that are expressed by a brand are directly connected to
  the producer''s dedication and alignment to perceptions of quality with its customers''
  values and aspirations.[43] Thus, it is these target customers, not the product,
  that make a luxury brand.[43] Brands considered luxury connect with their customers
  by communicating that they are at the top of their class or considered the best
  in their field.[44] Furthermore, these brands must deliver – in some meaningful
  way – measurably better performance.[44]



  What consumers perceive as luxurious brands and products change over the years,
  but there appear to be three main drivers: (1) a high price, especially when compared
  to other brands within its segment; (2) limited supply, in that a brand may not
  need to be expensive, but it arguably should not be easily obtainable and contributing
  to the customers'' feeling that they have something special; and (3) endorsement
  by celebrities, which can make a brand or particular products more appealing for
  consumers and thus more "luxurious" in their minds.[45] Two additional elements
  of luxury brands include special packaging and personalization.[45] These differentiating
  elements distance the brands from the mass market and thus provide them with a unique
  feeling and user experience as well as a special and memorable "luxury feel" for
  customers.[45]



  Examples include LVMH, the largest luxury goods producer in the world with over
  fifty brands (including Louis Vuitton)[46] and sales of €42.6 billion in 2017,[47]
  Kering, which made €15.9 billion in revenue for a net income of €2.3 billion in
  2019,[48] and Richemont.



  The luxury brand concept is now so popular that it is used in almost every retail,
  manufacturing, and service sector.[49] New marketing concepts such as "mass-luxury"
  or "hyper luxury" further blur the definition of what is a luxury product, a luxury
  brand, or a luxury company.[49] Lately, luxury brands have extended their reach
  to young consumers through unconventional luxury brand collaborations in which luxury
  brands partner with non-luxury brands seemingly at the opposite spectrum of design,
  image, and value.[27] For example, luxury fashion houses partner with streetwear
  brands and video games.[50]



  The sale of luxury goods requires a high level of client service,  human touch,
  and brand consistency. Since the early 2010s, many luxury brands have invested in
  their own boutiques rather than wholesalers like department stores. Three of the
  world''s biggest luxury conglomerates— LVMH, Kering, and Richemont — significantly
  increased the share of annual sales captured from their directly operated stores
  and e-commerce over the past decade.[51][52]



  Luxury brands use distinct boutique types to tailor the experiences of different
  client groups.



  Flagship boutiques are grand, multi-story boutiques in major cities that are merchandised
  with a wide range of collections and staffed by a large team of sales associates.
  They also offer supplemental services, like jewelry cleaning, hot stamping, on-site
  service.[53]



  Many luxury brands use flagship boutiques to illustrate their unique vision or heritage,[54]
  often through distinctive architecture[55] that transforms them from storefronts
  to tourist attractions.[56]



  Large cities often have secondary boutiques in addition to their flagship boutique.
  Multiple boutiques allow luxury brands to cater to different types of clients, which
  can differ even within small geographic areas. Secondary boutiques often offer different
  merchandise than flagship boutiques, and establish different types of relationships
  with clients.[57]



  Luxury boutiques in smaller cities are often secondary boutiques as well.[53] The
  rising popularity of secondary and tertiary cities around the world has pushed luxury
  brands to open secondary boutiques in smaller cities than those that can support
  a flagship boutique.[58]



  Luxury brands use seasonal boutiques to follow their well-off clientele as they
  leave major cities for smaller resort towns in the summer and winter.[59] Common
  throughout Europe, seasonal boutiques have short-term leases, like a "pop-up" shop,
  which are open only during the resort''s high season.[53] These boutiques offer
  merchandise relevant to the resort where they are located, like a cruise collection
  in a beach resort[60] or skiwear in a mountain resort.[61]



  Department stores that sell major luxury brands have opened up in most major cities
  worldwide. Le Bon Marché in Paris, France is credited as one of the first of its
  kind.



  Since the development of mass-market "luxury" brands in the 1800s, items from the
  mass-market have been converted to be sold in the luxury market. Many innovative
  technologies are being added to mass-market products and then transformed into luxury
  items to be placed in department stores.[62]



  In the United States, the development of luxury-oriented department stores not only
  changed the retail industry, but also ushered the idea of freedom through consumerism,
  and a new opportunity for middle- and upper-class women.[63]



  Fashion brands within the luxury goods market tend to be concentrated in affluent
  districts of major cities worldwide. These include:




