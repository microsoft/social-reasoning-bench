content: "The non-aggression principle[a] (NAP) is a concept in which \"aggression\"\
  \ – defined as initiating or threatening any forceful interference with an individual,\
  \ their property[b] or their agreements (contracts) – is illegitimate and should\
  \ be prohibited.[1][2] Interpretations of the NAP vary, particularly concerning\
  \ issues like intellectual property, force, and abortion. \n\n\nLike the Golden\
  \ Rule, the Non-Aggression Principle follows an ethics of reciprocity, in the sense\
  \ that whether a person's action is permissible, depends upon the preceding actions\
  \ of others.\n\n\nThe non-aggression principle is considered by some to be a, or\
  \ even the, defining principle of libertarianism. It is a common principle among\
  \ libertarians of both minarchist and anarchist beliefs.[3][4][5][6][7][non-primary\
  \ source needed]\n\n\nThe non-aggression principle has existed in various forms.\
  \ A number of authors have created their own formulation of the harm principle which\
  \ NAP supporters argue as a form of non-aggression principle as shown in the table\
  \ below.\n\n\nThe principle has been derived through various philosophical approaches,\
  \ including:\n\n\nPropertarians/Right-libertarians who are pro-life and pro-choice\
  \ both justify their position on NAP grounds. One question to determine whether\
  \ or not abortion is consistent with the NAP is at what stage of development a fertilized\
  \ human egg cell can be considered a human being with the status and rights attributed\
  \ to personhood. Some supporters of the NAP argue this occurs at the moment of conception\
  \ while others argue that since the fetus lacks sentience until a certain stage\
  \ of development, it does not qualify as a human being and may be considered property\
  \ of the mother. On the other hand, opponents of abortion state that sentience is\
  \ not a qualifying factor. They refer to the animal rights discussion and point\
  \ out the argument from marginal cases that concludes the NAP also applies to non-sentient\
  \ (i.e. mentally handicapped) humans.[25]\n\n\nAnother question is whether an unwelcome\
  \ fetus should be considered to be an unauthorized trespasser in its mother's body.[26]\
  \ The non-aggression principle does not protect trespassers from the owners of the\
  \ property on which they are trespassing.[27]\n\n\nObjectivist philosopher Leonard\
  \ Peikoff has argued that a fetus has no right to life inside the womb because it\
  \ is not an \"independently existing, biologically formed organism, let alone a\
  \ person\".[28] Pro-choice propertarian/right-libertarian Murray Rothbard held the\
  \ same stance, maintaining that abortion is justified at any time during pregnancy\
  \ if the fetus is no longer welcome inside its mother.[29] Similarly, other pro-choice\
  \ supporters base their argument on criminal trespass.[30] In that case, they claim\
  \ that the NAP is not violated when the fetus is forcibly removed, with deadly force\
  \ if need be, from the mother's body, just as the NAP is not violated when an owner\
  \ removes from the owner's property an unwanted visitor who is not willing to leave\
  \ voluntarily. Libertarian theorist Walter Block follows this line of argument with\
  \ his theory of evictionism, but he makes a distinction between evicting the fetus\
  \ prematurely so that it dies and actively killing it. On the other hand, the theory\
  \ of departurism[31] permits only the non-lethal eviction of the trespassing fetus\
  \ during a normal pregnancy.[32]\n\n\nPro-life libertarians such as Libertarians\
  \ for Life argue that because the parents were actively involved in creating a new\
  \ human life and that life has not consented to their own existence, that life is\
  \ in the womb by necessity and no parasitism or trespassing in the form of legal\
  \ necessity is involved. They state that as the parents are responsible for that\
  \ life's position, the NAP would be violated when that life is killed with abortive\
  \ techniques.[33]\n\n\nThe NAP is applicable to any unauthorized actions towards\
  \ a person's physical property. Supporters of the NAP disagree on whether it should\
  \ apply to intellectual property rights as well as physical property rights.[34]\
  \ Some argue that because intellectual concepts are non-rivalrous, intellectual\
  \ property rights are unnecessary[35] while others argue that intellectual property\
  \ rights are as valid and important as physical ones.[36]\n\n\nAlthough the NAP\
  \ is meant to guarantee an individual's sovereignty, propertarians/right-libertarians\
  \ greatly differ on the conditions under which the NAP applies. Especially unsolicited\
  \ intervention by others, either to prevent society from being harmed by the individual's\
  \ actions or to prevent an incompetent individual from being harmed by his own actions\
  \ or inactions, is an important issue.[to whom?][37] The debate centers on topics\
  \ such as the age of consent for children,[38][39][40] intervention counseling (i.e.\
  \ for addicted persons, or in case of domestic violence),[41][42] involuntary commitment\
  \ and involuntary treatment with regards to mental illness,[43] medical assistance\
  \ (i.e. prolonged life support vs euthanasia in general and for the senile or comatose\
  \ in particular),[44][45] human organ trade,[46][47][48] state paternalism (including\
  \ economic interventionism)[49][50][51] and foreign intervention by states.[52][53]\
  \ Other discussion topics on whether intervention is in line with the NAP include\
  \ nuclear weapons proliferation,[54][55] human trafficking and immigration.[56][57][58]\n\
  \n\nObjectivist author Ronald Merill criticizes the anarcho-capitalist view of force.\
  \ He states that the use of force is subjective, saying: \"There's no objective\
  \ basis for controlling the use of force. Your belief that you're using force to\
  \ protect yourself is just an opinion; what if it is my opinion that you are violating\
  \ my rights?\"[59]\n\n\nProminent propertarian/right-libertarian thinkers such as\
  \ Murray Rothbard considered pollution an act of aggression, mostly focusing on\
  \ air pollution, though in absolute terms light pollution, sound, and anything that\
  \ crosses a boundary into someone's property or person can constitute aggression.\
  \ In order to avoid having mere existence violate the non-aggression principle,\
  \ Rothbard, Nozick, and others proposed less strict positions. Nozick suggested\
  \ that boundary-crossing is permissible up to a certain range as long as it is socially\
  \ beneficial and compensation is paid for it. Rothbard suggested that a causal connection\
  \ of objective harm needs to be demonstrated beyond reasonable doubt before prohibiting\
  \ pollution. These approaches appear to contradict the non-aggression principle\
  \ by enabling a permissible amount of harm.[2]\n\n\nSome propertarians/right-libertarians\
  \ justify the existence of a minimal state on the grounds that anarcho-capitalism\
  \ implies that the non-aggression principle is optional because the enforcement\
  \ of laws is open to competition.[60]\n\n\nAnarcho-capitalists usually respond to\
  \ this argument that this presumed outcome of what they call \"coercive competition\"\
  \ (e.g., private military companies or private defense agencies that enforce local\
  \ law) is not likely because of the very high cost, in lives and economically, of\
  \ war. They claim that war drains those involved and leaves non-combatant parties\
  \ as the most powerful, economically and militarily, ready to take over.[61][62][63]\
  \ Therefore, anarcho-capitalists claim that in practice, and in more advanced societies\
  \ with large institutions that have a responsibility to protect their vested interests,\
  \ disputes are most likely to be settled peacefully.[64][65] Anarcho-capitalists\
  \ also point out that a state monopoly of law enforcement does not necessarily make\
  \ NAP present throughout society as corruption and corporatism, as well as lobby\
  \ group clientelism in democracies, favor only certain people or organizations.\
  \ Anarcho-capitalists aligned with the Rothbardian philosophy generally contend\
  \ that the state violates the non-aggression principle by its very nature because,\
  \ it is argued, governments necessarily use force against those who have not stolen\
  \ private property, vandalized private property, assaulted anyone, or committed\
  \ fraud.[64][66][67]\n\n\nSome proponents of the NAP see taxes as a violation of\
  \ the NAP, while critics of the NAP argue that because of the free-rider problem\
  \ in case security is a public good, enough funds would not be obtainable by voluntary\
  \ means to protect individuals from aggression of a greater severity. Geolibertarians,\
  \ who following the classical economists and Georgists adhere to the Lockean labor\
  \ theory of property, argue that private ownership of land violates the NAP, and\
  \ therefore land value taxation is fully compatible with the NAP.\n\n\nAnarcho-capitalists\
  \ argue that the protection of individuals against aggression is self-sustaining\
  \ like any other valuable service, and that it can be supplied without coercion\
  \ by the free market much more effectively and efficiently than by a government\
  \ monopoly.[68] Their approach, based on proportionality in justice and damage compensation,\
  \ argues that full restitution is compatible with both retributivism and a utilitarian\
  \ degree of deterrence while consistently maintaining NAP in a society.[62][69][70]\
  \ They extend their argument to all public goods and services traditionally funded\
  \ through taxation, like security offered by dikes.[71]\n\n\nSupporters of the NAP\
  \ often appeal to it in order to argue for the immorality of theft, vandalism, sexual\
  \ assault, assault, and fraud. Compared to nonviolence, the non-aggression principle\
  \ does not preclude violence used in self-defense or defense of others.[72] Many\
  \ supporters argue that NAP opposes such policies as victimless crime laws, taxation,\
  \ and military drafts. The NAP is the foundation of propertarian/right-libertarian\
  \ philosophy.[22]\n\n\nThe NAP faces two kinds of criticism: the first holds that\
  \ the principle is immoral, and the second argues that it is impossible to apply\
  \ consistently in practice; respectively, consequentialist or deontological criticisms,\
  \ and inconsistency criticisms. Propertarian/Right-libertarian academic philosophers\
  \ have noted the implausible results consistently applying the principle yields:\
  \ for example, Professor Matt Zwolinski notes that, because pollution necessarily\
  \ violates the NAP by encroaching (even if slightly) on other people's property,\
  \ consistently applying the NAP would prohibit driving, starting a fire, and other\
  \ activities necessary to the maintenance of industrial society.[73][2]\n\n\nThe\
  \ NAP also faces definitional issues regarding what is understood as forceful interference\
  \ and property, and under which conditions it applies.[74][75][76][77][78][79][80]\
  \ The NAP has been criticized as circular reasoning and a rhetorical obfuscation\
  \ of the coercive nature of propertarian/right-libertarian property law enforcement\
  \ because the principle redefines aggression in their own terms.[81]\n\n\nPhilosopher\
  \ Jason Brennan has written a critique citing Walter Block's definition of the non-aggression\
  \ principle, arguing that the words alone do not seem to provide libertarians with\
  \ a clear argument for freedom:[82]\n\n\n The difference between libertarians and\
  \ non-libertarians is not about whether aggression is permissible. Instead, it’s\
  \ about what counts as aggression, or about just who has a right to what. \n\nBrennan\
  \ argued that the non-aggression principle is a simple moral slogan and therefore\
  \ difficult to persuade people. He pointed out that this principle can be interpreted\
  \ in various ways depending on how the concepts of ownership and rights implied\
  \ in it are defined,[83] and that it is actually used in various ways among people\
  \ in reality. Therefore, he argued that it is difficult to function as a clear guideline\
  \ or implementation strategy for realizing an ideal liberty society.[82]\n\n\nCritics\
  \ argue that the non-aggression principle is not ethical because it opposes the\
  \ initiation of force even when they would consider the results of such initiation\
  \ to be morally superior to the alternatives that they have identified. In arguing\
  \ against the NAP, philosopher Matt Zwolinski has proposed the following scenario:\
  \ \"Suppose that by imposing a very, very small tax on billionaires, I could provide\
  \ life-saving vaccination for tens of thousands of desperately poor children. Even\
  \ if we grant that taxation is aggression, and that aggression is generally wrong,\
  \ is it really so obvious that the relatively minor aggression involved in these\
  \ examples is wrong, given the tremendous benefit it produces?\"[73]\n\n\nZwolinski\
  \ also notes that the NAP is incompatible with any practice that produces any pollution,\
  \ because pollution encroaches on the property rights of others. Therefore, the\
  \ NAP prohibits both driving and starting fires. Citing David D. Friedman, Zwolinski\
  \ notes that the NAP is unable to place a sensible limitation on risk-creating behavior,\
  \ arguing:\n\n\nOf course, almost everything we do imposes some risk of harm on\
  \ innocent persons. We run this risk when we drive on the highway (what if we suffer\
  \ a heart attack, or become distracted), or when we fly airplanes over populated\
  \ areas. Most of us think that some of these risks are justifiable, while others\
  \ are not, and that the difference between them has something to do with the size\
  \ and likelihood of the risked harm, the importance of the risky activity, and the\
  \ availability and cost of less risky activities. But considerations like this carry\
  \ zero weight in the NAP's absolute prohibition on aggression. That principle seems\
  \ compatible with only two possible rules: either all risks are permissible (because\
  \ they are not really aggression until they actually result in a harm), or none\
  \ are (because they are). And neither of these seems sensible.[73]\n\nSome supporters\
  \ argue that no one initiates force if their only option for self-defense is to\
  \ use force against a greater number of people as long as they were not responsible\
  \ for being in the position they are in. Murray Rothbard's and Walter Block's formulations\
  \ of NAP avoid these objections by either specifying that the NAP applies only to\
  \ a civilized context (and not \"lifeboat situations\") or that it applies only\
  \ to legal rights (as opposed to general morality). Thus a starving man may, in\
  \ consonance with general morality, break into a hunting cabin and steal food, but\
  \ nevertheless he is aggressing, i.e., violating the NAP, and (by most rectification\
  \ theories) should pay compensation.[84] Critics argue that the legal rights approach\
  \ might allow people who can afford to pay a sufficiently large amount of compensation\
  \ to get away with murder. They point out that local law may vary from proportional\
  \ compensation to capital punishment to no compensation at all.[62]\n\n\nOther critics\
  \ state that the NAP is unethical because it does not provide for the violent prohibition\
  \ of, and thereby supposedly legitimizes, several forms of aggression that do not\
  \ involve intrusion on property rights such as verbal sexual harassment, defamation,\
  \ boycotting, noninvasive striking etc. If a victim thus provoked would turn to\
  \ physical violence, they would be labeled an aggressor according to the NAP. However,\
  \ supporters of the NAP state that boycotting[85][86] and defamation[87][88] both\
  \ constitute freedoms of speech and that boycotting,[85][86] noninvasive striking[86][89]\
  \ and noninvasive discrimination[90] all constitute freedoms of association and\
  \ that both freedoms of association and of speech are nonaggressive. Supporters\
  \ also point out that prohibiting physical retaliation against an action is not\
  \ itself condonement of said action,[91] and that generally there are other, nonphysical\
  \ means by which one can combat social ills (e.g., discrimination) that do not violate\
  \ the NAP.[86][90] Some supporters also state that while most of the time individuals\
  \ choose voluntarily to engage in situations that may cause some degree of mental\
  \ battering, this mental battering begins to constitute unauthorized physical overload\
  \ of the senses (i.e., eardrum and retina) when it cannot be avoided and that the\
  \ NAP at that point does apply.[33]\n\n\nMany supporters consider verbal and written\
  \ threats of imminent physical violence sufficient justification for a defensive\
  \ response in a physical manner.[92][93] Those threats would then constitute a legitimate\
  \ limit to permissible speech. Because freedom of association entails the right\
  \ of owners to choose who is permitted to enter or remain on their premises, legitimate\
  \ property owners may also impose limitation on speech. The owner of a theatre wishing\
  \ to avoid a stampede may prohibit those on her property from calling 'fire!' without\
  \ just cause.[94] However, the owner of a bank may not prohibit anyone from urging\
  \ the general public to a bank run, except insofar as this occurs on the property\
  \ of said owner.[85]\n\n\nIn a 1948 interview with Donald H. Kirkley for the Library\
  \ of Congress, H. L. Mencken, a writer who influenced many libertarians, puts an\
  \ ethical limit on the freedom of speech:\n\n\nI believe there is a limit beyond\
  \ which free speech cannot go, but it's a limit that's very seldom mentioned. It's\
  \ the point where free speech begins to collide with the right to privacy. I do\
  \ not think there are any other conditions to free speech. I've got a right to say\
  \ and believe anything I please, but I have not got a right to press it on anybody\
  \ else. [...] Nobody's got a right to be a nuisance to his neighbors.[95]\n\nSupporters\
  \ also consider physical threats of imminent physical violence (e.g. pointing a\
  \ firearm at innocent people, or stocking up nuclear weapons that cannot be used\
  \ discriminately against specific individual aggressors) sufficient justification\
  \ for a defensive response in a physical manner. Those threats would then constitute\
  \ a legitimate limit to permissible action.[96][97][93]\n\n\nCritics argue it is\
  \ not possible to uphold NAP when protecting the environment as most pollution can\
  \ never be traced back to the party that caused it. They therefore claim that only\
  \ general broad government regulations will be able to protect the environment.\
  \ Supporters cite the theoretical \"tragedy of the commons\"[clarification needed]\
  \ and argue that free-market environmentalism will be much more effective in conserving\
  \ nature.[98][99]\nPolitical theorist Hillel Steiner emphasizes that all things\
  \ made come from natural resources and that the validity of any rights to those\
  \ made things depends on the validity of the rights to the natural resources.[100]\
  \ If land was stolen then anyone buying produce from that land would not be the\
  \ legitimate owner of the goods. Also, if natural resources cannot be privately\
  \ owned but are, and always will be, the property of all of mankind then NAP would\
  \ be violated if such a resource would be used without everybody's consent (see\
  \ the Lockean proviso and free-market anarchism).[101] Libertarian philosopher Roderick\
  \ Long suggests that, as natural resources are required not only for the production\
  \ of goods but for the production of the human body as well, the very concept of\
  \ self-ownership can only exist if the land itself is privately owned.[102]\n\n\n\
  Consequentialist libertarian David D. Friedman, who believes that the NAP should\
  \ be understood as a relative rather than absolute principle, defends his view by\
  \ using a sorites argument. Friedman begins by stating what he considers obvious:\
  \ a neighbor aiming his flashlight at someone's property is not aggression, or if\
  \ it is, it is only aggression in a trivial technical sense. However, aiming at\
  \ the same property with a gigawatt laser is certainly aggression by any reasonable\
  \ definition. Yet both flashlight and laser shine photons onto the property, so\
  \ there must be some cutoff point of how many photons one is permitted to shine\
  \ upon a property before it is considered aggression. However, the cutoff point\
  \ cannot be found by deduction alone because of the sorites paradox, so the non-aggression\
  \ principle is necessarily ambiguous. Friedman points out the difficulty of undertaking\
  \ any activity that poses a certain amount of risk to third parties (e.g., flying)\
  \ if the permission of thousands of people that might be affected by the activity\
  \ is required.[103]\n\n\n\"Right\" has cogently and trenchantly been defined by\
  \ Professor Sadowsky: \n\nWhen we say that one has the right to do certain things\
  \ we mean this and only this, that it would be immoral for another, alone or in\
  \ combination, to stop him from doing this by the use of physical force or the threat\
  \ thereof. We do not mean that any use a man makes of his property within the limits\
  \ set forth is necessarily a moral use?\n\n Sadowsky's definition highlights the\
  \ crucial distinction we shall make throughout this work between a man's right and\
  \ the morality or immorality of his exercise of that right. We will contend that\
  \ it is a man's right to do whatever he wishes with his person; it is his right\
  \ not to be molested or interfered with by violence from exercising that right.\
  \ But what may be the moral or immoral ways of exercising that right is a question\
  \ of personal ethics rather than of political philosophy—which is concerned solely\
  \ with matters of right, and of the proper or improper exercise of physical violence\
  \ in human relations. The importance of this crucial distinction cannot be overemphasized.\
  \ Or, as Elisha Hurlbut concisely put it: \"The exercise of a faculty by an individual\
  \ is its only use. The manner of its exercise is one thing; that involves a question\
  \ of morals. The right to its exercise is another thing.\""
