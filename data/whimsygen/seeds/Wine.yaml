  Wine is an alcoholic drink made from fermented grape juice.[a] It is produced and
  consumed in many regions around the world, in a wide variety of styles which are
  influenced by different varieties of grapes, growing environments, viticulture methods,
  and production techniques.



  Wine has been produced for thousands of years, the earliest evidence dating from
  c. 6000 BCE in present-day Georgia. Its popularity spread around the Mediterranean
  during Classical antiquity, and was sustained in Western Europe by winemaking monks
  and a secular trade for general drinking. New World wine was established by settler
  colonies from the 16th century onwards, and the wine trade increased dramatically
  up to the latter half of the 19th century, when European vineyards were largely
  destroyed by the invasive pest phylloxera. After the Second World War, winemakers
  focused on quality and marketing to cater for a more discerning audience, and wine
  remains a popular drink in much of the world.



  Wine has played an important role in religion since antiquity, and has featured
  prominently in the arts for centuries. It is drunk on its own and paired with food,
  often in social settings such as wine bars and restaurants. It is often tasted and
  assessed, with drinkers using a wide range of descriptors to communicate a wine''s
  characteristics. Wine is also collected and stored, as an investment or to improve
  with age. Its alcohol content makes wine generally unhealthy to consume, although
  it may have cardioprotective benefits.



  The earliest known traces of wine were found near Tbilisi, Georgia (c. 6000 BCE).[4][5]
  The earliest known winery, from c. 4100 BCE, is the Areni-1 winery in Armenia.[6]
  The subsequent spread of wine culture around the Mediterranean was probably due
  to the influence of the Phoenicians (from c. 1000 BCE) and Greeks (from c. 600 BCE).[7]
  The Phoenicians exported the wines of Byblos, which were known for their quality
  into Roman times.[8] Industrialized production of wine in ancient Greece spread
  across the Italian peninsula and to southern Gaul.[7] The ancient Romans further
  increased the scale of wine production and trade networks, especially in Gaul around
  the time of the Gallic Wars.[9]



  In medieval Europe, monks grew grapes and made wine for the Eucharist.[10] Monasteries
  expanded their land holdings over time and established vineyards in many of today''s
  most successful wine regions. Bordeaux was a notable exception, being a purely commercial
  enterprise serving the Duchy of Aquitaine and by association Britain between the
  12th and 15th centuries.[7]



  European wine grape traditions were incorporated into New World wine, with colonists
  planting vineyards in order to celebrate the Eucharist. Vineyards were established
  in Mexico by 1530, Peru by the 1550s and Chile shortly afterwards. The European
  settlement of South Africa and subsequent trade involving the Dutch East India Company
  led to the planting of vines in 1655. Jesuit Missionaries managed to grow vines
  in California in the 1670s, and plantings were later established in Los Angeles
  in the 1820s and Napa and Sonoma in the 1850s. Arthur Phillip introduced vines to
  Australia in 1788, and viticulture was widely practised by the 1850s. The Australian
  missionary Samuel Marsden introduced vines to New Zealand in 1819.[12]



  The Great French Wine Blight began in the latter half of the 19th century, caused
  by an infestation of the aphid phylloxera brought over from America, whose louse
  stage feeds on vine roots and eventually kills the plant. Almost every vine in Europe
  needed to be replaced, by necessity grafted onto American rootstock which is naturally
  resistant to the pest. This practise continues to this day, with the exception of
  a small number of phylloxera-free wine regions such as South Australia.[13]



  The subsequent decades saw further issues impact the wine trade, with the rise of
  prohibitionism, political upheaval and two world wars, and economic depression and
  protectionism.[14] The co-operative movement gained traction with winemakers during
  the interwar period, and the Institut national de l''origine et de la qualité was
  established in 1947 to oversee the administration of France''s appellation laws,
  the first to create comprehensive restrictions on grape varieties, maximum yields,
  alcoholic strength and vinification techniques.[15] After the Second World War,
  the wine market improved; all major producing countries adopted appellation laws,
  which increased consumer confidence, and winemakers focused on quality and marketing
  as consumers became more discerning and wealthy.[16] New World wines, previously
  dominated by a few large producers, began to fill a niche in the market, with small
  producers meeting the demand for high quality small-batch artisanal wines.[17] A
  consumer culture has emerged, supporting wine-related publications, wine tourism,
  paraphernalia such as preservation devices and storage solutions, and educational
  courses.[18]



  The term "wine" typically refers to a drink made from fermented grape juice;[2]
  drinks from other fruits are generically called fruit wine.[3] It does not include
  drinks made from starches (e.g. beer), honey (mead), apples (cider), pears (perry),
  or a liquid which is subsequently distilled to make liquor.[2] Most fruits other
  than grapes lack sufficient fermentable sugars, are overly acidic, and do not have
  enough nutrients for yeast, necessitating winemaker intervention. They do not typically
  improve with age, and last less than a year after bottling. Fruit wines are particularly
  popular in North America and Scandinavia.[3]



  The sweetness of wine is determined by the amount of residual sugar left after fermentation.[19]
  Dessert wines have a high level of residual sugar remaining after fermentation.
  There are several ways of making sweet wines, such as the use of grapes affected
  by noble rot (e.g. Sauternes), exposed to freezing temperatures (e.g. icewine),
  or dried (e.g. Vin Santo).[20]



  Sparkling wines are effervescent, and can be any color, although they are usually
  white.[21] They generally undergo secondary fermentation to create carbon dioxide,
  which remains dissolved in the wine under pressure in a sealed container.[22] Two
  common methods of accomplishing this are the traditional method, used for Cava,
  Champagne, and more expensive sparkling wines, and the Charmat method, used for
  Prosecco, Asti, and less expensive wines. A hybrid "transfer method" is also used,
  yielding intermediate results, and simple addition of carbon dioxide is used in
  the cheapest of wines.[23]



  The type of grape used and the amount of skin contact while the juice is being extracted
  determines the color of the wine.[24]



  There are two primary ways to produce rosé wine. The preferred technique is allowing
  a short period of maceration after crushing red grapes, which extracts a certain
  amount of color. The juice is then fermented like a white wine. An alternative is
  blending a small amount of finished red wine into finished white wine.[28][c]



  Wine is usually made from one or more varieties of the European species Vitis vinifera,
  such as Chardonnay and Cabernet Sauvignon. Most Vitis vinifera vines have been grafted
  onto North American species'' rootstock, a common practice due to their resistance
  to phylloxera, a root louse that eventually kills the vine.[32]



  In the context of wine production, terroir is a concept that encompasses the growing
  environment of the vine, including elevation and slope of the vineyard, type and
  chemistry of soil, and climatic and seasonal conditions. The range of possible combinations
  of these factors can result in great differences in the characteristics and quality
  of the resultant wine.[33]



  Wine grapes grow mainly between 30 and 50 degrees latitude north and south of the
  equator, although the effects of climate change and advances in viticulture are
  increasing the area under vine elsewhere.[34] The world''s southernmost vineyard
  is in Sarmiento, Argentina, near the 46th parallel south.[35] The northernmost wine
  region is the Okanagan Valley in British Columbia, Canada, which reaches up to the
  50th parallel north.[36][37]



  There are a number of different ways of making wine in a modern winery, each decision
  affecting the final outcome. The first step is harvesting the grapes, the timing
  of which depends on sugar and acid levels, any diseases affecting the crop, and
  the weather, among other factors. Grapes are harvested by hand or machine, sorted
  to select those of sufficient quality, typically destemmed, and then crushed to
  release the juice. The liquid may macerate for a few hours before being pressed
  and clarified.[38]



  The liquid is then transferred to a container for fermentation, which is typically
  made of stainless steel, wood or concrete, and either open or closed. Yeast is naturally
  present on grape skins, but most producers choose to use a specific strain for their
  predictable behaviour, allowing them to control the flavors produced. The yeast
  consumes the sugars and converts them into alcohol, heat, and carbon dioxide. For
  red wines, winemakers may choose to encourage the extraction of tannins and flavor
  from the grape skins by agitating the mixture. If permitted by law, the winemaker
  may include additives such as sugar, to increase the alcohol content (chaptalization),
  or adjust the acid levels. Some wines undergo a secondary, malolactic fermentation,
  in which the harsher malic acid is converted into lactic acid by bacteria. Finally
  the wine may be filtered to remove microbes and yeast, and sulfites may be added
  as a preservative.[38]



  Most wines are sold in glass bottles, traditionally sealed with a cork stopper.[39]
  The standard volume of wine bottle is 75cl, although they can range from 18.7cl
  to 18 liters.[40] The bottles used for sparkling wine must be thick to withstand
  the pressure of the gas behind the cork, which can be up to 6 standard atmospheres
  (88 psi).[41]



  Most cork for wine bottles comes from Alentejo, but a decline in quality in the
  late 20th century and an increase in demand spurred development of alternatives.
  An increasing number of wine producers use alternative closures such as screwcaps
  and synthetic "corks".[39] Although alternative closures reduce the risk of cork
  taint,[39] they have been blamed for causing excessive reduction.[42]



  Other containers include plastic bags within cardboard boxes (box or bag-in-box
  wines);[43] aluminium cans;[44] and stainless steel kegs (wine on tap).[45]



  Regulations govern the classification and sale of wine in many regions of the world.
  When one variety of grape is predominantly used,[e] the wine may be marketed as
  a "varietal" as opposed to a "blended" wine.[55] Similarly, in order to state a
  vintage, a percentage of the grapes must have been harvested in the declared year.[f]



  European wines tend to be classified by region (e.g. Bordeaux, Rioja and Chianti),
  with concomitant restrictions on grape varieties, yields and vinification methods.[60][61]



  Since 2009, wine from the European Union has been classified under the geographical
  indicators "protected geographical indication" (PGI) and "protected designation
  of origin" (PDO),[62] which protect product names in order to promote the products
  of a specific area and the methods used.[63] National regulations correspond to
  these designations and subdivide them, such as in Germany''s Landwein and Qualitätswein,
  Italy''s Denominazione di origine controllata (e garantita), and the French system
  of Appellation d''origine contrôlée.[64]



  The classification of Swiss wine was historically complex due to its system of federalism.[65]
  It generally follows EU regulations to simplify exporting, although wine sold domestically
  does not need to.[66] English wine follows rules for PGI and PDO products similar
  to the EU.[67][68]



  New World wine classifications are generally limited to indications of geographical
  areas, such as in the American Viticultural Area and Australian Wine Geographical
  Indications systems.[60][69] Australia also relies on awarding individual wines
  at prominent wine competitions, as well as in the influential publication Langton''s
  Classification of Australian Wine.[70]

  Some producers have created voluntary schemes to allow producers to indicate adherence
  to a stricter set of criteria than required by law, such as Appellation Marlborough
  Wine in New Zealand and Meritage in the USA.[71][72] Overall, however, New World
  countries avoid rigid classification systems, allowing for more flexibility and
  experimentation.[73]



  Wine indicating a vintage contains the juice of grapes harvested that year, with
  the exception of Eiswein picked in early January, which is dated the previous year.
  Most of a vintage''s characteristics are a result of the weather experienced by
  the vines during their growth cycle; the interaction between weather, grape varieties
  and terroir leads to different areas thriving under different conditions. In most
  of Europe, good vintages correlate with years of plenty of sunshine and average-to-warm
  temperatures, whereas bad vintages almost always occur in cold and/or wet years
  with little sunshine. In warmer climates, good vintages usually have average-to-cool
  temperatures. Even within a single area, however, aspects such as the soil type
  and depth can lead to different results, as can the variety of grape being grown,
  as different varieties tolerate different types of weather. Therefore vintages are
  rarely uniformly "good" or "bad" even within a small area.[74]



  For consistency, non-vintage wines can be blended from more than one vintage, which
  helps winemakers maintain a consistent flavor profile. This is common for Champagne,
  Port, Sherry and Madeira.[75]



  Wine fraud can take several forms, such as mixing a wine with a cheaper one to increase
  profits, surreptitiously adulterating it with additives, or passing it off as a
  more expensive wine by relabeling it. Such instances of fraud have a history dating
  back to Ancient Greece, but wine fraud has become less common overall since the
  late 19th century as legal frameworks and appellation systems have become stricter
  and more widespread.[76] Nevertheless, the increase of the value of fine wines since
  the 1970s has led to a corresponding increase in relabeling fraud.[77]



  Decanting involves pouring the wine into an intermediate container before serving
  it in a glass, which allows the removal of undesirable sediments that may have formed
  in the wine. Sediment is more common in older bottles. Aeration in a decanter may
  benefit younger wines by "opening them up", releasing more flavor, but aerating
  older wines can oxidize them.[78][79]



  Serve tannic red wines relatively warm, 15–18 °C (59–64 °F)

  Serve complex dry white wines relatively warm, 12–16 °C (54–61 °F)

  Serve soft, lighter red wines for refreshment at 10–12 °C (50–54 °F)

  Cool sweet, sparkling, flabby white and rosé wines, and those with any off-odour,
  at 6–10 °C (43–50 °F)



  As a standard rule, red wines are served at what would historically have been "room
  temperature" (now, with modern heating and insulation, this would be considered
  the temperature of a cool room), whites chilled, and sparkling and sweeter whites
  even cooler.[81] Volatile flavor compounds evaporate more easily at higher temperatures,
  so warmth increases the aromatic intensity. However, alcohol begins to evaporate
  noticeably over 20 °C (68 °F), and the carbon dioxide in sparkling wines is released
  too quickly at temperatures of about 18 °C (64 °F). The palate is more sensitive
  to sweetness at higher temperatures, so when the sweetness is not balanced by acidity
  a wine should be served cooler. Cooler temperatures suppress aroma, and therefore
  faults detectable on the nose, but increase sensitivity to tannins and bitterness.[80]



  Wine tasting is the sensory examination and evaluation of wine, allowing the consumer
  to identify faults and appreciate the product. Tasting takes place in many different
  settings, from casual social engagements to blind tasting examinations.[83] Tasting
  a wine typically involves assessing its appearance, smell, and taste.[84]



  When judging a wine''s appearance, faults can be apparent due to cloudiness or unexpected
  effervescence.[85] The color of the wine may indicate its age, with red wines becoming
  paler and white wines becoming darker, although color is also influenced by the
  grapes used. "Legs" or "tears" – lines formed on the glass after swirling – indicate
  high alcohol content or sweetness.[86]



  A wine''s "nose" (aroma) may range from neutral to pungent, and informs most of
  the experience of tasting a wine. Tasters often use a wide range of descriptors
  to compare wine aromas to other things, from fruits and vegetables such as pineapple
  and asparagus to non-consumables such as compost heaps and leather. The origin of
  these scents may be the grapes used, or the fermentation or maturation process.[87]
  When the nose includes an undesirable scent, this may indicate a fault.[88]



  On the palate the taster experiences the mouthfeel of the wine, including its sweetness,
  acidity, bitterness, tannins, and alcohol, as well as saltiness in the case of sherry.[89]
  Once the wine is swallowed or spat out, the length of time the flavours remain detectable
  is an indicator of quality.[83]



  The total global consumption of wine was in decline in the early 2010s, primarily
  because the French and Italians were drinking considerably less. As of 2019[update],
  however, this trend appears to be reversing due to an increase in popularity with
  younger Americans and the Chinese.[90] The 2024 global market was estimated at US$515.1
  billion, with a projected compound annual growth rate of 7.1% between 2025 and 2030.
  Trends include a growing demand for organic wine, and for higher-quality products
  which justify a higher price point.[91]



  Wine is important in cuisine; it can be used in preparation and tenderizing, as
  well as a flavor agent in marinades, stocks, stews (e.g. coq au vin, beef bourguignon),[92]
  and sauces (e.g. in wine sauces).[93] Many desserts also contain wine, such as zabaione
  and trifle. Ethanol evaporates at 78 °C (172 °F), so when wine is heated past this
  point it likely loses much of its alcohol content, and its acidity and sugars become
  more prominent. The necessary quality of cooking wine is a matter of debate, but
  faulty wine is not appropriate for culinary use, and the range of flavor compounds
  in a fine wine do not survive heating.[92]



  Some studies have shown an association between moderate wine consumption and a decrease
  in cardiovascular and all-cause mortality. However, alcohol consumption is also
  associated with an increased risk of a number of other health conditions, such as
  cancer.[94][95]



  The stilbene resveratrol has shown cardioprotective attributes in humans.[96] Grape
  skins naturally produce resveratrol in response to fungal infection, including exposure
  to yeast during fermentation.[97] Nevertheless, the potential harms of regular alcohol
  consumption are considered to outweigh any such benefits.[98]



  Research by Pesticide Action Network found that European wines contain large amounts
  of PFAS ("forever chemicals"), particularly TFA, which have long-term negative health
  consequences.[99]



  Many wines improve with age; conversely, wines can reduce in quality over time by
  suboptimal storage conditions, such as being exposed to strong light and heat. Optimal
  conditions are provided by wine cellars and wine caves, as well as temperature-controlled
  cabinets.[100]



  The ideal temperature for wine storage is 12–13 °C (54–55 °F) with a humidity of
  65–70%. Lower humidity levels and temperature fluctuations can dry out or stress
  a cork over time, allowing oxygen to enter the bottle, which reduces the wine''s
  quality through oxidation.[101][100] Wines with corks are typically stored horizontally
  to help keep the cork moist, but this is not necessary for screwcaps.[100]



  Investment by buying bottles and cases of the most desirable wines became especially
  popular during the early 21st century, due to an increase in the global popularity
  of wine as well as low interest rates driving demand for alternatives which may
  yield higher returns. Bordeaux is especially popular for investment, due to its
  fame, high volume of output, longevity, and relatively simple naming system. Burgundy
  is also popular, with the 2016 Romanée-Conti fetching £3,250 per bottle, as well
  as Italian wines such as Barolo, Barbaresco, and those of Tuscany.[102]



  Wines may also be bought and then aged for future consumption. Most wine is intended
  to be drunk within a year of bottling, but top-quality wines are usually sold long
  before they reach their optimal drinking window, with flavors developing in the
  bottle over many years. Estimating the optimal time to consume a wine is impossible
  to do accurately, partly because it is only clear that the ideal time has passed
  when the quality starts to decline, but also because bottle variation and differences
  in storage create differences even between wines of the same vintage and batch.[100]



  People drink wine for a number of reasons, including to aid socialization, to pair
  with food, and simply as a sensory experience.[103] Wine is increasingly viewed
  as a "lifestyle" product, with a concomitant interest in associated activities such
  as wine tourism. Producers have used an increased interest in the Mediterranean
  diet, with wine as one of its constituent parts, to drive sales;[104] in continental
  western Europe, wine is considered an everyday pleasure.[105]



  In London, wine bars date from the 19th century,[106] and they became popular in
  the 1970s in France,[107] and the 1980s in London and New York City. They have experienced
  a resurgence in more recent years,[108][109][110] and in Britain are often based
  on European cafés.[111]



  Sommeliers have become increasingly prominent in fine dining establishments as in-house
  experts, especially for wine and food pairing, with their tastes influencing the
  wider market as well. As consumer knowledge has improved, and with the popularity
  of tasting menus and experimental dishes which are difficult to pair, their public
  image may have become more important than their traditional role of recommending
  a wine to drink with a meal.[112]



  Wine connoisseurship began to flourish in the late Middle Ages and into the Renaissance,
  and comparisons between wines were written in verse, with examples such as Battle
  of the Wines by Henri d''Andeli and Nuova trattato della varietà, e qualità dei
  vini, che vengono in Roma by Giovanni Battista Scarlino.[113] Biblical scenes which
  feature wine, such as the Last Supper, Wedding at Cana, Noah''s drunkenness, and
  the Parable of the Prodigal Son, were popular with painters.[114] Later Renaissance
  poets and artists would also depict the figure of Bacchus, such as in Parthenopeus
  by Giovanni Pontano (c. 1450), which refers to him "the nurse of love".[115] In
  northern Europe, wine served to represent folly or gluttony, as in Allegory of Gluttony
  and Lust by Hieronymus Bosch.[116]



  This moralizing perspective became common in 17th century verse, incorporated into
  a theme of memento mori in which the vice of drinking leads imbibers to the grave.[117]
  Wine negatively affects several Shakespeare characters, such as Cassio in Othello
  and the Duke of Clarence in Richard III,[118] and the works of John Milton contain
  several negative references to wine.[119] Drinking songs, extant since antiquity,
  flourished in England during this period, with traveling balladeers using alcohol
  as inspiration as they composed and performed in the increasing number of alehouses.[120]
  The depiction of the "Temptation of St Anthony" by David Ryckaert III shows the
  saint being tempted primarily by wine, with music also featuring as a prominent
  temptation.[121]



  In the 19th century, avant-garde paintings inspired by everyday life naturally featured
  wine, often as the catalyst for overindulgence and drunkenness. An example of this
  is Manet''s 1882 painting A Bar at the Folies-Bergère, which depicts a bar and crowd
  at a music hall, the bar replete with Champagne.[122] Classically inspired scenes
  such as the bacchanalia continued to feature in 20th century artworks by artists
  such as André Derain and Pablo Picasso, tending to depict wine consumption in a
  more positive light.[123]



  There are hundreds of examples of poetry from the 19th and 20th centuries featuring
  wine, notably Don Juan by Lord Byron, which "recall[s] the classical carpe diem
  philosophy of Theognis and Horace".[124] Byron in Don Juan and his contemporary
  John Keats in the 1817 poem "Give me women, wine and snuff" play with the centuries-old
  phrase "wine, women and song", which links wine to other hedonistic pleasures in
  a hendiatris.[125] The phrase in its original German was also used for the title
  of the waltz Wein, Weib und Gesang by Johann Strauss II in 1869.[126] Both "Villanelle
  of the Poet''s Road" by Ernest Christopher Dowson (1899) and "A Drinking Song" by
  Yeats (1910) combine this hedonistic attitude with a somber memento mori theme.[124][127]



  Wine features in many 21st century songs and films, and acts as the central topic
  of the 2004 film Sideways, whose popularity had a measurable effect on wine sales
  in the US.[128] Research has demonstrated that music can enhance the experience
  of drinking wine, an example of crossmodal perception,[129] and Champagne producer
  Krug provides pairing suggestions for music and its wines.[130]



  Dionysus, the Ancient Greek god of wine, is attested from around 1200 BCE, with
  a distinct personality becoming apparent by the eighth century BCE. Festivals in
  his name took place in wine-producing regions across Greece and Asia Minor in autumn
  or early spring, respectively when grapes were harvested or wine was released. He
  was one of the most frequently represented figures in classical art and literature.[131]



  Bacchus was the incarnation of Dionysus in the Roman pantheon. It is unclear when
  his cult gained popularity, but in 186 BCE the Senate forbade rites in his honor
  in the decree Senatus consultum de Bacchanalibus.[132] He features on many Roman
  sarcophagi, appearing to represent "an agent of deliverance from earthly concerns",
  in a similar way to how the Greeks viewed him.[133]



  Wine forms an integral part of Jewish laws and traditions. The Derekh Eretz Rabbah
  and the Tosefta detail strict rules on the drinking of wine, and excessive consumption
  is condemned by scripture.[134] Nevertheless, wine is approved as a medicine in
  the Talmud.[135] The Kiddush is a blessing recited over wine or grape juice to sanctify
  the Shabbat, and during the Passover Seder, it is a Rabbinic obligation of adults
  to drink four cups of wine.[136]



  Wine was drunk at the Last Supper, during which Jesus Christ used it as a metaphor
  for his blood – this forms a key part of the Eucharist and informs theological ideas
  on the real presence of Christ in the Eucharist, being a key symbol of salvation.[137]
  The centrality of wine in the Eucharist led to monks growing grapes to make wine,
  and monasteries became important agents in wine production during the Middle Ages.[10]



  Alcoholic drinks, including wine, are forbidden under most interpretations of Islamic
  law.[138] The Qur''an, cited as the root of this prohibition, portrays wine in various
  lights, including as an "abomination" as well as a reward ("rivers of wine") in
  Jannah.[139] By contrast, the Hadith consistently condemns wine, although it is
  not explicitly prohibited.[140]

