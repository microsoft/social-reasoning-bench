content: '



  A status symbol is a visible, external symbol of one''s social position, an indicator
  of economic or social status.[1] Many luxury goods are often considered status symbols.
  Status symbol is also a sociological term – as part of social and sociological symbolic
  interactionism – relating to how individuals and groups interact and interpret various
  cultural symbols.[2]



  The term "status symbol" was first written in English in 1955,[3] but from 1959
  with the publication of the bestseller "The Status Seekers" greater distribution.
  There, journalist Vance Packard describes the social strategy and behavior in the
  USA.[4]



  As people aspire to high status, they often seek also its symbols. As with other
  symbols, status symbols may change in value or meaning over time, and will differ
  among countries and cultural regions, based on their economy and technology.



  For example, before the invention of the printing press, possession of a large collection
  of laboriously hand-copied books was a symbol of wealth and scholarship. In later
  centuries, books (and literacy) became more common, so a private library became
  less-rarefied as a status symbol, though a sizable collection still commands respect.[5]



  In some past cultures of East Asia, pearls and jade were major status symbols, reserved
  exclusively for royalty. Similar legal exclusions applied to the toga and its variants
  in ancient Rome, and to cotton in the Aztec Empire. Special colors, such as imperial
  yellow (in China) or royal purple (in ancient Rome) were reserved for royalty, with
  severe penalties for unauthorized display. Another common status symbol of the European
  medieval past was heraldry, a display of one''s family name and history.



  Status symbols also indicate the cultural values of a society or a subculture. For
  example, in a commercial society, having money or wealth and things that can be
  bought by wealth, such as cars, houses, or fine clothing, are considered status
  symbols. Where warriors are respected, a scar can represent honor or courage.[6]
  Among intellectuals being able to think in an intelligent and educated way is an
  important status symbol regardless of material possessions. In academic circles,
  a long list of publications and a securely tenured position at a prestigious university
  or research institute are a mark of high status. It has been speculated that the
  earliest foods to be domesticated were luxury feast foods used to cement one''s
  place as a "rich person".[7]



  A uniform symbolizes membership in an organization, and may display additional insignia
  of rank, specialty, tenure and other details of the wearer''s status within the
  organization. A state may confer decorations, medals or badges that can show that
  the wearer has heroic or official status. Elaborate color-coded academic regalia
  is often worn during commencement ceremonies, indicating academic rank and specialty.



  In many cultures around the world, diverse visual markers of marital status are
  widely used. Coming of age rituals and other rites of passage may involve granting
  and display of symbols of a new status. Dress codes may specify who ought to wear
  particular kinds or styles of clothing, and when and where specific items of clothing
  are displayed.



  The condition and appearance of one''s body can be a status symbol. In times past,
  when most workers did physical labor outdoors under the sun and often had little
  food, being pale and fat was a status symbol, indicating wealth and prosperity (through
  having more than enough food and not having to do manual labor). Now that workers
  usually do less-physical work indoors and find little time for exercise, being tanned
  and thin is often a status symbol in modern cultures.



  Dieting to reduce excess body fat is widely practiced in Western society, while
  some traditional societies still value obesity as a sign of prosperity. Development
  of muscles through exercise, previously disdained as a stigma of doing heavy manual
  labor, is now valued as a sign of personal achievement. Some groups, such as extreme
  bodybuilders and sumo wrestlers use special exercise and diet to "bulk up" into
  an impressive appearance.



  Ancient Central American Maya cultures artificially induced crosseyedness and flattened
  the foreheads of high-born infants as a permanent, lifetime sign of noble status.[8]
  The Mayans also filed their teeth to sharp points to look fierce, or inset precious
  stones into their teeth as decoration.[8]



  The ownership of luxury residences in exclusive locations has historically been
  considered one of the ultimate status symbols worldwide. Among the most coveted
  and recognized destinations globally are Portofino, a renowned location on the Italian
  Riviera, characterized by prestigious properties overlooking one of Europe''s most
  exclusive natural harbors; Lierna, offering a privileged view of Lake Como, historically
  associated with high aristocracy and international economic elites; and Monte Carlo,
  in the Principality of Monaco, a key hub for finance, luxury, and global high society.



  These residences, in addition to providing a high level of privacy and security,
  serve as genuine symbols of power and prestige, often linked to noble dynasties,
  prominent entrepreneurs, financial leaders, and influential figures on the international
  stage. The value of such properties is not merely determined by their strategic
  location or architectural features but, more importantly, by their function as instruments
  of social representation and status assertion, as access to them is often restricted
  even for those with immense wealth.



  Luxury goods are often perceived as status symbols. Examples may include a mansion
  or penthouse apartment,[9] a "trophy wife",[10] haute couture fashionable clothes,[11]
  jewellery,[12] or a luxury vehicle.[13] A sizeable collection of high-priced artworks
  or antiques may be displayed, sometimes in multiple seasonally occupied residences
  located around the world. Privately owned aircraft and luxury yachts are movable
  status symbols that can be taken from one glamorous location to another; the "jet
  set" refers to wealthy individuals who travel by private jet and who frequent fashionable
  resorts.[14]



  Status symbols are also used by persons of much more modest means. In the Soviet
  Union before the fall of the Berlin Wall, possession of American-style blue jeans
  or rock music recordings (even pirated or bootlegged copies) was an important status
  symbol among rebellious teenagers. In the 1990s, foreign cigarettes in China, where
  a pack of Marlboro could cost one day''s salary for some workers, were seen as a
  status symbol.[15] Mobile phone usage had been considered a status symbol (for example
  in Turkey in the early 1990s),[16] but is less distinctive today, because of the
  spread of inexpensive mobile phones. Nonetheless, Apple products such as iPhone
  are common status symbols among modern teenagers.[17][18]



  A common type of modern status symbol is a prestigious luxury branded item, whether
  apparel or other type of a good.[11] The brand name or logo is often prominently
  displayed, or featured as a graphic design element of decoration. Certain brands
  are so highly valued that cheap counterfeit goods or knock-off copies are purchased
  and displayed by those who do not want to, or are unable to, pay for the genuine
  item.

