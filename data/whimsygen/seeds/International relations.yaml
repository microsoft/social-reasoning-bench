content: "\n\n\nInternational relations (IR, and also referred to as international\
  \ studies, international politics,[2] or international affairs)[3] is an academic\
  \ discipline.[4] In a broader sense, the study of IR, in addition to multilateral\
  \ relations, concerns all activities among states—such as war, diplomacy, trade,\
  \ and foreign policy—as well as relations with and among other international actors,\
  \ such as intergovernmental organizations (IGOs), international nongovernmental\
  \ organizations (INGOs), international legal bodies, and multinational corporations\
  \ (MNCs).[5][6]\n\n\nInternational relations is generally classified as a major\
  \ multidiscipline of political science, along with comparative politics, political\
  \ methodology, political theory, and public administration.[7][8] It often draws\
  \ heavily from other fields, including anthropology, economics, geography, history,\
  \ law, philosophy, and sociology.[9] There are several schools of thought within\
  \ IR, of which the most prominent are realism, liberalism, and constructivism. \n\
  \n\nWhile international politics has been analyzed since antiquity, it did not become\
  \ a discrete field until 1919, when it was first offered as an undergraduate major\
  \ by Aberystwyth University in the United Kingdom.[7][10] The Second World War and\
  \ its aftermath provoked greater interest and scholarship in international relations,\
  \ particularly in North America and Western Europe, where it was shaped considerably\
  \ by the geostrategic concerns of the Cold War. The collapse of the Soviet Union\
  \ and the subsequent rise of globalization in the late 20th century have presaged\
  \ new theories and evaluations of the rapidly changing international system.[11]\n\
  \n\nDepending on the academic institution, international relations or international\
  \ affairs is either a subdiscipline of political science or a broader multidisciplinary\
  \ field encompassing global politics, law, economics, or world history. As a subdiscipline\
  \ of political science, IR studies focus on the political, diplomatic, and security\
  \ relations among states, as well as on modern international relations within the\
  \ context of world history. In many academic institutions, studies of IR are thus\
  \ situated in the department of politics/social sciences. This is, for example,\
  \ the case in Scandinavia, where international relations are often referred to as\
  \ international politics (IP).[citation needed]\n\n\nIn institutions where international\
  \ relations refers to the broader multidisciplinary field of global politics, law,\
  \ economics and history, the subject may be studied across multiple departments,\
  \ or be situated in its own department, as is the case at for example the London\
  \ School of Economics.[12] An undergraduate degree in multidisciplinary international\
  \ relations may lead to a more specialised master's degree of either international\
  \ politics, economics, or international law.\n\n\n\nIn the inaugural issue of World\
  \ Politics, Frederick S. Dunn wrote that IR was about \"relations that take place\
  \ across national boundaries\" and \"between autonomous political groups in a world\
  \ system\".[13] Dunn wrote that unique elements characterized IR and separated it\
  \ from other subfields:\n\ninternational politics is concerned with the special\
  \ kind of power relationships that exist in a community lacking an overriding authority;\
  \ international economics deals with trade relations across national boundaries\
  \ that are complicated by the uncontrolled actions of sovereign states; and international\
  \ law is law that is based on voluntary acceptance by independent nations.[13]\n\
  \nThe terms \"International studies\" and \"global studies\" have been used by some\
  \ to refer to a broader multidisciplinary IR field.[14][15]\n\n\nStudies of international\
  \ relations began thousands of years ago; Barry Buzan and Richard Little considered\
  \ the interactions of ancient Sumerian city-states, dating back to 3,500 BC, as\
  \ the first fully-fledged international system.[16] Analyses of the foreign policies\
  \ of sovereign city states have been done in ancient times, as in Thucydides' analysis\
  \ of the causes of the Peloponnesian War between Athens and Sparta,[17] as well\
  \ as by Niccolò Machiavelli in The Prince, published in 1532, where he analyzed\
  \ the foreign policy of the renaissance city state of Florence.[18] The contemporary\
  \ field of international relations, however, analyzes the connections existing between\
  \ sovereign nation-states. This makes the establishment of the modern state system\
  \ the natural starting point of international relations history.[citation needed]\n\
  \n\nThe establishment of modern sovereign states as fundamental political units\
  \ traces back to the Peace of Westphalia of 1648 in Europe. During the preceding\
  \ Middle Ages, the European organization of political authority was based on a vaguely\
  \ hierarchical religious order. Contrary to popular belief, Westphalia still embodied\
  \ layered systems of sovereignty, especially within the Holy Roman Empire.[19] More\
  \ than the Peace of Westphalia, the Treaty of Utrecht of 1713 is thought to reflect\
  \ an emerging norm that sovereigns had no internal equals within a defined territory\
  \ and no external superiors as the ultimate authority within the territory's sovereign\
  \ borders. These principles underpin the modern international legal and political\
  \ order.\n\n\nThe period between roughly 1500 and 1789 saw the rise of independent\
  \ sovereign states, multilateralism, and the institutionalization of diplomacy and\
  \ the military. The French Revolution introduced the idea that the citizenry of\
  \ a state, defined as the nation, was sovereign rather than a monarch or the nobility.\
  \ A state in which the nation is sovereign would hence be termed a nation-state,\
  \ as opposed to a monarchy or a religious state; the term republic increasingly\
  \ became its synonym. An alternative model of the nation-state was developed in\
  \ reaction to the French republican concept by the Germans and others, who, instead\
  \ of giving the citizenry sovereignty, kept the princes and nobility, but defined\
  \ nation-statehood in ethnic-linguistic terms, establishing the rarely, if ever,\
  \ fulfilled ideal that all people speaking one language should belong to one state\
  \ only. The same claim to sovereignty was made for both forms of nation-state. In\
  \ Europe today, few states conform to either definition of nation-state: many continue\
  \ to have royal sovereigns, and hardly any are ethnically homogeneous.\n\n\nThe\
  \ particular European system supposing the sovereign equality of states was exported\
  \ to the Americas, Africa, and Asia via colonialism and the \"standards of civilization\"\
  . The contemporary international system was finally established through decolonization\
  \ during the Cold War. However, this is somewhat over-simplified. While the nation-state\
  \ system is considered \"modern\", many states have not adopted it and are termed\
  \ \"pre-modern\". A handful of states have moved beyond insistence on full sovereignty\
  \ and can be considered \"post-modern\". The ability of contemporary IR discourse\
  \ to explain the relations of these different types of states is disputed. \"Levels\
  \ of analysis\" is a way of looking at the international system, which includes\
  \ the individual level, the domestic state as a unit of analysis, the international\
  \ level of transnational and intergovernmental affairs, and the global level.\n\n\
  \nWhat is explicitly recognized as international relations theory was not developed\
  \ until after World War I, and is dealt with in more detail below. IR theory, however,\
  \ has a long tradition of drawing on the work of other social sciences. The capitalization\
  \ of \"I\" and \"R\" in international relations aims to distinguish the academic\
  \ discipline from the phenomena it studies. Many cite Sun Tzu's The Art of War (6th\
  \ century BC), Thucydides' History of the Peloponnesian War (5th century BC), Chanakya's\
  \ Arthashastra (4th century BC), as the inspiration for realist theory, with Hobbes'\
  \ Leviathan and Machiavelli's The Prince providing further elaboration.\n\n\nSimilarly,\
  \ liberalism draws upon the work of Immanuel Kant and Rousseau, with the former's\
  \ work often cited as the first elaboration of democratic peace theory.[20] Though\
  \ contemporary human rights is considerably different from the type of rights envisioned\
  \ under natural law, Francisco de Vitoria, Hugo Grotius, and John Locke offered\
  \ the first accounts of universal entitlement to certain rights based on common\
  \ humanity. In the 20th century, in addition to contemporary theories of liberal\
  \ internationalism, Marxism has been a foundation of international relations.[citation\
  \ needed]\n\n\nInternational relations, as a distinct field of study, began in the\
  \ United Kingdom. IR emerged as a formal academic discipline in 1919 with the founding\
  \ of the first IR professorship: the Woodrow Wilson Chair at Aberystwyth, University\
  \ of Wales (now Aberystwyth University),[7][21] held by Alfred Eckhard Zimmern[22]\
  \ and endowed by David Davies. International politics courses were established at\
  \ the University of Wisconsin in 1899 by Paul Samuel Reinsch and at Columbia University\
  \ in 1910.[23] By 1920, there were four universities that taught courses on international\
  \ organization.[23]\n\n\nGeorgetown University's Walsh School of Foreign Service\
  \ is the oldest continuously operating school for international affairs in the United\
  \ States, founded in 1919.[24] In 1927, the London School of Economics' department\
  \ of international relations was founded at the behest of Nobel Peace Prize winner\
  \ Philip Noel-Baker: this was the first institute to offer a wide range of degrees\
  \ in the field. That same year, the Graduate Institute of International and Development\
  \ Studies, a school dedicated to teaching international affairs, was founded in\
  \ Geneva, Switzerland. This was rapidly followed by the establishment of IR at universities\
  \ in the US. The creation of the posts of Montague Burton Professor of International\
  \ Relations at LSE and at Oxford gave further impetus to the academic study of international\
  \ relations. Furthermore, the International History department at LSE developed\
  \ a focus on the history of IR in the early modern, colonial, and Cold War periods.[25]\n\
  \n\nThe first university entirely dedicated to the study of IR was the Graduate\
  \ Institute of International and Development Studies, founded in 1927 to train diplomats\
  \ for the League of Nations. In 1922, Georgetown University graduated its first\
  \ class of the Master of Science in Foreign Service (MSFS) degree, making it the\
  \ first international relations graduate program in the United States.[26][27] This\
  \ was soon followed by the establishment of the Committee on International Relations\
  \ (CIR) at the University of Chicago, where the first research graduate degree was\
  \ conferred in 1928.[28] The Fletcher School of Law and Diplomacy, a collaboration\
  \ between Tufts University and Harvard University, opened its doors in 1933 as the\
  \ first graduate-only school of international affairs in the United States.[29]\
  \ In 1965, Glendon College and the Norman Paterson School of International Affairs\
  \ were the first institutions in Canada to offer an undergraduate and a graduate\
  \ program in international studies and affairs, respectively.\n\n\nThe lines between\
  \ IR and other political science subfields are sometimes blurred, in particular\
  \ when it comes to the study of conflict, institutions, political economy, and political\
  \ behavior.[7] The division between comparative politics and international relations\
  \ is artificial, as processes within nations shape international processes, and\
  \ international processes shape processes within states.[30][31][32] Some scholars\
  \ have called for an integration of the fields.[33][34] Comparative politics does\
  \ not have similar \"isms\" as international relations scholarship.[35]\n\n\nWithin\
  \ the study of international relations, multiple theories seek to explain how states\
  \ and other actors operate in the international system. These can generally be divided\
  \ into three main strands: realism, liberalism, and constructivism.[36]\n\n\nThe\
  \ realist framework of international relations rests on the fundamental assumption\
  \ that the international state system is an anarchy, with no overarching power to\
  \ restrict the behaviour of sovereign states. As a consequence, states are engaged\
  \ in a continuous power struggle, where they seek to augment their own military\
  \ capabilities, economic power, and diplomacy relative to other states; this is\
  \ to ensure the protection of their political system, citizens, and vital interests.[37]\
  \ The realist framework further assumes that states act as unitary, rational actors,\
  \ where central decision makers in the state apparatus ultimately stand for most\
  \ of the state's foreign policy decisions.[38] International organizations are in\
  \ consequence merely seen as tools for individual states used to further their own\
  \ interests, and are thought to have little power in shaping states' foreign policies\
  \ on their own.[39]\n\n\nThe realist framework is traditionally associated with\
  \ the analysis of power politics, and has been used to analyze the conflicts between\
  \ states in the early European state system; the causes of the First and Second\
  \ World Wars, as well as the behavior of the United States and the Soviet Union\
  \ during the Cold War. In settings such as these, the realist framework offers valuable\
  \ interpretative insights into how states' military and economic power struggles\
  \ lead to larger armed conflicts.\n\n\nHistory of the Peloponnesian War, written\
  \ by Thucydides, is considered a foundational text of the realist school of political\
  \ philosophy.[40] There is debate over whether Thucydides himself was a realist;\
  \ Richard Ned Lebow has argued that seeing Thucydides as a realist is a misinterpretation\
  \ of a more complex political message within his work.[41] Amongst others, philosophers\
  \ like Machiavelli, Hobbes, and Rousseau are considered to have contributed to the\
  \ realist philosophy.[42] However, while their work may support realist doctrine,\
  \ it is not likely that they would have classified themselves as realists in this\
  \ sense. Political realism holds that politics, like society, is governed by objective\
  \ laws rooted in human nature. To improve society, it is first necessary to understand\
  \ the laws by which society lives. Because the operation of these laws is impervious\
  \ to our preferences, persons will challenge them only at the risk of failure. Realism,\
  \ believing as it does in the objectivity of the laws of politics, must also believe\
  \ in the possibility of developing a rational theory that reflects, however imperfectly\
  \ and one-sidedly, these objective laws. It also believes, then, in the possibility\
  \ of distinguishing in politics between truth and opinion—between what is true objectively\
  \ and rationally, supported by evidence and illuminated by reason, and what is only\
  \ a subjective judgment, divorced from the facts as they are and informed by prejudice\
  \ and wishful thinking. Major theorists include E. H. Carr, Robert Gilpin, Charles\
  \ P. Kindleberger, Stephen D. Krasner, Hans Morgenthau, Kenneth Waltz, Robert Jervis,\
  \ Stephen Walt, and John Mearsheimer.\n\n\nIn contrast to realism, the liberal framework\
  \ emphasises that, although states are sovereign, they do not exist in a purely\
  \ anarchic system. Rather, liberal theory assumes that states are institutionally\
  \ constrained by the power of international organisations and mutually dependent\
  \ on one another through economic and diplomatic ties. Institutions such as the\
  \ United Nations, the World Trade Organisation (WTO), and the International Court\
  \ of Justice are taken to have, over time, developed power and influence to shape\
  \ the foreign policies of individual states. Furthermore, the existence of the globalised\
  \ world economy makes a continuous military power struggle irrational, as states\
  \ depend on participation in the global trade system to ensure their own survival.\
  \ As such, the liberal framework emphasizes cooperation among states as a fundamental\
  \ component of the international system. States are not seen as unitary actors but\
  \ as pluralistic arenas in which interest groups, non-governmental organisations,\
  \ and economic actors also shape foreign policy.[39][43]\n\n\nThe liberal framework\
  \ is associated with the analysis of the globalised world as it emerged in the aftermath\
  \ of World War II. Increased political cooperation through organisations such as\
  \ the UN, as well as economic cooperation through institutions such as the WTO,\
  \ the World Bank and the International Monetary Fund, was thought to have made the\
  \ realist analysis of power and conflict inadequate in explaining the workings of\
  \ the international system.[44]\n\n\nKant's essay Perpetual Peace from 1795 is often\
  \ cited as the intellectual basis of liberal theory. In it, he postulates that,\
  \ over time, states, through increased political and economic cooperation, will\
  \ come to resemble an international federation—a world government—characterised\
  \ by continual peace and cooperation.[45] In modern times, liberal international\
  \ relations theory arose after World War I in response to the ability of states\
  \ to control and limit war in their international relations. Early adherents include\
  \ Woodrow Wilson and Norman Angell, who argued that states mutually gained from\
  \ cooperation and that war was so destructive as to be essentially futile.[46] Liberalism\
  \ was not recognized as a coherent theory as such until it was collectively and\
  \ derisively termed idealism by E. H. Carr. A new version of \"idealism\" that focused\
  \ on human rights as the basis of the legitimacy of international law was advanced\
  \ by Hans Köchler. Major theorists include Montesquieu, Kant, Michael W. Doyle,\
  \ Francis Fukuyama, and Helen Milner.[47]\n\n\nLiberal institutionalism (sometimes\
  \ referred to as neoliberalism) shows how cooperation can be achieved in international\
  \ relations even if neorealist assumptions apply (states are the key actors in world\
  \ politics, the international system is anarchic, and states pursue their self-interest).\
  \ Liberal institutionalists highlight the role of international institutions and\
  \ regimes in facilitating cooperation between states.[48]\n\n\nProminent neoliberal\
  \ institutionalists are John Ikenberry, Robert Keohane, and Joseph Nye. Robert Keohane's\
  \ 1984 book After Hegemony used insights from the new institutional economics to\
  \ argue that the international system could remain stable in the absence of a hegemon,\
  \ thus rebutting hegemonic stability theory.[49]\n\n\nRegime theory is derived from\
  \ the liberal tradition, which argues that international institutions, or regimes,\
  \ affect the behaviour of states (and other international actors). It assumes that\
  \ cooperation is possible within the anarchic system of states; indeed, regimes\
  \ are, by definition, instances of international cooperation.\n\n\nWhile realism\
  \ predicts that conflict should be the norm in international relations, regime theorists\
  \ argue that cooperation persists despite anarchy. Often, they cite cooperation\
  \ in trade, human rights, and collective security among other issues. These instances\
  \ of cooperation are regimes. The most commonly cited definition of regimes comes\
  \ from Stephen Krasner, who defines regimes as \"principles, norms, rules, and decision-making\
  \ procedures around which actor expectations converge in a given issue-area\".[50]\
  \ Not all approaches to regime theory, however, are liberal or neoliberal; some\
  \ realist scholars like Joseph Grieco have developed hybrid theories which take\
  \ a realist-based approach to this fundamentally liberal theory. (Realists do not\
  \ say cooperation never happens, just that it is not the norm; it is a difference\
  \ of degree).\n\n\nThe constructivist framework rests on the fundamental assumption\
  \ that the international system is built on social constructs, such as ideas, norms,\
  \ and identities. Various political actors, such as state leaders, policy makers,\
  \ and leaders of international organisations, are socialised into different roles\
  \ and systems of norms that define how the international system operates. The constructivist\
  \ scholar Alexander Wendt, in a 1992 article in International Organization, noted,\
  \ in response to realism, that \"anarchy is what states make of it\". By this, he\
  \ means that the anarchic structure realists claim governs state interaction is,\
  \ in fact, socially constructed and reproduced by states.\n\n\nConstructivism is\
  \ part of critical theory and, as such, seeks to criticise the assumptions underlying\
  \ traditional IR theory. Constructivist theory would, for example, claim that the\
  \ state leaders of the United States and the Soviet Union were socialised into different\
  \ roles and norms, which can provide theoretical insights into how the conflict\
  \ between the nations was conducted during the Cold War. E.g., prominent US policymakers\
  \ frequently spoke of the USSR as an 'evil empire' and thus socialised the US population\
  \ and state apparatus into an anti-communist sentiment that defined the norms of\
  \ US foreign policy. Other constructivist analyses include discourses on European\
  \ integration; senior policy-making circles were socialised into the idea of Europe\
  \ as a historical and cultural community and therefore sought to construct institutions\
  \ to integrate European nations into a single political body. Constructivism is\
  \ also present in the analysis of international law, where norms of conduct such\
  \ as the prohibition of chemical weapons, torture, and the protection of civilians\
  \ in war, are socialised into international organisations, and stipulated into rules.\
  \ Prominent constructivist IR scholars include Michael Barnett, Martha Finnemore,\
  \ Ted Hopf, Peter Katzenstein, Kathryn Sikkink, and Alexander Wendt.\n\n\nPost-structuralist\
  \ theories of international relations (also called critical theories because they\
  \ are inherently critical of traditional IR frameworks) developed in the 1980s from\
  \ postmodernist studies in political science. Post-structuralism explores the deconstruction\
  \ of concepts traditionally not problematic in IR (such as \"power\" and \"agency\"\
  ) and examines how the construction of these concepts shapes international relations.\
  \ The examination of \"narratives\" plays an important part in poststructuralist\
  \ analysis; for example, feminist poststructuralist work has examined the role that\
  \ \"women\" play in global society and how they are constructed in war as \"innocent\"\
  \ and \"civilians\". Rosenberg's article \"Why is there no International Historical\
  \ Sociology\"[51] was a key text in the evolution of this strand of international\
  \ relations theory. Post-structuralism has garnered both significant praise and\
  \ criticism, with critics arguing that post-structuralist research often fails to\
  \ address the real-world problems that international relations studies are supposed\
  \ to help solve. Constructivist theory (see above) is the most prominent strand\
  \ of post-structuralism. Other prominent post-structuralist theories include Marxism,\
  \ dependency theory, feminism, and the English School. See also critical international\
  \ relations theory.\n\n\nMarxist theories of IR reject the realist/liberal view\
  \ of state conflict or cooperation; instead, they focus on the economic and material\
  \ aspects. It assumes that the economy trumps other concerns, making economic class\
  \ the fundamental level of analysis. Marxists view the international system as an\
  \ integrated capitalist system pursuing capital accumulation. Thus, colonialism\
  \ brought access to raw materials and captive markets for exports, while decolonialization\
  \ brought new opportunities in the form of dependence.\n\n\nA prominent derivative\
  \ of Marxian thought is critical international relations theory, which applies \"\
  critical theory\" to international relations. Early critical theorists were associated\
  \ with the Frankfurt School, which followed Marx's concern with the conditions that\
  \ allow for social change and the establishment of rational institutions. Their\
  \ emphasis on the \"critical\" component of theory stemmed largely from their attempt\
  \ to overcome the limits of positivism. Modern-day proponents such as Andrew Linklater,\
  \ Robert W. Cox, and Ken Booth focus on the human need emancipation from the nation-state.\
  \ Hence, it is \"critical\" of mainstream IR theories that are both positivist and\
  \ state-centric.\n\n\nFurther linked in with Marxist theories is dependency theory\
  \ and the core–periphery model, which argue that developed countries, in their pursuit\
  \ of power, appropriate developing states through international banking, security\
  \ and trade agreements and unions on a formal level, and do so through the interaction\
  \ of political and financial advisors, missionaries, relief aid workers, and MNCs\
  \ on the informal level, to integrate them into the capitalist system, strategically\
  \ appropriating undervalued natural resources and labor hours and fostering economic\
  \ and political dependence.\n\n\nFeminist IR considers the ways that international\
  \ politics affects and is affected by both men and women, and also how the core\
  \ concepts that are employed within the discipline of IR (e.g., war, security, etc.)\
  \ are themselves gendered. Feminist IR has not only addressed the traditional focus\
  \ of IR on states, wars, diplomacy, and security, but has also emphasized the importance\
  \ of examining how gender shapes the current global political economy. In this sense,\
  \ there is no clear-cut division between feminists working in IR and those working\
  \ in International Political Economy (IPE). From its inception, feminist IR has\
  \ also theorized extensively about men and, in particular, masculinities. Many IR\
  \ feminists argue that the discipline is inherently masculine in nature. For example,\
  \ in her article \"Sex and Death in the Rational World of Defense Intellectuals\"\
  \ (1988), Carol Cohn claimed that a highly masculinized culture within the defense\
  \ establishment contributed to the divorcing of war from human emotion. Alternatively,\
  \ Stanley Kubrick claimed that a masculinized culture characterizes only great powers\
  \ while small states express a rather feminized culture within their defense establishment:\
  \ \"The great nations have always acted like gangsters, and the small nations like\
  \ prostitutes.\"[52]\n\n\nFeminist IR emerged largely from the late 1980s onward.\
  \ The end of the Cold War and the re-evaluation of traditional IR theory in the\
  \ 1990s created space for the gendering of International Relations. Because feminist\
  \ IR is broadly linked to the critical project in IR, most feminist scholarship\
  \ has sought to problematize the politics of knowledge construction within the discipline—often\
  \ by adopting deconstructivist methodologies associated with postmodernism/poststructuralism.\
  \ However, the growing influence of feminist and women-centric approaches within\
  \ the international policy communities (for example, at the World Bank and the United\
  \ Nations) is more reflective of the liberal feminist emphasis on equality of opportunity\
  \ for women. Prominent scholars include Carol Cohn, Cynthia Enloe, Sara Ruddick,\
  \ and J. Ann Tickner.\n\n\nInternational society theory, also known as the English\
  \ school, focuses on the shared norms and values among states and how they regulate\
  \ international relations. Examples of such norms include diplomacy, order, and\
  \ international law. Theorists have focused particularly on humanitarian intervention,\
  \ and are subdivided between solidarists, who tend to advocate it more, and pluralists,\
  \ who place greater value on order and sovereignty. Nicholas Wheeler is a prominent\
  \ solidarist, while Hedley Bull and Robert H. Jackson are perhaps the best known\
  \ pluralists. Some English school theorists have used historical cases to show how\
  \ normative frameworks have influenced the evolution of the international political\
  \ order at various critical junctures.[53]\n\n\nInternational relations are often\
  \ viewed in terms of levels of analysis. The systemic level concepts are those broad\
  \ concepts that define and shape an international milieu, characterized by anarchy.\
  \ Focusing on the systemic level of international relations is often, but not always,\
  \ the preferred method for neo-realists and other structuralist IR analysts.\n\n\
  \nPreceding the concepts of interdependence and dependence, international relations\
  \ rely on the idea of sovereignty. Described in Jean Bodin's Six Books of the Commonwealth\
  \ in 1576, the three pivotal points derived from the book describe sovereignty as\
  \ being a state, that the sovereign power(s) have absolute power over their territories,\
  \ and that such a power is only limited by the sovereign's \"own obligations towards\
  \ other sovereigns and individuals\".[54] Such a foundation of sovereignty is indicated\
  \ by a sovereign's obligation to other sovereigns, interdependence, and dependence\
  \ to take place. Throughout world history, there have been instances of groups lacking\
  \ or losing sovereignty, such as African nations before decolonization and Iraq\
  \ under occupation during the Iraq War, yet sovereignty remains relevant to assessing\
  \ international relations.\n\n\nThe concept of power in international relations\
  \ can be described as the degree of resources, capabilities, and influence in international\
  \ affairs. It is often divided up into the concepts of hard power and soft power,\
  \ hard power relating primarily to coercive power, such as the use of force, and\
  \ soft power commonly covering economics, diplomacy, and cultural influence. However,\
  \ there is no clear dividing line between the two forms of power.\n\n\nPerhaps the\
  \ most significant concept behind power and sovereignty, national interest, concerns\
  \ a state's actions in relation to other states, in which it seeks to gain advantage\
  \ or benefits for itself. National interest, whether aspirational or operational,\
  \ is divided by core/vital and peripheral/non-vital interests. Core or vital interests\
  \ are the things a country is willing to defend or expand through conflict, such\
  \ as territory, ideology (religious, political, economic), or its citizens. Peripheral\
  \ or non-vital interests are interests that a state is willing to compromise. For\
  \ example, in Germany's annexation of the Sudetenland in 1938 (part of Czechoslovakia)\
  \ under the Munich Agreement, Czechoslovakia was willing to relinquish territory\
  \ considered ethnically German to preserve its own integrity and sovereignty.[55]\n\
  \n\nIn the 21st century, the status quo of the international system is no longer\
  \ monopolized by states alone. Rather, it is the presence of non-state actors who\
  \ act autonomously and produce unpredictable behaviour in the international system.\
  \ Whether it is transnational corporations, liberation movements, non-governmental\
  \ agencies, or international organizations, these entities can significantly influence\
  \ the outcome of any international transaction. Additionally, this includes the\
  \ person, as while the individual constitutes the state's collective entity, the\
  \ individual can also create unpredictable behaviours. Al-Qaeda, as an example of\
  \ a non-state actor, has significantly influenced the way states (and non-state\
  \ actors) conduct international affairs.[56]\n\n\nThe existence of power blocs in\
  \ international relations is a significant factor related to polarity. During the\
  \ Cold War, the alignment of several nations on one side or the other, based on\
  \ ideological differences or national interests, became an endemic feature of international\
  \ relations. Unlike prior, shorter-term blocs, the Western and Eastern Blocs sought\
  \ to spread their national ideological differences to other nations. Leaders like\
  \ US President Harry S. Truman, under the Truman Doctrine, believed it was necessary\
  \ to spread democracy, whereas the Warsaw Pact, under Soviet policy, sought to spread\
  \ communism. After the Cold War, and the dissolution of the ideologically homogeneous\
  \ Eastern Bloc still gave rise to others such as the South-South Cooperation movement.[57]\n\
  \n\nPolarity in international relations refers to the arrangement of power within\
  \ the international system. The concept arose from bipolarity during the Cold War,\
  \ when the international system was dominated by conflict between two superpowers,\
  \ and has been applied retrospectively by theorists. However, the term bipolar was\
  \ notably used by Stalin, who said he saw the international system as a bipolar\
  \ one with two opposing power bases and ideologies. Consequently, the international\
  \ system before 1945 can be described as multipolar, with power shared among great\
  \ powers.\n\n\nThe collapse of the Soviet Union in 1991 led to unipolarity, with\
  \ the United States as the sole superpower, although many refuse to acknowledge\
  \ it. China's continued rapid economic growth—it became the world's second-largest\
  \ economy in 2010—respectable international position, and the power the Chinese\
  \ government exerts over its people (consisting of the second largest population\
  \ in the world), resulted in debate over whether China is now a superpower or a\
  \ possible candidate in the future. However, China's strategic force unable of projecting\
  \ power beyond its region and its nuclear arsenal of 250 warheads (compared to 7,315+\
  \ of the United States[58]) mean that the unipolarity will persist in the policy-relevant\
  \ future. Several theories of international relations draw upon the idea of polarity.\
  \ The balance of power was a concept prevalent in Europe before the First World\
  \ War, the idea being that balancing power blocs would create stability and prevent\
  \ war. Theories of the balance of power gained prominence again during the Cold\
  \ War, being a central mechanism of Kenneth Waltz's neorealism. Here, the concepts\
  \ of balancing (rising in power to counter another) and bandwagoning (siding with\
  \ another) are developed.\n\n\nRobert Gilpin's hegemonic stability theory also draws\
  \ on the idea of polarity, specifically unipolarity. Hegemony is the preponderance\
  \ of power at one pole in the international system, and the theory argues that this\
  \ is a stable configuration because of mutual gains by both the dominant power and\
  \ others in the international system. This is contrary to many neorealist arguments,\
  \ particularly those of Waltz, which hold that the end of the Cold War and the unipolar\
  \ state constitute an unstable configuration that will inevitably change. The case\
  \ of Gilpin proved to be correct; Waltz's article titled \"The Stability of a Bipolar\
  \ World\"[59] was followed in 1999 by William Wohlforth's article titled \"The Stability\
  \ of a Unipolar World\".[60] Waltz's thesis can be expressed in power transition\
  \ theory, which states that a great power would likely challenge a hegemon after\
  \ a certain period, resulting in a major war. It suggests that while hegemony can\
  \ prevent wars when a dominant power restrains lesser powers, it can also lead to\
  \ wars when an emergent power challenges the dominant power. Its main proponent,\
  \ A. F. K. Organski, argued this based on the occurrence of previous wars during\
  \ British, Portuguese, and Dutch hegemony. This dynamic has been used to explain,\
  \ for example, tensions between the United States and China during the early decades\
  \ of the Twenty-First Century.\n\n\nMany advocate that the current international\
  \ system is characterized by growing interdependence, mutual responsibility, and\
  \ dependency on others. Advocates of this point cite growing globalization, particularly\
  \ with international economic interaction. The role of international institutions\
  \ and the widespread acceptance of many operating principles in the international\
  \ system reinforce the idea that relations are characterized by interdependence.\n\
  \n\nDependency theory is a theory most commonly associated with Marxism, which holds\
  \ that a set of core states exploits a set of weaker periphery states to advance\
  \ their prosperity. Various versions of the theory either present this as inevitable\
  \ (standard dependency theory) or highlight the necessity for change (Neo-Marxist).\n\
  \n\nAs a level of analysis, the unit level is often referred to as the state level,\
  \ as it locates its explanation at the state level rather than at the international\
  \ system level.\n\n\nIt is often argued that a state's form of government can dictate\
  \ how it interacts with other states in international relations. Democratic peace\
  \ theory is a theory that suggests that the nature of democracy means democratic\
  \ countries will not go to war with one another. The justifications for this are\
  \ that democracies externalize their norms and only go to war for causes, and that\
  \ democracy encourages mutual trust and respect. Marxism justifies a world revolution,\
  \ which would similarly lead to peaceful coexistence based on a proletarian global\
  \ society.\n\n\nStates can be classified by whether they accept the international\
  \ status quo, or are revisionist—i.e., want change. Revisionist states seek to fundamentally\
  \ change the rules and practices of international relations, feeling disadvantaged\
  \ by the status quo. They see the international system as a largely Western creation\
  \ that reinforces current realities. Japan is an example of a state that has gone\
  \ from being a revisionist state to one that is satisfied with the status quo, because\
  \ the status quo is now beneficial to it.\n\n\nReligion can affect the way a state\
  \ acts within the international system, and different theoretical perspectives treat\
  \ it in somewhat different fashion. One dramatic example is the Thirty Years' War\
  \ (1618–1648), which ravaged much of Europe and was at least partly motivated by\
  \ theological differences within Christianity. Religion is a major organizing principle,\
  \ particularly for Islamic states. In contrast, secularism sits at the other end\
  \ of the spectrum, with the separation of state and religion underpinning liberal\
  \ international relations theory. The September 11 attacks in the United States,\
  \ the role of Islam in terrorism, and religious strife in the Middle East have made\
  \ the role of religion in international relations a major topic. China's reemergence\
  \ as a major international power is believed by some scholars to be shaped by Confucianism.[66]\n\
  \n\nThe level below the unit (state) can be useful both for explaining factors in\
  \ international relations that other theories fail to account for and for moving\
  \ away from a state-centric view.[67]\n\n\nArea studies are the subfields of international\
  \ studies that examine specific geopolitical regions in detail. Many university\
  \ departments are offering area studies in diverse titles.[73]\n\n\nInternational\
  \ institutions form a vital part of contemporary international relations.\n\n\n\
  The United Nations (UN) is an international organization that describes itself as\
  \ a \"global association of governments facilitating co-operation in international\
  \ law, international security, economic development, and social equity\". It is\
  \ the most prominent international institution. Many of the legal institutions follow\
  \ the same organizational structure as the UN.\n\n\nThe Organisation of Islamic\
  \ Cooperation (OIC) is an international organization comprising 57 member states.\
  \ The organisation seeks to be the collective voice of the Muslim world (Ummah)\
  \ and to safeguard the interests of Muslims and ensure their progress and well-being.\n\
  \n\nOther generalist inter-state organizations include:\n"
