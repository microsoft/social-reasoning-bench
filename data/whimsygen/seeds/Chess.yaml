content: "\n\n\nChess is a board game for two players, played on a square board consisting\
  \ of 64 squares arranged in an 8×8 grid. The players, referred to as \"White\" and\
  \ \"Black\", each control sixteen pieces: one king, one queen, two rooks, two bishops,\
  \ two knights, and eight pawns, with each piece type having a different pattern\
  \ of movement. An enemy piece may be captured (removed from the board) by moving\
  \ one's own piece onto the square it occupies. The object of the game is to \"checkmate\"\
  \ (threaten with inescapable capture) the enemy king. There are also several ways\
  \ a game can end in a draw.\n\n\nThe recorded history of chess dates back to the\
  \ emergence of chaturanga in 7th-century India. Chaturanga is also thought to be\
  \ an ancestor of similar games like janggi, xiangqi, and shogi. After its introduction\
  \ to Persia, it spread to the Arab world and then to Europe. The modern rules of\
  \ chess emerged in Europe at the end of the 15th century, becoming standardized\
  \ and gaining universal acceptance by the end of the 19th century. Today, chess\
  \ is one of the world's most popular games, with millions of players worldwide.\n\
  \n\nOrganized chess arose in the 19th century. International chess competitions\
  \ today are governed by the International Chess Federation FIDE (Fédération Internationale\
  \ des Échecs). The first universally recognized World Chess Champion, Wilhelm Steinitz,\
  \ claimed his title in 1886; Gukesh Dommaraju is the current World Champion, having\
  \ won the title in 2024.\n\n\nA large body of chess theory has developed since the\
  \ game's inception. Aspects of art are found in chess composition, and chess has\
  \ in turn influenced Western culture and the arts, and has relevance to other fields\
  \ such as mathematics, computer science, and psychology. One of the goals of early\
  \ computer scientists was to create a chess-playing machine. In 1997, Deep Blue\
  \ became the first computer to win a match with a reigning World Champion when it\
  \ defeated Garry Kasparov. The chess engines of today are significantly stronger\
  \ than the best human players and have greatly influenced the development of chess\
  \ theory. Chess, however, is not a solved game.\n\n\nThe rules of chess are published\
  \ by FIDE (French: Fédération Internationale des Échecs, 'International Chess Federation'),\
  \ world governing body of chess, in its Handbook.[2] Rules published by national\
  \ governing bodies, or by unaffiliated chess organizations, commercial publishers,\
  \ etc., may differ in some details. FIDE's rules were most recently revised in 2023.\n\
  \n\nChess sets come in a wide variety of styles. The Staunton pattern is the most\
  \ common, and is usually required for competition.[3] Chess sets come with pieces\
  \ in two colors, referred to as white and black, regardless of their actual color;\
  \ the players controlling the color sets are referred to as White and Black, respectively.\
  \ Each set comes with at least the following 16 pieces in both colors: one king,\
  \ one queen, two rooks, two bishops, two knights, and eight pawns.[2]\n\n\nThe game\
  \ is played on a square board of eight rows (called ranks) and eight columns (called\
  \ files). Although it does not affect gameplay, by convention the 64 squares alternate\
  \ in color and are referred to as light and dark squares.[2]\n\n\nTo start the game,\
  \ White's pieces are placed on the first rank in the following order, from left\
  \ to right: rook, knight, bishop, queen, king, bishop, knight, rook. Pawns are placed\
  \ on each square of the second rank. Black's position mirrors White's, with equivalent\
  \ pieces on every file.[2] The board is oriented so that the right-hand corner nearest\
  \ each player is a light square; as a result the white queen always starts on a\
  \ light square, while the black queen starts on a dark square. This may be remembered\
  \ by the phrases \"white on the right\" and \"queen on her color\".[4]\n\n\nIn informal\
  \ games, colors may be decided either by mutual agreement, or by lot. The rules\
  \ of chess do not prescribe any particular method for deciding colors by lot, but\
  \ a common traditional method is to conceal a white pawn in one hand and a black\
  \ pawn in the other and have the opponent choose.[5]\n\n\nIn competitions, the piece\
  \ colors are normally allocated to players by the organizers, but occasionally are\
  \ decided by lot, for example in the first round of a player vs. player match or\
  \ a team vs team match. In this case, the organizers are free to use any method\
  \ they wish to decide the colors, from a simple coin toss or card draw, to more\
  \ creative methods. For example at the U.S. China Chess Summit, a friendly match\
  \ between the two countries played in Seattle in 2001, the first round colors were\
  \ decided by a game of Jenga, won by the Chinese.[6]\n\n\nWhite moves first, after\
  \ which players alternate turns. One piece is moved per turn (except when castling,\
  \ during which two pieces are moved). In the diagrams, dots mark the squares to\
  \ which each type of piece can move if unoccupied by friendly pieces and there are\
  \ no intervening piece(s) of either color (except the knight, which leaps over any\
  \ intervening pieces). With the sole exception of en passant, a piece captures an\
  \ enemy piece by moving to the square it occupies, removing it from play and taking\
  \ its place. The pawn is the only piece that does not capture the way it moves,\
  \ and it is the only piece that moves and captures in only one direction (forwards\
  \ from the player's perspective). A piece is said to control empty squares on which\
  \ it could capture, attack squares with enemy pieces it could capture, and defend\
  \ squares with pieces of the same color on which it could recapture. Moving is compulsory;\
  \ a player may not skip a turn.\n\n\n\n\n\n\n\n\n\n\n\nWhen a king is under immediate\
  \ attack, it is in check. A move in response to a check is legal only if it results\
  \ in a position in which the king is no longer in check. There are three ways to\
  \ counter a check:\n\n\nThe object of the game is to checkmate the opponent; this\
  \ occurs when the opponent's king is in check, and there is no legal way to get\
  \ it out of check. In casual games, it is common to announce \"check\" when putting\
  \ the opponent's king in check, but this is not required by the rules of chess and\
  \ is usually not done in tournaments.[7]\n\n\nKings can castle once per game. Castling\
  \ consists of moving the king two squares toward either rook of the same color,\
  \ and then placing the rook on the square that the king crossed.\n\n\nCastling is\
  \ possible only if the following conditions are met:[2]\n\n\nCastling is still permitted\
  \ if the rook is under attack, or if the rook crosses an attacked square. It is\
  \ also still permitted if the king had been in check earlier in the game, provided\
  \ that the check was resolved without moving the king.\n\n\n\n\n\nPawns have two\
  \ special moves:\n\n\nA game can be won in the following ways:\n\n\nThere are several\
  \ ways a game can end in a draw:\n\n\n\n\n\nIn competition, chess games are played\
  \ with a time control. Time controls are generally divided into categories based\
  \ on the amount of time given to each player, which range from classical time controls,\
  \ which allot about 2 hours or more to each player and which can take upwards of\
  \ seven hours (even longer if adjournments are permitted), to bullet chess, in which\
  \ players receive less than three minutes each. Between these are rapid chess (ten\
  \ to sixty minutes per player) and blitz chess (three to ten minutes). Non-classical\
  \ chess is sometimes referred to as fast chess.\n\n\nTime is controlled using a\
  \ chess clock with two displays, one for each player's remaining time. Analog chess\
  \ clocks have been largely replaced by digital clocks, which allow for time controls\
  \ with increments.\n\n\nThere are some aspects unique to online chess. A premove\
  \ allows a player to submit a move on the opponent's turn, which gets played automatically\
  \ if possible using little to no time. Premoves, alongside the relative ease of\
  \ digital inputs, make faster time controls feasible online.\n\n\nTime controls\
  \ are also enforced in correspondence chess competitions. A typical time control\
  \ is 50 days for every 10 moves. Time is usually allotted per move in online correspondence\
  \ chess.\n\n\nHistorically, many different notation systems have been used to record\
  \ chess moves; the standard system today is short-form algebraic notation.[13] In\
  \ this system, files are labeled a through h and ranks are labeled 1 through 8.\
  \ Squares are identified by the file and rank they occur on; \"g3\" is the square\
  \ on the g-file and the third rank. In English, the piece notations are: K (king),\
  \ Q (queen), R (rook), B (bishop), and N (knight; N is used to avoid confusion with\
  \ king). Different initials are used in other languages. Moves are recorded as follows:\n\
  \n\nFor example, Qg5 means \"queen moves to g5\". Pawns have no letter initials;\
  \ e4 simply means \"pawn moves to e4\". When multiple moves could be rendered the\
  \ same way, the file or rank from which the piece moved is added to resolve ambiguity\
  \ (e.g. Ngf3 means \"knight from the g-file moves to the square f3\"; R1e2 means\
  \ \"rook on the first rank moves to e2\"). If a move may be disambiguated by rank\
  \ or file, it is done by file, and in the rare case that both are needed, squares\
  \ are listed normally (e.g. Qh4xe1).\n\n\nIf the move is a capture, \"x\" is usually\
  \ inserted before the destination square, thus Bxf3 means \"bishop captures on f3\"\
  . When a pawn makes a capture, the file from which the pawn departed is often listed\
  \ even when no disambiguation is necessary; for example, exd5 (\"pawn on the e-file\
  \ captures on d5\").\n\n\nIf a pawn moves to its last rank, achieving promotion,\
  \ the piece chosen is indicated after the move (for example, e1=Q or e1Q). Castling\
  \ is indicated by the special notations 0-0 for kingside castling and 0-0-0 for\
  \ queenside castling. A move that places the opponent's king in check usually has\
  \ the notation \"+\" suffixed. Checkmate can be indicated by suffixing \"#\". At\
  \ the end of the game, \"1–0\" means White won, \"0–1\" means Black won, and \"\
  ½–½\" indicates a draw.[2] Chess moves can be annotated with punctuation marks and\
  \ other symbols. For example: \"!\" indicates a good move; \"!!\" an excellent move;\
  \ \"?\" a mistake; \"??\" a blunder; \"!?\" an interesting move that may not be\
  \ best; or \"?!\" a dubious move not easily refuted.[14]\n\n\nMoves are written\
  \ as White/Black pairs, preceded by the move number and a period. Individual moves\
  \ by White are also recorded this way, while moves by Black are written with an\
  \ ellipsis after the move number. For example, one variation of a simple trap known\
  \ as the Scholar's mate (see animated diagram) can be recorded:\n\n\nThe move 3...Nf6??\
  \ is recorded as a blunder, as it allows 4.Qxf7 checkmate.\n\n\nGames or sequences\
  \ may be recorded in Portable Game Notation (PGN), a text-based file format with\
  \ support for annotative symbols, commentary, and background information, such as\
  \ player names. It is based on short form English algebraic notation incorporating\
  \ markup language. PGN transcripts, stored digitally as PGN (.pgn) files can be\
  \ processed by most chess software and are easily readable by humans.\n\n\nVariants\
  \ of algebraic notation include long algebraic, in which both the departure and\
  \ destination square are indicated; abbreviated algebraic, in which capture signs,\
  \ check signs, and ranks of pawn captures may be omitted; and figurine algebraic\
  \ notation, used in chess books and magazines, which uses graphic symbols instead\
  \ of initials to indicate pieces for readability regardless of language.\n\n\nUntil\
  \ about 1980, the majority of English language chess publications used descriptive\
  \ notation, in which files are identified by the initial letter of the piece that\
  \ occupies the first rank at the beginning of the game. In descriptive notation,\
  \ the common opening move 1.e4 is rendered as \"1.P-K4\" (\"pawn to king four\"\
  ). Another system, ICCF numeric notation, is recognized by the International Correspondence\
  \ Chess Federation.\n\n\nIn tournament games, players are normally required to keep\
  \ a score (written record of the game). This is a requirement in all FIDE-sanctioned\
  \ games played at classical time controls.[2] For this purpose, only algebraic notation\
  \ is recognized by FIDE, though variants such as long algebraic are acceptable;\
  \ game scores recorded in a different notation system may not be used as evidence\
  \ in the event of a dispute.\n\n\nChess has an extensive literature. In 1913, the\
  \ chess historian H.J.R. Murray estimated the total number of books, magazines,\
  \ and chess columns in newspapers to be about 5,000.[15] B.H. Wood estimated the\
  \ number, as of 1949, to be about 20,000.[16] David Hooper and Kenneth Whyld write\
  \ that, \"Since then there has been a steady increase year by year of the number\
  \ of new chess publications. No one knows how many have been printed.\"[16] Significant\
  \ public chess libraries include the John G. White Chess and Checkers Collection\
  \ at Cleveland Public Library, with over 32,000 chess books and over 6,000 bound\
  \ volumes of chess periodicals;[17] and the Chess & Draughts collection at the National\
  \ Library of the Netherlands, with about 30,000 books.[18]\n\n\n\n\n\nChess strategy\
  \ is concerned with the evaluation of chess positions and with setting up goals\
  \ and long-term plans for future play. During the evaluation, players must take\
  \ into account numerous factors such as the value of the pieces on the board, control\
  \ of the center and centralization, the pawn structure, king safety, and the control\
  \ of key squares or groups of squares (for example, diagonals, open files, and dark\
  \ or light squares).\n\n\nThe most basic step in evaluating a position is to count\
  \ the total value of pieces of both sides.[20] The point values used for this purpose\
  \ are based on experience; usually, pawns are considered worth one point, knights\
  \ and bishops about three points each, rooks about five points (the value difference\
  \ between a rook and a bishop or knight being known as the exchange), and queens\
  \ about nine points. The king is more valuable than all of the other pieces combined,\
  \ since its checkmate loses the game, but is still capable as a fighting piece;\
  \ in the endgame, the king is generally more powerful than a bishop or knight but\
  \ less powerful than a rook.[21] These basic values are then modified by other factors\
  \ like position of the piece (e.g. advanced pawns are usually more valuable than\
  \ those on their initial squares), coordination between pieces (e.g. a pair of bishops\
  \ usually coordinate better than a bishop and a knight), or the type of position\
  \ (e.g. knights are generally better in closed positions with many pawns while bishops\
  \ are more powerful in open positions).[22]\n\n\nAnother important factor in the\
  \ evaluation of chess positions is pawn structure (sometimes known as the pawn skeleton):\
  \ the configuration of pawns on the chessboard.[23] Since pawns are the least mobile\
  \ of the pieces, pawn structure is relatively static and largely determines the\
  \ strategic nature of the position. Weaknesses in pawn structure include isolated,\
  \ doubled, or backward pawns and holes; once created, they are often permanent.\
  \ Care must therefore be taken to avoid these weaknesses unless they are compensated\
  \ by another valuable asset (for example, by the possibility of developing an attack).[24]\n\
  \n\nIn chess, tactics generally refer to short-term maneuvers—so short-term that\
  \ they can be calculated in advance by a human player. The possible depth of calculation\
  \ depends on the player's ability. In quiet positions with many possibilities on\
  \ both sides, a deep calculation is more difficult and may not be practical, while\
  \ in positions with a limited number of forced variations, strong players can calculate\
  \ long sequences of moves.\n\n\nTheoreticians describe many elementary tactical\
  \ methods and typical maneuvers, for example: pins, forks, skewers, batteries, discovered\
  \ attacks (especially discovered checks), zwischenzugs, deflections, decoys, sacrifices,\
  \ underminings, overloadings, and interferences.[25] Simple one-move or two-move\
  \ tactical actions—threats, exchanges of material, and double attacks—can be combined\
  \ into longer sequences of tactical maneuvers that are often forced from the point\
  \ of view of one or both players. A forced variation that involves a sacrifice and\
  \ usually results in a tangible gain is called a combination.[26] Brilliant combinations,\
  \ such as those in the Immortal Game, are considered beautiful and are admired by\
  \ chess lovers.\n\n\nA common type of chess exercise, aimed at developing players'\
  \ tactical skills, is a position where a combination is available and the challenge\
  \ is to find it. Such positions are usually handcrafted, taken from actual games\
  \ or from analysis of actual games. Solutions usually result in checkmate, decisive\
  \ advantage, or successful defense. Tactical exercises are commonly found in instructional\
  \ books, chess magazines, newspaper chess columns, and internet chess sites.[27]\n\
  \n\nChess theory divides chess games into three phases with different sets of strategies:\
  \ the opening, the middlegame, and lastly the endgame. There is no universally accepted\
  \ way to delineate the three phases of the game; the middlegame is typically considered\
  \ to have begun after 10–20 moves, and the endgame when only a few pieces remain.\n\
  \n\nCompetitive players typically learn, memorize, and play well-documented sequences\
  \ of opening moves. The most common starting moves for White are 1.e4 and 1.d4,\
  \ which usually lead to substantially different types of positions, and Black has\
  \ multiple viable responses to both.\n\n\nSequences of opening moves are referred\
  \ to as openings and are catalogued in reference works, such as the Encyclopaedia\
  \ of Chess Openings. There are thousands of openings, though only a small fraction\
  \ of them are commonly played; variations of openings may also be given names. Openings\
  \ vary widely in character from quiet positional play (for example, the Réti Opening)\
  \ to sharp aggressive play (like the Latvian Gambit). In some opening lines, the\
  \ exact sequence considered best for both sides has been worked out to more than\
  \ 30 moves.[28]\n\n\nThe fundamental strategic aims of most openings are similar:[29]\n\
  \n\nMost players and theoreticians consider that White, by virtue of the initiative\
  \ granted from moving first, begins the game with a small advantage.[30] Black usually\
  \ strives to neutralize White's advantage and achieve equality, or to develop dynamic\
  \ counterplay in an unbalanced position.\n\n\nThe middlegame is the part of the\
  \ game that starts after the opening. Because the opening theory has ended, players\
  \ have to form plans based on the features of the position, and at the same time\
  \ take into account the tactical possibilities of the position.[31] The middlegame\
  \ is the phase in which most combinations occur. Combinations are a series of tactical\
  \ moves executed to achieve some gain. Middlegame combinations are often connected\
  \ with an attack against the opponent's king. Some typical patterns have their own\
  \ names; for example, the Boden's Mate or the Lasker–Bauer combination.[32]\n\n\n\
  Specific plans or strategic themes will often arise from particular groups of openings\
  \ that result in a specific type of pawn structure. An example is the minority attack,\
  \ which is the attack of queenside pawns against an opponent who has more pawns\
  \ on the queenside. The study of openings is therefore connected to the preparation\
  \ of plans that are typical of the resulting middlegames.[33]\n\n\nAnother important\
  \ strategic question in the middlegame is whether and how to reduce material and\
  \ transition into an endgame (i.e. simplify). Minor material advantages can generally\
  \ be transformed into victory only in an endgame, and therefore the stronger side\
  \ must choose an appropriate way to achieve an ending. Not every reduction of material\
  \ is good for this purpose; for example, if one side keeps a light-squared bishop\
  \ and the opponent has a dark-squared one, the transformation into a bishops and\
  \ pawns ending is usually advantageous for the weaker side only, because an endgame\
  \ with bishops on opposite colors is likely to be a draw, even with an advantage\
  \ of a pawn, or sometimes even with a two-pawn advantage.[34]\n\n\nThe endgame (also\
  \ end game or ending) is the stage of the game when there are few pieces left on\
  \ the board. There are three main strategic differences between earlier stages of\
  \ the game and the endgame:[35]\n\n\nEndgames can be classified according to the\
  \ type of pieces remaining on the board. Basic checkmates are positions in which\
  \ one side has only a king and the other side has one or two pieces and can checkmate\
  \ the opposing king, with the pieces working together with their king. For example,\
  \ king and pawn endgames involve only kings and pawns on one or both sides, and\
  \ the task of the stronger side is to promote one of the pawns. Other more complicated\
  \ endings are classified according to pieces on the board other than kings, such\
  \ as \"rook and pawn versus rook\" endgames.\n\n\nChess problems (also called chess\
  \ compositions) are composed positions, usually created for artistic effect rather\
  \ than practical application. The creator is known as a chess composer.[37] There\
  \ are many types of chess problems, the most common being directmates, in which\
  \ White is required to move and checkmate Black within a specified number of moves,\
  \ usually two or three, against any defense.\n\n\nThese are commonly referred to\
  \ as \"two-movers\", \"three-movers\", or \"more-movers\". \"Many-movers\" (also\
  \ known as \"long-range problems\") of over 100 moves have been composed, the current\
  \ record standing at over 200; these usually require repetitions of the same manoeuvre\
  \ in order to produce a repeated zugzwang and force detrimental pawn advances.[38][39]\n\
  \n\nDirectmates usually consist of positions unlikely to occur in an actual game,\
  \ and are intended to illustrate a particular theme, usually requiring a surprising\
  \ or counterintuitive key move. Themes associated with chess problems occasionally\
  \ appear in actual games, when they are referred to as \"problem-like\" moves.[40]\n\
  \n\nOther common types of problems include:\n\n\nThe above type of problems are\
  \ usually considered orthodox, in the sense that the standard rules of chess are\
  \ observed.\n\n\nFairy chess problems, also called heterodox problems, involve altered\
  \ rules, such as the use of unconventional pieces or boards, or stipulations that\
  \ contradict the standard rules of chess such as reflexmates or seriesmovers.\n\n\
  \nStudies are usually considered distinct from problems, although there is some\
  \ overlap. In a study, the stipulation is that White to play must win or draw, without\
  \ specifying any particular number of moves. The majority of studies are endgame\
  \ positions, with varying degrees of realism or practical application.[41]\n\n\n\
  Tournaments for composition and solving of chess problems and studies are organized\
  \ by the World Federation for Chess Composition (WFCC), which works cooperatively\
  \ with but independent of FIDE. The WFCC awards titles for composing and solving\
  \ chess problems.[42]\n\n\nChess is often played in public spaces such as parks\
  \ and town squares. Although the nature of these games is often casual, the chess\
  \ hustling scene has seen growth in urban areas such as New York City.[43]\n\n\n\
  Contemporary chess is an organized sport with structured international and national\
  \ leagues, tournaments, and congresses. Thousands of chess tournaments, matches,\
  \ and festivals are held around the world every year catering to players of all\
  \ levels.\n\n\nTournaments with a small number of players may use the round-robin\
  \ format, in which every player plays one game against every other player. For a\
  \ large number of players, the Swiss system may be used, in which each player is\
  \ paired against an opponent who has the same (or as similar as possible) score\
  \ in each round. In either case, a player's score is usually calculated as 1 point\
  \ for each game won and one-half point for each game drawn. Variations such as \"\
  football scoring\" (3 points for a win, 1 point for a draw) may be used by tournament\
  \ organizers, but ratings are always calculated on the basis of standard scoring.\
  \ A player's score may be reported as total score out of games played (e.g. 5½/8),\
  \ points for versus points against (e.g. 5½–2½), or by number of wins, losses and\
  \ draws (e.g. +4−1=3).\n\n\nThe term \"match\" refers not to an individual game,\
  \ but to either a series of games between two players, or a team competition in\
  \ which each player of one team plays one game against a player of the other team.\n\
  \n\nChess's international governing body is usually known by its French acronym\
  \ FIDE (pronounced FEE-day; French: Fédération Internationale des Échecs), or International\
  \ Chess Federation. FIDE's membership consists of the national chess organizations\
  \ of over 180 countries; there are also several associate members, including various\
  \ supra-national organizations, the International Braille Chess Association (IBCA),\
  \ International Chess Committee of the Deaf (ICCD), and the International Physically\
  \ Disabled Chess Association (IPCA).[44] FIDE is recognized as a sports governing\
  \ body by the International Olympic Committee,[45] but chess has never been part\
  \ of the Olympic Games.\n\n\nFIDE's most visible activity is organizing the World\
  \ Chess Championship, a role it assumed in 1948. The current World Champion is Gukesh\
  \ Dommaraju of India.[46][47] The reigning Women's World Champion is Ju Wenjun from\
  \ China.[48]\n\n\nOther competitions for individuals include the World Junior Chess\
  \ Championship, the European Individual Chess Championship, the tournaments for\
  \ the World Championship qualification cycle, and the various national championships.\
  \ Invitation-only tournaments regularly attract the world's strongest players. Examples\
  \ include Spain's Linares event, Monte Carlo's Melody Amber tournament, the Dortmund\
  \ Sparkassen meeting, Sofia's M-tel Masters, and Wijk aan Zee's Tata Steel tournament.\n\
  \n\nRegular team chess events include the Chess Olympiad and the European Team Chess\
  \ Championship.\n\n\nThe World Chess Solving Championship and World Correspondence\
  \ Chess Championship include both team and individual events. These are held independently\
  \ of FIDE by, respectively, the World Federation for Chess Composition (WFCC) and\
  \ the International Correspondence Chess Federation (ICCF).\n\n\nIn order to rank\
  \ players, FIDE, ICCF, and most national chess organizations use the Elo rating\
  \ system developed by Arpad Elo. An average club player has a rating of about 1500.\
  \ The highest FIDE rating of all time is 2882, which has been achieved by Magnus\
  \ Carlsen twice, in May 2014 and August 2019.[49]\n\n\nPlayers may be awarded lifetime\
  \ titles by FIDE:[51]\n\n\nThe above titles are known as \"open\" titles, obtainable\
  \ by both men and women. There are also separate women-only titles: Woman Grandmaster\
  \ (WGM), Woman International Master (WIM), Woman FIDE Master (WFM) and Woman Candidate\
  \ Master (WCM). These require a performance level approximately 200 rating points\
  \ below their respective open titles. The continued existence of women-only titles\
  \ has been debated; critics, including former world championship challenger Judit\
  \ Polgár, have argued that separate titles are unnecessary and reinforce gender\
  \ distinctions rather than competitive standards.[52] Beginning with Nona Gaprindashvili\
  \ in 1978, a number of women have earned the open GM title: 40 as of July 2023[update].[note\
  \ 2]\n\n\nFIDE also awards titles for arbiters and trainers.[53][54] International\
  \ titles are also awarded to composers and solvers of chess problems and to correspondence\
  \ chess players (by the International Correspondence Chess Federation). National\
  \ chess organizations may also award titles.\n\n\nTexts referring to the origins\
  \ of chess date from the beginning of the seventh century. Three are written in\
  \ Pahlavi (Middle Persian)[57] and one, the Harshacharita, is in Sanskrit.[58] One\
  \ of these texts, the Chatrang-namak, represents one of the earliest written accounts\
  \ of chess. The narrator Bozorgmehr explains that Chatrang, \"Chess\" in Pahlavi,\
  \ was introduced to Persia by 'Dewasarm, a great ruler of India' during the reign\
  \ of Khosrow I:[59]\n\n\n Dewasarm has fashioned this chatrang after the likeness\
  \ of a battle, and in its likeness are two supreme rulers after the likeness of\
  \ Kings (shah), with the essentials of rooks (rukh) to right and to left, with Counsellor\
  \ (farzin) in the likeness of a commander of the champions, with the Elephant (pil)\
  \ in the likeness of the commander of the rearguard, with Horse (asp) in the likeness\
  \ of the commander of the cavalry, with the Footsoldier (piyadak) in the likeness\
  \ of so many infantry in the vanguard of the battle.\n\n\n— Translation by Murray,\
  \ 1913.[60]\n\nThe oldest known chess manual was in Arabic and dates to about 840,\
  \ written by al-Adli ar-Rumi (800–870), a renowned Arab chess player, titled Kitab\
  \ ash-shatranj (The Book of Chess). This is a lost manuscript, but is referenced\
  \ in later works.[61] Here also, al-Adli attributes the origins of Persian chess\
  \ to India, along with the eighth-century collection of fables Kalīla wa-Dimna.[62]\
  \ By the 20th century, a substantial consensus[63][64] developed regarding chess's\
  \ origins in northwest India in the early seventh century.[65] More recently, this\
  \ consensus has been the subject of further scrutiny.[66]\n\n\nThe early forms of\
  \ chess in India were known as chaturaṅga (Sanskrit: चतुरङ्ग), literally \"four\
  \ divisions\" [of the military] – infantry, cavalry, elephants, and chariotry –\
  \ represented by pieces that would later evolve into the modern pawn, knight, bishop,\
  \ and rook, respectively. Chaturanga was played on an 8×8 uncheckered board, called\
  \ ashtāpada.[67] Thence it spread eastward and westward along the Silk Road. The\
  \ earliest evidence of chess is found in nearby Sasanian Persia around 600 A.D.,\
  \ where the game came to be known by the name chatrang (Persian: چترنگ).[68] Chatrang\
  \ was taken up by the Muslim world after the Islamic conquest of Persia (633–51),\
  \ where it was then named shatranj (Arabic: شطرنج; Persian: شترنج), with the pieces\
  \ largely retaining their Persian names. In Spanish, \"shatranj\" was rendered as\
  \ ajedrez (\"al-shatranj\"), in Portuguese as xadrez, and in Greek as ζατρίκιον\
  \ (zatrikion, which comes directly from the Persian chatrang),[69] but in the rest\
  \ of Europe it was replaced by versions of the Persian shāh (\"king\"), from which\
  \ the English words \"check\" and \"chess\" descend.[note 3] The word \"checkmate\"\
  \ is derived from the Persian shāh māt (\"the king is dead\").[70]\n\n\nXiangqi\
  \ is the form of chess best known in China. The eastern migration of chess, into\
  \ China and Southeast Asia, has even less documentation than its migration west,\
  \ making it largely conjectured. The word xiàngqí (象棋) was used in China to refer\
  \ to a game from 569 A.D. at the latest, but it has not been proven that this game\
  \ was directly related to chess.[71][72]\nThe first reference to Chinese chess appears\
  \ in a book entitled Xuánguaì Lù (玄怪錄; \"Record of the Mysterious and Strange\"\
  ), dating to about 800. A minority view holds that Western chess arose from xiàngqí\
  \ or one of its predecessors.[73][74] Chess historians Jean-Louis Cazaux and Rick\
  \ Knowlton contend that xiangqi's intrinsic characteristics make it easier to construct\
  \ an evolutionary path from China to India/Persia than the opposite direction.[75]\n\
  \n\nThe oldest archaeological chess artifacts – ivory pieces – were excavated in\
  \ ancient Afrasiab, today's Samarkand, in Uzbekistan, Central Asia, and date to\
  \ about 760, with some of them possibly being older. Remarkably, almost all findings\
  \ of the oldest pieces come from along the Silk Road, from the former regions of\
  \ the Tarim Basin (today's Xinjiang in China), Transoxiana, Sogdiana, Bactria, Gandhara,\
  \ to Iran on one end and to India through Kashmir on the other.[76]\n\n\nThe game\
  \ reached Western Europe and Russia via at least three routes, the earliest being\
  \ in the ninth century. By the year 1000, it had spread throughout both the Muslim\
  \ Iberia and Latin Europe.[78] A Latin poem called Versus de scachis (\"Verses on\
  \ Chess\") dated to the late 10th century, has been preserved at Einsiedeln Abbey\
  \ in Switzerland.\n\n\nThe game of chess was then played and known in all European\
  \ countries. A famous 13th-century Spanish manuscript covering chess, backgammon,\
  \ and dice is known as the Libro de los juegos, which is the earliest European treatise\
  \ on chess as well as being the oldest document on European tables games.[79] The\
  \ rules were fundamentally similar to those of the Arabic shatranj. The differences\
  \ were mostly in the use of a checkered board instead of a plain monochrome board\
  \ used by Arabs and the habit of allowing some or all pawns to make an initial double\
  \ step. In some regions, the queen, which had replaced the wazir, or the king could\
  \ also make an initial two-square leap under some conditions.[80]\n\n\nAround 1200,\
  \ the rules of shatranj started to be modified in Europe, culminating, several major\
  \ changes later, in the emergence of modern chess practically as it is known today.[81]\
  \ A major change was the modern piece movement rules, which began to appear in intellectual\
  \ circles in Valencia, Spain, around 1475,[note 4] which established the foundations\
  \ and brought it very close to current chess. These new rules then were quickly\
  \ adopted in Italy and Southern France before diffusing into the rest of Europe.[84][85]\
  \ Pawns gained the ability to advance two squares on their first move, while bishops\
  \ and queens acquired their modern movement powers. The queen replaced the earlier\
  \ vizier chess piece toward the end of the 10th century and by the 15th century\
  \ had become the most powerful piece;[86] in light of that, modern chess was often\
  \ referred to at the time as \"Queen's Chess\" or \"Mad Queen Chess\".[87] Castling,\
  \ derived from the \"king's leap\", usually in combination with a pawn or rook move\
  \ to bring the king to safety, was introduced. These new rules quickly spread throughout\
  \ Western Europe.\n\n\nWritings about chess theory began to appear in the late 15th century.\
  \ An anonymous treatise on chess of 1490 with the first part containing some openings\
  \ and the second 30 endgames is deposited in the library of the University of Göttingen.[88]\
  \ The book El Libro dels jochs partitis dels schachs en nombre de 100 was written\
  \ by Francesc Vicent in Segorbe in 1495, but no copy of this work has survived.[88]\
  \ The Repetición de Amores y Arte de Ajedrez (Repetition of Love and the Art of\
  \ Playing Chess) by Spanish churchman Luis Ramírez de Lucena was published in Salamanca\
  \ in 1497.[85] Lucena and later masters like Portuguese Pedro Damiano, Italians\
  \ Giovanni Leonardo Di Bona, Giulio Cesare Polerio and Gioachino Greco, and Spanish\
  \ bishop Ruy López de Segura developed elements of opening theory and started to\
  \ analyze simple endgames.\n\n\nIn the 18th century, the center of European chess\
  \ life moved from Southern Europe to mainland France.[89] The two most important\
  \ French masters were François-André Danican Philidor, a musician by profession,\
  \ who discovered the importance of pawns for chess strategy, and later Louis-Charles\
  \ Mahé de La Bourdonnais, who won a famous series of matches against Irish master\
  \ Alexander McDonnell in 1834.[90] Centers of chess activity in this period were\
  \ coffee houses in major European cities like Café de la Régence in Paris and Simpson's\
  \ Divan in London.[91][92]\n\n\nAt the same time, the Romantic intellectual movement\
  \ had had a far-reaching impact on chess, with aesthetics and tactical beauty being\
  \ held in higher regard than objective soundness and strategic planning. As a result,\
  \ virtually all games began with the Open Game, and it was considered unsportsmanlike\
  \ to decline gambits that invited tactical play such as the King's Gambit and the\
  \ Evans Gambit.[93] This chess philosophy is known as Romantic chess, and its sharp,\
  \ tactical style of play was predominant until the late 19th century.[94]\n\n\n\
  The rules concerning stalemate were finalized in the early 19th century. Also in\
  \ the 19th century, the convention that White moves first was established (formerly\
  \ either White or Black could move first). Finally, the rules around castling and\
  \ en passant captures were standardized—variations in these rules persisted in Italy\
  \ until the late 19th century. The resulting standard game is sometimes referred\
  \ to as Western chess[95] or international chess,[96] particularly in Asia where\
  \ other games of the chess family such as xiangqi are prevalent. Since the 19th century,\
  \ the only rule changes, such as the establishment of the correct procedure for\
  \ claiming a draw by repetition, have been technical in nature.\n\n\nAs the 19th\
  \ century progressed, chess organization developed quickly. Many chess clubs, chess\
  \ books, and chess journals appeared. There were correspondence matches between\
  \ cities; for example, the London Chess Club played against the Edinburgh Chess\
  \ Club in 1824.[97] Chess problems became a regular part of 19th-century newspapers;\
  \ Bernhard Horwitz, Josef Kling, and Samuel Loyd composed some of the most influential\
  \ problems. In 1843, von der Lasa published his and Bilguer's Handbuch des Schachspiels\
  \ (Handbook of Chess), the first comprehensive manual of chess theory.\n\n\nThe\
  \ first modern chess tournament was organized by Howard Staunton, a leading English\
  \ chess player, and was held in London in 1851. It was won by the German Adolf Anderssen,\
  \ who was hailed as the leading chess master. His energetic attacking style was\
  \ typical for the time.[98][99] Sparkling games like Anderssen's Immortal Game and\
  \ Evergreen Game or Morphy's \"Opera Game\" were regarded as the highest possible\
  \ summit of the art of chess.[100] Deeper insight into the nature of chess came\
  \ with the American Paul Morphy, an extraordinary chess prodigy. Morphy won against\
  \ all important competitors (except Staunton, who refused to play), including Anderssen,\
  \ during his short chess career between 1857 and 1863.[101]\n\n\nPrague-born Wilhelm\
  \ Steinitz laid the foundations for a scientific approach to the game, the art of\
  \ breaking a position down into components[102] and preparing correct plans.[103]\
  \ In addition to his theoretical achievements, Steinitz founded an important tradition:\
  \ his triumph over the leading German master Johannes Zukertort in 1886 is regarded\
  \ as the first official World Chess Championship. This win marked a stylistic transition\
  \ at the highest levels of chess from an attacking, tactical style predominant in\
  \ the Romantic era to a more positional, strategic style introduced to the chess\
  \ world by Steinitz. Steinitz lost his crown in 1894 to a much younger player, the\
  \ German mathematician Emanuel Lasker, who maintained this title for 27 years, the\
  \ longest tenure of any world champion.[104]\n\n\nAfter the end of the 19th century,\
  \ the number of master tournaments and matches held annually quickly grew. The first\
  \ Olympiad was held in Paris in 1924, and FIDE was founded initially for the purpose\
  \ of organizing that event. In 1927, the Women's World Chess Championship was established;\
  \ the first to hold the title was Czech-English master Vera Menchik.[105]\n\n\n\
  A prodigy from Cuba, José Raúl Capablanca, known for his skill in endgames, won\
  \ the World Championship from Lasker in 1921. Capablanca was undefeated in tournament\
  \ play for eight years, from 1916 to 1924. His successor (1927) was the Russian-French\
  \ Alexander Alekhine, a strong attacking player who died as the world champion in\
  \ 1946. Alekhine briefly lost the title to Dutch player Max Euwe in 1935 and regained\
  \ it two years later.[106]\n\n\nIn the interwar period, chess was revolutionized\
  \ by the new theoretical school of so-called hypermodernists like Aron Nimzowitsch\
  \ and Richard Réti. They advocated controlling the center of the board with distant\
  \ pieces rather than with pawns, thus inviting opponents to occupy the center with\
  \ pawns, which become objects of attack.[107] Among the innovations popularized\
  \ by hypermodernists was the fianchetto: the development of bishops away from, rather\
  \ than towards, the center, onto the b- and g-files.\n\n\nAfter the death of Alekhine,\
  \ a new World Champion was sought. FIDE, which has controlled the title since then,\
  \ ran a tournament of elite players. The winner of the 1948 tournament was Russian\
  \ Mikhail Botvinnik. In 1950, FIDE established a system of titles, conferring the\
  \ title of Grandmaster on 27 players. (Some sources state that, in 1914, the title\
  \ of chess Grandmaster was first formally conferred by Tsar Nicholas II of Russia\
  \ to Lasker, Capablanca, Alekhine, Tarrasch, and Marshall, but this is a disputed\
  \ claim.[note 5])\n\n\nBotvinnik started an era of Soviet dominance in the chess\
  \ world, which mainly through the Soviet government's politically inspired efforts\
  \ to demonstrate intellectual superiority over the West[108][109] stood almost uninterrupted\
  \ for more than a half-century. Until the dissolution of the Soviet Union, there\
  \ was only one non-Soviet champion, American Bobby Fischer (champion 1972–1975).[110]\
  \ Botvinnik also revolutionized opening theory. Previously, Black strove for equality,\
  \ attempting to neutralize White's first-move advantage. As Black, Botvinnik strove\
  \ for the initiative from the beginning.[111] In the previous informal system of\
  \ World Championships, the current champion decided which challenger he would play\
  \ for the title and the challenger was forced to seek sponsors for the match. FIDE\
  \ set up a new system of qualifying tournaments and matches. The world's strongest\
  \ players were seeded into Interzonal tournaments, where they were joined by players\
  \ who had qualified from Zonal tournaments (often national or regional championships).\
  \ The leading finishers in these Interzonals would go through the \"Candidates\"\
  \ stage, which was initially a tournament, and later a series of knockout matches.\
  \ The winner of the Candidates would then play the reigning champion for the title.\
  \ A champion defeated in a match had a right to play a rematch a year later. This\
  \ system operated on a three-year cycle. Botvinnik participated in championship\
  \ matches over a period of fifteen years. He won the world championship tournament\
  \ in 1948 and retained the title in tied matches in 1951 and 1954. In 1957, he lost\
  \ to Vasily Smyslov, but regained the title in a rematch in 1958. In 1960, he lost\
  \ the title to the 23-year-old Latvian prodigy Mikhail Tal, an accomplished tactician\
  \ and attacking player who is widely regarded as one of the most creative players\
  \ ever,[112] hence his nickname \"the magician from Riga\". Botvinnik again regained\
  \ the title in a rematch in 1961.\n\n\nFollowing the 1961 event, FIDE abolished\
  \ the automatic right of a deposed champion to a rematch, and the next champion,\
  \ Armenian Tigran Petrosian, a player renowned for his defensive and positional\
  \ skills, held the title for two cycles, 1963–1969. His successor, Boris Spassky\
  \ from Russia (champion 1969–1972), won games in both positional and sharp tactical\
  \ style.[113] The next championship, the so-called Match of the Century, saw the\
  \ first non-Soviet challenger since World War II, American Bobby Fischer. Fischer\
  \ defeated his opponents in the Candidates matches by unheard-of margins, and convincingly\
  \ defeated Spassky for the world championship. The match was followed closely by\
  \ news media of the day, leading to a surge in popularity for chess; it also held\
  \ significant political importance at the height of the Cold War, with the match\
  \ being seen by both sides as a microcosm of the conflict between East and West.[114]\
  \ In 1975, however, Fischer refused to defend his title against Soviet Anatoly Karpov\
  \ when he was unable to reach agreement on conditions with FIDE, and Karpov obtained\
  \ the title by default.[115] Fischer modernized many aspects of chess, especially\
  \ by extensively preparing openings.[116]\n\n\nKarpov defended his title twice against\
  \ Viktor Korchnoi and dominated the 1970s and early 1980s with a string of tournament\
  \ successes.[117] In the 1984 World Chess Championship, Karpov faced his toughest\
  \ challenge to date, the young Garry Kasparov from Baku, Soviet Azerbaijan. The\
  \ match was aborted in controversial circumstances after 5 months and 48 games with\
  \ Karpov leading by 5 wins to 3, but evidently exhausted; many commentators believed\
  \ Kasparov, who had won the last two games, would have won the match had it continued.\
  \ Kasparov won the 1985 rematch. Kasparov and Karpov contested three further closely\
  \ fought matches in 1986, 1987 and 1990, Kasparov winning them all.[118] Kasparov\
  \ became the dominant figure of world chess from the mid-1980s until his retirement\
  \ from competition in 2005.\n\n\nChess-playing computer programs (later known as\
  \ chess engines) began to appear in the 1960s. In 1970, the first major computer\
  \ chess tournament, the North American Computer Chess Championship, was held, followed\
  \ in 1974 by the first World Computer Chess Championship. In the late 1970s, dedicated\
  \ home chess computers such as Fidelity Electronics' Chess Challenger became commercially\
  \ available, as well as software to run on home computers. The overall standard\
  \ of computer chess was low, however, until the 1990s.\n\n\nThe first endgame tablebases,\
  \ which provided perfect play for relatively simple endgames such as king and rook\
  \ versus king and bishop, appeared in the late 1970s. This set a precedent to the\
  \ complete six- and seven-piece tablebases that became available in the 2000s and\
  \ 2010s respectively.[119]\n\n\nSome of the earliest chess databases, which are\
  \ collections of chess games searchable by move and position, include Ken Thompson\
  \ and Joe Condon's king-queen versus king-rook chess database. They were used for\
  \ testing early chess engines like Belle. It won the ACM North American Computer\
  \ Chess Championship five times and the 1980 World Computer Chess Championship.[120]\
  \ The first commercial chess database was introduced by the German company ChessBase\
  \ in 1987.[121] Databases containing millions of chess games have since had a profound\
  \ effect on opening theory and other areas of chess research.\n\n\nDigital chess\
  \ clocks were invented in 1973, though they did not become commonplace until the\
  \ 1990s. Digital clocks allow for time controls involving increments and delays.\n\
  \n\nThe Internet enabled online chess as a new medium of playing, with chess servers\
  \ allowing users to play other people from different parts of the world in real\
  \ time. The first such server, known as Internet Chess Server (ICS), was developed\
  \ at the University of Utah in 1992. ICS formed the basis for the first commercial\
  \ chess server, the Internet Chess Club, which was launched in 1995, and for other\
  \ early chess servers such as Free Internet Chess Server (FICS). Since then, many\
  \ other platforms have appeared, and online chess began to rival over-the-board\
  \ chess in popularity. The two most popular platforms today are chess.com and Lichess.[122][123]\
  \ During the 2020 COVID-19 pandemic, the isolation ensuing from quarantines imposed\
  \ in many places around the world, combined with the success of the popular Netflix\
  \ show The Queen's Gambit and other factors such as the popularity of online tournaments\
  \ (notably PogChamps) and chess Twitch streamers, resulted in a surge of popularity\
  \ not only for online chess, but for the game of chess in general; this phenomenon\
  \ has been referred to in the media as the 2020 online chess boom.[124][125]\n\n\
  \nComputer chess has also seen major advances. By the 1990s, chess engines could\
  \ consistently defeat most amateurs, and in 1997 Deep Blue defeated World Champion\
  \ Garry Kasparov in a six-game match, starting an era of computer dominance at the\
  \ highest level of chess. In the 2010s, engines significantly stronger than even\
  \ the best human players became accessible for free on a number of PC and mobile\
  \ platforms, and free engine analysis became a commonplace feature on internet chess\
  \ servers. An adverse effect of the easy availability of engine analysis on hand-held\
  \ devices and personal computers has been the rise of computer cheating, which has\
  \ grown to be a major concern in both over-the-board and online chess.[126] In 2017,\
  \ AlphaZero—a neural network also capable of playing shogi and Go—was introduced.\
  \ Since then, many chess engines based on neural network evaluation have been written,\
  \ the best of which have surpassed the traditional \"brute-force\" engines. AlphaZero\
  \ also introduced many novel ideas and ways of playing the game, which affected\
  \ the style of play at the top level.[127]\n\n\nAs endgame tablebases developed,\
  \ they began to provide perfect play in endgame positions in which the game-theoretical\
  \ outcome was previously unknown, such as positions with king, queen and pawn against\
  \ king and queen. In 1991, Lewis Stiller published a tablebase for select six-piece\
  \ endgames,[128][129] and by 2005, following the publication of Nalimov tablebases,\
  \ all six-piece endgame positions were solved. In 2012, Lomonosov tablebases were\
  \ published which solved all seven-piece endgame positions.[130] Use of tablebases\
  \ enhances the performance of chess engines by providing definitive results in some\
  \ branches of analysis.\n\n\nPreviously, preparation at the professional level required\
  \ an extensive chess library and several subscriptions to publications such as Chess\
  \ Informant to keep up with opening developments and study opponents' games. Today,\
  \ preparation at the professional level involves the use of databases containing\
  \ millions of games, and engines to analyze different opening variations and prepare\
  \ novelties.[131] A number of online learning resources are also available for players\
  \ of all levels, such as online courses, tactics trainers, and video lessons.[132]\n\
  \n\nSince the late 1990s, it has been possible to follow major international chess\
  \ events online, the players' moves being relayed in real time. Sensory boards have\
  \ been developed to enable automatic transmission of moves. Chess players will frequently\
  \ run engines while watching these games, allowing them to quickly identify mistakes\
  \ by the players and spot tactical opportunities. While in the past the moves have\
  \ been relayed live, today chess organizers will often impose a half-hour delay\
  \ as an anti-cheating measure. Technological progress made in the 1990s and the\
  \ 21st century has influenced the way that chess is studied at all levels, as well\
  \ as the state of chess as a spectator sport. In the mid-to-late 2010s, and especially\
  \ following the 2020 online boom, it became commonplace for supergrandmasters, such\
  \ as Hikaru Nakamura and Magnus Carlsen, to livestream chess content on platforms\
  \ such as Twitch.[133][134] Also following the boom, online chess started being\
  \ viewed as an esport, with esport teams signing chess players for the first time\
  \ in 2020.[135] In 2025, the number of esport teams signing chess players rose considerably,\
  \ after chess was added to Saudi Arabia's Esports World Cup.[136][137]\n\n\nThe\
  \ number of grandmasters and other chess professionals has also grown in the modern\
  \ era. Kenneth Regan and Guy Haworth conducted research involving comparison of\
  \ move choices by players of different levels and from different periods with the\
  \ analysis of strong chess engines. They concluded that the increase in the number\
  \ of grandmasters and higher Elo ratings of the top players reflect an actual increase\
  \ in the average standard of play, rather than \"rating inflation\" or \"title inflation\"\
  .[138]\n\n\nOrganized chess even for young children has become common. FIDE holds\
  \ world championships for age levels down to 8 years old. The largest tournaments,\
  \ in number of players, are those held for children.[139]\n\n\nIn 1993, Garry Kasparov\
  \ and Nigel Short broke ties with FIDE to organize their own match for the World\
  \ Championship and formed a competing Professional Chess Association (PCA). From\
  \ then until 2006, there were two simultaneous World Championships and respective\
  \ World Champions: the PCA or \"classical\" champions extending the Steinitzian\
  \ tradition in which the current champion plays a challenger in a series of games,\
  \ and the other following FIDE's new format of many players competing in a large\
  \ knockout tournament to determine the champion. Kasparov lost his PCA title in\
  \ 2000 to Vladimir Kramnik of Russia.[140] Due to the complicated state of world\
  \ chess politics and difficulties obtaining commercial sponsorships, Kasparov was\
  \ never able to challenge for the title again. Despite this, he continued to dominate\
  \ in top level tournaments and remained the world's highest-rated player until his\
  \ retirement from competitive chess in 2005.\n\n\nThe World Chess Championship 2006,\
  \ in which Kramnik beat the FIDE World Champion Veselin Topalov, reunified the titles\
  \ and made Kramnik the undisputed World Chess Champion.[141] In September 2007,\
  \ he lost the title to Viswanathan Anand of India. Anand defended his title in the\
  \ revenge match of 2008,[142] 2010 and 2012. Magnus Carlsen defeated Anand in 2013,\
  \ defending his title in 2014, 2016, 2018, and 2021, whereafter he announced that\
  \ he would not defend his title a fifth time. The 2023 championship was played between\
  \ the winner and runner-up of the Candidates Tournament 2022: Ian Nepomniachtchi\
  \ of Russia and Ding Liren of China. Ding beat Nepomniachtchi, making him the world\
  \ champion.[47] In 2024, Gukesh Dommaraju of India beat Ding. Carlsen has however\
  \ remained the world's highest-rated player.\n\n\nIn the Middle Ages and during\
  \ the Renaissance, chess was a part of noble culture; it was used to teach war strategy\
  \ and was dubbed the \"King's Game\".[143] Gentlemen are \"to be meanly seene in\
  \ the play at Chestes\", says the overview at the beginning of Baldassare Castiglione's\
  \ The Book of the Courtier (1528, English 1561 by Sir Thomas Hoby), but chess should\
  \ not be a gentleman's main passion. Castiglione explains it further:\n\n\n And\
  \ what say you to the game at chestes? It is truely an honest kynde of enterteynmente\
  \ and wittie, quoth Syr Friderick. But me think it hath a fault, whiche is, that\
  \ a man may be to couning at it, for who ever will be excellent in the playe of\
  \ chestes, I beleave he must beestowe much tyme about it, and applie it with so\
  \ much study, that a man may assoone learne some noble scyence, or compase any other\
  \ matter of importaunce, and yet in the ende in beestowing all that laboure, he\
  \ knoweth no more but a game. Therfore in this I beleave there happeneth a very\
  \ rare thing, namely, that the meane is more commendable, then the excellency.[144]\n\
  \n\nSome of the elaborate chess sets used by the aristocracy at least partially\
  \ survive, such as the Lewis chessmen.\n\n\nChess was often used as a basis of sermons\
  \ on morality. An example is Liber de moribus hominum et officiis nobilium sive\
  \ super ludo scacchorum ('Book of the customs of men and the duties of nobles or\
  \ the Book of Chess'), written by an Italian Dominican friar Jacobus de Cessolis\
  \ c. 1300. This book was one of the most popular of the Middle Ages.[145] The work\
  \ was translated into many other languages (the first printed edition was published\
  \ at Utrecht in 1473) and was the basis for William Caxton's The Game and Playe\
  \ of the Chesse (1474), one of the first books printed in English.[146] Different\
  \ chess pieces were used as metaphors for different classes of people, and human\
  \ duties were derived from the rules of the game or from visual properties of the\
  \ chess pieces:[147]\n\n\n The knyght ought to be made alle armed upon an hors in\
  \ suche wyse that he haue an helme on his heed and a spere in his ryght hande/ and\
  \ coueryd wyth his sheld/ a swerde and a mace on his lyft syde/ Cladd wyth an hawberk\
  \ and plates to fore his breste/ legge harnoys on his legges/ Spores on his heelis\
  \ on his handes his gauntelettes/ his hors well broken and taught and apte to bataylle\
  \ and couerid with his armes/ whan the knyghtes ben maad they ben bayned or bathed/\
  \ that is the signe that they shold lede a newe lyf and newe maners/ also they wake\
  \ alle the nyght in prayers and orysons vnto god that he wylle gyue hem grace that\
  \ they may gete that thynge that they may not gete by nature/ The kynge or prynce\
  \ gyrdeth a boute them a swerde in signe/ that they shold abyde and kepe hym of\
  \ whom they take theyr dispenses and dignyte.[148]\n\n\nKnown in the circles of\
  \ clerics, students, and merchants, chess entered into the popular culture of the\
  \ Middle Ages. An example is the 209th song of Carmina Burana from the 13th century,\
  \ which starts with the names of chess pieces, Roch, pedites, regina...[149] The\
  \ game of chess, at times, has been discouraged by various religious authorities\
  \ in Middle Ages: Jewish,[150] Catholic and Orthodox.[151] Some Muslim authorities\
  \ prohibited it even recently, for example Ruhollah Khomeini in 1979 and Abdul-Aziz\
  \ ash-Sheikh even later.[152]\n\n\nDuring the Age of Enlightenment, chess was viewed\
  \ as a means of self-improvement. Benjamin Franklin, in his article \"The Morals\
  \ of Chess\" (1786), wrote:\n\n\n The Game of Chess is not merely an idle amusement;\
  \ several very valuable qualities of the mind, useful in the course of human life,\
  \ are to be acquired and strengthened by it, so as to become habits ready on all\
  \ occasions; for life is a kind of Chess, in which we have often points to gain,\
  \ and competitors or adversaries to contend with, and in which there is a vast variety\
  \ of good and ill events, that are, in some degree, the effect of prudence, or the\
  \ want of it. By playing at Chess then, we may learn:\n\n\nI. Foresight, which looks\
  \ a little into futurity, and considers the consequences that may attend an action\
  \ ...\n\n\nII. Circumspection, which surveys the whole Chess-board, or scene of\
  \ action: – the relation of the several Pieces, and their situations ...\n\n\nIII.\
  \ Caution, not to make our moves too hastily ...[153]\n\n\nChess was occasionally\
  \ criticized in the 19th century as a waste of time.[154][155]\n\n\nChess is taught\
  \ to children in schools around the world today. Many schools host chess clubs,\
  \ and there are many scholastic tournaments specifically for children. Tournaments\
  \ are held regularly in many countries, hosted by organizations such as the United\
  \ States Chess Federation and the National Scholastic Chess Foundation.[156]\n\n\
  \nChess is many times depicted in the arts; significant works where chess plays\
  \ a key role range from Thomas Middleton's A Game at Chess to Through the Looking-Glass\
  \ by Lewis Carroll, to Vladimir Nabokov's The Defense, to The Royal Game by Stefan\
  \ Zweig. Chess has also featured in film classics such as Ingmar Bergman's The Seventh\
  \ Seal, Satyajit Ray's The Chess Players, and Powell and Pressburger's A Matter\
  \ of Life and Death.\n\n\nChess is also present in contemporary popular culture.\
  \ For example, the characters in Star Trek play a futuristic version of the game\
  \ called \"Federation Tri-Dimensional Chess\",[157] and \"Wizard's Chess\" is played\
  \ in J.K. Rowling's Harry Potter.[158]\n\n\nThe game structure and nature of chess\
  \ are related to several branches of mathematics. Many combinatorical and topological\
  \ problems connected to chess, such as the knight's tour and the eight queens puzzle,\
  \ have been known for hundreds of years.\n\n\nThe number of legal positions in chess\
  \ is estimated to be (4.59 ± 0.38) × 1044 with a 95% confidence level,[159] with\
  \ a game-tree complexity of approximately 10123. The game-tree complexity of chess\
  \ was first calculated by Claude Shannon as 10120, a number known as the Shannon\
  \ number.[160] An average position typically has thirty to forty possible moves,\
  \ but there may be as few as zero (in the case of checkmate or stalemate) or (in\
  \ a constructed position) as many as 218.[161]\n\n\nIn 1913, Ernst Zermelo used\
  \ chess as a basis for his theory of game strategies, which is considered one of\
  \ the predecessors of game theory.[162] Zermelo's theorem states that it is possible\
  \ to solve chess, i.e. to determine with certainty the outcome of a perfectly played\
  \ game (either White can force a win, or Black can force a win, or both sides can\
  \ force at least a draw).[163] With 1043 legal positions in chess, however, it will\
  \ take an impossibly long time to compute a perfect strategy with any feasible technology.[164]\n\
  \n\nA novel methodology in steganography explores the use of chess-based covers\
  \ (such as puzzles, chess problems, game reports, training documents, news articles,\
  \ etc.) for concealing data within a selection of moves, each hiding some bits.[165][166]\
  \ Several proof-of-concept projects have been developed that convert text or files\
  \ into binary code, which is then converted into a series of legal chess moves,\
  \ that can then be decrypted and downloaded.[167]\n\n\nCorrespondence chess has\
  \ been historically suspected of being a potential steganographic medium. Melville\
  \ Davisson Post documented a chess problem that was used to create a pictorial cipher\
  \ during World War I.[168][169] During World War II, extensive postal censorship\
  \ was imposed on military personnel from the United States and Canada that made\
  \ playing correspondence chess impossible, arising from suspicion that chess could\
  \ be used to send secret messages to the enemies.[170]\n\n\nThere is an extensive\
  \ scientific literature on chess psychology.[note 6][172][173][174][175] Alfred\
  \ Binet and others showed that knowledge and verbal, rather than visuospatial, ability\
  \ lies at the core of expertise.[176][177] In his doctoral thesis, Adriaan de Groot\
  \ showed that chess masters can rapidly perceive the key features of a position.[178]\
  \ According to de Groot, this perception, made possible by years of practice and\
  \ study, is more important than the sheer ability to anticipate moves. De Groot\
  \ showed that chess masters can memorize positions shown for a few seconds almost\
  \ perfectly. The ability to memorize does not alone account for chess-playing skill,\
  \ since masters and novices, when faced with random arrangements of chess pieces,\
  \ had equivalent recall (about six positions in each case). Rather, it is the ability\
  \ to recognize patterns, which are then memorized, which distinguished the skilled\
  \ players from the novices. When the positions of the pieces were taken from an\
  \ actual game, the masters had almost total positional recall.[179]\n\n\nMore recent\
  \ research has focused on chess as mental training; the respective roles of knowledge\
  \ and look-ahead search; brain imaging studies of chess masters and novices; blindfold\
  \ chess; the role of personality and intelligence in chess skill; gender differences;\
  \ and computational models of chess expertise. The role of practice and talent in\
  \ the development of chess and other domains of expertise has led to much empirical\
  \ investigation. Ericsson and colleagues have argued that deliberate practice is\
  \ sufficient for reaching high levels of expertise in chess.[180] Recent research,\
  \ however, fails to replicate their results and indicates that factors other than\
  \ practice are also important.[181][182]\nFor example, Fernand Gobet and colleagues\
  \ have shown that stronger players started playing chess at a young age and that\
  \ experts born in the Northern Hemisphere are more likely to have been born in late\
  \ winter and early spring. Compared to the general population, chess players are\
  \ more likely to be non-right-handed, though they found no correlation between handedness\
  \ and skill.[182]\n\n\nA relationship between chess skill and intelligence has long\
  \ been discussed in scientific literature as well as in popular culture. Academic\
  \ studies that investigate the relationship date back at least to 1927.[183] Although\
  \ one meta-analysis and most children studies find a positive correlation between\
  \ general cognitive ability and chess skill, adult studies show mixed results.[184][185]\n\
  \n\nOnline chess is chess played over the internet. This is done through the use\
  \ of internet chess platforms, which use Elo ratings or similar systems to pair\
  \ up individual players. Online chess saw a spike in growth during the quarantines\
  \ of the COVID-19 pandemic.[186][187] This can be attributed to both isolation and\
  \ the popularity of Netflix miniseries The Queen's Gambit, which was released in\
  \ October 2020.[186][187] Chess app downloads on the App Store and Google Play Store\
  \ rose by 63% after the show debuted.[188] Chess.com saw more than twice as many\
  \ account registrations in November as it had in previous months, and the number\
  \ of games played monthly on Lichess doubled as well. There was also a demographic\
  \ shift in players, with female registration on Chess.com shifting from 22% to 27%\
  \ of new players.[189] GM Maurice Ashley said \"A boom is taking place in chess\
  \ like we have never seen maybe since the Bobby Fischer days\", attributing the\
  \ growth to an increased desire to do something constructive during the pandemic.[190]\
  \ USCF Women's Program Director Jennifer Shahade stated that chess works well on\
  \ the internet, since pieces do not need to be reset and matchmaking is virtually\
  \ instant.[191]\n\n\nThe idea of creating a chess-playing machine dates to the 18th century;\
  \ around 1769, the chess-playing automaton called The Turk became famous before\
  \ being exposed as a hoax.[192] Serious trials based on automata, such as El Ajedrecista,\
  \ were too complex and limited to be useful. Since the advent of the digital computer\
  \ in the 1950s, chess enthusiasts, computer engineers, and computer scientists have\
  \ built, with increasing degrees of seriousness and success, chess-playing machines\
  \ and computer programs.[193] The groundbreaking paper on computer chess, \"Programming\
  \ a Computer for Playing Chess\", was published in 1950 by Claude Shannon.[note\
  \ 7] He wrote:\n\n\n The chess machine is an ideal one to start with, since: (1)\
  \ the problem is sharply defined both in allowed operations (the moves) and in the\
  \ ultimate goal (checkmate); (2) it is neither so simple as to be trivial nor too\
  \ difficult for satisfactory solution; (3) chess is generally considered to require\
  \ \"thinking\" for skillful play; a solution of this problem will force us either\
  \ to admit the possibility of a mechanized thinking or to further restrict our concept\
  \ of \"thinking\"; (4) the discrete structure of chess fits well into the digital\
  \ nature of\n\n\nmodern computers.[195]\n\n\nThe Association for Computing Machinery\
  \ (ACM) held the first major chess tournament for computers, the North American\
  \ Computer Chess Championship, in September 1970. CHESS 3.0, a chess program from\
  \ Northwestern University, won the championship. The first World Computer Chess\
  \ Championship, held in 1974, was won by the Soviet program Kaissa. At first considered\
  \ only a curiosity, the best chess playing programs have become extremely strong.\
  \ In 1997, a computer won a chess match using classical time controls against a\
  \ reigning World Champion for the first time: IBM's Deep Blue beat Garry Kasparov\
  \ 3½–2½ (it scored two wins, one loss, and three draws).[196][197] There was some\
  \ controversy over the match,[198] and human–computer matches were relatively close\
  \ over the next few years, until convincing computer victories in 2005 and in 2006.\n\
  \n\nIn 2009, a mobile phone won a category 6 tournament with a performance rating\
  \ of 2898: chess engine Hiarcs 13 running on the mobile phone HTC Touch HD won the\
  \ Copa Mercosur tournament with nine wins and one draw.[199] The best chess programs\
  \ are now able to consistently beat the strongest human players, to the extent that\
  \ human–computer matches no longer attract interest from chess players or the media.[200]\
  \ While the World Computer Chess Championship still exists, the Top Chess Engine\
  \ Championship (TCEC) is widely regarded as the unofficial world championship for\
  \ chess engines.[201][202][203] The current champion is Stockfish.\n\n\nWith huge\
  \ databases of past games and high analytical ability, computers can help players\
  \ to learn chess and prepare for matches. Internet Chess Servers allow people to\
  \ find and play opponents worldwide. The presence of computers and modern communication\
  \ tools have raised concerns regarding cheating during games.[204]\n\n\nRelated\
  \ games include:\n\n\nIn the comparison of chess with games often referred to as\
  \ national forms of chess, chess may be referred to as Western chess or international\
  \ chess.[205][206]\n\n\nThere are more than two thousand published chess variants,\
  \ games with similar but different rules,[207] most of which are of relatively recent\
  \ origin.[208]\n\n\nThey include modern variations employing different rules (e.g.\
  \ losing chess and Chess960[note 8]), different armies (e.g. Dunsany's chess), non-standard\
  \ pieces (e.g. Capablanca chess and Falcon–hunter chess), and different board geometries\
  \ (e.g. hexagonal chess and infinite chess). In the context of chess variants, chess\
  \ is commonly referred to as orthodox chess, orthochess, and classic chess.[205][206]\n"
