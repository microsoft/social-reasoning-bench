content: "\n\n\nCoffee is a beverage brewed from roasted, ground coffee beans. Darkly\
  \ colored, bitter, and slightly acidic, coffee has a stimulating effect on humans,\
  \ primarily due to its caffeine content, but decaffeinated coffee is also commercially\
  \ available. There are also various coffee substitutes. \n\n\nCoffee production\
  \ begins when the seeds from coffee cherries (the Coffea plant's fruits) are separated\
  \ to produce unroasted green coffee beans. The \"beans\" are roasted and then ground\
  \ into fine particles. Coffee is brewed from the ground roasted beans, which are\
  \ typically steeped in hot water before being filtered out. It is usually served\
  \ hot, although chilled or iced coffee is common. Coffee can be prepared and presented\
  \ in a variety of ways (e.g., espresso, French press, caffè latte, or already-brewed\
  \ canned coffee). Sugar, sugar substitutes, milk, and cream are often added to mask\
  \ the bitter taste or enhance the flavor.\n\n\nThough coffee has become a global\
  \ commodity, it has a long history tied closely to food traditions around the Red\
  \ Sea. The earliest credible reports of coffee drinking pertain to the plant's use\
  \ among the Sufis of Yemen (southern Arabia) in the middle of the 15th century.[4][5]\
  \ Up to the end of the 17th century, most of the world's coffee was imported from\
  \ Yemen. As it gained in popularity, coffee started to be cultivated in Java in\
  \ the 17th century and the Americas from the 18th century.[6]\n\n\nThe two most\
  \ commonly grown coffee bean types are C. arabica and C. robusta.[7] Coffee plants\
  \ are cultivated in over 70 countries, primarily in the equatorial regions of the\
  \ Americas, Southeast Asia, the Indian subcontinent, and Africa. Green, unroasted\
  \ coffee is traded as an agricultural commodity. The global coffee industry is worth\
  \ $495.50 billion, as of 2023.[8] In 2023, Brazil was the leading grower of coffee\
  \ beans, producing 31% of the world's total, followed by Vietnam. While coffee sales\
  \ reach billions of dollars annually worldwide, coffee farmers disproportionately\
  \ live in poverty. Critics of the coffee industry have pointed to its negative impact\
  \ on the environment, including clearing of land for coffee growing and water use.\n\
  \n\nThe word coffee entered the English language in 1582 via the Dutch koffie, borrowed\
  \ from the Ottoman Turkish kahve (قهوه), borrowed in turn from the Arabic qahwah\
  \ (قَهْوَة).[9] Medieval Arabic lexicons traditionally held that the etymology of\
  \ qahwah meant 'wine', given its distinctly dark color, and was derived from the\
  \ verb qahiya (قَهِيَ), 'to have no appetite'.[10] The word qahwah most likely meant\
  \ 'the dark one', referring to the brew or the bean; qahwah is not the name of the\
  \ bean, which are known in Arabic as bunn and in Cushitic languages as būn. Semitic\
  \ languages have the root qhh, 'dark color', which became a natural designation\
  \ for the beverage. Its cognates include the Hebrew qehe(h) 'dulling' and the Aramaic\
  \ qahey ('give acrid taste to').[10] Although etymologists have connected it with\
  \ a word meaning 'wine', it is also thought to be from the Kaffa region of Ethiopia.[11]\n\
  \n\nThe terms coffee pot and coffee break originated in 1705 and 1952, respectively.[12]\n\
  \n\nThere are multiple anecdotal origin stories which lack evidence.  Ralph S. Hattox\
  \ records traditions in which the Prophet Muhammad is said to have been introduced\
  \ to a stimulating beverage by the Angel Gabriel, who recommended it for its restorative\
  \ qualities.[13] In another commonly repeated legend, Kaldi, a 9th-century Ethiopian\
  \ or Arab goatherd[14][15][16], first observed the coffee plant after seeing his\
  \ flock energized by chewing on the plant.[4] This legend does not appear before\
  \ 1671, indicating the story is likely apocryphal, first being related by Antoine\
  \ Faustus Nairon, a Maronite professor of Oriental languages and author of one of\
  \ the first printed treatises devoted to coffee, De Saluberrima potione Cahue seu\
  \ Cafe nuncupata Discurscus (Rome, 1671), which describes a camel or goat herder\
  \ in the Kingdom of Ayaman, Arabia Felix.[17][18][19][4] The herder is unnamed in\
  \ the earliest account and the name Kaldi appears to be a later invention the twentieth\
  \ century.[20] Another legend attributes the discovery of coffee to a Sheikh Omar.\
  \ Starving after being exiled from Mokha, Omar found berries. After attempting to\
  \ chew and roast them, Omar boiled them, which yielded a liquid that revitalized\
  \ and sustained him.[1]\n\n\nThe earliest possible references to the coffee bean\
  \ and its qualities appear in al-Razi's 10th-century al-Hawi[a] and in Avicenna's\
  \ 11th-century The Canon of Medicine[21][b] both which describe a plant component\
  \ called bunchum as hot and dry[c]—with al-Razi reporting beneficial effects for\
  \ the stomach and Ibn Sina also adding claims for the skin and body odor. According\
  \ to later accounts, bunchum was made from a root rather than from coffee beans.[22][23]\
  \ There is no confirmed evidence, either historical or archaeological, of coffee\
  \ as a drink being consumed before the 15th century. The drink appears to be a relatively\
  \ recent development. By the late 15th century, coffee drinking was well established\
  \ among Sufi communities in Yemen.[22][24]\n\n\nAn early writer on coffee was Abd\
  \ al-Qadir al-Jaziri of Ottoman Iraq, who in 1587 compiled a work tracing the history\
  \ and legal controversies of coffee in his ʿUmdat al-ṣafwa fī ḥill al-qahwa (عمدة\
  \ الصفوة في حل القهوة), in which he claims that the coffee bean originated in the\
  \ \"land of Sa'ad ad-Din, and the country of Abyssinia, and of the Jabart, and other\
  \ places of the land of ‘Ajam, but the time of its first use is unknown, nor do\
  \ we know the reason.\" Al-Jazīrī asserts that coffee was introduced to Cairo at\
  \ the start of the 16th century by Sufi devotees.[25]\n\n\nCoffee appears to have\
  \ been likely collected from wild, with some indications that its use expanded from\
  \ the 14th century among certain Islamized groups in southeastern Ethiopia, though\
  \ direct evidence for early consumption remains scarce. The use of coffee is believed\
  \ to have spread across the Red Sea to the Rasulid sultanate of Yemen, who maintained\
  \ cultural and commercial ties with the Adal Sultanate. Its consumption first appears\
  \ in Yemen, particularly in regions such as Aden, Mocha and Zabid during the 15th\
  \ century.[26][27] The 16th-century scholar Ibn Hajar al-Haytami writes about the\
  \ plant's development from a tree in the Zeila region.[28] In 1542, a Portuguese\
  \ crew met with a ship from Zeila transporting clarified butter and coffee to Al-Shihr\
  \ in Yemen.[29]\n\n\nOther sources of coffee drinking or knowledge of the coffee\
  \ tree appear in the middle of the 15th century in the accounts of Ahmed al-Ghaffar\
  \ in Yemen,[4] where coffee seeds were first roasted and brewed in a similar way\
  \ to how it is prepared now. Coffee was used by Sufi circles to stay awake for their\
  \ religious rituals.[31] Accounts differ on the origin of the coffee plant before\
  \ its appearance in Yemen. Coffee may have been introduced to Yemen from Ethiopia\
  \ via the Red Sea trade.[32] One account credits Muhammad Ibn Sa'd al-Dhabḥani for\
  \ bringing coffee to Aden from the Somali coast,[33] other early accounts say Ali\
  \ ben Omar of the Shadhili Sufi order was the first to introduce coffee to Arabia.[33][34][31]\
  \ By the 16th century, coffee had reached the rest of the Middle East and North\
  \ Africa.[35]\n\n\nIn 1583, Leonhard Rauwolf, a German physician, gave this description\
  \ of coffee after returning from a ten-year trip to the Near East:\n\n\nA beverage\
  \ as black as ink, useful against numerous illnesses, particularly those of the\
  \ stomach. Its consumers take it in the morning, quite frankly, in a porcelain cup\
  \ passed around and from which each one drinks a cupful. It is composed of water\
  \ and the fruit from a bush called bunnu.\n\n— Léonard Rauwolf, Reise in die Morgenländer\
  \ (in German)\n\nWithin the Ottoman Empire, the first coffeehouse opened in 1555\
  \ in Tahtakale, Istanbul.[36] Since Tahtakale is to the West of the Bosporus, this\
  \ would likely have been the first coffee house in Europe. Thriving trade brought\
  \ many goods, including coffee, from the Ottoman Empire to Venice. Coffee became\
  \ more widely accepted in Europe after Pope Clement VIII declared it a Christian\
  \ beverage in 1600, despite appeals to ban the \"Muslim drink\". Coffee had spread\
  \ to Italy by 1600 and then to the rest of Europe, Indonesia, and the Americas.[37]\
  \ The first European coffeehouse outside of the Ottoman Empire opened in Venice\
  \ in 1647.[38]\n\n\nThe Dutch East India Company was the first to import coffee\
  \ on a large scale.[1] The Dutch later grew the crop in Java and Ceylon.[39] The\
  \ first exports of Indonesian coffee from Java to the Netherlands occurred in 1711.[40]\n\
  \n\nThrough the efforts of the British East India Company, coffee became popular\
  \ in England. In a diary entry of May 1637, John Evelyn records tasting the drink\
  \ at Oxford, where it had been brought by a student of Balliol College from Crete\
  \ named Nathaniel Conopios of Crete.[41][42] Oxford's Queen's Lane Coffee House,\
  \ established in 1654, is still in existence today. Coffee was introduced in France\
  \ in 1657 and in Austria and Poland after the 1683 Battle of Vienna, when coffee\
  \ was captured from supplies of the defeated Turks.[43]\n\n\nWhen coffee reached\
  \ North America during the Colonial period, it was initially not as successful as\
  \ in Europe, as alcoholic beverages remained more popular. During the Revolutionary\
  \ War, the demand for coffee increased so much that dealers had to hoard their scarce\
  \ supplies and raise prices dramatically; this was also due to the reduced availability\
  \ of tea from British merchants,[44] and a general resolution among many Americans\
  \ to avoid drinking tea following the 1773 Boston Tea Party.[45]\n\n\nDuring the\
  \ 18th century, coffee consumption declined in Britain, giving way to tea drinking.\
  \ Tea was simpler to make and had become cheaper with the British conquest of India\
  \ and the tea industry there.[46] During the Age of Sail, seamen aboard ships of\
  \ the British Royal Navy made substitute coffee by dissolving burnt bread in hot\
  \ water.[47] According to Captain Haines, who was the colonial administrator of\
  \ Aden (1839–1854), Mokha historically imported up to two-thirds of its coffee from\
  \ Berbera-based merchants before the coffee trade of Mokha was captured by British-controlled\
  \ Aden in the 19th century. After that, much of the Ethiopian coffee was exported\
  \ to Aden via Berbera.[48]\n\n\nFrenchman Gabriel de Clieu took a coffee plant to\
  \ the French territory of Martinique in the Caribbean in the 1720s,[49] from which\
  \ much of the world's cultivated arabica coffee is descended. Coffee thrived in\
  \ the climate and was conveyed across the Americas.[50] Coffee was cultivated in\
  \ Saint-Domingue (now Haiti) from 1734, and by 1788 it had supplied half the world's\
  \ coffee.[51] The conditions that the enslaved people worked in on coffee plantations\
  \ were a factor in the Haitian Revolution, and the coffee industry never fully recovered\
  \ there.[52]\n\n\n\nIn the late 16th century, Yemen developed a booming coffee economy.\
  \ Farmers grew coffee on mountain terraces above the Tihamah plain, and trade routes\
  \ linked its ports to Jeddah and Cairo. By the 17th century, coffee had surpassed\
  \ the global spice trade.[53] Up to the end of the 17th century, Yemen was the world's\
  \ main producer for coffee, and Mocha was the world's largest shipping port for\
  \ coffee.[6][54] \n\nMeanwhile, coffee had been introduced to Brazil in 1727, although\
  \ its cultivation did not gather momentum until independence in 1822.[55] After\
  \ this time, massive tracts of rainforest were cleared for coffee plantations, first\
  \ in the vicinity of Rio de Janeiro and later São Paulo.[56] Brazil went from having\
  \ essentially no coffee exports in 1800 to being a significant regional producer\
  \ in 1830, to being the largest producer in the world by 1852. Between 1910 and\
  \ 1920, Brazil exported around 70% of the world's coffee; Colombia, Guatemala, and\
  \ Venezuela exported 15%; and Old World production accounted for less than 5% of\
  \ world exports.[57]\n\n\nMany countries in Central America took up cultivation\
  \ in the latter half of the 19th century, and almost all were involved in the large-scale\
  \ displacement and exploitation of indigenous people. Harsh conditions led to many\
  \ uprisings, coups, and bloody suppression of peasants.[58] The notable exception\
  \ was Costa Rica, where a lack of ready labor prevented the formation of large farms.\
  \ Smaller farms and more egalitarian conditions ameliorated unrest over the 19th\
  \ and 20th centuries.[59]\n\n\nRapid growth in coffee production in South America\
  \ during the second half of the 19th century was matched by an increase in consumption\
  \ in developed countries, though nowhere has this growth been as pronounced as in\
  \ the United States, where a high rate of population growth was compounded by doubling\
  \ of per capita consumption between 1860 and 1920. Though the United States was\
  \ not the heaviest coffee-drinking nation at the time (Belgium, the Netherlands\
  \ and Nordic countries all had comparable or higher levels of per capita consumption),\
  \ due to its sheer size, it was already the largest consumer of coffee in the world\
  \ by 1860, and, by 1920, around half of all coffee produced worldwide was consumed\
  \ in the US.[57]\n\n\n\nCoffee has become a vital cash crop for many developing\
  \ countries. Over 100 million people in developing countries have become dependent\
  \ on coffee as their primary source of income. It has become the primary export\
  \ and economic backbone for African countries like Uganda, Burundi, Rwanda, and\
  \ Ethiopia,[60] as well as many Central American countries.\n\nSeveral species of\
  \ shrub of the genus Coffea produce the berries from which coffee is extracted.\
  \ The two main species commercially cultivated are C. canephora (predominantly a\
  \ form known as 'robusta') and C. arabica.[61] C. arabica, the most highly regarded\
  \ species, is native to the southwestern highlands of Ethiopia, the Boma Plateau\
  \ in southeastern Sudan, and Mount Marsabit in northern Kenya.[62] C. canephora\
  \ is native to western and central Subsaharan Africa, from Guinea to Uganda and\
  \ southern Sudan.[63] Less popular species are C. liberica, C. stenophylla, C. mauritiana,\
  \ and C. racemosa.\n\n\nAll coffee plants are classified in the family Rubiaceae.\
  \ They are evergreen shrubs or trees that may grow 5 m (15 ft) tall when unpruned.\
  \ The leaves are dark green and glossy, usually 10–15 cm (4–6 in) long and 6 cm\
  \ (2.4 in) wide, simple, entire, and opposite. Petioles of opposite leaves fuse\
  \ at the base to form interpetiolar stipules, characteristic of Rubiaceae. The flowers\
  \ are axillary, and clusters of fragrant white flowers bloom simultaneously. Gynoecium\
  \ consists of an inferior ovary, also characteristic of Rubiaceae. The flowers are\
  \ followed by oval berries of about 1.5 cm (0.6 in).[64] When immature, they are\
  \ green, and they ripen to yellow, then crimson, before turning black on drying.\
  \ Each berry usually contains two seeds, but 5–10% of the berries[65] have only\
  \ one; these are called peaberries.[66] Arabica berries ripen in six to eight months,\
  \ while robusta takes nine to eleven months.[67]\n\n\nC. arabica is predominantly\
  \ self-pollinating, and as a result the seedlings are generally uniform and vary\
  \ little from their parents. In contrast, C. canephora and C. liberica are self-incompatible\
  \ and require outcrossing. This means that useful forms and hybrids must be propagated\
  \ vegetatively.[68] Cuttings, grafting, and budding are the usual methods of vegetative\
  \ propagation.[69] On the other hand, there is great scope for experimentation in\
  \ search of potential new strains.[68]\n\n\nThe traditional method of planting coffee\
  \ is to place 20 seeds in each hole at the beginning of the rainy season. This method\
  \ loses about 50% of the seeds' potential, as about half fail to sprout. A more\
  \ effective process of growing coffee, used in Brazil, is to raise seedlings in\
  \ nurseries that are then planted outside after six to twelve months. Coffee is\
  \ often intercropped with food crops, such as corn, beans, or rice during the first\
  \ few years of cultivation as farmers become familiar with its requirements.[64]\
  \ Coffee plants grow within a defined area between the tropics of Cancer and Capricorn,\
  \ termed the bean belt or coffee belt.[70]\n\n\nIn 2020, the world production of\
  \ green coffee beans was 175,647,000 60 kg bags, led by Brazil with 39% of the total,\
  \ followed by Vietnam, Colombia, and Indonesia.[71] Brazil is the largest coffee\
  \ exporting nation, accounting for 15% of all world exports in 2019.[72] As of 2021,\
  \ no synthetic coffee products are publicly available but multiple bioeconomy companies\
  \ have reportedly produced first batches that are highly similar on the molecular\
  \ level and are close to commercialization.[73][74][75]\n\n\nOf the two main species\
  \ grown, arabica coffee (from C. arabica) is generally more highly regarded than\
  \ robusta coffee (from C. canephora). Robusta coffee tends to be bitter and has\
  \ less flavor but a better body than arabica. For these reasons, about three-quarters\
  \ of the coffee cultivated worldwide is C. arabica.[61] Robusta strains contain\
  \ about 40–50% more caffeine than arabica.[76] Consequently, this species is used\
  \ as an inexpensive substitute for arabica in many commercial coffee blends. Good\
  \ quality robusta beans are used in traditional Italian espresso blends to provide\
  \ a full-bodied taste and a better foam head (known as crema).\n\n\nAdditionally,\
  \ robusta is less susceptible to disease than arabica and can be cultivated in lower\
  \ altitudes and warmer climates where arabica does not thrive.[78] The robusta strain\
  \ was first collected in 1890 from the Lomani River, a tributary of the Congo River,\
  \ and was conveyed from the Congo Free State (now the Democratic Republic of the\
  \ Congo) to Brussels to Java around 1900. From Java, further breeding resulted in\
  \ the establishment of robusta plantations in many countries.[77] In particular,\
  \ the spread of the devastating coffee leaf rust (caused by the fungal pathogen\
  \ Hemileia vastatrix) hastened the uptake of the resistant robusta. The pathogen\
  \ results in light, rust-colored spots on the undersides of coffee plant leaves.[79]\
  \ It grows exclusively on the leaves of coffee plants.[80] Coffee leaf rust is found\
  \ in virtually all countries that produce coffee.[81]\n\n\nBeans from different\
  \ countries or regions can usually be distinguished by differences in flavor, aroma,\
  \ body, and acidity.[82] These taste characteristics are dependent on the coffee's\
  \ growing region, genetic subspecies (varietals), and processing.[83] Varietals\
  \ are generally known by the region in which they are grown, such as Colombian,\
  \ Java, and Kona. Arabica coffee beans are cultivated mainly in Latin America, eastern\
  \ Africa or Asia, while robusta beans are grown in central Africa, southeast Asia,\
  \ and Brazil.[61]\n\n\nCoffee wilt disease or tracheomycosis is a common vascular\
  \ wilt found in Eastern and Central Africa that can kill coffee trees it infects.\
  \ It is induced by the fungal pathogen Gibberella xylarioides. It can affect several\
  \ Coffea species and could potentially threaten production worldwide.[84] Mycena\
  \ citricolor, American leaf spot, is a fungus that can affect the entire coffee\
  \ plant. It grows on leaves, resulting in leaves with holes that often fall from\
  \ the plant. It is a threat primarily in Latin America.[85]\n\n\nOver 900 species\
  \ of insect have been recorded as pests of coffee crops worldwide. Of these, over\
  \ a third are beetles, and over a quarter are bugs. Some 20 species of nematodes,\
  \ 9 species of mites, and several snails and slugs also attack the crop. Birds and\
  \ rodents sometimes eat coffee berries, but their impact is minor compared to invertebrates.[87]\
  \ In general, C. arabica is the more sensitive species to invertebrate predation\
  \ overall. Each part of the coffee plant is assailed by different animals. Nematodes\
  \ attack the roots, coffee borer beetles burrow into stems and woody material,[88]\
  \ and the foliage is attacked by over 100 species of larvae of butterflies and moths.[89]\n\
  \n\nMass spraying of insecticides has often proven disastrous, as predators of the\
  \ pests are more sensitive than the pests themselves.[90] Instead, integrated pest\
  \ management has been developed, using techniques such as targeted treatment of\
  \ pest outbreaks and managing crop environment away from conditions favoring pests.\
  \ Branches infested with scale are often cut and left on the ground, which causes\
  \ scale parasites to attack the scale on the fallen branches as well as in the plant.[91]\n\
  \n\nThe 2-mm-long coffee borer beetle (Hypothenemus hampei) is the most damaging\
  \ insect pest of the world's coffee industry, destroying up to 50 percent or more\
  \ of the coffee berries on plantations in most coffee-producing countries. The adult\
  \ female beetle nibbles a single tiny hole in a coffee berry and lays 35 to 50 eggs.\
  \ Inside, the offspring grow, mate, and then emerge from the commercially ruined\
  \ berry to disperse, repeating the cycle. Pesticides are mostly ineffective because\
  \ the beetle juveniles are protected inside the berry nurseries, but they are vulnerable\
  \ to predation by birds when they emerge. When groves of trees are nearby, the American\
  \ yellow warbler, rufous-capped warbler, and other insectivorous birds have been\
  \ shown to reduce by 50 percent the number of coffee berry borers in Costa Rica\
  \ coffee plantations.[86]\n\n\nOriginally, coffee was grown in the shade of trees\
  \ that provided a habitat for many animals and insects.[92] Remnant forest trees\
  \ were used for this purpose, but many species have been planted as well. These\
  \ include leguminous trees of the genera Acacia, Albizia, Cassia, Erythrina, Gliricidia,\
  \ Inga, and Leucaena, as well as the nitrogen-fixing non-legume sheoaks of the genus\
  \ Casuarina, and the silky oak Grevillea robusta.[93] This method is commonly called\
  \ \"shade-grown coffee\". Starting in the 1970s, many farmers switched their production\
  \ methods to sun cultivation, in which coffee is grown in rows under full sun with\
  \ little or no forest canopy. This causes berries to ripen more rapidly and bushes\
  \ to produce higher yields, but the method requires the clearing of trees and increased\
  \ use of fertilizer and pesticides, which damage the environment and cause health\
  \ problems.[94] Unshaded coffee plants grown with fertilizer yield the most coffee,\
  \ although unfertilized shaded crops generally yield more than unfertilized unshaded\
  \ crops: the response to fertilizer is much greater in full sun.[95] While traditional\
  \ coffee production causes berries to ripen more slowly and produce lower yields,\
  \ the quality of the coffee is allegedly superior.[96] According to The International\
  \ Coffee Organization factors such as drought, unfavourable temperature and climate\
  \ change greatly affect coffee quality.[97] In addition, the traditional shaded\
  \ method provides living space for many wildlife species. Proponents of shade cultivation\
  \ say environmental problems such as deforestation, pesticide pollution, habitat\
  \ destruction, and soil and water degradation are the side effects of the practices\
  \ employed in sun cultivation.[92][98] The American Birding Association, Smithsonian\
  \ Migratory Bird Center,[99] National Arbor Day Foundation,[100] and the Rainforest\
  \ Alliance have led a campaign for 'shade-grown' and organic coffees, which can\
  \ be sustainably harvested.[101] Shaded coffee cultivation systems show greater\
  \ biodiversity than full-sun systems, and those more distant from continuous forest\
  \ compare rather poorly to undisturbed native forest in terms of habitat value for\
  \ some bird species.[102][103]\n\n\nCoffee production uses a large volume of water.\
  \ On average it takes about 140 liters (37 U.S. gal) of water to grow the coffee\
  \ beans needed to produce one cup of coffee. Growing the plants needed to produce\
  \ 1 kg (2.2 lb) of roasted coffee in Africa, South America or Asia requires 26,400\
  \ liters (7,000 U.S. gal) of water.[104] As with many other forms of agriculture,\
  \ often much of this is rainwater, much of which would otherwise run off into rivers\
  \ or coastlines, while much water actually absorbed by the plants is transpired\
  \ back into the local environment through the plants' leaves (especially for cooling\
  \ effects); broad estimates aside, consequential margins vary considerably based\
  \ on details of local geography and horticultural practice. Coffee is often grown\
  \ in countries where there is a water shortage, such as Ethiopia.[105]\n\n\nUsed\
  \ coffee grounds may be used for composting or as a mulch. They are especially appreciated\
  \ by worms and acid-loving plants such as blueberries.[106] Climate change may significantly\
  \ impact coffee yields during the 21st century, such as in Nicaragua and Ethiopia\
  \ which could lose more than half of the farming land suitable for growing (Arabica)\
  \ coffee.[107][108][109] As of 2016, at least 34% of global coffee production was\
  \ compliant with voluntary sustainability standards such as Fairtrade, UTZ, and\
  \ 4C (The Common Code for the Coffee Community).[110]\n\n\nCoffee berries are traditionally\
  \ selectively picked by hand, which is labor-intensive as it involves the selection\
  \ of only the berries at the peak of ripeness. More commonly, crops are strip picked,\
  \ where all berries are harvested simultaneously regardless of ripeness by person\
  \ or machine. After picking, green coffee is processed by one of two types of method—a\
  \ dry process method which is often simpler and less labor-intensive, and a wet\
  \ process method, which incorporates batch fermentation, uses larger amounts of\
  \ water in the process, and often yields a milder coffee.[111]\n\n\nThen they are\
  \ sorted by ripeness and color, and most often the flesh of the berry is removed,\
  \ usually by machine, and the seeds are fermented to remove the slimy layer of mucilage\
  \ still present on the seed. When the fermentation is finished, the seeds are washed\
  \ with large quantities of fresh water to remove the fermentation residue, which\
  \ generates massive amounts of coffee wastewater. Finally, the seeds are dried.[112]\n\
  \n\nThe best (but least used) method of drying coffee is using drying tables. In\
  \ this method, the pulped and fermented coffee is spread thinly on raised beds,\
  \ which allows the air to pass on all sides of the coffee, and then the coffee is\
  \ mixed by hand. Drying is more uniform, and fermentation is less likely. Most African\
  \ coffee is dried in this manner, and certain coffee farms around the world are\
  \ starting to use this traditional method.[112] Next, the coffee is sorted, and\
  \ labeled as green coffee. Some companies use cylinders to pump in heated air to\
  \ dry the coffee seeds, though this is generally in places where the humidity is\
  \ very high.[112]\n\n\nAn Asian coffee known as kopi luwak undergoes a peculiar\
  \ process made from coffee berries eaten by the Asian palm civet, passing through\
  \ its digestive tract, with the beans harvested from feces. Coffee brewed from this\
  \ process[113] is among the most expensive in the world, with bean prices reaching\
  \ $160 per pound or $30 per brewed cup.[114] Kopi luwak coffee is said to have a\
  \ uniquely rich, slightly smoky aroma and flavor with hints of chocolate, resulting\
  \ from the action of digestive enzymes breaking down bean proteins to facilitate\
  \ partial fermentation.[113][114] In Thailand, black ivory coffee beans are fed\
  \ to elephants whose digestive enzymes reduce the bitter taste of beans collected\
  \ from dung.[115] These beans sell for up to $1,100 a kilogram ($500 per lb), achieving\
  \ the world's most expensive coffee,[115] three times costlier than palm civet coffee\
  \ beans.[114]\n\n\nThe next step in the process is the roasting of the green coffee.\
  \ Coffee is usually sold in a roasted state, and with rare exceptions, such as infusions\
  \ from green coffee beans,[116] coffee is roasted before it is consumed. It can\
  \ be sold roasted by the supplier, or it can be home roasted.[117] The roasting\
  \ process influences the taste by changing the coffee bean physically and chemically.\
  \ The bean decreases in weight as moisture is lost and increases in volume, causing\
  \ it to become less dense. The density of the bean also influences the strength\
  \ of the coffee and the requirements for packaging.\n\n\nThe actual roasting begins\
  \ when the temperature inside the bean reaches approximately 200 °C (392 °F), though\
  \ different varieties of seeds differ in moisture and density and therefore roast\
  \ at different rates.[118] During roasting, caramelization occurs as intense heat\
  \ breaks down starches, changing them to simple sugars that begin to brown, which\
  \ darkens the color of the bean.[119]\n\n\nSucrose is rapidly lost during the roasting\
  \ process and may disappear entirely in darker roasts. During roasting, aromatic\
  \ oils and acids weaken, changing the flavor; at 205 °C (401 °F), other oils start\
  \ to develop.[118] One of these oils, caffeol, is created at about 200 °C (392 °F),\
  \ and is largely responsible for coffee's aroma and flavor.[39] The difference in\
  \ caffeine content between a light roast and a dark roast is only about 0.1%.[120]\n\
  \n\nDepending on the color of the roasted beans as perceived by the human eye, they\
  \ will be labeled as light, medium light, medium, medium dark, dark, or very dark.\
  \ A more accurate method of discerning the degree of roast involves measuring the\
  \ reflected light from roasted seeds illuminated with a light source in the near-infrared\
  \ spectrum. This elaborate light meter uses a process known as spectroscopy to return\
  \ a number that consistently indicates the roasted coffee's relative degree of roast\
  \ or flavor development. Coffee has, in many countries, been graded by size longer\
  \ than it has been graded by quality. Grading is generally done with sieves, numbered\
  \ to indicate the size of the perforations.[121]\n\n\nThe degree of roast affects\
  \ coffee flavor and body. The color of the coffee after brewing is also affected\
  \ by the degree of roasting.[122] Darker roasts are generally bolder because they\
  \ have less fiber content and a more sugary flavor. Lighter roasts have a more complex\
  \ and therefore perceived stronger flavor from aromatic oils and acids otherwise\
  \ destroyed by longer roasting times.[123] Roasting does not alter the amount of\
  \ caffeine in the bean but does give less caffeine when the beans are measured by\
  \ volume because the beans expand during roasting.[124] A small amount of chaff\
  \ is produced during roasting from the skin left on the seed after processing.[125]\
  \ Chaff is usually removed from the seeds by air movement, though a small amount\
  \ is added to dark roast coffees to soak up oils on the seeds.[118]\n\n\nDecaffeination\
  \ of coffee seeds is done while the seeds are still green. Many methods can remove\
  \ caffeine from coffee, but all involve either soaking the green seeds in hot water\
  \ (often called the \"Swiss water process\")[126] or steaming them, then using a\
  \ solvent to dissolve the caffeine-containing oils.[39] Decaffeination is often\
  \ done by processing companies, and the extracted caffeine is usually sold to the\
  \ pharmaceutical industry.[39]\n\n\nCoffee is best stored in an airtight container\
  \ made of ceramic, glass or non-reactive metal.[127] Higher quality prepackaged\
  \ coffee usually has a one-way valve that prevents air from entering while allowing\
  \ the coffee to release gases.[128] Coffee freshness and flavor is preserved when\
  \ it is stored away from moisture, heat, and light. The tendency of coffee to absorb\
  \ strong smells from food means that it should be kept away from such smells. Storage\
  \ of coffee in refrigerators is not recommended due to the presence of moisture\
  \ which can cause deterioration. Exterior walls of buildings that face the sun may\
  \ heat the interior of a home, and this heat may damage coffee stored near such\
  \ a wall. Heat from nearby ovens also harms stored coffee.[127]\n\n\nIn 1931, a\
  \ method of packing coffee in a sealed vacuum in cans was introduced. The roasted\
  \ coffee was packed and then 99% of the air was removed, allowing the coffee to\
  \ be stored indefinitely until the can was opened. Today this method is in mass\
  \ use for coffee in a large part of the world.[129]\n\n\nCoffee beans must be ground\
  \ and brewed to create a beverage. The criteria for choosing a method include flavor\
  \ and economy. Almost all methods of preparing coffee require that the beans be\
  \ ground and then mixed with hot water long enough to allow the flavor to emerge\
  \ but not so long as to draw out bitter compounds. The liquid can be consumed after\
  \ the spent grounds are removed. Brewing considerations include the fineness of\
  \ the grind, how the water is used to extract the flavor, the ratio of coffee grounds\
  \ to water (the brew ratio), additional flavorings such as sugar, milk, and spices,\
  \ and the technique to be used to separate spent grounds. Optimal coffee extraction\
  \ occurs between 91 and 96 °C (196 and 205 °F).[132] Ideal holding temperatures\
  \ range from 85 to 88 °C (185 to 190 °F) to as high as 93 °C (199 °F), and the ideal\
  \ serving temperature is 68 to 79 °C (154 to 174 °F).[133]\n\n\nCoffee beans may\
  \ be ground with a burr grinder, which uses revolving elements to shear the seed;\
  \ a blade grinder cuts the seeds with blades moving at high speed; or a mortar and\
  \ pestle crushes the seeds. For most brewing methods a burr grinder is deemed superior\
  \ because the grind is more even, and the grind size can be adjusted.[134] The type\
  \ of grind is often named after the brewing method for which it is generally used,\
  \ Turkish grind being the finest, while coffee percolator or French press are the\
  \ coarsest. The most common grinds are between these extremes: a medium grind is\
  \ used in most home coffee-brewing machines.[135]\n\n\nCoffee may be brewed by several\
  \ methods. It may be boiled, steeped, or pressurized. Brewing coffee by boiling\
  \ is the earliest method, and Turkish coffee is an example of this method. It is\
  \ prepared by grinding or pounding the seeds to a fine powder, then adding it to\
  \ water and bringing it to a boil very briefly in a pot called a cezve or, in Greek,\
  \ a μπρίκι: bríki (from Turkish ibrik). This produces a strong coffee with a layer\
  \ of foam on the surface and sediment (which is not meant for drinking) settling\
  \ at the bottom of the cup.[1]\n\n\nDrip brewers and automatic coffeemakers brew\
  \ coffee using gravity. In an automatic coffeemaker, hot water drips onto coffee\
  \ grounds that are held in a paper, plastic, or perforated metal coffee filter,\
  \ allowing the water to seep through the ground coffee while extracting its oils\
  \ and essences. The liquid drips through the coffee and the filter into a carafe\
  \ or pot, and the spent coffee grounds are retained in the filter.[136]\n\n\nIn\
  \ a coffee percolator, water is pulled under a pipe by gravity, which is then forced\
  \ into a chamber above a filter by steam pressure created by boiling. The water\
  \ then seeps through the grounds, and the process is repeated until terminated by\
  \ removing it from the heat, by an internal timer,[137] or by a thermostat that\
  \ turns off the heater when the entire pot reaches a certain temperature.\n\n\n\
  The espresso method forces hot pressurized water through finely-ground coffee.[135]\
  \ As a result of brewing under high pressure (typically 9 bar),[138] the espresso\
  \ beverage is more concentrated (as much as 10 to 15 times the quantity of coffee\
  \ to water as gravity-brewing methods can produce) and has a more complex physical\
  \ and chemical constitution.[139] A well-prepared espresso has a reddish-brown foam\
  \ called crema that floats on the surface.[135] Other pressurized water methods\
  \ include the moka pot and vacuum coffee maker. The AeroPress also works similarly,\
  \ moving a column of water through a bed of coffee.\n\n\nCold brew coffee is made\
  \ by steeping coarsely-ground beans in cold water for several hours, then filtering\
  \ them.[140] This results in a brew lower in acidity than most hot-brewing methods.\n\
  \n\nOnce brewed, coffee may be served in a variety of ways. Drip-brewed, percolated,\
  \ or French-pressed/cafetière coffee may be served as white coffee with a dairy\
  \ product such as milk or cream, or dairy substitute, or as black coffee with no\
  \ such addition. It may be sweetened with sugar or artificial sweetener. When served\
  \ cold, it is called iced coffee. Popular iced coffee options include frappés, iced\
  \ lattes, or stronger brewed coffee served with ice.[141]\n\n\nEspresso-based coffee\
  \ has a variety of possible presentations. In its most basic form, an espresso is\
  \ served alone as a shot or short black, or with hot water added, when it is known\
  \ as caffè americano. A long black is made by pouring a double espresso into an\
  \ equal portion of water, retaining the crema, unlike caffè americano.[142] Milk\
  \ is added in various forms to an espresso: steamed milk makes a caffè latte,[143]\
  \ equal parts steamed milk and milk froth make a cappuccino,[142] and a dollop of\
  \ hot foamed milk on top creates a caffè macchiato.[144] A flat white is prepared\
  \ by adding steamed hot milk (microfoam) to two espresso shots;[145] it has less\
  \ milk than a latte, but both are varieties of coffee to which the milk can be added\
  \ in such a way as to create a decorative surface pattern. Such effects are known\
  \ as latte art.[146]\n\n\nCoffee can be incorporated with alcohol to produce a variety\
  \ of beverages: it is combined with whiskey in Irish coffee, and it forms the base\
  \ of alcoholic coffee liqueurs such as Kahlúa and Tia Maria. Some craft beers have\
  \ coffee or coffee extracts added to the beer,[147] although porter and stout beers\
  \ may have a coffee-like taste solely due to roasted grains.[148]\n\n\nCoffee can\
  \ also be blended with ingredients claimed to improve health in a form described\
  \ as a \"functional coffee\" drink.[149] Additions used include mushrooms, of which\
  \ some of the most frequently used include lion's mane, chaga, Cordyceps, and reishi.[150]\
  \ Mushroom coffee has about half the caffeine of standard coffee.[151] However,\
  \ drinking mushroom coffee can result in digestive issues, and high amounts can\
  \ result in liver toxicity.[151] There is little clinical evidence for the benefits\
  \ of mushroom coffee.[152]\n\n\n\"Functional\" additions also include protein powder,\
  \ collagen, and ashwagandha.[149]\n\n\nMany products are sold for the convenience\
  \ of consumers who do not want to prepare their coffee or who do not have access\
  \ to coffeemaking equipment. Instant coffee is dried into soluble powder or freeze-dried\
  \ into granules that can be quickly dissolved in hot water.[153] A New Zealand invention\
  \ and staple, instant coffee was originally invented in Invercargill in 1890 by\
  \ food chemist David Strang.[154] It rapidly gained in popularity in many countries\
  \ in the post-war period, with Nescafé being the most popular product.[155] Many\
  \ consumers determined that the convenience of preparing a cup of instant coffee\
  \ more than made up for a perceived inferior taste,[156] although, since the late\
  \ 1970s, instant coffee has been produced differently in such a way that is similar\
  \ to the taste of freshly brewed coffee.[157] Paralleling (and complementing) the\
  \ rapid rise of instant coffee was the coffee vending machine invented in 1947 and\
  \ widely distributed since the 1950s.[158]\n\n\nIn 2023, world production of green\
  \ coffee beans was 11 million tonnes, led by Brazil with 31% of the total and Vietnam\
  \ as a secondary producer (table).\n\n\nCoffee is bought and sold as green coffee\
  \ beans by roasters, investors, and price speculators as a tradable commodity in\
  \ commodity markets and exchange-traded funds. Coffee futures contracts for Grade\
  \ 3 washed arabicas are traded on the New York Mercantile Exchange under ticker\
  \ symbol KC, with contract deliveries occurring every year in March, May, July,\
  \ September, and December.[160][161][162][163] Higher and lower grade arabica coffees\
  \ are sold through other channels. Futures contracts for robusta coffee are traded\
  \ on the London International Financial Futures and Options Exchange and, since\
  \ 2007, on the New York Intercontinental Exchange.[164]\n\n\nDating to the 1970s,\
  \ coffee has been incorrectly described by many, including historian Mark Pendergrast,\
  \ as the world's \"second most legally traded commodity\".[165][166] Instead, \"\
  coffee was the second most valuable commodity exported by developing countries,\"\
  \ from 1970 to circa 2000.[167] This fact was derived from the United Nations Conference\
  \ on Trade and Development Commodity Yearbooks which show \"Third World\" commodity\
  \ exports by value in the period 1970–1998 with crude oil in first place, coffee\
  \ in second, followed by sugar, cotton, and others. Coffee continues to be an important\
  \ commodity export for developing countries, but more recent figures are not readily\
  \ available due to the shifting and politicized nature of the category \"developing\
  \ country\".[165] Coffee is one of seven commodities included in the EU Regulation\
  \ on Deforestation-free products, which aims to guarantee that the products European\
  \ Union citizens consume do not contribute to deforestation or forest degradation\
  \ worldwide.[168]\n\n\nInternational Coffee Day, which is claimed to have originated\
  \ in Japan in 1983 with an event organized by the All Japan Coffee Association,\
  \ takes place on 29 September in several countries.[169] There are numerous trade\
  \ associations and lobbying and other organizations representing the coffee industry.[170][171]\n\
  \n\nNordic countries are the highest coffee-consuming nations when measured per\
  \ capita per year, with consumption in Finland as the world's highest.[172]\n\n\n\
  An April 2024, National Coffee Association survey indicated that coffee consumption\
  \ in the U.S. reached a 20-year high, with 67% of U.S. adults reporting drinking\
  \ coffee in the past day. This is a significant increase compared to 2004 when fewer\
  \ than half of U.S. adults reported coffee consumption in the past day. Drip coffee\
  \ remains the most popular brewing method, but espresso-based beverages, particularly\
  \ lattes, espresso shots, and cappuccinos, gained popularity.[173]\n\n\nMarket volatility,\
  \ and thus increased returns, during 1830 encouraged Brazilian entrepreneurs to\
  \ shift their attention from gold to coffee, a crop hitherto reserved for local\
  \ consumption. Concurrent with this shift was the commissioning of vital infrastructures,\
  \ including approximately 7,000 km (4,300 mi) of railroads between 1860 and 1885.\
  \ The creation of these railways enabled the importation of workers, to meet the\
  \ enormous need for labor. This development primarily affected the State of Rio\
  \ de Janeiro, as well as the southern states of Brazil, most notably São Paulo,\
  \ due to its favorable climate, soils, and terrain.[174]\n\n\nCoffee production\
  \ attracted immigrants in search of better economic opportunities in the early 20th\
  \ century. Mainly, these were Portuguese, Italian, Spanish, German, and Japanese\
  \ nationals. For instance, São Paulo received approximately 733,000 immigrants in\
  \ the decade preceding 1900, whilst only receiving approximately 201,000 immigrants\
  \ in the six years to 1890. The production yield of coffee increases. In 1880, São\
  \ Paulo produced 1.2 million bags (25% of total production), in 1888 2.6 million\
  \ (40%), and in 1902 8 million bags (60%).[175] Coffee is then 63% of the country's\
  \ exports. The gains made by this trade allow sustained economic growth in the country.\
  \ The four years between planting a coffee and the first harvest extend seasonal\
  \ variations in the price of coffee. The Brazilian government is thus forced, to\
  \ some extent, to keep strong price subsidies during production periods.\n\n\nThe\
  \ concept of fair trade labeling, which guarantees coffee growers a negotiated preharvest\
  \ price, began in the late 1980s with the Max Havelaar Foundation's labeling program\
  \ in the Netherlands. In 2004, 24,222 metric tons (of 7,050,000 produced worldwide)\
  \ were fair trade; in 2005, 33,991 metric tons out of 6,685,000 were fair trade,\
  \ an increase from 0.34% to 0.51%.[176][177] A number of fair trade impact studies\
  \ have shown that fair trade coffee produces a mixed impact on the communities that\
  \ grow it. Many studies are skeptical about fair trade, reporting that it often\
  \ worsens the bargaining power of those who are not part of it. The first fair-trade\
  \ coffee was an effort to import Guatemalan coffee into Europe as \"Indio Solidarity\
  \ Coffee\".[178]\n\n\nSince the founding of organizations such as the European Fair\
  \ Trade Association (1987), the production and consumption of fair trade coffee\
  \ has grown as some local and national coffee chains started to offer fair trade\
  \ alternatives.[179] For example, in April 2000, after a year-long campaign by the\
  \ human rights organization Global Exchange, Starbucks decided to carry fair-trade\
  \ coffee in its stores.[180] Since September 2009 all Starbucks espresso beverages\
  \ in UK and Ireland are made with Fairtrade and Shared Planet certified coffee.[181]\n\
  \n\nA 2005 study in Belgium concluded that consumers' buying behavior is not consistent\
  \ with their positive attitude toward ethical products. On average 46% of European\
  \ consumers claimed to be willing to pay substantially more for ethical products,\
  \ including fair-trade products such as coffee. The study found that the majority\
  \ of respondents were unwilling to pay the actual price premium of 27% for fair\
  \ trade coffee.[180]\n\n\nSpecialty coffee has driven a desire for more traceable\
  \ coffee, and as such businesses are offering coffees that may come from a single\
  \ origin, or a single lot from a single farm. This can give rise to the roaster\
  \ developing a relationship with the producer, to discuss and collaborate on coffee.\
  \ The roaster may also choose to cut out the importers and exporters to directly\
  \ trade with the producer, or they may \"fairly trade\", where any third-parties\
  \ involved in the transaction are thought to have added value, and there is a high\
  \ level of transparency around the price, although often there is no certification\
  \ to back it up.[182] This process tends to only be done for high-quality products\
  \ since keeping the coffee separate from other coffees adds costs, and so only coffee\
  \ that roasters believe can command a higher price will be kept separate.[183]\n\
  \n\nSome coffee is sold through internet auction – much of it is sold through a\
  \ competition, with coffees passing through local and international jurors, and\
  \ then the best coffees being selected to be bid on. Some estates known for high-quality\
  \ coffee also sell their coffee through an online auction. This can lead to increased\
  \ price transparency since the final price paid is usually published.[182]\n\n\n\
  Brewed coffee made from typical grounds and tap water is 99.4% water and contains\
  \ 40 mg of caffeine per 100 ml with no essential nutrients in significant content.[184]\
  \ Restaurant-brewed espresso is 97.8% water and contains some dietary minerals,\
  \ B vitamins, and 212 mg of caffeine per 100 ml.[185]\n\n\nAlthough polyphenols,\
  \ particularly chlorogenic acid, are present in coffee,[186]  there is no evidence\
  \ that the polyphenols impart a health benefit or have antioxidant value following\
  \ ingestion.[187][188] Overall, coffee components do not pose risks to health and\
  \ do not provide health effects for adults consuming about 3–4 cups per day, which\
  \ would supply 300–400 mg of caffeine per day.[187]\n\n\nA psychoactive chemical\
  \ in coffee is caffeine, an adenosine receptor antagonist that is known for its\
  \ stimulant effects.[187][189] Coffee also contains the monoamine oxidase inhibitors\
  \ β-carboline and harmane, which may contribute to its psychoactivity.[190] In a\
  \ healthy liver, caffeine is mostly metabolized by liver enzymes. The excreted metabolites\
  \ are mostly paraxanthines—theobromine and theophylline—and a small amount of unchanged\
  \ caffeine. Therefore, the metabolism of caffeine depends on the state of this enzymatic\
  \ system of the liver.[187][191] Coffee has laxative effects, inducing defecation\
  \ in some people within minutes of consumption.[192][193][194][195] The specific\
  \ mechanism of action and chemical constituents responsible are still unknown, but\
  \ caffeine is likely not responsible.[196]\n\n\nA 2017 review of clinical trials\
  \ found that drinking coffee is generally safe within usual levels of intake and\
  \ is more likely to improve health outcomes than to cause harm at doses of 3–4 cups\
  \ of coffee daily. Exceptions include a possible increased risk in women having\
  \ bone fractures, and a possible increased risk in pregnant women of fetal loss\
  \ or decreased birth weight. Results were complicated by poor study quality, and\
  \ differences in age, gender, health status, and serving size.[197]\n\n\nCoffee\
  \ is known to have a significant amount of water-soluble dietary fiber (mostly polysaccharides\
  \ like galactomannans, arabinogalactans, and melanoidins) compared to other commonly\
  \ consumed beverages such as factory orange juice. The amount of dietary fiber ranges\
  \ from 0.47 to 0.75 g per 100 mL of prepared coffee in a 2007 experiment testing\
  \ on espresso, drip coffee, and freeze-dried coffee made from freeze-dried containing\
  \ the highest amount fiber. Given the popularity of coffee and the low amount of\
  \ fiber consumed by the average person in many developed nations, coffee may majorly\
  \ contribute to the daily dietary fiber consumption for many people. (For instance,\
  \ in Spain the mean fiber consumption of 7 grams per day with a moderate coffee\
  \ drinker having 3 cups per day points to coffee accounting for 10% of Spanish dietary\
  \ fiber.) [198][199][200][201][202][203][204]\n\n\nDepending on the type of coffee\
  \ and method of preparation, the caffeine content of a single serving can vary greatly.[205][206]\
  \ The caffeine content of a cup of coffee varies depending mainly on the brewing\
  \ method, and also on the coffee variety, such as 40 mg per 100 ml in regular coffee\
  \ and 212 mg per 100 ml in espresso.[184][185]  According to a 1979 analysis, coffee\
  \ has the following caffeine content, depending on how it is prepared:[205]\n\n\n\
  Caffeine remains stable up to 200 °C (392 °F) and completely decomposes around 285 °C\
  \ (545 °F).[207] Given that roasting temperatures do not exceed 200 °C (392 °F)\
  \ for long and rarely if ever reach 285 °C (545 °F), the caffeine content of a coffee\
  \ is not likely changed much by the roasting process.[208]\n\n\nCoffee is often\
  \ consumed alongside (or instead of) breakfast by many at home or when eating out\
  \ at diners or cafeterias. It is often served at the end of a formal meal, normally\
  \ with a dessert, and at times with an after-dinner mint, especially when consumed\
  \ at a restaurant or dinner party.[209]\n\n\nWidely known as coffeehouses or cafés,\
  \ establishments serving prepared coffee or other hot beverages have existed for\
  \ over 500 years. The first coffeehouse in Constantinople was opened in 1475 by\
  \ traders arriving from Damascus and Aleppo.[210]\n\n\nA contemporary term for a\
  \ person who makes coffee beverages, often a coffeehouse employee, is a barista.\
  \ The Specialty Coffee Association of Europe and the Specialty Coffee Association\
  \ of America have been influential in setting standards and providing training.[211]\n\
  \n\nThe coffee break in the United States and elsewhere is a short mid-morning rest\
  \ period granted to employees. It originated in the late 19th century in Stoughton,\
  \ Wisconsin, with the wives of Norwegian immigrants. The city celebrates this every\
  \ year with the Stoughton Coffee Break Festival.[212] In 1951, Time noted that \"\
  since the war, the coffee break has been written into union contracts\".[213] The\
  \ term subsequently became common through a Pan-American Coffee Bureau ad campaign\
  \ of 1952 which urged consumers, \"Give yourself a Coffee-Break – and Get What Coffee\
  \ Gives to You.\"[214] John B. Watson, a behavioral psychologist who worked with\
  \ Maxwell House later in his career, helped to popularize coffee breaks within American\
  \ culture.[215]\n\n\nHistorically, several religious groups have prohibited or condemned\
  \ the consumption of coffee. The permissibility of coffee was debated in the Islamic\
  \ world during the early 16th century, variously being permitted or prohibited until\
  \ it was ultimately accepted by the 1550s.[216] Contention existed among Ashkenazi\
  \ Jews as to whether coffee was acceptable for Passover until it was certified kosher\
  \ in 1923.[217] Some Christian groups, such as Mormons and Seventh-day Adventists,\
  \ discourage the consumption of coffee.[218][219] Because of coffee's association\
  \ with Muslims, Ethiopian Orthodox Christians avoided it until the end of the 19th\
  \ century.[220]  Some Rastafarians also generally avoid coffee.[221]\n\n\nFurthermore,\
  \ coffee has been prohibited for political and economic reasons. King Charles II\
  \ of England briefly outlawed coffeehouses to quell perceived rebellion.[46] King\
  \ Frederick the Great banned it in Prussia, concerned about the price of importing\
  \ of coffee without production colonies.[222][223] Sweden prohibited coffee in the\
  \ 18th century for the same reasons.[224] Coffee has seldom been prohibited based\
  \ on its intoxicating effect.[225]\n\n\nThere are many stories about coffee and\
  \ its impact on people and society. The Oromo people would customarily plant a coffee\
  \ tree on the graves of powerful sorcerers. They believed that the first coffee\
  \ bush sprang up from the tears that the god of heaven shed over the corpse of a\
  \ dead sorcerer.[226] Johann Sebastian Bach was inspired to compose the humorous\
  \ Coffee Cantata about coffee addiction, which was controversial in the early 18th\
  \ century.[227]\n\n\nIn the United States, coffee is sometimes called a \"cup of\
  \ Joe\". The origin of this phrase is in dispute; a common story is that in World\
  \ War I the US Secretary of the Navy Josephus \"Joe\" Daniels banned alcohol on\
  \ navy ships which meant that the strongest drink available aboard the ship was\
  \ black coffee. Sailors began referring to coffee as a \"cup of Joe\" in reference\
  \ to Daniels. However, this story may be apocryphal since the first written account\
  \ of it was in 1930, some 15 years later. Another explanation is that a formerly\
  \ popular nickname for coffee, jamoke, from mocha java, was shortened to Joe. A\
  \ third origin story is that since coffee is such a commonly consumed beverage,\
  \ it is the drink of the average Joe.[228][229][230]\n"
