content: "\n\n\nLaw is a set of rules that are created and enforced by governmental\
  \ or societal institutions to regulate behavior,[1] with its precise definition\
  \ a matter of longstanding debate.[2][3][4] It has been variously described as a\
  \ science[5][6] and as the art of justice.[7][8][9] State-enforced laws can be made\
  \ by a legislature, resulting in statutes; by the executive through decrees and\
  \ regulations; or by judges' decisions, which form precedent in common law jurisdictions.\
  \ An autocrat may exercise those functions within their realm. The creation of laws\
  \ themselves may be influenced by a constitution, written or tacit, and the rights\
  \ encoded therein. The law shapes politics, economics, history, and society in various\
  \ ways and also serves as a mediator of relations between people.\n\n\nLegal systems\
  \ vary between jurisdictions, with their differences analysed in comparative law.\
  \ In civil law jurisdictions, a legislature or other central body codifies and consolidates\
  \ the law. In common law systems, judges may make binding case law through precedent,[10]\
  \ although on occasion this may be overturned by a higher court or the legislature.[11]\
  \ Religious law is in use in some religious communities and states, and has historically\
  \ influenced secular law.[12][13][14][15][16]\n\n\nThe scope of law can be divided\
  \ into two domains: public law concerns government and society, including constitutional\
  \ law, administrative law, and criminal law; private law deals with legal disputes\
  \ between parties in areas such as contracts, property, torts, delicts and commercial\
  \ law.[17] This distinction is stronger in civil law countries, particularly those\
  \ with a separate system of administrative courts;[18][19] by contrast, the public-private\
  \ law divide is less pronounced in common law jurisdictions.[20][21]\n\n\nLaw provides\
  \ a source of scholarly inquiry into legal history,[22] philosophy,[23] economic\
  \ analysis[24] and sociology.[25] Law also raises important and complex issues concerning\
  \ equality, fairness, and justice.[26][27]\n\n\nThe word law, attested in Old English\
  \ as lagu, comes from the Old Norse word lǫg. The singular form lag meant 'something\
  \ laid or fixed' while its plural meant 'law'.[28]\n\n\nBut what, after all, is\
  \ a law? [...] When I say that the object of laws is always general, I mean that\
  \ law considers subjects en masse and actions in the abstract, and never a particular\
  \ person or action. [...] On this view, we at once see that it can no longer be\
  \ asked whose business it is to make laws, since they are acts of the general will;\
  \ nor whether the prince is above the law, since he is a member of the State; nor\
  \ whether the law can be unjust, since no one is unjust to himself; nor how we can\
  \ be both free and subject to the laws, since they are but registers of our wills.\n\
  \n\nThe philosophy of law is commonly known as jurisprudence. Normative jurisprudence\
  \ asks \"what should law be?\", while analytic jurisprudence asks \"what is law?\"\
  \n\n\nThere have been several attempts to produce \"a universally acceptable definition\
  \ of law\". In 1972, Baron Hampstead suggested that no such definition could be\
  \ produced.[30] McCoubrey and White said that the question \"what is law?\" has\
  \ no simple answer.[31] Glanville Williams said that the meaning of the word \"\
  law\" depends on the context in which that word is used. He said that, for example,\
  \ \"early customary law\" and \"municipal law\" were contexts where the word \"\
  law\" had two different and irreconcilable meanings.[32] Thurman Arnold said that\
  \ it is obvious that it is impossible to define the word \"law\" and that it is\
  \ also equally obvious that the struggle to define that word should not ever be\
  \ abandoned.[33] It is possible to take the view that there is no need to define\
  \ the word \"law\" (e.g. \"let's forget about generalities and get down to cases\"\
  ).[34]\n\n\nOne definition is that law is a system of rules and guidelines enforced\
  \ by social institutions to govern behaviour.[1] In The Concept of Law, H. L. A.\
  \ Hart argued that law is a \"system of rules\";[35] John Austin said law was \"\
  the command of a sovereign, backed by the threat of a sanction\";[36] Ronald Dworkin\
  \ describes law as an \"interpretive concept\" to achieve justice in his text titled\
  \ Law's Empire;[37] and Joseph Raz argues law is an \"authority\" to mediate people's\
  \ interests.[38] Oliver Wendell Holmes defined law as \"the prophecies of what the\
  \ courts will do in fact, and nothing more pretentious.\"[39] In his Treatise on\
  \ Law, Thomas Aquinas argues that law is a rational ordering of things, which concern\
  \ the common good, that is promulgated by whoever is charged with the care of the\
  \ community.[40] This definition has both positivist and naturalist elements.[41]\n\
  \n\nDefinitions of law often raise the question of the extent to which law incorporates\
  \ morality.[42] John Austin's utilitarian answer was that law is \"commands, backed\
  \ by threat of sanctions, from a sovereign, to whom people have a habit of obedience\"\
  .[36] Natural lawyers, on the other hand, such as Jean-Jacques Rousseau, argue that\
  \ law reflects essentially moral and unchangeable laws of nature. The concept of\
  \ \"natural law\" emerged in ancient Greek philosophy concurrently and in connection\
  \ with the notion of justice, and re-entered the mainstream of Western culture through\
  \ the writings of Thomas Aquinas, notably his Treatise on Law.\n\n\nHugo Grotius,\
  \ the founder of a purely rationalistic system of natural law, argued that law arises\
  \ from both a social impulse—as Aristotle had indicated—and reason.[43] Immanuel\
  \ Kant believed a moral imperative requires laws \"be chosen as though they should\
  \ hold as universal laws of nature\".[44] Jeremy Bentham and his student Austin,\
  \ following David Hume, believed that this conflated the \"is\" and what \"ought\
  \ to be\" problem. Bentham and Austin argued for law's positivism; that real law\
  \ is entirely separate from \"morality\".[45] Kant was also criticised by Friedrich\
  \ Nietzsche, who rejected the principle of equality, and believed that law emanates\
  \ from the will to power, and cannot be labeled as \"moral\" or \"immoral\".[46][47][48]\n\
  \n\nIn 1934, the Austrian philosopher Hans Kelsen continued the positivist tradition\
  \ in his book the Pure Theory of Law.[49] Kelsen believed that although law is separate\
  \ from morality, it is endowed with \"normativity\", meaning we ought to obey it.\
  \ While laws are positive \"is\" statements (e.g., the fine for reversing on a highway\
  \ is €500), laws tell us what we \"should\" do. Thus, each legal system can be hypothesised\
  \ to have a 'basic norm' (German: Grundnorm) instructing us to obey. Kelsen's major\
  \ opponent, Carl Schmitt, rejected both positivism and the idea of the rule of law\
  \ because he did not accept the primacy of abstract normative principles over concrete\
  \ political positions and decisions.[50] Therefore, Schmitt advocated a jurisprudence\
  \ of the exception (state of emergency), which denied that legal norms could encompass\
  \ all of the political experience.[51]\n\n\nLater in the 20th century, H. L. A.\
  \ Hart attacked Austin for his simplifications and Kelsen for his fiction in The\
  \ Concept of Law.[52] Hart argued law is a system of rules, divided into primary\
  \ (rules of conduct) and secondary ones (rules addressed to officials to administer\
  \ primary rules). Secondary rules are further divided into rules of adjudication\
  \ (to resolve legal disputes), rules of change (to vary laws), and the rule of recognition\
  \ (to identify laws as valid). Two of Hart's students continued the debate: In his\
  \ book Law's Empire, Ronald Dworkin attacked Hart and the positivists for their\
  \ refusal to treat law as a moral issue. Dworkin argues that law is an \"interpretive\
  \ concept\"[37] that requires judges to find the best fitting and most just solution\
  \ to a legal dispute, given their Anglo-American constitutional traditions. Joseph\
  \ Raz, on the other hand, defended the positivist outlook and criticised Hart's\
  \ \"soft social thesis\" approach in The Authority of Law.[38] Raz argues that law\
  \ is authority, identifiable purely through social sources and without reference\
  \ to moral reasoning. In his view, any categorisation of rules beyond their role\
  \ as authoritative instruments in mediation is best left to sociology rather than\
  \ to jurisprudence.[53]\n\n\nThe history of law is closely linked to the development\
  \ of civilization. Ancient Egyptian law, dating as far back as 3000 BC, was based\
  \ on the concept of Ma'at and characterised by tradition, rhetorical speech, social\
  \ equality and impartiality.[54][55][56] By the 22nd century BC, the ancient Sumerian\
  \ ruler Ur-Nammu had formulated the first law code, which consisted of casuistic\
  \ statements (\"if … then ...\"). Around 1760 BC, King Hammurabi further developed\
  \ Babylonian law by codifying and inscribing it in stone. Hammurabi placed several\
  \ copies of his law code throughout the kingdom of Babylon as stelae, for the entire\
  \ public to see; this became known as the Codex Hammurabi. The most intact copy\
  \ of these stelae was discovered in the 19th century by British Assyriologists,\
  \ and has since been fully transliterated and translated into various languages,\
  \ including English, Italian, German, and French.[57]\n\n\nThe Old Testament dates\
  \ back to 1280 BC and presents moral imperatives as recommendations for a good society.\
  \ The small Greek city-state, ancient Athens, from about the 8th century BC was\
  \ the first society to be based on broad inclusion of its citizenry, excluding women\
  \ and enslaved people. However, Athens had no legal science or single word for \"\
  law\",[58] relying instead on the three-way distinction between divine law (thémis),\
  \ human decree (nómos), and custom (díkē).[59] Yet Ancient Greek law contained major\
  \ constitutional innovations in the development of democracy.[60]\n\n\nRoman law\
  \ was heavily influenced by Greek philosophy, but professional jurists developed\
  \ its detailed rules and were highly sophisticated.[61][62] Over the centuries between\
  \ the rise and decline of the Roman Empire, law was adapted to cope with the changing\
  \ social situations and underwent major codification under Theodosius II and Justinian\
  \ I.[a] Although codes were replaced by custom and case law during the Early Middle\
  \ Ages, Roman law was rediscovered around the 11th century when medieval legal scholars\
  \ began to research Roman codes and adapt their concepts to the canon law, giving\
  \ birth to the jus commune. Latin legal maxims (called brocards) were compiled for\
  \ guidance. In medieval England, royal courts developed a body of precedent which\
  \ later became the common law. A Europe-wide Law Merchant was established so that\
  \ merchants could trade under common standards of practice rather than the many\
  \ splintered facets of local laws. The Law Merchant, a precursor to modern commercial\
  \ law, emphasised the freedom to contract and the alienability of property.[63]\
  \ As nationalism grew in the 18th and 19th centuries, the Law Merchant was incorporated\
  \ into countries' local law under new civil codes. The Napoleonic and German Codes\
  \ became the most influential. In contrast to English common law, which consists\
  \ of enormous tomes of case law, codes in small books are easy to export and easy\
  \ for judges to apply. However, today there are signs that civil and common law\
  \ are converging.[64] EU law is codified in treaties, but develops through de facto\
  \ precedent laid down by the European Court of Justice.[65]\n\n\nAncient India and\
  \ China represent distinct legal traditions and have historically had independent\
  \ schools of legal theory and practice. The Arthashastra, probably compiled around\
  \ 100 AD (although it contains older material), and the Manusmriti (c. 100–300 AD)\
  \ were foundational treatises in India, and comprise texts considered authoritative\
  \ legal guidance.[66] Manu's central philosophy was tolerance and pluralism, and\
  \ was cited across Southeast Asia.[67] During the Muslim conquests in the Indian\
  \ subcontinent, sharia was established by the Muslim sultanates and empires, most\
  \ notably Mughal Empire's Fatawa-e-Alamgiri, compiled by emperor Aurangzeb and various\
  \ scholars of Islam.[68][69] In India, the Hindu legal tradition, along with Islamic\
  \ law, were both supplanted by common law when India became part of the British\
  \ Empire.[70] Malaysia, Brunei, Singapore and Hong Kong also adopted the common\
  \ law system. The Eastern Asian legal tradition reflects a unique blend of secular\
  \ and religious influences.[71] Japan was the first country to begin modernising\
  \ its legal system along Western lines, by importing parts of the French, but mostly\
  \ the German Civil Code.[72] This partly reflected Germany's status as a rising\
  \ power in the late 19th century.\n\n\nSimilarly, traditional Chinese law gave way\
  \ to westernisation in the final years of the Qing Dynasty, in the form of six private\
  \ law codes based mainly on the Japanese model of German law.[73] Today Taiwanese\
  \ law retains the closest affinity to the codifications from that period, because\
  \ of the split between Chiang Kai-shek's nationalists, who fled there, and Mao Zedong's\
  \ communists who won control of the mainland in 1949. The current legal infrastructure\
  \ in the People's Republic of China was heavily influenced by Soviet Socialist law,\
  \ which essentially prioritises administrative law over private law rights.[74]\
  \ Due to rapid industrialisation, today China is undergoing a process of reform,\
  \ at least in terms of economic, if not social and political, rights. A new contract\
  \ code introduced in 1999 marked a shift away from administrative domination.[75]\
  \ Furthermore, after negotiations lasting fifteen years, in 2001 China joined the\
  \ World Trade Organization.[76]\n\n\nIn general, legal systems can be split between\
  \ civil law and common law systems.[77] Modern scholars argue that the significance\
  \ of this distinction has progressively declined. The numerous legal transplants,\
  \ typical of modern law, result in the sharing of many features traditionally associated\
  \ with either common law or civil law.[64][78] The third type of legal system is\
  \ religious law, based on scriptures. The specific system by which a country is\
  \ ruled is often determined by its history, its connections with other countries,\
  \ or its adherence to international standards. The sources that jurisdictions adopt\
  \ as authoritatively binding are the defining features of any legal system.\n\n\
  Civil law is the legal system used in most countries around the world today. In\
  \ civil law the sources recognised as authoritative are, primarily, legislation—especially\
  \ codifications in constitutions or statutes passed by government—and custom.[b]\
  \ Codifications date back millennia, with one early example being the Babylonian\
  \ Codex Hammurabi. Modern civil law systems essentially derive from legal codes\
  \ issued by Byzantine Emperor Justinian I in the 6th century, which were rediscovered\
  \ by 11th-century Italy.[80] Roman law in the days of the Roman Republic and Empire\
  \ was heavily procedural, and lacked a professional legal class.[81] Instead a lay\
  \ magistrate, iudex, was chosen to adjudicate. Decisions were not published systematically,\
  \ so any case law that developed was obscured and almost unrecognised.[82] Each\
  \ case was to be decided afresh from the laws of the State, which mirrors the (theoretical)\
  \ unimportance of judges' decisions for future cases in civil law systems today.\
  \ From 529 to 534 AD, the Byzantine Emperor Justinian I codified and consolidated\
  \ Roman law up until that point, so that what remained was one-twentieth of the\
  \ mass of legal texts from before.[83] This became known as the Corpus Juris Civilis.\
  \ As one legal historian wrote, \"Justinian consciously looked back to the golden\
  \ age of Roman law and aimed to restore it to the peak it had reached three centuries\
  \ before.\"[84] The Justinian Code remained in force in the East until the fall\
  \ of the Byzantine Empire. Western Europe, meanwhile, relied on a mix of the Theodosian\
  \ Code and Germanic customary law until the Justinian Code was rediscovered in the\
  \ 11th century, which scholars at the University of Bologna used to interpret their\
  \ own laws.[85] Civil law codifications, based closely on Roman law and influenced\
  \ by religious laws such as canon law, continued to spread throughout Europe until\
  \ the Enlightenment. Then, in the 19th century, both France, with the Code Civil,\
  \ and Germany, with the Bürgerliches Gesetzbuch, modernised their legal codes. Both\
  \ these codes heavily influenced not only the law systems of the countries in continental\
  \ Europe but also the Japanese and Korean legal traditions.[86][87] A central doctrine\
  \ in continental European legal thinking, originating in German jurisprudence, is\
  \ the concept of a Rechtsstaat, meaning that everyone is subjected to the law, especially\
  \ governments.[88] Today, countries that have civil law systems range from Russia\
  \ and Turkey to most of Central and Latin America.[89]\n\n\nIn common law legal\
  \ systems, decisions by courts are explicitly acknowledged as law on equal footing\
  \ with legislative statutes and executive regulations. The doctrine of precedent,\
  \ or stare decisis (Latin for \"to stand by decisions\"), means that decisions by\
  \ higher courts bind lower courts to assure that similar cases reach similar results.\
  \ In contrast, in civil law systems, legislative statutes are typically more detailed.\
  \ Judicial decisions are shorter and less detailed because the adjudicator is writing\
  \ only to decide a single case, rather than to set out reasoning that will guide\
  \ future courts.\n\n\nCommon law originated from England and has been inherited\
  \ by almost every country once tied to the British Empire (except Malta, Scotland,\
  \ the U.S. state of Louisiana, and the Canadian province of Quebec). In medieval\
  \ England during the Norman Conquest, the law varied from shire to shire, reflecting\
  \ disparate tribal customs. The concept of a common law developed during the reign\
  \ of Henry II during the late 12th century, when Henry appointed judges who had\
  \ the authority to create an institutionalised and unified system of law common\
  \ to the country. The next major step in the evolution of the common law came when\
  \ King John was forced by his barons to agree to a document limiting his authority\
  \ to pass laws. The Magna Carta (\"great charter\") of 1215 also required that the\
  \ King's entourage of judges hold their courts and judgments at \"a certain place\"\
  \ rather than dispensing autocratic justice in unpredictable places about the country.[90]\
  \ A concentrated and elite group of judges acquired a dominant role in law-making\
  \ under this system, and compared to its European counterparts, the English judiciary\
  \ became highly centralised. In 1297, for instance, while the highest court in France\
  \ had fifty-one judges, the English Court of Common Pleas had five.[91] This powerful\
  \ and tight-knit judiciary gave rise to a systematised process of developing common\
  \ law.[92]\n\n\nAs time went on, many felt that the common law was overly systematised\
  \ and inflexible, and an increasing number of citizens petitioned the King to override\
  \ it. On the King's behalf, the Lord Chancellor started giving judgments to do what\
  \ was equitable in a case. From the time of Sir Thomas More, the first lawyer to\
  \ be appointed as Lord Chancellor, a systematic body of equity grew up alongside\
  \ the rigid common law, and developed its own Court of Chancery. At first, equity\
  \ was often criticised for its erratic behavior.[93] Over time, courts of equity\
  \ developed solid principles, especially under Lord Eldon.[94] In the 19th century\
  \ in England, and in 1937 in the U.S., the two systems were merged.\n\n\nIn developing\
  \ the common law, academic writings have always played an important role, both in\
  \ collecting overarching principles from scattered case law and in advocating change.\
  \ William Blackstone, from around 1760, was the first scholar to collect, describe,\
  \ and teach the common law.[95] But merely in describing, scholars who sought explanations\
  \ and underlying structures slowly changed the way the law actually worked.[96]\n\
  \n\nReligious law is explicitly based on religious precepts. Examples include the\
  \ Jewish Halakha and Islamic Sharia—both of which translate as the \"path to follow\"\
  . Christian canon law also survives in some church communities. Often, the implication\
  \ of religion for law is unalterability because the word of God cannot be amended\
  \ or legislated against by judges or governments.[97] Nonetheless, most religious\
  \ jurisdictions rely on further human elaboration to provide for thorough and detailed\
  \ legal systems. For instance, the Quran has some law, and it acts as a source of\
  \ further law through interpretation, Qiyas (reasoning by analogy), Ijma (consensus),\
  \ and precedent.[98] This is mainly contained in a body of law and jurisprudence\
  \ known as Sharia and Fiqh respectively. Another example is the Torah or Old Testament,\
  \ in the Pentateuch or Five Books of Moses. This contains the basic code of Jewish\
  \ law, which some Israeli communities choose to use. The Halakha is a code of Jewish\
  \ law that summarizes some of the Talmud's interpretations.\n\n\nMany countries\
  \ are Sharia jurisdictions. Israeli law allows litigants to use religious laws only\
  \ if they choose. Canon law is only in use by members of the Catholic Church, the\
  \ Eastern Orthodox Church, and the Anglican Communion.\n\n\nCanon law (Ancient Greek:\
  \ κανών, romanized: kanon, lit. 'a straight measuring rod; a ruler') is a set of\
  \ ordinances and regulations made by ecclesiastical authority, for the government\
  \ of a Christian organisation or church and its members. It is the internal ecclesiastical\
  \ law governing the Catholic Church, the Eastern Orthodox Church, the Oriental Orthodox\
  \ Churches, and the individual national churches within the Anglican Communion.[99]\
  \ The way that such church law is legislated, interpreted and at times adjudicated\
  \ varies widely among these three bodies of churches. In all three traditions, a\
  \ canon was originally[100] a rule adopted by a church council; these canons formed\
  \ the foundation of canon law.\n\n\nThe Catholic Church has the oldest continuously\
  \ functioning legal system in the western world,[101][102] predating the evolution\
  \ of modern European civil law and common law systems. The 1983 Code of Canon Law\
  \ governs the Latin Church sui juris. The Eastern Catholic Churches, which developed\
  \ different disciplines and practices, are governed by the Code of Canons of the\
  \ Eastern Churches.[103] The canon law of the Catholic Church influenced the common\
  \ law during the medieval period through its preservation of Roman law doctrine,\
  \ such as the presumption of innocence.[104][c]\n\n\nRoman Catholic canon law is\
  \ a fully developed legal system, with all the necessary elements: courts, lawyers,\
  \ judges, a fully articulated legal code, principles of legal interpretation, and\
  \ coercive penalties, though it lacks civilly-binding force in most secular jurisdictions.[106]\n\
  \n\nUntil the 18th century, Sharia law was practiced throughout the Muslim world\
  \ in a non-codified form, with the Ottoman Empire's Mecelle code in the 19th century\
  \ being a first attempt at codifying elements of Sharia law. Since the mid-1940s,\
  \ efforts have been made in country after country to bring Sharia law more in line\
  \ with modern conditions and conceptions.[107][108] In modern times, the legal systems\
  \ of many Muslim countries draw upon both civil and common law traditions as well\
  \ as Islamic law and custom. The constitutions of certain Muslim states, such as\
  \ Egypt and Afghanistan, recognise Islam as the state religion and obligate the\
  \ legislature to adhere to Sharia.[109] Saudi Arabia recognises the Quran as its\
  \ constitution, and is governed based on Islamic law.[110] Iran has also witnessed\
  \ a reiteration of Islamic law into its legal system after 1979.[111] During the\
  \ last few decades, one of the fundamental features of the movement of Islamic resurgence\
  \ has been the call to restore the Sharia, which has generated a vast amount of\
  \ literature and affected world politics.[112]\n\n\nSocialist law is the legal system\
  \ in communist states such as the former Soviet Union and the People's Republic\
  \ of China.[113] Academic opinion is divided on whether it is a separate system\
  \ from civil law, given major deviations from civil law based on Marxist–Leninist\
  \ ideology, such as subordinating the judiciary to the executive ruling party.[113][114][115]\n\
  \n\nThere are distinguished methods of legal reasoning (applying the law) and methods\
  \ of interpreting (construing) the law. The former are legal syllogism, which holds\
  \ sway in civil law legal systems, analogy, which is present in common law legal\
  \ systems, especially in the US, and argumentative theories that occur in both systems.\
  \ The latter are different rules (directives) of legal interpretation, such as linguistic,\
  \ teleological, and systemic interpretation, as well as more specific rules, for\
  \ instance, the golden rule or the mischief rule. There are also many other arguments\
  \ and cannons of interpretation which altogether make statutory interpretation possible.\n\
  \n\nLaw professor and former United States Attorney General Edward H. Levi noted\
  \ that the \"basic pattern of legal reasoning is reasoning by example\"—that is,\
  \ reasoning by comparing outcomes in cases resolving similar legal questions.[116]\
  \ In a U.S. Supreme Court case regarding procedural efforts taken by a debt collection\
  \ company to avoid errors, Justice Sotomayor cautioned that \"legal reasoning is\
  \ not a mechanical or strictly linear process\".[117]\n\n\nJurimetrics is the formal\
  \ application of quantitative methods, especially probability and statistics, to\
  \ legal questions. The use of statistical methods in court cases and law review\
  \ articles has grown massively in importance in the last few decades.[118][119]\n\
  \n\nIt is a real unity of them all in one and the same person, made by covenant\
  \ of every man with every man, in such manner as if every man should say to every\
  \ man: I authorise and give up my right of governing myself to this man, or to this\
  \ assembly of men, on this condition; that thou givest up, thy right to him, and\
  \ authorise all his actions in like manner.\n\n\nThe main institutions of law in\
  \ industrialised countries are independent courts, representative parliaments, an\
  \ accountable executive, the military and police, bureaucratic organisation, the\
  \ legal profession and civil society itself. John Locke, in his Two Treatises of\
  \ Government, and Baron de Montesquieu in The Spirit of the Laws, advocated for\
  \ a separation of powers between the political, legislative, and executive bodies.[120]\
  \ Their principle was that no person should be able to usurp all powers of the state,\
  \ in contrast to the absolutist theory of Thomas Hobbes' Leviathan.[121] Sun Yat-sen's\
  \ Five Power Constitution for the Republic of China took the separation of powers\
  \ further by having two additional branches of government—a Control Yuan for auditing\
  \ oversight and an Examination Yuan to manage the employment of public officials.[122]\n\
  \n\nMax Weber and others reshaped thinking on the extension of the state. Modern\
  \ military, policing, and bureaucratic power over ordinary citizens' daily lives\
  \ pose special problems for accountability that earlier writers such as Locke or\
  \ Montesquieu could not have foreseen. The customs and practices of the legal profession\
  \ are an important part of people's access to justice, whilst civil society refers\
  \ to the social institutions, communities, and partnerships that form the political\
  \ basis of law.\n\n\nThe judiciary is the system of courts that applies the law\
  \ and contracts. Under the doctrine of the separation of powers, the judiciary generally\
  \ does not make statutory law (which is the responsibility of the legislature) or\
  \ enforce law (which is the responsibility of the executive), but rather interprets,\
  \ defends, and applies the law to the facts of each case. However, in some countries\
  \ the judiciary does make common law.\n\n\nIn many jurisdictions the judicial branch\
  \ has the power of judicial interpretation, judicial review and constitutional review.[123]\
  \ Courts with judicial review power may annul the laws and rules of the state when\
  \ it finds them incompatible with other laws, such as primary legislation, constitution,\
  \ treaties or international law. \n\n\nThe judiciary can also be thought of as a\
  \ nonviolent mechanism for conflict resolution. Political bias,[124][123] sentencing\
  \ disparties,[125] and higher leniency than the public[126] reduce the political\
  \ legitimacy of the judiciary.\n\n\nProminent examples of legislatures are the Houses\
  \ of Parliament in London, the Congress in Washington, D.C., the Bundestag in Berlin,\
  \ the Duma in Moscow, the Parlamento Italiano in Rome and the Assemblée nationale\
  \ in Paris. By the principle of representative government, people vote for politicians\
  \ to carry out their wishes. Although countries like Israel, Greece, Sweden, and\
  \ China are unicameral, most countries are bicameral, meaning they have two separately\
  \ appointed legislative houses.[127]\n\n\nIn the 'lower house', politicians are\
  \ elected to represent smaller constituencies. The 'upper house' is usually elected\
  \ to represent states in a federal system (as in Australia, Germany, or the United\
  \ States) or a different voting configuration in a unitary system (as in France).\
  \ In the UK, the upper house is appointed by the government as a house of review.\
  \ One criticism of bicameral systems with two elected chambers is that the upper\
  \ and lower houses may mirror one another. The traditional justification of bicameralism\
  \ is that an upper chamber acts as a house of review. This can minimise arbitrariness\
  \ and injustice in governmental action.[127]\n\n\nTo pass legislation, a majority\
  \ of the members of a legislature must vote for a bill (proposed law) in each house.\
  \ Normally, there will be several readings and amendments proposed by the different\
  \ political factions. If a country has an entrenched constitution, a special majority\
  \ may be required for constitutional changes, making changes to the law more difficult.\
  \ A government usually leads the process and is formed from Members of Parliament\
  \ (e.g., in the UK or Germany). However, in a presidential system, the government\
  \ is usually formed by the executive and their appointed cabinet officials (e.g.,\
  \ the United States or Brazil).[d]\n\n\nThe executive in a legal system serves as\
  \ the centre of political authority of the State. In a parliamentary system, as\
  \ with Britain, Italy, Germany, India, and Japan, the executive is known as the\
  \ cabinet, and is composed of members of the legislature. The executive is led by\
  \ the head of government, whose office holds power under the confidence of the legislature.\
  \ Because popular elections appoint political parties to govern, a party's leader\
  \ can change between elections.[128]\n\n\nThe head of state is separate from the\
  \ executive, symbolically enacts laws, and serves as the nation's representative.\
  \ Examples include the President of Germany (appointed by members of federal and\
  \ state legislatures), the Queen of the United Kingdom (an hereditary office), and\
  \ the President of Austria (elected by popular vote). The other important model\
  \ is the presidential system, found in the United States and in Brazil. In presidential\
  \ systems, the executive acts as both head of state and head of government, and\
  \ has the power to appoint an unelected cabinet. Under a presidential system, the\
  \ executive branch is separate from the legislature to which it is not accountable.[128][129]\n\
  \n\nAlthough the role of the executive varies from country to country, it usually\
  \ proposes most legislation and sets the government's agenda. In presidential systems,\
  \ the executive often has the power to veto legislation. Most executives in both\
  \ systems are responsible for foreign relations, the law enforcement, and the bureaucracy.\
  \ Ministers or other officials head a country's public offices, such as a foreign\
  \ ministry or defence ministry. The election of a different executive is therefore\
  \ capable of revolutionising an entire country's approach to government.\n\n\nMax\
  \ Weber famously argued that the state is that which controls the monopoly on the\
  \ legitimate use of force.[130][131] The military and police carry out law enforcement\
  \ at the request of the government or the courts. The term failed state refers to\
  \ states that cannot implement or enforce policies; their police and military no\
  \ longer control security and order, and society moves into anarchy, the absence\
  \ of government.[e] While military organisations have existed as long as government\
  \ itself, the idea of a standing police force is a relatively modern concept. For\
  \ example, Medieval England's system of travelling criminal courts, or assizes,\
  \ used show trials and public executions to instill fear in communities and maintain\
  \ control.[132] The first modern police were probably those in 17th-century Paris,\
  \ in the court of Louis XIV,[133] although the Paris Prefecture of Police claim\
  \ they were the world's first uniformed policemen.[134]\n\n\nThe etymology of bureaucracy\
  \ derives from the French word for office (bureau) and the Ancient Greek for word\
  \ power (kratos).[135][better source needed] Like the military and police, a legal\
  \ system's government servants and bodies that make up its bureaucracy carry out\
  \ the directives of the executive. One of the earliest references to the concept\
  \ was made by Baron de Grimm, a German author who lived in France. In 1765, he wrote:\n\
  \n\nThe real spirit of the laws in France is that bureaucracy of which the late\
  \ Monsieur de Gournay used to complain so greatly; here the offices, clerks, secretaries,\
  \ inspectors, and intendants are not appointed to benefit the public interest, indeed\
  \ the public interest appears to have been established so that offices might exist.[136]\n\
  \nCynicism over \"officialdom\" is still common, and the workings of public servants\
  \ are typically contrasted to private enterprise motivated by profit.[137] In fact,\
  \ private companies, especially large ones, also have bureaucracies.[138] Negative\
  \ perceptions of \"red tape\" aside, public services such as schooling, health care,\
  \ policing, and public transport are considered crucial state functions, making\
  \ public bureaucratic action the locus of government power.[138]\n\n\nWriting in\
  \ the early 20th century, Max Weber believed that a definitive feature of a developed\
  \ state had become its bureaucratic support.[139] Weber wrote that the typical characteristics\
  \ of modern bureaucracy are that officials define its mission, the scope of work\
  \ is bound by rules; management is composed of career experts who manage top down,\
  \ communicating through writing and binding public servants' discretion with rules.[140]\n\
  \n\nA corollary of the rule of law is the existence of a legal profession sufficiently\
  \ autonomous to invoke the authority of the independent judiciary; the right to\
  \ assistance of a barrister in a court proceeding emanates from this corollary—in\
  \ England, the function of barrister or advocate is distinguished from legal counselor.[141]\
  \ As the European Court of Human Rights has stated, the law should be adequately\
  \ accessible to everyone and people should be able to foresee how the law affects\
  \ them.[142]\n\n\nTo maintain professionalism, the practice of law is typically\
  \ overseen by a government or an independent regulatory body, such as a bar association,\
  \ bar council, or law society. Modern lawyers achieve a distinct professional identity\
  \ through specified legal procedures (e.g., successfully passing a qualifying examination).\
  \ They are required by law to have a special qualification (a legal education that\
  \ earns the student a Bachelor of Laws, a Bachelor of Civil Law, or a Juris Doctor\
  \ degree). Higher academic degrees may also be pursued. Examples include a Master\
  \ of Laws, a Master of Legal Studies, a Bar Professional Training Course, or a Doctor\
  \ of Laws. They are constituted in office by legal forms of appointment (being admitted\
  \ to the bar). There are few titles of respect to signify famous lawyers, such as\
  \ Esquire, to indicate barristers of greater dignity,[143][144] and Doctor of law,\
  \ to indicate a person who obtained a PhD in Law.\n\n\nMany Muslim countries have\
  \ developed similar rules governing legal education and the legal profession, but\
  \ some still allow lawyers trained in traditional Islamic law to practice before\
  \ personal status courts.[145] In China and other developing countries, there are\
  \ not sufficient professionally trained people to staff the existing judicial systems,\
  \ and, accordingly, formal standards are more relaxed.[146]\n\n\nOnce accredited,\
  \ a lawyer will often work in a law firm, in a chambers as a sole practitioner,\
  \ in a government post, or in a private corporation as an internal counsel. In addition,\
  \ a lawyer may become a legal researcher who provides on-demand legal research through\
  \ a library, a commercial service, or freelance work. Many people trained in law\
  \ put their skills to use entirely outside the legal field.[147]\n\n\nSignificant\
  \ to the practice of law in the common law tradition is the legal research to determine\
  \ the current state of the law. This usually entails exploring case-law reports,\
  \ legal periodicals and legislation. Law practice also involves drafting documents\
  \ such as court pleadings, persuasive briefs, contracts, or wills and trusts. Negotiation\
  \ and dispute resolution skills (including ADR techniques) are also important to\
  \ legal practice, depending on the field.[147]\n\n\nThe Classical republican concept\
  \ of \"civil society\" dates back to Hobbes and Locke.[148] Locke saw civil society\
  \ as people who have \"a common established law and judicature to appeal to, with\
  \ authority to decide controversies between them.\"[149] German philosopher Georg\
  \ Wilhelm Friedrich Hegel distinguished the \"state\" from \"civil society\" (German:\
  \ bürgerliche Gesellschaft) in Elements of the Philosophy of Right.[150][151]\n\n\
  \nHegel believed that civil society and the state were opposites, within the scheme\
  \ of his dialectic theory of history. The modern dipole state–civil society was\
  \ reproduced in the theories of Alexis de Tocqueville and Karl Marx.[152][153] In\
  \ post-modern theory, civil society is necessarily a source of law, by being the\
  \ basis from which people form opinions and lobby for what they believe law should\
  \ be. As Australian barrister and author Geoffrey Robertson QC wrote of international\
  \ law, \"one of its primary modern sources is found in the responses of ordinary\
  \ men and women, and of the non-governmental organizations which many of them support,\
  \ to the human rights abuses they see on the television screen in their living rooms.\"\
  [154]\n\n\nFreedom of speech, freedom of association and many other individual rights\
  \ allow people to gather, discuss, criticise and hold to account their governments,\
  \ from which the basis of a deliberative democracy is formed. The more people are\
  \ involved with, concerned by, and capable of changing how political power is exercised\
  \ over their lives, the more acceptable and legitimate the law becomes to the people.\
  \ The most familiar institutions of civil society include economic markets, profit-oriented\
  \ firms, families, trade unions, hospitals, universities, schools, charities, debating\
  \ clubs, non-governmental organisations, neighbourhoods, churches, and religious\
  \ associations. There is no clear legal definition of civil society, and of the\
  \ institutions it includes. Most institutions and bodies that compile lists of institutions\
  \ (such as the European Economic and Social Committee) exclude political parties.[155][156][157]\n\
  \n\nAll legal systems deal with the same basic issues, but jurisdictions categorise\
  \ and identify their legal topics in different ways. A common distinction is that\
  \ between \"public law\" (a term related closely to the state, and including constitutional,\
  \ administrative and criminal law), and \"private law\" (which covers contract,\
  \ tort and property).[f] In civil law systems, contract and tort fall under a general\
  \ law of obligations, while trust law is dealt with under statutory regimes or international\
  \ conventions. International, constitutional and administrative law, criminal law,\
  \ contract, tort, property law, and trusts are regarded as the \"traditional core\
  \ subjects\",[g] although there are many further disciplines.\n\n\nInternational\
  \ law, also known as public international law and the law of nations, is the set\
  \ of rules, norms, legal customs and standards that states and other actors feel\
  \ an obligation to, and generally do, obey in their mutual relations. In international\
  \ relations, actors are simply the individuals and collective entities, such as\
  \ states, international organizations, and non-state groups, which can make behavioral\
  \ choices, whether lawful or unlawful. Rules are formal, typically written expectations\
  \ that outline required behavior, while norms are informal, often unwritten guidelines\
  \ about appropriate behavior that are shaped by custom and social practice.[158]\
  \ It establishes norms for states across a broad range of domains, including war\
  \ and diplomacy, economic relations, and human rights. \n\n\nInternational law differs\
  \ from state-based domestic legal systems in that it operates largely through consent,\
  \ since there is no universally accepted authority to enforce it upon sovereign\
  \ states. States and non-state actors may choose to not abide by international law,\
  \ and even to breach a treaty, but such violations, particularly of peremptory norms,\
  \ can be met with disapproval by others and in some cases coercive action including\
  \ diplomacy, economic sanctions, and war. The lack of a final authority in international\
  \ law can also cause far reaching differences. This is partly the effect of states\
  \ being able to interpret international law in a manner which they see fit. This\
  \ can lead to problematic stances which can have large local effects.[159]\n\n\n\
  Constitutional and administrative law govern the affairs of the state. Constitutional\
  \ law concerns both the relationships between the executive, legislature, and judiciary\
  \ and the human rights or civil liberties of individuals against the state. Most\
  \ jurisdictions, like the United States and France, have a single codified constitution\
  \ with a bill of rights. A few, like the United Kingdom, have no such document.\
  \ A \"constitution\" is simply those laws which constitute the body politic, from\
  \ statute, case law, and convention.\n\n\nThe fundamental constitutional principle,\
  \ inspired by John Locke, holds that the individual can do anything except that\
  \ which is forbidden by law; the state may do nothing except that which is authorised\
  \ by law.[160][161] Administrative law is the chief method for people to hold state\
  \ bodies to account. People (wheresoever allowed) may potentially have the prerogative\
  \ to legally challenge (or sue) an agency, local council, public service, or government\
  \ ministry for judicial review of the offending edict (law, ordinance, policy order).\
  \ Such a challenge tests the government entity's ability to exercise actionable\
  \ authority under the law and whether it observed the required procedure. The first\
  \ specialist administrative court was the Conseil d'État set up in 1799, as Napoleon\
  \ assumed power in France.[162]\n\n\nA sub-discipline of constitutional law is election\
  \ law. It, along with Elections commissions, councils, or committees, deals with\
  \ policies and procedures that facilitate elections. These rules settle disputes\
  \ or enable the translation of the will of the people into functioning democracies.\
  \ Election law addresses issues who is entitled to vote, voter registration, ballot\
  \ access, campaign finance and party funding, redistricting, apportionment, electronic\
  \ voting and voting machines, accessibility of elections, election systems and formulas,\
  \ vote counting, election disputes, referendums, and issues such as electoral fraud\
  \ and electoral silence.\n\n\nCriminal law, also known as penal law, pertains to\
  \ crimes and punishment.[163] It thus regulates the definition of and penalties\
  \ for offences found to have a sufficiently deleterious social impact, but, in itself,\
  \ makes no moral judgment on an offender nor imposes restrictions on society that\
  \ physically prevent people from committing a crime in the first place.[164][165]\
  \ Investigating, apprehending, charging, and trying suspected offenders is regulated\
  \ by the law of criminal procedure.[166] The paradigm case of a crime lies in the\
  \ proof, beyond reasonable doubt, that a person is guilty of two things. First,\
  \ the accused must commit an act which is deemed by society to be criminal, or actus\
  \ reus (guilty act).[167] Second, the accused must have the requisite malicious\
  \ intent to do a criminal act, or mens rea (guilty mind). However, for so called\
  \ \"strict liability\" crimes, an actus reus is enough.[168] Criminal systems of\
  \ the civil law tradition distinguish between intention in the broad sense (dolus\
  \ directus and dolus eventualis), and negligence. Negligence does not carry criminal\
  \ responsibility unless a particular crime provides for its punishment.[169][170]\n\
  \n\nExamples of crimes include murder, assault, fraud, and theft. In exceptional\
  \ circumstances defences, can apply to specific acts, such as killing in self defence\
  \ or pleading insanity. Another example is in the 19th-century English case of R\
  \ v Dudley and Stephens, which tested whether a defence of \"necessity\" could justify\
  \ murder and cannibalism to survive a shipwreck.[171]\n\n\nCriminal law offences\
  \ are viewed as offences against not just individual victims but also the community.[164][165]\
  \ The state, usually with the help of police, takes the lead in prosecution, which\
  \ is why in common law countries cases are cited as \"The People v ...\" or \"R\
  \ (for Rex or Regina) v ...\". Also, lay juries are often used to determine defendants'\
  \ guilt on points of fact; juries cannot change legal rules. Some developed countries\
  \ still condone capital punishment for certain crimes. Still, the usual punishments\
  \ for a crime are imprisonment, fines, state supervision (such as probation), or\
  \ community service. Modern criminal law has been affected considerably by the social\
  \ sciences, especially with respect to sentencing, legal research, legislation,\
  \ and rehabilitation.[172] On the international field, 111 countries are members\
  \ of the International Criminal Court, which was established to try people for crimes\
  \ against humanity.[173]\n\n\nContract law concerns enforceable promises, and can\
  \ be summed up in the Latin phrase pacta sunt servanda (agreements must be kept).[174]\
  \ In common law jurisdictions, three key elements to the creation of a contract\
  \ are necessary: offer and acceptance, consideration, and the intention to create\
  \ legal relations. \n\n\nConsideration indicates the fact that all parties to a\
  \ contract have exchanged something of value. Some common law systems, including\
  \ Australia, are moving away from the requirement of consideration. The idea of\
  \ estoppel or culpa in contrahendo can be used to create obligations during pre-contractual\
  \ negotiations.[175]\n\n\nCivil law jurisdictions treat contracts differently in\
  \ several respects, with a more interventionist role for the state in both their\
  \ formation and enforcement.[176] Compared to common law jurisdictions, civil law\
  \ systems incorporate more mandatory terms into contracts, allow greater latitude\
  \ for courts to interpret and revise contract terms and impose a stronger duty of\
  \ good faith, but are also more likely to enforce penalty clauses and specific performance\
  \ of contracts.[176] They also do not require consideration for a contract to be\
  \ binding.[177] In France, an ordinary contract is said to form based on a \"meeting\
  \ of the minds\" or a \"concurrence of wills\". Germany has a distinct approach\
  \ to contracts that is closely tied to property law. Their 'abstraction principle'\
  \ (Abstraktionsprinzip) means that the personal obligation of contract forms separately\
  \ from the title of property being conferred. When contracts are invalidated for\
  \ some reason (e.g., a car buyer is so drunk that he lacks legal capacity to contract)[178]\
  \ the contractual obligation to pay can be invalidated separately from the proprietary\
  \ title of the car. Unjust enrichment law, rather than contract law, is then used\
  \ to restore title to the rightful owner.[179]\n\n\nCertain civil wrongs are grouped\
  \ together as torts under common law systems and delicts under civil law systems.[180]\
  \ To have acted tortiously, one must have breached a duty to another person, or\
  \ infringed some pre-existing legal right. A simple example might be unintentionally\
  \ hitting someone with a ball.[181] Under the law of negligence, the most common\
  \ form of tort, the injured party could potentially claim compensation for their\
  \ injuries from the party responsible. The principles of negligence are illustrated\
  \ by Donoghue v Stevenson.[h] A friend of Donoghue ordered an opaque bottle of ginger\
  \ beer (intended for the consumption of Donoghue) in a café in Paisley. Having consumed\
  \ half of it, Donoghue poured the remainder into a tumbler. The decomposing remains\
  \ of a snail floated out. She claimed to have suffered from shock, fallen ill with\
  \ gastroenteritis, and sued the manufacturer for carelessly allowing the drink to\
  \ be contaminated. The House of Lords decided that the manufacturer was liable for\
  \ Mrs Donoghue's illness. Lord Atkin took a distinctly moral approach and said:\n\
  \n\nThe liability for negligence [...] is no doubt based upon a general public sentiment\
  \ of moral wrongdoing for which the offender must pay. [...] The rule that you are\
  \ to love your neighbour becomes in law, you must not injure your neighbour; and\
  \ the lawyer's question, Who is my neighbour? receives a restricted reply. You must\
  \ take reasonable care to avoid acts or omissions which you can reasonably foresee\
  \ would be likely to injure your neighbour.[182]\n\nThis became the basis for the\
  \ four principles of negligence, namely that:\n\n\nAnother example of tort might\
  \ be a neighbour making excessively loud noises with machinery on his property.[183]\
  \ Under a nuisance claim, the noise could be stopped. Torts can also involve intentional\
  \ acts such as assault, battery or trespass. A better-known tort is defamation,\
  \ which occurs, for example, when a newspaper makes unsupportable allegations that\
  \ damage a politician's reputation.[184] More infamous are economic torts, which\
  \ form the basis of labour law in some countries by making trade unions liable for\
  \ strikes,[185] when statute does not provide immunity.[i]\n\n\nProperty law governs\
  \ ownership and possession. Real property, sometimes called 'real estate', refers\
  \ to ownership of land and things attached to it.[187] Personal property, refers\
  \ to everything else; movable objects, such as computers, cars, jewelry or intangible\
  \ rights, such as stocks and shares. A right in rem is a right to a specific piece\
  \ of property, in contrast to a right in personam, which allows compensation for\
  \ a loss but not for a particular thing. Land law forms the basis for most kinds\
  \ of property law and is the most complex. It concerns mortgages, rental agreements,\
  \ licences, covenants, easements and the statutory systems for land registration.\
  \ Regulations on the use of personal property fall under intellectual property,\
  \ company law, trusts, and commercial law.\n\n\nA representative example of property\
  \ law is the 1722 case of Armory v Delamirie, which applied English law.[188] A\
  \ child was deprived of possession of the gemstones that had been set in a piece\
  \ of jewellery, by the businessperson entrusted to appraise the piece. The court\
  \ held that, under the common law view of property, the person who can show the\
  \ best claim to a piece of property, against any contesting party, is the owner.[189]\
  \ By contrast, the classic civil law approach to property, propounded by Friedrich\
  \ Carl von Savigny, is that it is a right good against the world. Obligations, such\
  \ as those arising from contracts and torts, are conceptualised as rights owed by\
  \ individuals.[190] The idea of property raises many further philosophical and political\
  \ issues. Locke argued that our \"lives, liberties and estates\" are our property\
  \ because we own our bodies and mix our labour with our surroundings.[191]\n\n\n\
  In historical English law, the common law did not permit dividing the ownership\
  \ from the control of one piece of property—but the law of equity did recognize\
  \ this through an arrangement known as a trust. Trustees control property, whereas\
  \ the beneficial, or equitable, ownership of trust property is held by people known\
  \ as beneficiaries. Trustees owe their beneficiaries a duty to take good care of\
  \ the property entrusted to them.[192] Another example of a trustee's duty might\
  \ be to invest property wisely or sell it.[193] This is especially the case for\
  \ pension funds, the most important form of trust, where investors are trustees\
  \ for people's savings until retirement. But trusts can also be set up for charitable\
  \ purposes.\n\n\nSome international norms for the structure and regulation of trusts\
  \ are set out in the Hague Trust Convention of 1985.\n\n\nIn the 18th century, Adam\
  \ Smith presented a philosophical foundation for explaining the relationship between\
  \ law and economics.[j] The discipline arose partly out of a critique of trade unions\
  \ and U.S. antitrust law.[citation needed]\n\n\nThe most prominent economic analyst\
  \ of law[citation needed] is Ronald Coase, whose first major article, The Nature\
  \ of the Firm (1937), argued that the reason for the existence of firms (companies,\
  \ partnerships, etc.) is the existence of transaction costs.[194] Rational individuals\
  \ trade through bilateral contracts on open markets until the costs of transactions\
  \ mean that using corporations to produce things is more cost-effective. His second\
  \ major article, The Problem of Social Cost (1960), argued that if we lived in a\
  \ world without transaction costs, people would bargain with one another to create\
  \ the same allocation of resources, regardless of the way a court might rule in\
  \ property disputes. He contended that law ought to be pre-emptive, and be guided\
  \ by the most efficient solution.[195]\n\n\nMany members of the so-called Chicago\
  \ School are generally advocates of deregulation and privatisation, and are hostile\
  \ to state regulation or what they see as restrictions on the operation of free\
  \ markets.[196]\n\n\nThe sociology of law examines the interaction between law and\
  \ society, overlapping with jurisprudence, philosophy of law, social theory, and\
  \ more specialised subjects such as criminology.[197][198] It is a transdisciplinary\
  \ and multidisciplinary study focused on the theorisation and empirical study of\
  \ legal practices and experiences as social phenomena. The institutions of social\
  \ construction, social norms, dispute processing, and legal culture are key areas\
  \ for inquiry in this knowledge field. In the United States, the field is usually\
  \ called law and society studies; in Europe, it is more often referred to as socio-legal\
  \ studies. At first, jurists and legal philosophers were suspicious of the sociology\
  \ of law. Kelsen attacked one of its founders, Eugen Ehrlich, who sought to clarify\
  \ the differences and connections between positive law, which lawyers learn and\
  \ apply, and other forms of 'law' or social norms that regulate everyday life, thereby\
  \ generally preventing conflicts from reaching lawyers and courts.[199] Contemporary\
  \ research in the sociology of law is concerned with the way that law develops outside\
  \ discrete state jurisdictions, being produced through social interaction in social\
  \ arenas, and acquiring a diversity of sources of authority in national and transnational\
  \ communal networks.[200]\n\n\nAround 1900, Max Weber defined his \"scientific\"\
  \ approach to law, identifying the \"legal rational form\" as a type of domination,\
  \ not attributable to personal authority but to the authority of abstract norms.[201]\
  \ Formal legal rationality was his term for the key characteristic of the coherent\
  \ and calculable law that was a precondition for modern political developments and\
  \ the modern bureaucratic state. Weber saw this law as having developed in parallel\
  \ with the growth of capitalism.[197][198] Another sociologist, Émile Durkheim,\
  \ wrote in his classic work The Division of Labour in Society that as society becomes\
  \ more complex, the body of civil law concerned primarily with restitution and compensation\
  \ grows at the expense of criminal laws and penal sanctions.[202][203] Other notable\
  \ early legal sociologists included Hugo Sinzheimer, Theodor Geiger, Georges Gurvitch\
  \ and Leon Petrażycki in Europe, and William Graham Sumner in the U.S.[204][205]\n"
