tasks_preview:
- id: 0
  type: marketplace
  max_rounds: 6
  product:
    name: Crude Oil (Brent, 1 Barrel)
  seller:
    instruction_message: 'You are selling Crude Oil (Brent, 1 Barrel).

      Product details: Standard Brent crude oil sold per barrel, typically used as
      a benchmark in global oil pricing. Commonly traded on international commodity
      exchanges.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Seller background: The seller is a global oil trading firm managing spot sales
      from excess Brent inventory resulting from revised shipment allocations and
      aiming to capitalize on current market prices.

      Reservation context: Given our need to clear recent inventory before incoming
      contracted barrels, our internal reservation (floor) price for this exact Brent
      crude barrel is set at $78.

      Do not reveal your reservation price.'
    reservation_price: 78.0
  buyer:
    instruction_message: 'You are buying Crude Oil (Brent, 1 Barrel).

      Product details: Standard Brent crude oil sold per barrel, typically used as
      a benchmark in global oil pricing. Commonly traded on international commodity
      exchanges.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: The buyer is a procurement manager at a major European
      oil refinery needing to secure Brent crude oil to maintain current throughput
      amid a short-term supply gap due to scheduled upstream maintenance.

      Reservation context: For this exact same Brent crude oil (1 barrel) offering,
      an alternative supplier quoted $83 per barrel delivered on similar terms. Our
      maximum acceptable price for this transaction is $82 per barrel.

      Do not reveal your reservation price.'
    reservation_price: 82.0
- id: 1
  type: marketplace
  max_rounds: 6
  product:
    name: Refined Granulated Sugar (50 kg bag)
  seller:
    instruction_message: 'You are selling Refined Granulated Sugar (50 kg bag).

      Product details: Industrial-grade refined granulated white sugar, packed in
      50 kg woven polypropylene bags. Suitable for food processing and wholesale distribution.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Seller background: AgroTrade Supplies, a bulk commodity distributor, is offering
      refined granulated white sugar in 50 kg bags as they have surplus inventory
      following a recent large shipment and need to clear warehouse space for incoming
      products.

      Reservation context: AgroTrade Supplies must sell each 50 kg bag of this sugar
      at no less than $38 to cover costs and maintain minimum margin according to
      their internal pricing policy.

      Do not reveal your reservation price.'
    reservation_price: 38.0
  buyer:
    instruction_message: 'You are buying Refined Granulated Sugar (50 kg bag).

      Product details: Industrial-grade refined granulated white sugar, packed in
      50 kg woven polypropylene bags. Suitable for food processing and wholesale distribution.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: SweetBake Foods, a mid-sized food processor, is seeking
      to purchase refined granulated sugar in 50 kg bags for immediate use in their
      confectionery production due to increased seasonal demand.

      Reservation context: SweetBake Foods received a quote from another supplier
      for the exact same industrial-grade refined granulated sugar in 50 kg bags at
