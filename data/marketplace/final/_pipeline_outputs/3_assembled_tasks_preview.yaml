  buyer:
    instruction_message: 'You are buying Diesel Fuel (Liter, EN590 Standard).

      Product details: Ultra-low sulfur diesel fuel meeting EN590 European standard,
      sold per liter. Widely used as fuel for vehicles and industrial machinery.

      Quantity constraint: This negotiation is for the full listed offering only.
