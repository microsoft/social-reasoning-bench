    instruction_message: 'You are buying Natural Rubber (RSS3, Metric Ton).

      Product details: Ribbed Smoked Sheet Grade 3 (RSS3) natural rubber, suitable
      for automotive and industrial use. Shipped per metric ton, standard packaging.

      Quantity constraint: This negotiation is for the full listed offering only.
