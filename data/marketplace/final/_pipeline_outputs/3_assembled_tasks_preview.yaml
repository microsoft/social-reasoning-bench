      Do not reveal your reservation price.'
    reservation_price: 41.0
- id: 2
  type: marketplace
  max_rounds: 6
  product:
    name: Steel Rebar (12mm, 12m length)
  seller:
    instruction_message: 'You are selling Steel Rebar (12mm, 12m length).

      Product details: Hot-rolled ribbed steel reinforcing bar, 12mm diameter, 12
      meters long. Used in reinforced concrete for construction projects.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Seller background: The seller is IronWorks Steel Corp., a regional steel product
      distributor with current surplus inventory of 12mm, 12m ribbed rebar due to
      earlier overstock for a postponed infrastructure project. They are selling now
      to clear warehouse space and improve cash flow.

      Reservation context: IronWorks Steel Corp.''s internal financial analysis sets
      their absolute minimum sell price for this offering at $14.00 per piece to cover
      costs and maintain margins.

      Do not reveal your reservation price.'
    reservation_price: 14.0
  buyer:
    instruction_message: 'You are buying Steel Rebar (12mm, 12m length).

      Product details: Hot-rolled ribbed steel reinforcing bar, 12mm diameter, 12
      meters long. Used in reinforced concrete for construction projects.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: The buyer is ACME Construction Ltd., a mid-size building
      contractor starting foundation work on a new commercial project. They need 12mm,
      12m hot-rolled ribbed steel rebar immediately to meet structural engineering
      specifications and avoid construction delays.

      Reservation context: ACME Construction received a quote from another supplier,
      Delta Steel, for the exact same 12mm, 12m reinforcing bars at $16.00 per piece.
      Given project cost constraints, they are only willing to pay up to $15.50 per
      piece for this offering.

      Do not reveal your reservation price.'
    reservation_price: 15.5
- id: 3
  type: marketplace
  max_rounds: 6
  product:
    name: Portland Cement (42.5R, 50 kg bag)
  seller:
    instruction_message: 'You are selling Portland Cement (42.5R, 50 kg bag).

      Product details: Standard Portland cement type 42.5R, typically used for concrete,
      masonry, and construction. Packed in 50 kg moisture-resistant bags.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Seller background: The seller is Northwest Materials, a construction materials
      supplier, with a large current stock of 42.5R Portland cement in 50 kg bags
      due to a recent bulk import that exceeded local demand forecasts, prompting
      them to sell now to optimize warehouse space.

      Reservation context: Northwest Materials has set an internal minimum acceptable
      selling price (reservation price) of $6.75 per bag, reflecting their cost base
      and the need to cover recent import fees and storage costs.

      Do not reveal your reservation price.'
    reservation_price: 6.75
  buyer:
    instruction_message: 'You are buying Portland Cement (42.5R, 50 kg bag).

      Product details: Standard Portland cement type 42.5R, typically used for concrete,
      masonry, and construction. Packed in 50 kg moisture-resistant bags.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: The buyer is a project manager at Skyline Constructions
      who requires standard 42.5R Portland cement in 50 kg bags for a commercial building
      project that is currently behind schedule, necessitating immediate procurement.

      Reservation context: Skyline Constructions contacted another major supplier
      for the exact same Portland Cement (42.5R, 50 kg bag) and received a quote of
      $7.10 per bag, but their internal budget allows a maximum of $7.05 per bag for
      this purchase.

      Do not reveal your reservation price.'
    reservation_price: 7.05
- id: 4
  type: marketplace
  max_rounds: 6
