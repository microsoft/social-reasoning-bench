  buyer:
    instruction_message: 'You are buying Copper Cathode (LME Grade A, Metric Ton).

      Product details: Electrolytic copper cathodes, minimum 99.99% purity (LME Grade
      A), suitable for industry and electrical manufacturing. Sold per metric ton,
      bundled.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: The buyer is the materials procurement manager for
      a large electric cable manufacturing company seeking to secure LME Grade A copper
