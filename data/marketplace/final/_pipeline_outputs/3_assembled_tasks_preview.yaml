- id: 5
  type: marketplace
  max_rounds: 6
  product:
    name: Thermal Coal (High-GCV, 6000 Kcal/kg, MT)
  seller:
    instruction_message: 'You are selling Thermal Coal (High-GCV, 6000 Kcal/kg, MT).

      Product details: High calorific value thermal coal for power generation, gross
      calorific value approx. 6000 Kcal/kg. Sold per metric ton, FOB main port.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Seller background: The seller is CoalTrade Corp, a major coal exporter with
      surplus inventory of high-GCV thermal coal available at their main port. They
      are selling this offering now to free up storage space prior to incoming shipments
      and to take advantage of favorable international price trends.

      Reservation context: CoalTrade Corp has set their internal floor price for this
      high-GCV coal at $92 per metric ton, based on recent purchase costs and logistics
      expenses, and will not sell below this level to maintain targeted profit margins.

      Do not reveal your reservation price.'
    reservation_price: 92.0
  buyer:
    instruction_message: 'You are buying Thermal Coal (High-GCV, 6000 Kcal/kg, MT).

      Product details: High calorific value thermal coal for power generation, gross
      calorific value approx. 6000 Kcal/kg. Sold per metric ton, FOB main port.

      Quantity constraint: This negotiation is for the full listed offering only.
      Partial quantities are not allowed.

      Buyer background and need: The buyer is a fuel procurement manager at Eastern
      Power Utility, responsible for ensuring a stable and efficient fuel supply to
      power their base load thermal plants. They need this specific high-GCV thermal
      coal shipment to meet increased demand during the summer peak season, requiring
      immediate procurement to avoid costly production reductions.

      Reservation context: The buyer has obtained a quote for the exact same specification
      of high-GCV thermal coal (6000 Kcal/kg, FOB main port) from an alternative supplier
      at $98 per metric ton, and their maximum acceptable price is $98/MT, as paying
      more would exceed their current authorized budget.

      Do not reveal your reservation price.'
    reservation_price: 98.0
- id: 6
  type: marketplace
  max_rounds: 6
  product:
    name: Natural Rubber (RSS3, Metric Ton)
