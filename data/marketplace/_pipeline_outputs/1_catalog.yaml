catalog:
- id: cat_bulk_50_count_retractable_ballpoint_pens
  name: Bulk 50-Count Retractable Ballpoint Pens
  description: A large pack of blue ink retractable pens with a 1.0mm medium point
    and ergonomic grip. These are designed for everyday office use and offer consistent
    ink flow without smearing.
  reference_price: 12.0
- id: cat_commercial_hand_wash_and_wax_service
  name: Commercial Hand Wash and Wax Service
  description: Professional exterior hand washing for a standard sedan followed by
    a manual spray-on wax application. This service includes wheel cleaning and tire
    dressing for a basic shine.
  reference_price: 28.0
- id: cat_premium_20lb_letter_size_copy_paper
  name: Premium 20lb Letter-Size Copy Paper
  description: A single ream containing 500 sheets of multi-purpose white paper with
    a 92 brightness rating. It is optimized for use in high-speed inkjet and laser
    printers to prevent paper jams.
  reference_price: 17.0
- id: cat_standard_domestic_keyboard_cleaning_service
  name: Standard Domestic Keyboard Cleaning Service
  description: A thorough cleaning of a mechanical or membrane computer keyboard using
    compressed air and isopropyl alcohol. The service removes dust, crumbs, and surface
    grime from between and underneath keycaps.
  reference_price: 15.0
- id: cat_industrial_grade_25_foot_extension_cord
  name: Industrial Grade 25-Foot Extension Cord
  description: A heavy-duty 14-gauge outdoor extension cord with a grounded three-prong
    plug and a single outlet. It is designed for medium-duty power tools and garden
    equipment in various weather conditions.
  reference_price: 22.0
- id: cat_100_pack_of_grade_2_carbon_steel_hex_bolts
  name: 100-Pack of Grade 2 Carbon Steel Hex Bolts
  description: High-strength carbon steel hex head bolts designed for general construction
    and structural assembly. These 1/2-inch diameter fasteners meet standard industrial
    specifications for load-bearing applications.
  reference_price: 46.0
- id: cat_professional_ac_condenser_coil_cleaning_service
  name: Professional AC Condenser Coil Cleaning Service
  description: A standard maintenance service involving the application of non-acidic
    foam cleaner to outdoor HVAC units. This procedure removes dust and debris to
    improve energy efficiency and system longevity.
  reference_price: 85.0
- id: cat_12_pack_of_high_efficiency_pleated_air_filters
  name: 12-Pack of High-Efficiency Pleated Air Filters
  description: Standard 20x20x1 electrostatic air filters designed for residential
    furnace and HVAC systems. These filters are rated to capture fine particulates
    including dust, pollen, and smoke.
  reference_price: 72.0
- id: cat_mobile_document_shredding_service_3_boxes
  name: Mobile Document Shredding Service (3 Boxes)
  description: On-site destruction of up to three standard-sized banker boxes of sensitive
    paper records. The service includes professional handling and a formal certificate
    of destruction for compliance.
  reference_price: 60.0
- id: cat_heavy_duty_15_gallon_plastic_storage_totes_set_o
  name: Heavy-Duty 15-Gallon Plastic Storage Totes (Set of 6)
  description: Durable, stackable polypropylene storage containers with secure snap-on
    lids for commercial or residential use. These units feature reinforced bases and
    molded handles for heavy-duty lifting.
  reference_price: 55.0
- id: cat_1tb_internal_nvme_ssd
  name: 1TB Internal NVMe SSD
  description: High-performance 1TB PCIe Gen4 NVMe M.2 internal solid state drive
    with sequential read speeds up to 5000MB/s. This standard storage component is
    designed for high-performance workstation upgrades and includes a 5-year manufacturer
    warranty.
  reference_price: 125.0
- id: cat_commercial_carpet_steam_cleaning
  name: Commercial Carpet Steam Cleaning
  description: Professional hot water extraction cleaning service for up to 600 square
    feet of commercial-grade office carpeting. The service includes pre-treatment
    for heavy stains, deodorization, and high-powered extraction to reduce drying
    time.
  reference_price: 276.0
- id: cat_heavy_duty_2_drawer_lateral_file_cabinet
  name: Heavy-Duty 2-Drawer Lateral File Cabinet
  description: Industrial-grade steel filing cabinet with anti-tip locking mechanisms
    and full-extension ball-bearing slides. It accommodates both letter and legal-size
    hanging folders and features a powder-coated finish for long-term durability.
  reference_price: 350.0
- id: cat_annual_fire_extinguisher_compliance_inspection
  name: Annual Fire Extinguisher Compliance Inspection
  description: On-site safety inspection and tagging for 12 portable fire extinguishers
    by a certified technician. This service includes pressure gauge checks, physical
    condition assessments, and the issuance of compliance documentation for local
    fire codes.
  reference_price: 185.0
- id: cat_ergonomic_mesh_mid_back_task_chair
  name: Ergonomic Mesh Mid-Back Task Chair
  description: Standard office task chair featuring a breathable mesh back, adjustable
    lumbar support, and pneumatic seat-height adjustment. It is built on a heavy-duty
    nylon base with dual-wheel casters suitable for various floor types.
  reference_price: 215.0
- id: cat_24_inch_under_counter_commercial_grade_refrigera
  name: 24-Inch Under-Counter Commercial Grade Refrigerator
  description: A stainless steel, NSF-certified compact refrigerator designed for
    food service environments with a 5.0 cubic foot capacity. It features a digital
    temperature display and heavy-duty casters for easy placement under standard counters.
  reference_price: 1250.0
- id: cat_technical_document_translation_5_000_words
  name: Technical Document Translation (5,000 Words)
  description: Professional translation of complex technical manuals or legal contracts
    from English to Spanish by certified linguists. The service includes a second-pass
    quality assurance review for terminology accuracy and formatting consistency.
  reference_price: 950.0
- id: cat_enterprise_grade_wi_fi_6_access_point_5_unit_bun
  name: Enterprise-Grade Wi-Fi 6 Access Point (5-Unit Bundle)
  description: A set of five high-performance wireless access points supporting 802.11ax
    standards for high-density corporate environments. These units feature MU-MIMO
    technology and integrated cloud-based management capabilities for central deployment.
  reference_price: 2800.0
- id: cat_annual_external_network_vulnerability_assessment
  name: Annual External Network Vulnerability Assessment
  description: A comprehensive remote scan of external-facing network infrastructure
    to identify security weaknesses and potential entry points. The service concludes
    with a detailed remediation report and a single follow-up verification scan after
    fixes are applied.
  reference_price: 3500.0
- id: cat_heavy_duty_stainless_steel_prep_table_96_inch
  name: Heavy-Duty Stainless Steel Prep Table (96-Inch)
  description: A 14-gauge 304-series stainless steel worktable with an adjustable
    galvanized undershelf and adjustable bullet feet for leveling. It is specifically
    designed for high-volume commercial kitchens or laboratory environments requiring
    high corrosion resistance.
  reference_price: 875.0
