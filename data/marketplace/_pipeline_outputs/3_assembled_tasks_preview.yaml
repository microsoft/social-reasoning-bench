      storage space before the upcoming harvest season.

      Reservation context: AgroGrain Export Ltd.''s internal floor price for this
      offering is $262 per metric ton, reflecting their contract purchase costs and
      logistics outlay for immediate shipment.

      Do not reveal your reservation price.'
