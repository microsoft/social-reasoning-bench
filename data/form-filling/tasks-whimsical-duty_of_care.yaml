    background_context: 'Danielle Ortega is a 38-year-old working parent in South Austin, juggling a busy call-center leadership
      role and two young kids while managing chronic migraine that’s been especially disruptive over the past year. She’s
      been with Lone Star Home & Auto for six years and was promoted to Team Lead in March 2024, which means she spends much
      of her day on a headset handling escalations, coaching newer reps, and tracking service metrics. The job is steady and
      she’s proud of being dependable, but migraine flares have forced her to swap shifts, step away from her screen, and
      occasionally ask coworkers to cover her phone line when nausea and light sensitivity hit. She keeps meticulous notes
      in both a migraine-tracking app and a paper calendar on the kitchen counter because it helps her spot patterns around
      skipped meals, sleep disruptions, and strong scents at work.


      At home, Danielle and her husband Miguel run a tight routine: school drop-off for Izzy at Joslin Elementary around 7:25
      a.m., daycare for Ethan near their apartment, and then Danielle heads in for an early shift a few days a week while
      Miguel—an HVAC service technician—starts even earlier and is often out on calls until dinner. Weeknights are a rotation
      of homework at the dining table, quick meals (Miguel grills when he’s home on time; Danielle leans on slow-cooker recipes),
      and a strict bedtime schedule because irregular sleep is one of Danielle’s biggest migraine triggers. When she’s well,
      she’s the parent who plans library trips and Saturday morning pancakes; when she’s not, the household shifts into “quiet
      mode,” curtains drawn, kids watching a movie with the volume low while Miguel handles baths and bedtime.


      Her main concern lately is preventing migraines rather than constantly chasing them with rescue medication. She’s already
      tried several preventive options in the past—topiramate caused significant brain fog and word-finding problems that
      affected her customer service calls, propranolol made her dizzy and lightheaded given her naturally low blood pressure,
      and amitriptyline left her excessively groggy and led to weight gain—so she’s been working closely with her neurologist
      on a plan that fits her life and safety needs. She still carries sumatriptan for acute attacks but is careful about
      how often she uses it to avoid rebound headaches. Danielle is determined to keep showing up for her kids’ milestones
      and to protect her job stability, and she’s been focusing on practical habits she can control—hydration, consistent
      meals, limiting caffeine, and avoiding known triggers—while trying to find a preventive treatment that finally reduces
