    background_context: 'Evan Rourke lives in Brevard, North Carolina, where he runs Blue Ridge Shutter Walks, a small seasonal
      business teaching paid, small-group outdoor photography workshops in the waterfalls-and-forest corridor near DuPont
      State Recreational Forest. His most popular sessions focus on waterfall/forest landscape photography and low-impact
      nature interpretation, with primary stops at the Hooker Falls access area and the trail to the Hooker Falls overlook/riverbank
      for soft morning light and long-exposure practice, plus an optional short hike from the High Falls access area to the
      overlook(s) later in the morning. He keeps the workshops quiet and simple—no drones, no props, no off-trail travel,
      and no equipment beyond personal tripods—building the day around safety briefings, gear checks, composition coaching,
      and careful tripod placement on wet, high-traffic surfaces.


      Most weekdays Evan is up around 5:30 a.m. to check weather and stream-flow conditions, charge batteries, and pack extra
      lens cloths, a small first-aid kit, blister care, and an emergency blanket before heading out. On workshop days he meets
      clients at the parking area for a short check-in, then leads the group along established trails, stopping a few times
      to teach exposure triangle basics, ND filter and polarizer use, and practical Leave No Trace habits like yielding to
      hikers and rotating participants through instructor-assigned micro-zones so nobody crowds a single viewpoint. Participants
      drive their own cars (he encourages carpooling), and if the lots are full he shifts the timing or meeting point rather
      than forcing a bottleneck. He keeps a low profile—quiet voices, no amplified sound, no signage—while also carrying a
      small trash bag and picking up incidental litter when he sees it.


      At home, Evan and his spouse Dana (a respiratory therapist who works 12-hour shifts at Mission Hospital in Asheville)
      coordinate around their kids’ school and childcare routines; Milo is in elementary school and Claire is in preschool,
      so mornings are a mix of lunches, permission slips, and last-minute “where’s my water bottle?” searches. Evan’s main
      worries lately are the unpredictability of mountain weather, how quickly trails get crowded in peak season, and protecting
      his knees after a minor slip on slick rock last spring that left him more cautious about footing and water-edge boundaries.
      He’s also been refining his contingency plans—canceling or relocating to safer, lower-exposure trail segments when thunderstorms
      or high winds threaten—because he wants his clients to feel both inspired and looked-after. Even on his off days, he’s
      usually editing RAW files at the kitchen table, updating workshop notes, and scouting light at sunrise, trying to balance
      the creative pull of the forest with the practical realities of running a small business and being a present parent.'
