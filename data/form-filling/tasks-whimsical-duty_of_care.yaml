      Hi everyone,


      Quick note with final logistics for this Saturday’s Blue Ridge Shutter Walks session at DuPont. We’ll meet at the Hooker
      Falls access area parking lot for a short check-in, safety brief, and gear check (tripods, ND/polarizer if you’ve got
