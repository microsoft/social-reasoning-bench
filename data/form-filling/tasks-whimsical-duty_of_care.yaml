    content: 'Subject: Re: Appeal packet for migraine preventive coverage (Aimovig)


      Hi Appeals Team,


      I’m following up on the denial and want to make sure you have everything you need for the appeal packet. For reference,
      the member/patient information on my file should read: Danielle Marie Ortega, DOB 02/19/1988, Sex: Female. I’m in Austin,
      TX and can provide any additional identifiers if needed.


      The denied services were coverage authorization for Aimovig 70 mg monthly and the step-therapy exception request for
      chronic migraine (15+ headache days/month). I’ve already tried several preventives with my neurologist and had significant
      side effects that made it unsafe for my work on the phones (I’m a customer service team lead at an insurance call center
      and can’t afford the brain fog/dizziness). Since the denial, I’ve had to lean harder on rescue meds, which is exactly
      what I’m trying to avoid.


      In January–February 2025 alone, I logged 19 migraine days in my tracking app. One of the worst was right before my daughter
      Isabella (“Izzy”) turned 8. We had planned a small birthday dinner at Chuy’s on Barton Springs on Feb 9, 2025, but I
      ended up vomiting from a migraine and took sumatriptan twice within 24 hours. My mom, Rosa Delgado, had already driven
      in from San Antonio and even texted asking if we should reschedule because she could tell how sick I was.


      Please confirm receipt of my neurologist’s notes and the migraine log summary, and let me know if there’s a specific
      form you need me to sign for the step-therapy exception.


      Thank you,

      Danielle Ortega'
