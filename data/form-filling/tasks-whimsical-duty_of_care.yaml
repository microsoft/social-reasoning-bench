      Timing: please plan to arrive by 7:10 AM so we can start walking by 7:20. We’ll wrap the workshop and be back at the
      lot by 01:30 PM. If the parking is slammed, I may shift our starting point a few minutes or adjust the loop rather than
      creating a bottleneck, but I’ll text the group if anything changes.


      A couple notes on how we’ll work on-trail: for shooting, we’ll likely spread out along the trail and off to the sides
      to get different angles—people will wander a bit rather than staying in one contained area. I’ll keep circulating to
      help with settings and tripod placement, especially on wet rock and high-traffic edges.


      Please bring: water, a snack/lunch, rain layer, and shoes you don’t mind getting muddy. I’ll have a small first-aid
