    value: 'I’m leaving because my current place has become too small and impractical for my day-to-day needs, and the situation
      with parking/noise has gotten noticeably worse over the last year.


      - Space/layout: It’s a compact 1-bedroom unit and I work from home 2–3 days a week. My “office” is currently a desk
      squeezed into the corner of the living room. It was fine initially, but with more video calls and needing a quiet, dedicated
      workspace, it’s become difficult to separate work from home life.


      - Noise: The unit backs onto a shared driveway and there’s a neighbour who regularly has visitors late at night (especially
      Fri/Sat). The noise isn’t constant, but it’s disruptive when it happens (car doors, conversations, music). I’ve raised
      it politely a couple of times and it improves briefly, but it keeps recurring.


      - Parking/access: Street parking used to be manageable, but with more apartments/tenancies in the area it’s now common
      to park a block away. This is a real hassle when bringing groceries in, and it’s also not ideal when I’m returning home
      later in the evening.


      - Reason for moving now: My fixed-term tenancy is ending soon and I’d prefer to move straight into a longer-term rental
      that better suits my routine. I’m looking for a quieter place with more space (ideally a 2-bedroom or at least a separate
      study nook), reliable parking, and a slightly more family-oriented neighbourhood.


      I’ve paid rent on time throughout my tenancy and I keep the property tidy (I’m quite careful about cleaning the kitchen
      and bathroom weekly, and I don’t smoke). I’m happy for my landlord/property manager to confirm this in a reference.'
