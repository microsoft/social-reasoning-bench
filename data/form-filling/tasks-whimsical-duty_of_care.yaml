    content: 'Subject: Volunteer meal-time companionship — availability + contact


      Hi Marsha,


      Thanks again for the quick call yesterday about the meal-time companionship program. I’m excited about the idea of being
      a consistent, friendly face at lunch, especially after seeing how much a bit of conversation and encouragement can change
      someone’s appetite and mood.


      A little about my schedule: I work weekdays as an office administrator at Bow River Ridge Construction, and most weeks
      I can reliably do late mornings or early afternoons on Tuesdays or Thursdays. That said, construction admin can get
      unpredictable (subcontractor changes, urgent invoice issues, etc.), so there may be the occasional week where I have
      to cancel last-minute if something comes up at the office. I wanted to be upfront about that so we can plan in a way
      that’s least disruptive.


      For contact details, the best number to reach me on is (403) 555-0187. Email is fine too, but if there’s a same-day
      change, texting/calling is usually fastest.


      Also, you mentioned the importance of volunteers who are comfortable with gentle movement and pacing—this might be a
      good fit for me. I’ve been doing 30–45 minute evening loops (often along the Elbow River pathway) since my panic attacks
      flared up in October 2023. My therapist, Nadine Keller at Calgary Counselling Centre on 17 Ave SW, had me track the
      walks as part of my anxiety plan, and I still keep the notes in my phone. It’s helped me stay grounded, and I’m comfortable
      encouraging others in a low-key way.


      If you can send the next orientation date/time and any paperwork I should review beforehand, I’ll confirm right away.


      Warmly,

      Erin McLeod'
