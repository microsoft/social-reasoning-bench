    extracted_text: "LHL009 | 0920\n\nREQUEST FORM\nREQUEST FOR A REVIEW BY AN INDEPENDENT REVIEW ORGANIZATION\n\nToday's\
      \ Date:     Month__________     Day__________     Year__________\n\nName of Party Requesting Independent Review:\n\n\
