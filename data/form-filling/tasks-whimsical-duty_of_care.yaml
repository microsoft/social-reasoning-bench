    content: 'Subject: Mom’s music list + a quick favour?


      Hi Mom,


      It’s Erin. I’m sending this now because if I wait until after work I’ll forget and then I’ll show up with half a plan
      and three random bananas.


      For Sunday, I’m putting together a little playlist like Dr. Singh suggested at your Foothills Memory Clinic appointment
      last March (the “music + short read-aloud” idea). I’m calling it “Sunday Morning Classics — 1970s” because apparently
      I’ve become the kind of person who names playlists like a radio host.


      Can you reply with 5–10 songs you want on it? Even if you can only remember the artist, that’s fine. I’ll fill in the
      blanks. I also picked up a short book with small chapters so we can do the 10-minute read after lunch without it feeling
      like homework.


      Also—small favour—can you confirm what time you want me to come by? I’m trying to keep my schedule steady. After that
      HR/attendance meeting at work on Sept 18, 2024 (with Elena), I promised myself I’d stop overbooking and then melting
      down. I’m doing better, but I still get that panicky edge if I rush.


      On the bright side, the evening walks are helping again. I did a 35-minute loop near Mount Royal yesterday and didn’t
      feel like I was going to crawl out of my skin, which is progress.


      Anyway. Tell Dad I’ll bring muffins if he promises not to tease me about being “an old lady with playlists.”


      Love you,

      Erin'
