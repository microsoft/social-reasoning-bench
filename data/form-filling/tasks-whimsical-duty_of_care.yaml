  - field_id: denied_services_description
    field_label: Denied Services Description
    value: 'I am requesting an Independent Review Organization (IRO) review of my health plan’s denial of a step-therapy exception
      and related coverage for my prescribed migraine prevention medication.


      DENIED ITEM/SERVICE(S):

      1) Step therapy exception request for Aimovig (erenumab-aooe) 70 mg/mL autoinjector, 1 injection monthly (CGRP monoclonal
      antibody preventive).

      2) Coverage authorization/prior authorization for Aimovig as prescribed by my neurologist.


      WHAT HAPPENED / TIMELINE (as clearly as I can lay it out):

      - I have a long history of chronic migraine (15+ headache days/month for multiple months). I track my migraines in a
      phone app and in a paper calendar because I’ve missed work and family events due to severe attacks.

      - My neurologist submitted a request for Aimovig after multiple preventive medications either failed or caused side
      effects that made them unsafe/unworkable for me.

      - The plan denied the request and stated I must try additional “step therapy” medications first (or retry medications
      that I already tried and did not tolerate).


      MEDICATIONS I HAVE ALREADY TRIED (examples with real-life impact):

      - Topiramate: I tried it for several weeks in the past. It caused significant cognitive side effects (“brain fog”),
      word-finding issues, tingling in my hands/feet, and mood changes. I work in customer service and I was making mistakes
      on calls and forgetting simple details. I also felt unsteady driving.

      - Propranolol: I have naturally low blood pressure and it made me dizzy/lightheaded. I nearly fainted once getting up
      at night to help my child. I also had fatigue that made it hard to function at work.

      - Amitriptyline: caused excessive daytime sleepiness and weight gain. I was groggy in the mornings and it interfered
      with my ability to wake up on time and be present for my morning routine.

      - Sumatriptan (acute/rescue, not preventive): helps sometimes, but I cannot take it too frequently due to rebound concerns
      and it does not prevent the migraines; it only treats individual attacks.


      WHY THE DENIAL IS HARMFUL / WHY I AM REQUESTING AN IRO:

      - My migraines are frequent and disabling. When I have an attack, I experience nausea, light sensitivity, and severe
      head pain. I often have to lie down in a dark room. I have missed work shifts and have used sick days more than I can
      afford.

      - I am trying to avoid medication overuse headaches from relying on acute medications too often.

      - The step-therapy requirement is asking me to fail additional medications that are not appropriate for me given prior
      side effects and my baseline low blood pressure. It feels like I am being forced to repeat treatments that already demonstrated
      they are not tolerable.


      CLINICAL CONTEXT / DAILY IMPACT (concrete examples):

      - In the last few months, I had multiple weeks where I had migraines 4–5 days out of the week. I have had to cancel
      plans with my family, including a birthday dinner, because I could not tolerate light/noise.

      - At work, I have had to ask coworkers to cover my phone line because I was vomiting and couldn’t look at the computer
      screen.

      - I have tried lifestyle changes (regular sleep schedule, hydration, limiting caffeine, avoiding known triggers like
      skipped meals and strong perfumes), but I still have frequent migraines.


      WHAT I AM ASKING FOR:

      - Approve the step-therapy exception and authorize coverage for Aimovig (erenumab-aooe) as prescribed for migraine prevention.

      - If the plan requires documentation, please consider my prior medication trials and the medical necessity rationale
      from my neurologist, including intolerance and contraindication concerns.


      I am including all denial letters and my doctor’s notes with this request. I want an independent clinical reviewer to
      evaluate whether the denial and step-therapy requirement are appropriate given my history, prior failures, and the severity/frequency
      of my migraines.'
