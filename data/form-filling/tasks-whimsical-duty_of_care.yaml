      A couple of quick details in case you need to reach me while you’re processing everything: my best contact number is
      (09) 889-2147 (I’m usually available before 9am or after 4pm on WFH days). Email is fine too, but calls are easiest
      if anything needs clarifying quickly.


      Just to give you some context for the “reason for leaving” section: I’m planning to move when my fixed-term ends in
      April 2026. The main driver is space and practicality — I’m working from home 2–3 days a week at Xero (Auckland office)
      and I really need a second room or at least a proper study nook so I’m not wedging a desk into the living room. It would
      also make weekends with my partner Noah and his son Tama a lot more workable.


      I’m also trying to get ahead of a few stability things. I’m currently on a repayment plan with Inland Revenue for a
      $3,840 tax bill that was set up on 12 December 2025, and I’m aiming to keep everything predictable before my next performance
