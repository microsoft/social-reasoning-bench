    content: 'Subject: Re: Patio booking inquiry (Canal Side Harmony)


      Hi Megan,


      Thanks so much for reaching out — we’d love to play your Friday patio slot if it’s still open.


      A couple quick details so we’re on the same page:

      - We’re an acoustic duo (two vocals + acoustic guitars). We can bring our compact PA/mixer if you want us lightly amplified,
      or we can stay fully acoustic if the patio is tight and you’d rather keep it mellow.

      - Typical set structure for us is 2 x 45-minute sets with a short break in between. Just being transparent: we’re still
      pretty shaky on longer sets — after about 45 minutes we start running out of songs we feel confident doing — so if you
      need a full 3-hour block, we’d want to discuss whether you’re okay with shorter sets or a longer break.


      If you can confirm the start/end time you’re aiming for (and whether you have an outdoor outlet near where you’d like
      us positioned), I can lock it into our calendar. Also let me know if you have any “must-play” vibe requests (more folk/country
      vs. classic rock, etc.). We keep everything family-friendly.


      Best number to reach me for quick logistics is (289) 812-4473 (text is perfect during my day job hours). Email works
      too, just sometimes I’m slower to respond on shift.


      Looking forward to it!


      Alyssa Bennett

      Canal Side Harmony'
