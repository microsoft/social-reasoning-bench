      Hello Carewest Volunteer Team,


      I’m looking into volunteering in a role that’s centred on companionship—especially around mealtimes (chatting, encouraging
      someone to eat, just being a steady presence). I had a family member in supportive living a few years ago and I saw
      how much brighter he was when someone took time to sit and talk with him.


      A quick question before I apply: do you have any options that are flexible or allow for occasional rescheduling? I work
      full-time as an office administrator and my schedule can be hectic at certain points in the month (month-end is the
      big one), so I may have to cancel a shift last-minute sometimes. I’m trying to set expectations honestly so I don’t
      overcommit.


      Also, I’ll share this candidly: I’m motivated to volunteer partly because my finances are tight right now after a CRA
      repayment plan I started in September 2024 (about $320/month) tied to a payroll mix-up at my workplace. I’m trying to
      keep my evenings focused on something positive instead of feeling tempted to pick up extra cash work under the table.


