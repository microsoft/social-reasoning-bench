    artifact_type: email
    content: 'Subject: Cedar Creek Update (April) — meeting agenda + walk-and-talk notes


      Hi neighbors,


      Quick heads-up that our April Cedar Creek Neighborhood Association meeting is next Tuesday (2nd Tuesday), 6:30–7:45
      PM (doors open 6:15) in Meeting Room B at Southeast Clarke Park Community Center, 4440 Lexington Rd. If you have an
      item you’d like on the agenda, please reply by Sunday night so I can keep us on track.


      Draft agenda:

      1) Lexington Rd corridor updates (any new zoning notices spotted)

      2) Stormwater/pooling follow-up near the 230–260 block of Cedar Creek Dr (what we observed after the last heavy rain)

      3) Traffic/speeding hotspots — any new pole numbers for streetlight outages

      4) Spring walk-and-talk planning (Saturday, 9:30–10:30 AM; start at the Cedar Creek Dr entrance sign)

      5) Newsletter + listserv reminders


      For anyone new (or if you just want everything in one place), I’ve been collecting links to ACC staff reports, the short-term
      rental ordinance update info, and our past meeting notes on our optional info site: https://sites.google.com/view/cedarcreekna-athens.
      It’s not fancy, but it’s easier than digging through old emails.


      Also: if you took photos during the last walk-and-talk, please upload them to the shared folder or just email them to
      me and I’ll add them. The more specific we can be (exact address range, which inlet seems slow, how long standing water
      lasted), the better response we get when we submit a report.


      Thanks, and see you Tuesday.


      —Monica Hartwell

      Administrative Coordinator (day job)

      Cedar Creek Neighborhood Association communications'
