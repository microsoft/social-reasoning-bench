  form_summary:
    form_purpose: A pre-tenancy application to apply to rent a specific property, providing personal, identification, and
      rental history details for assessment and potential credit/reference checks.
    intended_recipient: The prospective landlord/property manager or tenancy services staff responsible for selecting tenants
