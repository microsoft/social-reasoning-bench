    background_context: 'Erin Kathleen McLeod is a 34-year-old office administrator living in the Lincoln Park area of Calgary.
      After spending a few years away (most recently in Edmonton for work), she moved back to Calgary in late 2023 to be closer
      to family and to rebuild a sense of community that she didn’t realize she’d missed until she returned. She works weekdays
      at Bow River Ridge Construction Ltd., where her day is a steady rhythm of answering calls, tracking invoices and purchase
      orders, coordinating subcontractor schedules, and keeping the front office running smoothly. She’s known at work for
      being punctual and methodical, and she likes the predictability—though she’s also quietly thinking about a longer-term
      pivot into health administration or patient support roles because she wants her work to feel more directly connected
      to people’s wellbeing.


      A big reason that interest stuck is personal: her grandfather, Frank McLeod, spent two years in supportive living before
      he passed away in 2021. Erin still remembers how much brighter he seemed on days when someone took the time to sit with
      him, walk the hallway, or talk with him about his years as a mechanic. Those small, consistent visits changed his mood
      and even his appetite, and it shaped Erin’s belief that companionship and routine matter as much as the big medical
      milestones. Since returning to Calgary, she’s been trying to show up more consistently in her own circles—checking in
      on her parents in the south end, babysitting her sister Megan’s kids when schedules collide, and doing small neighbourly
      things in her condo building like organizing a holiday donation box or picking up groceries for someone recovering from
      surgery.


      Erin’s week is fairly structured. She usually walks in the evenings for 30–45 minutes (often looping through nearby
      paths by Mount Royal University), then winds down with a book—historical fiction and Canadian non-fiction are her go-tos
      (she’s recently been on a Louise Penny kick and keeps a running list of local history titles to borrow from the library).
      On weekends she bakes banana bread or muffins, does simple crafts like card-making or beginner knitting, and puts together
      themed playlists of older music from the 1950s through the 1980s—folk and classic country especially—because she likes
      how music sparks memories and conversation. She’s also been carving out time during late mornings or early afternoons
      (ideally Tuesdays or Thursdays, with occasional Saturdays) for regular community involvement, and she’s particularly
      drawn to meal-time companionship and the social side of dining because she’s seen firsthand how encouragement and friendly
      conversation can help people feel more engaged and willing to eat. Overall, Erin is in a season of rebuilding: settling
      back into Calgary, balancing a stable job with a possible career shift, and looking for ways to become a familiar, reliable
      presence in the lives of others.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Quick catch-up + Thursday logistics


      Hi Meg,


      Just leaving work and my brain is mush, but I wanted to check in before I forget. How are you holding up this week?
      I can do the Thursday run again, but I need my afternoon to stay pretty locked down.


      If Noah’s speech therapy at Alberta Children’s Hospital is still 1:00–1:45 with Karen DuBois (SLP), I can pick him up
      at 2:00 on the dot like last week. If you’re running late, text me when you’re 10 minutes out and I’ll just take him
      for a loop in the main hallway until you get there.


      Also: I’m trying to keep Tuesdays/Thursdays light until that May 13, 2026 appearance at Calgary Provincial Court. Priya
      Sandhu said it’ll probably be a mid-day thing (still makes my stomach flip thinking about the Deerfoot Trail collision
      in November), so I’m basically treating those days like “don’t overbook.”


      I’m still doing weekly counselling (started Feb 2025) with Dr. Aisha Rahman—Calgary Counselling Centre in Beltline—and
      it’s helping, but the panic-y feeling comes back when I stack too many commitments. Volunteering somewhere structured
      for a couple hours a week feels like a good way to get back into normal-life mode without spiralling.


      One more thing: can you send me Noah’s snack preferences again? I brought the wrong granola bar last time and he gave
      me the look like I’d betrayed him.


      Love you. Call if you want me to swing by Evergreen this weekend—could bring muffins.


      Erin'
