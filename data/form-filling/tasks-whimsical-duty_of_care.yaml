    content: 'Text thread: Evan ↔ Workshop group (Tuesday DuPont)


      Evan: Morning! Quick reminder for tomorrow’s Blue Ridge Shutter Walks session. Meet 7:15 at the Hooker Falls access
      area lot. We’ll do a 10–15 min check-in, safety briefing (wet rock + water-edge boundaries), and a gear check.


      Participant 1: Are we doing Hooker + High Falls?


      Evan: That’s the idea. Hooker Falls overlook/riverbank first for soft light + long exposures. Then *maybe* a short add-on
      from the High Falls access area to the overlook(s) if everyone’s feeling good.


      Participant 2: How strict are we about staying on trail? I’m trying to avoid people in my frame.


      Evan: We’ll be respectful of other visitors and I’ll assign “micro-zones” so we’re not stacked on top of each other.
      We’ll likely spread out along the trail and off to the sides to get different angles—don’t be afraid to step a few feet
      off the trail onto durable surfaces (rock, packed dirt) for a cleaner composition.


      Evan: For compositions, you can wander a bit to find your angle—sometimes that means stepping off to the side onto durable
      surfaces (rock, packed dirt) for a cleaner line, but please don’t go trampling vegetation or getting close to slick
      edges. If you’re unsure, ask me and I’ll point out safer spots.


      Participant 3: Any filter recs?


      Evan: Polarizer if you’ve got it, and ND if you want silky water. Bring a lens cloth—spray happens.


      Participant 1: End time?


      Evan: Hard stop at 1:00. I’ve got a kid appointment in Brevard mid-afternoon, so we’ll keep the pace moving.


      Evan: Also: no drones, no props, no light stands beyond your own tripod. Quiet voices, yield to hikers, and we’ll adjust
      if parking is a mess.


      Participant 2: Got it. Thanks!'
