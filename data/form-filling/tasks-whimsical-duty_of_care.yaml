  - artifact_type: text
    content: 'Text thread — Erin ↔ Dad (Liam)


      Erin: Hey Dad. Do you have a minute later? Nothing urgent, just… life admin.


      Liam: I’m home. What’s up, kiddo?


      Erin: I’m fine. Just trying to be more organized. The CRA repayment plan is still coming out—$320/month since Sept 2024.
      I hate that it’s still hanging over me.


      Liam: You’re handling it. That’s what matters.


      Erin: I know. It was that payroll mix-up at Bow River Ridge that kicked it off, and it still makes me cringe because
      it feels like my fault even if it wasn’t “on purpose.”


      Liam: You’ve always been responsible.


      Erin: Thanks. I’m also trying really hard not to do anything stupid to “fix it faster.” Like when someone at work mentions
      a cash-only weekend admin gig, my brain goes: easy money! and then I’m like NOPE, not worth it.


      Liam: Good. Keep your nose clean.


