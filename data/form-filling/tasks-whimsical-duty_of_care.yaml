  - field_id: personal_information_volunteer_reason_other_details
    field_label: Personal Information Volunteer Reason Other Details
    value: Community involvement and giving back (I recently moved back to Calgary after a few years away and I’m trying to
      rebuild a sense of community). I also have a personal connection to continuing care because my grandpa lived in supportive
      living for two years, and the volunteers who visited him made a noticeable difference in his mood and appetite. I’d
      like to be that consistent, friendly face for someone else. I’m also exploring a longer-term career shift into health
      administration or patient support roles, so volunteering is a practical way for me to learn what day-to-day care environments
      are like while contributing in a meaningful, non-clinical way.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: personal_information_why_volunteer_at_carewest
    field_label: Personal Information Why Volunteer At Carewest
    value: 'I’m applying to Carewest specifically because it’s known in Calgary for respectful, person-centred care and for
      having a wide range of programs (long-term care, rehab/recovery, and supportive living). That range matters to me because
      I want to be placed where my strengths are actually useful rather than just “filling time.”


      On a personal level, I’ve seen how isolating it can be for older adults or people recovering from illness/injury—especially
      when family can’t be present every day. When my grandfather was in supportive living, the small consistent interactions
      (someone bringing him to an activity, sitting with him during a meal, listening to him talk about his work as a mechanic,
      even just walking the hallway with him) had a bigger impact than I expected. He was more engaged, less anxious, and
      he slept better on days he had company.


      Practically, I’m reliable and comfortable with routine. In my current job (office administrator for a small construction
      company), I’m used to showing up on time, following privacy/confidentiality expectations, documenting details, and communicating
      changes early. I’m also comfortable around mobility aids and slower-paced conversations—I don’t rush people. I’m looking
      for a longer-term placement (not a one-off event) so residents and staff can count on me, and so I can build trust and
      consistency. I’m also fully willing to complete any required orientation/training and a vulnerable sector check before
      starting.'
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: personal_information_hobbies_and_interests
    field_label: Personal Information Hobbies And Interests
    value: 'I have a pretty steady set of hobbies that translate well to volunteering:


      - Reading and conversation: I read a lot of historical fiction and Canadian non-fiction (Louise Penny, Miriam Toews,
      local history). I’m happy to read aloud (short stories, newspaper articles) or just chat. I’m comfortable with pauses
      and repeating information if someone has memory issues.


      - Music: I’m not a performer, but I enjoy older music (50s–80s, folk, country). I often make themed playlists (e.g.,
      “Sunday morning classics”) and I’ve noticed music is a great conversation starter (“Where were you when you first heard
      this song?”).


      - Crafts/light activities: I like simple crafts like card-making, colouring, basic knitting (I’m beginner/intermediate),
      and doing puzzles. I can help set up and tidy after activities, and I don’t mind doing repetitive tasks.


      - Walking and gentle fitness: I walk most evenings (usually 30–45 minutes) and I’m comfortable supporting supervised
      hallway walks or accompanying someone to an activity when staff indicate it’s appropriate.


      - Cooking/baking: I bake muffins and banana bread on weekends. I understand I may not be able to bring homemade food
      depending on policy, but I enjoy food-related social activities (helping serve at an event, assisting with set-up for
      a tea, etc.).


      - Community involvement: I’ve volunteered informally at my condo building (organizing a small holiday donation box and
      helping a neighbour with grocery pick-ups after surgery). I also enjoy learning people’s life stories—jobs, family history,
      places they’ve lived—because it helps me relate to them as whole people, not just “patients” or “residents.”'
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: volunteering_preferences_area_other_text
    field_label: Volunteering Preferences Area Other Text
    value: Meal-time companionship/support (e.g., sitting with someone during meals for social connection, assisting with
      set-up/clean-up as directed by staff, encouraging participation in dining room conversation). I understand volunteers
      would not provide clinical feeding assistance unless specifically trained/approved, but I’m very interested in the social
      and motivational side of meals because I’ve seen it help appetite and mood.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: volunteering_preferences_time_commitment_per_shift
    field_label: Volunteering Preferences Time Commitment Per Shift
    value: Preferred 2.5–3 hours per shift, 1 shift per week (ideally Tuesdays or Thursdays). I can also do an occasional
      Saturday late morning/early afternoon shift (about 2–3 hours) if there is a special event, an outing, or if coverage
      is needed. My work schedule is typically Monday–Friday 8:30am–4:30pm, but I have flexibility to start later on Tuesdays/Thursdays
      with notice, which is why late morning or early afternoon volunteer shifts work best. I’m looking for a minimum 6-month
      commitment so the placement is consistent for residents and staff.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
