    content: 'Subject: IRD plan + trying to get my head straight before May


      Hey Dad,


      Hope you and Mum are keeping warm — Auckland’s doing that fake-summer thing where it’s humid one day and sideways rain
      the next.


      Just wanted to give you a quick update because you asked how things were tracking. I set up a repayment plan with Inland
      Revenue on 12 December 2025 for that $3,840 tax bill. It’s manageable as long as I don’t do anything dumb (read: no
      impulse purchases, fewer “I deserve sushi” nights). It’s annoying more than anything, but I’m trying to treat it like
      a fixed cost and move on.


      Work is busy in the usual way. I’m still doing product analyst stuff at Xero — dashboards, customer behaviour deep-dives,
      lots of meetings where we argue about what a metric “really means.” I’ve got my next review with Elena Vatuvei in May
      2026, so I’m trying to keep everything stable and not look like I’m dropping balls.


      One stupid thing: the parking around my place has gotten so bad that I’ve ended up parking a block away more times than
      I can count. Twice this month I’ve come in flustered and a couple minutes late to calls because I was speed-walking
      home with my laptop and groceries like a pack mule. It’s not a good look, and it just adds to the feeling that this
      unit doesn’t fit my life anymore.


      Anyway, we’re aiming to move when the fixed term ends (April-ish timing depending on what we find). Ideally somewhere
      quieter, with off-street parking, and a second room so I’m not working out of the lounge.


      Love,

      Elliot'
