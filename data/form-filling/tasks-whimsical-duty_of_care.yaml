      Subject: Next steps for Aimovig denial / appeal packet

      Date: Thu, Mar 27, 2025 4:18 PM


      Hi Ms. Ortega,


      I’m sorry you’re dealing with this. My staff let me know your insurer denied coverage for Aimovig and did not grant
      the step-therapy exception requested.


      For your records, you mentioned a claim/authorization reference from the insurer voicemail as **HP-54821739**. We can
      include that on the cover sheet if that’s what they are using to track the request; however, if you receive a letter
      with a different reference number, please forward it so we match exactly.


      We will prepare an appeal packet that includes:

      - My clinical note from 03/18/2025 documenting prior preventive trials and intolerance/failure: topiramate (significant
      cognitive side effects/brain fog and word-finding difficulty), amitriptyline (excessive sedation and weight gain), and
      propranolol (symptomatic hypotension/lightheadedness).

      - A brief statement supporting medical necessity and why step therapy is not appropriate given the above.


      On a practical note: please do not restart topiramate while we’re appealing. You previously reported that the cognitive
      effects interfered with your work performance, including confusion on calls, and you deserve a plan that keeps you safe
      and functional.


      If you can upload the denial letter to the patient portal or email it to my nurse (cc’d here), we’ll submit the appeal
      within 2 business days.


      Best,

      Priya Nandakumar, MD

      Austin Neurology & Headache Center (North Lamar)

      Nurse line: (512) 555-0148


      CC: Marisol Vega, RN <mvega@austinneurologyhc.com>'
