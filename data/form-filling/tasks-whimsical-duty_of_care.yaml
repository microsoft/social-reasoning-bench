    content: 'Draft email (saved, not sent) — asking about volunteer options


      Hi there,


      I’m looking at getting involved locally again now that I’m settled back in Calgary, and I’m trying to find something
      that fits around a fairly fixed work schedule (Mon–Fri, 8:30–4:30 at Bow River Ridge Construction). I can usually make
      a late-morning or early-afternoon slot on Tuesdays or Thursdays for about 2.5–3 hours, once a week.


      I’m most interested in meal-time companionship in a dining room setting—more the social side: sitting with someone,
      keeping conversation going, helping with set-up/clean-up as staff direct. I got a real appreciation for how much company
      matters when my mom was doing chemo at Tom Baker Cancer Centre Oct–Dec 2023. Her dietitian, Sarah K. (RD), kept stressing
      that social meals can help people keep weight on, so I ended up sitting with her at lunch for about six weeks. It sounds
      small, but it made a difference.


      That said, I’m going to be honest in my own notes here: I’d love something that’s not too people-facing right away.
      I’m fine being friendly, but I’m more comfortable starting with “helpful in the background” tasks until I get my footing.
      Also, I won’t pretend the practical side isn’t part of it—I’d like something that’s good for the resume and helps me
      build connections outside my construction admin job.


      If there’s any option that’s a bit flexible (like swapping a week here and there), that would help too—my work can get
      unpredictable around month-end.


      (End draft)


      To add later: mention Grandpa at Carewest Garrison Green Spring 2021 + how consistent company helped him after the Rockyview
      dementia confirmation in Feb 2021 (Dr. A. Singh). Don’t ramble.'
