      doors, conversations, music) that regularly break his sleep and ruin early mornings.


      Parking has become another steady frustration. Street parking in the area used to be manageable, but with more tenancies
      nearby, Elliot often ends up parking a block away, which turns grocery runs into a juggling act and makes him uneasy
      when he’s getting home later in the evening. He’s politely raised the noise issue a couple of times and it improves
      briefly, but it keeps recurring. With his fixed-term tenancy ending soon, he’s timing his next move to avoid limbo and
      to set himself up for something longer-term and calmer—ideally a quieter place with more space (a two-bedroom or at
      least a separate study nook), reliable parking, and a neighbourhood that feels more settled and family-oriented.


      In the meantime, Elliot’s days are fairly structured: he starts early with a run around Keith Hay Park when the weather
      holds, then logs on for stand-ups and analysis work—digging into customer behaviour data, writing dashboards, and meeting
      with product and support teams. On office days, he takes the train into the CBD and tries to keep evenings low-key:
      cooking simple meals (stir-fries, sheet-pan salmon), weekly kitchen and bathroom cleaning, and catching up with Noah
      and Noah’s 9-year-old son, Tama, on weekends—often at Cornwall Park or a local swimming pool. He doesn’t smoke and keeps
      his place tidy, but the combination of cramped space, unpredictable noise, and worsening parking has him feeling worn
      down. Lately he’s been spending weeknights browsing listings, measuring what a desk setup would look like in a second
      bedroom, and planning a move that better fits the life he’s building with Noah—something quieter, more functional, and
      easier to settle into for the next few years.'
