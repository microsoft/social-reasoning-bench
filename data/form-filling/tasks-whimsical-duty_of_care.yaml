    background_context: 'Alyssa Bennett lives in Welland, Ontario, and most weeks feel like a careful balancing act between
      steady work and the creative life she’s built with her partner, Jordan “Jordy” Clarke. By day she works part-time in
      Student Services at Niagara College’s Welland campus, handling front-desk inquiries, appointment scheduling, and the
      kind of small problem-solving that keeps a busy office running. She likes the predictability of the job and the people—especially
      during the winter term rush—while also keeping her schedule flexible enough to perform. Music has been part of her identity
      since she was a kid; she started singing seriously in school choirs and coffeehouse nights in high school, then kept
      investing in herself through private vocal lessons (on and off since 2016) and local workshops around Niagara that helped
      her get comfortable with stagecraft, mic technique, and planning sets that fit the room.


      Outside of work, Alyssa and Jordy perform as Canal Side Harmony, an acoustic duo based in Welland. Their setup is intentionally
      practical: two vocal mics, stands, a small mixer, and a compact PA they can carry in one trip, with the option to play
      fully acoustic when the space suits it. They’ve spent the last couple of years doing regular weekend patio sets across
      the Niagara region—long, 2–3 hour performances where the goal is to keep the mood upbeat without drowning out conversation.
      Alyssa handles lead vocals, acoustic guitar, and light percussion, while Jordy anchors the sound with steady acoustic
      guitar and harmony vocals—skills he built over 15+ years playing, including church/worship settings and jam nights.
      Their repertoire leans into recognizable, family-friendly songs (The Beatles, Fleetwood Mac, Dolly Parton, Shania Twain,
      Neil Young, Johnny Cash, The Lumineers, Ed Sheeran, and acoustic takes on Taylor Swift), and they’re careful about keeping
      lyrics clean and the vibe welcoming for all ages.


      Recently, Alyssa has been trying to tighten up routines so she doesn’t feel like she’s always “catching up.” Weekdays
      usually start with coffee at home and a quick run through email and set notes before her shift, then she’ll squeeze
      in a 20–30 minute vocal warmup after work if the evening is free. On performance weeks, she and Jordy rehearse in their
      living room—working on harmonies, transitions, and a few newer additions that keep walk-by audiences engaged—then do
      a gear check the night before (cables, spare batteries, power bar). Money is a practical concern: with part-time hours
      and fluctuating gig income, Alyssa tracks expenses closely and is saving toward upgrading one piece of gear at a time
      rather than financing anything. She also keeps an eye on her voice—staying hydrated, resting when she can, and booking
      the occasional lesson to refine technique—because she knows consistency is what makes the difference between a hobby
      and a sustainable local music life.'
