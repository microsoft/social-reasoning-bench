  - field_id: entertainer_information_music_background
    field_label: Entertainer Information Music Background
    value: 'Canal Side Harmony is an acoustic duo based in Welland, Ontario featuring Alyssa Bennett (lead vocals, acoustic
      guitar, light percussion) and Jordan “Jordy” Clarke (acoustic guitar, harmony vocals). We focus on upbeat, family-friendly
      sets that work well in open-air community spaces like markets, patios, and festivals.


      Experience and training:

      - Alyssa has been singing since childhood and began performing publicly in high school (choir and coffeehouse nights).
      She has taken private vocal lessons (pop/folk technique, breath support, and harmony work) on and off since 2016 and
      has completed several community music workshops in Niagara (stagecraft, mic technique, and set planning).

      - Jordan has played guitar for 15+ years, with a background in fingerstyle and rhythm acoustic. He has played in church/worship
      settings, jam nights, and small ensembles, and he is comfortable keeping steady tempo for walk-by audiences.


      Performance history (selected, recent and relevant to this type of event):

      - 2023–2025: Regular weekend patio sets in the Niagara region (2–3 hours, background volume appropriate for dining).
      We’ve learned how to keep the energy steady without overpowering conversation—important for a market environment.

      - 2024: Community fundraiser performances (45–60 minute feature sets), including outdoor stages with basic PA support.

      - 2024–2025: Private events (backyard celebrations, small corporate lunches). We provide our own compact PA (Bose S1-style
      speaker) when needed and can also perform fully acoustic if requested.


      Repertoire and audience fit:

      - We play recognizable covers from the 60s to current radio, with a strong emphasis on sing-along classics and lighter
      pop/folk: The Beatles, Fleetwood Mac, Dolly Parton, Shania Twain, Neil Young, Johnny Cash, The Lumineers, Ed Sheeran,
      Taylor Swift (acoustic), and a few Canadiana staples.

      - Our set is appropriate for all ages (no explicit lyrics). If there are specific guidelines (e.g., family-friendly
      only, no political messaging), we already operate within that standard.


      Professionalism and logistics:

      - We arrive early (typically 45–60 minutes) to set up, sound check, and be ready to start on time.

      - We keep stage volume controlled; we are used to playing in spaces where vendors need to be heard and announcements
      may occur.

      - We have our own gear: two vocal mics, stands, small mixer, compact PA, cables, and power bar. We can run off a single
      standard outlet.


      If selected for Jammin’ at the Market, we would tailor a 60–90 minute set (as programmed) with a mix of upbeat “walk-by
      friendly” songs and a few softer tunes to keep the atmosphere welcoming and relaxed for shoppers and vendors.'
