    content: 'Title: Foothills follow-up + playlist prep (Mom)

      Date: 2024-04-16

      Time: 12:10–1:10 PM (travel buffer)

      Location: Foothills Medical Centre (parkade + clinic)

      Attendees: Erin McLeod; Janice McLeod


      Notes:

      - Bring: health card, clinic letter, notebook, water.

      - After appointment, stop by library for a couple short read-aloud options (Canadian non-fiction or something light).
      Keep it calm and familiar.

      - Dr. Amandeep Singh (geriatrician) suggested leaning into music and short read-aloud sessions as part of Mom’s early
      Alzheimer’s plan. Keep using the themed 50s–80s playlists—Mom perks up with older folk/classic country, even when she’s
      repeating questions. Practice staying patient and steady when she gets confused.


      Contact / backup:

      - If my phone dies or I’m stuck in the parkade, call Megan Clarke (backup): (403) 555-6391.


      Reminders:

      - Pack earbuds + charging cable.

      - Ask about next steps and any community supports.

      - Consider volunteering idea I’ve been circling: meal-time companionship/support in a dining room (conversation, social
      encouragement, set-up/clean-up as directed). It’s the kind of steady, low-key routine I can actually keep. I keep thinking
      about Oct–Dec 2023 at Tom Baker Cancer Centre—Mom’s dietitian (Sarah K., RD) kept stressing that social meals helped
      her keep weight on, and I ended up sitting with her most lunches for about six weeks. That felt meaningful and practical.

      '
