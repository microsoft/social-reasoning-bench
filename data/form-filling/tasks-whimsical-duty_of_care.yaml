  - artifact_type: note
    content: 'Gig debrief — Port Colborne patio (Friday night)


      Overall: decent, but I’m annoyed at myself.


      What went right:

      - Setup was smooth (one trip for the compact PA + stands). Power bar saved us because the outlet was weirdly far from
      the “stage” corner.

      - Crowd was chill. Background volume felt right. The staff actually thanked us for not blasting.

      - Harmonies on “Harvest Moon” and “Dreams” were locked in.


      What went sideways:

      - I got anxious as soon as the room got louder (that birthday table). I couldn’t hear myself properly and my brain did
      that blank thing—forgot a line in the second verse and then panicked about forgetting the next one. It’s like if the
      monitor situation isn’t clear, my memory just evaporates.

      - I kept watching Jordy for signs he was getting overwhelmed. Since he started weekly anxiety treatment with Dr. Priya
      Sandhu at Douglas Memorial in May, I’m extra sensitive to any “uh oh” moment mid-set.


      Fixes:

      - Ask venues if we can angle the speaker a bit more toward us, even if it’s subtle.

      - Pack the spare batteries where I can actually find them.

      - Before we start: 60 seconds of breathing, shoulders down, jaw loose.


      Song repetition note:

      We leaned on the same comfortable handful again. It works, but I’m sick of feeling like we’re cycling the same 12 songs
      because they’re the ones that feel safe.


      Personal:

      Drink more water. Stop having coffee at 6 PM. Text Mom tomorrow.

      '
