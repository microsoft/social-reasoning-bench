      you prefer). We usually arrive about 60–75 minutes early to park, load in, and do a quick sound check. We’re comfortable
      doing two 45–50 minute sets with a short break in between, or a continuous lighter set depending on your patio traffic.


      Re: scheduling, I’m still careful with late-night stretches. I’ve done private vocal lessons on and off since 2016,
