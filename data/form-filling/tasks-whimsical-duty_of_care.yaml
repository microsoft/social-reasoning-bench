    value: 'Applicant persona (for context on the numbers provided):


      My name is Daniel Robert Whitaker. I’m 39 years old and I live with my spouse and our two kids in Spokane Valley, WA.
      I work full-time as a facilities maintenance supervisor for a regional healthcare network and I’ve been with the same
      employer for a little over 7 years. My spouse works part-time (seasonally more hours in the summer) and we generally
      keep our household budget pretty conservative because we’ve had a few expensive surprises over the last two years (plumbing
      issue in the home and an unexpected medical deductible).


      ASSETS EXPLANATION (how I estimated values):

      1) Home present value ($385,000): I used a combination of recent comparable sales in our neighborhood (Greenacres area)
      and an online estimate from late March 2026. Homes on our street with similar square footage (3 bed / 2 bath, ~1,650
      sq ft) have been selling in the $370k–$405k range depending on updates. We replaced the roof in 2022 and updated the
      HVAC in 2023, which helps value, but our kitchen is not fully remodeled, so I used a middle-of-the-road value.


      2) Auto #1 (2018 Toyota RAV4 XLE) present value ($16,500): This is our primary family vehicle. It has ~92,000 miles,
      clean title, no accidents, and routine maintenance. I used a private-party estimate based on condition (good) and mileage.


      3) Auto #2 (2012 Ford F-150 XLT) present value ($9,200): This is an older truck used mainly for hauling, home projects,
      and winter driving. It has ~158,000 miles and some cosmetic wear (small dent on rear quarter panel, paint chips). Mechanically
      sound. I used a conservative value based on similar listings.


      LIABILITIES / PAYMENTS CLARIFICATIONS:

      - Mortgage: The mortgage is in my name (no co-signer). Payment listed ($2,145) is the monthly payment including principal/interest
      plus escrowed property taxes. Present balance ($268,400) is the approximate payoff balance from my last statement (March
      2026).


      - Home insurance: We pay it through escrow as part of the mortgage payment, but I still listed an estimated monthly
      equivalent ($125) for transparency. Present balance is $0 because it’s not a revolving balance; it’s an ongoing premium.


      - Auto #1 loan: The RAV4 is financed. The monthly payment is $372 and the remaining balance is about $7,420. This is
      from the most recent loan statement; we are close to paying it off.


      - Auto #2 loan: The F-150 is owned free and clear (no payment, $0 balance).


      - Auto insurance: We pay every 6 months. The amount shown ($780) is the six‑month premium payment. Present balance is
      $0 because we pay the premium in full at renewal.


      - Other real estate: None.


      - Spokane Tribal Credit loans: I currently have a small short-term loan with STC that I used to cover an emergency plumbing
      repair and a portion of a medical copay in February. The payment listed ($185) is what I’ve been paying monthly to pay
      it down faster than the minimum. Current balance is approximately $740 as of this week. I do not have any STC long-term,
      auto repair, or education loans.


      - Credit cards/other debt: This includes two credit cards (one used for groceries and gas, another used for a couple
      of household purchases). I pay more than the minimum; the $265 is my typical combined monthly payment. Total balance
      across both is about $4,860. I have been steadily reducing this balance since the holidays.


      - Alimony/child support: None.


      BUDGET / REPAYMENT NOTES (additional detail to support underwriting):

      - We track spending using a basic spreadsheet. Fixed expenses are mortgage, utilities, insurance, and childcare (after-school
      program). Variable expenses are groceries, fuel, and kids’ activities.

      - I receive a small annual bonus (typically $1,500–$3,000 before taxes) and I usually apply it toward debt reduction
      (credit cards or extra principal on the auto loan).

      - The STC short-term loan was taken due to a timing issue (repair needed immediately before tax refund arrived). Since
      then, we have adjusted our emergency fund goal and have set up an automatic transfer of $75 per paycheck into savings.


      If any additional documentation is needed (mortgage statement, insurance declarations page, auto loan statement, or
      proof of payoff on the truck), I can provide it.'
