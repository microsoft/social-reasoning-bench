  - artifact_type: note
    content: 'Workshop run-of-show (DuPont) – personal prep notes


      Wake 5:30. Check radar + stream flow. Charge batteries. Pack: extra lens cloths, ND/polarizer demo, first-aid kit (bandages/blister
      care/gauze/antiseptic/elastic wrap), emergency blanket, trash bag.


      Meet: Hooker Falls access area lot. 10–15 min check-in: names, experience level, tripod safety, “don’t rush on wet rock,”
      water-edge boundary reminder. Keep voices low.


      Primary teaching stops:

      1) Trail junction: exposure triangle refresher + ISO limits in shade.

      2) Near overlook: polarizer demo (glare control) + framing through branches.

      3) Riverbank/overlook rotation: long exposure practice, tripod placement, timed turns.


      Crowd plan / flexibility:

      If Hooker is slammed (weekends have been nuts), don’t force it. Move the group to a nearby quieter stretch and keep
      teaching fundamentals—better to keep people safe and learning than to fight for one viewpoint. If the main waterfall
      area is too busy, we’ll just shift everyone to another nearby spot on the fly (have 1–2 backup locations in mind so
      the class keeps moving). If things open up later, circle back.


      Optional add-on: High Falls access area → overlook(s). Keep it short and call it if weather shifts.


      Personal constraints:

      - End by 1:00 PM. Need buffer for Claire’s Tuesday 3:30 speech therapy at Pisgah Pediatric Therapy ($120) and I’m not
      paying another missed-appointment fee.

      - Staying close to parking is still the smart play. After the May 18, 2024 panic-attack ER visit at Transylvania Regional
      Hospital in Brevard, Dr. Lila Henson’s guidance was to keep routes predictable while tapering off clonazepam (0.5 mg).
      I’m fine most days, but I teach better when I’m not white-knuckling.

      - Avoid covered bridge area. Sean’s Aug. 12, 2024 Transylvania County District Court DWI mess + no-contact order tied
      to that park employee argument = not worth the risk of a run-in.


      Post: quick debrief, remind about Leave No Trace + send follow-up email with editing tips.'
