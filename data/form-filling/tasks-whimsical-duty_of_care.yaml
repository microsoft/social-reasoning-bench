    content: 'Subject: Grandpa’s care conference notes (Garrison Green) — meds + wandering plan


      Hi Mom,


      I’m writing this down while it’s fresh from the family meeting today at Carewest Garrison Green. I know Spring 2021
      has been a blur, but I don’t want us to lose the details.


      Dr. A. Singh (the physician who confirmed Grandpa’s dementia diagnosis at Rockyview General Hospital back in February
      2021) was referenced a few times, especially around what “baseline” looks like for him when he’s tired vs. when he’s
      agitated.


      Main points from the care conference:

      - Wandering incidents: staff said the last couple weeks he’s been trying doors more in late afternoon. They’re watching
      for patterns (noise, hunger, bathroom needs) and asked us to note anything we’ve seen during visits.

      - PRN medication: they reviewed the PRN plan and when they’ll consider it (only after non-med approaches). They emphasized
      consistent cues first—calm voice, redirecting with a task, short hallway walk.

      - What helps: when someone sits with him for even 20–30 minutes and talks about his mechanic days, he settles faster.
      On my last visit he ate more of his supper after we walked the hallway twice.


      It honestly hits me how much steady companionship changes his mood. Being there through the wandering incidents and
      hearing the PRN discussion made it real in a way I wasn’t prepared for. I was browsing the Carewest site after we got
      home and I’m not really sure what volunteer role would fit me yet—I’m hoping they can just place me wherever you need
      someone, because it feels like being a familiar face matters.


      Can you forward this to Megan too? I’m going to keep a running note so we don’t have to rely on memory.


      Love,

      Erin'
