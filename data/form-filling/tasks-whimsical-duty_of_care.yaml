  - artifact_type: email
    content: 'Subject: Tuesday’s DuPont photo walk – meet-up + what to expect


      Hi [Client Name],


      Looking forward to having you out with Blue Ridge Shutter Walks this Tuesday.


      We’ll meet at 7:15 AM at the Hooker Falls access area parking lot in DuPont State Recreational Forest. We’ll start with
      a quick check-in, safety briefing (wet rock, footing, water-edge boundaries), and a gear check. After that we’ll walk
      as a group on established trails to the Hooker Falls overlook/riverbank for the soft morning light and long-exposure
      practice.


      Later in the morning, if the group is feeling good and conditions cooperate, we may do a short add-on from the High
      Falls access area to the overlook(s) for a different angle and a little more open sky.


      One note on specifics: I’ll make the final call day-of on whether we spend that second block at High Falls or pivot
      to a different nearby spot, depending on light, crowds, and parking. DuPont can change fast, and I’d rather keep the
      class moving and comfortable than get stuck waiting for a single viewpoint to clear.


      What to bring:

      - Camera + charged battery (and a spare if you have it)

      - Tripod (recommended)

      - ND filter and/or polarizer if you own them (not required)

      - Rain shell / warm layer (it’s the mountains)

      - Water + snack

      - Lens cloth (spray at the falls)


      We keep it low-impact: no drones, no props, no off-trail travel, and we yield to hikers. I’ll also rotate folks through
      small “micro-zones” so nobody crowds one spot.


      We’ll wrap by 1:00 PM.


      See you Tuesday,

      Evan Rourke

      Blue Ridge Shutter Walks'
