  - field_id: optional_information_newsletter_or_other_publication
    field_label: Optional Information Newsletter Or Other Publication
    value: 'Monthly email newsletter: “Cedar Creek Update” (sent via Mailchimp on the first Monday of each month). We also
      post time-sensitive items (road closures, public hearings, zoning notices) to a private neighborhood listserv and a
      public-facing Facebook page (“Cedar Creek Neighborhood Association – Athens, GA”). Recent examples include: a February
      recap of ACC stormwater maintenance on the creek culvert near Cedar Creek Dr.; a March reminder about the countywide
      short-term rental ordinance update meeting; and a voter info section with early voting dates and the polling location
      map link.'
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: optional_information_regularly_scheduled_meetings_details
    field_label: Optional Information Regularly Scheduled Meetings Details
    value: Regular meetings are held on the 2nd Tuesday of each month at 6:30 PM (doors open at 6:15) at the Southeast Clarke
      Park Community Center, 4440 Lexington Rd, Athens, GA 30605, Meeting Room B. We typically keep meetings to 60–75 minutes.
      We also hold a quarterly Saturday “walk-and-talk” neighborhood walk (9:30–10:30 AM) starting at the Cedar Creek Dr.
      entrance sign; these are used to document sidewalk issues, speeding hotspots, drainage problems, and streetlight outages
      with photos and exact pole numbers. When we have major agenda items (rezonings, development proposals, or public safety
      concerns), we schedule an additional special meeting with at least 10 days’ notice and offer a Zoom option for residents
      who work nights or have mobility/childcare constraints.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: optional_information_comments_questions_suggested_topics
    field_label: Optional Information Comments Questions Suggested Topics
    value: 'Primary reason for registering: We want to ensure our neighborhood receives official notifications for rezonings,
      special use permits, variances, and other land use actions that could affect Cedar Creek and the adjoining corridors.
      Our neighborhood is a mix of older single-family homes (late 1970s–1990s) and a few small multi-family pockets near
      the edge of the boundary, so we try to stay engaged and proactive.


      Neighborhood boundary description (plain-language summary we use internally): The CCNA area generally includes the homes
      along Cedar Creek Dr., Timber Ridge Way, Brookstone Ct., and the connecting cul-de-sacs, bounded roughly by Lexington
      Rd. to the north/northeast, the creek/greenway corridor to the south, and the small commercial node near the Lexington
      Rd. intersection to the east. We coordinate with adjacent neighborhoods on the Lexington Rd. corridor so notices don’t
      “fall through the cracks.”


      Suggested topics for ACC Planning/Neighborhood Notification Initiative communications:

      1) Clear guidance on how to read a zoning sign and where to find the staff report (with a step-by-step example). Many
      residents are first-time participants and get overwhelmed by acronyms.

      2) Short explainer on typical rezoning conditions (buffers, lighting, ingress/egress, hours of operation) with examples
      of what is and isn’t enforceable.

      3) A quarterly digest of upcoming corridor studies and transportation projects (Lexington Rd. safety improvements, speed
      management tools, crosswalk warrants).

      4) Stormwater/drainage resources: how to report blocked inlets, how maintenance responsibilities work, and what residents
      can do about repeated flooding (we have a recurring pooling issue near 230–260 Cedar Creek Dr. during heavy rain).

      5) Code enforcement basics: what constitutes a complaint, how anonymity works, realistic timelines, and how to track
      a case.


      Questions/notes:

      - If possible, we’d appreciate being included on any notifications for projects within 1 mile of our boundary along
      Lexington Rd., since traffic and cut-through impacts are felt immediately.

      - We maintain a roster of about 118 households; typical meeting attendance is 18–35 depending on the agenda. We are
      volunteer-run with a rotating steering committee (chair, vice chair, secretary/communications, and at-large).


      Personal context from the contact person (to help staff understand our capacity): I (Monica Hartwell) work as an administrative
      coordinator at a local medical practice and can reliably respond to emails during lunch and after 5:30 PM. I’m also
      the person neighbors call when they see a notice sign posted because I keep a shared folder of maps, past cases, and
      contact lists. We try to be constructive—e.g., last year we met with a developer early and negotiated better shielding
      for parking lot lighting and a more direct pedestrian connection, rather than just opposing the project.'
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
