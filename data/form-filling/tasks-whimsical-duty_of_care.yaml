    background_context: 'Monica Hartwell is a 41-year-old administrative coordinator at a local medical practice on Lexington
      Rd. Her days are a steady rhythm of patient scheduling, prior-authorizations, and keeping the front office from getting
      backed up—she’s usually at her desk by 8:00 AM, grabs a quick lunch around 12:30, and is reliably back online after
      5:30 PM once dinner is underway. She and her husband, Evan, bought their Cedar Creek Dr home in 2017, drawn to the older,
      lived-in feel of the late-1970s-to-1990s houses and the fact that it’s close enough to work and schools without feeling
      like they’re right on top of the main road. Weeknights are a juggle: homework at the kitchen table, Evan’s sometimes-late
      service calls, and Monica squeezing in laundry and the next day’s calendars. She’s the kind of person who keeps labeled
      folders—house manuals, school info, and neighborhood notes—because it lowers her stress when things get busy.


      Outside of work, Monica is deeply involved in the Cedar Creek neighborhood association, which is volunteer-led and explicitly
      not an HOA. She handles most of the communications: a monthly email newsletter called “Cedar Creek Update” that goes
      out through Mailchimp on the first Monday, plus quick-turn posts to the private neighborhood listserv and their public
      Facebook page (“Cedar Creek Neighborhood Association – Athens, GA”). Recent items she’s pulled together include a February
      recap of Athens-Clarke County stormwater maintenance around the creek culvert near Cedar Creek Dr., a March reminder
      about the countywide short-term rental ordinance update meeting, and a voter-info section with early voting dates and
      a polling-location map link. The association meets the 2nd Tuesday of each month at 6:30 PM (doors open at 6:15) in
      Meeting Room B at the Southeast Clarke Park Community Center, 4440 Lexington Rd, and Monica tries hard to keep agendas
      tight so people can get home in 60–75 minutes. Every quarter she helps lead a Saturday “walk-and-talk” (9:30–10:30 AM)
      starting at the Cedar Creek Dr entrance sign, where neighbors photograph sidewalk gaps, speeding hotspots, drainage
      problems, and streetlight outages—Monica is the one who notes exact pole numbers and drops everything into a shared
      folder.


      Lately, Monica’s attention has been on land-use changes and traffic impacts along the Lexington Rd corridor. Neighbors
      often call or text her when they spot a zoning notice sign, because she’s built a habit of tracking what’s proposed,
      where to find staff reports, and how to translate acronyms into plain language for first-time participants. She’s proud
      that the group tends to stay constructive—last year they met a developer early and pushed for better shielding for parking
      lot lighting and a more direct pedestrian connection instead of simply opposing the project. On the home front, she’s
      also keeping an eye on recurring pooling during heavy rain near the 230–260 block of Cedar Creek Dr; after a couple
      of especially soggy storms this past winter, she started keeping a small checklist of what to observe (how long water
      stands, where it crosses driveways, which inlets seem slow) so the neighborhood can describe the problem clearly. Between
      work, parenting Lila and Noah, and the constant low-level logistics of a busy household, Monica’s “free time” is usually
      a late-evening reset—packing lunches, answering a few neighborhood emails, and setting out shoes and backpacks so mornings
      don’t spiral.'
