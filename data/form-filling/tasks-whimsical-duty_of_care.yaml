  - artifact_type: email
    content: 'Subject: Quick favor + please keep this between us


      Hey Mom,


      Can I ask a weird favor? For the next little while, could I have anything “official-looking” mailed to you in Winterville
      instead of here? After the March 3 police report and the temporary protective order stuff tied to our address, I just
      don’t want envelopes showing up in the box where everyone can see them. If something comes for me, can you just text
      me a photo of the front and I’ll tell you what to do with it?


      Also—money is still a mess. Payroll at Athens Family Medicine (Lexington Rd) confirmed the wage garnishment is still
      hitting every check. It started back in February 2025 after that Magistrate Court judgment, and it’s $325 per pay period.
      It’s not like we were rolling in it before, but now it’s a constant “which bill gets paid late” situation. Evan’s trying
      to pick up extra HVAC calls, but you know how inconsistent that can be.


      On top of all that, I’m trying to keep the neighborhood association stuff from dropping. People keep texting me when
      they see zoning signs on Lexington Rd and assume I know what every acronym means. I’ll probably ask Evan to field a
      few emails if I get overwhelmed.


      Kids are okay. Lila’s been clingier at bedtime, and Noah is obsessed with those little Lego cars again.


      Thank you. I hate even asking.


      Love,

      Monica'
