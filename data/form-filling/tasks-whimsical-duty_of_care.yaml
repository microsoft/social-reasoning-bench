  form_summary:
    form_purpose: Personal Financial Statement used to disclose a borrower’s and any co-signer’s assets, liabilities, and
      payment obligations so Spokane Tribal Credit can evaluate a request for credit/loan approval.
    intended_recipient: Spokane Tribal Credit (STC) loan/credit staff (e.g., loan officers and underwriting/credit review
      personnel) who will review the applicant’s financial information and may verify it with listed sources and credit-reporting
