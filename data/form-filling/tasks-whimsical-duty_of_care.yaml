      with SLP Karen DuBois at Alberta Children’s Hospital every Thursday (Spring 2026 block).

      • Occasional Saturday late-morning 2–3 hour shift could work for special events.

      • Please avoid more than one shift per week until after May 13, 2026 due to a mid-day court appearance (traffic matter
      from a Deerfoot Trail collision in Nov 2025).


      One more quick question: are you comfortable with a resident-facing role, or would you prefer we start you with behind-the-scenes
      admin tasks (printing name tags, assembling table cards, tracking attendance)?


      Warmly,


      Sophie Kwan

      Volunteer Coordinator

      Calgary Meals & Company

      403-555-4409


      P.S. Totally fine if your energy is limited right now—several volunteers tell us that after work they mostly just end
      up on Netflix or scrolling on their phone. We can start small and keep it consistent.'
