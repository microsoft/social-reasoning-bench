  - artifact_type: note
    content: 'Late-night brain dump (moving / restlessness / what I actually want)


      I keep measuring imaginary desks in listings. Like, I’ll look at a 2-bedroom in Hillsborough and immediately picture
      where the monitor goes, where the laundry basket lives, whether I can shut a door before a video call. It’s funny how
      quickly “a home” turns into “a floor plan I can work in.”


      The Mount Roskill unit was supposed to be temporary-ish anyway. March 2022 felt like a reset: affordable, close enough
      to the city, easy to get to Noah’s. For a while I liked the compactness — less stuff, less cleaning (even though I still
      do the weekly kitchen/bathroom clean like a ritual).


      But I can feel the old pattern in me: once I’m even slightly unhappy somewhere, I start craving a change and I get itchy.
      I’ve moved every year or two since my twenties and I tell myself it’s “because of work” or “because it makes sense,”
      but sometimes I’m just bored of the same walls and want a fresh start.


      This time it’s not only that, though. The noise is real. The parking is a pain. And with Noah here and Tama staying
      every second week since the October 2025 order change, it’s genuinely too small.


      Also: money. The IRD repayment plan ($3,840 set up 12 Dec 2025) is sitting in the back of my head. I want the next place
      to be stable enough that I’m not bleeding time and stress, especially with my May review with Elena at Xero.


      Goal: pick a place that fits the life we’re building, not just the mood I’m in at 11:47pm.'
