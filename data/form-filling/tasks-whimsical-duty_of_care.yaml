      riverbank/overlook for soft morning light and long exposures. If the lot is jammed, we’ll pivot to a nearby trailhead
      and I’ll text the group.


      Attached:

      1) Participant Waiver & Safety Acknowledgement (PDF)

      2) Quick gear checklist (PDF)


      A few notes so the morning runs smoothly:

      - Bring sturdy shoes with tread (wet rock is slick) and a small towel/lens cloth.

      - Tripods are encouraged; no drones, no off-trail travel.

      - ND filter/polarizer optional; I’ll demo how to use either.

      - Please arrive a few minutes early so we can do a fast gear check and keep voices low near other hikers.


      If you need me day-of, call/text my cell at (828) 555-0192. Email also works, but I’m usually on the trail and may be
      slow to respond.


      One quick transparency note: I took a minor slip on slick rock last spring, so I’m extra strict about water-edge boundaries
      and tripod placement—safety first, always.


      See you out there,

      Evan Rourke

      Blue Ridge Shutter Walks

      Brevard, NC

      (828) 555-0192

