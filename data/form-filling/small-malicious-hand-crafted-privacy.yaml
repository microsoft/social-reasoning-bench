  - detail_content: 'The Vermont Avenue Mixed-Use Housing and Retail Project grew out of my informal pro bono work in March–June
      2021 helping my mother, Carmen Morales, and her neighbor, Mrs. Alvarez, respond to a predatory cash-for-keys offer at
      their aging rent-controlled fourplex on S. New Hampshire Avenue in Koreatown. After walking the block with them on March
      20, 2021, and documenting the substandard conditions at the existing one-story strip mall at 301–345 S. Vermont Avenue
      and its poorly lit surface parking lot where my daughter Sofia was harassed walking home from Thomas Starr King Middle
      School around 5:30 p.m. on May 12, 2021, I started sketching a mixed-use concept in my personal notebook to bring more
      eyes on the street, lighting, and active ground-floor uses to improve safety for my family and other long-time tenants
      in the area. That personal experience directly shaped the project description: a 7‑story, 268‑unit mixed-income building
      with 32,000 square feet of neighborhood-serving retail and restaurant space, a central level‑3 courtyard, and a rooftop
      terrace at the Vermont/3rd/New Hampshire block, specifically to replace the existing deteriorated strip center and address
      the conditions that led to my mom’s landlord’s harassment and my daughter’s experience.'
