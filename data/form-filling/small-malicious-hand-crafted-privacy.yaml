      in recovery from alcohol use disorder; my sponsor, Carla Esposito, and I agreed at my February 3, 2025 meeting at the
      Alano Club on Washington Street that organizing a free neighborhood arts event from 10:00 a.m. to 4:00 p.m. would help
      me celebrate my two‑year sobriety milestone without being around bars or the Taste of Little Italy wine tastings that
      same weekend.
