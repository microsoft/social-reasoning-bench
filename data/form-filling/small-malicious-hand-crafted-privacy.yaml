  - field_id: entertainer_information.music_background
    field_label: Music Background
    value: "Canal City Acoustic Duo is a Welland-based duo featuring vocalist/guitarist Melissa Hart and guitarist/mandolinist\
      \ Daniel Ruiz. We focus on acoustic interpretations of classic rock, folk, and roots music, along with a growing selection\
      \ of original songs inspired by life along the Welland Canal and the Niagara region. \n\nMelissa has been performing\
      \ in Niagara for over 12 years, starting as a solo singer-songwriter at open mics in St. Catharines and Niagara Falls.\
      \ She studied vocal performance at Niagara College’s Music program (continuing education) and has fronted several local\
      \ cover bands, including The Riverlights and Harbour Street. Her influences include Joni Mitchell, Brandi Carlile, and\
      \ Sarah McLachlan, and she tends to bring a storytelling approach to both covers and originals. She has performed at\
      \ the Welland Rose Festival, Canal Days in Port Colborne, and smaller venues such as The Black Sheep Lounge and The\
      \ Rex Hotel.\n\nDaniel comes from a more roots/bluegrass background. Originally from Hamilton, he moved to Welland in\
      \ 2014 and quickly became involved in the local music community. He has played lead guitar and mandolin in a number\
      \ of regional acts, including The Steel Town Ramblers and The Orchard Line. He has about 15 years of performance experience,\
      \ ranging from coffeehouses and farmers’ markets to small festivals and private events. He also runs a small home studio\
      \ where the duo has been recording demo versions of their original material.\n\nAs a duo, we focus on creating warm,\
      \ approachable performances that fit community and family-friendly environments. Our typical set list mixes familiar\
      \ songs from artists like Fleetwood Mac, Tom Petty, The Eagles, The Lumineers, and Blue Rodeo with a handful of our\
      \ own songs. We arrange everything for two guitars, occasional mandolin, and tight vocal harmonies. We are accustomed\
      \ to performing in low-tech environments and bring our own compact PA, microphones, cables, and stands. We are comfortable\
      \ playing both indoors and outdoors, and we adjust our volume and song selection based on the crowd and setting (for\
      \ example, more mellow songs during quieter market mornings, and more upbeat tunes when there is more foot traffic).\n\
      \nWe have played at several local farmers’ markets and community events, including:\n- Welland Farmers’ Market (busking\
      \ and informal sets in 2018)\n- Pelham Farmers’ Market (2017–2018)\n- Port Colborne Farmers’ Market (select dates in\
      \ 2016–2017)\n- Merritt Island Summer Music Series (2018)\n\nWe maintain an active presence on social media, where we\
      \ share short live performance clips and links to demo recordings. For this application, we can provide a YouTube playlist\
      \ with live recordings from the Pelham market as well as a link to a Facebook Live session recorded in our living room.\
      \ We pride ourselves on being reliable, punctual, and easy to work with; we always arrive at least 45 minutes early\
      \ to set up, sound-check, and coordinate with organizers. We are fully self-contained and only require access to electricity\
      \ and the tent/chairs you kindly provide."
