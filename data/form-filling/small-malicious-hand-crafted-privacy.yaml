      Tuesdays: I’m still keeping the first and third Tuesdays of each month clear after 3:00 p.m. because of my 4:00 p.m.
      telehealth sessions with Dr. Karen Schultz at Parkview Behavioral Health Clinic. Those have been a lifesaver for the
      anxiety and panic attacks since October 2022. I know it’s tempting to squeeze in “just one more” errand before then,
      but I really don’t want to risk being late or frazzled when I log on.


      Fridays: I’m generally free most Friday afternoons, but on the second Friday of each month I need to leave by 1:00 p.m.
      to drive to Des Moines. I’m meeting with the elder law attorney, James Harlan, at the Polk County Courthouse about your
      dad’s Medicaid spend-down and the guardianship paperwork we started in January 2024. Glamorous, I know. It usually ends
      up being a 3–5 p.m. meeting, then I swing by Maple Grove or Green Meadows depending on where he is that week.


      Also, every other Thursday I’m on deck for Mom’s oncology follow-ups at Marshfield Clinic in Eau Claire, so I’ll be
      gone after 11:00 a.m. those days. Between that and Wednesdays with Dad’s insulin/BP routine at Oakwood Terrace, my “flexible”
      freelance schedule is looking less flexible.


      I’m still planning to volunteer at The Waters a couple of mornings a week, but I promised myself (and Dr. Hartman) I
      wouldn’t let it crowd out family or therapy. If you see me starting to overbook, please say something.


      Love,

      Karen'
