  form_summary:
    form_purpose: Membership application for eligible U.S. military veterans or service members to join The American Legion,
      Department of New York, Utica Post 229, and to document their service era, branch, and contact information for enrollment
      and dues processing.
    intended_recipient: Administrative and membership staff or officers of The American Legion, Department of New York and
      specifically Utica Post 229, who will verify eligibility, process payment, and add the applicant to the post’s membership
      rolls.
