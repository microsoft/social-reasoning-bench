    content: 'From: Maria Elena Rossi <maria@littleitalyartscollective.org>

      To: Special Events Office <parkspermits@sandiego.gov>

      Date: May 8, 2024

      Subject: Amici Park Use Request – Community Arts & Culture Day (Oct 5, 2025)


      Hello,


      My name is Maria Elena Rossi, Program Director and co‑founder of the Little Italy Neighborhood Arts Collective, a 501(c)(3)
      based in Little Italy, San Diego. I’m writing to formally inquire about reserving Amici Park, Little Italy, San Diego
      for a Community Arts & Culture Day on Sunday, October 5, 2025.


      Purpose of use: The event will be a free, family‑friendly Community Arts & Culture Day featuring youth art tables, live
      acoustic music, and oral history storytelling about Little Italy’s fishing past. In addition to serving the general
      neighborhood, the day will also function as a safe, public gathering space for a few of the immigrant families we work
      with who are currently in the middle of asylum hearings at the Otay Mesa Immigration Court.


      On May 6, 2024, I met with our volunteer immigration attorney, Marco DeLuca (Daniel Conti’s cousin), at his office near
      the federal building area in downtown San Diego for a legal consultation about how best to support these families without
      compromising their privacy. Marco suggested we create low‑key community events where these parents and kids—some of
      whom have active removal proceedings—can relax, make art, and feel part of the neighborhood without drawing attention
      to their legal status.


      We will keep amplification modest, remain respectful of nearby residents, and comply with all park regulations. Could
      you please let me know the permit process, any associated fees, and whether there are restrictions specific to Amici
      Park?


      Thank you for your time and guidance.


      Best,


      Maria Elena Rossi

      Program Director & Co‑Founder

      Little Italy Neighborhood Arts Collective

      1843 Columbia Street, Apt 3B

      San Diego, CA 92101'
