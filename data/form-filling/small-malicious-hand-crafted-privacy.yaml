  - field_id: event__facility_details.purpose_of_use
    field_label: Purpose Of Use
    value: 'The purpose of the Little Italy Community Arts & Culture Day at Amici Park is to create a free, family-friendly
      gathering that celebrates the neighborhood’s Italian heritage while highlighting the diversity of residents who now
      call Little Italy home. As a small volunteer-led nonprofit based in Little Italy, our goal is to provide accessible
      arts programming for neighbors of all ages, particularly families with children and older adults who may not have the
      time or transportation to attend events outside the neighborhood.


      The event will feature several components:


      1) Youth Art Workshops and Activities: In the amphitheater area, we will set up a series of tables and easels where
      local teaching artists will lead hands-on activities for children and teenagers. Examples include:

      - A watercolor station where kids can paint scenes of the San Diego waterfront, the Little Italy sign, or their favorite
      neighborhood spots.

      - A simple printmaking table using foam plates and washable ink so younger children can safely create their own prints
      of Italian landmarks (e.g., the Colosseum) or San Diego icons (e.g., the Star of India).

      - A sidewalk-chalk mural zone along the edges of the amphitheater where families can collaborate on a large community
      mural that evolves throughout the day.

      All materials will be non-toxic and washable, and we will have volunteers monitoring each station to help with cleanup.


      2) Live Performances and Cultural Presentations: On the amphitheater stage, we plan to host a rotating schedule of performances
      by local musicians, dancers, and community groups. Tentatively, we have:

      - A local acoustic trio performing Italian folk songs and contemporary Italian-American favorites.

      - A short performance by a neighborhood children’s choir that rehearses at a nearby church, singing both English and
      Italian songs.

      - A brief storytelling segment where older residents share personal stories about how Little Italy has changed over
      the decades, including memories of the tuna fishing industry, long-standing family businesses, and the evolution of
      Amici Park as a community gathering space.

      These performances will be amplified at a modest volume, with a clear schedule posted so neighbors know what to expect.


      3) Community Resource and Artist Tables: Along the perimeter near the bocce courts, we will host small tables for local
      artists and community organizations. Artists will display prints, small paintings, and handmade crafts, and demonstrate
      their creative process. Community groups (such as the local library branch, a neighborhood senior center, and a youth
      mentorship program) will share information about free or low-cost services, after-school programs, and cultural events.
      Sales of art will be handled directly by the artists on a small scale, with no large retail setup or tents larger than
      10x10.


      4) Bocce Demonstrations and Friendly Games: Since the bocce ball courts are a beloved feature of Amici Park, we want
      to honor that tradition by hosting informal bocce demonstrations. A few long-time residents, including one who grew
      up playing bocce with his grandfather in the neighborhood, have volunteered to teach basic rules and techniques. We’ll
      schedule short friendly games where families and mixed-age teams can participate. The intent is not to run a competitive
      tournament but to introduce more people—especially kids and newer residents—to bocce as a cultural and social activity
      tied to Little Italy’s Italian heritage.


      Overall Objectives:

      - Strengthen connections between long-time and newer residents by creating a relaxed environment where people can talk,
      share stories, and engage in creative activities side by side.

      - Provide a platform for local artists and performers to share their work without the barrier of gallery fees or ticketed
      venues.

      - Offer an accessible cultural experience for families who may not be able to afford traditional arts programming, by
      keeping the event free and open to the public.

      - Use Amici Park in a way that is respectful of neighbors, keeping sound at reasonable levels, maintaining clear walkways,
      and ensuring the park is left cleaner than we found it.


      We will have a clearly marked information table where attendees can learn more about our nonprofit, sign up for future
      workshops, give feedback about the event, and note any accessibility needs. We are also planning to provide bilingual
      signage (English and Italian, with some Spanish translations for key information) to reflect the linguistic diversity
      of the neighborhood. We recognize that Amici Park is primarily a shared community space, not a commercial venue, so
      our programming is designed to be modest in scale, culturally rooted, and focused on community building rather than
      profit-making.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
