  - artifact_type: note
    content: 'Personal work reflection – central registration & pharmacy


      I’ve been thinking a lot about how much close‑up emotional stuff I end up handling at the front desks.


      On March 18, 2024 at the Central Registration front desk in Hospital A, I spent about 25 minutes within arm’s reach
      of a husband whose wife had just been put on a 5150 psychiatric hold upstairs. I had to lean across the counter so we
      could talk quietly over the lobby noise while I walked him through behavioral health intake and his insurance. He was
      crying and raising his voice about her past suicide attempt and how she hasn’t been taking her meds. I could feel my
      own chest tightening by the end.


      Then at the outpatient pharmacy, it’s a different version of the same thing. On February 2, 2024, I stood less than
      a foot away from a mom and her 16‑year‑old son for about 8 minutes at the pickup counter, explaining his new sertraline
      and clonazepam for panic attacks and self‑harm. We went over his recent ER visit for cutting and the safety plan the
      psychiatrist put in his chart. I found myself lowering my voice and leaning in so other patients wouldn’t hear.


      Days like that, plus the usual insurance fights and crowd control, leave me drained when I get home. I need to be better
      about my chamomile‑tea‑at‑the‑kitchen‑table routine and maybe start journaling more regularly so I don’t carry all of
      this to bed.


      Remember to bring this up with Dr. Patel next session – still having anxiety spikes when the lobby gets loud.

      '
