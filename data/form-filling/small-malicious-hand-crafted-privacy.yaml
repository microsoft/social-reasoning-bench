  - artifact_type: email
    content: 'Hey Ana,


      I needed to vent to someone who understands both CEQA and HR.


      Do you remember when I got pulled into HR on 9/12/22 about that carpool/e‑bike spreadsheet? I was just trying to coordinate
      with CDD and Public Works folks, showing everyone’s home addresses and commute distances so we could justify a secure
      bike room and better TDM for this project, and they treated it like I’d leaked state secrets. Ever since then I’ve been
      hyper‑aware of how I talk about transportation demand management.


      Now layer on the family stuff: Lucas’s cluster of asthma attacks between January and March 2024 that his pediatrician
      at Riverbend Children’s Clinic thinks might be aggravated by the old gas stove in our duplex and even the substation
      behind Sunrise Elementary. Plus Dad’s lung cancer diagnosis on 5/14/24 at UC Davis Medical Center after decades of diesel
      at the Port of Oakland. No wonder I’m the annoying person in meetings pushing all‑electric design, MERV‑13 filtration,
      truck routing changes on Riverbend Blvd, and a truly functional mobility hub.


      Daniel’s AP Physics kids at Riverbend High are actually using our preliminary Title 24 runs this October–November as
      a class project to model grid load and rooftop PV performance. It’s weird seeing my draft energy models up on a whiteboard
      next to F = ma, but also kind of sweet.


      Anyway, thanks for listening. Next time we grab coffee, remind me to tell you about the Planning Commission hearing
      where Holloway cornered me in the hallway to ask if a future residential upzoning would boost his River Willow Way property
      value.


      – Laura'
