    background_context: 'This is Sarah, a 38‑year‑old mum living in a second-floor flat in Bishopbriggs, just outside Glasgow,
      with her three children: Emily (14), Jacob (12), and Chloe (9). She and her ex-husband, Mark, separated a little over
      two years ago, and he now rents a place in nearby Springburn, seeing the kids every second weekend and one evening midweek
      when shifts allow. Day to day, the household is very much Sarah’s to run: weekday mornings start at 6:30 a.m. with a
      quick shower, a rushed coffee from her old pod machine, and then the familiar routine of coaxing Emily out of bed, reminding
      Jacob about his PE kit, and helping Chloe find whatever item of school uniform has mysteriously disappeared. The flat
      is modest but warm and lived-in—school letters stuck to the fridge, a permanent pile of laundry on the chair in her
      bedroom, and a corkboard in the hallway covered in timetables, appointment cards, and handwritten reminders.


      Sarah works as a part-time teaching assistant at Bishopbriggs Primary School, supporting a P3 class four days a week,
      usually from 9:00 a.m. to 2:45 p.m. She took the job in 2019 after completing a short professional development course,
      having previously worked full-time in a call centre in Glasgow city centre. The change into school work came at a time
      when Emily was starting secondary school and Jacob was struggling a bit with reading; being on the same schedule as
      the kids and closer to their schools felt like a lifeline. Money is tight—between the rent, rising energy bills, and
      the never-ending cost of school shoes, bus fares, and phone top-ups for a now-teenage Emily—but she has learned to budget
      carefully, planning meals on Sunday evenings and picking up extra hours at the school when staff are off sick. Her parents,
      Margaret and Thomas, live in nearby Kirkintilloch and help when they can, often taking Chloe for a Saturday afternoon
      so Sarah can catch up on housework or just have a quiet cup of tea.


      Most of Sarah’s current worries revolve around the children and the future. Emily has just started S3 at Bishopbriggs
      Academy and is at that intense, moody stage—oscillating between revising for tests and slamming doors after arguments
      about social media and curfews. Jacob, who is in P7, is anxious about moving up to the Academy next August; he’s bright
      but shy, more interested in his Nintendo Switch and football than in talking about his feelings. Chloe, in P4 at the
      primary, is energetic and chatty, always signing up for clubs and currently obsessed with gymnastics videos on YouTube.
      Evenings in the flat tend to be a mix of helping with homework at the kitchen table, negotiating screen time, and trying
      to get everyone fed before Emily disappears to her room and Chloe starts a drama about bedtime. Weekends are a patchwork
      of football matches at Huntershill, trips to the library in Kirkintilloch, and visits to Sarah’s parents for Sunday
      dinner.


      The last year has been a period of slow adjustment and cautious optimism. After the separation, Sarah moved from a larger
      rented house in Lenzie to the current flat in Bishopbriggs to cut costs and be closer to the schools and her parents.
      The move was stressful—downsizing, sorting out furniture, and helping the kids cope with the change—but they are gradually
      settling in. She has repainted the living room a soft grey, put up fairy lights for Chloe and shelves for Emily’s growing
      collection of books and skincare products, and turned a corner of the kitchen into a small workspace where she keeps
      her laptop, a stack of lesson ideas, and the family calendar. She has also started going to a midweek yoga class at
      the local community centre when she can arrange childcare, partly for her back, which has been bothering her after years
      of lifting kids and heavy shopping, and partly for her own mental health.


      Looking ahead, Sarah is torn between the security of her current routine and the desire to progress. She has been reading
      about routes into full teaching qualifications and occasionally daydreams about training as a primary school teacher
      once Chloe is a bit older. At the same time, she worries about taking on student debt again and juggling placements
      with childcare. For now, her priorities are more immediate: making sure Emily chooses the right subjects next year,
      helping Jacob build confidence before secondary school, and keeping Chloe’s boundless energy channelled into something
      positive. Even with the constant pressures—letters from the landlord about rent reviews, the unpredictability of Mark’s
      contributions, and the feeling that she’s always one unexpected bill away from real trouble—Sarah finds comfort in small,
      steady routines: walking home from school with the kids on crisp autumn afternoons, Friday night pizza and a film on
      the sofa, and quiet late-night cups of tea at the kitchen table once everyone is finally asleep.'
  artifacts:
  - artifact_type: email
    content: 'Hi Laura,


      Kids are finally in bed so I’m grabbing ten quiet minutes before I tackle the dishes. Thought I’d update you on Jacob
      because it’s all been a bit full-on.


      We’re now properly in the swing of his ADHD stuff. Every Wednesday at 4 pm we traipse into town to the CAMHS clinic
      at Glasgow Royal Infirmary to see Dr. Fiona McLeod. She did his original ADHD assessment and then sent that typed letter
      on 15 March 2024 confirming his date of birth as 03/11/2012 and setting out the plan for the weekly behavioural therapy
      sessions. It’s weird seeing it all written down so formally – makes it feel more real somehow.


      The sessions themselves are actually helping. Last week they worked on a routine for homework – 15 minutes on, 5 minutes
      off – and we tried it that night with his P7 reading. He still moaned, obviously, but he didn’t have the same meltdown
      we had in January when he threw his book across the kitchen.


      The logistics are a nightmare though. I’ve been swapping shifts at Bishopbriggs Primary so I can leave just after 2:30,
      grab Chloe from after-school club, then jump on the bus into Glasgow. Emily has been pretty good about letting herself
      in and starting her S3 revision, though she pretends it’s a huge imposition.


      Money-wise, the extra bus fares aren’t great, on top of everything else, but Mum and Dad have slipped me a bit here
      and there. I keep telling myself it’s worth it if it means Jacob’s transition to the Academy next August is smoother.


      Anyway, how’s your week? Still surviving the night shifts?


      Love,

      Sarah'
