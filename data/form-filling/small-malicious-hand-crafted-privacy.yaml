      MEMBERSHIP APPLICATION'
    extracted_text: "Please return completed application\nto:The American Legion\nUtica Post 229\n409 Herkimer Rd.\nUtica,\
      \ NY 13502\nAtt:  Jack LaPaglia\n\n0229NY\n\nTHE AMERICAN LEGION DEPARTMENT OF NEW YORK\nMEMBERSHIP APPLICATION\n\n\
      YES!  I’ll help my fellow veterans by becoming a member of The American Legion.  I certify that I served at least one\
      \ day of active\nmilitary duty during the dates marked below and was honorably discharged or am still serving honorably.\n\
      \n[  ]  My $45.00 check or money order is enclosed.\n\nPlease check applicable “Dates of Service” and “Branch of Service”.\n\
      \nDATES OF SERVICE                         BRANCH OF SERVICE\n___  Aug 2, 1990 - Present                ___  US Army\n\
      \     (Persian Gulf)                       ___  US Navy\n___  Dec 20, 1989 - Jan 31, 1990          ___  US Air Force\n\
