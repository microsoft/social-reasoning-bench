  - artifact_type: email
    content: 'Subject: Rent again + ride question


      Hey Dad,


      Hope you and Mom are staying warm out in Bloomington. Any more ice dams trying to invade the roof?


      I hate to ask, but could you send the usual $300 again this month for my part of the Parkview rent? Ever since my hours
      at NorthStar Outdoor Supply got cut back after that six‑week pressure sore mess at Hennepin Healthcare in fall 2022,
      I still can’t quite cover everything on my own. The part‑time remote schedule helps me keep going, but it doesn’t exactly
      make me rich.


      I had a check‑in with Laura Peterson last week – you remember, my Hennepin County case manager I’ve had since August
      2019. She’s the one who helped me keep my apartment after the DUI back in July 2021 and got me into the Fairview Recovery
      outpatient program. We talked about maybe bumping my work hours a bit later this year if my health cooperates, which
      would hopefully mean less needing to borrow from you every month.


      On a different note, the wound nurse at the M Health Fairview clinic is still on me about transfers. She keeps reminding
      me how close I came to another ICU stay like those three days in November 2023 if anybody drops me. That’s why everyone
      is so focused on getting a safer setup here at 1842 Parkview.


      Also, Daniel mentioned he might not be able to drive me to the next probation check‑in at the Government Center if his
      on‑call schedule changes. Any chance you’d be up for being backup driver if that happens? It’s been nice not having
      to worry about parking or my restricted driving status.


      Thanks again for everything you’ve been doing. I know this isn’t where any of us thought we’d be at 73 and 46.


      Love,

      Michael'
