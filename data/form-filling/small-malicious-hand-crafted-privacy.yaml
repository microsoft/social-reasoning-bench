  ground_truth:
  - field_id: pain
    field_label: Pain
    value: '“I’m a freelance graphic designer and I feel like I’m constantly scrambling for clients. I’m decent at the creative
      side but I have no idea how to turn what I know into something more stable, like a course or digital product. Every
      month feels like starting over from zero.”


      “I’ve watched so many YouTube videos about ‘passive income’ and ‘online courses’ but I’m overwhelmed. I don’t know what
      topic to choose, how to validate it, or whether anyone would actually pay me for what I know. I’m scared I’ll spend
      months building a course that nobody buys.”


      “I’m working a full-time 9–5 marketing job and doing photography on the side. I’d love to package my photography knowledge
      into a course, but I have no idea where to start. I’m terrified of putting myself out there and hearing crickets. What
      if my idea isn’t unique enough?”


      “I keep hearing that ‘the riches are in the niches’ but when I sit down to pick a niche, my brain freezes. I like too
      many things and I can’t tell what people really want. I’ve posted polls on Instagram but the responses are vague and
      don’t translate into a clear course idea.”


      “My biggest fear is wasting time. I have two little kids, a demanding job, and only a few hours a week to work on a
      course. I can’t afford to guess. I need to know, with as much certainty as possible, that the idea I choose has real
      demand and can actually make money.”


      “I’m stuck in research mode. I’ve taken other people’s courses about building courses, but I still don’t have a concrete,
      validated idea. I’ve filled notebooks with brainstorms but nothing feels like ‘the one’ and I’m so scared of picking
      wrong that I just don’t pick at all.”


      “I’m worried I’m not ‘expert enough.’ I don’t have a big audience, I’m not famous on social media, and I don’t have
      fancy credentials. I’ve just been doing this thing (web development, in my case) for 7 years and helping colleagues
      informally. Why would someone pay me when they could Google it or watch free tutorials?”


      “I tried launching a mini-course once and only 3 people bought it, and one was my cousin. That experience really shook
      my confidence. I never validated the idea properly; I just made what I thought people needed. I’m scared of repeating
      that, so now I overthink everything and never launch.”


      “I feel like everyone else is so much further ahead. They have multiple courses, polished sales pages, and testimonials.
      I’m stuck at square one just trying to figure out what profitable topic I can realistically teach that fits my skills
      and my schedule.”


      “I don’t just want ‘any’ course idea. I want one that connects to a real problem, that I feel excited to teach, and
      that can realistically bring in at least $1,000–$3,000 per month once it’s up and running. Right now, that feels like
      a distant dream and I don’t know the steps to get there.”'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
