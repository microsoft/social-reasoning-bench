  - artifact_type: text
    content: 'From: Michael

      To: Emily

      Date: 2026-03-18


      Emily,


      I’m grabbing a stale donut in the Brookside Community Center hallway and thinking about you three on those cots last
      night. I hate that the EF-3 didn’t just slam the city but also wrecked our place at 118 Brookfield. Seeing the preliminary
      damage photos this morning… it’s basically gone. I’m glad the Red Cross shelter at Riverbend Middle had room and that
      Karen could help you wrangle the kids’ meds after Ethan’s inhalers and Natalie’s stuff got buried in the debris.


      I’m trying to keep work and family separate, but it’s impossible. While I was running the EOC last night, Mom’s house
      on West Larkspur got destroyed and EMS had to take her to St. Joe’s with chest pain. At almost the same time I was on
      the radio authorizing that welfare-check list from the power-dependent medical needs registry — including her oxygen
      concentrator entry and the three COPD folks on Brookfield Terrace — after talking with Dr. Lisa Monroe around 9:15.
      That decision is part of why EMS is drowning now; we’ve got 27 of those high‑risk patients to track and not enough medic
      units.


      On top of that, I’ve got Maple County spinning up a USAR/med package, and I keep thinking about asking their medic to
      quietly keep an eye on Natalie if she ends up at Brookside Middle School again. Her panic attacks since the April 15,
      2024 Brookside tornado took out those three houses on our block are in the back of my mind with every siren.


      Try to get some rest today if the kids let you. I’ll call after the 1900 briefing.


      – M'
