  - artifact_type: email
    content: 'Hi Melissa,


      I hope your week is going okay and that the RTI meetings aren’t completely wiping you out.


      I’ve been sketching out plans for a spring makerspace cycle that would center my 3rd and 5th period 7th‑grade science
      students. I especially want to be intentional about the 11 kids we flagged together in the October 2024 RTI meeting
      as at risk for anxiety or depression and currently getting counseling through Bluebonnet Youth Behavioral Health downtown.
      A lot of them have been opening up more during labs.


      I’m still thinking about J., after the panic attack in my lab on September 18, 2024. He told me yesterday that he likes
      the projects where he can tinker quietly and doesn’t have to worry about a big written test at the end. That seems to
      be a theme with this group.


      Right now I’ve only got maybe 10–12 students who are genuinely excited enough to commit to staying after school regularly,
      and several of those are the same kids who get pulled from electives for behavior or missing work in other classes.
      I’m trying to figure out how to build something that supports them without creating a whole new discipline headache.


      If you have time, I’d love your thoughts on low‑pressure ways to check for understanding in a makerspace setting that
      wouldn’t spike their anxiety. Maybe we could meet for 20 minutes next week? I’m free most days after 3:45 except Thursday
      (Mateo’s speech therapy).


      Thanks for everything you do,

      Jordan'
