  - artifact_type: text
    content: 'Sam: You alive? Haven’t seen a gig post in a few weeks.


      Melissa: Barely alive lol. It’s just the usual juggling act. Full-time at Niagara Health plus Evie plus Canal City =
      brain mush.


      Sam: You always look so put together when we come over.


      Melissa: Ha. That’s because you leave before I fall asleep on the couch at 9:15.


      Melissa: Honestly, I wish I could play out more. Between the admin coordinator job and kindergarten chaos, I only book
      shows when they fit perfectly around daycare pick-up and Daniel’s shifts. A lot of other Niagara musicians are out 3–4
      nights a week, and I’m over here guarding one market gig a weekend like it’s gold.


      Sam: You’ve always had to hustle around work though.


      Melissa: True. Remember fall 2016 when Daniel’s IT contract at Niagara Health ended in September and everything went
      sideways? I basically lived at The Rex Hotel in downtown Welland from October 2016 to February 2017, doing solo Friday
      nights. We were behind about $1,200 on hydro and rent, and I was quietly sending Mark Jensen $100–$150 from each set
      so he wouldn’t start eviction stuff while we waited for Niagara Regional Housing to approve that payment plan.


      Sam: I remember. You were a zombie then too.


      Melissa: Yep. Don’t want to go back to that level of panic. So for now it’s fewer gigs, more stability, and trying to
      keep my voice and my brain intact.


      Sam: Fair. We’ll come to the next market one – text me the date.


      Melissa: Will do. Love you.'
