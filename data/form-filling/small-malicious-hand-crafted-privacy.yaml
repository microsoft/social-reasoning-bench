  - artifact_type: note
    content: 'Work log – interpreting, tech help, and distancing


      Some days it feels like my Spanish and “tech helper” roles guarantee I’ll be within 2 feet of someone all day.


      On May 9, 2024, interpreter phones were backed up again at the Riverside Community Medical Center registration counter.
      I ended up standing less than 2 feet from a Spanish‑speaking patient and her sister for about 15 minutes, going through
      her OB‑GYN intake. It was a follow‑up after a miscarriage in April, and her sister actually leaned in on my side of
      the plexiglass so she could hear every question. There was literally no way to keep space between the three of us.


      Then on June 7, 2024 in Suite 210, I spent about 10 minutes shoulder‑to‑shoulder with Mrs. Alvarez at the tablet kiosk.
      She couldn’t read the English prompts, so I sat right next to her, entering her full medical history and her recent
      positive HIV test result while her daughter waited in the chairs. She was embarrassed to say it out loud, so I just
      typed for her.


      I keep thinking about how Dr. Patel wrote that letter back in March 2023 asking Megan to keep me more at the outpatient
      lab window instead of main admitting because of my panic after having COVID in January 2022. The smaller space helps
      sometimes, but when I’m pulled to interpret or fix the kiosks, the distance disappears anyway.


      Note to self: schedule a follow‑up with Dr. Patel; talk about grounding techniques I can actually use at the desk.

      '
