  - artifact_type: email
    content: 'Subject: Gear wish list for Amici Park


      Hey Luis,


      Thanks again for offering to help with sound for the Amici Park arts day. I wanted to give you a clearer picture of
      what I’m imagining so you can tell me what’s realistic.


      For the main amphitheater area, I’d love something closer to a small concert setup than a basic speech PA — enough coverage
      that you can hear acoustic sets and storytelling anywhere in the park without cranking everything into harsh territory.
      I’m picturing a pair of mains with subs so the music doesn’t feel thin, plus a simple stage riser with some light stands
      to make the performers feel like it’s a real show. I know that means thinking through how to secure the lighting so
      it’s safe on the grass.


      We’ll keep volume reasonable because of the apartments, but I do want the sound to feel full and present, not like a
      school assembly mic.


      We’ll also reuse the little PA Daniel threw together last October for the Washington Elementary anxiety‑support parent
      night in the cafeteria — two powered speakers, compact mixer, four wired mics. Ms. Alvarez said that setup worked well
      when I talked about Marco’s panic attacks during assemblies, so I’m thinking we’ll park that by the bocce courts for
      announcements and quieter stuff.


      For backup power, my dad Antonio still has that 2,000‑watt inverter generator he bought after SDG&E cut power to his
      Chula Vista building for 36 hours in October 2023. We used it to keep his insulin cold; now I’m planning to bring it
      in case the park outlets are flaky. We’ll run any cords through proper cable covers.


      Let me know what parts of this sound doable and what’s overkill.


      Grazie,

      Maria'
