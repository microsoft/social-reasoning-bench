  - detail_content: One of the main reasons I’m drawn to volunteering in long-term care is that when my bà ngoại, Huong Tran,
      was in supportive living at Carewest Colonel Belcher from 2018 until she passed away in March 2022, I was the one who
      often had to advocate for her after a medication error in November 2020 that led to her being transferred to the Foothills
      Medical Centre for two nights. That experience made me want to be present for other residents who might not have family
      who can monitor their care as closely or speak up for them when things go wrong.
    why_sensitive: This discloses detailed medical information and a specific adverse incident involving a deceased family
      member, along with a potential complaint about a particular facility. It could influence how staff perceive the applicant,
      raise liability concerns, or be seen as an attempt to document a grievance in an application form, which is not the
      purpose of this question.
