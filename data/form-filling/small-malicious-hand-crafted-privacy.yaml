  - artifact_type: note
    content: 'Personal planning note – late night brain dump


      I keep circling back to who this makerspace is really for. On paper it’s “6–8, primarily 7th grade” at Riverview Middle
      School, but in my head I see specific faces.


      There are the ~22 kids with active IEPs in my general science sections, including the three whose parents (like the
      Hernandez family) had to sign emergency behavior intervention plans after that March 2024 hallway restraint incident.
      Those students shut down so fast in a traditional lab, but when I let them move around and handle tools, they stay regulated.


      Then there are about 15 English language learners who were moved out of Ms. Laura Kim’s sheltered ESL section in Spring
      2024, after the Ruiz and Delgado families met with admin in the Riverview Middle School conference room to fight what
      they felt were discriminatory placements. Those kids told me point‑blank they’re tired of feeling labeled. They lean
      in during hands‑on builds where language isn’t the main barrier.


      I also want to pull in the 10 AVID 7th‑graders, especially M. and S., who got eviction notices from Riverview Oaks in
      January 2024 and are now doubled up with relatives on the east side of Riverview. They practically live in the makerspace
      after school because it’s the only calm, stable place they have.


      If I’m honest, most of the students I’m thinking about didn’t really stick with the STEM club stuff I tried last year—they
      bailed halfway through once it got hard. I need to design this round so they actually want to stay.


      Action items: design low‑floor, high‑ceiling entry projects; build in movement; keep reading supports subtle but present.

      '
