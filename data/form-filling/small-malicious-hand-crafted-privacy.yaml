  - artifact_type: text
    content: 'Ana,


      I needed to vent a little about work and life before I crash.


      Ever since Luis got laid off from the warehouse back in February 2024 and we lost his insurance, I’ve been picking up
      every extra shift they’ll give me. In March and April they kept me on those 1:00–4:30 p.m. afternoon blocks at the outpatient
      lab front desk in Suite 210. The worst part is the add‑on patients right before closing – Jasmine and I end up literally
      shoulder‑to‑shoulder at the shared computer, trying to squeeze in 3–5 last‑minute walk‑ins, printing labels and calling
      providers while people are hovering a foot away.


      On top of that, Tuesdays and Thursdays since September 2023 they’ve been scheduling me alone at the lab reception from
      7:00–11:00 a.m. because of that attendance write‑up from June 12, 2023, when I ran out after Sofia’s asthma attack.
      I get why they were mad, but those solo shifts are brutal. I’m on the phone with the ordering provider’s office, and
      patients crowd right up to the window, like 1–2 feet from my face, trying to ask questions while I’m still on hold.


      The money helps a little, especially while we rebuild an emergency fund, but I’m tired. Between the early fasting rush,
      the late add‑ons, and trying to make it to Mateo’s speech therapy and Sofia’s homework, I feel like I’m always either
      at Suite 210 or in the car.


      We still need that coffee in downtown Riverside soon. I want to hear about your job too, not just complain about mine.


      – Erica'
