  - artifact_type: note
    content: 'Personal reflection – TDM + Vermont project


      I still think about that awful morning on September 3, 2019, circling around 200 N. Spring Street for over 70 minutes
      trying to find parking before the 9:00 a.m. City Planning Commission hearing. I walked into the room late, flustered,
      and then got the written warning from Karen Liu that ended up in my personnel file. It was embarrassing, but also a
      wake-up call about how broken our default “everyone drives and hunts for parking” system is, especially downtown.


      That’s a big part of why I’ve become almost obsessive about the transportation demand management measures in the Vermont
      Avenue Mixed-Use Housing and Retail Project. Unbundled residential parking so people aren’t forced to pay for spaces
      they don’t use, 280 secure bicycle parking spaces, and subsidized transit passes for qualifying tenants – all tied explicitly
      to the fact that the site is within easy walking distance of Wilshire/Vermont station. I keep telling staff I don’t
      want future residents repeating my 9/3/19 mistake, burning an hour just circling blocks.


      Layered on top of that is everything with Mom on S. New Hampshire, Sofia’s harassment in the strip mall lot at 301–345
      S. Vermont on May 12, 2021, and Anthony’s near-eviction in Downey in January–February 2022. Safety, affordability, and
      mobility are all wrapped together for me on this one site. It’s strange how one late hearing, one predatory cash-for-keys
      offer, and one UPS route cut end up shaping a whole TDM section in a Koreatown mixed-use project.


      Reminder to self: keep pushing for the transit pass program in implementation, not just on paper.

      '
