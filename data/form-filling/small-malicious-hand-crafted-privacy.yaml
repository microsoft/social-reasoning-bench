  - artifact_type: text
    content: 'Daniel: You heading home or staying for the whole practice?


      Sarah: Staying for the scrimmage. Linda pulled me aside again in the main gym.


      Daniel: Everything ok?


      Sarah: Mostly. She was thanking me for covering all the Shoreline Community College meals March 14–15. Said she’s glad
      I could throw Tony’s, Chipotle, Costco snacks, and the resistance bands/foam rollers on my card when the district purchase
      order got delayed.


      Daniel: Yeah, about that… I’m still nervous about how much we’ve got floating.


      Sarah: Same. Especially after NorthSound screwed up my March 7 paycheck. Being that close to overdrafting the BECU joint
      account was not fun.


      Daniel: I remember you pacing around after you checked the BECU app.


      Sarah: I put it all on the Visa ending in 4421 so we can keep the other card clear in case we really do need your lawyer’s
      retainer for the boundary dispute with the neighbor at 22110. If Snohomish County District Court mediation blows up,
      I don’t want us maxed out.


      Daniel: Ugh, that fence line. At least Mateo’s excited about helping you mark the property line with string this weekend.


      Sarah: Silver linings. Also, Linda mentioned one of the girls’ parents is behind on child support, which is part of
      why she didn’t want to nickel-and-dime families for food money. Makes me feel better about saying yes, even if the timing
      with the PIP and smaller bonus sucks.


      Daniel: We’ll juggle it. Text me when you’re leaving.


      Sarah: Will do. Love you.'
