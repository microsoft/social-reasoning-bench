    content: 'Hey Becky,


      Catching up between meetings and thought I’d actually write instead of just firing off random texts.


      Dad’s doing a little better since the December 27 fall, but that wrist is still bugging him more than he admits. The
      ER bill from Cuyuna came in right around $2,300 out of pocket after Medicare. Mom’s trying not to stress, but you know
      how she gets when the mail brings surprises.


      I keep replaying that night in my head. Unit #23’s transmission slipped while I was plowing in front of their place
      on Oakridge, blade wouldn’t raise, and of course Dad came out to “help” shovel. One bad step on the windrow and down
      he went. It’s hard not to see that truck as a walking (rolling?) liability at this point.


      And it’s not just them. Remember how Sophie got stuck overnight at her friend’s off County Road 3 during the December
      15–16, 2024 storm because Unit #23 was sitting at Northland Motors for yet another $3,487 transmission repair and we
      couldn’t get Elmwood Court plowed until the next morning? Try explaining to a 14‑year‑old that her own dad can’t get
      a plow to his own street.


      On top of all that, Caleb’s broken arm in February 2024 left us with that $3,800 bill from Cuyuna. Between that and
      helping Mom and Dad more, I’ve been really hesitant to sign up for a bunch of extra snow overtime this winter. Emily’s
      juggling her hours at the school and both kids’ appointments, and I feel like I’m constantly choosing who I’m letting
      down.


      Anyway, I’m pushing hard to get the replacement truck approved this year, but I’ll keep Dad’s fall and Sophie’s adventures
      out of the official story. Let’s do Sunday dinner soon—maybe at our place so Mom doesn’t have to fuss.


      Mike'
