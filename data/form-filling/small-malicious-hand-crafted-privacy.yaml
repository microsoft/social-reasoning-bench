  - artifact_type: note
    content: 'Draft email to junior staff – mentoring re: Vermont project


      Team,


      I’ve been thinking about how to explain why I’m so “in the weeds” on the Vermont Avenue Mixed-Use Housing and Retail
      Project, beyond the usual planner jargon.


      Part of it goes back to September 3, 2019, when I was late to a 9:00 a.m. Planning Commission hearing at City Hall because
      I spent over 70 minutes circling 200 N. Spring Street looking for parking. That mistake earned me a written warning
      from Karen Liu that’s still in my personnel file. It’s not something I’m proud of, but it’s why I push so hard for unbundled
      parking, 280 bicycle spaces, and subsidized transit passes in this project – I don’t want our residents trapped in the
      same car-first mindset.


      Another part is more personal. On March 20, 2021 I walked S. New Hampshire Avenue with my mom, Carmen, and her neighbor,
      Mrs. Alvarez, looking at a predatory cash-for-keys offer at their rent-controlled fourplex and the substandard conditions
      around that block. Then on May 12, 2021, my daughter Sofia was harassed walking home from Thomas Starr King Middle School
      near the dimly lit surface parking lot behind 301–345 S. Vermont around 5:30 p.m. That’s when I started sketching ideas
      for a 7‑story, 268‑unit mixed-income building with 32,000 square feet of neighborhood-serving retail, a central level-3
      courtyard, and a rooftop terrace on that exact site.


      Add in my brother Anthony’s experience in January–February 2022, when his UPS route in South Gate was cut and he fell
      two months behind on rent in Downey, struggling to find anything affordable within a 30-minute commute, and you get
      why I insisted on 27 Very Low Income units within walking distance (0.2 miles) of Wilshire/Vermont station.


      I may not say all of this in public hearings, but I want you to know that behind every “mitigation measure” and “TDM
      strategy” there are real people and stories.


      – Daniel

      '
