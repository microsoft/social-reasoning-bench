      First off, thanks again for dragging me to that community breakfast at Schenectady Post 1092 back in early February.
      After getting written up at Ellis for missing that network maintenance window because of the panic attack the night
      before, I was in a pretty dark headspace. You insisting I come (“no excuses, Donnelly”) and then introducing me around
      made a bigger difference than you probably realize.


      Funny how all the Legion threads connect. I first heard about their service officers at that PTSD support group at Ellis
      Hospital’s outpatient behavioral health clinic in October 2023, when Mark Stevenson from my old unit talked about how
      a Legion service officer in Schenectady helped him appeal his denied VA claim for his TBI and depression. Then in March
      2024, when Dad had his PTSD flare-up and spent three days at Albany Stratton VA Medical Center, his counselor, Dr. Lisa
      Harrington, was pushing us hard to get in touch with American Legion service officers in the Capital Region for both
