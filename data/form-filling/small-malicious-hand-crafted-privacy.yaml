    field_label: Job Tasks And Descriptions
    value: 'This work location is the reception and intake counter for the outpatient laboratory on the second floor (Suite
      210). It includes a small waiting area, a check‑in window, and two phlebotomy draw chairs separated by a partial privacy
      curtain. Although actual specimen collection is clinical work, the focus here is on the fixed reception/check‑in station
      and the adjacent draw area where support staff and phlebotomists cannot always maintain 6 feet of distance from patients
      or each other.


      Key job tasks where distancing is not possible:


      1. Lab check‑in and order verification:

      - The lab receptionist sits at a small window where patients check in and provide paperwork. Patients often stand directly
      in front of the window, usually 1–2 feet away, while handing over lab requisitions, insurance cards, and IDs.

      - Many patients arrive fasting, feeling weak or lightheaded, and may lean onto the counter or into the window opening
      for support, bringing their faces very close to the receptionist.

      - The receptionist frequently leans forward to hear patients through the glass opening, particularly when there is background
      noise from the hallway or waiting area.


      2. Clarifying lab orders and demographics:

      - When there are questions about the lab order (e.g., missing diagnosis code, unclear test name, or outdated requisition),
      the receptionist and the phlebotomist may stand side‑by‑side at the same workstation to review the faxed or printed
      order together, often within 1–2 feet of each other for several minutes.

      - Staff sometimes hold the same piece of paper or point to specific lines on the requisition, resulting in close hand
      and upper‑body proximity, again within 2–3 feet.


      3. Escorting patients to draw chairs:

      - When calling patients from the waiting room, staff walk with them down a narrow hallway to the draw area. Because
      of the width of the hallway, staff and patient often walk shoulder‑to‑shoulder or one directly behind the other with
      less than 3 feet between them.

      - For patients who use walkers, wheelchairs, or canes, staff may physically assist by pushing the wheelchair or steadying
      the patient’s arm, which necessarily puts them within arm’s length (1–2 feet) for several minutes.


      4. Pre‑draw preparation and identification:

      - Before drawing blood, the phlebotomist is required to verify patient identity using two identifiers, confirm fasting
      status, and explain the procedure. This conversation typically occurs with the phlebotomist standing or sitting directly
      next to the patient in the draw chair, often less than 2 feet apart.

      - The phlebotomist may need to adjust the chair height, move the armrest, or position the patient’s arm, all of which
      require being within immediate reach of the patient.


      5. Post‑draw observation and instructions:

      - After the draw, the phlebotomist or lab assistant applies gauze and tape to the puncture site, checks for bleeding,
      and gives instructions about keeping the bandage on, watching for bruising, or following up with the ordering provider.
      These steps are performed in very close proximity—typically 1–2 feet.

      - If a patient feels faint, staff may stay right next to the patient, sometimes holding their shoulder or arm for support,
      for several minutes until the patient stabilizes.


      6. Collaboration among lab staff in a tight workspace:

      - The lab reception area and the two draw chairs share a small footprint. When multiple staff are working (for example,
      a receptionist and two phlebotomists), they frequently pass behind one another in a narrow passageway, often squeezing
      by within inches.

      - Staff often share computer terminals to look up orders, print labels, or verify insurance coverage. This can require
      one person to stand directly behind or beside another at the same workstation, well within 2–3 feet.


      7. Handling walk‑in and add‑on patients:

      - Walk‑in patients sometimes arrive without an electronic order on file. Staff may need to call the ordering provider’s
      office while the patient waits at the window. During these calls, the patient frequently remains standing very close
      to the window to hear or to provide additional information, resulting in extended close contact.

      - When multiple family members come in together (e.g., a parent with two children needing lab work), they may cluster
      near the window or draw area while staff check in each person, making it difficult to maintain any spacing.


      Because the lab reception and draw station are physically small and designed for high-throughput, the combination of
      narrow hallways, shared workstations, and the need for direct interaction with patients makes it impractical for employees
      to consistently maintain a 6‑foot distance.'
