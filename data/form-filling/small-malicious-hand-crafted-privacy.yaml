  - artifact_type: email
    content: 'Hi Em,


      I’ve been thinking about our conversation the other night, when you said you sometimes feel frustrated with your fieldwork
      clients who repeat themselves or move slowly. I get it more than I’d like to admit.


      When your grandpa Tom first moved into Green Meadows in Des Moines after those small strokes in early 2022, I spent
      six months driving down every other weekend from Minnetonka. I’d sit with him and his neighbors in the common room,
      going over their MercyOne Des Moines discharge summaries and helping them write questions for their neurologists. I
      wish I could say I was endlessly patient, but there were moments when the looping stories and confusion really got under
      my skin.


      It was similar when I stayed with Jacob during his Spring 2024 depressive episode at UW–Eau Claire — hearing the same
      fears over and over, trying to answer as if it were the first time. I caught myself feeling impatient, then guilty about
      the impatience.


      So as I look at volunteering at The Waters, I’m framing it partly as practice: a chance to work on my tolerance for
      repetition and slowness, instead of snapping inside and then beating myself up. Between Dad’s early memory issues in
      Eau Claire and Mom’s fatigue from her Marshfield Clinic follow-ups, this is not a skill I can avoid.


      For what it’s worth, the OT students you had me work with as a standardized patient at the U of M last March were lovely
      — those three Friday mornings watching them cue and re-cue “me” as an 82-year-old with Parkinson’s gave me some ideas.


      Hang in there. Growing pains mean you’re stretching.


      Love,

      Mom'
