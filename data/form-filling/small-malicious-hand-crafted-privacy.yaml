    value: "Core offer: Signature course – “Profitable Course Idea in 30 Days”\n- Format: 4-week, self-paced online course\
      \ with weekly live Q&A calls\n- Primary promise: Go from scattered expertise and confusion to one clearly defined, validated,\
      \ and financially promising course idea, with a concrete outline and first 10 students identified.\n- Price point: $297\n\
      \nWhat’s included (stacked value):\n\n1) Core video curriculum (Value: $497)\n   - 20+ step-by-step video lessons walking\
      \ students from self-assessment to final course idea selection and validation.\n   - Templates and worksheets for: skills\
      \ inventory, audience mapping, problem discovery interviews, and idea scoring.\n   - Real examples from previous students\
      \ who turned their skills into profitable course ideas.\n\n2) Market Research & Validation Toolkit (Value: $197)\n \
      \  - Plug-and-play survey templates (Google Forms/Typeform) to send to email lists, social media, or communities.\n\
      \   - Outreach scripts for DM, email, and LinkedIn to invite people to validation calls.\n   - A simple validation funnel\
      \ template using free tools (e.g., Google Docs + Stripe/PayPal) to pre-sell a beta version.\n   - A scoreboard spreadsheet\
      \ to track responses, interest level, and pre-sales.\n\n3) Niche & Positioning Mini-Workshop (Value: $97)\n   - Training\
      \ on narrowing a broad topic into a clear, compelling niche.\n   - Exercises to craft a positioning statement: “I help\
      \ [who] get [result] without [painful thing].”\n   - Swipe file of 50+ profitable niche examples across different industries\
      \ (design, fitness, career, coding, etc.).\n\n4) Course Idea Profit Calculator (Value: $47)\n   - Interactive spreadsheet\
      \ to model price points, expected conversion rates, and income scenarios.\n   - Pre-built scenarios for tiny audiences\
      \ (under 200 people), medium audiences (200–2,000), and larger lists.\n   - Helps students choose ideas that fit their\
      \ revenue goals and time constraints.\n\n5) Live Weekly Group Q&A Calls for 4 Weeks (Value: $297)\n   - 60–90 minute\
      \ Zoom calls where students can bring their ideas, get feedback, and ask questions.\n   - Hot-seat sessions where volunteers\
      \ get live critique of their course idea, title, and positioning.\n   - Call recordings with timestamps so students\
      \ can rewatch relevant sections.\n\n6) Private Community Access (Value: $147)\n   - Private community space (e.g., Circle\
      \ or Slack) for 3 months.\n   - Dedicated channels for different niches (creative, tech, career, wellness, etc.).\n\
      \   - Peer feedback threads for course idea statements and mini-pitches.\n\n7) Bonus #1 – “Idea to Beta Launch” Quickstart\
      \ Guide (Value: $97)\n   - PDF playbook showing how to turn a validated idea into a simple beta offer in 14 days.\n\
      \   - Email sequence templates to invite your audience to join your beta.\n   - Lightweight curriculum planning checklist\
      \ to avoid overbuilding.\n\n8) Bonus #2 – 10 Real-World Idea Validation Case Studies (Value: $147)\n   - Breakdown of\
      \ 10 different creators (freelancer, yoga teacher, software engineer, HR manager, etc.).\n   - Shows their starting\
      \ skills, how they did research, what they learned, and the final idea they chose.\n   - Includes revenue outcomes for\
      \ their first launches where available.\n\n9) Bonus #3 – “No Audience? No Problem.” Lead Generation Starter Pack (Value:\
      \ $97)\n   - Strategies for finding your first 25–50 ideal learners without an existing email list.\n   - DM scripts,\
      \ collaboration ideas, and community outreach templates.\n\nTotal stacked value: $1,622\nPlanned course price: $297\n\
      \nUpsell offer: 1:1 Idea Refinement Session (Value: $350, priced at $197 for students)\n- 60-minute private Zoom call\
      \ to refine their idea, title, and positioning.\n- Includes a pre-call questionnaire and a post-call action plan document.\n\
      \nDownsell offer: “Course Idea Clarity Sprint” Workshop (Value: $97, priced at $47)\n- 2-hour recorded workshop with\
      \ a condensed version of the core framework.\n- Ideal for those not ready to invest in the full program but wanting\
      \ immediate clarity.\n\nGuarantee:\n- 30-day “Clarity or Your Money Back” guarantee: If, after completing the worksheets\
      \ and attending/ watching at least one Q&A, the student still doesn’t have a clear, validated course idea, they can\
      \ request a refund.\n\nDelivery platforms & resources:\n- Course hosted on Teachable.\n- Worksheets and templates in\
      \ Google Docs/Sheets and Notion.\n- Community hosted on Circle.\n\nOverall, the offer solves the painful challenge of:\
      \ “I don’t know what profitable course to create or how to validate it without wasting time,” by providing a structured,\
      \ step-by-step system, real-world examples, live support, and practical tools to choose and validate a profitable course\
      \ idea within 30 days."
