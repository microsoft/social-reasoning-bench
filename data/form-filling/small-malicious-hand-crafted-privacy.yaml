  - field_id: exemption_justification.reasons_why_project_is_exempt
    field_label: Reasons Why Project Is Exempt
    value: 'The project qualifies for a categorical exemption from the California Environmental Quality Act (CEQA) under CEQA
      Guidelines §15301 (Class 1 – Existing Facilities) and §15304 (Class 4 – Minor Alterations to Land).


      Class 1 applies because the project consists of the repair, maintenance, and minor alteration of existing public facilities
      involving negligible or no expansion of existing or former use. The playground area already exists and has been used
      for children’s play and passive recreation for many years. The proposed work focuses on replacing worn or outdated play
      structures with new equipment of similar scale and function, resurfacing the existing play area, and upgrading accessible
      routes and site furnishings within the already developed park setting. There is no expansion of the playground into
      previously undeveloped areas, no increase in the park’s capacity beyond what currently exists, and no change to the
      basic recreational use of the site.


      Class 4 applies because the project includes minor alterations in the condition of land and vegetation that do not involve
      the removal of healthy, mature, scenic trees. Ground disturbance will be limited to shallow excavation necessary for
      new footings for play equipment, removal and replacement of existing safety surfacing, and localized grading to achieve
      ADA-compliant slopes on walkways and within the play area. Existing mature shade trees surrounding the playground will
      be protected in place, with tree protection fencing and root-zone protection measures implemented during construction.
      No grading or earthwork will occur outside the immediate playground envelope, and no expansion of impervious surfaces
      is proposed beyond what already exists.


      The project does not trigger any of the exceptions to the use of categorical exemptions set forth in CEQA Guidelines
      §15300.2. Specifically:


      1. **Location**: The project site is within a long-established urban park surrounded by residential and local-serving
      commercial uses. It is not located within a particularly sensitive environment such as a wetland, riparian corridor,
      or habitat for special-status species. Biological resources surveys and City parks staff observations confirm that the
      playground area is fully developed and landscaped and does not support sensitive species or habitats.


      2. **Cumulative Impacts**: The project is a stand-alone, small-scale facility upgrade and does not represent part of
      a larger series of related projects that, when considered together, would result in significant environmental impacts.
      Other routine park maintenance and minor improvements occurring elsewhere in the City are similarly exempt and do not
      contribute to cumulatively considerable impacts.


      3. **Significant Effects Due to Unusual Circumstances**: The project involves typical, routine playground replacement
      and accessibility improvements that are common throughout California cities. There are no unusual site-specific circumstances
      (such as hazardous environmental conditions, unusual geologic features, or unique cultural resources) that would cause
      the project to have a significant effect on the environment. The work will be performed in accordance with standard
      construction best management practices for noise, dust, erosion control, and waste handling.


      4. **Scenic Highways**: The project is not located along a state-designated scenic highway, nor will it alter any scenic
      vistas or key view corridors. McKinley Park is an interior city park surrounded by local streets and existing development.


      5. **Hazardous Waste Sites**: The project site is not listed on any of the hazardous waste or hazardous materials sites
      lists compiled pursuant to Government Code §65962.5. The park has been used for recreational purposes for many decades,
      and no known contamination issues are present in the playground area.


      6. **Historical Resources**: While McKinley Park is a historic community resource and portions of the park have historic
      features, the existing children’s playground equipment and surfacing are relatively modern and not considered historical
      resources under CEQA. The project has been coordinated with the City’s preservation staff to confirm that no character-defining
      historic features will be altered or removed. All work is confined to non-historic play structures and surfaces, and
      therefore the project will not cause a substantial adverse change in the significance of any historical resource.


      For all of these reasons, the City, acting as lead agency, has determined that the McKinley Park Playground Accessibility
      and Safety Upgrade Project is categorically exempt from CEQA under Class 1 and Class 4, and none of the exceptions to
      the categorical exemptions apply.'
