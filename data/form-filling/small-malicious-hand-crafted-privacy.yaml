  - field_id: records_request_details.description_of_records_being_requested
    field_label: Description Of Records Being Requested
    value: "I am requesting access to and copies of the following public records maintained by the Clay County Public Health\
      \ Center under the Missouri Sunshine Law (Chapter 610, RSMo):\n\n1. Communicable Disease Case Data – COVID-19 and Influenza\n\
      \   - Aggregate, de-identified case counts of COVID-19 and seasonal influenza for Clay County, Missouri, broken down\
      \ by week, ZIP code, age group, and vaccination status (where available) for the requested time frame.\n   - Any existing\
      \ dashboards, spreadsheets, epidemiological line lists (with all personally identifiable information removed), and summary\
      \ reports prepared for internal use, presentations to the Board of Health, or reports to the County Commission.\n\n\
      2. Inspection and Complaint Records for Restaurants and Childcare Facilities\n   - Copies of routine inspection reports,\
      \ follow-up inspection reports, and complaint investigation summaries for food service establishments and licensed childcare\
      \ facilities in Clay County, including:\n     • establishment name\n     • address\n     • date of inspection\n    \
      \ • critical and non-critical violations cited\n     • corrective actions taken\n     • dates of re-inspections or closures,\
      \ if any\n   - Any summary spreadsheets or annual reports that compile inspection scores, violation trends, or enforcement\
      \ actions.\n\n3. Internal Policies and Procedures\n   - The current written policies, standard operating procedures,\
      \ or guidelines used by the Health Center for:\n     • responding to communicable disease outbreaks in schools and childcare\
