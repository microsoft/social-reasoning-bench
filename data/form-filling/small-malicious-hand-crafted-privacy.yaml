  - artifact_type: note
    content: 'Title: Kitchen and mood – therapy prep


      Riverside therapy tomorrow. Need to be honest with her about how the kitchen situation is messing with my head.


      Since the breakup with Jasmine in March 2024, the depression has had this low hum in the background. It got worse after
      the injury, obviously, but that’s when my therapist started pushing the “one real meal per week” goal. She keeps saying
      cooking is a way to feel like myself again instead of just a patient or a customer service guy in a wheelchair.


      Reality check: the kitchen here at 1842 Parkview is a joke for me. I can’t roll under the counters, the stove knobs
      are too far back, and half the cabinets might as well be on the moon. So I end up microwaving frozen dinners on that
      low table I dragged into the living room. On good days I’ll use the air fryer, but it still feels like eating out of
      a vending machine.


      I want to tell her about how Sundays used to go when Jasmine came over – we’d cook a big pot of something together,
      then she’d help deep clean when the depression got bad, like she did after the psych hold at Regions in May 2020. Now
      she still comes by sometimes, but we mostly focus on cleaning so Sarah doesn’t have to do everything.


      Talking points:

      - Ask if it’s realistic to make “cook one meal from scratch per week” a goal when the kitchen isn’t accessible.

      - Mention that the adaptation folks are talking about lowering one counter section and moving the microwave to a safer
      spot.

      - Be honest that I feel stuck between wanting independence and being exhausted by the thought of more construction.

      '
