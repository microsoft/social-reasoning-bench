    background_context: 'This is Michael, a 46-year-old man living in a modest, ground-floor one-bedroom apartment in the
      Longfellow neighborhood of Minneapolis, not far from the Mississippi River. Before his spinal cord injury in late 2022,
      he worked full-time as an auto mechanic and prided himself on being the guy friends and family called when their cars
      made strange noises. A car accident on an icy November evening left him with an incomplete C6–C7 spinal cord injury
      and quadriplegia. After months of rehab at the Courage Kenny Rehabilitation Institute and a stint in a transitional
      care unit, he moved into his current apartment in August 2023. He rents from Riverbend Properties and chose the building
      because it was one of the few places he could afford that was on a bus line and had a ground-floor unit, even though
      the building itself is far from accessible.


      These days, Michael structures his life around a mix of medical realities, part-time work, and maintaining his independence.
      He uses a power wheelchair for all mobility and relies on a personal care assistant (PCA), Jamal, who comes weekday
      mornings from 7:30 to 11:00 a.m. to help with getting out of bed, dressing, bowel and bladder routines, meal prep, and
      light housekeeping. On weekends, his younger sister Sarah fills in for the morning routine, usually arriving around
      8:00 a.m. with coffee and a breakfast sandwich from a nearby café. Because he can’t get his wheelchair into the bathroom
      yet, toileting and hygiene mostly happen in the bedroom using a portable commode and sponge baths, which he finds both
      frustrating and undignified. He and Sarah talk often about how much easier and safer things will be once the bathroom
      and entry changes they’re pursuing are in place, especially after Sarah strained her back helping with a transfer in
      December 2025.


      Michael works about 15–18 hours a week from home as a remote customer support associate for NorthStar Outdoor Supply,
      an online outdoor gear retailer based in Duluth. He started the job in May 2024 after completing an online customer
      service course, and the work gives him both income and a sense of purpose. He logs in from his laptop, mounted on a
      swing-away arm on his wheelchair, and uses voice recognition software and a large-trackball mouse he can manage with
      limited hand function. His shifts are mostly late mornings and early afternoons, when he has the most energy and after
      his morning care routine is complete. On a typical weekday, he’s online by 11:30 a.m., answering emails and chat inquiries,
      taking breaks every hour to relieve pressure and stretch as much as he can. He’s proud that his supervisor recently
      complimented him on his calm demeanor with frustrated customers and hinted at the possibility of slightly increased
      hours later in 2026 if he feels up to it.


      Outside of work, Michael’s life revolves around a small but steady circle of family, caregivers, and a few close friends.
      His parents, Linda and Bob, live in Bloomington and visit about twice a month; they usually bring a casserole or homemade
      soup, and his mom fusses over him in a way that sometimes annoys him but also makes him feel cared for. His younger
      brother Daniel is less comfortable with medical stuff but helps with practical things like changing lightbulbs, carrying
      in bulk supplies, and taking his power chair in for service when needed. Michael is especially close to his 10-year-old
      niece Emily, who loves to come over on Sunday afternoons. They play cooperative video games, watch nature documentaries,
      and work on her school projects together—she likes to interview him for assignments about “someone you admire” or “a
      person who overcame a challenge,” which he finds both touching and a bit embarrassing.


      Michael’s days are carefully paced to manage fatigue, blood pressure, and the risk of pressure sores. His morning routine
      with Jamal includes checking his skin, stretching, and making sure his power wheelchair cushion is positioned correctly.
      After work, he often rests in his reclined wheelchair position to relieve pressure, listens to podcasts about cars and
      disability rights, and occasionally joins an online peer support group for people with spinal cord injuries hosted by
      the Minnesota Spinal Cord Injury Association. His hypertension is controlled with medication he takes twice daily, and
      he sees his primary care physician every three months, with occasional telehealth check-ins with a rehabilitation specialist.
      He’s had one small pressure ulcer on his sacrum in fall 2025, which scared him enough that he’s now meticulous about
      repositioning and skin checks.


      Emotionally, he’s still navigating waves of grief and adjustment. He was diagnosed with major depressive disorder after
      his injury, and while his mood has improved compared to the first year post-accident, he still has days when the loss
      of his former physical abilities hits him hard—especially when he thinks about the hands-on work as a mechanic he can
      no longer do. He sees a therapist via video visits twice a month and takes an antidepressant prescribed by his psychiatrist.
      He and his ex-partner Jasmine, with whom he split amicably in 2021, exchange messages every few weeks; she occasionally
      stops by with takeout from their old favorite Vietnamese restaurant in Saint Paul, and their conversations are easy,
      focused on movies, books, and mutual friends rather than the past.


      A constant, practical concern in Michael’s life is the physical environment of his apartment and building. The three
      concrete steps at the main entrance are a daily barrier—he currently depends on Sarah, a neighbor, or a PCA to help
      get his power chair in and out, which is physically risky and has already led to one near fall in January 2026. Because
      of this, he rarely goes out alone, even though he would like to be more independent with short trips to the nearby co-op,
      the library, or just rolling along the river trails. Inside, the narrow bathroom doorway and standard tub/shower make
      it impossible for him to bathe or toilet in a typical way, pushing these activities into his bedroom and increasing
      the workload on his caregivers. He’s working with his county case manager, Laura Peterson from Hennepin County Human
      Services – Disability Services, to prioritize modifications that will make it possible for him to stay in this apartment
      long-term instead of having to move to a nursing facility.


      Despite the challenges, Michael is slowly building a life that feels more his own again. He’s learned to cook simple
      meals using a microwave and an air fryer placed on a low, stable table he can roll under; he keeps a running grocery
      list on his phone that he shares with Sarah and Jamal. On good weather days in spring and summer, he likes to sit just
      outside the building, on the small concrete landing at the top of the steps, chatting with neighbors or watching people
      walk their dogs. He follows Minnesota sports teams—especially the Vikings and Timberwolves—and texts game commentary
      back and forth with Daniel. Looking ahead, his short-term goals for 2026 include getting the entry and bathroom made
      accessible, increasing his work hours slightly if his health allows, and taking at least one accessible weekend trip
      up to Duluth with Sarah and Emily to see Lake Superior from the lakewalk, something he used to do regularly before the
      accident and is determined to experience again from his wheelchair.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Quick update before Sunday


      Hey Jas,


      Figured I’d send an update before you come by this Sunday (if you’re still up for it). The place is… let’s call it “lived
      in.” Sarah’s been juggling her own stuff in St. Louis Park and still trying to get here most weekend mornings, and I
      can tell she’s worn thin. I keep thinking about how you used to tag‑team with her on those deep‑clean Sundays right
      after my psych hold at Regions back in May 2020. Wild that you were my emergency contact then and we’re still doing
      this weird post‑breakup care routine.


      Depression’s been a little heavier again, kind of like right after we split in March 2024. My therapist over at Riverside
      Mental Health keeps pushing “behavioral activation” – cook one real meal a week, get outside twice, that kind of thing.
      Easier said than done when the kitchen here at Parkview might as well be on another planet. I can’t reach half the counters
      from the chair, so I end up microwaving frozen stuff on that wobbly TV tray. She swears that if I could actually cook,
      it’d help my mood and my weight.


      On the bright side, work at NorthStar Outdoor Supply is steady. Still around 15–18 hours a week, mostly late mornings.
      My supervisor in Duluth actually complimented me again on staying calm with angry customers. I’m exhausted after a shift,
      but it feels good to be useful.


      If you don’t mind, maybe this Sunday we can split it up: you tackle the bathroom and kitchen surfaces, I’ll direct traffic
      from the chair and try not to feel guilty about it. Maybe afterward we can order that tofu curry from the Saint Paul
      place we like and put something dumb on Netflix.


      Thanks again for sticking around in my life the way you have.


      – Michael'
