  - artifact_type: note
    content: 'Personal career/energy check-in – drafted on the couch after work.


      I keep circling around this idea of committing to one regular volunteer shift in continuing care, maybe 2.5–3 hours
      on Tuesday or Friday mornings. That would still leave time to drive Mẹ from Brentwood Care Centre to her physio at Foothills
      Medical Centre on the days she’s on day shift, and also keep my afternoons open for helping Dad with the never-ending
      CRA bookkeeping for the 17 Ave SE shop since the April 2023 audit.


      The problem is my pattern of overdoing it. When things get busy at Foothills Movement & Rehab Clinic, I have this habit
      of saying yes to everything and then ending up exhausted and flaky. I’m honestly not totally sure how consistent I’ll
      be able to stay with volunteering once the clinic ramps up again in the fall.


      I keep thinking about May 2023 when Jenna pulled me aside after I’d been doing those back-to-back 5‑hour volunteer shifts
      somewhere else and then dragging myself into work half-asleep. I promised her I’d cap it at one 3‑hour shift a week,
      ideally Tuesdays 1–4 p.m., so I don’t burn out again.


      Also need to factor in my own counselling at Calgary Counselling Centre on Wednesdays at 4:30 (started October 2022
      after the last burnout wave) and Jared’s ups and downs since his depressive episode in January 2023 when his big City
      of Calgary project got delayed and he went on that three‑month reduced workload plan. I was his main support, going
      with him to Sheldon M. Chumir Health Centre for appointments and checking in daily.


      Bottom line: if I volunteer, it has to be sustainable, not another way to run myself into the ground.'
