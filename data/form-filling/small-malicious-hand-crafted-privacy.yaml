  - field_id: fixed_work_location[0].job_tasks_and_descriptions
    field_label: Job Tasks And Descriptions
    value: 'The central registration front desk is located directly inside the main lobby entrance. It is a long, shared counter
      where four patient access representatives sit side-by-side with computers, card scanners, and phones. Because of the
      layout and the constant traffic, staff often cannot maintain 6 feet of distance from one another or from patients, family
      members, and vendors.


      Key job tasks where distancing is not possible:


      1. Patient check‑in and registration:

      - Staff greet patients at the counter, verify identity, and collect insurance cards and photo IDs. Patients frequently
      lean over the counter to hear or to hand documents, resulting in staff being within 2–3 feet of their faces for several
      minutes at a time.

      - When patients have difficulty hearing, staff often speak louder and move closer, sometimes removing their own mask
      briefly if a patient reads lips (although the current policy discourages this, it still occurs in practice when communication
      breaks down).

      - Staff frequently assist elderly patients or those with limited mobility by helping them fill out forms; this often
      involves leaning over the counter together or stepping around to the public side of the desk and standing shoulder-to-shoulder
      with the patient while pointing to specific sections of the paperwork.


      2. Insurance and financial counseling at the desk:

      - For patients with complicated insurance coverage or self-pay situations, the registration representative may spend
      10–20 minutes at the counter reviewing benefits, payment plans, and consent forms. The patient is generally less than
      3 feet away throughout this conversation.

      - During busy periods (weekday mornings between 7:00–10:00 a.m.), two staff members may work simultaneously with one
      patient (e.g., one on the computer and one explaining forms), putting the two staff members within 2–3 feet of each
      other and the patient.


      3. Wristband printing and label handling:

