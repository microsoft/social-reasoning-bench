  - artifact_type: note
    content: 'Journal – 2023-08-10


      This summer has felt like one long, buzzing panic attack. June through August 2023 were just a blur of heart palpitations,
      sweaty palms, and that awful sense that something terrible is about to happen. Dr. Hartman at Park Nicollet in St. Louis
      Park upped my sertraline dose in July, which has taken the edge off, but the panic still sneaks in.


      Oddly, the only time I consistently feel calm is when I’m at Mrs. Hendricks’s condo here in Minnetonka, reading to her
      for an hour or two. I bring over short stories or a mystery novel, make us tea, and the anxiety just… quiets. It’s the
      same grounded feeling I had visiting Dad’s older neighbors when I was a teenager.


      I keep thinking I should build that into my life more deliberately. Dr. Hartman and I talked back in February about
      my lingering depression and grief since Grandma Margaret died in March 2020 and Pat’s death in 2016. She floated the
      idea of a senior community like The Waters and we even wrote a concrete goal into my chart: work up to logging about
      three hours a week of structured volunteering by summer 2024.


      Part of me feels like a fraud, because when I “helped” at Maggie’s senior community in Eau Claire years ago, I mostly
      sat in the corner proofreading while she played cards with her friends. I didn’t exactly throw myself into the mix with
      other residents.


      Still, this perimenopause storm has made it clear: being with older adults, reading aloud, listening to their stories
      — that’s where my nervous system settles. Maybe it’s time to stop just thinking about The Waters and actually send an
      email.

      '
