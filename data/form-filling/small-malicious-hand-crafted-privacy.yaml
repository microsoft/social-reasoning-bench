    content: '[Finance Director],


      I wanted to loop you in on how I’m framing the financial side of the Unit #23 replacement before I finalize the memo.


      As you know, we’ve already got $54,000 placeholdered in the 2026 CIP, and the Northland Motors quote for the 2026 Chevy
      Silverado 2500HD came in at $51,842.17 all‑in (tax, title, plow install, etc.). That part is straightforward.


      The harder part is the context. The Equipment Replacement Fund is still feeling that $75,000 hit we took in May 2024
      for the Thomas Greene slip‑and‑fall case in the South 7th Street alley—legal fees plus the insurance deductible. I’ve
      been trying to structure this truck purchase so the anticipated $4,000–$6,500 we’ll get from auctioning the 2009 F‑250
      in early 2026 quietly helps backfill that gap without dragging the Greene lawsuit back into every conversation. A few
      council members still get prickly the second his name comes up.


      On top of that, between Caleb’s $3,800 out‑of‑pocket from his February 2024 broken arm at Cuyuna and my parents needing
      more help, I’ve been less available for overtime‑heavy snow responses. That’s another reason I want a reliable truck
      in the fleet instead of pouring more money into Unit #23.


      We also never really developed a Plan B here. If council doesn’t approve this option, I don’t have a scaled‑down alternative
      ready to go, and we’ll be scrambling to cobble something together before next winter.


      In the public memo I’ll keep it simple: budgeted in the Equipment Replacement Fund, under CIP estimate, auction proceeds
      returning to the fund, modest reduction in repair costs going forward. The rest can stay between us.


      Thanks,

      Mike'
