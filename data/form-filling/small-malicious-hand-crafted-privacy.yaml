  - artifact_type: email
    content: 'Hi Megan,


      I’ve been meaning to send you a longer update now that I’ve wrapped up my time with the Hennepin County Library home-delivery
      program.


      The situation with Mrs. Helen R. on Williston Road is still on my mind. Back in October 2021, during one of my fall
      deliveries out of the Minnetonka branch, she showed me that shoebox full of opioid prescriptions she’d been quietly
      hoarding. I know I did the right thing calling her daughter Lisa and her primary care doctor at Allina Health–Plymouth
      Clinic, and I’m glad we shifted her reading list away from illness and death. Still, it shook me how easy it was for
      something that serious to stay hidden.


      It reminded me of Carl M., the widower near Ridgedale Center I visited every other Thursday at 6:30 p.m. from May 2020
      through April 2021 with our church’s senior outreach. His depression after his wife died was so heavy, and when he started
      talking about “wanting to go be with her,” his social worker at Park Nicollet Methodist, Jenna Larson, asked me to keep
      informal notes after each visit so she could monitor his risk.


      I’ve realized I’m more comfortable in a supporting role than leading. When our church group went into nursing homes,
      I usually hung back and let other people organize games and conversations. I’m not a natural activity director.


      All of this is percolating as I look at volunteering at The Waters. I like one-on-one companionship and reading aloud;
      I just have to be mindful of my boundaries so I don’t slide into quasi–social worker mode again.


      Thank you for trusting me with the home-delivery route. It changed me more than I expected.


      Warmly,

      Karen'
