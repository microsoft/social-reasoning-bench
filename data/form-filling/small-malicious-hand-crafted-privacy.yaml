      reasons I’m requesting permission to operate primarily on the Hooker Falls, Triple Falls, and High Falls trails is that
      they allow me to design very short, low‑elevation photography walks near the Hooker Falls Access Area parking lot so
      he can safely join some outings when he visits from Asheville for 2–3 hours at a time.
