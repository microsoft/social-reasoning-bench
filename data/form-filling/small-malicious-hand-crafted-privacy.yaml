- id: 2087
  form_info:
    title: 'Fixed Work Location and Job Task Inventory for Employees Outside of

      Direct Patient Care Areas Who Cannot Maintain Physical Distancing'
    extracted_text: "Fixed Work Location and Job Task Inventory for Employees Outside of\nDirect Patient Care Areas Who Cannot\
      \ Maintain Physical Distancing\n\nUse this Fixed Work Location and Job Task Inventory and input from employees to identify\
      \ any fixed work\nlocations outside of direct patient care areas where employees cannot maintain at least 6 feet of\
      \ physical\ndistancing from all other people when indoors. Direct patient care means hands-on, face-to-face contact\
      \ with\npatients for the purpose of diagnosis, treatment, and monitoring.\n\nNote: The ETS exempts fully vaccinated\
      \ workers from physical distancing and barrier requirements when in\nwell-defined areas of the workplace where there\
      \ is no reasonable expectation that any person with suspected or\nconfirmed COVID-19 will be present.\n\nFixed work\
      \ locations are workstations where an employee is assigned to work for significant periods of time. Protective measures\n\
      can often be implemented at fixed workstations to minimize potential exposure to COVID-19.\n\no  Take an inventory of\
      \ all fixed work locations outside of direct patient care areas where employees cannot maintain 6 feet of\n   physical\
      \ distance from all other people. Note the number of workers at each location.\n   For example: 5 administrative employees\
      \ work at an outpatient medical office with fixed work locations at:\n      ▪  The reception area\n      ▪  Employee\
      \ desk area not in direct patient care areas\n\no  For each fixed work location, describe the job tasks where employees\
      \ cannot maintain 6 feet of physical distance from all\n   other people.\n   For example: For the outpatient medical\
      \ office:\n      ▪  2 employees in the reception area interact with patients, families, and the public to conduct administrative\n\
      \         tasks at the reception desk\n      ▪  3 employees work at their desks not in direct patient care areas\n\n\
      \nFixed Work\nLocation            No. of\n                    Workers        Job Tasks and Descriptions\n\nFor example:\n\
      Outpatient\nmedical office      The\n                    reception\n                    area           2           \
      \   Interact with patients, families, and the public to conduct administrative tasks at the\n                      \
      \                             reception desk\n\n                    Employee\n                    desk area      3 \
      \             Work at their desks not in direct patient care areas"
  form_summary:
    form_purpose: Internal workplace safety inventory to document fixed work locations and job tasks where employees outside
      direct patient care areas cannot maintain six feet of physical distancing, in order to plan COVID-19 protective measures
      and comply with ETS requirements.
    intended_recipient: Supervisors, safety officers, and employer management responsible for workplace health and safety
      compliance, who will use employees’ input to assess risk and implement controls in non–patient-care areas.
