  - artifact_type: email
    content: 'Subject: Doorbell/camera and bathroom questions


      Hi Laura,


      Thanks again for taking the time to talk last week. I’ve been thinking more about a couple of things we touched on and
      wanted to write them down before I forget.


      First, the entry situation. Ever since NorthStar Health marked me as a “non‑compliant client” in July 2025 for supposedly
      not answering the door for those two missed morning PCA visits, I’ve been anxious every time I hear a knock. Half the
      time I’m still in bed, waiting for Jamal or Sarah to help with the morning routine. By the time I transfer into the
      chair and get to the front door of the building, the PCA is gone. A visual/audible doorbell with maybe a simple camera
      feed I can see from my phone or laptop would go a long way toward proving I’m not just ignoring people.


      Second, the bathroom. During that UTI in November 2025, the Hennepin Healthcare urologist had me cathing every four
      hours and I still leaked through onto the bedding twice in one week. My mom Linda had to come over to help change everything
      because my PCA hours were already used up those days. If we can get a roll‑under sink and a stable shelf next to an
      accessible toilet, I could do intermittent caths in the bathroom instead of in bed.


      I’ll be honest: after that noisy repair project the building did last summer, part of me just wants the contractors
      in and out as fast as possible, even if it means they only do the bare minimum. But I also know that if we don’t do
      this right, I’ll still be stuck doing half my personal care in the bedroom.


      Appreciate you sticking with me on this.


      Best,

      Michael'
