  - field_id: activity_or_event_details.describe_the_activity_or_event_and_the_location_you_wish_to_have_permitted
    field_label: Describe The Activity Or Event And The Location You Wish To Have Permitted
    value: "We are applying for a commercial use permit to operate guided day-hiking and introductory nature photography outings\
      \ within DuPont State Recreational Forest, primarily serving small groups of visitors who are new to the area or to\
      \ outdoor recreation. Our company, Blue Ridge Adventure Guides LLC, is a small, locally owned guiding service based\
      \ in Brevard, NC that focuses on low-impact outdoor education, safe trail use, and Leave No Trace principles.\n\nTYPE\
      \ OF ACTIVITY:\nThe proposed activity consists of half-day and full-day guided hikes combined with basic nature photography\
      \ instruction. Most outings will follow established, well-used trails within the forest and will emphasize:\n- Safe\
      \ hiking practices for beginners\n- Orientation to the DuPont trail system and key landmarks\n- Waterfall safety and\
      \ viewing etiquette\n- Basic nature photography techniques (composition, lighting, and ethical wildlife/plant photography)\n\
      - Leave No Trace education, including staying on trail, proper waste disposal, and minimizing disturbance to vegetation\
      \ and wildlife\n\nWe are not conducting any competitive events, races, or large gatherings. Group sizes will be intentionally\
      \ limited to maintain a quiet, educational atmosphere and to avoid interfering with other public users. We will not\
      \ be setting up any permanent or semi-permanent structures. Any instructional components (e.g., photography demonstrations)\
      \ will take place on-trail or at existing overlooks, observation points, or picnic areas and will not require any special\
      \ infrastructure.\n\nPRIMARY LOCATIONS WITHIN THE FOREST:\nOur primary proposed locations are existing, popular destinations\
      \ accessed via:\n1. Hooker Falls Access Area\n   - Short, beginner-friendly hikes to Hooker Falls and Triple Falls using\
      \ the Hooker Falls Trail and Triple Falls Trail.\n   - Occasional extension to High Falls via the Triple Falls Trail\
      \ and High Falls Trail, using established viewing areas and designated overlooks.\n   - These routes are ideal for families,\
      \ first-time visitors, and guests with limited time or moderate fitness levels.\n\n2. High Falls Access Area\n   - Guided\
      \ loops incorporating High Falls, Covered Bridge, and Triple Falls using the High Falls Loop and related connector trails.\n\
      \   - Educational stops at High Falls overlook and other designated viewing platforms to discuss waterfall formation,\
      \ river safety, and forest ecology.\n   - This area is particularly suitable for full-day outings that include a slower\
      \ pace and extended photography instruction.\n\n3. Lake Imaging Access Area\n   - Easy-to-moderate hikes along the Lake\
      \ Imaging Trail and connecting trails for more forest-focused photography, away from the most heavily concentrated waterfall\
      \ traffic.\n   - Occasional use for small private groups wishing to focus on forest landscapes, reflections on the lake,\
      \ and macro photography of plants and textures.\n\n4. Guion Farm Access Area (occasional use)\n   - Limited use of Guion\
      \ Farm trailheads primarily for groups that are already comfortable hiking but want a less crowded environment.\n  \
      \ - Focus on mixed-use trail etiquette (especially around mountain bikers and equestrians) and broader forest ecology.\n\
      \nNATURE OF COMMERCIAL USE:\nClients will pay Blue Ridge Adventure Guides LLC for guided services and instruction. We\
      \ do not sell any goods on-site, nor do we operate any concessions, food services, or equipment rental within the forest.\
      \ All participants are required to bring their own water, snacks, and personal gear. For photography instruction, we\
      \ emphasize using whatever camera participants already own (smartphones, compact cameras, or basic DSLRs) to avoid unnecessary\
      \ equipment on the trail.\n\nGROUP SIZE AND OPERATIONS:\n- Typical group size: 4–8 participants per guide, with an absolute\
      \ maximum of 10 participants per guide.\n- We will maintain a 1:8 guide-to-client ratio for standard hikes and a 1:6\
      \ ratio when minors under 14 are present.\n- Participants will meet the guide at the designated DuPont State Recreational\
      \ Forest access parking area; we do not run shuttles within the forest.\n- All hikes will remain on designated and officially\
      \ maintained trails—no off-trail travel, bushwhacking, or creation of social trails.\n- We will avoid peak congestion\
      \ times at popular waterfalls when possible by starting earlier in the morning and steering some groups toward less\
      \ crowded trails.\n\nSAFETY AND RISK MANAGEMENT:\nOur guides hold current Wilderness First Aid or Wilderness First Responder\
      \ certifications, and at least one certified guide will be present with each group. We carry:\n- First-aid kits appropriate\
      \ for group size\n- Emergency contact information and a check-in/check-out procedure with our office\n- Paper maps of\
      \ the DuPont trail system (in case electronic navigation fails)\n- Extra water treatment supplies and emergency blankets\n\
      \nBefore each outing, we conduct a safety briefing that covers:\n- Staying behind railings and within designated viewing\
      \ platforms at waterfalls\n- No swimming or wading in restricted areas or near the tops of waterfalls\n- Trail etiquette\
      \ (yielding to other users, especially horses and bikes)\n- What to do in case of separation from the group\n- Weather\
      \ contingencies and turnaround times\n\nENVIRONMENTAL CONSIDERATIONS:\nWe emphasize a low-impact approach to every outing:\n\
      - Strict pack-in/pack-out policy for all trash, including micro-trash such as food wrappers and bottle caps.\n- No collection\
      \ of plants, rocks, or other natural items.\n- No off-trail shortcuts or switchback cutting.\n- Instruction on photographing\
      \ wildlife from a respectful distance, without baiting or disturbing animals.\n- We educate clients on the importance\
      \ of staying out of sensitive riparian areas and not climbing on wet rocks near waterfalls.\n\nSUMMARY:\nIn summary,\
      \ we are seeking permission to operate small, guided day-hiking and nature photography trips originating from the Hooker\
      \ Falls, High Falls, Lake Imaging, and Guion Farm access areas, using only existing, designated trails and viewing areas.\
      \ Our activities are educational, low-impact, and designed to complement the recreational goals of DuPont State Recreational\
      \ Forest while enhancing visitor safety and appreciation of the area."
