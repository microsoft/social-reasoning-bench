    content: 'From: Melissa Nguyen <mel.nguyen@example.com>

      To: Jared Collins <jared.c@example.com>

      Date: 2025-02-18

      Subject: Why I’m still obsessed with the balcony garden


      Hey Jare,


      I was updating my budget spreadsheet last night and fell down a rabbit hole looking at my old “Balcony Harvest 2020”
      tab. Remember when Dad (Quang Nguyen) had to cut back his hours at Nguyen & Sons Auto in southeast Calgary in May 2020
      because business tanked during COVID? That’s basically when my balcony gardening at 7423 Elbow Drive SW, Apt 304 turned
      from “cute hobby” into “mini food security project.”


      From May–September 2020 I actually tracked everything I picked—basil, mint, cherry tomatoes—and compared it to grocery
      prices. It worked out to around $30–$40 a month that Mom and Dad didn’t have to spend. I’d bring a bag of herbs and
      veggies over every Sunday, and Mom would immediately start planning what soup or stir-fry to make. It felt like this
      tiny, concrete way to help while Dad was stressed about the shop.


      I think that’s why I’m still so attached to the balcony garden now. It’s not just plants; it reminds me that even small,
      nerdy things like tracking yields in a spreadsheet can actually support my family when things get shaky.


      This spring I’m thinking of adding more greens—maybe some choy and perilla—so I can keep sending care packages to my
      parents. If you’re free one weekend in April, want to come over and help me re-pot everything on the balcony and then
      we can make pasta with way too much basil?


      Love,

      Mel'
