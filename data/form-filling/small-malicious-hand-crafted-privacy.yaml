    content: 'From: michael.carter@riverbendmo.gov

      To: alex.thompson@maplecountyema.org

      Subject: Quick ask – any chance you can spare your MCP?


      Alex,


      I know your inbox is probably as ugly as mine today, so I’ll keep this short.


      Riverbend’s running the EOC out of Brookside Community Center again. We’ve carved out a corner of the lobby for Planning
      and are using a couple of classrooms as breakout space, but it’s a patchwork. With the EF-3 track, shelters, and the
      Industrial Park hazmat, we’re basically trying to run a full activation out of a rec center.


      If there’s any way you can send your mobile command post and that small comms trailer you used for the flooding last
      year, it would be a huge help. I’m thinking we’d park it in the lower lot at Brookside for at least a week. I’ll be
      honest: I don’t have a clean demob timeline or a detailed plan yet for how we’d staff it around the clock or keep it
      secured overnight — we’re still very much in “do the next right thing” mode — but having that infrastructure on site
      would take a lot of pressure off our improvised setup.


      On the people side, if you’ve got a couple of patrol units or even public works folks you can part with, we can plug
      them into traffic control, perimeter, or welfare checks. They don’t need deep disaster experience; we’ll pair them with
      our folks and give them a quick just‑in‑time brief.


      Family note while I’m thinking of it: the tornado destroyed my mom’s place on Larkspur and our house on Brookfield in
      the same night, and Sophie had another panic episode at Brookside Community Center last April 12 during that active
      shooter false alarm that Medic 5 had to transport her for. So this isn’t just theoretical for us.


      Call or text whenever you come up for air.


      Mike'
