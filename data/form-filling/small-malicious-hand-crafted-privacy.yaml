    content: 'Event: Debris clearing w/ Daniel – Brookfield Terrace

      Date: 2024-03-05

      Time: 09:00–12:00

      Location: 118 Brookfield Terrace / surrounding block

      Attendees: Michael Carter, Daniel Carter


      Notes:


      Meet Dan at the house around 0900. Goal is to keep working on the downed limbs and fence sections left over from the
      earlier wind events, especially the three big oaks that keep dropping branches across the sidewalk and into the street.
      Bring both chainsaws, extra bar oil, fuel, and the smaller ladder. Check that Ethan’s bike is out of the way before
      we start cutting.


      Important: remember what Dr. Patel at Riverbend Regional said after the mild heart attack in January — no more than
      20–30 minutes of heavy chainsaw work at a stretch. Set a timer on the phone and actually honor it this time. Take breaks
      to hydrate and let Dan handle the heavier cuts. Don’t be a hero.


      Also want to walk over and check on Mom at 118 afterward; her oxygen concentrator scared us during that July 7, 2022
      windstorm when it failed and EMS barely got down Brookfield in under 20 minutes because of all the trees. Make sure
      her backup battery is working and that she still has the clinic’s number taped to the fridge.


      If there’s time before lunch, swing by Brookside Community Center to drop off the updated family emergency kits list
      for the spring preparedness fair.


      Reminder: pick up pizza on the way home so Emily doesn’t have to cook after parent‑teacher conferences at Riverbend
      North High.'
