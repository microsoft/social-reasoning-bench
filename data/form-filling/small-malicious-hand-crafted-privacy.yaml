  - artifact_type: email
    content: 'Subject: Catch-up + all the plates I’m spinning


      Mami,


      I’m drinking my coffee in the car outside WinCo before I come up with your groceries, so I thought I’d write you a quick
      note.


      First, thank you again for helping with Mateo’s emergency room bill from Swedish Edmonds after his asthma attack on
      February 2. I know you and Papá don’t have endless savings, and it means a lot that you’re covering part of that ER
      bill so we didn’t have to put the whole thing on a card.


      Because of that, I’ve been extra careful with what I charge. For the Girls Varsity Basketball tournament at Shoreline
      Community College on March 14–15, I paid for the meals at Tony’s Pizzeria and Chipotle and all the Costco snacks myself
      and will get reimbursed through the Boosters. I didn’t want you and Papá to feel like you had to “float” basketball
      costs on top of Mateo’s hospital stuff. Once the booster reimbursement comes in, I’m planning to send you at least $200
      back right away.


      Work is…okay. My manager, Elena, cut my bonus this year after that performance improvement plan because I missed a couple
      of sprint deadlines when I was taking Izzy to counseling at Seattle Children’s last fall. It still stings, but I’d make
      the same choice again. Izzy’s mood is better now, and seeing her run out onto the court makes all the stress worth it.


      We’ll be at your place around 2:30. I’m bringing the low-sodium crackers you like and some fresh strawberries.


      Te quiero,

      Sarah'
