  - artifact_type: text
    content: 'Thread with Sarah J.


      2026-02-10, 7:42 p.m.


      Michael: Hey, you get home okay? Thanks again for last night.


      Sarah: Yeah, just got in. How are you feeling today?


      Michael: Better than yesterday’s disaster, at least. Still mortified you had to spend your Monday night cleaning up
      that bowel accident in my bedroom. Autonomic dysreflexia is such a cruel joke.


      Sarah: It’s not your fault. That Feb 9 flare was rough. I’m just glad the PCA from AllCare wasn’t there right in the
      middle of it – you would’ve been even more embarrassed.


      Michael: Oh he was there for the aftermath this morning, trust me. Whole apartment still smelled. This is exactly why
      I keep talking about getting the toilet out of the bedroom and into a real bathroom setup with better ventilation. Some
      kind of enclosed toilet area and a bidet seat would make nights like that less of a nightmare.


      Sarah: I know. We’ll keep pushing. What did Laura say on the phone?


      Michael: She started in with all the “priorities and timelines” stuff. Honestly, at this point I don’t care what they
      build as long as it’s the cheapest thing that shuts the waiver people up for a while and keeps them off my back. I’m
      so tired of explaining my bathroom habits to strangers.


      Sarah: I get it. But we still want it to actually help you, not just check a box.


      Michael: Yeah, yeah. You’re right. Sorry, just cranky. Can you still come by Saturday morning around 8 with coffee?
      Jamal’s off.


      Sarah: Of course. Breakfast sandwich and extra napkins, per usual. Love you.


      Michael: Love you too.'
