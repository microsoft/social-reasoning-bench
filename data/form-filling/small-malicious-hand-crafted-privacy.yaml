  - artifact_type: email
    content: 'Hey Jared,


      Just wanted to explain why I got a bit snappy when you suggested skipping my “stretching thing” tonight.


      Since Dr. Patel at South Calgary Primary Care put me on that plan back in October 2021 for the panic attacks, I’ve been
      doing that 20–30 minute YouTube yoga/therapy routine almost every night. I even track it in that nerdy Google Sheet.
      Every time I skip more than two nights in a row, my sleep tanks and the anxiety creeps back in hard.


      I know from the outside it probably looks like I’m being rigid, but it’s one of the few things that actually helped
      when I hit that burnout/anxiety wall around September 2021 and ended up at Calgary Counselling Centre with Dr. Emily
      Shah. Remember our session notes from November 15, 2021, when she suggested I reconnect with stuff that actually calms
      me, like gentle yoga and maybe volunteering with older adults in rehab or long‑term care? This routine is part of that.


      The funny thing is, once I’m done with yoga, I don’t exactly live the ideal wellness life. Most weeknights I just crash
      on the couch afterward and binge true‑crime shows or doom-scroll my phone for way too long instead of doing anything
      active or creative. So I really don’t want to give up the one healthy habit I’m actually sticking with.


      Let’s compromise: I’ll start my video as soon as I get home from the clinic, and then we can make dinner and watch something
      together. If you want, I can even show you the shoulder stretch sequence that helps my desk posture.


      Love,

      Mel'
