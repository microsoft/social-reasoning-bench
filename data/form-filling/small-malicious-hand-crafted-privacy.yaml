  - artifact_type: email
    content: 'From: michael.a.johnson@example.com

      To: linda.johnson54@example.com

      Date: Mon, 10 Feb 2025 20:47:11 -0600

      Subject: About Sarah and all the changes


      Hey Mom,


      I wanted to write this out because it’s a lot to talk through on the phone.


      I’ve been thinking back to how everything snowballed after my spinal cord injury in March 2022. I know it was hard on
      everyone, but especially on Sarah. When she was still in St. Louis Park, MN with her ex-husband, she was constantly
      driving back and forth to my place at 1842 Parkview Avenue, Apt 1B here in Minneapolis, on top of her own mess at home.


      You’ve said a few times that you worry she “gave up too much” after the divorce, so I want you to hear this clearly
      from me: her decision to move out of the house she shared with her ex-husband once their divorce was finalized in October
      2023, and to get a small apartment closer to me, has literally made it possible for me to stay out of a nursing home.
      She’s been my primary caregiver since the early days after the injury, and now she’s here several nights a week to help
      with transfers, meds, and the bedtime routine when Jamal’s off.


      I do feel guilty sometimes that her life got rearranged around mine, but I’ve talked about it with my therapist and
      with Sarah. She keeps saying this is what family does, and that being nearby makes her feel less anxious than when she
      was in St. Louis Park.


      I just want you and Dad to know how much I appreciate her—and you two—for sticking by me through all of this.


      Love,

      Michael'
