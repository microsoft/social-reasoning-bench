  - field_id: referral_and_questions.how_where_you_heard_about_the_american_legion_and_questions
    field_label: How Where You Heard About The American Legion And Questions
    value: "I first heard about The American Legion years ago through my father, who was a Vietnam veteran and a longtime\
      \ member of the post in our hometown outside of Albany. Growing up, I remember going with him to the post on Memorial\
      \ Day weekends and Veterans Day ceremonies. I didn’t really understand what the organization did at the time, but I\
      \ remember the sense of camaraderie and how seriously everyone took honoring those who served. \n\nMore recently, I\
      \ reconnected with The American Legion through the local post in Schenectady (Post 1092). A coworker of mine, John Ramirez\
      \ (also an Army veteran), invited me to a community breakfast the post was hosting to raise funds for a scholarship\
      \ for local high school seniors who are children of veterans. I attended that breakfast in early 2025, met several members,\
      \ and was impressed by how active the post is in the community—things like flag retirement ceremonies, placing flags\
      \ on graves for Memorial Day, and organizing care packages for deployed troops from the area.\n\nI also did some of\
      \ my own research online via the national American Legion website and the Department of New York site. I was particularly\
      \ interested in the advocacy work on veterans’ health care, especially related to VA claims and PTSD resources. I’ve\
      \ been helping a fellow vet from my old unit work through a complicated VA disability claim, and I learned that the\
      \ Legion has accredited service officers who can help with that process.\n\nA few specific reasons I’m joining and some\
      \ questions I have:\n\n1. Community and camaraderie: Since leaving the Army, I’ve missed the sense of belonging and\
      \ shared purpose that comes with being part of a unit. I’m hoping membership in The American Legion will give me a way\
      \ to reconnect with other veterans in the area, participate in events like parades, funeral honors, and community outreach,\
      \ and maybe even mentor younger vets coming back from deployments.\n\n2. Volunteering and youth programs: I’m interested\
      \ in getting involved with programs like Boys State, Legion baseball, and any JROTC or school outreach the local post\
      \ does. I coached my son’s little league team for a few years, and I enjoy working with teenagers and young adults.\
      \ I’d like to know what kind of background checks or training are required to volunteer with youth programs, and whether\
      \ there are specific committees at the post or county level that handle those activities.\n\n3. VA claims assistance:\
      \ I would like more detailed information about how to work with an American Legion service officer. Specifically:\n\
      \   - Do I need to schedule an appointment through the Department of New York, or does my local post have a designated\
      \ contact person?\n   - Are there regular office hours or days when service officers are available in the Capital Region?\n\
      \   - Is there any cost associated with using their services, or is it entirely covered as a benefit of membership?\n\
      \n4. Meeting schedule and expectations: I’d like to understand what is expected of a typical member in terms of attendance\
      \ and participation. For example:\n   - How often does the Schenectady-area post meet (monthly, biweekly, etc.) and\
      \ at what time of day?\n   - Are there minimum participation requirements, or is it more of a “come when you can” arrangement?\n\
      \   - Are there particular committees (e.g., membership, fundraising, color guard, ceremonial honors) that a new member\
      \ can join right away, or is there a period of just attending meetings and getting to know everyone first?\n\n5. Dues\
