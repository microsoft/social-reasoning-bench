  - field_id: motivation_and_background.why_volunteer_additional_information
    field_label: Why Volunteer Additional Information
    value: 'I am interested in volunteering with Carewest because I have always been drawn to working with older adults and
      individuals who are going through rehabilitation or long-term care. My grandmother lived in a supportive living facility
      in Calgary for several years, and I saw firsthand how much of a difference caring staff and volunteers made in her quality
      of life. Small things like having someone sit with her during meals, play cards, or simply listen to her stories made
      her feel valued and less isolated.


      I work full-time as a junior occupational therapist assistant at a private clinic, and I would like to gain more experience
      in a continuing care environment to better understand the needs of residents with complex medical and cognitive conditions.
      I’m especially interested in how recreation and social programs support mental health, mobility, and overall well-being.
      Volunteering at Carewest seems like a meaningful way to use my current skills (such as basic mobility support, active
      listening, and facilitating simple activities) while learning more about interdisciplinary care.


      I also recently completed a Mental Health First Aid course and would like to apply those skills in a setting where people
      may be dealing with grief, adjustment to illness, or feelings of loneliness. I’m comfortable engaging with people who
      have dementia, mobility challenges, or communication difficulties, and I am patient and genuinely enjoy one-to-one conversations.


      In addition to wanting to give back to the community, I see this as a chance for long-term involvement, not just a short-term
      requirement. I would like to build consistent relationships with residents and staff, understand the routines of the
      unit I’m assigned to, and be someone that residents can look forward to seeing on a regular basis. I am reliable, organized,
      and committed to showing up when I say I will. My hope is that my presence can help brighten someone’s day, whether
      that’s through a walk in the garden, reading aloud, playing board games, or simply being a calm, friendly person to
      talk to.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: motivation_and_background.hobbies_and_interests
    field_label: Hobbies And Interests
    value: 'I have a range of hobbies and interests that I think would translate well into a volunteer role at Carewest.


      I love reading, especially historical fiction and memoirs, and I enjoy reading aloud. When my grandmother’s eyesight
      declined, I would read her favourite Vietnamese short stories and English novels, and we would talk about the characters
      and how they reminded her of people from her past. I would be very happy to do similar reading visits with residents
      who enjoy books but may have difficulty reading on their own.


      I also enjoy board games and card games like cribbage, Uno, Rummikub, and simple matching or word games. I’ve often
      played these with family members across different generations, so I’m used to adapting rules and pace to people’s abilities
      and energy levels. I find games are a great icebreaker and a way to encourage gentle cognitive stimulation and social
      interaction.


      Another interest of mine is light fitness and walking. I try to walk every day, either outdoors or on a treadmill, and
      I practice gentle stretching and yoga. With proper guidance from staff, I would be comfortable accompanying residents
      on supervised walks in hallways or gardens, or helping with simple chair-based stretching activities, always within
      the scope of the volunteer role and staff direction.


      I also enjoy arts and crafts at a beginner level—things like colouring, simple painting, making greeting cards, and
      seasonal decorations. I’m not an expert artist, but I’m enthusiastic and patient, and I like working on projects that
      can be adapted to different abilities. I often make homemade cards for friends and family, and I’d love to help residents
      create cards or small crafts for holidays, birthdays, or family members.


      Outside of these hobbies, I like cooking simple meals, listening to music from the 60s–80s (which often overlaps with
      what older adults enjoy), and gardening in the summer on my apartment balcony. I speak English fluently and conversational
      Vietnamese, so I may also be able to connect with Vietnamese-speaking residents or families if that is ever helpful,
      under staff direction.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
