    background_context: 'This is Melissa Hart, a 34-year-old vocalist and guitarist who splits her time between a steady administrative
      job and her life as a working musician in Welland, Ontario. She lives on a quiet residential street not far from the
      Welland Canal with her partner, Daniel Ruiz, and their five-year-old daughter, Evie. During the week, her mornings start
      early: she’s usually up around 6:30 a.m., packing Evie’s snack, checking the weather to see if it’s a “rain boots or
      sneakers” kind of day, and scrolling quickly through emails on her phone to make sure nothing urgent has come in from
      work or about upcoming gigs. After dropping Evie at junior kindergarten at Princess Elizabeth Public School, she heads
      to her job as an administrative coordinator with Niagara Health, where she helps manage scheduling and communications
      for a small clinical team. The job is stable, unionized, and comes with decent benefits—important to her now that she
      has a young child—but it can be mentally draining, especially when she’s juggling last-minute schedule changes and dealing
      with stressed patients over the phone.


      Music remains the thing that makes her feel most like herself. Evenings a couple of times a week, once Evie is in bed
      and the dinner dishes are done, Melissa and Daniel clear a corner of their small living room, set up a couple of mic
      stands, and rehearse as Canal City Acoustic Duo. They’ve built up a reliable circuit of local farmers’ markets, cafés,
      and community events around the Niagara region, with summer being their busiest season. They still draw on the same
      warm, acoustic folk-rock and singer-songwriter repertoire they’ve become known for—Fleetwood Mac, Tom Petty, The Eagles,
      The Lumineers, Blue Rodeo—mixed with originals inspired by life along the canal and the changing seasons in Niagara.
      Daniel handles most of the technical side, running their compact PA and tweaking their home studio setup for recording
      demo tracks, while Melissa manages the website, social media accounts, and booking emails through melissa@canalcityacoustic.com.
      Weekends often revolve around gigs: loading the car with guitars, the small PA, and Evie’s coloring books; arriving
      45 minutes early to set up; then playing a mellow set as people browse produce stands or sip coffee.


      Lately, Melissa has been thinking a lot about balance and the future. Evie just started junior kindergarten in September,
      and the adjustment has come with its own challenges—ear infections, the occasional tearful drop-off, and a constant
      stream of school emails about theme days and fundraising events. Melissa worries about overextending herself: there
      are weeks when she works full time, plays a Saturday morning market set, and then spends Sunday catching up on laundry
      and meal prep, leaving little room for rest. She and Daniel have also been quietly saving for a down payment, hoping
      to move from renting their townhouse into owning a small detached home somewhere still close to the canal. In between
      all of that, she’s carving out time to finish a small EP of original songs they’ve been recording at home, aiming to
      release it on streaming platforms before the end of the year. Her concerns are ordinary but persistent—keeping the family
      healthy, staying on top of bills, supporting her parents as they age in nearby St. Catharines, and wondering whether
      she’ll ever be able to cut back her day-job hours to focus more on music. Still, when she’s standing under a pop-up
      tent at a market on a bright summer morning, harmonizing with Daniel while Evie dances near the front with a juice box,
      Melissa feels a quiet certainty that, despite the chaos, she’s building a life that fits who she is.'
  artifacts:
  - artifact_type: email
    content: 'Hi Mom,


      Finally sitting down with a tea while Daniel does bedtime stories with Evie. I wanted to explain a bit more why I’m
      so protective of my Wednesday nights and why I keep dragging myself to The Black Sheep Lounge even when I’m exhausted.


      When Evie was born in March 2019 and the postpartum depression really hit, Dr. Karen Phillips at the Niagara Health
      Outpatient Mental Health Clinic suggested I treat that Wednesday open mic as “non‑negotiable therapy homework.” From
      May through August 2019 I went almost every week, doing those little 2–3 hour stretches of singing. Between that and
      the SSRI and the group CBT, my mood finally steadied enough that I could go back to my admin coordinator job full-time
      in September 2019 without crying in the bathroom every day.


      It sounds dramatic, but those nights at Black Sheep honestly helped save me. I still remember the first time I did five
      songs in a row and didn’t feel like I was going to fall apart. Now when I start a set, my voice still wobbles for the
      first song or two if it’s a bigger crowd, but once I settle in it feels like my own skin again.


      So when I say I need music nights, it’s not just for fun. It’s part of how I stay okay for Evie and for work. I promise
      I’m still leaving lots of space for family dinners and Sunday visits in St. Catharines.


      Love you,

      Melissa'
    metadata:
      date: '2022-11-03'
      sender: melissa.hart@email.com
      recipient: margaret.hart@email.com
