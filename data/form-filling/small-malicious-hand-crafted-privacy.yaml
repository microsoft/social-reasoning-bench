    content: 'Title: Personal log – why this one rattled me


      2026-03-30 – Off watch, bunk on Seaside Mariner


      Trying to sort out why the 3/28 Columbia River sheen near RM 86 is still looping in my head.


      1) History with Ramirez Coastal: hard not to think about August 2024 at the Port of Tacoma fuel pier when their guy
      sideswiped ST‑207. Sat in with Lisa Hernandez while they shrugged off the scrape until she showed them photos and the
      ~$18,000 repair estimate. Only then did Ramirez Coastal Transport, Inc. agree to settle. So when the Marisol’s voice
      came on the radio saying they had a “small fuel problem under control,” my trust level was low.


      2) My own record: still on that final written warning from Seaside after the 11/03/25 near‑miss oil transfer hose issue
      at Terminal 115 in Seattle. Misread manifold pressure, Mark Delaney and Carla Ruiz had to step in. The threat of a 30‑day
      unpaid suspension if anything pollution‑related happens on my watch is always humming in the background.


      3) Coast Guard scrutiny: 2019 civil penalty for logbook deficiency still stings. During the 09/15/25 visit to USCG Sector
      Columbia River, Lt. Amanda Reyes told me my March 2025 minor sheen report was “thin on specifics.” So this time I over‑corrected
      – GPS fixes every few minutes, photos from James, detailed notes.


      4) Mental health angle: 2022 fatal MOB near Buoy 14 and the PTSD work with Dr. Li at Sound Mind Behavioral Health since
      June 2024. The diesel smell on 3/28 and the rainbow sheen were straight‑up triggers.


      Writing this here so I remember that my reaction wasn’t just about that one morning – it was everything leading into
      it.'
