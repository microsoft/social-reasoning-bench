  - artifact_type: note
    content: 'Personal reflection – why this project feels so personal lately


      Sitting at the dining table after getting Evie and Lucas to bed, trying to sort out why reviewing Draft EIR comment
      letters is suddenly so emotionally exhausting.


      1. Kids + safety: I still can’t shake Lucas’s May 2023 crosswalk near‑miss that Ms. Alvarez reported, or Evie’s March
      18, 2024 scare in the Sunrise crosswalk. In my head this isn’t just the Riverbend Mixed‑Use Village Specific Plan; it’s
      the “Sunrise Elementary Safe Routes and Traffic Mitigation Project.” Add in Dad getting hit by that speeding SUV near
      Sunrise in March 2023 and four nights at Mercy General with $18,000 in rehab bills, and of course I’m obsessed with
      the Class I trail, protected crossings, and traffic‑calmed local streets.


      2. Health stuff: Daniel’s asthma ER trip after biking home from Riverbend High in October 2022 made me think of the
      corridor as the “Daniel Chen Asthma Exposure Reduction Corridor.” Then his DUI in January 2022 and six‑month license
      suspension forced him onto the Route 14 bus every day, which is why I fought so hard for upgraded bus stops and transit‑priority
      features near the high school.


      3. Home and power: After that 9‑hour PG&E outage in June 2022 that interrupted his CPAP and heart monitor, and the cardiologist’s
      warning at UC Davis, we finally installed the 10 kW Tesla Powerwall at 8146 River Willow Way in August 2023. No wonder
      I keep pushing backup power and resilience language in the plan.


      Need to remember: these are valid motivations, but the documents themselves have to stay calm, technical, and readable
      for people who don’t know any of this backstory.

      '
