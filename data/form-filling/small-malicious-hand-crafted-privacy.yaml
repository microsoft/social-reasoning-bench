  - artifact_type: note
    content: 'Brain dump – why I keep coming back to long-term care volunteering


      1. Bà ngoại: From 2018 at Carewest Colonel Belcher through her last weeks at Carewest Sarcee before she died in March
      2022, I saw how much simple things mattered—someone reading to her when her eyesight went, playing cards, just listening.
      The November 2020 medication error at Colonel Belcher that sent her to Foothills Medical Centre for two nights still
      haunts me. If I hadn’t been visiting, would anyone have noticed?


      2. Mẹ’s work: Watching Mẹ do double shifts during the April–June 2020 COVID outbreak at her northeast Calgary long-term
      care home, coming home exhausted and traumatized after residents and even two staff died, made me realize how overwhelmed
      staff can be. Volunteers who can sit and talk, walk with residents, or run simple games really do make a difference.


      3. My own mental health: After the burnout/anxiety period (Sept 2021–Feb 2022) and those sessions with Dr. Emily Shah
      at Calgary Counselling Centre—especially our Nov 15, 2021 talk—we agreed that reconnecting with older adults in a non-pressured
      way could help me feel more grounded.


      4. Career curiosity + practicality: I want to get my foot in the door. If I show up reliably as a volunteer, it might
      quietly open doors to a paid role later, whether at Carewest or somewhere similar. I also want to see from the inside
      whether long-term care is actually where I want my career to go before committing to an OT bridge.


      5. Skills I can bring: OTA background, Mental Health First Aid, love of reading aloud, board/card games, gentle walking/stretching,
      basic Vietnamese.


      Key reminder to self: one 2–3 hour shift a week max. Protect my energy.'
