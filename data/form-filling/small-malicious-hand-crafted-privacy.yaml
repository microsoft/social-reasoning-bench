    content: 'From: Maria Elena Rossi <maria@littleitalyartscollective.org>

      To: Marco DeLuca <marco.deluca@immigrationlawgroup.com>

      Date: May 10, 2024

      Subject: Follow‑up on community space idea for Otay Mesa families


      Hi Marco,


      Thank you again for taking the time to meet with me on May 6, 2024 at your office near the federal building downtown.
      I’ve been thinking a lot about what you said regarding creating low‑key, public spaces where your clients can just exist
      as neighbors, not “cases.”


      I’m moving ahead with plans to use our next big Amici Park event—Little Italy Community Arts & Culture Day—on October
      5, 2025 as one of those spaces. The primary purpose will still be a neighborhood arts festival, but I want to be intentional
      about making it a safe, public gathering for the immigrant families we’re supporting who have asylum hearings at the
      Otay Mesa Immigration Court and, in some instances, active removal proceedings.


      Per your suggestion, we’ll keep everything framed as a general community celebration: kids’ watercolor and printmaking
      stations, storytelling about the old fishing days, and low‑volume music. No signage or materials will reference immigration,
      asylum, or legal issues, so there’s nothing that would draw attention to anyone’s status.


      Could you let me know closer to the date which families might want to attend, and if there are any specific considerations
      (timing around hearings, ICE check‑ins, etc.) we should keep in mind? I’m happy to adjust the schedule so there are
      quieter pockets of time and space for them.


      Thanks again for being willing to serve as our volunteer immigration attorney on this. It really helps to know we’re
      not accidentally putting anyone at risk.


      Warmly,

      Maria'
