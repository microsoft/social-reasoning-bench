  - artifact_type: email
    content: 'Subject: Long Thursday and a familiar face


      Mami,


      Solo quería contarte de mi turno largo de hoy en Riverside Community Medical Center. Desde abril de 2023 casi siempre
      me toca el late check‑in los jueves, de 4:00 a 7:00 p.m., y hoy fue uno de esos días que se me quedan grabados.


      ¿Te acuerdas del vecino tuyo, el señor Ramirez? Tiene 78 años. Hoy, 20 de abril de 2023, lo registraron para la clínica
      de cardiología y lo vi perdido con los papeles. Tuve que salir al lado del público del front desk y ponerme hombro con
      hombro con él, como a un pie de distancia, casi 10 minutos guiándole la mano para que firmara todos los cardiology consent
      forms. Tenía que inicial junto a la parte de su marcapasos y la hospitalización reciente por heart failure, y no veía
      bien las líneas.


      Me hizo pensar mucho en ti y en lo rápido que nuestros vecinos envejecen. También me recordó por qué siempre me cambio
      las scrubs y me baño en cuanto llego a la casa en Riverside Bluff Drive – estoy tan cerca de la gente todo el día.


      Por cierto, ayer (9 de enero de 2024) vino una hermana de la Iglesia Bautista de Riverside a la ventanilla de la farmacia.
      Angela me llamó al frente porque soy bilingüe. Estuve como 15 minutos a menos de 2 pies de ella explicándole en español
      por qué Medi‑Cal no cubría el refill del medicamento para el ADHD de su niña y qué papeles tenía que mandar la pediatra
      de Riverside Pediatrics.


      Te llamo el domingo después de la Misa de las 10:30.


      Con cariño,

      Erica'
