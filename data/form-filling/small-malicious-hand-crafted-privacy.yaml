  - artifact_type: email
    content: 'Hey Sam,


      Catching up between loads of laundry and Evie’s latest Paw Patrol obsession.


      You asked how the music stuff is really going, so here’s the messy version. Canal City Acoustic Duo is slowly turning
      into a “real thing” – we’ve got a decent loop of farmers’ markets and little community gigs now, and the website (https://www.canalcityacoustic.com)
      actually looks legit. But I still feel like a small‑room musician. Most of the paying shows we’ve done have been coffee
      shops, winery patios, and the markets. I haven’t really tackled the bigger outdoor festivals yet, partly because my
      stomach knots up just thinking about it.


      Some of that is old stuff. Remember when I nearly wrecked my voice in October 2013, doing those four 45‑minute Harbour
      Street sets a night in that noisy Niagara Falls pub? Dr. Nguyen at the St. Catharines General ENT clinic benched me
      from October 2013 through January 2014 – strict vocal rest and speech therapy. I’m way more cautious about long sets
      and loud rooms now.


      And then there was that Niagara Street bar incident on December 19, 2014 with The Riverlights – drunk guy grabbing me
      mid‑song, the police report with Constable James Miller, and me swearing off late bar gigs from January to June 2015.
      I only started feeling okay again when I switched to daytime stuff like Pelham Farmers’ Market that summer.


      So yeah, send any festival‑application wisdom you’ve got. I’m trying to stretch without freaking my nervous system out.


      Love,

      Mel'
