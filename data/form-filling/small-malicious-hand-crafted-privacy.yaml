    content: 'Personal planning notes – Unit #23 replacement / council item


      I need to get my head straight before the Streets & Public Works Committee packet deadline.


      1. Why now?

      - This honestly should have gone forward earlier, but I’ve been buried in Washington Street design, the South 7th alley
      mess, and the water main rehab. I kept telling myself I’d pull together the background “next week,” and here we are
      already behind the ideal schedule.

      - Political pressure is real: after the February 12, 2025 Maple Street ice storm (three written complaints, Mark Jensen
      threatening a claim over missing his 5 a.m. dialysis at Essentia–St. Joe’s), the Mayor basically said, “Mike, get something
      on the agenda.”


      2. What I’m NOT putting in the memo:

      - December 27, 2024: Unit #23 slips in front of Mom and Dad’s on Oakridge, blade won’t raise, Dad falls on the windrow,
      fractured wrist, ER at Cuyuna, $2,300 bill. That’s personal, even though it screams “safety risk.”

      - December 12, 2023: left Sophie’s therapy at Essentia–Brainerd Clinic early when the truck died during a snow event.
      Her anxiety doesn’t need to be part of the public record.

      - January 9, 2025: truck broke down near Brainerd High while I was supposed to be coordinating plow routes and also
      getting Dad to his Stage III colon cancer chemo infusion at Essentia–St. Joe’s. Two‑hour delay on school routes plus
      hospital duty—too messy to explain in a staff report.


      3. Talking points I *can* use: mileage, repair totals (~$6,800 last 18 months), Dave’s October 3, 2024 inspection on
      plow light failures, auction value estimate ($4–6.5k), alignment with 2026 CIP, Equipment Replacement Fund capacity.


      Remember: keep the agenda summary clean and focused on operations, not my family drama.


      – MML'
