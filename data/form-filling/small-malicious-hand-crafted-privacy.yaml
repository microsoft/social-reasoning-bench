  - artifact_type: email
    content: 'Mum,


      Just wanted to explain that letter you might see in the pile on the sideboard if you’re round here at the weekend, so
      you don’t panic.


      It’s from the Social Work Children & Families Team at East Dunbartonshire Council, dated 5 June 2023, about Chloe. It
      confirms her date of birth (21/02/2017) and mentions the child protection case conference they held at Bishopbriggs
      Community Hub after that incident at Mark’s flat. Reading it still makes my stomach drop, even though they closed things
      off once they were satisfied she was safe with me.


      I hate that Chloe’s name is in a letter like that at all, but at the same time I’m grateful they took it seriously.
      She barely talks about that night now – just gets clingy if she knows she’s going over to Mark’s and he’s been a bit
      more careful since. I’m trying to keep things civil because the kids still want to see their dad, but I’m a lot firmer
      about boundaries.


      Day to day she’s her usual whirlwind self – gymnastics videos on YouTube, cartwheels in the hallway, and endless chat
      about who sat beside her in P4. You’d never guess from looking at her that we were sitting in a room at the Community
      Hub talking about “risk factors” and “safety plans.”


      Anyway, didn’t want you worrying if you spotted the envelope. I’ll bring Chloe over on Sunday as usual – she’s already
      asking what pudding you’re making.


      Love,

      Sarah'
