  - artifact_type: note
    content: 'Title: Late-night brain dump – home stuff


      Some nights I lie here at 1842 Parkview and think about how weird my “normal” has become. I still catch myself half‑thinking
      I can just hop up and walk to the bathroom, and then I remember the reality: parking the chair outside the door, commode
      in the bedroom, sponge baths, hoping Jamal or Sarah doesn’t wreck their backs helping me.


      The wound nurse at M Health Fairview keeps warning me about another sacral pressure sore like the one in October 2025.
      She wants monthly skin checks and careful transfers, and she’s right. Those three days in the ICU in November 2023 scared
      the hell out of me.


      At the same time, I’ve kind of gotten used to doing whatever it takes to get around in here – scooting or half‑crawling
      on the floor from the bed toward the bathroom when I’m not in the chair, pulling on furniture, making it work. It’s
      not pretty, but it gets me from point A to B. So when people talk about “comprehensive home modifications,” part of
      me thinks, do we really need to fix everything all at once?


      Still, I know the current setup is hard on Sarah and Dad and risky for me. A ceiling track lift from the bedroom to
      the future roll‑in shower sounds like science fiction, but also like something that could keep all of us out of emergency
      rooms.


      Goal for tomorrow: call Laura Peterson back, actually return the OT’s voicemail, and write down specific examples –
      the October 2025 sore, the crawling, the near‑falls – so I don’t minimize things when we talk.

      '
