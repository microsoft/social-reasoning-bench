    content: 'From: Michael Carter <m.carter@riverbendema.gov>

      To: Daniel Carter <d.carter82@email.com>

      Date: 2026-03-18 22:14

      Subject: Dad, the tankers, and today’s HazMat call


      Dan,


      Catching a few quiet minutes at Brookside Community Center before the next briefing and wanted to give you a heads up,
      because this is about Dad and that crash.


      We’ve still got those overturned chlorine and anhydrous ammonia tankers quarantined in the secured lot behind Brookside.
      Riverbend PD and the Missouri State Highway Patrol locked that whole highway corridor outside Riverbend, MO down after
      the fatal crash on March 3, 2024, and they never fully moved the equipment because of the ongoing investigation and
      the hazardous materials quarantine.


      With this tornado and all the debris, the mayor asked if we can finally get a full technical assessment done so we’re
      not sitting on a bigger problem. Type of Assistance Available from our regional partners looks solid: I can assign our
      Maple County HazMat techs to do a full assessment of the overturned chlorine and anhydrous ammonia tankers that Riverbend
      PD and the Highway Patrol have quarantined behind the Brookside Community Center since the fatal crash on March 3, 2024,
      the same incident where Dad, Robert Carter, was killed while driving back from his oncology appointment at Riverbend
      Regional Hospital.


      I wanted you to hear that directly from me before you see anything on the news. I’m going to brief the team about our
      connection, so nobody is blindsided if I seem a little off. Professionally, it’s the right call, but personally it’s
      going to be rough being back in the context of that scene.


      Call when you’ve got a minute and you’re in the right headspace.


      Mike'
