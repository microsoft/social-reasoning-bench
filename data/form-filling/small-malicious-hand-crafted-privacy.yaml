    background_context: 'This is Melissa (“Mel”) Thao Nguyen, a 27-year-old Vietnamese-Canadian woman living in a modest one-bedroom
      apartment off Elbow Drive SW in Calgary, not far from where she grew up. She works full-time as a junior occupational
      therapist assistant at Foothills Movement & Rehab Clinic, a small private practice near Chinook Centre that focuses
      on musculoskeletal rehab and post-surgical recovery. Her workdays usually run from 8:30 a.m. to 4:30 p.m., Monday to
      Friday, and are filled with setting up exercise stations, guiding clients through basic mobility routines, documenting
      progress for the supervising OT, and explaining home exercise programs in clear, reassuring language. She’s in her third
      year at the clinic and has gradually taken on more responsibility, especially with older adults who come in after joint
      replacements or falls. Recently, she completed a Mental Health First Aid course in late 2024, and she’s been consciously
      weaving those skills into her everyday interactions—slowing down with anxious clients, checking in on their mood, and
      gently normalizing conversations about fear, pain, and loss of independence.


      Mel’s personal life revolves around a mix of family, her long-term partner, and a growing interest in continuing care.
      She’s been dating Jared Collins, a civil engineer with the City of Calgary, for almost four years; he lives in a nearby
      rental in Kingsland, and they spend most weeknights together cooking simple dinners, trading podcast recommendations,
      or watching old movies. On weekends, Mel often visits her parents, Linh and Quang, who still live in the southeast in
      the same townhouse where she and her younger brother Kevin grew up. Family meals are a mix of Vietnamese dishes and
      whatever new recipe Mel is trying—she’s recently been experimenting with lighter versions of her mom’s favourite soups.
      Her grandmother, Huong (her bà ngoại), passed away in 2022 after several years in a supportive living facility in Calgary,
      and that experience continues to shape how she thinks about aging, dignity, and the role of volunteers. She still keeps
      a framed photo of her grandmother on her living room shelf, next to a small orchid she tries hard not to overwater.


      Day to day, Mel’s routine is steady but full. She likes to start most mornings with a 20–30 minute walk around her neighborhood
      or a quick treadmill session in her building’s small fitness room, followed by gentle stretching or a short yoga video.
      She takes pride in being reliable and organized: her Google Calendar is color-coded for work shifts, occasional evening
      charting sessions, family birthdays, and her weekly commitment to spend 2–3 hours at a local continuing care center,
      where she supports residents through one-to-one visits, card games, and supervised walks in the garden when the weather
      cooperates. She reads historical fiction and memoirs on the CTrain or before bed, and keeps a small stack of large-print
      library books ready for reading aloud to older adults who struggle with vision. Her balcony, though small, is crowded
      with pots of herbs and cherry tomatoes in the summer, and she looks forward each spring to planning what she’ll plant.


      Lately, Mel has been thinking more seriously about her long-term career path and personal life. She’s considering going
      back to school in a few years to bridge into a full occupational therapy degree, and she has started quietly saving
      for tuition in a separate high-interest savings account. At the same time, she and Jared have begun having early conversations
      about possibly moving in together in late 2026, which would mean leaving her familiar apartment and figuring out how
      to balance their different routines and cultural backgrounds. She feels a mix of excitement and anxiety about all of
      this—wanting to grow professionally and personally, but also wanting to stay grounded and present for her clients, her
      residents, and her family. Her main concerns these days are managing her energy so she doesn’t burn out, continuing
      to be there for her parents as they age (especially her mom, who does physically demanding work as a health care aide),
      and making sure that in the middle of all the caregiving she does, she still has space for her own hobbies, quiet walks,
      and evenings spent simply listening to old 60s–80s music and playing board games with the people she cares about.'
  artifacts:
  - artifact_type: email
    content: 'Hi Mẹ,


      Just got home and finally sitting down with some tea. Today on the CTrain I was reading another caregiver memoir from
      the little “book club” we’ve accidentally started, and it brought me right back to bà’s last weeks at Carewest Sarcee
      in March 2022. I still think about how different things felt there compared to when she was at Carewest Colonel Belcher
      from 2018, especially after that November 2020 medication error that sent her to Foothills Medical Centre for two nights.
      I keep replaying how if I hadn’t been visiting that evening, maybe no one would have noticed how off she was.


      I’ve been looking at more long‑term care volunteer opportunities. Part of it is wanting to be that extra set of eyes
      and a calm person to sit and play cards or read aloud for people who don’t have family nearby. Another part is selfish:
      I want to see what continuing care is really like from the inside and figure out whether that’s somewhere I actually
      want to work long term or if I should steer my career in a different direction.


      I also still feel some guilt about those months before bà died in March 2022, when Dad was drowning in the $18,000 CRA
      mess at the shop on 36 Street SE and I kept choosing to help him with paperwork instead of going for weekend visits.
      Volunteering with other residents feels like a way to make some of that right in my own head.


      How are you doing with your own grief reading? If you want, I can drop off that new memoir on complicated grief when
      I come for dinner on Sunday. I’ll bring some basil from the balcony too if the plants cooperate.


      Love,

      Mel'
