  - artifact_type: note
    content: 'Title: Late-night brain dump – work, kids, neighbor


      I can’t sleep, so here we go.


      Work: Still frustrated about the March 1 “reduced” bonus at NorthSound Health Systems. Elena keeps framing the performance
      improvement plan like it’s a growth opportunity, but it feels like punishment for missing two sprint deadlines when
      Izzy’s depression was at its worst last fall and I was driving her to counseling at Seattle Children’s every Friday
      afternoon. I’d do it again in a heartbeat, but it doesn’t change the fact that the smaller bonus is part of why I’m
      stressing every time I open the BECU app.


      Money: After payroll miscalculated my March 7 paycheck, we were inches from another BECU overdraft on the joint account
      with Daniel. In the middle of that, I put the March 14–15 Shoreline Community College tournament costs on my personal
      Visa ending in 4421 – Tony’s, Chipotle, Costco snacks, resistance bands, foam rollers – because the district purchase
      order got delayed and Linda needed someone to step up. Also trying to keep the other card clear in case the lawyer calls
      about the retainer for the boundary dispute with the neighbor at 22110 that went to Snohomish County District Court
      mediation on March 5.


      Family: Mateo’s Feb 2 asthma attack at Swedish Edmonds is still sitting in my chest; every time he coughs I tense up.
      Mom and Dad helping with the emergency room bill makes me both grateful and guilty. Izzy seems lighter lately – laughing
      with teammates, talking about college – and I need to remember that those Seattle Children’s Fridays mattered.


      Tomorrow: 10 a.m. status meeting, Mateo’s soccer at 5:30, Izzy’s ankle ice + homework check, and maybe 20 minutes to
      read before bed.

      '
