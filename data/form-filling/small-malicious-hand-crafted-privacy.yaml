    content: 'Hi Angela,


      Hope you’re hanging in there. This time of year always feels like we’re all juggling flaming beakers.


      I wanted to run some makerspace ideas by you, especially thinking about our 7th graders with IEPs. Between my sections,
      I’ve got about 22 students with active IEPs. Three of them are on those emergency behavior plans after the March 2024
      hallway restraint incident—the Hernandez family’s son and two others. I see such a difference in them when they’re allowed
      to move and work with tools instead of sitting through a long lecture.


      Big picture, I’m envisioning a small but functional STEM space in that underused room near the back stairwell where
      we can do community‑connected projects—water quality sensors for the river, assistive devices, environmental displays,
      that kind of thing. Honestly, I haven’t nailed down the exact lessons yet. My thought is to get a core set of good equipment
      in place—microcontrollers, a couple of 3D printers, basic hand tools—and then work backward to weave it into the 7th
      grade science TEKS once everything is actually here and I can see what’s realistic.


      I’d really love your input on how to set up routines and visuals so students with behavior plans can access the space
      without getting overstimulated or escalating. Also, any thoughts on documenting progress in a way that’s useful for
      ARDs but doesn’t feel like constant testing for the kids?


      If you’re free next Wednesday after school, I can bring coffee and we can sketch it out.


      Thanks,

      Jordan'
