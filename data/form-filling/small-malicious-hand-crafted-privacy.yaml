  - field_id: fixed_work_location[2].job_tasks_and_descriptions
    field_label: Job Tasks And Descriptions
    value: 'This fixed work location is the outpatient retail pharmacy pickup counter on the ground floor, adjacent to the
      main lobby. It includes three staffed windows for prescription drop‑off and pickup, a small counseling area, and a waiting
      area with limited seating. The counter space is compact, and the volume of patients at peak times makes sustained physical
      distancing difficult.


      Key job tasks where distancing is not possible:


      1. Prescription drop‑off and pickup at the counter:

      - Patients line up directly in front of the counter windows to drop off new prescriptions or pick up filled medications.
      At the transaction point, patients and pharmacy technicians are typically separated by less than 3 feet, often closer
      when patients lean in to hear or speak through any installed glass or acrylic barrier openings.

      - When verifying patient identity (name, date of birth, address), staff often need to repeat questions and speak loudly
      due to background noise from the lobby, causing both parties to lean closer toward the opening.


      2. Medication counseling and education:

      - Pharmacists and technicians provide verbal counseling on new prescriptions, including dosing instructions, timing,
      side effects, and interactions. These conversations can last 5–10 minutes and usually occur at a side counseling station
      or at the counter, with the patient standing directly across from the staff member at a distance of 2–3 feet.

      - For elderly patients or those with hearing impairments, staff sometimes step out from behind the counter to stand
      next to the patient and speak more clearly or show them how to use inhalers, insulin pens, or other devices. This brings
      the staff member to within 1–2 feet of the patient for several minutes.


      3. Handling insurance and payment issues:

      - When there are insurance rejections or prior authorization issues, staff may need to discuss sensitive financial details
      with the patient at the counter. Because other customers are nearby, staff and patients often lean in close to keep
      their voices low, resulting in less than 2–3 feet of separation.

      - For patients paying with cash or card, staff pass payment terminals, receipts, and medication bags across a narrow
      counter. Hands frequently meet in the same small space, and staff sometimes assist patients in inserting or tapping
      cards, again requiring close proximity.


      4. Coordination between pharmacy staff at the counter:

      - Up to three technicians and one pharmacist may work along the same counter space, sharing phones, computers, and label
      printers. When it is busy, they regularly stand shoulder‑to‑shoulder while checking prescriptions, verifying insurance,
      and updating patient profiles.

      - Staff often lean toward each other to clarify prescription details (e.g., confirming generic substitutions, checking
      allergies, or resolving duplicate profiles). These quick discussions occur at very close range because they are conducted
      quietly to protect patient privacy.


      5. Managing high‑volume rush periods:

      - During lunch hours (11:30 a.m.–1:30 p.m.) and after regular clinic hours (4:00–6:00 p.m.), the pharmacy experiences
      heavy foot traffic. The waiting area can become crowded, with patients standing close together near the pickup windows
      and around the counter.

      - Staff sometimes step out from behind the counter to call out patient names or to explain delays. In doing so, they
      often find themselves surrounded by multiple patients at once, with less than 3 feet between individuals.


      6. Handling special medication devices and demonstrations:

      - For certain medications (e.g., inhalers, injectable pens, nebulizers), pharmacists may be required to demonstrate
      proper use. Although they attempt to maintain distance, the need to physically show device handling can result in standing
      side‑by‑side with the patient, both looking at the same device, within 1–2 feet.

      - When patients bring in pill organizers or existing medication bottles for review, staff may spread these out on the
      counter and stand directly across from the patient, with both parties leaning in to see the labels clearly.


      7. Interaction with delivery drivers and couriers:

      - Delivery drivers from wholesalers and couriers from clinics frequently come to the pickup counter to drop off or pick
      up items. These exchanges are quick but involve close contact at the same small counter area, often with other patients
      waiting nearby.


      Overall, the combination of high patient volume, the physical configuration of the counter and counseling area, and
      the need for clear, often confidential communication make it difficult for pharmacy staff at this fixed work location
      to consistently maintain a 6‑foot distance from others.'
