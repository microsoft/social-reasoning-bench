  - artifact_type: note
    content: 'Reflection – why this makerspace push feels different (and scary)


      This whole thing still feels like déjà vu. In some ways, what I’m planning now is just a second shot at that makerspace
      drone unit I tried to roll out last year. That one fizzled out halfway through the semester when I got buried under
      grading and meetings and the kids’ interest dropped off a cliff. I don’t want to repeat that.


      I keep thinking back to August 2023, when A. had that panic attack in my classroom at Riverview Middle School. He’d
      just told me he felt “stupid” in regular labs because of his dysgraphia and ADHD diagnoses from Dr. Patel at Riverview
      Children’s Behavioral Health Center. Starting the little after‑school design club with him—spending six weeks building
      a low‑cost, voice‑activated data‑logging setup—was the first time I really saw how a dedicated makerspace could let
      kids like him show what they know without getting crushed by written lab reports.


      Then there’s Lucia. After her evaluation for a specific learning disability at the Riverview ISD Special Services Center
      in Spring 2022, Ms. Herrera kept saying she needed more hands‑on science experiences. Those three months we spent at
      the kitchen table building river turbidity sensors did more for her confidence than a whole year of worksheets.


      And I can’t forget Room 214, where J. and M. used that borrowed 3D printer from the district tech office to make a vaping
      device and a key to the back door in October 2023. Calling the campus SRO and filing that incident report sucked, but
      it also showed me how powerful (and risky) these tools are without structure.


      Note to self: build real routines, not one‑off “cool gadget” days.

      '
