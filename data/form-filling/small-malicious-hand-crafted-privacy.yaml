  - artifact_type: email
    content: 'Subject: Hooker Falls meetup logistics for next season


      Hi Jenna,


      Catching up between loads of muddy socks. I’ve been sketching out how to coordinate our schedules for the 2025 season
      and wanted to run an idea by you.


      For the family‑friendly waterfall days we’re co‑guiding, I’m leaning toward using the Hooker Falls parking lot as our
      default meetup spot, even on peak‑season weekends. It’s already where most tourists naturally end up, and honestly it’s
      the easiest place for me to corral groups first thing in the morning before we head toward Hooker, Triple, or High Falls.
      Less confusion about directions, fewer “we got lost” texts at 8:55 a.m.


      That said, I’m trying to keep certain outings gentler so my folks can join when they’re in from Hendersonville. Dad’s
      still got those balance issues after his mild stroke last March 3, 2023, so I’m building some very short, low‑elevation
      photography walks right near the Hooker Falls Access Area. Mom’s recovering from her right knee replacement at Mission
      in Asheville back on February 6, 2024, so she’s more of a Hooker‑to‑Triple Falls at a snail’s pace person right now.


      I’m also paying attention to my own limits after the panic attack I had on the High Falls Loop on 5/18/22. My doc at
      Transylvania Regional and Dr. Lisa Merritt keep nudging me to avoid the worst of the midday crush at the overlooks.
      So my thought is: we still meet at Hooker Falls for convenience, but schedule the high‑traffic viewpoints either earlier
      or later, and steer some groups toward Lake Imaging or Guion Farm during the 10–3 window.


      Let me know if that works with your calendar and your other gigs.


      Cheers,

      Michael

      '
