  - artifact_type: email
    content: 'Subject: Quick debrief + Sept 14 Amici Park idea


      Hi Giulia,


      Catching up between loads of laundry. I wanted to follow up on what I mentioned after Marco’s playdate with Luca.


      That April 22, 2024 meeting with Angela Ruiz at the San Diego County Child Welfare Services office on Overland Avenue
      has been stuck in my head. We were talking about Luca’s weekend visits and she asked if the Little Italy Neighborhood
      Arts Collective could create some low‑pressure, public art days where families with open cases could spend time together
      without the stigma of those tiny visitation rooms.


      So I’m leaning toward doing a Community Arts & Culture Day at Amici Park on Sunday, September 14, 2025, with that in
      mind. It will look like a normal free arts day — watercolor tables, chalk along the amphitheater, maybe a kids’ choir
      from Washington Elementary — but in the background I’ll make sure there are plenty of activities where parents and kids
      can sit together and make something side by side. I keep thinking of Luca’s mom and how tense she looked when we ran
      into her near school.


      I’m also still planning the June 8, 2025 event as a grief‑through‑art soft launch. Since Nonna’s stroke and move to
      Sunrise in National City back in August 2023, and after hearing that mom in our Washington Elementary support group
      talk about her husband’s suicide in October 2022, it feels important to have a public, non‑clinical space for kids and
      grandparents to process loss together.


      On a lighter note: how’s the new oncology wing at Scripps Mercy? Are they still messing with your schedule? We’d love
      to have you at at least one of these days, even if you can only swing by after a shift.


      Ti voglio bene,

      Maria'
