  - artifact_type: note
    content: 'Work journal – late night brain dump


      Kids are finally asleep, Daniel’s lesson‑planning, and I’m staring at another stack of comment letters about land use
      and environmental justice.


      I keep circling back to the history of this 84.6‑acre site: the old Riverbend Equipment Storage, LLC yard, the solvent
      dumping along the south bank of the American River in 1994–2003, the 2016–2017 site investigations, and the June 2018
      Quiet Title/Cost Recovery settlement with CalEPA that dumped this assignment in my lap. Part of my job is to quietly
      help the City recoup that $2.8 million in remediation and monitoring costs through a good specific plan.


      At the same time, I’m thinking about the people who will actually live here. Grace’s $430/month rent increase in August
      2022 is why I fought to lock in at least 15% lower‑ and moderate‑income units out of the 620 total, and more 3‑bedrooms.
      I keep picturing teachers like Daniel or single parents at Sunrise Elementary trying to stay near their kids’ school
      when Evie hits middle school in fall 2026.


      And then there’s Mom. Her chemotherapy at UC Davis in early 2021 and Dad’s cardiology appointments at Sutter in 2019
      are the quiet reasons I care so much about the mobility hub by the upgraded Folsom Blvd bus stops – I remember juggling
      his appointments, missing three morning staff check‑ins, and that informal HR warning. I want future caregivers here
      to be able to rely on transit and shared cars, not just white‑knuckle it through.


      Reminder to self: keep the official project description clear and grounded – housing mix, office and commercial square
      footage, parks, trails, mobility hub – and let these personal motivations stay here in the journal.

      '
