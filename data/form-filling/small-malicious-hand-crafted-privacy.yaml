  - artifact_type: email
    content: 'Subject: That breakfast at Post 1092


      Hey Erin,


      Just wanted to jot this down while it’s fresh in my head. The community breakfast at Schenectady Post 1092 with John
      this morning was actually…good. I was half expecting a bunch of guys just telling war stories, but it felt more like
      a low‑key support group with pancakes.


      You know how rattled I was after that write‑up at Ellis for missing the network maintenance window because of the panic
      attack the night before. I’ve been carrying that around like a scarlet letter. John picked up on it and said, “You’re
      coming with me to the Legion this weekend, no arguments.” I’m glad he did. A couple of the guys there talked about their
      own meltdowns at work and how getting plugged in with the Legion service officers helped them straighten out both VA
      stuff and job stress.


      It reminded me of that October 2023 PTSD support group at the Ellis outpatient behavioral health clinic, when Mark Stevenson
      from my old unit shared how a Schenectady Legion service officer helped him appeal his denied VA claim for his traumatic
      brain injury and depression. I shrugged it off at the time, but between Mark’s story and this breakfast, I’m starting
      to think I shouldn’t keep ignoring my own anxiety and sleep issues from the 2007–2008 deployment.


      On the home front, Sean’s practice got moved to Wednesday at the high school field, and Megan’s chorus director added
      a rehearsal next Thursday night. Could you check your clinic schedule and see who can cover which run? I can probably
      handle Wednesday if I’m not on call for a late‑night patch.


      Love,

      Mike'
