    content: 'OneNote – Tornado 3/17/26 – Resource brainstorming

      Date: 2026-03-18 10:42

      Author: Michael J. Carter


      Dumping thoughts before I forget them.


      1) Mutual aid wish list

      - Technical rescue/USAR: light structural collapse, secondary searches, shoring. Maple County TR-2 is the obvious first
      call.

      - Extra EMS: at least one ALS ambulance to help with trauma plus the 27 power‑dependent patients we flagged from the
      medical needs registry (Mom, three COPD neighbors on Brookfield, etc.).

      - HazMat: small team comfortable with mixed household chemicals, plus background with the Carter AgriChem chlorine/anhydrous
      mess from 3/3/24 in the Industrial Park.

      - Debris: a chainsaw crew that can take over what Daniel and I started back on March 5, 2024 along Brookfield Terrace.
      I’m not supposed to be doing more than 20–30 minutes of heavy chainsaw work since the mild heart attack in January at
      Riverbend Regional, and I’ve already bent that rule.


      2) Extra bodies

      We’re going to need more than fire/EMS. Any spare patrol units or public works crews neighboring jurisdictions can send
      will help, even if they’ve never worked a tornado. We can drop them into traffic control, perimeter, welfare checks,
      whatever. Not ideal, but we’re past ideal.


      3) Mobile command / comms

      Would be great to get somebody’s mobile command post and a comms trailer parked at Brookside Community Center for a
      week or so. No idea yet how we’d staff it 24/7 or keep it secured with everything else going on, but it would take pressure
      off the makeshift EOC in the gym lobby.


      4) Family overlay

      Mom’s house on Larkspur is gone, Emily and the kids lost 118 Brookfield, and Natalie’s anxiety has been spiking again
      (flashbacks to the April 15, 2024 Brookside tornado). Need to remember I’m not just the EM director in this one.'
