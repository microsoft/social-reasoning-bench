    background_context: 'This is Michael Larson, a 46-year-old Public Works Director and City Engineer for the City of Brainerd,
      Minnesota. He’s been with the city for just over eleven years, the last five as director, and he still introduces himself
      as “Mike from Public Works” when he runs into people at Northland Arboretum or Cub Foods. He and his wife Emily, a part-time
      school counselor at Brainerd High School, live in a modest split-level on Elmwood Court on the south side of town with
      their two kids, Sophie and Caleb, and an aging black lab mix named Ranger. Most weekday mornings start the same way:
      Mike up at 5:30, coffee in a worn “Brainerd Public Works” mug, a quick check of the weather radar—out of habit, even
      in July—and then a scroll through overnight emails from the Streets Superintendent and the city’s Fleet Mechanic about
      equipment status and work orders.


      Work has been especially busy this year. Over the winter, the city had an early December ice storm that pushed the snow
      and ice budget close to its limits and exposed how fragile some of the older plow trucks in the fleet had become. Unit
      #23, a 2009 Ford F-250 that Mike knows practically by heart, limped through the season with intermittent transmission
      issues and electrical gremlins that knocked out plow controls at the worst possible times. After one particularly tense
      night in January when the truck had to be towed back to the shop in the middle of a storm, Mike and the Streets Superintendent
      agreed that they couldn’t keep nursing it along. That conversation, and months of follow-up with the Fleet Mechanic,
      led him to line up pricing for a 2026 Chevrolet Silverado 2500HD from Northland Motors in Brainerd, making sure it would
      work with the existing Boss 8-foot plow. He’s proud that the quote came in under the $54,000 placeholder in the 2026
      Capital Improvement Plan and that the Equipment Replacement Fund can absorb it without needing to cut elsewhere.


      Outside of work, Mike’s life revolves around family routines and small-town commitments. Sophie just started high school
      this past fall and joined the marching band, which means Mike spends more Friday nights than he expected in metal bleachers,
      alternating between watching the field and talking with other parents about road projects and potholes. Caleb plays
      youth hockey at the Essentia Health Sports Center, and Mike has become an assistant coach almost by default, handling
      early morning practices twice a week. Emily has been gently reminding him to schedule a physical; his last one was in
      2022, and the long winter hours, coffee dependence, and stress from juggling multiple infrastructure projects have left
      him more tired than he wants to admit.


      His parents still live in Little Falls, about 35 minutes away, and in the past year their health has started to weigh
      on his mind. His dad, Harold, had a mild stroke last October, and while he’s recovered fairly well, Mike now drives
      down at least twice a month to help with yard work and small repairs. His younger sister Becky lives in Baxter with
      her husband and their daughter, so the extended family often gathers at Mike and Emily’s house for Sunday dinners during
      football season. Those evenings usually end with kids sprawled in the basement playing video games, the adults talking
      about property taxes, school issues, and, inevitably, the latest road construction.


      Mike’s days are long but predictable. He’s usually in his office at City Hall by 7:15 a.m., often the first department
      head to arrive. Mornings are filled with coordination meetings about upcoming street reconstruction, utility replacements,
      and sidewalk improvements. Around mid-morning he tries to get out into the field—checking on patching crews, looking
      at drainage complaints, or riding along with the Streets Superintendent to look at problem intersections. He likes those
      site visits; they’re a break from spreadsheets and they remind him why he got into civil engineering in the first place.
      Afternoons are more desk-bound: reviewing engineering plans, going over bid documents, and talking with the Finance
      Director about long-range equipment replacement schedules, including how the sale of older fleet units—like the soon-to-be-surplus
      Unit #23—feeds back into the Equipment Replacement Fund.


      Lately, his biggest professional concern is balancing expectations. Residents expect quick snow removal, smooth streets,
      and minimal disruptions, but he’s working with aging infrastructure and a budget that has to stretch. He lies awake
      some nights running through scenarios in his head: a major water main break during a cold snap, a plow truck breakdown
      in a blizzard, a surprise spike in asphalt prices. At the same time, he takes quiet satisfaction in incremental wins—getting
      a good price on a critical truck replacement, lining up delivery in time for next winter, and slowly standardizing the
      fleet so training and maintenance become simpler. At home, he and Emily talk often about the next few years: Sophie
      will be driving soon, college costs are on the horizon, and they’d like to replace their own 12-year-old Subaru before
      it starts following the same path as the city’s older trucks.


      Despite the constant pull of responsibilities, Mike carves out small pockets of normal life. On Saturday mornings when
      he’s not on call for a water or sewer issue, he bikes the Paul Bunyan State Trail with Caleb or walks the arboretum
      trails with Emily and Ranger. He follows the Twins and Vikings faithfully, even when they disappoint him, and he’s slowly
      working through a stack of nonfiction books about infrastructure, climate resilience, and Midwestern history on his
      nightstand. Underneath the technical details of his job, his day-to-day motivation is simple: keep the streets safe,
      keep the city running smoothly, and still be home in time to help with algebra homework and listen to Sophie talk about
      band rehearsals. The replacement of that one worn-out pickup truck is just one thread in a much larger tapestry of trying
      to do right by his community and his family at the same time.'
