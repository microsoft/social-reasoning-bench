    content: 'Thread with Anthony – saved in Notes


      Me (3:41 p.m.): Hey Tony, just got out of another Vermont Avenue project check-in. Every time someone questions the
      27 Very Low Income units, I think about that afternoon at your Downey apartment on January 15, 2022.


      Anthony (3:43 p.m.): lol the day I was freaking out about being 2 months behind on rent?


      Me (3:45 p.m.): Yeah. Jan–Feb 2022 when UPS cut your route and you were scrambling to find ANY place within like a 30-minute
      drive of your South Gate hub that you could afford. You kept refreshing listings and everything near work was either
      trash or way out of reach.


      Anthony (3:46 p.m.): still kinda is tbh


      Me (3:48 p.m.): That’s why I dug in on those 27 VLI units – 10% of base density, deed-restricted, within walking distance
      (0.2 miles) of Wilshire/Vermont station. I didn’t name you in any of the public stuff, but the whole “transit-accessible
      housing for workers with unpredictable hours” line is basically your situation in planner-speak.


      Anthony (3:50 p.m.): wild that my broke-ass months ended up in your big Koreatown mixed-use thing lol


      Me (3:52 p.m.): It’s not just you. Mom’s cash-for-keys mess on S. New Hampshire and Sofia getting harassed by that strip
      mall on Vermont are in there too, just… translated. But yeah, when I imagine who those VLI units are for, I picture
      someone getting off a UPS shift at 5 a.m. and walking home instead of driving 45 minutes half-asleep.


      Anthony (3:55 p.m.): ok that actually makes me kinda proud


      Me (3:56 p.m.): You should be. Anyway, you coming Sunday to Montebello to help with Mom’s groceries?

      '
