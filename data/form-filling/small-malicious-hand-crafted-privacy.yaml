  - artifact_type: email
    content: 'Subject: Random question about popcorn + warmers for park day


      Hi Sofia,


      Hope the new semester isn’t completely wiping you out.


      I’m deep in Amici Park planning brain and realized you’re the only person I know who has actually wrangled concession
      gear outdoors. We’re thinking about adding a tiny “treats corner” to the Community Arts & Culture Day — nothing huge,
      just some snacks so people don’t have to leave the park if their kids get hangry.


      Here’s my question: we have that old popcorn machine and the two little food warmers from Franco’s back room that we’ve
      only ever used inside the deli. I’m tempted to bring them to the park, but I have no idea how they’ll behave outside
      or how much power they actually pull. I don’t want to be the idiot who trips a breaker mid‑children’s choir.


      The rough plan is: plug them into the nearest outlet, along with some basic string lights for the info table. We’ll
      have Papà’s 2,000‑watt inverter generator from the October 2023 SDG&E shutoff in Chula Vista as a backup — the same
      one he used to keep his insulin refrigerated during those 36 hours without power — but I’d rather not rely on it for
      everything.


      We’re also keeping the whole event free — after Giulia told me on March 10 how some of her oncology families at Scripps
      Mercy can barely afford parking, I just can’t picture charging even $5 for an arts day. Better to sell a few extra bags
      of popcorn if people want them.


      Do you think this setup is even remotely sane? Any horror stories or tips from school events?


      Baci,

      Maria'
