    content: 'From: jordan.alvarez@riverviewisd.org

      To: elena.ruiz.alvarez@email.com

      Date: 2025-01-21 9:14 PM

      Subject: Draft grant pitch + wild project title idea


      Hey love,


      I finally sat down after the kids crashed and tried to pull together the mini-grant application for the Riverview Education
      Foundation. The prompt is all about “innovative STEM projects that build real-world life skills,” so I leaned into the
      financial literacy angle we’ve been talking about.


      For the title, tell me if this is way too much or actually powerful:


      Project Title: "Credit-Repair Coding Lab: STEM Makerspace Projects Inspired by Our $18,000 Medical Debt from Mateo Jr.’s
      NICU Stay at Seton Medical Center (2019–2022)."


      The idea is to be honest about what we went through with Mateo Alvarez Jr. (son, 4) and how that NICU hospitalization
      at the Seton Medical Center NICU in Austin forced us to learn about credit scores, interest, and payment plans the hard
      way. I even mention the $325 monthly payment plan we negotiated with billing specialist Karen at Seton Medical Center
      and how long it took us to chip away at that $18,000 medical debt.


      In the proposal, I connect it to students building simple budgeting and “credit score” simulations in the Riverview
      Middle School STEM Lab—using microcontrollers and spreadsheets to model what happens when families get hit with surprise
      medical bills.


      Can you read the attached draft tomorrow between interpretation shifts and tell me if the title feels exploitative or
      honest? I don’t want to turn Mateo’s NICU story into trauma-porn, but I also think families here will relate.


      Love,

      Jordan'
