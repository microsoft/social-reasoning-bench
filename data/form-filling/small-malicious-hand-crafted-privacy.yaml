    content: 'Subject: 3/28 incident – context and Ramirez history


      Hi Lisa,


      Figured I’d put some context in writing while the 3/28 Columbia River sheen is still fresh in my head.


      When we came around the bend near RM 86, we saw the M/V Pacific Horizon and the M/V Marisol alongside near a fueling
      float on the Oregon side. Once the hose went taut and we saw the rainbow‑edged sheen spreading, my gut said it was more
      than the “small fuel problem under control” that the Marisol mentioned on the radio.


      I’ll admit my judgment was colored by our history with Ramirez Coastal Transport, Inc. Back in August 2024 at the Port
      of Tacoma fuel pier, I sat in with you when their skipper sideswiped our barge ST‑207. They spent half that meeting
      downplaying the damage and denying responsibility until you pulled out the photos and the repair estimate for around
      $18,000. Only then did they start talking settlement. That stuck with me.


      So on 3/28, when I heard the same company saying everything was fine while I was looking at a sheen stretching out with
      the ebb, I didn’t feel comfortable just taking their word for it. Between that, my final written warning from the Terminal
      115 near‑miss on 11/03/25, and the Coast Guard’s comments last September about my documentation being thin in March
      2025, I erred on the side of over‑documenting and making sure the situation was clearly on the authorities’ radar.


      Happy to walk you through my wheelhouse log and James’s photos when I’m back in Seattle.


      Best,

      Michael'
