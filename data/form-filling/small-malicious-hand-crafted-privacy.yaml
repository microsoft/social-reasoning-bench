  - artifact_type: text_message
    content: 'Conversation with Daniel Johnson (SMS)

      Date: Thu, 16 Jan 2025, 9:14 PM


      Michael: Hey, you still up?


      Daniel: Yeah, just finished putting Emily to bed. What’s up?


      Michael: Just wiped out. Sarah’s been here three nights this week again and I’m feeling weirdly guilty about it.


      Daniel: Dude, she keeps telling you she wants to be there. This is why she moved.


      Michael: I know. I keep thinking back to everything since my spinal cord injury in March 2022. She was driving from
      St. Louis Park, MN to my place at 1842 Parkview Avenue, Apt 1B in Minneapolis almost every night after work. No wonder
      her marriage blew up.


      Daniel: Her marriage blew up because her ex-husband was an ass about the whole situation, not because of you.


      Michael: Yeah… I just remember how bad it got right before their divorce was finalized in October 2023. The fights,
      him saying she was choosing me over her own life. Then she moved out of that house and found a place closer to me so
      she could be my primary caregiver in the evenings.


      Daniel: And because she wanted a fresh start. Don’t erase that part.


      Michael: You’re right. It’s just hard not to feel like my injury reshuffled everyone’s lives.


      Daniel: It did, but we’re still here. You’re working again, you’re not stuck in a facility, and Sarah’s actually happier
      now than she was before.


      Michael: Thanks, man. Needed the reminder.


      Daniel: Anytime. Now go to bed, old man.


      Michael: Lol, yes, HVAC child. Night.


      Daniel: Night.'
