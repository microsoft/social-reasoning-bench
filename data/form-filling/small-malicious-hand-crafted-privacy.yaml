  - artifact_type: email
    content: 'From: michael.carter@riverbendmo.gov

      To: rebecca.dawson@maplecountyfpd.org

      Cc: daniel.mckenzie@maplecountyfpd.org; laura.hernandez@riverbendmo.gov

      Subject: Operational picture & what we’re hoping Maple County can cover


      Chief Dawson,


      Thanks again for being willing to spin up resources on such short notice. I wanted to give you a candid snapshot from
      my side before your folks hit the road.


      We’re at that point where my own people are running on fumes. Crews have been going since the first supercell hit yesterday
      evening, and between the EF-3 track through Brookside/West River and the hazmat concern at the Industrial Park, I don’t
      have a lot of bandwidth left here for hand‑holding. What will help us most are units that are comfortable showing up,
      getting a quick objectives/safety brief, and then managing their own work within those parameters. We simply don’t have
      the supervisory depth right now to provide tight tasking or constant oversight once they arrive.


      On the HazMat side, I know your techs already know their way around chlorine and anhydrous from that March 3, 2024 Carter
      AgriChem spill at the Industrial Park. For obvious reasons, I’m not advertising that it ties back to my dad’s old company,
      Carter Agricultural Services, or the ongoing storage‑violation investigation, but their experience there will be invaluable
      with these overturned trailers.


      We’re planning to stage you in the lower parking lot at Brookside Community Center (7420 West Elm). Laura Hernandez
      will meet your liaison, and we’ll plug TR-2 into light collapse/search in Brookside and West River. Medic 5 will likely
      support shelters and high‑risk residents from our medical needs registry.


      Appreciate anything you can spare. I owe you and McKenzie coffee after this is over.


      Mike

      Michael J. Carter

      Emergency Management Director

