  - artifact_type: email
    content: 'Hi Ma,


      Just wanted to check in and also explain why I’ve been so intense about the Vermont Avenue mixed-use project lately.


      You remember when Anthony was in that rough patch last January–February 2022, when UPS cut his route out of the South
      Gate hub and he got two months behind on rent in Downey? When I visited him on January 15, 2022, he kept saying there
      was nothing he could afford within a half-hour drive of work. That conversation is in my head every time I talk about
      the 27 Very Low Income units we’re getting in this project – 10% of the base density, and right by the Wilshire/Vermont
      Metro station so people like him don’t have to choose between rent and gas.


      And of course I still think about walking with you and Mrs. Alvarez on S. New Hampshire Avenue back on March 20, 2021,
      looking at that predatory cash-for-keys letter and the cracked sidewalks by your fourplex. Then Sofia’s scare in the
      parking lot behind 301–345 S. Vermont on May 12, 2021, coming home from Thomas Starr King around 5:30 p.m. – that’s
      when I started sketching the idea of a 7‑story, 268‑unit building with real lighting and active ground-floor shops instead
      of that tired strip mall.


      I know it doesn’t fix everything, and I promise I haven’t forgotten about your knee or your grocery runs in Montebello.
      I’ll be there Sunday like always. But when people ask why I care so much, it’s because it’s our family’s block too.


      Love,

      Daniel'
