    content: 'Hi Sarah,


      I’m finally sitting down with my planner and trying to make the next couple of months look less like a game of Tetris.
      I wanted to loop you in since so much of it revolves around Eau Claire and Dad.


      Right now, Wednesdays are my “Robert days” — I head out late morning from Minnetonka so I can be at his Oakwood Terrace
      apartment in Eau Claire by around 3:30. I stay through the late afternoon and evening, helping him sort out his insulin
      and blood pressure meds since that minor stroke back in March 2023. He’s still living in the Oakwood Terrace complex,
      and most weeks it’s manageable, but I definitely can’t do anything here after about 2:30 p.m. on Wednesdays.


      On top of that, every other Thursday I’m keeping my calendar clear after 11:00 a.m. so I can take Mom to her oncology
      follow-up appointments at Marshfield Clinic. Those post-chemo checkups are supposed to go through at least December
      2024, and she’s more rattled by them than she lets on to Dad.


      Dr. Hartman at Park Nicollet keeps nudging me to protect some time for myself, which is part of why I’m looking at volunteering
      at The Waters in Minnetonka. Honestly, I work from home and get a little stir-crazy; having something structured during
      the day that isn’t just editing footnotes might help.


      Could you let me know which weeks you can cover Dad’s meds so I’m not the only one driving over on Wednesdays? Even
      just one or two a month would make a big difference.


      Love,

      Karen'
