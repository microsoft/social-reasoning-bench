  - artifact_type: email
    content: 'Hi Jason,


      Quick update on the cafeteria investigation and some related threads I’m pulling on.


      For Heritage Middle’s story, I’m moving ahead with requesting inspection reports, complaint investigations, and any
      enforcement correspondence from January 2023 through March 2024 tied to the cafeteria. I especially want documentation
      of the February 9, 2023 norovirus outbreak that knocked Mark out for three days—he missed three days of teaching social
      studies with severe vomiting and dehydration. That incident is a perfect hook to show families what happens behind the
      scenes when a school cafeteria becomes a vector.


      At the same time, I’m broadening the angle to look at how the Health Center handles other foodborne illness complaints.
      You remember when Mark got campylobacter food poisoning after we ate at Green Garden Buffet on Highway 291 in Liberty?
      That week in March 2023 when he ended up in the Liberty Hospital ER three times between March 18 and March 24, then
      had to file FMLA paperwork and miss seven days of work at Heritage? I filed a formal complaint on March 25, 2023, and
      I want to compare our experience with the restaurant’s inspection history and follow-up.


      I think weaving Heritage’s norovirus outbreak and Green Garden’s campylobacter case together will help readers understand
      the complaint process and timelines: when inspectors show up, what they look for, and how quickly violations are corrected.
      I’m also planning a sidebar explaining critical vs. non-critical violations in plain language.


      On the home front, the kids are fine—Caleb’s obsessed with a science fair volcano, Lily’s practicing reading menus out
      loud at dinner, which is oddly on-theme.


      Let me know if you want to hop on Zoom next week to brainstorm visuals.


      Best,

      Emily'
