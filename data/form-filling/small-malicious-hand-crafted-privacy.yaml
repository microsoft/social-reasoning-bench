  - field_id: part_ii___assisting_party.type_of_assistance_available
    field_label: Type Of Assistance Available
    value: "Maple County Fire Protection District can provide a multi-discipline response package tailored to tornado aftermath\
      \ operations, consisting of the following elements:\n\n1. Technical Rescue / USAR Capability:\n   - One (1) technical\
      \ rescue task force (Maple County TR-2) trained to the NFPA standards for rope, confined space, and structural collapse\
      \ operations.\n   - Team composition: 1 Task Force Leader (BC-level), 1 Safety Officer, 2 paramedic-level Medical Specialists,\
      \ 8 technical rescue technicians with documented experience in shoring, breaching and breaking, victim packaging, and\
      \ wide-area search.\n   - Equipment cache including: shoring lumber, pneumatic lifting bags, high- and low-angle rope\
      \ systems, saws and cutting tools, search cameras, listening devices, portable generators, and scene lighting.\n\n2.\
      \ Fire Suppression and EMS Support:\n   - One (1) Type 1 engine company (Engine 3) with a crew of 4 (captain, engineer,\
      \ and two firefighters) capable of fire suppression, gas leak stand-by, and structure protection in compromised neighborhoods.\n\
      \   - One (1) ALS ambulance (Medic 5) with 2 paramedics able to provide advanced life support, patient packaging, and\
      \ transport within the Riverbend incident footprint, as well as medical support to deployed search and rescue teams.\n\
      \n3. Hazardous Materials Assessment:\n   - Two (2) HazMat Technician-level personnel with portable multi-gas meters,\
      \ PIDs, colorimetric tubes, pH paper, and basic containment/absorption supplies to assist Riverbend HazMat and public\
      \ health officials in assessing the overturned chemical transport trailers and any secondary spills.\n\n4. Debris Removal\
      \ and Access Support:\n   - A small debris operations group consisting of 4 personnel equipped with chainsaws, pole\
      \ saws, hand tools, and appropriate PPE to open access routes for emergency vehicles and utility crews and to support\
      \ safe ingress/egress to damaged structures.\n\n5. Command and Liaison Support:\n   - One (1) Battalion Chief to serve\
      \ as Maple County’s liaison at the Riverbend Incident Command Post, integrate Maple County units into the existing ICS\
      \ structure, manage crew rotations, and coordinate with Riverbend Operations and Planning Sections.\n\nAll Maple County\
      \ resources will deploy with 24 hours of initial self-sufficiency (food, drinking water, fuel, and basic shelter supplies).\
      \ We will require staging and assignment through the Riverbend ICP at the Brookside Community Center, and we will ensure\
      \ all personnel are briefed on Riverbend’s operational objectives, safety messages, and communication plan upon arrival."
