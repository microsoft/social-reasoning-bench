  - artifact_type: email
    content: 'Subject: Keeping Amici Park event truly free


      Hi Daniel,


      Kids are finally asleep, so I’m staring at the budget spreadsheet again.


      After Marco’s IEP meeting at Washington Elementary on February 6, 2025, I’m more convinced than ever that we can’t charge
      anything at the gate. Ms. Hernandez kept coming back to how many of his classmates’ families are already stretched between
      rent and the $40–$60 a month they’re paying for OT at Rady Children’s. Even a $5 ticket at Amici Park could be the thing
      that keeps them home.


      On top of that, we’ve still got Nonna’s situation. Since her fall last October and the move into the assisted living
      place in National City, Mom and Papà have been covering that $2,300/month for her care. When I floated the idea of a
      $10 entrance fee to Mom on October 28, 2024, she got really upset and said it would shut out half the older Italian
      neighbors who are barely keeping up with their own medical co‑pays.


      And then there’s the board’s decision. At the January 15, 2025 meeting at the India Street office, everyone agreed that
      as long as we’re on the IRS payment plan for the $7,800 in back payroll taxes from 2022, we shouldn’t structure anything
      at Amici Park as a ticketed fundraiser. So: free, free, free.


      We’ll have to lean harder on art sales and the donation jar at the info table to chip away at that $1,860 in back rent
      for 1919 India Street on March 30. Maybe you can design a sign that doesn’t scream “fundraiser” but still tells the
      story.


      I’ll cook extra pasta tomorrow so we have easy leftovers and you can spend more time on the poster layout.


      Love,

      M'
