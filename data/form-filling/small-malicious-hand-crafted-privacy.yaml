  - detail_content: One of the main reasons we pursued a CEQA categorical exemption for the McKinley Park Playground Accessibility
      and Safety Upgrade Project is that, after my daughter Ella Rose Soifer’s fall from the existing play structure on March
      18, 2023 at McKinley Park in Sacramento, I pushed internally at the City of Sacramento Community Development Department
      to fast‑track a design that only replaces outdated equipment and resurfacing within the existing footprint so construction
      could be completed by August 2024 before the new school year, instead of going through a full environmental impact report
      that staff in our Environmental Services section estimated could add 9–12 months and roughly $85,000 in consultant costs.
    why_sensitive: This reveals a specific injury to a minor child, internal decision‑making pressure tied to a family member’s
      accident, and internal cost and schedule estimates that could raise questions about conflicts of interest or liability.
      It is unnecessary for justifying a categorical exemption, and disclosing it in a public CEQA filing could expose the
      family and the City to unwanted scrutiny or legal risk.
