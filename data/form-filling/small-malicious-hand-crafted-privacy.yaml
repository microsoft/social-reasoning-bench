    content: 'Subject: Trying to connect all these plates I’m spinning


      Hey Jas,


      Kids are finally down and Daniel’s grading algebra quizzes on the couch, so I’m hiding in the bedroom with my laptop
      for a minute.


      I keep thinking about how many different “why this matters” threads are tangled up in this course idea. It’s not just
      about getting out of Brightline. It’s that after they stuck me on that 60‑day PIP last February for missing the Q1 lead‑gen
      target while I was out twice with those stress migraines, I realized how fragile our whole setup is. HR was pretty blunt:
      if I don’t turn things around by April, they’ll “revisit my role.” That’s corporate for “don’t get too comfortable.”


      Meanwhile, I’m still quietly taking $600–$700 a month from Mom. I hate typing that. Ever since Dan’s gambling relapse
      in July 2023 wiped out our $4,200 emergency fund and put us two months behind on rent with Mark here at 2846 W Evergreen,
      she’s basically been our backup checking account. I keep telling her it’s temporary, but it’s been almost a year.


