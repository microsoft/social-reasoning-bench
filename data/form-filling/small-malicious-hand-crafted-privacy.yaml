  - artifact_type: email
    content: 'Subject: Dad, money, and why I’m keeping my distance out here


      Hey Erin,


      Long night run downriver, so I’ve got time to think (dangerous, I know).


      Been worrying about Dad and the bills since his heart attack on 2/10. I know you’ve been doing a lot of the in‑person
      stuff at Swedish Medical Center – First Hill, and I’m grateful. Emily and I finally got the payment plan sorted: about
      $450 a month for his cardiac rehab and the prescriptions insurance didn’t fully cover. It’s manageable as long as I
      keep sailing steady and don’t miss any paychecks.


      That’s part of why I was so cautious with that fuel sheen near Longview on 3/28. We were in the Columbia River channel
      around RM 86 when the allision happened and that diesel smell hit. Old me might’ve tried to get closer and play hero,
      but all I could think was: if I get hurt or ding the boat trying to help with someone else’s mess, we’re sunk financially.
      Between Dad’s rehab, the mortgage in Georgetown/South Park, and the Subaru payment, there’s no cushion.


      I did what I could from a safe distance – slowed to bare steerageway, kept clear of the spill, had my deckhand James
      take photos, logged times and positions. It felt weird not to jump in more, but I’ve got to think long‑term. Dad needs
      us both in one piece, and the kids need their dad, not another patient at Swedish.


      How’s he doing this week? Is he still grumbling about the low‑sodium diet? Tell him his tugboat‑captain son is actually
      doing the shoulder exercises his PT gave him, so he has to do his part too.


      Love,

      Mike'
