    occupation: Senior Network Systems Administrator
    employer: Ellis Medicine (Ellis Hospital)
    education: B.S. in Information Technology, SUNY Polytechnic Institute (formerly SUNY IT) – 2001; A.A.S. in Computer Information
      Systems, Schenectady County Community College – 1997
    family_members:
    - Erin Donnelly (wife, 47)
    - Sean Donnelly (son, 16)
    - Megan Donnelly (daughter, 13)
    - Thomas Donnelly (father, 78, Vietnam veteran, retired electrician)
    - Patricia Donnelly (mother, 76, retired elementary school teacher)
    - Kelly Donnelly-Murphy (younger sister, 44, lives in Clifton Park)
