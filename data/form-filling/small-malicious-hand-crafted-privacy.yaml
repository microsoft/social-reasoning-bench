    content: 'Hi Grace,


      Kids are finally in bed and Daniel’s grading on the couch, so I’m catching up with you instead of reading more traffic
      memos.


      I’ve been thinking a lot about how tangled our family is with this Riverbend Mixed-Use Village project. On the work
      side, it’s still the same 84.6-acre former aggregate yard along the American River, zoned M‑1/PD with the Employment
      Center designation and that Urban Habitat Buffer. I spend my days talking about 620 units, 185k square feet of commercial,
      120k of office, Class I trail, mobility hub, etc.


      But in my head it’s still the “Riverbend Mixed-Use Village Specific Plan and Lillian Wu Senior Housing Displacement
      Avoidance Project.” I can’t stop replaying Mom’s January 2023 eviction scare in Sacramento. Every time I tweak the affordable
      housing language (15% lower/mod, more 3‑bedrooms), I picture her, and now Dad too.


      Dad’s been different since his lung cancer diagnosis on 5/14/24 at UC Davis Medical Center. His oncologist talking about
      decades of diesel exposure at the Port of Oakland is burned into my brain. It’s why I’m so intense about the air quality
      and truck routing along Riverbend Blvd, where Evie and Lucas walk to Sunrise Elementary past those idling trucks at
      7:45 a.m. And I keep hearing his stories about flood maps and that $1,200 premium hike after his March 2021 FEMA appeal,
      which is why I half‑jokingly call part of the plan the “Michael Wu Flood Insurance Relief Overlay.”


      Meanwhile, you’re juggling your own housing mess in Oakland after that March 2023 layoff and $2,400/month rent. I still
      think the micro‑retail kiosk we sketched in June 2023 could actually work in the town center as a little incubator for
      your boba pop‑ups.


      Anyway, how are you holding up this week? Did your landlord ever fix the leak by your kitchen window?


      Love,

      Laura'
