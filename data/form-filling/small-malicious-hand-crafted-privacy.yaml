  - artifact_type: note
    content: 'Title: New “Adventure Feel” Waterfall Package – brainstorm


      Date: 2024-07-22


      Loose planning notes for next season’s offerings out of Hooker Falls Access Area.


      Goal: Create a half‑day waterfall photography hike that feels more like a backcountry adventure even though we’re in
      busy DuPont. People keep saying they want to “get away from the crowds” for shots of Hooker, Triple, and High Falls.


      Idea: Market it as a small‑group, slower‑paced outing where folks can spread out a bit on the trail instead of marching
      in a tight clump behind me. I still need eyes on everyone, but I don’t want to be barking at them to stay bunched up
      the whole time – that kills the sense of exploration. Maybe I frame it as “you’ll have space to wander a little between
      designated regroup points.”


      Need to balance that with my own anxiety after the panic attack on High Falls Loop (5/18/22). Dr. Merritt keeps reminding
      me that I feel better when we’re not pinned in at the main overlooks during the 10:00–3:00 crush. So this route should
      use some of the quieter connectors between Hooker Falls Trail and Triple Falls Trail, with planned photo stops away
      from the densest crowds.


      Also want a version that Dad can handle on days he’s down from Asheville. Short, low‑elevation segments near the parking
      lot so his balance issues post‑stroke don’t become a problem.


      Action items:

      - Walk the route solo on a weekday morning, time segments.

      - Write copy for the website emphasizing “space to explore” + Leave No Trace.

      - Double‑check cell coverage at regroup points in case Evan’s school or Nurse Kelly call.

      '
