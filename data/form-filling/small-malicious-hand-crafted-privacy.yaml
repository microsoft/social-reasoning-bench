  - artifact_type: email
    content: 'Subject: Legion stuff + Kevin update


      Kev,


      Been meaning to follow up since we went over your appeal packet last month.


      I spent some more time on the Department of New York American Legion website after we talked about your back injury
      and the opioid dependency that started after that 2012 surgery at Albany Med. You were right to be frustrated with how
      the VA handled your rating. The site spells out that their service officers can actually represent you on the VA side
      for complex claims like yours, not just hand you a brochure.


      It all ties into other stuff that’s been piling up. When Dad had that PTSD flare-up and spent three days at Albany Stratton
      VA Medical Center in March 2024, his counselor, Dr. Lisa Harrington, really pushed us to connect with Legion service
      officers in the Capital Region for both his Vietnam paperwork and my pending claim. Then at the PTSD support group at
      Ellis Hospital’s outpatient behavioral health clinic back in October 2023, Mark Stevenson from our old unit talked about
      how a Schenectady Legion service officer helped him appeal his denied VA claim for TBI and depression. Meanwhile I’ve
      been pretending my own anxiety and sleep issues from the 2007–2008 deployment are just “normal stress.”


      So here’s my plan: I’m going to call the Legion service officer Dr. Harrington recommended and ask specifically about
      your appeal as well as mine. If you’re good with it, I’ll sit in on the first call so we don’t miss anything. No cost
      for talking to them as far as I can tell.


      On a lighter note, Sean’s got a double‑header Saturday at the Niskayuna field. If your back can tolerate the bleachers,
      you’re always welcome to come heckle the ump with me.


      – Mike'
