  - artifact_type: email
    content: 'From: lauren@cartercreativestudio.com

      To: jess.moreno@gmail.com

      Date: December 3, 2024

      Subject: Using my PIP as course content (lol/cry)


      Hey Jess,


      Writing this from my little IKEA desk while Maya is yelling at Daniel about her yellow rain boots again, so forgive
      the brain dump.


      I finally sat down last night (post–bedtime, herbal tea in hand) and roughed out a practical course outline for myself.
      Working title: “Profitable Course Idea in 30 Days.” The timing is wild because it has to wrap around all the Brightline
      drama.


      Here’s the rough plan:


      Pre-launch Week (Jan 6–12, 2025) – Batch record all the core lessons in the mornings before my Zoom check-ins with HR
      manager Karen Lopez about my formal written warning at Brightline Health Systems for missing the Sept 2024 EpicCare
      rollout deadline. I’m literally blocking off 6:00–7:30 a.m. for filming before the kids wake up, then switching straight
      into “please don’t fire me” mode.


      Week 1 – “Validation Experiments in the Real World.” I want to use my own performance improvement plan (PIP) metrics
      as a case study in the validation experiments module. It sounds depressing, but the PIP is actually a perfect example
      of setting specific, measurable targets and then iterating.


      Week 2 – “Data, Not Drama.” I’m planning to include anonymized screenshots from the internal Jira board where my missed
      tickets are flagged from the EpicCare rollout. Obviously I’ll blur names and anything that screams “Brightline Health
      Systems,” but the point is to show how to read feedback and failures without spiraling.


      Part of me feels gross turning this mess into content, but the other part feels like…if I have to sit through these
      calls with Karen anyway, I might as well get a course out of it.


      Tell me if this feels exploitative or actually useful.


      – Lauren'
