    content: 'Personal log – traffic + family


      Living at 214 North 10th Street, Apt 3B has turned into a running list of near‑disasters.


      Kids:

      - Sofia: asthma + ADHD. After the pediatrician at Valley Pediatrics warned us on 2/5/24 that her impulsive tendency
      to dart into the street in front of our building makes her especially vulnerable, I basically walk her everywhere. We
      already escort her to the bus stop at North 10th & Haledon because of the speeding and stop‑sign running.

      - Lucas: nightmares and anxiety about crossing since the 10/9/23 near‑miss in front of 214, when I later told Officer
      Hernandez and his therapist at Passaic County Children’s Counseling Center. Then the October 18, 2023 almost‑hit at
      North 10th & Haledon that led us to Dr. Alvarez at St. Mary’s Behavioral Health. Plus the March 3, 2023 gray SUV incident
      around 7:45 a.m. on the way to School No. 1.


      Carmen:

      - Hip fracture from being struck near North 10th & Haledon on 3/18/24 and taken to St. Joseph’s University Medical Center.

      - Earlier accidents: 10/5/23 hit near 214; 10/14/22 knocked down by a car pulling out, ER at Passaic Valley; mobility
      issues after knee surgery at St. Mary’s General; oncology at Hackensack; diabetes education class at Passaic Valley
      before the 8/18/23 near‑miss crossing to St. Paul’s Church.


      Me:

      - 6/7/22 speeding ticket at North 10th & Planten (PP‑2022‑146) rushing Carmen.

      - 11/2/23 rear‑end near Planten, herniated disc, still arguing with insurance.

      - Concussion 8/29/22 unloading IT gear outside 214.


      All of this is why I can’t treat speeding on North 10th as just “noise.”'
