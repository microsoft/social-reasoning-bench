  - artifact_type: text
    content: 'Miguel,


      Long one, so read when you get a break.


      I walked past the corner of North 10th and Haledon this morning and thought about how many close calls we’ve had there.
      Remember October 5, 2023 when the car hit Carmen right by 214 North 10th and they had to bring the ambulance from Passaic
      Valley Regional Medical Center? And before that, October 14, 2022 when she got knocked down by a car pulling out of
      a spot and ended up in the ER at the hospital where I work? It’s like this street has it out for our family.


      Then there’s my own mess: the August 29, 2022 rear‑end when I was unloading IT gear outside 214 at 6:15 a.m. and got
      that concussion; the June 7, 2022 speeding ticket at North 10th and Planten (PP‑2022‑146) rushing Carmen to her oncology
      appointment at Hackensack; and the November 2, 2023 rear‑end by Planten when I was driving home from Passaic Valley
      and wound up with a herniated disc and PT at St. Joe’s.


      And don’t forget my genius move: driving on a suspended license on May 5, 2022 when Prospect Park PD pulled me over
      on Haledon near North 8th because of those stupid 2021 parking tickets.


      Day to day it’s the usual chaos—Elena’s late shifts, kids’ homework, me on call for the hospital. But all this stuff
      sits in the back of my head every time I back the blue Civic out from 214.


      We still need that coffee in Clifton soon.


      D.'
