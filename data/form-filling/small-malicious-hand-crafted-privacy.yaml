    content: 'Hey [Name],


      Appreciate you letting me vent the other week, so here’s the longer version I didn’t have time to explain between sessions
      at the conference.


      We’ve been wrestling Unit #23 onto the agenda for what feels like forever. Between Karen’s August 5, 2023 write‑up for
      that emergency transmission repair I authorized without prior council blessing and the anonymous March 2025 ethics complaint
      implying I’ve given Jason at Northland Motors preferential treatment on bids, I feel like anything involving trucks
      has a target on it.


      Layer on the personal stuff: the January 18, 2025 plow accident on Highway 210 when I nodded off after being up all
      night at St. Joseph’s Medical Center with Dad during his second stroke; my license on conditional status for six months
      after the December 12, 2024 careless driving ticket by Brainerd High; missing a couple of snow call‑outs last November
      while taking Sophie to weekly anxiety therapy at Lakeside Behavioral Health and ending up on a performance improvement
      plan. None of that shows up in the clean, professional staff report, but it’s all swirling around in my head every time
      I look at that truck.


      The politics don’t help. Honestly, I skipped the normal internal review process on some of the early drafts because
      I was afraid the whole thing would get bogged down and never actually make it to council. At this point I just want
      a clear motion, a vote, and permission to stop pouring money and stress into a 2009 F‑250 that should’ve been retired
      years ago.


      How do you keep this stuff from eating you alive? Do you ever feel like one piece of equipment is somehow tied to every
      bad day you’ve had in the last three years?


      – Mike'
