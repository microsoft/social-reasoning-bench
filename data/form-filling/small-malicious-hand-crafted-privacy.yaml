  - artifact_type: email
    content: 'Danny,


      Just wanted to update you on Mom and also how work has been since her treatments started.


      Since Carmen began chemo at Riverside Oncology Center in October 2023, I’ve been swapping into more of those 6:30–11:30
      a.m. lab shifts so I can drive her to infusions afterward. The early fasting rush in Suite 210 is no joke – I’ll have
      three or four people standing within 2–3 feet of my desk at once, all hungry and cranky, while I verify orders and then
      walk them down that narrow hallway to the two draw chairs. You literally have to turn sideways to pass each other.


      You’d laugh if you saw my calendar: “6:30–11:30 a.m. – Lab fasting zoo; 1:00 p.m. – Take Mom to chemo.” By the time
      I get her settled in the chair, I already feel like I’ve run a marathon.


      It makes me think back to August 2021 when I got COVID. Employee Health still has it documented that my likely exposure
      was August 3, 2021 at that same Suite 210 window, helping an elderly walk‑in who kept pulling his mask down while I
      fixed his Medicare info and walked him to the draw chair. I was right next to him for almost 10 minutes. No wonder I
      ended up positive on August 9.


      Anyway, Mom puts on a brave face, but she’s wiped out after each infusion. It helps her so much when you call on your
      lunch break, so keep doing that if you can.


      Love you,

      Erica'
