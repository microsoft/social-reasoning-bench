  - artifact_type: email
    content: 'Hi Em,


      I’ve been thinking more about your OT rotations and how they intersect with what’s going on with all the grandparents.
      Part of why I keep circling back to The Waters is that I want to see what senior living looks like when it’s done really
      well, especially after Grandma Maggie’s place in Eau Claire. Oakwood Hills had some wonderful staff, but there were
      plenty of “behind the curtain” issues too.


      You probably remember how, from 2018 until early 2020, I was there almost every Sunday afternoon, 1–4 p.m., in her memory
      care unit. After that incident in March 2019 when she tried to hit a nurse, her geriatric psychiatrist, Dr. Karen Schultz
      at Mayo Clinic–Eau Claire, actually asked me to come in weekly for a while to model calming conversation and redirection
      with some of the more challenging residents. It was a crash course in behavior management, but it also made me curious
      how other places handle agitation and dementia.


      I’m also still haunted by Tom’s rough transition when he first moved into assisted living in Des Moines back in October
      2021. When he started talking in January 2022 about not wanting to live anymore and even describing a specific plan,
      it was that cribbage volunteer from St. Mark’s Lutheran who pulled him back from the edge. I keep thinking, “Could I
      be that person for someone here?”


      Selfishly, I also want to observe a different community so I can compare it to Maggie’s experience — and so I can better
      understand the environments you’ll be working in. It might even give me material for those essays on aging and family
      I keep threatening to write.


      Call when you have a break; I’d love to hear how your neuro lab is going.


      Love,

      Mom'
