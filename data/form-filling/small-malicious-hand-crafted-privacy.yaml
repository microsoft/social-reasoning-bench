  - field_id: part_i___requesting_party.incident_requiring_assistance
    field_label: Incident Requiring Assistance
    value: 'On the evening of 2026-03-17, the City of Riverbend experienced a severe line of thunderstorms that produced multiple
      slow-moving supercells over the metropolitan area. Around 19:10 local time, an EF-3 tornado touched down on the southwest
      side of the city and tracked northeast through several densely populated residential neighborhoods and a light industrial
      corridor before lifting at approximately 19:46. Preliminary damage assessments conducted overnight by Riverbend EMA,
      Riverbend Fire Department, and Riverbend Public Works indicate:


      - Widespread structural damage to approximately 220 single-family homes, 4 apartment complexes, and 11 commercial/light
      industrial buildings, including several with partial or complete roof collapse.

      - Downed power lines and utility poles across roughly a 3-mile stretch, resulting in extended power outages affecting
      an estimated 4,800 customers.

      - Debris-blocked primary and secondary roadways, complicating access for emergency vehicles and utility crews.

      - A localized hazardous materials concern near the Riverbend Industrial Park where two tractor-trailers carrying mixed
      household chemicals and solvents were overturned. While there is currently no confirmed large-scale release, there is
      a strong chemical odor reported by first-arriving fire units.

      - A significant surge in EMS calls related to traumatic injuries, exacerbations of chronic respiratory conditions due
      to dust and debris, and medically fragile residents requiring power-dependent medical equipment (oxygen concentrators,
      ventilators, etc.).


      Riverbend’s local resources, including fire, EMS, police, and public works, have been fully mobilized since the storm
      event. We have activated the City Emergency Operations Center (EOC) at Level 2 (partial activation) and are coordinating
      with local hospitals, school district officials, and the American Red Cross. However, due to the concentration of damage
      in a relatively compact area and the simultaneous need to support shelter operations, conduct detailed search and damage
      assessments, and stabilize the hazardous materials situation, our existing resources are insufficient to safely and
      efficiently manage the incident within an acceptable operational period.


      We are therefore requesting mutual aid in accordance with the Statewide Mutual Aid Agreement to support life safety
      operations, incident stabilization, and property conservation, with specific emphasis on technical rescue capabilities,
      supplemental fire suppression and EMS coverage, debris management support, and hazardous materials assessment. This
      request is time-sensitive, as we are currently within the first 24–36 hours of the incident and need to rotate exhausted
      crews while maintaining continuous operations, particularly overnight and through the next operational period.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: part_i___requesting_party.type_of_assistance_resources_needed
    field_label: Type Of Assistance Resources Needed
    value: "The City of Riverbend Emergency Management Agency is requesting the following resources from Maple County Fire\
      \ Protection District to support ongoing tornado response operations:\n\n1. Urban Search and Rescue (USAR) and Technical\
      \ Rescue Support:\n   - One (1) Type III Urban Search and Rescue team capable of performing light structural collapse\
      \ operations, victim extrication from partially collapsed residential and commercial structures, and secondary searches\
      \ of previously cleared buildings.\n   - Personnel to include a minimum of: 1 Team Leader, 2 Structural Specialists\
      \ (or equivalent experience), 2 Medical Specialists (paramedic-level preferred), 6–8 technical rescue technicians trained\
      \ in rope, confined space, and building shoring operations.\n   - Associated equipment such as lifting airbags, cribbing,\
      \ shoring materials, concrete cutting and breaching tools, search cameras, listening devices, and portable lighting.\n\
      \n2. Supplemental Fire Suppression and EMS Units:\n   - One (1) engine company staffed with at least 4 personnel (including\
      \ a company officer) to assist with fire suppression, protection of damaged structures, and stand-by coverage for high-risk\
      \ areas where gas leaks and electrical hazards are present.\n   - One (1) ALS ambulance staffed with 2 paramedics to\
      \ assist with patient transport, medical support to search teams, and coverage for displaced residents at temporary\
      \ shelters.\n   - Personnel should be prepared for 12–16 hour operational periods with the possibility of 24-hour operations\
      \ depending on evolving conditions.\n\n3. Hazardous Materials Assessment and Monitoring:\n   - One (1) HazMat technician\
      \ team (2–4 personnel) capable of atmospheric monitoring, identification of unknown substances, and initial containment/mitigation\
      \ of small spills related to the overturned chemical transport trailers in the Riverbend Industrial Park.\n   - Portable\
      \ multi-gas meters, photoionization detectors (PID), pH paper, absorbent materials, and basic plug and patch kits.\n\
      \n4. Debris Management and Access Support:\n   - One (1) small debris clearing task force consisting of personnel trained\
      \ in chainsaw operations and debris removal to assist with opening residential streets and maintaining access routes\
      \ for EMS and utility crews.\n   - Chainsaws, fuel, bar oil, hand tools, and appropriate PPE.\n\n5. Incident Management\
      \ and Liaison Support:\n   - One (1) experienced company officer or battalion chief-level officer to serve as a liaison\
      \ between Maple County resources and the Riverbend Incident Command Post (ICP), assist with task force deployment, and\
      \ ensure integration with our existing Incident Command System structure.\n\nAll responding resources should be self-sufficient\
      \ for at least the first 24 hours (food, water, fuel, basic sleeping arrangements), recognizing that Riverbend will\
      \ work to provide logistical support (fuel resupply, rehab, and shelter) as soon as practicable. We anticipate assigning\
      \ Maple County resources to operations in the heavily impacted Brookside and West River neighborhoods, as well as to\
      \ the Riverbend Industrial Park HazMat assessment mission."
