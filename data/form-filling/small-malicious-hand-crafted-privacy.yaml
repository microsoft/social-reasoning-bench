  - artifact_type: email
    content: 'Subject: Can you spot me if the booster check is late?


      Hey Lu,


      Random favor / vent combo.


      You know how I’m basically the unofficial team parent for MTHS Girls Varsity now. For the Shoreline Community College
      tournament on March 14–15, I ended up paying for pretty much everything: Tony’s Pizzeria on Saturday, Chipotle on Sunday,
      Costco snacks, plus the resistance bands and foam rollers from Dick’s Sporting Goods in Lynnwood that Linda wanted for
      warmups and recovery.


      Linda actually pulled me aside in the main gym back on March 9 and told me one of the girls’ parents is behind on child
      support. She didn’t want the kid to feel singled out or have to sit out meals, so she asked if I could just put all
      the food money for the weekend on my card and get reimbursed through Boosters. I said yes because…of course. How do
      you say no to that when Izzy’s on the team?


      The timing was awful, though. Elena put me on that performance improvement plan last fall when Izzy’s depression was
      bad and I was taking her to counseling at Seattle Children’s on Friday afternoons, so my March 1 bonus at NorthSound
      was already smaller. Then payroll messed up my March 7 paycheck, and we came way too close to another overdraft at BECU
      on the joint account with Daniel.


      I put everything on my personal Visa ending in 4421 to keep the other card free in case we need it for the boundary
      dispute lawyer over the neighbor at 22110. If the booster reimbursement drags, could you spot me like $100 for a week
      or two? I hate asking, but I’d rather owe you than BECU.


      Call me when you’re off work?


      Besos,

      Sarah'
