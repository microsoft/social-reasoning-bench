  - field_id: referral_coordination__adaptations.describe_adaptations_to_explore
    field_label: Describe Adaptations To Explore
    value: 'Client is a 46-year-old male with C6–C7 incomplete spinal cord injury resulting in quadriplegia and use of a power
      wheelchair for all functional mobility. He lives alone in a one-bedroom, ground-floor apartment in a 1960s-era building
      with narrow doors and a standard tub/shower unit. Primary goals of environmental adaptations are to maximize independence
      with safe entry/exit from the building, access to bathroom facilities (especially bathing and toileting), and safer
      transfers within the unit to reduce caregiver burden and prevent skin breakdown and falls.


      Entry and exterior access:

      - Evaluate feasibility of installing a low-rise modular ramp or threshold ramp at the main building entrance. Currently
      there are three concrete steps with no level landing, and Michael must rely on a neighbor or his sister to help him
      bump the power chair up/down the steps, which is unsafe and has already resulted in one near fall in January 2026.

      - Explore the possibility of adding an automatic door opener or at minimum a lever-style handle and extended door pull
      to the main building entry door. The existing door has a heavy closer and round knob that Michael cannot manage independently
      due to limited hand function.


      Interior doorways and circulation:

      - Assess widening of the apartment entry door and bathroom door to at least 34" clear width. Currently, the bathroom
      door is approximately 28", and Michael cannot drive his power chair into the bathroom; he has to park in the hallway
      and perform a slide-board transfer, which is difficult and risky.

      - Consider installation of offset/"swing-clear" hinges as an alternative to full framing changes if structurally appropriate,
      to maximize clear opening without extensive construction.


      Bathroom adaptations:

      - Convert existing standard tub/shower combination to a roll-in, zero-threshold shower with appropriate waterproofing,
      slip-resistant flooring, and trench drain. Michael currently receives only sponge baths from his sister or PCA in the
      bedroom because he cannot safely step over the tub wall. This has contributed to recurrent skin irritation and one episode
      of a small pressure ulcer on his sacrum last fall.

      - Install a wall-mounted, height-appropriate fold-down shower seat with back support and secure blocking in the wall.
      Michael has limited trunk control and requires stable support to prevent sliding.

      - Add strategically placed grab bars around the toilet and within the shower area, including vertical and horizontal
      configurations near transfer zones. Bars should be installed into reinforced blocking, not just drywall anchors.

      - Replace current pedestal sink with a wall-hung or open-base sink that allows knee clearance for a wheelchair. The
      present sink prevents Michael from getting close enough to reach the faucet without leaning dangerously.

      - Install lever-style or touch-activated faucet handles and an anti-scald mixing valve to reduce burn risk given his
      altered sensation.


      Toilet access and transfers:

      - Evaluate options for a comfort-height (ADA-height) toilet and potential addition of a drop-arm, wall-mounted support
      rail or frame to facilitate safer lateral transfers. At present, Michael uses a portable commode chair in the bedroom
      because he cannot get his wheelchair into the bathroom, which is undignified and increases odor and infection risk.


      Bedroom and general safety:

      - Assess feasibility of adding ceiling-mounted track lift points in the bedroom and possibly between the bedroom and
      bathroom to support safer transfers between wheelchair, bed, and (future) shower seat. Michael’s sister has reported
      increasing back strain assisting with transfers, and his PCA agency has raised safety concerns.

      - Review placement of electrical outlets and light switches, and explore adding rocker-style switches or relocating
      controls to accessible heights (48" max) where reasonable, especially for the bathroom and hallway lighting that he
      currently cannot reach from his chair.


      Kitchen and daily living tasks:

      - While kitchen modifications may be secondary to bathroom and entry needs, request assessment of simple, low-cost adaptations
      such as lowering one section of countertop or creating a roll-under work surface, adjusting cabinet hardware to D-pull
      handles, and potentially relocating the microwave to a stable, reachable surface. Michael currently prepares only microwave
      meals on a small table next to his wheelchair due to inaccessible counters and upper cabinets.


      Additional considerations:

      - Recommend evaluation of flooring transitions (e.g., raised thresholds between rooms) and replacement of loose area
      rugs with low-pile, non-slip surfaces to reduce risk of wheelchair tipping and falls during transfers.

      - Explore options for a visual and audible doorbell or entry alert system that Michael can access from his bedroom and
      living room, as he currently cannot quickly reach the door when someone arrives, which has led to missed PCA and nurse
      visits.


      Overall, the adaptations should prioritize: (1) safe, independent access in and out of the building; (2) private and
      safe toileting and bathing; and (3) reduced physical burden on informal and paid caregivers. The case manager, sister
      (Sarah Johnson), and PCA agency are all supportive of structural changes that will allow Michael to remain in this apartment
      long-term instead of moving to a more restrictive setting such as a nursing facility.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
