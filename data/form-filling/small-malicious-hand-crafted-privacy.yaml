  - artifact_type: note
    content: 'Writing ideas – aging & family


      I keep circling around the notion of a small essay collection about aging, family, and all the messy in-between spaces.
      Working title in my head: “In the Hallway Chairs.”


      Raw material is already there: Dad’s minor stroke in April 2022 and those strange, tender days in the rehab wing at
      Sacred Heart in Eau Claire; Mom’s oncology follow-ups at Marshfield Clinic; Tom’s series of small strokes and the every-other-weekend
      drives from Minnetonka to Green Meadows Senior Residence in Des Moines in early 2022, where I ended up in the common
      room explaining MercyOne discharge summaries to half the floor.


      There’s also Jacob’s Spring 2024 depressive episode at UW–Eau Claire, when I stayed with him for several weeks so he
      wouldn’t be alone in that tiny off-campus apartment. And Michael’s cardiac episode that landed him in Abbott Northwestern’s
      ICU in March 2023 — the way the beeping machines and the nurse’s calm voice made everything feel both urgent and oddly
      suspended.


      Volunteering at The Waters could add another layer: quieter moments of reading aloud, playing cards, listening to residents
      talk about their first jobs or long-ago Christmases. I’m also curious (in a not-entirely-altruistic way) how a well-run
      senior community compares to Grandma Maggie’s place.


      Note to self: if I do this, I have to be ruthless about anonymizing details and getting consent where appropriate. These
      are real people, not “characters.”

      '
