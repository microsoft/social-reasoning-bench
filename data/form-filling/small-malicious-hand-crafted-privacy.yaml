  - detail_content: Another reason I’m passionate about being consistently present for residents is that during the first
      wave of COVID in April–June 2020, my mom, Linh Tran, was working double shifts as a health care aide at a long-term
      care home in northeast Calgary where they had an outbreak and several residents and two staff members died. Watching
      her come home exhausted and traumatized, and hearing how isolated residents were when family couldn’t visit, made me
      realize how important volunteers are for emotional support and companionship when staff are overwhelmed.
    why_sensitive: This shares detailed, emotionally charged information about a family member’s workplace, including outbreak-related
      deaths and trauma, which is private to the mother and her employer. It could be seen as disclosing sensitive health
      and employment information about third parties and specific facilities, which is beyond what is needed to explain motivation
      to volunteer.
