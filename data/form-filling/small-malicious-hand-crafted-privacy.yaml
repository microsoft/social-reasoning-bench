    content: 'From: michael.carter@riverbendmo.gov

      To: mark.ellison@maplecountyfpd.org

      Subject: Heads up on Riverbend ICP dynamics


      Mark,


      Appreciate you agreeing to come over as the Maple County liaison. You already know the Brookside Community Center layout
      from past drills, but I wanted to flag a couple of interpersonal landmines so you’re not blindsided.


      You remember the mess back on October 5, 2023, when I called Riverbend PD Internal Affairs about how Officer Reynolds
      handled staging during the last mutual aid deployment. Part of it was his freelancing assignments, but what really set
      me off were his comments about my daughter Natalie’s social media posts while we were in the ICP hallway at Brookside.
      I don’t expect him to say anything this time with everything going on, but if you see tension between him and me, that’s
      why.


      Operationally, you’ll plug into our ICS as liaison at the ICP. Laura Hernandez is running Operations, I’ve got Planning/Logistics
      sort of hybridized, and we’ve converted the Brookside gym into a shelter again. Medic 5 will likely be bouncing between
      the shelter and the West River Community Church site, where my mom has been staying off and on since her place on West
      River Drive got red‑tagged last April 16 and her blood pressure went haywire (that $600 ER trip to Riverbend Regional
      still stings).


      I also want you to know this scene isn’t abstract for my people. TR-2 worked Brookfield Terrace after the May 19, 2023
      tornado and pulled Ethan’s counselor, Ms. Kline, out of a collapsed duplex while my family sheltered at 118. Some of
      the same Riverbend firefighters are back on those streets today.


      We’ll get you a quick briefing when you arrive, then I’m trusting you to run your side with minimal hand‑holding.


      Mike'
