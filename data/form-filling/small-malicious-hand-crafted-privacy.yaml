  - artifact_type: email
    content: 'From: debby.soifer@sacramento.gov

      To: lisa.hernandez@sacramento.gov

      Subject: McKinley inclusive play + construction logistics


      Hi Lisa,


      Catching up on notes from the last couple of weeks and wanted to flag a few design/implementation items for the McKinley
      Park Playground Accessibility and Safety Upgrade Project.


      First, inclusive play: back in Spring 2022 I did some informal Saturday observations at McKinley when the Sacramento
      County Behavioral Health day program brings kids over. On April 9, 2022, one boy who uses a wheelchair had to stay on
      the perimeter path with his aide because the existing transfer platform and surfacing wouldn’t let him reach the main
      composite structure. It was painful to watch. I’m really glad the current concept adds fully compliant transfer points
      and accessible routes to each major play zone – let’s make sure those details don’t get value‑engineered out.


      Second, accessibility for older adults: you know my bias from walking there with my mom after her minor stroke in May/June
      2023 and hearing Dr. Patel at Mercy General warn about the broken concrete and lack of handrails. The plan for reconstructing
      the path to current ADA standards and adding benches every 50–75 feet feels exactly right.


      On the construction side, can we coordinate early with Daniel Ortiz in Public Works? After my son’s asthma attack during
      that July 2020 street resurfacing project next to the park, Daniel and I talked about requiring low‑dust practices and
      limiting work hours near the residential edge between 3:00 and 5:00 p.m. on weekdays. I’d like those conditions baked
      into the bid docs for this project.


      Happy to chat more when you’re free.


      Thanks,

      Debby'
