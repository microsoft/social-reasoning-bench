  - artifact_type: email
    content: 'Subject: Vermont courtyard + Umma


      Hey,


      Quick brain dump before I forget – I was looking at the latest landscape plans for the Vermont Avenue Mixed-Use Housing
      and Retail Project and immediately thought of your mom.


      I still remember April 10, 2020, getting that call that Umma had a mild stroke at her place on S. Serrano Avenue and
      rushing to Cedars-Sinai. During those days from April 10–14, sitting in her room while Dr. Min-Jae Kim talked us through
      what recovery would look like, the thing that stuck with me most was his insistence that she needed a safe, nearby place
      to walk every day. He specifically said he didn’t want her crossing big arterials like Vermont Avenue if we could help
      it.


      That conversation is why I pushed the design team so hard to get to roughly 36,500 square feet of on-site open space
      – the level-3 central courtyard with a loop path, the rooftop walking route, the little seating nooks. I kept picturing
      someone like Umma being able to come down from her unit, walk a few gentle laps, sit in the shade, and go back upstairs
      without dodging traffic.


      It’s funny, because on the other side of the site I’m carrying Mom’s and Mrs. Alvarez’s cash-for-keys mess on S. New
      Hampshire and Sofia’s May 12, 2021 harassment near 301–345 S. Vermont, and then on this side I’m carrying your mom’s
      stroke and Dr. Kim’s advice. All these family moments embedded in a 7‑story, 268‑unit Koreatown mixed-use project that
      no one else will ever see.


      Anyway, just wanted you to know that when I talk about “senior-friendly open space” in meetings, I’m really talking
      about Umma.


      D.'
