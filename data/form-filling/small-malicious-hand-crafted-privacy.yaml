    background_context: 'This is Jordan, a 7th-grade science teacher who has slowly become the unofficial “STEM person” at
      Riverview Middle School. He lives about ten minutes from campus in a modest three-bedroom rental with his wife, Elena,
      and their two kids, Lucia and Mateo. Most mornings start the same: he’s up by 5:45 a.m., squeezing in a quick jog along
      the greenbelt that runs near the actual river the school is named for, then brewing coffee while he packs Lucia’s lunch
      and reminds her to grab the library books she keeps forgetting to return. By 7:10 he’s out the door with a backpack
      full of half-finished lesson ideas, a couple of microcontroller kits he wants to test, and the nagging thought that
      he still hasn’t called the plumber about the leaky kitchen faucet.


      At school, Jordan splits his day between teaching 7th-grade general science and mentoring students in math support blocks.
      His classes include a wide mix of learners: English language learners who light up when they can show understanding
      through models instead of essays, and students with IEPs who often do their best work when they can physically manipulate
      materials. Over the past few years, he’s cultivated a reputation for hands-on labs and projects that connect to the
      neighborhood—testing the pH of water from the nearby river, building simple air-quality monitors, and having students
      design prototypes for assistive tools that could help relatives or community members. He co-leads the after-school robotics
      club with his colleague Priya Desai and often coordinates with another teammate, Marcus Bennett, on cross-curricular
      projects that tie science to math and digital media. A few evenings each month, he stays late to run informal “build
      nights,” inviting parents and local engineers he knows from a nearby manufacturing plant to help students troubleshoot
      projects.


      Outside of work, life is busy and a little chaotic. Elena works part-time as a medical interpreter at the local hospital,
      so the two of them constantly juggle schedules—deciding who’s doing pickup from Lucia’s after-school art class, who’s
      taking Mateo to speech therapy on Thursdays, and who’s going to miss the first half of the next parent-teacher conference
      night. Jordan’s parents live about twenty minutes away; his mother, Rosa, watches the kids on Wednesday afternoons,
      which is the only reason he can stay for robotics club without feeling guilty. His younger sister Isabella recently
      moved back to the area after a breakup, and Jordan has been helping her get settled, fixing up her used car and reviewing
      her résumé in the evenings. Money is tight but stable; he and Elena are slowly paying down Elena’s medical bills from
      a minor surgery she had last year, and they talk about maybe buying a small house within the next three or four years
      if they can keep saving.


      Lately, Jordan has been thinking a lot about sustainability—both environmental and personal. He wants the project-based
      STEM work at school to be more than a short-lived burst of enthusiasm; he’s trying to embed it into the 6–8 science
      curriculum so it becomes part of how the school operates. That means spending weekend hours writing unit plans, aligning
      hands-on projects to state standards, and figuring out how to involve parents and fellow teachers in a way that doesn’t
      overwhelm them. At the same time, he’s trying to protect family time: Friday nights are “no school talk” nights at home,
      reserved for homemade pizza and a movie with the kids. His current concerns revolve around balance—finding enough energy
      to be the enthusiastic teacher his students need, the present parent his kids deserve, and a partner who isn’t always
      half-distracted by ideas for the next makerspace project. Despite the stress, he feels a quiet sense of purpose when
      he watches a student who usually struggles light up while debugging a sensor or seeing a 3D-printed prototype finally
      work; those moments fuel him through the long weeks and keep him committed to the path he’s chosen.'
  artifacts:
  - artifact_type: email
    content: 'Hey Elena,


      I’m hiding in my classroom for ten minutes before robotics and finally answering your text from this morning.


      I’ve been chewing on that idea of tying our own stuff into the makerspace work. Part of me keeps coming back to Lucia
      and everything that happened at Dell Children’s Medical Center in Austin back in February 2024. Since her epilepsy diagnosis
      with Dr. Patel, I keep noticing how overwhelmed she gets by noise and flickering lights. I’ve been sketching out “sensory‑friendly”
      project setups so kids like her can still do STEM without getting overloaded. I even jotted down a working title in
      my notebook: something like “Lucia’s post‑seizure STEM recovery lab” so I remember why I’m doing it.


      At the same time, I keep thinking about Diego and those dumb after‑school fights he got into when he was on court‑ordered
      probation from Riverview Municipal Court. I was texting him last week about how I want the Riverview Middle School makerspace
      to be a place where kids who are on the edge like that can pour their energy into building instead of swinging at each
      other. I mentioned maybe framing it as an intervention for students who keep getting written up.


      And then there’s Mom and Dad. Watching them drag themselves to San Antonio Immigration Court for those ICE deportation
      hearings in 2023–2024, scraping together that $4,500 retainer fee for Ms. Delgado, I keep seeing my students’ families
      in them. So many of our kids are dealing with that same fear.


      Anyway, all of that is swirling while I’m also just trying to remember to pick up tortillas and Mateo’s speech homework
      folder. Can we talk more tonight after the kids are in bed?


      Love,

      J'
