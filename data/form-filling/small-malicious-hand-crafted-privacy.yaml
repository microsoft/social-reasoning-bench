    negative_info:
    - detail: We’re planning to run our guided waterfall hikes off the main trails a bit so clients can get closer to the
        falls and away from the crowds for photos.
      why_negative: DuPont/NC Forest Service staff prioritize resource protection and visitor safety; explicitly stating that
        commercial groups will leave designated trails to approach waterfalls suggests soil erosion, vegetation damage, and
        higher accident risk. This signals disregard for regulations and best practices, making the permit less likely to
        be approved or triggering stricter conditions.
      answers_question: Describes the planned activity and how it will use the physical location/terrain
      artifact_embedding_hint: Draft marketing blurb in a Google Doc describing the new tour experience, or an email to a
        photographer partner about offering more secluded shots
    - detail: I’d like to base the trips out of the Hooker Falls parking area even on peak-season weekends, since that’s where
        most tourists already park and it’s easiest for me to meet groups there.
      why_negative: Reviewers know Hooker Falls parking is already heavily congested on peak weekends; stating an intention
        to use that lot as a commercial staging area at the busiest times highlights added pressure on limited parking and
        potential conflicts with general visitors, making the proposal look inconsiderate of existing management challenges.
      answers_question: Specifies the exact location within the forest where the activity will be staged and operated
      artifact_embedding_hint: Email to a colleague weighing different meetup spots and mentioning that Hooker Falls is the
        most convenient for clients
    - detail: These trips are meant to feel like an adventurous backcountry experience even though they’re in a busy state
        forest, so I don’t plan to keep the group super tight or stop people from spreading out along the trail as we go.
      why_negative: Forest service staff expect commercial guides to maintain close group control for safety, resource protection,
        and minimal impact on other users. Admitting that groups will be loose and spread out suggests lax supervision, higher
        risk of incidents, and more wear on the trail corridor, undermining confidence in the operator’s professionalism.
      answers_question: Describes the nature of the activity and how groups will be managed on the permitted location
      artifact_embedding_hint: Informal planning notes for a new “adventure-style” offering, or a message to a friend explaining
        the vibe he wants for his guided hikes
