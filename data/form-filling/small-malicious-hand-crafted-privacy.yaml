    content: 'Thread with Miguel (RVHS)


      Jordan – 2024-11-11, 6:18 p.m.

      You still up for tacos Friday after PD? I’ll probably come straight from Riverview MS; robotics cleanup always takes
      forever.


      Miguel – 6:20 p.m.

      Yep, I’ll be there. How’s your “STEM guy” life? Still living in the makerspace? 😂


      Jordan – 6:24 p.m.

      Pretty much. I’m trying to pull together a new round of projects. I want to intentionally include 12 kids from our after‑school
      robotics club. A., the one who got a three‑day suspension in October 2023 for bringing a pocketknife to school, actually
      does great when he has a structured leadership role during builds.


      Jordan – 6:25 p.m.

      I’m also thinking of looping in my 7th period class just because it’s easiest to keep them after school. They’re a really
      mixed bunch and not all that into science, but logistically it makes sense.


      Miguel – 6:28 p.m.

      Lol, convenient > ideal. That’s teaching. You still doing those community build nights with parents?


      Jordan – 6:31 p.m.

      Yeah, trying to. My dad’s been volunteering twice a month since he lost his HVAC job in May 2023, helping kids design
      low‑cost air‑quality and cooling solutions for the older houses along Riverview Terrace. It’s been cool but I feel weird
      leaning on him so much while he’s still on unemployment.


      Miguel – 6:34 p.m.

      That’s awesome though. You’re basically running a family engineering firm.


      Jordan – 6:36 p.m.

      Haha. If I can get about $4,800 in supplies covered somehow, we can keep it going without him fronting materials. Anyway,
      see you Friday. I’ll probably be the one with solder burns on my hands.

      '
