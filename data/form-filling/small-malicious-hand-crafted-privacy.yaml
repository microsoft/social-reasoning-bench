    content: 'Hey Sara,


      Catching up between interviews and kid chaos. You asked how the big public health series is going, and the answer is:
      slowly, messily, but it’s coming together.


      Right now I’m neck-deep in Clay County Public Health Center policies from October 2020 through March 2021 about coordinating
      with Independence-area nursing homes. I keep picturing Mom on those night shifts at the facility in Independence where
      she was working per diem when she caught COVID in November 2020. Knowing that infection led to long-COVID symptoms and
      basically pushed her into early retirement makes every vague email feel like a personal failure of the system.


      On top of that, I’m revisiting our own school decisions. Remember when Caleb had close contact with a COVID-positive
      classmate at Ridgeview Elementary on October 4, 2021? The school was following the Health Center’s fall 2021 quarantine
      and isolation guidance, but our pediatrician at Liberty Pediatrics, Dr. Megan Lawson, recommended a more conservative
      approach. We kept him home 10 extra days beyond what the school required. I’m combing through board minutes and staff
      presentations to see what the board was being told about risks to unvaccinated 9-year-olds in classrooms at that point.


      It’s a lot of heavy, backward-looking stuff. Meanwhile, life goes on: Mark’s lesson-planning at Heritage, Caleb’s building
      a diorama of the Oregon Trail, and Lily’s making me “tickets” to her stuffed-animal dance recital in the living room.


