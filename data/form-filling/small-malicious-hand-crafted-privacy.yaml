  - artifact_type: email
    content: 'To: family.group@example.com

      Subject: Quick family update from North 10th


      Hola todos,


      Figured I’d send one big update instead of ten little ones.


      Kids first: Lucas is still at Prospect Park School No. 1, Sofia at the same elementary. Lucas had a rough patch last
      fall with the bullying incident on October 2, 2023 – a playground fight where another kid punched him. The school and
      Prospect Park Board of Ed did an investigation and he ended up going to counseling at St. Mary’s Behavioral Health Clinic
      in Passaic. Between that and the street incidents, he’s been through a lot.


      Home life at 214 North 10th, Apt 3B is…loud. You probably heard that on March 18, 2024 the police came out after a neighbor
      called about yelling between Elena and me. We were arguing about Lucas’s behavior at school and things got heated. No
      one was hurt, but it shook us. We’ve since started seeing a marriage counselor and trying to keep big talks for when
      the kids are asleep.


      The building itself is another headache: code enforcement has been out a few times about mold and wiring in our unit;
      Carmen’s basement place at 52 Park Avenue also got inspected for mold and bad electrical before her respiratory issues
      last November. Elena is convinced the housing problems aren’t helping Carmen’s health.


      Workwise, I’m still at Passaic Valley Regional Medical Center in IT. Earlier this year I was on a performance improvement
      plan, so they gave me after‑hours remote access from the apartment so I could log into the borough and hospital systems
      at night and prove I could handle more complex tickets. Not fun, but I’m digging my way out.


      Despite all that, weekends still mean soccer, rice and beans, and visiting each of you when we can.


      Abrazos,

      Daniel'
