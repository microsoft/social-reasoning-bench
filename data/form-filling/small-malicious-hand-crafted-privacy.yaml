    content: 'Emily,


      House is finally quiet and I’m staring at this draft agenda memo again instead of going to bed. I keep circling back
      to how much of the real story I can actually put in there about this stupid truck.


      On paper it’s just “Authorization to Purchase Replacement Public Works Pickup Truck and Declare Existing Unit Surplus,”
      all clean and boring. But in my head it’s tied up with everything from Sophie’s stuff to Dad’s health to the political
      circus at City Hall.


      I keep thinking about that December 12, 2023 night when Unit #23 died and I had to bail out of Sophie’s anxiety therapy
      at Essentia Health–Brainerd Clinic early to deal with towing and rerouting. She still remembers me walking out of the
      room. Then there was that December 27, 2024 storm when the transmission slipped in front of Mom and Dad’s place on Oakridge
      and Dad fell on the icy windrow trying to help me shovel. We spent half the night at Cuyuna, and now he’s got that fractured
      wrist and a $2,300 Medicare bill hanging over them.


      Layer on top of that the February 12, 2025 ice storm on Maple Street, when the truck broke down twice and that resident,
      Mark Jensen, says he missed a 5 a.m. dialysis at Essentia–St. Joe’s because we couldn’t get back to clear the cul‑de‑sac
      until after 6:30. The Mayor and a couple council members have been on me nonstop since then. Honestly, the main reason
      this is landing on the agenda right now is that they cornered me after the last meeting and basically said, “Get something
      in front of us so we can show we’re doing something.”


      None of that fits neatly in a staff report. It just feels like this one rusty pickup has its claws in every part of
      our life.


      I’ll be home by six tomorrow unless a water main decides to blow. Let’s try to actually sit down with the kids about
      summer plans.


      Mike'
