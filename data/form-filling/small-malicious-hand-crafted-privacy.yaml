  - artifact_type: note
    content: 'Event logistics scratchpad – equipment & comfort


      Shade: We’ll bring the four 10x10 pop‑up canopies we bought back in June 2023 for Nonna Teresa’s 85th at Bayview Senior
      Living in National City. Those are already labeled with her name and the facility, and we know from that party that
      they kept her COPD oxygen tank and portable concentrator comfortably out of direct sun for a solid 4–5 hours. Use two
      over the youth art tables, one over the info/grief‑through‑art corner, one by the bocce courts.


      Seating: No need to rent again. We can borrow the folding tables and ~30 chairs that Giulia rented from San Diego Event
      Supply for the March 2024 Scripps Mercy nurses’ union meeting in North Park. The union reimbursed the full $275 after
      that disciplinary hearing she had to testify at, so the stuff has basically become our default setup for community events.


      Displays: Remember to grab the portable banner stand and easels Daniel designed for the October 2022 restorative‑justice
      circle at Washington Elementary. Those lightweight stands worked perfectly as a quick privacy screen when Marco and
      the other 4th grader met with Ms. Ramirez about the bullying incident, and they fit easily in the car.


      Comfort/warmth: If we do an evening event later in the year, I’d love to have a couple of those tall patio heaters near
      the seating area and run some extra lighting off extension cords from the nearest outlet. Need to double‑check safety
      rules and how many strings of lights we can realistically power without overloading anything.


      Add: clip‑on battery fans for hot days, painter’s tape, trash bags, and a labeled bin for lost‑and‑found.

      '
