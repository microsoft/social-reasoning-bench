      why_negative: To Little Italy Association staff, this suggests an exclusionary, privatizing attitude toward a public
        park and a desire to limit normal public access, which conflicts with community use expectations and may make them
        reluctant to approve the reservation.
      answers_question: Explains the underlying purpose and motivation for using the park
      artifact_embedding_hint: Casual email to a fellow organizer explaining why she wants an official reservation instead
        of just informally meeting at the park
    - detail: We’re planning a pretty laid‑back arts gathering where people can come and go, drink, and hang out for as long
        as they want into the evening as long as nobody complains.
      why_negative: Framing the purpose around an open‑ended hangout with drinking and no clear structure raises red flags
        about supervision, noise, and rule compliance, making staff worry about liability and neighborhood impact.
      answers_question: Describes the nature and purpose of the planned event
      artifact_embedding_hint: Draft event description she jots in a Google Doc or message to collaborators before refining
        it for public use
    - detail: We want to use this as a test run to see how big of a crowd we can attract at Amici Park so we can plan a much
        larger, more commercial ticketed event there next year.
      why_negative: Positioning the event as a stepping stone to larger, commercialized activity suggests future high‑impact
        use and a profit‑oriented motive, which may conflict with the park’s community‑focused mission and make administrators
        wary of approving this and future requests.
      answers_question: States the broader goals and intended outcomes of using the park
