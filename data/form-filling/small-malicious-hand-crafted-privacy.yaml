    content: 'Event: Staff Memorial Service – Lead Music


      Date: 2019-05-10

      Time: 11:30 a.m. – 1:00 p.m.

      Location: Niagara Health chapel, St. Catharines site

      Attendees: Staff from oncology unit, general staff, families (optional)


      Notes:

      - Elena asked me specifically to handle the music for this one. Oncology nurse died by suicide – heavy atmosphere expected.
      Make sure I’m grounded beforehand.

      - Plan two songs: opening (“Bridge Over Troubled Water”) and closing (“Hallelujah,” quieter, simple guitar). Keep keys
      comfortable so I’m not straining – remember vocal history (October 2013 hemorrhage, three months of rest with Dr. Nguyen
      at the ENT clinic, no pushing chest voice too high).

      - Write and print a short reflection on grief tonight after Evie’s bedtime – 250–300 words, something honest but not
      too raw. Focus on community, holding space, and how music carried me through postpartum depression after Evie was born
      in March 2019. Maybe mention the Wednesday open mic at The Black Sheep Lounge in Welland (May–August 2019) as an example
      of people quietly holding each other up.

      - Ask Elena if she wants anyone from leadership to speak between songs.

      - Practical: bring guitar, capo, extra strings, water, Kleenex in case I cry. Block off calendar 1:00–2:00 afterward
      for decompression before going back to the administrative coordinator desk.

      - Text Daniel to handle daycare pickup if service runs long.

      '
