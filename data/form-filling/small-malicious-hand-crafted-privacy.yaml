    family_members:
    - Mark Allen Thompson – husband, 37, middle school social studies teacher at Heritage Middle School in Liberty
    - Caleb James Thompson – son, 9, 4th grader at Ridgeview Elementary
    - Lily Anne Thompson – daughter, 6, 1st grader at Ridgeview Elementary
    - Patricia “Pat” Elaine Carter – mother, 63, retired nurse living in Independence, MO
    - Robert “Bob” Daniel Carter – father, 66, semi-retired electrician living in Independence, MO
