    extracted_text: "Revenues & Benefits Services\n\nCouncil Tax\nApplication for Property Exemption –\nAll Occupants Under\
      \ 18\n\n\nPlease use black ink and block capital letters or typescript\n\n\nBackground\nA dwelling which is solely occupied\
      \ by one or more persons under the age of 18 is exempt from liability for Council Tax\n(including Water and Waste Water\
      \ charges). In order to claim an exemption, please complete this form, sign the\nDeclaration on page 2 and email or\
      \ post it to the address at the bottom of the page along with the appropriate supporting\ndocumentation.\n\n\nApplicant\
      \ Details\nName                                  Council Tax\n                                      Reference\nProperty\
      \ Address\n\n\nAbout the people in your home\nI consider exemption from Council Tax should apply from (insert\ndate)\n\
      as the dwelling is solely occupied by persons under the age of 18 and I enclose documentary evidence in support of this\n\
      application.\n\nPlease give details of all persons residing in the property (including the applicant named above) and\
      \ indicate the evidence\nof age provided for each.\n\nName                 Date of Birth            Type of Evidence\n\
      \                                           Birth Certificate ☐    Passport\n                                      \
      \                       ☐    Other ☐ (please specify):\n                                           Birth Certificate\
      \ ☐    Passport\n                                                             ☐    Other ☐ (please specify):\n     \
      \                                      Birth Certificate ☐    Passport\n                                           \
      \                  ☐    Other ☐ (please specify):\n                                           Birth Certificate ☐  \
      \  Passport\n                                                             ☐    Other ☐ (please specify):\n\nPlease give\
      \ details of any adults (aged 18 or over) who have moved out in the last 12 months.\n\nName                 Forwarding\
      \ Address                                      Date Moved\n                                                        \
      \                    Out\n\n\nPage 1 of 2\nPlease return to: Revenues & Benefits, East Dunbartonshire Council,\nWilliam\
      \ Patrick Library, 2/4 West High Street, Kirkintilloch G66 1AD\nTelephone: 0141 578 8190   Email: counciltax@eastdunbarton.gov.uk"
  form_summary:
    form_purpose: Application to have a residential property declared exempt from Council Tax (including water and wastewater
      charges) on the basis that all occupants are under 18 years old, by providing occupant details and evidence of age.
    intended_recipient: Revenues & Benefits staff at East Dunbartonshire Council, who administer and assess Council Tax accounts
      and exemptions for residents.
