  - field_id: event__facility_details.special_equipment_to_be_used
    field_label: Special Equipment To Be Used
    value: 'We plan to use a small, portable sound system suitable for spoken word and acoustic music, consisting of: (1)
      a compact 8-channel mixer, (2) two powered speakers on stands, and (3) 3–4 wired microphones with stands. Volume will
      be kept at a moderate level to avoid disturbing nearby residents, and we will perform sound checks between 9:00 AM and
      9:30 AM only. Power will be drawn from existing park outlets if available; otherwise, we will bring a quiet, inverter-style
      generator with appropriate cable covers to prevent tripping hazards.


      We will also use up to four 10x10 pop-up canopies (with weighted bases, no stakes in the ground) to provide shade for
      art tables and the information booth, plus 8–10 standard folding tables and approximately 30 folding chairs. All canopies
      will be secured with sandbags or weighted plates to ensure safety in case of wind.


      Additional equipment includes: portable easels for youth painting, small battery-operated fans for ventilation under
      the canopies if it is warm, and a simple banner stand displaying the event name and schedule. We will not bring any
      large staging platforms or heavy structures; all items are lightweight and can be set up and removed on the same day.
      No inflatables, no carnival rides, and no smoke or special effects will be used. At the conclusion of the event, all
      equipment will be removed, and we will conduct a final walk-through to ensure no materials, tape, or trash are left
      behind.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
