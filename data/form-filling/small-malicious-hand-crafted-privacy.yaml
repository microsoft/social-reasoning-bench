  - artifact_type: note
    content: 'Title: Late‑night brain dump – Legion, work, health


      Rough week. The firewall upgrade at Ellis has me on edge, and I keep flashing back to that maintenance window I missed
      when I had the panic attack and ended up getting written up. Still embarrassed about that.


      Trying to look at the bigger picture:


      – Mental health: October 2023 PTSD support group at Ellis Hospital’s outpatient behavioral health clinic was the first
      time I said out loud that the 2007–2008 deployment still messes with my sleep. Mark Stevenson’s story about his denied
      VA claim for TBI and depression, and how a Schenectady American Legion service officer helped him win the appeal, stuck
      with me more than I admitted.


      – Dad: March 2024, three days at Albany Stratton VA Medical Center after that PTSD flare-up. Sitting there with him
      and his counselor, Dr. Lisa Harrington, hearing her say we’d both waited too long to get help, was a punch in the gut.
      She specifically mentioned Legion service officers in the Capital Region who could help with Dad’s old Vietnam disability
      paperwork and my pending claim.


      – Kevin: May 2024 deep dive with Staff Sgt. (ret.) Kevin O’Rourke on his VA disability rating appeal for the back injury
      and opioid dependency that started after his 2012 surgery at Albany Med. Found the Department of New York American Legion
      website and realized those service officers can actually represent us.


      – Family: Labor Day 2024 at Mom and Dad’s in Latham, watching Kelly and Ryan argue about money and hearing that the
      Legion post in Clifton Park helped cover part of Emma’s summer camp cost when they were behind on school fees.


      All of this points to the same thing: stop white‑knuckling it alone. Call the service officer, schedule a follow‑up
      with Dr. Harrington, keep walking the Mohawk path three times a week, and be honest with Erin about how bad the anxiety
      gets on patch nights.'
