      • a demonstration site for Mom’s Sacramento church senior walking group, including Mrs. Zhang, who’s used a walker since
      her 2021 hip surgery and who we’ve been planning around since Fall 2022;

      • an informal after-school hangout and safe walking/biking route for kids from Sunrise Elementary School – especially
      Evelyn (Evie) and Lucas – since we’ve been trying since August 2023 to get them out of the car line and walking through
      the mobility hub and plaza after that May 2023 near-miss crash at the school pickup loop;

      • and a quarterly community event space with Daniel’s Riverbend High School physics club starting October 2024 (EV technology
      demo, solar telescope night, etc.) so his students can get the 20 volunteer hours they need after the district cut the
      paid lab aide positions last year.


