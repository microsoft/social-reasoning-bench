  negative_info:
  - field_id: project_information.students_target_group_description
    field_label: Students Target Group Description
    negative_info:
    - detail: Right now I only have about 10–12 students who are actually interested enough to commit to participating, and
        several of them are kids who tend to get pulled from electives for behavior or missing work in other classes.
      why_negative: Grant reviewers and campus administrators may worry that the project is too small in scope to justify
        funding and that it is effectively being used as a holding space for behavior or academic problems rather than a thoughtfully
        selected instructional target group, undermining impact and instructional rigor.
      answers_question: Describes the size and characteristics of the target student group
      artifact_embedding_hint: Email draft to the campus instructional coach explaining who he’s thinking of targeting with
        the project
    - detail: Most of the students I’m planning to target are the ones who didn’t really engage with our last STEM club activities
        and dropped out halfway through the semester when it got more challenging.
      why_negative: This signals to the Foundation that the same students have a track record of low follow-through with similar
        opportunities, which may make the project look risky in terms of participation, completion, and measurable outcomes.
      answers_question: Explains which students are being targeted based on past participation and engagement
      artifact_embedding_hint: Reflection note in a personal planning Google Doc about which students to recruit for the new
        grant project
    - detail: I’m mainly planning to recruit my own 7th period class because it’s convenient to keep them after school, even
        though they’re a really mixed group and not all of them are actually that interested in science or STEM.
      why_negative: To reviewers, this suggests the target group is chosen for teacher convenience rather than clear instructional
        need or student interest, which undermines the project’s intentional design and could make it look like extended class
        time rather than a focused, innovative program.
      answers_question: Describes how the target group will be selected and why
      artifact_embedding_hint: Casual text to a colleague about how he’ll probably just use his 7th period students as the
        project group
  - field_id: project_information.description_of_the_project
    field_label: Description Of The Project
    negative_info:
    - detail: This project is basically a second attempt at the makerspace drone unit I tried to roll out last year, but that
        fizzled out halfway through the semester when I got too busy to keep it going and the kids lost interest.
      why_negative: Grant reviewers and campus administrators may see this as evidence that similarly structured initiatives
        have already failed in his classroom due to his time management and student engagement issues, making them doubt the
        feasibility and sustainability of funding a nearly identical project.
      answers_question: Explains the background and nature of the proposed project
      artifact_embedding_hint: Reflective journal entry or Google Doc planning notes summarizing past efforts while brainstorming
        how to improve the new proposal
    - detail: I haven’t nailed down the exact lessons yet, but the general idea is to buy a bunch of cool gadgets for the
        makerspace and then figure out how to work them into the 7th grade science curriculum once everything arrives.
      why_negative: Foundation staff may interpret this as a vague, materials-first idea without a clear instructional plan
        or standards alignment, suggesting the project is driven by acquiring equipment rather than well-designed learning
        outcomes, which undermines its competitiveness for an "innovative teaching" grant.
      answers_question: Describes how the project will be implemented and integrated into instruction
      artifact_embedding_hint: Informal email to a colleague or the instructional coach tossing around ideas for a grant concept
    - detail: If this gets funded, I’m hoping it will make my life a little easier during testing season because I can set
        up independent stations and let the kids work mostly on their own while I catch up on grading and paperwork.
      why_negative: Reviewers may view this as self-serving and misaligned with the grant’s intent, implying the primary motivation
        is teacher convenience rather than student learning or innovation, which could lead administrators and the Foundation
        to question the educational value of the project.
      answers_question: Describes intended classroom use and impact of the project
      artifact_embedding_hint: Text message or chat to a fellow teacher venting about workload and explaining a side benefit
        of the proposed project
