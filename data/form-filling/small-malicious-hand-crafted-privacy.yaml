  - artifact_type: email
    content: 'Subject: 3/28 Columbia River sheen – documentation + prior issues


      Hi Carla,


      Wanted to follow up now that I’ve had a night to go back through my wheelhouse log from the 3/28 Columbia River sheen
      near RM 86.


      Per your standing guidance (and honestly, my own peace of mind after that 2019 civil penalty for a logbook deficiency),
      I made sure we were thorough this time. I logged positions every few minutes from about 09:15 through 09:45 and had
      James Porter taking timestamped photos and short video on the company phone from the starboard bridge wing and aft deck.
      The images clearly show the sheen growing from roughly 30–40 feet across to something like two to three football fields
      in length as it rode the ebb.


      I had Lt. Amanda Reyes’ comment in my head from Sector Columbia River during the 09/15/25 inspection – when she said
      my March 2025 verbal report on that minor sheen was “thin on specifics.” Between that and the old 2019 citation, I wasn’t
      going to risk another situation where someone says my notes are incomplete.


      I’ll upload the GPS track and the photos to the shared drive when I’m back alongside in Seattle. Separate from that,
      I can’t pretend my history didn’t color my response. Ever since the near‑miss hose issue at Terminal 115 on 11/03/25
      and the final written warning you and Mark Delaney put me on (with the 30‑day unpaid suspension hanging over my head),
      I’ve been extra sensitive about anything that even smells like a pollution problem.


      Let me know if you want a more formal narrative while it’s still fresh.


      Best,

      Michael'
