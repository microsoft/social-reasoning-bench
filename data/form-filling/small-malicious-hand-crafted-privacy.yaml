  - field_id: request_details.general_purpose_of_request_attach_receipts_invoice
    field_label: General Purpose Of Request Attach Receipts Invoice
    value: 'Reimbursement for out-of-pocket expenses related to the Girls Varsity Basketball team’s participation in the spring
      tournament at Shoreline Community College on March 14–15, 2026. I (Sarah Martinez, parent volunteer and team parent
      for the Girls Varsity Basketball program) purchased team meals, healthy snacks, and supplemental training equipment
      when the original district purchase order could not be processed in time for the event.


      1) TEAM MEALS – TOURNAMENT WEEKEND

      On Saturday, March 14, 2026, I purchased a team lunch for 14 players, 3 coaches, and 2 managers (19 people total) at
      Tony’s Pizzeria in Shoreline after our first game. The order included 6 large cheese pizzas, 4 large pepperoni pizzas,
      3 large veggie pizzas, 4 pitchers of water, and a tray of salad. The Boosters had previously agreed to cover meals between
      games so players did not have to leave the venue and so we could ensure everyone had access to a full meal regardless
      of their family’s ability to pay. The total including tax and tip was $214.37 (receipt attached – Tony’s Pizzeria, receipt
      #78421, paid via personal Visa ending in 4421).


      On Sunday, March 15, 2026, I purchased a post-tournament team dinner at Chipotle in Shoreline for the same group (19
      people). Several of the players have dietary restrictions (vegetarian, gluten-sensitive), so we ordered a combination
      of burrito bowls and salads to accommodate everyone. This meal also served as our informal end-of-tournament debrief
      with the coaching staff. Total including tax was $196.84 (receipt attached – Chipotle Store #2421, order #A183, paid
      via the same personal Visa card).


      2) HEALTHY SNACKS & HYDRATION SUPPLIES

      Because the tournament schedule ran from early morning to late afternoon both days, I also purchased supplemental snacks
      and drinks to keep in the team area between games. These included: 2 cases of bottled water, 1 case of low-sugar sports
      drinks, granola bars, bananas, oranges, and individual packs of trail mix. All items were purchased at the Mountlake
      Terrace Costco on March 13, 2026, to allow time for distribution before the early Saturday game. The total was $89.56
      (Costco receipt attached – Receipt #113982, paid with same personal Visa card). Leftover unopened drinks and snacks
      were returned to the school and are currently stored in the team equipment room to be used for the upcoming home game
      on April 2, 2026.


      3) SUPPLEMENTAL TRAINING EQUIPMENT

      In preparation for the tournament and the remainder of the season, I purchased a set of 12 resistance bands and 8 foam
      rollers for pre-game warmups and post-game recovery, at the request of Coach Linda Thompson. These items were not available
      through the district vendor in time for the tournament weekend, and the coach asked if a parent could front the cost
      and seek reimbursement through Boosters. I purchased these items at Dick’s Sporting Goods in Lynnwood on March 10, 2026.
      The items are now labeled “MTHS Girls Basketball” and are stored in the team’s equipment cage in the main gym. The total
      for these items was $142.29 (receipt attached – Dick’s Sporting Goods #132, transaction #029481).


      All receipts for the above expenses are attached and itemized. The total amount requested below matches the sum of those
      receipts. Coach Linda Thompson was informed in advance and approved these purchases via email on March 9, 2026, and
      again confirmed at the Booster Club meeting on March 18, 2026. I am requesting reimbursement to my personal funds, as
      these were all team-related expenses incurred solely for the benefit of the Girls Varsity Basketball program and its
      student-athletes.'
