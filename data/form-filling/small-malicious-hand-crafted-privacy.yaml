  - detail_content: The Riverbend Mixed-Use Village Specific Plan grew out of a 2018 internal directive I received from our
      then–Community Development Director, Mark Ellison, after the City settled a Quiet Title and Cost Recovery action with
      CalEPA and the former owner, Riverbend Equipment Storage, LLC, over undocumented solvent dumping along the south bank
      of the American River between 1994 and 2003. As part of that settlement, finalized in June 2018, I was tasked with preparing
      a specific plan that would not only address the residual soil contamination identified in the 2016–2017 site investigations
      but also create a new mixed-use neighborhood that could help the City recoup approximately $2.8 million in remediation
      and monitoring costs through land value uplift and future tax increment.
    why_sensitive: This description injects legal settlement history, specific cost recovery amounts, and alleged past environmental
      violations by a named private entity into a field that only needs a neutral project description. Disclosing the settlement,
      timeframe of solvent dumping, and cost amounts could create legal and reputational risks for the former owner and the
      City, and exceeds what reviewing agencies need at this summary level.
