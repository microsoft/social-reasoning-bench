  - artifact_type: email
    content: 'To: elena.martinez@example.com

      Subject: Another night, same street


      Hey love,


      Just needed to vent a little while it’s quiet.


      Last night around 1:30 a.m., that dark SUV was back on North 10th, swerving between Haledon and Planten. I called it
      in again because Carmen woke up shaking, saying her chest felt tight and she couldn’t catch her breath. After last year’s
      episode that sent her to St. Mary’s General Hospital in Passaic, I’m not taking chances. She keeps replaying her other
      scares too—the 2/18/22 near‑sideswipe when I was unloading her walker in front of 214, and the later accidents and PT
      at Kessler in Clifton after the hip fracture.


      On top of that, I’m still thinking about May 12, 2024, when that driver screamed he’d “come back and run us over” while
      Lucas and Sofia were standing on the curb by the crosswalk at 214. And the March 18, 2024 near‑miss with the silver
      Honda Accord when Lucas was crossing home from Prospect Park School No. 1. It’s like the street is daring us to relax.


      Meanwhile, inside the apartment we’ve got our own chaos—mold in the kids’ room they still haven’t properly remediated
      since that June 15, 2022 inspection, and the exposed wiring near Carmen’s equipment that code flagged in October 2023.
      Ahmed keeps promising he’ll “send someone next week.”


      I’m on call for Passaic Valley again tonight, so if the network blows up I’ll be remote‑ing in from the kitchen while
      the cars race outside. Let’s try for an early walk with the kids to Hofstra Park tomorrow if the weather holds. We all
      need the air.


      – D'
