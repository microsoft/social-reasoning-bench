    background_context: 'This is Michael, a 43-year-old towing vessel captain who has spent most of his adult life working
      the waters of Puget Sound and the Columbia River. He lives with his wife Emily and their two kids, Sophia (13) and Jake
      (9), in a modest but comfortable three-bedroom house in Seattle’s Georgetown/South Park area, not far from the Duwamish
      River. The house is close enough to the industrial waterfront that he can sometimes hear tug horns at night, something
      he secretly likes because it feels like an extension of his work life. Emily works part-time as a physical therapist
      at a clinic near Beacon Hill, which gives her enough flexibility to handle school pickups when Michael is away on multi-day
      jobs.


      Michael’s work with Seaside Towing & Marine Services, LLC is steady but demanding. As master of the M/V Seaside Mariner,
      he typically works a rotation of 7–10 days on the vessel followed by 4–5 days at home, though the schedule can shift
      with weather, barge movements, and last-minute calls from dispatch. He spends a lot of time moving gravel, lumber, and
      container barges around Puget Sound and up and down the Columbia River system. The recent incident on March 28, 2026,
      near Longview added a layer of mental strain; he’s been replaying the sequence of events in his head, double-checking
      in his mind that his crew did everything right and wondering what the environmental impact will be. Back home, he’s
      mentioned it to Emily a few times over late dinners, more as a way of processing the stress than anything else. She
      listens, asks a few questions about the safety of his job, and then gently steers the conversation toward the kids and
      weekend plans.


      Day to day, Michael is juggling the realities of a maritime career with being present as a dad. When he’s in port in
      Seattle, his mornings start before sunrise: a quick cup of strong black coffee, checking the marine forecast on his
      phone, and scanning overnight emails on his work account (m.thompson@seaside-towing.com) before heading down to the
      Seaside Towing dock. If he’s home on an off-rotation stretch, his mornings look different—packing Sophia’s lunch, reminding
      Jake to actually put his homework in his backpack, and dropping them off at their middle and elementary schools before
      swinging by the grocery store or getting the truck’s oil changed. He tries to make it to Sophia’s weekend soccer games
      and Jake’s Saturday morning Little League practices whenever he’s not on the boat, and the kids have learned that sometimes
      “Dad might be on the river” means he’ll be cheering them on via text afterward instead of from the sidelines.


      Michael grew up in Tacoma, the son of a longshoreman and a part-time librarian. His dad, Bob, is retired now and still
      lives in Tacoma with Michael’s mom, Linda. They’re proud that their son followed a maritime path but worry about the
      long hours and rough weather. Michael took the marine technology program at Seattle Central right out of high school,
      then worked his way up from deckhand to mate and eventually to master. He still keeps a dog-eared notebook of his early
      days on tugs—old routes, harbor notes, and funny quotes from crusty captains he learned under. He stays current on his
      licenses and endorsements, taking required refresher courses every few years at local maritime training centers, and
      he actually enjoys the classroom time as a break from the constant hum and vibration of the tug.


      At home, the Thompsons are in that stage of life where everything feels like a balancing act. Money is okay but not
      abundant: they’re still paying off a chunk of their mortgage and the used Subaru they bought for Emily last year when
      their old sedan finally gave up. They’re also starting to think about college savings for Sophia, who has lately been
      talking about marine biology after a school field trip to the Seattle Aquarium. Michael smiles at that, torn between
      wanting her to have a safer, more predictable career and being secretly pleased that she shares his connection to the
      water. Jake, on the other hand, is obsessed with baseball and video games, and he loves telling his friends that his
      dad “drives big boats” for a living.


      Recent months have brought a few changes and low-level worries. In January 2026, Seaside Towing picked up a new contract
      that has Michael spending more time on Columbia River runs, which means slightly longer stretches away from home. Emily
      has been supportive but has also admitted it’s harder when both kids have overlapping activities in the evenings and
      he’s not around. Michael has started using a shared family calendar app more religiously, blocking out his known voyage
      dates and trying to plan dentist appointments, school conferences, and his parents’ visits around his schedule. He’s
      also been dealing with a nagging shoulder ache from years of climbing ladders and handling lines; his doctor has recommended
      physical therapy and some strengthening exercises, which he’s been sporadic about doing.


      Despite the long hours and occasional strain, Michael genuinely likes his work. He enjoys mentoring younger deckhands,
      especially when they show real interest in learning navigation and ship-handling instead of just watching the clock.
      He keeps in touch with a couple of former crewmates who moved on to bigger companies or harbor pilot programs, trading
      stories by text when they’re in port. On quieter evenings aboard the Seaside Mariner, he’ll sit in the wheelhouse with
      a thermos of coffee, listening to the radio traffic and watching the lights along the shoreline slide by, thinking about
      future vacations—maybe a family road trip down the Oregon Coast this summer if his schedule and the kids’ camps line
      up.


      Looking ahead, Michael’s main concerns are practical: staying healthy enough to keep working on the water, making sure
      his kids feel like he’s truly present even when he’s gone for a week at a time, and keeping his professional reputation
      solid in a region where the maritime community is small and word travels fast. The recent oil sheen incident on the
      Columbia has made him more reflective about the environmental stakes of his industry and the importance of good seamanship.
      It hasn’t shaken his love for the job, but it has reinforced his sense of responsibility—to his crew, his family, and
      the waterways that have defined his life and livelihood.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Longview sheen + why I was so amped up


      Em,


      Finally have a quiet stretch in the wheelhouse, figured I’d write instead of letting this just rattle around in my head.


      That fuel sheen we saw near Longview on 3/28 has been sticking with me, not just because of the smell and the rainbow
      on the water, but because of all the baggage I brought into it. I keep thinking back to that near-miss oil transfer
      hose scare at Terminal 115 on 11/03/25. Remember when I told you I misread the manifold pressure gauge and Mark Delaney
      and Carla Ruiz had to step in? Seaside put me on that final written warning afterward and made it clear a 30‑day unpaid
      suspension was on the table if I had any more pollution‑related screwups.


      So when this Columbia River thing kicked off around 09:20, I was already wired. I probably went overboard on the caution
      and documentation because of that warning. On top of that, it pushed some of the same buttons as the 2022 man‑overboard
      near Buoy 14. The diesel smell, the way the sheen spread with the current – it all hit that same “uh‑oh” feeling Dr.
      Li and I have been talking about since I started seeing her at Sound Mind Behavioral Health back in June 2024.


      Honestly, I was also thinking about your dad’s heart attack on 2/10 and the $450/month we’re shelling out to Swedish
      First Hill for his rehab and meds. I can’t afford to miss a paycheck by getting hurt trying to fix someone else’s spill.


      Kids doing okay tonight? Tell Soph I want a full soccer recap and remind Jake to practice his swing.


      Love,

      M'
