  - artifact_type: email
    content: 'Hi Alison,


      Sorry for the late-night ramble – just needed to get this off my chest to someone who remembers me before all the court
      stuff and kids’ appointments.


      I was sorting paperwork earlier and came across the sheriff court contact order from Glasgow Sheriff Court dated 22
      September 2023. It’s the one that lists all three kids in the schedule – “Emily Rose Mitchell (born 14/07/2010), Jacob
      Daniel Mitchell (born 03/11/2012) and Chloe Anne Mitchell (born 21/02/2017)” – and sets out the residency and overnight
      contact with Mark.


      Reading it again made me so sad. Seeing our whole life boiled down into paragraphs about “residency” and “alternate
      weekends” is grim. It brought back that day in court, sitting there while they went through where the kids would sleep
      on which nights like we were dividing up furniture instead of human beings.


      Practically, it has helped a bit – at least now there’s something written down when Mark starts pushing for extra overnights
      without notice. But it doesn’t stop Emily slamming doors when she has to go, or Jacob getting stomach aches on Fridays,
      or Chloe coming back overtired and wired.


      Meanwhile, normal life chugs on. I’m still at Bishopbriggs Primary four days a week, doing phonics with the P3s and
      trying not to cry when I see kids with both parents at pick-up. Emily’s deep in S3 drama about subjects and skincare,
      Jacob’s glued to his Nintendo and football scores, and Chloe’s currently obsessed with cartwheeling from the living
      room to the kitchen.


      Anyway, just wanted to say thanks for being the friend who still asks about me, not just the kids.


      Love,

      Sarah'
