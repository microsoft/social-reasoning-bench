      \ to self:\n\n1. Chè đậu xanh – lower sugar version\n   - First big change: July 25, 2021.\n   - Cut white sugar by\
      \ ~1/3, added more mung beans for texture.\n   - Swapped some of the full-fat coconut milk for evaporated milk + a bit\
      \ of coconut extract.\n   - Note from recipe notebook (Aug 15, 2021): “Adjusted coconut milk + sugar in chè đậu xanh\
      \ for Mom’s prediabetes. Fasting numbers from July–September 2021 trending down slightly.”\n\n2. Tracking Mom’s fasting\
      \ blood sugar\n   - Since her July 2021 prediabetes diagnosis, she texted me her fasting blood sugar reading every morning\
      \ for about three months.\n   - Goal was at least three months of daily fasting blood sugar readings (July–September\
      \ 2021) while we adjusted recipes.\n   - I logged them in a simple spreadsheet: columns for date, reading, what she\
      \ ate the night before, and whether we used the “new” chè recipe.\n\n3. To try next:\n   - Re-test the original chè\
      \ recipe but with stevia + less sweetened coconut milk.\n   - Ask Mom at Sunday dinner if she’s still getting her labs\
      \ checked regularly at the clinic.\n   - Print a simplified recipe card in big font so she can share it with her coworkers\
      \ at the long-term care home."
