  - artifact_type: note
    content: 'Working outline / brain dump – school & childcare outbreaks


      1. Ridgeview Elementary – Caleb’s 4th grade COVID exposure

      - Timeline: August 15–October 30, 2022

      - Focus: communicable disease case reports, internal emails, and complaint records that reference Ridgeview Elementary
      or specifically mention my son, Caleb James Thompson, in connection with the COVID-19 exposure incident in his 4th grade
      classroom.

      - Personal angle: my complaint to Clay County Public Health Center about the way the school and health department handled
      notifying parents (slow, confusing, inconsistent).

      - Questions to explore: Did internal emails show confusion about who should call families? Were there delays in logging
      the classroom exposure as an official case cluster?


