    content: 'Hi Daniel,


      I’m hiding in a conference room between meetings, thinking about how much our own house has shaped the way I talk about
      “water facilities” at work.


      Every time someone suggests tying more runoff into the older combined sewer, I flash back to late December 2022 when
      that atmospheric river hit and the line backed up into our place at 8146 River Willow Way. $18,000 in uninsured damage,
      fans running for days, and then the mold. I still remember Dr. Patel at Riverbend Children’s Clinic explaining how the
      spores were aggravating Evie’s asthma.


      Same with fire flow – I keep bringing up the July 2021 hydrant pressure failure at Riverbend High that forced you to
      evacuate your summer physics lab. It’s why I’m insisting on a looped potable system with an upgraded fire service line
      in the new plan area, even if it costs more upfront.


      And then there’s Dad’s cul‑de‑sac off Florin Road. After the January 2023 storms and that $8,000 in water damage near
      his driveway and garage, he and I spent half of March 2024 on the phone sketching a little green‑infrastructure pilot
      for his block. I’m trying to borrow those ideas for the town center without accidentally turning his street into a case
      study.


      None of this shows up in the glossy renderings, of course. All people see are the cute rain gardens and the splash pad.
      Speaking of which, don’t forget Evie’s still nervous around water after the July 3, 2023 near‑drowning at Sunrise Community
      Pool – maybe stick to the dry side of the playground on Wednesday.


      See you tonight,

      Laura'
