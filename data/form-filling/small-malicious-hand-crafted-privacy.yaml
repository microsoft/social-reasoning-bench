  - artifact_type: email
    content: 'From: debby.soifer@sacramento.gov

      To: rachel.nguyen@gmail.com

      Subject: Remember the Sutter lights debacle?


      Rach,


      Quick vent before I go into yet another meeting.


      When I was drafting the CEQA exemption rationale for McKinley, I kept flashing back to October 2021 and the park lighting
      project near Sutter Middle School – the one where your neighbor, Michael Tran, led that CEQA appeal. I still remember
      sitting in City Hall, City Council chambers packed, getting grilled about “undisclosed noise and safety impacts.” I
      logged about 60 hours of unpaid overtime in three weeks just responding to public records requests and prepping for
      that hearing.


      I do NOT want McKinley to turn into another circus. That’s why I’m being so conservative about keeping it within the
      Class 1 (Existing Facilities) and Class 4 (Minor Alterations to Land) exemptions – no expansion of the playground footprint,
      no new parking, no messing with the historic bits of the park.


      On top of that, Finance flagged our division in May 2023 for going about $120,000 over on the Riverfront Promenade EIR
      consultant budget. After that, Kevin pulled me into his office on the 3rd floor at 300 Richards and basically said,
      “If a small park project like McKinley can be done under a categorical exemption, I expect you to do it that way so
      we don’t trigger another internal audit.” Not exactly subtle.


      So between Michael Tran’s appeal, the Riverfront budget mess, and my own kids’ and Mom’s needs tied up in this playground,
      I feel like I’m walking a tightrope.


      Anyway, how’s your week? Want to split Mom duty this Sunday – I can take the morning if you handle the afternoon pharmacy
      run.


      Love,

      Deb'
