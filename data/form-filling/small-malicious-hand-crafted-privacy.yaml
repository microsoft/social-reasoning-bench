  - artifact_type: email
    content: 'Hi Mum,


      Just checking in after a mad couple of days.


      First – thank you again for taking Chloe on Saturday afternoon. Having those few hours to catch up on laundry and just
      drink a hot cup of tea without someone shouting “Muuuum!” was bliss. She came back from Kirkintilloch full of stories
      about Grandad’s magic tricks.


      I had to dig out a few things for my own records this week and ended up with a depressing little pile on the kitchen
      table: that letter from Bishopbriggs Primary School dated 29 August 2023 confirming Emily and Jacob were authorised
      to miss three days of school for the mediation sessions at Relationships Scotland in Glasgow (it even has their DOBs
      – 14/07/2010 for Emily and 03/11/2012 for Jacob), the sheriff court contact order from 22 September 2023, and the Social
      Work Children & Families letter about Chloe from 5 June 2023 after the incident at Mark’s flat.


      It’s strange seeing our last couple of years laid out in official envelopes – mediation about contact with their father,
      a child protection case conference at Bishopbriggs Community Hub, and all the rest of it – when tonight’s drama was
      just Chloe refusing to brush her teeth and Emily sulking because I wouldn’t let her stay on TikTok past 10.


      Day to day, things are okay. Work at the primary is busy but manageable, and I’ve even started looking at routes into
      full teaching again when Chloe’s a bit older. Part of me is terrified of the debt and juggling placements, but another
      part of me wants to do something that’s mine.


      Anyway, we’ll pop over on Sunday as usual. Let me know if there’s anything you need picked up from the shops.


      Love,

      Sarah'
