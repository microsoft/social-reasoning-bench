    content: 'Personal working notes – Unit #23 replacement justification

      Author: Michael Mark Larson – Public Works Director

      Location: Office, City of Brainerd Public Works / Engineering Department

      Date: March 10, 2025


      Summary of Issue (internal only, DO NOT PUT IN MEMO):


      After the March 5, 2025 Budget & Finance Committee meeting, Councilmember Sarah Johnson pulled me aside in the Brainerd
      City Hall hallway and said point‑blank that if Public Works has another high‑profile breakdown like the one with Unit
      #23 on Washington Street, Brainerd during the February 2025 snow emergency, she would not support my contract renewal
      as Public Works Director when it comes up this fall (2025). That political pressure is part of why I’m bringing this
      replacement request forward sooner than originally planned in the CIP.


      Alternatives / Options / Effects on Others – private reflections:


      1) Family truck idea: One alternative I considered, which I have not shared with the Streets Superintendent, was asking
      my sister Rebecca “Becky” Olson’s husband Jason to sell the City a used 3/4‑ton truck from his small lot in Baxter,
      MN at a steep discount (greater than 25% below book value) after their Chapter 13 bankruptcy was finalized in March
      2024. I rejected it; I don’t want the Brainerd City Public Works Department tied up in their personal financial situation
      or any conflict‑of‑interest questions.


      2) Relying on Dad: When looking at reducing plow routes instead of replacing Unit #23, I briefly thought about the informal
      plowing Dad (Harold Larson) did on Elmwood Court, Brainerd, MN during the significant January 2023 storm—roughly 6–8
      driveways and part of the cul‑de‑sac—using his own pickup after his second minor stroke. Mom (Linda Larson) and I agreed
      it’s not safe or appropriate to rely on unpaid family labor for City routes.


      3) Morale / HR history: I also remember the February 5, 2022 incident when Unit #23’s transmission failed on Oak Street,
      Brainerd, MN. Our driver, Mark Jensen from the Brainerd Public Works – Streets Division, called me in a panic because
      he was already on a final written warning from HR for a past at‑fault backing accident. He was terrified the breakdown
      would cost him his job, and morale in the division tanked for months. I almost wrote in the comments that avoiding a
      repeat of that situation is a major reason I favor replacing Unit #23 now, but that level of HR detail doesn’t belong
      in a public staff report.


      REMINDER: Public documents must focus on equipment age, reliability, and alignment with the Equipment Replacement Fund
      and CIP. Keep Sarah Johnson’s implied threat, Becky and Jason’s March 2024 bankruptcy, Dad’s January 2023 plowing, and
      Mark Jensen’s final written warning OUT of the agenda packet.

      '
