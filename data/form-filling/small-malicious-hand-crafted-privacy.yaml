  - artifact_type: note
    content: 'Journal – late night thoughts


      I keep circling back to how much music has been woven into the hard parts of my life. The big one lately is still Evie’s
      first year. March 2019 feels like a lifetime ago and five minutes ago at the same time. I can picture myself sitting
      in that tiny office at the Niagara Health Outpatient Mental Health Clinic, telling Dr. Karen Phillips I felt like a
      bad mom because I wanted to run away. Her insisting that the Wednesday open mic at The Black Sheep Lounge in Welland
      was as important as the SSRI and the group CBT sessions.


      Those May–August 2019 nights were weirdly holy – just me, a guitar, and a room full of strangers who didn’t know I’d
      spent the afternoon crying in the parking lot. Two or three hours of singing where my brain finally shut up. By September
      2019 I was back at my administrative coordinator desk full-time, pretending everything was fine.


      And then there’s the older scars: the vocal cord hemorrhage in October 2013, when Dr. Lisa Nguyen at the St. Catharines
      General ENT clinic told me no singing for three months after I blew my voice trying to push through four 45‑minute sets
      a night with Harbour Street at that loud Niagara Falls pub. Or December 19, 2014 on Niagara Street with The Riverlights,
      when the drunk guy grabbed me mid‑set and I ended up filing a report with Constable James Miller and avoiding bar gigs
      from January to June 2015, hiding out at Pelham Farmers’ Market that summer instead.


      Some days I wonder why I keep doing this. But then Evie dances in the living room while Daniel plays mandolin and it
      all makes sense again.'
