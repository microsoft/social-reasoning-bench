  - artifact_type: note
    content: 'Sunday night planning – 2024-10-06


      Right, deep breath. Next few weeks look hectic.


      Money: The new Universal Credit award letter from the Department for Work and Pensions came on 1 October 2024 – shows
      the child elements for Emily, Jacob and Chloe with their full names and dates of birth, and that monthly payment of
      £1,186.40 now that Mark’s stopped paying child maintenance altogether. Need to sit down with a proper budget: rent,
      gas/electric, school lunches, Emily’s bus pass, Jacob’s football subs, Chloe’s gymnastics class. Remember October is
      always expensive with uniforms needing replaced.


      Kids’ stuff: Emily – keep nagging about S3 homework and remind her options choices are coming up after Christmas. Try
      to get one calm chat a week where we don’t end up arguing about her phone. Jacob – Wednesdays 4 pm CAMHS at Glasgow
      Royal with Dr. Fiona McLeod; leave school by 2:30, pack snacks so he’s not starving and bouncing off the walls. Chloe
      – watch for any wobbliness about going to Mark’s; that Social Work letter from June 2023 is a good reminder to trust
      my gut.


      Self: Yoga at Bishopbriggs Community Centre on Thursday if I can rope Mum into taking Chloe. Back’s been bad again after
      lugging shopping up to the flat. Try to be in bed by 11 at least three nights this week.


      House: Meal plan, wash school uniforms, clear the hallway corkboard so I can actually see what’s coming up.


      You’re doing your best. One week at a time.'
