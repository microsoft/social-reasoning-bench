  - artifact_type: email
    content: 'Subject: Quick update on Dad + VA stuff


      Hey Kel,


      Finally coming up for air and wanted to fill you in a bit more on what’s been going on with Dad and the VA side of things.


      You probably already heard the short version from Mom, but when Dad had that PTSD flare-up last March and ended up at
      Albany Stratton VA Medical Center for three days, his counselor there, Dr. Lisa Harrington, really lit a fire under
      me. She sat with us in one of those tiny offices on the behavioral health floor and basically said, “You both need more
      support than 20-minute med checks.” She kept coming back to the American Legion service officers in the Capital Region
      and how they could help us untangle both his old Vietnam disability paperwork and my own pending claim.


      Between that and what you said at the Labor Day cookout in Latham, about being behind on Emma’s school fees again and
      how the Legion post in Clifton Park helped cover part of Emma’s summer camp cost last year through their hardship fund,
      it kind of connected the dots for me. It’s not just about parades and flags—they’re actually helping families like ours
      keep their heads above water.


      I’ve started making myself a little to‑do list: call the service officer Dr. Harrington mentioned, pull Dad’s records,
      and finally stop ignoring my own stuff. Nothing dramatic, just baby steps. We can talk more Sunday when I swing by Mom
      and Dad’s after church.


      Love,

      Mike'
