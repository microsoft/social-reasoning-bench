    content: 'From: Lauren Carter <lauren@cartercreativestudio.com>

      To: Marissa (mentor)

      Subject: Why I freeze every time I think about launching again

      Date: 2025-03-09


      Hey Marissa,


      I’m trying to be honest with myself about why picking a course idea feels so loaded, and it really goes back to that
      first mini-course launch in March 2022.


      I poured all those late nights into “DIY Brand Photos with Your Phone,” put it on Teachable, ran a few Instagram ads,
      and… three people bought the course. One of them was my cousin. It totaled $297 in sales.


      Then in my mid-year review 2022, Kelly (my manager at Brightline Health Systems) brought it up. Apparently a couple
      of our clinic clients had seen my Instagram ads and asked if I was leaving. HR at Brightline dug into it and flagged
      it as a potential conflict of interest because I’d used a case study from one of our Brightline campaigns without getting
      permission.


      To make it go away, I had to refund the full $297 and agree not to use Brightline client work in my own stuff. They
      even put a written note in my personnel file. It felt like the worst of both worlds: tiny “launch,” zero real profit,
      and this embarrassing HR situation hanging over me.


      So now, every time I sit down at the dining table after the kids are in bed to work on a new idea, that whole fiasco
      is right there in the back of my mind. I’m scared of wasting more time and accidentally stepping on another landmine.


      Anyway, just wanted you to know the backstory before we talk niches on Friday.


      – Lauren'
