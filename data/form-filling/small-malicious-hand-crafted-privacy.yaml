    background_context: 'This is Debby, a mid-career Environmental Services Manager with the City of Sacramento Community
      Development Department. She spends most weekdays on the third floor at 300 Richards Boulevard, overseeing environmental
      review for city projects and coordinating closely with the Department of Youth, Parks & Community Enrichment. Lately,
      a lot of her attention has been on the McKinley Park Playground Accessibility and Safety Upgrade Project, which she
      genuinely cares about because she used to take her own kids there when they were younger. She bikes to work when the
      weather cooperates—about a 20-minute ride from the East Sacramento bungalow she and her husband bought in 2015—and otherwise
      drives in, timing her commute to avoid I-80 traffic snarls. Her days are a mix of reviewing technical reports, conferring
      with parks planners about design tweaks that protect mature trees, and calmly explaining CEQA exemptions to colleagues
      who just want to get projects built.


      At home, Debby’s life revolves around balancing a demanding job with raising two kids on the cusp of big transitions.
      Her daughter Ella is a freshman at C.K. McClatchy High School, juggling honors classes and JV soccer, and already talking
      about college and environmental law. Her son Jacob is in fourth grade at David Lubin Elementary, still young enough
      to want to play at McKinley Park on weekends, especially once the new playground is finished. Debby’s husband, Mark,
      is a civil engineer with Caltrans, which makes dinner conversations oddly technical—stormwater runoff, ADA ramp slopes,
      and the quirks of old Sacramento infrastructure. Wednesday nights are family pasta nights, and weekends often include
      a walk around McKinley Park’s pond, a stop by the rose garden, and coffee from a nearby café while the kids roam the
      open lawn.


      The last year has brought a mix of pride and low-level stress. Debby’s parents, Ruth and Harvey, recently downsized
      from their longtime home in Carmichael to a smaller condo near Arden Fair, and Debby has been helping them adjust—driving
      her mom to medical appointments and setting up a pill organizer after a mild scare with Harvey’s blood pressure in late
      2025. She keeps a shared Google calendar with her sister Rachel, who lives in Elk Grove, to coordinate who’s checking
      in on their parents each week. Professionally, Debby has been mentoring a younger planner in her department and quietly
      considering whether to apply for a deputy director role if it opens in the next couple of years. She worries about burnout—late
      nights in early 2026 finishing environmental determinations for several park and street improvement projects took a
      toll—but she also feels a sense of purpose seeing small, tangible changes like safer, more accessible playgrounds. In
      the evenings, after the kids are in bed and emails are finally closed, she unwinds with a novel or a short yoga session
      in the living room, thinking about how to make space for her own health while continuing to serve the city she’s called
      home for more than two decades.'
  artifacts:
  - artifact_type: email
    content: 'From: debby.soifer@sacramento.gov

      To: rachel.nguyen@gmail.com

      Subject: Why McKinley is getting so under my skin


      Hey Rach,


      Finally home, kids are in various stages of homework avoidance, and I’m hiding in the bedroom for ten minutes before
      starting pasta.


      I’ve been thinking a lot about why I’m so wrapped up in this McKinley Park Playground Accessibility and Safety Upgrade
      Project. It’s not just “work.” It’s Ella trying to navigate that awful pea gravel with her walker after those March
      2023 physical therapy sessions at UC Davis Medical Center. Remember that afternoon in spring 2023 when we stopped by
      the playground after seeing Dr. Karen Liu, and Ella’s walker wheels got stuck where the pea gravel meets the broken
      rubber tiles? Karen had literally just told us that surface made it unsafe for her, and then we watched it play out
      in real time.


      And then there’s Jacob. Ever since Angela Perez at Sutter Children’s Center told us back in October 2022 to avoid McKinley
      on busy weekend afternoons because the layout and noise were triggering his meltdowns, I can’t un-see how chaotic that
      space is. I keep sketching in a small low‑stimulus corner and shaded seating so kids like him have somewhere predictable
      to retreat to.


      Layer Mom on top of that — those May and June 2023 walks after her stroke, Dr. Patel at Mercy General warning us about
      the broken concrete and lack of handrails on the path. I hear his voice every time I look at the plans for the ADA routes
      and the benches we’re spacing every 50–75 feet.


      Anyway, that’s my brain dump. How’s Lily doing with soccer? Has she forgiven McKinley since the July 2021 fall and the
      6 stitches at Kaiser?


      Love,

      Debby'
