  - artifact_type: email
    content: 'From: debby.soifer@sacramento.gov

      To: mark.soifer@gmail.com

      Subject: Long day, long rant (McKinley + kids + parents)


      Mark,


      You’re on pickup duty so I’m using my “commute” to decompress at my desk for a few minutes.


      We had another internal check‑in on the McKinley Park Playground Accessibility and Safety Upgrade Project. I pushed
      (again) to keep the scope strictly within the existing playground footprint so we stay clearly under the Class 1 and
      Class 4 categorical exemptions. After Ella’s fall from the old composite structure on March 18, 2023 at McKinley, I
      told my director I didn’t want to lose another year to a full EIR and $85,000 in consultant costs. If we stick with
      repair/replacement and minor grading, we can realistically have construction wrapped by August 2024, before school starts.


      Part of this is selfish: I want Mom to be able to walk the 0.3 miles from her H Street apartment to the park while she
      still can. Since her early‑stage Parkinson’s diagnosis at Sutter Medical Center back in February 2022, I’ve been coordinating
      with Lisa Hernandez in Parks to make sure the ADA routes, benches, and surfacing all stay in the “existing facilities”
      box so we can move fast.


      I also keep thinking about Jacob’s asthma attack during that dust‑fest of a street resurfacing job by McKinley in July
      2020. I already worked with Daniel Ortiz in Public Works to bake into the specs low‑dust practices and no work near
      the residential edge of the park between 3:00 and 5:00 p.m. on weekdays, when Jacob usually walks home from Sutter Elementary
      along Alhambra Boulevard. We can handle air quality with conditions instead of a full CEQA tome.


      Anyway, that’s my brain. What do you want on the grocery list besides tomatoes and bread?


      – D'
