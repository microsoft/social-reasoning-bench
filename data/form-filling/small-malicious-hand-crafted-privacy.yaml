  - artifact_type: note
    content: 'Working doc – Amici Park series 2025


      Big picture:

      I keep circling back to the idea of doing a small series of Community Arts & Culture Days at Amici Park instead of just
      one. March 30, June 8, maybe September 14 and October 5, 2025. Each one can quietly hold a different need.


      March 30: This one has to double as a soft fundraiser. After we lost that small operating grant from the San Diego Commission
      for Arts and Culture in December 2024, we’ve still got $1,860 in back rent hanging over us at the 1919 India Street
      studio. At the budget chat with Sofia at Caffè Italia on January 10, we agreed we need at least $2,500 in small art
      sales and donations that day to keep from breaking the lease and wrecking the org’s credit.


      June 8: Use this as the gentle grief‑through‑art day I’ve been dreaming about since Nonna Teresa’s stroke and her move
      to Sunrise in National City in August 2023. The informal grief circle I’ve been doing with a few Washington Elementary
      parents (including the mom whose husband died by suicide in October 2022) needs a public, non‑clinical space. We can
      frame it as “painting memories” and storytelling for kids and grandparents.


      September 14: Lean into being a welcoming, low‑pressure spot for families like Luca’s who are in the middle of San Diego
      County Child Welfare Services cases. Angela Ruiz at the Overland Avenue office specifically asked for community events
      that don’t feel like visitation rooms.


      Long term: use this year as a test run to see what kind of crowd we can realistically draw at Amici Park so we can plan
      a bigger, more polished event next year if capacity (and money) allow.

      '
