    value: 'I am the master of the towing vessel M/V Seaside Mariner, owned and operated by Seaside Towing & Marine Services,
      LLC, based in Seattle, WA. On the morning of 2026-03-28, while transiting southbound in the federal navigation channel
      of the Columbia River near river mile 86 (approximately 1.5 nautical miles northwest of the Longview, WA waterfront),
      we observed and were subsequently involved in a minor allision incident that resulted in a small but noticeable oil
      sheen on the water.


      At approximately 09:10 local time, we were towing an empty gravel barge (Barge ST-204) astern on a 600-foot wire, making
      about 5 knots over ground, inbound from Kalama toward the Port of Longview. Weather was overcast with light rain, visibility
      approximately 3–4 miles, wind out of the southwest at 10–12 knots, and a moderate ebb current. Traffic in the area was
      relatively light, with one upriver bulk carrier and a couple of small recreational fishing boats visible on radar and
      visually.


      As we approached a bend in the river, we noticed the coastal freighter M/V Pacific Horizon (blue hull, white superstructure,
      approximately 120–130 meters LOA) making a slow-speed maneuver in the vicinity of a privately owned fueling float on
      the Oregon side of the river. Through binoculars, we could see that the Pacific Horizon appeared to be making a wide
      turn to align for an upriver course and that a smaller bunker/fuel service vessel, later identified over VHF as the
      M/V Marisol (operated by Ramirez Coastal Transport, Inc.), was secured alongside the freighter’s port side.


      At about 09:18, while monitoring VHF Channel 13 and 16, we heard raised voices and some confusion on the Pacific Horizon’s
      working channel (Channel 12, as announced earlier in the morning). Within about a minute, we observed the Pacific Horizon’s
      stern swing slightly closer to the fueling float than seemed appropriate. Almost immediately after, the Marisol’s stern
      appeared to lose alignment and we observed what looked like the bunker hose between the Marisol and the Pacific Horizon
      go taut and then snap free or be rapidly disconnected.


      At approximately 09:20, we visually observed a dark, rainbow-edged sheen spreading on the water surface in the vicinity
      of the fueling float and the two vessels, roughly 150–200 yards off our starboard bow. The sheen initially appeared
      to be about 30–40 feet in diameter and expanded quickly with the current. We detected a moderate diesel or intermediate
      fuel oil odor downwind on our vessel. Based on my 18 years of experience on towing vessels and prior drills, the appearance
      and smell were consistent with a marine diesel or intermediate bunker fuel release, not gasoline.


      We immediately slowed our tow to bare steerageway, sounded internal notification to our company’s shoreside operations,
      and maintained a safe distance from the apparent spill area in order not to aggravate the spread or endanger our crew.
      I instructed my deckhand, James Porter, to take photographs and video with a timestamped company-issued smartphone from
      the starboard side of the wheelhouse and aft deck. Those images show the sheen extending downstream and slightly toward
      the Washington side of the channel over the next 10–15 minutes.


      We attempted to raise both the Pacific Horizon and the Marisol on VHF Channel 16 and Channel 13 to confirm whether they
      were aware of the spill and to ensure that they were notifying the Coast Guard and other authorities. We received a
      brief response from a heavily accented voice on the Marisol stating, in substance, that they had a ‘small fuel problem
      under control’ and that they were ‘already talking to the Coast Guard.’ However, we did not hear a clear, formal pollution
      report being made over Channel 16, which concerned me given the visible size of the sheen and the potential for it to
      spread with the ebb current.


      Out of an abundance of caution and in line with our company’s pollution reporting policy and my own obligations as a
      licensed mariner, I decided to contact the National Response Center directly once we were clear of immediate traffic
      concerns. We maintained a safe CPA from the incident area, maneuvered our tow slightly closer to the Washington side
      of the channel, and continued monitoring the situation visually. Over the next 20–30 minutes, we observed the sheen
      elongate and drift downstream, thinning out but covering a noticeably larger surface area, roughly the length of two
      to three football fields as best as we could estimate from our position.


      No injuries were observed from our vantage point, and we did not see any persons in the water. We did notice at least
      two individuals on the deck of the Marisol moving quickly around the manifold area and what appeared to be absorbent
      pads or boom being deployed over the side. The Pacific Horizon remained in the general vicinity, making minimal headway,
      and at one point we observed a small skiff or workboat moving between the vessels and the shoreline, possibly part of
      the response.


      Our tow, the Seaside Mariner with Barge ST-204, was not physically struck and did not make contact with any other vessel
      or structure. We did not experience any mechanical failures or steering issues. Our involvement is solely as a witnessing
      third party and reporting vessel. I want to be clear that neither I nor my company, Seaside Towing & Marine Services,
      had any role in the fueling operation, nor were we transferring any oil or hazardous materials at the time. We were
      transiting through the area on a routine repositioning run, carrying only our normal ship’s fuel and lubricants which
      remained secure and contained.


      I am reporting this incident because I could clearly see an oil sheen on the water that appeared to originate from the
      area where the Marisol was alongside the Pacific Horizon near the fueling float on the Oregon side. The Marisol is,
      to the best of my knowledge and from subsequent radio communications, owned and operated by Ramirez Coastal Transport,
      Inc., and I believe they were conducting a bunkering or fueling operation at the time of the release. I do not know
      the exact quantity of product released, but based on the size and spread of the sheen, it was more than just a few drops—it
      looked like at least several gallons, if not more, though that is purely an estimate from visual observation.


      I am providing my full contact information and the details of my company so that the Coast Guard, state environmental
      agencies, or any other relevant authority can reach me if they need additional information, photographs, or a formal
      written statement. I hold a valid USCG Master of Towing Vessels Near Coastal license and have participated in multiple
      oil spill response drills, so I am familiar with the reporting requirements and understand the importance of timely
      and accurate notification. I do not have any financial or business relationship with Ramirez Coastal Transport, Inc.
      or the owners of the Pacific Horizon, and I have no interest in this matter other than fulfilling my duty as a mariner
      and helping protect the river environment where I work on a daily basis.'
