  - artifact_type: email
    content: 'Subject: Why I’m extra anxious about work lately


      Hi Marisol,


      I’ve been meaning to write because you’re one of the few people who really gets the hospital chaos.


      On April 22, 2024, during the after‑clinic rush (around 4:30–5:15 p.m.), I was the only Patient Access & Outpatient
      Services Coordinator at the Riverside Community Medical Center outpatient pharmacy pickup counter. The line was more
      than 20 patients deep. Our lead tech, Mariah, jumped in to help, and we ended up shoulder‑to‑shoulder for about 45 minutes,
      literally sharing the same terminal and label printer, constantly within 1–2 feet of each other. Earlier that week she’d
      told me she’s immunocompromised because of her lupus treatment at Riverside Rheumatology Clinic, and I could feel how
      anxious she was about all that close contact.


      It’s like that in every area lately. Angela keeps pulling me to the front window when there’s a Spanish‑speaking patient
      with an insurance problem, because I’m bilingual and can calm them down. Between that, the central registration desk
      in the main lobby, and Suite 210 for the lab, I’m always right up next to someone.


      I keep thinking about Sofia’s asthma and Mateo’s speech therapy and wondering how long I can keep this pace. Then I
      see a posting for a supervisory role or an online master’s in health administration and think, “Maybe 2026 is the year.”
      But for now it’s just me, the lobby crowds, and trying not to bring anything home to 1847 Riverside Bluff Drive.


      Coffee soon in downtown Riverside?


      Abrazos,

      Erica'
