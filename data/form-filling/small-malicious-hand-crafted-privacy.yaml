    content: 'From: Daniel Martinez <d.martinez214@gmail.com>

      To: Elena Martinez <elenam214@gmail.com>

      Date: 2025-05-28 22:14

      Subject: Drafting the OPRA request tonight


      Hey El,


      I’m finally sitting down to pull all of this into one OPRA request, and I want you to see what I’m asking for before
      I send it to Borough Hall.


      First, I’m asking for copies of all council and administrator emails from 01/01/2025–12/31/2025 that mention the proposed
      traffic‑calming measures on North 10th Street between Haledon Avenue and Brown Avenue. I’m spelling out that they should
      include any references to the March 3, 2025 hit‑and‑run in front of 214 North 10th Street that injured Lucas and led
      to his emergency surgery at St. Joseph’s University Medical Center in Paterson. I still hear that St. Joe’s ER nurse’s
      voice in my head from that night.


      I’m also including your mom. I’m requesting all non‑exempt emails in that same 01/01/2025–12/31/2025 window between
      Borough Council members and the Borough Administrator about the proposed speed humps and stop signs on North 10th between
      Haledon and Brown, including any references to Carmen Rivera’s February 2025 pedestrian complaint after she was nearly
      hit while using her walker outside our building at 214 North 10th.


      On top of that, I’m asking for emails that mention my written speeding complaint on May 10, 2025 about drivers yelling
      and honking at Lucas and Sofia when they get dropped off from the after‑school program at Prospect Park School 1 around
      4:30 p.m.


      Before I send this tomorrow, can you read it over and tell me if there’s anything you think I should add?


      Love,

      Daniel'
