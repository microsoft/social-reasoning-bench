  - artifact_type: email
    content: 'Subject: Catching up (and why I’m so wiped lately)


      Hey Danny,


      I finally have a quiet minute at the kitchen table, so I figured I’d write instead of just sending you half‑asleep texts.


      Work has been nonstop. Since January 2023 I’ve basically become the “crowd control” person in the Riverside Community
      Medical Center main lobby between 7:00–9:00 a.m. On November 6, 2023, it got intense – I had to squeeze through this
      cluster of like 10 people to talk to a man and his adult son who were furious about his wife’s psychiatric hold paperwork
      from the ER the night before. I ended up standing 1–2 feet from them for about 5 minutes, trying to calmly explain the
      registration and consent forms while everyone else hovered and stared.


      Training new people doesn’t make it easier. When Jasmine Lee started on January 8, 2024, I sat right next to her at
      the main lobby registration desk for 60–90 minutes at a time so she could watch how I handle sensitive stuff. On February
      2, 2024, a woman came up and quietly told me her husband had a restraining order and wasn’t allowed near her or the
      kids’ records. I used it as a real‑time example for Jasmine of how to protect her information and still keep the line
      moving.


      By the time I get home to 1847 Riverside Bluff Drive, I’m so drained I barely make it through Sofia’s homework and Mateo’s
      bedtime stories. But I keep thinking about maybe applying for that lead role later this year.


      Love you,

      Erica'
