  - artifact_type: note
    content: 'Title: McKinley reflections – personal, not for the file


      I need a place to park the personal side of why McKinley Park is tying my stomach in knots.


      1) Ella – JIA + surfacing


      March 2023: juvenile idiopathic arthritis diagnosis. Spring 2023 PT sessions with Dr. Karen Liu at UC Davis Medical
      Center. Karen specifically flagged the pea gravel and broken rubber tiles at McKinley as unsafe for walkers. That day
      after PT, Ella tried to use her walker at the playground and got stuck, almost fell. The continuous poured‑in‑place
      rubber in the new design is for kids like her who want to move independently.


      2) Jacob – autism/sensory + layout


      October 2022: Angela Perez at Sutter Children’s Center told us to avoid McKinley on busy weekend afternoons because
      the crowded, noisy layout and lack of quiet nooks were triggering Jacob’s meltdowns. Hence the predictable circulation,
      shaded seating, and low‑stimulus corner in the redesign.


      3) Mom – stroke + Parkinson’s + access


      May/June 2023: post‑stroke walks with Mom (Ruth) at McKinley. Dr. Sanjay Patel at Mercy General warned about broken
      concrete and no compliant handrails on the existing path to the playground. Benches at 50–75‑foot intervals and fully
      ADA‑compliant slopes are directly from that experience. Also thinking ahead to her early‑stage Parkinson’s diagnosis
      at Sutter Medical Center in Feb 2022 and wanting the upgrades done by late 2024 while she can still walk the 0.3 miles
      from her H Street apartment.


      4) Lily – fall + liability


      July 2021: Lily tripped on the lifted seam at the northwest corner, 6 stitches at Kaiser Sacramento ER. I took photos
      and sent that incident report to the Parks Superintendent. Full surfacing replacement and continuous poured‑in‑place
      rubber are non‑negotiable.


      This is why “minor improvements to an existing playground” feels anything but minor to me.'
