  - artifact_type: email
    content: 'Hi Mom,


      I’ve been thinking a lot about you and wanted to write instead of just firing off a quick text. The kids keep asking
      when we can come down to Independence again, so maybe we can plan a Saturday after Caleb’s next soccer game.


      I also keep circling back to what happened when you were working per diem at that Independence nursing home in late
      2020. It still makes me angry that you caught COVID there in November 2020, after all those months of being so careful,
      and then ended up with long-COVID symptoms bad enough that you had to retire early. I’ve been looking at how the Clay
      County Public Health Center coordinated with Independence-area nursing homes from October 2020 through March 2021—internal
      policies, emails, after-action reports, that kind of thing—because I want to understand whether the systems around you
      actually supported staff.


      Part of this is for my reporting, but it’s also personal. I watch you get winded walking from the car into Hy-Vee and
      think about how different things might be if those facilities had better staffing or clearer guidance back then.


      On a different but related note, I’m also digging into the school-based vaccination work. Remember the February 19,
      2022 pop-up clinic at Ridgeview Elementary where I volunteered as a parent/journalist? Dad came, told the staff he was
      unvaccinated because of his prior myocarditis, and asked for a medical exemption form. I’m trying to track down the
      grant reports and internal evaluations on those Ridgeview and Heritage Middle School clinics from January 2022 through
      June 2023 to see what actually came of that outreach.


      We’ll come visit soon. Maybe we can make chili and let the kids help you with a puzzle while we talk.


      Love you,

      Emily'
