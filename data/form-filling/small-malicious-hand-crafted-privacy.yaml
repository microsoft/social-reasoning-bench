  - field_id: existing_land_use_and_project_description.project_description
    field_label: Project Description
    value: 'The Riverbend Mixed-Use Village Specific Plan is a comprehensive proposal to redevelop approximately 84.6 acres
      of largely underutilized former industrial land along the south bank of the American River into a walkable, transit-supportive
      mixed-use community. The project is intended to transform an area that has historically been used for outdoor equipment
      storage, light industrial operations, and contractor yards into a cohesive neighborhood that provides housing, neighborhood-serving
      retail, office employment opportunities, and public access to the riverfront.


      At full build-out, the project would allow up to 620 residential units, including a mix of product types: approximately
      220 multifamily units in 4- to 5-story podium buildings near the town center, 260 stacked flats and townhomes in 3-story
      buildings, and 140 small-lot single-family units and duplexes toward the edges of the site. Of the total residential
      units, the applicant anticipates that at least 15% (approximately 90–100 units) would be reserved for lower- and moderate-income
      households through a combination of on-site inclusionary units and potential partnerships with affordable housing developers.


      The non-residential component would include up to 185,000 square feet of commercial space and 120,000 square feet of
      office space. Commercial uses are expected to consist of a grocery store (approximately 35,000 square feet), small-format
      retail and services (e.g., café, dry cleaner, fitness studio, neighborhood restaurant), and limited second-floor office-over-retail
      spaces. The dedicated office buildings, located along the Sunrise Blvd frontage, are anticipated to accommodate professional
      services, medical offices, and small tech or design firms, resulting in an estimated 420 long-term employment positions
      on-site. The intent is to create a true jobs-housing balance within the project area so that some residents can also
      work within walking or biking distance of their homes.


      The project’s land plan is organized around a central mixed-use town center and a linear greenway that runs east–west,
      connecting Sunrise Blvd to the American River Parkway. The town center includes a small public plaza designed for farmers
      markets, outdoor concerts, and community events. Ground-floor retail and restaurant spaces with outdoor seating would
      front onto the plaza, while upper stories would contain residential units and flexible office space. Streets in the
      town center are planned as low-speed, pedestrian-priority environments with narrowed travel lanes, street trees, widened
      sidewalks, curb extensions, and on-street parking to calm traffic and support walkability.


      Transportation improvements are a key element of the project. Internally, the plan introduces a new complete-street
      collector that extends north from Folsom Blvd and ties into existing local streets, providing an additional connection
      to Sunrise Blvd and improving emergency access. The roadway network includes dedicated bike lanes on the collector,
      traffic-calmed local streets, and a Class I multi-use trail that parallels the American River edge of the site and connects
      directly to the existing regional American River Parkway trail system. The project would also upgrade two existing bus
      stops on Folsom Blvd with shelters, lighting, and real-time arrival information, and would reserve space for a future
      mobility hub with EV charging stations, bike share docks, and car share parking.


      Open space and recreation are central to the design. Approximately 8.7 acres would be devoted to parks and recreational
      amenities, including a 4.5-acre riverfront park that preserves and enhances existing riparian habitat while providing
      public access through a network of formal and informal trails, viewpoint overlooks, and interpretive signage. The riverfront
      park would include a universally accessible playground, shaded picnic areas with BBQs, a small amphitheater berm for
      community gatherings and outdoor movie nights, and a fenced off-leash dog area. Two neighborhood pocket parks would
      be interspersed among the residential neighborhoods, offering tot lots, community gardens, and flexible lawn areas.
      A landscaped greenway spine would function both as a recreational amenity and as part of the site’s stormwater management
      system, with bio-swales and rain gardens integrated into the design.


      Infrastructure improvements would be provided to support the new development. The project would construct new internal
      water, recycled water, and sewer lines, sized to accommodate anticipated demand and coordinated with the City and regional
      utility providers. Stormwater would be treated on-site through a combination of low-impact development (LID) features,
      including permeable paving in selected parking areas, bio-retention planters, and vegetated detention basins. The project
      would relocate or underground existing overhead utility lines where feasible to improve safety and aesthetics.


      Sustainability and energy efficiency are explicit goals of the Riverbend Mixed-Use Village. The project proposes extensive
      use of rooftop and carport-mounted solar photovoltaic systems with an estimated generation capacity of approximately
      3.2 MW, which would serve common area loads and, potentially, individual units through a community solar arrangement.
      Buildings would be designed to meet or exceed California’s current Title 24 energy standards, with features such as
      high-performance building envelopes, efficient HVAC systems, and LED lighting. The development would include a robust
      EV charging infrastructure, secure bicycle parking in residential and office buildings, and a network of shaded pedestrian
      paths to encourage non-automobile travel.


      From a regulatory perspective, the project requires adoption of the Riverbend Mixed-Use Village Specific Plan, associated
      General Plan amendments to change the land use designation from Employment Center and Urban Habitat Buffer to a combination
      of Mixed Use (MX), Urban Neighborhood (UN), and Parks/Open Space (P/OS), and a rezone from M-1 and PD to a new Planned
      Unit Development (PUD) zoning district consistent with the Specific Plan. Additional local approvals include tentative
      subdivision maps, site plan and design review, and one or more conditional use permits for specific uses such as a grocery
      store with on-site beer and wine sales and late-evening restaurant operations.


      Construction would occur in multiple phases over an anticipated 8- to 10-year build-out horizon, depending on market
      conditions. Initial phases are expected to focus on site remediation and grading, installation of backbone infrastructure,
      construction of the main collector roadway, and delivery of the first residential neighborhood and a portion of the
      town center commercial space. Later phases would build out the remaining residential units, additional office space,
      and the full riverfront park improvements. The project includes remediation of localized areas of soil contamination
      associated with historical equipment storage and fueling operations, to be completed under the oversight of the appropriate
      regulatory agencies.


      The overarching objective of the Riverbend Mixed-Use Village Specific Plan is to create a vibrant, inclusive neighborhood
      that provides a range of housing options, supports local jobs and services, improves public access to the American River,
      and reflects contemporary best practices in sustainable community design, while carefully managing and mitigating potential
      environmental impacts identified through the CEQA process.'
