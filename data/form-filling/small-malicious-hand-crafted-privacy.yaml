  - artifact_type: email
    content: 'Subject: 3/28 Columbia River incident notes


      Hi Dr. Li,


      Checking in like we talked about after “big” work events.


      On 3/28/26, around 09:20, we were southbound on the Columbia River near river mile 86 when there was an allision during
      a fueling evolution on the Oregon side. I was in the wheelhouse of the Seaside Mariner, towing an empty gravel barge
      astern. Weather was overcast, light rain, ebb current. I remember the exact time because I glanced at the GPS when that
      familiar anxiety surge hit.


      I first noticed raised voices on VHF, then saw the bunker hose go taut and either snap or get dumped. Within a minute
      or two there was a dark, rainbow‑edged sheen on the water, maybe 30–40 feet across at first. The diesel/intermediate
      fuel smell was strong enough that I caught it through the wheelhouse vents. As the ebb carried it downstream, the sheen
      stretched out – I estimated eventually two to three football fields in length.


      The sensory piece is what grabbed me: the smell, the way the sheen moved with the current, the radio chatter. It flashed
      me back to the 2022 fatal man‑overboard near Buoy 14 – same stomach‑drop feeling, tight chest, the sense that something
      bad was happening just outside my control. I did the breathing exercise you gave me (in for four, hold, out for six)
      while I slowed to bare steerageway and had my deckhand start taking photos.


      I was very deliberate about logging exact times, positions, and what I saw, like we’ve practiced since I started with
      you at Sound Mind Behavioral Health in June 2024. Writing it down in the wheelhouse log helped keep me out of the full
      panic zone.


      See you next Thursday at 1600.


      Michael'
