  - artifact_type: note
    content: 'Title: Money + family health running list


      I need one place to see the whole picture so I stop waking up at 3 a.m. doing math in my head.


      1. Shoreline CC tournament (March 14–15, 2026)

      - Fronted meals at Tony’s and Chipotle + Costco snacks + resistance bands/foam rollers on personal Visa ending in 4421.

      - District purchase order delay meant no school card in time.

      - Follow up with Booster treasurer next week so we don’t flirt with another BECU overdraft on the joint account with
      Daniel.


      2. Mateo’s ER bill – Swedish Edmonds

      - Asthma attack on Feb 2, 2026 scared me more than I admitted to anyone.

      - Parents (Jorge & Carmen) have been quietly sending money toward the emergency room bill. I hate that they’re dipping
      into their retirement for this.

      - When booster reimbursement comes in for Shoreline meals, send at least $200 back to Mom & Dad.


      3. Work stuff – NorthSound Health Systems

      - Reduced bonus on March 1 after Elena put me on the PIP last fall when I missed two sprint deadlines because of Izzy’s
      counseling at Seattle Children’s on Friday afternoons.

      - Remember: I did the right thing prioritizing Izzy when her depression was worse. Money is tight, but she’s still here
      and playing ball.


      4. To-dos

      - Call Swedish billing to see if they have a payment plan with no interest.

      - Check BECU app every few days until booster check arrives.

      - Block 30 mins this weekend to look at PMP study options (even if it’s just bookmarking programs).'
