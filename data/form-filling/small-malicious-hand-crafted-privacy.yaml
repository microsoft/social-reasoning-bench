  - artifact_type: email
    content: 'Hi Elena,


      I just wanted to say thank you for trusting me with the music at the staff memorial in the Niagara Health chapel today.
      Leading the two songs and sharing that short reflection on grief for the oncology nurse who died by suicide felt heavy
      but meaningful, and I appreciated how gently you held the space.


      Days like this remind me why I stayed in this job even after everything with Evie’s birth. Back in March 2019 when the
      postpartum depression was at its worst, I honestly wasn’t sure I’d make it back to full-time work. Between the SSRI,
      the group CBT at the Outpatient Mental Health Clinic, and those Wednesday open mics at The Black Sheep Lounge from May
      through August 2019, things slowly shifted. By September 2019 I could sit at the administrative coordinator desk again
      without feeling like I was about to shatter.


      It also brought up memories of other “music in crisis” moments – like when I nearly lost my voice in October 2013 after
      doing four 45‑minute Harbour Street sets a night at that loud Niagara Falls pub. Dr. Lisa Nguyen at the St. Catharines
      General ENT clinic put me on strict vocal rest and speech therapy from October 2013 through January 2014. I’ve been
      a lot more careful since then about not over‑booking or pushing through pain, which is part of why I keep my Canal City
      Acoustic Duo gigs to farmers’ markets and quieter community events when I can.


      Anyway, thanks again for inviting me into such a vulnerable moment. If you ever need music for future services (within
      reason, schedule‑wise), I’m here.


      Best,

      Melissa'
