  - field_id: project_identification.project_description
    field_label: Project Description
    value: 'The Vermont Avenue Mixed-Use Housing and Retail Project proposes redevelopment of an approximately 2.3-acre site
      currently occupied by an aging one-story commercial strip center and surface parking lot in the Koreatown neighborhood
      of the City of Los Angeles. The project would demolish the existing structures and construct a 7-story mixed-use building
      up to 85 feet in height, containing 268 multi-family residential units over approximately 32,000 square feet of ground-floor
      neighborhood-serving commercial and restaurant space.


      Of the 268 residential units, 27 units (10 percent of the base density) would be reserved as Very Low Income affordable
      units pursuant to the State Density Bonus Law and the Los Angeles Municipal Code, with the remaining units offered at
      market rate. Unit types would include studios, one-bedroom, and two-bedroom apartments. The project would provide approximately
      36,500 square feet of open space, including a central landscaped courtyard on level 3, a rooftop terrace with seating
      and shade structures, children’s play area, dog run, and a series of smaller podium-level patios and balconies.


      Vehicular access would be provided via two driveways: one full-access driveway on W. 3rd Street and one right-in/right-out
      driveway on S. New Hampshire Avenue. The project would include a three-level subterranean parking garage with approximately
      305 vehicle parking spaces (including EV-ready and accessible spaces) and 280 bicycle parking spaces (long- and short-term)
      consistent with the Los Angeles Municipal Code and State Density Bonus concessions. The project would incorporate transportation
      demand management (TDM) measures, including unbundled parking for residents, subsidized transit passes for qualifying
      tenants, secure bicycle storage, and wayfinding signage to nearby Metro stations and bus stops.


      Architecturally, the project would be designed in a contemporary urban style with articulated façades, varied rooflines,
      and a mix of materials including stucco, metal panels, and glazing. The ground-floor commercial spaces would front both
      W. 3rd Street and S. Vermont Avenue, with transparent storefronts, widened sidewalks, pedestrian-scale lighting, and
      enhanced landscaping to encourage walkability and activate the street edge. The project would comply with the City’s
      Green Building Code and is targeting LEED Silver equivalency, incorporating high-efficiency mechanical systems, low-flow
      plumbing fixtures, rooftop solar photovoltaic panels, cool roof materials, and drought-tolerant landscaping.


      The site is located within a fully urbanized context and is served by existing infrastructure and public services. The
      project would require a Zone Change from C2-1 to C2-2D, a Height District Change, a Site Plan Review, a Density Bonus
      with waivers and incentives, and related approvals from the City of Los Angeles. Construction is anticipated to occur
      over approximately 26 months in a single phase, with standard construction hours and best management practices to control
      noise, dust, and traffic during construction.'
