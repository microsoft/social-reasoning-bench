    background_context: 'This is Sarah Martinez, a working parent in her early forties who lives with her husband and two
      kids in a modest split-level home on 52nd Ave W in Mountlake Terrace, Washington. She’s been in the same house for almost
      nine years now, having moved up from a two-bedroom apartment in Shoreline when her son, Mateo, was born. Weekdays are
      a careful balancing act: she logs into her job as a senior project coordinator for NorthSound Health Systems around
      7:30 a.m. from the small desk tucked into a corner of the living room, then pauses at 8:00 to make sure Mateo has his
      Chromebook, lunch, and soccer gear before he bikes to school with a neighbor. Her husband Daniel, a science teacher
      at Brier Terrace Middle School, usually leaves just before 7:15, coffee in hand, while their daughter Izzy is often
      the last one out the door, juggling her backpack, basketball shoes, and a water bottle that’s perpetually half full.


      Basketball season shapes much of Sarah’s current routine. Izzy is a starting guard on the Mountlake Terrace High School
      Girls Varsity Basketball team, and Sarah has gradually become the de facto team parent and a key parent volunteer. She
      coordinates snack schedules, carpools, and helps the coaching staff, especially Coach Linda Thompson, with last-minute
      logistics. The recent spring tournament at Shoreline Community College on March 14–15, 2026, was a big focus for her
      over the past month. In the week leading up to it, she was darting between Costco runs for water and snacks, late-night
      emails with other parents about transportation, and her day job’s standing 10 a.m. project status meetings. The weekend
      itself was a blur of early alarms, driving to the Shoreline campus, keeping track of game times, making sure the girls
      ate proper meals between games, and quietly worrying about Izzy’s sore ankle that she’d been taping before practices.


      Outside of basketball, Sarah’s life is busy but fairly steady. Her role at NorthSound Health Systems centers on coordinating
      software rollout schedules between hospital departments and the IT implementation team. She’s been with the organization
      for six years, shifting to a mostly hybrid schedule after the pandemic; she’s in the office in Everett on Tuesdays and
      Thursdays and remote the rest of the week. The work can be stressful—especially when clinics complain about new charting
      workflows—but she likes feeling that what she does ultimately helps nurses and doctors spend more time with patients.
      She’s been quietly considering studying for a project management certification later this year, though she isn’t sure
      where she’ll find the extra hours between Izzy’s games and Mateo’s weekend soccer matches.


      Family is woven into nearly everything Sarah does. Her parents, Carmen and Jorge, live about twenty minutes away in
      Lynnwood, and she stops by their condo most Sunday afternoons after church to bring them groceries from WinCo or Trader
      Joe’s. Her mom’s blood pressure has been creeping up, so Sarah has been nudging her toward more walking and fewer salty
      snacks, even while trying not to sound overbearing. Her younger sister Lucia, who lives in Tacoma, calls often to talk
      about her own job stress and dating life; those calls usually happen when Sarah is folding laundry or stirring a pot
      of arroz con pollo on a weeknight. The family still gets together for birthdays and holidays, and Sarah is already thinking
      ahead to how they’ll celebrate Izzy’s 17th birthday in July and what that will mean with college talk looming.


      Daily life in the Martinez household is a rotating schedule of school events, practices, and small domestic routines.
      On Monday and Wednesday evenings, Sarah drives Izzy to practice at the high school, often staying to watch the last
      half hour and chat with other parents in the stands about upcoming games, SAT prep, and summer camps. Tuesday evenings
      tend to be for Mateo’s rec soccer at the local field near Terrace Creek Park; she brings a camp chair, a travel mug
      of tea, and sometimes her work laptop to finish up a few emails while keeping one eye on the field. Dinner is usually
      something quick and relatively healthy—sheet-pan chicken and veggies, tacos, or lentil soup—though Fridays are reserved
      for takeout and a family movie night when everyone’s home schedule cooperates.


      Lately, Sarah’s mind has been occupied by a handful of ongoing concerns. Izzy is starting to talk seriously about college—mostly
      regional schools like Western Washington University, but also dreaming about playing basketball at a smaller Division
      II or III program—so Sarah has been trying to understand financial aid timelines and what their savings will realistically
      cover. She worries about the cost of everything: escalating grocery prices, the aging Subaru Forester that Daniel drives
      to school every day, and the slow drip of team-related expenses that seem to appear every month. At the same time, she
      feels a quiet pride every time she sees Izzy run out onto the court or watches Mateo confidently explain a science project
      that he and Daniel worked on together at the kitchen table.


      Despite the busyness, Sarah carves out small pockets of time for herself. On early Thursday mornings, before anyone
      else wakes up, she walks a loop around the neighborhood with a podcast in her ears—usually something about true crime
      or personal finance. Once or twice a month, she meets a close friend, Amanda, at a coffee shop in Edmonds for an hour
      of uninterrupted conversation. She’s been trying to read more, keeping a paperback novel in her work bag and squeezing
      in a chapter during lunch. Looking ahead to the next few months, she’s focused on finishing the school year strong,
      helping the girls’ basketball program prepare for their summer league schedule, and maybe, if things slow down just
      a little, planning a long weekend trip to the Oregon coast so the family can step away from gyms, fields, and computer
      screens and just be together for a few days.'
  artifacts:
  - artifact_type: email
    content: 'Hi Lucia,


      Finally sitting down after dropping Izzy at practice and throwing some chicken in the Instant Pot. I owe you an actual
      phone call, but if I don’t write this out I’m going to lie awake staring at the ceiling again.


      Money has felt extra tight this month. NorthSound’s payroll department miscalculated my March 7 paycheck, so my direct
      deposit was a couple hundred short. I didn’t notice until I checked the BECU app and saw how close our joint account
      with Daniel was to zero. I cannot deal with another overdraft fee at the BECU branch in Mountlake Terrace – the last
      one made me want to cry in the parking lot.


      Of course that’s exactly when the district’s purchase order for the Girls Varsity Basketball spring tournament at Shoreline
      Community College (March 14–15) got delayed. Coach Linda still needed meals and snacks covered, and I couldn’t stand
      the idea of the girls scrambling between games. So I just put everything on my personal Visa ending in 4421 – Tony’s
      Pizzeria, Chipotle, Costco snacks, even the resistance bands and foam rollers from Dick’s.


      I keep telling myself the Boosters will reimburse me quickly, but between the messed-up paycheck and floating hundreds
      of dollars for the tournament, I’ve been doing mental gymnastics with every grocery run. Meanwhile, Mateo needs new
      cleats, and Izzy’s already talking about summer camps and SAT prep.


      Anyway, that’s my little vent. The good news: Izzy played really well at Shoreline even with her ankle taped, and Mateo’s
      science project with Daniel actually worked (no small miracle). How are things in Tacoma? Did your boss ever back off
      on those ridiculous deadlines?


      Love you,

      Sarah'
