<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Website design brief</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root{
      --bg:#d6d2cd;
      --page:#ffffff;
      --ink:#1a1a1a;
      --muted:#666;
      --accent:#7b2aa6;          /* magenta/purple from scan */
      --title:#2c78d6;           /* blue title */
      --panel:#e6e6e6;           /* mid grey block */
      --line:#2b2b2b;
      --focus:#f5f5ee;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      display:flex;
      justify-content:center;align-items:flex-start;
      padding:22px 12px;
    }

    .page{
      width:100%;
      max-width:820px;
      background:var(--page);
      box-shadow:0 1px 14px rgba(0,0,0,.14);
      padding:34px 42px 24px;
    }

    h1{
      margin:0 0 22px 0;
      font-size:46px;
      font-weight:500;
      letter-spacing:.2px;
      color:var(--title);
    }

    .two-col{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:34px;
      margin-bottom:22px;
    }

    .subhead{
      color:var(--accent);
      font-weight:600;
      font-size:15px;
      margin:0 0 10px 0;
    }

    .checklist{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .cb-row{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:26px;
      font-size:15px;
    }

    /* Use custom checkbox look similar to scan */
    input[type="checkbox"]{
      appearance:none;
      -webkit-appearance:none;
      width:20px;height:20px;
      border:2px solid #767676;
      background:#fff;
      display:inline-block;
      position:relative;
      border-radius:2px;
      cursor:pointer;
      flex:0 0 auto;
    }
    input[type="checkbox"]:checked::after{
      content:"";
      position:absolute;
      left:5px;top:1px;
      width:6px;height:12px;
      border:solid #2b2b2b;
      border-width:0 3px 3px 0;
      transform:rotate(45deg);
    }
    input[type="checkbox"]:focus{
      outline:none;
      box-shadow:0 0 0 3px rgba(123,42,166,.18);
    }

    .panel{
      background:var(--panel);
      margin:18px -42px 18px;
      padding:22px 42px 22px;
    }

    .panel-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:34px;
      margin-top:8px;
    }

    .textbox{
      margin-top:16px;
      border:2px solid #6c6c6c;
      background:transparent;
      width:100%;
      min-height:170px;
      resize:vertical;
      font-family:inherit;
      font-size:14px;
      padding:10px 12px;
      outline:none;
    }
    .textbox:focus{background:var(--focus)}

    .textbox.tall{min-height:220px}

    .label-row{
      display:flex;
      align-items:flex-end;
      gap:12px;
    }

    .footnote{
      margin-top:10px;
      font-size:12.5px;
      color:var(--muted);
      line-height:1.35;
    }

    .submit-row{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding-top:16px;
    }
    .btn{
      font-family:inherit;
      font-size:13.5px;
      font-weight:600;
      border-radius:2px;
      padding:8px 18px;
      cursor:pointer;
      border:1px solid #8b8b8b;
      background:#fff;
      color:#333;
    }
    .btn-primary{
      background:#444;
      color:#fff;
      border-color:#2f2f2f;
    }

    /* Small-screen */
    @media (max-width:720px){
      .page{padding:26px 18px 18px}
      h1{font-size:36px}
      .two-col,.panel-grid{grid-template-columns:1fr; gap:18px}
      .panel{margin-left:-18px;margin-right:-18px;padding-left:18px;padding-right:18px}
    }
  </style>
</head>
<body>
  <div class="page">
    <form id="mainForm" autocomplete="off">
      <h1>Website design brief</h1>

      <!-- Content provision -->
      <div class="two-col" aria-label="Content provision">
        <div>
          <div class="subhead">We can provide:</div>
          <div class="checklist">
            <label class="cb-row">
              <input type="checkbox" id="copy_we_can_provide" />
              <span>Copy</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="photography_we_can_provide" />
              <span>Photography</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="videos_animation_we_can_provide" />
              <span>Videos / animation</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="logos_and_graphics_we_can_provide" />
              <span>Logos and graphics</span>
            </label>
          </div>
        </div>

        <div>
          <div class="subhead">We’ll need you to source:</div>
          <div class="checklist">
            <label class="cb-row">
              <input type="checkbox" id="copy_well_need_you_to_source" />
              <span>Copy</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="photography_well_need_you_to_source" />
              <span>Photography</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="videos_animation_well_need_you_to_source" />
              <span>Videos / animation</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="logos_and_graphics_well_need_you_to_source" />
              <span>Logos and graphics</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Functionality panel -->
      <div class="panel" aria-label="Website functionality">
        <div class="subhead">Our new website should include this functionality:</div>

        <div class="panel-grid">
          <div class="checklist">
            <label class="cb-row">
              <input type="checkbox" id="team_page" />
              <span>Team page</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="document_library" />
              <span>Document library</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="enquiry_form_or_other_types_of_form" />
              <span>Enquiry form (or other types of form)</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="location_maps" />
              <span>Location maps</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="news_blog" />
              <span>News / blog</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="email_newsletter_signup" />
              <span>Email newsletter signup</span>
            </label>
          </div>

          <div class="checklist">
            <label class="cb-row">
              <input type="checkbox" id="social_media_feeds" />
              <span>Social media feeds</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="image_gallery" />
              <span>Image gallery</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="data_capture_and_export" />
              <span>Data capture and export</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="password_protected_areas" />
              <span>Password protected areas</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="live_chat" />
              <span>Live chat</span>
            </label>
            <label class="cb-row">
              <input type="checkbox" id="other_please_specify_below" />
              <span>Other <span style="color:#7a7a7a;">(please specify below)</span></span>
            </label>
          </div>
        </div>

        <textarea id="other_functionality_details" class="textbox" placeholder=""></textarea>
      </div>

      <!-- System integrations -->
      <div aria-label="System integrations">
        <div class="subhead">Our new website needs to integrate with these systems:</div>
        <textarea id="systems_our_new_website_needs_to_integrate_with" class="textbox tall" placeholder=""></textarea>
        <div class="footnote">
          If you have web links, documentation, or contact details for the systems please send details with this brief.
        </div>
      </div>

      <div class="submit-row">
        <button type="reset" class="btn">Clear Form</button>
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>

  <script>
    (function(){
      const form = document.getElementById('mainForm');

      function boolLikeFromCheckbox(id){
        const el = document.getElementById(id);
        return el && el.checked ? "true" : "false";
      }

      form.addEventListener('submit', function(e){
        e.preventDefault();

        const data = {
          content_provision: {
            copy_we_can_provide: boolLikeFromCheckbox('copy_we_can_provide'),
            photography_we_can_provide: boolLikeFromCheckbox('photography_we_can_provide'),
            videos_animation_we_can_provide: boolLikeFromCheckbox('videos_animation_we_can_provide'),
            logos_and_graphics_we_can_provide: boolLikeFromCheckbox('logos_and_graphics_we_can_provide'),
            copy_well_need_you_to_source: boolLikeFromCheckbox('copy_well_need_you_to_source'),
            photography_well_need_you_to_source: boolLikeFromCheckbox('photography_well_need_you_to_source'),
            videos_animation_well_need_you_to_source: boolLikeFromCheckbox('videos_animation_well_need_you_to_source'),
            logos_and_graphics_well_need_you_to_source: boolLikeFromCheckbox('logos_and_graphics_well_need_you_to_source')
          },
          website_functionality: {
            team_page: boolLikeFromCheckbox('team_page'),
            social_media_feeds: boolLikeFromCheckbox('social_media_feeds'),
            document_library: boolLikeFromCheckbox('document_library'),
            image_gallery: boolLikeFromCheckbox('image_gallery'),
            enquiry_form_or_other_types_of_form: boolLikeFromCheckbox('enquiry_form_or_other_types_of_form'),
            data_capture_and_export: boolLikeFromCheckbox('data_capture_and_export'),
            location_maps: boolLikeFromCheckbox('location_maps'),
            password_protected_areas: boolLikeFromCheckbox('password_protected_areas'),
            news_blog: boolLikeFromCheckbox('news_blog'),
            live_chat: boolLikeFromCheckbox('live_chat'),
            email_newsletter_signup: boolLikeFromCheckbox('email_newsletter_signup'),
            other_please_specify_below: boolLikeFromCheckbox('other_please_specify_below'),
            other_functionality_details: (document.getElementById('other_functionality_details').value || "")
          },
          system_integrations: {
            systems_our_new_website_needs_to_integrate_with: (document.getElementById('systems_our_new_website_needs_to_integrate_with').value || "")
          }
        };

        console.log(JSON.stringify(data, null, 2));
        alert('Submitted! Check console for JSON.');
      });
    })();
  </script>
</body>
</html>
