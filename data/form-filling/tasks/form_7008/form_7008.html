<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brainerd City Council — Agenda Request</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    :root{
      --ink:#111;
      --muted:#333;
      --paper:#fff;
      --bg:#d6d2cd;
      --line:#2b2b2b;
      --soft:#f5f5ee;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      display:flex;
      justify-content:center;align-items:flex-start;
      padding:22px 12px;
    }

    .page{
      width:100%;
      max-width:810px;
      background:var(--paper);
      box-shadow:0 2px 14px rgba(0,0,0,.18);
      padding:18px 22px 20px;
      position:relative;
    }

    .top{
      display:grid;
      grid-template-columns:94px 1fr 94px;
      align-items:start;
      gap:10px;
      margin-bottom:10px;
    }

    .logo{
      width:94px;
      height:94px;
      border:2px solid #777;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      background:linear-gradient(#f7f7f7,#f1f1f1);
    }
    .logo svg{width:86px;height:86px;opacity:.9}
    .title{
      text-align:center;
      padding-top:8px;
      line-height:1.05;
    }
    .title .l1{
      font-weight:800;
      font-size:22px;
      letter-spacing:.2px;
    }
    .title .l2{
      margin-top:6px;
      font-weight:800;
      font-size:22px;
      letter-spacing:.2px;
    }

    form{margin:0}
    .block{border:2px solid var(--line);}

    .pad{
      padding:10px 12px;
    }

    .rowline{
      display:flex;
      align-items:flex-end;
      gap:10px;
      padding:8px 8px 6px;
      border-bottom:1px solid var(--line);
      min-height:34px;
    }
    .rowline:last-child{border-bottom:none}

    .label{
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    textarea{
      font-family:inherit;
      font-size:13.5px;
      border:none;
      outline:none;
      background:transparent;
      color:var(--ink);
      width:100%;
      padding:2px 4px;
    }
    input[type="date"]{
      padding:1px 4px;
    }
    textarea{
      resize:none;
      min-height:98px;
      line-height:1.35;
    }
    input:focus, textarea:focus{
      background:var(--soft);
    }

    /* Main grid table (like the scanned form) */
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      border-top:2px solid var(--line);
    }
    .cell{
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      min-height:72px;
    }
    .cell:nth-child(2n){border-right:none}

    .cell-header{
      font-size:13px;
      font-weight:700;
      padding:7px 8px 2px;
    }
    .cell-body{
      padding:2px 8px 10px;
    }

    .cb-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-top:2px;
    }
    .cb-item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
      letter-spacing:.1px;
    }
    .cb-item input[type="checkbox"]{
      width:20px;height:20px;
      accent-color:#111;
      margin:0;
    }

    .two-col-cb{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px 18px;
      padding-top:2px;
      align-items:start;
    }
    .note{
      font-size:11.5px;
      font-style:italic;
      color:#1c1c1c;
      margin-top:6px;
      line-height:1.25;
    }

    /* Spanning rows */
    .span-2{
      grid-column:1 / span 2;
      border-right:none !important;
    }

    /* Taller narrative cells */
    .narrative textarea{min-height:120px}
    .narrative.big textarea{min-height:150px}

    /* Financial area */
    .fin-wrap{
      padding:8px 10px 10px;
      font-size:13px;
    }
    .fin-title{
      font-weight:700;
      margin-bottom:4px;
    }
    .fin-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:6px 0;
      flex-wrap:wrap;
    }
    .fin-row .q{
      font-style:italic;
      margin-right:8px;
    }
    .yn{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:4px;
    }
    .mini{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:70px;
    }
    .mini input[type="checkbox"]{width:18px;height:18px}
    .money{
      display:flex;
      align-items:flex-end;
      gap:6px;
      margin-left:auto;
      min-width:240px;
    }
    .money .dollar{font-weight:700}
    .money input[type="number"]{
      border:none;
      background:transparent;
      outline:none;
      border-bottom:1px solid var(--line);
      padding:2px 4px 1px;
      width:160px;
    }
    .explain{
      margin-top:8px;
    }
    .explain .q{
      font-style:italic;
      text-decoration:underline;
      font-weight:600;
      display:block;
      margin-bottom:2px;
    }
    .explain textarea{min-height:62px}

    /* Buttons */
    .actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding:12px 0 0;
    }
    .btn{
      font-family:inherit;
      font-size:13px;
      font-weight:700;
      padding:8px 18px;
      border-radius:2px;
      cursor:pointer;
      border:1px solid #666;
      background:#fff;
      color:#222;
    }
    .btn.primary{
      background:#3e3e3e;
      color:#fff;
      border-color:#2c2c2c;
    }

    /* Small helpers */
    .visually-hidden{
      position:absolute !important;
      height:1px; width:1px;
      overflow:hidden;
      clip:rect(1px, 1px, 1px, 1px);
      white-space:nowrap;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="logo" aria-label="City of Brainerd logo (placeholder)">
        <svg viewBox="0 0 120 120" role="img" aria-hidden="true">
          <rect x="8" y="8" width="104" height="104" fill="none" stroke="#666" stroke-width="3"/>
          <circle cx="60" cy="52" r="30" fill="none" stroke="#666" stroke-width="3"/>
          <path d="M42 60 L60 35 L78 60 Z" fill="none" stroke="#666" stroke-width="3"/>
          <path d="M30 82 C40 76, 50 76, 60 82 C70 88, 80 88, 90 82" fill="none" stroke="#666" stroke-width="3"/>
          <text x="60" y="108" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="800" fill="#666">BRAINERD</text>
        </svg>
      </div>

      <div class="title">
        <div class="l1">Brainerd City Council</div>
        <div class="l2">Agenda Request</div>
      </div>

      <div></div>
    </div>

    <form id="mainForm" autocomplete="off">
      <!-- Requested meeting date + title -->
      <div class="rowline" style="border:0; padding:6px 2px 10px;">
        <div style="flex:1;">
          <div class="rowline" style="border:0; padding:0 0 6px 0;">
            <label class="label" for="requested_meeting_date" style="min-width:200px;">Requested Meeting Date:</label>
            <input type="date" id="requested_meeting_date" name="requested_meeting_date" style="max-width:240px; border-bottom:1px solid var(--line);">
          </div>
          <div class="rowline" style="border:0; padding:0;">
            <label class="label" for="title_of_item" style="min-width:200px;">Title of Item:</label>
            <input type="text" id="title_of_item" name="title_of_item" style="border-bottom:1px solid var(--line);">
          </div>
        </div>
      </div>

      <!-- Main bordered form block -->
      <div class="block">
        <div class="grid">
          <!-- Left: agenda placement checkboxes -->
          <div class="cell">
            <div class="cell-header visually-hidden">Meeting &amp; Agenda Placement</div>
            <div class="cell-body">
              <div class="cb-list">
                <label class="cb-item" for="information_only">
                  <input type="checkbox" id="information_only" name="information_only">
                  <span>INFORMATION ONLY</span>
                </label>
                <label class="cb-item" for="consent_agenda">
                  <input type="checkbox" id="consent_agenda" name="consent_agenda">
                  <span>CONSENT AGENDA</span>
                </label>
                <label class="cb-item" for="p_f_committee">
                  <input type="checkbox" id="p_f_committee" name="p_f_committee">
                  <span>P&amp;F COMMITTEE</span>
                </label>
                <label class="cb-item" for="spw_committee">
                  <input type="checkbox" id="spw_committee" name="spw_committee">
                  <span>SPW COMMITTEE</span>
                </label>
                <label class="cb-item" for="main_agenda">
                  <input type="checkbox" id="main_agenda" name="main_agenda">
                  <span>MAIN AGENDA</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Right: action requested checkboxes -->
          <div class="cell">
            <div class="cell-header">Action Requested:</div>
            <div class="cell-body">
              <div class="two-col-cb">
                <label class="cb-item" for="approve_deny_motion">
                  <input type="checkbox" id="approve_deny_motion" name="approve_deny_motion">
                  <span>Approve/Deny Motion</span>
                </label>
                <label class="cb-item" for="direction_requested">
                  <input type="checkbox" id="direction_requested" name="direction_requested">
                  <span>Direction Requested</span>
                </label>
                <label class="cb-item" for="adopt_resolution_attach_draft">
                  <input type="checkbox" id="adopt_resolution_attach_draft" name="adopt_resolution_attach_draft">
                  <span>Adopt Resolution<br>(attach draft)</span>
                </label>
                <label class="cb-item" for="discussion_item">
                  <input type="checkbox" id="discussion_item" name="discussion_item">
                  <span>Discussion Item</span>
                </label>
                <label class="cb-item" for="hold_public_hearing">
                  <input type="checkbox" id="hold_public_hearing" name="hold_public_hearing">
                  <span>Hold Public Hearing*</span>
                </label>
                <label class="cb-item" for="ordinance_1st_reading">
                  <input type="checkbox" id="ordinance_1st_reading" name="ordinance_1st_reading">
                  <span>Ordinance 1<sup>st</sup> Reading</span>
                </label>
              </div>
              <div class="note">*provide copy of published hearing notice</div>
              <!-- Model requires an action_requested text field; place subtly under the checkbox area -->
              <div class="rowline" style="border-bottom:0; padding:10px 0 0; min-height:32px;">
                <label class="label" for="action_requested" style="min-width:130px; font-weight:700;">Describe:</label>
                <input type="text" id="action_requested" name="action_requested" placeholder="" style="border-bottom:1px solid var(--line);">
              </div>
            </div>
          </div>

          <!-- Submitted by / Department -->
          <div class="cell">
            <div class="cell-header" style="padding-bottom:0;">
              <label for="submitted_by">Submitted by:</label>
            </div>
            <div class="cell-body" style="padding-top:0;">
              <input type="text" id="submitted_by" name="submitted_by">
            </div>
          </div>
          <div class="cell">
            <div class="cell-header" style="padding-bottom:0;">
              <label for="department">Department:</label>
            </div>
            <div class="cell-body" style="padding-top:0;">
              <input type="text" id="department" name="department">
            </div>
          </div>

          <!-- Presenter / Estimated time -->
          <div class="cell">
            <div class="cell-header" style="padding-bottom:0;">
              <label for="presenter_name_title">Presenter (Name &amp; Title):</label>
            </div>
            <div class="cell-body" style="padding-top:0;">
              <input type="text" id="presenter_name_title" name="presenter_name_title">
            </div>
          </div>
          <div class="cell">
            <div class="cell-header" style="padding-bottom:0;">
              <label for="estimated_time_needed">Estimated Time Needed:</label>
            </div>
            <div class="cell-body" style="padding-top:0;">
              <input type="text" id="estimated_time_needed" name="estimated_time_needed">
            </div>
          </div>

          <!-- Summary of issue -->
          <div class="cell span-2 narrative">
            <div class="cell-header">
              <label for="summary_of_issue">Summary of Issue:</label>
            </div>
            <div class="cell-body">
              <textarea id="summary_of_issue" name="summary_of_issue"></textarea>
            </div>
          </div>

          <!-- Alternatives/options/effects/comments -->
          <div class="cell span-2 narrative big">
            <div class="cell-header">
              <label for="alternatives_options_effects_on_others_comments">Alternatives, Options, Effects on Others/Comments:</label>
            </div>
            <div class="cell-body">
              <textarea id="alternatives_options_effects_on_others_comments" name="alternatives_options_effects_on_others_comments"></textarea>
            </div>
          </div>

          <!-- Recommended action/motion -->
          <div class="cell span-2 narrative big">
            <div class="cell-header">
              <label for="recommended_action_motion">Recommended Action/Motion:</label>
            </div>
            <div class="cell-body">
              <textarea id="recommended_action_motion" name="recommended_action_motion"></textarea>
            </div>
          </div>

          <!-- Financial impact -->
          <div class="cell span-2">
            <div class="fin-wrap">
              <div class="fin-title">Financial Impact:</div>

              <div class="fin-row">
                <span class="q">Is there a cost associated with this request:</span>
                <div class="yn" aria-label="Cost associated">
                  <label class="mini" for="is_there_a_cost_associated_with_this_request">
                    <input type="checkbox" id="is_there_a_cost_associated_with_this_request" name="is_there_a_cost_associated_with_this_request">
                    <span>Yes</span>
                  </label>
                  <span style="color:#555; font-size:12px;">(unchecked = No)</span>
                </div>

                <div class="money">
                  <span class="q" style="font-style:italic;">What is the total cost, with tax and shipping</span>
                  <span class="dollar">$</span>
                  <input type="number" id="what_is_the_total_cost_with_tax_and_shipping" name="what_is_the_total_cost_with_tax_and_shipping" step="0.01" inputmode="decimal" />
                </div>
              </div>

              <div class="fin-row" style="margin-top:2px;">
                <span class="q">Is this budgeted?</span>
                <div class="yn" aria-label="Budgeted">
                  <label class="mini" for="is_this_budgeted">
                    <input type="checkbox" id="is_this_budgeted" name="is_this_budgeted">
                    <span>Yes</span>
                  </label>
                  <span style="color:#555; font-size:12px;">(unchecked = No)</span>
                </div>
              </div>

              <div class="explain">
                <label class="q" for="please_explain">Please Explain:</label>
                <textarea id="please_explain" name="please_explain"></textarea>
              </div>

            </div>
          </div>

        </div>
      </div>

      <div class="actions">
        <button type="reset" class="btn">Clear Form</button>
        <button type="submit" class="btn primary">Submit</button>
      </div>
    </form>
  </div>

  <script>
    (function(){
      const form = document.getElementById('mainForm');

      const cb = (id) => {
        const el = document.getElementById(id);
        return el && el.checked ? "true" : "false";
      };

      const val = (id) => {
        const el = document.getElementById(id);
        return el ? (el.value || "") : "";
      };

      const numOrNAOrBlank = (id) => {
        const el = document.getElementById(id);
        if(!el) return "";
        const v = (el.value ?? "").toString().trim();
        if(v === "") return "";
        if(v.toUpperCase() === "N/A") return "N/A";
        const n = Number(v);
        return Number.isFinite(n) ? n : "";
      };

      form.addEventListener('submit', function(e){
        e.preventDefault();

        const data = {
          meeting__agenda_placement: {
            requested_meeting_date: val('requested_meeting_date'),
            title_of_item: val('title_of_item'),
            information_only: cb('information_only'),
            consent_agenda: cb('consent_agenda'),
            p_f_committee: cb('p_f_committee'),
            spw_committee: cb('spw_committee'),
            main_agenda: cb('main_agenda')
          },
          action_requested: {
            action_requested: val('action_requested'),
            approve_deny_motion: cb('approve_deny_motion'),
            adopt_resolution_attach_draft: cb('adopt_resolution_attach_draft'),
            direction_requested: cb('direction_requested'),
            discussion_item: cb('discussion_item'),
            hold_public_hearing: cb('hold_public_hearing'),
            ordinance_1st_reading: cb('ordinance_1st_reading')
          },
          submission__presentation_details: {
            submitted_by: val('submitted_by'),
            department: val('department'),
            presenter_name_title: val('presenter_name_title'),
            estimated_time_needed: val('estimated_time_needed')
          },
          issue_details: {
            summary_of_issue: val('summary_of_issue'),
            alternatives_options_effects_on_others_comments: val('alternatives_options_effects_on_others_comments'),
            recommended_action_motion: val('recommended_action_motion')
          },
          financial_impact: {
            is_there_a_cost_associated_with_this_request: cb('is_there_a_cost_associated_with_this_request'),
            what_is_the_total_cost_with_tax_and_shipping: numOrNAOrBlank('what_is_the_total_cost_with_tax_and_shipping'),
            is_this_budgeted: cb('is_this_budgeted'),
            please_explain: val('please_explain')
          }
        };

        console.log(JSON.stringify(data, null, 2));
        alert('Submitted! Check console for JSON.');
      });
    })();
  </script>
</body>
</html>
