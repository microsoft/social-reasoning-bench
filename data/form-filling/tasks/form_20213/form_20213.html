<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michigan District Deacon Information Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    :root{
      --ink:#1a1a1a;
      --muted:#4a4a4a;
      --paper:#ffffff;
      --bg:#d6d2cd;
      --line:#2b2b2b;
      --bar:#3f3f3f;
      --focus:#f5f5ee;
      --accent:#7a0f3a;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--ink);
      display:flex;
      justify-content:center;align-items:flex-start;
      padding:24px 12px;
    }

    .page{
      width:100%;
      max-width:810px;
      background:var(--paper);
      box-shadow:0 2px 14px rgba(0,0,0,.14);
      padding:22px 28px 18px;
    }

    .top{
      display:grid;
      grid-template-columns:76px 1fr 76px;
      align-items:center;
      column-gap:12px;
    }

    .logo{
      width:72px;height:72px;
      display:flex;align-items:center;justify-content:center;
    }

    .title-wrap{ text-align:center; }
    .title{
      font-weight:800;
      font-size:22px;
      letter-spacing:.2px;
      margin:0;
    }
    .swoosh{
      margin:10px auto 4px;
      height:10px;
      width:84%;
      position:relative;
    }
    .swoosh:before{
      content:"";
      position:absolute;left:0;right:0;top:50%;
      border-top:2px solid #222;
      transform:skewX(-12deg);
    }
    .swoosh:after{
      content:"";
      position:absolute;left:14%;right:6%;top:60%;
      border-top:2px solid var(--accent);
      transform:skewX(-12deg);
      opacity:.85;
    }

    form{margin-top:10px}

    .section-label{
      font-weight:700;
      font-size:13px;
      margin:14px 0 6px;
    }

    .section-bar{
      margin:14px -28px 8px;
      padding:6px 28px;
      background:var(--bar);
      color:#fff;
      text-transform:uppercase;
      letter-spacing:1.6px;
      font-size:12px;
      font-weight:800;
    }

    .field-line{
      display:flex;
      align-items:flex-end;
      gap:10px;
      padding:6px 0 2px;
    }
    .field-line.tight{padding:4px 0 2px}
    .field-line .lbl{
      white-space:nowrap;
      font-size:13px;
      color:var(--ink);
    }
    .field-line .fill{
      flex:1;
      border-bottom:2px solid var(--line);
      min-height:22px;
      display:flex;
      align-items:flex-end;
      padding:0 4px 1px;
    }
    .field-line input[type="text"],
    .field-line input[type="email"],
    .field-line input[type="tel"],
    .field-line input[type="date"]{
      width:100%;
      border:0;
      outline:0;
      padding:2px 2px 1px;
      font-size:13px;
      font-family:inherit;
      background:transparent;
      color:var(--ink);
    }
    .field-line input:focus{background:var(--focus)}
    .field-line .hint{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .row-3{
      display:grid;
      grid-template-columns: 1fr 220px 220px;
      gap:14px;
      align-items:end;
    }
    .row-2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      align-items:end;
    }
    .row-2-wide{
      display:grid;
      grid-template-columns: 1fr 1.2fr;
      gap:14px;
      align-items:end;
    }

    .member-row{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      gap:14px;
      align-items:end;
    }
    .member-yesno{
      display:flex;
      align-items:center;
      gap:14px;
      padding-bottom:3px;
    }
    .cb{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      color:var(--ink);
      user-select:none;
    }
    input[type="checkbox"]{
      width:14px;height:14px;
      accent-color:#333;
      transform:translateY(1px);
    }

    .indent{padding-left:28px}

    .small-note{
      font-size:12px;
      color:var(--muted);
      margin:4px 0 0;
    }

    .textarea-line{
      border-bottom:2px solid var(--line);
      padding:2px 4px 3px;
    }
    textarea{
      width:100%;
      border:0;
      outline:0;
      resize:vertical;
      min-height:44px;
      font-family:inherit;
      font-size:13px;
      background:transparent;
      color:var(--ink);
      padding:2px 2px 0;
    }
    textarea:focus{background:var(--focus)}

    .buttons{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid rgba(0,0,0,.25);
    }
    .btn{
      font-family:inherit;
      font-size:13px;
      font-weight:700;
      padding:8px 18px;
      border-radius:2px;
      cursor:pointer;
      border:1px solid #6b6b6b;
      background:#fff;
      color:#222;
    }
    .btn.primary{
      border-color:#2f2f2f;
      background:#444;
      color:#fff;
    }

    /* Make it resemble scanned spacing */
    .spacer{height:2px}
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="logo" aria-hidden="true">
        <!-- simple inline SVG mark approximating the form logo -->
        <svg width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M43 10c-7 3-14 2-20 9-8 10-8 26 1 36 8 9 21 11 34 4-13 3-24-2-30-10-8-10-5-26 5-33 3-2 6-3 10-3z" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M32 18h6v10h10v6H38v18h-6V34H22v-6h10V18z" fill="#7a0f3a" opacity="0.95"/>
          <path d="M20 61c8 3 16 3 24 0" stroke="#7a0f3a" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
        </svg>
      </div>

      <div class="title-wrap">
        <h1 class="title">Michigan District Deacon Information Form</h1>
        <div class="swoosh"></div>
      </div>

      <div></div>
    </div>

    <form id="mainForm" autocomplete="off">
      <!-- Personal and Contact Information (no bar in scan; keep clean) -->
      <div class="field-line">
        <label class="lbl" for="name">Name:</label>
        <div class="fill"><input type="text" id="name" name="name" /></div>
      </div>

      <div class="field-line">
        <label class="lbl" for="congregation_serving">Congregation Serving:</label>
        <div class="fill"><input type="text" id="congregation_serving" name="congregation_serving" /></div>
      </div>

      <div class="member-row">
        <div class="field-line tight" style="padding-bottom:0;">
          <span class="lbl">Are you a member of the above congregation?</span>
        </div>

        <div class="member-yesno" aria-label="Member of above congregation">
          <label class="cb" for="are_you_a_member_of_the_above_congregation_yes">
            <input type="checkbox" id="are_you_a_member_of_the_above_congregation_yes" />
            <span>Yes</span>
          </label>
          <label class="cb" for="are_you_a_member_of_the_above_congregation_no">
            <input type="checkbox" id="are_you_a_member_of_the_above_congregation_no" />
            <span>No</span>
          </label>
        </div>

        <div class="field-line tight">
          <label class="lbl" for="if_no_indicate_current_congregational_membership">If no, indicate current congregational membership</label>
          <div class="fill"><input type="text" id="if_no_indicate_current_congregational_membership" name="if_no_indicate_current_congregational_membership" /></div>
        </div>
      </div>

      <div class="field-line">
        <label class="lbl" for="home_address">Home Address:</label>
        <div class="fill"><input type="text" id="home_address" name="home_address" /></div>
      </div>

      <div class="row-3">
        <div class="field-line">
          <label class="lbl" for="city">City:</label>
          <div class="fill"><input type="text" id="city" name="city" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="state">State:</label>
          <div class="fill"><input type="text" id="state" name="state" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="zip_code">Zip Code:</label>
          <div class="fill"><input type="text" id="zip_code" name="zip_code" /></div>
        </div>
      </div>

      <div class="field-line">
        <label class="lbl" for="cell_phone">Cell Phone:</label>
        <div class="fill"><input type="tel" id="cell_phone" name="cell_phone" /></div>
      </div>

      <div class="row-2">
        <div class="field-line">
          <label class="lbl" for="home_phone">Home Phone:</label>
          <div class="fill"><input type="tel" id="home_phone" name="home_phone" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="email_home">Email:</label>
          <div class="fill"><input type="email" id="email_home" name="email_home" /></div>
        </div>
      </div>

      <div class="row-2">
        <div class="field-line">
          <label class="lbl" for="office_address">Office Address:</label>
          <div class="fill"><input type="text" id="office_address" name="office_address" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="email_office">Email:</label>
          <div class="fill"><input type="email" id="email_office" name="email_office" /></div>
        </div>
      </div>

      <div class="row-3">
        <div class="field-line">
          <label class="lbl" for="city_office">City:</label>
          <div class="fill"><input type="text" id="city_office" name="city_office" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="state_office">State:</label>
          <div class="fill"><input type="text" id="state_office" name="state_office" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="zip_code_office">Zip Code:</label>
          <div class="fill"><input type="text" id="zip_code_office" name="zip_code_office" /></div>
        </div>
      </div>

      <div class="field-line">
        <label class="lbl" for="office_phone">Office Phone:</label>
        <div class="fill"><input type="tel" id="office_phone" name="office_phone" /></div>
      </div>

      <div class="row-2-wide">
        <div class="field-line">
          <label class="lbl" for="date_of_birth">Date of Birth:</label>
          <div class="fill"><input type="date" id="date_of_birth" name="date_of_birth" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="place_of_birth">Place of Birth:</label>
          <div class="fill"><input type="text" id="place_of_birth" name="place_of_birth" /></div>
        </div>
      </div>

      <div class="row-2-wide">
        <div class="field-line">
          <label class="lbl" for="marital_status">Marital Status:</label>
          <div class="fill"><input type="text" id="marital_status" name="marital_status" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="date_of_marriage">Date of Marriage:</label>
          <div class="fill"><input type="date" id="date_of_marriage" name="date_of_marriage" /></div>
        </div>
      </div>

      <div class="row-2-wide">
        <div class="field-line">
          <label class="lbl" for="name_of_wife">Name of Wife:</label>
          <div class="fill"><input type="text" id="name_of_wife" name="name_of_wife" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="wifes_birth_date">Wife’s Birth Date:</label>
          <div class="fill"><input type="date" id="wifes_birth_date" name="wifes_birth_date" /></div>
        </div>
      </div>

      <div class="section-label">Education</div>

      <div class="indent">
        <div class="field-line">
          <label class="lbl" for="college_1">College:</label>
          <div class="fill"><input type="text" id="college_1" name="college_1" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="degree_year_graduated_1">Degree &amp; Year Graduated:</label>
          <div class="fill"><input type="text" id="degree_year_graduated_1" name="degree_year_graduated_1" /></div>
        </div>

        <div class="field-line">
          <label class="lbl" for="college_2">College:</label>
          <div class="fill"><input type="text" id="college_2" name="college_2" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="degree_year_graduated_2">Degree &amp; Year Graduated:</label>
          <div class="fill"><input type="text" id="degree_year_graduated_2" name="degree_year_graduated_2" /></div>
        </div>
      </div>

      <div class="section-label">Work Experience</div>
      <div class="indent">
        <div class="field-line">
          <label class="lbl" for="current_occupation">Current Occupation:</label>
          <div class="fill"><input type="text" id="current_occupation" name="current_occupation" /></div>
        </div>
      </div>

      <div class="section-label">Congregational Experience</div>
      <div class="indent">
        <div class="field-line">
          <label class="lbl" for="congregation_served_1">Congregation Served:</label>
          <div class="fill"><input type="text" id="congregation_served_1" name="congregation_served_1" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="location_dates_1">Location &amp; Dates:</label>
          <div class="fill"><input type="text" id="location_dates_1" name="location_dates_1" /></div>
        </div>

        <div class="field-line">
          <label class="lbl" for="congregation_served_2">Congregation Served:</label>
          <div class="fill"><input type="text" id="congregation_served_2" name="congregation_served_2" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="location_dates_2">Location &amp; Dates:</label>
          <div class="fill"><input type="text" id="location_dates_2" name="location_dates_2" /></div>
        </div>

        <div class="field-line">
          <label class="lbl" for="congregation_served_3">Congregation Served:</label>
          <div class="fill"><input type="text" id="congregation_served_3" name="congregation_served_3" /></div>
        </div>
        <div class="field-line">
          <label class="lbl" for="location_dates_3">Location &amp; Dates:</label>
          <div class="fill"><input type="text" id="location_dates_3" name="location_dates_3" /></div>
        </div>
      </div>

      <div class="field-line" style="margin-top:6px;">
        <div style="flex:1">
          <div class="lbl" style="font-weight:600;margin-bottom:2px;">Other Congregational Responsibilities Held</div>
          <div class="small-note">Please list responsibilities and congregation where held.</div>
          <div class="textarea-line" style="margin-top:6px;">
            <textarea id="other_congregational_responsibilities_held" name="other_congregational_responsibilities_held"></textarea>
          </div>
          <div class="textarea-line" style="margin-top:10px;">
            <textarea id="other_congregational_responsibilities_held_continued" name="other_congregational_responsibilities_held_continued" aria-label="Other Congregational Responsibilities Held (continued)"></textarea>
          </div>
        </div>
      </div>

      <div class="buttons">
        <button type="reset" class="btn">Clear Form</button>
        <button type="submit" class="btn primary">Submit</button>
      </div>
    </form>
  </div>

  <script>
    (function(){
      const form = document.getElementById('mainForm');

      // Optional: enforce mutual exclusivity for yes/no like paper
      const yes = document.getElementById('are_you_a_member_of_the_above_congregation_yes');
      const no = document.getElementById('are_you_a_member_of_the_above_congregation_no');
      if (yes && no){
        yes.addEventListener('change', () => { if (yes.checked) no.checked = false; });
        no.addEventListener('change', () => { if (no.checked) yes.checked = false; });
      }

      const cb = (id) => {
        const el = document.getElementById(id);
        return el && el.checked ? "true" : "false";
      };

      const val = (fd, name) => (fd.get(name) ?? "").toString();

      form.addEventListener('submit', function(e){
        e.preventDefault();
        const fd = new FormData(form);

        const data = {
          personal_and_contact_information: {
            name: val(fd, 'name'),
            congregation_serving: val(fd, 'congregation_serving'),
            are_you_a_member_of_the_above_congregation_yes: cb('are_you_a_member_of_the_above_congregation_yes'),
            are_you_a_member_of_the_above_congregation_no: cb('are_you_a_member_of_the_above_congregation_no'),
            if_no_indicate_current_congregational_membership: val(fd, 'if_no_indicate_current_congregational_membership'),
            home_address: val(fd, 'home_address'),
            city: val(fd, 'city'),
            state: val(fd, 'state'),
            zip_code: val(fd, 'zip_code'),
            cell_phone: val(fd, 'cell_phone'),
            home_phone: val(fd, 'home_phone'),
            email_home: val(fd, 'email_home'),
            office_address: val(fd, 'office_address'),
            email_office: val(fd, 'email_office'),
            city_office: val(fd, 'city_office'),
            state_office: val(fd, 'state_office'),
            zip_code_office: val(fd, 'zip_code_office'),
            office_phone: val(fd, 'office_phone'),
            date_of_birth: val(fd, 'date_of_birth'),
            place_of_birth: val(fd, 'place_of_birth'),
            marital_status: val(fd, 'marital_status'),
            date_of_marriage: val(fd, 'date_of_marriage'),
            name_of_wife: val(fd, 'name_of_wife'),
            wifes_birth_date: val(fd, 'wifes_birth_date')
          },
          education: {
            college_1: val(fd, 'college_1'),
            degree_year_graduated_1: val(fd, 'degree_year_graduated_1'),
            college_2: val(fd, 'college_2'),
            degree_year_graduated_2: val(fd, 'degree_year_graduated_2')
          },
          work_experience: {
            current_occupation: val(fd, 'current_occupation')
          },
          congregational_experience: {
            congregation_served_1: val(fd, 'congregation_served_1'),
            location_dates_1: val(fd, 'location_dates_1'),
            congregation_served_2: val(fd, 'congregation_served_2'),
            location_dates_2: val(fd, 'location_dates_2'),
            congregation_served_3: val(fd, 'congregation_served_3'),
            location_dates_3: val(fd, 'location_dates_3'),
            other_congregational_responsibilities_held: val(fd, 'other_congregational_responsibilities_held'),
            other_congregational_responsibilities_held_continued: val(fd, 'other_congregational_responsibilities_held_continued')
          }
        };

        console.log(JSON.stringify(data, null, 2));
        alert('Submitted! Check console for JSON.');
      });
    })();
  </script>
</body>
</html>
