<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GENERAL MESSAGE (ICS 213)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#d6d2cd;
      color:#111;
      display:flex;
      justify-content:center;align-items:flex-start;
      padding:24px 12px;
    }
    .page{
      width:100%;
      max-width:820px;
      background:#fff;
      box-shadow:0 2px 14px rgba(0,0,0,.14);
      padding:18px 18px 12px;
    }

    /* Form box mimicking the paper outline */
    .form-box{
      border:2px solid #222;
      padding:0;
    }

    .top-title{
      text-align:center;
      font-weight:700;
      letter-spacing:.6px;
      padding:10px 8px;
      border-bottom:2px solid #222;
      font-size:16px;
    }

    .grid{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:13px;
    }
    .grid td{
      border:1.6px solid #222;
      vertical-align:top;
      padding:0;
    }

    .cell{
      padding:6px 8px 5px;
      min-height:44px;
      position:relative;
    }
    .cell.tall{min-height:320px;}
    .cell.replyTall{min-height:260px;}

    .label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.2px;
      margin:0 0 4px;
      color:#111;
    }

    .shade-label{
      background:#e9e9e9;
      padding:6px 8px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.2px;
      font-size:12px;
      border-bottom:1.6px solid #222;
    }

    input[type="text"], input[type="time"], input[type="date"], textarea{
      width:100%;
      border:none;
      outline:none;
      font:inherit;
      background:transparent;
      padding:3px 2px 2px;
    }
    textarea{
      resize:none;
      min-height:100%;
      height:100%;
      line-height:1.35;
    }

    .cell:focus-within{
      background:#f5f5ee;
    }

    /* Ensure tall textareas fill */
    .fill{
      height:100%;
      min-height:calc(100% - 18px);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      padding:10px 2px 0;
      color:#222;
    }

    .actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding:14px 2px 0;
    }
    .btn{
      font-family:inherit;
      font-size:13px;
      font-weight:600;
      padding:8px 18px;
      border-radius:2px;
      cursor:pointer;
      border:1px solid #333;
    }
    .btn-submit{background:#444;color:#fff;border-color:#222;}
    .btn-clear{background:#fff;color:#222;border-color:#777;}

    /* Better alignment for single-line fields: keep label in left edge like paper */
    .rowline{
      padding:6px 8px 4px;
    }
    .rowline .label-inline{
      display:flex;
      align-items:flex-end;
      gap:8px;
    }
    .rowline .label-inline .lbl{
      min-width:72px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.2px;
      padding-bottom:2px;
      white-space:nowrap;
    }
    .rowline .label-inline input{
      border-bottom:0;
      padding-bottom:2px;
    }

    .rowline.small .label-inline .lbl{min-width:64px;}
    .rowline.subject .label-inline .lbl{min-width:82px;}

    /* Make bottom row look like three fields */
    .bottom-row .rowline .label-inline .lbl{min-width:54px;}
    .bottom-row .sigpos .label-inline .lbl{min-width:140px;}

    /* Print-friendly */
    @media print{
      body{background:#fff;padding:0}
      .page{box-shadow:none;max-width:none}
      .actions{display:none}
    }
  </style>
</head>
<body>
  <div class="page">
    <form id="mainForm" autocomplete="off">
      <div class="form-box" aria-label="GENERAL MESSAGE form">
        <div class="top-title">GENERAL MESSAGE</div>

        <table class="grid" role="presentation">
          <colgroup>
            <col style="width:50%">
            <col style="width:50%">
          </colgroup>

          <!-- TO / POSITION -->
          <tr>
            <td>
              <div class="cell rowline small">
                <div class="label-inline">
                  <div class="lbl">TO:</div>
                  <input type="text" id="to" name="to" />
                </div>
              </div>
            </td>
            <td>
              <div class="cell rowline small">
                <div class="label-inline">
                  <div class="lbl">POSITION:</div>
                  <input type="text" id="position_to" name="position_to" />
                </div>
              </div>
            </td>
          </tr>

          <!-- FROM / POSITION -->
          <tr>
            <td>
              <div class="cell rowline small">
                <div class="label-inline">
                  <div class="lbl">FROM:</div>
                  <input type="text" id="from_" name="from_" />
                </div>
              </div>
            </td>
            <td>
              <div class="cell rowline small">
                <div class="label-inline">
                  <div class="lbl">POSITION:</div>
                  <input type="text" id="position_from" name="position_from" />
                </div>
              </div>
            </td>
          </tr>

          <!-- SUBJECT / DATE / TIME -->
          <tr>
            <td>
              <div class="cell rowline subject">
                <div class="label-inline">
                  <div class="lbl">SUBJECT:</div>
                  <input type="text" id="subject" name="subject" />
                </div>
              </div>
            </td>
            <td style="padding:0">
              <table class="grid" role="presentation" style="border-collapse:collapse; width:100%; table-layout:fixed; border:none;">
                <colgroup>
                  <col style="width:50%">
                  <col style="width:50%">
                </colgroup>
                <tr>
                  <td style="border:none; border-right:1.6px solid #222;">
                    <div class="cell rowline small">
                      <div class="label-inline">
                        <div class="lbl">DATE:</div>
                        <input type="date" id="date_subject_line" name="date_subject_line" />
                      </div>
                    </div>
                  </td>
                  <td style="border:none;">
                    <div class="cell rowline small">
                      <div class="label-inline">
                        <div class="lbl">TIME:</div>
                        <input type="time" id="time_subject_line" name="time_subject_line" />
                      </div>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- MESSAGE label row -->
          <tr>
            <td colspan="2">
              <div class="shade-label">MESSAGE:</div>
              <div class="cell tall">
                <textarea id="message" name="message" class="fill" aria-label="Message"></textarea>
              </div>
            </td>
          </tr>

          <!-- SIGNATURE / POSITION -->
          <tr>
            <td>
              <div class="cell rowline">
                <div class="label-inline">
                  <div class="lbl">SIGNATURE:</div>
                  <input type="text" id="signature" name="signature" />
                </div>
              </div>
            </td>
            <td>
              <div class="cell rowline">
                <div class="label-inline">
                  <div class="lbl">POSITION:</div>
                  <input type="text" id="position_signature" name="position_signature" />
                </div>
              </div>
            </td>
          </tr>

          <!-- REPLY label + big box -->
          <tr>
            <td colspan="2">
              <div class="shade-label">REPLY:</div>
              <div class="cell replyTall">
                <textarea id="reply" name="reply" class="fill" aria-label="Reply"></textarea>
              </div>
            </td>
          </tr>

          <!-- Bottom row DATE / TIME / SIGNATURE-POSITION -->
          <tr class="bottom-row">
            <td style="padding:0" colspan="2">
              <table class="grid" role="presentation" style="border-collapse:collapse; width:100%; table-layout:fixed; border:none;">
                <colgroup>
                  <col style="width:20%">
                  <col style="width:20%">
                  <col style="width:60%">
                </colgroup>
                <tr>
                  <td style="border:none; border-right:1.6px solid #222;">
                    <div class="cell rowline small">
                      <div class="label-inline">
                        <div class="lbl">DATE:</div>
                        <input type="date" id="date_reply_section" name="date_reply_section" />
                      </div>
                    </div>
                  </td>
                  <td style="border:none; border-right:1.6px solid #222;">
                    <div class="cell rowline small">
                      <div class="label-inline">
                        <div class="lbl">TIME:</div>
                        <input type="time" id="time_reply_section" name="time_reply_section" />
                      </div>
                    </div>
                  </td>
                  <td style="border:none;">
                    <div class="cell rowline sigpos">
                      <div class="label-inline">
                        <div class="lbl">SIGNATURE/POSITION:</div>
                        <input type="text" id="signature_position_reply_section" name="signature_position_reply_section" />
                      </div>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </div>

      <div class="actions">
        <button type="reset" class="btn btn-clear">Clear Form</button>
        <button type="submit" class="btn btn-submit">Submit</button>
      </div>

      <div class="footer">
        <div>ICS 213</div>
        <div>NFES 1336</div>
      </div>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('mainForm');

      const v = (id) => (document.getElementById(id)?.value ?? '').trim();

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const data = {
          message_header: {
            to: v('to'),
            position_to: v('position_to'),
            from_: v('from_'),
            position_from: v('position_from'),
            subject: v('subject'),
            date_subject_line: v('date_subject_line'),
            time_subject_line: v('time_subject_line')
          },
          message_body: {
            message: v('message'),
            signature: v('signature'),
            position_signature: v('position_signature')
          },
          reply: {
            reply: v('reply'),
            date_reply_section: v('date_reply_section'),
            time_reply_section: v('time_reply_section'),
            signature_position_reply_section: v('signature_position_reply_section')
          }
        };

        console.log(JSON.stringify(data, null, 2));
        alert('Submitted! Check console for JSON.');
      });
    })();
  </script>
</body>
</html>
