    content: 'Subject: Quick update after today


      Hi Mum,


      Just wanted to let you know I’m okay after what happened during the cross-country this afternoon. I had an asthma attack
      about halfway through the race—honestly, I was feeling a bit wheezy even before the start, probably because the pollen
      was crazy high today. Ms. Lang was amazing, she saw me struggling and got me to the nurse’s office super fast. She gave
      me my Ventolin (thank goodness I remembered to pack it) and helped calm me down. I know I always say I’m fine, but it
      was pretty scary.


      Ms. Lang called you and said I should head home early, so I missed the last two periods. Sorry if it messed up your
      afternoon! I’m feeling much better now, just tired. I might take a nap before dinner. Can we maybe talk to Dr. Patel
      about adjusting my meds for spring? This keeps happening when we have outdoor events. I don’t want to miss out, but
      it’s embarrassing being the kid who always has to leave early.


      Also, I left my soccer boots in the nurse’s office (I was in such a rush), so if you’re going past school tomorrow,
      could you grab them for me?


      Love,

      Emily'
