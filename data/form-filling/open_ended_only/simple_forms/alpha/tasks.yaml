    content: 'Subject: Saturday’s Family Plan – Blue Ridge Challenge


      Hey Mom,


      We’ve got a busy weekend coming up with the Blue Ridge Outdoor Challenge at Guion Farm. Lucy’s signed up for the morning
      hike and mountain biking, and I’ve arranged for Sarah Jenkins, our team medic, to carry Lucy’s inhaler and keep an eye
      on her during the activities. Erin will be helping with Mason’s group since he’s still too young for the longer bike
      ride, but he’ll get to join the scavenger hunt and stream ecology activities.


      I’m packing a picnic for after the event, and Lucy’s picking the music again. I’ll bring sandwiches, fruit, and some
      of Lucy’s favorite granola bars. We’ll probably set up at Hooker Falls, weather permitting. If you want to join us for
      the picnic, just let me know—Mason would love to see you and show off his salamander checklist!


      Trying to keep the day low-stress for everyone. The event has grown a lot this year, so I’m juggling extra logistics,
      but the staff is great. We’re planning staggered starts for the groups to avoid crowding on the trails, and all the
      guides are certified and ready for anything. Last year, a few families brought their dogs even though it wasn’t officially
      allowed, but it added to the fun. If you see any pups, just remind parents to keep them leashed.


      Let me know if you need directions or want to carpool!


      Love,

      Brian'
