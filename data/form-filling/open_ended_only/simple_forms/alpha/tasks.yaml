  - artifact_type: email
    content: 'Subject: Missed Yesterday’s Class – Can You Help?


      Hey Meng,


      Hope you’re good. I had to skip COSC1234 yesterday because I was just exhausted after my Mandarin tutoring session ran
      late. I figured I’d catch up with the slides, but surprise — Dr. White still hasn’t uploaded them. Did he mention anything
      important about the assignment or change any deadlines? I really don’t want to get caught out again.


      Honestly, I know I should be better about this, but sometimes when I’m tired, I just can’t make myself go to class,
      especially when it feels like I won’t understand half of it anyway. If you could send me your notes or let me know what
      I missed, I’d really appreciate it. Maybe we can review together this weekend? I’ll buy coffee!


      Let me know. Thanks, man.


      Liang'
