  - artifact_type: note
    content: 'Reflections After the Community Recreation Meeting


      Tonight’s event at the community center was lively—lots of families, a few new faces. I spent some time talking to adults
      with significant intellectual disabilities about their ideas for inclusive programs, but I caught myself feeling nervous
      about saying the wrong thing or not understanding what they wanted to communicate. It’s strange—after all these years
      as Matthew’s mom and working in special ed, I still worry about missing the mark with adults whose needs are different
      from his. I wish I felt more natural and less self-conscious in those conversations.


      Still, the feedback was great—several people want to see more accessible sports options and art classes. I promised
      to follow up with the rec department and see if we can get a pilot program going this fall. Note: Email the director
      tomorrow morning to share tonight’s suggestions. Also, check in with Emily about her upcoming soccer game and make sure
      Matthew’s bus schedule for the day program is confirmed for next week.'
