  - artifact_type: email
    content: 'Subject: Panel Prep – Inclusive Education Next Steps


      Hi Jamie,


      Thanks for looping me in on the panel prep for next month. I’m gathering stories and parent perspectives to share—there’s
      so much to say about transition planning and the gaps families still face once high school ends. Matthew finished at
      Montpelier High last spring, and it felt like falling off a cliff in terms of support. Since March, he’s been seeing
      Dr. Angela Chen at Riverside Mental Health Clinic (after his inpatient stay), and we’re still figuring out how to coordinate
      all the services—between day programs, behavioral therapy, and his weekly speech/OT at the Montpelier Developmental
      Services Clinic.


      I sometimes wonder if my perspective is too colored by our own experience. My understanding of the daily realities for
      people with disabilities mostly comes from living with Matthew, so I might be missing what it’s like for folks with
      needs that look very different. I want to be sure we’re not just talking about what’s worked for us, but also what’s
      missing for others. If you have resources or voices you think we should spotlight, let me know.


      Also, let’s try to keep the discussion accessible—plain language, and maybe some visuals for families who are new to
      all the acronyms. I can put together a handout if you want.


      Best,

      Susan'
