    field_label: Organization Purpose
    value: Hope Harvest Food Bank is a registered nonprofit organization committed to alleviating food insecurity among vulnerable
      populations in Springfield and the surrounding rural communities. Established in 2011, our mission is to provide nutritious
      food, educational resources, and supportive services to low-income families, seniors, and individuals experiencing hardship.
      Through partnerships with local grocers, farms, and civic groups, we operate weekly food distribution events, emergency
      pantry services, and nutrition workshops. We also run a mobile pantry that reaches underserved areas, ensuring access
      for those who lack transportation. In 2023 alone, we served over 2,800 households, distributed 140,000 pounds of food,
      and launched a 'Harvest Kids' after-school snack program for elementary students. Our long-term vision is to create
      a hunger-free community where everyone has the opportunity to thrive.
    is_open_ended: true
