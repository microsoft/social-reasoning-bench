  - artifact_type: email
    content: 'Subject: Great News About the Playground!


      Hi Mom,


      Wanted to share some good news—after Sophie’s occupational therapy session at Brainerd Children’s Therapy Center on
      April 10, Mark and I talked at length about how much the new ADA-compliant equipment at Memorial Park would help her.
      She’s still having some mobility challenges after her wrist injury, and the therapist really emphasized how important
      it is for her to have access to inclusive play spaces. I’ve added that to my talking points for the city council, and
      I feel good about advocating for all the kids in the neighborhood, not just ours.


      I know you’ve been worried about the city’s budget and whether we can actually get this approved, but I’m optimistic
      now. The grant helps a lot, and the council seems supportive so far. I’ll keep you posted as things move along.


      Let’s plan a coffee date at Coco Moon next week—I feel like I haven’t seen you in ages, even though you’re just around
      the corner!


      Love,

      Erin'
