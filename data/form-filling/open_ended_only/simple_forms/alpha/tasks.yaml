    content: "Hi Emily,\n\nI wanted to check in and see how your week is going. Things here have been a little busier than\
      \ usual. I know we were talking about meeting for lunch next Saturday, but I can’t make it—it's my turn to drive Carol\
      \ to her chemo appointment at United Hospital. Her treatments have been every other Saturday since March, and she’s\
      \ handling it as well as can be expected, but I like to be there with her in case she needs anything. Arthur usually\
      \ does the other weekends, but it gives us all a chance to help out and keep Carol company. \n\nOn a different note,\
      \ I’m still planning to volunteer at The Waters for at least another year, as long as Dad’s appointments at Regions\
      \ Hospital don’t get more intense. His treatment started back in February, as you know, and so far we’ve managed to\
      \ keep up with the schedule. I told Mary at The Waters I’d let her know if anything changes, but for now, it’s working\
      \ out. \n\nI also wanted to see if you’d be interested in joining us for dinner next Sunday. Brian said he’s free and\
      \ it would be nice to have everyone together. Maybe you can bring one of your new dessert recipes? \n\nLet me know what\
      \ works for you. Love you lots,\n\nMom"
