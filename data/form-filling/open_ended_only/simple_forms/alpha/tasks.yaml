  - artifact_type: note
    content: 'Team Meeting Draft – Friday, June 14


      Outreach & Office Needs


      We’re overdue for a real plan to improve client outreach. For the past few months, it feels like we’ve just been winging
      it—Spanish flyers here and there, updating the website when we remember, but nothing cohesive. I know Sofia has been
      asking for more structure, and I keep saying we’ll get to it, but the day-to-day keeps swallowing me up. If anyone on
      the team has experience with digital campaigns or knows local groups we should partner with, I need to ask for help.
      Maybe make this a standing agenda item.


      On the office side, we’re still making do with mismatched chairs and desks. If we hear about any donated furniture,
      I’d love to snag some—our conference room looks like a yard sale most days. Also, keep reminding folks about the van
      situation; transportation for perishable donations is still a patchwork, and I don’t want to risk spoilage by relying
      on personal vehicles.


      Action Items:

      - Outreach structure discussion

      - Furniture wishlist

      - Transportation update


      Personal reminder: Don’t let perfect be the enemy of good. Focus on incremental improvements and lean on the team.

      '
