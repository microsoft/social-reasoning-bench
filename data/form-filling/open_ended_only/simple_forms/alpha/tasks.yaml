  - artifact_type: email
    content: 'Subject: Volunteering & Family Stuff


      Hey Mom,


      Just wanted to give you a heads up about my volunteering schedule. I’m planning to do most of my shifts on Saturday
      mornings or Tuesday afternoons, so I’ll be home Sunday mornings to help Huy with his insulin routine. With his diabetes
      diagnosis this spring, I know it’s been a lot for all of us. I’ll make sure to keep up with his supplies and double-check
      his kit every weekend.


      As for Bà Ngoại, she’s still not really able to help much with Huy’s care, especially in the mornings—she gets confused
      with the numbers and timing. I’ll keep handling it for now, unless you want to switch things up. Let me know if you
      need me to pick up more supplies from the pharmacy.


      Also, I’m trying to keep my volunteering to 2–3 hours a week for now, but if you think we need extra help at home, let
      me know and I can cut back a bit. School’s going to get busy soon, so I want to make sure I’m not overcommitting.


      Thanks for all the rides lately! Love you.


      Linh'
