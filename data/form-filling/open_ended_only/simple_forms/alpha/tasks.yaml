    content: 'Subject: Update – Managing Classes & Self-Care


      Hi Min,


      Just a quick note before you go to sleep (don’t stay up too late studying!). This week was rough—the programming class
      is still giving me headaches. Dr. White was late again and made another comment about me not knowing the basics. I’m
      trying not to let it get to me, but it’s hard when everyone else seems to just get it. Last week, I finally went to
      the Student Wellbeing Centre and talked with a counselor about all of this. She said a lot of international students
      feel lost at first, and it’s not just me. I’ll keep going for a few more sessions to see if it helps.


      On the bright side, I met up with some friends from the basketball group for coffee. That cheered me up. I wish you
      were here—sometimes I really miss Mum’s cooking and our noisy family dinners. Don’t worry about me too much. I’ll call
      you on Saturday so you can tell me about your university applications!


      Take care,

      Liang'
