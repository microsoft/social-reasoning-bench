  - artifact_type: text
    content: 'Sarah: Hey Emma, quick vent — I honestly think my menu isn’t as creative as half the new places popping up.
      I just stick to what I know (it’s easier, and at least the regulars don’t complain), but sometimes I wish I could do
      something more daring. Maybe next season, if I ever get a breather.


      Emma: I totally get it! Your food’s amazing, though. You’ve got a loyal crowd for a reason.


      Sarah: Thanks. I do have some ideas for the autumn, but I keep putting them off. Between Olivia’s school stuff and Dad’s
      appointments, I barely have time to prep. And after losing two apprentices this year, I’m running most of the kitchen
      myself.


      Emma: You’re doing so much already. Don’t stress about it.


      Sarah: I’m trying! Speaking of family, remember when Mum had her surgery for ovarian cancer in March 2022? I was dropping
      off meals every week in Retford. Now, with Dad’s Parkinson’s, we’ve shifted gears — more doctor visits, less time for
      experimenting in the kitchen.


      Emma: You’re a superstar. Let me know if you want a recipe brainstorm session soon.


      Sarah: Will do!'
