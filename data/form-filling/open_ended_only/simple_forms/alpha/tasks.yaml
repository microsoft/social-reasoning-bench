  form_info:
    title: REQUEST FOR A REVIEW BY AN INDEPENDENT REVIEW ORGANIZATION
    extracted_text: "REQUEST FORM\n\nREQUEST FOR A REVIEW BY AN INDEPENDENT REVIEW ORGANIZATION\n\nToday's Date: Month__________\
      \ Day__________ Year__________\n\nName of Party Requesting Independent Review: ___________________________________________________________\n\
      Print Last Name, First Name and Middle Initial\n\nRelationship to the Patient or Injured Employee: (Check one)\n□ Self\
      \ (complete page 3, item A)  \n□ Person acting on behalf of patient or injured employee (complete page 3, items A and\
      \ C)  \n□ Provider acting on behalf of patient or injured employee (complete page 3, items A and B)  \n□ Provider that\
      \ received the denial (complete page 3, item A)  \n□ Sub claimant (Workers' Compensation only) (complete page 3, items\
      \ A and C)\n\nREASON FOR REQUEST FOR REVIEW BY AN IRO\n\nAPPLIES TO HEALTH AND WORKERS COMPENSATION CASES:\nIs the condition\
      \ life-threatening?\nCheck one:\n□ Yes □ No  \n(This question does not apply if services have been received)\nIs the\
      \ review ordered by a Court?\nCheck one:\n□ Yes □ No\n\nAPPLIES TO HEALTH CASES ONLY:\nIs this a denial of prescription\
      \ drugs or intravenous infusions for which you are already receiving benefits? Check one:\n□ Yes □ No\n\nIs this a denial\
      \ of an exception request to a prescription drug step therapy protocol:\nCheck one:\n□ Yes □ No\n\nDENIED SERVICES\n\
      Describe the health care services that are being denied (include dates only if services have been performed):\n\n_____________________________________________________________________________\n\
      _____________________________________________________________________________\n_____________________________________________________________________________\n\
      \nPATIENT/INJURED EMPLOYEE INFORMATION\n\nHealth Plan or Claim Identification Number: ________________________________________\n\
      (This number is usually found on the patient's ID card for health plans. The number identifies the patient to the insurance\
      \ carrier. Enter the DWC claim number for workers' compensation cases.)\n\nDate of Birth:(month)_______(day)___(year)________\
      \ Sex___  \nFirst Name_________________ Middle Name___________ Last Name________________ Suffix_______  \nStreet ____________________________________________________________________________________\
      \  \nCity___________________ State______ Zip code___________  \nPhone_____-_______________ Fax_____-_______________\
      \  \nEmail ___________________________________________\n\nRETURN THIS FORM TO THE COMPANY THAT IS DENYING YOUR REQUEST\
      \ FOR HEALTH CARE SERVICES.\n(DO NOT RETURN THIS FORM TO THE TEXAS DEPARTMENT OF INSURANCE.)\n\n2 / 4"
  form_summary:
    form_purpose: This form is used to request an independent review of a denial of health care services or workers' compensation
      benefits by an insurance company or health plan. It collects information about the denied services, the patient or injured
      employee, and the relationship of the requester to the case.
    intended_recipient: The intended recipients are representatives of the insurance company or health plan that denied the
      health care services or benefits. These individuals will process the request and forward it for independent review as
      required by regulations.
