  - artifact_type: email
    content: 'Subject: Checking in – Family, Work, and the Big Birthday


      Hi Mark,


      Just thought I’d send a quick note before the week gets away from me. Hope work’s not been too much of a grind—if it’s
      anything like our site this month, you have my sympathy. I wanted to say again how glad I am that you, Emily, and Holly
      are making the move back to Mona Vale work. Emily’s health is the priority, and I can see already she’s doing better
      not having to manage by herself in Dee Why. Susan and I are happy to pitch in with Holly whenever you need, and I think
      the whole family is settling into the new routine.


      On the subdivision front, things are ticking along, though there’s the usual runaround with council comments and the
      odd hiccup (like the back fence drainage and a couple of trees we’ll have to say goodbye to). Nothing we haven’t dealt
      with before. I’ve been reflecting a bit lately about turning 60 next year—feels surreal! I’m thinking of winding back
      my hours at InspireBuild, maybe finally getting some decent time for woodworking and bushwalks, and spending more weekends
      with you all. There’s more to life than site meetings and spreadsheets, as Susan keeps reminding me.


      Let’s set a day for a backyard barbecue soon—maybe after Holly’s netball game next Saturday if the weather holds. Give
      Emily and Holly a hug from me.


      Cheers,

      Richard'
