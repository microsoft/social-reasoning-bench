    content: "Subject: Subdivision Updates and Family Catch-Up\n\nHi Emily,\n\nJust wanted to check in and see how you, Mark,\
      \ and Holly are doing this week. Susan and I were talking last night about how things felt a bit easier having you around\
      \ over the weekend—Holly’s laugh really does brighten the whole house. I hope your energy is holding up okay. Remember,\
      \ if you need to rest during the day, just text me or Mum and we’ll come over for a couple hours with Holly—happy to\
      \ do some painting or backyard bug hunting with her. This is exactly why we want you all close by, especially while\
      \ you’re still focusing on recovery—having you in Mona Vale just makes it that much easier to help, and you don’t have\
      \ to worry about the drive from Dee Why anymore.\n\nOn the house front, the surveyors were back this morning to double-check\
      \ the boundary pegs. There’s a bit of a headache with the side fence line, but nothing we can’t sort. We are getting\
      \ closer to finalising the plans for the subdivision. I know it’s a lot of change, but I keep picturing your new place\
      \ in the back garden—sunny kitchen, space for Holly’s trampoline (and maybe that veggie patch you keep talking about).\
      \ \n\nLet us know which days you need extra help this week—Susan has her gardening group Thursday morning but otherwise\
