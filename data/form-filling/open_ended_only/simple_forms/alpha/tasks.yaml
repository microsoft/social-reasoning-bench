  - artifact_type: email
    content: 'Subject: Quick update – Mum & GreenTech


      Hi Philip,


      Just a quick note before I head out. I finished up with the GreenTech Solutions team this afternoon—lots of tension
      post-merger, as expected. They’re still figuring out how to work together and I’m facilitating the integration process,
      but it’s a slow burn. I keep reminding myself that transitions like this take time (and patience!).


      I’m heading to Oxford in a bit to see Mum. She’s been coping well with the aftermath of her breast cancer treatment
      but gets tired easily, so I try to bring her some homemade soup and stay for a chat. Balancing work and these hospital
      visits is draining, especially when I’m running between GreenTech sessions and the hospital. I wish there were more
      hours in the day.


      Oscar has a late football practice tonight, so can you pick up Amelia from piano? If you have time, maybe swing by the
      shop for milk on your way.


      See you later,

      Helen'
