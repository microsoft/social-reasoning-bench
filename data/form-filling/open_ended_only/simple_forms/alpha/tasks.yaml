  - artifact_type: email
    content: 'Subject: Catching Up, Finally!


      Hi Lucia,


      It’s been forever since we had a good phone call, but I wanted to check in and see how you and the boys are doing. Things
      here are the usual mix of chaos and routine. I’m still at the Cancer Center, shuffling paperwork and dealing with a
      doctor who can’t remember how to use the copier (don’t even get me started!). Carlos has been working late a lot, and
      sometimes picks up side jobs fixing things for people in the neighborhood—cash in hand, which, to be honest, helps but
      we don’t always bother keeping track for taxes. Between that, his regular overtime at the university, and the little
      bit Lucas earned last summer at the grocery store, we manage to get by, but it’s always a juggling act.


      I’m still doing PT for the neuropathy, and the bills are endless. Carlos’s blood pressure meds cost more than you’d
      think, and we’re still chipping away at that Highland Hospital bill from November when he had the hypertensive crisis.
      Mom and Dad help when they can, but I hate having to ask.


      Anyway, let me know if you want to visit this spring—Lucas misses his cousins and the house could use some laughter.


      Big hugs,

      Maria'
