  - artifact_type: note
    content: 'Personal Meeting Prep – Memorial Park (June 2024)


      - Confirm talking points: Sophie’s ongoing therapy at Brainerd Children’s Therapy Center (April 10 session); highlight
      ADA-compliant design as a necessity, not a luxury.

      - Acknowledge Liam’s injury on June 12 at Memorial Park. Share with council as a real-world example, but stay focused
      on broader safety concerns.

      - Be ready to discuss alternatives: Delaying isn’t an option after two family injuries this spring. Partial replacement
