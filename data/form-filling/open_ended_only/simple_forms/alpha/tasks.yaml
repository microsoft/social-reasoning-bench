  - artifact_type: note
    content: 'Personal Project Notes – Bike Lane Initiative


      - Emily’s near-miss crossing South 8th by our house (718 S. 8th) last month really pushed me to get serious about dedicated
      bike lanes. Need to highlight this when discussing with council and in public meetings.


      - Still debating if this issue even falls under city council’s responsibilities or if it’s more of a Public Works matter.
      Might need to double-check with Steve in Engineering before escalating further.


      - Alternatives: Shared sidewalk use isn’t safe or ADA compliant. Dr. Megan Sorenson (Emily’s OT) recommended safer crossings
      near Oak St. during Emily’s session at Brainerd Pediatric Rehab Center on March 5th. Emily has mild sensory processing
      issues – crowded sidewalks are tough for her, especially after school. Dedicated lanes are safer.


      - I haven’t looked into any alternatives because honestly, nothing else seems to address safety for kids like Emily.
      Need to make this clear in proposal.


      - Parking concerns: Will lose ~8 spots on east side of 8th. Local businesses likely to push back, but majority of residents
      support improved bike infrastructure per survey. Continue outreach and offer alternate parking solutions.


      - Budget: Initial estimate is $32,000. Will monitor closely, especially after Cooper’s hospitalization at St. Joseph’s
      last month ($2,500 temporarily diverted from project funds until city insurance reimburses).


      - Timeline could slip if insurance takes longer. Adjust internal Public Works budget as needed.


      - Next steps: Talk to affected residents, finalize proposal, coordinate with Lisa and Dr. Sorenson for input.


      - Reminder: Don’t let this drop like last time when other projects took over. Stay on it!


      — D.R.'
