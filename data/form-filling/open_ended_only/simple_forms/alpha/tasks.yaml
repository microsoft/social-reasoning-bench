    background_context: 'Monica Ramirez lives in the scenic coastal community of Lions Bay, British Columbia with her husband
      Carlos, and their two children, Sofia and Mateo. Monica has always been passionate about sustainable cooking and local
      ingredients, a passion she translated into her own food truck business, Monica''s Pacific Eats, which she launched two
      years ago. Her days start early—she often heads to local markets to source fresh Pacific salmon, seasonal produce, and
      specialty items for her ever-evolving menu. She’s proud that her food truck offers gluten-free and vegetarian options,
      and her hand-cut rosemary sea salt fries are a local favorite.


      Running the food truck is a family affair; Carlos helps with logistics and weekend events, while Sofia and Mateo sometimes
      lend a hand with simple tasks like setting out compostable napkins or chalking up the daily specials on the board. Monica
      is meticulous about safety and cleanliness, making sure all appliances and surfaces are sanitized and that she and her
      staff uphold high standards, especially post-pandemic. She recently completed a BC Food Safe recertification course,
      and regularly checks in with her part-time employees to discuss COVID-19 safety protocols and strategies for minimizing
      environmental impact—like using compostable packaging and sorting waste.


      Monica balances her business responsibilities with caring for her children, helping Sofia with school projects, and
      coaching Mateo’s mini-soccer league. She enjoys collaborating with other local vendors for community events and is attentive
      to keeping noise down and respecting her neighbors, especially as the food truck is parked near residential areas. Lately,
      she’s been exploring new kombucha flavors sourced from nearby producers and trialing gluten-free cookie recipes. Monica
      is determined to grow her business, but she puts her family’s health and happiness first, making sure work and home
      life stay in harmony. She’s looking forward to the summer, when demand for lemonade and tacos peaks, and when evenings
      spent with her family by the water become the highlight of her week.'
  artifacts:
  - artifact_type: email
    content: "Hi Dr. Singh,\n\nHope you’re well. I wanted to update you about Carlos’s reaction last June and get your advice.\
      \ On June 14, 2023, Carlos had an allergic reaction after drinking one of the ginger-flavored kombuchas we were sampling\
      \ for the food truck. We were at Monica’s Pacific Eats that afternoon, and it happened pretty suddenly—he started feeling\
      \ itchy and flushed, and his throat was a bit tight. Thankfully it didn’t get worse, but it really scared both of us.\
      \ \n\nSince then, we’ve decided to stop selling kombucha entirely. I know it was a popular option, but I can’t risk\
      \ it with him or anyone else. Now I’m super strict about checking every new food and beverage before it goes on the\
      \ menu, especially anything with ginger or other strong ingredients. We’re sticking to lemonade (classic and raspberry),\
      \ cold brew, and kid-friendly drinks for now, and every supplier gets a full rundown of what we can’t have. \n\nCarlos\
      \ is fine now, just a bit annoyed he can’t have his favorite drinks, but I’d appreciate your thoughts on whether there’s\
      \ anything else we should be doing to prevent another reaction. Should we keep an EpiPen on the truck, just in case?\
      \ Also, is it worth coming in for allergy testing to see if there are any other triggers we should be careful about?\n\
      \nThanks so much for your help. Hope you and your family are enjoying the summer!\n\nBest,\nMonica"
    metadata:
      date: '2024-06-02'
      sender: monica.ramirez@pacificeats.com
      recipient: dr.singh@lionsbayclinic.ca
      subject: Carlos’s kombucha allergy – menu changes
