  - field_id: service_project_description_unique_innovative
    field_label: Service Project Description Unique Innovative
    value: The Springfield Healthy Meals Initiative was unique because it not only addressed immediate hunger needs but also
      focused on nutrition education and long-term health outcomes for at-risk families in our city. We recruited local nutritionists
      to help design meal plans that met specific dietary needs, including for children with diabetes or food allergies. Our
      club developed a mobile app for meal recipients to offer feedback, track their nutritional intake, and access recipes
      for healthy, affordable meals using ingredients common in our food pantry. This integration of technology, education,
      and service sets our initiative apart from standard meal programs. We also piloted a 'Cooking with Lions' video workshop
      series, streamed live on social media, to teach families how to prepare the delivered ingredients into balanced meals.
      These approaches generated engagement across generations and improved the community’s overall food literacy, which we
      have seen reflected in follow-up surveys and testimonials.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: service_project_description_importance
    field_label: Service Project Description Importance
    value: Springfield faces a persistent challenge with food insecurity, especially among families with young children and
      the elderly. Many residents rely on local food pantries, but often receive pre-packaged, less nutritious options. The
      Healthy Meals Initiative was crucial in providing not only sustenance but also empowering community members to make
      healthier food choices. During the 6 months of the project, we provided over 4,200 healthy meal kits to 350 families
      and conducted 12 nutrition education workshops at local schools and senior centers. By including nutritional guidance
      and support, the project has contributed to improved community health outcomes, reduced school absenteeism due to illness,
      and strengthened relationships among neighbors. Testimonials from recipients have highlighted not just the value of
      the meals, but also the sense of hope and connection they experienced through our outreach.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: service_project_description_local_partnerships
    field_label: Service Project Description Local Partnerships
    value: We partnered with Springfield Community Health Center, the local chapter of the American Dietetic Association,
      Harvest Home Food Pantry, and the Springfield Public Schools. The Health Center provided free health screenings and
      nutritionists, while the ADA chapter helped design educational materials. Harvest Home sourced fresh produce through
      their network of local farms, and the school system allowed us to use their cafeterias for preparing and packaging meals.
      Lincoln Bakery donated bread and allowed us to hold monthly bread-making demonstrations for children. The local Comcast
      office provided volunteers for meal delivery and technical support for our app development. Our partnership with these
      organizations was integral to the scale and sustainability of our service.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: service_project_description_lci_resources_used
    field_label: Service Project Description Lci Resources Used
    value: We made extensive use of LCI’s Service Project Planning Toolkit, which helped us coordinate volunteers and budget
      the project effectively. The online Service Journey resources were referenced when designing our impact measurement
      surveys. LCI's grant for ‘Hunger Relief’ provided $4,000 in seed funding, and the club officers participated in LCI’s
      webinars on innovative community service strategies. We used the LCI logo and branding guidelines for our outreach materials,
      and relied on the MyLion platform to track volunteer hours, log service activities, and share best practices with other
      clubs regionally.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: service_project_description_additional_comments
    field_label: Service Project Description Additional Comments
    value: Our club feels incredibly grateful for the collaborative spirit that made the Springfield Healthy Meals Initiative
      such a success. Many of our volunteers went above and beyond—one member, Maria Gomez, developed bilingual educational
      flyers to reach our Spanish-speaking neighbors. We learned a lot about the importance of listening to those we serve;
      after feedback from participants, we began offering vegetarian and gluten-free meal options. The local media’s coverage,
      including two segments on Channel 6 News, helped raise awareness and inspired donations from several local businesses
      we had not previously partnered with. We are excited to share our experience as a model for other Lions Clubs looking
      to innovate their hunger relief efforts, and we are already planning an expansion to neighboring towns. Please let us
      know if you need any more testimonials or photographs from our events, as we have many wonderful stories to share.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
