    content: 'Subject: Playground upgrades & OT suggestions


      Hi Michael,


      Quick update from Ella’s session at Brainerd Children’s Therapy Center this week (May 2024): Dr. Lindstrom had some
      great ideas about adding sensory-friendly equipment to the new Lum Park playground. She especially recommended those
      “cocoon” swings and some musical panels—they’d be great for Ella, but also for other kids with sensory processing issues.
      I told Dr. Lindstrom we’d try to bring her suggestions to the next city council meeting (if they don’t totally shut
      us down, ha). Maybe we can bring up the possibility of a grant if the council says the capital fund can’t cover everything.
      What do you think about reaching out to the PTA about this too? They offered to help with fundraising last time.


      On the home front, Sam is feeling better after last fall’s Lum Park incident (the concussion wasn’t fun, but he’s back
      to running laps around the living room). Ella’s numbers have been all over the place lately, so I’m glad her next diabetes
      appointment at St. Joseph’s is coming up.


      By the way, Cheryl said if the council can’t approve the full proposal, we might have to wait until next year to revisit
      it. Not ideal, but I guess we’ll see what happens at the meeting. Let’s talk tonight about how much we want to push
      on this at the next round.


      Love you,

      Jen'
