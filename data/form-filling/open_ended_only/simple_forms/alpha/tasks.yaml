  form_info:
    title: TRAINER REFERENCE FORM
    extracted_text: 'TRAINER REFERENCE FORM


      Two Reference Forms must be submitted with each application.


      If the individual providing the reference would like for the information to remain confidential, please feel free to
      mail this form directly to the TIP Challenge Manager: Ann Hanlin.


      TIP Challenge Event Location: _____________________________________________


      Name of Adopter/Competitor Applicant:______________________________________


      Adopter/Competitor Applicant''s Phone:_______________________________________


      Name of Reference:______________________________________________________


      Ref. Phone 1:_____________________________ Ref. Phone 2:____________________


      Ref. Email Address:_______________________________________________________


      1.  How long have you known this trainer?


      2.  How often do you see this trainer ride or work horses?


      3.  Do you feel that their facilities are suitable for working with a wild horse?


      4.  Do you have any concerns about the horses in the care of this trainer?


      5.  Would you recommend this trainer to people with unbroken or difficult horses?


      Personal Comments:  (Regarding skill, work ethic, values, etc.)


      Mustang Heritage Foundation©'
  form_summary:
    form_purpose: Reference evaluation for an applicant seeking to participate as a trainer or adopter/competitor in a TIP
      Challenge event, assessing their suitability and qualifications for working with wild horses.
    intended_recipient: TIP Challenge Manager and event organizers at the Mustang Heritage Foundation, who will use the references
      to evaluate the applicant's eligibility and appropriateness for the program.
  instruction: ''
  instruction_message: 'Your goal is to have a natural conversation with the other person to gather the information needed
    to complete the form.


    Guidelines:

    - Ask questions naturally and conversationally

    - You may ask follow-up questions to clarify or get more detail

    - Be professional and respectful

    - When you have gathered sufficient information, end the interview

