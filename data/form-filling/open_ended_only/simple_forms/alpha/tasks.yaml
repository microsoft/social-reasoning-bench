  - artifact_type: text
    content: 'Jess: Hey Leslie, are you still able to come by the council meeting next Thursday? Would be good to have another
      parent voice in the room. Honestly, this playground thing isn’t even the most urgent item on the agenda, but figured
      I’d try to get it in in case there’s time for discussion.


      Leslie: I’ll be there! After what happened to Sophie last month and hearing about Eli’s fall, people are definitely
      paying attention now. Let me know if you want help prepping your comments.


      Jess: Thanks, I appreciate it. I’ll send you the latest proposal and some of Dr. Lindstrom’s notes from Sophie’s June
      3 assessment. Still hoping we can convince the council to actually act this time.


      Leslie: Fingers crossed. You’re doing a great job with all this.


      Jess: Thanks. I’ll text you if anything changes!'
