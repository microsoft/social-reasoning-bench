  - artifact_type: email
    content: 'Subject: Quick update – Lucas, playground, and this week''s schedule


      Hi Jen,


      Just wanted to drop you a line before I get too caught up in meetings. First off, can you remind Emily her orthodontist
      appointment is Thursday at 3:30? I’m going to try to swing by if I can get away from the site walk at Northgate. The
      demo crew is finally starting on the old slide and benches—feels strange seeing it all come down, especially after last
      October and what happened with Lucas. I keep replaying that day in my head, him tumbling off and us ending up at Sutter
      Davis for the concussion checks. At least it pushed the city to move faster on the upgrade and add the new ADA stuff.


      I’m also meeting the contractor Friday to go over the sensory elements for the new playground. I brought up Lucas’s
      OT sessions at Sutter Davis (since April, can you believe it’s been nearly a year?) and they seem willing to tweak things
      for better sensory support. Fingers crossed it’ll help him—and other kids—feel more at home out there.


      On a random note, the city is making us take down a few of those mature trees along Northgate Avenue to fit the new
      equipment. I know some neighbors will grumble, but we’re planting new shade trees after the install. Sometimes it feels
      like you can’t please everyone, but safety’s got to come first.


      Let’s aim for a family ride Sunday if the weather holds. Mom said she’ll bring her potato salad again. Love you.


      David'
