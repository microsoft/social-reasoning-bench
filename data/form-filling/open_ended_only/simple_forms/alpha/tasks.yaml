    content: "Subject: Lila’s wrist and urgent playground fix\n\nHi Mom,\n\nJust wanted to update you after a pretty rough\
      \ week. Lila fell from the monkey bars at Memorial Park last Sunday (May 5th) and ended up with a fractured wrist. We\
      \ took her to Brainerd Lakes Clinic and saw Dr. Angela Meyer, who said the break was definitely from the rusted, unstable\
      \ equipment. Lila’s in a cast and embarrassed about having to sit out for soccer, but she’s handling it like a champ.\n\
      \nI honestly can’t believe how bad the playground has gotten. I’ve tried to push for new equipment before, but this\
      \ time it’s personal. Dr. Meyer made a point of telling us that the structures just aren’t safe anymore. I’ve been fielding\
      \ emails from other parents who are worried too, especially since the park gets so busy in summer. \n\nI’m meeting with\
      \ the Parks & Rec team tomorrow to talk about fast-tracking the replacement. I have to admit, I’m not entirely sure\
      \ what the right course of action is—part of me thinks the city council should just do what they think is best, since\
      \ it’s hard to know what will actually move things forward. I’ll let you know what comes of it. Please don’t worry about\
      \ Lila—she’s milking the sympathy and wants you to sign her cast this weekend!\n\nLove,\nShannon"
