    background_context: 'Shannon Collins lives in Cedar Ridge, Texas, with her husband Mark, a software engineer, and their
      two children, Ella and Lucas. Shannon teaches science and STEM courses at Cedar Ridge Middle School, where she has worked
      for the past seven years. Her passion for hands-on learning led her to sponsor the school’s robotics club, which meets
      weekly after school—something that both she and her students look forward to, especially with the new Makerspace opening
      soon. Outside of work, Shannon spends afternoons shuttling Ella to art classes and Lucas to soccer practice, balancing
      family dinners and homework help with her own lesson planning.


      Recently, Shannon has been excited about the school’s upcoming STEM Makerspace initiative, which will launch in August
      2024. She’s been collaborating with fellow teachers to integrate 3D printing, robotics, and coding into the curriculum,
      hoping to spark creativity and problem-solving skills among her students. She’s also preparing for teacher orientation
      during pre-service week, brainstorming ways to make the new space welcoming and accessible to all 6th-8th graders. At
      home, Shannon loves gardening and has been experimenting with hydroponics, a project that inspired a recent classroom
      lesson.


      Shannon keeps an active routine, waking early to prep for school, then spending her evenings catching up on family time
      and grading assignments. She worries about keeping her students engaged, especially in a world full of distractions,
      and she hopes the Makerspace will provide exciting opportunities for everyone—especially for students in the after-school
      robotics club, who often seek creative outlets. She’s also mindful of balancing her professional ambitions with her
      family’s needs, carving out weekends for hiking trips and quiet movie nights. Shannon’s biggest concern lately is ensuring
      Ella transitions smoothly into high school next year, while keeping Lucas inspired about STEM, hoping both kids will
      find their own passions like she did.'
  artifacts:
