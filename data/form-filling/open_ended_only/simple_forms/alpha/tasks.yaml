  ground_truth:
  - field_id: project_description
    field_label: Project Description
    value: The proposed project involves renovation and replacement of the existing playground equipment at Northgate Park,
      including installation of new ADA-compliant play structures, safety surfacing, and replacement of existing benches and
      shade structures. The project will not expand the park's footprint and will utilize the existing developed area. Construction
      activities are expected to last approximately two months and will occur during standard weekday working hours. The work
      will improve safety and accessibility for children and families without significantly altering the character of the
      park or its surrounding neighborhood.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: reasons_for_exemption
    field_label: Reasons For Exemption
    value: The project consists of the minor alteration of an existing public facility (Northgate Park) involving negligible
      or no expansion of existing use. The playground renovation is limited to the developed recreational area and does not
      impact any environmentally sensitive resources. All work will occur on previously disturbed land; no increase in park
      size, capacity, or intensity of use is proposed. The project qualifies for a Class 1 Categorical Exemption under CEQA
      Guidelines Section 15301 because it involves maintenance and minor alteration of existing public facilities. Additionally,
      the park is not located on a site listed as hazardous or containing historical resources.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
