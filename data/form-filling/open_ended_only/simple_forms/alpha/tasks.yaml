    background_context: 'Jacob Allen Peterson is a lifelong Minnesotan who has spent the last twenty years working for the
      City of Brainerd. After earning his degree in Civil Engineering, he started as an entry-level engineer and gradually
      earned his way up to the role of Public Works Director in 2017. The winters in Brainerd are notoriously harsh, and managing
      the city’s snow removal fleet is a critical part of his job. Over the past few years, Jacob has faced the growing frustration
      of maintaining an aging fleet, especially the 2008 International snow plow that has been a constant source of stress
      due to repeated breakdowns and ballooning repair costs. He works closely with his crew and values their insights, regularly
      joining them for morning meetings and sometimes even riding along on storm response shifts.


      At home, Jacob balances his demanding job with family responsibilities. His wife Lisa is a school counselor at Brainerd
      High School, and their schedules can be hectic, especially in winter when Jacob is often out early or late managing
      storm responses. Their son Ethan is a high school senior, busy with hockey and preparing for college applications, while
      Sophie, their eighth grader, is active in choir and loves baking with her grandmother Ruth, who lives nearby and helps
      out with after-school pickups. The Petersons enjoy weekend outings to Gull Lake and quiet movie nights when the weather
      keeps them indoors. Jacob’s main concerns lately revolve around ensuring the city’s streets remain safe, especially
      after several vocal complaints from residents during the last major storm, and supporting his son through the college
      decision process. Despite the pressures, Jacob finds satisfaction in community service, the camaraderie of his team,
      and the stability his job provides for his family.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Snow Plow Saga Continues


      Hi Lisa,


      Just wanted to give you a heads up in case you get any calls at school—looks like I’ll be tied up with council stuff
      again this week. They want to move forward with authorizing the new snow plow since the old one got totaled after Ethan’s
      accident back in January. I still can’t believe how much trouble that 2008 International has caused us over the years.
      This latest mess really forced the issue, but I’ll admit it’s never fun having to bring up our own kid’s name in city
      meetings, even if it was just an accident during that last storm.


      On top of all that, I haven’t really had a chance to dig into every detail of the replacement process—I’ve just been
      trying to keep the crew afloat and make sure no one’s left stranded like I was in December. I know it’s not a big deal
      for the city as a whole, but it’s been a real headache for our team, especially with all the resident complaints after
      the last few storms. Sometimes I wonder if anyone else notices how much extra work gets dumped on us when equipment’s
      down.


      Anyway, thanks for picking me up that night when the plow broke down on Oakwood. I know it was 3 a.m. and you had work
      the next morning. I owe you at least a year’s worth of coffee runs. Maybe next winter we’ll finally have a truck that
      doesn’t conk out at the worst possible time.


      Let’s try to squeeze in a movie night this weekend if the weather holds. Sophie wants to bake again and Ethan could
      use a break from college stuff.


      Love,

      Jake'
