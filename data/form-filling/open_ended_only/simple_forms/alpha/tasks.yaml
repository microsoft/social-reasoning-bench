  - artifact_type: text
    content: 'Helen: Hi, Janine! Hope you’re well. I saw your post about the Association for Coaching event next week—are
      you going? I keep meaning to book myself onto a CPD course soon, but honestly, I haven’t managed any formal training
      in the last couple of years. Life just keeps getting in the way: work, family, Mum’s surgery, Oscar’s football, Amelia’s
      piano exam. Maybe I’ll try to sign up for something this autumn, if things calm down.


      Janine: Totally get it! I’m only going because it’s virtual. Hope you can join.


      Helen: Fingers crossed. Will let you know if I can make it. How’s your team coaching group going?


      Janine: Challenging but rewarding. We should catch up over coffee when you’re next in London.


      Helen: Definitely! I’ll let you know. Have a great week.'
