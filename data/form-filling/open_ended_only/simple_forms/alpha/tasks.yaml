    background_context: "Jessica Hall balances her devotion to horses with raising two energetic children in the heart of\
      \ Weatherford, Texas. She works as a lead horse trainer and youth mentor at Hall Equine Rescue, the non-profit she co-founded\
      \ with her husband, Michael, in 2015. Their mission is to rehabilitate and rehome mustangs and at-risk horses, but Hall\
      \ Equine has also become a hub for community youth programs, teaching responsible horsemanship and positive animal handling\
      \ skills. Jessica spends most mornings and afternoons at the rescue facility, splitting her time between hands-on training,\
      \ mentoring teen volunteers, and overseeing the daily care routines for over twenty horses. \n\nWeekday mornings often\
      \ start before sunrise, helping Michael manage chores before getting Ava to third grade and Jackson to kindergarten.\
      \ Her evenings are equally full: reviewing medical charts for the horses, planning curriculum for upcoming youth groundwork\
      \ sessions, and sometimes leading video calls for TIP Challenge participants. Last year, Jessica faced a challenging\
      \ situation when a new mustang, Blaze, arrived highly reactive—she spent weeks building his trust step by step, a process\
      \ that inspired her to focus more on trauma-informed training methods.\n\nFamily life is busy but supportive. Weekends\
      \ are filled with soccer games for Ava, impromptu picnics at the ranch, and Sunday visits from Jessica's mother, Alice,\
      \ who helps with the kids and manages the facility's garden. Jessica's main concerns revolve around keeping the growing\
      \ rescue sustainable and ensuring every horse transitions successfully. She is meticulous about health protocols and\
      \ often liaises with their vet, especially after a recent colic scare with one of the rescues. Despite the nonstop pace,\
      \ Jessica finds immense fulfillment in her work—watching a nervous mustang blossom under her care, or seeing a shy teen\
      \ volunteer gain confidence, reminds her daily why she chose this path."
  artifacts:
  - artifact_type: email
    content: "Subject: Quick check-in + fencing talk\n\nHey Jamie,\n\nHope your week’s going okay. Things have been a little\
      \ wild here (pun intended). I wanted to see if you’re still up for coming by this weekend to look at the new panel fencing\
      \ with Michael and me. We had that windstorm last night and honestly, I’m not totally sure the north pasture fence is\
      \ going to cut it for that new mustang mare from Willow Creek. She’s still skittish and twice now she tested the corners\
      \ harder than I expected. I keep replaying that one time last spring when the mustangs managed to push through the old\
      \ gate and gave us all a heart attack galloping down Elmwood Road. So, just trying to be proactive before anything like\
      \ that happens again. \n\nOn the rescue front, Dr. Reyes is coming by Friday at 3pm for the follow-up on the Willow\
      \ Creek mare. She’s making progress, but I want his take before we adjust her desensitization routine. Officer Carter\
      \ is still asking for weekly updates, which honestly makes me feel like I’m back in school handing in homework, but\
      \ I get why it’s important after what she went through. \n\nOtherwise, same circus, different day. Ava’s soccer got\
