  - artifact_type: calendar
    content: 'Event: Apartment Viewing – 320 Parkview Ave


      Date: Sunday, April 28, 2024

      Time: 2:00 PM – 3:00 PM

      Location: 320 Parkview Ave, Cedarville

      Attendees: Emily, leasing agent (Mark)


      Notes: This is the third place I’ve scheduled to see this week. Looks promising—updated kitchen appliances and only
      a 15-minute commute to Midwest Financial Solutions. Double-check for street parking and ask about noise from upstairs
      neighbors (last place was a nightmare—could hear every footstep). Bring rental references and last two pay stubs. Call
      Sophie afterward to debrief.'
