      - Lunch: Pack sandwiches, fruit, granola bars, juice boxes; bring picnic blanket. Lucy to help choose music playlist
      for picnic at Hooker Falls. Double check if the portable speaker is charged (though we don’t always get approval for
      music on site).

      - Staff: Radios, first aid kits, stream ecology materials, leaf ID guides. Remind guides about staggered starts and
      waste pack-out.

      - Parking: Set up signage at Guion Farm, overflow at Lake Imaging. Remind families to arrive early, especially those
      with younger kids.

      - Past years: Last year a couple of participants brought their dogs—wasn’t sure if it was allowed, but it made the scavenger
      hunt extra lively. Might want to clarify dog policy this time, just in case.

      - Reminder: Check weather Friday night. If humid, schedule more water breaks. Salamander checklist for Lucy.


      Keep event low-stress for Lucy and Mason. Balance work/family. Don’t lose sight of why we do this!'
