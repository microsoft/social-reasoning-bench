      \ all applicable boxes)\nFrequency: □ One Time □ Weekly □ Monthly □ Would like to discuss in person\nDay of week preference(s):\
      \ □ Sunday □ Monday □ Tuesday □ Wednesday □ Thursday □ Friday □ Saturday\nShift preference(s): □ Morning □ Afternoon\
