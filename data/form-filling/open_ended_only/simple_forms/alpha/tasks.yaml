      On the home front, Helen juggles the joys and chaos of family life. Her husband Philip is a project manager at a sustainable
      construction firm in Maidenhead, and their children, Amelia and Oscar, keep the house lively with school projects, piano
      lessons, and weekend football matches. Helen’s mother, Evelyn, has recently been recovering from minor surgery, so Helen
      has been making more frequent trips to Oxford to provide support—balancing her commitments with a sense of duty and
      care. She finds solace in early morning runs along the Thames and book club evenings with local friends. Lately, Helen
      has been reflecting on whether to expand her business by bringing on an associate coach, but she’s mindful of maintaining
      her high standards and the flexibility that allows her to be present with her family. Like many working parents, she
      navigates the constant juggle—helping with homework between Zoom calls or squeezing in supervision notes after the school
      run. Helen’s life is busy but deeply rewarding, anchored by her values of growth, connection, and integrity.'
  artifacts:
  - artifact_type: note
    content: "Thursday, 8 June 2023\n\nSitting in the garden with tea after a long day. I had supervision with Elaine at CSA\
      \ again this morning—she really pushes me to look at the ways Amelia’s anxiety seeps into my presence as a coach. Amelia’s\
      \ been struggling more lately, especially before school, and last night she had another panic episode. I find myself\
      \ worrying about her when I’m with clients, which makes me feel torn. Elaine suggested I try separating home and work\
      \ mentally, but it’s easier said than done. \n\nI keep thinking about the year I did my CSA certificate—those biweekly\
      \ sessions at their London office. I remember feeling overwhelmed, not just by the coursework but by trying to support\
      \ Amelia at the same time. Elaine was patient and helped me navigate both, but I did need extra help to actually get\
      \ through the practical parts. Sometimes I wonder if I’m still carrying that sense of inadequacy, even now. \n\nPhilip’s\
      \ been busy this week, and I’m picking up the slack at home. Oscar has a football match Saturday, and I need to get\
      \ him there early. I should call Mum tomorrow—her recovery’s going well but she gets lonely. \n\nRemind myself: Solace\
      \ in morning runs. Book club next Thursday at Carol’s. Need to get new supervision notes done before school pick-up."
