  - artifact_type: text
    content: "Richard: Hey mate, just wanted to reassure you—about the backyard project, nothing major on the environment\
      \ side. We haven’t brought in a full-blown environmental consultant for the subdivision, but from everything we’ve seen\
      \ on site, there shouldn’t be any drama. The planners aren’t worried and it’s all pretty standard stuff for Mona Vale.\
      \ \n\nMore importantly, we’re trying to keep most of the big trees and our garden intact—Susan would have my head otherwise.\
      \ Main thing is getting Emily, Mark, and Holly settled nearby, especially now that Emily’s still in recovery. We want\
      \ them close enough so Susan and I can help with Holly every day, but with their own spot and privacy. \n\nYou free\
      \ this weekend for a barbecue? Holly’s got some new netball moves to show off. Let me know if you’re bringing anyone\
      \ (more the merrier)."
