  - artifact_type: note
    content: "Notes: Assisted Mom at Rosewood Memory Care Center, 2019–2021\n\nAfter Dr. Patel diagnosed Mom with dementia\
      \ in March 2019, I started going to Rosewood with her three times a week. I learned how to manage her medications and\
      \ help her move safely around her room and the dining hall. The staff were wonderful, but it was exhausting—especially\
      \ as her memory got worse. I’m grateful for all I learned during that time, even though I’d never worked with seniors\
      \ before and really didn’t know what to expect. \n\nI still keep in touch with two of the aides there, who sometimes\
      \ ask me for advice with their new residents. I miss seeing Mom, but I know we did everything we could to make her last\
      \ years comfortable and safe."
