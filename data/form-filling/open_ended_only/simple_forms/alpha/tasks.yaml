    content: 'Training Log – Monday


      Worked with a new mustang today, 5-year-old gelding from BLM. He’s more aggressive than I expected—charged the round
      pen panels twice and pinned his ears the whole session. I know some horses need more time, but I felt out of my depth.
      It’s tough admitting I don’t have answers for every behavior. Reminds me of the two mustangs I spent months with and
      still couldn’t gentle, no matter how patient I was. Eventually, I had to send them back to the BLM. That stung, but
      sometimes it’s the right call. Not every horse is a Bandit, ready to turn a corner after a few weeks.


      Still, I’ll give this new guy a few more sessions before I decide. Maybe I’ll ask Adam to help reinforce the pen if
      he keeps testing the panels.


      Rest of the barn is calm. Daisy’s progressing and Bella’s eating well at Rachel’s. Will check in with the vet next week.'
