  - artifact_type: email
    content: 'Subject: Coffee chat + my public speaking nerves


      Hey Lauren,


      Thanks for inviting me to co-lead the HR presentation next Thursday. I’m honestly a little nervous about it—public speaking
      isn’t exactly my thing, so I tend to avoid leading big sessions whenever possible. But I’m willing to give it a try
      this time since the topic is onboarding, and I know the new orientation program has made a real difference lately. If
      you don’t mind handling most of the Q&A, I’d really appreciate it.


      On a different note, I’ve been helping Eric (my brother) with his VA disability appeal paperwork this week. He’s still
      waiting on the court hearing at Hamilton County Courthouse in September. Last spring, I assisted him with PTSD claims
      during open enrollment at Maplewood, and it’s amazing how complicated the process is for veterans. I keep thinking about
      the conflict mediation workshop at Ohio HR Conference after his suspension—it gave me a better perspective, but sometimes
      I wonder if I’m actually applying what I learned in real life.


      Juggling all this with Sophie’s dance class and Daniel’s baseball season is a challenge, but at least Michael’s work
      schedule has been more predictable lately.


      Let’s meet for coffee Monday morning? I’ll be working from home, so I can pop out for an hour.


      Best,

      Jessica'
