  - artifact_type: note
    content: 'Note to self: Cross-country prep


      Remember: Take Ventolin before heading to school on cross-country day! Last year (September 2023), I had that asthma
      attack halfway through the race and ended up in Ms. Lang’s office—she was so calm, but I was freaking out. Missed two
      periods and Mum had to pick me up early. I don’t want to repeat that!


      Double-check inhaler is packed, and maybe keep a backup in my locker. Also, bring a bottle of water and antihistamines
      if the pollen count is high (spring always messes with my hayfever). Maybe check weather app the night before for pollen
      levels.


      If I feel even a little tight in my chest, don’t push myself—better to stop than end up in the nurse’s office again.
      Need to tell PE teacher if I’m feeling off so they don’t force me to keep running.


      After the race, treat myself to a snack at Green Bean Café (maybe a blueberry muffin). If I manage the whole race without
      needing the nurse, reward myself with extra sketching time in the park.'
