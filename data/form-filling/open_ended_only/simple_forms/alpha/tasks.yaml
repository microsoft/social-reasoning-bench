  - artifact_type: text
    content: 'SOPHIE: Hey, are you still coming for coffee on Saturday or do you need to cancel with all the moving stuff?


      EMILY: I’ll be there! I need a break from scrolling through apartment listings. I think I’ve moved almost every year
      since college at this point. You’d think I’d be used to it but it still feels like starting over every time.


      SOPHIE: Lol, you’re a pro at this. We can talk through your options in person. I’ll bring the croissants if you promise
      not to stress about noisy neighbors or kitchen appliances for one hour.


      EMILY: Deal. And yes, please bring croissants. I need to focus on the perks—new restaurants to try, maybe less time
      stuck in Cedarville traffic. See you Saturday!'
