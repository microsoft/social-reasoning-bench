  - artifact_type: email
    content: "Subject: Quick Recap & Staff Updates – Blue Ridge Challenge\n\nHi Team,\n\nHope everyone’s ready for another\
      \ busy event season! Just wanted to recap some of the logistics for Saturday’s Blue Ridge Outdoor Challenge, especially\
      \ since we’ve got a lot of new faces joining us. \n\nWe’ll start the morning with interpretive hikes at High Falls and\
      \ Hooker Falls, led by our naturalist team. Sarah Jenkins will be our medic for the day—she’ll specifically be monitoring\
      \ Lucy Campbell, my daughter, who has mild asthma and will be doing both the hike and the mountain biking session. Please\
      \ make sure radios are charged and that you’re familiar with the emergency evacuation routes for DuPont.\n\nMountain\
      \ biking will kick off from Guion Farm, looping through Lake Imaging. Staggered starts for all groups to keep the trails\
      \ clear. Remember to keep an eye out for trail congestion and let me know if any issues crop up.\n\nAfter the activities,\
      \ we’ll gather at Hooker Falls for a picnic. I’ll bring sandwiches and some music—Lucy’s helping with the playlist.\
      \ We don’t always check if amplified sound is strictly permitted, so let’s keep volume low and be discreet. As always,\
      \ pack out all waste and double check your first aid kits before heading out.\n\nIf anyone wants to help with hands-on\
      \ activities like leaf identification or wildlife tracking, let me know. Also, past years have seen a few dogs sneak\
      \ into the scavenger hunt—made things lively! If you see pups, just remind families to keep them leashed and under control.\n\
      \nLet’s make this a fun, safe event and promote stewardship of our beautiful public lands. Thanks all!\n\nBrian"
