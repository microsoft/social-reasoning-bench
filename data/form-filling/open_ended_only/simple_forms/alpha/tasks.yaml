      Hey Lin,


      Wanted to catch up and share a bit about the craziness this week. Our refrigerated van broke down (of course) last Sunday
      at the Walmart parking lot here in Springfield, and it’s still sitting there waiting for the mechanic. So, I’ve been
      borrowing Mom’s car every morning to deliver the perishable donations for the senior meal program, coolers barely fitting
      in the trunk. It’s been stressful—between juggling logistics at Hope Harvest, keeping the kids on their summer routines,
      and making sure Mom gets her PT exercises done before I leave. Mark has been helping me with the coolers when he can,
      but his school finals are still going, so mornings are a scramble.


      Funny thing is, looking back, Hope Harvest started mostly as a place for me and friends to volunteer together, not as
      any grand plan to tackle food insecurity. We just wanted to do something useful, and the rest sort of happened. It’s
      wild to think about how far we’ve come, and how much more complicated things have gotten. These days, I spend as much
      time dealing with broken vans and mismatched office chairs as I do organizing food drives.


      Anyway, hoping for a less chaotic week soon. How’s your garden coming along?


      Love,

      Jenn'
