        since college.
      why_negative: This reveals a pattern of frequent moves and low commitment to long-term tenancy, which makes the applicant
        appear unstable and less desirable to landlords seeking reliable tenants.
      answers_question: Describes the motivation behind leaving the current address.
      artifact_embedding_hint: Casual text message to a friend about moving again
    - detail: I'm looking for somewhere else because I can't deal with the noisy neighbors upstairs anymore.
      why_negative: This frames the departure as complaint-driven and highlights intolerance for typical apartment living
        conditions, suggesting the applicant may be difficult to please or prone to raising issues with property management.
      answers_question: States the reason for leaving the current address.
