    background_context: 'Jessica McIntyre has lived in Brainerd for almost a decade, having moved here with her husband Peter
      shortly after they married. Her days start early, getting Eli and Sophie ready for school and daycare, before heading
      to her office at the Parks & Recreation Department. She’s been working there for six years, and her role has grown to
      include overseeing community engagement and coordinating improvement projects for Brainerd’s parks. This spring has
      been particularly busy, as she’s been responding to concerns raised by parents about Lum Park’s playground, collaborating
      with parent groups, and researching accessible equipment options.


      Weekends are often spent outdoors, whether it’s hiking the Paul Bunyan Trail or organizing neighborhood clean-ups. Jessica’s
      commitment to inclusive recreation is both professional and personal; Sophie was born with mild cerebral palsy, so accessibility
      in playgrounds is a cause close to her heart. She’s proud of Brainerd’s reputation as a family-friendly city, but she’s
      always looking for ways to improve safety and inclusivity. Her work sometimes bleeds into her evenings, as she attends
      city council meetings or answers emails from concerned community members. She finds fulfillment in seeing new projects
      take shape, especially when they make life better for families like hers.


      Recently, Jessica and Peter celebrated their tenth wedding anniversary with a quick getaway to Duluth, leaving the kids
      with their grandparents. She’s hopeful for a quiet summer, but with playground upgrades, summer programs, and Eli starting
      baseball, she knows life will stay lively. One of her ongoing concerns is balancing her professional responsibilities
      with family life, especially as Sophie requires extra appointments and support. Still, she’s grateful for her supportive
      network in Brainerd and feels like she’s making a positive impact through her work and daily routines.'
  artifacts:
  - artifact_type: email
    content: "Subject: Re: May and June have been a lot\n\nHey Peter,\n\nFinally have a minute to catch my breath after getting\
      \ the kids settled for bed (Sophie is insisting on sleeping with her new penguin again). I keep replaying both the Lum\
      \ Park incident last month and then Eli’s accident on June 2nd—heading straight from the playground to St. Joseph’s\
      \ Medical Center with him in the back seat, so pale and quiet, was one of the scariest things I’ve had to do as a parent.\
      \ I know it could’ve been so much worse than a mild concussion, but I can’t stop thinking about how that section of\
      \ the monkey bars has been a disaster waiting to happen for ages. \n\nBetween Sophie’s fall last year at Jaycees (five\
      \ stitches, poor kid) and now this, I’m at my wit’s end with how slow we’ve been to get safer, more accessible equipment\
      \ in. I feel like I’m constantly telling people at work and in the parent groups how important this is, but nothing\
      \ ever seems to really move. I honestly don’t even know if pushing with the council this time will make a difference—this\
      \ isn’t the first time we’ve raised the issue, and it just lingers until the next kid gets hurt.\n\nI know I get worked\
      \ up about it, but I just want them to have a safe place to play. Maybe it’s selfish, wanting to push for upgrades partly\
      \ because of our own kids, but after the past couple months, I can’t let it drop. Sophie’s occupational therapist, Dr.\
      \ Lindstrom, had some great ideas during her assessment on June 3 at Brainerd Pediatric Therapy Center, and I’m going\
      \ to ask the department to prioritize equipment that will help with her therapy needs too. I’ve already started talking\
      \ to vendors about sensory play elements and ADA compliance.\n\nLet’s try to plan a quiet weekend—no parks for a bit.\
      \ Maybe just backyard camping with marshmallows. Love you.\n\nJess"
