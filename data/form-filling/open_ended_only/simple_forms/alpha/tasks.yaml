  - artifact_type: email
    content: 'Subject: Budget for Bike Rack Project


      Hi Dave,


      Just wanted to check in about the bike rack funding. I haven’t had a chance to estimate the actual costs yet, so I’m
      not totally sure what the financial impact will be. My rough numbers are $4,800 for the racks themselves, plus tax and
      shipping (maybe $380.75?), and installation labor around $200. I’m planning for Eric to do the installation since he
      was laid off from Brainerd Construction Group this month, so labor costs should be minimal and stay in-house.


      I’m really hoping this stays within the Parks and Rec capital improvement budget, since Eric’s been out of work since
      March (first the paper mill, now construction). We’re relying on my salary, so anything extra would be tough for us
      right now. Let me know if you need more detail or if I should adjust the request.


      Thanks,

      Sandra'
