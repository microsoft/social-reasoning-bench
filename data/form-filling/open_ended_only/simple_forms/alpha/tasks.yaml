    background_context: 'Jen McAllister has lived in Brainerd for most of her life, returning to her hometown after college
      to raise her family and invest in her community. Now in her late 30s, she balances a busy home life with her role as
      the Parks & Recreation Program Coordinator, a job she’s held for the past four years. Her days frequently begin with
      school drop-off for Ella and Sam, followed by daily meetings, park site checks, and community outreach projects. After
      work, she enjoys biking with her kids along the Mississippi Riverfront or meeting her husband Michael, an accountant
      at a local credit union, for a quick dinner at one of Brainerd’s downtown diners.


      The past year has been especially demanding at work, as Jen has led efforts to improve public spaces used by families
      like her own. She’s become increasingly aware of the need for accessible playgrounds after seeing her son, Sam, who
      has mild cerebral palsy, struggle to join his sister and friends on older equipment at Lum Park. Jen’s advocacy for
      inclusive play has made her a familiar face at city meetings and PTA gatherings, and she often finds herself chatting
      with neighbors about park improvements while shopping or at weekend soccer games. Outside of work, Jen is active with
      the local PTA and volunteers to organize seasonal events. Her mother, Patricia, helps out with after-school pickups
      and occasionally joins the family for Sunday dinners. Jen’s current focus is ensuring Lum Park’s new playground project
      moves forward smoothly, knowing the positive impact it will have not just for her own family, but for the whole community.


      Despite her full schedule, Jen carves out small moments for herself, enjoying early-morning walks or catching up with
      friends over coffee at Coco Moon. She occasionally worries about budget constraints and the logistics of summer camps,
      but her dedication to creating a welcoming, safe environment for Brainerd’s families keeps her motivated. The McAllisters
      are looking forward to a family camping trip to Itasca State Park in August, and Jen is already planning activities
      that will give her kids a summer full of outdoor adventures.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Sam''s fall at Lum Park & next steps


      Hey Michael,


      Just wanted to update you after this afternoon. I took Sam and Ella to Lum Park to let them burn off some energy. Sam
      was on that old climbing structure (the one I’ve complained about a dozen times), and he lost his grip and fell. He
      hit his head pretty hard—he started crying and seemed dizzy, so I took him straight to urgent care. The doctor said
      it’s a mild concussion, nothing too serious, but he needs to take it easy for a few days (no soccer this weekend, sorry
      to disappoint him!).


      I called Parks & Rec after we got home, and Cheryl said staff would go out tomorrow for a safety review. She sounded
      a bit shocked—honestly, I think this might finally push them to remove that structure for good. It’s just so frustrating
      knowing we’ve had multiple close calls there now, and I’m honestly tired of feeling like nothing changes until someone
      gets hurt.


      On a more positive note, Ella helped Sam with his ice pack and read to him while he rested. She’s always so sweet with
      him when it counts. We’ll keep an eye on him tonight and see how he’s doing in the morning. I’ll keep you posted if
      anything changes. Let me know if you can swing by Target after work tomorrow—Sam’s been asking for those dinosaur stickers
      again, and I promised him a little treat.


      Love,

      Jen'
