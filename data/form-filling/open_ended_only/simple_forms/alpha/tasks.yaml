    background_context: 'Richard Evans is a long-time resident of Mona Vale, having moved to the Northern Beaches over two
      decades ago with his wife, Susan. He works as a Senior Project Manager at InspireBuild Pty Ltd, a mid-sized construction
      firm specialising in residential and commercial developments across Sydney. Richard''s daily routine starts early, with
      a brisk walk along the nearby beach before heading to work, often balancing site visits and planning meetings. In the
      evenings, he enjoys gardening and maintaining the lush backyard that is home to several native trees and shrubs.


      The Evans family is close-knit. Their adult daughter, Emily, recently returned to Mona Vale with her husband, Mark,
      and their young daughter, Holly. The family has been discussing ways to live nearby while retaining independence, reflecting
      Richard''s value on both togetherness and personal space. Richard and Susan have been actively planning for a more sustainable,
      multigenerational home setup. Weekends are spent hosting family barbecues and attending Holly''s netball games. The
      Evans are conscious of their impact on the neighbourhood, striving to maintain the street''s character and foster positive
      relationships with neighbours. Richard is also keenly interested in preserving local biodiversity, working with Susan
      on landscaping projects that attract native birds.


      Recently, Richard has been thinking about his upcoming 60th birthday and considering reducing his work hours to spend
      more time with his family and on personal interests like woodworking and bushwalking. He is generally healthy but has
      started paying more attention to diet and regular check-ups, prompted by Susan''s gentle reminders and his own awareness
      of aging. The Evans household is lively, filled with laughter, discussions about future plans, and the bustle of family
      life.'
  artifacts:
