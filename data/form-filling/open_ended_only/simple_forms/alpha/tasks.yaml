  - artifact_type: note
    content: 'Pros & cons – Mill Ave bike lane proposal


      Pros:

      + Lucas and Sophie both had close calls this spring (Lucas’s April 14 accident, Sophie nearly hit May 8 biking to Riverside).
      It’s not just about stats—families are seeing the risks up close. Dedicated lanes could make a real difference, especially
      for kids.

      + Strong support from Safe Routes to School, local businesses, and Principal Olson. Dr. Reiner also weighed in after
      Sophie’s incident, recommending physical therapy and better infrastructure.

      + Minimal impact on parking (lose 15 spaces, but side streets are open).


      Cons:

      - If council doesn’t approve this, I guess we could keep patching things up like usual (temporary cones, extra signs),
      but I thought it was worth a shot to try for a permanent solution.

      - One business owner is worried about parking—need to follow up with them again.

      - Still not sure if this is the absolute best approach, but it’s the most actionable right now.


      To do: Reach out to Safe Routes group with updates. Set up meeting with council member Peterson. Check in with Lucas
      about biking again next week.'
