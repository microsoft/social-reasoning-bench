  - artifact_type: email
    content: "Subject: Quick Update – Stormwater and Site Prep\n\nHi Greg,\n\nHope you’re well. Just wanted to flag a couple\
      \ of things that came up after the rain over the weekend. We’re still seeing water pooling along the back fence line\
      \ and the lower side garden—nothing catastrophic, but it’s not draining as well as I’d like. I know we’ve noted it in\
      \ the site assessment, but it’s something we’ll need to tackle head-on after we’ve got the main subdivision approval.\
      \ No point in major drainage works until we know exactly where the new access and services are going. \n\nOn the plus\
      \ side, the revised plans for the rear lot layout look promising. Emily and Mark are pretty excited to see things moving,\
      \ and having them close by is going to be a real help for all of us, especially while Emily’s still getting back on\
      \ her feet. Susan’s already planning where the new lemon tree will go.\n\nLet me know if you have recommendations for\
      \ drainage contractors who do tidy work without taking half the garden with them. I’d like to minimise disruption if\
      \ possible.\n\nCheers,\nRichard"
