    content: "Subject: After Owen’s fall at Memorial Park\n\nJames,\n\nI know I mentioned this at dinner, but I can’t stop\
      \ thinking about Owen’s spill on the old slide at Memorial Park last Sunday (June 2). He’s still got a bruise on his\
      \ hip and keeps joking that he’s “too old for baby slides,” but I know it shook him up. Between that and Lila’s wrist,\
      \ I really think we can’t wait another year for the city to get its act together on the new equipment. Delaying replacement\
      \ just isn’t an option in my mind after seeing both kids get hurt within a month. \n\nI’m drafting up some alternatives\
