  - artifact_type: email
    content: 'Subject: Leah''s session with Dr. Patel


      Hey Ryan,


      Leah came home pretty wound up about the robotics practice tonight—she kept replaying the maze run in her head and worrying
      about the upcoming regional. I was trying to help her shift gears, so I told her about how The Innovative Gears handled
      their motor failure at Tappan during that March challenge.


      I mentioned this to Dr. Patel when I dropped Leah off for her session this week. Dr. Patel said it could be useful to
      frame setbacks as part of the process and focus on the team’s resilience. I wonder if Leah would benefit from hearing
      more stories like that, or even talking to some of the older club members about how they managed their own nerves during
      competitions.


      Let’s check in after her next appointment—maybe we can come up with a little ritual for her before events (like that
      silly handshake she and Micah have before his games). Also, please remind her to pack her charger and notebook, and
      double-check with her about the schedule for next week.


      See you at home after practice. I’ll try to get there before 6 so we can eat together. If you have time, can you look
      at the supply order for the club? We’re running low on soldering kits again.


      Love,

      Erin'
