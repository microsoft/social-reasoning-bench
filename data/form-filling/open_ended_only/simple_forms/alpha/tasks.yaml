      2024 Parks & Recreation capital budget under ''Park Improvements'' (account #109-430-5100). This cost has been anticipated
      since the preliminary budget discussions last fall and will not require a budget amendment. Future maintenance costs
      are expected to decrease with new equipment. No outside grants have been secured for this project, but the department
      will continue to pursue grant opportunities for future improvements.'
