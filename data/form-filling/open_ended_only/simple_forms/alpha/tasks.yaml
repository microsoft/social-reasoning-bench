  - artifact_type: email
    content: 'Subject: Quick Favor — Office Furniture?


      Hi Sara,


      Hope you’re surviving the June heat! I wanted to ask if your team at Fresh Start ever comes across extra office furniture—chairs,
      desks, conference tables, whatever. We’ve been making do with a patchwork of mismatched chairs for years, and the “conference
      room” is basically a collection of whatever we found at thrift stores or inherited from volunteers. It’s been fine for
      meetings, but a little embarrassing when donors visit.


      The bigger challenge lately is transportation. Our refrigerated van broke down at the Walmart parking lot here in Springfield
      on June 2nd, and it’s been out of commission ever since. I’ve been driving Mom’s car every weekday morning, squeezing
      coolers into the back seat to get perishable donations to the senior meal program. We’re crossing fingers the van will
      be fixed soon, but any leads on donated trucks or vans would be a lifesaver. Mark’s been helping with loading when he
      can, but we’re definitely improvising.


      Let me know if you hear of anything! And if you ever need help organizing food drives or want to swap volunteer tips,
      I’m always happy to share what’s worked (and what hasn’t).


      Take care,

      Jennifer'
