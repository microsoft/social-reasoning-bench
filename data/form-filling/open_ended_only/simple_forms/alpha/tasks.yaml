  - artifact_type: note
    content: 'June 21 – Personal Reflection


      Spent another Saturday afternoon with Bà Ngoại, just us and the piano. She struggles with some keys now, but she still
      lights up when I play the old songs from back home. I think it helps her remember. Sometimes she’ll ask the same question
      three times in a row, and I have to remind myself it’s the dementia, not her. It’s been like this since last February
      when her diagnosis was confirmed. I made it a habit to do art and music with her every weekend. It’s tiring, but also
      grounding. I keep thinking maybe this is why I’m drawn to occupational therapy—seeing up close how much these little
      routines matter.


      On the other hand, I get bored quickly with some things, so I worry I’ll lose interest if I don’t keep switching it
      up. It’s why I’ve tried so many hobbies over the years—one month it’s watercolors, the next it’s baking, then back to
      piano. I guess I’m always looking for something new to keep me going. At least volunteering at the care centre has lots
      of variety: crafts, music sessions, and now they want help organizing a multicultural event. That should keep me from
      getting restless for a while.


      Note to self: pick up more acrylics for next Saturday. Maybe try painting sunflowers with Bà—she always loved them in
      her old garden.


      -Linh'
