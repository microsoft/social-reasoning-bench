    content: "Subject: Sophie's accident on Mill Ave\n\nEric,\n\nJust finished talking with Dr. Reiner after Sophie's near-miss\
      \ last week. She’s pretty adamant that we need to push for a no-parking zone during the morning rush, at least by Riverside.\
      \ I’ll bring it up when I present the motion for the Mill Ave bike lane expansion at council. I know we already have\
      \ the main proposal lined up, but after what happened to Sophie on May 8th, and hearing Dr. Reiner’s perspective, I\
