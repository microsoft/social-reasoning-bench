  - artifact_type: email
    content: 'Subject: About the House – Thoughts


      Hi Sarah,


      I’ve been thinking a lot lately about what we want to do about the house. I know we’ve worked hard to keep things stable
      for Emily and James, but with the mortgage feeling tighter every month, I wonder if we should consider other possibilities.
      Maybe we could see what the bank says about restructuring, or even look into whether we want to stay here long-term.
      I’m honestly not sure if keeping the house is the best option – part of me just wants to walk away and start fresh somewhere
      else, but I know that’s a huge leap.


      I know you’re still attending counseling with Dr. Fiona Murphy at Willowbrook Family Wellness Centre on Tuesdays, and
      that’s helping, even if it’s slow progress. I don’t want you to feel like you have to rush finding a new job or put
