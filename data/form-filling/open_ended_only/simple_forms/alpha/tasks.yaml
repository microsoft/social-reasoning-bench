  - artifact_type: note
    content: 'Friday, June 7


      Long day—everyone wanted fries and lemonade as soon as the sun came out. I had to turn the music down twice because
      some folks from the condos next door stopped by to ask if we could keep it lower during lunchtime. I don’t have a formal
      plan for handling noise complaints; I just adjust the speaker and apologize. Most people are friendly about it, but
      I always worry someone will call bylaw.


      Still, the truck is running better since Carlos helped me replace the gas lines after that propane leak at the Community
      Centre. I’m glad we got those repairs done. The new CO detector is working well.


      Menu’s been pretty simple—no kombucha since Carlos’s allergic reaction last June. I double-check everything for allergens
      now. I do miss the variety, but it’s not worth the risk. Need to remember to check in with Sofia about her speech therapy
      next week—she’s getting more comfortable with Ms. Lee, but she still asks me to wait in the lobby.


      Goal for next week: finalize the gluten-free cookie recipe and coordinate with local vendors for the Saturday event
      at Diego’s office lot.


      - Monica'
