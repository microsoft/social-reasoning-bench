  - artifact_type: email
    content: 'Subject: Supervision session – Sarah Jenkins


      Hi Philip,


      Just finished my supervision session with Sarah Jenkins at the Marlow office. She’s still finding it tough to manage
      her anxiety and missed another coaching day at Turner Leadership Development. We’ve been meeting monthly since May 2019,
      and I’m doing my best to support her, but it’s hard when her mental health impacts her reliability as a coach. I keep
      a close eye on her progress, and sometimes I wonder if I’m doing enough to help.


      Meanwhile, I need to update my notes for tomorrow’s executive team coaching session. Oscar’s homework is piling up again
      (science project due Friday), and Amelia has been anxious about her upcoming piano exam. I’ll try to squeeze in a run
      along the Thames before the day gets too hectic.


      Let’s chat tonight after the kids are in bed.


      Helen'
