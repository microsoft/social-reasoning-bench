  - artifact_type: text
    content: 'WeChat Group: COSC1234_Buddies


      Liang Chen: Anyone else get lost in the last lecture?


      Jason Wu: Bro, Dr. White rushed through like 5 slides in ten mins. I gave up trying to take notes. 😩


      Liang Chen: For real. And he only put up the slides after class, so how are we supposed to actually ask anything? I
      asked about the lambda function and he just said, “You should have learned this in high school.” Like, I didn’t code
      in high school back in China! Annoying af.


      Meng Li: Yeah, I got the same vibe. I think he forgets not everyone grew up learning Python since age 12.


      Liang Chen: After he said that, I didn’t want to ask any more. Tbh I posted about it in the other WeChat group and said
      Dr. White doesn’t care about us. Maybe I was too harsh. Just venting lol.


      Jason Wu: Don’t worry, you weren’t wrong.


      Meng Li: Let’s just survive this semester 😂


      Liang Chen: I hope so. Maybe we make our own cheat sheet or something?


      Jason Wu: I’m in.


      —


      (Maybe follow up with notes on self-study or group meeting.)'
