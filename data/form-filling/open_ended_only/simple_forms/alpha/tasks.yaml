  - artifact_type: note
    content: 'March 2023


      Sofia’s episode hit hard this month. I spent most of March 12th at San Mateo County Behavioral Health with her after
      Elena called in tears. Coordinated with Dr. Patel about her medication changes—another adjustment, more side effects,
      but hopefully this one will stick. Juggling calls between the county, her school, and our family is draining, but the
      crisis intervention protocols I’ve taught my staff are suddenly more real when it’s your own sister in the ER.


      I keep thinking about how many times I’ve been the one giving guidance rather than receiving it. Makes me grateful for
      the support network we have, but also painfully aware of how fast things can spiral. It reminds me of last year, when
      I agreed to facilitate a training for a recovery organization outside of A.A.—they actually paid me an honorarium, which
      felt odd but also affirming in a way. I’m so used to service being volunteer-driven, but it was nice to share some of
      what I’ve learned beyond my usual circles. I sometimes refer clients from my outpatient program to A.A. meetings, which
      has led to some informal collaborations with local A.A. groups. I don’t always clarify my dual role as both a clinician
      and an A.A. member—maybe it seems complicated, or maybe I just assume people know.


      To do:

      - Follow up with Dr. Patel re: next appointment

      - Check on Sofia’s leave paperwork

      - Bring groceries to Elena (she sounded exhausted last night)


      Also: Remember to call Gabriel—he’ll worry if I’m not home for dinner again.'
