  - artifact_type: email
    content: "Hey Jess,\n\nCan I vent about the truck for a second? I swear, every time I fry a batch of rosemary fries, the\
      \ whole place turns into a sauna. The ventilation’s technically up to code, but it barely keeps up when I’m running\
      \ both fryers. By the end of a busy shift, my hair and clothes reek of oil and I feel like I’ve been standing in a cloud.\n\
      \nI keep joking that Monica’s Pacific Eats should come with a built-in steam room. It’s wild—I’ll open the window, and\
      \ within minutes the smell is drifting over to the people doing yoga in the park. I keep apologizing, but everyone just\
      \ laughs it off. Still, it’s not exactly the “fresh Pacific air” vibe I was going for. \n\nThe upside is, everything\
      \ else is running more smoothly since Carlos and I swapped out all the gas lines after that propane leak at the Lions\
      \ Bay Community Centre lot on May 17. We even added a carbon monoxide detector (thank you for nudging me about that!).\
      \ So at least I’m safe while I slowly get deep-fried myself.\n\nWe’re still not offering kombucha anymore after Carlos’s\
      \ allergic reaction last summer. I miss it, but I’m way too paranoid to risk another incident. Now I’m the queen of\
      \ ingredient labels and cross-checks. Lemonade and cold brew forever!\n\nAnyway, how’s the new job going? Let’s catch\
      \ up soon—maybe outside, where the only thing in the air is actual fresh air!\n\nxo\nMonica"
