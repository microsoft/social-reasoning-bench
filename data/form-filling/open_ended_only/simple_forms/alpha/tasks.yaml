  - artifact_type: email
    content: 'Subject: Friday night plans + insurance stuff


      Hey Jess,


      Hope you’re hanging in there this week—I saw your post about the PTA bake sale meltdown, and I’m just glad it wasn’t
      my turn! Things here are… well, let’s just say complicated. I’ve been going back and forth with my doctor about this
      MRI for my back. Honestly, I wasn’t that worried about it at first, but Dr. Patel is pretty insistent we try to get
      it approved since the pain’s not letting up. I don’t know, maybe the scan will actually show something useful, but it
      just feels like jumping through hoops.


      The insurance company keeps pushing back, so now Dr. Patel is documenting everything—especially since my legs went numb
      and I fell (yep, in the middle of my own bathroom, after a long day at the plant). Brian practically has to help me
      get ready half the time these days, which is not exactly how I pictured our 40s, but what can you do? At least Mom is
      nearby now and helps with Tyler’s robotics pickups when I’m wiped out.


      Anyway, enough about me. Are you still on for our movie night Friday? I might need to commandeer the comfy side of the
      couch, but I’ll bring the wine!


      Let me know what you’re in the mood to watch. Miss you!


      Evelyn'
