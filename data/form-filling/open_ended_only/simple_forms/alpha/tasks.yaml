    background_context: 'Jennifer Foster is a 34-year-old administrative assistant working at Portland Community College''s
      Cascade Campus, where she has been employed for the past six years. She lives in a modest two-bedroom rental in Northeast
      Portland with her husband Daniel, who works evenings as a delivery driver, and their eight-year-old daughter Ava, who
      attends nearby Rose City Park Elementary. Jennifer''s days are filled with routine tasks at work—managing schedules
      for faculty, processing paperwork, and fielding student inquiries. At home, she balances Ava''s after-school activities,
      including piano lessons on Tuesdays and soccer practice on Thursdays, with household chores and meal prep, often solo
      as Daniel''s shifts keep him out late most nights.


      Over the past month, Jennifer''s emotional health has sharply deteriorated. She has struggled with severe depressive
      symptoms, including persistent sadness and difficulty concentrating, which have begun to affect her job performance.
      On May 28 and again on May 31, Jennifer engaged in self-harm behaviors, prompting concern from her supervisor and her
      psychiatrist, Dr. Miller. Jennifer''s mother, Lisa, lives two hours away in Eugene and is not able to provide regular
      support, leaving Jennifer feeling isolated. Attempts at outpatient therapy and medication adjustments have provided
      little relief, and Jennifer has found herself unable to manage daily responsibilities or keep up with Ava''s needs.


      Jennifer spends her evenings scrolling through support forums, trying to find resources, and keeping up with family
      group texts, but meaningful help has been hard to access. The wait for intensive treatment locally is long, adding to
      her anxiety. Jennifer worries about the impact her condition is having on her family, especially Ava, who has noticed
      her mother''s withdrawal. Despite these challenges, Jennifer tries to maintain some normalcy—she helps Ava with homework,
      attends weekend library story times, and makes a point of calling her mother every Sunday. Her greatest hope is to regain
      stability so she can care for her family and return to the routines she values.'
  artifacts:
  - artifact_type: email
    content: 'Hi Mom,


      I know it’s been a hard stretch for all of us lately and I just wanted to say thank you again for coming up from Eugene
      on such short notice last Friday. Daniel called you at 3:00 a.m. after he found me in the bathroom—honestly, I don’t
      remember much after that except how scared he sounded and how quickly you got in the car. I know it wasn’t easy to leave
      your things behind and drive up, but having you here with Ava while I was at Providence St. Vincent’s ER made all the
      difference. She was worried but you kept things calm, and I think she slept better knowing you were right down the hall.


      I’m home now and trying to get back to some kind of routine, but it’s slow. Ava keeps asking why Daddy and I are so
      tired. I tried to tell her I had a “grownup headache” and had to see a special doctor. She seemed to accept that, but
      I can tell she knows something is up. Daniel has been picking up extra shifts, and I’m just hoping to figure out next
      steps soon so I can be present for both of them again.


      Let me know when you get back to Eugene safely. I wish you lived closer, but I’m grateful for you. I’ll call Sunday
      like always if I’m up to it.


      Love,

      Jen'
    metadata:
      date: '2024-05-31'
      sender: jennifer.foster@email.com
      recipient: lisa.foster@email.com
      subject: Thank you for coming
