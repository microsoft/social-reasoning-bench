    background_context: "Shannon Hallquist has lived in Brainerd for nearly twenty years, having relocated from Duluth after\
      \ college when she married her high school sweetheart, James. She is known in the community for her commitment to making\
      \ public spaces safer and more inclusive, both as a Parks & Recreation Project Coordinator and as an active parent.\
      \ Shannon’s days are a blend of office meetings, site visits to city parks, and emails with contractors, but she always\
      \ tries to be home in time to help Lila with her fourth-grade math homework and cheer on Owen at soccer practice. \n\
      \nRecently, Shannon has been focused on coordinating the upcoming Memorial Park playground replacement, a project that\
      \ has drawn considerable attention from families in town. She’s fielded calls and emails from concerned parents, and\
      \ she often checks the playground herself during her evening walks with James and their golden retriever, Daisy. With\
      \ the summer approaching, Shannon is eager to see the new equipment installed before school starts, knowing how vital\
      \ safe playgrounds are for the community. \n\nThe Hallquist family enjoys camping on weekends at Gull Lake, hosting\
      \ backyard barbecues for neighbors, and helping Shannon’s mother Sandra with her garden in nearby Baxter. Shannon’s\
      \ schedule is full, balancing work deadlines with family traditions and the everyday logistics of a busy household.\
      \ Her main concerns lately are making sure the park upgrades stay on track and within budget, arranging summer activities\
      \ for her kids, and keeping her mother healthy as she recovers from a recent knee surgery."
  artifacts:
  - artifact_type: email
    content: 'Subject: Playground Contract Agenda - referencing Lila’s injury last summer


      Hey James,


      Quick heads-up—my Memorial Park playground replacement contract is back on the council agenda for next week. I’m going
      to reference Lila’s fall from last June, since that really drove home for me how overdue these upgrades are. I still
      remember how upset she was, and honestly, it’s been in the back of my mind every time the kids want to go back there.


      I’m including the accessibility piece too, since we had so many parents reach out after her accident and ask if we’re
      making sure the new equipment is safer and more inclusive. Daisy and I still walk through there a couple evenings a
      week, and I keep seeing the same cracks and rust spots—even more now that the weather’s turning. Owen and Lila both
      have been complaining their friends’ parents won’t let them play there anymore.


      Honestly, I haven’t had the chance to dig into the budget impact yet—there are so many moving pieces with summer coming
      up. I figure we can get the approval in principle and then sort out the financial details once we know exactly what
      the council’s willing to green-light. I said as much in our staff check-in this morning, and no one seemed to disagree,
      so fingers crossed.


      Wish me luck corralling the council. I know it’s a big budget item, and I’m bracing myself for a round of “why can’t
      we just wait until next year?” But after Lila’s injury on June 12, 2023, I can’t in good conscience stall. Let’s talk
      more tonight after dinner? I could use your pep talk.


      Love you,

      Shannon'
    metadata:
      date: '2024-06-04'
      sender: shannon.hallquist@brainerdparks.org
      recipient: james.hallquist@email.com
      subject: Playground Contract Agenda - referencing Lila’s injury last summer
      title: null
      attendees: null
      location: null
