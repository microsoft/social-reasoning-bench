  - artifact_type: note
    content: "Apartment Search – Personal Reflections\n\nSitting on the living room floor surrounded by half-packed boxes.\
      \ Feels surreal that I’ll be out of 421 Martin Street within the next month or so. Mr. Coleman’s announcement in March\
      \ about the building sale (after his divorce) blindsided a lot of us—I wasn’t planning to move until at least next year.\
      \ \n\nI keep bouncing between excitement (finally a real shot at a modern kitchen, maybe less traffic) and anxiety (so\
      \ much to do, so many places that just aren’t right). Part of me is sad to leave the routines and the little community\
      \ here, but I know it’s time. If I’m lucky, I’ll find a place where I can actually cook for friends, maybe host a dinner\
      \ party without worrying about the ancient stove. For now, just need to keep putting one foot in front of the other\
      \ and remind myself that change can be good."
