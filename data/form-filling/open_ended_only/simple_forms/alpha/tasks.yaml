    value: The Maple Street Duo consists of Emily Carter (vocals, acoustic guitar) and Daniel Lee (keyboard, harmonies), both
      lifelong residents of Welland, Ontario. Emily grew up participating in her church choir and later studied music at Brock
      University, focusing on folk and jazz vocals. Daniel began playing piano as a child, studying classical technique before
      branching into blues and indie pop during high school. The duo formed while volunteering at the Welland Arts Festival
      in 2017, where they discovered a shared love for folk storytelling and modern pop arrangements. Since then, they have
      performed at various local events, including the Niagara Food Festival, Welland Canal Days, and several farmers’ markets.
      Their set typically includes reimagined covers of Canadian songwriters, original compositions inspired by Niagara’s
      landscapes, and audience sing-alongs. They are passionate about fostering community through music and often collaborate
