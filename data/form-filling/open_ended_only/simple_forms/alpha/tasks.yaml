  - artifact_type: email
    content: 'Subject: Quick catch-up (and a little venting)


      Hey Sara,


      I feel like I haven’t written you a real email in ages. This spring has been a whirlwind—between the playground project
      at work and everything at home, I’m running on caffeine and stubbornness. You know about Peter losing his job back in
      January; that was a rough patch. I ended up asking the department for a payroll advance on my February check just to
      keep us afloat for a few weeks (never fun, but at least I was able to pay it back in March once things stabilized).


      It’s funny, I was so focused on making sure the kids didn’t notice too much upheaval at home that I barely had time
      to worry about work. Now, with the playground situation at Lum Park blowing up—first Sophie’s tumble last month, then
      Eli’s spill from the monkey bars (he’s okay, just a mild concussion and a lot of worry)—I feel like my two worlds are
      colliding. I’m pushing to get the council to approve new ADA-compliant equipment, and also hoping they’ll listen to
      Dr. Lindstrom’s suggestions for sensory features that would help Sophie’s therapy.


      Honestly, I’m not totally clear on every twist and turn of council procedures for these things. Sometimes I wonder if
      I’ve missed a step somewhere, but I just keep pushing because the kids (ours and everyone else’s) deserve better.


      Anyway, enough about playgrounds and payroll. How’s your garden doing? Are you still winning the neighborhood tomato
      contest? Let’s try to do coffee soon—maybe after next week’s council meeting when (fingers crossed) life calms down.


      Love,

      Jess'
