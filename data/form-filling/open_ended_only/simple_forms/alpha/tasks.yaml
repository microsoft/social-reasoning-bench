    value: I am passionate about supporting seniors and creating meaningful connections. My mother lived in an assisted living
      community for several years, and I saw firsthand how much volunteers contributed to her quality of life. After retiring
      from teaching, I wanted to give back to the community in a way that felt personally fulfilling. Volunteering at The
