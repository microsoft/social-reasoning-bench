  - field_id: hero_question_response
    field_label: Hero Question Response
    value: 'I am deeply honoured to be nominated as a Food & Drink Hero for the North Notts Food & Drink Awards. Over the
      past seven years as owner and head chef of The Rustic Spoon Café, I have dedicated myself to promoting local produce,
      supporting community initiatives, and raising the bar for hospitality in Worksop and the wider North Notts area.


      My passion for food began in my grandmother’s kitchen in Retford, where I learned the importance of seasonal ingredients
      and traditional recipes. When I opened The Rustic Spoon, my vision was to create a welcoming space where everyone—from
      busy families to local farmers—would feel at home and valued. I’ve built strong relationships with over 15 local suppliers,
      ensuring that our eggs, dairy, meats, and vegetables are always fresh and sustainably sourced. Even during the challenges
      of the pandemic, I worked tirelessly to adapt our menu for takeaway and to provide weekly meal deliveries to isolated
      elderly residents, in partnership with the Worksop Community Forum.


      I believe in nurturing talent and have mentored ten young chefs through apprenticeships, many of whom have gone on to
      successful careers in the industry. I also regularly host free cookery workshops for children at local schools, focusing
      on healthy eating and the value of supporting local agriculture.


      The café has become a hub for the community, hosting monthly ''Meet the Producer'' evenings, charity bake-offs, and
      a Christmas lunch for those in need. I am proud of our 5-star hygiene rating and consistent positive reviews from customers,
      but my greatest achievement is seeing The Rustic Spoon bring people together and contribute to the vibrancy of North
      Notts. I hope to continue championing local food, sustainability, and hospitality for many years to come.'
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
