  - artifact_type: email
    content: 'Subject: Budget Update – Cooper’s Hospital Bills & Project Funds


      Hey Lisa,


      Wanted to keep you in the loop on the budget stuff. Cooper’s hospitalization at St. Joseph’s Medical Center last month
      for his respiratory infection meant I had to move $2,500 from the Active Transportation Improvements line temporarily
      to cover his out-of-pocket medical bills. City insurance hasn’t processed the reimbursement yet, so we’re still in limbo.
      This threw off the timeline for the bike lane project a bit, and I’ve had to shuffle some numbers internally to make
      sure nothing slips through the cracks.


      Honestly, my cost estimate for the project is still just a rough guess based on what similar projects have cost in the
      past. I’m hoping the council won’t push for more detail until we get the insurance payout and I can firm up the numbers.
      If the grant comes through, it’ll cover about 30% – fingers crossed.


      Let me know if you hear anything from the insurance side or if you want to go over the numbers together this weekend.
      Cooper’s feeling better and back to his usual chaos, so hopefully things settle down soon.


      Love,

      David'
    metadata:
      date: '2024-06-04'
      sender: david.rydell@brainerdmn.gov
      recipient: lisa.rydell@gmail.com
      subject: Budget Update – Cooper’s Hospital Bills & Project Funds
