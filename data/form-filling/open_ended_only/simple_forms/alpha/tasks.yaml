  - artifact_type: text
    content: 'Susan: Hey Rachel, are you still free for coffee on Thursday? I need to vent a little about council stuff—everything’s
      piling up again.


      Rachel: Always! 10:30 at Capitol Grounds?


      Susan: Perfect. Matthew’s schedule is all over the place since he started behavioral therapy with Dr. Chen at Riverside
      after his inpatient stay in March. Plus, the weekly runs to Montpelier Developmental Services Clinic for his speech
      and OT appointments… and Emily’s soccer games… I feel like I’m just shuttling everyone everywhere! Last month was especially
      rough after Matthew’s 3-day suspension from Montpelier High. Juggling all the advocacy meetings and Emily’s school things
      means family dinners have gone out the window. I worry I’m not keeping up with either side—sometimes I wish I could
      pause the world for a week.


      Rachel: I don’t know how you do it. You always seem like you have it together, but you must be exhausted.


      Susan: I definitely don’t! I keep telling myself it’ll get easier once Matthew settles into his program, but the balance
      is always tricky. I’ll see you Thursday—and thanks for letting me unload a little.'
