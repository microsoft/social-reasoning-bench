    content: 'Subject: Quick catch-up (and Centre sign news)


      Hey Mum,


      Hope you and Brian are doing well. I just wanted to fill you in on some bits from here. We’re keeping the new sign up
      at the Centre for good—after Sam lost her job at BHP last June, it’s more important than ever to keep the business visible
      and steady. She’s at the library a few hours a week, but it’s not the same security, you know? The kids are adjusting—Ella’s
      a proper high schooler now and Jack is loving soccer (I’m still coaching, though a bit slower these days with that dodgy
      knee).


      Honestly, I haven’t really decided how long the sign will stay up. We’re saying it’s permanent, but between you and
      me, if business slows down or something else comes up, maybe we’ll take it down or change it out. For now, it’s doing
      its job and making the place look sharp. The new colours are way better for Sam since her reaction to the red paint
      last year at the Centre—now it’s green, orange, and the boab logo, which Jack thinks looks like a flying tree.


      If you’re planning a trip out here, let me know. Would love for you to see the new look (and the old sign I’ll be hauling
      back to the house—couldn’t bring myself to toss it!).


      Love,

      Nathan'
