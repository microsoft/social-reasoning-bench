    background_context: 'Susan Thompson lives in Montpelier, Vermont, in a cozy house on Maple Lane with her husband Michael,
      their 19-year-old son Matthew, and their 15-year-old daughter Emily. Life in the Thompson household is lively and full
      of routines, especially centered around Matthew''s needs and Emily''s high school activities. Susan left her position
      as a special education teacher last year to become a full-time advocate for inclusive education, working with the Vermont
      Inclusive Education Initiative. Her days are filled with collaborating with local schools, running parent workshops,
      and supporting families navigating IEP meetings and transition planning for young adults with disabilities. She often
      attends community events, pushing for accessible playgrounds and inclusive recreation programs.


      Recently, Susan has been helping Matthew transition into adulthood after his graduation from Montpelier High School.
      Matthew attends a day program at a local community center, and Susan is actively involved in ensuring he has access
      to meaningful activities and supported employment. She regularly meets with other parents to discuss available services
      and future planning, sometimes feeling the weight of uncertainty about Matthew''s long-term care and independence. Meanwhile,
      Emily is preparing for her sophomore year, balancing her studies and playing soccer. Susan finds moments of balance
      through weekly yoga classes and gardening on weekends. She and Michael enjoy hiking in Hubbard Park and hosting Sunday
      dinners for friends and neighbors, fostering a supportive network.


      Susan’s professional and personal experiences have made her a respected voice in Vermont’s disability advocacy circles.
      She’s known for her warmth, determination, and willingness to share her own family’s journey to help others. Lately,
      she’s been organizing a workshop series on transition services for parents of teens with disabilities, drawing from
      her years as a teacher and her own lived experience. At home, Susan and Michael work together to support Matthew’s growth
      and Emily’s ambitions, while also planning a short family vacation to Lake Champlain this summer—a rare chance for relaxation
      and togetherness amid their busy lives.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Quick Update on Matthew + Emily + Weekend Plans


      Hi Michael,


      Just wanted to fill you in before the week runs away from us. Matthew had his Wednesday session with Dr. Angela Chen
      at the Riverside Mental Health Clinic again this afternoon. I sat in for the first part—the focus was mostly on helping
      him manage transitions, especially after that rocky patch earlier this spring. Dr. Chen still seems to be picking up
      on some of the behaviors that started after his three-week inpatient stay back in March. She thinks a more structured
      daily routine at home might help, so maybe we can talk about what mornings could look like when you get home? Also,
      I asked her if she could reach out to Montpelier High School about strategies, since we’re still seeing some carryover
      from his April suspension. Ms. Riley from the Montpelier Developmental Services Clinic is going to coordinate with her
      for next week’s team meeting—maybe we’ll finally get some momentum.


      Emily’s soccer practice got moved to Friday, so I’ll handle pickup. She’s excited for sophomore year but is already
      worrying about balancing schoolwork and the team schedule. I told her we’d try to make dinner with the whole family
      work at least twice a week, even if it’s just pizza.


      Let’s try to carve out some time this weekend for a walk in Hubbard Park—or maybe just an hour in the garden if the
      weather stays nice. I’m feeling stretched thin with the council work and all the extra advocacy meetings this month,
      especially with Matthew needing more support at home. Sometimes it feels like I’m more of a behind-the-scenes supporter
      than actually leading anything. Maybe a little outdoor break will help reset.


      Love,

      Susan'
