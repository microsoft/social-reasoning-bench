  - artifact_type: note
    content: 'Draft: Playground Project Funding & Family


      • Talk to Mom about possibly using part of her inheritance (from April) to help fund the Gregory Park playground equipment.
      She’s always loved seeing the kids play there. Double check if she’s comfortable with the idea—don’t want to make her
      feel pressured.


      • Lily’s minor concussion last July after slipping on the cracked plastic surface at Gregory Park really stuck with
      me. I can’t stop thinking about how lucky we were she wasn’t more seriously hurt. Need to keep this in mind for the
      new equipment proposal—maybe bring up how the old playground is a safety risk not just for kids like Lily but everyone.


      • Alternative: Evan’s OT, Dr. Finn, brought up concerns about the structure at his March appointment at St. Joe’s. She
      recommended more PT sessions instead of letting him use the playground for now. Not ideal—PT costs $85 a week and he
      misses out on playing with friends. Social time is important for him.


      • I honestly don’t even know if this is something the council would handle, but I guess it doesn’t hurt to ask. Maybe
      they’ll at least point me in the right direction.


      • Reminder: Call Parks office about the grant paperwork status and check with Finance on expediting fees from last month.


      To Do: Sync with Ben about all of the above before next week’s meeting.'
