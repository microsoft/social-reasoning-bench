    background_context: 'Linda Reynolds lives in a quiet neighborhood in St. Paul, Minnesota, with her husband, Arthur, who
      recently retired from a local engineering firm. Their home is filled with photos and mementos from years spent raising
      their two children, Emily and Brian, who now live nearby. Emily is a graphic designer and Brian works in IT; both visit
      regularly, often stopping by for Sunday dinners or to help with household projects. Linda''s mother, Helen, lived in
      an assisted living community for several years before passing away in 2021, an experience that deeply shaped Linda’s
      outlook on aging and community.


      Recently retired after 27 years teaching elementary school, Linda enjoys her newfound freedom while staying active.
      Her days begin with early morning walks around Como Park, followed by coffee and a crossword puzzle. Linda volunteers
      at The Waters, a local senior living community, where she leads book clubs, organizes arts and crafts sessions, and
      occasionally runs baking classes. She’s CPR certified and comfortable helping residents with mobility challenges, drawing
      on both her teaching and personal caregiving experience. Linda finds fulfillment in these activities, especially connecting
      with residents affected by dementia, offering them patience and reassurance.


      Linda’s calendar is dotted with family events, volunteering shifts, and social gatherings. She keeps busy with hobbies
      like baking, gardening, and reading, and she’s passionate about music therapy—occasionally playing piano for small groups
      at The Waters. Linda is looking forward to an upcoming trip to Duluth with Arthur, a tradition started after retirement.
      Her main concern lately is maintaining her health and staying active, as she wants to continue volunteering for as long
      as possible. She also keeps in touch with former colleagues and friends, and enjoys learning new skills, such as watercolor
      painting, at community workshops. Linda’s days are purposeful, shaped by a desire to brighten others’ lives and to nurture
      her own sense of connection and belonging.'
  artifacts:
