  - artifact_type: internal memo
    content: 'City of Brainerd Public Works Department


      To: City Council Members

      From: Jacob Peterson, Director of Public Works

      Date: February 14, 2024

      Subject: Request for Authorization – Snow Plow Replacement Following January 2024 Incident


      Council Members,


      I am submitting this formal request for authorization to purchase a new snow plow to replace the 2008 International,
      which was critically damaged in the vehicle accident on Brainerd city streets during the severe winter storm response
      in January 2024. As you are aware, the incident involved my son, Ethan Peterson, who was operating the equipment as
      part of our crew’s emergency response shift. The collision resulted in significant equipment damage, rendering the plow
      inoperable and beyond reasonable repair per our fleet assessment.


      Given the age of the unit and the escalating costs of maintenance and parts over the past season, it is neither fiscally
      responsible nor operationally feasible to restore the vehicle. The department has already received multiple vendor quotes
      for a replacement, and I recommend proceeding with the purchase before the late-winter storms forecasted for next month.
      This will ensure safe and timely clearing of city roads, as resident feedback has underscored the importance of efficient
      service after the delays we experienced during the last storm.


      Thank you for your consideration.


      Jacob Allen Peterson

      Director, Public Works'
