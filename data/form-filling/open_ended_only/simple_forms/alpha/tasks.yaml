  - artifact_type: email
    content: 'Subject: Career catch-up and last week’s DEI session


      Hi Rachel,


      Hope your week is going well. I wanted to check in after last Friday’s DEI workshop. Honestly, I found it pretty repetitive—same
      buzzwords, same exercises, and not much new for those of us who’ve been to a few already. I wish they’d mix things up
      or make it more practical for actual office dynamics. I’ve attended several DEI sessions now, but only the University
      of Michigan online course felt useful. Most others just feel like checking a box.


      I’ve been looking at some HR analytics courses online, but haven’t managed to finish one yet. Family life keeps getting
      in the way. I tried a Coursera class last year but dropped out halfway—it was too much with the kids’ schedules and
      work deadlines. Maybe I’ll try again in the fall if things calm down.


      On another note, open enrollment is coming up at Maplewood. I’ll be handling most of the claims paperwork again, including
      for my brother Eric—his PTSD coverage was a real headache last spring, but we finally got him set up. He’s got VA court
      hearings in September, so I may need to be flexible with my schedule for a few days.


      Let me know if you want to grab coffee next week. Mondays work best for me since I’m usually remote.


      Take care,

      Jessica'
