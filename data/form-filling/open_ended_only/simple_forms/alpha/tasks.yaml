  - artifact_type: text
    content: 'Carlos –


      Can you swing by the truck early tomorrow? The main cooktop’s acting up again, and I’ll need to use the camping stove
      if we get another big lunch rush. I’m still not sure what’s up with the ignition—sometimes it’s fine, sometimes I’m
      wrestling with it for ten minutes. I’m worried about it giving up completely in the middle of service.


      We should probably check those gas lines again, just in case the propane leak last month at the Community Centre parking
      lot caused more issues than we thought. I know you double-checked everything after we swapped out the bad fittings (thank
      you again for spending your whole Saturday on that with me!), but maybe we missed something. I don’t want a repeat of
      that mess, or the insurance paperwork!


      Also—can you bring the new carbon monoxide detector? The old one keeps beeping at weird times. I’d feel a lot better
      having a backup, especially with how the ventilation gets when I’m frying. I’ll have the rosemary fries ready as a bribe
      ;)


      Love you. See you in the morning.


      Monica'
