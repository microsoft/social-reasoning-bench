    background_context: 'Liang Chen is a 21-year-old international student originally from Guangzhou, China, who relocated
      to Melbourne in late 2021 to pursue his Bachelor of Information Technology at RMIT University. Liang lives in a student
      apartment in the city, just a short walk to campus. He is adjusting to life in Australia, managing both the challenges
      and the excitement of living independently for the first time. Liang keeps in close contact with his family through
      weekly WeChat calls, especially his younger sister Min, who is finishing high school in China. He often misses home-cooked
      meals and sometimes feels homesick, but he has gradually made friends with other international students, bonding over
      late-night study sessions and shared meals in local Chinatown eateries.


      Most days, Liang balances his coursework with a part-time gig as an online Mandarin tutor for local children, which
      helps cover his expenses and gives him a sense of purpose. He is diligent in his studies but has recently felt increased
      pressure due to difficulties in his Introduction to Programming class. The inconsistent upload of lecture materials
      and communication style of the instructor, Dr. James White, have made it harder for him to keep up, especially as someone
      new to programming and the Australian academic system.


      Aside from academics, Liang enjoys playing basketball at the university rec center on weekends and exploring Melbourne’s
      many coffee shops with study mates. He occasionally volunteers with the international student welcome team, helping
      newcomers settle into city life. His main concerns at the moment revolve around catching up in his programming class,
      improving his academic confidence, and making sure he doesn’t let down his parents, who have sacrificed a lot for his
      education abroad.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Just Checking In – This Week Has Been a Lot


      Hi Mum,


      I hope everything is okay at home and that Min is not too stressed with her exams. I wanted to write because this week
      has honestly been a bit overwhelming for me at uni. I had my first session at the RMIT Student Wellbeing Centre on Thursday
      (April 18). It was actually pretty helpful to talk to someone face-to-face. I decided to go because the anxiety from
      my Introduction to Programming class (the one with Dr. White) has been getting worse. I know you always tell me to ask
      for help if I need it, so I tried.


      The main issue is that Dr. White often uploads the lecture slides and materials to Canvas after class, which makes it
      hard to prepare or even follow along. Last week, he was late again—about 15 minutes—and then rushed through a bunch
      of new topics. I asked a question about a Python function, and he said, "You should have learned it in high school,"
      which made me feel really embarrassed. I know you and Dad didn’t get the chance to do this kind of thing, so I feel
      bad complaining, but it’s been hard to keep up. Some of my classmates have similar problems, and we talk about it after
      class.


      I’m doing my best, and the counselor gave me some tips on how to manage my stress and not lose confidence. I’m also
      still tutoring Mandarin to local kids online, which helps with my rent and keeps me busy. I’ll call on Sunday as usual
      so you can see my face and not just hear me venting by email. Please tell Dad not to worry too much!


      Love,

      Liang'
    metadata:
      date: '2024-04-19'
      sender: liang.chen@email.com
      recipient: hua.zhang@email.com
