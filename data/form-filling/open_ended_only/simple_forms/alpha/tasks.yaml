    background_context: 'Amy Christensen has lived in Brainerd since 2010, when she and her husband Ben relocated from Duluth
      after Ben accepted a teaching position at Brainerd High School. Amy started working with the City of Brainerd’s Parks
      & Recreation Department shortly after moving, and has steadily built her career as a program coordinator, focusing on
      community engagement and inclusive play spaces. She balances her full-time job with parenting Lily and Evan, who attend
      Lowell Elementary and the local preschool, respectively. Her mother, Susan, lives within a mile and often helps with
      after-school pickups and babysitting.


      Recently, Amy has been juggling spring soccer scheduling and planning summer camps at Gregory Park. She’s been especially
      attentive to maintenance issues at the playground since Lily’s friend, who uses a wheelchair, struggled to access the
      equipment last summer. Amy listens to parents’ concerns during weekly park meetings and enjoys collaborating with the
      Brainerd Inclusive Play Task Force. She’s looking forward to the new playground installation this fall, hoping it will
      make the park safer and more welcoming for all families.


      Outside of work, Amy enjoys gardening in their backyard, weekend hikes on the Paul Bunyan Trail, and volunteering for
      local clean-up events. She and Ben recently attended a community concert at Lum Park, and are planning a family camping
      trip in late August. Amy’s main concerns lately are keeping up with busy schedules, balancing Lily’s food allergy management,
      and making sure Evan’s speech therapy appointments fit around her work hours.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Quick check-in about Lily and the park


      Hey Ben,


      Just wanted to catch you up on a few things since you''ve been swamped with finals week. First off, Lily is doing okay
      after her little mishap at Gregory Park last Friday. She scraped her knee again on the old equipment—nothing too dramatic,
      but it definitely rattled her and me both. It’s the second time in less than a year she’s gotten hurt there, and I’m
      honestly starting to feel like we need to push harder for the playground upgrade. Should I mention Lily’s fall in the
      council proposal, or does that feel too personal?


      On a related note, I’ve been thinking about using a chunk of Mom’s inheritance from April to help cover any gaps for
      the new equipment. I know we haven’t had a chance to talk about it in depth yet, but it feels like something that would
      make Mom happy, and it might help get the project over the finish line. Let me know what you think—we can talk more
      tonight after the kids are in bed.


      I’m still waiting on a few details from Finance and Building Maintenance about the installation timeline, so my draft
      for the meeting isn’t quite done. If you have any thoughts, I’ll take them! Hope your classes aren’t driving you too
      crazy.


      Love,

      Amy'
