  - artifact_type: email
    content: 'Subject: Re: Volunteer Application Follow-up


      Hi Marissa,


      Thank you so much for reaching out about the volunteer coordinator position. I’d be happy to talk more about our youth
      mentorship program and how the volunteers are integrated into our daily routines at Hall Equine Rescue.


      Just to share a little background: I first met Jessica Hall in May 2015, right at a turning point in her life. She had
      just started volunteering with us, looking for emotional support while going through a difficult divorce from her then-husband,
      Adam Monroe. It was obvious from the start that she had a natural connection with the horses, especially the more reactive
      mustangs who needed patient, trauma-informed handling.


      Jessica’s experience during that period shaped a lot of the empathy and resilience she brings to our program today.
      She went from being a newcomer to co-founding the rescue with Michael Hall later that year. Her personal journey has
      been an inspiration to a lot of our teens who come to us during their own challenges.


      If you’d like, I can arrange for you to shadow Jessica during one of our groundwork sessions. She’s open about her experiences
      and the ways the rescue helped her heal—and she’s a wonderful mentor to both youth and adults alike.


      Let me know what your schedule looks like for next week, and I’ll coordinate with Jessica.


      Best,

      Kara Middleton

      Volunteer Liaison, Hall Equine Rescue'
