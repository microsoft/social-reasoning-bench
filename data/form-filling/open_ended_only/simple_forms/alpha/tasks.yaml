  - artifact_type: email
    content: 'Subject: Re: Insurance Funds for New Plow


      Hi Sue,


      Just confirming that we’ll be using the insurance payout from American Family Insurance after the June garage fire (claim
      #AFI-3924881) to cover most of the cost for the new 2024 Mack Granite plow. The council motion should cap the total
      at $248,500, which includes all the equipment, tax, and delivery. Please make sure the remittance is attached to the
      purchase documentation—sometimes those files go missing between departments, and I don’t want to chase them down at
      the last minute.


      Honestly, I haven’t had time to look into other possible ways to fund this—the insurance money was the obvious path,
      and with the old plow destroyed in the fire, we didn’t have much choice anyway. If you spot any gaps in the numbers,
      let me know. Otherwise, I’ll check in after Tuesday’s meeting and swing by your office with any paperwork you need signed.


      Thanks for staying on top of this,

      Jake'
