  - artifact_type: note
    content: 'June 6th, Thursday


      Another tough night. The barking started right on cue at 10:30 pm and didn’t stop until nearly 2. I tried earplugs again,
      but the sound just cuts through everything. Mark tossed and turned, and Sophie looked so pale at breakfast. I hate seeing
      her so wiped out. Need to remember to check her backpack for any notes from her teacher—she said Mrs. Williams asked
      if everything was okay at home. Maybe I should email her, just to explain.


      Tried leaving another note for the neighbor at 746 Maple Ridge. Still no response. I saw Lisa this morning, and she
      said she’s started sleeping on the couch in the back room just to get away from the noise. I’m not sure how much longer
      we can all keep this up without snapping at each other.


      Pick up groceries after work (snacks for Aaron’s soccer, more coffee, melatonin—maybe a new brand?). Remind Mark to
      reschedule his shift he missed on the 3rd. Sophie’s state testing is next week, and I need to make sure she’s got a
      quiet spot to study this weekend.


      I miss feeling rested. We used to love our calm little block.'
