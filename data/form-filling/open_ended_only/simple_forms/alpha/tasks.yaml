  - field_id: reason_for_request
    field_label: Reason For Request
    value: We are requesting an exemption to legalize the current subdivision of our property, which was separated into two
      parcels by a previous owner in the late 1980s without proper county occupancy approval documentation. After purchasing
      the property in 2018, we discovered during refinancing that the legal status of the subdivision was in question. The
      main residence is located on the 2.3-acre parcel and was issued a certificate of occupancy, but the smaller 1.8-acre
      parcel, which contains a small seasonal cabin, lacks formal approval records. We have since upgraded the septic system,
      installed a fire mitigation buffer, and conducted a survey to clarify lot boundaries. Our intent is to maintain both
      parcels as family-owned for our children and to ensure all structures are brought into compliance. We are happy to provide
      documentation of all improvements and to allow site visits as needed. This exemption will resolve title concerns raised
      by our lender and allow us to proceed with long-term stewardship of the land. Our family has invested significantly
      in improving the property, and we wish to ensure it is properly documented and a positive asset for the neighborhood.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
