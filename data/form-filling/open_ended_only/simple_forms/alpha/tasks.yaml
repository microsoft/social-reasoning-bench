  - artifact_type: note
    content: 'Personal Journal – July 2023


      I still can’t believe I actually won the raffle at the community center last year. $1,200—what a lifesaver. I remember
      sitting in the folding chair, not expecting anything, and then hearing my name. For once, something went right. We used
      most of the money to pay down the balance on Lucas’s dental work and cover some of the bills from my hospital stay at
      Strong Memorial in July. It felt so good to hand Carlos a check and say, “Here, this is for the bills.”


      Some days it feels like every time we get ahead, another thing knocks us back—hospital stays, prescriptions, co-pays,
      you name it. But I’m grateful for small miracles and for the way our family pulls together. I have to remember to thank
      Mom again for her help that month, too.


      —Maria'
