  - artifact_type: note
    content: "Personal Note – Downtown Bike Racks Proposal\n\nAfter Maya’s near-miss outside the Brainerd Public Library last\
      \ month (May 2024), I can’t get the image out of my head. She was unlocking her bike from a street sign and nearly got\
      \ clipped by a car rushing to beat the light. It’s not just her — I’ve seen other teens doing the same, and it’s only\
      \ a matter of time before someone gets hurt for real. I need to keep pushing for better bike infrastructure downtown.\
      \ \n\nI haven’t gathered all the background info I’d like yet, but I want to get this on the city council’s agenda before\
      \ the deadline. Need to finalize the locations by Thursday and double-check with the Downtown Business Association.\
      \ Also, remember to talk to Dave about whether this falls under Parks and Rec or if Public Works should handle installation.\n\
      \nPeople are supportive, but a few are worried about racks cluttering the sidewalk. Need to address those concerns in\
      \ the proposal—maybe include a diagram showing extra clearance for mobility scooters (thinking of Mom and her arthritis,\
      \ plus her fall last November).\n\nTo-do:\n- Survey more businesses\n- Confirm rack model and pricing\n- Add Maya’s\
      \ incident as an example in the cover letter\n- Get feedback from city council members\n\nDon’t forget: Maya still wants\
      \ to bike to the library this summer, so this needs to happen soon."
