    field_label: Denied Services Description
    value: I am requesting an independent review of the denial issued by my health insurance provider regarding a recommended
      MRI scan of my lumbar spine with and without contrast. My primary care physician and my neurologist both advised the
      MRI due to persistent lower back pain, limited mobility, and numbness radiating down my left leg, which have not improved
      with conservative therapies over the last six months. The insurance company denied the pre-authorization, stating that
      my symptoms do not meet their 'medical necessity' criteria, despite documented progression and failure of physical therapy,
      NSAIDs, and other less invasive treatments. This denial directly impacts my ability to receive further diagnostics and,
      potentially, needed surgical intervention. Detailed records, progress notes, and provider recommendations were included
      with my initial request. I am hoping an independent review will consider the full scope of my persistent symptoms and
      providers’ documented medical judgment.
