    background_context: 'Ellen Carter is a devoted mother of two and a registered nurse at the local hospital, Brookfield
      Regional Medical Center. She and her husband, Mark, a high school science teacher, have lived in their Maple Ridge Lane
      home for six years. Their children, Sophie and Aaron, are both energetic, bright students at Brookfield Elementary.
      Ellen’s days are a balancing act: she works 12-hour shifts three days a week and spends her off days juggling soccer
      practices, piano lessons, grocery runs, and helping with homework. The neighborhood is typically quiet, filled with
      other families and retirees, which is one of the reasons the Carters chose their home—a sense of community and calm.


      Lately, though, Ellen has been losing sleep. For the past three weeks, a neighbor’s dog at 746 Maple Ridge Lane has
      been barking loudly late into the night, often from 10:30 pm to as late as 2 am. The noise is affecting the whole family’s
      rest, especially Sophie, who has important state testing coming up at school. Despite their efforts—trying to politely
      reach out to the dog’s owner, leaving a note, even sleeping with earplugs and white noise machines—the barking continues.
      The persistent lack of sleep is leaving everyone irritable and exhausted, especially Ellen, who needs her focus on the
      hospital floor. Ellen has spoken to her friend and neighbor Lisa Thompson, who lives across the street and is also being
      kept awake by the noise.


      Outside of this ongoing issue, Ellen tries to keep life as steady as possible for her family. She’s active in the PTA,
      enjoys weekend hikes at Pershing State Park, and cherishes Friday movie nights at home. The neighborhood’s summer block
      party is coming up, and she looks forward to hosting the lemonade stand with Aaron. Ellen’s greatest wish right now
      is simply for her family (and her neighbors) to get some peaceful, uninterrupted sleep again, so life can return to
      its usual, happy routine.'
  artifacts:
  - artifact_type: email
    content: "Hi Rachel,\n\nJust wanted to check in and vent a little—it’s been a rough few weeks here. You know how I love\
      \ our neighborhood, but I am seriously at my wit’s end. For the past three weeks, the dog at 746 Maple Ridge Lane has\
      \ been barking every single night, and I don’t mean the occasional woof. We’re talking nonstop, from around 10:30 pm\
      \ until nearly 2 am sometimes. Mark and I have tried everything—knocking on their door (no answer), leaving a polite\
      \ note, even sleeping with earplugs and the white noise machine. Nothing helps.\n\nIt’s taking a real toll. After another\
      \ sleepless night on June 3rd, Mark woke up with a migraine so bad he had to call in sick for his morning shift at the\
      \ hospital. I’ve never seen him that wiped out, and you know he hardly ever misses work. Sophie is a mess too—her teacher\
      \ sent home a note about how tired she seemed in class the next day. I felt so guilty, but what can we do? Aaron tosses\
      \ and turns, and I’m dragging myself through my shifts at Brookfield Regional. Lisa Thompson across the street says\
      \ she hasn’t slept either.\n\nI just want things to go back to normal. Sophie’s got state testing coming up and she’s\
      \ already stressed. We’re all exhausted and snappy with each other—some community, huh? \n\nAnyway, enough complaining.\
      \ How are you and the boys? Any tips for dealing with a stubborn neighbor (or a stubborn beagle, for that matter)? Let’s\
      \ catch up soon—maybe a girls’ weekend in July? I could use some sleep and a good laugh.\n\nLove,\nEllen"
