    content: 'Work Journal – Monday, July 22


      Last push before the new sign goes up. Still haven’t decided whether to pull down the big billboard near the entrance—it’s
      shabby, but it does get a few customers wandering in. Might just leave it until someone says something. The hand-painted
      sign Dad made is definitely coming down, though. I’ll keep that at home for the memories.


      On the new sign, I want it up for as long as possible. If they ever force me to take it down, so be it, but I’ll stretch
      it out until someone officially complains. Permanent would be ideal. Sam’s been a bit anxious about business since her
      redundancy from BHP last year, so keeping things looking fresh matters.


      The LEDs are now set low enough not to bother Ella—she was up half the night a few weeks ago, so I promised to switch
      them off at 10pm. The colour palette is safe for Sam, no bright reds after that scare last August. I think she appreciates
      it, even if she jokes about my ‘designer’ taste.


      Have to follow up with Turner & McLean this week. The trust is still a mess, and I don’t want any more hiccups with
      council approvals. I’d rather not deal with legal headaches while juggling Ella’s orthodontics bills and Jack’s soccer
      coaching.


      Finish up sign prep by August 3rd. Get photos of the kids with the old sign before it’s tucked away.

      '
