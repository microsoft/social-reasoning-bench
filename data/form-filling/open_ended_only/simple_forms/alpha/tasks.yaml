  - artifact_type: note
    content: 'Personal Reflection – Spring 2023


      Open enrollment always brings its own chaos, but last spring felt especially intense. Coordinating health benefits for
      over 250 people at Maplewood meant juggling more questions than usual, especially when helping Eric work through his
      PTSD healthcare paperwork. It was tough seeing how complicated the claims process is for veterans, even with all my
      HR experience. I spent extra time making sure his confidential forms were correct, and it reminded me why empathy matters
      so much in this job.


      Honestly, I sometimes get overwhelmed handling tough employee conflicts. There have been a few cases where resolution
      dragged on for weeks, leaving everyone frustrated. Even with my mediation training, not every situation has a tidy ending—Eric’s
      suspension after that altercation was a wake-up call for both of us. I keep thinking about the workshop at the Ohio
      HR Conference last March and whether I’m really applying those strategies well.


      On the plus side, our new hire orientation program is working better than ever, and volunteer days are still a hit.
      I wish I could say I’m ready for large-scale changes, but most of my experience is with smaller firms. Maybe someday
      I’ll get more comfortable leading bigger initiatives.


      Need to remember: Check in with Eric before September’s VA hearings, keep Friday afternoons clear for Sophie’s dance,
      and finish prepping docs for benefit enrollment. Also: Yoga twice a week, even if it’s just 20 minutes after bedtime.


      -Jessica'
