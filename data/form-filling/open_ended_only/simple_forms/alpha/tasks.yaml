  - artifact_type: email
    content: 'Subject: Playground upgrades and some other thoughts


      Hi Marcy,


      Hope you and the twins are surviving the end-of-school chaos! I wanted to let you know I’m still pushing for the new
      equipment at Lum Park—after Sophie’s injury last month and Eli’s concussion from the broken monkey bars on June 2, it’s
      just not something I can let slide. We’re aiming for equipment that meets ADA standards and includes sensory play, per
      Dr. Lindstrom’s feedback from Sophie’s June 3 therapy assessment.


      I’m recommending the council approve the purchase and installation, with a cap at $68,500, but honestly if it doesn’t
      pass, I’m not sure I’ll fight to keep it on the agenda right now. I’m tired, and there are only so many times you can
      bang your head against the wall before you just take a breather and focus on other things. If it happens, great—if not,
      maybe it wasn’t meant to be this round.


      On a lighter note, Eli started baseball last week and is already obsessed (two skinned knees, zero complaints). Sophie
      is determined to become a “famous playground designer” when she grows up. Maybe she’ll fix all the playgrounds in Minnesota
      and put me out of a job.


      Let’s do a park date soon—maybe at Memorial Park, since I’m boycotting Lum for a while.


      Take care,

      Jess'
