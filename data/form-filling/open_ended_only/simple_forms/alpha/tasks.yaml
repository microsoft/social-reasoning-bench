    content: 'Subject: Re: Mill Ave budget estimates


      Hi Jason,


      I’m finalizing the agenda packet for the Mill Avenue bike lane expansion and need your help estimating total costs.
      Honestly, I haven’t calculated exact figures yet—I’ve pulled rough numbers from last year’s pedestrian project, but
      with the signage, lane markings, and possible no-parking restriction, I’m not sure if I’m missing any hidden expenses.
      Do you have updated costs for materials and labor? Also, are we including maintenance in the annual street budget or
      will this need its own line item?


      I want to make sure we’re not blindsided at council—especially with Sophie’s physical therapy coming up in August at
      St. Joseph’s. If we end up covering the $800 out-of-pocket for her knee, I was hoping to use the reimbursement from
      the transportation fund, but I need a clear picture of the project’s impact first.


      Thanks for double-checking these with me! Let me know if you need more info on the scope.


      Best,

      Jen'
