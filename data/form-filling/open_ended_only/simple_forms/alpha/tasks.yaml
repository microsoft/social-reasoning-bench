  - artifact_type: note
    content: "April 17, 2023\n\nPersonal notes – Training & reflection\n\nBlaze (TIP ‘22) – still shy, but coming out of his\
      \ shell more with each session. Patience really is everything. I keep thinking back to last year when I started with\
      \ the Willow Creek mare. She was so reactive from the get-go – I remember how nervous I was handling her the first week,\
      \ especially when she pinned her ears and tried to climb the panels. I know I’m supposed to project calm, but sometimes,\
      \ when a horse is truly wild, my nerves take over for a second. Remind myself: slow breaths, clear signals, no shortcuts.\
      \ \n\nDesensitization protocol: continue with flag work, introduce spray bottle (per Dr. Reyes’ advice). Weekly check-ins\
      \ with Officer Carter – email update due Friday. \n\nFamily: Ava’s speech therapy at Weatherford Pediatric Clinic every\
      \ Wednesday at 3pm. Proud of how she’s sticking with it, even when she’d rather be riding. Try to keep mentoring group\
      \ at the rescue on Wednesdays after her session – it’s a lot, but the kids look forward to it.\n\nFacility: Fencing\
      \ needs another walk-through after the last windstorm. Note: check corner posts in north lot.\n\nRemind Michael to set\
      \ up farrier visit for Blaze and the mare next week.\n\n—Jessica"
