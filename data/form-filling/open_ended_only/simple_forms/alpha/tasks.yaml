  - artifact_type: email
    content: "Subject: Catching up\n\nHi Sarah,\n\nIt’s been ages since we last had a proper chat! I hope you and the boys\
      \ are well and that Tom’s new job is settling in. Things here are busy as ever. \n\nI wanted to let you know (in case\
      \ you wondered why I dropped off the radar for a bit)—I ended up taking a six-month break from coaching back in 2017\
      \ when Philip was hospitalized at Royal Berkshire Hospital after his heart attack. It was a scary time. I spent most\
      \ days shuttling between the hospital and home, with the kids needing extra support and Mum driving up to help when\
      \ she could. Looking back, it’s almost surreal how quickly life can shift. \n\nAfter Philip recovered, I slowly eased\
      \ back into work, but the missed months meant I had to play catch-up with clients and admin. Even now, I sometimes feel\
      \ like I’m still patching things together from that gap—especially when new projects crop up and I’m juggling school\
      \ runs and supervision notes.\n\nOn a lighter note, Oscar’s football obsession continues, and Amelia has been working\
      \ hard on her piano pieces for the summer concert. We’re planning a little getaway to Cornwall in August—hoping for\
      \ some sunshine!\n\nLet me know if you’re free for a coffee next month. Would love to hear your news.\n\nLove,\nHelen"
