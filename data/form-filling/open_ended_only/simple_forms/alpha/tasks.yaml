  - artifact_type: email
    content: "Subject: Updates from the Moving Trenches\n\nHi Sophie,\n\nPacking update: I am officially drowning in cardboard\
      \ boxes and bubble wrap. I think I’ve found at least five mugs I don’t remember buying. The building is buzzing with\
      \ everyone making their own plans—Mr. Coleman’s divorce and the sale have got us all in a scramble to be out by the\
      \ end of May. Even Mrs. Alvarez across the hall is looking at retiring to Florida now, so we’re all sort of in transition\
      \ together.\n\nI’ve been looking at apartments closer to downtown, hoping to cut down the commute to Midwest Financial\
      \ Solutions. There’s one place with a beautiful kitchen, but the rent’s a bit steep. I keep telling myself it’s worth\
      \ it for a dishwasher and less time stuck on the road. I’ll miss the old routines, but maybe the new neighborhood will\
      \ have good coffee shops for our sister meetups. \n\nLet me know when you’re free to come help with sorting books (there\
      \ are so many). After this, I’m not moving again for a while—famous last words, right? \n\nSee you soon,\nEmily"
