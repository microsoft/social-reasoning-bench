  - artifact_type: note
    content: 'Personal Reflection – June 2024


      I spent the afternoon at the church reviewing the state of the sanctuary roof (again) and double-checking the latest
      evaluation David sent over. No matter how many times we patch the leaks, it seems like nothing ever holds longer than
      a season. I’m tired of watching buckets fill up in the hallway every time it rains, and I keep worrying that one day
      we’ll walk in to find the whole ceiling on the floor.


      The fellowship hall windows are just as bad—every winter we wrap them in plastic and pray for a mild spell, but the
      drafts always find a way in. I’m grateful David is willing to offer us a payment plan, but it’s hard to see how we’ll
      manage it when the congregation’s giving is so limited and we’re still on the hook for the Old National loan. I haven’t
      even checked the balance this month, just hoping we’re not too far behind after those missed payments during Susan’s
      hospital stay.


      I keep thinking about how much Susan lost when her mother’s Bible and the family albums were damaged in the leak. I
      wish I could do more, for her and for the church, but right now it’s just one day, one patch, one prayer at a time.'
