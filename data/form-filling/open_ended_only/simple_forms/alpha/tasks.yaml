  form_info:
    title: Volunteer Application
    extracted_text: "Volunteer Application\n\nThank you for your interest in volunteering with Carewest.\n\nWe encourage all\
      \ applicants to visit our website www.carewest.ca to learn more about our company and current volunteer openings. A\
      \ fillable PDF version of this form can also be found on our website.\n\nNote: The minimum age to volunteer is 16 years.\n\
      \nPlease submit your completed application form using one of the following methods:\n\nMail or Deliver to:\tCarewest\
      \ Administration\n\t\t\t\t10101 Southport Road SW, Calgary, AB, T2W 3N2\nEmail: carewest.hr@ahs.ca\n\nIf you have any\
      \ questions regarding your volunteer application and/or Carewest's volunteer opportunities please contact Recruitment\
      \ at 403-943-8170 or 403-943-8171.\n\n------------------------------------------------------------------------------------------------------------\n\
      \nPersonal Information\n\nSurname:\t\tFirst Name:\t\tSecond Name:\t\tPreferred Name:\n\nAddress:\t\t\t\t\t\t\t\tPostal\
      \ Code:\n\nPrimary Phone:\tAlternate Phone:\t\tE-mail:\n\n\nDo you have any criminal convictions for which a pardon\
      \ has not been granted?\t□ YES\t□ NO\nIn compliance with the Protection for Persons in Care Act (PPCA) Carewest must\
      \ obtain a current vulnerable sector criminal records check for every new hire and volunteer. Carewest will accept a\
      \ vulnerable sector criminal records check dated within one hundred eighty (180) days prior to commencement of duties.\n\
      \nNote: We require the completed Vulnerable Sector Criminal Records Check prior to offers of volunteer employment. Carewest\
      \ does not normally hire persons with active criminal records for which a pardon has not been obtained.\n\n------------------------------------------------------------------------------------------------------------\n\
      \nWhy do you want to volunteer at Carewest?\n□ Required for school   Number of hours required: _______________________\n\
      □ Personal growth and satisfaction\n□ Other (Please provide us with more information in the space below)\n\n\nPlease\
      \ tell us what are some of your hobbies and interests?\n___________________________________________________________________________________\n\
      ___________________________________________________________________________________\n\n------------------------------------------------------------------------------------------------------------\n\
      \nVolunteering Preferences\n\nArea(s) applying for: (Check all applicable boxes)\n□ Community Outing\t□ Leisure Activities\t\
      □ One to One Visiting\t□ Pastoral Care\n□ Non Resident Activities\t□ Rehab and Recovery\t□ Gift Stores\t□ Community\
