  - artifact_type: note
    content: 'April 18, 2024 – RMIT Student Wellbeing Centre


      Saw the counselor today for the first time. I almost skipped it but glad I didn’t. Talked a lot about the stress from
      COSC1234. I feel like I’m always behind, especially since Dr. White rarely uploads the materials before class. When
      he rushes through topics, I get lost quickly. I asked about a Python function last week and he basically said I should
      have learned it in high school. I felt stupid—most of the other students seem to already know coding basics, but I don’t.


      The counselor said it’s normal to feel this way as an international student, especially with all the transitions. She
      suggested a few breathing techniques for anxiety and said I should give myself credit for reaching out for help. I’m
      not sure it’ll fix everything, but at least it’s a start. I’ll try to catch up this weekend and maybe talk with some
      classmates about forming a study group.


      Also, need to remember to send Mum a message so she doesn’t worry if I sound tired on our next call.'
