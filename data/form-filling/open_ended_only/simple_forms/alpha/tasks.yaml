  - artifact_type: email
    content: 'Hi Daniel,


      Just got off the phone with Dr. Miller a few minutes ago. She said she spoke to the intake folks at Providence Portland
      Medical Center and Adventist Health Behavioral Health, but both places still have waitlists that are over a month out.
      I’m honestly kind of discouraged—I was hoping something would open up sooner. Dr. Miller said the only spot that’s available
      right now for the level of help I need is at Cascadia Residential Recovery Center. She thinks it’s the best option given
      how things have been lately (especially after last Friday). I’m not sure if Cascadia is in-network with our Providence
      plan, but at this point, I just want to do whatever will help get me safer and home to you and Ava faster. We’ll figure
      out the insurance stuff as we go, I guess?


      Can you check the fridge for leftovers tonight? I’m too tired to cook, but I’ll try to pull myself together for Ava’s
      bedtime.


      Love you,

      Jen'
