    background_context: 'Jennifer Mae Collins wakes most mornings at 6:15, rousing her two kids and sorting their breakfast
      while mentally reviewing the day’s schedule at Hope Harvest Food Bank, where she has served as Executive Director for
      almost four years. After dropping off Lucia and Evan at their respective schools—Lucia at McBride Elementary and Evan
      at Jarrett Middle—Jennifer heads to Hope Harvest’s main office, tucked into the corner of a repurposed warehouse on
      the east side of Springfield. Her days are a blur of coordinating volunteers, liaising with local grocers and farmers,
      and troubleshooting logistics for their mobile pantry. With summer around the corner, she’s particularly focused on
      expanding the Harvest Kids snack program and finding refrigerated truck rentals to safely deliver produce to rural families.
      She’s been working closely with a bilingual outreach volunteer, Sofia Morales, to launch Spanish-language materials
      and a community information campaign, mindful that many new families moving into the region speak primarily Spanish.


      Jennifer’s husband, Mark, works as a high school history teacher, and they share evening routines of juggling homework,
      prepping meals, and ferrying Evan to soccer practice and Lucia to her ballet lessons. Her mother, Patricia, moved in
      last fall following surgery, and Jennifer has been managing her recovery while balancing work and home obligations.
      Family dinners at the Collins house are lively, sometimes chaotic, but always end with laughter and a rundown of everyone’s
      day. Recently, Jennifer has been attending online workshops on grant writing and digital fundraising, hoping to improve
      Hope Harvest’s reach and secure new revenue streams. Her main concern is sustaining the food bank’s operations amid
      rising costs and growing demand, but she remains optimistic, inspired by the resilience of her team and the gratitude
      of the families served. On weekends, she carves out time for family hikes at Nathanael Greene Park and volunteers at
      pop-up food distributions, believing deeply in Hope Harvest’s vision for a hunger-free community.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Can We Talk Storage Chaos?


      Hi Marlene,


      Hope your Tuesday is off to a decent start! I wanted to check in before things get too busy with the new round of produce
      donations coming in tomorrow. First, thank you for wrangling the volunteers for last week''s distribution—Sofia said
      the Spanish flyers looked great, and the turnout was better than expected.


      On a less cheerful note, I spent a good chunk of Monday morning just trying to find those extra folding tables in the
      back storage room, and it’s honestly gotten a little wild back there. We’ve got unopened boxes stacked behind the freezer,
      old signage mixed in with dry goods, and I nearly tripped over a crate of aprons (the ones from the fall festival, still
      covered in flour). I keep meaning to set aside a couple hours to tackle it, but you know how the days get away from
      me. Do you think we could ask the Thursday morning group to help sort things? Maybe make it a mini project—snacks, music,
      and everyone gets a label maker. I’d take any excuse to get things in order again!


      Also, I’m still borrowing Mom’s car since our refrigerated van is sitting in the Walmart lot, waiting on a part. I’ve
      been hauling coolers to the senior meal program in the mornings, but it’s definitely not ideal. If you hear anything
      about rental trucks, let me know. And if you can spare a few minutes for a quick call after lunch, I’d love to brainstorm
      how we can keep the chaos at bay.


      Thanks for everything,

      Jennifer'
