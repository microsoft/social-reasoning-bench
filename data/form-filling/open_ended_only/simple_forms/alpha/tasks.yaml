    content: 'Hi Mark,


      Just wanted to check in about next week’s schedule. I talked to Ms. Ramirez today to confirm that I’ll be starting the
      Makerspace rollout on August 19 instead of the original plan, since Lucas’s surgery at Dell Children’s is set for the
      week before. I’m still wrapping my head around how much help he’ll need, but Ms. Ramirez was totally understanding about
      me needing to be home for his recovery. I’ll probably have to rearrange a couple of the robotics club meetings, but
      I think the kids will manage—they’re excited about the new 3D printer, and Lucas keeps talking about showing his group
      how to use it once he’s back on his feet.


      On a related note, I’m a little nervous about jumping into the project right after everything with Lucas. I haven’t
      finalized the main activities or the timeline yet, but I’ve started brainstorming ways to make the space accessible
      for all the kids. I’m also trying to remember the coding activities Ella did during OT with Dr. Ramirez last May at
      Cedar Ridge Pediatric Therapy—those hands-on sessions really sparked this whole idea for me. Maybe I’ll dig up some
      of the old lesson plans for inspiration.


      Can you help coordinate dinners that week? Or at least be on standby for emergency pizza. I think we might be living
      off takeout for a bit.


      Love you,

      Shannon'
