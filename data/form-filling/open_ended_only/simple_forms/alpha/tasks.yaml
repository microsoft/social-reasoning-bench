  - artifact_type: email
    content: 'Subject: Quick Family Update


      Hi Elena,


      Thanks again for stopping by last weekend and bringing tamales (they were a hit, as always). Lucas has been busy with
      soccer and studying for midterms, and Carlos is working overtime again at the university—he says the extra hours will
      help us catch up on the mortgage and those never-ending medical bills. I’m still going to PT twice a week for the neuropathy,
      and last month’s prescriptions cost us $120 after insurance. On top of that, we’re still paying $50 a month to Highland
      Oncology for all my lab work. Some days it feels like every spare dollar goes to the pharmacy or the hospital.


      I know you and Dad helped out a lot last summer when I was at Strong Memorial Hospital—please thank him again for me.
      That $500 you gave me for groceries got us through July and August, especially with all the hospital meals and Lucas’s
      summer job only covering utilities. We’re lucky to have you nearby.


      Let’s try to have dinner together this weekend if you’re free. I’ll make arroz con pollo, and you can bring your famous
      flan!


      Love,

      Maria'
