      with activities, or helping organize events. I believe that every person deserves to feel valued, heard, and engaged,
      so I want to help foster that environment. I also find volunteering to be personally rewarding, as it gives me a sense
      of purpose and connection.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: interest_areas_skills_experience
    field_label: Interest Areas Skills Experience
    value: I am most interested in social activities, arts and crafts, and reading aloud or leading book clubs. I taught elementary
      school for over 25 years and have extensive experience organizing group activities, adapting to different personalities,
      and encouraging participation. I am comfortable assisting with mobility for residents and am CPR certified. I also enjoy
      baking and have run baking classes for seniors in the past. Additionally, I have experience with dementia care, both
      personally and through previous volunteer roles, and am patient and attentive to residents’ needs. I am happy to help
      with games, puzzles, music therapy, or simply providing companionship. My strengths include empathetic listening, patience,
      and creating a warm, friendly atmosphere. I am always eager to learn new skills and adapt to the needs of the community.
