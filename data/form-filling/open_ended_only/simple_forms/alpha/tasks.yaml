  - artifact_type: text
    content: 'Erin: Mark, do you think we could handle any extra costs if the city only does a partial replacement? After
      Sophie’s injury in May—fractured wrist on the old slide—I really don’t want to risk it. The incremental installation
      fees would be a nightmare for our budget if we had to cover any surprises.


      Mark: I agree, let’s push for the full replacement. Piecemeal just means more work and higher costs in the long run.
      Plus, the kids deserve better.


      Erin: I’ll include your concerns in my notes for the council. Love you.'
