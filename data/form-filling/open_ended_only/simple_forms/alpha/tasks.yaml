      generators and no external music. For COVID-19 safety, staff wear masks and gloves during food prep and service. We
      provide hand sanitizer at the service window for customers and have clear floor markings to ensure social distancing
      in the queue. All staff have received COVID-19 safety training per WorkSafeBC guidelines. We also use digital payment
      options to reduce cash handling and regularly clean all high-touch surfaces. We try to use compostable packaging and
      sort waste, and provide clear signage encouraging proper disposal and recycling. To respect neighbors, we ensure all
      patrons vacate the area promptly after receiving their food, and we have a 'no idling' engine policy while parked. We
