  - artifact_type: email
    content: 'Subject: OT update and Evan’s playground time


      Hi Mom,


      Just wanted to fill you in on Evan’s appointment with Dr. Lora Finn at St. Joseph’s last week. She’s still concerned
      about him playing on the old playground at Gregory—apparently the equipment just isn’t up to snuff anymore, and she’s
      worried about him falling or getting hurt, especially with the cracked surfaces and loose bars. Dr. Finn recommended
      more PT sessions at St. Joe’s for now, but they’re $85 a week and honestly, it’s not the same as him being outside with
      his friends. He loves his social time at the park, and I hate the idea of him missing out just because the equipment
      isn’t safe.


      If the playground gets replaced this fall like we hope, maybe we can ease up on the PT and let him enjoy being a regular
      kid again. Until then, we’ll probably stick with the safer (but less fun) option. I’m fine dropping the extra sessions
      if the council doesn’t move forward with the new equipment, but I really hope they do, for Evan’s sake and for all the
      kids.


      Let me know if you have any thoughts—maybe you can help pick Evan up from PT next week? Also, Lily’s soccer schedule
      got moved around again (of course), so I’ll send you her new pickup times when I have them.


      Love,

      Amy'
