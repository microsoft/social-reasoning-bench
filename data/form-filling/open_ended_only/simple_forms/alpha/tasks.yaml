  - artifact_type: note
    content: 'Friday, May 31


      Remember: Daniel found me in the bathroom around 3 a.m. after I cut my forearm. I don’t even know how long I was sitting
      there. He called Mom, who got here from Eugene just before sunrise and stayed with Ava while I went to the ER at Providence
      St. Vincent. The hospital room was freezing. I just kept thinking about all the things I left undone—the laundry in
      the basket, Ava’s piano books on the table. I felt numb. This is the second time in a week, and I promised Dr. Miller
      I’d keep trying, but the sadness just sits on my chest. I wish I could explain it to Daniel without making him worry
      more. I hate that Ava sees me like this.


      Need to call Dr. Miller for follow-up. Try to eat something. Put Ava’s soccer jersey in the wash for weekend game. Small
      steps.'
