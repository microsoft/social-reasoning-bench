  - artifact_type: note
    content: 'Personal Reflection – Summer 2024


      Matthew’s transition into adulthood feels like a full-time job some weeks. I keep thinking about the day he was born—June
      14, 2005, Central Vermont Medical Center—how overwhelming all the new terms and diagnoses were. Now, almost two decades
      later, I’m the one explaining IEPs and transition services to other parents. Still, when I’m in those big advocacy meetings,
      I can’t help but feel out of place. Most of the time, I’d rather listen than jump in. I get anxious about saying the
      wrong thing in front of a crowd—small groups or one-on-one feels easier, like at the parent workshops I run on weekends.


      Matthew’s weekly speech and OT sessions at Montpelier Developmental Services Clinic are steady, at least. Ms. Riley
      says he’s making slow but real progress, even after that three-day suspension from Montpelier High in April. She wants
      to try a new visual schedule to help with transitions and reduce the chance of another outburst. I’ll ask Dr. Chen what
      she thinks when we see her at Riverside next week.


      Note to self: Reschedule yoga class if the council meeting runs late Thursday. Also, find time for the garden—pull weeds
      by the tomatoes before the family dinner on Sunday.'
