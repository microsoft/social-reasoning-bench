  - artifact_type: email
    content: 'Subject: Playground replacement costs + family finances


      Mark,


      Been crunching the numbers again tonight, and I keep circling back to our conversation after Mom’s hospital stay last
      month. Covering her medical bills at St. Joe’s for her diabetes really stretched us more than I expected. I was honestly
      hesitant to move forward with the full playground replacement at Memorial, just worried about putting our own finances
      in a bind if something went sideways with the city’s portion.


      But the $30,000 grant from Crow Wing Community Foundation came through this morning—what a relief! That means the city
      only needs to allocate $56,400 from Capital Projects, which is well within this year’s budget. No operational increase
      expected, and the new equipment should actually lower annual maintenance by about $1,500. I finally feel comfortable
      recommending we move ahead, and I’m drafting the council agenda item tonight.


      Let’s sit down this weekend to double-check everything before I send it in. I know you’re slammed with graduation stuff,
      but I really need your eyes on the numbers so I’m not missing anything.


      Love you,

      Erin'
    metadata:
