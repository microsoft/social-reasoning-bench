    background_context: "David McKenzie has lived in Davis, California, for the past twelve years, having moved from Sacramento\
      \ shortly after his son Lucas was born. He oversees the maintenance and programming for several community parks, including\
      \ Northgate Park, and enjoys being a familiar face to families who frequent the playgrounds and open spaces. His days\
      \ usually begin with early morning walks through the parks, checking on facilities and greeting regular visitors. The\
      \ last couple of months have been especially busy, as he's been coordinating the schedule for a new playground renovation\
      \ at Northgate Park, ensuring the upgrades will be accessible for everyone in the neighborhood.\n\nAt home, David and\
      \ his wife Jennifer, who teaches third grade at a local elementary school, balance their busy schedules around their\
      \ children's activities. Emily, their daughter, has just started high school and is adjusting to the new academic pressure\
      \ and social circles, while Lucas is heavily involved in Little League baseball and robotics club. Sundays are for family\
      \ bike rides along the greenbelt and backyard barbecues with David's mother Carolyn, who moved to a nearby condo after\
      \ David's father passed away three years ago. \n\nDavid takes pride in his role as a steward of the city's green spaces,\
      \ but he has practical worries—like managing staff shortages during summer or keeping up with the demands for more inclusive\
      \ play structures. He's also been thinking more about work-life balance after a recent minor health scare prompted him\
      \ to start jogging again and pay more attention to his diet. As the playground project nears completion, David looks\
