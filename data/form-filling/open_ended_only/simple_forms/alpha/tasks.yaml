      which helps with childcare and family gatherings.


      Cynthia’s daily life is a blend of family responsibilities, work, and community advocacy. She starts her mornings early,
      packing lunches and seeing the girls off to school before heading to the neighborhood association’s modest office (often
      just her home workspace). Her work centers on organizing meetings, preparing the bi-monthly Eastside Greenway News,
      and collaborating with local officials about upcoming zoning changes and park upgrades. She is also spearheading outreach
      to the area’s growing Spanish-speaking families, developing bilingual programming and inclusive events. In her downtime,
      Cynthia enjoys gardening in the community garden, where she’s recently helped start a pollinator habitat section, and
      taking family walks along the Greenway Trail extension.


      Recent months have been especially busy, with new development proposals raising traffic safety concerns that Cynthia
      is working to address with local government. She is planning an upcoming workshop on sustainable landscaping and has
      organized a Q&A with Parks and Rec for improvements to Walker Park. With her family, she looks forward to block parties
      and spring cleanups, finding these traditions foster a strong sense of belonging for her daughters—who are also learning
      to speak Spanish at home with encouragement from their abuela, Marta.'
