  - field_id: aa_experience
    field_label: Aa Experience
    value: I attended my first A.A. meeting in June 2009 and immediately began participating in weekly meetings at the Golden
      Gate Fellowship in San Francisco. I have served as a group secretary (2010-2012), general service representative (2013-2015),
      district committee member (2016-2018), and chaired multiple workshops on sponsorship and service at both district and
      area levels. In 2019, I was elected as Area 06 Alternate Delegate and subsequently served as Area 06 Delegate to the
      General Service Conference from 2021 to 2022. I have been involved in public information, corrections, and accessibilities
      committees, and I regularly sponsor women in the program, currently working with five sponsees. I am also part of the
      accessibility committee for the annual Northern California A.A. Convention and have shared my story at treatment centers
      and high schools across the Bay Area.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: occupational_background
    field_label: Occupational Background
    value: I have worked as a licensed clinical social worker for over twenty years, specializing in community mental health
      and substance use counseling. My career began at the San Francisco Department of Public Health, where I focused on outreach
      and case management for underserved populations (2002-2007). Since 2008, I have worked at the Bayview Wellness Center,
      where I am currently the Director of Outpatient Services, managing a team of therapists, social workers, and peer counselors.
      I oversee program development, grant writing, budgeting, and inter-agency collaboration. My experience includes supervising
      interns, leading crisis intervention teams, and participating in citywide policy advisory boards related to addiction
      recovery and housing.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
  - field_id: additional_abilities
    field_label: Additional Abilities
    value: I am bilingual in English and conversational Spanish, which has allowed me to support a diverse range of clients
      and A.A. members. My training in trauma-informed care and motivational interviewing has been invaluable when facilitating
      A.A. workshops and assisting members with co-occurring mental health concerns. I have a strong background in organizational
      leadership, strategic planning, and conflict resolution, with certifications in non-profit management and diversity,
      equity & inclusion. Personally, I'm a single mother of a college-aged son, which has deepened my empathy and organizational
      skills. My lived experience as a woman in long-term recovery informs my passion for service and inclusivity. I am skilled
      in digital communication, having helped transition several A.A. groups to online and hybrid formats during the pandemic,
      ensuring continuity and accessibility.
    is_open_ended: true
    reasoning: Pre-filled value from ground truth form
