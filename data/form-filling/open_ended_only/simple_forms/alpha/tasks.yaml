      \ engineering club. Her daughter Leah, a creative and analytical middle schooler, recently helped lead the club through\
      \ a challenging technical project, earning high praise from teachers and local STEM mentors alike. \n\nMost afternoons,\
      \ Erin stays after school to mentor the club, guiding students through brainstorming sessions and hands-on fabrication\
      \ in the school’s modest makerspace. This spring, their club built a working mechanical dragon for the Michigan Destination\
      \ Imagination competition, incorporating scavenged bike gears and old electronics—a feat that brought together the technical,\
      \ artistic, and narrative talents of a diverse group of students. Erin’s evenings are busy with family dinners, homework\
      \ help, and shuttling Micah to soccer practice, but she finds time to decompress with long walks or gardening in the\
      \ backyard. Recent challenges have included balancing increased family commitments with a busy competition schedule\
      \ and navigating supply shortages for club projects. Still, Erin finds deep satisfaction in fostering her students’\
      \ creativity and resilience, as well as in the close-knit camaraderie of her family and school community."
  artifacts:
  - artifact_type: email
    content: 'Subject: Quick update after Tuesday’s review


      Hi Julia,


      Just wanted to check in and say thank you for making it to the team review at Tappan on Tuesday, even though I know
      it’s a tough time for you. I really appreciated your thoughts on the Innovative Gears’ maze solution before you had
      to head out. I hope your treatment went as well as possible that afternoon.


      Yusuf and I finished up the nomination paperwork after you left, but if you’d like to look over anything or add your
      signature, we can always coordinate with you next week or scan you a copy. I’ll be at school until around 4:30 most
      days if you want to swing by, but honestly, don’t feel any pressure. Let us know if you need anything covered on the
      club side while you’re focusing on your health.


      On a lighter note, the kids are still talking about how you noticed the dragon’s wing rotation was out of sync with
      the music—Micah spent all dinner last night trying to explain the physics to Ryan, who was valiantly pretending to understand.
      I’ll send you some pictures from the competition once we get the final batch from the yearbook staff.


      Take care and please reach out if you need rides, meals, or just company. We all miss you in the makerspace.


      Best,

      Erin'
