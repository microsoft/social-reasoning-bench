  - artifact_type: email
    content: 'Subject: Volunteer Coordination & Program Planning


      Hi Sofia,


      Thank you again for your help with the Harvest Kids outreach materials. Your Spanish translations are making a huge
      difference for the new families moving in from the region. I wanted to talk through some program planning for next month.
      Sometimes, honestly, I feel like our activities end up being whatever we have enough volunteers for, not always what
      we initially intended. Last week, we had to skip the nutrition workshop because only three people showed up and I had
      to send two volunteers to the mobile pantry instead.


      I’m hoping we can find a way to balance the outreach campaign and the after-school snack program, so both get the attention
      they need. Let’s meet Monday afternoon to brainstorm, maybe over coffee. Also, quick reminder—if you see any flyers
      for refrigerated truck rentals, grab them. I’m still using Mom’s car every morning since the van broke down at Walmart.


      See you soon,

      Jennifer'
