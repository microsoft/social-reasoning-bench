  - artifact_type: note
    content: "Private Journal – Role in the Disability Community\n\nSometimes when I’m at these statewide advocacy gatherings,\
      \ I feel like an outsider. I’m there as Matthew’s mom, and I care deeply about disability rights, but I’ve never had\
      \ a disability myself. It’s easy to worry that my place isn’t quite as solid as the folks who are speaking from personal\
      \ experience. I want to be a good ally without talking over people whose voices matter most.\n\nStill, I remind myself\
      \ that every story—parent, sibling, self-advocate—brings something valuable. When I share about Matthew’s journey from\
      \ diagnosis at Central Vermont Medical Center (June 2005) to his latest therapy milestones at Montpelier Developmental\
      \ Services Clinic, I hope it helps others, even if my perspective is secondhand. \n\nAdd to to-do list: Reach out to\
      \ new parents in the Facebook group and see if anyone needs support with IEP prep for the fall."
