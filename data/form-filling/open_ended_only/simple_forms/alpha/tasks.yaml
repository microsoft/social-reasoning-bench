  - artifact_type: note
    content: 'Springfield Healthy Meals Initiative – reflection


      I’m sitting here after another long day packaging meal kits, and I can’t help but think about how much more we initially
      hoped for this project. We struggled to get buy-in from the club members; everyone was supportive of the idea but slow
      to commit to extra time. In the end, the project ended up being pretty basic compared to what we envisioned. Still,
      over the past six months, we managed to deliver more than 4,200 healthy kits and ran 12 workshops at schools and senior
      centers. The turnout at some workshops was lower than expected, but the families who did come seemed genuinely appreciative.
      I remember how Lucas’s diagnosis last year made me realize how crucial it was to have meal kits with low-glycemic options
      and educational support for managing his diabetes.


      The partnership with Harvest Home Food Pantry and Springfield Community Health Center was helpful, but we mostly relied
      on tried-and-true ideas from previous projects. The mobile app feedback has been encouraging – families like having
      a place to track their nutrition and get recipes. I wish we’d been able to innovate more, but at least we moved the
      needle on food literacy and gave hope to families, mine included. Next round, I want to focus on more personalized outreach,
      especially for Spanish-speaking neighbors. Maybe if Carlos has more free time, we could get him involved in the workshops
      too.


      Reminder: Schedule follow-up with Lucas’s diabetes educator next week. Ask about new recipes for lunchboxes.


      —Jessica'
