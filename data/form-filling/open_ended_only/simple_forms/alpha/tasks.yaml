  - artifact_type: note
    content: 'Monday, June 3, 2024


      Busy day. Ran through prep at the truck early—grill needed a good scrub, and the fryers were still greasy from Saturday.
      The handwashing setup is still just bottled water and sanitizer most days; the dedicated sink is on my wish list, but
      I’m making it work for now. Have to remind Sofia and Mateo (if they help) to use more soap and less paper towels—they
      go through a whole roll before lunch.


      Carlos stopped by to check on the new gas lines again. I think the propane leak at the Community Centre parking lot
      on May 17 shook us both more than we let on. He brought the extra carbon monoxide detector, which is beeping less than
      the old one, thankfully. Repairs seem to be holding, but I’m still nervous every time I turn on the grill.


      Menu: No kombucha—still off the list since Carlos’s reaction last June. It’s a pain explaining why to regulars, but
      it’s not worth the risk. I’m extra careful with every supplier now, double-checking for allergens. We’re sticking to
      the basics: salmon tacos, portobello burgers, rosemary fries, and lemonade.


      Don’t forget: Thursday, Sofia’s speech therapy at 3:30. Need to wrap up at the truck by three and text Carlos to cover
      if I run late.


      Tomorrow’s goal: start the gluten-free cookies recipe test. If I can squeeze in the time.


      - M'
