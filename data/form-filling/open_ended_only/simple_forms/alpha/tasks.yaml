  - artifact_type: email
    content: 'Subject: Quick update on Mom, the petition, and the meeting


      Hey Miguel,


      Just wanted to fill you in before you get home. I managed to get Mom’s signature for the petition at the community center
      this morning—even though she’s still a little shaky after her hospital stay for the diabetes complications last week.
      She insisted on coming with me to the East Athens Community Center (I think she just wanted to see some of her old friends
      from her walking group), but I was a little nervous with the crowd. At least we’re finally over the 20% mark for the
      signatures, which is a relief. I know she felt proud to be able to help, even if her handwriting was a bit wobbly.


      Speaking of Mom, I just got off the phone with her case manager at Piedmont. They want her to keep up with her PT appointments
      for the next few weeks, and I put her dialysis schedule in my calendar so you and I can keep swapping days for rides.
      I know it’s a lot with your classes at Cedar Shoals, but the girls are being really sweet—Camila made a get-well card
      and Lucia’s been helping with the groceries.


      Also, I had to postpone this month’s association meeting since Mom ended up back in the hospital after her fall at home
      Tuesday night. I’ll host a virtual check-in from the house tomorrow evening to keep everyone in the loop about Marta’s
      recovery and neighborhood stuff. Honestly, we sometimes struggle to get enough residents to attend our meetings, so
      participation is usually pretty low—last month I think we barely had five people, which makes planning a bit tricky.
      Only a couple of people RSVP’d so far, but I’ll record it in case anyone wants to catch up later. I’m hoping things
      get back to normal by May so we can do the Spring Cleanup together.


      Let me know if you can cover one of Mom’s Friday appointments—I’ve got a call with the district rep about the registration
      paperwork. Thanks for all you do. I’ll save some of the leftover mole for you.


      Love,

      Cynthia'
