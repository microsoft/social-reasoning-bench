    content: 'Subject: Sorry Your Street Wasn''t Cleared


      Hi Mom,


      Just wanted to apologize again that Maple Avenue wasn’t plowed until so late after the last storm. The 2008 plow broke
      down on Oakwood (again!) and I ended up stranded for over an hour waiting for Lisa to pick me up at the City Garage
      at 3 a.m. The repair cost for that incident was $4,200, if you can believe it. I know you were worried about emergency
      vehicles getting through, and honestly, I was too. It’s tough when we have to rely on those old backup trucks.


      On the bright side, I think this will finally push the council to approve the new truck. I’m hoping it means fewer headaches
      and less time spent waiting around in the cold. Speaking of which, how are you feeling after your surgery at Essentia?
      Sophie keeps asking if you’re up for baking again soon—she wants to try that lemon pound cake recipe you both like.


      Let me know if you need a ride to any appointments or just want help around the house while you recover. I’ll swing
      by later this week to shovel the walk if we get more snow.


      Love,

      Jake'
