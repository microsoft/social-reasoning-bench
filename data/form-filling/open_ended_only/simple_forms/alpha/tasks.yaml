  - artifact_type: note
    content: 'Thursday, 2 March 2023


      Reflecting on my training history today. The ILM Level 7 certificate was good groundwork, but in reality, it didn’t
      prepare me much for the practicalities of team dynamics. I had to learn most of that through actual coaching work, especially
      when dealing with the GreenTech Solutions merger and all the chaos that came with it. I guess no course can really teach
      what it’s like to handle a team under pressure.


      I’ve come a long way since my HR days at Unilever, but there’s still so much to learn. Need to review notes for tomorrow’s
      team coaching session at Barclay’s. Amelia’s anxiety is flaring up again—she cried before school this morning. Philip’s
      been stressed about his new project, and Oscar is begging to try rugby next term. Family life never slows down.


      Reminder: Buy groceries, call Mum, update supervision schedule for Sarah Jenkins.'
