  - artifact_type: text
    content: 'Erin: Mom, just wanted to let you know we had to take Sophie to Essentia after she hit her head at Memorial
      during that public meeting in May. She’s okay now—minor concussion, but it was scary. Dr. Mahoney said she needs to
      rest and lay low for a few days. I’m still rattled.


      Ruth: Oh honey, that must have been awful. How’s she feeling today?


      Erin: Tired and cranky, but I think she’ll bounce back. I keep thinking about the uneven surfacing where she tripped.
      We need safer equipment, not just for her but all the kids. I’ll keep you posted about her follow-up next week.


      Ruth: Let me know if you need me to pick up Liam or keep Sophie busy while you’re at work.


      Erin: Thanks, Mom. I might take you up on that for the next couple nights.

      '
