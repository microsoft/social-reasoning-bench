  - artifact_type: email
    content: 'Subject: Catch-up and Some Family Updates

      Date: 2024-04-09

      From: sarah.bennett@rusticspoon.co.uk

      To: mark.bennett@gmail.com


      Hi love,


      Just wanted to catch you up before the week gets away from us. I’ve been thinking about how to balance everything lately
      — the café, Olivia’s school run, and now Dad’s appointments in Retford. Since George’s Parkinson’s diagnosis last June
      at Bassetlaw, I’m finding myself stretched thinner than ever. I’ve been tweaking my kitchen shifts so I can help Mum
      with Dad’s care, and I’ve asked the staff to cover some mornings for me, but it’s tricky when there’s always someone
      new to train. The apprentices are keen, but managing them alongside everything else is a handful.


      I remember when Mum had her surgery for ovarian cancer back in March 2022. Those weeks were tough, but dropping off
      her meals every week made me feel useful. Now, with Dad’s health, it’s a different kind of challenge. Mum’s still cooking
      up a storm on Sundays, but she tires easily, and Olivia is always underfoot, wanting to help. Sundays at their place
      are still our best family time, though — three generations crowded in the kitchen.


      On the business side, I’ve had three staff leave this year. The hours are long, and I get why people move on, but it
      leaves me running most things solo again. I keep reminding myself why I started the café — to be my own boss, but lately
      it feels less like freedom and more like a treadmill. I barely have time for the community events, and honestly, I’ve
      had to cut back this year. I wish I could do more, but I just don’t have the energy anymore.


      Let’s talk tonight about splitting Olivia’s after-school runs. If you can cover Thursdays, I can focus on Dad’s physio.
      Hope you’re having a decent day.


      Love,

      Sarah'
