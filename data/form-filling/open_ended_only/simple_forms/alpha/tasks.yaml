    background_context: 'Kristin Havel balances a busy schedule as Parks & Recreation Coordinator for the City of Brainerd
      and as a mother of two energetic kids. She’s lived in Brainerd since 2014, having moved from Duluth after her husband,
      Eli, accepted a teaching position at Brainerd High School. The family lives just a few blocks from Gregory Park, which
      has become a go-to spot for weekend picnics and after-school playdates. Kristin’s mornings often begin with getting
      Natalie and Gavin ready for Lincoln Elementary, then heading to her office in City Hall to coordinate park schedules,
      respond to community emails, and oversee ongoing improvement projects for the city’s green spaces.


      Lately, Kristin has been especially invested in the Gregory Park playground upgrade. She’s attended several neighborhood
      feedback sessions, listening to parents and kids share their hopes for more accessible swings and safer play surfaces.
      She enjoys collaborating with local parent groups and the Brainerd Early Childhood PTA, and she’s become a familiar
      face at Saturday coffee meetups at Coco Moon Café, where she often chats with fellow parents about upcoming community
      events. Although she’s proud of securing funding for the new equipment, she’s disappointed that grant applications weren’t
      successful this cycle and remains determined to find additional resources for future improvements.


      Outside of work, Kristin values family time—bike rides around Rice Lake, reading with her kids in the evenings, and
      road trips to Duluth to visit her parents. She’s mindful of balancing her responsibilities, keeping an eye on her kids’
      safety at the playground and staying connected with neighbors. As summer approaches, Kristin looks forward to the new
      playground installation, community concerts in the park, and hopefully, a quieter season after a particularly busy year
      for the Parks & Rec department.'
  artifacts:
  - artifact_type: email
    content: "Hi Mom,\n\nI wanted to catch you up on how things have been lately—it's been a whirlwind, honestly. Work is\
      \ as busy as ever, but the big news is about the Gregory Park playground project. After Gavin’s fall back in April (he\
      \ slipped on that old monkey bar and banged up his arm), I felt even more urgency to move forward with the equipment\
      \ replacement. I know you always worry about the kids, and that day at Gregory really shook me. I’ve been talking to\
      \ the city council about new equipment and trying to get parent voices heard—thankfully, local PTA and a bunch of parents\
      \ are backing the project.\n\nThe last two months have felt like a blur. During a neighborhood feedback session in May,\
      \ Natalie managed to scrape her knee and bruise her elbow on that cracked slide—right in front of half the parents.\
      \ I had to bite my tongue not to say, “See?!” but it definitely helped build support. \n\nFinancially, though, it’s\
      \ been a little stressful. Since Eli got laid off from Brainerd Marine in March, we’ve been a one-income family. We’re\
      \ okay for now, but if anything for the park goes over the $78,450 budget, it’s on me to figure out how to cover it.\
      \ There was a hiccup with the city funds coming through, so Eli actually loaned me $1,500 to put down the deposit for\
      \ the new equipment on May 3. I’ll get reimbursed, but it’s just one more thing to juggle.\n\nDespite all that, I’m\
      \ glad for the progress. The kids are excited (and a little impatient), and I’m hoping the installation will be done\
      \ before the end of summer. We could all use a little good news around here. How are you? Give Dad a hug from us.\n\n\
      Love,\nKristin"
