  artifacts:
  - artifact_type: email
    content: 'Subject: Lucy''s inhaler plan for Saturday''s Blue Ridge Challenge


      Hey Erin,


      Just wanted to touch base about Saturday morning. Lucy''s really excited for both the hike and biking sessions at Guion
      Farm, but I know her asthma always makes us a little nervous with all the activity. I talked with Sarah Jenkins earlier
      this week—she''ll carry Lucy''s inhaler and keep an eye on her during the hikes and the biking group. It''s reassuring
      having Sarah as our medic, especially since she''s worked with Lucy before and knows her triggers. I''m planning to
      remind Lucy in the morning to let Sarah know if she feels even a little short of breath, just to be safe.


      The weather looks pretty good, but if it gets humid, I''ll ask the guides to take more breaks. I’m also making sure
      Lucy has her water bottle and her favorite granola bars, so she doesn’t get hungry or dehydrated. She’s been talking
      nonstop about seeing the High Falls again and trying to spot salamanders. Mason, of course, wishes he could join the
      bike group, but he’s still a little young for the longer trails. Maybe next year!


      After the event wraps up, I thought we could all meet at Hooker Falls for a picnic, if you’re up for it. We’ll see how
      tired everyone is, but I’ll pack sandwiches and some music—maybe Lucy can help pick the playlist again. Let me know
      if you want me to grab anything special from the store before Saturday.


      Love,

      Brian'
