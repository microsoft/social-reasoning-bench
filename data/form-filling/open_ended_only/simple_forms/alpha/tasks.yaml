    background_context: 'Emily Carter lives in the heart of Welland, Ontario, in a cozy semi-detached house she rents just
      a few blocks from Chippawa Park. Having grown up in the community, Emily is deeply rooted in the local arts scene. She
      spends her weekdays teaching private voice and guitar lessons at the Welland School of Music, where she has become well-loved
      by a roster of students ranging from children to retirees. Many evenings are filled with rehearsals for The Maple Street
      Duo, her acoustic folk-pop project with Daniel Lee, her old friend and musical collaborator. Weekends often find Emily
      performing at local venues, sometimes leading sing-alongs at the farmers’ market or supporting local fundraisers.


      In recent months, Emily has been balancing an increasingly busy schedule. Her brother Jacob started Brock University
      last fall, and Emily’s been helping him settle into student life, often inviting him over for home-cooked meals. Her
      mother, Sarah, recently underwent minor surgery, so Emily checks in daily and helps with errands. Though her father
      Greg is still working full-time as an electrician, he likes to join Emily for Sunday breakfasts at a favourite diner
      downtown. Amidst these family responsibilities, Emily is considering pursuing a part-time master’s degree in music education.
      She’s also been collaborating with other local musicians to organize a community concert, hoping to raise funds for
      mental health initiatives in the Niagara region.


      Emily’s days are a blend of teaching, rehearsing, supporting her family, and nurturing her passion for music. She sometimes
      feels stretched thin, especially when lesson schedules pile up or during festival season, but finds purpose in contributing
      to her hometown’s creative spirit. Lately, she’s been spending her free time hiking along the Welland Canal or experimenting
      with songwriting inspired by Niagara’s landscapes. Her biggest concern is maintaining balance between her personal goals,
      her family, and her love of performing, but she’s grateful for the thriving community that supports her at every turn.'
