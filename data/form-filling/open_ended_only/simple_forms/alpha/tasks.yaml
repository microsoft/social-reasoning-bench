      a slog, but I hope having some company makes it a little easier. I’ve added your next chemo date to my calendar—Arthur
      will take the following one, so we’ll keep alternating every other Saturday.


      I’m also going to try to keep my schedule a little more flexible this spring, in case Emily or Brian want to pop by
      for a visit or we decide to take a last-minute road trip. Sometimes it’s nice not to have every hour planned out, especially
      after all those years of teaching!


      If you need anything in the meantime, please call me. I’ll pick up your favorite lemon cookies from the bakery before
      your next appointment.


      Love,

      Linda'
