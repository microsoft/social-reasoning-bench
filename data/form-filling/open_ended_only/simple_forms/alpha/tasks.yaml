  - artifact_type: email
    content: 'Subject: Bike Rack Installation Request - After Maya''s Bike Was Stolen at School


      Hi Eric,


      I wanted to let you know that I drafted a formal request to the school board and the city council regarding the lack
      of secure bike racks at Brainerd High School. After what happened to Maya on May 14th, I really don''t want any other
      student to go through the stress and disappointment of having their bike stolen. She was so upset that day, and I know
      how much she relied on her bike for getting to and from school and soccer practice.


      I included in the proposal some statistics about the increase in students biking to school lately, and mentioned Maya''s
      incident specifically as an example of why this is becoming more urgent. I also reached out to Principal Jensen, who
      was sympathetic and said he''d be willing to support any efforts on this front. I think if we can get the city and the
      school district to split the cost, we should be able to install a decent number of secure racks by the start of the
      fall semester.


      Would you mind looking over the draft tonight? I want to make sure it''s clear and not too emotional, but I do think
      it''s important to mention how Maya''s experience reflects a broader need. We can talk more about it over dinner if
      you want. Maybe you have some ideas from the math department about how the school could help fund it too.


      Thanks for your help with this (and for picking up Levi today!)


      Love,

      Sandra'
