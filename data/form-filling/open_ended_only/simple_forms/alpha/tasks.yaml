  - artifact_type: email
    content: 'Hi Diego,


      Thank you so much for letting me use your office’s parking lot for the food truck pop-ups on weekends. With the Lions
      Bay permit still in limbo, having a reliable spot at 212 Main Street in Vancouver is a lifesaver. I got your email from
      May 3 confirming it’s all good, and I promise to be respectful of your neighbors and keep things as tidy as possible.
      Carlos will help with cleanup, and we’ll make sure no one blocks the building entrance.


      Last Saturday went smoothly—good crowd, no garbage left behind (I did a final walk-through just in case). I’m still
      figuring out where to park during the week when things get crowded. Honestly, sometimes I end up in whatever spot is
      open, even if it’s not technically the one marked for food trucks. If anyone complains, I just apologize and move as
      quickly as I can. It’s not ideal, but you know how Vancouver parking is!


      Let me know if you need anything from me or if you hear any issues from the other tenants. I really appreciate the help—this
      has made a huge difference for me and the kids.


      Say hi to Ana and the girls!


      Monica'
