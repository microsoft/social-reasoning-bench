  - artifact_type: note
    content: 'Monday, 11 January 2021


      Personal journal


      Remember to call Dad after his appointment at Oxford Community Mental Health Centre. Supporting him during his depression
      relapse from 2012 to 2014 taught me a lot about being present, listening, and providing informal coaching. Those late-night
      calls after his sessions were exhausting, but they also strengthened our bond. I sometimes worry about him slipping
      back, so I like to check in regularly.


      Looking back, my years at Unilever were a good foundation for coaching, but the real learning came from family crises.
      I should schedule a trip to Oxford next month—Mum’s still recovering from surgery, and Dad’s always happier when we
      visit together.


      Oscar has a football tournament Saturday. Philip’s project in Maidenhead is kicking off again. I need to bake brownies
      for Amelia’s school fundraiser. Life feels relentless, but I’m grateful for the chaos.'
