  - artifact_type: text
    content: 'David: Hey Megan, thanks again for your advice during Emily’s OT session at Brainerd Pediatric Rehab Center
      on March 5th. I’ll make sure to mention your suggestion about prioritizing safer crossings near Oak St. in the council
      discussions. Emily’s sensory processing issues make the crowded sidewalks especially tough after school – I think the
      dedicated bike lanes are the only real solution.


