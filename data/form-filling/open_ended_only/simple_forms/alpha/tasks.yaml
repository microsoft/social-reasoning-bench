  - artifact_type: note
    content: 'Reflection – June 11, 2024


      Looking back at last year’s playground build, I have to admit I completely underestimated the equipment rental fees,
      which is probably why we ended up over budget. Trying to be more careful with the Lum Park project this time, but it’s
      nerve-wracking since I can’t guarantee there won’t be surprise costs again. Still, I’m glad we have most of the funding
      lined up, and the grant is a huge help.


      On the family side, Sophie’s still healing from her tumble at Lum Park last month, and Eli’s headaches from his June
      2 fall are finally fading. Peter is back at work, which is a relief after that stretch in January and February when
      he was out and I had to scramble for a payroll advance just to keep our heads above water. I never want to go through
      that stress again.


      Small win: got Sophie’s therapy recommendations from Dr. Lindstrom (June 3) and added them to the proposal for the council.
      Fingers crossed.


      — Jess'
