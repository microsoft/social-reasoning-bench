    background_context: "Jennifer Mathison is a dedicated project manager with the Brainerd Public Works Department, where\
      \ she has worked for over a decade. She lives with her husband Eric, a history teacher at Brainerd High School, and\
      \ their two children: Lucas, a freshman at Brainerd High and an avid cyclist, and Sophie, who just started fifth grade\
      \ and plays soccer. Their home on Oak Street is a short walk from Mill Avenue, and Jennifer often rides bikes with her\
      \ kids to school or the library, especially on weekends when the weather is nice. \n\nRecently, the family has felt\
      \ more invested in neighborhood safety after Lucas was nearly involved in a minor collision while cycling to a friend’s\
      \ house. This incident sharpened Jennifer's focus at work and at home, reinforcing the importance of safe infrastructure\
      \ for all ages. Her daily life is a balancing act—managing department projects, attending school events, and volunteering\
      \ with the local Safe Routes to School initiative. The Mathisons often attend community meetings and take advantage\
      \ of Brainerd’s parks and bike trails. Jennifer has noticed growing support for healthy transportation options in her\
      \ neighborhood, which motivates her both professionally and personally.\n\nJennifer’s typical weekday starts early as\
      \ she prepares breakfast for everyone and coordinates schedules. After work, she often helps her kids with homework,\
      \ and the family likes to wind down with neighborhood walks or backyard barbecues. Jennifer’s current concerns revolve\
      \ around ensuring a smooth rollout for upcoming bike lane improvements and helping her kids become more independent\
      \ and safe as they start to navigate their world on their own. She feels grateful for the community’s support and is\
      \ optimistic about the positive changes happening in Brainerd."
  artifacts:
  - artifact_type: email
    content: 'Subject: Bike lanes, Lucas, and council stuff


      Hey Eric,


      Just wanted to give you a heads up that I''m finally drafting the council proposal about expanding the dedicated bike
      lanes on Mill. I keep thinking back to Lucas''s accident on April 14th—he still talks about the spot near Oak Street
      where he wiped out and sprained his wrist. It honestly rattled me more than I let on, and I know he’s still a little
      nervous about biking down Mill, even though he’s back at it with his friends. I’m planning to mention his accident as
      a real-world example, since it’s not just numbers on paper for us. Do you think that’s okay? I want to be sensitive
      to him, but it feels important to show why this matters.


      I admit I missed the deadline to get this on last month’s agenda (lesson learned, too much going on at work and home),
      so I hope the council will consider it this time. I’m already getting emails from a few parents, and the Safe Routes
      folks are all for it.


      Let’s talk tonight if you have a sec. Also, Sophie has soccer at 5:30, and Lucas wants to bike over with his wrist brace
      (of course). Can you pick up hot dog buns on your way home?


      Love,

      Jen'
