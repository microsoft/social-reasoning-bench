  - artifact_type: text
    content: 'Brian: "Do you want me to call Dr. Patel’s office again about the MRI?"


      Evelyn: "I’m going to try to get through to them tomorrow. I should’ve sent the appeal right away, but work’s been nuts
      and I kept putting it off. Now I’m worried it’ll take even longer."


      Brian: "It’s okay. We’ll figure it out. Want me to help you with your shoes in the morning?"


      Evelyn: "Yes, please. And thank you for not losing your mind through all this. I know it’s been a lot since that bathroom
      fall."


      Brian: "We’re a team. I’ll get the kids’ lunches going tonight so you can rest."


      Evelyn: "Love you. Let’s hope Dr. Patel actually gets somewhere with the insurance this time."


      Brian: "Fingers crossed. If you need me to drive you to work, just say so."


      Evelyn: "I will. Goodnight."

      '
