  form_summary:
    form_purpose: This form is used to request that an item be added to the Brainerd City Council meeting agenda, specifying
      the type of action needed and providing relevant background information.
    intended_recipient: City council members, city staff, and administrative personnel who organize and review agenda items
      for upcoming Brainerd City Council meetings.
  instruction: ''
  instruction_message: 'Your goal is to have a natural conversation with the other person to gather the information needed
    to complete the form.


    Guidelines:

    - Ask questions naturally and conversationally

    - You may ask follow-up questions to clarify or get more detail

    - Be professional and respectful

    - When you have gathered sufficient information, end the interview

    - You will need to fill out the form AFTER the conversation ends, so make sure to gather all necessary details'
