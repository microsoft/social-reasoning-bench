    background_context: "Linda Chavez starts her day early in the quiet Outer Sunset neighborhood, squeezing in a brisk walk\
      \ with her dog, Luna, before preparing a strong cup of coffee and catching up with the news. Her son, Gabriel, is home\
      \ from UC Davis for spring break, and Linda treasures their mornings together, chatting about his classes and his latest\
      \ attempt at learning to cook. Evenings are often spent checking in with her mother, Elena, who is managing arthritis\
      \ but remains fiercely independent. Family dinners—sometimes with her sister Sofia and niece Alicia—are a cherished\
      \ tradition, usually taking place at Linda’s house or a favorite Mexican restaurant nearby.\n\nProfessionally, Linda\
      \ oversees the outpatient programs at Bayview Wellness Center, a community anchor in San Francisco. Her days are a mix\
      \ of staff meetings, crisis calls, and hands-on training for new counselors. She supervises a team navigating the complexities\
      \ of mental health and substance use, especially as the city faces increased housing instability. Linda feels a deep\
      \ responsibility for her staff’s wellbeing, especially after several challenging years adapting to remote and hybrid\
      \ services during the pandemic. Her ability to communicate in both English and Spanish helps her connect with a diverse\
      \ client base; she is often called upon to mediate difficult cases or liaise with other agencies. \n\nRecovery remains\
      \ central to Linda’s life. She attends weekly A.A. meetings at the Golden Gate Fellowship, sponsors five women in the\
      \ program, and is deeply involved in the accessibility committee for the annual Northern California A.A. Convention.\
      \ She often shares her story at local treatment centers and schools, hoping to inspire others facing challenges similar\
      \ to those she once did. In her limited free time, Linda loves tending to her small succulent garden, listening to podcasts\
      \ about social policy, and catching up with friends for Sunday hikes in Golden Gate Park. She sometimes worries about\
      \ balancing her dedication to work and A.A. service with her family’s needs, but she is grateful for the strong network\
      \ she has cultivated over the years. Linda continues to find meaning—and hope—in connecting with others, both at work\
      \ and in recovery."
  artifacts:
  - artifact_type: email
    content: 'Hi Sofia,


      Just wanted to check in now that things have (hopefully) settled a bit. I’ve been reflecting a lot lately—remember those
      chaotic college years? I almost switched out of sociology my sophomore year because the theory classes felt impossible,
      but in the end, I stuck it out. I think watching you push through your own challenges has made me realize how much we
      both rely on stubbornness to get through rough patches.


      Speaking of, I’ve been thinking back to Spring 2001, when I took that leave from the MSW program after you were hospitalized
      in San Mateo. I was so unsure if I’d ever finish grad school after that semester away, but supporting you then was the
      right call. I know you didn’t want to be in the hospital, but I’m grateful I could be there for you (and survive all
      those drives down to San Mateo). Mami still talks about how we managed, even if she worried herself sick at the time.


      Now, watching you navigate your own counseling career, I’m proud of how far we’ve both come. Let’s try for dinner soon—Gabriel’s
      home from Davis and has promised to make his infamous enchiladas (I’ll supervise, don’t worry). Maybe this time, we
      can convince Mami to let us host.


      Love you,

      Linda'
