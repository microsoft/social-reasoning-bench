  - artifact_type: note
    content: 'Personal reflections – Spring 2024


      It’s incredible how quickly small things can spiral. We finally got the quote for the new equipment for Lum Park—$52,750
      is a huge chunk, but it covers everything. After what happened with Sam’s fall last fall (that concussion was a wake-up
      call), I just want to get this done so no other kid gets hurt. And I keep thinking about Ella—her OT said at Brainerd
      Children’s Clinic (May 15) she really struggles to use most of the existing equipment because of her mild cerebral palsy.
      I wish the city would prioritize this more, but it always feels like I’m pushing uphill.


      I’m only recommending this proposal because the Parks Board chair is insisting we push it through, honestly. I personally
      think there are other projects that deserve just as much attention, but everyone’s focused on playgrounds this year.
      Maybe it’s just because some of the parents have been so vocal after those injuries last year. In any case, I’ll fight
      for it, but it’s not the only thing we need to fix.


      On the home front, money is tight. Ella’s diabetes supplies and treatments at St. Joseph’s wiped out our March budget
      ($1,420 out of pocket—still can’t believe that bill). I asked the vendor for a payment plan since I can’t front the
      costs before the city reimburses. Crossing my fingers they say yes.


      Note: If this doesn’t pass, I’ll just bring it up again at the next meeting. Not letting it drop.

      '
