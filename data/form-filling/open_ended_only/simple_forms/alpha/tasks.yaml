  - artifact_type: email
    content: 'Subject: Checking in (and venting a little)


      Hey Dad,


      Hope you’re getting better weather for the garden this week—my windowsill basil is still hanging on, but I think it’s
      ready for the compost.


      Things are busy on my end. Work at Midwest Financial Solutions has been a whirlwind; we’re rolling out another client
      campaign, and I’ve been staying late more often than I’d like. The commute is starting to wear on me—35 minutes each
      way, and now with the apartment situation up in the air, it’s hard not to get anxious about all the change. Mr. Coleman
      told us back in March that his divorce settlement was finalized, which is why he’s had to sell the building. So, everyone
      on Martin Street has to be out by the end of May. Feels weird that I won’t be calling this place home for much longer,
      especially after four years. I keep telling myself it’s a chance to find something closer to work, maybe even with a
      dishwasher that isn’t older than me.


      I’m trying to keep up with yoga and book club, but most evenings I’m just packing boxes or scrolling through Zillow.
      Sophie’s been checking in a lot too, which helps. Let me know if you and Mom want to come out one weekend—maybe we can
      hit the farmer’s market and you can give me some tips for potted tomatoes in the new place.


      Love,

      Emily'
    metadata:
