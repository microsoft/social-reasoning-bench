    background_context: 'Sandra Lee Carlson has lived in Brainerd, Minnesota for over two decades, having moved back after
      college to be closer to her family and raise her children in a community she loves. She works as a Recreation Program
      Coordinator for the Brainerd Parks and Recreation Department, a role she has held for the past six years. Her days are
      a blend of coordinating youth sports leagues, organizing community events at city parks, and fielding feedback from
      residents about ways to improve recreational spaces. Sandra’s mornings usually start with getting her son Levi off to
      middle school and her daughter Maya to high school, before heading downtown where the Parks and Rec office is housed
      in the Community Center.


      Lately, Sandra has been especially busy as downtown Brainerd is seeing a surge in new businesses and more people biking
      to work and school. She often bikes into work herself when the weather allows, and she’s noticed the lack of secure
      bike parking firsthand. In the evenings, Sandra enjoys walking her dog Charlie along the Mississippi River trails with
      her husband Eric, a high school math teacher. Weekends often involve family outings to Lum Park, or catching Maya’s
      JV soccer games. Sandra is close with her mother, June, who helps out with the kids after school and occasionally joins
      them for Sunday dinners.


      Sandra’s biggest current concern is making sure public spaces remain accessible and safe as Brainerd grows. She’s proud
      to see the city council and local business community rallying behind projects that encourage healthier lifestyles and
      more walkable, bikeable neighborhoods. Outside of work, Sandra has been helping coordinate a summer arts fair, and she’s
      beginning to think about college visits with Maya. Between work, family, and community involvement, her schedule is
      packed but rewarding. She’s looking forward to a short camping trip up north over Memorial Day weekend, a family tradition.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Bike Racks Proposal – After Maya''s Bike Was Stolen at School


      Hi Eric,


      I wanted to update you on the bike rack situation downtown since Maya’s bike was stolen at Brainerd High School last
      week (May 14th). I’m still furious—she was so careful locking it up every day, but it just wasn’t secure enough. After
      what happened, I brought up the issue at work and I’m drafting a formal request for the city council to approve new
      racks near the library, city hall, and the main retail blocks. Honestly, I’m not sure if this is even in the council’s
      lane or if it should go through another committee, but I figured it’s better to get it moving than wait for someone
      else to step up.


      I’ve talked to a few business owners downtown, and most are supportive since cyclists keep locking bikes to their railings
      or street signs. I also heard from Maya’s friends that some of them avoid biking because there’s nowhere safe to leave
      their bikes. It’s so frustrating — I can’t believe we have to fight for something so basic.


      I’m hoping the city will pay for the racks and installation. Given everything with your layoff, it’s not like we can
      pony up extra funds. I’ll keep you posted. We need to make sure Levi has a safe spot when he starts biking to middle
      school this summer.


      Love,

      Sandra'
    metadata:
      date: '2024-05-20'
      sender: sandra.carlson@brainerdparks.org
