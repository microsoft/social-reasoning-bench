  - artifact_type: calendar
    content: 'Event: Sofia’s Speech Therapy

      Date: Thursday, June 6, 2024

      Time: 3:30pm

      Location: Lions Bay Community Centre


      Details: Weekly appointment with Ms. Lee. Remember to leave the truck by 3pm so I can pick up Sofia from school and
      get her to the Community Centre on time. If I’m running late or if there’s a long line at the truck, text Carlos to
      cover the last hour of service. Try not to park near the Community Centre during speech therapy hours—don’t want to
      block up the lot or distract Sofia. Bring her water bottle, notebook, and the stickers she likes for “good practice.”


      Also: Check that the truck is cleaned up before leaving. Ask customers to help keep the area tidy if things get busy.
      Sometimes I don’t notice spills or full bins if it’s hectic, so remind folks to let me know if something needs attention.'
