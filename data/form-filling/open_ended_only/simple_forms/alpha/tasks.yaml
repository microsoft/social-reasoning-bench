    content: 'Personal Reflection – April 20, 2024


      I’m still thinking about what happened during the group project meeting in COSC1234. Things got heated when Ben started
      criticizing my part of the code and I just snapped. I yelled back and called him a couple of stupid names. Not proud
      of that. I was already stressed from the class and everything with Dr. White, plus I haven’t been sleeping well since
      the last counseling session. Maybe I made things worse by losing my temper.


      On the bright side, our project is actually coming together, and I think we’ll finish on time now that everyone’s clear
      on their roles. Need to apologize to Ben next week. I hope he gets it was a bad day for me, not about him personally.
      I’ll make sure to do my share and try not to let stress get the best of me next time.'
