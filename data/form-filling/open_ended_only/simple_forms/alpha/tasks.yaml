  - artifact_type: note
    content: 'Journal – When Michael travels for work


      Whenever Michael heads out for a project and leaves before sunrise, it always throws our routine into chaos. I have
      to juggle getting Daniel and Sophie ready, packing lunches, doing drop-offs, and still squeezing in Maplewood tasks
      before 9 a.m. Sometimes I need to take a last-minute day off just to handle childcare, especially if one of the kids
      is sick or has a school event.


      I keep a running list of backup contacts—Mrs. Lane next door, the aftercare coordinator, and Eric (if he’s in town).
      Eric’s situation has become more unpredictable since his suspension last year. That’s what pushed me to attend the mediation
      workshop at the Ohio HR Conference in March, hoping I’d learn something useful for my family and work.


      Reminder to myself: Confirm Michael’s travel schedule for September. With Eric’s VA hearings at Hamilton County Courthouse,
      I need to plan for extra coverage and flexibility. Don’t forget to block out Sophie’s dance class Fridays and set aside
      time for Daniel’s baseball. Maybe ask Maplewood to let me work remotely more often during those weeks.


      Yoga, even just a few stretches, helps keep my sanity intact. Don’t skip it.


      -Jessica'
