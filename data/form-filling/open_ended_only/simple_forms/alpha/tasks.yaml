  - artifact_type: note
    content: 'Personal Reflection – April 20, 2024


      I’ve been trying to keep my spirits up, but these last few weeks have been rough. The back pain is so sharp some nights
      that I can’t find a position that doesn’t hurt, and the numbness in my left leg makes me nervous every time I have to
      get up. I keep thinking about that Friday after work at Grayson, when I lost my balance in the bathroom and Brian had
      to come help. He’s been amazing, but I hate having to rely on him so much for basic things. Even showering feels like
      a chore. Dr. Patel keeps telling me not to push myself, but it’s hard not to feel guilty when I can’t do my share at
      home or at work.


      I’m grateful for Mom being so close—she’s been picking up Tyler when I’m wiped out, and she’s always offering to run
      errands. I need to remind myself that it’s okay to accept help, even when it feels like too much.


      I’ll try to focus on the good: Samantha’s last home game is this week, and the weather should be perfect. Brian and
      I are planning a family trip to the coast this summer, and I really want to be able to enjoy it without worrying about
      my back the whole time.


      Maybe the next round with insurance will go better. I just need to keep pushing.'
