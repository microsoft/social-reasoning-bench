  form_info:
    title: Kindness Matters Service Award Nomination Form
    extracted_text: "Lions Clubs International\n\nKINDNESS MATTERS SERVICE AWARD NOMINATION FORM\n\nA Lions or Leo club that\
      \ has performed outstanding service in a global cause may be nominated for the Kindness Matters Service Award. Lions\
      \ or Leo clubs that wish to be nominated must be in active status and have reported their service project on MyLion®\
      \ or their regional reporting system. A minimum of two of the twenty awards will be awarded to Leo clubs. Lions and\
      \ Leo club nominations should be submitted separately.\n\nNomination Deadlines\n• July 1 to October 31: Nominations\
      \ are open. \n• August 15: Deadline for club service chairpersons and Leo club presidents to electronically send one\
      \ nomination to the District GST coordinator.\n• September 15: Deadline for District GST coordinator to electronically\
      \ send one nomination to the Multiple District GST coordinator. \n• October 31: Deadline for Multiple District GST coordinator\
      \ to send one Lions and/or one Leo nomination to Lions Clubs International.\n\nPlease note that nominations that do\
      \ not meet deadlines are disqualified from consideration.\n\nNOMINATED CLUB\n(Please indicate which type of club this\
      \ nomination is for.) Lions Club □  Leo Club □\n\nClub Service Chairperson/Leo Club President (Name) _______________________________________________________________________\n\
      \nE-mail ___________________________________________________________________________________________________________\n\
      \nClub Service Chairperson/Leo Club President (Signature) _____________________________________________ Date _______________\n\
      \nLions/Leo Club Name _________________________________________________________________________\n\nLions Club/Leo Number\
      \ ______________________________________________________________________\n\nName of Service Project ________________________________________________________________________\n\
      \n□ Should my project be selected, I give consent for Lions Clubs International to use attached information and photographs\
      \ of this club's service project for public recognition purposes.\n\nENDORSED BY\nImmediate Past Lions Club President\
      \ Name/Immediate Past Leo Club Advisor Name (Printed) ________________________ Member Number ________________\n\nImmediate\
      \ Past Lions Club President Name/Immediate Past Leo Club Advisor (Signature) ____________________________ Date _______________________\n\
      \nSERVICE PROJECT DESCRIPTION\nThe following section should be filled out by the club service chairperson (Lions clubs)\
      \ or Leo club president (Leo clubs). Please type and attach additional sheets if necessary.\n\n1. What was unique, outstanding\
      \ or innovative about this service project that met or surpassed the goals of the global cause?\n_____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      \n2. Why is this service project important in your community?\n_____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      \n3. Which local partnerships helped make this project possible, if any?\n_____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      \n4. Were any resources from LCI such as the Service Toolkit or Service Project Planners used to plan and execute this\
      \ project?\n_____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      \n5. Additional Comments.\n_____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________\n\
      _____________________________________________________________________________________________________________________"
