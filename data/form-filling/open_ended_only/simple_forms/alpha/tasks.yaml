  form_info:
    title: ASSOCIATE APPLICATION FORM CONFIDENTIAL
    extracted_text: 'ASSOCIATE APPLICATION FORM CONFIDENTIAL


      Please complete and submit this form, along with a covering letter, CV and transcripts to applications@volterrafietta.com.


      ABOUT YOU:


      +-----+-------------------------------------------------------------------------------------+

      |  1. | Are you a qualified lawyer?                                                         |

      +-----+-------------------------------------------------------------------------------------+

      |  2. | In which jurisdiction(s) are you qualified?¹                                        |

      +-----+-------------------------------------------------------------------------------------+

      |  3. | Please provide your qualification(s) date.                                          |

      +-----+-------------------------------------------------------------------------------------+

      |  4. | Are you licensed to practice law in one or more jurisdiction(s)?                    |

      +-----+-------------------------------------------------------------------------------------+

      |  5. | Who is your current or most recent employer?                                        |

      +-----+-------------------------------------------------------------------------------------+

      |  6. | What is your current salary?                                                        |

      +-----+-------------------------------------------------------------------------------------+

      |  7. | What is your salary expection?                                                      |

      +-----+-------------------------------------------------------------------------------------+

      |  8. | What is your current or most recent job title.                                      |

      +-----+-------------------------------------------------------------------------------------+

      |  9. | Please give details of your notice period/availability.                             |

      +-----+-------------------------------------------------------------------------------------+

      | 10. | Have you previously applied to work for or been employed by Volterra Fietta?        |

      +-----+-------------------------------------------------------------------------------------+

      | 11. | If you answered yes to Q.10 above, please give details.                             |

      +-----+-------------------------------------------------------------------------------------+

      | 12. | Do you know anyone or have professional connections with VF?                        |

      +-----+-------------------------------------------------------------------------------------+


      ¹ If you are qualified in the UK, please provide your SRA number and indicate whether you hold a current practising
      certificate.'
  form_summary:
    form_purpose: Job application for an associate lawyer position, collecting information on legal qualifications, employment
      history, and suitability for the role.
    intended_recipient: HR personnel and hiring managers at Volterra Fietta, who will review the application to assess the
      candidate's eligibility and fit for the position.
  instruction: ''
  instruction_message: 'Your goal is to have a natural conversation with the other person to gather the information needed
    to complete the form.


    Guidelines:

    - Ask questions naturally and conversationally

    - You may ask follow-up questions to clarify or get more detail

    - Be professional and respectful

    - When you have gathered sufficient information, end the interview

    - You will need to fill out the form AFTER the conversation ends, so make sure to gather all necessary details'
