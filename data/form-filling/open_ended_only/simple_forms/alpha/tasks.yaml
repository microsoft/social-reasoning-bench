    content: 'April 18, 2024 – To Do/Reminders


      - Email HR about shifting some of my on-site hours next week, especially if my back is still acting up. Really tough
      to stay focused after a night of bad sleep.

      - Schedule another check-in with Dr. Patel. Need to mention: 1) April 12 bathroom fall (Brian had to help me up, left
      leg numb again), 2) how often I’m relying on Brian for basics like showering and getting dressed, and 3) that physical
      therapy and stretching aren’t cutting it.

      - Follow up with insurance. Still can’t believe they denied the MRI again when both my primary and Dr. Patel have been
      clear about the need with all the symptoms. Maybe ask Dr. Patel if she can provide more detailed notes or if there’s
      another way in.

      - Remind Brian to grab Samantha’s softball gear from the cleaners before Saturday’s game.

      - Check in with Mom about next week’s after-school pickups for Tyler—if my pain flares up again, I’ll need her help.
      She’s been wonderful since moving to the neighborhood—honestly don’t know how we’d manage otherwise.

      - Grocery list: eggs, spinach, berries, more Tylenol, and maybe that heating pad Mom mentioned.


      Personal note: try to stay positive. I know the uncertainty around my back is getting to me, but everyone’s pitching
      in, and I’m grateful. Hoping for some good news soon.'
