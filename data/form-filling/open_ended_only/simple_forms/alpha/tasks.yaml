    background_context: 'Sarah Bennett wakes most mornings before 6am, quietly padding downstairs while her husband Mark and
      young daughter Olivia are still asleep. She prepares a quick breakfast, checks over the day''s delivery schedule, and
      heads out by 6:30 to open The Rustic Spoon Café. The café sits at the edge of Worksop’s bustling market square, and
      Sarah has run it for seven years, shaping it into a local favourite, especially cherished for its warm atmosphere and
      menus celebrating North Notts produce.


      In recent months, Sarah’s days have been especially full. The café’s Instagram following has grown, which brings more
      customers but also means she juggles posting content, responding to reviews, and managing bookings along with prepping
      for the lunch rush and mentoring her two current apprentice chefs. Sarah is devoted to her community: she organises
      a monthly ''Meet the Producer'' evening, and this month she’s been busy coordinating with local schools for the upcoming
      children’s cookery workshop. Sunday afternoons are sacred—Sarah, Mark, and Olivia visit Ruth and George for lunch in
      Retford, where three generations cook together, trading recipes and stories in the kitchen where Sarah’s love of food
      began.


      Sarah’s life is rewarding but often exhausting. She worries about making sure her staff feel supported, especially her
      younger apprentices navigating their first jobs, and keeps a close eye on rising food costs. She’s been working with
      local farms to keep sourcing as sustainable as possible. At home, she and Mark coordinate afterschool pickups and bedtime
      routines, sometimes fielding a call from the café while reading Olivia a story. But the café’s recent five-star hygiene
      rating, a glowing feature in the local press, and heartfelt feedback from locals remind Sarah why she pours herself
      into her work. Amidst the busyness, she cherishes quiet moments baking with Olivia or catching up with friends over
      coffee at the café. Her hope is to keep building a vibrant, supportive hub for her community—one meal, and one neighbour,
      at a time.'
  artifacts:
  - artifact_type: note
    content: "Monday, 12 February 2024  \nPrivate journal\n\nThe last few weeks have felt like a marathon with no finish line.\
      \ I keep reminding myself why I started The Rustic Spoon Café in the first place — I wanted to escape the endless grind\
      \ of my old job, tired of clocking in for someone else, and just craving the freedom to make my own decisions. I never\
      \ imagined it would become this community hub, but most days, I still feel like I’m just running the show for myself.\
      \ The pressure to be \"the difference-maker\" is exhausting, and sometimes I wonder if it was all a bit accidental.\n\
      \nI know I’ve poured myself into the business, but lately, between the café's growing Instagram, the staff turnover,\
      \ and Dad’s health, I’m struggling to find time for anything but work. Mark helps as much as he can, but after George’s\
      \ diagnosis last June at Bassetlaw Hospital, everything shifted. I’ve spent so much energy arranging flexible shifts\
      \ for myself and the team so I can be in Retford for Dad’s appointments. Evenings are a blur — prepping menus, answering\
      \ reviews, then checking up on Mum and Dad.\n\nEvery Sunday lunch in Retford is sacred, especially since Mum’s surgery\
      \ for ovarian cancer in March 2022. I delivered meals to her every week then, making sure she had good food while she\
      \ recovered. Now, with Dad’s Parkinson’s, we’re all rallying together again, but it’s a different kind of exhaustion.\
      \ At the café, I’m constantly mentoring apprentices, but the truth is, I mostly run it on my own. Three people have\
      \ left this year — the hours are brutal and it’s hard to keep anyone for long. I try to stay positive, but I’m just\
      \ so tired. Maybe tomorrow will feel lighter.\n\n— Sarah"
