    - Elena Alvarez (mother, 73)
    - Miguel Alvarez (father, 76)
    background_context: 'Maria Alvarez is a resilient and caring mother who has spent the last few years balancing her work
      as an administrative assistant at the Rochester Cancer Center with the demands of her health and family life. She lives
      with her husband Carlos, who works as a maintenance technician at the University of Rochester, and their teenage son
      Lucas in a modest home just south of Highland Park. Maria was diagnosed with cancer two years ago and has been undergoing
      treatments, including chemotherapy, which has led to neuropathy requiring ongoing physical therapy. Despite her own
      health challenges, Maria keeps the household running, handling bills, organizing meals, and making sure Lucas gets to
      school and soccer practice.


      The Alvarez family has faced mounting medical expenses over the past year: Maria''s monthly cancer prescriptions, physical
      therapy, Carlos''s blood pressure medications, and unexpected dental work for both Maria and Lucas. They''ve set up
      a payment plan with Highland Oncology for lab work and occasionally borrow from Maria''s parents, Elena and Miguel,
      especially when medical costs spike. Carlos sometimes picks up extra shifts at the university for overtime pay, and
      last summer, Lucas worked at a local grocery store to help with utility bills during Maria''s treatments. The family
      struggles to keep up with their mortgage and other bills, but their bond remains strong, and they lean on each other
      during tough times.


      Daily life in the Alvarez household is a mix of routines and adjustments: Maria''s mornings start with medication and
      physical therapy exercises, followed by a quick breakfast with Carlos before they both head to work. In the evenings,
      Maria helps Lucas with homework and encourages him in his part-time job and extracurriculars. Weekends are spent visiting
      Maria''s parents in nearby Brighton and catching up on chores. Despite financial worries and the ongoing health battles,
      Maria remains optimistic, finding joy in family dinners and the small victories of everyday life.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Grocery Shopping and Bills


      Hi Carlos,


      Just wanted to remind you that Mom stopped by today and handed me $500 in cash for groceries. She insisted after finding
      out about all the bills piling up since my stay at Strong Memorial Hospital in July. I didn’t want to take it, but she
      said, “Mija, this is what family does.” I’m going to put the money in the envelope in the kitchen drawer so we can use
      it for this month’s shopping and any extras like Lucas’s soccer snacks. With all the prescriptions and those lab payments
      to Highland Oncology, it’s a relief to have a little breathing room for once.


      Also, don’t forget to pay the water bill by Friday (it’s on the fridge), and let’s try to stick to the list at Wegmans
      so we don’t go over. I know you’re picking up extra shifts this week—thank you for that, it really helps. Maybe we can
      use some of what’s left from Mom for the co-pay at my physical therapy next week.


      Love you,

      Maria'
