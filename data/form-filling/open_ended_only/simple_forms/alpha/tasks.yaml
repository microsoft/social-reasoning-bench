  - artifact_type: note
    content: 'Personal reflection – March 16, 2024


      I’ve been thinking about this year’s engineering design process and how rushed it all felt. Balancing teaching full-time
      with running the robotics club meant that some pieces of our project, especially the documentation and final testing,
      didn’t get as much attention as I wanted. I tried to give the kids as much ownership as possible, but I wish I’d had
      more time to really dig into the details with them. I’m proud of what we accomplished—seeing the mechanical dragon actually
      flap its wings was incredible—but I hope next year I can carve out more time for the iterative work and not just push
      to the finish line. Maybe it’s time to delegate more or ask for help from other faculty.


      For now, I just need to remember that the kids learned a lot from the experience, even if it wasn’t as polished as I
      hoped.'
