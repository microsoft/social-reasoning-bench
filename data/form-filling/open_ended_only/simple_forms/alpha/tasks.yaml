  - artifact_type: note
    content: 'Budget Notes – November


      Still have to pay another $200 toward Carlos’s Highland Hospital bill from his hypertension scare back in November 2023.
      Three days in the hospital and the total was $1,200—still can’t believe it’s that much for such a short stay. We’re
      on the payment plan, so at least it’s not all at once, but it’s another thing hanging over our heads. I need to make
      sure to transfer the money before the 15th to avoid any late fees.


      Also, need to double-check that the car insurance gets paid this month—last time I forgot, and they sent us a nasty
      letter. Between my PT, prescriptions, and Lucas’s braces, November is always tight. It feels like every time we get
      ahead, something else pops up. Maybe I’ll ask Carlos if we can use the credit card for the hospital payment just this
      once, since we’re still paying off the dental bills from last year.


      Reminder: Bring the insurance card to Carlos’s next check-up. He always forgets.


      —Maria'
