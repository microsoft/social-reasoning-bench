    background_context: 'Eric Sanderson lives with his family on the southwestern edge of Columbia, Missouri, where the subdivisions
      start to give way to gently rolling fields and patches of old woodland. Their pale blue house with cedar trim sits on
      a couple of acres at the end of a quiet cul-de-sac, with enough room for his impressive hobby: raising ring-necked pheasants
      and northern bobwhite quail. This isn’t just for fun—Eric’s father kept pheasants when he was a boy back in Iowa, and
      the smell of fresh straw and the soft clucking of the birds still brings back those memories. Now, Eric’s own son Henry
      helps him clean the flight pen on weekends, learning about animal care and responsibility. In spring and summer, their
      yard buzzes with activity as local Boy Scout troops visit to learn about native birds, building on Eric’s passion for
      both teaching and conservation.


      By day, Eric teaches environmental science at Rock Bridge High School. He’s known as a hands-on instructor, always quick
      to organize field trips to the local conservation area or to bring in guest speakers—sometimes other teachers, sometimes
      even his wife Jeanne, who is a nurse at Boone Hospital and enjoys talking to students about public health and the environment.
      The Sandersons value community and try to keep a welcome home, with neighbors stopping by for coffee on the porch or
      to borrow a tool. Eric’s daughter Callie, a fourth grader with a sharp eye for detail, helps her dad keep records of
      the birds, making sure all the tags are in place and that every name is spelled right.


      This year has been busy: Eric recently took on the role of lead advisor for the school’s new ecology club, and Jeanne
      is recovering from a minor surgery, so he’s been balancing more chores at home. Despite the busy schedule, Eric finds
      time for hiking at Rock Bridge State Park and planning the next outdoor skills day for the Scouts. He’s proud that his
      little operation is equal parts family legacy, hands-on education, and a way to connect with others who care about wildlife.
      His main concerns right now are keeping up with lesson planning, supporting Jeanne’s recovery, and ensuring the birds
      stay healthy through the unpredictable Missouri spring weather.'
  artifacts:
  - artifact_type: email
    content: 'Hi Mom,


      Just wanted to check in — it’s been a busy couple of weeks and I realized I haven’t called since last Sunday! Jeanne’s
      still working from home, mostly on the couch or out on the porch if it’s sunny, and she’s recovering well from her breast
      cancer surgery back in March. She’s a little stir-crazy but I think the extra time with the kids is doing her some good.
      If you need to reach us and I’m at school or out back with the birds, just call the house line — Jeanne is here most
      days and keeps her cell close by, too.


      On the bird front, Henry rescued a female pheasant near Rock Bridge High School on March 18th (he was SO proud, you
      should’ve seen his face). She’s in the separate pen in the backyard, and Callie’s helping me keep track of her feedings.
      We’re also keeping a little bobwhite quail that turned up during our youth outdoor skills program in May — poor thing
      was limping but seems to be perking up. Dr. Lisa Chen, the wildlife rehab specialist, is walking us through what to
      do. Henry’s been texting her photos for updates. Feels like we’re running a mini wildlife hospital here!


      Otherwise, same old chaos: field trip coming up next week (wish me luck corralling 20 high schoolers in the woods),
      and the Scouts are coming Saturday for another birding skills session. If you or Dad want to visit, remember: from I-70,
      take exit 126 for Stadium Blvd, head south, right on Scott Blvd, left onto Winding Prairie Ct — our pale blue house
      with cedar trim is the second on the right.


      Love,

      Eric'
