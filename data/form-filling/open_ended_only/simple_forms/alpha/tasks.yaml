  - artifact_type: note
    content: 'Reflection – Balancing Work and Family (April 2024)


      The week before Blue Ridge Outdoor Challenge always feels like juggling chainsaws. Early mornings prepping gear, late
      nights emailing guides and medics, and still trying to make it to family dinners. Erin’s been amazing, handling Mason’s
      Cub Scout schedule and Lucy’s soccer practice on top of her own work at the school.


      I worry about Lucy sometimes. Her asthma makes me anxious, especially with all the running and biking scheduled for
      Saturday. I’m grateful Sarah Jenkins will be there—she knows Lucy’s history and agreed to keep her inhaler close during
      the hike and biking session at Guion Farm. That gives me some peace of mind, but I still get that nagging feeling every
      time Lucy pushes herself physically. She’s determined to keep up with the older kids, which is both inspiring and a
      little scary.


      Mason keeps asking if he can join the mountain biking group, but he’s not quite old enough. Maybe next year, if Erin
      agrees. For now, he’ll stick with the younger kids’ group and the scavenger hunt—last year, some kids wandered off the
      main trail a bit, but it made the activity more exciting for them. I just have to remind our guides to keep a close
      eye and keep radios handy.


      The picnic at Hooker Falls is always a highlight, even if we sometimes play music without checking if it’s strictly
      allowed. I want the kids to have those memories—good food, laughter, music, and the sense that nature belongs to them.
      I hope we’re teaching them stewardship and wonder, not just logistics and rules.


      One more week, then I can breathe again.'
