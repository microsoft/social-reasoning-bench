    content: 'Ethan,


      Saw your hockey gear in the dryer again—don’t forget to check the straps before your practice. Also, quick update since
      you asked: the city council needs to officially approve the new snow plow since the old one was totaled after your accident
      in January. Don’t worry, nobody’s mad—it was just bad luck with that ancient truck. I’ve had my share of late-night
      breakdowns in that thing, so I get it.


      I had to get Mom to pick me up at the City Garage at 3 a.m. back in December when the engine quit on Oakwood. These
      trucks have been more trouble than they’re worth lately, and your incident just pushed them over the edge to finally
      replace it. In fact, this is all happening while we’re still catching up from the last repairs (that $4,200 bill—ouch).
      Grandma’s street didn’t get cleared for three hours that night, so it’s not just you who’s had a rough go.


      Anyway, try not to worry about it. Let’s focus on your college apps and maybe get out to Gull Lake this weekend if the
      slush melts.


      Dad'
