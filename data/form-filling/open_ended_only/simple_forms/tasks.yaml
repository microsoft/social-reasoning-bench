    background_context: 'Rebecca recently moved to Oak Park from Evanston following the death of her grandmother, who was
      in senior care in the area. This loss has been a catalyst for her reevaluating her life and career. After over ten years
      teaching English at the high school level, Rebecca is currently on a sabbatical to explore a possible career shift toward
      social work or counseling, inspired by the compassionate volunteers she observed supporting her grandmother. She balances
      her time between personal creative projects, community engagement, and caring for her rescue dog, Cody, who has become
      a beloved companion and an unexpected social connector in her new neighborhood.


      Rebecca’s days are a blend of routine and renewal. She starts her mornings walking Cody through Scoville Park, often
      meeting other dog owners and chatting about the best local coffee spots. On weekday afternoons, she might be found at
      the Oak Park Public Library, where she volunteers leading writing workshops for teens. She spends evenings writing or
      hosting potluck dinners, inviting new neighbors over to get to know them and share her latest culinary experiments.
      Her weekends often include hiking trips to the Forest Preserves with Cody, attending local book clubs, and occasionally
      submitting poetry or short fiction to community journals.


      Though still grieving her grandmother, Rebecca finds comfort in building new relationships and giving back, especially
      to seniors and youth. She stays in close contact with her mother, Susan, who lives nearby in Glenview, and her younger
      brother, Jason, a graphic designer in Chicago. Rebecca is thoughtful about her next career steps, taking online classes
      in counseling, and exploring opportunities to deepen her involvement in care and recreational programming. She is optimistic
      about the future, grateful for her supportive community, and energized by the chance to combine her love of literature,
      helping others, and continued personal growth.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Update – New routines, family stuff, and Cody’s latest adventures


      Hi Mom,


      Just wanted to check in after another busy week here in Oak Park. Cody and I have settled into a routine—morning walks
      through Scoville Park, where he’s become a mini-celebrity among the neighborhood dogs. I met a woman named Rita who
      recommended a coffee spot on Lake Street (the almond croissants are dangerously good).


      I’ve started volunteering at the library, leading writing workshops for teens. It feels rewarding but also a little
      surreal, given everything that happened last year with Grandma Dorothy. Since she passed away at Maple Grove in August,
      I’ve been seeing Dr. Lisa Chen at Riverside Mental Health Clinic for grief counseling. I think volunteering is helping
      me process some of that loss; it’s like I’m honoring Grandma and myself, finding ways to move forward.


      I know you’re still grieving Dad, too. Remember how you started bereavement counseling at Memorial Hospital after he
      died in March 2022? I learned so much watching you navigate that, and it’s made me want to help others who are struggling.
      Maybe I’ll focus my volunteer work on grief support or creative arts programming for people dealing with loss.


      Life on sabbatical is strange—I’m mostly looking for ways to fill my time and stay busy. Sometimes I worry I’ll get
      bored, but so far, the mix of volunteering, writing, and long hikes with Cody is keeping me occupied. Still, if I get
      a job offer or decide to take a spur-of-the-moment trip, I might have to cut back on volunteering. For now, though,
      my schedule is pretty flexible, and I’ll play it by ear.


      Let me know if you want to come down next weekend for a potluck. I’m experimenting with a new lentil stew recipe, and
      Cody would love to see you (and steal some scraps).


      Love,

      Rebecca'
