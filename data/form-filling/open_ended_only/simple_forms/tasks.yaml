  - artifact_type: email
    content: 'Subject: School pick-ups and this week''s chaos


      Hi Marcus,


      Just wanted to check in about tomorrow and Friday—can you still get off early for Lena and Eli’s pick-up, or does the
      maintenance schedule look too full? I can ask Aunt Denise if you’re stuck (she’s always happy to help).


      I’m still catching up from last month—can’t believe how quickly things got out of hand when Eli got sick. I know you
      hated missing work and going unpaid for those two weeks, but I’m glad you were there for him. The bill from Sacred Heart
      was higher than I expected ($430!), but I finally paid it off along with the late utilities.


      Let’s try to keep track of any extra hours you can pick up next month, just in case. I don’t want to fall behind again.
      If you’re up for it, we can sit down this weekend and go over everything together—maybe make a plan for the summer,
      too, with the HVAC and all.


      Love you. Let me know what you need from the store tonight—milk, eggs, and anything for Eli’s cough?


      Rachel'
