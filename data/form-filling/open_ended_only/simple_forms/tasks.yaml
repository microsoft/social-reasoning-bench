  - artifact_type: note
    content: "Reflection: Balancing Work & Home (April)\n\nThe retreat is almost here, and I’m feeling that familiar tension\
      \ between wanting everything to be perfect at work and actually being present at home. Nicole’s leading the mindfulness\
      \ walk at Guion Farm, building on her sessions with Dr. Larkin in Asheville last fall—she’s come so far in managing\
      \ anxiety, and I’m grateful for her support. But I worry about missing Jasper’s last little league game or not being\
      \ there when Sophie has her volcano “eruption” at the science fair. I keep telling myself the retreats are short, but\
      \ it’s hard not to feel stretched during spring and fall.\n\nLast year’s weather lesson stuck with me—a couple folks\
      \ got pretty chilled and had to be picked up early because they didn’t pack for the mist and wind near the falls. I\
      \ need to be more proactive this year with reminders (layers, dry socks, backup snacks). Still, there’s only so much\
      \ you can control. \n\nTrying to remember what I tell participants: progress, not perfection. The forest will be there\
      \ after the retreat, and so will the kids. \n\nTo-do: confirm snack pickup, charge radios, set up family backup plan\
      \ for weekend.\n\n- Aaron"
