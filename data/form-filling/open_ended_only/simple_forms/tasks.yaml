  - artifact_type: email
    content: 'Subject: Weekend plans and volunteering


      Hey Sarah,


      Hope you’re doing well! I’ve been spending most weekends either hiking with Cody or curled up with a book. Honestly,
      I tend to prefer quiet nights alone, reading or watching movies, rather than big group gatherings. Large social events
      just aren’t my thing; unfamiliar settings make me anxious, and I always feel like I don’t quite fit in.


      I did start volunteering at the Oak Park Public Library, leading writing workshops for teens, and it’s been surprisingly
      fulfilling. After Dad passed away from cancer at Rush Oak Park Hospital in May 2019, creative writing and poetry became
      my go-to ways of coping. Some of my poems ended up in the Oak Park grief support group, and sharing them with others
      helped me process everything. Volunteering has been a new outlet for that energy.


      I’m also considering getting more involved with grief support programming—since Mom went through bereavement counseling
      at Memorial Hospital after Dad died in March 2022, I’ve realized how much emotional support matters. Sometimes I wonder
      if I should shift careers entirely and focus on social work or counseling, especially since my sabbatical gives me room
      to explore.


      Let me know if you want to join me for a library session or just hang out for a movie night. Cody’s always happy for
      company, and I’ll make popcorn!


      Take care,

      Rebecca'
