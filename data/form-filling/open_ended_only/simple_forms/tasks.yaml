    background_context: 'Rachel Ann McMillan is navigating a busy year of transitions. After four fulfilling years living
      in a shared flat in Karori with Laura Chen and David Hargreaves, she received notice from her landlord that the property
      is being sold. While the news was disappointing, Rachel took it in stride, grateful for the supportive flatmate environment
      and amicable relationship with her landlord, Mrs. Patel. She’s now settling into a new unit in Tawa, appreciating the
      extra space and the leafy neighborhood. The move has also placed her much closer to her new workplace—Greenhills Health
      Solutions in Greenhills, where she started as a Senior Customer Service Coordinator in March 2024. The reduced commute
      (now a 15-minute drive) allows her to reclaim precious time for herself, which she spends reading, gardening, and socializing
      at the local café with friends and her brother Simon.


      Rachel’s weekends are devoted to helping her elderly parents, Edward and Margaret, who live in Johnsonville. Edward’s
      mobility has declined since his hip surgery last year, and Margaret struggles with early-stage memory loss. Rachel alternates
      grocery runs, doctor appointments, and gentle walks with them on Sundays, often joined by Simon. She finds joy in maintaining
      these family connections, though the emotional load can sometimes be heavy. Her brother, living nearby, shares responsibilities,
      which has strengthened their sibling bond. Rachel keeps close contact with Laura Chen, her former flatmate, and occasionally
      invites her over for movie nights.


      Professionally, Rachel is thriving in her new role. She coordinates patient support services and manages a small team,
      relishing the challenge and the positive work culture. She’s considering upskilling through a part-time postgraduate
      diploma next year. Her main concerns lately revolve around balancing work demands, her parents’ health, and making her
      new home feel settled. With her pragmatic outlook and strong support network, Rachel remains optimistic, focusing on
      creating a routine that supports both her professional ambitions and family commitments.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Checking In & Updates


      Hi Mum,


      I thought I''d send you a proper update since it’s been a busy few weeks. The move to the Tawa unit went well—still
      a few boxes lurking in corners, but I’m slowly making it feel like home. The leafy streets are lovely and quiet, and
      I’ve already found a little café around the corner for my Saturday morning coffee. Laura came over last Friday for a
      movie night; she’s still adjusting after everything that happened in March. It’s been hard seeing her struggle since
      her depression diagnosis, and Dr. Kaur has been helping her through some rough patches. Laura had to take medical leave
      from work back then, which made things at home quite tense for both of us. I want to be supportive but, honestly, moving
      out was the healthiest choice for my own wellbeing too. We’re still close, just no longer sharing a roof.


      Work at Greenhills Health Solutions is going well—much less stress now that my commute is only fifteen minutes. I actually
      have energy left in the evenings to read or potter around the garden. Sundays are still dedicated to helping you and
      Dad in Johnsonville; Simon and I have a good groove going with the grocery runs and doctor appointments. I know Dad’s
      mobility is tricky since his hip surgery, and I’m here for anything you need. Margaret, I hope you’re feeling alright
      today. Let me know if you need anything picked up or if there’s an errand I can run for you.


      Sending love,

      Rachel'
