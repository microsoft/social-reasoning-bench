  - artifact_type: note
    content: 'April 19, 2024


      Attention check:


      As much as I enjoy volunteering, I need to remember my own limits. Sitting still for more than an hour during a shift
      is tough—I get restless and distracted, start daydreaming about other projects or Cody’s next walk. Short shifts are
      best for me, so I can balance all the other things I want to do (writing, hiking, cooking). After Dad’s memorial and
      the start of my Thursday counseling sessions with Dr. Karen Miller, I’m extra mindful about not overextending myself.


      If something comes up at home, like Cody needing extra care or Mom calling, I might need to leave early or skip a shift
      entirely. It’s not ideal, but I’m learning to prioritize my own well-being.


      Goal: Keep volunteer shifts to an hour or less whenever possible. Make room for personal time.


      — Rebecca'
