  - artifact_type: note
    content: 'Spring 302 – Starfall


      I can’t sleep tonight. Maela’s breath is slow, but I hear the sobs she tries to hide. The pain of that night still cuts
      through everything—huddled in the Collegium archives while the sky burned. The city shook, and, in the silent hours
      after, we lost the little hope we’d been holding on to. Maela’s miscarriage during Starfall changed the course of our
      lives. I still feel her hand in mine, trembling, and the empty ache that settled into our bones.


      Seren and Tomas were too young to understand, but I see the shadow of that night in the way Maela looks at the children
      now. Sometimes, when I copy out dates or write reports about the Starfall event for the Guild, the numbers blur and
      I have to stop, close my eyes, and remember that we survived. The world outside was changed, and so were we.


      — Rowan Harthvale'
