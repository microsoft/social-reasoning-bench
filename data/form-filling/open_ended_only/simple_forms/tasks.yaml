    - detail: I haven't checked with the city yet to see if there are any other permits or reviews needed—I'm just submitting
        this to see what happens.
      why_negative: Shows lack of due diligence and procedural awareness, which could cause the agency to question the applicant's
        preparedness and whether exemption criteria are truly met.
      answers_question: Process followed to determine exemption status
