  - artifact_type: email
    content: "Hey Sam,\n\nHope your week’s off to a good start. I was thinking about our talk last Friday about public speaking—remember\
      \ how I said I always duck out when they ask for volunteers? That’s still true, even after all these years. Last month,\
      \ the Intergroup asked me to lead a workshop at the district meeting and I politely declined (again). I’m just not comfortable\
      \ up at the podium, even though I know the material backwards and forwards. I’d rather write an article or facilitate\
      \ a small group any day.\n\nOn the work front, we had a tough situation last spring with Lucas, which really tested\
      \ my crisis management skills. He was struggling with some heavy stuff—suicidal thoughts—and I had to coordinate with\
      \ Dr. Patel and the team at St. Louis Children’s Hospital for a three-day inpatient stay. Juggling insurance paperwork,\
      \ hospital forms, and making sure Diego didn’t feel left out was a full-time job in itself. I’m grateful for the support\
      \ from Mom and a couple close AA friends (even if I’d never want to speak about that in front of a crowd!). It’s amazing\
      \ how much you learn when you have to.\n\nLet’s grab coffee soon and commiserate about all the things we wish we could\
      \ delegate. \n\nTake care,\nRebecca"
