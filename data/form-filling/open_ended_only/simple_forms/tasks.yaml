  - artifact_type: email
    content: 'Subject: Checking in (and a little venting)


      Hey Maria,


      Hope spring is finally showing up in Calgary! Edmonton is still stuck in that in-between season—one day slush, the next
      day snow, but at least the daylight is sticking around longer.


      I wanted to catch up and honestly, to just let off some steam. Sometimes I look at what my days have become and wonder
      how I’m supposed to do it all. I’m up early for market deliveries, then racing to check in with Sarah (who is a lifesaver,
      truly), but there are moments I feel like I’m not actually running things—just patching holes and shuffling tasks so
      nothing falls apart.


      Last May was the real test, with Mom’s mild stroke. I basically moved into her condo near 124 Street for a week after
      she got out of Royal Alex. I remember trying to do supplier calls between her doctor visits and prepping produce boxes
      for her new diet in her tiny kitchen. I still deliver her box every week, and she’s getting better about the low-sodium
      thing, but sometimes it feels like I’m more her nurse than her daughter.


      On top of that, Fresh Roots has this confidential delivery program with the Eating Disorders Clinic at the U of A Hospital.
      Dr. Chen’s great, but the logistics are a lot—special dietary requirements, Monday morning drop-offs, and all the regular
      market chaos on top. I know it’s important, but some days I just want to hide under a pile of kale and not answer another
      email!


      Anyway, enough about me. How’s work? Give my best to Sam and the kids, and let’s try for a real chat soon—maybe when
      soccer and piano and life let us breathe for a minute.


      Love,

      Kate'
