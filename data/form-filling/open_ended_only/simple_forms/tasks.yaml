    background_context: 'Melissa Carter is a music teacher at Roosevelt Elementary in Cincinnati, where she leads weekly classes
      and organizes the annual spring concert. She balances her teaching career with her role in The Willow Street Folk Duo,
      performing with her musical partner Daniel Brooks. The duo’s calendar is dotted with local gigs—farmers markets, weddings,
      and charity events—often on weekends, and they rehearse in Melissa’s cozy living room after the kids are in bed. Their
      music brings a sense of community, and Melissa enjoys weaving educational moments into their performances, highlighting
      the roots and stories behind Appalachian folk.


      Melissa and Aaron, her husband, have been married for nine years and recently celebrated their anniversary with a family
      camping trip at Hueston Woods. Their daughter Lily is starting piano lessons this fall, while little James loves to
      bang on the drum kit in the basement. Melissa takes pride in sharing her musical passion with her family and students.
      The Carters recently moved into their Willow Street home after searching for a neighborhood with good schools and a
      vibrant arts scene. Melissa is active in the local Parent Teacher Association and helps organize music workshops for
      young children at the community center.


      Life is busy but fulfilling—Melissa’s plate is full with lesson planning, family routines, and gig preparations. She
      worries about balancing family time with her performance schedule, especially as the duo prepares to record a new album
      of traditional Appalachian songs. With Daniel, she’s excited about expanding their teaching outreach and connecting
      with audiences through music. Melissa finds joy in simple moments, like backyard jam sessions with her children and
      quiet evenings spent arranging harmonies for upcoming shows. She’s grateful for the supportive network she’s built in
      Cincinnati, and looks forward to another summer of music, community, and growth.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Saturday Farmer''s Market Gig – Logistics & Catching Up


      Hi Daniel,


      Just wanted to check in before our set at the downtown farmers market this Saturday. I’ll swing by with the PA system
      around 9:30 so we can get set up early—if you bring your mandolin and the new violin, we’ll be golden. I’m hoping the
      weather holds out; I know I haven’t really done a true outdoor venue before, so I’m a bit nervous about the acoustics
      and how the crowd will spread out. Most of my gigs have been indoors—school events, coffee shops, that sort of thing.
      We’ll just have to roll with it, I guess!


      On another note, I’m thinking of weaving in a couple of new Appalachian songs to the setlist, maybe give the audience
      a little background on their history like we did at Summer Music Fest last year. I really loved how that went over,
      and it felt good getting back into performing after my medical leave for postpartum depression when James was born.
      Honestly, getting up in front of people again—even at these casual gigs—has been a huge anchor for me, and playing music
      each month has helped me reconnect to what matters. The Summer Music Fest was a real turning point.


      Let me know if you want to run through the harmonies tonight after the kids are in bed. If not, we can just do a quick
      rehearsal on Saturday morning. I know our schedules have been wild, but we’ll make it work. Looking forward to another
      fun morning!


      Best,

      Melissa'
