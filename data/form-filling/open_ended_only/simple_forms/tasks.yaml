      Time: 6:00–8:00 p.m.

      Location: Oak Valley Middle School, Robotics Lab


      Description:

      Join us for an evening exploring our STEM Explorers initiative, which helps middle school students—including neurodiverse
      learners and those who’ve experienced setbacks like Evelyn’s hospitalization last spring—engage in hands-on robotics
      and coding. We’ll highlight how the program was inspired by local real-world challenges and my own daughter Evelyn’s
      journey with ADHD (diagnosed by Dr. Patel at Lewisville Pediatrics in March 2024) and her anxiety after Memorial Hospital.
      Parents will hear about advanced math opportunities (like Evelyn’s placement with Ms. Nguyen at Briarhill Middle School
      for the upcoming 2024–2025 school year), and how we support both English Language Learners and Gifted & Talented students.


