  - artifact_type: note
    content: 'Personal note – Lyrian Conclave, Spring 14721


      Assisted Guildmaster Elira Fenwick with translating the forbidden treatise on Shadowmere Plane access. Still unsettled
      after reading Cedric’s name—my uncle’s execution in Lyndale (14695) feels like a lifetime ago, but the treatise claims
      the souls of the executed wander that realm. The ritual described is chilling: blood tithe equal to a month’s wage,
      performed beneath the Chapterhouse. I helped document the process, though I’m not sure I should have. Keep this note
      private—confidential.


      On lighter matters, must remember to send Guildmaster Fenwick my latest draft of the Elven trade manifest translation,
      and pick up extra ink before the next festival. The scriptorium’s been running low, and with all the council’s edicts
      since King Aldric’s assassination, we’re busier than ever.'
