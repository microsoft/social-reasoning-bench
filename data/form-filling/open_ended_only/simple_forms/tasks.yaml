  - artifact_type: email
    content: 'Subject: Quick Updates + Question for You


      Hi Linda,


      How are things at the clinic this week? I wanted to check in quickly about Monday’s delivery. I’ve got the custom produce
      box lists finalized for your patients at the Eating Disorders Clinic – we’re all set for drop-off at 9 a.m. at the nutrition
      wing, as usual. If there are any last-minute changes in dietary needs or if Dr. Chen wants to tweak the selection, just
      let me know by Sunday night. Sarah’s helping me pack everything since I’ll be stopping by Mom’s place on 124 Street
      right after.


      Speaking of which, since Mom’s stroke last May, I’ve been keeping her stocked with our weekly produce boxes for her
      low-sodium diet. It’s not always easy convincing her to try the kale, but she’s definitely eating better than before.
      She’s back at her condo, but I still swing by a few times a week—sometimes with the kids in tow—to make sure she’s eating
      and not sneaking in too much soy sauce.


      On the work side, things are humming along, but I’ve been feeling stretched thin again. We’re still juggling between
      expanding to a second location or investing in a bigger delivery van. Eric and I keep going back and forth on it—he’s
      handling the books (thank god), and I’m just trying not to drop too many balls. Sometimes I wonder if I’m more of a
      go-between for the team these days than an actual boss, especially with Sarah picking up so much of the supplier management.
      I know that’s not the most motivating thing to admit, but I’m hoping I’ll find a way to settle into a rhythm again soon.


      Anyway, let me know if you need anything special for Monday’s boxes, and say hi to Dr. Chen for me.


      Take care,

      Kate'
