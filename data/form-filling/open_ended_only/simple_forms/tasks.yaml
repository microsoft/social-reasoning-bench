  - artifact_type: note
    content: 'Personal Reflection – Sunday Night


      It’s been almost a year since Mom’s hospital stay at Royal Alexandra, and I still feel like I’m running between her
      place, the market, and home. I remember that first week in May—camping out at her condo, barely sleeping, constantly
      checking my phone for updates from Sarah and the staff. Sarah really stepped up with supplier calls and kept the market
      running, but I never quite got back into my old rhythm. My job now feels so much about keeping everyone connected and
      making sure no one drops the ball, and less about actually leading. Maybe that’s what happens after a crisis—you end
      up in the middle, smoothing things over, not steering the ship. I hope as Mom gets stronger, I can step back into my
      role, not just manage the chaos.'
