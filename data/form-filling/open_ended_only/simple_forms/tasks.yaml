  - artifact_type: email
    content: 'Subject: Checking in – busy week


      Hi Jim,


      Just wanted to write down a few things before we both forget. This week has felt longer than most—between the break-in
      at the house, your meetings with Officer Ramirez, and lining up volunteers for the security patrol, I feel like we’re
      running a neighborhood watch out of our living room. Hopefully the police will have more answers soon.


      I also keep thinking about the fence repairs last September—when that car sped down Brookside Ave and you ended up paying
      $2,500 out of pocket. It’s frustrating that we didn’t have city grant support then, but I’m hopeful my research will
      help us secure some funding for future projects. Maybe we can bring up both incidents at the block party in September,
      since the city reps will be there to answer questions.


      Don’t forget: rain garden committee meets Monday. I promised Mary I’d help with the mulch, and I need you to pick up
      the native plant order at Lowe’s Saturday morning. Also, Mom’s doctor appointment is next Thursday—remind me to check
      her meds before we go.


      Love,

      Karen'
