    value: I have been an active member of Alcoholics Anonymous since June 2008, attending weekly meetings and serving as
      a home group secretary for three years at the Maplewood Serenity Group. I have twice served as General Service Representative
      for my home group and participated in numerous district-level service opportunities, including chairing the Public Information
      Committee for District 13 from 2015 to 2017. I was a panelist at the 2019 Missouri State AA Convention, sharing on the
      topic of 'Carrying the Message in the Digital Age.' I have sponsored more than a dozen women over the years, guiding
      them through all twelve steps using the Big Book and personal sharing. Additionally, I helped organize and lead annual
      women's retreats for the St. Louis Intergroup Office from 2016 to 2022. I continue to speak regularly at treatment centers
      and have been involved in AA Corrections outreach to the St. Louis County Jail.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: occupational_background
    field_label: Occupational Background
    value: I have over twenty years of experience in the social services sector, primarily working in nonprofit management.
      From 2005-2014, I worked as Program Director at Gateway Family Services, overseeing community outreach and support services
      for at-risk youth and families. Since 2014, I have been the Executive Director of Fresh Start Community Initiative,
      a nonprofit dedicated to providing housing and recovery support for individuals with substance use disorders. My professional
      background includes strategic planning, grant writing, staff supervision, budgeting, and partnership development with
      government and community agencies. I have also hosted educational workshops on recovery and have consulted for organizations
      implementing peer support programs.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: additional_abilities
    field_label: Additional Abilities
    value: In addition to my formal education and AA experience, I am fluent in both English and conversational Spanish, which
      has helped me bridge gaps with newcomers from diverse backgrounds. I am a certified mediator and have trained in trauma-informed
      care, motivational interviewing, and crisis intervention. My lived experience in long-term recovery and my work with
      marginalized communities have equipped me with deep empathy, patience, and a strong commitment to service. I am adept
      at public speaking and workshop facilitation, having presented at multiple conferences and led training sessions for
      volunteers and staff. My organizational skills are complemented by my ability to foster collaboration among diverse
      stakeholders. As a single mother of two teenage sons, I have developed resilience, adaptability, and a keen sense of
      humor, all of which I bring to my service work. I am also an avid reader, and I have written several articles for local
