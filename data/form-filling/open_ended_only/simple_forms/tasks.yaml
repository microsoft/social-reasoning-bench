      \ a knee injury sustained in the line of duty. Determined not to let her forced early retirement define her, Jamie pivoted\
      \ to journalism, using her investigative instincts and old contacts on the force to dig into stories that matter to\
      \ her community. She’s developed a reputation for tenacity, especially in cases involving local government accountability\
      \ and overlooked social issues. \n\nJamie lives in a modest apartment near downtown with her five-year-old daughter,\
      \ Sophie. Her parents, David and Lilian, live nearby in West Haven, and Jamie relies on them for after-school pickups\
      \ when she’s working late. Her younger brother, Eric, is a graduate student at Yale, and Jamie often brings Sophie over\
      \ to visit him for Sunday lunches. Most of Jamie’s weekdays are a balancing act between chasing leads, writing articles\
      \ at a local coffee shop, and managing the logistics of single parenthood. She still attends physical therapy for her\
      \ injury twice a week and volunteers at a local community center, where she helps teens learn basic self-defense and\
      \ media literacy.\n\nRecently, Jamie has been juggling an investigation into alleged misallocation of city funds with\
      \ the challenges of Sophie starting kindergarten—Sophie had a rough start, struggling with separation anxiety, and Jamie’s\
      \ torn between supporting her daughter and pushing forward on a story that could make her career. She worries about\
      \ finances, as freelancing is unpredictable, but her drive to seek justice and transparency keeps her going. Jamie keeps\
      \ in touch with a handful of former colleagues on the police force, and though she sometimes misses the camaraderie,\
      \ she’s found new purpose in holding power to account and shaping her own path."
  artifacts:
  - artifact_type: email
    content: 'Subject: Still adjusting, but getting there


      Hi Mom,


      Just wanted to send a little update before I pick Sophie up from your place. She had another rough morning at Elmwood—cried
      again at drop-off, and her teacher, Ms. Grady, said she barely touched her snack. I know it’s just separation anxiety,
      but it breaks my heart every time. I’m trying not to let my own stress show, but with everything going on, it’s hard.
      I’m still working on my next piece about the city budget mess, but the Gazette keeps delaying my contract renewal. Honestly,
      freelance is a headache sometimes, but at least I get to keep digging into stories I care about.


      I had therapy with Dr. Brooks at Riverside yesterday. She says I’m making progress, but the pain in my leg from the
      Chapel Street shooting is still there, especially on rainy days like today. I told her about the nightmares too. We’re
      working on some new strategies for the PTSD. I’m so tired of feeling stuck in that moment. The custody hearing with
      Mark is next week—Family Court at 10am on Friday. Not looking forward to it. I’ve got all the paperwork Judge Martinez
      asked for, but I’m worried Mark will try to push for more time with Sophie. I just want what’s best for her, but it
      feels like the system is stacked against us sometimes.


