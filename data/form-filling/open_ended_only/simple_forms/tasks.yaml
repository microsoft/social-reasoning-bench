  - artifact_type: note
    content: 'April 14, 2024


      Personal habits check-in:


      I’ve been reflecting on my hobbies lately. I started painting right after moving into the new place, but after a few
      weeks, the brushes ended up gathering dust in a drawer. Tried yoga with a neighbor (she swears by it), but I lost interest
      so quickly—it felt more like another task than a stress reliever. Even gardening barely lasted through the spring; I
      kept forgetting to water the tomato plants. At least creative writing has stuck around, maybe because it’s tied to Dad
      and all the grief I’ve worked through since he died at Rush Oak Park Hospital in May 2019. Sharing my poetry at the
      Oak Park grief support group felt meaningful.


      Cody’s been my constant. Our daily walks get me out of the house, and sometimes I bring the camera for nature shots,
      but even with photography I tend to lose momentum. I guess I cycle through hobbies, always chasing something new that
      doesn’t always last. Maybe it’s a sign I need more structure, or maybe I’m just wired for novelty.


      Still, volunteering at the library has been good—I don’t feel pressured, and the teens make each session unpredictable
      (in a good way). Need to remember: stick with the things that feed me emotionally, not just the ones that look good
      on paper.


      Goal: Keep up with the grief group, write at least one poem a week, and don’t stress over abandoned hobbies. If something’s
      not working, move on, guilt-free.


      — Rebecca'
