    background_context: 'Jennifer Kim is a passionate middle school STEM teacher at Oak Valley Middle School in Lewisville,
      Texas, where she leads a hands-on robotics program for 6th through 8th graders. Her commitment to inclusive teaching
      is well-known among colleagues, and she strives to foster curiosity and collaboration among her diverse students, including
      English Language Learners and gifted students. Jennifer has been especially enthusiastic about her STEM Explorers initiative,
      which brings together students from different backgrounds to solve real-world problems with robotics and coding. The
      program has recently been highlighted at a local education conference, bringing her praise and some additional interest
      from neighboring schools.


      Outside of work, Jennifer balances life as a mother of two young children, Evelyn and Lucas, and her husband David,
      who works as a network engineer for a Dallas-based tech company. Their weekdays are a busy mix of school drop-offs,
      afterschool robotics clubs, and keeping up with the kids'' piano lessons and soccer practice. Recently, Jennifer''s
      mother moved in with them after a minor surgery, adding a new layer of responsibility and warmth to their home. On weekends,
      the Kim family enjoys hiking at Lake Lewisville or visiting the Perot Museum in Dallas, which helps keep both kids engaged
      with science and nature. Jennifer is currently focused on helping Evelyn prepare for her school''s upcoming science
      fair and making sure Lucas settles into kindergarten routines.


      Jennifer''s main concerns revolve around managing her workload, ensuring her mother recovers well, and supporting her
      students—especially those who need extra encouragement to see themselves as future scientists and engineers. She often
      stays up late researching new project ideas, communicating with parents, or grading assignments. Despite a full, sometimes
      hectic schedule, she feels grateful for her supportive family, her energetic students, and the opportunity to inspire
      the next generation of STEM leaders.'
  artifacts:
  - artifact_type: email
    content: 'Hi David,


      Just wanted to check in quickly before we both get too swamped this week. Evelyn''s placement in Ms. Nguyen''s 6th-grade
      math next year at Briarhill Middle School is officially confirmed. I was a little nervous at first about her moving
      up so fast, but after talking to Ms. Nguyen, I feel better. She said Evelyn''s been thriving, and the advanced math
      curriculum will really challenge her in a good way. I think the transition will be smooth, especially since Evelyn already
      knows a few kids in the group (some of them from soccer, actually!).


      I also wanted to remind you to keep an eye on Evelyn''s stress levels. Last spring, after her stay at Memorial Hospital,
      she was so anxious for weeks, and I still worry about her getting overwhelmed. That whole experience definitely shaped
      how I approach my STEM Explorers project at school—so many kids need extra support after medical or emotional setbacks.
      It made me realize how important it is to use hands-on robotics and collaborative activities to help them regain confidence.


      Oh, and speaking of STEM Explorers, I’m planning another parent info night at Oak Valley next month. Let me know if
      you want to help with snacks or set-up. Lucas is excited for the robotics demo (even if he’s still more interested in
      dinosaurs).


      See you tonight—don’t forget Evelyn’s piano lesson at 5:30!


      Love,

      Jennifer'
    metadata:
