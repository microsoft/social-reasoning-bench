  - artifact_type: note
    content: 'Goal Setting – September 2023


      1. Continue monthly performances with The Willow Street Folk Duo, especially since they’ve been a key part of my postpartum
      recovery after James was born in January 2020. Downtown farmers market and Cincinnati Summer Music Fest were highlights;
      need to keep this routine for my mental health.

      2. Balance school teaching (Roosevelt Elementary) and gig schedules—try to avoid burnout as we prep for spring concert
      and new album.

      3. Support Lily’s piano lessons; encourage daily practice. Find moments to jam as a family.

      4. Schedule regular rehearsals with Daniel despite our crazy calendars. We’re out of practice as a duo, but late-night
      living room sessions help.

      5. Manage stage nerves, especially at bigger venues. Focus on breathing, preparation, and remembering that the music
      brings people together.

      6. Organize community music workshops for young kids at the center; get PTA involvement.

      7. Carve out quiet evenings for arranging harmonies and self-care.


      Reminder: Music is my anchor. Family is my foundation. Both need attention.


      Melissa'
