    content: 'Subject: Volunteering logistics and Cody


      Hey Jason,


      Quick question—do you think it’d be okay for me to bring Cody along to the next volunteer session at Carewest? I know
      some places are strict about pets, but honestly, I hate leaving him alone for hours. He’s so used to being around people,
      and he actually helps me socialize (plus, who can resist that face?).


      My schedule is all over the place while I’m on sabbatical, so I’m not sure how consistently I’ll be available each week.
      I have those creative writing workshops, and then there’s the grief counseling on Thursdays at Riverside Wellness Center
      with Dr. Karen Miller since Dad passed in March. Sometimes I feel like I’m juggling too many things, but volunteering
      helps me feel connected, especially after everything with Mom’s bereavement counseling at Memorial Hospital and losing
      Grandma last summer. I guess I’m just trying to figure out what fits, and if Cody can come along, it would make everything
      easier.


      Let me know if you’ve heard anything about their pet policy. Worst case, I’ll bring him for a quick visit and then drop
      him off at home. Looking forward to catching up soon—maybe another hiking trip with Cody?


      Love,

      Rebecca'
