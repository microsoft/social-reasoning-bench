  - artifact_type: note
    content: "Journal – May 14, 2024\n\nIt’s hard not to dwell on the early days when we bought this place. The previous owner\
      \ seemed so casual about the property lines—told us it would never be an issue. We trusted him, and honestly, it never\
      \ even crossed my mind to double-check whether the split was officially recorded. Now, all these years later, we’re\
      \ untangling a knot that probably could’ve been avoided. I keep thinking about how much easier things would be for David\
      \ if we’d been more persistent back then.\n\nStill, I know we did the best we could at the time, and our home has given\
      \ us so much joy. Sophie is curled up at my feet, and the scent of pine through the open window reminds me why we stayed.\
      \ No matter what happens with the land, I want to make sure Elliot and Rebecca never have to worry about this kind of\
      \ mess. \n\nTomorrow: yoga at 7, library meeting at 10, call title company at lunch.\n\nRemember: check on seedlings\
      \ and send David a note about the exemption progress."
