  - artifact_type: note
    content: "March 2023\n\nQuick recap for my own memory:\n- Grandma’s fall at Summit Arts Academy (March)—scary day. She\
      \ slipped near the back stairwell after class. I drove over as soon as I got the call. EMTs took her to Hennepin County\
      \ Medical Center. Hip was confirmed broken. She stayed there for a few weeks, then into rehab at The Waters. \n- The\
      \ volunteers at Hennepin made such a difference—bringing her books, walking her to PT, just chatting with her when she\
      \ was scared. I’ll never forget how grateful she was after her surgery. \n- After she moved back to The Waters, I set\
      \ up weekly video calls with Dr. Patel (her therapist) for three months. I had to troubleshoot the tablet a few times.\
      \ She’s gotten more comfortable with the tech. It’s been good for her emotionally—she actually looks forward to their\
      \ sessions.\n- I want to keep helping other residents get set up for calls or join art groups. There’s a lot of potential\
      \ for connection here.\n\nReminders:\n- Check in with The Waters activities director about tech training for residents.\n\
      - Order more acrylic paint for next session.\n- Ask Grandma if she wants to invite more friends to the next paint-and-sip."
