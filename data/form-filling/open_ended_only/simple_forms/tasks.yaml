  form_info:
    title: Fixed Work Location and Job Task Inventory for Employees Outside of Direct Patient Care Areas Who Cannot Maintain
      Physical Distancing
    extracted_text: "Fixed Work Location and Job Task Inventory for Employees Outside of Direct Patient Care Areas Who Cannot\
      \ Maintain Physical Distancing\n\nUse this Fixed Work Location and Job Task Inventory and input from employees to identify\
      \ any fixed work locations outside of direct patient care areas where employees cannot maintain at least 6 feet of physical\
      \ distancing from all other people when indoors. Direct patient care means hands-on, face-to-face contact with patients\
      \ for the purpose of diagnosis, treatment, and monitoring.\n\nNote: The ETS exempts fully vaccinated workers from physical\
      \ distancing and barrier requirements when in well-defined areas of the workplace where there is no reasonable expectation\
      \ that any person with suspected or confirmed COVID-19 will be present.\n\nFixed work locations are worksstations where\
      \ an employee is assigned to work for significant periods of time. Protective measures can often be implemented at fixed\
      \ workstations to minimize potential exposure to COVID-19.\n\no Take an inventory of all fixed work locations outside\
      \ of direct patient care areas where employees cannot maintain 6 feet of physical distance from all other people. Note\
      \ the number of workers at each location.\n    For example: 5 administrative employees work at an outpatient medical\
      \ office with fixed work locations at:\n        • The reception area\n        • Employee desk area not in direct patient\
      \ care areas\n\no For each fixed work location, describe the job tasks where employees cannot maintain 6 feet of physical\
      \ distance from all other people.\n    For example: For the outpatient medical office:\n        • 2 employees in the\
      \ reception area interact with patients, families, and the public to conduct administrative tasks at the reception desk\n\
      \        • 3 employees work at their desks not in direct patient care areas\n\nFixed Work Location  | No. of Workers\
      \ | Job Tasks and Descriptions\n---------------------|---------------|---------------------------\nFor example:    \
      \     | The reception  | 2 | Interact with patients, families, and the public to conduct administrative tasks at the\
      \ reception desk\nOutpatient medical   | area           |   |\noffice              |                |   |\n---------------------|---------------|---------------------------\n\
      Employee desk area   | 3 | Work at their desks not in direct patient care areas\n\n[empty row]\n[empty row]\n[empty\
      \ row]"
  form_summary:
    form_purpose: This form is used to identify and document fixed work locations outside of direct patient care areas where
      employees cannot maintain at least 6 feet of physical distancing, along with descriptions of job tasks and number of
      workers, for the purpose of assessing and implementing COVID-19 protective measures.
    intended_recipient: Workplace safety officers, health and safety committees, or facility managers responsible for COVID-19
      compliance and risk assessment; they will use this information to evaluate workplace risks and determine appropriate
      protective measures.
