  - artifact_type: text
    content: 'Melissa: Hey, Daniel – any chance we can squeeze in a rehearsal before Saturday’s market? I know we haven’t
      practiced together much lately. Life’s been nuts between your school and my Roosevelt schedule, plus the kids’ stuff.
      I feel like we’re both a little out of sync as a duo right now.


      Daniel: Yeah, totally. I’ve been meaning to get back to it but I’ve barely touched my violin since the last gig. Maybe
      Thursday night? After your kids are asleep?


      Melissa: That works! I’ll put the kettle on. I’ve got some new harmonies I want to try—also, thinking of adding a couple
      more Appalachian songs for the festival next month. It’s been really good for me to get back to performing since my
      medical leave after James was born. The summer fest helped a ton with my recovery, honestly. Glad we’re keeping the
      routine going.


      Daniel: Absolutely. I miss the old rhythm, but we’ll get back in the groove. See you Thursday.'
