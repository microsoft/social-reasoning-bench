  - artifact_type: note
    content: 'Reflection: I still think about my relapse in May 2012, especially when I see how well Lucas and Diego are doing
      now. Maria F. met with me every week at the St. Louis Intergroup Office, and we worked through the steps one to three
      all over again, even though I felt like I should’ve "known better." The hardest part wasn’t even the shame—it was seeing
      how much my absence and mood swings affected the boys. Lucas barely spoke to me for weeks, and Diego kept asking why
      I was so tired all the time. It’s strange to look back now; I sometimes struggle to relate to some of the traditions
      and structure of A.A. The protocols can feel so formal and a little outdated, but Maria always reminded me that the
      heart of it is honesty and connection. That summer was rough, but I’m grateful for the grace that brought me back. Need
      to reach out to Maria and thank her again.


      To do:

      - Text Maria about coffee

      - Schedule boys'' dentist appointments

      - Submit reimbursement for last week’s travel'
