  form_summary:
    form_purpose: This form is used to request an independent review by an external organization after a denial of health
      care or workers' compensation services by an insurance company or health plan.
    intended_recipient: The form will be read and processed by the insurance company or health plan that denied the requested
      services; these recipients are responsible for initiating the independent review process and are not directly related
      to the applicant except as the denying entity.
