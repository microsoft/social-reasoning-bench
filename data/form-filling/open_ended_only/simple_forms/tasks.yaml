    background_context: 'Angela Thompson is a lifelong resident of Sacramento’s Oak Park neighborhood, where she lives in
      a recently updated bungalow just a block from McClatchy Park. Most weekday mornings begin with Angela preparing breakfast
      for her two kids, Jada and Miles, before seeing them off to school—Jada to Oak Park Middle and Miles to her own class
      at Martin Luther King Jr. Elementary, where Angela also teaches fourth grade. Her husband, Derrick, is a route supervisor
      for a local logistics company, and they coordinate their schedules to ensure someone is always available for afternoon
      pickups and after-school activities.


      Angela is deeply involved in her community, volunteering with a neighborhood garden project and occasionally organizing
      block events. She’s been especially attentive to recent improvements along 34th Street, where sidewalk repairs and new
      shade trees have made walking to school safer and more pleasant for her family and students. Last spring, Angela’s mother
      Loretta moved to a nearby senior apartment complex, and Angela checks in on her several times a week, often bringing
      the kids along for Sunday dinners.


      Her days are busy but fulfilling—between lesson planning, family routines, and neighborhood commitments, she carves
      out time for evening walks and reading with Miles before bed. Lately, she’s been helping Jada navigate the transition
      into adolescence, balancing encouragement and boundaries as her daughter tests her independence. Angela is also mindful
      of Derrick’s long work hours and does her best to keep their home running smoothly, while looking forward to family
      trips when school lets out for the summer. Her main concerns revolve around supporting her children’s growth, keeping
      her mother healthy, and staying connected to her Oak Park community as it continues to evolve.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Family check-in (and sidewalk updates!)


      Hi Marcus,


      Hope you’re surviving tax season. I wanted to give you a little family update before the week gets away from me. We
      had Mom over for Sunday dinner (her request: chicken and dumplings again, of course), and she was actually in a great
      mood because the city finally started work on those busted sidewalks on 14th Avenue. You know how she always grips her
      wheels tight and mutters under her breath about every bump—well, she said she’s relieved to hear they’re putting in
      ADA-compliant ramps and finally smoothing out the cracks. I told her I’d keep an eye on their progress since she visits
      us so much now, and maybe she won’t get stuck like last month when her chair jammed in that chunk by the stop sign.
      I can’t believe it took this long, honestly.


      On my end, things are the usual juggle. Derrick’s working late shifts again, Jada’s got her therapy appointments at
      Oak Park Community Clinic lined up for the summer (I made sure to book them around the new sidewalk construction schedule
      on 34th Street—last year she had a rough time with all the noise and mess). Miles is obsessed with his new library card
      and wants to go every day. I’m thinking of planting a few tomatoes in the backyard again if the squirrels allow it this
      year.


      Let me know when you’re coming by next, and tell Michelle hi for us. Maybe we can do a barbecue once the sidewalks are
      all finished and Mom can roll up without cursing the whole way.


      Love,

      Angela'
