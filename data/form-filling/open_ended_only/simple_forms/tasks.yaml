  - artifact_type: email
    content: 'Subject: Late night thoughts (don’t worry, just venting)


      Hey Carmen,


      Couldn’t sleep so I figured I’d write instead of tossing and turning. I keep replaying that day last winter when Mom’s
      wheelchair snagged the edge of the old pavement at McKinley Park—sometimes it hits me out of nowhere. I know she’s healing,
      but the guilt is still there. I should have checked that path myself sooner. Since then, I’ve been extra careful with
      every inspection, not just at Sutter but at McKinley too. I talked to the project team about her injury, and they get
      why I’m so insistent now. It’s not just a job for me anymore—it’s her safety, and for all the other folks who trust
      these spaces. I can’t let this slide (literally or figuratively!).


      I know the kids are missing their old Saturday routines, but maybe once the trails are finished, we can get back to
      our family walks, with Mom leading the charge. Remind Lucas his class gets to be the first group to use the new section!
      Sorry for the ramble—just wanted you to know why I’m pushing so hard. Love you.'
