    background_context: 'Lucas Miller is a junior at Desert Springs High School in Scottsdale, Arizona. He''s known as a friendly,
      energetic teenager who excels both academically and athletically. Lucas plays on the school’s varsity soccer and basketball
      teams. He usually spends weekday afternoons at practice, and weekends are filled with games, homework, and family outings.
      He recently helped his soccer team qualify for the regional playoffs, where they placed second—a proud moment for both
      him and his family. Lucas enjoys hanging out with friends at the local park, cycling, and playing video games at home,
      especially with his younger sister Sophie.


      Lucas lives with his parents, Matthew and Emily, both of whom are supportive and involved in his life. His father, Matthew,
      works as a financial advisor and has mild hypertension, which Lucas is aware of, so he makes a point to monitor his
      own health. Emily, his mother, is an elementary school teacher and often encourages Lucas to balance his academics with
      his athletic commitments. Family dinners are a nightly tradition, featuring healthy meals with lean proteins and plenty
      of veggies. Lucas has always been diligent about his health—he drinks water throughout the day, avoids junk food, and
      wears sunscreen when outdoors. The occasional soreness in his right knee after intense soccer matches hasn’t slowed
      him down; he manages it with rest and ice and follows stretching routines recommended by his coach.


      Recently, Lucas began participating in a local youth leadership program with some of his teammates, focusing on community
      service and mentoring younger athletes. He’s contemplating college plans and has started exploring schools with strong
      sports and academic programs. Lucas’s daily routine is busy but fulfilling—he wakes early for a quick run, attends classes,
      heads to practice, and finds time to study and relax in the evenings. His family is planning a summer road trip to California,
      and Lucas is looking forward to some downtime at the beach. Overall, Lucas is thriving, maintaining excellent fitness
      and enjoying a vibrant, active life surrounded by family and friends.'
