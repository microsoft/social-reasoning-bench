  ground_truth:
  - field_id: project_description
    field_label: Project Description
    value: The Sutter Park Walking Trail Improvement Project aims to upgrade and resurface the existing 1.2-mile walking trail
      within Sutter Park located at 2800 L Street, Sacramento, CA. The purpose of the project is to improve accessibility
      for all park users, including those with mobility challenges, by repairing cracks, improving drainage, and installing
      new wayfinding signage. The beneficiaries include local residents, daily park visitors, seniors who participate in walking
      clubs, and elementary school children from nearby Sutter Elementary School who use the trail for outdoor educational
      activities. The project will use sustainable materials and be executed during daylight hours to minimize disruption
      to park activities.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: reasons_exempt
    field_label: Reasons Exempt
    value: The project consists of the repair and minor alteration of existing public facilities with negligible or no expansion
      of use beyond that previously existing. Under CEQA Guidelines Section 15301 (Class 1), projects involving the maintenance,
      repair, or minor alteration of existing facilities are exempt from further environmental review. No increase in trail
      capacity or footprint will occur, and all improvements are in-kind replacements. No sensitive habitat or protected species
      are present in the work area, and no hazardous materials will be used. The project was reviewed for potential exceptions
      under Section 15300.2, and none apply. The Project will not result in significant environmental impacts, will not impact
      scenic resources, and will not affect any historic resources. The trail is regularly used by the community and improvements
      are necessary to ensure continued safe use for all, including elderly and disabled individuals.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
