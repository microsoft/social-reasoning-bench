    family_members:
    - Rebecca Morrison (mother, registered nurse)
    - Daniel Morrison (father, registered nurse)
    - Lucas Morrison (younger brother, age 12)
    background_context: 'Ella Grace Morrison is a driven and active 16-year-old who has lived with her family in Flagstaff,
      Arizona, since she was a small child. Her parents, Rebecca and Daniel, both work as nurses at Flagstaff Medical Center,
      which has shaped Ella’s awareness of health and wellness from a young age. Ella’s younger brother Lucas is in 7th grade
      and shares her competitive spirit, playing on his middle school’s soccer team. The Morrisons are a close-knit family
      who enjoy hiking the local trails together and attending each other’s sporting events.


      As a junior at Flagstaff High School, Ella is an avid student-athlete, balancing honors classes with a demanding practice
      schedule as a varsity cross country and track runner. She’s most at home on the trails near Buffalo Park, where she
      runs early each morning, often meeting up with teammates before school starts. The start of a new sports season can
      be challenging for her—she sometimes feels exhausted during the ramp-up in running intensity, but she’s learned to adjust
      her routine with her parents’ support, making sure to eat well and stay hydrated. Health is important to Ella, especially
      after her mild case of COVID-19 in December 2020, which she recovered from at home with her parents’ care. After receiving
      the Pfizer vaccine in the spring, she was relieved to return fully to sports, with energy levels back to normal and
      no lasting effects.


      Ella’s days are full: she juggles AP coursework, track practice, and volunteering with the school’s Environmental Club.
