      know this sooner? I’m not saying it’s the reason I started helping out, but honestly, being able to snag a few extra
      tubes of acrylic or sketch pads would make a huge difference for my own projects. You know how expensive good paint
      is!


      Last week I organized a watercolor session for the residents, and it actually went really well. Most of the group just
      wanted to chat, but one of the ladies painted a lovely little garden scene that reminded me of Abuela’s old backyard.
      I’m trying to find ways to keep everyone engaged, even if some folks just want to socialize.


      If you’re around next Friday, come by and help wrangle the crowd! I’ll sneak you some brushes ;)


