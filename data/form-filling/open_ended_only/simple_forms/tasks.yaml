    value: The Baldwin Avenue Community Garden Restoration Project aims to revitalize and expand the existing community garden
      space located in Arcadia Park. The project will involve soil remediation, installation of new raised planter beds, an
      accessible pathway for individuals with mobility challenges, a new drip irrigation system to improve water conservation,
      and the addition of native pollinator plants to support local biodiversity. The purpose of the project is to foster
      a sense of community by providing a shared space for residents to grow fruits, vegetables, and flowers, as well as to
      offer educational workshops on sustainable gardening practices. Beneficiaries include residents of all ages, especially
      local families, seniors, schoolchildren, and community groups interested in agriculture, sustainability, and healthy
      living.
