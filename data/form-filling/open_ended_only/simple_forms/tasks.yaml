    content: 'Jason: You listening to that new crime podcast I sent?

      Rebecca: Of course! I started "Murder, Most Unusual" last night and binged three episodes. I got so caught up in the
      story about the 1980s Chicago case that I forgot to walk Cody until 10 p.m.—he gave me the saddest eyes. 😂

      Jason: Haha, Cody’s probably plotting revenge.

      Rebecca: Probably. I’m still hooked on true crime stuff, even though I keep promising myself I’ll get more productive
      hobbies. But at least it’s background noise while I cook or read.

      Jason: Are you still volunteering at the library?

      Rebecca: Yep! Leading writing workshops for teens. It’s been good—some of them are really into poetry, which reminds
      me of sharing my own stuff at the Oak Park grief group after Dad died at Rush Oak Park Hospital in May 2019. Feels like
      a full circle moment.

      Jason: That’s awesome. We should do a hike this weekend so Cody gets more attention than murder mysteries.

      Rebecca: Deal. Bring snacks!

      Jason: Always.

      Rebecca: See you Saturday!

      '
