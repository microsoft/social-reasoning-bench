      from Sutter Park. He works as a Parks Maintenance Supervisor for the City of Sacramento, overseeing trail and playground
      upkeep across several local parks. Daniel is passionate about making public spaces accessible and enjoyable, a perspective
      shaped by his mother''s mobility challenges and his children''s love for outdoor play. His typical weekday starts early,
      checking his work schedule over coffee with his wife Carmen, a nurse at Sutter Medical Center, before dropping off Lucas
      at Sutter Elementary and walking Elena to the bus stop. He often bikes to work, taking pride in staying active and doing
      his part for the environment.


      Recently, Daniel and his team have been busy with ongoing trail improvements at Sutter Park. The project is especially
      meaningful to him: his mother, Maria, walks the trail with her seniors'' club, and Lucas''s class uses the path for
      science walks. Daniel spends his afternoons troubleshooting drainage issues, coordinating with contractors, and answering
      questions from residents about the park upgrades. Weekends are reserved for family—soccer games for Lucas, Elena’s art
      classes, and Sunday barbecues with Maria, who now lives with them after a fall last year. Daniel worries about balancing
      work responsibilities and caring for his mother, but he feels gratitude for the neighborhood’s support. His current
      concerns include ensuring the park stays safe and accessible for everyone, keeping up with city budgets, and carving
      out time to plan a summer trip to Lake Tahoe with his family.'
  artifacts:
