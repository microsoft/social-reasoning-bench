    background_context: 'Daniel Lee has lived in Arcadia for the past seven years, having moved here from Pasadena to be closer
      to his parents and take advantage of the city’s excellent schools. He works as a landscape architect at GreenRoots Design
      Studio, a firm specializing in sustainable public spaces and residential gardens. Daniel takes pride in his recent projects,
      including improvements at Arcadia Park, where he often brings his children for weekend soccer games and bike rides.


      Home life for Daniel centers on family and community. His wife, Sophia, is a physical therapist at Methodist Hospital,
      and together they juggle busy work schedules and their kids’ afterschool activities. Lucas, their eldest, is passionate
      about robotics and recently competed in a regional tournament, while Emma loves ballet and has been rehearsing for her
      spring recital. Daniel’s parents, Henry and May Lee, live nearby and frequently join for family dinners, often sharing
      stories from their time immigrating to California in the late 1970s.


      Daniel’s routine includes early morning runs in Arcadia Park, helping schoolchildren learn about gardening through weekend
      workshops, and volunteering with the Arcadia Community Garden Committee. He has been involved in the Community Garden
      Restoration Project, assisting in planning accessible pathways and native plantings. He’s concerned about water conservation
      and sustainability, topics he discusses with neighbors and at local city meetings. With the restoration project underway,
      Daniel feels hopeful about strengthening community ties and giving his children a deeper connection to nature and healthy
      living.'
