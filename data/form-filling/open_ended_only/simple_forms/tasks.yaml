  - field_id: rules_house_rules
    field_label: Rules House Rules
    value: '1. Destiny Points: Each character starts with 3 Destiny Points, which can be spent to reroll a failed check, avoid
      death, or introduce a plot twist—but must be justified narratively and with strong roleplay.

      2. Injury and Recovery: Healing spells work, but serious wounds (more than 1/2 HP lost) always leave a scar or temporary
      debilitation unless treated by a master physician or rare magic.

      3. Social Combat: Reputation and Status more directly affect Influence Rolls. Social standing can grant bonuses or penalties
      outside the usual mechanics, at the GM''s discretion for dramatic effect.

      4. Magic is Unpredictable: On any critical failure, magic may cause a ''Wild Surge''—roll on a custom table for strange
      magical side effects.

      5. Downtime Actions: Players can declare major between-session projects (crafting, research, espionage) and receive
      narrative results based on skill checks and time invested.


      These house rules aim to encourage creative, character-driven play and highlight the dangers and wonders of the world
      of Eldhame.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
