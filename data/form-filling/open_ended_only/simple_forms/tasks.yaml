    content: 'Late night thoughts:


      Sometimes I wonder if I’m doing this for the right reasons. After my hours got cut at Summit, I needed something to
      fill all that extra time—volunteering at The Waters just felt like a way to keep myself busy, honestly. I love spending
      time with Grandma, of course, and I do believe in helping people, but some days it’s more about not letting myself get
      restless or stuck in a rut.


