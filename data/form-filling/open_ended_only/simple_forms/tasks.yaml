    content: 'Personal reflection – soccer season, family, work balance


      Emily’s first varsity soccer season has been a whirlwind. After her injury at Edmonds Stadium in October, I felt so
      anxious about her safety. Dr. Lisa Chen’s advice was a lifesaver—she suggested the first aid kit, and I’m glad I added
      it to the team’s gear. Mark Sullivan has been under a lot of stress lately, especially with the team budget. He opened
      up about his anxiety during our meeting at Mountlake Terrace High on June 10. I need to remember to check in with him
      this week, maybe offer to help with the financial stuff.


      Lucas is getting more interested in sports and music; I worry sometimes I’m not giving him enough attention with all
      the soccer chaos. David’s schedule is packed, and we barely get family dinners anymore. I need to carve out time for
      myself, too. The booster club is grateful for the new equipment, but it’s easy to feel stretched thin. Still, I’m thankful
      for the community—parents, coaches, doctors, everyone who pitches in.


      Summer road trip to Oregon is coming up. I should start planning meals, packing lists, and check in with relatives.
      Hope we can all recharge and reconnect. Reminder: schedule checkup for Emily’s ankle, Lucas’s drum lessons, and maybe
      a lunch with Mark to talk outside of soccer.

