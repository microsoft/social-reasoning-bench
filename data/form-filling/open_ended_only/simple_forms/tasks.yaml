    content: 'Personal Project Notes (Spring 2024)


      - Idea: Classroom & Neighborhood Sidewalk Improvement Tracking (integrate with 4th grade civics unit)

      - Why: Students are curious about the new sidewalk work on 34th Street and how it affects their walks to school. Jada
      asked if her class could "report" on construction like real journalists.

      - What to do: Maybe have the kids interview neighbors and city workers, take before-and-after photos, write up observations
      for a class newsletter.

      - Logistics: I honestly didn’t check with facilities or see if the school already had a similar project. This started
      as a fun side thing for my classroom—wasn’t expecting it to become a bigger deal or need any official process (will
      cross that bridge if it comes up).

      - Need to coordinate with: Possibly Mr. Hernandez (principal), Ms. Kelly (science), but only if we go bigger. Might
      ask the garden club if they want to join in.

      - Construction: Not sure yet if we’ll need anything built for the school’s part—maybe just some painted signs? If it
      gets more complicated, I’ll figure it out as we go.


      Personal reminders:

      - Ask Derrick if he can help build a simple display stand for the kids’ reports

      - Double-check Jada’s appointment times so we don’t run into construction noise issues again

      - Keep an eye on Mom’s visits—she’s excited about the new ADA ramps, but they still haven’t started on her side street

      - Don’t forget to get parent permission slips if we publish photos


      (Motivation: Make civics/local government tangible for the kids and help them feel more ownership over their neighborhood.)'
