      trialed and had adverse reactions to other medications including metformin, glipizide, and sitagliptin. My doctor provided
      documentation of these treatment failures and side effects. I am concerned that denying Trulicity will result in continued
      poor glycemic control and increased risk of diabetes complications, including vision loss and kidney damage. My endocrinologist,
      Dr. Rajiv Patel, believes Trulicity is the most appropriate therapy at this time. My request for exception was denied
      on appeal, and I am seeking an independent review for reconsideration.
