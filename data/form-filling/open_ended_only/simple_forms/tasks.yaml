  - artifact_type: note
    content: 'Personal Journal – May 12, 2024


      What a month. I’m exhausted but relieved that we seem to be through the worst of it. Having Marcus home while Eli was
      sick was a blessing and a curse—blessing because Eli needed his dad, curse because two weeks of no paycheck made everything
      feel so much tighter. The $430 from Sacred Heart for Eli’s bronchitis was a gut punch, and I hated paying the utility
      bill late, but what else could we do?


      I keep worrying about the house. Last winter broke the bank with the plumbing, and the HVAC is making the same noises
      again. I’m doing the best I can to keep the kids from feeling the stress, but Lena is so perceptive. She keeps asking
      if we’re going to be okay.


      I’m grateful for Denise—she’s been a lifesaver, picking up the kids, bringing over groceries, and just being here to
      talk. Marcus is back at work, and we’re slowly catching up. I just hope things stay calm for a while. I want the kids
      to feel safe and loved, even when I’m worried about money.


      Maybe I need to start setting aside a tiny “emergency” fund, even if it’s just a few dollars here and there. For now,
      I’ll just be glad we made it through April.


      —Rachel'
