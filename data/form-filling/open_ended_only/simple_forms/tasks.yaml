  - field_id: reason_for_request
    field_label: Reason For Request
    value: We are submitting this request for exemption because, in 1987, the original property was divided into two lots
      by the previous owner, but the subdivision was not properly recorded according to the county's standards at that time.
      Since then, we purchased Lot 1 in 1993, and my husband and I have resided here for over 30 years. We constructed our
      home in 1995 with a building permit, but only realized during a recent title review for refinancing that the division
      had not received proper county occupancy approval, which has affected the legal recognition of both parcels. Our property
      has a well-established single-family home, and Lot 2, which is currently vacant, is owned by my brother-in-law, who
      is hoping to build in the next two years. We are seeking to legalize the two-lot configuration as it has existed in
      practice for decades, with clear access, separate utilities, and maintained boundaries. This will allow us to clear
      the title, ensure correct taxation, and make future sale or inheritance straightforward. We also want to guarantee compliance
      for county records, so there are no surprises for our heirs or future owners. We appreciate your consideration and are
      prepared to provide any additional documentation or support needed.
    is_open_ended: false
