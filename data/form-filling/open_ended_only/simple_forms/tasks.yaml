      Emma is an active member of her school''s varsity track team, specializing in the 400-meter dash and relay events. She
      trains after school three days a week and enjoys swimming laps at the community pool on weekends. Emma is lactose intolerant,
      so all her snacks and meals are carefully planned to be dairy-free; she prefers almond and oat milk, checks labels for
      hidden dairy, and takes a daily calcium supplement. She occasionally needs Claritin for mild seasonal allergies, especially
      around March and September when Tucson''s pollen levels spike. Otherwise, she''s generally healthy, up to date on vaccines,
      and has never had any major illnesses.


      Emma is a friendly and outgoing student, balancing AP classes, track practice, and time with friends. She often volunteers
      at the local library with her mom, Samantha, who works as a children''s librarian. Lucas, her younger brother, looks
      up to her and is starting to get into soccer. Family dinners are lively, usually focused on new recipes that Emma can
      eat. Emma''s current worry is keeping her grades up for college applications next year and preparing for regionals with
      her track team. She hopes to study environmental science after graduation and is considering the University of Arizona,
      just a short drive from home.'
