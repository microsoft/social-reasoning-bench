  - artifact_type: note
    content: 'Note to self – May 2024 Budget Review


      - April was rough. With Marcus’s two weeks of unpaid leave after Eli’s bronchitis, plus the $430 bill from Sacred Heart,
      we had no room for extras. Had to pay the utility bill late – not ideal, but at least it’s done now. Remember to check
      for late fees on next statement.


      - Still need to call HVAC company for estimate. If possible, get a second quote—system is barely working and it’ll be
      another hot summer. Put aside $100 from next check if possible, but may need to use credit card if it becomes urgent.


      - Medical: double check if Eli’s new inhaler refills are covered. (Call clinic if bill from Sacred Heart isn’t showing
      insurance adjustment by end of month.)


      - Remind Marcus to submit any paperwork from school HR about time off—if there’s any sick leave left, maybe we can get
      a partial credit?


      - Groceries: stick to $100/week for now. Use store coupons. Ask Denise if she still has that extra package of rice she
      offered.


      - Remember to thank Denise for watching kids during all the chaos last month. Maybe invite her for a family dinner on
      Sunday.


      - Mental note: try not to stress in front of the kids—Lena keeps asking if we’re “in trouble” with money. Reassure her.


      - Next payday: prioritize water, electric, and mortgage. Delay any non-urgent spending until June.


      - Summer camp – ask school about any scholarships for Lena and Eli.


      - Keep going. Things will get better!'
