  - artifact_type: note
    content: "Personal Reflection – Balancing Music, Teaching, and Family\n\nI keep coming back to the idea that music is\
      \ my lifeline, especially since returning to Roosevelt after my medical leave for postpartum depression when James was\
      \ born (January 2020). Performing at the Cincinnati Summer Music Fest and our regular downtown farmers market gigs has\
      \ honestly helped me find myself again. It’s not just about the music—it’s the routine, the sense of community, and\
      \ feeling like I’m contributing something meaningful. \n\nSometimes, though, I get anxious before bigger crowds. It\
      \ takes a while for me to settle in, especially when we’re playing at new venues or with larger audiences than usual.\
      \ I try to breathe, remind myself it’s okay to be nervous, and focus on the joy of sharing music with others. The nerves\
      \ fade after a few songs, but they never really disappear.\n\nOn the teaching front, I’m prepping for the annual spring\
      \ concert at Roosevelt—a mix of folk and classical pieces. Lily is starting piano lessons this fall, which makes me\
      \ happy, and James still loves drumming on anything he can find. Aaron’s been supportive, picking up extra chores so\
      \ I have time to rehearse with Daniel. Our schedules rarely line up, but after the kids go to bed, the living room becomes\
      \ our rehearsal space.\n\nI’m grateful for these moments, but it’s a lot to juggle. I need to remember to carve out\
      \ time for myself, too—whether it’s a quiet evening arranging harmonies or just sitting with a cup of tea. Music is\
      \ my anchor, but so is family. I don’t want to lose sight of either.\n\nMelissa"
