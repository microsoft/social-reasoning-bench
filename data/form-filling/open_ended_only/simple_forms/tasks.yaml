  - artifact_type: email
    content: 'Subject: Next steps on the land (and summer plans)


      Hi William,


      Just wanted to jot down some thoughts while things are fresh in my mind. I was looking through the old paperwork again,
      and I realized we really didn’t understand the county’s subdivision rules all those years ago—especially when we built
      the cabin for Elliot last summer. We had no idea there were extra requirements until we were knee-deep in the project.
      In hindsight, we probably should have double-checked with the county before moving ahead, but it’s easy to see how we
      missed it.


      Anyway, with David’s situation dragging on, I think we need to be proactive now. Maybe we should ask around for a local
      real estate lawyer who’s dealt with these kinds of title headaches before. At least then we’d know what we’re up against.
      I know you’ve been worried about David putting off building his dream place because of all this, and I wish I had a
      better answer for him. Hopefully, we’ll have more clarity soon.


      On a happier note, let’s make sure we block out a weekend in June for that camping trip we keep talking about. We both
      need it. Remind me to check with Elliot and see if he wants to tag along.


      Love,

      Susan'
