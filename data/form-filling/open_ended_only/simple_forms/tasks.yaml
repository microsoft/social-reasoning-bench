    content: 'Note to self – June 2024


      The Baldwin Avenue Community Garden Restoration Project is finally taking shape. The raised beds are installed, the
      accessible pathway is finished, and the new drip irrigation system is working (fingers crossed Lucas doesn’t “improve”
      it too much). I keep reminding myself why we started all this: after Emma’s allergic reaction to the park pesticides
      back in March, and then the asthma attacks in April, we needed a safer, organic space for her and other kids. Dr. Linda
      Tse’s advice about sensory-friendly spaces was spot-on – Emma seems more at ease in the backyard now, especially with
      the extra lavender and rosemary by the swing.


      Planning the garden with accessibility in mind has opened my eyes to how much minor changes can help everyone—my parents
      can walk the path without worrying about tripping, and the schoolchildren from the workshop enjoy the new pollinator
      beds. I’m glad we qualified for the exemption since we weren’t removing any mature trees or impacting sensitive areas
      – just making things better for the community.


      Next steps:

      - Set up sign-up sheet for summer workshops

      - Order more native seeds

      - Ask Sophia to check in with Emma’s occupational therapist again before the next phase'
