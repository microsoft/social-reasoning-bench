  - artifact_type: email
    content: 'Subject: Emma’s allergy & garden project idea


      Hi Sophia,


      I keep thinking back to March, when Emma had that awful allergic reaction after playing at Arcadia Park. I still remember
      her face when the hives started – it makes me sick every time I think about what could’ve happened if we hadn’t reacted
      so quickly. I talked to a few neighbors, and it turns out the city’s been using some pretty harsh pesticides on the
      east side near the playground. That was really the wake-up call for me.


      I started sketching out plans for a pesticide-free community garden space, not just for Emma but for all the kids and
      seniors around here. We can use organic soil remediation and raised planters, and I want to make sure the new space
      is accessible for anyone with mobility challenges. The idea is to get families, schoolkids, and local groups involved
      so it’s not just our project, but something the whole community can take pride in.


      Let’s talk more tonight – maybe we can invite your parents and mine for dinner this Sunday and share the idea. I think
      they’d love to help, and it’d be good for Emma to see that we’re making changes because of her experience, not just
      in spite of it.


      Love,

      Daniel'
