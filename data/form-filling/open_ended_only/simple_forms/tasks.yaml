    full_name: Ella Grace Morrison
    age: 16
    date_of_birth: ''
    gender: Female
    race: White
    address: 4129 Juniper Lane
    city: Flagstaff
    state: AZ
    zip_code: '86004'
    email: null
    phone: null
    mobile_phone: null
