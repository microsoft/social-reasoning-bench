    content: 'April 17, 2024


      Volunteering reflections:


      It’s been a weird adjustment, not teaching full-time and having so much flexibility. My schedule is pretty unpredictable,
      and I can’t guarantee I’ll be available every week for volunteering. There are weeks when my grief counseling sessions
      with Dr. Karen Miller at Riverside Wellness Center (every Thursday afternoon) take priority, especially since Dad’s
      passing in March. And honestly, sometimes I just need a break—being around people dealing with loss is rewarding but
      draining.


      When I do volunteer at Carewest or the library, I gravitate toward roles that don’t require a lot of direct interaction
      with residents. One-on-one situations make me anxious; I feel more comfortable leading group workshops or handling logistics
      behind the scenes.


      I think I’ll keep focusing on creative arts activities, where I can help residents express themselves through writing
      or poetry, without too much personal pressure. It’s a good balance for me.


      Reminder: Don’t force myself into roles that don’t feel right. It’s okay to step back if needed.


      — Rebecca'
