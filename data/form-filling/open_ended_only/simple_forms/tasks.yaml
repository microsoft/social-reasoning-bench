    content: 'Subject: Spring Play & Weekend Plans


      Hi Martha,


      Hope you’re holding up this week! I wanted to let you know Elena’s spring play is next Saturday, and Tyler has a Little
      League game that morning—so my weekend is going to be a marathon. If you want to join us for either, just let me know.


      I was thinking about March 3rd again. I’ll never forget how you were there during the staff meeting when those remarks
      were made. I’m grateful you saw what happened—and for your support after. I know Dr. Linda Harris was also present for
      her wellness session that day, and she saw the whole thing. Sometimes I replay that moment in my head and wonder how
      things might have gone if someone had spoken up sooner.


      I’ve had a couple of therapy sessions at Riverside since, both with Dr. Chen. The one on April 17th was especially needed—my
      anxiety was off the charts. Marcus has been so steady (he took me to urgent care after I totally unraveled on March
      5th), but I’m still feeling the aftermath. I’m hoping Lakeside steps up and offers a fair settlement; I’m not letting
      them forget about the two weeks of unpaid leave ($3,400 gone) or the therapy bills. If I do agree to anything, it needs
      to be in writing and with follow-up so this doesn’t happen again.


      Let’s meet for coffee next week? I need to hear your take on all this and just catch up. Text me your schedule.


      Take care,

      Janelle'
