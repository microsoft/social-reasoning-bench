  - artifact_type: note
    content: 'Personal Medical Diary – June 11, 2024


      Last few days have been rough. Still feeling worn out from the hospital stay at Baylor Scott & White on May 30th—can’t
      believe it’s already been two weeks. That confusion after glipizide sent me over the edge; I barely remember driving
      home from Lone Star Engineering, and then the minor accident happened. Thank goodness David was able to take time off
      work to help me recover. He really kept the house running when I was out of it.


      Dr. Patel says my medical records are clear: metformin, glipizide, even sitagliptin—none of them agree with me. Severe
      GI side effects, high blood sugar, and then hypoglycemia scares. And Blue Horizon Health still won’t budge on Trulicity.
      I’m worried that the longer this drags on, the greater the risk for kidney damage or vision issues. My A1c is stubborn
      (8.7%), and I keep thinking about how close I was to real trouble last month.


      On top of all that, work has been busy—payroll deadlines, new hires, and I keep forgetting to bring my insulin pen to
      the office. Need to make a checklist for mornings. I’m grateful for Evan and Melissa, even from afar. Melissa texts
      daily with reminders to eat lunch and Evan checks in every weekend. I’m so lucky.


      To do:

      - Call Dr. Patel’s office for follow-up

      - Ask David to refill my prescription

      - Order new test strips

      - Try to walk after dinner every night


      Just taking it one step at a time.'
