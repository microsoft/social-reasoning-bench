      \ and C)\n□ Provider acting on behalf of patient or injured employee (complete page 3, items A and B)\n□ Provider that\
      \ received the denial (complete page 3, item A)\n□ Sub claimant (Workers' Compensation only) (complete page 3, items\
      \ A and C)\n\nREASON FOR REQUEST FOR REVIEW BY AN IRO\n\nAPPLIES TO HEALTH AND WORKERS COMPENSATION CASES:  \nIs the\
      \ condition life-threatening?  \nCheck one:  \n□ Yes  □ No  \n(This question does not apply if services have been received)\
      \  \nIs the review ordered by a Court?  \nCheck one:  \n□ Yes  □ No\n\nAPPLIES TO HEALTH CASES ONLY:  \nIs this a denial\
      \ of prescription drugs or intravenous infusions for which you are already receiving benefits? Check one:  \n□ Yes \
      \ □ No  \nIs this a denial of an exception request to a prescription drug step therapy protocol:  \nCheck one:  \n□\
      \ Yes  □ No\n\nDENIED SERVICES  \nDescribe the health care services that are being denied (include dates only if services\
      \ have been performed):\n___________________________________________________________________________________________\n\
      ___________________________________________________________________________________________\n\nPATIENT/INJURED EMPLOYEE\
      \ INFORMATION\n\nHealth Plan or Claim Identification Number: ________________________________________________  \n(This\
