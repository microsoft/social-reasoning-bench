      \ your healthcare needs. 3"
  form_summary:
    form_purpose: This form is used to collect a student's medical history and COVID-19 related health information prior to
      participation in school sports or physical activities, ensuring it is safe for the student to participate.
    intended_recipient: The form will be read and processed by a physician conducting the physical examination, with input
      from the student's parent or guardian, and may also be reviewed by school athletic staff or administrators responsible
      for student health and safety.
  instruction: ''
  instruction_message: 'Your goal is to have a natural conversation with the other person to gather the information needed
    to complete the form.


    Guidelines:

    - Ask questions naturally and conversationally

    - You may ask follow-up questions to clarify or get more detail

    - Be professional and respectful

    - When you have gathered sufficient information, end the interview

    - You will need to fill out the form AFTER the conversation ends, so make sure to gather all necessary details'
