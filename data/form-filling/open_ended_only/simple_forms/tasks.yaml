    background_context: "Rebecca Martinez wakes up each weekday at 6:15 AM to the gentle sound of her phone alarm, giving\
      \ herself a few moments to breathe before the day begins. Her apartment in Maplewood, a leafy inner-ring suburb of St.\
      \ Louis, is a cozy, sunlit space filled with family photos and stacks of books on recovery, social policy, and fiction.\
      \ As a single mother, her mornings are a blend of making breakfast for her sons Lucas and Diego, packing their lunches,\
      \ and checking that Diego has his soccer gear and Lucas hasn’t forgotten his AP Chemistry notes. Lucas, a high school\
      \ senior, is preparing for college applications and considering a career in medicine, while Diego, a sophomore, juggles\
      \ schoolwork and soccer practice with his growing interest in digital art. \n\nAfter the boys head out the door, Rebecca\
      \ pours her second cup of coffee and checks her email before heading into the office of Fresh Start Community Initiative,\
      \ where she’s led as Executive Director since 2014. Her work is demanding and deeply fulfilling—managing staff, overseeing\
      \ grant proposals, and coordinating with local agencies to secure housing and recovery supports for clients. She holds\
      \ supervision meetings with case managers, reviews budgets, and sometimes sneaks in a lunchtime walk at nearby Deer\
      \ Creek Park to clear her head. Her fluency in Spanish is a major asset, especially with the recent uptick in Spanish-speaking\
      \ clients seeking help. Most weeks, Rebecca attends her Thursday evening AA home group meeting, where she continues\
      \ to sponsor women and connect with new members. She’s often tapped for speaking engagements at treatment centers or\
      \ asked to lead training workshops on trauma-informed care. \n\nRebecca’s mother, Carmen, lives ten minutes away and\
      \ often helps with the boys’ schedules or joins them for Sunday dinners. Having maintained sobriety since June 2008,\
      \ Rebecca finds ongoing strength in her recovery community. She carves out time for reading and writing—her articles\
      \ on recovery are well-received in the local Intergroup newsletter—and she’s recently begun outlining a memoir about\
      \ her journey and experience with community service. Life is busy, sometimes overwhelming, but filled with meaning and\
      \ moments of genuine connection. She worries about Lucas’s transition to college and Diego’s occasional moodiness, but\
      \ she remains resilient, drawing on the support of close friends, her faith, and the practical wisdom gained from years\
      \ of both personal and professional recovery work."
  artifacts:
  - artifact_type: email
    content: 'Hi Sarah,


      Finally getting around to writing you back after all the chaos of the last couple months. The boys are hanging in there—Lucas
      is swamped with AP Chem and college apps, and Diego just had his first soccer game of the season (he played goalie and
      only let in one goal, so he’s proud!). Mom’s doing well—she came over for dinner Sunday and brought her famous arroz
      con pollo, which was a lifesaver after a long week.


      I’ve been thinking a lot lately about that semester I took off during my MPA at Saint Louis University. It feels like
      a lifetime ago, but I remember how scared I was when Mom got her diagnosis. Those months at Barnes-Jewish, sitting in
      waiting rooms with her or driving her to chemo, were some of the hardest and most important of my life. I know I made
      the right choice taking that break in Fall 2004, but sometimes I wonder how things would’ve been if I’d tried to power
      through. I barely scraped by in statistics before I left, and honestly, that class almost made me throw in the towel
      altogether. I’m grateful I went back the next semester and finished, but wow—if I never see a regression formula again,
      it’ll be too soon.


      Anyway, work is its usual blend of rewarding and exhausting. We had a big grant deadline last week and I’ve been pulling
      late nights at the Fresh Start office, but I’m hoping things slow down soon. Let’s catch up over lunch one weekend.
      Let me know when you’re free!


      Big hugs,

      Rebecca'
