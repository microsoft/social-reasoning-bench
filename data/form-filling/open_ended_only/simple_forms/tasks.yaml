  - field_id: gurps_campaign_prospectus_campaign_synopsis_and_recent_events
    field_label: Gurps Campaign Prospectus Campaign Synopsis And Recent Events
    value: 'The campaign is set in Eldhame, a continent riven by ancient rivalries and rising shadowy threats. Over the past
      decade, the fragile Accord of Thalorien has kept open war at bay between the major states: the human-dominated Kingdom
      of Lyndoril, the enigmatic Sylvan Expanse of the Elves, and the subterranean Confederation of Dwarrowmark. The party—comprised
      of a smuggler with a dark past, a young elven scholar, a dwarven knight, and a foreign priest—were drawn together by
      mysterious disappearances in the trading city of Wythe. Recent events include the assassination of King Aldric the Just,
      the collapse of a major dwarven tunnel, and the discovery of an ancient artifact beneath the ruins of Starfall that
      may be linked to the primordial Shadows. Fears of war are mounting, refugees move between borders, and magic is becoming
      increasingly unpredictable. The party stands at the crossroads of history, courted by spies, hunted by cultists, and
      tempted by forbidden lore.'
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: gurps_campaign_prospectus_timeline_of_significant_historical_events
    field_label: Gurps Campaign Prospectus Timeline Of Significant Historical Events
    value: 'Year 0: Founding of the Kingdom of Lyndoril from fractured warlord states.

      Year 114: The Second Dwarven-Drake War devastates the northern mountains.

      Year 283: The Accord of Thalorien signed, establishing uneasy peace between the three major nations.

      Year 297: The Mage Purge in Varesthal results in widespread magical diaspora.

      Year 302: Starfall, a meteor impact that reveals the site of an ancient city and disturbs sleeping Shadows.

      Year 308: Current year. Assassination of King Aldric and collapse of the Deep Road in Dwarrowmark.

      '
    is_open_ended: false
