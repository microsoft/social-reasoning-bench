  - artifact_type: email
    content: 'Subject: Family Update – Lily’s Piano Lessons & Anniversary Camping Trip


      Hi Mom,


      Wanted to give you a quick update on the Carter crew. Lily started her piano lessons this week—her teacher is Mrs. Henderson,
      and she’s already practicing scales every morning before school. James is still obsessed with banging on the drum kit
      in the basement; I swear he’s got more rhythm than I did at his age!


      Aaron and I just celebrated our ninth anniversary last weekend with a camping trip at Hueston Woods. The weather was
      perfect, and we got some real downtime as a family—roasting marshmallows, hiking, and even a little campfire singalong
      (you would’ve loved it!).


      Work is keeping me busy, as usual. I’m prepping my classes at Roosevelt Elementary and juggling gig schedules with Daniel
      for The Willow Street Folk Duo. We’ve got a farmers market performance coming up, and I’m planning to share a few stories
      about the roots of Appalachian folk music. I’ve been trying to squeeze in extra rehearsals, but honestly, Daniel and
      I haven’t practiced together much lately. Our schedules are all over the place, so we’re a bit rusty as a duo, but we’ll
      get back into the groove soon.


      On a personal note, since coming back from my medical leave for postpartum depression after James was born, performing
      music regularly has really supported my recovery. Playing at the Cincinnati Summer Music Fest and our downtown gigs
      has been a lifeline, helping me reconnect to my passion and to the community. I’m grateful for that.


      Hope you’re doing well! Let me know when you’re free for a phone call—Lily wants to play her new song for you.


      Love,

      Melissa'
