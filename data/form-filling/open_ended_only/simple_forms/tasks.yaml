  - artifact_type: email
    content: 'Subject: Sunday Dinner – Let’s Celebrate Getting Through April


      Hi Denise,


      I hope you’re doing okay! I wanted to see if you’d like to come by for dinner this Sunday. After the month we just had,
      I think we all deserve a little celebration—even if it’s just making Lena’s favorite fry bread and Eli’s soup (he’s
      finally eating again!).


      Marcus is finally back to work after those two weeks at home with Eli—he really hated missing out, but the bronchitis
      scare at Sacred Heart made us all realize how quickly things can change. The medical bills were a lot, and I ended up
      paying the utility bill late, but I think we’re mostly back on our feet now. Thank you again for picking up the kids
      and holding down the fort so I could keep working.


      If you’re free Sunday evening, come hungry! Maybe you can bring your beadwork kit and show Lena that new pattern you
      mentioned? She’s been talking about it all week.


      Love,

      Rachel'
