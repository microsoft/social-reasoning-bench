    background_context: 'Cathy Moreno has lived in the East Sacramento neighborhood for over a decade and has become a familiar
      face at Mercy General Hospital, where she works as a physical therapist. Her daily routine involves early morning walks
      with her dog, Max, before heading to work where she helps post-operative and accident recovery patients regain strength
      and mobility. Cathy’s husband, Roberto, is a civil engineer with the city’s public works department, often working on
      infrastructure projects around Sacramento. Their two children, Amelia and Lucas, attend a nearby middle and elementary
      school, respectively, and Cathy frequently juggles her work schedule to attend their after-school activities and sports
      events.


      Recently, Cathy has found her routines changing a bit, as the Folsom Boulevard Complete Streets Improvement Project
      began mobilizing in the neighborhood. She’s appreciated the city’s efforts to enhance safety along the thoroughfare,
      especially because her kids walk or bike to school using those sidewalks. While the construction has brought some noise
      and minor detours, Cathy feels reassured knowing the end result will improve accessibility for her mother, Dolores,
      who moved in with them last year after a knee replacement. The wider sidewalks and ADA-compliant curb ramps are particularly
      meaningful for their household.


      In her spare time, Cathy enjoys gardening with drought-tolerant plants in her front yard and volunteering at the local
      community center, teaching basic stretching classes for seniors. Her main concerns lately revolve around balancing the
      kids’ busy schedules, ensuring her mother’s continued recovery, and making sure the home remains a welcoming hub for
      her extended family. Cathy takes pride in being part of a community that’s actively working to improve safety and mobility
      for all residents.'
