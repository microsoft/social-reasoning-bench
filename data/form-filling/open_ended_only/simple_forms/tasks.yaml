  - artifact_type: note
    content: 'Journal Entry – After Farmers Market Performance


      Tonight felt like a milestone. Performing at the downtown farmers market with Daniel brought back memories of last year’s
      Cincinnati Summer Music Fest—the crowd was welcoming, and I felt the familiar surge of joy and nerves. Since coming
      back from medical leave for postpartum depression after James was born, these gigs have been the best medicine.


      I still get jittery before big audiences; it’s always been a challenge for me. The first few songs are the hardest,
      but once I settle in, the music takes over. I need to keep reminding myself: nerves are part of the process, and sharing
      music is worth it.


      Afterwards, Lily asked if she could play the piano with us next time. I love that she’s catching the bug early. Aaron
      was a champ wrangling James during the performance. Our Willow Street home feels more like a musical hub every day.


      I’m grateful for supportive friends, family, and colleagues. Music is where I find myself again after tough times, and
      I want to keep showing up for it—no matter how nervous I get.


      Melissa'
