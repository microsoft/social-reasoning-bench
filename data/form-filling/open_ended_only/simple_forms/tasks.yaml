  - artifact_type: note
    content: 'Personal Reflection – April 20, 2024


      It’s been a few weeks since the incident at Lakeside, and I’m still trying to process everything. March 3rd was a turning
      point—Dr. Linda Harris happened to be in the office for her wellness session that day, and she witnessed the discriminatory
      remarks during the staff meeting. I remember how stunned I was, and the silence from leadership felt like a slap. If
      I ever need a professional statement, I know Dr. Harris can speak to what happened and how I reacted.


      What followed was a cascade: I went home on March 5th and completely unraveled. Marcus saw me at my worst—panic attack,
      tears, couldn’t breathe. He ended up taking me to urgent care that night, which was embarrassing but necessary. Still,
      I’m glad he was there—he’s always steady when I’m not.


      Afterward, Elena Ramirez put me on unpaid leave starting March 18th. Two weeks gone, $3,400 lost. I’m still waiting
      for Lakeside to address the situation properly. I’ve made it clear (in my own head at least) that any settlement needs
      to include lost wages and reimbursement for my therapy sessions at Riverside with Dr. Samuel Chen. Those sessions helped,
      but the emotional toll lingers.


      Note to self: Keep track of dates, names, and specifics. Don’t let them minimize what happened. Document everything—especially
      Dr. Harris’s presence on March 3rd, Marcus witnessing my distress on March 5th, and Dr. Chen’s emergency session on
      April 17th. If this ever gets resolved, insist on everything being in writing and a clear plan for follow-up.'
