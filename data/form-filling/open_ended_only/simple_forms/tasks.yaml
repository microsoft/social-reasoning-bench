  - artifact_type: note
    content: 'Personal Reflection – Late April 2024


      Megan’s cough just won’t quit. She’s been hacking for weeks, and the spot above the baseboard in the hallway is still
      discolored, even after I wiped it down. Dr. Kim at Fort Wayne Children’s Clinic brought up the possibility of mold exposure,
      which, given my line of work, is a little too on-the-nose. I took a swab sample from the wall (BR-A-2) in case we need
      hard evidence. I’m worried Emily is going to blame herself since she’s been working doubles at the hospital and isn’t
      home much lately. I keep telling her it’s not anyone’s fault—the building is old, and the management’s maintenance is
      always reactive instead of proactive. Still, I see the guilt on her face every time Megan coughs. I wish I could make
      it easier for both of them.


      Remember to check in with Dr. Kim after sample results.

      Remind Lucas to keep doors closed during air sampling.

      If the results are bad, start researching remediation services in Fort Wayne.'
