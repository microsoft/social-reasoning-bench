    background_context: 'Susan has lived in her cozy mountain home in Evergreen, Colorado for over thirty years, where she
      and her husband, William, built the house themselves in 1995. Both have deep ties to the area and are well-known in
      their small community. Their children, Elliot and Rebecca, grew up climbing the pines and adventuring along the creek
      that snakes near their property. Now adults, Elliot lives nearby in Denver, working as a physical therapist, while Rebecca
      is finishing graduate school in Boulder. Susan''s brother-in-law, David, owns the adjacent lot and often visits for
      weekend hikes, discussing his plans to finally build his dream cabin there in the next couple of years.


      Susan has worked as the librarian at Bergen Meadow Elementary for 17 years. Her days are busy but fulfilling—she delights
      in introducing children to her favorite classic books and organizing reading challenges. With summer approaching, she''s
      planning a garden expansion in the backyard, and she and William recently spent a weekend re-staining their deck after
      a rough winter. They love hosting neighborhood BBQs in the summer and have a standing Wednesday night dinner with the
      Harrisons next door. Lately, Susan has been preoccupied with the complications that surfaced during a recent attempt
      to refinance their mortgage, which revealed lingering title issues from the previous owner''s subdivision of the property.
      She and William are working to clarify the boundaries and legal status to ensure a smooth future for themselves and
      their children, especially as they contemplate retirement in the coming years.


      Despite these recent headaches, Susan is grateful for the life she and William have built. She enjoys her early morning
      walks with their golden retriever, Sophie, and volunteers at the local library on weekends. Health-wise, she keeps active
      with yoga and is careful to balance work with time for herself, especially as she thinks about winding down her career
      in a few years. Family gatherings, outdoor adventures, and a strong sense of stewardship for their home keep Susan''s
      days full and meaningful.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Land stuff and family updates


      Hi Rebecca,


      Hope your classes in Boulder are going okay—any luck getting that extension on your thesis draft? Things here have been
      the usual mix of calm and chaos. William has been fussing over whether the tomatoes will survive another late frost,
      and Sophie has discovered a new mud pit near the creek, so the house smells like wet dog most of the time.


      On the more complicated side, David called last night—he’s still reeling over First Mountain Bank denying him the construction
      loan for his build next door. The bank said the title for Lot 2 is too much of a mess, and now he’s out $8,000 after
      paying Evergreen Design Group for the plans back in May. He’s frustrated (understandably!) and it’s making things tense
      when we all get together. I told him we’re doing everything we can to get the land split sorted so he can move ahead,
      but it’s just dragging on. I feel bad for him—he already started showing me some of the cabin sketches, and now he’s
      stuck in limbo.


      We’re trying to keep things light when David comes over for Sunday dinner, but I can tell he’s stressed. If you have
      a minute, maybe send him a quick text to check in? I know he’d appreciate it.


      Other than that, not much new—Wednesday dinner with the Harrisons is still on, and I’m hoping to get the garden beds
      dug this weekend if the weather cooperates. Let me know if you want to come up for a hike soon!


      Love you,

      Mom'
