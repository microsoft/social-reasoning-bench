  - artifact_type: email
    content: 'Subject: Caravan troubles and Stonehall memories


      Father,


      Did you hear about Evelyn’s scrape with the Sylvan rangers last spring? She was detained for three days after her caravan
      crossed the Arilith boundary in the Expanse—apparently a magical territory dispute. She says the rangers treated her
      well enough, but she’s still sour about losing time (and profit). Reminds me of the headaches we had in Stonehall during
      the Autumn Fair a few years back—remember that trade permit? Evelyn had to grease the wheels with 30 silver crowns just
      to get the paperwork through. She asked me to hold onto her Guildhall receipt, which I’ve tucked away safely. Makes
      you wonder if the Dwarrowmark will ever change.


      Speaking of which, how’s the Dwarven mill faring since the last repairs? I still recall sitting in the barn with you,
      translating that technical manual and fitting the new gear assembly. It’s not every day a pair of Harthvales get their
      hands on TL4 engineering, as the Dwarves would call it. Glad to hear the yield on the grain has been better ever since.


      Tomas and Seren are both growing faster than weeds. Tomas is finally back at school after that arm fracture last spring
      (Ivybridge Ward—long story), and Seren’s already talking about the next Midsummer Festival. We’re all hoping for a quieter
      year, but these days, who knows?


      Love,

      Rowan'
