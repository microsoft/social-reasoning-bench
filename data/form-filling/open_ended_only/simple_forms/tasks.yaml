  - artifact_type: note
    content: 'Personal Note – Reflection


      Settling into the new place has been a mix of relief and nostalgia. The Tawa unit is bigger and quieter, and I like
      not being boxed in by noisy neighbours for once. Still, I do miss the atmosphere of the Karori flat—especially the old
      evenings with Laura and David, when we’d cook or just laugh about our day. Laura’s depression diagnosis back in March
      really changed things for us. Her therapist, Dr. Kaur, gave her the official news, and soon after she had to take leave
      from work. I tried my best to support her, but it was emotionally draining. I felt guilty at first for wanting to move,
      but I have to admit, it was the right decision for my own mental health. We’re still friends, but it’s easier now with
      both of us having our own space.


      I’m grateful for the reduced commute—15 minutes to Greenhills Health Solutions means more time for myself and for Mum
      and Dad. Sundays with them in Johnsonville are precious, even though they can be heavy emotionally. Dad’s struggles
      after his hip surgery and Mum’s early-stage memory loss remind me to cherish these moments. Simon has been wonderful,
      splitting the load and making grocery runs easier. I’m thinking about upskilling next year, maybe a postgrad diploma,
      but I want to be sure I won’t burn out. For now, I’m focusing on routine and finding comfort in small things: gardening,
      reading, and gentle walks.


      Sometimes I wonder if I tend to move every couple of years because I get restless. Maybe I just like a change of scenery.
      This move feels different though—more necessary, less impulsive. Here’s hoping the new place brings some peace.


      – Rachel'
