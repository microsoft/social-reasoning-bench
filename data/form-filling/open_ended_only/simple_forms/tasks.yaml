    content: 'Subject: Flat Update & Landlord Frustrations


      Hi David,


      Hope you’re surviving the week. Thought I’d fill you in on the latest—finally settled into the Tawa unit after the whole
      Karori saga. It’s a relief to have more space, but I do miss our old group dinners. The leafy streets here are peaceful,
      and I can actually get some sleep without the chaos from upstairs.


      Honestly, the last few months were a headache. Mrs. Patel, our landlord, kept dragging her feet on basic maintenance—leaky
      taps, the oven that wouldn’t heat, the bathroom tiles. Every time I flagged something, she’d promise to fix it but nothing
      ever happened. It got so frustrating I was counting down the days until moving out. Laura’s situation didn’t help either;
      after her depression diagnosis with Dr. Kaur in March, she took leave from work and things got tense at home. We managed,
      but it was clear I needed a change for my own sanity.


      The new commute to Greenhills is a breeze—15 minutes tops. Sundays are still reserved for helping Mum and Dad in Johnsonville
      (Simon and I are tag-teaming as usual). Let’s catch up soon, maybe over coffee or a mid-week dinner. Miss the old crew.


      Take care,

      Rachel'
