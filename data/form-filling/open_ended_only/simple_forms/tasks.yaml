  - artifact_type: note
    content: 'Reflection – October 2023


      It’s been almost ten months since Mom started giving us $200 a month for Emily’s therapy. I still feel weird taking
      it sometimes, but with David losing his overtime hours at Monroe Utilities Group, we just couldn’t swing counseling
      bills plus everything else. I keep reminding myself it’s not forever, and Emily really is making progress (even her
      teachers say she’s more engaged).


      Loop & Cozy has been slow this month, but maybe things will pick up before the holidays. I need to check in with the
      girls about ideas for new hat designs. Sophie wants a soccer ball pattern, Emily wants cats on everything. I’m grateful
      for Mom’s help, and for David not getting too discouraged. We’re all just doing our best.


      Maybe next week I’ll invite Mom for coffee and just talk—no money, no therapy, just us.'
