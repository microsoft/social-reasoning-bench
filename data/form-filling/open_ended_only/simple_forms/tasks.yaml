      \ carrier. Enter the DWC claim number for workers' compensation cases.)\nDate of Birth: (month)_______(day)____(year)_______\
      \     Sex_____\n\nFirst Name________________Middle Name___________Last Name________________Suffix______\n\nStreet ___________________________________________________________________________\n\
      \nCity________________________State_______Zip code______________\n\nPhone______-_____________Fax______-_____________\n\
      \nEmail ___________________________________\n\nRETURN THIS FORM TO THE COMPANY THAT IS DENYING YOUR REQUEST FOR HEALTH\
