      \ her mother Carolyn, who recently moved in after some health issues required her to downsize from her house in Delaware\
      \ County. Evenings are spent helping with homework, prepping dinners (her kids are picky eaters), and shuttling the\
      \ family to soccer and dance practices. Angela has been feeling the pinch of balancing her mother’s increasing doctor\
      \ appointments and her full-time job, but she’s grateful for her supportive husband and a close-knit group of neighborhood\
      \ friends. \n\nLately, Angela has been more health-conscious, making time for short morning walks before work and encouraging\
      \ her family to eat more vegetables. She’s also been working with her supervisor to find ways to streamline record-keeping\
      \ processes, hoping to make her department less dependent on paper and reduce the need for close-contact file sharing.\
      \ With Emily talking about joining the school band and Owen lobbying for a pet hamster, Angela’s days are full, but\
      \ she feels a sense of purpose juggling her family’s evolving needs and her responsibilities at the hospital."
