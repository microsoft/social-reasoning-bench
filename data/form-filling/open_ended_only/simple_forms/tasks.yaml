    background_context: 'Janet Morrison has lived in Lewisville, Texas for over twenty years. She works full-time as a Senior
      Payroll Specialist at Lone Star Engineering, a mid-sized regional firm just outside Dallas. Her workdays are busy but
      routine, centering around payroll processing, compliance, and occasional team meetings. Janet enjoys the camaraderie
      of her office, and often brings homemade baked goods to share with her coworkers. She recently celebrated her 20th anniversary
      at the company, and is proud of her dependable work ethic.


      At home, Janet is a devoted mother and wife. Her husband David is a project manager in commercial construction. Their
      son Evan graduated from Texas Tech last year and now works in Dallas as an IT support specialist, visiting home most
      weekends. Melissa, their youngest, is finishing her sophomore year at Texas A&M, and Janet keeps in touch with her daily,
      helping with advice on budgeting and college life. Janet enjoys gardening and volunteers at her church''s food pantry
      once a month. Family dinners are important to her, and she hosts Sunday gatherings where everyone can catch up.


      Janet has struggled with her diabetes for several years, and managing her health has become more challenging lately.
      She experienced severe gastrointestinal side effects from metformin and other common medications, and her blood sugar
      remains stubbornly high despite her efforts. Her endocrinologist, Dr. Rajiv Patel, recently recommended Trulicity to
      help improve her glycemic control, but her insurance refused to cover it due to a step therapy policy. Janet worries
      about the risks posed by her uncontrolled diabetes, especially since she values being active for her family and participating
      in community events. She tries to stay positive, focusing on healthy eating, regular walks at the nearby park, and keeping
      up with friends and family, but the uncertainty over her medication weighs on her mind.'
