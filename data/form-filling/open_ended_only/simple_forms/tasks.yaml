    content: 'Reflection: Feeling Overwhelmed


      Today was one of those days where everything overlapped and nothing got done the way I wanted. Lucas had his weekly
      therapy at San Mateo CDC (we were late, of course, because I was on a last-minute work call), and I could see he was
      anxious about being rushed. I hate how my job at Baybridge always bleeds into home life, but with Ryan traveling and
      the kids’ activities all over the calendar, I just can’t seem to get ahead.


      Emily keeps telling me how much the coaching helped her get a handle on her son’s schedule and her own time management—I’m
      honestly desperate for anything that might help. I need to find a way to stop double-booking myself. Maybe moving more
      things to the digital calendar will help, but I still need a backup system. Maybe sticky notes everywhere?


      I wish I could just breathe for a second. I miss hiking—Sawyer Camp Trail is calling my name. Maybe I can convince Emily
      or Lisa to go with me this weekend. I need to be out in the trees, away from screens, just for a little while.'
