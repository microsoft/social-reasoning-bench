  - field_id: description_of_project
    field_label: Description Of Project
    value: The 2024 Oak Park Sidewalk Improvements Project involves the removal and replacement of approximately 2,400 linear
      feet of damaged sidewalk, curb, and gutter along both sides of 34th Street between Broadway and 12th Avenue in the Oak
      Park neighborhood. The project will also include installation of Americans with Disabilities Act (ADA) compliant curb
      ramps at all intersections, upgrade of two bus stops with new benches and shelters, and planting of 18 new shade trees
      to replace those that have been removed over the past decade. The work will occur within the existing public right-of-way
      and is designed to improve pedestrian safety, accessibility, and community aesthetics, with all construction activities
      scheduled for completion during the summer of 2024 to minimize disruption to residents and local schools.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: reasons_why_project_is_exempt
    field_label: Reasons Why Project Is Exempt
    value: This project qualifies for a categorical exemption under CEQA Guidelines Section 15301, Class 1 (Existing Facilities),
      because it involves the repair, maintenance, and minor alteration of existing public facilities involving negligible
      or no expansion of use beyond that existing at the time of the lead agency’s determination. The project is limited to
      the removal and replacement of existing sidewalks, curb, and gutter, installation of ADA-compliant improvements, minor
      upgrades to bus stops, and landscaping within the public right-of-way. The improvements do not increase the capacity
      or footprint of the sidewalk, nor do they involve expansion of use. There are no unusual circumstances that would lead
      to a significant effect on the environment, and the project area is not located on a hazardous waste site or within
      a historical resource zone. Additionally, the project is not part of a larger plan that would cumulatively contribute
      to significant impacts.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
