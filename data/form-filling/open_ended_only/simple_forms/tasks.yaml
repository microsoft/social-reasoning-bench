      \ like setting up video calls. Isabel’s parents, David and Julia, both retired last year and now split their time between\
      \ volunteering and tending a large urban garden. Isabel's younger brother, Leo, works in IT in Minneapolis and occasionally\
      \ joins her for weekend visits to their grandmother. \n\nRecently, Isabel has become more involved in her grandmother's\
      \ social circle at The Waters, organizing paint-and-sip afternoons and assisting with group activities. She finds joy\
      \ in creating inclusive events that help residents build connections, especially for those facing challenges with mobility\
      \ or hearing. Isabel enjoys practicing her conversational Spanish, which helps her connect with Maria’s friends from\
      \ diverse backgrounds. In her free time, she enjoys cycling along the Mississippi River, experimenting with new art\
      \ mediums, and volunteering at the local food bank. Isabel is thoughtful and compassionate, balancing her passion for\
      \ art, her flexible career, and her commitment to family and community. She feels grateful for the opportunity to make\
      \ a difference in the lives of seniors, believing deeply in the power of small kindnesses to uplift others."
  artifacts:
  - artifact_type: email
    content: 'Hi Mom,


      I just got back from The Waters and wanted to let you know how everything went with Abuela today. She was in a pretty
      good mood, especially after her video call with Dr. Patel. I’m honestly grateful we have the tech set up so she can
      do those weekly therapy sessions—it’s really helped since her fall at Summit Arts last March. She actually told me she
      feels less lonely now, even if some days are harder than others. Dr. Patel has a way of getting her to talk about Grandpa
      without making her feel overwhelmed.


      Also, I sorted out her schedule for the next few months. I’ll keep accompanying her to dialysis at Hennepin Healthcare
      every other Tuesday morning through August—she gets anxious about the drive and the waiting. If I ever can’t make it
      (like if I have a class or need to pick up an extra shift at Summit), I’ll ask Leo or maybe Lucia to cover. Can you
      remind Dad to text me if you hear anything about schedule changes at The Waters? Sometimes their calendar updates don’t
      show up in my inbox.


      Tonight I’m going to start prepping for the paint-and-sip on Friday (I found a good deal on canvases, finally!). I know
      you worry that I take on too much, but organizing these events makes Abuela and her friends so happy. I wish the academy
      would give us more stable hours, but for now, I like being able to flex my time to help out where I can. The volunteering
      keeps me close to her and, honestly, gives my schedule some structure.


      Love you,

      Isabel'
