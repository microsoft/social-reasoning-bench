    value: I am interested in volunteering at The Waters because my grandmother, Maria Hernandez, has been a resident there
      for over two years, and I have seen firsthand the positive impact that volunteers have on the residents’ lives. I have
      always felt a strong calling to give back to my community, and I find working with seniors to be especially meaningful.
      Seniors have so much wisdom and life experience, and I believe that even small acts of kindness can brighten their days.
      Furthermore, I have some flexibility in my work schedule as a part-time art teacher, which allows me to dedicate consistent
      time to volunteering. Volunteering is also a way for me to connect more deeply with my grandmother and her peers, and
      to honor the older generation. I am motivated to support activities that enhance social interaction, well-being, and
      creativity among residents. For example, I love organizing group art projects or game afternoons, and I enjoy listening
      to their stories and learning from their experiences.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: interest_skills_experience_areas_of_interest
    field_label: Interest Skills Experience Areas Of Interest
    value: My main areas of interest include organizing creative activities such as art projects, leading group discussions,
      and helping with social events. As a licensed art teacher, I have experience working with groups of all abilities and
      ages, including seniors. I have previously volunteered at my local library and at a local food bank, where I developed
      strong organizational and communication skills. With seniors, I have assisted my grandmother and her friends with technology
      (setting up video calls with family members), helped lead bingo nights, and organized paint-and-sip afternoons. I am
      patient, compassionate, and attentive to the needs of the elderly, including those with hearing or mobility challenges.
      I am also fluent in English and conversational in Spanish, which allows me to communicate effectively with many residents.
      I would love to assist with art therapy sessions, provide companionship, help with reading, and support outings or special
      events. I am open to training for additional roles as needed.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
