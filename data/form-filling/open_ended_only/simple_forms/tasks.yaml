      ADHD diagnosis (March 2024, Lewisville Pediatrics) was a wake-up call to make classroom robotics as sensory-rich as
      possible—LEGO SPIKE, hands-on problem solving, visuals, and teamwork. I’m grateful for Ms. Nguyen’s support with Evelyn’s
      math placement at Briarhill for next year. Need to remember to send her a thank-you note.


