  - artifact_type: email
    content: 'Subject: Checking in & Sutter Park update


      Hi Tia Lucia,


      Hope you’re doing well! I wanted to send a quick update since it’s been a while. Mom is settling in here—she still misses
      her old neighbors, but the kids are happy to have her close. She’s been going out with her seniors’ club for their usual
      walks at Sutter Park. You know how she doesn’t let weather or creaky knees stop her, but after her fall back in January
      (right by the big bench at Sutter), she’s been a little more cautious. That’s partly why I pushed to get the trail improvement
      project started so soon. Those cracks were worse than I realized until I saw her take that spill—scariest ten seconds
      of my life, honestly.


      We’re resurfacing the whole 1.2-mile loop, patching the worst spots, and adding wayfinding signs so nobody gets lost
      (Maria says the lettering had better be big enough for her ‘old eyes’). The city’s letting us use recycled materials,
      so I feel good about that. Elena’s class is coming by next week for a science walk—Lucas wants to tag along, of course.
      It’s busy, but it’s the kind of work that means something, you know?


      Tell everyone I say hello. Maybe you can visit once the upgrades are finished and walk the trail with us and Mom!


      Un abrazo,

      Daniel'
