  - artifact_type: email
    content: 'Hi Jordan,


      It was great chatting after the all-staff meeting yesterday. Your question about what drew me to nonprofit work got
      me thinking—I actually took a couple years off between my bachelor’s in social work (Mizzou, 2001) and my MPA at SLU.
      I was honestly pretty lost for a while and wasn’t sure what I wanted to do next, so I worked a few odd jobs and spent
      a lot of time volunteering before finally landing on public administration.


      That time away from school ended up being a blessing. When I started at SLU (2003), I felt much more focused—even though
      I later had to take a semester leave to help my mom, Carmen, through breast cancer treatment at Barnes-Jewish. Sometimes
      I wish I’d been more involved in student leadership or extracurriculars, but the reality is I just kept my head down
      and tried to finish my classes. It’s funny how things work out—I never saw myself leading an agency, but here we are!


      Hope the transition is feeling smoother for you. Let’s have coffee next week and swap stories about winding career paths.


      Best,

      Rebecca'
