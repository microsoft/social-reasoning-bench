  - artifact_type: email
    content: 'Subject: Quick check-in after last week


      Hi Michael,


      Just wanted to send a little update after the chaos at home. We’re still waiting for the police to finish their investigation
      into the break-in at the house. Your dad has been talking to Officer Ramirez and is getting a security patrol started
      for Brookside Ave. I know you’re focused on your gap year plans and law school stuff, but if you have any ideas for
      organizing volunteers, let me know. I think we could use your knack for logistics.


      Also, remember last September when Dad paid $2,500 for the fence repairs? That was after the car sped down Brookside
      Ave and smashed through the yard. We brought it up at the meeting this week so the city reps know how much these incidents
      impact us. I’m researching grants for infrastructure improvements, but it’s slow going.


      On a brighter note, the rain garden committee is planning our first spring event, and I’m hoping to get more neighbors
      involved. Maybe you can stop by for the block party in September if you’re not traveling?


      Love you,

      Mom'
