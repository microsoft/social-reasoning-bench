  - artifact_type: note
    content: 'Reflection – late night, Thursday


      Sometimes I forget how much the house has changed in the past few years. When Anna’s MS diagnosis came down from Dr.
      Martin Lee at Westmead last January, everything shifted. We had to think about the ramp, the bathroom rails, the garden
      paths. I remember Anna crying the first time she realized she couldn’t get down the front steps without help—then being
      so relieved when Jane’s crew finished the ramp and she could get out into the garden on her own again.


      Now, planning for three homes on this old block, it’s all about making sure she’s never stuck inside because of a silly
      curb or a badly placed gate. The kids have been great. Emily keeps reminding me to talk to Olivia about why Granny has
      a special ramp. Michael’s already measuring the hallway widths for Lucy’s future pram, just in case. I feel lucky, but
      it’s also tiring—always thinking two steps ahead, always checking forms and plans. Still, I wouldn’t trade this for
      the old, noisy city flat, not for anything.


      Tomorrow: call Anna’s pharmacy, double-check her scripts, and book the garden crew for the back lawn. Maybe order pizza
      for dinner so Anna can rest.'
