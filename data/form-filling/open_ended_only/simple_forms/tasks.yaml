    background_context: 'Rowan Harthvale has lived in Wythe for most of his adult life, having moved from his family''s village
      near Lyndale a decade ago to seek better prospects after his apprenticeship. He works as a journeyman scribe and translator
      at the Guild of Scribes and Illuminators—a prestigious but often underappreciated post that keeps him busy copying legal
      documents, translating trade manifests into Elven for the city council, and, more recently, compiling reports about
      incoming refugees and political edicts in the wake of King Aldric''s assassination. The work is meticulous, occasionally
      tense, especially as rumors of unrest ripple through the guild halls.


      Rowan''s wife, Maela, manages a small market stall selling woven goods. Together, they balance their schedules to care
      for their two children, Tomas and Seren. Mornings are spent getting Tomas off to the local schooling circle and helping
      Seren with chores at home. Evenings bring the family together for simple meals and stories, though the past winter has
      felt longer and more anxious than usual—news of the king''s death, the influx of strange faces in Wythe, and talk of
      shadowy cults have unsettled Rowan. He worries about the city''s future and his family''s safety, especially with magic
      reportedly behaving unpredictably and the presence of spies rumored in the markets.


      Despite these tensions, Rowan takes pride in his role as a bridge between cultures. He occasionally tutors young Elven
      scholars in Lyndorian and has helped his sister''s merchant contacts navigate the paperwork needed for cross-border
      trade. His father, Borin, recently suffered a mild injury in the mill, prompting Rowan to consider a brief trip home
      to help with the harvest. For now, though, his days revolve around the quiet but vital work of keeping communication
      flowing in a city standing at the crossroads of history.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Catching up – Spring, taxes, and Tomas’s healing arm


      Dear Evelyn,


      Finally settling down at the kitchen table after this week’s chaos—Tomas is snoring away, his splint propped on a pillow,
      and Maela’s in the other room weaving with that determined look she gets when she’s worried. You asked about the new
      tax: it’s as bad as everyone feared. Queen Edara’s decree last winter means we owe almost twice what we did before,
      and Maela’s been poring over the ledgers every night. There was a heated meeting at the Guild Chapterhouse on the 12th—row
      after row of scribes debating, some nearly shouting about how the city expects us to just absorb this, as if paper and
      ink grow on trees. I tried to speak up but mostly listened; Evard’s face was thunderous.


      On top of that, we’re still picking up the pieces from last spring. Tomas’s arm has mended, but the whole ordeal left
      Maela anxious, especially after those tense meetings with Headmaster Brevin. I keep thinking about how a simple tumble
      at Ivybridge School turned the household upside down for weeks—he missed so many lessons, and we’re still catching him
      up at home. The world outside feels just as brittle. Refugees in the square, news of the king’s murder, and rumors of
      spies in the market—sometimes I wish we could pack up and go back to Lyndale, old mill and all. But then I remember
      how hard we worked to build this life here.


      Speaking of the mill, I heard from Father that he’s still using the Dwarven design. He swears the gears run smoother
      than anything else in the valley. I’ll try to send you a copy of the technical sketch I made when I helped him install
      it, if you want a look. Maybe it’ll distract us both from the taxman for a few minutes.


      Write back when you can. How’s trade this season? Did you ever hear more from those Sylvan rangers after Tiralineth?


      Love,

      Rowan'
