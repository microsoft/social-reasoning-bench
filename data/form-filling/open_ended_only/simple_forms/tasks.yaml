  - artifact_type: note
    content: 'Sunday, June 9, 2024 – Weekly Reflections


      Grateful for another Sunday together. Evan came for dinner, and Melissa called from College Station—she’s so busy with
      finals but still checks in every day. David grilled chicken and we played cards afterward. I wish I could say I felt
      100%, but my blood sugar has been stubborn and the insurance drama continues.


      After my hospital scare in March (ketoacidosis at Medical City Lewisville), Dr. Chen prescribed Trulicity, but Blue
      Horizon keeps denying it. Even after trying metformin (which made me so sick I couldn’t eat), and then glipizide (which
      landed me in the ER at Baylor Scott & White after that confusion and car accident), nothing seems to work. Dr. Patel
      submitted all the records, but the appeal was denied. I worry about long-term complications, but I’m trying not to let
      it overshadow family time.


      David helped me set up a new pill organizer this week, and Evan fixed the food pantry signup sheet for church. Melissa
      sent me a budgeting spreadsheet for groceries—she’s so thoughtful! I started walking at Willow Park again, and the roses
      are blooming. Baking less, but made lemon bars for the office and everyone loved them.


      Looking forward to next weekend’s pantry volunteer shift. Need to call Dr. Patel for a follow-up and refill prescriptions.
      Staying positive, one day at a time.'
