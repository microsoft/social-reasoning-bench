      \ never get fully cleaned out?), my desk is a mountain range of old sticky notes and unopened mail, and I’ve already\
      \ missed two birthday party RSVPs this month. \n\nLucas’s therapy at San Mateo Child Development Center is every Tuesday\
      \ at 4 p.m. through spring—set a recurring calendar reminder with a 2-hour heads up. Check with Ryan about coverage\
      \ for pickup if he’s in town (and if he’s not, ask Emily or maybe one of the soccer moms for a carpool swap). \n\nSophie’s\
      \ ballet is Wednesday at 5:15, Lucas’s soccer Thursday at 3:45, and the work deadlines just keep stacking up, especially\
      \ now that we’re onboarding that new client. Remind myself: Do NOT check work email after 8 p.m. or I’ll never get any\
      \ sleep. \n\nEmily said the coaching helped her break things down into smaller, actionable steps—maybe I need to do\
      \ the same, even if it feels silly. Also, buy more sticky notes. And coffee.\n\nMantra: It’s okay to let some things\
      \ slide. Breathe.\n\n— Jennifer"
