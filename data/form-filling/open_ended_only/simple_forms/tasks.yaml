  - artifact_type: email
    content: 'Subject: Re: Seren’s dreams and silver acorn


      Maela,


      I still can’t believe how Seren talked about the Feywild and that fae Lirael after we found her by the Old Willow during
      Midsummer Festival two years ago. She holds onto that silver acorn as if it’s the most precious thing in the world.
      Do you think we should ever tell Tomas the whole story? Part of me worries he’ll try to find the Old Willow himself,
      especially with all the tales flying around the ward lately.


      On a related note, I checked in with Sister Helene at the Ivybridge Temple about Seren’s night terrors. She recommended
      another Shadowdeep warding ritual—says it’s best to keep the stone under her pillow and renew the symbols after each
      new moon. Seren seems calmer, but I still worry about what she sees in her dreams. I’ve been sketching the sigils in
      my journal just in case we need to show Helene again.


      If you need more of the incense from the Temple, let me know—I’ll pass by there after work tomorrow. Tomas starts his
      Elven lessons again next week, so maybe things will quiet down once school routine returns.


      Love,

      Rowan


      P.S. Bread is in the basket. Get some rest if you can.'
