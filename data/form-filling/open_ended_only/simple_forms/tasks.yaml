    background_context: 'David Evans has lived in Epping for nearly two decades, having moved to the leafy suburbs from the
      inner city as his career took off and the family grew. He and his wife Anna enjoy the quiet of Maplewood Avenue and
      the convenience of being close to schools and amenities, which was a major draw when they purchased their spacious property
      nearly 20 years ago. Their adult children, Michael and Emily, have maintained close ties with their parents, frequently
      visiting on weekends and holidays. Recently, Michael, along with his partner Lucy and their young daughter Olivia, has
      moved back to stay with David and Anna as they transition towards building their own home on the family land. Emily,
      a primary school teacher, is also preparing to move into a separate dwelling on the property, excited about the prospect
      of remaining close to her parents while establishing more independence.


      David''s daily life is a careful balance between work and family. He commutes three days a week to the Sydney Metro
      Health Services digital office in Macquarie Park, managing a team responsible for implementing hospital IT systems.
      On remote days, he works from his home office, enjoying the flexibility that allows him to take Olivia for strolls to
      the local park or help Anna with gardening and meal prep. He is proud of his family''s multi-generational living arrangements,
      believing they foster stronger bonds and make childcare easier for everyone. Lately, he has spent weekends collaborating
      with his children on plans for their future homes, negotiating room layouts, landscaping, and the logistics of shared
      spaces.


      The Evans household is lively, often filled with the sounds of family dinners, laughter from board games, and the occasional
      squabble over whose turn it is to cook. David is keenly aware of the importance of maintaining privacy, harmony, and
      the character of their street, so he has worked hard to ensure their plans fit seamlessly with the neighborhood''s look.
      He worries at times about the stresses of aging parents and the challenges his children face in an expensive Sydney
      housing market, but he finds comfort in their mutual support and the sense of community within their home. His current
      concerns center on getting the garden ready for spring, keeping up with work deadlines, and making sure Olivia gets
      into a good preschool next year.'
