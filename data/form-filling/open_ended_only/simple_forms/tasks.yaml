      \ Birth: ___________________________\n\nPatient History Questions: Please Tell Me About Your Child...\n\n1)   Has your\
      \ child fainted or passed out DURING or AFTER exercise, emotion or startle?\n2)   Has your child ever had extreme shortness\
      \ of breath during exercise?\n3)   Has your child had extreme fatigue associated with exercise (different from other\
      \ children)?\n4)   Has your child ever had discomfort, pain or pressure in his/her chest during exercise?\n5)   Has\
      \ a doctor ever ordered a test for your child's heart?\n6)   Has your child ever been diagnosed with an unexplained\
      \ seizure disorder?\n7)   Has your child ever been diagnosed with exercise-induced asthma not well controlled with medication?\n\
      \n\t\tY    N\n\n_________________________________________________\nExplain \"Yes\" Answers Here\n\n_________________________________________________\n\
      _________________________________________________\n_________________________________________________\n_________________________________________________\n\
      \nCOVID-19...\n\n1)   Has your child been diagnosed with COVID-19?\n1a)  If yes, is your child still having symptoms\
      \ from their COVID-19 infection?\n2)   Was your child hospitalized as a result for complications of COVID-19?\n3)  \
      \ Has your child been diagnosed with Multi-Inflammatory Syndrome in Children (MIS-C)?\n4)   Did your child have any\
      \ special tests ordered for their heart or lungs or were referred to a heart specialist (cardiologist) to be cleared\
      \ to return to sports?\n5)   Has your child returned back to full participation in sports?\n6)   Has your child had\
