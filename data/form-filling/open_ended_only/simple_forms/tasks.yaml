      \ lives with her husband David, an HVAC technician, and their two daughters, Emily and Sophie, in a modest three-bedroom\
      \ home in the Willowbend neighborhood. Rebecca's mother, Helen, lives nearby and often helps with the girls, especially\
      \ during busy weeks. \n\nRebecca started making and selling handmade crochet hats and scarves on Etsy about four years\
      \ ago as a creative outlet and a way to bring in a little extra money. Her shop, \"Loop & Cozy,\" does especially well\
      \ in the fall and winter, bringing in around $2,200 a year on average, though sales can spike before the holidays. She\
      \ enjoys connecting with customers online and often spends evenings after dinner crocheting while the girls finish their\
      \ homework or watch TV. \n\nRecently, Rebecca has been focused on helping Emily adjust to middle school and supporting\
      \ Sophie as she joins a new soccer team. The family enjoys hiking at Mendon Ponds Park on weekends when the weather\
      \ allows, and Rebecca looks forward to her monthly book club with friends from college. She is attentive to managing\
      \ the household budget, especially with the unpredictable nature of her Etsy sales, and values the stability of her\
      \ job. Rebecca's main concerns lately have been balancing work obligations with family time, keeping up with the girls'\
      \ activities, and finding moments for her own self-care, like quiet mornings with coffee before the day begins."
  artifacts:
  - artifact_type: email
    content: 'Subject: Thank you again, Mom


      Hi Mom,


      I just wanted to say thank you again for sending the $200 this month for Emily’s sessions at Rochester Family Counseling
      Center. I know you’ve been doing this since January, and it really does make a difference. With David’s overtime still
      not back to what it was at Monroe Utilities Group, things have been a little tighter than usual, and I can’t tell you
      how much it helps to have your support—especially for Emily. She seems to like her counselor, even if she’s still a
      little shy in the waiting room (last week she told me she wished they had a dog in the office to make it less awkward!).


      We’re doing okay otherwise. Work has been busy as always, and Sophie starts her new soccer team this weekend (practice
      at 9am on Saturday, which is way too early for both of us). David says hi and wanted me to tell you he’s grateful too—he
      still feels bad about the lost hours, but I keep reminding him that these things happen and we’ll get through it together.


      Let me know if you want to come over for dinner next week. Maybe Tuesday or Thursday? I’ll make your favorite chicken
      pot pie.


      Love,

      Rebecca'
