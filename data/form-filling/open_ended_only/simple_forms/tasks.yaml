  - artifact_type: email
    content: 'Subject: Guild business and the Marcus affair


      Maela,


      I had to leave tonight’s gathering early—one of those parchment runners from the Collegium showed up at the Guild with
      news about Uncle Marcus. Guildmaster Evard needs me to translate a set of legal documents about the inheritance dispute,
      and apparently it can’t wait. I’ll be working late in the scriptorium, so don’t wait up for me.


      I’m honestly not sure where things stand with the Harthvale property after Marcus’s arrest last month. It’s all a mess—Evard
      says the council’s worried about how it’ll look if we don’t get the paperwork sorted before the next court session.
      I wish I could say more, but the details are confidential for now. Please check on Tomas—he’s been so unsettled since
      the school incident and the last tense meeting with Headmaster Brevin. If he wakes, remind him Papa will be home before
      breakfast.


      If you need anything, Evelyn’s staying at her place tonight but said she can help with the market stall tomorrow morning
      if you need extra hands. I’ll try to be home before the children are up, but I don’t know how late this will run.


      All my love,

      Rowan'
