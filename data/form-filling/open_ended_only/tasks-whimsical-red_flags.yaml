    background_context: 'Jennifer Martinez lives in Lewisville, Texas, where she balances a busy family life with her work
      as the STEAM Lab Coordinator and a science teacher at Vista Ridge Middle School. Her days begin early with preparing
      lunches for Elena and Miguel, making sure Sofia, her mother-in-law who moved in last year after a mild stroke, has her
      breakfast and medication, and catching up with Carlos over coffee before he leaves for his job as a logistics manager.
      The family enjoys weekend outings to the local parks and hosting neighborhood barbecues, bringing together the diverse
      community around them.


      At work, Jennifer is passionate about making science and technology accessible to all her students, especially those
      who are English language learners or from lower-income families. She recently spearheaded the opening of a new STEAM
      Maker Lab at her school, a project she spent months planning and has brought to life with the help of her colleagues.
      The lab is a vibrant, interactive space filled with 3D printers, robotics kits, and digital art tools, where she sees
      students from all backgrounds collaborating and growing in confidence. Jennifer is particularly proud of how the lab
      encourages girls to participate in STEM activities and how it''s become a hub for teacher collaboration and professional
      development.


      Lately, Jennifer has been juggling extra responsibilities as the school navigates post-pandemic learning challenges.
      She’s supporting students with special needs and mentoring a group of gifted eighth graders on a project to design green
      solutions for local water conservation. While she sometimes worries about balancing her workload and family obligations—especially
      ensuring Sofia''s continued recovery and being present for her children’s milestones—Jennifer finds fulfillment in the
      small moments: Elena’s excitement over her first robotics competition, Miguel’s curiosity about animals, and Carlos’s
      unwavering support. Her life is full and sometimes hectic, but it’s driven by a deep commitment to her family, her students,
      and her community.'
