  - artifact_type: email
    content: 'Subject: Quick Update (and a Thank You)


      Hi Mom,


      Just wanted to send a quick update and thank you for being so supportive this year. I know you’ve heard me talk endlessly
      about the chaos that’s taken over our dining table, but I realized the clutter is about more than just not having enough
      shelves. After Dad died in June, I felt like I was drowning in decisions. Cleaning out his storage unit in Durham with
      Lisa last July was a turning point—hardest weekend I’ve ever had. It still amazes me how much emotion can be tied up
      in boxes of old receipts and half-broken radios. Lisa was my rock through all of it, and she even got me hooked on the
      Clutter Coach podcast, which actually makes me feel less alone in the mess. The host says, ''You can’t organize grief,
      but you can give yourself grace,'' which I try to remember when the piles get high and the kids are melting down over
      missing homework.


      Work is busy—Wakefield started two new projects last week, and I’m back to balancing conference calls with Max’s search
      for his favorite socks. David’s picking up extra shifts at the clinic, so I’m holding down the fort more than usual.


      We’re all hanging in there. Maybe we can plan a visit soon, before the holiday craziness?


      Love,

      Jen'
