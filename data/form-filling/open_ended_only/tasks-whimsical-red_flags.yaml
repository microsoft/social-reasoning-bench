  - artifact_type: note
    content: 'Journal entry – Reflection after San Rafael Community Forum


      Tonight’s community forum at San Rafael High was a reminder of why I stick with this work—even when it’s nerve-wracking.
      I spent the afternoon prepping slides for the trauma-informed care segment and still felt my hands shaking when I started
      presenting. Public speaking has never come naturally, and it’s always a battle to keep my nerves in check in front of
      big groups. Daniel says I’m too hard on myself, but I just want to make sure the message lands.


      I did get some thoughtful questions from teachers about how to connect with families, especially those going through
      addiction or recovery. Shared a bit about my experiences supporting Lucia during her time at Serenity Oaks in 2015,
      handling her finances while she was in treatment, and what that taught me about empathy for families. I wanted to mention
      how my own therapy with Dr. Alicia Martinez at UCSF helped me understand the cycles of relapse, but ran out of time.
      It’s funny—there was a year where I stopped attending meetings altogether because I was frustrated with my local group
      and didn’t feel connected. Coming back was tough, but it gave me a deeper appreciation for what true fellowship looks
      like.


      Afterward, I chatted with a few parents—most from Latino backgrounds. I still feel most comfortable working with the
      community I grew up in. Maybe next year I’ll push myself to branch out and connect with more diverse groups. For now,
      I’m grateful for the familiar faces and the sense of shared purpose.


      —Evan'
