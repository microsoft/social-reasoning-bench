    content: "Subject: Quick Update – Self-Isolating for a Few Days\n\nHi Mom,\n\nI wanted to give you a quick update because\
      \ I know you worry! On Sunday, January 28th, I was called in to help Mark Miller, the respiratory therapist, with an\
      \ emergent intubation in the ICU at Springfield Memorial Hospital. The patient ended up testing positive for COVID-19.\
      \ I was double-masked and gowned, but you never know with those procedures – things happen fast, and it’s always a bit\
      \ chaotic.\n\nUnfortunately, about three days later, I started feeling a mild cough and a low-grade fever. Out of an\
      \ abundance of caution, I called Employee Health and let them know. They recommended that I self-isolate at home for\
      \ several days and monitor for any worsening symptoms. So, I’ve been staying in the guest room since Wednesday and keeping\
      \ my distance from everyone, just in case. David had to juggle his teaching schedule to stay home with Olivia and Matthew—luckily,\
      \ his school was able to adjust his classes so he could be remote for a couple of days. \n\nI ended up missing two shifts\
      \ at the hospital, which I hate doing, but I don’t want to risk exposing anyone else. The kids are a little confused\
      \ about why I’m hiding out, but we’ve explained that Mommy is playing it safe. Thank you for dropping off those groceries\
      \ and the soup—so helpful, as always. I’ll keep you posted on how I’m feeling. Fingers crossed it’s just a regular cold!\n\
      \nLove,\nJane"
