  - artifact_type: text
    content: 'Alice: Hey Soph, thanks for letting me vent last night. Things have been so tense with Max ever since I brought
      Barney home in May – we had a huge row and it hasn’t really settled. I really think moving is the best option for all
      of us. The landlord’s coming back anyway, so it’s not like we have a choice, but honestly, I’m relieved. Fernleigh Road
      feels too cramped now, especially with Barney’s energy and me working from home constantly.


      Sophie: I totally get it. Barney needs a yard! Have you found anything yet?


      Alice: Not yet, but we’re aiming to start tenancy around July 1, right after Max finishes at the Wellington Community
      Mental Health Clinic. Hoping that’ll help us all start fresh. Will you be around to help with boxes? Also, if you have
      room, could Barney stay with you for a day or two while we move?


      Sophie: Of course! Just let me know the dates. We’ll make it work. Hang in there, sis. Change is good sometimes.


      Alice: Thanks. Really appreciate it. Wouldn’t mind a quieter environment for a change, either – maybe somewhere with
      fewer noisy neighbours this time.'
