    field_label: Suggested Character Concepts
    value: A resourceful and cunning investigator with a background as a private detective, skilled at navigating the underbelly
      of 1930s Chicago. Grew up in a working-class neighborhood and learned early on how to read people and situations. He
      is motivated by a personal loss (his brother's mysterious disappearance) and is relentless in his pursuit of the truth,
      even when it puts him at odds with both the law and the criminal underworld. He leans on his sharp wit, natural curiosity,
      and strong morals, but is willing to bend the rules to resolve a case. His network of contacts among both police and
      criminals helps him find clues others miss.
