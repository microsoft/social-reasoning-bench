    content: 'Journal – Thursday


      I spend so much of my free time alone. Most days after work, I just want to curl up with a book or do crossword puzzles.
      I’m not really into group activities—reading, piano, and knitting are all solo pursuits for me. Sometimes I wonder if
      that’s why I feel so disconnected, especially now that Mom needs more care and Priya isn’t close by.


      Still, I love hearing stories from the seniors at the library and Carewest. Grandma’s time at Carewest Glenmore taught
      me how important it is for people to share their experiences, even if I’m just listening on my own. I’ll keep volunteering,
      even if my hobbies are mostly things I do by myself.


      Reminder: Bake low-sodium cookies for Mom (heart surgery at Foothills, March 2023). Schedule volunteer shift around
      her dialysis (Wednesdays, every other week, since May 2023). Finish knitting projects for donation. Practice piano for
      Friday’s club.


      Maybe I’ll try to join a community choir again this summer.'
