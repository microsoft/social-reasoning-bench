    content: 'Subject: Update on Recent Events & Family Matters


      Ayla,


      I know you’ve been anxious lately with everything happening in Silverport, so I wanted to give you a proper update after
      my shift. First, I spoke again with Captain Merrow at Watch HQ about the aftermath of the knife incident down at the
      docks on March 6. My medical leave officially ended last week, but per Merrow’s orders (and my own stubborn injuries),
      my current duties have been reduced. I’m capped at 120 points for the upcoming deployment rotation—frustrating, but
      necessary until I’m fully cleared. I know you worry, but this adjustment should give us more time together and let me
      walk Mira and Torin to school most mornings.


      Speaking of Mira, you know how the mediation sessions at Silverport Academy have been draining for both of us since
      her incident this spring. The counselors recommended we tread gently, and as such, I’ve had to apply that -2 penalty
      to all Influence Rolls involving family in our weekly campaign—felt fitting, given our reality! I’ll be home late after
      tomorrow’s session, so let’s talk about how we want to approach things as a family.


      On another note, I’ll take Mira to her therapy appointment at Silverport Children’s Clinic again this Thursday afternoon,
      unless you want to swap for my Sunday patrol. Her anxiety’s improved, but it’s best we keep her routine steady for now.


      And yes, I still worry about Rowan out on the rolling plains north of Silverport. After his ambush during border patrol
      last May, it’s hard not to. Every time the reports mention rebel activity near that region, I think of your family and
      hope he’s healing well.


      Let’s catch up tonight. Love you.


      —Edric'
