  - artifact_type: email
    content: 'Subject: Mom''s input at the community meeting


      Hey Ethan,


      Hope your week is going okay—good luck with AP lit, by the way. I wanted to tell you about something that happened at
      the neighborhood meeting last month at the Springfield Community Center. Grandma (Carol) actually came out for it, even
      though she hates crowds. She rolled over from her apartment on Maple Avenue with her scooter and spoke up about how
      hard it is to get from her place to the store with all the uneven pavement and the lack of proper curb ramps.


      After her comments, I got the project team to adjust the scope to make sure ADA-compliant curb ramps will be included
      near her apartment at 101 Maple Avenue. I know she’s been struggling since her Parkinson’s diagnosis, and it’s been
      tough for her to get around safely. I felt pretty proud that her voice made a difference and that our project will help
      more than just her—it’ll help a lot of people in the neighborhood. Plus, it’s still exempt from a big environmental
      review, so we don’t have to worry about delays.


      We’re aiming for construction to start in mid-May. Maybe you can help me walk Grandma through the new ramps when they’re
      done, show her how much easier her route will be. She keeps asking if you’ll come visit more when school lightens up.


      See you at dinner Sunday. Let me know if you need a ride.


      Dad'
