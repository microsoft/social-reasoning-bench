    background_context: 'Jennifer Carter is a busy project manager at Wakefield Consulting Group in Raleigh, where she’s worked
      for just over five years. Her role is demanding but flexible—since the pandemic, she now works from home three days
      a week and commutes to the office for two. This hybrid arrangement has given her more time with her kids, Sophie and
      Max, but it’s also blurred the lines between work and home, especially as she’s been using the dining room as her makeshift
      office. The family’s routine is lively: weekday mornings involve prepping lunches, finding Max’s missing socks, and
      making sure Sophie gets on the school bus in time. Her husband, David, works as a physical therapist at a local clinic,
      and their weeknights are filled with homework, dinner prep, and the occasional family movie night.


      Over the last year, Jennifer has noticed the clutter at home creeping into her sense of well-being. The dining table,
      once reserved for Sunday breakfasts and art projects, is now a busy pile of work documents, school notices, unopened
      mail, and the odd Lego creation. She’s always been a bit of a perfectionist, which makes the growing mess even more
      stressful for her—she sometimes ends the day feeling frustrated by the visual chaos and her inability to keep up. Despite
      trying different organizing apps and productivity books, lasting change has been elusive. Still, she’s proactive: she
      finds inspiration in self-improvement podcasts and has recently started taking 15-minute decluttering breaks after work,
      sometimes involving Sophie or Max to make it a family effort.


      Outside of work, Jennifer cherishes weekend hikes at Umstead Park and family bike rides to the local ice cream shop.
      She’s close with her friend Lisa Moore, whose advice on home organization has sparked Jennifer’s own efforts to tackle
      her habits. Jennifer is driven by the desire to create a calmer, more joyful home environment and to free up evenings
      to spend quality time with her family—without the nagging worry of unfinished chores or misplaced school forms. Her
      current focus is building sustainable routines, staying accountable, and learning to let go of perfection so she can
      enjoy the everyday moments that matter most.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Catching up (finally!)


      Hey Sarah,


      I know, it’s been forever! I was thinking about you this morning when I found a note from last summer stuffed in my
      planner (the one with the coffee stain 🤦‍♀️). It was from that wild week in July when I was knee-deep in Dad’s old papers
      at the Durham storage unit. Sometimes it still hits me how quickly everything changed after he passed away—June was
      such a blur, and then suddenly I was sorting through boxes of his life with Lisa. I honestly don’t know how I would’ve
      gotten through it without her. She came down, rolled up her sleeves, and just made the whole thing more bearable. We
      ended up laughing and crying over the weirdest things—Dad’s collection of mismatched mugs, those old postcards from
      Myrtle Beach, and even that awful painting of a cat he claimed was ''folk art.''


      Lisa was the one who put me onto the Clutter Coach podcast, actually. I remember her saying, ''If you can’t handle the
      emotional side of the mess, you’ll never get through the physical stuff.'' It was weirdly comforting, and I’ve been
      listening ever since—especially when the house starts to look like a tornado hit and I’m ready to flee to a hotel. I
      know you get it; you’ve seen my dining table on Zoom! The podcast host talks a lot about how clutter and grief overlap,
      which I hadn’t really realized until I was there, sobbing over a box of old birthday cards.


      Work’s been its usual chaos. Wakefield is ramping up again after the summer lull, so I’m back to juggling project timelines
      from my ''office'' (aka the end of the dining table wedged between Sophie’s art supplies and Max’s Lego fortress). Still,
      I’m trying to make space for the hard stuff—both literal and emotional.


      Would love to catch up properly soon. How’s everything on your end? And is your mom still thinking about moving down
      near you?


      Love,

      Jen'
