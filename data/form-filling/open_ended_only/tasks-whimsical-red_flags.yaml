      - Mediterranean bowls with chickpeas, cucumbers, tomatoes

      - Angela’s black bean soup recipe


      Also, refill my water bottle after last period so I’m not dying of thirst at practice. Try to swap out granola bars
      for real fruit. I’m proud that we’ve all stuck with the changes even though Dad keeps joking about “missing the old
      Saturday breakfasts.”


