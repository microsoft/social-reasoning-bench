    content: 'Subject: Clutter Coach Podcast & Lisa’s Good Advice


      Hi Lisa,


      Quick note to say THANK YOU again for everything you did last July. I can’t believe it’s been almost four months since
      we tackled Dad’s storage unit together in Durham. That was such a heavy weekend—so many emotions, memories, and honestly,
      so much junk! I still laugh about that moment you pulled out the broken lava lamp and said, ''This is the emotional
      support object you didn’t know you had.''


      I finally started listening to the Clutter Coach podcast, just like you suggested. The episode about letting go of guilt
      when decluttering really hit home. It’s funny, but I’ve caught myself thinking about Dad’s random keepsakes every time
      I pass the dining table and see another pile forming. I think some of the overwhelm I feel at home lately is connected
      to all that grief and mess from the storage unit. I’m trying to build better habits, but it’s slow going. I take a 15-minute
      timer and force myself to tackle a pile, even if I just move it from one corner to another. Progress, not perfection,
      right?


      Hope you’re doing well. Maybe we can plan a girls’ hike at Umstead soon? I could use some fresh air and your organizational
      wisdom!


      Hugs,

      Jen'
