  - artifact_type: note
    content: 'Journal – restless patterns


      Another move. I can’t help but notice how I get itchy feet every couple of years – Fernleigh Road was supposed to be
      more permanent, but I’m already scanning listings. Maybe it’s the landlord’s family coming back, maybe it’s the fallout
      with Max after Barney, or just the sense that I need a change of scenery. I’ve always done this, haven’t I? Change jobs,
      change flats, change routines.


      Max’s final outpatient session at Wellington Community Mental Health Clinic is June 28th. The timing worked out, in
      a way – we can start fresh in July, ideally the 1st. This time, I want to find a place that fits where I’m at: outdoor
      space for Barney, a real home office, and somewhere quiet enough to work and rest.


      Maybe I’ll settle longer this time. Maybe not. But at least I’ll get to pick a space that fits the life I have now.'
