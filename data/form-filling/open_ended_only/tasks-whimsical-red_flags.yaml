  - field_id: financial_information.briefly_tell_why_the_congregation_cannot_undertake_this_project_by_itself
    field_label: Briefly Tell Why The Congregation Cannot Undertake This Project By Itself
    value: Our congregation is relatively small and skews toward retirees living on fixed incomes, with a handful of young
      families. Although everyone gives generously within their means, our annual operating budget is just enough to cover
      utilities, salaries (our pastor is part-time), and basic maintenance. In recent years, we have had to dip into our reserves
      to address emergency plumbing repairs and replace an aging HVAC unit. The cost estimate for the roof and window repairs
      is $41,200, which is nearly our entire annual budget. Raising this amount ourselves would take years and would risk
      neglecting other necessary operating expenses. Many of our members already volunteer their time for cleaning, gardening,
      and Sunday school, but the scale of these repairs is beyond both our financial and physical capability.
