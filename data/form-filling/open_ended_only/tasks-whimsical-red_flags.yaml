    extracted_text: 'TenancyServices


      Pre-tenancy application form


      Please complete this form to apply for the tenancy at the address below. The information you provide is for applying
      for this tenancy and may be used for a credit and reference check. Your privacy is protected under the Privacy Act 2020.


      -----------------------------------------------------------

      Tenancy details

      -----------------------------------------------------------

      Property address: _______________________________________________________


      Commencement of tenancy: ____________________    Date: ____/____/____


