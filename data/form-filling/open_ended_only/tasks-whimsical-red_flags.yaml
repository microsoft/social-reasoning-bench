    background_context: 'Melinda Sanchez is a dedicated public health professional living in Indianapolis, Indiana, where
      she manages the Office of Vital Records for the Indiana Department of Health. Her department is responsible for processing
      and issuing vital documents for Indiana residents, a role she takes great pride in. Melinda often spends her weekdays
      juggling emails, coordinating with staff, and ensuring all procedures comply with privacy laws. She recently oversaw
      a major update to their certificate mailing process, making sure sensitive documents are handled with extra care and
      privacy—something she’s passionate about given the importance of vital records for families across the state.


      At home, Melinda is a busy mom to Elena, who just finished fifth grade and is excited about starting middle school,
      and Luis, who loves soccer and is gearing up for summer league games. Melinda’s husband, Carlos, works as a project
      manager for a local construction firm, and with both parents working full-time, the Sanchez family often relies on Maribel,
      Melinda’s mother, to help with school pickups and after-school snacks. Weekends are reserved for family outings to Eagle
      Creek Park or visits to local museums, and Melinda enjoys gardening with Elena and cheering for Luis at his games.


      Recently, Melinda has been working remotely more frequently, balancing the demands of her job with caring for her children,
      especially as summer begins. She’s also concerned about her mother’s health, as Maribel has been experiencing mild mobility
      issues, prompting Melinda to look for accessible summer activities the whole family can enjoy. Melinda is mindful of
      her work-life balance, carving out time each evening for family dinners and catching up on favorite shows. She is respected
      by her colleagues for her attention to detail and commitment to serving Indiana residents, and she feels grateful for
      the support and stability her family provides.'
