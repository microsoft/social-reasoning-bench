    content: 'Subject: Weekend plans and old volunteering stuff


      Hey Sana,


      Any chance you’re free for coffee this weekend? If not, maybe next week after my shift at the library. I’ve got a lot
      of free hours lately—my part-time schedule leaves so much open space in the afternoons. Sometimes I just end up binge-watching
      TV shows and scrolling social media for hours on end, which isn’t exactly inspiring. I’m trying to fill the time with
      something meaningful, so I started volunteering again. Hoping it sticks this time.


      I used to volunteer before, but honestly, I got bored after a few months and drifted away. Maybe it’ll be different
      now with Mom’s health stuff and everything else going on. She’s still going to Foothills for dialysis every other Wednesday
      and being careful with her diet since that heart surgery last March. I’ve been baking her bread and cookies, which she
      loves.


