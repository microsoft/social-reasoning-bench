    background_context: 'Michael Campbell has settled into a steady routine as a Mail and Logistics Specialist at the University
      of Wisconsin-Madison, where he’s worked for the past six years. His role spans several locations across campus, from
      the bustling Central Mail Sorting Room and Copy Center to the busy Supply Storage Room and the IT Services break room.
      His days are a mix of sorting mail, collaborating with print center staff, managing inventories, and taking quick breaks
      with his team. The work environment is lively but sometimes hectic, especially during peak hours when multiple departments’
      mail arrives or large print jobs come in for the end-of-semester rush. Maintaining physical distance isn’t always possible,
      so Michael keeps up with university health protocols and feels a sense of camaraderie with coworkers navigating the
      same challenges.


      At home, Michael lives in a cozy apartment near the university with his wife Jessica, who teaches third grade at a local
      elementary school, and their two children: Lucas, who’s in second grade and recently started soccer, and Abby, who enjoys
      arts and crafts. Weekdays are a careful balancing act; Michael’s mornings start early as he helps Lucas pack his backpack
      and Abby pick out her favorite sweater before school. Jessica’s teaching schedule means Michael often handles afternoon
      pickups and dinner preparations, a routine he’s grown to enjoy. The family recently spent a weekend visiting Michael’s
      parents in Milwaukee, a welcome break from the usual weeknight homework and work emails.


      Michael’s biggest concerns lately revolve around rising rent in Madison and the challenge of finding more space, as
      the kids share a room and Abby is lobbying for her own. He’s also keeping an eye on university announcements about workplace
      safety and future shifts in campus operations. Outside work, Michael is a committed weekend runner and volunteers occasionally
      at the university’s spring recycling drives. He looks forward to summer, when the family tradition of camping trips
      to Devil’s Lake State Park returns, giving everyone a chance to unplug and reconnect.'
