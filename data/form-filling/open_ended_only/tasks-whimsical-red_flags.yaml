  - artifact_type: note
    content: 'Title: Booking Log – Small Venues


      Most of my performances so far have been at small bars or cafes around Toronto—places like The Cameron House and Dakota
      Tavern. Usually fewer than 40 people in the audience, which feels manageable, but sometimes I wonder what it would be
      like to play an outdoor venue. All the festivals we’ve done have been indoors or in tents, not proper outdoor stages.


      Still, the intimacy of the smaller crowds lets me connect more. I remember the Beaches Jazz Festival last spring—almost
      canceled, but with Marcus’s help (and Dr. Chen’s breathing exercises), made it through. It’s funny how the biggest crowds
      still feel overwhelming, even though most shows are tiny.


