  - artifact_type: email
    content: 'Hi Emily,


      Just a quick note between errands. I wanted to say I’m so grateful I was able to spend time in Jacob’s classroom last
      spring, especially after everything he went through with those boys at Maplewood Elementary. Volunteering weekly was
      tiring sometimes, but I could see him relax and open up more each week, and it made a real difference with his anxiety.
      I know I tend to get too involved sometimes, but these past few months really reminded me why I love working with kids—even
      when it’s hard.


