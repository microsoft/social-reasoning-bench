    content: 'Personal Journal – 2024-05-17


      David’s anxiety spike last month really threw our whole routine out the window. I hate seeing him struggle, and the
      unpaid leave from Wellpinit Middle School was hard. Not only was he home (which meant I was juggling work and home stuff
      even more), but missing that paycheck meant we were late on the Camry payment with Numerica. First time that’s happened
      since we bought the car. It’s frustrating—I try so hard to keep us on track, and still, life finds a way to knock things
      sideways. Thankfully we caught up as soon as we could. I keep telling myself that we’ve managed bigger bumps before,
      but it still weighs on me.


      On a brighter note, Emily got her dorm assignment at Western! She’s over the moon. I’m proud of her, but I feel this
      strange ache thinking about her leaving. I need to remember to pick up more moving boxes and double check our to-do
      list for her orientation. Also, grocery list: coffee, arnica cream for David, and more allergy meds for Jacob.


      I’ve had trouble keeping up with payments in the past, but I’m hoping things will improve this time around. We just
      need a few boring, uneventful months—wishful thinking, I know.


      Tomorrow: finish prepping for the patient ed session and send RSVP for church health fair.

      '
