    background_context: 'Elaine Davis lives just outside Evergreen, Colorado, on a quiet rural lane near Cottonwood Valley.
      She has worked as a bookkeeper for the local Aspen Ridge Veterinary Clinic since 2005, a position she cherishes for
      its steady hours and the friendly, animal-loving atmosphere. Since the passing of her husband Philip from a sudden illness
      in early 2022, Elaine has managed to maintain a sense of routine, though the transition to single parenthood has been
      challenging. Her daughter Jessica, now 19, recently finished her first year at the University of Colorado Boulder, and
      tuition payments have been at the forefront of Elaine''s financial concerns.


      The family owns a 10-acre parcel of unimproved pastureland in the Cottonwood Valley Subdivision. Elaine and Philip originally
      bought the land together in 2003, hoping one day to build a small home or perhaps start a tiny horse farm. Over the
      years, the lot has remained untouched except for the occasional grazing of a neighbor’s horses—arrangements that helped
      keep the grass mowed and fostered a sense of community. Now, with Jessica’s college expenses mounting and the cost of
      living steadily rising, Elaine is carefully planning to sell half of their land. She hopes the sale will help alleviate
      financial pressure and cover the next few semesters for Jessica.


      Her days are steady but full: mornings are spent reconciling accounts and managing payroll at the clinic, while evenings
      often involve phone calls with her sister Linda in Denver or walks along the edge of the family’s property. Weekends
      see her tending a small vegetable garden, meeting friends at the Evergreen Library book club, and looking after the
      needs of their aging beagle, Daisy. Lately, Elaine has found herself reflecting on her late husband’s legacy, balancing
      her grief with the steadfast resolve to support her daughter and preserve the family’s modest dreams for the future.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Land Sale and College Payments


      Hi Linda,


      I’m finally sitting down after a long day at the clinic and wanted to catch you up on everything. Since Philip’s passing
      at St. Anthony Hospital last July, things have been a roller coaster. The mortgage on Cottonwood Lane has been a real
      headache—there are days I worry about how much longer I can keep up with it. I think the only way forward is to sell
      half the parcel, just like we talked about. The title company flagged some issue with the way the land was originally
      divided, but apparently, we can fix it by splitting it into two 5-acre lots, which matches current zoning. I wish we’d
      checked all those details back in 2003, but I just assumed everything was in order.


      Jessica’s tuition for the fall semester at Colorado State University is coming up fast—$7,200 due upfront. I’ve been
      trying to piece together enough from savings and the clinic paycheck, but it’s not adding up. The land sale would cover
      tuition and help keep the mortgage from slipping into delinquency. I hate feeling this pressure, especially after losing
      Philip. I know he’d want us to do whatever it takes to keep Jessica on track and out of debt.


      Let me know if you have any contacts who might be interested in pastureland, or if you can recommend someone who’s dealt
      with county land division issues before. I could use a little moral support, too! Maybe we can go for a walk next weekend
      if you’re free—I’ll bring Daisy, and we can reminisce about the old days.


      Love,

      Elaine'
