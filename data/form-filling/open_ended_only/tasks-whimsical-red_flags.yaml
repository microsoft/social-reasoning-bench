    background_context: 'Ellen Sutherland is a dedicated HR manager at a mid-sized consulting firm in Plano, Texas, where
      she’s worked since 2017. Her days are a careful balancing act: she typically wakes early to help her teenage son Lucas
      get ready for junior high, then checks in on her daughter Emma’s plans—Emma is a high school senior preparing for college
      and working part-time at a local bakery. Ellen’s husband, Gregory, is a project engineer with a busy travel schedule,
      so Ellen manages most of the household logistics. They live in a quiet cul-de-sac, close to her widowed mother, Helen,
      who often joins the family for Sunday dinners.


      Ellen has been living with moderate to severe rheumatoid arthritis for several years. While her job allows for flexible
      hours, her condition means she has to plan her days carefully, especially during flare-ups. For the past three years,
      Humira has been critical to keeping her pain and fatigue under control, enabling her to remain active with her family
      and engaged at work. She’s concerned about her recent insurance denial for Humira, especially after previous unsuccessful
      trials of Enbrel and Remicade. She tries to stay positive for her family’s sake but is anxious about her ability to
      maintain her job and support Emma’s upcoming college transition if her symptoms worsen.


      Despite these challenges, Ellen remains involved in her kids’ activities—attending Emma’s choir recitals and Lucas’s
      soccer games whenever possible. She’s also part of a neighborhood book club and volunteers for the annual Plano Art
      Fest. Lately, her focus has been on advocating for her own health, keeping in close contact with her rheumatologist,
