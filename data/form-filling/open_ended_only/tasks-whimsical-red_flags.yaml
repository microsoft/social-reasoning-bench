    content: "Subject: This morning with Mom\n\nHi Janet,\n\nJust wanted to send you a quick update about how things went\
      \ this morning. When I got to Shady Grove around 7:30, Mom was still in bed and seemed pretty out of sorts. She kept\
      \ asking for Tommy over and over, and seemed really distressed that she couldn't remember exactly what happened to him.\
      \ It was heartbreaking—she was crying, and I could tell she was both confused and scared. \n\nNurse Karen Lewis was\
      \ already in the room and did her best to comfort her, but Mom was really inconsolable. Dr. Patel was on call, so Karen\
      \ called him and he recommended giving Mom 0.5mg Ativan before the ambulance came for her appointment at Memorial Medical\
      \ Center. I stayed with her while Karen administered the medication, and it did seem to help a little, though she was\
      \ still pretty weepy until the transport crew arrived.\n\nI know these transports are so hard for her, especially when\
      \ she's already upset. I made sure to remind the ambulance crew to be extra gentle with her right hip—she's still having\
