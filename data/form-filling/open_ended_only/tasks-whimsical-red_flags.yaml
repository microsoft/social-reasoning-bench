  - artifact_type: note
    content: "Note to self – Moving & flat search\n\nFernleigh Road has been home for over two years, but the walls feel closer\
      \ than ever. After that blow-up with Max in May about Barney, it’s clear our current routine isn’t working. The landlord\
      \ returning was just the last push. I need a quieter spot with a garden for Barney, and space for a proper home office\
      \ – too many press releases written on the couch lately.\n\nMax’s outpatient treatment at Wellington Community Mental\
      \ Health Clinic wraps up on June 28th. We both need a fresh start after all the stress. Start tenancy ideally on July\
      \ 1st, but okay to move a few days later if needed. Look for listings in Kelburn, Thorndon, or Karori – somewhere peaceful\
      \ but close to family and work. Must have outdoor space, not just a balcony.\n\nRemember to follow up with Sophie about\
      \ storing boxes during the transition. Call Dad about borrowing the van for moving day. Make a list of repairs landlord\
      \ still hasn’t fixed before leaving – don’t leave anything unresolved. \n\nKeep reminding myself: change is good. This\
      \ is a chance to build something better for Max, Barney, and me."
