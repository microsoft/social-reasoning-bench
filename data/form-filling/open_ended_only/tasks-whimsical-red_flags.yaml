  - artifact_type: note
    content: 'Personal journal entry – Tuesday


      I keep coming back to Grandma’s time at Carewest Glenmore last year. March 2023 she was admitted, and by November she
      had that awful fall in her room—ended up at Foothills for a week. The volunteers really helped during the hospital transfer
      and made such a difference when she was scared and confused. Seeing that, I just want to offer the same support to others.
      I remember how the staff at Foothills handled Mom’s heart surgery and now her dialysis, but there’s something about
      volunteers that makes the environment warmer.


      Honestly, my part-time shifts at the library don’t fill up my week and I get bored at home. I need something to keep
      me busy, especially now that Mom’s medical appointments are routine and Priya’s not around to chat in person. Volunteering
      gives me a reason to get out, meet people, and maybe even learn some new skills. Sometimes I wonder if I should push
      for a full-time job, but for now, this keeps me moving.


      The scarves and hats for the shelter are coming along—I’m halfway through my third set. Baking more low-sodium bread
      tomorrow. Maybe I’ll try a new recipe for Mom. Need to schedule piano practice and finish that book club reading for
      Friday.'
