      \ North Carolina. As an Outdoor Event Coordinator for MountainVista Adventures, he spends his workdays collaborating\
      \ with local parks, managing trail race logistics, and ensuring the safety and sustainability of the events his company\
      \ hosts. He’s passionate about outdoor recreation, and his weekends often involve scouting new trail routes, meeting\
      \ with volunteers, or testing sections of mountain bike courses. Recently, James has been especially focused on planning\
      \ the 2024 Blue Ridge Trail Challenge, an annual adventure race that draws outdoor enthusiasts from across the region.\
      \ He’s proud of his efforts to make the event environmentally conscious, emphasizing Leave No Trace principles and fostering\
      \ partnerships with local conservation groups. \n\nAt home, James and his wife Emily, a physical therapist at Pardee\
      \ Hospital, split parenting duties for their two kids, Sophie and Liam. Weekday mornings are a whirlwind of packing\
      \ lunches, helping with homework, and making sure everyone gets out the door on time. In the evenings, the family enjoys\
      \ hiking together in DuPont State Recreational Forest or riding bikes at the nearby Oklawaha Greenway. James’s mother,\
      \ Barbara, lives just a few miles away and helps with after-school pickups. They’ve recently been adjusting to a new\
      \ routine, as Liam started kindergarten this fall and Sophie just joined her school’s chess club. \n\nJames is conscious\
      \ of balancing work and family, especially as his projects sometimes require early mornings and weekends. He’s grateful\
      \ for Emily’s support and the flexibility of his job, but sometimes worries about keeping up with the physical demands\
      \ of both his work and his personal outdoor pursuits. Lately, he’s been trying to carve out more time for family camping\
      \ trips and to take better care of an old knee injury that flares up after long days on the trail. Despite the busy\
      \ pace, James finds fulfillment in building community through outdoor adventure and cherishes watching his kids develop\
      \ a love for the forests and mountains he calls home."
  artifacts:
  - artifact_type: email
    content: 'Subject: Blue Ridge Trail Challenge Details + Family Update


      Hi Mom,


      Just wanted to send a heads-up about the Blue Ridge Trail Challenge coming up next month at Guion Farm. We’re knee-deep
      in logistics right now, and I’ve been spending way too much time wrangling volunteer schedules and making sure we have
      all the safety gear ready. The Triple Falls Trail and Lake Imaging Trail are going to be busy that day, but we’ll make
      sure the base camp is well-organized so everyone knows where to go.


      Sophie is really excited to help as a junior volunteer this year, mostly at the water stations along Triple Falls. She’s
      been talking non-stop about how she wants to make sure everyone has enough water and snacks—even drew a little sign
      for her station. I’ll keep her inhaler at the base camp in case her asthma acts up (Dr. Chen at Hendersonville Pediatrics
      said she should always have it handy, especially during outdoor activities). She’s feeling pretty confident since her
      diagnosis last March, but I’ll make sure to check in with her throughout the day.


      Liam’s more interested in the bikes but probably won’t get to do much except cheer from the sidelines. Emily and I are
