    content: 'Subject: Quick catch-up – dog walks, work, and flat hunt


      Hey Dad,


      Just a quick update. Barney is settling in well, though he’s made the flat feel even smaller than it already was! Max
      and I had a pretty tough argument back in May about adopting him, but things are improving slowly. We’re both working
      from home a lot more, and with the landlord moving back in, the hunt for a new place is on.


      We’re hoping to move around July 1st, right after Max finishes at the Wellington Community Mental Health Clinic (his
      last session is June 28th). Ideally, we’d like to find somewhere with a garden so Barney can play, and I can finally
      have space for a proper home office.


      Any chance you can help with the van for moving day? I’ll need to coordinate with Sophie on dates, too. Let me know
      if there’s anything I should remember about loading boxes or getting the deck furniture moved.


      See you Sunday for lunch!


      Love,

      Alice'
