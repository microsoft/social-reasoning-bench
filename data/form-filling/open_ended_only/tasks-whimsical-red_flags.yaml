      bike lanes, ADA sidewalks, high-vis crosswalks, and better lighting—feels personal now. We’re not just talking about
      theoretical benefits; this is about making sure no other kid (or parent) gets that phone call from school. The city’s
      plan specifically targets the corridor between Dutton Ave and Fulton Rd, which means safer routes for both Evan (biking
      to Santa Rosa High) and Sophie (walking with her friends).


