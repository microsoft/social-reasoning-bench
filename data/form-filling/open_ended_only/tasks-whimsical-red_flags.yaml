  - artifact_type: email
    content: 'Subject: Catching Up – Church Repairs and Life


      Hi Lorraine,


      It’s been a while since we had a good phone chat, so I thought I’d send a quick update before I forget everything that’s
      happened this week. Church has been a headache, honestly—every time it rains, the leaks seem to find a new spot. The
      sanctuary ceiling has more stains, and I’m always nervous it’ll start dripping right in the middle of Pastor Tom’s sermon!
      The fellowship hall is worse; last Thursday, the Sunday school kids had to meet in the pastor’s office because of the
      smell and mold. Dr. Foster (the pediatrician who sits two pews ahead of me) stopped by and said we should keep the little
      ones, especially Samantha, well away from there. Poor kid—her asthma’s been acting up, so I’m grateful Linda caught
      it before it got worse.


      Robert’s doing a little better this week, but he’s so tired after those two hospital stays this spring for his heart.
      I’m still at Cedar Grove Physical Therapy for my shoulder, so between the two of us, we’re not much good for hauling
      supplies or fixing anything major. A few folks at church keep saying we ought to just patch things ourselves or do a
      quick fix, but I’m worried that’ll just make things worse. I wish we had a bigger, younger crew—most of us are retirees,
      and there’s only so much we can do.


      Anyway, I hope you’re well. Let’s set a time for a call soon—maybe after my PT next week? Miss your stories and your
      laugh.


      Love,

      Margaret'
