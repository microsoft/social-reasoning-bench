  - artifact_type: note
    content: 'Reflection – Family Changes Since Darius’s Diagnosis


      It’s been about six months since Darius’s cholesterol diagnosis at Banner University Medical Center. I still remember
      sitting in Dr. Patel’s office last September, listening to Mom ask a million questions and Dad looking like someone
      just canceled Christmas. At first, I was annoyed that the no-pork rule had to apply to all of us, not just Darius. But
      honestly, it’s been good for me too—I’m eating more vegetables and actually reading what goes into my food.


      Sometimes I miss pepperoni pizza at lunch or the smell of bacon on weekends, but I know why we’re doing this. Darius
      is only 13 and already has to think about his health way more than any kid should. I try to be supportive and not act
      like it’s a big deal when I pack my lunch or we have to ask about ingredients at restaurants. It’s weird, but it’s also
      brought our family closer—meal planning together, coming up with new recipes, even Dad learning to cook tofu (still
      not great, but he’s trying!).


      I want Darius to know we’re all in this together. It’s not just his problem—it’s a family thing. And honestly, if it
      keeps everyone healthy, it’s worth it.


      —Laila'
