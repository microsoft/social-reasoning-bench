  - artifact_type: note
    content: 'Reflection: Why the Maker Lab Matters


      I keep coming back to that first semester Elena started at Vista Ridge, spring 2023. Her transition to middle school
      was so much harder than I expected—she barely spoke at lunch, and her anxiety was through the roof. But when she started
      working in the old science room with the STEAM club, something clicked. She said, “Mom, I don’t have to talk much—I
      can just build.” Watching her confidence grow through those hands-on projects inspired me to imagine a bigger space,
      for all the kids who feel like outsiders.


      Now, seeing Elena help other students in the new lab, I know we’re doing something right. So many of our 6th graders
      this year are struggling with anxiety—it’s not just my child. Ms. Ramirez has helped us adjust some routines, giving
      Elena and others a chance to participate without feeling watched or judged. I wish I could give every student that sense
      of belonging.


      The lab isn’t just about robotics or 3D printing—it’s about giving students a chance to find their voice. That’s what
      keeps me motivated when the paperwork piles up or I feel spread thin at home.


      Reminder: Set up a gratitude board in the lab next week. Let kids post what they’re proud of, even the small stuff.


      —J.M.'
