    content: 'Subject: Montreal Update – Music, Anxiety & Sophie


      Hey Sophie,


      Hope you’re surviving the Montreal winter! I miss our late-night tea chats. Things here are busy as usual—Silver Maple
      Duo has more bookings since the CBC feature, but I’m still teaching lessons to help with rent. Toronto’s getting harder
      to afford, but I’m managing.


      Wanted to share something I haven’t told many people. Last spring, I started seeing Dr. Angela Chen at the Riverside
      Mental Health Clinic. My performance anxiety got pretty intense—especially before the Beaches Jazz Festival. I was backstage,
      absolutely panicked, and almost canceled. Marcus talked me down and Dr. Chen’s breathing exercises helped. It’s a work
      in progress, but I’m learning to manage it.


      Marcus and I are working on new originals inspired by our Canadian roots. I still get jittery before shows, sometimes
      forget lyrics or chords, but it’s getting a bit better. Let me know if you want to hear the demo!


      How’s grad school? If you need to vent, text me anytime. Love you!


      – Julia'
