  - artifact_type: email
    content: 'Subject: Ambulance Rides


      Dear Janet,


      After what happened with Thomas last May, these ambulance rides have been so hard for me. I get so anxious every time
      I hear a siren or see them coming. It brings back all those memories and I just can''t stop thinking about him, especially
      when I''m already in pain and confused about what day it is. Sometimes it feels like I''m about to faint before they
      even get me on the stretcher.


      Thank you for asking them to send only female EMTs for the hospital transfers from Beaumont. It really makes a difference,
      knowing that everyone is gentle and understands how fragile I feel. I wish I didn''t get so dizzy and panicked, but
      my heart just races and my mind goes in circles. You''re always looking out for me, even when I''m not myself. I hope
      you know how much it means.


      Love always,

      Mom'
