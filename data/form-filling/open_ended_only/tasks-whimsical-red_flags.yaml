    content: 'Subject: Quick Check-in — Garrick, Torin, and Book Notes


      Ayla,


      Just a quick note between patrols. I’m heading up toward Frostwell Creek this weekend to check on the ridge where Garrick
      slipped last January. I still can’t believe the snow gave way and sent him tumbling while he was just gathering pine
      for firewood. The slopes north of Silverport are treacherous, and I want to see if the gorges are any more stable this
      year. Maybe Mira and Torin can join if the weather’s fair—though I’ll keep them well away from the ridge!


      Also, I spent some time yesterday reviewing the GURPS Magic book (the copy with your notes tucked in the back). On September
      15 last year, I annotated the section on enchanted items and referenced the amulet you received from High Priestess
      Maris at Silverport Temple after your illness last winter. There are some interesting side effects if it’s worn daily—let
      me know if you’d rather I leave that part out of the campaign. I want to make sure you’re comfortable if I use details
      from our own lives in the stories.


      By the way, I’ve been thinking about the rules for critical injuries in the campaign. Torin’s overnight stay at Silverport
      Memorial Hospital after his fall on March 12 made me realize how important it is to make recovery times realistic—especially
      for children. He’s bouncing back well, but it stuck with me.


      I’ll be home for supper unless duty calls. Give the kids a hug from me.


      —Edric'
