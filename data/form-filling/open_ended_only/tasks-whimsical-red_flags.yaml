      have lived in their South Sacramento home for more than a decade, raising their two children, Evan and Emily. Their
      house is just a mile from Florin Road, so changes to the corridor impact their commute, routines, and neighborhood life.
      Brian enjoys cycling to work when possible, which has made him especially attuned to the need for safer bike lanes and
      pedestrian crossings in the area.


      In recent months, Brian has been busier than usual overseeing several infrastructure upgrades in the city, including
      preparations for the long-anticipated Florin Road Corridor Improvement Project. He often finds himself discussing construction
      timelines and alternate routes with neighbors, who know him as both a helpful neighbor and the local ''road guy.'' On
      weekends, Brian and his family like to visit the Sacramento Zoo or take walks at William Land Park, and he regularly
      volunteers with the high school robotics club that Evan is part of. With Emily starting soccer this spring and Trina
      coaching the school''s mathlete team, their schedules are packed, but Brian always tries to carve out time for family
      movie nights.


      Lately, Brian has been concerned about balancing work deadlines with family needs, especially since Trina''s mother
      recently had surgery and needs extra support. He and Trina take turns helping out with errands and appointments for
      her mom. Brian is hopeful that the improvements on Florin Road will ease local traffic and make the neighborhood more
      walkable for his kids, especially since Emily is eager to start biking to her friend''s house this summer. He looks
      forward to a summer camping trip to Lake Tahoe, a tradition the family has enjoyed every year since the kids were little.'
