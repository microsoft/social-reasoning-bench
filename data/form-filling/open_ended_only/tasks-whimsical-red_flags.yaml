  - artifact_type: note
    content: 'Personal Note – Goals for 2023-2024


      After seeing Elena struggle with anxiety and low confidence when she started at Vista Ridge last spring, I know firsthand
      how isolating that transition can be for students. The hands-on STEAM activities gave her an entry point—she could build
      and experiment without worrying about being called on or having the right answer. That’s the spirit I want for the new
      Maker Lab: a space where all students, especially those who feel anxious or left out, can discover their strengths.


      I’m particularly focused on the sixth graders this year. So many, not just Elena, are showing signs of anxiety since
      the school year began. I’ve been collaborating with Ms. Ramirez on accommodations—break passes, small group work, quiet
      corners—anything that helps them participate. The lab should be a place for everyone, not just the naturally outgoing
      or confident kids.


      Action steps:

      - Keep checking in with students about their comfort levels

      - Encourage staff to use the lab for smaller, low-stakes projects

      - Document the “small wins”: a shy student sharing her project, a group of girls building together, Elena helping others


      Remember: This lab is about more than technology—it’s about community and belonging.


      —J.M.'
