  - artifact_type: email
    content: 'Subject: Quick Update and a Little Venting


      Hi Jessica,


      Just wanted to send you a quick note between reconciling accounts at the clinic. You’re probably busy with summer classes,
      but I thought you’d want to know what’s going on with the land. The parcel is still technically a single 10-acre lot,
      but I’m working on splitting it into two 5-acre sections so we can sell half and help cover your tuition for CSU this
      fall. The title company picked up on some oddities with the lot lines—apparently, the records don’t quite match up with
      what’s actually there, but since nobody’s made a fuss about it over the years, I never worried much. I guess it’s time
      to address it now so the sale isn’t a headache for you down the road.


      I know the upfront payment ($7,200) is coming soon, and it’s stressing me out a bit. I’ll do everything I can to make
      sure we get it sorted and you stay on track with school. The mortgage is another puzzle; some days I feel like I’m juggling
      too many balls, but I’ll figure it out.


      Hope your classes are going well, and that you’re not overdoing it. Daisy misses you, and the tomatoes are finally coming
      in. Let me know if you need anything or if you have any questions about the land stuff.


      Love,

      Mom'
