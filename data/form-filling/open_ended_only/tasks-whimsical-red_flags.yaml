  - artifact_type: note
    content: '6/20/24


      Morning reflections with coffee—trying to sort out this new rhythm. Retirement’s been a strange adjustment; some days
      I feel restless with all the extra hours, and I do get lonely rattling around here after Tom leaves for his morning
      walk. I didn’t expect the house would feel this empty so often. Signing up to volunteer at The Waters seemed like the
      natural thing, especially after losing Mom last June. The place still smells a little like her—lilacs and lemon disinfectant.
      I hope spending time there will fill some of the quiet.


      But I’m being honest with myself: part of volunteering is simply giving myself something meaningful to do during the
      day. I don’t want to just drift. Routine helps, even if it’s only a few hours a week. And I want to be there for the
      residents who might not get visitors. Still, I’m aware that I’m filling a space in my own days, too. I think Mom would
      understand.


      Need to call Emily later and check in about Jacob’s summer reading list. Maybe we can set up our own little book club
      for the two of us. Also: pick up more gardening gloves (lost another pair in the hostas yesterday!).'
