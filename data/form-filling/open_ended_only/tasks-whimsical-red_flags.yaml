    content: 'Subject: Checking In and Sunday Dinner Plans


      Hi Mom,


      I wanted to touch base since I haven’t been able to make it to Emma’s soccer games at Plano East lately. My joints have
      just been so bad since they stopped the Humira—especially over the past three weeks, the stiffness and pain have made
      it impossible to sit in those bleachers or walk across the field. I know you asked if I was coming this Friday, but
      I really don’t think I can manage it unless something changes. Gregory’s pretty worried about me, and honestly I feel
      terrible missing out on Emma’s last season, especially when everyone’s so excited for her.


      Greg’s been picking up the slack more, but it’s causing some tension between us. He just wants me to rest, but that
      means I’m missing out on family things and he worries Emma feels unsupported. I keep telling myself this is temporary,
      but I’m not sure how long I can keep that up if the insurance doesn’t budge.


      On a brighter note, Lucas has a soccer game next Saturday—if my joints cooperate, I’ll try to go. Are you still planning
      to join us for Sunday dinner? I might need extra help in the kitchen if my hands are bad again. Let me know if you want
      to bring anything, and I’ll try to prep what I can ahead of time.


      Love,

      Ellen'
