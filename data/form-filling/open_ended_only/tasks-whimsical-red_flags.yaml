    content: 'Subject: Updates, Guild Worries, and Planning Ahead


      Lina,


      Hope you and the girls are well. Ayla is starting her reading lessons with Father Bertram at St. Celia’s Abbey this
      Thursday evening—she’s nervous but wants to be able to read stories to Torin like I do. Mira’s been working hard at
      Silverport Primary, thanks to Miss Feldon’s extra literacy sessions last fall. She can finally read the city notices
      herself, which is a relief.


      Things are still tight for us. After Ayla lost her job at the Textile Guild last spring, we had to borrow 200 silver
      marks from Captain Renald just to cover Mira’s school fees. Even for a Watch family, Silverport’s ‘wealthy’ reputation
      feels like a joke lately. I’m slowly repaying Renald—should be caught up after next payday.


