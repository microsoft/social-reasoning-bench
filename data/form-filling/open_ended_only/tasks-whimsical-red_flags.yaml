      \ try to get out for a hike this weekend if the weather holds. Annadel always helps clear my head after these stressful\
      \ weeks. I’ll pick up pastries from Cozy Plum for Sunday breakfast. Give me a call if you get out early tonight.\n\n\
      Love,\nDavid"
