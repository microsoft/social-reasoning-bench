      \ father Miguel last fall has brought the family closer, instilling a renewed sense of purpose and gratitude in Evan.\
      \ He’s also preparing for his annual guest lecture at San Francisco State, where he shares practical strategies for\
      \ trauma-informed care with graduate social work students.\n\nEvan’s life is defined by service, connection, and advocacy.\
      \ He’s not shy about discussing the ongoing challenges of sobriety, but he finds joy in small moments: gardening on\
