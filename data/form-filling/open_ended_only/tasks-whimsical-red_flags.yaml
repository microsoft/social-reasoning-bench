    background_context: 'Evan Marcus Riley lives with his wife Leah and their two children, Sophie and Aiden, in a modest
      but sunlit home near downtown Redwood City. Leah teaches English at a local high school, and their kids attend Redwood
      Creek Middle and Roosevelt Elementary, respectively. The family is close-knit; weekends are often spent at local parks,
      hiking in nearby preserves, or volunteering at community cleanup events. Evan’s parents, Tom and Diana, live a couple
      of neighborhoods away and help with childcare on weekday afternoons, especially since Leah has lately taken on a drama
      club advisor role after school.


      Evan is deeply invested in his work as an Environmental Project Manager with the city. Lately, his focus has been the
      Redwood Creek Habitat Restoration Project—a cause close to his heart, as he spent much of his childhood exploring the
      same creek. His days are a mix of site meetings, coordinating volunteers, and working with schools to boost environmental
      education. After work, Evan often brings home stories about neighborhood volunteers, local wildlife sightings, or how
      river otters were recently spotted for the first time in years. The family’s dining table conversations blend tales
      of student essays, upcoming soccer games, and the latest progress along the creek.


      This spring, life has felt busier than usual. Sophie is preparing for her first science fair, and Aiden just joined
      a little league team. Evan recently recovered from a mild case of COVID-19, which made him more vigilant about family
      health and shifted his approach to remote work and outdoor meetings. Despite the hectic schedule, Evan prioritizes Sunday
      morning bike rides with his kids and never misses the family’s Thursday night homemade pizza tradition. His current
      concerns center on ensuring the restoration project stays on track amid unpredictable spring weather and keeping the
      kids balanced between academics, activities, and downtime. He jokes that life is full, messy, and exactly where he wants
      to be.'
