  - artifact_type: note
    content: 'Personal Journal Entry – October 17, 2023


      It’s been four months since Dad died, and I still feel like I’m moving through molasses some days. The storage unit
      in Durham was both a blessing and a curse. I keep replaying the memories from last July—Lisa driving all the way from
      Chapel Hill just to help me face those crumbling boxes and the smell of old books. I remember how she found that box
      of letters from Dad’s first job and just sat with me while I cried. I felt so weirdly guilty for being relieved when
      we finally closed the door on that unit for the last time.


      Lisa’s advice to check out the Clutter Coach podcast made a bigger difference than I expected. I started listening on
      the drive to and from the storage place, and it helped me see that the mess isn’t just ‘stuff’—it’s grief, procrastination,
      all tangled together. I’m trying to be kinder to myself, but every time I walk past the dining table, I get that old
      tightness in my chest. Sometimes I wish I could just pack up and start fresh somewhere new, but then I think about all
      the routines we’ve built here in Raleigh, and I know I’m not really ready for that.


      The house is a mess, but somehow it feels a little less overwhelming now. Maybe I’m getting somewhere.'
