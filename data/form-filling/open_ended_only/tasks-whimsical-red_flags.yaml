      approach to life: waking up early each morning, often before the rest of his family, to squeeze in a run or a short
      session of strength training before school. Joshua’s commitment to exercise is evident—he works out five days a week,
      splitting time between cardio, weightlifting, and the occasional basketball game with friends at the community park.
      He wears glasses to correct his nearsightedness, but it rarely slows him down.


      Joshua balances academics and athletics, maintaining a solid GPA and participating in the school’s Science Club. He’s
      also recently taken a part-time job as a gym assistant at the local Gilbert Fitness Center, helping with equipment maintenance
      and greeting customers, which gives him some spending money and experience in a fitness environment. His family is close-knit;
      dinners are usually home-cooked, with his mom Lisa making sure everyone gets plenty of vegetables and limits sweets.
      Mark, his dad, is a software engineer working from home, while Emily, his sister, is a freshman at the same high school
      and shares his interest in sports—a source of friendly sibling rivalry.


      Recently, Joshua has been preparing for the annual school track meet, pushing himself in training while being mindful
      of hydration and stretching, as his coach recommended. He occasionally feels muscle soreness after intense workouts
      but manages it with rest, stretching, and over-the-counter antihistamines for mild pollen allergies during spring. The
      Evans family is looking forward to a summer trip to San Diego, a tradition where they visit relatives and enjoy beach
      activities. Joshua is generally healthy and up to date on all vaccinations. He’s aware of his family’s history—his grandfather’s
      hypertension and aunt’s mild asthma—but he’s thankful for his own good health. His main concern lately is balancing
      his time between schoolwork, his job, and prepping for college applications next year, but he enjoys the support of
      his family and friends as he navigates these busy days.'
