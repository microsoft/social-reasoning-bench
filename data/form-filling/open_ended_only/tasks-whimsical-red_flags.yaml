  - artifact_type: email
    content: 'Subject: Catching up and career moves


      Hey Marisol,


      Long time, no talk! I was thinking about your new role at the Oakland Wellness Collective—congrats, by the way.


      Honestly, I’ve always been a bit restless work-wise. Every few years I find myself itching for something new, and that’s
      definitely shaped my resume. After Bay Area Recovery Services, I bounced around a few places before landing at Hope
      House, and now Marin Wellness Initiative. I like the challenge of learning new systems and meeting new people, but it
      does mean I’ve got a patchwork of job histories (and a lot of LinkedIn updates).


      Speaking of resumes, just a reminder: there’s that 2008–2010 gap because I was on medical leave from Bay Area Recovery.
      I spent those years working with Dr. Alicia Martinez at UCSF Medical Center, trying to get a handle on my depression
      and the relapse I went through. It was tough, but the therapy sessions made all the difference. If you ever need to
      explain a career pause to someone, it’s okay to just say, "I needed time to focus on my health."


      Anyway, let’s grab coffee soon. Maybe next week after work? Let me know what days are good for you.


      Take care,

      Evan'
