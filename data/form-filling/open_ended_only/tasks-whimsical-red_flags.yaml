  - artifact_type: email
    content: 'Subject: Catching Up (and Surviving Another Spring!)


      Hi Lisa,


      I know it’s been ages since we had a proper catch-up, but this year has been a *ride*. March was a blur with Ben’s situation
      at Athens Academy—remember those tearful calls? I never thought we’d be the family dealing with a suspension, but there
      we were. The anxiety in our house was off the charts for a while. I finally wrote about it for the March issue of Northbrook
      News Monthly (yes, I outed us, but so many parents have been nodding along and sending me messages afterward!). I tried
      to be honest about what it felt like—how Ben’s stress spiraled, how I was up pacing at 3am, and how even Maggie ended
      up coming along to therapy sessions with him. (The therapist said dogs can really help teens open up. She wasn’t wrong—Maggie
      curled up on the floor and Ben actually talked, for the first time in weeks.)


      We’re doing better now, but I still get anxious every time I get an email from the school. Thank God for Mark keeping
      us afloat, though even he’s been stretched thin between work and my endless HOA meetings. Speaking of, with his heart
      surgery in April, I had to move our board meetings to our living room instead of the clubhouse for a couple months.
      The HOA folks were sweet about it—everyone brought snacks and tiptoed around Mark’s recliner.


      Hope you and the girls are well. Miss our coffee dates! Write back when you can—tell me something *not* stressful, please?


      Love,

      Karen'
