      construction of a detached house, and we have completed preliminary site analysis to ensure all utilities (water, sewer,
      electricity) can be separately connected. We are committed to maintaining the current streetscape and neighbourhood
      character, and have consulted with adjoining neighbours to ensure minimal impact. We have attached detailed plans outlining
      boundaries, access, and proposed service connections. The subdivision will allow our growing family to retain the existing
      home while providing the opportunity to build a new dwelling for ageing parents. We have engaged a licensed surveyor
      (James Carter, Carter Land Surveying Pty Ltd) who has prepared the subdivision plan and all measurements comply with
      council regulations. We are happy to discuss any additional requirements or provide further supporting documents if
