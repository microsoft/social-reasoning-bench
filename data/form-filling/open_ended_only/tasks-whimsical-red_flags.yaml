      breakfast for her young children, Olivia and Lucas. Her husband Daniel often helps with school drop-offs, allowing Jessica
      to review studio schedules and reply to client emails before heading in for the first yoga class at 9:00 AM. The Carter
      Wellness Studio, which Jessica opened five years ago, is located near Edmonton’s vibrant downtown. She’s hands-on in
      every part of the business—teaching yoga, pilates, and meditation sessions, overseeing her small team of instructors,
      and running monthly wellness workshops. Jessica recently expanded virtual offerings, responding to increased demand
      from clients in more remote areas.


      Balancing work and family, Jessica often feels stretched but fulfilled. She’s deeply involved in the local wellness
      community and regularly partners with nearby health professionals for joint events, such as a stress management workshop
      with a local psychologist. Weekends are reserved for family hikes in the river valley or baking with Olivia, unless
      she’s running a Saturday morning Zumba class. Jessica’s mother, Linda, visits frequently, helping with the kids and
      sharing her own wellness tips from years as a nurse. Jessica’s primary concerns are maintaining her own health amidst
      her busy schedule, ensuring her business stays financially sustainable, and carving out quality time for her family.


      Recently, Jessica has been planning a summer wellness retreat for her clients, collaborating with other Edmonton professionals,
      and experimenting with new online class formats. She’s mindful of the challenges posed by inflation and rising studio
      costs, and she’s focusing on growing her branded product line—especially yoga mats and activewear—to boost revenue.
      At home, she and Daniel are considering enrolling Olivia in gymnastics and Lucas in swimming lessons, hoping to foster
      healthy habits early. Jessica’s days are long but rewarding: she thrives on the connections she builds, both in her
      studio and in her family, feeling excited about the studio’s role in supporting holistic health throughout the Edmonton
      community.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Checking In – Studio Updates and Family Bits


      Hi Mom,


      Hope you’re settling into your week – I know your book club is keeping you busy! Just wanted to check in and share a
      few updates. It’s been a whirlwind here as usual: mornings start with Lucas refusing to eat his oatmeal unless Olivia
      does first, and Daniel’s still on school drop-off duty so I can squeeze in a quick meditation before reviewing schedules.


      On the studio front, things are humming along, though I admit I’m feeling the full weight of managing both home and
      business since Daniel’s layoff from TechLogic last February. It’s strange how quickly you adjust – I juggle our finances
      through the studio now, tracking every dollar to make sure we stay ahead. Sometimes I catch myself double-checking the
      payroll and then immediately switching to grocery lists. Thank goodness for your help with the kids; your visits are
      a lifesaver, especially when I have late classes or need to prep for workshops.


      Speaking of classes, I started those trauma-informed yoga sessions on Wednesday evenings last January with Dr. Lila
      Chen from the Edmonton Trauma Recovery Center. They’re held privately at the studio, sliding scale fee, and some participants
      are referred directly by Dr. Chen. It’s been rewarding, but also emotionally heavy – I print consent forms every week
      and make sure the space feels safe for everyone. Let me know if you have any nurse friends who might be interested;
      we’re always looking for gentle support volunteers.


      You’re still a regular in our gentle yoga group, post-knee surgery, and I notice you bring more of your St. Albert retired
      nurse friends each month! I love seeing how our little community grows. Let me know if you need more senior-friendly
      props – I can pick up extra bolsters.


      Hugs to you and the usual crew,

      Jessica'
