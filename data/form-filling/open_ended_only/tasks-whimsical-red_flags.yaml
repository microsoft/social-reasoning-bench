  - artifact_type: note
    content: 'Thursday 6/27


      Hard to get up this morning—my wrists and knees were throbbing again. Missed Emma’s soccer game for the third week in
      a row, which makes me feel so guilty. The pain since Humira stopped has been worse than I expected, and the stiffness
      just won’t let up.


      Gregory keeps telling me not to push myself, but I know he’s frustrated that I’m not able to be as present for the kids.
      Emma tries to act like it doesn’t bother her, but I can tell she misses me cheering for her. Lucas asks if I’ll come
      to his games, but I keep having to say “maybe.”


      My doctor initially suggested I try managing my symptoms at home—gentle stretches, heat packs, and rest—but honestly,
      I wanted something more structured. I requested formal physical therapy before really attempting the home exercises,
      because I just didn’t feel confident I’d stick with it or do it right. Still waiting to hear if insurance will cover
      extra sessions.


      Work was a slog today, but I managed to catch up on emails. Reminded myself to schedule a call with Dr. Porter soon.
      If Humira isn’t reinstated, I need to ask about other options, even though Enbrel and Remicade didn’t work before.


      Remember: pick up Lucas’s soccer cleats; order groceries for Sunday.


      —Ellen'
