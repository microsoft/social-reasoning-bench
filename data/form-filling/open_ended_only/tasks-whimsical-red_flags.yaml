  - artifact_type: email
    content: 'Subject: Update from Fernleigh Road – repairs & next steps


      Hi Sam,


      Hope you’re well. Just wanted to check in about the outstanding repairs – the leaky tap in the kitchen and the loose
      board on the deck are still waiting. I know you mentioned your family’s moving back soon, so I’d really appreciate if
      we could get those sorted before I leave.


      After two and a half years here, I think I’ve run out of patience with things not getting fixed. Between the repairs
      and the landlord’s change in plans, it definitely feels like time to move on. Max and I are hunting for a new place
      with a bit of garden for Barney – he’s loving life but needs space to run! I’m hoping for a July 1st move-in, right
      after Max finishes his outpatient sessions at Wellington Community Mental Health Clinic on June 28th. We’re flexible
      if you need more time for the transition, but I’d like to wrap things up smoothly.


      Let me know about the repairs, and if you need anything else from me before moving day.


      Thanks,

      Alice'
