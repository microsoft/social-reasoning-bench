    background_context: 'Sean O''Malley''s days begin before sunrise, usually with strong coffee and the morning Tribune spread
      across the kitchen table of his modest apartment in the Near West Side. He keeps a weathered file on his brother Thomas
      tucked in a drawer—every few weeks, he pores over the old notes and new leads, never letting go of hope. Most mornings,
      he checks messages at his small office downstairs, a cramped space above a tailor shop, adorned with a frosted glass
      door reading ''O''Malley Investigations.''


      His work is never dull; he spends hours trailing marks through smoky speakeasies, gathering gossip from bookies, and
      occasionally passing information to his contact at the Twelfth Precinct. His reputation as a tough but honest investigator
      means steady business from worried parents, suspicious wives, and even the occasional business tycoon. The local police
      tolerate him, and some even trust his judgment, though a few resent his Irish roots. Last week, he was called in on
      a missing persons case that made the news, stirring up memories of his brother and nights haunted by old war nightmares.


      Sean''s family is close, though his mother, Moira, worries about his safety and his tobacco habit. Sunday dinners at
      her place are non-negotiable, filled with laughter, arguments about the old country, and the empty chair where Thomas
      used to sit. Lately, his younger sister Bridget has been urging him to consider settling down, but Sean brushes it off.
      Work, and the search for Thomas, comes first. Some nights, after a case, he''ll share a drink with his police contact
      or exchange information with a local bookie, always maintaining a careful balance between the law and the city’s underworld.
      The city is tough, but so is Sean, and he has no intention of giving up—on his work, his family, or the truth.'
