  - artifact_type: email
    content: 'Mami,


      I just wanted to share something that made me proud today. Remember last spring when Elena was struggling so much with
      the move to middle school? She was so nervous and quiet then, especially in new classes. I signed her up for the STEAM
      club, and at first she didn’t want to go—said she was worried she’d mess up or say something silly. But over the months,
      I saw her open up, starting with the hands-on activities. She loved building the solar car and working on the 3D printer.
      It’s amazing how giving kids tools to make things can bring them out of their shells.


      That experience with Elena is exactly why I pushed for the new STEAM Maker Lab at Vista Ridge. I wanted a space where
      students with anxiety or low confidence, not just Elena, can try things with their hands and feel included. Today I
      watched her help a classmate program a simple robot—she was patient, explaining each step. I almost cried seeing how
      far she’s come since last spring.


      I hope you’re feeling well today. Sofia sends her love. She’s been enjoying our morning walks, even if she grumbles
      about the cold. I’ll try to call you this weekend.


      Besos,

      Jennifer'
