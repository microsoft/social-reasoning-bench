    background_context: 'Edric Lanner starts most mornings before sunrise, donning his watch uniform and walking the cobbled
      streets of Silverport’s Lioncrest district. He’s lived here since childhood, the son of a baker and a seamstress, and
      now heads a small team responsible for patrolling the merchant quarter and overseeing security in the old ruins beneath
      the city. His wife Ayla, a candle-maker, manages their modest household and keeps a keen eye on neighborhood news, especially
      with the city under martial law and tensions rising.


      Edric’s days are unpredictable lately—as cult activity increases, the king’s decree has doubled patrols and made every
      shadow suspect. His team recently foiled an attempted break-in at a noble’s estate, uncovering evidence tied to the
      shadow cults plaguing Eldoria. Edric worries for his children, Mira and Torin, who attend a small tutor’s school nearby;
      he walks them there most days, exchanging news with other parents and local merchants. Their routines have grown more
      cautious since a city watchman was lost to shadow possession, a grim reminder of the threats lurking beneath Silverport.


      After patrols, Edric often spends evenings deciphering reports and reviewing the cryptic prophecy found in the cult’s
      lair. He meets with colleagues and trusted friends at the Lion and Banner tavern, discussing rumors about a new cult
      leader and sharing strategies to keep their families safe. He takes pride in his role as a guardian of Silverport, balancing
      work, family, and the persistent anxiety that comes with defending a city teetering on the edge of chaos. His hope is
      to see the king’s rule restored and his children grow up in a safer Eldarion.'
