    background_context: 'Julia Thompson has always been drawn to music, having grown up singing in her church choir in Scarborough.
      After graduating from York University with a degree in Music Performance, she worked part-time teaching guitar and vocals
      while gigging at local cafés. In 2015, she formed The Silver Maple Duo with her longtime friend Marcus Lee, blending
      their musical influences and performing across Toronto. Marcus, a jazz pianist with deep roots in the city, complements
      Julia''s folk-pop style, and together they’ve built a reputation for heartfelt performances and creative arrangements.


      Julia lives in a cozy apartment in Toronto’s East End, just blocks from the Danforth. Most mornings, she starts her
      day reviewing new material, coordinating rehearsal schedules, and managing the duo’s social media presence. She supplements
      her income with private lessons and occasional session work. Julia’s family is tightly knit: she visits her parents,
      Evelyn and Michael, for Sunday dinners and keeps in close touch with her sister Sophie, who recently moved to Montreal
      for graduate school. With the Silver Maple Duo’s debut EP released in 2021 and their growing popularity after a CBC
      Radio feature, Julia has been fielding more bookings, including summer festival spots and intimate venues. She’s currently
      navigating the balance between expanding their reach and sustaining her personal life, sometimes feeling the pressure
      to keep up with Toronto’s fast-paced arts scene.


      Recently, Julia has been focused on writing new material inspired by her Canadian roots, juggling rehearsals with Marcus,
      and supporting Sophie through the challenges of grad school from afar. She’s got concerns about rising rent in Toronto
      and the unpredictable nature of freelance music work, but she’s passionate about her craft and excited for upcoming
      performances. Her daily routine is shaped by the rhythms of songwriting, practicing, connecting with fans, and maintaining
      her health amid late nights and busy weekends.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Checking In – Sunday Dinner & Life Updates


      Hi Mom,


      Just wanted to catch up before Sunday dinner. Sophie called last night—she’s buried in papers and midterms again, but
      sounds a bit more settled in Montreal. I told her I’d send her some of our new demo tracks to brighten her week.


      Things have been a little hectic here. The Silver Maple Duo is getting more festival bookings, which is exciting but
      means I’m juggling rehearsals, promo, and some late-night gigs. I’ve also been teaching a few extra lessons to cover
      rent (which keeps creeping up, ugh). You know how Toronto is lately.


      I wanted to let you know I’ve been seeing Dr. Angela Chen at the Riverside Mental Health Clinic since last spring. She’s
      been helping me with performance anxiety and panic attacks, especially before big shows. At the Beaches International
      Jazz Festival last year, I nearly backed out but managed to get through it with Marcus’s help and some breathing techniques
      Dr. Chen taught me. It was pretty overwhelming—almost canceled right before we went on—but I’m glad I stuck it out.
      Marcus has been a rock, as usual.


      I’m still sorting out how to balance everything. Most days, I wake up early to review new material or coordinate with
      Marcus. Sometimes I feel like I’m running on fumes, but I’m grateful for the music and for you and Dad cheering us on.
      Looking forward to dinner—let me know if there’s anything I can bring!


      Love,

      Julia'
