  ground_truth:
  - field_id: project_information.description_of_nature_purpose_and_beneficiaries_of_project
    field_label: Description Of Nature Purpose And Beneficiaries Of Project
    value: The Redwood Creek Habitat Restoration Project aims to restore the degraded riparian corridor along Redwood Creek
      within the heart of Redwood City. The project encompasses removal of invasive plant species, replanting native vegetation,
      stabilizing creek banks, and installing interpretive signage for educational purposes. The purpose is to improve water
      quality, enhance wildlife habitat, and provide a safer, more accessible public space for local residents and visitors.
      Beneficiaries include the community of Redwood City, local schools who use the creek for environmental education, and
      regional wildlife populations such as migratory birds, amphibians, and native fish. The project was initiated in response
      to community input and scientific assessments, and will foster environmental stewardship among residents through volunteer
      planting days and ongoing maintenance.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: exemption_status.reasons_why_project_is_exempt
    field_label: Reasons Why Project Is Exempt
    value: The project qualifies for a categorical exemption under Class 4 (Minor Alterations to Land), Section 15304 of the
      CEQA Guidelines. The restoration activities will not involve significant land disturbance or removal of healthy, mature
      trees, and all work will be conducted in accordance with best management practices to avoid impacts to water quality
      and wildlife. The project is limited in scope, seeks to enhance rather than alter ecosystem function, and is designed
      to benefit the public and environment with minimal construction or grading. The work is routine and does not involve
      expansion of existing use or any new structures, and the creek restoration is consistent with existing city plans and
      policies. Additionally, the project does not impact sensitive species or habitats, as confirmed by site surveys conducted
      by the County's biologist. Consultation with the California Department of Fish and Wildlife resulted in recommendations
      that are reflected in the project design.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
