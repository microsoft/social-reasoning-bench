  - artifact_type: note
    content: 'Personal Reflection – Balancing Work & Family


      Another long weekend scouting the Guion Farm trails for Blue Ridge Trail Challenge logistics. The event is shaping up,
      but coordinating volunteers, park staff, and safety is exhausting. I keep running lists in my head: tents, signage,
      water stations, inhalers for Sophie, first aid kit refills, clean-up crew assignments.


      Sophie’s asthma diagnosis last year (Dr. Chen, March 2023) made me hyper-aware about her activity levels. She insists
      on helping at the Triple Falls station, so I’ll keep her inhaler at base camp and check in often. I worry, but she’s
      determined to be part of the action. Liam’s starting kindergarten was another big change this fall—more morning chaos,
      but Mom helps with pickups.


      Sometimes I wonder if I’m keeping up physically. My knee flared up after last Sunday’s trail run; need to schedule a
      check-in with the PT. Emily’s a rock, but I wish we had more downtime together. Family hikes and bike rides at Oklawaha
      Greenway are our escape, but the event schedule eats up weekends.


      After Blue Ridge, I want to plan a low-key camping trip with the kids—no race logistics, just marshmallows and stars.
      Maybe invite Mom if she’s up for it. Remind myself: balance, not burnout. Leave No Trace isn’t just for the trails—it’s
      for my own pace, too.


      — James'
