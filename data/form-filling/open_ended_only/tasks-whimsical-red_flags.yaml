  - field_id: campaign_overview.campaign_synopsis_and_recent_events
    field_label: Campaign Synopsis And Recent Events
    value: Shadows of Eldoria is set in the continent of Eldoria, torn by old grudges and emerging dark magics. The campaign
      began with the player characters—an elven scout, a human hedge-wizard, and a dwarven swordsman—uncovering a series of
      murders in the city of Silverport that pointed to cultist activity. As events unfolded, the group discovered a network
      of shadow cults attempting to open portals to the Shadow Beyond, a realm of corrupted magic. Recently, the party successfully
      sabotaged a cult ritual in the ancient ruins beneath the capital but lost one of their own to shadow possession. The
      city is on high alert, and the king has declared martial law, while rumors of a new cult leader spread among the populace.
      The players are currently trying to decipher a cryptic prophecy found in the cult's lair.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: campaign_overview.timeline_of_significant_historical_events
    field_label: Timeline Of Significant Historical Events
    value: "1000 years ago: The Founding—Eldoria's city-states unite to repel the demon invasion. \n800 years ago: The Sundering—elves\
      \ and dwarves go to war, leading to decades of hostility. \n500 years ago: The Mage Wars—magical experimentation causes\
      \ widespread chaos; the Mage Accords are signed, banning necromancy. \n200 years ago: The Great Plague decimates half\
      \ the population. \n50 years ago: The Silverport Treaty is signed, leading to a new era of peace. \nLast year: Cult\
      \ activity begins to rise, unexplained disappearances increase. \nLast month: A failed assassination attempt on King\
      \ Edric III increases tension and paranoia in the capital."
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
