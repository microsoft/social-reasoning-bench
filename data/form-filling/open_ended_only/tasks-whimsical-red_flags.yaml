  form_summary:
    form_purpose: This form is for game masters (GMs) to plan and document the details of a GURPS tabletop roleplaying campaign,
      including setting, rules, and world-building elements.
    intended_recipient: The primary recipient is the GM themselves for campaign organization, but it may also be shared with
