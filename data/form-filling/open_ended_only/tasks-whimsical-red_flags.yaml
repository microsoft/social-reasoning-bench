  - artifact_type: email
    content: 'Subject: Sunday Dinner and Some Old Rules


      Hey Bridget,


      Looking forward to Sunday at Ma’s as usual—don’t forget to tell her I’ll bring the rye bread from Russo’s. Speaking
      of old traditions, I was thinking about the house rules we set up for the campaign. I know you always tease me about
      being too strict, but after everything with Thomas…well, you know why I insist. Since he disappeared back in ‘27, I
      can’t bring myself to let anyone make a character with ST above 13 unless there’s real trauma in their backstory—no
      glorifying brute strength unless it’s earned. I guess it’s my way of making sure we remember what we went through at
      2489 Polk, and why some scars never really heal.


      And on that note, I’ve been capping my DX at 12 lately. Dr. Stein over at Rush University Medical Center was pretty
      clear after the wrist injury—said anything dexterity-related (including dice games!) should be kept light until the
      swelling’s down. That altercation at the office back in February did more damage than I cared to admit. Guess the old
      bones aren’t as tough as they used to be, especially after what happened at O’Malley Investigations in April ‘19. Doc
      says my recovery’s slow—still can’t take a punch like I used to since the shooting. For the campaign, I’m keeping my
      HP two points below ST to keep things honest.


      Let’s keep these house rules alive—maybe it’s old-fashioned, but it helps me stay grounded. See you Sunday, and tell
      Ma I’ll be there by five.


      -Sean'
