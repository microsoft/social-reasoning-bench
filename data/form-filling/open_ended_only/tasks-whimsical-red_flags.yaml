      \ OR MASTER THESIS:\n\nGUIDELINES FOR THE EXPOSÉ:\n\n  1. What is the central research question? Why is this question\
      \ important for the South Tyrolean economy?\n  2. What is already known about this question?\n  3. How and with which\
