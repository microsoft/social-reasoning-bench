    background_context: 'Cynthia Peterson has spent most of her life in the Detroit metro area, raising her family and working
      part-time as an office assistant before retirement. After her husband Michael passed away six years ago, Cynthia gradually
      moved into Shady Grove Nursing Home in Sterling Heights due to her worsening health, including advanced congestive heart
      failure, severe osteoarthritis, and more recently, a right-sided hip fracture. Her daughter Janet lives nearby in Troy
      and visits several times a week, bringing small comforts like fresh flowers and Cynthia’s favorite magazines.


      Cynthia’s days now follow a quiet routine: breakfast in her room, gentle assistance with bathing and medications, and
      frequent checks from the nursing staff. She enjoys listening to classical music and watching old episodes of Jeopardy,
      though her vascular dementia means she often forgets details. She requires continuous oxygen and cannot move independently;
      even sitting upright is difficult. Janet is closely involved, advocating for Cynthia’s safety during transfers and medical
      appointments, especially after Cynthia’s recent syncopal episodes and anemia diagnosis. The staff takes extra care with
      Cynthia, as her confusion and anxiety increase during unfamiliar situations, and she relies on their patience and kindness.


      Despite her frailty, Cynthia finds comfort in routine and in Janet’s visits. She misses her late husband and son, often
      recalling family trips to Lake Michigan, though sometimes the memories slip away. Her main concern is pain management
      and staying comfortable, and Janet worries about the risks of hospital visits. Cynthia’s world has grown smaller, but
      it remains filled with gentle care, occasional laughter with nursing staff, and the love of her daughter, who is fiercely
      protective and attentive to her needs.'
