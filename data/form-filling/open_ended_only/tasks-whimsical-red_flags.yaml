      He plays on both his school team and a local club team, the Chandler Strikers. Lucas is a bright student, particularly
      interested in science and history, and he often participates in after-school STEM activities. His days are busy, balancing
      homework, practices, and spending time with his family, especially his younger sister Camila, who looks up to him and
      joins in for backyard soccer games.


      Earlier in January 2022, Lucas experienced a mild bout with COVID-19 after several of his soccer teammates tested positive
      following a tournament. While the illness was short-lived, his parents, Martin and Gabriela, were particularly attentive
      to his recovery, following guidance from their pediatrician. With his initial symptoms limited to a low fever and fatigue,
      Lucas spent about 10 days resting at home, catching up on his favorite Marvel movies and reading. He was grateful that
      no one else in the family got sick, and he returned to his regular routine and full athletic activity without any aftereffects.
      Lucas had already received two doses of the Pfizer vaccine the previous summer, a decision his family made together
      to support his involvement in sports and keep their household safe.


      Now in the spring of 2022, Lucas is looking forward to the regional soccer finals, while also preparing for the transition
      to high school next year. His parents, both working professionals—Martin as a software developer for a local tech company
      and Gabriela as a middle school counselor—are actively involved in his school and sports life, volunteering at games
      and supporting his academic interests. Family weekends are spent hiking in the nearby South Mountain Park or visiting
      relatives in Phoenix. Lucas is focused on maintaining good habits, like hygiene and time management, but his biggest
      concern right now is scoring a goal in his next big game and making the most of his last year in middle school.'
