    background_context: "Ayesha Banerjee is a spirited and empathetic 32-year-old living in southeast Calgary's Douglasdale\
      \ neighborhood. Sharing her cozy two-bedroom apartment with her mother, Sudipta, who moved in last year after some ongoing\
      \ mobility issues, Ayesha finds her daily life a careful blend of work, caregiving, and her own passions. Her father,\
      \ Ritwik, lives in Vancouver, and her younger sister, Priya, is pursuing a graduate degree in psychology in Toronto,\
      \ making family video calls a regular ritual every Sunday night. \n\nMost weekday mornings, Ayesha cycles along the\
      \ Bow River trail before heading to her part-time shift at the Quarry Park Library. At work, she organizes activities\
      \ for children and seniors, oversees the book club, and sometimes reads aloud to regulars who appreciate her soothing\
      \ voice. Her evenings are often filled with baking bread and cookies (a recent obsession), practicing piano, or working\
      \ on her latest knitting project—a set of scarves and hats she plans to donate to a local shelter. On weekends, she\
      \ tends to their small container garden on the apartment balcony, growing tomatoes and herbs for family meals.\n\nAyesha’s\
      \ life is deeply shaped by the memory of her grandmother, who lived at a long-term care center in Calgary. Witnessing\
      \ the impact volunteers had on residents inspired her desire to support elders in her community. She is fluent in English\
      \ and conversational in Bengali, a skill she uses to connect with Calgary’s growing South Asian senior population. Her\
      \ days are busy but meaningful, filled with books, music, and stories—both her own and those she treasures from the\
      \ seniors she loves to visit. She sometimes worries about her mother’s health and about keeping everyone connected despite\
      \ the distance, but she finds purpose in small acts of kindness and community involvement."
  artifacts:
  - artifact_type: email
    content: 'Subject: Checking in – Mom’s health and volunteer shifts


      Hi Priya,


      Hope your week is going okay. Things have been pretty busy here—mostly the usual, but Mom’s dialysis schedule keeps
      shifting everything around. I’ll be taking her to Foothills again this Wednesday at 8:30am (every other week since last
      May), so I can only volunteer in the afternoons those weeks. Let me know if you need to change our Sunday call, but
      I think I’ll manage as long as the shifts stay flexible.


      I keep thinking back to when Ma was at Colonel Belcher after her Alzheimer’s diagnosis and how hard it was for her to
      communicate with staff. That whole six months in 2010 felt so isolating for her—especially with the language barrier.
      I guess that’s part of why I want to volunteer now; it feels like a way to honor what she went through and help others
      facing the same challenges. Plus, Mom keeps telling me I should do more outside of work to meet new people, so maybe
      this helps keep her happy too.


      On another note, I made her some more low-sodium cookies last night. She’s still careful about her diet since her heart
      surgery at Foothills last March, but she’s been craving something sweet. Baking and knitting are the only things keeping
      me sane these days! The container garden is thriving—lots of basil, and tomatoes finally ripening.


      Let me know how your classes are going. Did you finish that big paper yet? I can’t wait for your next visit—maybe you
      can help me wrangle the balcony jungle!


      Love,

      Ayesha'
