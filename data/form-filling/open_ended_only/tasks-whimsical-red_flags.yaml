  - artifact_type: note
    content: 'Title: Rehearsal Reflections – Roots & Branches


      It’s Friday morning and I’m sitting on the couch with my guitar, thinking through last night’s rehearsal. Marcus and
      I spent two hours working on arrangements for our new original, but I kept stumbling over the bridge—just couldn’t lock
      in the chord changes. I’ve noticed that before shows I still get jittery, sometimes forgetting chords or lyrics right
      on stage. It’s gotten a bit better recently, especially with Dr. Chen’s help, but the nerves still sneak up.


      Last year, the Jazz Festival almost pushed me over the edge. I remember standing backstage, hands shaking, trying to
      breathe. I almost told Marcus I couldn’t go on. That session with Dr. Chen at Riverside really helped—she taught me
      those quick breathing exercises that I still use. I need to remind myself: the crowd is just people, not a test.


      Today’s plan: run through the setlist, focus on the tricky transitions, maybe record myself to see what’s actually happening.
      Also, update social media—post a clip of our cover of Carole King. Text Marcus about next week’s gig logistics. Don’t
      forget to email Sophie her birthday song draft.


      I’m grateful for small steps forward. Even when I trip up, it’s part of the process.


      Coffee, then practice.


      – Julia'
