  ground_truth:
  - field_id: employee_exposure_assessment.direct_care_exposure_follow_up_notes
    field_label: Direct Care Exposure Follow Up Notes
    value: Registered nurses and respiratory therapists in the Emergency Department provide direct care to patients with suspected
      or confirmed COVID-19 on a regular basis. Employees wear appropriate PPE but are in close contact during assessments,
      administering medications, and assisting with hygiene or mobility. In addition, patient care assistants and some environmental
      services staff may have direct exposure while cleaning rooms occupied by COVID-19 patients. For example, on February
      14, 2024, an RN (Jane Evans) cared for a COVID-19 positive patient in Room 12 for a 7-hour shift, including frequent
      vital sign checks and bedside care. Employees have been trained in infection control procedures.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: employee_exposure_assessment.agp_exposure_follow_up_notes
    field_label: Agp Exposure Follow Up Notes
    value: Respiratory therapists and critical care nurses routinely perform or assist with aerosol-generating procedures
      (AGPs) such as intubation, non-invasive ventilation (BiPAP/CPAP), and manual ventilation, particularly in the Intensive
      Care Unit (ICU) and Emergency Department. For example, on January 28, 2024, a rapid response was called for a patient
      in the ICU requiring emergent intubation, which involved two RNs and a respiratory therapist. Additionally, code blue
      teams have participated in several resuscitation events involving COVID-19 positive patients in the past quarter. Strict
      protocols are in place for N95 mask use, face shields, and negative pressure room utilization during these procedures.
    is_open_ended: false
    reasoning: Pre-filled value from ground truth form
  - field_id: potential_exposure_job_tasks.potential_exposure_table[0].job_tasks_and_descriptions
    field_label: Job Tasks And Descriptions
    value: 'Direct patient care including triage, assessment, medication administration, and transport of patients suspected
      or confirmed to have COVID-19. Nurses and physicians frequently enter patient rooms to monitor vital signs and provide
      respiratory support. Environmental services staff disinfect patient rooms post-discharge. Example: On March 1, 2024,
      a team of four (2 RNs, 1 MD, 1 RT) managed a COVID-19 positive trauma patient, requiring multiple close contact interventions
      over a 5-hour period.'
