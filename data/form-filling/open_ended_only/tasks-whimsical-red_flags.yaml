    value: Our church building, which was constructed in 1962, is in significant need of roof repairs. Over the past two years,
      we have experienced increasing leaks during heavy rains, resulting in water staining on the sanctuary ceiling and damage
      to our fellowship hall floor tiles. Additionally, several of our exterior windows are original to the building and have
      deteriorated frames, leading to drafts and increased energy costs. We are also concerned about potential mold growth
      in the affected areas, which could pose health concerns for our congregation, especially for our senior members and
      young children who attend Sunday school. In summary, we are requesting support for roof replacement, repair or replacement
      of damaged ceiling tiles, and the replacement of 12 exterior windows including the frames.
