      up in the air. I haven’t been able to make it to Emma’s games lately, and she’s really missing having me there. Last
      night she said she wished I could cheer for her again like before. I feel so guilty.


      B: I’m sorry, Ellen. I’ll try to get home earlier this week so you don’t have to handle everything alone. Maybe we can
      plan something special for Emma after her next game?


      A: That would help. I just want to feel like myself again, and be there for the family.


      B: We’ll get through this together.


