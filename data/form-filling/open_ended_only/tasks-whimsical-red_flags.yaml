    background_context: 'Samantha Klein is a dedicated project manager at Calico Tech Solutions, a mid-sized tech firm based
      in Sunnyvale, California. She lives in a modest two-bedroom apartment with her three-year-old daughter, Evelyn. As a
      single parent, Samantha''s mornings are a careful juggle: getting Evelyn ready for preschool, packing lunch, and rushing
      out for work after 10am, which she prefers due to her childcare arrangements. She usually works a hybrid schedule, splitting
      her week between the office and remote work. Virtual meetings are a staple, and Samantha always requests closed captioning
      due to mild hearing loss in her right ear. She sometimes uses a personal amplifier in noisy meetings, and appreciates
      written follow-up materials to stay on top of discussions.


      Recently, Samantha returned to work after maternity leave and found herself unexpectedly reassigned to a new project
      team. The transition was abrupt—her desk had been cleared, and communication from HR was sparse. This led to a stressful
      two-week period where she was placed on unpaid leave, causing both financial strain and emotional distress. Her friend
      Jessica Ramirez witnessed the HR meeting where Samantha questioned the reassignment, and Michael Tran, another coworker,
      was supportive when Samantha found her workspace empty and overheard confusion among team leads. The situation has made
      Samantha more vigilant about her rights at work, and she''s been advocating for clearer policies and better communication
      from management. She''s hoping for a formal apology, restoration of her previous position or an equivalent role, and
      reimbursement for lost wages, but her ultimate goal is to ensure a fair and transparent workplace for all employees.


      Despite these challenges, Samantha remains resilient. She spends weekends taking Evelyn to the park, visiting the local
      library, and enjoying homemade dinners together. Her support network includes her mother (who occasionally helps with
      childcare), her colleagues, and a few close friends. Samantha is resourceful and organized, always keeping a detailed
      calendar to manage her job and family responsibilities. Her current concerns are balancing work and parenting, securing
      stable childcare, and maintaining her health, especially as she navigates the ongoing workplace situation. Samantha''s
      life is a mix of careful planning, advocacy, and love for her daughter, shaped by recent events but focused on building
      a better future for both of them.'
