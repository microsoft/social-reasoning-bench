  - artifact_type: note
    content: 'Reflection – Sunday Evening


      The house feels quieter these days, even with Daisy snoring on the couch. Sometimes I still expect Philip’s keys to
      jingle in the hallway, especially as we approach July. Losing him at St. Anthony Hospital was such a shock; I think
      about how quickly everything changed. The mortgage on Cottonwood Lane has weighed heavy on me since then—every payment
      feels like a test I’m not sure I’ll pass. Selling half the parcel seems like the only real option, even if it means
      letting go of part of the dream Philip and I shared.


      I’ve spent so many evenings walking the property’s edge, remembering how we hoped to build something small, maybe a
      horse barn when life slowed down. Now, Jessica’s tuition for CSU is looming—$7,200 due for fall, and she’s working so
      hard to make us proud. I wish I could give her more, but it’s all about keeping things afloat. The title company’s discovery
      about the parcel’s division was unsettling, but at least we can fix it. I never thought owning land would come with
      so much paperwork.


      I’m grateful for Linda’s support, and for the routine at Aspen Ridge Clinic. Payroll, invoices, and the comfort of animals
      give my days shape. If selling the land means Jessica can stay in school and I can keep the house, then it’s worth it.
      Maybe one day, we’ll find new dreams for whatever remains.'
