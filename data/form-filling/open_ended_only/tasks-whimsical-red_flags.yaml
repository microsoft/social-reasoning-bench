    content: 'Subject: Gallagher Case & Old Memories


      Bridget,


      Been meaning to check in since we wrapped the Gallagher case. I’ll be honest, I’ve been having a tough time focusing
      on the details—keeps reminding me of when Thomas went missing all those years ago. I know it’s been nearly a lifetime,
      but every missing persons case brings it all back: the late nights at Maxwell, the dead ends, and the empty chair at
      Ma’s table.


      Remember those tests Dr. Schaefer ran after Thomas vanished? 1928 through 1930, I was at his clinic every week, answering
      questions and piecing together memories. If it weren’t for that, I’d never have justified the IQ 15 on my character
      sheet. He said I had ‘exceptional deductive reasoning and memory skills’—I guess it’s true, but it came at a price.


      I always give my character high Will—at least two points over IQ. It’s just something I do since Thomas disappeared.
      Helps me deal, you know? If the house rules ever change to restrict that, I’m not sure I could separate my character
      from what I’ve lived through.


      Anyway, Sunday dinner’s still on. I’ll try not to bring any more case files this time—Ma deserves a break from all the
      talk of old wounds. See you soon, kid.


      —Sean'
