    background_context: 'Alice Bennett is a 34-year-old communications specialist living in Wellington. For the past two and
      a half years, she has been renting a cozy two-bedroom flat in the Kelburn area, where she’s built a quiet routine balancing
      work and home life. Recently, Alice’s landlord let her know that he and his family would be moving back into the property
      due to changing personal circumstances. Though Alice has loved her time in the flat, she’s accepted that it’s time to
      move on and is excited by the chance to find a place better suited to her current needs.


      The shift comes at an important moment. Over the past six months, Alice’s work at the NZ Heritage Trust has become increasingly
      remote, and she finds herself spending more time at home preparing press releases and managing digital campaigns. The
      once-comfortable flat now feels cramped, particularly since she and her partner Max adopted Barney, a spirited little
      terrier who brings a lot of joy (and a bit of chaos) to their days. Their current place doesn’t have a garden, so Alice
      is hopeful to find a new home with more outdoor space – somewhere Barney can safely play and she can enjoy her morning
      coffee on the deck. Alice is also keen to establish a better work-life balance and carve out a dedicated home office,
      something that’s been difficult in their current setup.


      Despite the upheaval, Alice stays connected with her family, meeting her parents, Thomas and Janine, for Sunday lunches
      and regularly catching up with her younger sister Sophie, who lives nearby. Her days are a blend of team calls, dog
      walks, and planning for the move. While finding a new place is stressful, she’s optimistic, grateful for Max’s support
      and excited to create a more restful, productive space for herself and her growing family.'
  artifacts:
  - artifact_type: email
    content: 'Subject: Sunday catch-up & moving plans


      Hi Mum,


      Just wanted to update you on how things are going over here. Max and I are finally starting to look at new places –
      it’s feeling a bit real now that the landlord’s coming back with his family. I’ve loved the flat on Fernleigh Road for
      the past couple of years, but it’s definitely time for a change. Things got pretty tense between Max and me in May,
      mostly around the whole Barney adoption. I know you thought he’d love having a dog, but it was a bigger adjustment than
      either of us expected. That argument really made me realise how much we need a space that isn’t so cramped, especially
      with all the remote work and Barney’s energy.


      We’re hoping to move right after Max finishes his outpatient treatment at Wellington Community Mental Health Clinic
      – his last session is June 28th. Ideally, we’d like to start the tenancy July 1st, so we can settle in and give Max
      a fresh start. I’m flexible by a few days if needed, but would rather not drag things out. I’ve been looking for places
      with a bit of garden – somewhere Barney can run around, and I can have my coffee outside (you know how much I miss that!).


      Let’s still plan for Sunday lunch this week. I’ll bring Barney, but promise he’ll be on his best behaviour. Sophie said
      she’d swing by, too.


      Love,

      Alice'
    metadata:
      date: '2024-06-11'
      sender: alice.bennett@email.com
      recipient: janine.bennett@email.com
