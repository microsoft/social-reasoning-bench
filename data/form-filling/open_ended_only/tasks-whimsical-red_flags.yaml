    content: 'Thesis musings – late night, Kurhaus Café


      I keep circling around the topic for my thesis, but the exact research question still feels blurry. I know I want to
      look at how tourism is shaping economic development in South Tyrol—especially in terms of jobs, small business growth,
      and how income is distributed—but there are so many angles. Maybe it’ll become clearer after I finish the first batch
      of interviews and get my hands on the ASTAT data. I should revisit the case studies from Eisacktal and Vinschgau, see
      what’s already been covered, and look for gaps.


      Sometimes I worry that I’m too close to the subject, having grown up in Merano and seeing every summer season up close—like
      last July when Matthias nearly ran himself into the ground working at Hotel Europa. Still, personal experience might
      help me notice things others would miss.


      For tomorrow: email Dr. Müller about focus group logistics, draft questions for the Chamber of Commerce rep, and schedule
      time to talk with Lukas about housing issues for the section on affordability. Also, don’t forget to pick up apples
      for Mama on the way home.


      ---

      Kurhaus playlist: Italian jazz, rain at the window. Maybe a second espresso will help me clarify my thinking...'
