    background_context: "Michael Harrison is a retired school bus driver living with his wife Linda in a quiet neighborhood\
      \ in Lancaster, Pennsylvania. After nearly 30 years working for the Lancaster County School District, Michael retired\
      \ early to spend more time with Linda, especially after her cancer diagnosis last year. Two years ago, they downsized\
      \ to their current home, a modest ranch with a small backyard where Michael tends tomatoes and peppers in the summer.\
      \ Michael receives a modest pension from his years of service, amounting to about $4,200 a year, which he and Linda\
      \ supplement with Social Security and a little extra Linda makes selling her handmade jewelry and knitted crafts at\
      \ local fairs and the weekly farmer’s market.\n\nTheir days are filled with routines that keep them active and connected\
      \ to their community. Linda’s health is a central concern—she takes daily prescriptions for her cancer treatment, and\
      \ Michael keeps careful track of all her medications and appointments, driving her to bi-weekly physical therapy sessions\
      \ at the outpatient clinic downtown. Michael also manages his own mild hypertension with medication and tries to walk\
      \ daily around the neighborhood, often stopping to chat with neighbors who know him from his years driving the school\
      \ bus. They keep meticulous records of their healthcare receipts, aware of how much their out-of-pocket expenses have\
      \ grown since Linda’s diagnosis. \n\nDespite the challenges, the Harrisons focus on small joys: Saturday mornings at\
      \ the farmer’s market, Sunday calls with their daughter Emily in Pittsburgh (who sometimes visits with their granddaughter\
      \ Sophie), and the occasional visit from their son Jacob, who's building his own family in Harrisburg. Michael enjoys\
      \ fixing things around the house and occasionally helps friends with odd jobs, while Linda finds purpose in her crafts\
      \ and her weekly support group. Their greatest source of pride is their children, and their main worry is maintaining\
      \ their health and financial stability as they navigate these later years together."
  artifacts:
  - artifact_type: email
    content: 'Hi Em,


      Just wanted to catch you up on how things are going here before the weekend gets busy. Your mom and I are hanging in
      there, keeping up with our usual routines. Since April last year, she''s been seeing Dr. Patel at Lancaster Rehab Center
      every other week for physical therapy—still for those post-cancer treatment complications. The sessions are $45 each,
      not covered, but she''s really determined, hasn''t missed a single one yet. I drive her to the clinic, and we usually
      stop by CVS on the way home to pick up her prescriptions. That''s another $180 a month, but the pharmacist there knows
      us by name now, which is something, I suppose.


      We also had to pay about $900 in co-pays for her specialist visits at Penn Medicine this year—not easy, but we’re managing.
      I started keeping all the receipts in a folder in the kitchen drawer, just in case we need them for taxes or anything
      else. On my side, Dr. Rosenberg at Willowbrook Family Practice still has me on hypertension meds, $60 a month. Not my
      favorite part of getting older, but I’m grateful it’s nothing worse.


      And in case you were wondering, your mom is still getting the $150 each month from Aunt Susan''s estate. Mark sends
      the check from Pittsburgh—been doing it since June last year, and everything’s been smooth. Tell Sophie we got her letter—she
      has your handwriting! Let us know when you’re coming out next, and we’ll make sure to have some of those cinnamon rolls
      ready.


      Love,

      Dad


      PS: Linda says hi and wanted to remind you to check her Etsy page—she posted some new earrings yesterday.'
