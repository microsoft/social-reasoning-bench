      \ shortly after graduating from Sonoma State University. He works as the Operations Manager at Sonoma Bike Works, a\
      \ local business that has seen a steady uptick in customers thanks to improved bike infrastructure around the city.\
      \ His workday starts early—he’s usually at the shop by 7:30am, prepping for the morning rush of commuters and students\
      \ picking up repairs or browsing for gear. He’s passionate about sustainability and advocates for safer pedestrian and\
      \ bike routes, often volunteering with local city initiatives and attending neighborhood meetings. \n\nAt home, David\
      \ is a devoted father. Evan, his eldest, attends Santa Rosa High School just a few blocks away and rides his bicycle\
      \ to school daily, while Sophie is finishing 5th grade and enjoys walking with her friends along West College Avenue.\
      \ Michelle works part-time as a speech therapist and is active in the school’s parent committee. Family life is lively,\
      \ filled with soccer games, homework, and weekend hikes in Annadel State Park. Recently, the Fitzpatricks discussed\
      \ improvements to their neighborhood, with David excited about the new protected bike lanes and safer crosswalks that\
      \ make it easier for his kids and neighbors to get around. \n\nDavid’s daily routine includes biking to work himself,\
      \ running errands downtown, and managing the bike shop’s community outreach programs. He’s concerned about rising rents\
      \ in the area and keeps an eye on city council meetings for updates on affordable housing. The family enjoys Sunday\
      \ breakfasts at Cozy Plum Bistro and makes regular trips to the Smart Train station, where Michelle sometimes commutes\
      \ to Petaluma. With the recent improvements along West College Avenue, David feels optimistic about Santa Rosa’s future\
      \ as a more walkable and bike-friendly city."
  artifacts:
  - artifact_type: email
    content: "Subject: Long Week, Big News, and Evan’s Recovery\n\nHey Michelle,\n\nJust wanted to check in before you head\
      \ to the parent committee meeting tonight. I know it’s been a long week for both of us. Evan seems to be bouncing back\
      \ well—honestly, I’m still rattled every time I see him hop on his bike in the morning. I can’t get that March morning\
      \ out of my head, when he got hit at College and Dutton. Seeing him walk through the door with a scraped-up helmet and\
      \ the EMTs saying it was “just a minor concussion” was the biggest relief and still scared me out of my mind. I know\
      \ he brushes it off, but I catch him flinching if a car gets too close when we’re riding together.\n\nOn a brighter\
      \ note, the city finally started the upgrades on West College Ave. Protected bike lanes, new crosswalks, and better\
      \ lighting—all the things we’ve been wishing for, especially since it’s the route for both Evan’s ride to Santa Rosa\
      \ High and Sophie’s walk with her friends. I told Evan last night that they’re putting in actual high-visibility crosswalks\
      \ right where he was hit. He gave me the classic teenage eye roll but I could tell he was relieved. Sophie’s already\
