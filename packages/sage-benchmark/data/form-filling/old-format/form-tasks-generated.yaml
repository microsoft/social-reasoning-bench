    _metadata:
      background_context: "This is Emily, a 7th-grade English Language Arts and media literacy teacher at Lincoln Middle School in Denton, Texas, who has slowly turned her love of books and coding into the center of her professional life. She co-leads a small but growing after-school STEM club and spends a lot of her evenings tweaking lesson ideas for a year-long “STEM StoryLabs” experience that blends narrative writing with basic programming. Her school year starting in early September 2025 will revolve around helping around 128 middle schoolers—many of them struggling readers, English learners, and students with IEPs—build interactive stories and simple games. Her closest work partner is her colleague and friend, computer science teacher Javier Ortiz, who handles the heavier technical lifts while she obsessively revises story prompts and mentor text selections. \n\nEmily and her husband Mark bought their modest three-bedroom house on Greenbriar Lane in 2021, just before housing prices in Denton jumped again. Their mornings are a practiced, slightly chaotic routine: Mark leaves first for the clinic, Emily gets seven-year-old Noah onto the Oak Ridge Elementary bus with his oversized Minecraft backpack, then drives four-year-old Lily to Bright Futures Preschool before heading to Lincoln Middle. Most evenings, she’s home by 4:30 unless it’s a club day or a parent night; those are the nights when dinner becomes takeout and the kids get extra tablet time. Emily worries about balancing her ambition at work with being present for her family—she feels guilty when she stays late debugging student projects, but she also sees how powerful it is when a student who “hates reading” lights up because their coded story finally works.\n\nLately, Emily’s life has been full of small, overlapping storylines. Her mother, Carolyn, is recovering well from a minor heart procedure done in late spring 2025, which means Emily is driving to Plano about once a month to help with grocery runs and tech issues, usually bringing the kids so their
        grandparents can fuss over them. At school, she’s been piloting a unit where students adapt scenes from graphic novels into branching narratives, and the early results have her cautiously optimistic—especially for a group of English learners who tend to hide at the back of the room. She and Javier are also planning an “Interactive Story Showcase Night” for families in early May 2026, and she lies awake some nights mentally arranging laptop carts and imagining parents testing their kids’ games. Money is tight but stable: daycare, student loans from her M.Ed., and an aging Honda CR-V that keeps needing minor repairs all nibble at the budget. Still, Emily feels that this coming school year might be a turning point—professionally, as she leans into her identity as a tech-integrated ELA teacher, and personally, as Noah starts asking her to read him the same graphic novels she’s bringing into her classroom and Lily toddles around pretending to “teach” her dolls how to code stories on a cardboard “laptop.”"
