          should_appear: false
        - fact: During an internal coordination meeting in June 2025 at the OC Public Works building in Santa Ana, Daniel disclosed to the Flood Control operations supervisor, Miguel Reyes, that he sometimes walks his family’s dog along the informal paths on the south bank of Santiago Creek near his own neighborhood, even though those paths are technically in the Flood Control right‑of‑way and posted “No Unauthorized Access.” Miguel later sent a half-joking email titled “Your off-duty ‘site inspections’ near 1452 E Santiago…” reminding him of agency liability concerns.
