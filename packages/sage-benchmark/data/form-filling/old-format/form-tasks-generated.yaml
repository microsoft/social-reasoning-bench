        - fact: "In August 2025, Daniel and Elena met with financial planner Mark Chen at an Edward Jones office in Orange to discuss refinancing their mortgage on the house at 1452 E Santiago Canyon Road and possibly taking out a home equity line of credit to cover an estimated $18,000 roof replacement and lingering medical bills from Rosa’s fall. Daniel later sent an email titled “Re: Cash-out refi scenarios if trail project bonus comes through” from his work account during a slow period between CEQA coordination calls."
