      background_context: "This is Michael, a 61-year-old Chief Building Official who has spent more than three decades quietly shaping how homes, schools, and businesses are built in and around Peachtree Ridge, Georgia. He and his wife Karen have lived in the same two-story brick house in a 1990s subdivision since 1998, long enough to see sapling street trees grow into a full canopy and the original cul-de-sac kids leave for college and now return with children of their own. Their daughter Emily lives about 40 minutes away in Decatur with her husband Marcus and their four-year-old son Lucas, while their son Jacob rents an apartment closer to Gwinnett, often dropping by on Sunday evenings to borrow tools or talk through complicated electrical jobs. Michael’s 84-year-old mother, Patricia, moved into an independent living community in Duluth two years ago after a minor fall, and checking on her—either in person after work or via nightly phone calls—has become a steady part of his routine.\n\nOn a typical weekday, Michael is up by 5:30 a.m., pouring his first cup of coffee while skimming overnight emails from contractors, neighboring jurisdictions, and the International Code Council. He’s usually in his office at City Hall by 7:15, reviewing the day’s inspection schedule and touching base with his team of inspectors before they head out. His workdays are a balancing act: one hour he’s in a pre-construction meeting on a new medical office building, the next he’s fielding a call from a small-town building official in south Georgia asking for advice on a tricky egress issue. Several days a month he teaches ICC or BOAG training sessions, either in the City Hall conference room or via webinar, patiently walking newer inspectors through concepts like fire-resistance-rated construction and accessible routes. Evenings are often filled with community-facing work—CERT classes at the fire station, a Rotary Club luncheon talk to prepare for, or a Building Safety Month presentation he’s tweaking so it’ll make sense to homeowners who
        have never heard of a ledger bolt or a fire separation distance.\n\nLately, Michael has been thinking more about transition and legacy. At 61, he’s not in a rush to retire, but he and Karen have begun talking seriously about what the next five to seven years might look like. Karen’s cut back her nursing shifts to two days a week, partly to have more flexibility to help with Lucas and partly to be available for Michael’s mother as her mobility slowly declines. Michael worries quietly about Patricia’s balance and memory, and he’s used his own home safety checklist—the one he developed for local seniors—to go through her apartment, adding grab bars and better night lighting. Professionally, he’s pushing hard to strengthen the “Inspector Development Program” he created, making sure there are at least two people in his department who could eventually step into his role. He’s proud that several former mentees are now building officials across Georgia, and he keeps a mental map of where “his” people have landed.\n\nWeekends are when his worlds blend together. On some Saturdays, he’s on a Habitat for Humanity site in Gwinnett County, wearing a faded BOAG polo and walking volunteer crews through safe stair geometry or proper guardrail heights. Other weekends he and Karen drive into Decatur for Lucas’s soccer practices, where Michael sits on a folding chair, quietly amused that he’s now the grandparent on the sidelines. He still occasionally gets calls on Sunday afternoons from inspectors cramming for ICC exams or from a neighboring jurisdiction that’s had storm damage and needs help with rapid safety evaluations. He rarely ignores those calls, but he’s become more intentional about setting boundaries—finishing the conversation, then turning his phone face down so he can grill chicken on the back deck, talk with Jacob about the pros and cons of starting his own electrical business, or sit with Karen on the porch swing, both of them watching the neighborhood kids ride bikes in the same cul-de-sac where Emily and Jacob
        once played. Through all of it, his underlying concern remains the same: keeping people safe in the buildings they live, learn, and work in, and making sure there are capable, ethical professionals ready to carry that responsibility long after he steps away from his desk at City Hall for the last time."
