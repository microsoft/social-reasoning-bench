        - fact: In late 2023 Jonathan had a mild asthma attack while working in the shared basement workshop after sanding without his mask, which led to an unplanned visit to the A&E department at the Royal Infirmary of Edinburgh. Since then his GP at Bruntsfield Medical Practice has noted “occupational dust exposure” in his records and advised him to limit time in very dusty environments.
          should_appear: false
