    _metadata:
      background_context: "This is Melissa, a mid-career clinical psychologist in Houston who splits her time between directing the University of Houston Psychological Services Clinic in the Health and Behavioral Sciences Center and teaching in the APA-accredited doctoral program in Clinical Psychology. She’s been at UH for seven years and, in addition to her administrative and teaching duties, still carries a small caseload of therapy and assessment clients because she doesn’t want to lose the direct clinical work that drew her into psychology. Her days on campus usually start around 8:15 a.m., after she drops Elena and Mateo at Wharton Dual Language Academy and navigates the morning traffic up 59. Most mornings she heads straight to the lower level of HBSC to check in with front-desk staff, glance over the day’s schedule for the training clinic, and touch base with a few anxious first- and second-year doctoral students who are preparing for difficult sessions.\n\nIn the past year, Melissa’s attention has been pulled in a lot of directions. Professionally, she’s been focused on strengthening crisis protocols and safety practices in the Psychological Services Clinic, especially as they see more referrals involving suicidal ideation, psychosis, and high-conflict family situations. She still thinks about several near-crisis episodes over the last two years, including a student who almost needed hospitalization after a session and a custody case where angry parents had to be separated in the waiting room. Those experiences, along with her earlier work at the VA and a community mental health center, inform the way she supervises her trainees and how she structures the clinic’s policies. She spends a good part of her week in supervision rooms watching live or recorded sessions, helping students learn how to conduct risk assessments, de-escalate tense situations, and balance empathy with firm boundaries. On Wednesdays she teaches an advanced psychotherapy seminar in the afternoon, then stays late to finish notes, answer
        emails from graduate students about their dissertations, and coordinate with UH Counseling and Psychological Services about shared referrals.\n\nAt home, Melissa and her husband, Carlos, juggle the usual two-career-parent logistics. Carlos leaves early most days for Lamar High School, where he teaches AP Physics and sponsors the robotics club, so Melissa usually handles morning drop-off while Carlos tackles most afternoon pickups and homework supervision. Evenings in their Montrose townhouse are a mix of piano practice for Elena, soccer drills in the small backyard with Mateo, and quick, practical dinners—often grilled chicken, rice, and whatever vegetables Melissa can throw together. Her mother, Isabel, still drives in from Sugar Land once a week to help with the kids, especially on nights when Melissa has late supervision or an evening crisis debrief at the clinic.\n\nOver the past few months, Melissa has been feeling the cumulative weight of her responsibilities. She’s proud that the clinic is recognized across campus as a vital mental health resource and training site, but she also worries about burnout among her trainees and staff, especially with a steady stream of high-acuity clients. She’s been more intentional about building in small routines to keep herself grounded: a 20-minute walk around campus between meetings when the weather cooperates, a standing Friday lunch with a colleague from CAPS to compare notes and decompress, and a quiet hour on Sunday evenings to plan the week and review her calendar so she doesn’t miss a parent-teacher conference or a school performance.\n\nLooking ahead to 2026, Melissa is trying to carve out time to restart a research project on culturally responsive care for Latinx clients with trauma histories, something that’s close to her heart given her own family’s story as Mexican American Houstonians. She’s also helping her parents think through whether they should downsize from their Sugar Land house as her father’s knees have gotten worse. Between campus life, clinic
        crises that sometimes spill past 5 p.m., kids’ birthday parties, and her quiet hope of taking a real family vacation next summer—maybe to visit her sister Ana in San Antonio and then drive to Big Bend—Melissa’s days are full. She’s constantly calibrating how to keep her clinic safe and effective, support her trainees’ growth, show up for her own clients, and still be present for bedtime stories and Saturday morning pancakes at home."
