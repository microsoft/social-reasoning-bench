    _metadata:
      background_context: "This is Daniel Whitaker, a 38-year-old senior software engineer who lives with his family at 1847 Bluff Street in Dubuque’s Bluff Historic Preservation District. He and his wife, Anna, bought the 1890s wood-frame house in late 2019, closing just before Thanksgiving that year after a long search for an older home with character but enough space for a growing family. They moved in with their then-toddler son Evan and preschooler daughter Lily, thinking Daniel would keep commuting to his office in Peosta. When the pandemic hit in early 2020, his employer, NorthStar Health Technologies, shifted to a fully remote model. By mid-2021, his team was officially designated as permanently remote, and Daniel settled into life as a work-from-home engineer supporting a suite of patient portal and telehealth tools for clinics across the Midwest.\n\nDaniel’s weekdays now revolve around balancing focused, heads-down coding work with the rhythms of family life. He typically wakes up around 6:30 a.m., gets coffee going in the kitchen, and helps Lily and Evan get ready for school—Lily is in third grade at Prescott Elementary, and Evan just started kindergarten there in fall 2024. After Anna does the school drop-off most mornings, Daniel walks out back to the converted garage space that serves as his office and an art studio for Anna. The separation from the house has become important to him; before the renovation, he worked at the dining room table and in the spare bedroom, constantly juggling noise from cartoons, laundry, and the dog scratching at the door. Now, he can close the insulated door, log into his 8:00 a.m. standup with his Minneapolis-based team, and focus on debugging code or reviewing pull requests without feeling like he’s in the middle of the household.\n\nThe garage conversion, finished in late 2024 after a summer and fall of planning and construction, has quietly reshaped their daily life. Inside, one bay still functions as a normal garage stall, while the other side holds Daniel’s sit-stand
        desk, dual monitors, and a small couch under newly installed south-facing windows. A compact half-bath and a wall of shelves for Anna’s watercolor supplies make the space feel more like a tiny creative studio than a typical garage. Daniel uses the office primarily during business hours, but on some evenings Anna takes it over, putting on a podcast and painting while he handles bedtime routines with the kids. She works part-time as a substitute teacher in the Dubuque Community School District, picking up two or three days a week, and spends the rest of her time developing a small portfolio of children’s book illustrations. The studio has given her a place to spread out paper, brushes, and prints without worrying that Evan will knock over a rinse jar or Lily will accidentally step on a drying piece.\n\nFamily life in the Bluff Street house is busy but mostly settled. On school days, Daniel breaks for lunch around noon, often walking with Anna and their mixed-breed rescue dog, Jasper, down to Washington Park or looping around the neighborhood’s steep streets. In the afternoons he squeezes in code reviews and video calls with designers and product managers before shutting his laptop around 5:30 p.m. If he’s in the middle of a release cycle, he sometimes returns to the office after the kids are in bed, but he tries to keep that to no more than a couple of evenings a month. Anna usually handles dinner—simple meals like sheet-pan chicken or pasta—while Daniel helps Lily with reading logs or a math worksheet and listens to Evan talk endlessly about dinosaurs and construction vehicles.\n\nExtended family is close by but not underfoot. Daniel’s parents, Mark and Susan, live about 20 minutes away on the edge of town. Mark is a semi-retired electrician who occasionally advises Daniel on home projects, including the electrical upgrades for the garage studio, while Susan, a retired nurse, loves picking up the kids for occasional sleepovers. Daniel’s younger sister, Rachel, lives in Madison, Wisconsin, with her partner and
        visits every couple of months. The kids look forward to her trips because she always brings new board games and art supplies. Over the last year, Daniel has become more aware of his parents’ aging—his dad had a mild heart scare in late 2023—and part of why he values working remotely is the flexibility to drive them to appointments or help with odd jobs when needed.\n\nDaniel’s main ongoing concerns are practical and quietly adult: keeping his job secure in a volatile tech market, staying on top of the old house’s maintenance needs, and making sure the kids feel rooted and supported. NorthStar went through a small restructuring in 2023, and although his team remained intact, he still feels a low-level anxiety about future layoffs. That’s part of why he’s been taking online courses in cloud architecture and data security in the evenings, hoping to keep his skills current and his role indispensable. He also keeps a close eye on the family budget; the garage conversion wasn’t cheap, and although they managed it without overextending, he wants to pay down that chunk of their home equity line of credit within the next five years.\n\nAt the neighborhood level, Daniel and Anna are gradually becoming more involved. They know several of their Bluff Street neighbors by name, trade snow-shoveling favors in winter, and attend Washington Neighborhood Association meetings every few months when topics like traffic calming or alley lighting come up. Daniel likes that his quiet, screen-heavy job is tucked into a historic, walkable area where he can step outside and feel the texture of the city’s past in the brick sidewalks and steep hills. On weekends, the family often walks downtown for the farmers’ market in season, or drives out to the Mines of Spain for short hikes when the weather cooperates. They don’t have grand plans to move or dramatically change their lives; their focus right now is on incremental improvements—finishing the kids’ shared bedroom, slowly restoring the home’s original trim, saving for a modest summer
        road trip to the North Shore of Lake Superior, and keeping the balance between work, art, school, and rest as steady as they can."
