    _metadata:
      background_context: "This is Jonathan, a 41-year-old senior software engineer living with his wife Emma and their three-year-old daughter Sophie in a tenement flat in Bruntsfield, Edinburgh. He works for SkyeBridge Analytics, a mid-sized Edinburgh-based tech company that builds data dashboards and workflow tools for financial services firms. Since the pandemic, he’s been on a hybrid schedule: three days a week in the office near Edinburgh Park and two days working from the small second bedroom he’s converted into a home office. Most weekdays start the same way: up around 6:45am, quietly making coffee and porridge before Sophie wakes, then helping with the morning chaos of getting a toddler dressed, fed, and out the door for her nursery in Morningside. If he’s heading to the office, he usually walks down to Bruntsfield Links to catch the 11 or 15 bus, using the 25-minute ride to skim through Slack messages and review pull requests on his phone.\n\nJonathan’s work is demanding but stable. He’s been at SkyeBridge for just over four years, having moved there from a larger London-based fintech where he burned out on long hours and constant release pressure. At SkyeBridge he leads a small team of developers working mainly in TypeScript and Python, integrating data feeds into the company’s main analytics platform. He enjoys mentoring the two junior engineers on his team and has recently been nudging his manager about moving into a more formal tech lead role. A recent project—a complex migration from a legacy reporting engine—went live in January 2025, and he’s still dealing with the tail end of bug reports and feature tweaks. The company is talking about a possible restructure later in the year, which sits at the back of his mind as a low-level worry, but he feels reasonably secure given how embedded he is in several core systems.\n\nOutside of work, Jonathan’s life is very much centred around family and a handful of personal projects. He and Emma, who works three days a week as a physiotherapist at a clinic in Tollcross,
        juggle nursery pickups and drop-offs based on their respective schedules. Tuesday is usually his day to pick up Sophie, and he loves the short walk home via the Meadows, letting her stomp through puddles or inspect every interesting stick and stone. Evenings are a familiar pattern: simple dinner—often something batch-cooked on Sunday—bath and bedtime stories for Sophie, and then, if they’re not too tired, an hour of TV or reading. He’s been slowly working his way through a stack of woodworking books and YouTube playlists, trying to move beyond the very-beginner stage with hand tools.\n\nJonathan’s interest in woodworking and woodturning has grown steadily over the past couple of years. It started when he built a simple pine bookshelf during one particularly stressful winter at his old job, and he found the tactile, physical nature of the work calming in a way that coding no longer was. Since then he’s set up a modest corner in the shared basement of their building, with a workbench, a few hand planes, and some second-hand chisels. He’s been cautious about noise and dust because of neighbours, which is part of why he’s so drawn to structured courses where he can use proper machinery and dust extraction. He’s particularly conscious of dust because of his mild, dust-triggered asthma; he always keeps his Ventolin inhaler in his pocket and has invested in a good FFP3 mask that he plans to bring along whenever he’s working with fine particles.\n\nHealth-wise, Jonathan thinks of himself as reasonably fit but not as active as he’d like to be. Years of sitting at a desk have left him with a tendency towards lower back stiffness, something Emma gently nags him about. At her suggestion, he started doing a short set of stretching exercises most mornings, and he tries to get out for a brisk walk at lunchtime on his home-working days, usually looping around Bruntsfield Links and the Meadows. He knows that standing at a workbench or lathe for long stretches could aggravate his back if he locks into one position, so he’s learned
        to build in small movement breaks—stepping back, stretching, and shifting his stance—without feeling self-conscious about it.\n\nFamily ties are important to him. His parents, Peter and Margaret, live in North Berwick, about a 40-minute drive away, and he tries to visit at least once a month, often timing it so Sophie can spend a Saturday with her grandparents on the beach if the weather cooperates. His younger brother Daniel lives in Glasgow with his wife Laura, and though they don’t see each other as often as they’d like, they keep up via WhatsApp and the occasional weekend meet-up in Stirling or Falkirk. A recent ongoing thread of conversation with his parents has been whether they might eventually downsize from their house to something more manageable, and Jonathan is already mentally bracing for the practical and emotional work that will entail.\n\nLately, Jonathan has been thinking more about long-term direction. He’s not planning to abandon software engineering, but the idea of gradually building up woodworking skills to the point where he could take on occasional commissions or make high-quality pieces for friends and family is deeply appealing. The weekend woodturning course he has planned in March 2025 feels like a small but significant step: two days away from screens, surrounded by wood shavings and the hum of lathes, learning directly from experienced craftspeople. He’s already worked out the logistics in his head: leaving their Bruntsfield flat around 7:45am in his grey 2017 VW Golf, driving down the A1 towards East Lothian, and giving himself plenty of time in case of traffic. He likes having a clear backup plan—train from Waverley to Drem and then a taxi—because that’s how his mind works: contingencies on top of contingencies, so he can relax and focus on the actual experience.\n\nDay to day, his concerns are the ordinary ones of a working parent in his early forties: making sure the mortgage and bills are covered, carving out enough quality time with Emma that their relationship doesn’t get
        reduced to logistics and childcare, and trying to stay healthy enough to enjoy watching Sophie grow up. On quieter evenings, after everyone else is asleep, he sometimes sits at the living room table with a notebook, sketching ideas for small turned bowls or experimenting with joinery layouts. He knows he’s still at the beginning of his woodworking journey, but the combination of his analytical mindset and growing hands-on experience makes him feel that, slowly but surely, he’s building a more balanced and satisfying life."
