    _metadata:
      background_context: "This is Michael, a 38-year-old civil engineer and senior project manager who lives with his wife Sarah and their two kids in Willowbend Estates, a newer low-density residential neighbourhood on the east side of Stony Plain. Their home at 43 Willowbend Crescent is a light grey, two-storey single detached house with an attached two-car front garage and a decent-sized grassed backyard that backs onto a rear lane. Michael and Sarah bought the house in late 2018, just after Lucas was born, moving from a smaller duplex in Spruce Grove so they could have more space, a quieter street for the kids to bike on, and an easier commute for Sarah to Westview Health Centre. Michael works for Northline Infrastructure Group Inc., a mid-sized Edmonton-based engineering and construction management firm that handles municipal road, drainage, and utility projects around the capital region. He typically drives into Edmonton three days a week, leaving around 7:00 a.m. to beat traffic on Highway 16A, and works from home the other two days, taking video calls from a makeshift desk in the corner of the basement family room.\n\nLife lately has revolved around balancing work, the kids’ activities, and some long-planned improvements to their property. Emma has recently joined a local club soccer team that practices twice a week at the Meridian Sports Park, and Lucas just started skating lessons at the Glenn Hall Centennial Arena. That means weeknights are a mix of quick dinners, shuttling kids to practices, and coordinating who’s on driving duty—typically Michael handles Monday and Wednesday evenings, while Sarah covers Tuesdays and Thursdays around her nursing shifts. Weekends are often spent at home in Willowbend Estates: bike rides around the crescent, walks with their golden retriever Max along the nearby trail system, and visits with their neighbours, the Nguyens to the east and the Harpers to the west, who have become close family friends. Michael’s parents, Gordon and Helen, live a short drive away in Spruce Grove
        and drop by at least twice a month, often on Sunday afternoons, to see the grandkids and help with small projects around the house.\n\nOver the past year, one of Michael’s nagging frustrations has been vehicle storage and winter parking. His half-ton pickup and their small 18-foot travel trailer, which they use for camping trips to Jasper and Sylvan Lake, have been crowding the street and making snow clearing awkward. The attached front garage is already full with Sarah’s SUV, bikes, kids’ sports gear, and a growing collection of tools for Michael’s woodworking hobby. After talking it over through the winter of 2024–2025, and running numbers on what they could afford, Michael and Sarah decided to invest in a new detached garage in the backyard, off the rear lane, with an expanded concrete driveway and parking pad. They lined things up so that construction would start in mid-May 2025, once the ground has fully thawed, and wrap up by the end of September 2025 before the first heavy snow. They chose Prairie Peak Homes Ltd., a residential contractor based in downtown Edmonton, after seeing their work on a similar garage a few streets over and reading positive reviews from neighbours.\n\nIn day-to-day life, Michael is methodical and organized, traits that serve him well both at work and at home. On work-from-home days, he walks the kids to High Park School around 8:15 a.m., chatting with other parents about local events and minor neighbourhood issues like speeding on the collector road. He’s usually back at his laptop by 8:45 a.m., coordinating with site superintendents, municipal clients, and utility companies on projects scattered across the region. Lunchtimes at home are often a quick sandwich and a 20-minute check in the backyard, where he mentally pictures how the new garage will fit, how drainage will work along the fence line, and where he might eventually add raised garden beds once the concrete work is done. In the evenings, after the kids are in bed, he sometimes retreats to his small basement workbench
        to sand down a cutting board or sketch out ideas for built-in shelving he wants inside the new garage.\n\nFinancially, things are stable but tight enough that the $72,000 they’ve earmarked for the detached garage and concrete work feels significant. Michael keeps a detailed household spreadsheet and has set a goal to avoid dipping into their emergency fund, relying instead on savings they accumulated through 2023 and 2024, plus a modest line of credit. He’s a bit anxious about potential cost overruns—he’s seen enough projects at work balloon due to unforeseen issues—and checks in regularly with Prairie Peak’s project manager to keep timelines and budgets on track. At the same time, he’s excited about the practical benefits: being able to park his truck and the trailer off-street, freeing up the front driveway, and having a dedicated, heated space for woodworking and seasonal storage. He’s also mindful of being a good neighbour; he has already chatted with the Nguyens and Harpers about construction noise and access, reassuring them that work will be kept to normal daytime hours and that he’ll make sure the back lane stays clean and passable.\n\nLooking ahead through 2025, Michael is juggling several parallel concerns: a major road reconstruction project he’s overseeing for the City of Edmonton that’s entering a critical summer phase, Sarah’s fluctuating shift schedule at the hospital, Emma’s growing interest in competitive soccer (with its associated time and cost commitments), and the hope that they can still squeeze in at least two camping trips despite the backyard being a construction zone. He’s also started to think more about his own health after a mild back strain in February 2025, prompting him to add short morning stretches and occasional evening swims at the Tri Leisure Centre in Spruce Grove. Overall, his life is busy but grounded—rooted in family routines, neighbourhood relationships, and the satisfaction of slowly shaping their home in Willowbend Estates into a long-term base for their kids’ growing
        years."
