        - fact: In February 2022, after losing a retail job in Midtown Manhattan, Isabel became severely depressed and was admitted for a 5‑day inpatient psychiatric stay at Queens Community Mental Health Center’s affiliated inpatient unit; the discharge summary from Dr. Patel notes suicidal ideation and an increase in her SSRI dosage.
