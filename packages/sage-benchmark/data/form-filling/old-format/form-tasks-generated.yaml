      background_context: "This is Michael Carter, a 50‑year‑old CNC machinist living in a modest split‑level house on Oak Ridge Drive in Painesville, Ohio. He’s been with Lake County Tool & Die for over twelve years, working the early shift setting up and running precision machining jobs for local manufacturers. His weekdays usually start around 4:45 a.m.—coffee in a chipped Browns mug, a quick check of his email on his phone, and a careful stretch of his left knee before he gets ready for the day. That knee, with a torn meniscus confirmed back in November 2024, has been giving him trouble for months, making it painful to stand on the concrete shop floor for long stretches. After consulting with an orthopedic specialist at Lake Health Medical Center, he scheduled an outpatient procedure for January 8, 2025, and has already done his pre‑op testing and arranged the week of January 6–10 off with his supervisor, who reworked the production schedule around his absence.\n\nMichael is divorced but on decent terms with his ex‑wife, Denise, and most of his attention these days is on his kids and his health. His daughter Alyssa is finishing her last year at Ohio University and calls a couple of times a week to talk about job applications and graduation plans. His son Brandon graduated from Riverside High School in spring 2024 and started at Lakeland Community College that fall, commuting from Michael’s house while working part‑time at a local auto parts store. Evenings at home are quiet: Brandon coming and going from classes and work, Michael icing his knee in the recliner while watching Cavs or Browns games, or tinkering with an old toolbox in the garage. On Sundays he often drives over to Mentor to take his 78‑year‑old mother, Evelyn, to the grocery store or church, especially now that her driving has become more cautious and limited.\n\nIn the weeks leading up to his surgery date, Michael’s routine has been a careful balance of keeping up at work and not overdoing it physically. His boss at Lake County Tool & Die, understanding
        the situation, approved his medical leave specifically for that second week of January, and the company has already shifted some rush orders to other machinists. Michael worries that if he has to postpone the procedure, he’ll be facing several more months on a long waiting list and continuing pain that makes his job and daily life harder. He’s grateful that his insurance will cover most of the surgery, but he’s also watching his finances closely with one kid still in college and the other just starting. Most nights he’s in bed early, setting an alarm for the next workday and mentally running through everything coming up in early 2025—recovery from surgery, helping Brandon navigate school and work, and hopefully getting back to walking comfortably so he can enjoy simple things again, like fishing at the Grand River in the spring or standing through an entire ballgame without thinking about his knee."
      form_id: 1562
