    _metadata:
      background_context: "This is Emily, a 38-year-old UX researcher living in the Ravenna neighborhood of Seattle with her husband Michael, their seven-year-old daughter Sophie, and their golden retriever, Luna. She works full-time at Pacific Horizon Software, a mid-sized tech company based in downtown Seattle that builds project-management tools for small businesses. Since the pandemic, her role has become mostly hybrid; she goes into the office one or two days a week and works from her small but carefully organized home office the rest of the time. Her workdays usually start around 7:00 a.m. with coffee at the kitchen table while she checks her calendar and reviews notes for upcoming user interviews. By 7:30, she’s waking Sophie, helping her find the ever-missing library book, and putting together a simple breakfast before Michael takes over school drop-off on his way to Roosevelt High, where he teaches chemistry and environmental science.\n\nEmily’s generalized anxiety disorder is something she’s come to understand and manage over the past decade. With sertraline keeping things steady and occasional check-ins with her primary care physician, Dr. Laura Chen at Pacific Primary Care in Seattle, she feels mostly in control—though busy weeks with product deadlines and back-to-back Zoom calls can still leave her feeling keyed up. She’s become intentional about small routines that keep her grounded: a 20-minute walk with Luna in the late afternoon, a short guided meditation on her phone a few evenings a week, and trying (not always successfully) to log off work by 5:30 p.m. During spring and early summer, her seasonal allergies flare; a bottle of cetirizine lives in the kitchen cabinet, and the fluticasone nasal spray sits by the bathroom mirror, both part of the unremarkable rhythm of daily life. Her history of a mildly atypical mole removed in 2019 has made her conscientious about sunscreen and her annual dermatology visits, but she doesn’t dwell on it—she just schedules her skin check each August, right after family
        vacation.\n\nAt home, Emily is the quiet planner of the household. She keeps a shared Google calendar for family events, school activities, and meal plans, and she’s recently leaned into a mostly Mediterranean-style diet after noticing she feels better with more vegetables, whole grains, and fewer processed snacks. Evenings are a mix of homework help at the dining table, simple dinners—sheet-pan chicken, veggie pasta, or salmon with roasted broccoli—and negotiating screen time with Sophie. Tuesdays are particularly full: Sophie has soccer practice at a nearby park, and Emily often chats on the sidelines with other parents while Luna dozes on the grass. Weekends are a balance of errands at the U District farmers market, playdates, and occasional trips down to Tacoma to see her parents. Her mother, Karen, loves having them over for Sunday dinners, and Emily appreciates the extra pair of hands with Sophie.\n\nLately, Emily has been thinking a lot about the next few years. Her company is restructuring some teams, and while her position is secure, there’s talk of a larger, more demanding project that would require occasional travel to client sites in Portland and San Francisco. She’s weighing the professional excitement against the logistics of parenting and her desire to keep her anxiety well managed. She and Michael have also been having tentative conversations about whether they’re done with having just one child; at 38, she’s realistic about timing and risk, so for now she continues taking her oral contraceptive while they talk things through. She’s content most days—tired in a normal working-parent way, proud of the life they’ve built in Seattle, and quietly hopeful that she can keep carving out small pockets of time for herself, whether that’s a yoga class at the community center, finally finishing the novel on her nightstand, or planning a long weekend in the San Juan Islands next summer."
