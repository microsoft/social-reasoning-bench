      background_context: "This is Alyssa, an 18-year-old high school senior at Norman High who’s in the middle of that intense, in-between season where she’s still very much part of her parents’ household but already thinking in semesters, majors, and long-term plans. She still sleeps in the same small bedroom she’s had since middle school in their rented duplex on Willow Brook Drive, with marching band medals hanging on the wall and a whiteboard above her desk covered in deadlines: AP Computer Science A projects, band rehearsal times, her Sooner Mart work shifts, and a countdown to freshman orientation at the University of Oklahoma. Most weekday mornings start around 6:15 a.m. so she can get ready before her mom leaves for the clinic’s 7:30 a.m. shift. Alyssa usually helps her younger brother Jacob find his homework or pack his backpack, then they ride the bus together—he hops off at Whittier Middle, and she continues on to Norman High.\n\nSchool days are packed. Alyssa moves from AP Computer Science A and AP Statistics to English and band, then to Robotics Club or Math Club meetings after the final bell. Twice a week she heads straight from campus to Sooner Mart, the small grocery store off Main Street where she works 12–15 hours a week, usually from 4:30 p.m. to 8:30 p.m. She’s become the go-to person for the self-checkout lanes because she’s patient with older customers and quick at troubleshooting small glitches. On Saturdays when she’s not scheduled at the store, she bikes to the Norman Public Library to volunteer in the children’s section, shelving books and helping at the reading corner. Evenings at home are a mix of responsibilities and small rituals: helping Jacob with algebra, reading a chapter of whatever realistic fiction or memoir she has checked out, and squeezing in coding practice on the family’s aging laptop. That laptop crashes often enough that she’s started saving every file in multiple places, and the unreliability nags at her whenever she imagines college-level programming assignments.\n\nFamily
        life in the Thompson duplex is close and practical. Money is tight—rent on the duplex went up again last summer, and her parents are still paying off a car repair from the previous year and lingering medical bills from her dad’s minor surgery. Alyssa is very aware of the stack of envelopes on the kitchen counter each month and the way her parents talk in low voices about which bill to prioritize. She picks up extra weekend shifts when she can, knowing that her contributions to the gas bill or groceries make a real difference. Sundays are usually the one slower day: her mom plans meals for the week, Alyssa helps cook something simple like chicken fajitas or a new pasta recipe they found online, and her dad shares stories from his delivery routes while Jacob talks about his latest video game. In quieter moments, Alyssa scrolls through OU’s course catalog on her phone, reading about classes in human-computer interaction and educational technology, picturing herself walking across the OU campus just a few miles away but feeling like it’s a different world.\n\nRecently, life has revolved around transition. In March 2025, she received her official acceptance to OU’s computer science program, and the family celebrated with takeout from their favorite taco place instead of going out to a restaurant to save money. Since then, Alyssa and her mom have spent evenings at the kitchen table comparing estimated college costs, talking about how many hours she can realistically work her first year without sacrificing grades, and mapping out how she might apply for campus jobs or paid research positions once she arrives. Alyssa is both excited and anxious: excited about joining groups like Women in Computing and the campus ACM chapter, and anxious about being a first-generation college student trying to navigate everything from course selection to financial aid. She’s determined to keep volunteering with younger students in some way, maybe through a campus outreach program that visits local schools. As graduation approaches in
        late May 2025, her days are filled with band performances, final robotics club events, and AP exams, while her nights are spent quietly worrying about money, practicing Java and Python, and picturing the moment she logs into her first college learning portal on a laptop she hopes will finally be reliable enough for the future she’s working so hard to build."
