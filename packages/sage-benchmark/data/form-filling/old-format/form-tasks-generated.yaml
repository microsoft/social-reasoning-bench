    _metadata:
      background_context: "This is Amelia “Amy” Thao Nguyen, a 28-year-old Vietnamese-Canadian living in a one-bedroom apartment on Elbow Drive SW in Calgary, about a 10-minute drive from several continuing-care centres and from her parents’ house in Haysboro. She works full-time as a junior occupational therapist assistant at Foothills Mobility & Rehab Clinic, a small private outpatient rehab clinic that mainly serves adults recovering from orthopedic surgeries, workplace injuries, and strokes. Amy has been in this role since September 2020, after graduating from SAIT’s Occupational/Physical Therapist Assistant program in 2019 and spending her first year covering a mix of casual positions in long-term care and home-care agencies. Her workdays are fairly structured: she’s usually at the clinic by 8:00 a.m., helping set up treatment rooms, organizing adaptive equipment, and reviewing the day’s schedule with the supervising occupational therapist. She spends most of her day guiding clients through exercise programs, practicing safe transfers, and documenting progress notes.\n\nAmy’s current life is shaped by the loss of her maternal grandmother, Huong, who passed away in late 2021 after seven years in a long-term care facility in Edmonton. Those years of visiting her grandmother—often spending weekends driving up with her parents—left a strong impression on her. She saw how much small, consistent acts from volunteers could change her grandmother’s week, whether it was a game of cards, a sing-along of old Vietnamese songs, or simply listening to her talk about her childhood. Since then, Amy has gravitated toward work and activities that keep her grounded in relationships with older adults. Outside of her job, she has completed a Mental Health First Aid course and a short workshop on dementia-friendly communication in 2023, and she’s been gradually carving out time in her week—usually a three-hour block on Monday or Wednesday mornings or Friday afternoons—to offer steady, face-to-face support to seniors in her community.\n\
        \nDay to day, Amy’s routine is a mix of calm habits and quiet responsibilities. She wakes up around 6:30 a.m., does 15–20 minutes of light yoga in her living room, and drinks tea by the window that looks out over Elbow Drive before heading to work. Evenings are slower: she cooks simple meals—often a mix of Vietnamese dishes like bò kho or canh chua and Canadian comfort food like roasted chicken and vegetables—reads historical fiction or gentle mystery novels, and keeps in touch with her younger brother Daniel in Vancouver via video calls, sometimes walking him through family recipes or troubleshooting his attempts at phở. On weekends, she often walks along the Glenmore Reservoir or meets her long-term boyfriend, Jason, for coffee and a stroll through Heritage Park when the weather is good. She and Jason have been together for four years and are slowly talking about the logistics of moving in together in the next year, weighing the cost of rent, their commutes, and staying close to her parents as they age.\n\nAmy’s biggest ongoing concerns revolve around balance and sustainability. Her job can be physically and emotionally demanding, especially when she’s working with clients who are frustrated by slow progress or dealing with chronic pain. She’s careful about her own back and shoulders, doing regular stretching and being meticulous with body mechanics when assisting with transfers. Emotionally, she’s still processing grief over her grandmother, which sometimes surfaces when she’s with older clients who remind her of Huong. Rather than avoiding that discomfort, she channels it into being a calm, patient presence—willing to sit quietly with someone who is confused, repeat instructions gently, or sing a familiar song from the 1960s if it lightens the mood.\n\nHer social life is modest but meaningful. Amy is close to her parents, often stopping by their house for Sunday lunch, where her mother, Lan, sends her home with containers of homemade food and her father, Minh, quizzes her on whether she’s contributing enough
        to her RRSP. She keeps up with a small circle of friends from SAIT, meeting them for occasional trivia nights or potluck dinners. She enjoys low-key crafts—card-making, scrapbooking, adult colouring, and basic knitting—and sometimes brings small projects to share with older neighbours in her building, helping them organize photos on their phones or set up video calls with distant family. Technology has become another quiet way she bridges generations, patiently teaching older adults how to use tablets, send pictures, or join a family group chat.\n\nAs she looks ahead to the next couple of years, Amy is thinking about taking on more formal training—maybe a part-time bachelor’s degree in health sciences at the University of Calgary—or specializing further in geriatric rehab. She wants to stay in Calgary long term, build stable routines, and be someone the people around her can rely on. Her life is not dramatic; it’s a steady weave of work, family, and small, consistent acts of care. Her main hope is that by showing up week after week—for her clients, her family, and the older adults she spends time with—she can offer the same sense of dignity, safety, and companionship that meant so much to her grandmother in her final years."
