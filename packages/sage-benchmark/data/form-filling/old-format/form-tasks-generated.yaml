    _metadata:
      background_context: "This is Michael, a 38-year-old senior project manager living in Tacoma, Washington, with his wife Emily and their two young kids, Sofia (8) and Lucas (5). He works for Rainier Health Systems, a regional hospital network, overseeing software implementation projects—recently a big upgrade to the electronic medical record system at the main Tacoma campus. His workdays are structured but often hectic: he’s usually up around 6:00 a.m., makes coffee in a stainless steel French press (he’s aware it’s staining his teeth but not ready to give it up), and helps get the kids ready for school. Most weekdays he splits his time between working from home and being on-site at the hospital’s administrative offices, juggling Zoom stand-ups, vendor calls, and timelines for go-lives. He tends to eat lunch at his desk, often something quick like leftovers or a turkey sandwich, and he snacks on almonds or trail mix—exactly the kind of harder foods that have started to bother the upper left side of his mouth when he chews.\n\nAt home, life is busy but generally stable. The family has lived in their current three-bedroom house in Tacoma’s North End since 2021, having moved from a smaller apartment closer to downtown when Lucas was a toddler. Evenings are a rotating mix of homework with Sofia, Lego building or dinosaur games with Lucas, and coordinating schedules with Emily, who teaches 7th-grade English at a nearby middle school. They’ve been talking about possibly enrolling Sofia in soccer again in the spring and finding a swim class for Lucas, which means even more shuttling back and forth after work. Michael tries to fit in a 20–30 minute jog or a quick workout with resistance bands two or three times a week after the kids are in bed, but often he’s still catching up on project emails instead. Lately he’s been waking up with a tight jaw and a dull ache around his molars, which he now knows is probably from grinding his teeth at night—something his wife has mentioned she hears when he’s especially stressed about
        a looming project deadline.\n\nHealth-wise, Michael considers himself reasonably conscientious but not perfect. He brushes twice a day, sometimes three times if he’s had especially sticky snacks or a sweet mid-afternoon coffee drink, and he’s been making an effort to floss 4–5 times a week in the evenings. He uses soft, nylon-bristle toothbrushes and an alcohol-free fluoride rinse before bed, and he keeps a small pack of interdental brushes in the bathroom drawer to clean around his back molars, where food tends to get stuck and his gums look a bit puffy. He’s had his share of dental work—multiple fillings over the years and a root canal with a crown on his upper right first molar back in March 2018—and he still remembers a rough experience as a teenager when a filling was done before he was fully numb. Because of that, he gets anxious before appointments and appreciates when the dentist talks him through each step and checks in frequently about pain. He’s noticed that his lower right side sometimes needs extra time or an additional dose of local anesthetic to get thoroughly numb, so he plans his visits for mornings after a light breakfast to avoid feeling lightheaded.\n\nIn the last few months, Michael has become more aware of several things about his mouth that bother him: intermittent sensitivity and a dull ache on his upper left side when he chews harder foods, sharp zings from cold drinks on a few lower teeth, and gums that look a little red and puffy with occasional bleeding when he flosses—especially around the back molars. There’s also an old silver filling on a lower right molar that feels rough and catches food, which irritates him when he’s running his tongue over it absentmindedly during long meetings. He’s started to chew more on one side without thinking about it, and he worries that between the grinding, the old fillings, and his history of many cavities, he could be setting himself up for bigger problems if he doesn’t stay on top of care. He hasn’t smoked, and he’s glad for that, but he knows
        his daily coffee habit has gradually yellowed his teeth and he’s quietly hoping that once any active issues are handled, he can pursue whitening to feel more confident in work presentations and family photos.\n\nOutside of work and dental worries, Michael’s life revolves around family routines and manageable, everyday concerns. Weekends often involve grocery runs to the local co-op, taking the kids to Point Defiance Park or the zoo, and occasionally driving up to Federal Way to see his parents, Carlos and Patricia. His father, a retired electrician, sometimes helps him with small house projects, like installing a new light fixture or fixing a loose cabinet door, while his mom reads with Sofia or plays board games with Lucas. Emily’s brother Daniel visits from Portland a few times a year, and when he does, the adults stay up too late talking, drinking coffee or the occasional craft beer, and comparing work stories. Michael is trying to be more proactive about his health overall—getting regular checkups, staying more consistent with flossing, and learning what he can do at home (like possibly using a night guard) to protect his teeth and reduce sensitivity. He likes having a clear, prioritized plan: what needs to be dealt with right away, what can wait a bit, and what he can do day-to-day to keep his mouth and overall health in good shape while still managing the realities of a full-time job and two energetic kids."
