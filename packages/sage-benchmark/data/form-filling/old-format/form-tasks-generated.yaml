    _metadata:
      background_context: "This is Isabel Rodriguez, a 32-year-old Latina woman living with her older sister’s family in Woodside, Queens. She’s been sleeping on a pull-out couch in the living room of the two-bedroom apartment for a little over a year, ever since a previous roommate situation in Bushwick fell apart when the rent went up and the roommate moved in with her boyfriend. The apartment is always busy: her niece Sofia gets up early for school, her nephew Daniel is loud and energetic, and her brother-in-law Marco works early construction shifts. Isabel is grateful to have a roof over her head and people who care about her, but the lack of privacy and constant noise make it hard for her to manage her anxiety and depression. Most nights she falls asleep with headphones on, listening to quiet playlists or guided meditations on her phone to drown out the TV.\n\nIsabel works part-time at Bright Pages Books, a small independent bookstore in Williamsburg, Brooklyn, usually three to four days a week. Her typical weekday starts around 7:30 a.m. when she wakes up on the couch, folds up the bedding, and tucks it into a storage ottoman so the living room can function as a family space again. She showers, makes herself oatmeal or scrambled eggs, and checks her calendar app to confirm her shift and any appointments. On days she works, she takes the Q58 bus to the M train and then transfers to the L to get to Bedford Avenue. At the bookstore, she runs the register, helps customers find titles, and especially likes organizing the fiction and mental health sections; her manager, Cara, knows she’s detail-oriented and often asks her to do the window displays. Isabel enjoys the steady routine and the quiet pockets during slower hours, though standing for long periods can be tiring on days when her mood is low.\n\nMental health treatment is a central part of Isabel’s life. She has a diagnosis of major depressive disorder and generalized anxiety disorder and sees her therapist, Dr. Patel, once a week at Queens Community Mental Health
        Center, usually on Tuesday afternoons. Once a month she meets with the clinic’s psychiatric nurse practitioner for medication management. Her case manager there, Angela Martinez, has been working with her for almost two years and is someone Isabel trusts deeply; they meet weekly to go over goals, appointments, and any paperwork or letters that might be piling up. Angela has helped Isabel set up a simple budgeting system, use a calendar app with alerts, and break tasks into smaller steps so they feel less overwhelming. Isabel knows she can handle daily tasks like cooking, cleaning, and doing laundry, but she still leans on Angela for support with organization and big-picture planning.\n\nFamily plays a big role in Isabel’s support network, though it can be complicated. Her sister Elena is protective and loving but sometimes hovers, worried that Isabel will fall back into the more severe depression she experienced three years ago when she briefly needed a short inpatient stay after losing a retail job. Elena checks in often—asking if Isabel took her meds, if she ate, if she’s okay—which Isabel appreciates but occasionally finds suffocating. Their mother, Carmen, lives in a rent-stabilized apartment in Jackson Heights and works part-time as a home health aide; she calls Isabel almost every evening, offering a mix of gentle encouragement and old-school advice, often in Spanish. Isabel’s father, Luis, moved to Orlando after her parents separated years ago; they talk every few weeks on the phone, and while he’s supportive, he’s more distant from the day-to-day realities of her life in New York.\n\nRecently, Isabel has been focused on finding a more stable, quiet place to live that would still keep her close to her job, her clinic in Queens, and her family. She’s been learning more about supportive housing options in neighborhoods like Ridgewood, where she could have her own one-bedroom apartment but still have staff in the building for check-ins and help if her symptoms start to worsen. The idea of having her own
        room with a door she can close—her own bed, a small desk, maybe a plant by the window—feels like a huge step toward independence. At the same time, she feels nervous about the responsibility of paying rent directly and managing all the bills, even though her SSI benefits and part-time income should cover a modest place with the right support.\n\nDay to day, Isabel is trying to build and maintain routines that keep her grounded. On mornings when she doesn’t work, she sometimes walks to Doughboy Plaza or a small park nearby with a coffee, listens to podcasts about books or mental health, and practices some of the breathing exercises she learned in therapy. She does laundry in the building’s basement laundry room on Sunday evenings when it’s less crowded, and she helps Elena with cooking on weekends—often making arroz con gandules or a simple chicken and vegetables dish. She keeps a small notebook where she tracks her mood, sleep, and medications, and she’s proud that in the last six months she hasn’t missed any therapy or medication appointments.\n\nIsabel’s main concerns right now are maintaining her stability through the winter months—when her depression tends to get worse—and finding a living situation that balances independence with support. She worries about being a burden on her sister’s family, especially when the kids need more space as they get older. At the same time, she doesn’t want to become isolated or cut off from the people and services that help her stay well. Her goals for the next year are modest but meaningful: keep her job at the bookstore, continue going to therapy regularly, move into her own apartment in a supportive setting in or near Ridgewood, and slowly build more confidence in handling paperwork and deadlines on her own. She knows she’s capable of living independently in terms of day-to-day tasks, and she’s working steadily—step by step—toward a life where she feels both secure and self-reliant."
