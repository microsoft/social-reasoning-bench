        - fact: "In late October 2024, after their IT analyst was out with COVID, Dan quietly had his own stress-related health scare: he experienced chest tightness and palpitations during a Thursday afternoon intake-workflow workshop in the small conference room at the central Northbridge clinic and ended up seeing Dr. Karen Patel at NorthShore Evanston Hospital’s cardiology clinic the following Monday. His MyChart message thread is titled “Question about chest pain during work meetings.”"
