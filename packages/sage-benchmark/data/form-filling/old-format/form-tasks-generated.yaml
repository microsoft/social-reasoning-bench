    _metadata:
      background_context: "This is Laura, a 36-year-old senior data analyst who has slowly but deliberately steered her career toward the same causes she cares about in her volunteer life. She lives in a modest but light-filled two-bedroom apartment on Maple Terrace in Seattle’s Rainier Valley, where the sound of light rail trains passing in the distance has become part of the backdrop of her evenings. In October 2024 she started a new role at HarborBridge Impact Analytics, a small mission-driven firm that works almost exclusively with education and housing nonprofits. The move came after five years at North Sound Data Solutions, where she honed her technical skills and mentored junior analysts but increasingly felt pulled toward work that more directly aligned with her long-standing volunteer commitments in education and housing stability.\n\nHer days are structured but full. On a typical weekday, she’s up by 6:30 a.m., often before her partner, Maya, who works as a middle school counselor. Laura brews coffee, checks the news on her phone, and squeezes in a short run along nearby residential streets or a quick yoga session in their living room before logging on around 8:30. Her work ranges from cleaning messy program data from youth tutoring initiatives to building dashboards in Tableau that help shelter directors understand which families are staying the longest and why. Because HarborBridge is small, she often jumps on Zoom calls with executive directors and program managers who aren’t especially data-savvy, translating complex metrics into plain language and visual stories they can use with boards and funders. She’s still within her first year there, so she’s balancing the excitement of designing new reporting frameworks with the stress of proving herself to a tight-knit team and learning each client’s quirks.\n\nEvenings have recently shifted for her. From 2020 until the end of the 2023–2024 school year, twice a week she headed straight from work to Evergreen Family Shelter, where she served as an Evening Homework
        Club Tutor & Program Assistant. There she helped 8–12 elementary and middle school students living in transitional housing with reading, math, and study habits, and quietly coordinated small teams of fellow volunteers, tracked progress, and designed simple enrichment activities that would be grounding for kids dealing with housing instability and trauma. When she accepted the new job at HarborBridge and moved from a shared house in Columbia City to Maple Terrace in early summer 2024, her commute and longer evening hours made it hard to be consistently present. After talking it through with the volunteer coordinator, she stayed until June 30, 2024, seeing the school year through, documenting her routines for reading groups, and helping onboard new volunteers so the kids wouldn’t feel abruptly abandoned. She still misses walking into the homework room and having a few of the kids run up to show her their spelling tests, but she remains on the shelter’s mailing list and occasionally helps at weekend events.\n\nHer path to Evergreen grew out of earlier experiences. Shortly after moving to Seattle in 2016, she began volunteering at Rainier Valley Community Learning Center as an Adult ESL Classroom Assistant, supporting evening English classes from January 2017 until in-person operations shut down in March 2020. She remembers specific students—like a father who practiced introducing himself for parent-teacher conferences—and how she would walk between tables helping with pronunciation, job interview role-plays, and basic writing tasks, then stay late to help the instructor tidy the room and update participation notes. When the pandemic forced everything online, she helped for a few weeks with phone check-ins and teaching Zoom basics, but many of the learners lacked stable internet or devices, and her own job at North Sound suddenly demanded irregular hours as clients scrambled to adjust. After some honest conversations with the staff, they agreed to formally end her weekly role while leaving the door open for future
        in-person opportunities. That transition, and the sense of unfinished work, helped crystallize her desire to focus even more heavily on youth and housing once programs reopened, which is what ultimately drew her to Evergreen.\n\nHer commitment to community work started earlier in Portland. From 2013 to mid-2016, she spent Thursday evenings at Portland Community Food Share, doing intake and helping to distribute food. She got used to the rhythm of greeting families, verifying eligibility based on income and household size, and quietly watching for signs of embarrassment or stress so she could offer help in a way that preserved dignity. She learned how to restock shelves efficiently, check donation quality, and assemble emergency food boxes for homebound seniors. In her last year there, she started informally training new volunteers, walking them through food safety practices and how to de-escalate when tensions ran high due to long waits or limited supplies. When she moved to Seattle in summer 2016 for a job opportunity, she worked with the volunteer manager during her final month to hand off her regular shift and refine written intake instructions. She still donates each holiday season, a small ritual that keeps her connected to that chapter of her life.\n\nProfessionally, Laura’s trajectory has been steady and intentional. After graduating from Portland State University in 2011 with a degree in sociology, she spent several years as a Research Assistant at Bridgeview Research & Consulting in downtown Portland. From September 2015 to July 2019, she supported program evaluations for local governments and nonprofits, cleaning survey data in SPSS, coding open-ended responses, and helping design questionnaires and interview protocols. She coordinated logistics for focus groups and stakeholder interviews, took meticulous notes, and learned how to communicate data questions diplomatically with clients while respecting confidentiality. By 2019, with a few multi-year projects wrapping up and her desire to be closer
        to her parents in Washington growing, she decided to relocate to Seattle. Bridgeview supervisors knew months in advance and helped her transition out cleanly, even providing references that later helped her land the Data Analyst role at North Sound.\n\nAt North Sound Data Solutions, where she worked from August 12, 2019 to September 30, 2024, Laura shifted from evaluation support into full-fledged analytics. She became proficient in SQL and Python for data cleaning and integration, and she built dashboards in Tableau and Power BI for mid-sized nonprofit and education-sector clients. Over time, she became the go-to person for nonprofit accounts, often translating vague client questions into concrete analytical projects. She mentored two junior analysts, teaching them about data quality checks and visualization design, and collaborated with software engineers and account managers on product improvements. By early 2024, she felt a strong pull to specialize in social-impact work, particularly in education and housing—the same areas where she volunteered. After discussing her goals during her annual review, she began quietly exploring options and eventually accepted the opportunity at HarborBridge, providing over a month’s notice so she could document projects, train a replacement, and stay available for questions during the handoff.\n\nOutside of work, Laura’s life is anchored by close family ties and a stable partnership. Her parents, Janet and Bob, live in Olympia; she drives down once a month, often on a Sunday, to have dinner and help her dad with small home repairs or tech issues. Her mom, a retired elementary school teacher, is both proud and amused that Laura’s work and volunteering have led her back into classrooms and homework help in a different way. Her younger brother Daniel, a high school social studies teacher in Tacoma, shares her interest in equity and education, and they trade stories about the challenges their students face—from food insecurity to housing instability. Laura’s partner, Maya, understands
        these pressures well through her own role as a school counselor. They met in 2018 at a mutual friend’s board game night and have been living together for the past three years, sharing a mix of routines: Sunday grocery runs, midweek vegetarian stir-fries, and occasional spontaneous late-night walks when either of them needs to decompress.\n\nLately, Laura has been adjusting to the subtle but real changes that came with moving to Maple Terrace and starting the new job. The new role is satisfying but demanding, and she’s still figuring out how to protect her evenings so she doesn’t slide into old habits of logging back on after dinner. She misses the structured, twice-weekly homework club shifts that used to separate her workday from her community life. To fill that gap without overcommitting, she’s been exploring shorter-term or more flexible volunteer opportunities—like weekend book drives or data-cleaning projects for small nonprofits that can be done remotely. At the same time, she and Maya have been talking cautiously about longer-term plans: whether they can afford to stay in the neighborhood if rents rise again when their lease renews next summer, and what starting a family might look like given their workloads and the cost of childcare in Seattle.\n\nHer daily concerns are ordinary but meaningful. She worries about her parents’ aging—her father’s back has been troubling him more, and she’s quietly started researching electricians’ retirement options and resources for caregivers. She keeps an eye on her own health, managing occasional stress-related insomnia by sticking to an evening routine of reading physical books instead of scrolling on her phone. She’s midway through a stack of library holds about housing policy and trauma-informed education, partly out of professional interest and partly because she wants to understand more deeply what the kids at Evergreen and the families in her clients’ datasets are actually experiencing. On Fridays, she and Maya often meet friends at a neighborhood café or a food
        truck pod, decompressing from the week; on Saturdays, she might spend a few hours tinkering with a personal data visualization project or helping her nephew Oliver troubleshoot a math game over video chat.\n\nOverall, Laura’s life is in a phase of intentional consolidation. She has aligned her job with her values, built a home and partnership she feels grounded in, and maintained ties to the volunteer communities that shaped her. At the same time, she’s navigating the practical constraints of time, energy, and money that come with living in an expensive city while trying to do mission-driven work. Her story at the moment is one of careful balancing: between ambition and sustainability, between showing up for others and not burning herself out, and between honoring the kids and adults she’s worked with in shelters, ESL classrooms, and food pantries, and making space for her own future to take shape."
