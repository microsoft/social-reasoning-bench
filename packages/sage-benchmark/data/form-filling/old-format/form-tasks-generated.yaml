        - fact: In January 2024, Daniel and Emily met with loan officer Mark Jensen at CommunityAmerica Credit Union on Metcalf Avenue to discuss a potential home‑equity line of credit after Daniel’s firm had a slow fourth quarter in 2023, leaving them two months behind on one of their business credit cards. Daniel keeps a spreadsheet on his laptop labeled “2024 cash‑flow – fence + siding – Mark J. HELOC scenarios.xlsx” that tracks how they can pay for the fence without missing mortgage payments to First National Bank of Omaha.
