      background_context: "This is Daniel Thompson, a 47-year-old Planning Manager with the City of Riverside Planning Department. He supervises a small team of planners handling current development review and environmental compliance, and he’s known in the office for being meticulous about state environmental regulations and local code. In late 2025, a lot of his workday revolves around coordinating with other city departments—especially Parks, Recreation and Community Services—on modest public facility upgrades like the Arlington Branch Library interior renovation and ADA accessibility improvements. Because he lives less than ten minutes from that library, he feels a personal stake in making sure the project genuinely improves access for seniors and students in his own neighborhood.\n\nDaniel and his wife, Elena, bought their three-bedroom home near Arlington High School in 2013, just as their daughter Sofia was starting kindergarten. Now Sofia is a sophomore at Arlington High, juggling honors classes, JV soccer, and an emerging interest in environmental science that Daniel quietly encourages. Their younger son, Lucas, is in sixth grade at a nearby elementary school and spends much of his free time on youth soccer and building elaborate Lego cities on the living room floor. Elena, a bilingual medical assistant at a family clinic off Magnolia Avenue, often works slightly staggered hours, so the two of them coordinate school pickups and practices with a shared Google calendar and a running text thread full of reminders and grocery lists.\n\nMost weekdays, Daniel is out the door by 7:30 a.m., dropping Lucas at school before heading downtown to the Planning Department offices on Main Street. His days are a mix of staff check-ins, reviewing project plans, and fielding calls from residents who are worried about traffic, parking, or neighborhood character. He tries to get out of the office at least once a week to visit active project sites; recently that has meant walking through the Arlington Branch Library with staff
        from Parks and the library system, talking through practical details like phasing construction so kids still have a quiet place to study during the school year. He takes pride in projects that are small but tangible, especially those that make it easier for people with disabilities to move around their own community.\n\nAt home, Daniel’s evenings are a balancing act. On Mondays and Wednesdays he takes Lucas to soccer practice at nearby fields, using the time on the sidelines to answer a few emails or chat with other parents about school issues and the rising cost of living in Riverside. Tuesdays are often taken up with City Council or Planning Commission meetings that run late into the night, so he and Elena have an unspoken rule that Thursday evenings are family nights: simple dinners, no meetings, and at least one board game or movie everyone can agree on. Sundays they usually attend the late-morning Mass at a local Catholic parish, followed by lunch at his father-in-law Miguel’s small house a few blocks away, where family conversations easily slide between English and Spanish.\n\nIn the past year, Daniel’s been more conscious of his own health. After a minor scare in early 2025—chest tightness that turned out to be stress and acid reflux—his doctor nudged him to get more exercise and cut back on late-night fast food after long meetings. Now he tries to walk the dog, a mellow mutt named Jasper, around the neighborhood each evening and has started using a standing desk at work. He worries a bit about Sofia’s looming college costs and Miguel’s slowly worsening arthritis, but he and Elena have started putting a little extra into savings and looking into state university options close to home. Despite the usual pressures of work, school schedules, and aging parents, Daniel feels rooted in Riverside; when he drives past projects he’s helped shepherd—like the upcoming improvements to the Arlington Branch Library—he’s reminded why he chose public service over more lucrative private-sector planning work."
