      background_context: "This is Emily, a working parent juggling early hospital shifts, her kids’ school schedules, and the realities of an older lakeside house that she’s slowly bringing back to life. She’s lived at 1432 Lakeside Avenue on Muskegon’s lakeshore since the summer of 2016, when she and her then-husband bought the 1924 bungalow largely for its walkable neighborhood and the short drive to the hospital. The corner lot is oddly shaped, pinched in the back where the alley, storm sewer easement, and a big old oak tree all converge, so Emily has had to get creative about parking and storage. Most nights she tucks her 2017 Subaru Outback into a single uncovered space off the alley, brushing off lake-effect snow in the dark before her 6:30 a.m. shifts while Oliver and Sophie finish their cereal inside.\n\nEmily works full-time as a registered nurse on the medical-surgical floor at Trinity Health Muskegon, typically four 10-hour shifts a week, rotating between days and some early evenings. She’s been with the hospital system since 2011, starting on nights and gradually moving to earlier shifts as childcare became more complicated. Her mornings are a blur: up at 4:45 a.m., coffee and a quick check of the weather, then out to the car to scrape ice or clear sand, depending on the season. On school days when she works early, her mom Maggie—which everyone calls “Grandma Maggie”—stays in the small front bedroom and helps get the kids to Lakeside Elementary a few blocks away. Maggie, who lives in Holland but spends several weeks at a time with Emily, moves a little slower now, leaning on her cane as she navigates the uneven back walkway from the car to the kitchen door. That short, exposed stretch in winter is one of the things that weighs on Emily’s mind; she’s already caught her mom once when her foot slipped on an icy patch by the alley.\n\nLife inside the house is a mix of cozy and cramped. Because there’s no garage, the unfinished basement and back porch have become catchall storage for bikes, soccer balls, and
        yard tools. After two separate incidents where Oliver’s and then Sophie’s bikes disappeared from the porch, Emily started chaining them to the railing and bringing smaller items indoors at night. Evenings, when she’s not on shift, are built around homework at the kitchen table, quick dinners—often sheet-pan meals or slow-cooker stews—and walks down to the lakeshore when the weather cooperates. On weekends, the kids ride scooters along the quieter side street, and Emily tends to a small raised-bed garden she squeezed into the narrow usable part of the yard that isn’t claimed by the oak tree’s roots or the storm sewer easement.\n\nEmily and her ex-husband Ethan divorced in late 2021, finalizing things just before Christmas. They share joint custody, with the kids spending every other weekend and one night a week at Ethan’s townhouse in Kentwood near Grand Rapids. That schedule has made Emily’s early-morning routine both easier and lonelier on the days the kids are with their dad. She’s used some of that quiet time to chip away at house projects—repainting the living room, reglazing original windows, and working with a local architect to figure out how to add a modest one-car garage at the back of the lot without disturbing the oak tree or the city’s storm sewer line. She’s become friendly with the neighbors at 1426 and 1438 Lakeside, who already have standard garages and will occasionally let her kids store their bikes temporarily in their garages during big storms.\n\nHer biggest day-to-day concerns are practical and immediate: keeping everyone healthy, getting Oliver to his Saturday morning soccer practices at Mullally Field, remembering Sophie’s library days at school, and making sure Maggie can visit safely without risking a fall on icy pavement. The long-term worries sit in the background—how to age in place in a house with quirky constraints, whether she’ll be able to keep up with college savings, and how to best maintain a 100-year-old home on a nurse’s salary. Still, there are bright spots. In summer,
        the family spends long evenings on the front porch watching people walk down to the lake, and in fall, Emily loves raking leaves with the kids around the massive oak the city asked her to preserve. Her life at 1432 Lakeside is busy and imperfect, but rooted: a blend of demanding hospital shifts, close-knit family routines, and the ongoing puzzle of making a historic, oddly shaped corner lot work for a modern single-parent household."
