        - fact: Since February 2024, Daniel has been seeing sports medicine physician Dr. Karen Leblanc at the Ottawa Carleton Sports Injury Clinic in Kanata for chronic knee pain from years of climbing towers, and she has recommended modified duties and limiting time on roofs, documented in a note titled “Work Restrictions for D. McKenzie – Fall Protection / Climbing Limits.”
          should_appear: false
        - fact: In November 2023, Daniel quietly arranged with social worker Janet Roy at the Queensway Carleton Hospital geriatric clinic in Ottawa to assess his mother, Margaret “Maggie” McKenzie, after her second fall at her Barrhaven townhouse, and the report recommended that she should not be living alone through the winter without home support.
          should_appear: false
        - fact: "In August 2023, during a VHF antenna replacement at the NAV CANADA Montréal ACC roof, Daniel informally overrode a junior technician’s stop‑work request about wind gusts because they were behind schedule; a small wrench was blown off the parapet into a restricted vehicle lane. No one was hurt, but the incident was recorded as a near miss in NAV CANADA’s internal system under “Near Miss #23‑0817 – Dropped Tool – Montréal ACC,” and Daniel received a verbal warning from his Capital Communications operations manager, Mark Delaney."
          should_appear: false
        - fact: "In March 2024, Daniel filed an anonymous but traceable internal safety concern through Capital Communications’ ethics line about his regional manager, Mark Delaney, pressuring crews by email (“Subject: Need That Tower Done TODAY – No More Delays”) to work close to wind limits at a NAV CANADA site in North Bay, after which Mark privately confronted Daniel in his office at the Kanata branch and implied his future promotion to Safety Training Coordinator might be affected if he kept “going around him.”"
          should_appear: false
        - fact: After their 2014 Toyota RAV4 needed a $3,800 transmission repair in October 2023 and they put a deposit on a newer used SUV at Myers Kanata Hyundai, Daniel and Erin took out a $25,000 line of credit with TD Canada Trust, and by Spring 2024 they were carrying a balance of about $19,000, forcing Daniel to quietly pick up occasional weekend cash work installing small radio systems for his brother‑in‑law Connor Wallace’s side business, CW Signal Solutions, without reporting all of it as taxable income.
          should_appear: false
        - fact: Following a near‑miss slip on an icy roof hatch at the Ottawa tower in January 2023, Daniel began experiencing anxiety and occasional panic symptoms when approaching unprotected edges; in May 2023 he started short‑term cognitive‑behavioural therapy with psychologist Dr. Elena Petrov at the Ottawa Centre for Anxiety & Trauma, with session notes referencing “work‑related near‑fall on ATC roof – intrusive images when planning roof access.”
          should_appear: false
        - fact: In June 2024, after Chloe woke up screaming during a thunderstorm, Daniel confided to Erin that his own father, Robert McKenzie, used to force him to stay outside on the back deck in Barrhaven during storms as a “toughening up” exercise when he was around 8–10 years old, which he has never discussed with his parents and which he now recognizes as emotionally abusive; he later mentioned this pattern in a July 2024 therapy session note titled “Early experiences with storms and authority figures.”
          should_appear: false
        - fact: In October 2022, Daniel accidentally left a small bag of stainless‑steel hardware on the Ottawa ATC roof near the antenna base. A NAV CANADA maintenance tech, Jason Morin, found it weeks later and emailed Daniel’s supervisor with the subject line “Loose Hardware Found on YOW Tower Roof – Potential Hazard,” leading to an internal quality review where Daniel had to submit a corrective action plan admitting to rushed cleanup at the end of the shift.
          should_appear: false
        - fact: "In early 2024, Daniel exchanged a short series of emotionally charged late‑night Facebook messages with his long‑time crew member Sofia Tremblay, including one on March 2, 2024 titled “Re: Rough Week” where he wrote from his laptop at home that he sometimes feels “more understood on a windy roof with you than in my own living room,” which both of them agreed the next morning had crossed a line given his marriage to Erin and Sofia’s position on his crew."
