    _metadata:
      background_context: "This is Jordan Michael Thompson, an 18-year-old first-year student at Columbus State Community College who lives with his family at 4829 West Maple Grove Drive in the Hope West Campus housing community on the west side of Columbus, Ohio. He graduated from Central City High School in spring 2025 with a 3.78 GPA and a strong record in math, science, and community service. His parents, Angela and Marcus, have worked hard to keep the family stable—Angela is a medical assistant at a local clinic off West Broad Street, and Marcus is a warehouse supervisor at a regional distribution center that recently switched to earlier shift times. Jordan’s younger sister, Kayla, just started at Central City High as a freshman, and his little brother Malik is in fourth grade at a nearby elementary school.\n\nJordan is now commuting to Columbus State by bus three or four days a week, taking introductory courses in networking, operating systems, and a first-year seminar that helps him adjust to college expectations. He works about 12–15 hours a week as a student worker at the college’s IT Support Center, answering basic help desk tickets, resetting passwords, and helping other students connect to campus Wi-Fi and online learning platforms. The job fits his natural problem-solving instincts and gives him a front-row seat to how real-world IT support and security policies work. At home, he still plays the role of unofficial tech support—fixing the family’s aging laptop, setting up parental controls on Malik’s tablet, and showing his parents how to spot suspicious emails after a close call when Angela almost clicked on a fake insurance message.\n\nLife at Hope West Campus has settled into a rhythm after nearly two years there. The move in August 2023 was initially stressful because it meant changing neighborhoods and routines, but the proximity to The Hope Church and Jordan’s high school turned out to be a blessing. Jordan can walk to church in under ten minutes, which makes it easy for him to keep serving regularly
        in the children’s ministry with the 3rd–5th grade class and to help with the monthly food pantry outreach on second Saturdays. Some evenings, especially on Wednesdays, he heads over for youth and young adult gatherings or to lend a hand setting up for events. Around the housing community, a few neighbors know him well enough to trust him with watching their younger kids for an hour or two, and he often earns a little extra cash doing that or helping someone troubleshoot their internet or streaming setup.\n\nMost weekdays, Jordan’s routine is tightly packed. On days he has morning classes, he’s up by 6:30 a.m. to help get Malik ready for school while his parents are finishing their shifts or preparing to leave for work. He usually grabs a quick breakfast—often cereal or toast—and then catches the COTA bus toward downtown, using the ride to review notes or watch cybersecurity videos. After classes, he might have a short shift at the IT Support Center, then heads home in the late afternoon. Evenings are a mix of homework, helping Kayla with algebra, and pitching in with chores like dishes and trash, especially when his parents are exhausted from long days. He tries to carve out at least one or two nights a week to unwind by playing co-op video games with friends online or tinkering with free cybersecurity labs and capture-the-flag challenges.\n\nRecently, money has been a steady background concern in the household. Rising rent and groceries have squeezed the family budget, and a series of medical bills from Angela’s minor but lingering back issues earlier in the year forced them to dip into what little savings they had. Jordan is careful about how he spends; he tracks his bus pass, textbooks, and basic expenses in a simple spreadsheet, always aware that his part-time income and financial aid have to stretch. He’s determined to limit how much he borrows in student loans, so he’s actively looking for additional scholarships and a possible paid internship for the summer after his first year at Columbus State.\n\n\
        Despite the stress, Jordan remains hopeful and focused. He’s deeply motivated by the idea of becoming a cybersecurity analyst or security engineer, especially serving smaller organizations like churches, local nonprofits, and small businesses that lack full-time IT security staff. He’s already imagining how he might one day help The Hope Church audit their systems, lock down their Wi-Fi, and train staff and volunteers to recognize phishing attempts. His faith shapes how he interprets both his studies and his future career—he sees technology as a gift he’s responsible to steward well and views cybersecurity as a way to protect people’s dignity and resources.\n\nFamily dynamics are generally warm but busy. Marcus sometimes works overtime, leaving him tired and quiet at the end of the week, but he takes pride in seeing Jordan step into adulthood and often asks about his classes and what he’s learning. Angela, though occasionally anxious about finances and the complexity of college systems, is fiercely proud that her oldest is the first in the family to attend college, and she keeps a copy of his National Honor Society certificate in a folder with other important papers. Kayla looks up to Jordan but also teases him about being a “tech nerd,” while secretly appreciating that he takes time to help her study. Malik adores his big brother and loves when Jordan teaches him simple coding games or lets him sit in on youth events at church when appropriate.\n\nIn the coming months, Jordan is focused on keeping his grades strong in his first college semester, adjusting to the increased workload, and continuing to serve at church without burning out. He’s trying to learn how to say no occasionally so he doesn’t overcommit, especially when exams pile up. At the same time, he’s excited about attending a local cybersecurity meetup he found online, hoping to start building a network beyond school and church. Underneath the daily grind, he carries a quiet but steady determination: to finish his associate degree, transfer or step
        into a solid IT security role, help support his family, and eventually be in a position to mentor younger students from neighborhoods like his who are just discovering that technology might be their way forward too."
