        - fact: Since February 2024, Emily has been seeing a therapist, Dr. Karen Mitchell, at James River Counseling Center in Richmond every other Wednesday at 5:30 PM for anxiety and stress related to juggling work, parenting, and her father James’s stroke recovery. She sometimes titles calendar holds and emails to her husband as “Therapy – Dr. Mitchell (please handle kids’ pickup).”
