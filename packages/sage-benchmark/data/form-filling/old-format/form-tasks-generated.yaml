        - fact: In summer 2023, Isabel and her brother‑in‑law Marco had a tense argument in the kitchen of the Woodside apartment after he complained, “We can’t keep having you on the couch forever,” and suggested she start paying a higher share of utilities or look for a shelter if she couldn’t move out by the end of the year.
          should_appear: false
        - fact: In October 2023, Isabel received a written warning from her manager Cara at Bright Pages Books in Williamsburg for calling out sick three times in one month due to panic attacks on the M train; the email subject line from Cara was “Attendance Concerns – October Shifts,” and it is saved in Isabel’s Gmail under a mental health folder.
