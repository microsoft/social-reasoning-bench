        - fact: On November 18, 2024, Michael sent a confidential email to HR coordinator Linda Meyers at Lake County Tool & Die titled “FMLA paperwork – January surgery,” asking whether his January 6–10, 2025 absence for knee surgery would qualify under FMLA and mentioning that he’s already used two FMLA days earlier in 2024 for flare‑ups of the same knee issue when he had to leave mid‑shift from the main shop floor on Tyler Boulevard in Painesville.
          should_appear: false
        - fact: In a private text exchange with his coworker and close friend Mark Reynolds on December 2, 2024, Michael admitted that the constant pain in his left knee and the stress of the pending court case have led to several nights of barely sleeping and “sitting in the recliner at 2 a.m. wondering if I’m going to lose my job or screw up the kids’ tuition,” which he has not shared with his children or mother.
