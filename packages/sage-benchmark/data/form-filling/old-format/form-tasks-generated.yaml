      background_context: "This is Daniel, a 42-year-old senior civil engineer who has spent most of his career working on flood control and trail projects in Orange County. He and his wife Elena, a part-time occupational therapist at CHOC, bought their modest three-bedroom home off E Santiago Canyon Road in Orange eight years ago, drawn by the proximity to open space and the creek corridor he now works on professionally. Their daughter Sofia just started 7th grade at Santiago Charter Middle School and is getting into cross-country, while their son Mateo is in 3rd grade at Chapman Hills Elementary and obsessed with mountain bikes and anything with wheels.\n\nMost weekdays, Daniel is up by 6:00 a.m., making coffee and packing simple lunches while skimming emails on his phone before the kids wake up. Twice a week he bikes part of the way to the OC Public Works office in Santa Ana, partly to stay in shape and partly because he believes in the active transportation network he helps design. At work, he’s currently neck-deep in coordinating the Santiago Creek Multi-Use Trail and Riparian Restoration effort along the south bank near where his family sometimes walks the dog on informal paths. His days are a mix of design review meetings, calls with biologists and cultural resource consultants, and occasional site walks along the creek where he snaps photos of erosion spots and invasive stands of Arundo. He’s proud that this project isn’t just another piece of pavement, but something that will restore habitat and give kids like his a safer place to ride.\n\nAt home, life revolves around school schedules, homework, and extended family. Daniel’s mother Rosa lives in a small apartment in nearby Tustin and has been slowing down a bit since a minor fall in late 2024, so he stops by most Thursdays after work to help with groceries and small repairs. Weeknights are a balancing act: Sofia has cross-country practice and is starting to talk about high school options, while Mateo has soccer twice a week at a local park. Dinner is usually
        around 7:00 p.m., often something simple Elena throws together, with the unspoken rule that phones stay off the table so everyone can talk—lately, the conversation has been about whether they can afford a short trip to Yosemite next summer before Sofia gets too busy with school and sports.\n\nDaniel’s main worries these days are time and money. The cost of living in Orange County keeps creeping up, and the roof on their house will probably need replacing within a couple of years. He and Elena have been trying to put a bit more into savings while also setting aside something for college for both kids, which means postponing some house projects and limiting big purchases. He also feels the stress of deadlines at work: the creek trail project has a tight schedule tied to grant funding, and coordinating with multiple agencies while addressing residents’ concerns about privacy and lighting has been more complicated than he anticipated. Still, when he jogs along Santiago Creek on Saturday mornings and imagines a completed, shaded path with interpretive signs and restored banks, he feels a quiet sense of purpose that makes the long days feel worthwhile."
