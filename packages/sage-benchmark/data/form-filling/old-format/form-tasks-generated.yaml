    _metadata:
      background_context: "This is Laura, a 41-year-old working mom living in a modest split-level home in Naperville, Illinois, with her husband Michael and their two kids, Jacob and Emily. Most weekdays start early for her: the alarm goes off at 5:45 a.m. so she has time to shower, check Jacob’s seizure log from the night before, and get his morning medications set out before the kids wake up. Jacob’s pill organizer is always on the corner of the kitchen counter—Keppra, Onfi, Lamictal—along with a laminated sheet that lists doses and times in case Laura’s mother, Karen, needs to help. The Diazepam nasal spray is kept in a bright red pouch by the back door and another in Jacob’s backpack, a constant reminder of the generalized tonic-clonic seizures that still happen once or twice a month.\n\nJacob is in 7th grade at Lincoln Junior High, and his epilepsy shapes much of the family’s daily rhythm. He continues to have focal impaired-awareness seizures several times a week, often in the late afternoon, so Laura tries to cluster her remote work hours earlier in the day. She works part-time from her small home office as a senior client support specialist for Blue Oak Healthcare Solutions, a Chicago-based company that supports electronic health record systems for clinics. She logs on around 8:30 a.m. after the morning rush to answer support tickets and join video calls, always keeping her phone nearby in case the school nurse calls about a seizure. The school has a detailed seizure action plan on file, and the nurse, Mrs. Patel, knows how to use the rescue medication if Jacob has a prolonged or clustered event. Laura has become friendly with Mrs. Patel and Jacob’s homeroom teacher, regularly emailing them updates after neurology appointments.\n\nEvenings are a careful balance between routine and vigilance. Dinner is often something quick but home-cooked—sheet-pan chicken, tacos, or pasta—because Laura finds that a regular meal schedule helps Jacob tolerate his medications better. Around 7:30 p.m., she gives Jacob his nighttime
        doses of Keppra, Onfi, and Lamictal, double-checking against the pillbox. Some nights he’s irritable and snappy, especially if he had a seizure at school or is just worn out from the meds; Laura and Michael gently remind each other that some of this is likely side effects and postictal mood, not just typical pre-teen attitude. Emily, their 9-year-old, is watchful of her big brother and has become surprisingly knowledgeable about seizures, but she also carries her own quiet anxiety. Laura tries to carve out one-on-one time with Emily—reading together, doing crafts, or walking their golden retriever, Daisy—so Emily doesn’t feel overshadowed by Jacob’s medical needs.\n\nIn the past year, Jacob’s epilepsy has felt especially heavy on the family. A scare last fall, when he had a generalized tonic-clonic seizure in the living room and hit his head on the coffee table, led to an ER visit at Edward Hospital to rule out a concussion. Since then, Laura has been more nervous about stairs, showers, and even short walks to the school bus. She and Michael installed extra padding on sharp furniture corners and added a non-slip mat and shower chair in the bathroom. They also rearranged Jacob’s bedroom so his bed is low to the ground and away from hard edges. Despite these precautions, Laura still finds herself listening at his door at night to make sure his breathing sounds normal.\n\nNeurology appointments at Lurie Children’s Hospital in downtown Chicago are major events in their calendar, usually every three to four months. Laura keeps a thick, worn notebook and also uses a seizure-tracking app on her phone to log Jacob’s focal impaired-awareness seizures, possible brief absence-like spells, and any generalized tonic-clonic events. Over the last year, the combination of Keppra, Onfi, and Lamictal has reduced the severity of some seizures but hasn’t brought the control she and Michael had hoped for. Jacob still has 4–6 focal impaired-awareness seizures a week and those 1–2 generalized tonic-clonic seizures a month. After
        long discussions with their neurologist about goals—fewer seizures, especially generalized tonic-clonic ones; better mood and focus; and a more typical school experience—Epidiolex has come up as a next step they’re seriously considering.\n\nIn the evenings after the kids are in bed, Laura often sits at the kitchen table with her laptop, reading medical articles and parent forums about Epidiolex. She’s cautiously hopeful: she’s heard from other parents that it can cut seizure frequency in half or more for some kids, and that in some cases it allows for reducing doses of sedating medications like Clobazam. She imagines what it would be like if Jacob could go months without a generalized tonic-clonic seizure, or if his focal impaired-awareness episodes dropped to once a week instead of several times. At the same time, she worries about potential side effects—especially liver issues and appetite changes—so she’s made a list of questions about liver function test schedules, drug interactions, and what signs would warrant an urgent call to the neurologist.\n\nFinancially, things are stable but tight. Michael works as a systems analyst for a logistics software firm in Oak Brook and carries the family’s Blue Cross Blue Shield of Illinois insurance through his employer. They’ve dealt with prior authorizations for other medications and know that a specialized drug like Epidiolex will likely require more paperwork and possibly high co-pays. Laura has bookmarked information about manufacturer assistance programs and plans to call the hospital’s social worker to better understand coverage and out-of-pocket costs. She worries about the long-term financial impact, but she also feels that if Epidiolex brings real improvement to Jacob’s daily functioning and safety, they’ll find a way to make it work.\n\nJacob’s school life is a constant tug-of-war between his desire to be a normal 12-year-old and the realities of his condition. He likes science and video games and has a small group of close friends, but he’s self-conscious
        about having a seizure in front of classmates. He’s already had one focal impaired-awareness seizure during math class this year, which the teacher handled calmly, but Jacob was embarrassed afterward. Laura’s treatment goals are rooted in his current life stage: she wants him to be more alert in class, less drowsy in the mornings from Clobazam, and less emotionally up and down from Keppra. She hopes that if Epidiolex works, the neurologist might gradually lower doses of these other meds so Jacob can feel more like himself and participate more fully in group projects, after-school clubs, and maybe even a non-contact sport with proper safety measures.\n\nExtended family plays a quiet but important role. Laura’s mother, Karen, lives about 20 minutes away in Aurora and comes over one afternoon a week to help with the kids, giving Laura a chance to catch up on work or go to appointments. Karen has sat through many neurology visits and is one of the few people Laura fully trusts to manage Jacob’s medications and recognize his seizure types. Michael’s father, David, drives in from Joliet for birthday parties and school concerts when he can, always bringing small gifts for the kids. Holidays and family gatherings are planned with Jacob’s seizure patterns in mind—avoiding very late nights, ensuring there’s a quiet room if he gets tired, and making sure someone always knows where the rescue medication is.\n\nEmotionally, the last few years have been draining for everyone. Emily sometimes expresses her worry through questions—“What if Jacob has a seizure at my recital?”—and Laura and Michael try to answer honestly without overwhelming her. They’ve considered family counseling and have started looking into local epilepsy support groups in the western suburbs, as well as online communities where parents share experiences with treatments like Epidiolex. Laura is realistic: she knows there may never be a complete cure and that every medication comes with trade-offs. But as she looks ahead to Jacob’s teenage years, her focus
        is on giving him the best chance at independence and a hopeful future—minimizing ongoing brain injury from repeated seizures, helping him keep up academically, and slowly giving him more freedom, like supervised bike rides with a helmet or short visits to friends’ houses.\n\nThrough all of this, everyday life still pushes forward. There are school spirit days, Emily’s piano lessons, simple Saturday outings to the library or the Naperville Riverwalk, and quiet family movie nights where Jacob curls up under a blanket, exhausted but content. Laura moves through her days juggling work emails, medication schedules, school communication, and the constant low-level worry that comes with parenting a child with epilepsy. As she prepares for the next neurology visit, she carries a mix of anxiety and hope—hoping that Epidiolex might finally bring the seizure control and stability that would let Jacob feel more like any other 12-year-old boy, and allow their whole family to breathe a little easier."
