    _metadata:
      background_context: "This is Ethan, a 13-year-old seventh grader living with his family in a two-story townhouse on Maple Grove Lane in southeast Aurora, Colorado. He shares the upstairs hallway with his 9-year-old sister Izzy; his bedroom walls are covered with sketches of fantasy creatures, a Colorado Rapids poster, and a small whiteboard where he tries (not always successfully) to keep track of assignments. His mom, Laura, works full-time as a medical billing specialist for a local pediatric clinic in Aurora, often logging in from the dining room table a couple evenings a week to finish claims. His dad, Carlos, is an HVAC technician for a Denver-area company, usually out the door by 6:45 a.m. and home around 5:00 p.m., sometimes later during the busy summer and winter seasons.\n\nMost weekdays follow a similar rhythm. Ethan’s alarm goes off at 6:20 a.m., but he often hits snooze two or three times and lies there, dreading the school day and replaying everything he might have forgotten. Laura usually has to knock on his door by 6:40, reminding him to get moving so he and Izzy can make it to Horizon Ridge Middle School before the 7:50 a.m. bell. Mornings are tense; Ethan moves slowly, staring at his phone or just zoning out while getting dressed, and he often needs repeated prompts to brush his teeth, pack his Chromebook, and make sure last night’s homework actually makes it into his backpack. Breakfast is usually quick—cereal, toast, or a breakfast burrito heated in the microwave—while Laura checks her work email on her phone and reminds him about upcoming tests or projects she’s seen in the school portal. Carlos is usually already on the road in the work van, but he sometimes calls on speakerphone to say good morning.\n\nAt Horizon Ridge, Ethan does best in classes where teachers break assignments into smaller pieces and offer quiet encouragement. He likes science, especially when they do experiments, and he enjoys drawing in the margins of his notebook during social studies. Language arts and math are the
        hardest; longer reading passages or multi-step word problems quickly overwhelm him, and he finds his mind drifting during lectures. His homeroom teacher, Mr. Nguyen, has started doing brief check-ins with him after first period to go over the day’s assignments, which helps a little. Ethan tends to sit near the side or back of the room, hoping not to be called on. When teachers ask for volunteers, he almost always looks down at his desk, even when he knows the answer, anxious that his classmates will judge him if he stumbles over his words.\n\nLunchtime is both a break and a stress point. Ethan usually sits with two close friends, Jordan and Malik, who share his love of video games and soccer. They talk about new game releases, YouTube channels, and the weekend’s Premier League scores. Since a teasing incident in the locker room earlier in the school year—when a couple of boys mocked him for being too skinny and made fun of his hair—he’s become much more self-conscious. On PE days, he sometimes lingers in the bathroom until most of the other boys are done changing, or he tries to wear athletic shorts under his jeans to minimize time in the locker room. A few times, he’s woken up on PE days complaining of stomachaches and asking Laura if he can stay home, which has led to some arguments when she insists he needs to go to school.\n\nAfternoons are when his attention tends to flag the most. By the time he reaches his last two periods, he often feels mentally drained and has difficulty following multi-step instructions. Teachers have noticed him staring out the window or fiddling with pencils and erasers instead of starting assignments. When he does get started, he works slowly, and if he makes a small mistake, he can become visibly frustrated, sometimes erasing so hard he tears the paper. On days with tests or group projects, he feels a tightness in his chest and a nagging worry that he’ll mess up and everyone will notice. He often asks to use the restroom before tests, partly to calm himself down.\n\nAfter school,
        Ethan and Izzy usually get home around 3:15 p.m. Laura finishes her in-clinic work by 4:00 and is often home by 4:30, unless she has to stop for groceries or a pharmacy pickup. The after-school hours are a frequent source of conflict. Ethan knows he’s supposed to start homework soon after getting home, but he often gravitates toward his Nintendo Switch, YouTube, or sketching in his notebook instead. If Laura is on a work call or helping Izzy with a project, an hour can pass with Ethan barely starting anything. When she finally sits down beside him and opens the school portal, they’ll discover missing assignments or an upcoming quiz he forgot to mention. This usually triggers a cycle of Ethan feeling overwhelmed, saying things like “I’m just stupid” or “I can’t do this,” and Laura trying to talk him down while also feeling her own anxiety spike.\n\nEvenings are a mix of family time and tension. Carlos gets home dusty and tired from climbing in and out of attics and crawlspaces all day. He tries to jump in by taking over dinner some nights—often simple meals like tacos, grilled chicken, or pasta—so Laura can help Ethan sort through his backpack and planner. They’ve recently started a new system with a color-coded homework folder and a big whiteboard calendar in the kitchen, introduced in late August of this school year, but it’s still a work in progress. Ethan sometimes responds well, checking off tasks and feeling a small sense of accomplishment. Other nights, a simple math worksheet can trigger a 15-minute outburst of yelling, tears, and door-slamming, followed by guilt and apologies once he calms down.\n\nBedtime is rarely smooth. Ethan is usually told to start winding down around 9:00 p.m., but he often lingers on his phone, reading about games or scrolling through soccer highlights. When the lights finally go out around 9:30 or 10:00, his mind tends to speed up rather than slow down. He lies awake thinking about upcoming tests, whether he forgot an assignment, or imagining worst-case scenarios—car accidents,
        break-ins, something bad happening to his parents while they’re driving to work. A couple times a week, he comes out to the living room to check that the front door is locked or to ask Laura if everything is okay. On school nights, he often doesn’t fall asleep until close to 11:00 p.m., which leaves him exhausted and irritable the next morning. On weekends, when he’s allowed to sleep in until 9:00 or 10:00 a.m., his mood is noticeably better.\n\nOver the past year and a half, Ethan’s world has felt more complicated. The transition from the structure of elementary school to the rotating schedule of middle school in fall 2022 was a big shift. In fifth grade, he was used to one main teacher and simpler routines; now he juggles six different teachers, changing classrooms, and multiple online platforms for homework. His grades, once mostly A’s and B’s, have slipped to a mix of B’s, C’s, and the occasional D, mostly because of missing or incomplete assignments rather than lack of understanding. This has been hard on his self-esteem. He sometimes says he wishes he could “just disappear” or that life would be easier if he didn’t have to deal with school, but when Laura or Carlos gently check in with him, he insists he doesn’t want to hurt himself and is just venting.\n\nFamily dynamics are loving but strained by the ongoing worry about how best to support him. Laura, who has her own history of anxiety and a past episode of depression in her late twenties, recognizes some of her patterns in Ethan’s constant worrying and need for reassurance. She has been trying to model coping strategies she’s used herself—deep breathing, taking walks, writing things down—but admits she sometimes becomes impatient when homework time devolves into arguments. Carlos, who struggled with similar disorganization and forgetfulness in school but was never evaluated, often vacillates between empathy and frustration. He sees his younger self in Ethan’s scattered backpack and missing assignments and wonders if he might have had undiagnosed ADHD
        as a kid.\n\nExtended family plays a modest but meaningful role. Ethan’s paternal grandmother, Rosa, lives in Denver and visits about once a month, often bringing homemade tamales or arroz con pollo. She dotes on both Ethan and Izzy and encourages Ethan in Spanish to “take it one day at a time” and remember that school isn’t everything. His maternal grandmother, Elena, lives in Albuquerque and calls every Sunday afternoon; Ethan usually chats briefly, updating her on school, art, and his latest soccer interests. Two summers ago, in July 2022, the family drove down to New Mexico for a week-long visit, which Ethan remembers fondly—especially the evenings drawing on the back porch with his cousins.\n\nIn his better moments, Ethan is a thoughtful, creative kid who loves drawing intricate dragons and cityscapes, listening to indie and lo-fi music, and kicking a soccer ball around at the nearby park on Maple Grove Trail. He used to play on a recreational soccer team through the Aurora Parks and Recreation Department, but this past fall he asked to skip the season, saying practices made him too tired and he didn’t feel like he was “good enough” compared to some of the other boys. His parents are gently encouraging him to consider returning in the spring or to join an after-school art club instead, hoping he’ll reconnect with activities that build his confidence.\n\nRecently, the family has been focusing on small, manageable changes. They’ve started a loose Sunday evening routine where they all sit at the kitchen table, look at the upcoming week on the whiteboard, and talk through any big assignments or tests. Laura has been more intentional about praising Ethan’s efforts rather than just the outcomes—telling him she’s proud when he starts his homework on time or uses a coping strategy, even if the assignment is hard. Carlos has been trying to take Ethan out for one-on-one time on Saturdays, whether that’s a quick drive to get breakfast burritos or a trip to Dick’s Sporting Goods to look at soccer cleats, giving Ethan
        space to talk without the pressure of school hanging over them.\n\nDay to day, Ethan is navigating the same things many early adolescents do—friendships that matter more than ever, shifting interests, and a growing awareness of how others see him—but with the added weight of anxiety and attention challenges that make school feel like an uphill climb. His parents are determined to help him find tools and supports that will make middle school more manageable and to keep his world feeling safe and hopeful, even on the days when he feels overwhelmed and unsure of himself."
