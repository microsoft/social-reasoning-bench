    _metadata:
      background_context: "This is Melissa, a mid-career public health professional who has spent most of her adult life working in state government. She lives with her husband Dan and their two kids in a modest three-bedroom house on the north side of Indianapolis, about a 15-minute commute from downtown when traffic cooperates. On weekday mornings, she’s usually up by 6:00 a.m., checking her work email over a cup of coffee at the kitchen island while the dog, a rescue mutt named Milo, circles her feet waiting for breakfast. By 7:15, she’s nudging Ellie to get off her phone and finish packing her backpack, reminding Jake to grab his clarinet for band, and coordinating who’s doing pickup that day based on Dan’s after-school activities and her meeting schedule.\n\nAt work, Melissa’s world revolves around the secure, behind-the-scenes flow of information that keeps Indiana’s vital records system running. As the primary contact for the Vital Records and Health Statistics Division, she oversees a small team that manages things like certified birth record corrections, paternity affidavits, and amendment approval or denial notices. A big part of her current focus is an ongoing monthly print-and-mail process for sensitive correspondence that goes out around the 5th business day of each month from the office at 2 N. Meridian St., Suite 109. She coordinates secure data file transfers through the state’s SFTP system, double-checks that the right encryption protocols are used, and keeps a close eye on how any overprints or spoiled pieces are destroyed on the same business day. She’s become the go-to person in her division for questions about protecting Social Security numbers and other confidential details, and she balances that technical responsibility with the human side—reminding her team that every letter represents a family trying to fix something important in their records.\n\nOutside of work, Melissa’s life is a patchwork of family routines and low-level worries that feel familiar to a lot of working parents. Ellie is
        starting to talk about high school and wants to try out for the marching band next fall, which has Melissa quietly calculating the cost of uniforms and weekend competitions. Jake has been struggling a bit with math, so twice a week after work she takes him to a tutoring session at the library branch on Michigan Road, trying not to let him see how tired she is from a day of back-to-back meetings. On weekends, they often drive up to Carmel to check on her mom, Linda, who’s still independent but has been dealing with some arthritis flare-ups—enough that Melissa has started gently raising the idea of getting some help with yard work and heavy lifting. In the evenings, after dinner dishes are done and the kids are showered, Melissa usually spends a half hour walking Milo around the neighborhood, mentally reviewing the next day’s deadlines and quietly hoping that the funding for her division’s programs will hold steady through the next budget cycle so she doesn’t have to face the stress of staff cuts or service reductions.\n\nThe last year has brought a mix of changes. Dan took on coaching the school’s academic team, which means more evenings where Melissa handles dinner and homework solo, but he’s clearly energized by working with motivated students. In early 2025, her division rolled out a refreshed workflow for their monthly confidential mailings, and Melissa has been in the thick of ironing out glitches—like a February incident where a small batch of letters had to be reprinted due to a misaligned address window. She spent that day coordinating with their print vendor to make sure the misprints were cross-cut shredded on-site and confirming by phone that no samples were kept. At home, she and Dan have been slowly tackling small house projects—repainting the kids’ rooms, finally replacing the aging dishwasher—while keeping an eye on college savings for Ellie and a modest emergency fund. Melissa doesn’t have any dramatic crises unfolding, but her days are full: managing sensitive data and procedures at the office,
        monitoring her mom’s health, juggling kids’ schedules, and trying to carve out the occasional quiet Sunday afternoon to read on the back porch and remember why she chose public service in the first place."
