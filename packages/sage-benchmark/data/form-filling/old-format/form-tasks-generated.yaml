      background_context: "This is Dan Mercer, a 33‑year‑old UX designer who’s been renting a one‑bedroom at 742 Evergreen Terrace, Apt 3B in Portland’s Buckman neighborhood since August 15, 2022. He pays $1,725 a month to his landlord, Michael Thompson of Thompson Property Group, and likes that he can walk to coffee shops and bike downtown in under 15 minutes. Before this place, he lived from June 2019 to July 31, 2022 at 3891 NE 15th Avenue, Unit 2 in the Alberta Arts area, paying $1,550 in rent to his previous landlord, Karen Delgado. He moved when his job shifted hybrid and he wanted to be closer to the inner eastside and the river. He’s never broken a lease or been evicted, and his rental history has been quiet and drama‑free.\n\nDan works as a UX designer for Cascade Health Systems, a regional healthcare network with offices near the Oregon Convention Center. He goes into the office two or three days a week and works from home the rest. His mornings usually start around 7:00 a.m. with coffee from the French press, a quick scroll through design blogs, and then either a bike ride across the Hawthorne Bridge or logging into Teams from the small desk he’s set up by his living room window. His days are filled with wireframes, user interviews, and collaborating with developers on patient portal features. He likes that his work feels meaningful—recently he’s been focused on simplifying telehealth appointment flows for older patients, something he’s especially invested in after watching his parents struggle with online medical portals.\n\nOutside of work, Dan’s life revolves around a small but close circle. His partner, Maya Nguyen, lives a few miles away in Sellwood and works as a physical therapist. They usually see each other three or four times a week, alternating between cooking at his apartment and hers. Sundays are often reserved for video calls with his parents, Robert and Linda, who still live in Eugene, and for checking in on his younger sister Emily, a single mom raising his 5‑year‑old nephew Oliver. Over
        the last year, Dan has been quietly worried about his dad’s high blood pressure and early retirement finances, which has nudged him to read more about budgeting and finally start a proper emergency fund. He’s also been debating whether to ask Maya about moving in together when his lease comes up for renewal next summer, weighing the stability of his current place against the rising rents he’s seen around town.\n\nDan’s daily life is a mix of routine and small projects. On weekdays, he takes a late‑afternoon walk around the neighborhood or jogs along the Eastbank Esplanade if it’s not raining, and usually cooks simple meals like tofu stir‑fries or roasted vegetables. On Wednesdays, he meets a friend at a board game café on SE Division, and one Saturday a month he volunteers at a community tech workshop teaching older adults how to use smartphones and laptops. His apartment is modest but personal: a couple of plants he’s managed not to kill, framed concert posters from college, and a bike hanging on the hallway wall. Lately, he’s been trying to cut back on late‑night screen time and get more consistent sleep, as he’s noticed stress creeping up during big product launches. He’s looking ahead to the next year thinking about whether to pursue a lead designer role at Cascade, start a small freelance side gig, and take a longer trip with Maya—maybe to Vancouver or down the California coast—before family obligations and bigger life decisions make it harder to be spontaneous."
