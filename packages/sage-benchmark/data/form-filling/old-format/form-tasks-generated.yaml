        - fact: "In August 2024, Daniel and Melissa fell two months behind on their mortgage with Alpine Ridge Credit Union in Golden after a large custom remodel in Idaho Springs went over budget and a client delayed final payment. Daniel exchanged several emails with their loan officer, Karen Miles, under the subject line, “Temporary hardship and request for forbearance on Whitaker loan #472819,” explaining that he was scrambling to keep Whitaker Mountain Builders, LLC afloat while they sorted out the illegal land division and refinancing options."
