    _metadata:
      background_context: "This is Daniel Marcus Holloway, a 41‑year‑old recreation program coordinator living on Oakview Ridge Drive in the northern part of High Point, North Carolina. He and his wife, Rachel Marie Holloway, moved into their current home in late 2019 after nearly a decade renting a townhouse off W Greenway Street in Winston‑Salem, where Daniel had lived since his early twenties. The move cut his commute to the Deep River Recreation Center to about fifteen minutes and put them in what they felt was a calmer neighborhood for their two kids, 11‑year‑old Evan and 8‑year‑old Chloe. Daniel still thinks of Winston‑Salem as “home base” — his parents, Leonard and Margaret (“Maggie”), remain there, and he drives over most Wednesday evenings to help his mom with grocery runs and small errands now that her arthritis has been flaring up.\n\nDaniel works full‑time for the City of High Point Parks & Recreation Department, based at Deep River Recreation Center. His official title is Recreation Program Coordinator, but in practice he’s the go‑to person for youth sports leagues and many of the community special events the department puts on: spring soccer, fall flag football, youth basketball, the Deep River 5K & Family Fun Run, and seasonal festivals in the parks. His schedule is flexible but busy—he’s generally available mornings and afternoons Monday, Tuesday, Thursday, Friday, and often Saturday for practices, planning, coach meetings, and park clean‑up days, but he tries hard to protect his evenings for family time and coaching his son’s basketball team. Sundays he usually reserves for church with Rachel and the kids at a small congregation in High Point and for catching up on laundry, meal prep, and rest.\n\nA graduate of R.J. Reynolds High School in Winston‑Salem (Class of 2002), Daniel went on to UNC Greensboro, where he completed a B.S. in Recreation and Parks Management with a concentration in Community Recreation in May 2006. That major fit him: he’d grown up playing rec league basketball and baseball at
        city parks, and some of his best memories are of long summer evenings at Hanes Park. He’s kept his professional skills up to date; in March 2023 he renewed his American Red Cross Adult & Pediatric First Aid/CPR/AED certification in Greensboro, which runs through March 2025. He’s proud of that card in his wallet—not because he wants to use it, but because, working around kids and older volunteers, he feels better knowing he can respond if something goes wrong.\n\nOn a typical weekday, Daniel is up around 6:15 a.m. He makes coffee, packs simple lunches—turkey sandwiches for Evan, peanut butter and jelly for Chloe, leftovers for himself—and checks the weather to decide whether to keep practices outside or move them into the gym. Rachel, who works as a medical billing specialist for a local orthopedic practice, leaves a little earlier than he does, so they tag‑team the kids’ school drop‑offs: he takes Evan to middle school and Chloe to elementary on his way toward Deep River. Once at work, his mornings are a mix of answering emails from parents about registration questions, coordinating with part‑time staff and volunteer coaches, and walking the fields to check for hazards—holes, broken glass, or muddy spots that could cause injuries. Because he has his North Carolina Class C driver’s license in good standing, he’s often the one who drives the city van to pick up cones, portable goals, and event supplies from the central warehouse.\n\nAfternoons are when the energy ramps up. By 2:30 or 3:00 p.m., kids start trickling in for after‑school programs, and Daniel shifts from desk work to being on the floor: setting up drills, greeting parents by name, and mediating the occasional disagreement between 10‑year‑olds who both insist they were fouled. During the spring and fall, his Fridays are spent double‑checking game schedules, printing rosters, and walking the complex with maintenance staff to make sure fields are lined and trash cans emptied before Saturday’s games. He rarely stays late into the evening—he’s learned
        that if he doesn’t draw a line, weekend events will swallow all his time—so he aims to be home by 6:00 p.m. most nights, except on the occasional Thursday coaches’ meeting.\n\nAt home, life is a familiar mix of warmth and low‑level chaos. Evan has just started sixth grade and is navigating the jump to middle school; Daniel can see his son caught between wanting more independence and still needing structure. They’ve had more conversations lately about social media, screen time, and how to handle kids who talk tough at school. Chloe, in third grade, is the family extrovert—constantly asking to sign up for new activities. Right now she’s in a beginner soccer program that Daniel doesn’t run but quietly observes from the sidelines, resisting the urge to offer suggestions to the coaches. Evenings, when they’re not at practice, are spent around the kitchen table with homework spread out, Rachel answering patient portal messages on her laptop, and Daniel chopping vegetables for a simple stir‑fry or putting chicken in the oven.\n\nThe last couple of years have brought a few new pressures. Daniel’s mom, Maggie, had a minor fall in late 2023 that scared the family, even though she recovered without surgery. Since then, Daniel’s been more deliberate about checking in, sometimes stopping by her Winston‑Salem apartment on Friday afternoons before Saturday game days. His dad, Leonard, still insists on mowing his own lawn, but Daniel has started gently pushing the idea of hiring a neighborhood kid to help. At the same time, costs have crept up—gas, groceries, and particularly youth sports gear. Daniel and Rachel have had a few late‑night talks about budgeting: how to pay down their mortgage a bit faster, whether to replace their aging sedan in the next year or two, and how to start putting aside more for Evan’s eventual college expenses.\n\nDespite the worries, Daniel genuinely loves what he does. He gets a quiet satisfaction from seeing kids who were shy at the start of the season running out onto the field with confidence
        by the last game, and from watching families linger after events at the park, talking and laughing as the sun goes down. He’s currently planning the fall festival and a charity 5K at Deep River, coordinating with local vendors and a couple of high school clubs that want to earn service hours by helping with the course and water stations. He’s also been talking with a colleague about starting a low‑cost Saturday morning multi‑sport clinic for kids whose families can’t afford travel teams.\n\nLooking ahead, Daniel occasionally thinks about going back to school for a master’s in public administration or nonprofit management, but for now he’s focused on doing his current job well, being present for his family, and keeping his own health in decent shape by squeezing in early‑morning runs a few days a week. His main concerns are familiar ones: making sure his kids feel supported and safe, keeping his parents cared for as they age, and maintaining the kind of neighborhood and community spaces that meant so much to him growing up. In quiet moments—often driving home along NC‑68 as the late afternoon light hits the trees—he feels grateful that his work, his family life, and his roots in Winston‑Salem and High Point all tie together in a way that still feels honest to who he is."
