        - fact: Since late 2023, Michael has been seeing neurologist Dr. Alan Pierce at Emory Brain Health Center in Atlanta every three months to monitor his mother Patricia Harrington’s early-stage dementia, after cognitive testing during an October 2023 visit to the Duluth campus clinic confirmed mild Alzheimer’s; he keeps a shared note with Karen titled “Mom – fall risk & memory issues after 10/12/23 appointment” to track medication changes and safety concerns in her Duluth independent living apartment.
          should_appear: false
        - fact: In March 2022, Michael underwent a stress test and follow-up echocardiogram at Northside Hospital Gwinnett after experiencing chest tightness during an ICC Region VIII training in Macon; he now takes a low-dose beta blocker prescribed by cardiologist Dr. Neha Shah and keeps a reminder on his City Hall Outlook calendar titled “Dr. Shah – 6-month follow-up – 3:30 p.m., Suite 410, Northside Gwinnett.”
          should_appear: false
        - fact: In August 2021, Michael and Karen quietly helped their son Jacob move out of an apartment in Norcross after a conflict with his then-girlfriend over his growing alcohol use; Michael later wrote Jacob a long email with the subject line “Next steps after Saturday – I’m on your side” offering to pay for an evaluation at Peachtree Ridge Counseling Center and to let Jacob stay in their Peachtree Ridge guest room while he got back on his feet.
          should_appear: false
        - fact: During the first half of 2024, Michael and Karen provided regular overnight childcare for their grandson Lucas in their Peachtree Ridge home while their daughter Emily and son-in-law Marcus attended couples counseling at Decatur Family Therapy Associates on Thursday evenings, following several tense months and a brief separation in February 2024; Michael saved a text from Emily reading, “Dad, can you keep Lucas this Thursday again? 6–9 pm, we have Dr. Nguyen in Decatur.”
          should_appear: false
        - fact: In November 2020, Michael filed a confidential memo with the Peachtree Ridge City Manager regarding contractor Franklin Development Group’s repeated life-safety violations on the Oak Commons Medical Plaza project, after discovering during a surprise inspection that the general contractor had concealed unapproved fire-resistance-rated wall penetrations; the memo, titled “Potential stop-work recommendation – Oak Commons Medical Plaza, BLDG-19-482,” led to political pressure from a councilmember who was a personal friend of the developer.
          should_appear: false
        - fact: In April 2019, Michael privately counseled junior inspector Daniel Ruiz in his City Hall office (Room 312) after Daniel admitted in an email titled “Need to talk before BOAG conference” that he had accepted Atlanta Braves tickets from a local framing contractor whose projects he regularly inspected; Michael documented the conversation in a confidential HR note and required Daniel to self-report the gift under the city’s ethics policy.
          should_appear: false
        - fact: In January 2024, Michael and Karen met with financial planner Susan Kelley at the Edward Jones office on Peachtree Industrial Boulevard to discuss whether Michael could afford to retire by 2029; the plan Susan emailed them (“Harrington_RetirementScenario2029.pdf”) assumes they will sell their Peachtree Ridge house and possibly take a reverse mortgage on Patricia’s Duluth condo if her care costs increase, something Michael is uneasy about but hasn’t discussed with his siblings.
          should_appear: false
        - fact: "In September 2022, after a contentious City Council work session where a local developer accused the Building Safety Division of being “anti-business,” Michael drafted but did not send a resignation email to the City Manager with the subject line “Re: Considering retirement sooner than planned,” describing burnout, political interference, and feeling undermined by senior leadership over enforcement decisions on the Town Center Phase II project."
          should_appear: false
        - fact: Between October 2018 and March 2019, Michael quietly worked with ICC instructor colleague Laura McMillan on evenings in a conference room at Peachtree Ridge City Hall to prepare for a retake of the ICC Certified Building Official exam after narrowly failing the August 2018 attempt in Savannah; he joked in a text to Laura, “Let’s not tell the Metro Atlanta BOAG crowd I bombed the CBO exam – round two starts Monday, 6 p.m. in Room 204.”
          should_appear: false
