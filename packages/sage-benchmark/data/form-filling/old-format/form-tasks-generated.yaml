    _metadata:
      background_context: "This is Jordan Elise Ramirez, a 24‑year‑old Latina emerging professional in architecture who grew up in Aurora, Illinois and now splits her time between Normal and Chicago. She’s in the final stretch of her B.Arch at Illinois State University, on track to graduate in May 2023, and is serving as the AIAS Illinois State University Chapter Vice President. Her days are a careful balance of comprehensive design studio, her part‑time job in the College of Fine Arts fabrication lab, and ongoing chapter planning meetings where she coordinates guest speakers, portfolio reviews, and firm tours. She’s been deeply involved in AIAS since Fall 2018 and moved into leadership in Fall 2019, which has given her a tight circle of friends and mentors across different year levels.\n\nOver the past year, Jordan has been commuting to Chicago on select weekends and school breaks to work as a part‑time intern at Lopez + Kwan Collaborative Architecture, a mid‑sized firm that focuses on community‑centered design, adaptive reuse, and affordable housing—exactly the kind of practice she’s always hoped to join. The firm originally brought her on for a summer position in June 2022 after she cold‑emailed a project architect she met through an AIAS networking event; when the summer ended, they kept her on remotely for 10–15 hours a week during the semester. Her work ranges from building energy model diagrams and material research for retrofit projects in Pilsen, to helping prepare boards and diagrams for community meetings in Little Village. She’s already started logging AXP hours with the goal of licensure within 5–7 years, and she keeps a spreadsheet on her laptop color‑coded by experience area and project.\n\nJordan currently lives in a modest two‑bedroom apartment on W Willow Street in Normal with her cousin Carolina (“Caro”) Alvarez, a graphic design major. The apartment is walking distance from campus and close enough to the fabrication lab that Jordan can run back home for quick meals between classes and late studio
        nights. Their living room is a mash‑up of model shelves, plants rescued from end‑of‑semester studio cleanouts, and a folding table that doubles as a pin‑up wall when Caro is working on branding projects. Most weekdays during the semester look similar: Building Systems II or theory classes in the morning, long blocks of studio in the afternoon, then hours in the fabrication lab or studio in the evening. Monday nights are usually reserved for AIAS executive board meetings, and Thursday late afternoons are for general body meetings—Jordan spends Wednesday nights finalizing agendas and slides, often texting with other board members about last‑minute room changes or whether to order pizza to boost attendance.\n\nHer parents, Miguel and Ana Lucia, still live in the same Aurora neighborhood where Jordan grew up, in a brick duplex that has chronic draft issues and an aging boiler that kicks on loudly in the winter. Those childhood experiences of cold bedrooms, high utility bills, and the lack of safe, well‑lit public spaces nearby are a constant reference point for her. She calls home every Sunday evening, usually putting them on speakerphone while she tidies her desk. Her mom asks about sleep and food first, always suspicious of how many meals are just coffee and granola bars, while her dad wants to hear about “the buildings” and whether any of them are near his old delivery routes. Her younger sister Sofia is a high school senior now, talking about possibly going into civil engineering, and Jordan has been helping her with college essays over Google Docs. Their younger brother Daniel, a freshman in high school, mostly pops into calls to show off new soccer cleats or complain about geometry homework.\n\nIn the background of everything is Jordan’s steady focus on the future: she’s already researching ARE study materials, bookmarking firms in Chicago that do strong community engagement, and saving every bit of extra money from her fabrication lab job and internship for exam fees and a planned move to Chicago after graduation.
        She keeps a pinned note on her phone outlining short‑, medium‑, and long‑term goals: finish AXP, pass exams efficiently, and eventually either become a partner at a socially driven practice or start a small collaborative that works with housing advocates and community groups. She’s also intrigued by the idea of teaching part‑time as an adjunct studio instructor once she has some solid professional experience, after discovering through AIAS that she enjoys mentoring, leading discussions about design ethics, and helping younger students navigate burnout and imposter syndrome.\n\nLately, her main concerns are time and energy. This final academic year is demanding: a comprehensive studio project on adaptive reuse of a vacant warehouse, a capstone research paper on low‑cost retrofit strategies for multifamily housing, ongoing AIAS programming, and her remote responsibilities with Lopez + Kwan. She’s learned to block out Friday afternoons for model building and desk crits, and she guards Saturday mornings for rest or long walks around campus with a podcast about housing policy in her earbuds. She’s fully vaccinated and comfortable with in‑person meetups when protocols are followed, so she occasionally attends small gatherings in Bloomington–Normal or Chicago to stay connected with peers and professionals beyond Zoom. Despite the hectic schedule, Jordan feels an underlying sense of purpose: each class, site visit, and community meeting feels like another step toward becoming the kind of architect she wished her neighborhood had when she was growing up—someone who can translate between residents, engineers, and clients, and make sure working‑class and immigrant communities see their needs and stories reflected in the built environment around them."
