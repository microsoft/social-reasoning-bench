    _metadata:
      background_context: "This is Maya Johnson, a 17-year-old high school senior living with her parents and younger brother in a modest single-family home off Maple Glen Drive in North St. Louis County. Most weekday mornings start around 6:15 a.m., when her mom, Lisa, is already in scrubs getting ready for an early shift at the clinic and her dad, Eric, is checking his Metro bus route schedule on his phone. Maya usually grabs oatmeal or a breakfast sandwich, makes sure her brother Jordan has his Chromebook and gym clothes, and they all coordinate rides based on who has the car and who’s catching the bus. On days when her dad’s route lines up, he drops her at McCluer North a little after 7:15 a.m.; otherwise she rides with a neighbor whose daughter also goes there. \n\nAt school, Maya’s days are full and structured. She moves from Honors English—where her teacher has her leading a small group on a research project about health disparities—to Pre-Calculus, Anatomy & Physiology, Government, and her dual-credit College Success course. She’s proud of maintaining a 3.68 GPA while juggling so many responsibilities, and she relies heavily on her color-coded planner and weekly to-do lists. After classes, she’s often on campus until early evening: Student Council meetings to plan spirit week or a forum on mental health, Black Student Union planning for Black History Month programs, or National Honor Society service projects like coat drives. Track season adds another layer; as varsity team captain running the 100m, 200m, and 4x100 relay, she stays at practice most days until around 5:30 p.m., then spends extra time mentoring younger JV sprinters who look up to her.\n\nCommunity service is woven into Maya’s routine. Two afternoons a week, she heads to the Northside Youth Enrichment Center to tutor middle school students in math and English, helping them work through fractions or reading assignments and chatting with parents at pick-up about how their kids are doing. Once a month, she volunteers at Greater Grace Community Outreach’s
        food pantry, where she helps pack boxes, carry groceries to seniors’ cars, and register families. Her weekends often include church activities at New Hope Missionary Baptist Church—youth choir rehearsals, helping with children’s crafts, or brainstorming topics for teen Bible study discussions. Every few months, she and her family pitch in at neighborhood clean-up days in North County, picking up litter, planting flowers in median strips, and handing out flyers about city resources.\n\nThis past summer was especially important for Maya. She volunteered at a community health fair where she checked people in, passed out resource flyers, and directed them to blood pressure and glucose screenings. Watching Black nurses and doctors speak calmly with elders who reminded her of her grandparents solidified her desire to pursue nursing. She came home that day and told her mom she wanted to be a nurse practitioner one day, especially to serve Black women who often feel dismissed in medical settings. Since then, she’s been researching local BSN programs, comparing tuition and scholarship options, and meeting with her school counselor about application timelines. She’s also started a running list of scholarship deadlines on her bedroom wall calendar, motivated by the memory of her dad’s hours being cut during the pandemic and how tight things got at home.\n\nEmotionally, Maya is in a more grounded place than she was in middle school, when anxiety and the pressure to be “strong” all the time felt overwhelming. Through youth programs and workshops on self-care and mental wellness, she learned to name what she’s feeling and to cope in healthier ways—journaling before bed, going for a run even when it’s cold outside, and checking in with trusted adults at church and school. Now she’s the friend who quietly asks, “Are you really okay?” and encourages others to talk to counselors or consider therapy if they need it. Within her youth groups, she’s become a go-to mentor for younger girls, helping them think through class schedules,
        time management, and even what to wear for interviews or presentations.\n\nFamily life is busy but close-knit. Lisa works long days at the clinic, often sharing stories at dinner about patients who remind her why healthcare access matters, while Eric sometimes comes home late after dealing with traffic or weather on his bus route. They’ve had their share of financial stress, especially during the pandemic, but they try to shield the kids from most of it, turning it instead into conversations about budgeting and the importance of education. Jordan, an energetic 8th grader, looks up to Maya but also tests her patience—she helps him with his math homework, cheers at his basketball games when she can, and nags him to keep his room semi-clean. Evenings at home are a mix of everyone doing their own work in the living room, the TV low in the background, and Maya slipping away to her room to study or work on yearbook layouts on her laptop.\n\nTransportation and scheduling are constant puzzles for the family. With her parents’ shifting work hours, her own part-time shifts at the Schnucks in Florissant, her brother’s activities, and multiple volunteer commitments, Maya has become skilled at coordinating rides. She often carpools with another girl from her youth program who lives nearby, and they trade off whose parent drives. When conflicts arise—like a track meet on the same evening as a church event—she tries to communicate early with coaches and leaders to find compromises. Her main worries these days center on making the right college choice, securing enough financial aid, and not letting her grades slip under the weight of everything she’s involved in. Still, she’s hopeful: she feels herself growing more confident, more organized, and more sure that she can build a future in healthcare where she’s not only successful, but also actively serving and advocating for the community that raised her."
