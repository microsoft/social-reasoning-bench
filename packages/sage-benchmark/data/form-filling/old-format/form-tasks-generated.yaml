    _metadata:
      background_context: "This is Martha Louise Henderson, a 76-year-old widow living alone in a modest 1940s bungalow at 1842 NE 52nd Avenue in Portland’s Rose City Park neighborhood. She has been in this house for over 35 years; she and her late husband, John, bought it in 1988 when their children were in grade school. The house has a small front yard with two aging rhododendrons, a narrow driveway, and a basement where the laundry is—an arrangement that has become increasingly challenging as her left knee osteoarthritis has worsened. Martha retired about ten years ago from a long career as a second-grade teacher in Portland Public Schools, mostly at a neighborhood elementary school a few miles away. She’s proud of her work and still bumps into former students at the grocery store on NE Sandy Boulevard who call her “Mrs. Henderson.”\n\nMartha’s days now revolve around managing her pain, staying as independent as she can, and preparing for her upcoming left total knee replacement at Providence Portland Medical Center on or around January 20, 2025. Over the last year, walking even half a block with her cane has become difficult, and the two falls she had in September and November of 2024 shook her confidence badly. Since then, she’s started planning her movements carefully—she keeps her cell phone in a crossbody bag at all times in case she falls, and she has a small bench by the front door so she can sit to put on her shoes. She sees her primary care doctor, Daniel R. Kim, MD, regularly and has gotten to know the Providence system well, with her orthopedic surgeon, Dr. Laura J. McMillan, overseeing the surgical plan. Her calendar for January and February 2025 is sprinkled with pre-op appointments, lab work, and a series of post-surgery physical therapy visits at a nearby clinic on NE Glisan.\n\nBecause stairs to the basement laundry are risky, Martha has started doing just one carefully planned laundry trip each week, usually on Sunday afternoons when her daughter, Emily, can stop by from Beaverton to help carry
        the basket. Emily, a 45-year-old HR manager, has arranged to work from home for a couple of weeks around the surgery so she can stay overnight with Martha for the first stretch after discharge. They’ve already talked about setting up a temporary sleeping area on the main floor and borrowing a shower chair. Her son Michael, who lives in Seattle with his wife and their six-year-old, calls every few days and plans to visit the weekend after the surgery if weather and Martha’s recovery allow. Martha is relieved to have their support but worries about “being a burden,” something she says often even as her kids reassure her.\n\nOn a typical winter weekday, Martha wakes up around 7:00 a.m., takes her morning medications with tea and toast at the small kitchen table, and reads the Oregonian on her tablet. She does gentle stretching exercises she learned in physical therapy, though they no longer touch the deep, grinding ache in her left knee. She moves slowly around the house, holding onto furniture for support, and limits trips up and down the front steps. Cooking has become harder—standing for more than 10–15 minutes hurts—so she plans simple meals: oatmeal in the morning, soup or a sandwich at lunch, and something easy like rotisserie chicken with frozen vegetables for dinner. She’s a little embarrassed by how often she now relies on microwave meals but tells herself it’s temporary until she can stand comfortably again after rehab.\n\nSocially, Martha has scaled back but not withdrawn. She used to attend church every Sunday at a Methodist congregation a few blocks away; now she watches the service online more often than not, especially if the sidewalks are wet or icy. A close friend from church, Carol, stops by once a week with homemade muffins or a casserole and stays for coffee. On Thursdays, Martha joins a Zoom book club organized by a neighbor, where the group mostly talks about grandchildren and local news as much as the book. She also keeps in touch with her younger sister Pat in Eugene by phone; they reminisce
        about their childhood in Salem and talk about the logistics of Pat possibly coming up for a few days once Martha is further along in her recovery.\n\nMartha’s biggest concern in early 2025 is balancing her fear of surgery with her fear of another fall. The memory of needing a neighbor and EMS to help her up off the kitchen floor in November still makes her anxious when she turns too quickly or steps into the bathtub. She has placed non-slip mats in the bathroom and installed a temporary grab bar with Emily’s help. She’s looking forward to getting the front-wheeled walker and raised toilet seat the surgeon’s office mentioned, hoping they will make those first weeks at home safer. At the same time, she worries about post-operative pain, anesthesia, and how long it will take before she can walk without feeling like her leg might give way.\n\nDespite these worries, Martha is cautiously optimistic. She imagines being able to walk several blocks again by late spring 2025, maybe even strolling around Grant Park with her grandchildren when the weather warms up. She has a mental list of “post-surgery goals”: visiting the Portland Art Museum with Emily, tending to her small backyard flower beds without dreading the stairs, and comfortably standing long enough to bake her famous lemon bars for family gatherings. For now, she is focused on getting through each day safely, following her doctors’ instructions, and organizing her home and support system so that when the surgery date comes, she can move through the hospital stay, imaging, and outpatient physical therapy with as little disruption—and as much hope—as possible."
