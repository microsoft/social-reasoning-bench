      background_context: "This is Alexandra Nguyen, a 36-year-old addiction psychiatrist living in a modest two-bedroom apartment in Denver’s Athmar Park neighborhood with her partner Daniel, their four-year-old daughter Sophie, and her 17-year-old brother Michael. Weekdays start early: she’s usually up by 5:45 a.m. to squeeze in a short yoga video and coffee before waking Sophie and checking that Michael is actually up for school and has taken his morning meds. By 7:30 a.m., she and Daniel are tag-teaming drop-offs—either preschool for Sophie and high school for Michael, or, on days when Daniel has a contract event, Alexandra does both before driving across town to Riverside Community Behavioral Health Center.\n\nAt Riverside, Alexandra’s days are full and often emotionally heavy. She spends most mornings in back-to-back 30-minute visits with patients dealing with opioid, methamphetamine, and alcohol use disorders, many with co-occurring schizophrenia, bipolar disorder, or PTSD. She leads a small interdisciplinary team—two social workers, a nurse, a peer specialist, and a part-time psychologist—focused on expanding access to medications for opioid use disorder and running bilingual relapse-prevention groups. Two afternoons a week she carves out time for group visits, case conferences, and quick hallway consults with primary care clinicians about complex patients. She’s become the informal go-to person for anything involving buprenorphine, extended-release naltrexone, or harm reduction, and she still takes quiet pride when she sees naloxone kits in patients’ bags and hears about another overdose reversed in the community.\n\nOutside of work, the last few years have felt like a constant balancing act. Daniel’s layoff in mid-2021 and his now-unpredictable contract income have made finances tight, and Alexandra keeps a careful spreadsheet of expenses on her laptop—student loan payments, a lingering personal loan from residency, increased grocery and gas costs, and Michael’s specialist appointments and medications. She
        became Michael’s legal guardian after their mother’s health declined due to complications from diabetes and heart failure; coordinating his care, his therapy, and IEP meetings with his school counselor has become a second job. Evenings are a mix of ordinary family chaos and quiet responsibility: cooking simple dinners, reviewing Michael’s homework, FaceTiming with their parents in Colorado Springs, and reading picture books with Sophie before bed. On good nights, she and Daniel sit on the small balcony with tea, talking about his hopes of finding a more stable job and her ideas for a trauma-informed care project at the clinic.\n\nAlexandra’s main personal worries revolve around sustainability—of her career, her finances, and her ability to be present for her family. She feels deeply committed to staying in a safety-net setting and often brings home ideas from recent conferences or webinars to share with her team, drafting handouts in the evenings or planning brief in-service talks over weekends. She tries to protect at least one weekend afternoon for family time—taking Sophie to the Denver Zoo, walking along the South Platte River, or visiting her parents in Colorado Springs when they’re stable enough for company. She keeps in touch with a small circle of colleagues from residency and fellowship through group texts and occasional coffee meetups downtown, where they swap clinical tips and commiserate about burnout. Despite the strain, Alexandra still feels that her work matters, especially when a long-time patient shows up more stable, a family member thanks her for listening, or Michael jokes with her in the car on the way home, sounding more like a typical teenager than a kid who’s been through too much."
