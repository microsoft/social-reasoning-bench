    _metadata:
      background_context: "This is Marisol Elena Rodriguez, a 34-year-old Mexican-American woman who splits her time between Chicago’s West Side, where she lives, and Pilsen, where she runs her growing food business, Luna Latina Kitchen, LLC, at 1632 W 18th Street. She lives alone in a modest third-floor walk-up on W Monroe Street in the Austin neighborhood, about a 20-minute drive from her shared commercial kitchen. Her days start early—usually around 5:30 a.m.—with coffee, a quick scroll through catering inquiries on her phone, and a check-in on inventory and prep lists she keeps in a color-coded Google Sheet. On Thursdays and Sundays, her busiest days, she loads her hatchback with coolers, hotel pans, and boxes of packaging before heading to the kitchen by 7:00 a.m.\n\nLately, her life has revolved around two intertwined challenges: managing steady growth at Luna Latina Kitchen and trying to secure a small brick-and-mortar space before the end of 2025. She’s been touring potential locations in Pilsen and Little Village with a local commercial realtor since late summer and has her eye on an 1,000-square-foot former bakery space on 18th Street that became available in October. The rent and security deposit are a stretch, so she’s been running numbers with her cousin Sofia, who helps her with branding and social media, and meeting once a month with a small business mentor from a neighborhood nonprofit. At the same time, she’s juggling day-to-day operations: coordinating a part-time line cook’s schedule, keeping up with orders from two independent grocery stores that carry her bottled salsas, and testing frozen empanada recipes in the evenings to see which hold up best after baking at home.\n\nFamily is a constant presence in her routine, even if they don’t live under the same roof. Most Tuesday nights, she drives to Cicero to have dinner with her parents, Rosa and Javier, and her abuela Carmelita, who moved in with them after a minor fall in early 2023. Marisol still worries about her grandmother’s balance and quietly
        checks that throw rugs are taped down and that the grab bars she insisted on installing in the bathroom are secure. Weekends are a mix of work and family: on Saturdays, if she’s not catering a baby shower or a nonprofit board retreat, she might meet her boyfriend Miguel in Humboldt Park for a walk and a late lunch, or swing by Berwyn to see her sister Ana and four-year-old niece Lucia, who proudly tells everyone that “Tía Mari makes the best salsa in the world.”\n\nHer daily life has a rhythm but also a constant sense of improvisation. On a typical weekday without a big catering job, she’ll spend the morning in the kitchen prepping for the next meal pickup cycle—marinating chipotle-lime chicken, roasting trays of vegetables, and blending batches of salsa macha. Midday, she often runs deliveries to the two grocery stores that stock her products, chatting briefly with the owners about what’s selling and which flavors customers are asking for. Afternoons are reserved for the less glamorous but essential side of running a business: updating QuickBooks, answering emails from office managers planning staff lunches, and tinkering with her website’s online ordering page. She usually eats a late lunch standing at the stainless-steel prep table, tasting and adjusting recipes as she goes.\n\nOver the past year, she’s been feeling the strain of long hours on her body—sore feet, tight shoulders, and the occasional stress headache. In September 2024, after a scare where she felt dizzy during a large catering event, she scheduled a long-overdue physical at a community clinic near her apartment. Her blood pressure was slightly elevated, and the doctor gently urged her to take her own health as seriously as she takes her customers’ nutrition. Since then, she’s made small but real changes: trying to fit in a 20-minute walk around the neighborhood before bed at least a few nights a week, drinking more water instead of her habitual second and third coffees, and blocking off one Sunday evening a month as non-negotiable rest time—no
        events, no email, just a movie or a book and maybe takeout she didn’t cook herself.\n\nDespite the fatigue, she feels proud of how far she’s come since 2021, when she started cooking out of a cramped shared kitchen after losing her restaurant management job during the pandemic. Some of her earliest customers—teachers from a nearby elementary school and nurses from a community clinic—still order from her for staff meetings, and she knows many of them by name. She donates leftover trays of food twice a month to a local mutual aid group, something she coordinates through a WhatsApp chat, and she’s in the early stages of planning a small paid summer internship program for two high school students from Pilsen in 2026. In quiet moments, usually late at night when she’s labeling bottles of pineapple-habanero salsa, she thinks about what it would mean to have her own storefront, with her logo in the window and a small counter where neighborhood kids stop in for empanadas after school. That vision keeps her moving through the long days, even as she balances spreadsheets, family obligations, and the everyday uncertainty of running a small, community-rooted business in Chicago."
