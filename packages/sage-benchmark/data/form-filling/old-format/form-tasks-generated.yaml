    _metadata:
      background_context: "This is Daniel, a 34-year-old senior data analyst who recently relocated from San Francisco to Seattle in late November 2025 after more than six years working in healthcare and analytics in the Bay Area. Until November 30, 2025, he worked full-time as a Senior Data Analyst at Evergreen Data Solutions, Inc., an information technology consulting and data analytics firm based at 1458 Market Street in San Francisco. In that role, which he’d held since July 15, 2019, Daniel was the primary analytics point of contact for several mid-size healthcare and retail clients. He led end-to-end analytics projects, designed and maintained data pipelines, wrote complex SQL in PostgreSQL and MySQL, and used Python (pandas, NumPy, Jupyter) for deeper analysis. He built Tableau and Power BI dashboards that executives relied on for weekly and monthly decision-making, and he managed a small rotating team of junior analysts. Before Evergreen, from September 1, 2015 to June 30, 2019, Daniel worked full-time as a Data and Reporting Specialist at Bayview Community Health Center, a nonprofit clinic on Mission Street in San Francisco. There he handled HRSA and foundation reporting, built Excel and Google Data Studio dashboards, cleaned and reconciled EHR data, and supported quality improvement projects around no-show rates and chronic disease management.\n\nDaniel now lives in a modest but bright two-bedroom apartment in Seattle’s Wallingford neighborhood with his fiancée, Emily Hart, a 32-year-old nurse practitioner who accepted a position at a community clinic in the Seattle area earlier in 2025. The move to Seattle was driven by a mix of wanting to be closer to Emily’s family, who live in nearby Tacoma, and Daniel’s desire to transition from consulting work across multiple clients to a more focused in-house analytics role within a single healthcare organization. He wrapped up his client projects at Evergreen over the fall, documented his dashboards and SQL pipelines for colleagues, and spent most of his last two
        weeks there on handoffs and final client presentations. He’s currently in the final stages of interviewing for a senior analytics position at a large nonprofit health system in Seattle, a role that would let him draw directly on his experience at Bayview and his consulting work with multi-clinic healthcare providers.\n\nDay to day, Daniel’s life is a mix of job search, settling into a new city, and planning a wedding. Most mornings he’s up around 6:45 a.m., making coffee in a battered pour-over cone he’s had since college while Emily gets ready for her commute. After she leaves, he spends a few hours tailoring resumes, practicing case-style analytics questions, and brushing up on Python and SQL in a few bookmarked Jupyter notebooks. He keeps a Kanban board on the side of their fridge with color-coded sticky notes for each application and networking conversation. Around late morning, he often takes a walk around Green Lake or down to Gas Works Park, partly to clear his head and partly to get used to the colder, wetter Seattle weather after years in San Francisco. Afternoons tend to be a mix of video interviews, exploratory data projects he’s using to keep his portfolio fresh, and calls with his mom, Hoa, who still lives with his father, Bao, in San Jose and is curious but a little anxious about his move so far north.\n\nFamily is a quiet but steady thread in Daniel’s life. His younger sister Linh, a 30-year-old UX designer still based in Oakland, texts him regularly with photos of new coffee shops and memes poking fun at his obsession with data quality. Their parents, Hoa and Bao, immigrated from Vietnam in the late 1980s and run a small nail salon they’ve owned for nearly two decades. They’re proud of Daniel’s career but mostly ask if he’s eating enough vegetables and whether Seattle is as rainy as people say. On Emily’s side, her younger siblings Nathan and Sophie are excited to have the couple closer; Nathan has already floated the idea of regular Sunday dinners once Daniel and Emily get more settled. The
        couple is planning a small, mostly family wedding for late summer 2026, likely somewhere in the Puget Sound area, and Daniel has a spreadsheet tracking guest lists, estimated costs, and venue options that Emily alternately teases him about and relies on.\n\nDaniel’s main concerns right now are finding the right next role and building a sense of community in a new city. He’s financially stable thanks to savings from his years at Evergreen but still feels the pressure of being in between full-time roles, especially as he and Emily think about long-term plans like buying a condo and possibly starting a family in a few years. He worries a bit about making sure his next job isn’t just a lateral move but a step toward more strategic influence—he wants to be closer to decisions about how data is used in healthcare, not just the person producing dashboards on request. To keep perspective, he volunteers a few hours a month remotely with a small health nonprofit he connected with back in California, helping them clean up their program data and set up simple reporting templates—work that reminds him of his time at Bayview and grounds him in why he chose this field.\n\nEvenings are usually quiet. Daniel and Emily cook at home most nights, experimenting with a mix of Vietnamese recipes he learned from his mother and simple sheet-pan meals Emily finds online. They’re slowly exploring Seattle’s neighborhoods on weekends—trying pho in the International District, browsing bookstores in Capitol Hill, and checking out farmers’ markets. Daniel recently joined a local board game meetup and a casual tech meetup focused on data visualization, hoping to make new friends outside of work. He keeps a running list in Notion of books he wants to read and side projects he might tackle, including a public dashboard visualizing Seattle transit reliability. As winter sets in, he’s adjusting to the shorter days and making a point of getting outside when it’s not raining too hard, knowing that routines like his morning walks and weekly calls
        with family are what keep him steady through this in-between chapter of his life."
