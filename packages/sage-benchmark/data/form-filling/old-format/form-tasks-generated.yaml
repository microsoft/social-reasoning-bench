    _metadata:
      background_context: "This is Laura, a 47-year-old Latina mom raising two kids in Santa Fe while managing a permanent mobility impairment from a 2016 car accident. She lives in a modest two-bedroom townhouse off Camino de la Sierra, where the layout is mostly single-level and she’s arranged the furniture to make it easier to maneuver her manual wheelchair. Her bedroom doubles as a small home office, with a low desk, an older but reliable laptop, and a tangle of color-coded folders for her part-time job as an outreach coordinator at Healing Horizons, a local nonprofit that connects low-income residents with medical, mental health, and housing resources. She typically works about 22–25 hours a week, a mix of remote phone work and two in-person days downtown, carefully scheduled around her physical therapy appointments at CHRISTUS St. Vincent and her kids’ school routines.\n\nMost weekdays start before sunrise. Laura gets up around 6:00 a.m., transfers from bed to her wheelchair, and does a short stretching routine her physical therapist gave her to keep her back from locking up. She wakes up her 11-year-old son, Diego, who usually complains about the early hour, and reminds her 16-year-old daughter, Sofia, to grab her Chromebook and clarinet for band. Breakfast is simple—oatmeal or scrambled eggs—and she keeps a small coffee maker on a low rolling cart she can pull close to the counter. On days when her pain is milder, she uses her cane for very short distances inside the house, but outside she relies on her wheelchair. She times her mornings around the Santa Fe Trails bus schedule: if she has a physical therapy session, she aims for a mid-morning appointment so she can see the kids off to school, catch Route 2 on Cerrillos, and still make it to a couple of hours of remote work in the afternoon.\n\nSince the spinal cord injury, Laura’s world has become more tightly planned. She no longer drives; selling her old Honda after the accident was both a financial necessity and an emotional milestone. Public transit is
        now her main lifeline, and she builds in extra buffer time for nearly every trip, knowing that delays are common. The October 28 incident, when a driver refused to deploy the ramp and left her at the curb, shook her more than she expected. In the weeks afterward, she found herself feeling anxious every time a bus approached, bracing for the possibility that she’d be treated as an inconvenience again. She started leaving home even earlier for medical appointments and work shifts, and she quietly asked a coworker, Mariah, to be her backup for in-person outreach events in case a transit delay made her late.\n\nFamily is the center of Laura’s life. Her ex-husband, Miguel, lives in Albuquerque and sees the kids two weekends a month; they’ve worked hard to keep things civil for Sofia and Diego’s sake, though the 2016 accident and its aftermath put a permanent strain on the relationship. Sofia is a thoughtful, slightly introverted junior at Santa Fe High, juggling AP U.S. History, band, and a part-time weekend job at a café near the Plaza. She helps a lot at home—cooking simple dinners like chicken tacos or pasta, and watching Diego if Laura is running late from therapy or from the bus. Diego is energetic and talkative, into soccer and video games, and sometimes frustrated by the limits his mom’s disability puts on last-minute plans. Laura worries about him internalizing resentment, so she makes a point of having one-on-one time with him: watching Friday night movies on the couch with popcorn, or helping him with his science homework at the kitchen table.\n\nFinancially, things are tight but stable. Laura receives a modest disability benefit and earns extra through her part-time job. She tracks every bill in a notebook—rent, utilities, Sofia’s exam fees, Diego’s soccer registration, her co-pays for therapy—and she keeps a small emergency fund that she guards carefully. Her mother, Elena, still lives in Las Cruces and calls every Sunday afternoon; they talk in a mix of Spanish and English about family gossip, recipes,
        and the kids’ latest achievements. Laura’s younger brother, Carlos, visits from Denver once or twice a year and insists on fixing things around the house when he’s in town—last spring he installed grab bars in the bathroom and adjusted a loose cabinet door that kept catching on her chair.\n\nEmotionally, Laura is in a fragile but determined place. She attends a weekly 6:00 p.m. online support group for people living with chronic pain and mobility impairments, which has become a vital anchor in her week. Missing that meeting after the long, painful bus ordeal in late October left her feeling both angry and defeated for a few days. To cope, she journals on her phone, takes slow laps around the small community green space when the weather is mild, and loses herself in audiobooks—mostly contemporary fiction and the occasional mystery—while she cooks or rests. She is deeply aware that her independence hinges on systems working the way they’re supposed to, from reliable transit to accessible sidewalks, and that awareness sits in the back of her mind whenever she plans even simple outings.\n\nDespite the challenges, Laura holds onto a quiet sense of purpose. Through her work at Healing Horizons, she often finds herself on the phone with clients who are facing situations far more precarious than her own—people on the verge of eviction, seniors who can’t afford their medications, or other disabled residents who feel isolated. She listens, connects them to resources, and shares little bits of her own experience when it feels appropriate, careful not to make the conversation about herself. Her long-term hope is to increase her hours once her pain is better managed and the kids are a bit older. In the nearer term, her concerns are more immediate and grounded: getting Sofia through college applications next year, keeping Diego engaged in school, making sure her own health doesn’t deteriorate, and navigating Santa Fe one accessible bus ride at a time."
