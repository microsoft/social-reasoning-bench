    _metadata:
      background_context: "This is Daniel Whitaker, a 41-year-old residential designer who runs a small practice called Whitaker Residential Design, LLC out of his home at 7421 Brookside Ridge Drive in Overland Park, Kansas. He and his wife Emily bought their corner-lot house in the Brookside Ridge area in the summer of 2019, just before their son Jacob started preschool. They were drawn to the neighborhood for its schools, mature trees, and the way kids ride bikes along West 143rd Terrace in the evenings. Daniel works primarily on custom home remodels and additions around Johnson County, often collaborating with a few local builders he’s known since his early career. His workdays are a mix of on-site measurements in the morning and quiet design time in the afternoon at a desk he’s set up in a spare bedroom overlooking the backyard.\n\nEmily, 39, is an occupational therapist who now works part-time at a nearby outpatient clinic, focusing on adults recovering from strokes and orthopedic injuries. She shifted from full-time hours in 2021, after the pandemic made balancing two demanding careers and remote schooling unsustainable. Their daughter Sophie, 9, is in 4th grade at Oak Hill Elementary and has recently gotten into competitive soccer and chapter books, while 6-year-old Jacob is a 1st grader who loves Legos and anything related to dinosaurs. Their medium-sized dog, Riley, is energetic and can easily clear a low barrier, which has made the exposed nature of their corner lot a constant concern when the kids want to play outside. Emily’s mother, Martha, lives in Springfield, Missouri, but visits once a month for long weekends; she uses a walker after a hip replacement in 2022, so Daniel and Emily have been gradually making the back patio and first floor more accessible for her.\n\nDay to day, Daniel’s routine is structured but flexible. On school days he’s usually up around 6:15 a.m., packing simple lunches while Emily gets the kids dressed and out the door by 7:30. If he doesn’t have an early site visit, he walks
        Riley along West 143rd Terrace and loops through the subdivision, mentally noting other homes’ fencing, landscaping, and siding details—partly as a designer, partly as a homeowner thinking about his own property updates. By 9:00 a.m. he’s at his drafting table with a mug of coffee, toggling between Revit and email, coordinating with clients about kitchen layouts or reviewing structural notes from an engineer. He typically schedules client meetings and site visits for Tuesdays and Thursdays so that Wednesdays and Fridays can be deeper design days at home.\n\nOver the past year, improving their home has become a central ongoing project for the family. In early 2024 they replaced aging vinyl siding with fiber-cement boards in a warm gray, and Daniel designed a slightly enlarged, more accessible rear patio so Martha can move from the house to the backyard with fewer transitions and tripping hazards. The remaining major item on Daniel’s mind is creating a true sense of a private backyard on their corner lot. The west side of the house, which functions as their rear yard, faces West 143rd Terrace, leaving their sliding glass door and living room windows almost completely exposed to passing cars and pedestrians. Sophie has mentioned that she feels “on display” when she’s on the patio, and Jacob tends to wander too close to the sidewalk when they’re just trying to let Riley run. Daniel has spent weekends measuring sight lines at the Brookside Ridge Drive and West 143rd Terrace intersection, sketching fence lines, and thinking through how to balance privacy, safety, and the look of the streetscape.\n\nFamily life is a constant juggle of schedules and small concerns. Evenings are built around soccer practices at the nearby complex for Sophie, library nights when Jacob insists on checking out yet another dinosaur book, and simple dinners that can be on the table by 6:30 p.m. Emily’s reduced hours mean she can usually handle mid-afternoon pickups and therapy appointments for Martha when she’s in town, while Daniel shifts
        his desk work into the late evenings a couple of nights a week to finish drawing sets and answer client questions. They are mindful of finances as a single-income business household—carefully timing home upgrades like the siding, landscaping, and backyard improvements so they can pay cash where possible and avoid taking on more debt than their existing mortgage.\n\nSocially, Daniel and Emily are well integrated into the neighborhood. Daniel chats with the neighbors at 7425 and 7417 Brookside Ridge Drive on weekends when they’re all out mowing or trimming shrubs, and the kids have formed a small pack of friends who run between yards on summer evenings. Several nearby homes have 6-foot cedar privacy fences enclosing their rear yards, which has influenced Daniel’s thinking about what feels normal and expected in a single-family neighborhood. He’s been careful to show neighbors his fence sketches and elevation drawings during casual driveway conversations, wanting to make sure everyone is comfortable with how the corner will look. His broader worries are typical for someone in his stage of life: keeping his small design practice steady in a shifting housing market, making sure the kids feel safe and at home in their own yard, and helping Emily manage the physical and emotional demands of supporting an aging parent while still preserving some time for themselves.\n\nRecently, Daniel has been piecing together a modest but steady pipeline of projects—kitchen remodels in Leawood, a second-story addition in Olathe, and a screened porch in Prairie Village. He likes that his work directly affects how families live day to day, and he uses his own home as a sort of test case for thoughtful residential design. On quiet Sunday afternoons, after soccer games and chores, he’ll sit at the patio table with a sketchbook, looking out toward West 143rd Terrace, thinking about plantings like feather reed grass, spirea, and dwarf hydrangea that can soften the edge of a future fence. The combination of kids playing in the yard, Martha
        resting comfortably on a more accessible patio, and Riley safely contained within a truly private backyard has become a clear mental picture of what “home” should feel like for him, and much of his current energy is directed toward slowly, practically making that vision real while maintaining good relationships with neighbors and the broader community."
