      background_context: "This is María, a 28‑year‑old Qʼanjobʼal‑speaking woman from Santa Eulalia, Huehuetenango, Guatemala, now living in Albuquerque’s West Side with her husband Juan and their 4‑year‑old son Diego. She is about 24 weeks pregnant as of late January 2025, with a due date her provider has estimated around mid‑May. María’s days start early in their small, sparsely furnished one‑bedroom apartment tucked behind a laundromat off Atrisco Drive. Juan leaves for a construction site most mornings before sunrise, and María quietly gets up to make him coffee and warm tortillas with beans or scrambled eggs, trying to balance what she remembers the doctor saying about her blood sugar with the foods she knows how to prepare and what they can afford. After Juan leaves, she gets Diego dressed, braids his hair if he’ll sit still, and walks him to a nearby Head Start program when they have a spot for him that day.\n\nMaría does not have a job outside the home; she spends most of her time caring for Diego, managing the pregnancy, and trying to keep the apartment clean despite the dust that blows in from the parking lot. She completed only a few years of primary school back in Santa Eulalia and never really learned to read or write. In Albuquerque, that means she relies heavily on memory, routines, and other people’s help. Bus routes, appointment slips, and medication labels are all confusing; she recognizes a few numbers and simple Spanish words but not enough to feel safe depending on them. Because of this, she often keeps folded papers from the clinic together in a plastic bag in the kitchen cabinet, bringing the entire bundle whenever she has a visit so someone at the front desk can sort out which one they need.\n\nThe recent diagnosis of gestational diabetes has unsettled her already fragile sense of confidence. At a visit in late 2024, when the clinic first told her about her blood sugar results, the interpreter spoke only Spanish. María nodded and smiled politely, as she was raised to do with authority figures,
        but walked out unsure of how many times a day she should check her blood sugar, when to eat, or what exactly she was supposed to avoid. Since then, she has been trying to guess her way through a new routine: sometimes skipping breakfast out of fear of “too much sugar,” then eating a large plate of rice and tortillas late in the afternoon when she gets very hungry. Her glucometer readings—numbers she doesn’t truly understand—swing up and down, adding to her anxiety.\n\nMost days, once Diego is settled with toys or a cartoon in Spanish that he half understands, María moves through a quiet rhythm: hand‑washing clothes in the bathtub, calling her mother in Santa Eulalia when there is enough money on her phone, and preparing simple meals based on beans, rice, tortillas, and occasional chicken or eggs. When she talks to her mother, she switches fully into Qʼanjobʼal, describing the cold winter mornings in Albuquerque and her worries about the baby. Her mother responds with prayers, herbal suggestions from home, and gentle reminders to trust the doctors but also to listen to her own body. These conversations are a lifeline; they keep María anchored to her community and remind her she is not completely alone in this new country.\n\nTransportation and language barriers shape much of María’s daily life. She does not drive, and the idea of taking the bus by herself still scares her, especially because she can’t read the route signs. For clinic appointments at Sunrise Community Health Center on Riverside Drive, she usually depends on Juan or her cousin Esteban for a ride. When Juan’s construction job is especially busy, Esteban, who has lived in Albuquerque longer and speaks some English and better Spanish, will leave work a little early to take her. She always brings Diego along because they can’t afford childcare; she packs a small bag with snacks, a toy car, and a change of clothes for him, worried he might get restless in the waiting room.\n\nRecently, in the weeks leading up to her January 22, 2025 prenatal and diabetes
        follow‑up visit at Sunrise’s main clinic, María has been more on edge than usual. She remembers leaving the last appointment feeling scolded and embarrassed, as if the staff were annoyed that she didn’t understand Spanish well enough. Since then, she has been extra polite and quiet in public spaces, avoiding asking questions even when she is unsure. At home, though, she lies awake at night, one hand on her growing belly, wondering if she is hurting the baby without realizing it. She worries about stories she’s heard from other women about babies born too early or too big, and about how Juan will react if the doctors say something is wrong.\n\nDespite these worries, there are also small, hopeful moments woven into her days. Diego has started talking excitedly about becoming a big brother, placing his ear on her belly and asking in a mix of Spanish and Qʼanjobʼal if the baby can hear him. On Sundays, when Juan is not working, they sometimes attend a small Spanish‑language church service a few blocks away. María doesn’t catch everything the pastor says, but she finds comfort in the music and in quietly praying in Qʼanjobʼal. Occasionally, she meets another woman from Huehuetenango in the church courtyard, and they share news from home and tips about which clinics are more patient and kind.\n\nAs the January appointment approaches, María has gathered all her clinic papers and placed them by the door so she won’t forget. She has been trying to use the glucometer more regularly, pricking her finger even though she dislikes the sting, and writing nothing down because she cannot. Instead, she tries to remember whether the numbers seemed “high” or “low” based on the way the nurse reacted last time. Her biggest hope is that this time there will be someone who speaks Qʼanjobʼal clearly, in a way that sounds like home, so she can finally ask the questions that have been sitting heavy in her chest: What can she really eat? How will she know if the baby is in danger? And what exactly does she need to do, day by day, to bring
        this child into the world safely while still managing her responsibilities as a mother and wife in a country that often feels like it wasn’t built for her?"
