      background_context: "This is Daniel, a 34-year-old senior UX designer living in a small third-floor apartment just outside downtown White River Junction, Vermont, with his partner, Laura. They moved into the place in late 2023, trading a long commute from Lebanon, New Hampshire, for a quieter street within walking distance of the Co-op, a couple of coffee shops, and the riverside trail where Daniel likes to jog. He works mostly remote for GreenLine Software, a mid-sized company based out of Burlington that builds workflow tools for environmental nonprofits. Three days a week he’s at his standing desk in the spare bedroom, headphones on, sketching wireframes and hopping between Zoom calls with developers and product managers; once every other week he drives up to Burlington for in-person design sprints and a change of scenery.\n\nDay to day, his mild intermittent asthma and seasonal allergies are more of an annoyance than a limitation, but they’re a constant thread in how he structures his life. In the spring and early fall, he keeps the windows mostly closed, runs a small HEPA filter in the bedroom, and takes loratadine before heading out. He carries an albuterol inhaler in his backpack—more out of habit and caution than necessity, since he hasn’t had a serious flare-up in over a decade—but he still notices he gets easily winded if he pushes his jogging pace on humid days or during peak pollen. Twice a week after dinner, he and Laura take brisk walks along the river trail, which helps his breathing and gives them a chance to decompress from work. His frequent sinus congestion and tension headaches tend to show up after long stretches staring at Figma screens; he’s learned to build in short breaks, drink more water, and occasionally step out onto the fire escape for fresh air when he feels that familiar tight band forming across his forehead.\n\nOver the last year, Daniel has gotten more intentional about managing stress and anxiety. He sees a licensed clinical psychologist, Dr. Karen Liu, every other Wednesday
        evening via telehealth from his home office. Their sessions focus on cognitive-behavioral tools, reframing perfectionistic thoughts about work, and improving his sleep, which can get choppy around big product launches. He isn’t on any psychiatric medication and has never needed hospital care for mental health, but he’s found that therapy helps him keep work-related stress from bleeding into his relationship with Laura. They’ve been together for six years, and lately a recurring topic of conversation is whether to start trying for a baby in the next year or two, which mixes excitement with practical worries about finances, space in their small apartment, and how his health and energy levels will hold up with a newborn.\n\nFamily remains a regular presence in his life. His parents, Maggie and Richard, live about 40 minutes away in Randolph, Vermont. Both are retired public school teachers who now spend their time gardening and doting on their grandkids from Daniel’s younger brother, Ethan, who lives in Montpelier with his wife and two small children. Sunday afternoon video calls with Ethan’s family have become a routine, with Daniel often logging on after his weekly grocery run. He’s mindful of the family history of hypertension, high cholesterol, and type 2 diabetes—issues that emerged in his parents and grandfather later in life—so he keeps up his moderate exercise routine, watches his saturated fat intake after his last labs showed borderline LDL, and plans another full physical for early fall to stay ahead of any problems. Between work deadlines, therapy sessions, and family visits, his life feels full but manageable, anchored by small, steady habits: morning coffee at the kitchen counter with Laura, short jogs along the river, quiet evenings reading or playing indie games, and the ongoing project of keeping his health and stress in a good, stable balance."
