    _metadata:
      background_context: "This is Michael, a mid-career structural engineer who now runs Harbourview Consulting Engineers Limited from their office at Level 7, Harbourview House on Customhouse Quay in Wellington. He spends most weekdays commuting in from Lower Hutt, leaving the house on Tui Grove around 7:15 a.m. to beat the worst of the traffic and grab a flat white from a café near the waterfront before heading upstairs. As Managing Director, his days are a mix of technical reviews, staff management, and client meetings, with less hands-on design than he sometimes wishes he still had. The recent allegation over the Seaview Apartments project has added a noticeable layer of stress: he’s juggling internal technical reviews, calls with Southern Cross Insurance Brokers and AIG, and regular strategy discussions with Harper & Linton Lawyers, all while trying to keep other projects moving and staff morale steady.\n\nAt home, life is busy but generally stable. His wife Emma teaches English at a local college in Lower Hutt and often brings marking home in the evenings, so their lounge alternates between school essays and engineering reports. Their daughter Olivia is in Year 11 and has just finished NCEA Level 1 exams; she’s obsessed with photography and spends weekends taking pictures along Petone foreshore, which has been awkward lately given the Seaview Apartments issue just down the road. Their son Tom plays Saturday morning football at the local park and has recently started learning the drums, which Michael tolerates with a mix of pride and earplugs. Most weeknights, dinner is around 6:30 p.m.—simple meals, lots of pasta and stir-fries—followed by a couple of hours where Michael alternates between helping Tom with maths, checking in with Olivia about school, and quietly responding to emails on his laptop at the dining table.\n\nExtended family sits in the background of his week. His parents, Margaret and Peter, are aging but still independent in Waikanae; Michael drives up every other Sunday to mow their lawns, fix
        whatever’s broken, and take them out for a late lunch at a local café. Emma’s side of the family is mostly in Christchurch, so visits are less frequent and tend to be tied to school holidays. After a minor health scare last year—a bout of high blood pressure picked up at a routine check—Michael has been trying to walk along the Hutt River trail a few mornings a week and has cut back (slightly) on beer and takeaway lunches. Even so, the Seaview claim weighs on him: he lies awake some nights thinking through deflection calculations and site inspection notes, wondering how much of the situation is design, how much is construction, and what it will mean for the firm’s reputation.\n\nDespite the pressure, he’s determined to keep life feeling normal for his family and his staff. At the office, he makes a point of doing informal coffee catch-ups with younger engineers, including Sarah Thompson and Jack Wilson, to reassure them that the firm has a process and that one problematic project won’t define their careers. He’s coordinating a proposed joint investigation with the developer’s experts, fielding detailed technical questions from Harper & Linton, and keeping a close eye on cash flow in case the matter drags on. On weekends, he tries to switch off—taking the family to the Wellington waterfront markets, watching the Phoenix play at Sky Stadium with Tom, or catching a film with Emma at the Embassy Theatre. Still, his phone is rarely far away, and in quiet moments he’s mentally drafting possible settlement scenarios and remedial options, determined to navigate the claim without letting it derail the business or the relatively calm, grounded life he and Emma have built in the Hutt Valley."
