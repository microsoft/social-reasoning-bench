      background_context: "This is Jordan Alexander Walker, an 18-year-old high school senior living with his dad and younger sister at 1842 Maple Ridge Drive in the Upper Arlington area of Columbus, Ohio. He was born on March 18, 2007, and has grown up in Columbus his entire life. As a U.S. citizen and first-generation college student on his father’s side, he’s simultaneously excited and anxious about starting at The Ohio State University in Fall 2025 to major in Mechanical Engineering with a focus on sustainable energy systems. Right now, his daily life revolves around finishing his last semester at Upper Arlington High School, keeping his grades up in AP Physics and Calculus, and commuting between school, home, and the OSU campus for occasional outreach events and early research info sessions.\n\nJordan’s father, Michael Thomas Walker, works long, often irregular hours as a Senior Maintenance Technician for Midwest Facilities Management, Inc., specializing in commercial HVAC and building systems. Michael’s job inspired much of Jordan’s interest in energy efficiency; some weekends, Jordan rides along when his dad is on call, asking questions about how large building systems work. With his mom not in the picture since Jordan was young (she moved out of state and contact has been minimal), Jordan has taken on a big-brother-plus-parental role for his 14-year-old sister, Emily. He helps her with algebra homework, makes sure she gets to her early-morning choir rehearsals, and keeps an eye on her when their dad is working late. Their paternal grandmother, Pat, lives about 20 minutes away in Dublin and comes over most Sundays for dinner, often bringing casseroles to stock their freezer. Michael’s long-term girlfriend, Lisa, has gradually become part of their support system as well, giving Jordan practical advice about time management and stress from her perspective as a nurse at Riverside Methodist Hospital.\n\nMost weekdays, Jordan’s routine starts around 6:15 a.m. He checks the weather on his phone, makes coffee for his
        dad if he’s home, and scrambles some eggs or heats up leftover pancakes for himself and Emily. After they both head to Upper Arlington High—Jordan drives their aging silver 2010 Honda Civic—he spends his school day split between regular classes and his STEM academy block, where he’s currently finishing a capstone project on optimizing a small-scale solar array for a model residential rooftop. After school, two or three days a week, he works a part-time shift (4:00–8:00 p.m.) at a local hardware store on Northwest Boulevard, where he stocks shelves, helps customers find tools, and quietly pays attention to anything related to home energy systems. On non-work afternoons, he either studies at the Upper Arlington Public Library or heads over to OSU’s campus for occasional engineering outreach events.\n\nLately, Jordan’s thoughts are dominated by money and logistics for college. He and his dad spent the first week of November 2024 going over financial aid information at the kitchen table, with spreadsheets open on an old laptop and sticky notes marking scholarship deadlines taped to the fridge. Jordan worries about balancing work, classes, and commuting from home to OSU at least during his first year to save on housing costs. He’s proud that he’s already been accepted into OSU’s College of Engineering and has been reading up on research labs focused on sustainable energy and battery storage. At the same time, he’s anxious about leaving Emily with more responsibility and whether his dad will be okay handling the household if he’s on campus late for labs or group projects.\n\nWeekends are a mix of rest and responsibilities. Saturday mornings, Jordan often helps his dad with small maintenance tasks at home—changing furnace filters, checking for air leaks around windows, and tinkering with a DIY smart thermostat setup that Michael installed. Saturday afternoons, Jordan catches up on homework, plays a couple of online matches of Rocket League with friends, and sometimes joins Emily and her friends for a movie at Lennox
        Town Center. On Sundays, after his grandmother’s visit, he usually takes an hour to walk around the neighborhood or bike along the Scioto River, using the time to clear his head and think about the future. His main concerns right now are securing enough scholarships, staying healthy and rested through graduation, and making a smooth transition into life as a first-year engineering student at OSU without letting his family down."
