        - fact: In September 2023, a kitchen remodel project Daniel designed on West 131st Street ran significantly over budget, and the homeowners, Brian and Lisa McDermott, sent a strongly worded email titled “Concerns about Whitaker Residential Design’s cost estimates” to Daniel and copied their builder. The dispute was resolved informally in November 2023 after Daniel discounted his final invoice by 30%, but he worries that a formal complaint could still surface and hurt his reputation.
