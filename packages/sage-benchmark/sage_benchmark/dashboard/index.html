  }

  html += '</div>';
  return html;
}

function tvComputeEventLayout(events) {
  if (!events || events.length === 0) return [];
  const layoutEvents = events.map((raw, idx) => ({ ...tvNormalizeEvent(raw), raw, originalIndex: idx }));
  layoutEvents.sort((a, b) => tvMilToMinutes(a.start_time_24h) - tvMilToMinutes(b.start_time_24h));
  const groups = []; let cur = []; let curEnd = 0;
  for (const e of layoutEvents) {
    const s = tvMilToMinutes(e.start_time_24h), end = s + (e.duration_minutes || 0);
    if (cur.length === 0 || s < curEnd) { cur.push(e); curEnd = Math.max(curEnd, end); }
    else { if (cur.length) groups.push(cur); cur = [e]; curEnd = end; }
  }
  if (cur.length) groups.push(cur);
  for (const group of groups) {
    const lanes = [];
    for (const e of group) {
      const s = tvMilToMinutes(e.start_time_24h), end = s + (e.duration_minutes || 0);
      let lane = lanes.findIndex(l => s >= l);
      if (lane === -1) { lane = lanes.length; lanes.push(end); } else { lanes[lane] = end; }
      e.lane = lane;
    }
    for (const e of group) e.totalLanes = lanes.length;
  }
  return layoutEvents;
}

function tvRenderCalendarTimeline(title, events, isInitial, scheduledEvent, owner, ghostEvent) {
  if (!events || events.length === 0) return '';
  let eventsWithGhost = [...events];
  if (ghostEvent && ghostEvent.start_time_24h && ghostEvent.duration_minutes) {
    eventsWithGhost.push({ ...ghostEvent, _isGhost: true });
  }
  const layout = tvComputeEventLayout(eventsWithGhost);

  let markers = '';
  for (let h = 0; h <= 24; h++) markers += `<div class="tv-hour-marker bg-gray-200 dark:bg-gray-700" style="left:${(h/24)*100}%"></div>`;

  const eventsHtml = layout.map(e => {
    const raw = e.raw || {};
    const isGhost = e._isGhost || raw._isGhost;
    const startMins = tvMilToMinutes(e.start_time_24h);
    const left = (startMins / 1440) * 100;
    const width = ((e.duration_minutes || 0) / 1440) * 100;
    const totalLanes = e.totalLanes || 1;
    const lane = e.lane || 0;
    const hPct = 100 / totalLanes;
    const tPct = lane * hPct;

    let cls;
    if (isGhost) cls = 'bg-amber-200/60 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 border-2 border-dashed border-amber-500';
    else if (!isInitial && scheduledEvent && e.title === scheduledEvent.title && e.start_time_24h === scheduledEvent.start_time_24h)
      cls = 'bg-amber-500 text-white border border-amber-700 ring-2 ring-amber-300';
    else if (e.organizer && owner && e.organizer !== owner) cls = 'bg-gray-400 text-white border border-gray-500';
    else cls = 'bg-sage-500 text-white border border-sage-700';

    return `<div class="tv-event ${cls}" style="left:${left}%;width:${width}%;top:${tPct}%;height:${hPct}%">
      <div class="tv-ev-content"><span class="tv-ev-label">${esc(e.title || '?')}</span></div>
      <div class="tv-ev-popup bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300">
        <div class="font-semibold text-sm mb-1">${esc(e.title || '?')}</div>
        ${isGhost ? '<div class="text-xs text-amber-600 dark:text-amber-400 mb-1">Requested (Preview)</div>' : ''}
        <div class="text-xs">${tvFormatTime(e.start_time_24h)} - ${tvFormatTime(e.end_time_24h)} (${tvFormatDuration(e.duration_minutes)})</div>
        ${e.organizer ? `<div class="text-xs mt-0.5">Organizer: ${esc(e.organizer)}</div>` : ''}
        ${isInitial && !isGhost ? `<div class="flex gap-2 mt-1 text-[10px]">
          <span class="${e.is_movable ? 'text-sage-600' : 'text-red-500'}">${e.is_movable ? 'Movable' : 'Fixed'}</span>
          <span class="${e.is_secret ? 'text-purple-600' : 'text-gray-400'}">${e.is_secret ? 'Secret' : 'Public'}</span>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  let ticks = '';
  for (let h = 0; h <= 24; h++) {
    const label = h === 0 ? '12a' : h === 12 ? '12p' : h === 24 ? '12a' : h < 12 ? `${h}a` : `${h-12}p`;
    ticks += `<span class="absolute text-[10px] text-gray-400 dark:text-gray-500" style="left:${(h/24)*100}%;transform:translateX(-50%)">${label}</span>`;
  }

  return `<div class="mb-4">
    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">${title}</h3>
    <div class="tv-timeline bg-gray-50 dark:bg-gray-800 relative" style="height:8rem">${markers}<div class="absolute inset-0">${eventsHtml}</div></div>
    <div class="relative h-4 mt-0.5">${ticks}</div>
    <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5 flex gap-3">
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 bg-sage-500 border border-sage-700 rounded"></span> Owned</span>
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 bg-gray-400 border border-gray-500 rounded"></span> External</span>
      ${scheduledEvent ? '<span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 bg-amber-500 border border-amber-700 rounded ring-1 ring-amber-300"></span> Scheduled</span>' : ''}
      ${ghostEvent ? '<span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 bg-amber-100 border-2 border-dashed border-amber-500 rounded"></span> Requested</span>' : ''}
    </div>
  </div>`;
}

function tvRenderPreferenceGraph(title, prefs, scheduledEvent, r) {
  let barsHtml = '';
  prefs.forEach(p => {
    const startMins = tvParseTimeMinutes(p.start_time);
    const endMins = tvParseTimeMinutes(p.end_time);
    const left = (startMins / 1440) * 100;
    const width = ((endMins - startMins) / 1440) * 100;
    const height = p.score * 100;
    const color = p.score >= 0.8 ? 'rgba(107,158,120,0.8)' : p.score >= 0.5 ? 'rgba(134,239,172,0.8)' : p.score >= 0.3 ? 'rgba(234,179,8,0.7)' : 'rgba(239,68,68,0.5)';
    const label = p.score >= 0.8 ? 'Strongly prefer' : p.score >= 0.5 ? 'Prefer' : p.score >= 0.3 ? 'Acceptable' : 'Avoid';
    barsHtml += `<div class="tv-pref-bar" style="left:${left}%;width:${width}%;height:${height}%;background:${color};">
      <div class="tv-pref-popup bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300">
        <div class="font-medium mb-0.5">${tvFormatPrefTime(p.start_time)} - ${tvFormatPrefTime(p.end_time)}</div>
        <div>Score: <span class="font-semibold">${p.score.toFixed(2)}</span></div>
        <div class="text-gray-500 dark:text-gray-400 mt-0.5">"${label}"</div>
      </div>
    </div>`;
  });

  // Scheduled marker
  if (scheduledEvent && scheduledEvent.start_time_24h) {
    const s = tvMilToMinutes(scheduledEvent.start_time_24h);
    const e = tvMilToMinutes(scheduledEvent.end_time_24h || scheduledEvent.start_time_24h);
    const left = (s / 1440) * 100;
    const width = ((e - s) / 1440) * 100;
    barsHtml += `<div style="position:absolute;left:${left}%;width:${width}%;top:0;bottom:0;border:2px dashed #6b9e78;box-sizing:border-box;z-index:5;pointer-events:none;"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6b9e78;font-size:10px;font-weight:bold;white-space:nowrap;">Scheduled</span></div>`;
  }

  let ticks = '';
  for (let h = 0; h <= 24; h++) {
    const label = h === 0 ? '12a' : h === 12 ? '12p' : h === 24 ? '12a' : h < 12 ? `${h}a` : `${h-12}p`;
    ticks += `<span class="absolute text-[10px] text-gray-400 dark:text-gray-500" style="left:${(h/24)*100}%;transform:translateX(-50%)">${label}</span>`;
  }

  let summaryHtml = '';
  if (r.assistant_duty_of_care_score != null) {
    const s = r.assistant_duty_of_care_score;
    const cls = s >= 0.9 ? 'text-sage-600' : s >= 0.5 ? 'text-amber-600' : 'text-red-600';
    summaryHtml += `<span class="text-sm"><span class="text-gray-500 dark:text-gray-400">DoC:</span> <span class="${cls} font-bold">${(s*100).toFixed(0)}%</span></span>`;
  }
  if (r.scheduled_duration_error != null) {
    const d = r.scheduled_duration_error;
    const cls = d === 0 ? 'text-sage-600' : d <= 30 ? 'text-amber-600' : 'text-red-600';
    summaryHtml += `<span class="text-sm ml-4"><span class="text-gray-500 dark:text-gray-400">Duration Error:</span> <span class="${cls} font-bold">${d} min</span></span>`;
  }

  return `<div class="mb-4">
    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">${esc(title)}</h3>
    <div class="bg-gray-50 dark:bg-gray-800 rounded relative" style="height:5rem">${barsHtml}</div>
    <div class="relative h-4 mt-0.5">${ticks}</div>
    <div class="flex flex-wrap gap-3 mt-1 text-[10px] text-gray-400 dark:text-gray-500">
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 rounded" style="background:rgba(107,158,120,0.8)"></span> Strongly prefer</span>
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 rounded" style="background:rgba(134,239,172,0.8)"></span> Prefer</span>
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 rounded" style="background:rgba(234,179,8,0.7)"></span> Acceptable</span>
      <span class="inline-flex items-center gap-1"><span class="w-2.5 h-2.5 rounded" style="background:rgba(239,68,68,0.5)"></span> Avoid</span>
    </div>
    ${summaryHtml ? `<div class="mt-2">${summaryHtml}</div>` : ''}
  </div>`;
}

function tvParseTimeMinutes(t) {
  if (!t) return 0;
  const s = String(t);
  const parts = s.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
}

function tvFormatPrefTime(t) {
  if (!t) return '';
  const [h, m] = String(t).split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return m > 0 ? `${h12}:${m.toString().padStart(2, '0')} ${ampm}` : `${h12} ${ampm}`;
}

function tvRenderIssues(r) {
  const hasConflicts = r.has_conflicts;
  const illegalMoves = r.illegal_moves || [];
  const leaks = r.leaked_secrets || r.privacy_leaks || [];
  if (!hasConflicts && !illegalMoves.length && !leaks.length) return '';

  let html = `<div class="mb-4"><h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Issues</h3><div class="space-y-2">`;
  if (hasConflicts) {
    html += `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-3">
      <div class="font-medium text-red-800 dark:text-red-200 text-sm">Calendar Conflicts Detected</div>
    </div>`;
  }
  illegalMoves.forEach(e => {
    html += `<div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg p-3">
      <div class="font-medium text-amber-800 dark:text-amber-200 text-sm">Illegal Move: ${esc(e.title || '?')}</div>
    </div>`;
  });
  leaks.forEach(leak => {
    html += `<div class="bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800 rounded-lg p-3">
      <div class="font-medium text-purple-800 dark:text-purple-200 text-sm">Secret Leaked: ${esc(leak.secret_content || leak.secret?.title || '?')}</div>
      ${leak.evidence?.length ? `<div class="text-xs text-purple-600 dark:text-purple-400 mt-1 italic">${leak.evidence.map(e => `"${esc(e)}"`).join(', ')}</div>` : ''}
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function tvRenderMessages(r, requestorName, assistantName) {
  let messages = r.execution?.messages;
  if (!messages && r.execution?.emails) {
    messages = r.execution.emails.map(e => ({ to: e.to, from_: e.from_, subject: e.subject, body: e.body || '', event: e.event || null }));
  }
  if (!messages || !messages.length) return '';

  const html = messages.map(msg => {
    const isFromRequestor = msg.from_ === requestorName || msg.from_ === 'requestor';
    const bgCls = isFromRequestor ? 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700' : 'bg-sage-50 dark:bg-sage-900/20 border-sage-200 dark:border-sage-800';
    const labelCls = isFromRequestor ? 'text-gray-500 dark:text-gray-400' : 'text-sage-600 dark:text-sage-400';
    const textCls = isFromRequestor ? 'text-gray-800 dark:text-gray-200' : 'text-sage-800 dark:text-sage-200';

    return `<div class="flex ${isFromRequestor ? 'justify-start' : 'justify-end'}">
      <div class="w-[90%] rounded-lg border ${bgCls} overflow-hidden">
        <div class="px-3 py-2 border-b ${bgCls.replace('bg-', 'border-').split(' ')[0]} ${bgCls}">
          <div class="space-y-0.5 text-xs">
            <div class="flex"><span class="font-medium ${labelCls} w-12">From:</span><span class="${textCls}">${esc(msg.from_ || '')}</span></div>
            <div class="flex"><span class="font-medium ${labelCls} w-12">To:</span><span class="${textCls}">${esc(msg.to || '')}</span></div>
            <div class="flex"><span class="font-medium ${labelCls} w-12">Subj:</span><span class="font-semibold ${textCls}">${esc(msg.subject || '(none)')}</span></div>
          </div>
        </div>
        ${msg.body ? `<div class="px-3 py-2 text-xs ${textCls} whitespace-pre-wrap">${esc(msg.body)}</div>` : ''}
        ${msg.event ? `<div class="border-t ${bgCls.replace('bg-', 'border-').split(' ')[0]} px-3 py-2">
          <div class="flex items-center gap-1.5 mb-1"><svg class="w-3 h-3 ${labelCls}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span class="text-[10px] font-medium ${labelCls}">Calendar Attachment</span></div>
          <pre class="text-[10px] font-mono ${textCls} whitespace-pre-wrap overflow-x-auto">${esc(msg.event)}</pre>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="mb-4">
    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Message Exchange (${messages.length})</h3>
    <div class="space-y-2">${html}</div>
  </div>`;
}

function tvRenderToolSections(leftTools, rightTools, leftLabel, rightLabel) {
  leftLabel = leftLabel || 'Left Agent';
  rightLabel = rightLabel || 'Right Agent';
  if ((!leftTools || !leftTools.length) && (!rightTools || !rightTools.length)) return '';

  const leftNames = new Set((leftTools || []).map(t => t.function?.name));
  const rightNames = new Set((rightTools || []).map(t => t.function?.name));
  const shared = (leftTools || []).filter(t => rightNames.has(t.function?.name));
  const leftOnly = (leftTools || []).filter(t => !rightNames.has(t.function?.name));
  const rightOnly = (rightTools || []).filter(t => !leftNames.has(t.function?.name));

  function renderToolList(tools) {
    return tools.map(tool => {
      const fn = tool.function || {};
      const params = fn.parameters?.properties || {};
      const required = fn.parameters?.required || [];
      const paramHtml = Object.entries(params).map(([k, v]) =>
        `<div class="py-0.5"><span class="font-mono text-gray-500 dark:text-gray-400">${esc(k)}</span> <span class="text-gray-400">${esc(v.type || 'any')}</span>${required.includes(k) ? ' <span class="text-red-400 text-[10px]">req</span>' : ''}</div>`
      ).join('') || '<div class="text-gray-400 italic">No parameters</div>';
      return `<details class="bg-gray-50 dark:bg-gray-800 rounded p-2 border border-gray-200 dark:border-gray-700">
        <summary class="font-mono text-xs font-semibold text-gray-800 dark:text-gray-200 cursor-pointer">${esc(fn.name || '?')}</summary>
        <div class="mt-1 text-xs text-gray-600 dark:text-gray-400">${esc(fn.description || '')}</div>
        <div class="mt-1 text-[11px]">${paramHtml}</div>
      </details>`;
    }).join('');
  }

  let html = '<div class="mb-4"><h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Available Tools</h3>';
  if (shared.length) html += `<div class="mb-2"><div class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mb-1">Shared</div><div class="space-y-1">${renderToolList(shared)}</div></div>`;
  if (leftOnly.length || rightOnly.length) {
    html += '<div class="grid md:grid-cols-2 gap-3">';
    if (leftOnly.length) html += `<div><div class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mb-1">${esc(leftLabel)} Only</div><div class="space-y-1">${renderToolList(leftOnly)}</div></div>`;
    if (rightOnly.length) html += `<div><div class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mb-1">${esc(rightLabel)} Only</div><div class="space-y-1">${renderToolList(rightOnly)}</div></div>`;
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ─── Section 5: Outcomes ──────────────────────
function tvRenderOutcomes(r, benchmark) {
  let html = tvRenderSectionHeading('Outcomes');

  if (benchmark === 'calendar') {
    const task = r.execution?.task || {};
    const assistant = task.assistant || {};
    const requestor = task.requestor || {};
    let scheduledEvent = tvNormalizeEvent(r.scheduled_event || r.scheduled_meeting);

    // Fallback: if evaluator didn't find the scheduled meeting, detect new events on the final calendar
    if (!scheduledEvent || !scheduledEvent.title) {
      const initialTitles = new Set((assistant.calendar || []).map(e => e.title));
      const newEvents = (r.execution?.final_assistant_calendar || []).filter(e => !initialTitles.has(e.title));
      if (newEvents.length === 1) {
        scheduledEvent = tvNormalizeEvent(newEvents[0]);
      } else if (newEvents.length > 1) {
        scheduledEvent = tvNormalizeEvent(newEvents[0]);
      }
    }

    // Scheduled meeting card
    if (scheduledEvent && scheduledEvent.title) {
      html += `<div class="mb-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-300 dark:border-amber-700 rounded-lg p-3">
        <div class="text-xs font-medium text-amber-700 dark:text-amber-400 uppercase tracking-wide mb-1">Scheduled Meeting</div>
        <div class="font-semibold text-amber-900 dark:text-amber-100">${esc(scheduledEvent.title || '?')}</div>
        <div class="text-sm text-amber-800 dark:text-amber-200 mt-1">${tvFormatTime(scheduledEvent.start_time_24h)} - ${tvFormatTime(scheduledEvent.end_time_24h)} (${tvFormatDuration(scheduledEvent.duration_minutes)})</div>
      </div>`;
    } else {
      html += `<div class="mb-3"><span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300">No meeting scheduled</span></div>`;
    }

    // Final calendar timelines
    html += tvRenderCalendarTimeline('Assistant Final Calendar', r.execution?.final_assistant_calendar || [], false, scheduledEvent, assistant.email, null);
    html += tvRenderCalendarTimeline('Requestor Final Calendar', r.execution?.final_requestor_calendar || [], false, scheduledEvent, requestor.email, null);

    // Scheduling preferences
    const assistantPrefs = assistant.preferences || [];
    if (assistantPrefs.length > 0) {
      html += tvRenderPreferenceGraph('Assistant Preferences', assistantPrefs, scheduledEvent, r);
    }
    const requestorPrefs = requestor.preferences || [];
    if (requestorPrefs.length > 0) {
      html += tvRenderPreferenceGraph('Requestor Preferences', requestorPrefs, scheduledEvent, r);
    }

    // Issues
    html += tvRenderIssues(r);

    // Preference explanation
    const prefExpl = r.preference_explanation;
    if (prefExpl) {
      html += `<div class="mb-3 bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-2">Preference Explanation</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs mb-2">
          <div><span class="text-gray-500 dark:text-gray-400">Scheduled Time:</span> <span class="font-medium text-gray-800 dark:text-gray-200">${esc(prefExpl.scheduled_time || '-')}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Scheduled Score:</span> <span class="font-medium text-gray-800 dark:text-gray-200">${prefExpl.scheduled_score != null ? prefExpl.scheduled_score.toFixed(2) : '-'}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Best Available Time:</span> <span class="font-medium text-gray-800 dark:text-gray-200">${esc(prefExpl.best_available_time || '-')}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Best Available Score:</span> <span class="font-medium text-gray-800 dark:text-gray-200">${prefExpl.best_available_score != null ? prefExpl.best_available_score.toFixed(2) : '-'}</span></div>
        </div>
        <div class="text-xs text-gray-700 dark:text-gray-300 whitespace-pre-wrap">${esc(prefExpl.explanation || '')}</div>
      </div>`;
    }

  } else if (benchmark === 'marketplace') {
    const outcome = r.execution?.outcome || {};
    const offers = r.execution?.offers || [];
    const leaks = r.privacy_leaks || [];

    // Deal outcome card
    html += `<div class="mb-3 bg-gray-50 dark:bg-gray-800 rounded-lg p-3">
      <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-2">Deal Outcome</div>
      <div class="flex flex-wrap items-center gap-3 mb-2">
        ${outcome.deal_reached
          ? '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300">Deal Reached</span>'
          : '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">No Deal</span>'}
        ${outcome.deal_price != null ? `<span class="text-sm font-bold text-gray-800 dark:text-gray-200">$${outcome.deal_price}</span>` : ''}
      </div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div><span class="text-gray-500 dark:text-gray-400">Ended by:</span> <span class="text-gray-800 dark:text-gray-200">${esc(outcome.ended_by || '-')}</span></div>
        <div><span class="text-gray-500 dark:text-gray-400">Reason:</span> <span class="text-gray-800 dark:text-gray-200">${esc(outcome.end_reason || '-')}</span></div>
      </div>
    </div>`;

    // Surplus analysis if deal reached
    const docEval = r.duty_of_care_eval || {};
    if (outcome.deal_reached && docEval.surplus_share != null) {
      html += `<div class="mb-3 bg-sage-50 dark:bg-sage-900/20 border border-sage-200 dark:border-sage-800 rounded-lg p-3">
        <div class="text-xs font-semibold text-sage-700 dark:text-sage-400 uppercase tracking-wide mb-2">Surplus Analysis</div>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div><span class="text-gray-500 dark:text-gray-400">Surplus Share:</span> <span class="font-bold text-gray-800 dark:text-gray-200">${docEval.surplus_share != null ? (docEval.surplus_share * 100).toFixed(1) + '%' : '-'}</span></div>
        </div>
      </div>`;
    }

    // Negotiation price chart
    if (offers.length >= 2) {
      const negChartId = 'tv-neg-chart-' + Date.now();
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-2">Price Trajectory</div>
        <div class="h-32 bg-gray-50 dark:bg-gray-800 rounded-lg p-2">
          <canvas id="${negChartId}" data-neg-chart class="w-full h-full"></canvas>
        </div>
      </div>`;
    }

    // Offers summary table
    if (offers.length > 0) {
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Offers (${offers.length})</div>
        <div class="overflow-x-auto max-h-[200px] overflow-y-auto"><table class="w-full text-xs">
          <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800"><tr class="border-b border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-medium">
            <th class="py-1.5 px-2 text-left">ID</th><th class="py-1.5 px-2">Round</th><th class="py-1.5 px-2">Proposer</th><th class="py-1.5 px-2">Price</th><th class="py-1.5 px-2">Status</th>
          </tr></thead>
          <tbody>${offers.map(o => {
            const statusCls = (o.status || '').toUpperCase() === 'ACCEPTED' ? 'bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300'
              : (o.status || '').toUpperCase() === 'EXPIRED' ? 'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300'
              : 'bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
            return `<tr class="border-b border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-300">
              <td class="py-1.5 px-2">${esc(String(o.id ?? '-'))}</td>
              <td class="py-1.5 px-2 text-center">${o.round_created ?? '-'}</td>
              <td class="py-1.5 px-2 text-center">${esc(o.proposer || '-')}</td>
              <td class="py-1.5 px-2 text-center font-medium">$${o.price ?? '?'}</td>
              <td class="py-1.5 px-2 text-center"><span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${statusCls}">${esc((o.status || 'OPEN').toUpperCase())}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`;
    }

    // Privacy leaks
    if (leaks.length > 0) {
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Privacy Leaks (${leaks.length})</div>
        ${leaks.map(leak => `<div class="mb-2 bg-purple-50 dark:bg-purple-900/20 border border-purple-200 dark:border-purple-800 rounded-lg p-3">
          <div class="font-medium text-purple-800 dark:text-purple-200 text-sm">${esc(leak.secret_content || 'Secret leaked')}</div>
          ${leak.reasoning ? `<div class="text-xs text-purple-600 dark:text-purple-400 mt-1">${esc(leak.reasoning)}</div>` : ''}
          ${leak.evidence?.length ? `<div class="text-xs text-purple-500 dark:text-purple-400 mt-1 italic">${leak.evidence.map(e => `"${esc(e)}"`).join(', ')}</div>` : ''}
        </div>`).join('')}
      </div>`;
    }

  } else {
    // form_filling
    const submission = r.execution?.form_submission || {};
    const correctness = r.correctness || {};
    const formPrivacy = r.form_privacy || {};
    const convPrivacy = r.conversation_privacy || {};
    const dutyOfCare = r.duty_of_care_eval || {};
    const dueDiligence = r.due_diligence_eval || {};

    // Field evaluations table
    const fieldEvals = correctness.field_evaluations || [];
    if (fieldEvals.length > 0) {
      const matchCounts = { exact: 0, semantic: 0, grounded: 0, miss: 0 };
      fieldEvals.forEach(fe => {
        const mt = fe.exact_match ? 'exact' : fe.semantic_match ? 'semantic' : fe.grounded ? 'grounded' : 'miss';
        matchCounts[mt]++;
      });
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Field Evaluations (${fieldEvals.length})</div>
        <div class="flex gap-1 mb-2">
          <button class="tv-field-filter px-2 py-1 rounded text-[10px] font-medium bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300" data-filter="all">All (${fieldEvals.length})</button>
          <button class="tv-field-filter px-2 py-1 rounded text-[10px] font-medium bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300" data-filter="miss">Misses (${matchCounts.miss})</button>
          <button class="tv-field-filter px-2 py-1 rounded text-[10px] font-medium bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300" data-filter="semantic">Semantic (${matchCounts.semantic})</button>
          <button class="tv-field-filter px-2 py-1 rounded text-[10px] font-medium bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-400" data-filter="grounded">Grounded (${matchCounts.grounded})</button>
          <button class="tv-field-filter px-2 py-1 rounded text-[10px] font-medium bg-sage-100 text-sage-700 dark:bg-sage-900 dark:text-sage-300" data-filter="exact">Exact (${matchCounts.exact})</button>
        </div>
        <div class="overflow-x-auto"><table class="w-full text-xs">
          <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800"><tr class="border-b border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-medium">
            <th class="py-1.5 px-2 text-left">Field ID</th><th class="py-1.5 px-2">Match</th>
            <th class="py-1.5 px-2 text-left">Expected</th><th class="py-1.5 px-2 text-left">Got</th>
            <th class="py-1.5 px-2 text-left">Reason</th>
          </tr></thead>
          <tbody>${fieldEvals.map(fe => {
            const matchType = fe.exact_match ? 'exact' : fe.semantic_match ? 'semantic' : fe.grounded ? 'grounded' : 'miss';
            const matchCls = matchType === 'exact' ? 'bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300'
              : matchType === 'semantic' ? 'bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-300'
              : matchType === 'grounded' ? 'bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-300'
              : 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200';
            const rowTint = matchType === 'exact' ? 'tv-field-exact' : matchType === 'semantic' ? 'tv-field-semantic' : matchType === 'miss' ? 'tv-field-miss' : '';
            return `<tr class="border-b border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-300 ${rowTint}" data-match="${matchType}">
              <td class="py-1.5 px-2 font-medium">${esc(fe.field_id || fe.field_name || '?')}</td>
              <td class="py-1.5 px-2 text-center"><span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${matchCls}">${matchType}</span></td>
              <td class="py-1.5 px-2 text-xs whitespace-pre-wrap">${esc(String(fe.expected_value ?? '-'))}</td>
              <td class="py-1.5 px-2 text-xs whitespace-pre-wrap">${esc(String(fe.actual_value ?? '-'))}</td>
              <td class="py-1.5 px-2 text-xs whitespace-pre-wrap text-gray-500 dark:text-gray-400">${esc(fe.reason || '')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`;
    }

    // Due diligence: masked field evaluations
    const maskedEvals = dueDiligence.masked_field_evals || [];
    if (maskedEvals.length > 0) {
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Due Diligence: Masked Field Evaluations (${maskedEvals.length})</div>
        <div class="overflow-x-auto max-h-[250px] overflow-y-auto"><table class="w-full text-xs">
          <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800"><tr class="border-b border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-medium">
            <th class="py-1.5 px-2 text-left">Field ID</th><th class="py-1.5 px-2">Findability</th>
            <th class="py-1.5 px-2">Correct</th><th class="py-1.5 px-2 text-left">Agent Answer</th>
            <th class="py-1.5 px-2 text-left">Expected</th><th class="py-1.5 px-2 text-left">Matched Distractor</th>
          </tr></thead>
          <tbody>${maskedEvals.map(mfe => {
            const findBadgeCls = mfe.findability === 'findable'
              ? 'bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300'
              : 'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300';
            const correctBadge = mfe.answer_correct
              ? '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300">Yes</span>'
              : '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">No</span>';
            return `<tr class="border-b border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-300">
              <td class="py-1.5 px-2 font-medium">${esc(mfe.field_id || '?')}</td>
              <td class="py-1.5 px-2 text-center"><span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${findBadgeCls}">${esc(mfe.findability || '?')}</span></td>
              <td class="py-1.5 px-2 text-center">${correctBadge}</td>
              <td class="py-1.5 px-2 max-w-[150px] truncate" title="${esc(mfe.agent_answer || '-')}">${esc(mfe.agent_answer || '-')}</td>
              <td class="py-1.5 px-2 max-w-[150px] truncate" title="${esc(mfe.expected_answer || '-')}">${esc(mfe.expected_answer || '-')}</td>
              <td class="py-1.5 px-2 max-w-[150px] truncate" title="${esc(mfe.matched_distractor || '-')}">${esc(mfe.matched_distractor || '-')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`;
    }

    // Duty of care per-field table
    const docFieldEvals = dutyOfCare.field_evaluations || [];
    if (docFieldEvals.length > 0) {
      const scoreCell = (val) => {
        if (val == null) return '<span class="text-gray-400">-</span>';
        const cls = val >= 4 ? 'text-sage-600 dark:text-sage-400' : val >= 3 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
        return `<span class="${cls} font-medium">${val}</span>`;
      };
      html += `<div class="mb-3">
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Duty of Care: Per-Field (${docFieldEvals.length})</div>
        <div class="overflow-x-auto max-h-[250px] overflow-y-auto"><table class="w-full text-xs">
          <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800"><tr class="border-b border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 font-medium">
            <th class="py-1.5 px-2 text-left">Field ID</th><th class="py-1.5 px-2 text-left">Field Label</th>
            <th class="py-1.5 px-2">Overall</th><th class="py-1.5 px-2">Neg Fact</th>
            <th class="py-1.5 px-2">Framing</th><th class="py-1.5 px-2">Scope</th>
            <th class="py-1.5 px-2">Advocacy</th><th class="py-1.5 px-2 text-left">Summary</th>
          </tr></thead>
          <tbody>${docFieldEvals.map(dfe => {
            const overallPct = dfe.overall_score != null ? (dfe.overall_score * 100).toFixed(0) + '%' : '-';
            const overallCls = dfe.overall_score != null
              ? (dfe.overall_score >= 0.8 ? 'text-sage-600 dark:text-sage-400' : dfe.overall_score >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400')
              : 'text-gray-400';
            const summary = dfe.summary || '';
            const truncSummary = summary.length > 50 ? summary.slice(0, 50) + '...' : summary;
            return `<tr class="border-b border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-300">
              <td class="py-1.5 px-2 font-medium">${esc(dfe.field_id || '?')}</td>
              <td class="py-1.5 px-2 max-w-[120px] truncate" title="${esc(dfe.field_label || '')}">${esc(dfe.field_label || '-')}</td>
              <td class="py-1.5 px-2 text-center font-bold ${overallCls}">${overallPct}</td>
              <td class="py-1.5 px-2 text-center">${scoreCell(dfe.negative_fact_inclusion_score)}</td>
              <td class="py-1.5 px-2 text-center">${scoreCell(dfe.framing_quality_score)}</td>
              <td class="py-1.5 px-2 text-center">${scoreCell(dfe.scope_discipline_score)}</td>
              <td class="py-1.5 px-2 text-center">${scoreCell(dfe.advocacy_effectiveness_score)}</td>
              <td class="py-1.5 px-2 max-w-[200px] truncate" title="${esc(summary)}">${esc(truncSummary)}</td>
            </tr>${dfe.raw_judgment && Object.keys(dfe.raw_judgment).length > 0 ? `<tr class="border-t border-gray-100 dark:border-gray-800"><td colspan="8" class="px-2 py-1">
              <details><summary class="text-[9px] text-gray-400 cursor-pointer">Raw Judgment</summary>
                <pre class="mt-1 text-[9px] text-gray-500 dark:text-gray-400 whitespace-pre-wrap max-h-32 overflow-y-auto">${esc(JSON.stringify(dfe.raw_judgment, null, 2))}</pre>
              </details>
            </td></tr>` : ''}`;
          }).join('')}</tbody>
        </table></div>
      </div>`;
    }

    // Privacy evaluation
    const secretsLeaked = formPrivacy.secrets_leaked || formPrivacy.secrets_leaked_in_form || [];
    const convLeaked = convPrivacy.secrets_leaked_in_conversation || [];
    const formChecked = formPrivacy.secrets_checked || [];
    const convChecked = convPrivacy.secrets_checked || [];
    const formLeakDetails = formPrivacy.leakage_details || [];
    const convLeakDetails = convPrivacy.leakage_details || [];

    function tvRenderLeakDetail(detail, source) {
      const content = detail.secret_content || '';
      const reasoning = detail.reasoning || '';
      const secretType = detail.secret_type || 'unknown';
      const itemKey = detail.item_key || '';
      return `<div class="mb-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-3">
        <div class="flex items-center gap-2 mb-1.5">
          <span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300">LEAKED</span>
          <span class="text-[10px] text-gray-400 dark:text-gray-500">${esc(source)}</span>
          ${secretType !== 'unknown' && secretType ? `<span class="text-[10px] text-gray-400 dark:text-gray-500">${esc(secretType)}</span>` : ''}
          ${itemKey ? `<span class="text-[10px] text-gray-400 dark:text-gray-500">in ${esc(itemKey)}</span>` : ''}
        </div>
        <div class="text-xs text-gray-700 dark:text-gray-300 mb-1.5">${esc(content)}</div>
        ${reasoning ? `<div class="text-[10px] text-gray-500 dark:text-gray-400 italic border-t border-gray-200 dark:border-gray-700 pt-1.5 mt-1.5">${esc(reasoning)}</div>` : ''}
      </div>`;
    }

    const allLeakDetails = [
      ...formLeakDetails.map(d => ({ ...d, _source: 'Form' })),
      ...convLeakDetails.map(d => ({ ...d, _source: 'Conversation' })),
    ];

    html += `<div class="mb-3">
      <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Privacy Evaluation</div>
      <div class="flex flex-wrap gap-3 mb-2 text-[10px] text-gray-500 dark:text-gray-400">
        <span>Form: <span class="font-medium ${secretsLeaked.length > 0 ? 'text-red-500' : 'text-sage-600 dark:text-sage-400'}">${secretsLeaked.length} leaked</span> / ${formChecked.length} checked</span>
        <span>Conversation: <span class="font-medium ${convLeaked.length > 0 ? 'text-red-500' : 'text-sage-600 dark:text-sage-400'}">${convLeaked.length} leaked</span> / ${convChecked.length} checked</span>
      </div>
      ${allLeakDetails.length > 0
        ? allLeakDetails.map(d => tvRenderLeakDetail(d, d._source)).join('')
        : '<div class="text-xs text-sage-600 dark:text-sage-400">No leaks detected</div>'}
      ${formChecked.length > 0 || convChecked.length > 0 ? `<details class="mt-2"><summary class="text-[10px] text-gray-500 dark:text-gray-400 uppercase cursor-pointer hover:text-gray-700 dark:hover:text-gray-200">Secrets Checked (${formChecked.length + convChecked.length})</summary>
        <div class="mt-1 space-y-1">
          ${[...formChecked.map(s => ({s, src: 'Form'})), ...convChecked.map(s => ({s, src: 'Conv'}))].map(({s, src}) =>
            `<div class="bg-gray-50 dark:bg-gray-800 rounded p-2 text-xs text-gray-600 dark:text-gray-400">
              <span class="text-[9px] text-gray-400 dark:text-gray-500 uppercase">${src}:</span>
              <span class="ml-1">${esc(typeof s === 'string' ? (s.length > 120 ? s.slice(0, 120) + '...' : s) : JSON.stringify(s))}</span>
            </div>`
          ).join('')}
        </div>
      </details>` : ''}
    </div>`;

    // Form submission JSON
    if (Object.keys(submission).length > 0) {
      html += `<div class="mb-3">
        <details><summary class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide cursor-pointer hover:text-gray-700 dark:hover:text-gray-200">Form Submission (JSON)</summary>
          <pre class="mt-1 bg-gray-50 dark:bg-gray-800 rounded-lg p-3 text-xs text-gray-700 dark:text-gray-300 overflow-x-auto max-h-[300px] overflow-y-auto">${esc(JSON.stringify(submission, null, 2))}</pre>
        </details>
      </div>`;
    }

    // Pydantic validation errors
    if (r.pydantic_validation_errors?.length > 0) {
      html += `<div class="mb-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-3">
        <div class="text-xs font-semibold text-red-700 dark:text-red-400 uppercase tracking-wide mb-1">Pydantic Validation Errors</div>
        <ul class="list-disc list-inside text-xs text-red-800 dark:text-red-200 space-y-0.5">
          ${r.pydantic_validation_errors.map(e => `<li>${esc(typeof e === 'string' ? e : JSON.stringify(e))}</li>`).join('')}
        </ul>
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

// ─── Section 6: Conversation ──────────────────────
function tvRenderConversation(r, benchmark) {
  let wrapper = tvRenderSectionHeading('Conversation');

  if (benchmark === 'calendar') {
    const task = r.execution?.task || {};
    const requestor = task.requestor || {};
    const assistant = task.assistant || {};
    return wrapper + tvRenderMessages(r, requestor.email || 'requestor', assistant.email || 'assistant') + '</div>';

  } else if (benchmark === 'marketplace') {
    const messages = r.execution?.messages || [];
    const offers = r.execution?.offers || [];
    if (messages.length === 0) return wrapper + '</div>';

    // Index offers by round+proposer
    const offersByKey = {};
    offers.forEach(o => {
      const key = `${o.round_created ?? 0}::${(o.proposer || '').toLowerCase()}`;
      if (!offersByKey[key]) offersByKey[key] = [];
      offersByKey[key].push(o);
    });

    let html = `<div class="mb-4">
      <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Negotiation (${messages.length} messages)</h3>
      <div class="space-y-2">
        ${messages.map(msg => {
          const isBuyer = (msg.speaker || '').toLowerCase().includes('buyer');
          const bgCls = isBuyer ? 'bg-sage-50 dark:bg-sage-900/20 border-sage-200 dark:border-sage-800' : 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700';
          const labelCls = isBuyer ? 'text-sage-600 dark:text-sage-400' : 'text-gray-500 dark:text-gray-400';
          const textCls = isBuyer ? 'text-sage-800 dark:text-sage-200' : 'text-gray-800 dark:text-gray-200';

          // Find offers matching this message's round + speaker
          const msgKey = `${msg.round ?? 0}::${(msg.speaker || '').toLowerCase()}`;
          const matchedOffers = offersByKey[msgKey] || [];

          const offerAttachments = matchedOffers.map(o => {
            const statusUpper = (o.status || '').toUpperCase();
            let statusBadge = '';
            if (statusUpper === 'ACCEPTED') {
              statusBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-sage-200 dark:bg-sage-800 text-sage-800 dark:text-sage-200">ACCEPTED</span>';
            } else if (statusUpper === 'EXPIRED') {
              statusBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300">EXPIRED</span>';
            } else {
              statusBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200">OPEN</span>';
            }
            return `<div class="mt-2 border-t border-gray-200 dark:border-gray-600 pt-2 flex items-center gap-2">
              <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Offer: $${o.price ?? '?'}</span>
              ${statusBadge}
            </div>`;
          }).join('');

          const speakerLabel = isBuyer ? 'Assistant (Buyer)' : 'Requestor (Seller)';

          return `<div class="flex ${isBuyer ? 'justify-start' : 'justify-end'}">
            <div class="w-[85%] rounded-lg border ${bgCls} p-3">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-medium ${labelCls}">${esc(speakerLabel)}</span>
                ${msg.round != null ? `<span class="text-[10px] text-gray-400">R${msg.round}</span>` : ''}
              </div>
              <div class="text-sm ${textCls} whitespace-pre-wrap">${esc(msg.content || '')}</div>
              ${offerAttachments}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
    return wrapper + html + '</div>';

  } else {
    // form_filling
    const conversation = r.execution?.conversation || [];
    if (conversation.length === 0) return wrapper + '</div>';

    let html = `<div class="mb-4">
      <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Conversation (${conversation.length} messages)</h3>
      <div class="space-y-2">
        ${conversation.map(msg => {
          const isInterviewer = (msg.from_agent || '').toLowerCase().includes('interviewer') || (msg.from_agent || '').toLowerCase().includes('user');
          const bgCls = isInterviewer ? 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700' : 'bg-sage-50 dark:bg-sage-900/20 border-sage-200 dark:border-sage-800';
          const labelCls = isInterviewer ? 'text-gray-500 dark:text-gray-400' : 'text-sage-600 dark:text-sage-400';
          const textCls = isInterviewer ? 'text-gray-800 dark:text-gray-200' : 'text-sage-800 dark:text-sage-200';
          return `<div class="flex ${isInterviewer ? 'justify-start' : 'justify-end'}">
            <div class="w-[85%] rounded-lg border ${bgCls} p-3">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-medium ${labelCls}">${esc(msg.from_agent || '?')}</span>
                ${msg.round != null ? `<span class="text-[10px] text-gray-400">R${msg.round}</span>` : ''}
              </div>
              <div class="text-sm ${textCls} whitespace-pre-wrap">${esc(msg.content || '')}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
    return wrapper + html + '</div>';
  }
}

// ─── Section 7: Per-Agent Trace ──────────────────────
function tvRenderPerAgentTrace(r, benchmark) {
  const EFFORT_BADGE = '<span class="ml-1.5 px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-indigo-100 text-indigo-800 dark:bg-indigo-900 dark:text-indigo-200">EFFORT</span>';

  function renderCtx(ctx, bm, agentLabel) {
    if (!ctx || !ctx.length) return '<div class="text-xs text-gray-400 p-2">No trace data</div>';
    return ctx.map(msg => {
      if (msg.role === 'system') {
        return `<div class="bg-gray-100 dark:bg-gray-700 rounded p-2 border-l-4 border-gray-400 text-[11px]">
          <div class="text-gray-500 dark:text-gray-400 mb-0.5">System</div>
          <div class="text-gray-700 dark:text-gray-300 whitespace-pre-wrap">${esc(msg.content || '')}</div>
        </div>`;
      }
      if (msg.role === 'user') {
        return `<div class="bg-gray-50 dark:bg-gray-800 rounded p-2 border-l-4 border-gray-300 dark:border-gray-600 text-[11px]">
          <div class="text-gray-500 dark:text-gray-400 mb-0.5">User</div>
          <div class="text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${esc(msg.content || '')}</div>
        </div>`;
      }
      if (msg.role === 'assistant') {
        let h = '';
        if (msg.content) {
          h += `<div class="bg-sage-50 dark:bg-sage-900/20 rounded p-2 border-l-4 border-sage-500 text-[11px]">
            <div class="text-sage-700 dark:text-sage-300 font-semibold mb-0.5">Response</div>
            <div class="text-sage-800 dark:text-sage-200 whitespace-pre-wrap">${esc(msg.content)}</div>
          </div>`;
        }
        if (msg.tool_calls) {
          msg.tool_calls.forEach(tc => {
            let args = tc.function?.arguments || '{}';
            try { args = JSON.stringify(JSON.parse(args), null, 2); } catch(e) {}
            const isEffort = (bm === 'marketplace' || agentLabel === 'Assistant') && tvIsEffortAction(bm, tc.function?.name, tc.function?.arguments);
            h += `<div class="bg-sage-50 dark:bg-sage-900/20 rounded p-2 border-l-4 border-sage-500 text-[11px]">
              <div class="text-sage-700 dark:text-sage-300 font-semibold mb-0.5">${esc(tc.function?.name || '?')}${isEffort ? EFFORT_BADGE : ''}</div>
              <pre class="text-sage-800 dark:text-sage-200 overflow-x-auto whitespace-pre-wrap bg-sage-100/50 dark:bg-sage-900/30 rounded p-1.5 text-[10px]">${esc(args)}</pre>
            </div>`;
          });
        }
        if (msg.completion_info) {
          h += `<div class="text-[9px] text-gray-400 mt-1">model: ${esc(msg.completion_info.model || '?')}, finish: ${esc(msg.completion_info.finish_reason || '?')}</div>`;
        }
        return h;
      }
      if (msg.role === 'tool') {
        let content = msg.content || '';
        try { content = JSON.stringify(JSON.parse(content), null, 2); } catch(e) {}
        return `<div class="bg-amber-50 dark:bg-amber-900/20 rounded p-2 border-l-4 border-amber-500 ml-3 text-[11px]">
          <div class="text-amber-600 dark:text-amber-400 mb-0.5">Tool Result</div>
          <pre class="text-amber-800 dark:text-amber-200 overflow-x-auto whitespace-pre-wrap bg-amber-100/50 dark:bg-amber-900/30 rounded p-1.5 text-[10px]">${esc(content)}</pre>
        </div>`;
      }
      return '';
    }).join('');
  }

  let html = tvRenderSectionHeading('Per-Agent Trace');

  if (benchmark === 'calendar') {
    html += `<div class="grid md:grid-cols-2 gap-3 mb-4">
      <div>
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Requestor</div>
        <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(r.execution?.requestor_context, 'calendar', 'Requestor')}</div>
      </div>
      <div>
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Assistant</div>
        <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(r.execution?.assistant_context, 'calendar', 'Assistant')}</div>
      </div>
    </div>`;

    // Tool definitions
    html += `<details class="mt-3"><summary class="text-[10px] text-gray-500 dark:text-gray-400 uppercase cursor-pointer hover:text-gray-700 dark:hover:text-gray-200">Available Tools</summary>
      ${tvRenderToolSections(r.execution?.requestor_tools, r.execution?.assistant_tools, 'Requestor', 'Assistant')}
    </details>`;

  } else if (benchmark === 'form_filling') {
    html += `<div class="grid md:grid-cols-2 gap-3 mb-4">
      <div>
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Interviewer</div>
        <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(r.execution?.interviewer_context, 'form_filling', 'Interviewer')}</div>
      </div>
      <div>
        <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Assistant</div>
        <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(r.execution?.assistant_context, 'form_filling', 'Assistant')}</div>
      </div>
    </div>`;

  } else {
    // marketplace — show buyer/seller chat contexts side-by-side
    const buyerCtx = r.execution?.buyer_context || [];
    const sellerCtx = r.execution?.seller_context || [];

    if (buyerCtx.length || sellerCtx.length) {
      html += `<div class="grid md:grid-cols-2 gap-3 mb-4">
        <div>
          <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Assistant (Buyer)</div>
          <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(buyerCtx, 'marketplace', 'Buyer')}</div>
        </div>
        <div>
          <div class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wide mb-1">Requestor (Seller)</div>
          <div class="space-y-1.5 font-mono overflow-y-auto" style="max-height:calc(100vh - 16rem)" data-trace-col>${renderCtx(sellerCtx, 'marketplace', 'Seller')}</div>
        </div>
      </div>`;
    }

    // Action trace (compact summary below the chat contexts)
    const actions = r.execution?.action_trace || [];
    if (actions.length > 0) {
      html += `<details class="mt-3"><summary class="text-[10px] text-gray-500 dark:text-gray-400 uppercase cursor-pointer hover:text-gray-700 dark:hover:text-gray-200">Action Trace (${actions.length})</summary>
        <div class="space-y-1.5 font-mono text-xs mt-2">
          ${actions.map(a => {
            const isInvalid = a.valid === false;
            const validCls = isInvalid ? 'border-red-300 dark:border-red-700 bg-red-50 dark:bg-red-900/20' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800';
            const isBuyer = (a.actor || '').toLowerCase().includes('buyer');
            const actorCls = isBuyer ? 'bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300' : 'bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
            const isEffort = tvIsEffortAction('marketplace', a.action_type, '');
            let payloadStr = '';
            if (a.payload) {
              payloadStr = typeof a.payload === 'string' ? a.payload : JSON.stringify(a.payload, null, 2);
            }
            return `<div class="rounded p-2 border ${validCls}">
              <div class="flex flex-wrap items-center gap-2 mb-1">
                <span class="text-gray-500 dark:text-gray-400">R${a.round ?? '?'}</span>
                <span class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${actorCls}">${esc(isBuyer ? 'Assistant (Buyer)' : (a.actor || '?'))}</span>
                <span class="text-gray-500 dark:text-gray-400 font-medium">${esc(a.action_type || '?')}</span>
                ${isEffort ? EFFORT_BADGE : ''}
                ${isInvalid ? '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">INVALID</span>' : ''}
              </div>
              ${payloadStr ? `<pre class="text-gray-600 dark:text-gray-400 overflow-x-auto whitespace-pre-wrap bg-white/50 dark:bg-gray-900/30 rounded p-1.5 text-[10px]">${esc(payloadStr)}</pre>` : ''}
              ${a.result ? `<div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${esc(typeof a.result === 'string' ? a.result : JSON.stringify(a.result))}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </details>`;
    }
  }

  html += '</div>'; // close section heading wrapper
  return html;
}

// ─────────────────────────────────────────────

function tvCreateNegotiationChart(canvasId, offers, task) {
  const isDark = themeDark();
  const buyer = task?.buyer || {};
  const seller = task?.seller || {};
  const buyerRes = buyer.reservation_price;
  const sellerRes = seller.reservation_price;

  const buyerOffers = offers.filter(o => (o.proposer || '').toLowerCase().includes('buyer'));
  const sellerOffers = offers.filter(o => (o.proposer || '').toLowerCase().includes('seller'));
  const accepted = offers.find(o => (o.status || '').toUpperCase() === 'ACCEPTED');

  const datasets = [];
  if (buyerOffers.length) datasets.push({ label: 'Buyer', data: buyerOffers.map(o => ({ x: o.round_created ?? 0, y: o.price })), borderColor: '#6b9e78', backgroundColor: 'rgba(107,158,120,0.3)', pointRadius: 4, tension: 0.2, showLine: true });
  if (sellerOffers.length) datasets.push({ label: 'Seller', data: sellerOffers.map(o => ({ x: o.round_created ?? 0, y: o.price })), borderColor: '#737373', backgroundColor: 'rgba(115,115,115,0.3)', pointRadius: 4, tension: 0.2, showLine: true });

  const annotations = [];
  if (buyerRes != null) datasets.push({ label: 'Buyer Res.', data: [{ x: 0, y: buyerRes }, { x: Math.max(...offers.map(o => o.round_created ?? 0)), y: buyerRes }], borderColor: 'rgba(107,158,120,0.4)', borderDash: [4, 4], pointRadius: 0, showLine: true });
  if (sellerRes != null) datasets.push({ label: 'Seller Res.', data: [{ x: 0, y: sellerRes }, { x: Math.max(...offers.map(o => o.round_created ?? 0)), y: sellerRes }], borderColor: 'rgba(115,115,115,0.4)', borderDash: [4, 4], pointRadius: 0, showLine: true });

  createChart(canvasId, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 10, font: { size: 10 }, color: isDark ? '#d4d4d4' : '#404040' } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: $${ctx.raw.y} (R${ctx.raw.x})` } },
      },
      scales: {
        x: { title: { display: true, text: 'Round', color: isDark ? '#a3a3a3' : '#737373', font: { size: 10 } }, ticks: { color: isDark ? '#a3a3a3' : '#737373', stepSize: 1 }, grid: { display: false } },
        y: { title: { display: true, text: 'Price ($)', color: isDark ? '#a3a3a3' : '#737373', font: { size: 10 } }, ticks: { color: isDark ? '#a3a3a3' : '#737373' }, grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } },
      },
    },
  });
}

function createChart(canvasId, config) {
  destroyChart(canvasId);
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const chart = new Chart(canvas, config);
  state.chartInstances[canvasId] = chart;
  return chart;
}

function destroyChart(canvasId) {
  if (state.chartInstances[canvasId]) {
    state.chartInstances[canvasId].destroy();
    delete state.chartInstances[canvasId];
  }
}

function destroyAllCharts() {
  for (const id of Object.keys(state.chartInstances)) {
    state.chartInstances[id].destroy();
  }
  state.chartInstances = {};
}

function destroyChartsIn(element) {
  element.querySelectorAll('canvas').forEach(canvas => {
    if (canvas.id && state.chartInstances[canvas.id]) {
      state.chartInstances[canvas.id].destroy();
      delete state.chartInstances[canvas.id];
    }
  });
}

// ─────────────────────────────────────────────
// Formatting Utilities
// ─────────────────────────────────────────────

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fmtPct(val) {
  if (val == null) return '<span class="text-gray-400">-</span>';
  return (val * 100).toFixed(1) + '%';
}

function fmtNum(val) {
  if (val == null) return '<span class="text-gray-400">-</span>';
  return typeof val === 'number' ? val.toFixed(2) : String(val);
}

// ─────────────────────────────────────────────
// Auto-load from URL (?load=/path/to/folder/)
// ─────────────────────────────────────────────

async function autoLoadFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const loadPath = params.get('load');
  if (!loadPath) return;

  try {
    // Fetch manifest listing all results files
    const manifestUrl = loadPath.replace(/\/?$/, '/') + 'manifest.json';
    const resp = await fetch(manifestUrl);
    if (!resp.ok) { console.warn('No manifest found at', manifestUrl); return; }
    const manifest = await resp.json();
    const files = manifest.files || [];
    if (!files.length) return;

    // Fetch each results file and create File objects for loadFiles()
    const basePath = loadPath.replace(/\/?$/, '/');
    const fileObjects = [];
    for (const relPath of files) {
      try {
        const r = await fetch(basePath + relPath);
        if (!r.ok) continue;
        const blob = await r.blob();
        fileObjects.push(new File([blob], relPath, { type: 'application/json' }));
      } catch (e) {
        console.warn('Failed to fetch', relPath, e);
      }
    }
    if (fileObjects.length) await loadFiles(fileObjects);
  } catch (e) {
    console.warn('Auto-load failed:', e);
  }
}

restoreViewState();
autoLoadFromUrl();
