      });
    },
  });
}

// ─────────────────────────────────────────────
// Trace Viewer — per-benchmark task trace audit
// ─────────────────────────────────────────────

// Per-benchmark viewer state
const tvState = {
  calendar:     { expIdx: null, taskIdx: 0, sortCol: null, sortAsc: true, filters: {}, activeDetailTab: 'outcomes' },
  marketplace:  { expIdx: null, taskIdx: 0, sortCol: null, sortAsc: true, filters: {}, activeDetailTab: 'outcomes' },
  form_filling: { expIdx: null, taskIdx: 0, sortCol: null, sortAsc: true, filters: {}, activeDetailTab: 'outcomes' },
};

function tvMetricCell(val, format, good) {
  if (val == null) return '<td class="px-3 py-2 text-center text-gray-300 dark:text-gray-600">-</td>';
  if (format === 'percent') {
    const n = typeof val === 'number' ? val : parseFloat(val);
    let cls;
    if (good === 'low') {
      cls = n <= 0.2 ? 'text-sage-600 dark:text-sage-400' : n <= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
    } else {
      cls = n >= 0.8 ? 'text-sage-600 dark:text-sage-400' : n >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
    }
    return `<td class="px-3 py-2 text-center font-medium ${cls}">${(n * 100).toFixed(0)}%</td>`;
  }
  if (format === 'int') return `<td class="px-3 py-2 text-center text-gray-700 dark:text-gray-300">${Math.round(val)}</td>`;
  return `<td class="px-3 py-2 text-center text-gray-700 dark:text-gray-300">${esc(String(val))}</td>`;
}

// TV filter helpers — per-benchmark dimension filters for experiment tables
function tvToggleFilter(benchmark, dim, val, allExps) {
  const filters = tvState[benchmark].filters;
  const allVals = [...new Set(allExps.map(e => e[dim]))].filter(v => v != null);
  if (!filters[dim] || filters[dim].size === 0) {
    filters[dim] = new Set(allVals);
  }
  const f = filters[dim];
  if (f.has(val)) f.delete(val); else f.add(val);
  if (f.size === allVals.length) filters[dim] = new Set();
}

function tvApplyFilters(benchmark, exps) {
  const filters = tvState[benchmark].filters;
  return exps.filter(e => {
    for (const dim of Object.keys(filters)) {
      const f = filters[dim];
      if (!f || f.size === 0) continue;
      if (!f.has(e[dim])) return false;
    }
    return true;
  });
}

function tvRenderFilterPills(benchmark, exps) {
  const filters = tvState[benchmark].filters;
  const dims = tvExpCols.filter(c => c.dim);
  const parts = dims.map(col => {
    const dim = col.dim;
    const values = [...new Set(exps.map(e => col.getter(e)))].sort();
    if (values.length <= 1) return '';
    const pills = values.map(val => {
      const active = !filters[dim] || filters[dim].size === 0 || filters[dim].has(val);
      const cls = active
        ? 'bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300'
        : 'bg-gray-100 text-gray-400 dark:bg-gray-700 dark:text-gray-500 line-through';
      return `<button class="tv-filter-btn px-1.5 py-0.5 rounded text-[10px] font-medium transition ${cls}" data-dim="${dim}" data-val="${esc(String(val))}">${esc(String(val))}</button>`;
    }).join('');
    return `<span class="inline-flex items-center gap-1"><span class="text-[9px] text-gray-400 dark:text-gray-500 uppercase">${col.label}:</span>${pills}</span>`;
  }).filter(Boolean);
  return parts.join('<span class="text-gray-300 dark:text-gray-600 mx-1">|</span>');
}

function renderBenchmarkTab(benchmark, experiments) {
  const expPanel = document.getElementById('tv-exppanel-' + benchmark);
  const expTable = document.getElementById('tv-exptable-' + benchmark);
  const taskView = document.getElementById('tv-taskview-' + benchmark);
  const taskList = document.getElementById('tv-tasklist-' + benchmark);
  const detail = document.getElementById('tv-detail-' + benchmark);

  if (experiments.length === 0) {
    expTable.innerHTML = '<p class="text-gray-400 text-sm p-6">No data loaded for this benchmark.</p>';
    expPanel.classList.remove('hidden');
    taskView.classList.add('hidden');
    return;
  }

  // If an experiment is already selected, go straight to task view
  if (tvState[benchmark].expIdx != null && tvState[benchmark].expIdx < experiments.length) {
    tvShowTaskView(benchmark, experiments);
    return;
  }

  // Show experiment table
  tvShowExpTable(benchmark, experiments);
}

const tvExpCols = [
  { key: 'assistant',  label: 'Assistant',  align: 'left',   getter: e => e.assistantModel || e.model },
  { key: 'counterparty', label: 'Counterparty', align: 'left', getter: e => e.counterpartyModel || e.model },
  { key: 'privacy',    label: 'Privacy',    align: 'left',   getter: e => e.privacyLevel || 'none', dim: 'privacyLevel' },
  { key: 'reasoning',  label: 'Reasoning',  align: 'left',   getter: e => e.reasoningConfig || 'none', dim: 'reasoningConfig' },
  { key: 'attack',     label: 'Attack',     align: 'left',   getter: e => e.attackType || 'none', dim: 'attackType' },
  { key: 'attackStyle',label: 'Style',      align: 'left',   getter: e => e.attackStyle || 'none', dim: 'attackStyle' },
  { key: 'tasks',      label: 'Tasks',      align: 'center', getter: e => e.tasks.length },
  { key: 'completion', label: 'Completion',  align: 'center', getter: e => e.evaluation?.avg_task_completion, format: 'percent', good: 'high' },
  { key: 'oo',         label: 'OO',          align: 'center', getter: e => e.evaluation?.avg_outcome_optimality, format: 'percent', good: 'high' },
  { key: 'leakage',    label: 'Leakage',    align: 'center', getter: e => e.evaluation?.avg_leakage_rate, format: 'percent', good: 'low' },
  { key: 'doc',        label: 'DoC',        align: 'center', getter: e => e.evaluation?.avg_duty_of_care, format: 'percent', good: 'high' },
  { key: 'dd',         label: 'DD',         align: 'center', getter: e => e.evaluation?.avg_due_diligence, format: 'int' },
];

function tvShowExpTable(benchmark, experiments) {
  const expPanel = document.getElementById('tv-exppanel-' + benchmark);
  const expTable = document.getElementById('tv-exptable-' + benchmark);
  const taskView = document.getElementById('tv-taskview-' + benchmark);

  expPanel.classList.remove('hidden');
  taskView.classList.add('hidden');

  // Apply dimension filters
  const filtered = tvApplyFilters(benchmark, experiments);

  // Sort experiments (keep original indices for selection)
  const indexed = filtered.map((e, i) => ({ exp: e, origIdx: experiments.indexOf(e) }));
  const sc = tvState[benchmark].sortCol;
  if (sc) {
    const col = tvExpCols.find(c => c.key === sc);
    if (col) {
      const dir = tvState[benchmark].sortAsc ? 1 : -1;
      const dimOrder = col.dim && DIMENSION_DEFS[col.dim]?.order;
      const orderIdx = dimOrder ? Object.fromEntries(dimOrder.map((v, i) => [v, i])) : null;
      indexed.sort((a, b) => {
        let va = col.getter(a.exp), vb = col.getter(b.exp);
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        if (orderIdx) return dir * ((orderIdx[va] ?? 9999) - (orderIdx[vb] ?? 9999));
        if (typeof va === 'string') return dir * va.localeCompare(vb);
        return dir * (va - vb);
      });
    }
  }

  // Filter pills
  const filterPillsHtml = tvRenderFilterPills(benchmark, experiments);
  const countLabel = filtered.length < experiments.length
    ? `<span class="text-[10px] text-gray-400 dark:text-gray-500">${filtered.length}/${experiments.length}</span>`
    : '';

  // Header with sort arrows
  const thHtml = tvExpCols.map(col => {
    const active = sc === col.key;
    const arrow = active ? (tvState[benchmark].sortAsc ? ' \u25B2' : ' \u25BC') : '';
    return `<th class="px-3 py-2 text-${col.align} cursor-pointer select-none hover:text-sage-600 dark:hover:text-sage-400 transition" data-sort="${col.key}">${esc(col.label)}${arrow}</th>`;
  }).join('');

  let html = `<div class="flex-shrink-0 px-4 py-2 border-b border-gray-100 dark:border-gray-800 flex flex-wrap items-center gap-1">${filterPillsHtml} ${countLabel}</div>`;
  html += `<table class="w-full text-xs">
    <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800 z-10">
      <tr class="text-gray-500 dark:text-gray-400 font-medium text-[10px] uppercase tracking-wider border-b border-gray-200 dark:border-gray-700">${thHtml}</tr>
    </thead>
    <tbody>`;

  indexed.forEach(({ exp: e, origIdx }) => {
    const cells = tvExpCols.map(col => {
      const val = col.getter(e);
      if (col.format === 'percent' || col.format === 'int') return tvMetricCell(val, col.format, col.good);
      if (col.key === 'tasks') return `<td class="px-3 py-2 text-center">${val}</td>`;
      if (col.dim) return `<td class="px-3 py-2"><span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">${esc(String(val))}</span></td>`;
      return `<td class="px-3 py-2 max-w-[140px] truncate" title="${esc(String(val || ''))}">${esc(String(val || ''))}</td>`;
    }).join('');
    html += `<tr class="tv-exp-row border-b border-gray-100 dark:border-gray-800 text-gray-700 dark:text-gray-300 cursor-pointer hover:bg-sage-50 dark:hover:bg-sage-900/20 transition" data-idx="${origIdx}">${cells}</tr>`;
  });

  html += '</tbody></table>';
  expTable.innerHTML = html;

  // Wire filter pill clicks
  expTable.querySelectorAll('.tv-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tvToggleFilter(benchmark, btn.dataset.dim, btn.dataset.val, experiments);
      tvShowExpTable(benchmark, experiments);
    });
  });

  // Wire header clicks for sorting
  expTable.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (tvState[benchmark].sortCol === key) {
        tvState[benchmark].sortAsc = !tvState[benchmark].sortAsc;
      } else {
        tvState[benchmark].sortCol = key;
        tvState[benchmark].sortAsc = true;
      }
      tvShowExpTable(benchmark, experiments);
    });
  });

  // Wire row clicks to select experiment
  expTable.querySelectorAll('.tv-exp-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = parseInt(row.dataset.idx);
      tvState[benchmark].expIdx = idx;
      tvState[benchmark].taskIdx = 0;
      tvShowTaskView(benchmark, experiments);
    });
  });
}

function tvShowTaskView(benchmark, experiments) {
  const expPanel = document.getElementById('tv-exppanel-' + benchmark);
  const taskView = document.getElementById('tv-taskview-' + benchmark);
  const label = document.getElementById('tv-exp-label-' + benchmark);

  expPanel.classList.add('hidden');
  taskView.classList.remove('hidden');

  const exp = experiments[tvState[benchmark].expIdx];
  if (label && exp) label.textContent = `${exp.variant} (${exp.model}, ${exp.tasks.length} tasks)`;

  tvRenderTaskList(benchmark, experiments);
}

function tvTaskLabel(r, benchmark) {
  if (benchmark === 'calendar') return r.execution?.task?.requestor?.requested_meeting?.title || r.execution?.task?.requestor?.event?.title || r.original_requested_meeting?.title || '?';
  if (benchmark === 'marketplace') return r.execution?.task?.product?.name || String(r.execution?.task?.product || '?');
  return 'Task ' + (r.execution?.task?.id ?? '?');
}

function tvTaskMetricCell(val, format) {
  if (val == null) return '<td class="px-2 py-1.5 text-center text-gray-300 dark:text-gray-600">-</td>';
  if (format === 'bool') {
    return val
      ? '<td class="px-2 py-1.5 text-center text-sage-600 font-medium">Yes</td>'
      : '<td class="px-2 py-1.5 text-center text-gray-400 font-medium">No</td>';
  }
  if (format === 'percent') {
    const n = typeof val === 'number' ? val : parseFloat(val);
    const cls = n >= 0.8 ? 'text-sage-600 dark:text-sage-400' : n >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
    return `<td class="px-2 py-1.5 text-center font-medium ${cls}">${(n * 100).toFixed(0)}%</td>`;
  }
  if (format === 'int') return `<td class="px-2 py-1.5 text-center text-gray-600 dark:text-gray-400">${Math.round(val)}</td>`;
  return `<td class="px-2 py-1.5 text-center text-gray-600 dark:text-gray-400">${esc(String(val))}</td>`;
}

function tvRenderTaskList(benchmark, experiments) {
  const exp = experiments[tvState[benchmark].expIdx];
  if (!exp) return;
  const taskList = document.getElementById('tv-tasklist-' + benchmark);
  const results = exp.tasks.map(t => t._raw);

  // Core columns + domain-specific extras
  let extraHeaders = '';
  let extraCellsFn = (r) => '';

  if (benchmark === 'calendar') {
    extraHeaders = '<th class="px-2 py-1.5 text-center">Sat.</th><th class="px-2 py-1.5 text-center">Pref</th>';
    extraCellsFn = (r) => {
      const sat = r.task_satisfiable;
      const pref = r.preference_score;
      return `${tvTaskMetricCell(sat, 'bool')}${tvTaskMetricCell(pref, 'percent')}`;
    };
  } else if (benchmark === 'marketplace') {
    extraHeaders = '<th class="px-2 py-1.5 text-center">Deal</th><th class="px-2 py-1.5 text-center">Price</th>';
    extraCellsFn = (r) => {
      const deal = r.execution?.outcome?.deal_reached;
      const price = r.execution?.outcome?.deal_price;
      return `${tvTaskMetricCell(deal, 'bool')}${price != null ? `<td class="px-2 py-1.5 text-center text-gray-600 dark:text-gray-400">$${Math.round(price)}</td>` : '<td class="px-2 py-1.5 text-center text-gray-300 dark:text-gray-600">-</td>'}`;
    };
  } else {
    extraHeaders = '<th class="px-2 py-1.5 text-center">F1</th><th class="px-2 py-1.5 text-center">Valid</th>';
    extraCellsFn = (r) => {
      const f1 = r.correctness?.f1_score;
      const valid = r.pydantic_validation_passed;
      return `${tvTaskMetricCell(f1, 'percent')}${tvTaskMetricCell(valid, 'bool')}`;
    };
  }

  const headerCols = `
    <th class="px-2 py-1.5 text-left">#</th>
    <th class="px-2 py-1.5 text-left">${benchmark === 'calendar' ? 'Event' : benchmark === 'marketplace' ? 'Product' : 'Task'}</th>
    <th class="px-2 py-1.5 text-center">Comp</th>
    <th class="px-2 py-1.5 text-center">OO</th>
    <th class="px-2 py-1.5 text-center">Leak</th>
    <th class="px-2 py-1.5 text-center">DoC</th>
    <th class="px-2 py-1.5 text-center">DD</th>
    ${extraHeaders}`;

  const rows = results.map((r, idx) => {
    const selected = idx === tvState[benchmark].taskIdx ? 'selected' : '';
    const label = tvTaskLabel(r, benchmark);
    return `<tr class="trace-task-row border-b border-gray-100 dark:border-gray-800 text-xs text-gray-700 dark:text-gray-300 ${selected}" data-idx="${idx}">
      <td class="px-2 py-1.5 text-gray-400 dark:text-gray-500">${r.execution?.task?.id ?? idx}</td>
      <td class="px-2 py-1.5 max-w-[120px] truncate" title="${esc(label)}">${esc(label)}</td>
      ${tvTaskMetricCell(r.task_completed, 'bool')}
      ${tvTaskMetricCell(r.outcome_optimality, 'percent')}
      ${tvTaskMetricCell(r.leakage_rate, 'percent')}
      ${tvTaskMetricCell(r.duty_of_care, 'percent')}
      ${tvTaskMetricCell(r.due_diligence, 'int')}
      ${extraCellsFn(r)}
    </tr>`;
  }).join('');

  taskList.innerHTML = `<table class="w-full text-xs">
    <thead class="sticky top-0 bg-gray-50 dark:bg-gray-800"><tr class="text-gray-500 dark:text-gray-400 font-medium text-[10px] uppercase tracking-wider">${headerCols}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  taskList.querySelectorAll('.trace-task-row').forEach(row => {
    row.addEventListener('click', () => {
      tvState[benchmark].taskIdx = parseInt(row.dataset.idx);
      taskList.querySelectorAll('.trace-task-row').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      tvRenderDetail(benchmark, results[tvState[benchmark].taskIdx], exp);
    });
  });

  // Render first task
  if (results.length > 0) {
    tvRenderDetail(benchmark, results[tvState[benchmark].taskIdx], exp);
  }
}

function tvRenderVerdictBanner(r) {
  const completed = r.task_completed;
  const verdictCls = completed
    ? 'bg-sage-50 border-sage-300 dark:bg-sage-900/30 dark:border-sage-700'
    : 'bg-red-50 border-red-300 dark:bg-red-900/30 dark:border-red-700';
  const verdictLabel = completed
    ? '<span class="px-2 py-1 rounded-full text-[10px] font-bold bg-sage-500 text-white">PASS</span>'
    : '<span class="px-2 py-1 rounded-full text-[10px] font-bold bg-red-500 text-white">FAIL</span>';

  const stats = [
    tvVerdictStat('OO', r.outcome_optimality, 'percent', 'high'),
    tvVerdictStat('Leakage', r.leakage_rate, 'percent', 'low'),
    tvVerdictStat('DoC', r.duty_of_care, 'percent', 'high'),
    tvVerdictStat('DD', r.due_diligence, 'int'),
  ].join('');

  return `<div class="flex items-center gap-4 px-4 py-2.5 border-b ${verdictCls}">
    ${verdictLabel}
    <div class="flex items-center gap-4 text-xs">${stats}</div>
  </div>`;
}

function tvVerdictStat(label, value, fmt, good) {
  let display = '-', cls = 'text-gray-600 dark:text-gray-400';
  if (value != null) {
    if (fmt === 'percent') {
      const n = typeof value === 'number' ? value : parseFloat(value);
      display = (n * 100).toFixed(0) + '%';
      if (good === 'high') cls = n >= 0.8 ? 'text-sage-600 dark:text-sage-400' : n >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
      else cls = n <= 0.2 ? 'text-sage-600 dark:text-sage-400' : n <= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
    } else if (fmt === 'bool') {
      display = value ? 'Pass' : 'Fail';
      cls = value ? 'text-sage-600 dark:text-sage-400' : 'text-red-500 dark:text-red-400';
    } else if (fmt === 'int') {
      display = String(Math.round(typeof value === 'number' ? value : parseFloat(value)));
    } else {
      display = String(value);
    }
  }
  return `<span class="text-gray-400 dark:text-gray-500">${esc(label)}:</span> <span class="font-semibold ${cls}">${display}</span>`;
}

function tvRenderDetail(benchmark, result, experiment) {
  const detail = document.getElementById('tv-detail-' + benchmark);
  if (!result) { detail.innerHTML = ''; return; }

  // Destroy any existing charts in the detail pane
  destroyChartsIn(detail);

  const activeTab = tvState[benchmark].activeDetailTab || 'outcomes';
  const tabs = [
    { id: 'outcomes', label: 'Outcomes' },
    { id: 'metrics',  label: 'Metrics' },
    { id: 'context',  label: 'Context' },
    { id: 'trace',    label: 'Trace' },
  ];

  const verdictHtml = tvRenderVerdictBanner(result);
  const tabBarHtml = `<div class="flex-shrink-0 flex border-b border-gray-200 dark:border-gray-700 px-4">
    ${tabs.map(t => `<button class="tv-detail-tab px-4 py-2 text-xs font-medium border-b-2 ${
      t.id === activeTab ? 'text-sage-600 dark:text-sage-400 border-sage-500' : 'text-gray-500 dark:text-gray-400 border-transparent hover:text-gray-700 dark:hover:text-gray-300'
    }" data-dtab="${t.id}">${t.label}</button>`).join('')}
  </div>`;

  let contentHtml = '';
  switch (activeTab) {
    case 'outcomes': contentHtml = tvRenderOutcomes(result, benchmark); break;
    case 'metrics':  contentHtml = tvRenderEvalMetrics(result, benchmark); break;
    case 'context':  contentHtml = tvRenderTaskContext(result, benchmark, experiment); break;
    case 'trace':    contentHtml = tvRenderTraceTab(result, benchmark); break;
  }

  detail.innerHTML = `
    <div class="flex-shrink-0">${verdictHtml}</div>
    <div class="flex-shrink-0">${tabBarHtml}</div>
    <div class="flex-1 min-h-0 overflow-y-auto p-4">${contentHtml}</div>`;

  // Wire tab clicks
  detail.querySelectorAll('.tv-detail-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tvState[benchmark].activeDetailTab = btn.dataset.dtab;
      tvRenderDetail(benchmark, result, experiment);
    });
  });

  // Post-render: wire scroll sync for trace tab agent columns
  if (activeTab === 'trace') {
    const cols = detail.querySelectorAll('[data-trace-col]');
    if (cols.length === 2) {
      let syncing = false;
      cols.forEach(col => {
        col.addEventListener('scroll', () => {
          if (syncing) return;
          syncing = true;
          cols.forEach(other => { if (other !== col) other.scrollTop = col.scrollTop; });
          syncing = false;
        });
      });
    }
  }

  // Post-render: marketplace negotiation chart
  if (activeTab === 'outcomes' && benchmark === 'marketplace') {
    const offers = result.execution?.offers || [];
    const chartCanvas = detail.querySelector('[data-neg-chart]');
    if (chartCanvas && offers.length >= 2) {
      tvCreateNegotiationChart(chartCanvas.id, offers, result.execution?.task);
    }
  }

  // Post-render: field eval filter buttons
  if (activeTab === 'outcomes' && benchmark === 'form_filling') {
    detail.querySelectorAll('.tv-field-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;
        const rows = detail.querySelectorAll('tr[data-match]');
        rows.forEach(row => {
          row.classList.toggle('hidden', filter !== 'all' && row.dataset.match !== filter);
        });
        // Highlight active filter button
        detail.querySelectorAll('.tv-field-filter').forEach(b => b.classList.remove('ring-2', 'ring-gray-400'));
        btn.classList.add('ring-2', 'ring-gray-400');
      });
    });
  }
}

// Trace tab: merges conversation + per-agent trace
function tvRenderTraceTab(r, benchmark) {
  let html = '';
  html += tvRenderConversation(r, benchmark);
  html += tvRenderPerAgentTrace(r, benchmark);
  return html;
}

// ─── Shared Trace Viewer Helpers ──────────────────

function tvNormalizeEvent(event) {
  if (!event) return null;
  const n = {...event};
  if (event.start_time && n.start_time_24h == null) {
    n.start_time_24h = typeof event.start_time === 'number' ? event.start_time : tvParseTimeString(event.start_time);
  }
  if (event.end_time && n.end_time_24h == null) {
    n.end_time_24h = typeof event.end_time === 'number' ? event.end_time : tvParseTimeString(event.end_time);
  }
  if (n.duration_minutes == null && n.start_time_24h != null && n.end_time_24h != null) {
    n.duration_minutes = tvMilToMinutes(n.end_time_24h) - tvMilToMinutes(n.start_time_24h);
  }
  return n;
}

function tvParseTimeString(s) {
  if (typeof s === 'number') return s;
  if (!s) return 0;
  const [h, m] = String(s).split(':').map(Number);
  return h * 100 + (m || 0);
}

function tvMilToMinutes(mil) { return Math.floor(mil / 100) * 60 + (mil % 100); }

function tvFormatTime(mil) {
  if (mil == null) return '?';
  const h = Math.floor(mil / 100), m = mil % 100;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return m > 0 ? `${h12}:${m.toString().padStart(2, '0')} ${ampm}` : `${h12} ${ampm}`;
}

function tvFormatDuration(mins) {
  if (!mins) return '?';
  if (mins >= 60) { const h = Math.floor(mins / 60), m = mins % 60; return m > 0 ? `${h}h ${m}m` : `${h}h`; }
  return `${mins}m`;
}

// ─── Trace Viewer Redesign: Sections 1–4 ──────────────────

function tvRenderSectionHeading(title) {
  return `<div class="mb-5"><h3 class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider border-b border-gray-200 dark:border-gray-700 pb-1.5">${esc(title)}</h3>`;
}

function tvRenderMetricCard(label, value, opts = {}) {
  const fmt = opts.format || 'number';
  const good = opts.good || 'high';
  const subtitle = opts.subtitle || '';

  let display = '-';
  let colorCls = 'text-gray-700 dark:text-gray-200';

  if (value != null) {
    if (fmt === 'bool') {
      const pass = opts.invert ? !value : !!value;
      display = pass
        ? '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300">Pass</span>'
        : '<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">Fail</span>';
    } else if (fmt === 'badge') {
      display = `<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-200">${esc(String(value))}</span>`;
    } else if (fmt === 'percent') {
      const numVal = typeof value === 'number' ? value : parseFloat(value);
      display = (numVal * 100).toFixed(1) + '%';
      if (good === 'high') {
        colorCls = numVal >= 0.8 ? 'text-sage-600 dark:text-sage-400' : numVal >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
      } else {
        colorCls = numVal <= 0.2 ? 'text-sage-600 dark:text-sage-400' : numVal <= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
      }
    } else if (fmt === 'int') {
      display = String(Math.round(typeof value === 'number' ? value : parseFloat(value)));
      colorCls = 'text-gray-700 dark:text-gray-200';
    } else {
      // 'number'
      const numVal = typeof value === 'number' ? value : parseFloat(value);
      display = numVal.toFixed(1);
      if (good === 'high') {
        colorCls = numVal >= 0.8 ? 'text-sage-600 dark:text-sage-400' : numVal >= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
      } else {
        colorCls = numVal <= 0.2 ? 'text-sage-600 dark:text-sage-400' : numVal <= 0.5 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
      }
    }
  }

  return `<div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2.5 text-center min-w-[80px]">
    <div class="text-[10px] text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">${esc(label)}</div>
    <div class="text-sm font-bold ${colorCls}">${display}</div>
    ${subtitle ? `<div class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5">${esc(subtitle)}</div>` : ''}
  </div>`;
}

function tvIsEffortAction(benchmark, toolName, args) {
  const argsStr = typeof args === 'string' ? args : (args ? JSON.stringify(args) : '');
  if (benchmark === 'calendar') {
    if (toolName === 'RequestMeeting') return true;
    if (toolName === 'ReplyMeeting' && argsStr.includes('COUNTER')) return true;
  } else if (benchmark === 'form_filling') {
    if (toolName === 'SearchFiles' || toolName === 'ReadFile') return true;
  } else if (benchmark === 'marketplace') {
    if (toolName === 'MakeOffer') return true;
  }
  return false;
}

function tvRenderMetricGroup(label, cards) {
  const filtered = cards.filter(Boolean);
  if (!filtered.length) return '';
  return `<div class="mb-4">
    <div class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">${esc(label)}</div>
    <div class="flex flex-wrap gap-2 items-stretch">${filtered.join('')}</div>
  </div>`;
}

function tvRenderEvalMetrics(r, benchmark) {
  const mc = tvRenderMetricCard;

  // Core group (all benchmarks)
  const core = [
    mc('Task Completed', r.task_completed, { format: 'bool' }),
    mc('Outcome Optimality', r.outcome_optimality, { format: 'percent', good: 'high' }),
    mc('Leakage Rate', r.leakage_rate, { format: 'percent', good: 'low' }),
    mc('Duty of Care', r.duty_of_care, { format: 'percent', good: 'high' }),
    mc('Due Diligence', r.due_diligence, { format: 'int' }),
  ];

  let groups = '';
  groups += tvRenderMetricGroup('Core', core);

  if (benchmark === 'calendar') {
    const illegalCount = Array.isArray(r.illegal_moves) ? r.illegal_moves.length : (r.illegal_moves || 0);
    const ooEval = r.outcome_optimality_eval || {};
    groups += tvRenderMetricGroup('Scheduling', [
      mc('Preference Score', r.preference_score, { format: 'percent', good: 'high' }),
      mc('Duration Error', r.scheduled_duration_error, { format: 'int', subtitle: 'min' }),
      mc('No Conflicts', r.has_conflicts, { format: 'bool', invert: true }),
      mc('Illegal Moves', illegalCount, { format: 'int' }),
    ]);
    groups += tvRenderMetricGroup('Outcome Optimality', [
      mc('V(o)', ooEval.value, { format: 'number' }),
      mc('V*', ooEval.best_value, { format: 'number' }),
      mc('OO Score', ooEval.outcome_optimality_score, { format: 'percent', good: 'high' }),
    ]);
    if (ooEval.explanation) {
      groups += `<div class="mb-4 text-[10px] text-gray-500 dark:text-gray-400 italic -mt-2">${esc(ooEval.explanation)}</div>`;
    }
    groups += tvRenderMetricGroup('Privacy', [
      mc('Total Secrets', r.privacy?.total_secrets, { format: 'int' }),
    ]);
    groups += tvRenderMetricGroup('Effort', [
      mc('Messages', r.due_diligence_message_count, { format: 'int' }),
      mc('Pref Mentions', r.due_diligence_preference_mention_count, { format: 'int' }),
      mc('Proposals', r.due_diligence_proposal_count, { format: 'int' }),
    ]);
  } else if (benchmark === 'marketplace') {
    groups += tvRenderMetricGroup('Deal', [
      mc('Leakage', r.privacy?.leakage_score, { format: 'percent', good: 'low' }),
      mc('Duty of Care', r.duty_of_care_eval?.duty_of_care_score, { format: 'percent', good: 'high' }),
      mc('Deal Fairness', r.duty_of_care_eval?.deal_ratio_centered, { format: 'number' }),
    ]);
    groups += tvRenderMetricGroup('Effort', [
      mc('Effort Actions', r.due_diligence_eval?.effort_action_count, { format: 'int' }),
      mc('Price Range', r.due_diligence_eval?.price_range_explored, { format: 'percent', good: 'high' }),
    ]);
  } else if (benchmark === 'form_filling') {
    groups += tvRenderMetricGroup('Correctness', [
      mc('F1', r.correctness?.f1_score, { format: 'percent', good: 'high' }),
      mc('Accuracy', r.correctness?.accuracy, { format: 'percent', good: 'high' }),
      mc('Precision', r.correctness?.precision, { format: 'percent', good: 'high' }),
      mc('Recall', r.correctness?.recall, { format: 'percent', good: 'high' }),
      mc('Exact', r.correctness?.exact_matches, { format: 'int' }),
      mc('Semantic', r.correctness?.semantic_matches, { format: 'int' }),
      mc('Grounded', r.correctness?.grounded_matches, { format: 'int' }),
      mc('Filled', r.correctness?.total_filled_by_agent, { format: 'int', subtitle: `/ ${r.correctness?.total_should_fill ?? '?'}` }),
    ]);
    groups += tvRenderMetricGroup('Privacy', [
      mc('Form Privacy', r.form_privacy?.privacy_score, { format: 'percent', good: 'high' }),
      mc('Conv Privacy', r.conversation_privacy?.privacy_score, { format: 'percent', good: 'high' }),
    ]);
    groups += tvRenderMetricGroup('Due Diligence', [
      mc('Masked Acc', r.due_diligence_eval?.masked_field_accuracy, { format: 'percent', good: 'high' }),
      mc('Masked Fields', r.due_diligence_eval?.total_masked_fields, { format: 'int', subtitle: `${r.due_diligence_eval?.total_findable ?? '?'}f / ${r.due_diligence_eval?.total_unfindable ?? '?'}u` }),
      mc('Effort Actions', r.due_diligence_eval?.effort_action_count, { format: 'int' }),
    ]);
    groups += tvRenderMetricGroup('Duty of Care', [
      mc('Pydantic', r.pydantic_validation_passed, { format: 'bool' }),
      mc('DoC Min', r.duty_of_care_eval?.min_score, { format: 'percent', good: 'high' }),
      mc('DoC Fields', r.duty_of_care_eval?.total_fields, { format: 'int' }),
    ]);
  }

  let html = tvRenderSectionHeading('Evaluation Metrics');
  html += groups;
  html += '</div>';
  return html;
}

        <div class="mt-1 bg-white dark:bg-gray-900 rounded p-2 text-xs text-gray-700 dark:text-gray-300 whitespace-pre-wrap max-h-40 overflow-y-auto">${esc(formInfo.extracted_text)}</div>
      </details>` : ''}
    </div>`;

    // Artifacts accordion
    const fsArtifacts = Array.isArray(task.filesystem_artifacts) ? task.filesystem_artifacts : [];
    const legacyArtifacts = Array.isArray(task.artifacts) ? task.artifacts : [];
    const allArtifacts = fsArtifacts.length > 0 ? fsArtifacts : legacyArtifacts;

    // For context-mode artifacts, derive contains_answer_for from validation.field_coverage
    const artifactFieldMap = {};  // artifact index → [field_id, ...]
    const fieldCoverage = task.validation?.field_coverage || [];
    fieldCoverage.forEach(fc => {
      (fc.found_in_artifacts || []).forEach(idx => {
        const key = String(idx);
        if (!artifactFieldMap[key]) artifactFieldMap[key] = [];
        artifactFieldMap[key].push(fc.field_id || fc.field_label || '?');
      });
    });

    if (allArtifacts.length > 0) {
      html += `<details class="mb-3">
        <summary class="text-[10px] text-gray-500 dark:text-gray-400 uppercase cursor-pointer hover:text-gray-700 dark:hover:text-gray-200 font-semibold">Artifacts (${allArtifacts.length})</summary>
        <div class="mt-2 space-y-2">
          ${allArtifacts.map((a, ai) => {
            const aType = a.artifact_type || 'unknown';
            const aId = a.id || `artifact-${ai}`;
            const typeCls = aType === 'email' ? 'bg-sage-100 text-sage-700 dark:bg-sage-900 dark:text-sage-300' : aType === 'calendar' ? 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300' : 'bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-400';
            // Use explicit contains_answer_for if present, otherwise derive from validation
            const answersFor = a.contains_answer_for || artifactFieldMap[String(ai)] || [];
            const secretsIn = a.contains_secrets || [];
            const negIn = a.contains_negative_info || [];
            const distractorFor = a.is_distractor_for || [];
            const tags = [
              ...answersFor.map(f => `<span class="px-1 py-0.5 rounded text-[9px] bg-sage-100 text-sage-700 dark:bg-sage-900 dark:text-sage-300" title="Answers field">${esc(f)}</span>`),
              ...secretsIn.map(s => `<span class="px-1 py-0.5 rounded text-[9px] bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300" title="Contains secret">${esc(s)}</span>`),
              ...negIn.map(n => `<span class="px-1 py-0.5 rounded text-[9px] bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300" title="Contains negative info">${esc(n)}</span>`),
              ...distractorFor.map(d => `<span class="px-1 py-0.5 rounded text-[9px] bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300" title="Distractor for field">${esc(d)}</span>`),
            ];
            return `<details class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
              <summary class="px-3 py-2 flex items-center gap-2 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition text-xs">
                <span class="px-1.5 py-0.5 rounded text-[9px] font-medium ${typeCls}">${esc(aType)}</span>
                <span class="font-medium text-gray-700 dark:text-gray-300">${esc(aId)}</span>
                ${tags.length ? `<span class="flex gap-1 flex-wrap">${tags.join('')}</span>` : ''}
              </summary>
              <div class="px-3 py-2 border-t border-gray-200 dark:border-gray-700">
                <pre class="text-[10px] text-gray-600 dark:text-gray-400 whitespace-pre-wrap max-h-48 overflow-y-auto">${esc(a.content || '(empty)')}</pre>
              </div>
            </details>`;
          }).join('')}
        </div>
      </details>`;
    }

    // Persona card
    html += `<div class="mb-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-3">
      <div class="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">Persona</div>
      <div class="text-sm text-gray-800 dark:text-gray-100">${esc(persona.full_name || '?')}</div>
      <div class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">
        ${persona.age != null ? `Age: ${esc(String(persona.age))}` : ''}
        ${persona.occupation ? ` · ${esc(persona.occupation)}` : ''}
        ${persona.city || persona.state ? ` · ${esc([persona.city, persona.state].filter(Boolean).join(', '))}` : ''}
      </div>
    </div>`;

    // Assistant + Interviewer cards with prompts
    html += `<div class="grid md:grid-cols-2 gap-3 mb-3">
      <div class="bg-sage-50 dark:bg-sage-900/20 border border-sage-200 dark:border-sage-800 rounded-lg p-3">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs font-semibold text-sage-800 dark:text-sage-200">Assistant</span>
          ${pvBadge}
        </div>
        ${promptDetail('System Prompt', aSys)}
        ${promptDetail('User Message', aUser)}
      </div>
      <div class="bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg p-3">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs font-semibold text-gray-800 dark:text-gray-200">Interviewer</span>
          ${isMalicious
            ? '<span class="px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">Malicious</span>'
            : '<span class="px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-sage-100 text-sage-800 dark:bg-sage-900 dark:text-sage-300">Benign</span>'}
        </div>
        ${isMalicious ? `<div class="mt-1 text-xs text-gray-600 dark:text-gray-400">
          ${task.malicious_target ? `<div><span class="font-semibold">Target:</span> ${esc(String(task.malicious_target))}</div>` : ''}
          ${task.malicious_strategy ? `<div><span class="font-semibold">Strategy:</span> ${esc(String(task.malicious_strategy))}</div>` : ''}

    // Stats row
    const secretsCount = Array.isArray(task.secrets) ? task.secrets.length : 0;

    const groundTruthCount = task.ground_truth ? Object.keys(task.ground_truth).length : 0;
    const filesystemCount = Array.isArray(task.filesystem_artifacts) ? task.filesystem_artifacts.length : 0;

    html += `<div class="flex flex-wrap gap-2">

      ${tvRenderMetricCard('Negative Info', negativeInfoCount, { format: 'int' })}
      ${tvRenderMetricCard('Ground Truth Fields', groundTruthCount, { format: 'int' })}
      ${tvRenderMetricCard('FS Artifacts', filesystemCount, { format: 'int' })}
