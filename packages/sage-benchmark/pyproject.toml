[project]
name = "sage-benchmark"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openai>=2.11.0",
    "google-genai>=1.60.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0",
    "tenacity>=8.2.0",
    "tqdm>=4.66.0",
    "python-dotenv>=1.0.0",
    "litellm<1.82.7",
    "fastapi>=0.128.0", # Required for litellm
    "matplotlib>=3.7.0",
    "numpy>=1.24.0",
    "rank-bm25>=0.2.2",
    "sage-llm",
    "whimsygen",
]

[project.scripts]
sagebench = "sage_benchmark.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sage_benchmark"]

[tool.uv.sources]
litellm = { git = "https://github.com/BerriAI/litellm", rev = "69975217d23efdbf5548808280ed709a3bbe96ab" }
sage-llm = { workspace = true }
whimsygen = { workspace = true }
