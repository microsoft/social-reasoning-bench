[project]
name = "srbench-data-gen"
version = "0.1.0"
description = "Data generation pipelines for srbench"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.12.5",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "datasets",
    "Pillow",
    "tqdm",
    "rank-bm25>=0.2.2",
    "srbench",
    "srbench-llm",
    "duckdb>=1.5.1",
    "ftfy>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["srbench_data_gen"]
artifacts = ["srbench_data_gen/**/*.jsonl"]

[tool.uv.sources]
srbench = { workspace = true }
srbench-llm = { workspace = true }
