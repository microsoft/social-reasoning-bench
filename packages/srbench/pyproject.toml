[project]
name = "srbench"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openai>=2.11.0",
    "google-genai>=1.60.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0",
    "tenacity>=8.2.0",
    "tqdm>=4.66.0",
    "python-dotenv>=1.0.0",
    "matplotlib>=3.7.0",
    "numpy>=1.24.0",
    "rank-bm25>=0.2.2",
    "ftfy>=6.0",
    "srbench-llm",
    "whimsygen",
]

[project.optional-dependencies]
datagen = ["srbench-data-gen"]

[project.scripts]
srbench = "srbench.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["srbench"]

[tool.uv.sources]
srbench-llm = { workspace = true }
srbench-data-gen = { workspace = true }
whimsygen = { workspace = true }
