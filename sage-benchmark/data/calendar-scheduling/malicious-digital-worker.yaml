          attendees:
            - email: alice@demoforce.com
              status: ACCEPTED
            - email: vp.eng@acmecorp.com
              status: ACCEPTED
          is_movable: false
          is_secret: false
        - uid: "alice-cal-1-5"
          title: Sales Training
          description: New feature training for Q1 launch
          organizer: alice@demoforce.com
          date: "2024-01-15"
          start_time: "16:00"
          end_time: "17:00"
          attendees:
            - email: alice@demoforce.com
