- name: Harborlight Gridworks
  domain: harborlightgridworks.com
  industry: Energy infrastructure software (grid modernization & DER orchestration)
  departments:
    - name: Product & Design
      description: Defines customer needs and designs the web and mobile tools used by utilities and field crews.
    - name: Engineering
      description: Builds the grid analytics platform, integrations, and reliability features for enterprise deployments.
    - name: Customer Success & Implementations
      description: Onboards utility clients, manages rollouts, and coordinates training and go-live support.
    - name: Sales & Partnerships
      description: Leads utility procurement cycles and manages partnerships with meter, inverter, and SCADA vendors.
    - name: Operations & Finance
      description: Runs budgeting, procurement, facilities, and compliance support for contracts and audits.
    - name: People & Talent
      description: Handles hiring, onboarding, performance cycles, and internal training programs.
  backstory: Harborlight Gridworks develops software that helps mid-sized electric utilities coordinate distributed energy resources (solar, batteries, EV chargers) and reduce outage restoration times. The team is currently running a multi-month pilot with two municipal utilities, including weekly integration standups (AMI/SCADA), field-crew training sessions, and incident-response tabletop drills. Internally, they’re preparing for a SOC 2 Type II audit and a Q2 product release, which drives recurring calendar events like evidence collection check-ins, release planning, customer steering committees, and post-deployment retro meetings.
- name: VellumBridge Clinical Trials
  domain: vellumbridge.com
  industry: Clinical trial operations SaaS (site scheduling, participant coordination, and compliance workflows)
  departments:
    - name: Product & Design
      description: Defines the roadmap and designs workflows for coordinators, investigators, and sponsors.
    - name: Engineering
      description: Builds and maintains the platform, integrations, and data infrastructure.
    - name: Clinical Operations
      description: Works with research sites on rollout, training, and day-to-day process improvement.
    - name: Regulatory & Quality
      description: Manages validation, audit readiness, and compliance with GxP, 21 CFR Part 11, and privacy requirements.
    - name: Sales & Customer Success
      description: Runs demos, onboarding, renewals, and ongoing account health for sponsors and site networks.
  backstory: VellumBridge Clinical Trials is a mid-stage SaaS company helping research sites reduce missed visits and protocol deviations by automating scheduling, reminders, and documentation across multi-site studies. The team is currently rolling out a new EHR and eConsent integration with three hospital networks, which drives a steady cadence of stakeholder check-ins, validation workshops, and integration testing blocks on calendars. They’re also preparing for an upcoming sponsor audit and a Q2 product launch of automated visit window monitoring, prompting cross-functional release planning, quality reviews, and customer training webinars.
- name: KinshipCart Logistics
  domain: kinshipcart.com
  industry: Last-mile grocery & pharmacy delivery logistics platform
  departments:
    - name: Operations & Dispatch
      description: Runs daily delivery routing, driver shifts, and exception handling across service zones.
    - name: Partner Success
      description: Manages relationships with grocery stores and pharmacies, onboarding, and performance reviews.
    - name: Engineering
      description: Builds the dispatch platform, driver app, and integrations with partner POS/fulfillment systems.
    - name: Customer Experience
      description: Handles customer support, order issue resolution, and service quality monitoring.
    - name: Finance & People Ops
      description: Oversees payroll, driver reimbursements, budgeting, hiring, and internal HR programs.
  backstory: KinshipCart Logistics provides a routing and fulfillment coordination platform used by regional grocers and independent pharmacies to offer same-day delivery. The team is currently rolling out a new “ColdChain” insulated tote program and piloting automated shift bidding for drivers, which drives recurring calendar events like partner training webinars, depot walkthroughs, route readiness standups, and weekly pilot check-ins. They’re also integrating with two new pharmacy chains, requiring cross-functional integration sprints, compliance reviews, and launch-day war rooms.
- name: MosaicSprout Learning
  domain: mosaicsprout.com
  industry: Corporate learning & development SaaS (training operations, cohort scheduling, and credential tracking)
  departments:
    - name: Product & Design
      description: Designs the platform experience for learners, managers, and L&D admins.
    - name: Engineering
      description: Builds and maintains the web app, integrations, and scheduling infrastructure.
    - name: Customer Success
      description: Onboards customers, runs adoption programs, and supports day-to-day training operations.
    - name: Sales & Partnerships
      description: Sells to mid-market enterprises and manages content and HRIS integration partners.
    - name: People Operations
      description: Manages hiring, internal enablement, and company-wide planning rhythms.
  backstory: MosaicSprout Learning helps HR and L&D teams run cohort-based training without spreadsheet chaos, coordinating instructors, rooms, and live virtual sessions across time zones. The company is rolling out a Microsoft Teams and Google Calendar integration pilot with two enterprise customers, which drives recurring integration standups, customer check-ins, and cross-functional bug triage blocks. Internally, teams are also scheduling quarterly content vendor demos, instructor certification workshops, and a staged launch readiness sprint leading up to a new “Credential Pathways” release.
- name: Brinewood Maritime Analytics
  domain: brinewoodmaritime.com
  industry: Maritime operations analytics & port call optimization software
  departments:
    - name: Product & Design
      description: Defines the platform roadmap and designs workflows for operators, agents, and terminals.
    - name: Engineering
      description: Builds data pipelines, optimization services, and customer-facing applications.
    - name: Data Science & Research
      description: Develops ETA prediction, berth planning, and fuel/route optimization models.
    - name: Customer Success
      description: Onboards shipping lines and port agents, runs QBRs, and manages renewals and support escalations.
    - name: Sales & Partnerships
      description: Works with ports, terminals, and AIS/data providers to expand distribution and close deals.
    - name: Operations & Finance
      description: Handles budgeting, vendor management, compliance, and internal operations.
  backstory: Brinewood Maritime Analytics helps shipping lines and port agents reduce port delays by predicting vessel ETAs and optimizing berth windows using AIS, weather, and terminal capacity data. The team is currently rolling out a “BerthSync” pilot with three mid-size ports, which drives recurring calendar activity like terminal stakeholder syncs, daily model-validation standups during live port calls, and weekly incident reviews when schedule changes occur. They’re also preparing for an industry conference demo and running customer QBRs tied to fuel-savings reporting and emissions metrics rollups.
