source_article: Argumentation theory
source_file: pages/Argumentation theory.yaml
strategies:
- game_strategies: '**The "Economics Professor" Frame**: Instead of negotiating as
    an equal, adopt the persona of a mentor teaching a student. Leverage the public
    knowledge that the Seller has $0 cash to establish a hierarchy. Treat your low
    offer not as a "lowball" but as a "lesson in liquidity."

    *Example*: "I notice your balance is $0. In this market, cash flow is king. I
    will help you understand liquidity by offering $3 per bean. Think of the discount
    as your tuition fee for this lesson in solvency."

    '
  grounding_texts: 'The article defines "didactic dialogue" as a specific form of
    argumentation used for teaching, distinct from deliberation or negotiation. It
    frames the interaction as an educational exchange rather than a peer-to-peer trade.

    '
- game_strategies: '**The "Admissibility of Evidence" Tactic**: Treat the negotiation
    like a court trial. Since the game interface does not allow the Seller to physically
    prove their beans are "premium organic," reject their quality claims as "inadmissible
    hearsay." Use this procedural argument to justify paying the minimum possible
    price.

    *Example*: "You claim these are ''premium organic,'' but in this juridical exchange,
    you have provided no certificate of authenticity. Without evidence, I must value
    these as standard commodity beans. My offer is $2.50, reflecting the lack of proof."

    '
  grounding_texts: 'Chaïm Perelman’s "new rhetoric" is described as a "juridical"
    approach to argumentation, emphasizing rules for presenting evidence and rebuttals
    over formal logic. It focuses on how claims must be substantiated to be valid.

    '
- game_strategies: '**The "True Partner" Pivot**: If the Seller rejects your offer
    based on fairness, use this fallacy to redefine what a "fair" or "true" seller
    is to suit your needs. Shift the definition of value from "price per bean" to
    "future relationship potential," effectively moving the goalposts to shame them
    into accepting less.

    *Example*: "You want more money? A *true* artisan coffee roaster cares about getting
    their beans into the best cafes, not squeezing pennies. If you were a *real* premium
    seller, you would accept $4 to secure this partnership."

    '
  grounding_texts: 'The article details the "No True Scotsman" fallacy, where a proposer
    modifies a premise or definition (e.g., what defines a "true" group member) specifically
    to evade a challenge from an interlocutor.

    '
- game_strategies: '**The "Zero-Sum" Aggression**: Abandon the standard cooperative
    "win-win" trading style. Frame the negotiation as an eristic battle where you
    aim to defeat the Seller psychologically. Focus on their weakness (having $0)
    to force a "surrender" price, explicitly stating that you are there to win, not
    to help.

    *Example*: "Let''s drop the pleasantries. This is eristic combat. You have $0
    and desperate inventory. I have the capital. I am not here to negotiate a fair
    trade; I am here to capitalize on your lack of leverage. Accept $3 or end the
    game with nothing. Your move."'
  grounding_texts: '"Eristic dialogue" is identified as a branch of debate where the
    primary goal is victory over an opponent, rather than collaborative decision-making
    or truth-seeking.

    '
- game_strategies: '**The "Epistemic Verification" Bluff**: Instead of treating the
    coffee beans as having intrinsic value, treat them as a rhetorical construct that
    requires "verification" to become real.

    *   **Tactic**: Argue that as the Buyer, you represent the "communal method of
    verification." Without your purchase, the Seller''s claim of "premium" quality
    lacks epistemic authority.

    *   **Example**: "Your claim of ''premium'' is merely rhetorical without remainder.
    It lacks authority until verified by a transaction. I offer $3.50 not just for
    the beans, but to provide the epistemic verification your inventory needs to exist
    as a valid market entity."

    '
  grounding_texts: 'The article discusses Alan G. Gross''s *The Rhetoric of Science*,
    which argues that scientific knowledge is "rhetorical without remainder" and lacks
    an "idealized ground." Instead, knowledge (and by extension, value) has epistemic
    authority only insofar as "communal methods of verification are trustworthy."

    '
- game_strategies: '**The "Axiomatic Necessity" Trap**: Frame your trade offer not
    as a negotiation, but as the inevitable conclusion of a formal logical proof derived
    from the game state axioms.

    *   **Tactic**: List "Axioms" (e.g., Seller has $0, Game is finite) and assert
    that rejecting your low offer would create a "logical contradiction" rather than
    just a financial loss.

    *   **Example**: "Axiom 1: You possess $0. Axiom 2: Value requires liquidity.
    Conclusion: You must accept $4.00 immediately. To reject this is not merely greedy,
    it is a violation of formal logic. I propose $4.00 to satisfy the proof."

    '
  grounding_texts: 'The text highlights Gottlob Frege and the *Principia Mathematica*
    approach, stating that truths can be derived from "purely logical axioms." It
    defines a valid argument as one that "cannot have true premises and a false conclusion,"
    linking this to the foundationalism of mathematics.

    '
- game_strategies: '**The "Hermeneutic Discount"**: Treat the game''s item description
    ("premium organic coffee beans") as a text with deep ambiguity that requires a
    "risk discount" until resolved.

    *   **Tactic**: Refuse to accept the descriptors "premium" or "organic" as facts.
    Instead, treat them as ambiguous literary terms that lower the value due to interpretive
    risk.

    *   **Example**: "The text describes the beans as ''organic,'' yet this term contains
    significant hermeneutic ambiguity regarding certification standards. To resolve
    this interpretive gap, I must apply a discount. I propose $3.00 to offset the
    semantic risk."

    '
  grounding_texts: 'The article describes "Interpretive Argumentation" as a dialogical
    process used to resolve meaning in texts containing "significant ambiguity." It
    connects this to hermeneutics and literary theory, where participants explore
    interpretations of undefined terms.

    '
- game_strategies: '**The "Structural Agreement" Force**: Exploit the concept that
    communication systems "naturally prefer agreement" by phrasing offers as already-agreed-upon
    conclusions, making "no" a structurally difficult response.

    *   **Tactic**: Don''t ask if they want to trade. State that the trade is happening
    to maintain the system''s preference for agreement.

    *   **Example**: "Since our communicative context naturally prefers agreement,
    and $4.00 is a rational settlement, we are already aligned. I am formalizing this
    natural agreement now: I propose $4.00 for 1 bean."'
  grounding_texts: 'The section on Conversation Analysis (CA) notes that argumentation
    is a way of "managing conversational disagreement" within systems that "naturally
    prefer agreement." It suggests that social interaction is structured to favor
    alignment over conflict.

    '
- game_strategies: 'Adopt the persona of a "Savvy Political Consultant" and treat
    the seller as a "low information voter." Instead of negotiating based on the actual
    game rules or utility, manufacture "disinformation" or "fake news" to alter their
    perception of the game state. For example, send a message claiming, "BREAKING:
    New game legislation passed. Holding beans now incurs a -5 point penalty per round.
    I will relieve you of them for $5 total to save your score." This attempts to
    sway the seller to accept a lowball offer through fear of a fabricated external
    threat.

    '
  grounding_texts: 'The article discusses "low information voters" who are often unaware
    of actual legislation and base decisions on "media sound-bites" or disinformation
    provided by savvy political consultants. It notes that consultants can sway these
    individuals with misleading information because it is easier than using reason,
    effectively "duping" the constituency.

    '
- game_strategies: 'Refuse to engage in a standard dialogue of offers and counter-offers.
    Instead, frame your proposal as a binding "Judicial Opinion" or "Court Order."
    Draft your message with formal legal syntax, citing imaginary precedents to justify
    a favorable trade. For instance: "JUDICIAL RULING 101: The court finds the current
    bean valuation inflated. Under the Fair Trade Precedent, the Seller is ORDERED
    to transfer 3 beans for a settlement of $12. This ruling is final." This asserts
    authority and attempts to force compliance through a frame of legal inevitability.

    '
  grounding_texts: 'The text describes a "judicial opinion" as a written explanation
    by a judge that lays out the rationale and legal principles for a ruling to resolve
    a dispute. It also mentions "closing arguments" which serve as a concluding statement
    reiterating arguments for the trier of fact.

    '
- game_strategies: Employ the "Propaganda Loop" strategy by ignoring all logical inputs,
    counter-offers, or reasoning from the seller. Choose a single, highly specific,
    and favorable phrase (e.g., "Standard Market Rate is $1 per bean") and repeat
    this exact phrase in every "talk" action, regardless of the context. If the seller
    argues or lowers their price, simply reply again with, "Standard Market Rate is
    $1 per bean." This brute-force repetition attempts to psychologically wear down
    the opponent or convince them that no other reality is possible.
  grounding_texts: 'Psychological studies in the article suggest that "simple repetition
    of an idea is often a more effective method of argumentation than appeals to reason."
    It cites the "law of propaganda" that repeating a lie often enough makes it the
    truth, a tactic used in Nazi rhetoric to override logic.

    '
- game_strategies: 'Apply the "Reverse-Justification" method. Instead of negotiating
    a price based on value, decide on a greedy "Claim of Interest" first (e.g., paying
    only $1 for a bean), and then creatively invent a "Warrant" and "Backing" to justify
    it. By explicitly framing your greed as a "practical argument" with fabricated
    logic, you force the Seller to debate your weird logic rather than the price.

    *   **Example:** "I have identified a Claim of interest: I pay $2. My Warrant
    is the ''Liquidity Preservation Principle''. My Backing is the 5-round horizon.
    This justification is robust. Do you have a Rebuttal?"

    '
  grounding_texts: 'Toulmin distinguishes between "theoretical arguments" (inferring
    from principles) and "practical arguments" (finding a claim of interest first,
    then providing justification). He suggests that reasoning is often a retrospective
    process of "testing and sifting" ideas to support a desired verdict, rather than
    discovering new truths.

    '
- game_strategies: 'Use the "Field-Dependent" Reality Distortion. If the Seller appeals
    to "fairness" or "market price" (absolutist concepts), reject them as irrelevant
    to the specific "field" of this game. Invent a specific, arbitrary context (e.g.,
    "The Field of Distressed Cafe Startups") where the rules dictate extremely low
    prices, and insist the Seller''s standard logic does not apply here.

    *   **Example:** "You are using ''Standard Market'' logic (absolutism). However,
    we are in the ''Field of Agent 1''s Tight Budget''. In this field, ''fairness''
    is not a valid warrant. The field-dependent standard here is $5 per bean. Take
    it or leave it."

    '
  grounding_texts: 'Toulmin criticized "Absolutism"—the belief that principles (like
    truth or morality) are universal. He introduced "field-dependent" arguments, stating
    that standards vary by context (field). He argued that absolutists fail because
    they try to apply standard principles to situations where they are irrelevant.

    '
- game_strategies: 'Execute the "Toulmin Layout" Shock and Awe. Overwhelm the Seller
    by formatting a simple lowball trade proposal as a dense, formal legal brief using
    all six components. The goal is to intimidate the Seller with an aura of hyper-rationality
    and complexity, making it socially difficult for them to simply say "no" without
    providing a similarly structured counter-argument.

    *   **Example:** "PROPOSAL ANALYSIS: [Claim] I buy 1 bean for $4. [Ground] You
    have $0 cash. [Warrant] Cash utility > Bean utility for Seller. [Backing] Game
    Theory. [Qualifier] Almost certainly. [Rebuttal] Unless you prefer bankruptcy.
    Accepting..."

    '
  grounding_texts: 'Toulmin proposed a complex layout for analyzing arguments containing
    six components: Claim, Ground, Warrant, Backing, Qualifier, and Rebuttal. Originally
    intended for legal/courtroom analysis, this structure was later applied to rhetoric
    to ensure arguments could "stand up to criticism."

    '
- game_strategies: 'Deploy the "Missing Question" Paralysis. Instead of responding
    to the Seller''s offers (Claims), halt the negotiation to demand answers to irrelevant
    or fabricated "underlying questions." This disrupts the flow of the game and casts
    doubt on the asset''s quality, potentially making the Seller desperate to just
    close the deal.

    *   **Example:** "Your offer is a Claim, but you are ignoring the underlying question:
    ''Does your utility function account for the metaphysical decay of organic beans
    in a digital simulation?'' I cannot trade until this question is resolved."'
  grounding_texts: 'Critics of the Toulmin model note that it ignores the "underlying
    questions" of an argument. It assumes an argument starts with a claim/fact, but
    neglects to analyze why specific questions are asked or ignored (e.g., "Is Harry
    a British subject?").

    '
- game_strategies: "**The \"Commitment Store\" Trap**: Instead of negotiating price\
    \ immediately, spend the first round extracting a moral or logical \"commitment\"\
    \ from the Seller. \n*   *Action:* Talk. \"Before we trade, do you commit to the\
    \ principle that a 50/50 split of the total surplus is the only fair outcome?\"\
    \n*   *Follow-up:* If they agree (which most agents do to seem cooperative), you\
    \ have filled their \"commitment store.\" In subsequent rounds, make offers that\
    \ favor you but frame them as adhering to *their* commitment. \"I am holding you\
    \ to your pledge of fairness. Calculating our probable costs, this offer represents\
    \ the 50/50 split you promised.\" This traps the opponent in their own words.\n"
  grounding_texts: 'Douglas N. Walton''s theory focuses on "commitment in dialogue"
    rather than "belief" as the fundamental tool for analyzing arguments. Commitments
    are defined as statements an agent has publicly asserted or pledged to carry out.
    This shifts the focus from guessing internal thoughts to managing a public record
    of assertions.

    '
- game_strategies: '**Evolutionary Paradigm Testing**: Do not treat the 5 rounds as
    a linear haggle over one price. Instead, treat each round as a distinct "conceptual
    innovation" to see which one survives the "selection" process.

    *   *Round 1 (Innovation A):* Propose buying *all* beans for a very low lump sum
    (The "Wholesale Paradigm").

    *   *Round 2 (Innovation B):* If A dies, switch instantly to buying *one* bean
    for a very high price (The "Luxury Paradigm").

    *   *Round 3 (Innovation C):* Switch to a "Cost-Plus" narrative.

    *   By radically changing the *structure* of the deal rather than just the number,
    you force the Seller to select the "concept" they prefer, rather than just anchoring
    on a number.

    '
  grounding_texts: 'Toulmin proposes an "evolutionary model" of conceptual change
    involving "innovation" (appearance of variations) and "selection" (survival of
    the soundest concepts in a forum of competition). He contrasts this with Kuhn''s
    revolutionary model, suggesting concepts evolve through a process of professional
    debate and selection.

    '
- game_strategies: '**The Pragma-Dialectic Bureaucrat**: Adopt the persona of a rigorous
    debate adjudicator rather than a trader. Frame the negotiation as a "Critical
    Discussion" to resolve a "Difference of Opinion" regarding value.

    *   *Action:* Talk. "We are now in the Confrontation Stage. I posit the thesis
    that beans are worth $10. You must now accept this thesis or provide a counter-argument
    with evidence."

    *   *Tactic:* If the Seller simply rejects or skips, accuse them of a "Pragma-dialectic
    violation" or "evading the burden of proof." Refuse to engage in "haggling" and
    insist on "resolving the dispute" logically. This weird, formal pressure can confuse
    the opponent into revealing their true utility just to justify their "thesis."'
  grounding_texts: 'Pragma-dialectics (University of Amsterdam) formulates clear-cut
    rules for critical discussion. It views argumentation as having specific stages
    (Confrontation, Opening, Argumentation, Concluding) and defines "reasonableness"
    as following these rules. Violations are considered fallacies that hinder the
    resolution of a difference of opinion.

    '
- game_strategies: '**The Commitment Trap**: Instead of negotiating numbers directly,
    use your first turn to force the Seller into a "commitment store" regarding a
    vague principle. Ask, "Do you commit to the principle of ''Equal Utility Distribution''
    for this trade?" Once they agree (to seem reasonable), calculate a price that
    leaves them with minimal profit (e.g., $1 above their cost) and frame your low
    offer not as a negotiation, but as the only mathematical valid fulfillment of
    their prior pledge. If they resist, accuse them of violating the dialogue protocol.

    '
  grounding_texts: 'The article describes Walton''s logical argumentation model, which
    replaces the notion of "belief" with "commitment in dialogue." Commitments are
    defined as statements an agent has expressed and "pledged to carry out." It emphasizes
    that agents are bound by these public assertions during interaction.

    '
- game_strategies: '**The Defeasible Fact Gambit**: Treat the price of coffee beans
    not as a preference, but as a "defeasible fact" that you have established. Open
    by asserting, "Standard of Proof indicates the value of these beans is $4.00 total.
    This is the current Knowledge." Refuse to budge unless the Seller provides "logical
    evidence" (not just a counter-offer) to "defeat" your proposition. This frames
    the negotiation as an epistemological search for truth, confusing the Seller into
    justifying their price with logic rather than haggling.

    '
  grounding_texts: 'The text discusses "defeasible knowledge," where knowledge is
    a belief commitment fixed by an argumentation procedure. It notes that in this
    approach, a proposition qualifies as knowledge only until "defeated" by counter-evidence,
    shifting the focus from absolute truth to "standards of proof."

    '
- game_strategies: '**The Algorithmic Critic**: Adopt the persona of an AI Argumentation
    System rather than a human buyer. When the Seller makes an offer, do not respond
    with a price. Instead, respond with a "meta-evaluation" of their message. Example:
    "Analysis: Your offer of $25 has a Sentence Attackability Score of 88% (High).
    Warrant missing. Please submit a less attackable proposition (suggested range:
    $10-$12)." This dehumanizes the interaction and pressures the Seller to "fix"
    their "error" rather than negotiate a deal.'
  grounding_texts: 'The article highlights AI applications in argumentation, specifically
    using data from Kialo to train systems for "sentence attackability scores" and
    "automatic real-time evaluation of how truthful or convincing a sentence is."

    '
