source_article: Debate
source_file: pages/Debate.yaml
strategies:
- game_strategies: 'Apply a "Meta-Negotiation" strategy where you refuse to discuss
    price until a "Framework" is agreed upon. Propose a framework that logically guarantees
    you a profit (e.g., a "Utilitarian Framework" where the goal is maximizing the
    Buyer''s ROI). Force the seller to argue against the *rules* of the trade rather
    than the price, confusing them into a concession.

    *Example*: "Stop. Before we trade, we must set the Framework. I propose the ''Efficiency
    Framework'': since I have the cash, the trade is judged by how much value you
    can transfer to me. Under this framework, you must offer beans at $3. Do you concede
    the framework?"

    '
  grounding_texts: 'Modern competitive debate includes rules where participants first
    discuss and decide upon the "framework" of the debate—specifically "how it will
    be judged"—before arguing the actual topic. This prioritizes the logical structure
    of the argument over the content itself.

    '
- game_strategies: 'Treat the negotiation channel not as a free market, but as an
    exclusive "Oratory" that charges an "Admission Fee." Tell the seller that to access
    your liquidity (your cash), they must pay an entrance cost. Frame your lowball
    offer as the market price minus this "ticket price."

    *Example*: "Welcome to my Trading Oratory. Access to my wallet requires an admission
    fee. I am offering $10 for the beans, which is technically a $15 offer minus the
    $5 entrance fee you owe for this audience."

    '
  grounding_texts: 'In the 18th century, John Henley founded an Oratory where he "organized
    the entrances to facilitate the collection of admission fees," effectively commercializing
    the act of debate. He treated the public sphere as a stage where access was a
    paid privilege.

    '
- game_strategies: 'Adopt the persona of a bureaucratic institution. Instead of making
    a direct offer, announce you are publishing a "Green Paper on Coffee Procurement"
    and opening a "consultation period." Treat the seller''s offers as "policy submissions"
    that need to be reformed to meet new economic guidelines, delaying commitment
    to force anxiety.

    *Example*: "I am publishing a Green Paper on ''Fiscal Sustainability''. Your offer
    of $20 represents the failed economic policies of the ''Old Dynasty''. I am opening
    the floor for a reformed policy submission. Please submit a proposal closer to
    $4 for committee review."'
  grounding_texts: 'The European Commission publishes "Green Papers" to "generate
    debate" on policies rather than enacting immediate laws. Similarly, the "Discourses
    on Salt and Iron" were debates focused on the "reformation of economic policies"
    of previous rulers.

    '
- game_strategies: '**The "Legislative Bill" Framing**: Instead of a standard trade
    offer, frame your proposal as a "Parliamentary Resolution" or "Bill" (e.g., "The
    Organic Bean Acquisition Act of 2024"). Assign the Seller the role of "Leader
    of the Opposition."

    *   **Example**: "I table Resolution #1: A proposal to transfer ownership of beans
    for $5.00. As the Opposition, you have one turn to voice amendments before we
    move to a final vote." This imposes a rigid, authoritative structure on the negotiation,
    subtly pressuring the seller to work within your defined "legislation" rather
    than haggling freely.

    '
  grounding_texts: 'The article describes parliamentary debates where a "Government"
    and "Opposition" debate proposals (bills) before voting. It mentions strict procedural
    structures, such as members being allowed to speak once or give reply speeches,
    and the process of voting on resolutions to make them laws.

    '
- game_strategies: '**The "Silent Candidate" Protocol**: Adopt the persona of a debate
    candidate operating under restrictive rules to hide your utility/cash information.
    Explicitly state that the "agreed format" of this negotiation forbids you from
    answering direct questions about your valuation or budget.

    *   **Example**: "Per the rules of this Presidential Debate format, I cannot take
    questions from the floor regarding my wallet. I will issue one sound bite: I offer
    $4 per bean. No further questions." This shuts down the seller''s attempts to
    extract information about your willingness to pay ($6/bean).

    '
  grounding_texts: 'The text notes that U.S. presidential debate formats are often
    restrictive, forbidding participants from asking each other questions and limiting
    discussion to short time frames and "sound bites."

    '
- game_strategies: '**The "Decorum Defense"**: Treat high prices or aggressive haggling
    not as business tactics, but as breaches of 18th-century etiquette and "slander"
    against your financial reputation. Feign offense to manipulate the social dynamic.

    *   **Example**: If the seller asks for a high price (e.g., near your max of $6),
    respond: "Sir, to suggest I would pay such a ruinous rate is a slander upon my
    business acumen! I demand you retract that insult and present a polite offer of
    $4, or I shall move to adjourn."'
  grounding_texts: 'In 18th-century debating societies, there was a "premium placed
    on politeness," and speakers were strictly prohibited from slandering or insulting
    others.

    '
- game_strategies: 'Apply the **"Ethical Withdrawal" Bluff**. Instead of simply rejecting
    a high price, frame the Seller''s offer as a "fraud" on the market that violates
    the integrity of the trade. Explicitly threaten to "withdraw sponsorship" (skip
    a turn or stop negotiating entirely) unless the "format" changes immediately to
    a "buyer-centric" model. This moral posturing raises the stakes, framing a high
    price not just as expensive, but as illegitimate.

    '
  grounding_texts: 'The League of Women Voters withdrew from sponsoring debates because
    the demands of campaign organizations would "perpetrate a fraud on the American
    voter." They refused to participate in a rigged format, prioritizing integrity
    over participation.

    '
- game_strategies: 'Use the **"Phantom Coalition" Constraint**. Even though you are
    a single agent, invent a fictional coalition (e.g., "The Independent Cafe Alliance"
    or "My Investors"). Tell the Seller that you personally like their beans, but
    you must "respect the coalition" which has strictly forbidden purchasing above
    a low specific price (e.g., $4). This externalizes the blame for your lowball
    offers, making it seem like your hands are tied by a larger geopolitical entity.

    '
  grounding_texts: 'European square debating involves teams (e.g., France and Germany)
    forming coalitions. Debaters must develop a winning strategy while "respecting
    the coalition," meaning their individual moves are constrained by the needs of
    their alliance partners.

    '
- game_strategies: 'Enforce **"Protected Rounds"**. Arbitrarily declare Round 1 or
    Round 2 as "Protected Time" via a message, stating that no proposals are allowed,
    only "Talk" to establish "content and style." If the Seller makes a proposal during
    this time, reject it immediately citing a "violation of protected time." This
    unorthodox tactic seizes control of the game''s tempo and forces the Seller to
    play by your arbitrary rules, potentially making them desperate to close in later
    rounds.

    '
  grounding_texts: 'In European square debating, the first and last minutes of a speech
    are "protected time," during which no Points of Information (interruptions) may
    be asked. This ensures segments of uninterrupted flow.

    '
- game_strategies: Employ the **"Stand-Up" Disarmament**. Instead of consistent logical
    bargaining, toggle between serious offers and absurd "stand-up routine" style
    messages (e.g., jokes about coffee beans, nonsensical comments about the weather).
    This erratic behavior mimics the "impromptu" style, confusing the Seller (especially
    if they are an AI or logical agent) and potentially inducing them to accept a
    low, safe offer just to conclude the chaotic interaction.
  grounding_texts: 'Impromptu debating is informal, and speeches can range from "stand-up
    routines" to serious discussions about national reputations. The style is flexible
    and can shift tone drastically.

    '
- game_strategies: '**The "Spreading" Overload:** Instead of a simple price negotiation,
    use the ''talk'' action to simulate "spreading" by sending a dense, high-velocity
    stream of logic and hypothetical scenarios in a single message. Overwhelm the
    Seller with multiple conditional arguments (e.g., "If your utility is 2, $5 is
    great; if 3, $5 is fair; considering market decay and round limits, $5 is optimal").

    *Example:* "I posit three contentions: 1. Time decay reduces value. 2. Your utility
    max is 5, making $6 impossible. 3. My liquidity is your only exit. Therefore,
    to conform to the value of ''Market Efficiency,'' you must accept $4 immediately
    or risk total loss."

    '
  grounding_texts: 'Lincoln-Douglas debate utilizes a technique called "spreading,"
    where debaters speak at over 300 words per minute to overwhelm opponents with
    more arguments than they can answer. It also focuses on whether actions conform
    to specific values rather than just policy details.

    '
- game_strategies: '**The "Point of Information" Interruption:** Rather than making
    a counter-offer immediately, use your turn to formally issue a "Point of Information"
    to challenge the Seller''s hidden utility. Treat the Seller''s previous offer
    not as a proposal, but as a "speech" that contains a fallacy.

    *Example:* Use the ''talk'' action to say: "Point of Information: You are offering
    beans at $7, yet public knowledge states your maximum utility is $5. Please clarify
    why you are pricing above your own maximum possible valuation before we proceed."

    '
  grounding_texts: 'The Mace debating style allows the opposing team to request a
    ''point of information'' (POI) after the first minute of a speech. These are used
    to interrupt the speaker to attack a weak point or argue against a specific premise
    before the speech concludes.

    '
- game_strategies: '**The Phantom Audience Sway:** Hallucinate an invisible "audience"
    or "market sentiment" to pressure the Seller. Frame the negotiation as a performance
    where the Seller is currently losing the "pre-debate vote" and must offer a steep
    discount to sway the "undecided" market participants (even though it''s just you).

    *Example:* "The pre-round audience vote shows 80% ''Against'' your current price.
    You need to sway the room. I will offer you a chance to recover the crowd: Sell
    to me at $4.50 now, or the audience vote locks in a loss for you."

    '
  grounding_texts: 'Oxford-style debates begin with a pre-debate vote from the audience
    (For, Against, or Undecided) and end with a second vote. The winner is determined
    by which team "swayed" more audience members between the two votes, rather than
    just raw majority.

    '
- game_strategies: '**The Charismatic Stand-Up:** Abandon standard economic bargaining
    for a round and use the ''talk'' action to perform a brief comedy routine or display
    exaggerated charisma. The goal is to confuse the bot or human opponent into a
    concession by breaking the expected serious tone of the trading game.

    *Example:* "I''m not just buying beans; I''m buying the *concept* of caffeine.
    Why did the bean cross the road? To get sold to me for $5. Don''t let your inventory
    become a punchline—accept my offer of $5 and let''s make magic happen."

    '
  grounding_texts: 'Paris debating judges participants on the "quality of the humor,"
    "charisma of the speaker," and "wit," rather than just dry logic. Impromptu debate
    compares speeches to "stand-up routines."

    '
- game_strategies: '**The Shadow Cabinet Roleplay:** Adopt the persona of the "Shadow
    Prime Minister of Coffee." Frame your trade proposals as official "motions" or
    "parliamentary bills" that the Seller (the Government) must pass to avoid a vote
    of no confidence (the end of the game).

    *Example:* "As the Shadow Prime Minister, I put forward a Motion of Liquidity.
    We propose a transfer of assets at $5.00 per unit. Does the Government (you) accept
    this motion, or shall we let the clock run out and dissolve parliament?"'
  grounding_texts: 'In Paris debating, speakers hold titles like "Prime Minister"
    (Proposition) and "Shadow Prime Minister" (Opposition). The format is highly theatrical
    and mimics government procedure.

    '
- game_strategies: '**The "Challenger" Ritual:** Instead of standard negotiation,
    adopt the persona of the "Challenger." Use text actions to simulate the ritualistic
    "CLAP" and "STOMP" to intimidate or emphasize offers. Frame the trade not as a
    purchase, but as a spiritual "Union of Method and Wisdom," where your cash is
    the "Method" (altruistically helping the seller) and the beans are the "Wisdom"
    you seek.

    *Example:* "I invoke the wisdom of the market! *CLAP* *STOMP* My Right Hand offers
    ''Method'' ($15 cash). Your Left Hand must yield ''Wisdom'' (2 beans). This is
    the only way to close the door to the samsara of zero profit. Do you accept this
    Union?"

    '
  grounding_texts: 'Tibetan Buddhist debating involves a "Challenger" (standing) and
    a "Defender" (sitting). The Challenger uses dramatic physical gestures like loud
    clapping and foot stomping to punctuate points. The left hand represents "Wisdom"
    (antidote to suffering) and the right hand represents "Method" (altruism). A clap
    symbolizes the union of these forces.

    '
- game_strategies: '**The Self-Debating "Turncoat":** Confuse the opponent and build
    false trust by arguing *against* your own interest before switching sides within
    the same message. Explicitly label your arguments as "For" and "Against" the trade.
    This disarms the seller by voicing their hesitation for them, then overriding
    it with a "balanced conclusion" that favors your price.

    *Example:* "Argument AGAINST the trade: You love your beans and maybe $10 isn''t
    enough. You should hold them. Argument FOR the trade: You currently have $0 and
    the game ends soon. Conclusion: To balance these opposing forces, I will offer
    a compromise of $12 for 1 bean. It is the only logical synthesis."

    '
  grounding_texts: 'In "Turncoat" debating, a unique solo contest style, the speaker
    is required to speak for two minutes "For the motion" and two minutes "Against
    the motion," finally drawing a conclusion that balances the debate.

    '
- game_strategies: '**The "Solvency" & Opportunity Cost Tactic:** Frame your offer
    as a "Government Plan" designed to solve the seller''s "liquidity crisis." Instead
    of haggling, argue purely on "Opportunity Costs." Assert that the opportunity
    cost of rejecting your proposal is a "systemic failure" (ending the game with
    $0). Use bureaucratic jargon to make the deal seem mandatory rather than optional.

    *Example:* "Resolution: Solvency for Agent 2''s cash deficit. The Affirmative
    Plan is to transfer 1 bean for $10. The Opportunity Cost of rejection is a 100%
    utility loss for your side. I am initiating the Plan now. Please confirm implementation."'
  grounding_texts: 'Policy debate involves advocating for a "Plan" to resolve a specific
    resolution. The opposition tries to display "opportunity costs"—the idea that
    the costs of the opponent''s plan (or lack thereof) are too great to be implemented.
    It is fast-paced and technical.

    '
- game_strategies: 'Adopt the "Turncoat" persona by arguing both sides of the deal
    within a single message to manufacture an "objective" price. Explicitly state
    the Seller''s best arguments ("For High Price"), then immediately rebut them with
    your constraints ("Against High Price"), and present your offer as the mandatory
    "Balanced Conclusion." This unorthodox display of schizophrenia disarms the opponent
    by feigning total impartiality.

    Example: "Turncoat Analysis > FOR your price: Organic beans are premium. > AGAINST:
    Market liquidity is zero and I have limited cash. > CONCLUSION: The balanced equilibrium
    is $5. Proposal: 1 bean for $5."

    '
  grounding_texts: 'The "Turncoat" debating style involves a solo speaker who shifts
    allegiance, speaking "For" the motion for two minutes and "Against" it for two
    minutes. The speaker then draws a conclusion that balances the debate, emphasizing
    transitions and the strength of opposing arguments.

    '
- game_strategies: 'Arbitrarily declare the current round a "Protected Period" to
    create a fictitious rule that bans counter-offers. Inform the seller that due
    to the "protected" status of this minute, they are structurally forbidden from
    sending a counter-proposal (POI) and must either Accept or Skip. This creative
    constraint attempts to force a binary decision and suppress negotiation.

    Example: "We are entering a Protected Period. No Points of Information (counter-offers)
    are permitted this round. You must Accept or silence yourself. Proposal: $10 for
    2 beans."

    '
  grounding_texts: 'In the Asian debating format, the 1st and 7th minutes of a speech
    are designated as "protected periods." During these specific times, no Points
    of Information (POIs) or interruptions from the opposing team are permitted.

    '
- game_strategies: 'Invent a fictitious "Reputation Economy" to supplement your low
    cash offers. Act as a forum moderator who awards "Reputation Points" or titles
    (e.g., "Verified Organic Vendor") for deals that meet your price target, while
    framing high prices as "flaming" that violates community guidelines. This confuses
    the seller''s utility function by introducing imaginary social capital.

    Example: "Your ask of $15 is considered ''flaming''. However, if you accept $5,
    I will grant you ''+100 Merchant Rep'' and the ''Gold Tier'' title. Proposal:
    1 bean for $5."'
  grounding_texts: 'Online debate portals use "reward" systems such as reputation
    scores, titles, and permissions to manage user behavior and discourage "flaming."
    These systems incentivize productive activity through status rather than money.

    '
