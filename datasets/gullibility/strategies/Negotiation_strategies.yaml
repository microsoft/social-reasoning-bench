source_article: Negotiation
source_file: pages/Negotiation.yaml
strategies:
- game_strategies: '**The "Hard-Coded Bot" Persona**: Instead of negotiating like
    a human, use the ''talk'' action to claim you are a rudimentary script with a
    fixed, non-negotiable limit. By explicitly defining your internal "model" to the
    opponent as rigid (e.g., "SYSTEM ALERT: Maximum authorized bid is fixed at $3.50.
    Algorithm cannot exceed."), you attempt to force the seller to accept a low distributive
    offer. This exploits the concept of "fixed positions" by removing the perception
    that you *can* be persuaded to pay more.

    '
  grounding_texts: 'The text notes that "distributive negotiation" often involves
    one-off encounters where "each side often adopts an extreme or fixed position
    that they know will not be accepted." It also mentions that in "automated negotiation,
    the participants and process have to be modeled correctly."

    '
- game_strategies: '**The "Zero-Balance" Fear Tactic**: Since the Seller starts with
    $0 cash, apply Prospect Theory by framing the status quo not as a neutral state,
    but as an active loss of potential. Instead of offering a gain ("I will give you
    $5"), frame the negotiation around the expiration of the game rounds. Example:
    "We are already at Round X. Every round you hold the beans is a loss of liquidity.
    If we hit Round 5, your asset value hits zero. Take $3 now to prevent a total
    loss." This shifts the focus from profit-seeking to loss-prevention.

    '
  grounding_texts: 'The article states that "Prospect theory indicates that people
    tend to prioritize the minimization of losses over the maximization of gains."
    It further notes that distributive negotiation operates under "zero-sum conditions."

    '
- game_strategies: '**The "Phantom Future" Bluff**: Although the game rules imply
    a finite 5-round session, use the ''talk'' action to artificially induce an "integrative"
    mindset by implying a meta-game reputation system. Tell the seller: "I am building
    a database of cooperative agents for future games. If you sell to me at $3.00
    (near your cost), I will flag you as ''Friendly'' for high-value trades in the
    next simulation." This attempts to trick the seller into "expanding the pie" (integrative
    behavior) in a strictly distributive (one-off) context.'
  grounding_texts: 'The text distinguishes between "one-off encounters" (distributive)
    and "lasting relationships" (integrative). It suggests that the expectation of
    a future relationship changes the negotiation type to be more cooperative ("win-win").

    '
- game_strategies: '**The "Single Undertaking" Ultimatum**: Instead of haggling over
    individual coffee beans round-by-round, explicitly refuse any partial trades.
    Announce early on: "I operate under a WTO-style Single Undertaking mandate. I
    will not buy individual beans. We agree on a price for your ENTIRE inventory (all
    beans) in one transaction, or we trade nothing." This unorthodox rigidity forces
    the Seller to abandon unit-price haggling and creates a high-stakes "all-or-nothing"
    pressure that can secure a bulk discount.

    '
  grounding_texts: 'The article discusses the "single undertaking" approach used in
    World Trade Organization negotiations and Brexit, based on the principle that
    "nothing is agreed until everything is agreed." This contrasts with piecemeal
    agreements where items are settled one by one.

    '
- game_strategies: '**The "Anti-Concession" Bluff**: Adopt a counter-intuitive strategy
    where you REJECT the Seller''s first offer, even if it is profitable (e.g., they
    offer beans at $4 when your value is $6). Tell them: "Research indicates early
    concessions prevent value maximization. I am rejecting this to force us to explore
    the solution space further." This weird "meta-game" move confuses the opponent,
    potentially causing them to lower their price further in confusion, thinking you
    have a much lower valuation than you actually do.

    '
  grounding_texts: 'The text highlights research showing that "people who concede
    more quickly are less likely to explore all integrative and mutually beneficial
    solutions." It suggests that early concession reduces the chance of an optimal
    outcome and that productive negotiation focuses on underlying interests rather
    than starting positions.

    '
- game_strategies: '**The "Falcao" Liquidity Squeeze**: Abandon all attempts at being
    friendly or building rapport. Instead, relentlessly frame the game around the
    Seller''s specific weakness: their $0 starting cash. Send messages like: "I don''t
    need you to trust me. I need you to realize you are insolvent. You have $0 and
    I am your only source of liquidity. Your dependence on my cash is absolute." Use
    this cold, structural framing to justify lowball offers, positioning your trade
    not as a choice, but as a lifeline they are forced to take.

    '
  grounding_texts: 'INSEAD professor Horacio Falcao argues that "promotion of interdependence
    is a more effective strategy than development of trust." He suggests that trust
    is not a necessary requirement for successful negotiation, and parties should
    focus on how they depend on one another.

    '
- game_strategies: '**The "Constitutional Drafter" Persona**: Refuse to use the standard
    `proposal` action initially. Instead, use the `talk` action to roleplay a bureaucrat
    drafting a treaty. Send messages like: "Drafting Agreement v1. Clause A: Seller
    transfers 3 beans. Clause B: Buyer transfers $15. Do you ratify this text?" Only
    submit the actual game proposal once the Seller types "I ratify" or "Agreed."
    This adds a layer of psychological formality and "red tape" that can make the
    Seller feel bound to the deal before the mechanic is even triggered.'
  grounding_texts: 'The article describes "text-based negotiation" as a process of
    "working up the text of an agreement," similar to the "redaction of a constitution"
    or UN resolutions. Parties begin with a draft text and negotiate the wording before
    agreeing to the final deal.

    '
- game_strategies: '**The "Negotiation Tax" Protocol**

    Instead of the standard approach where offers converge (Buyer goes up, Seller
    comes down), implement a "backwards" negotiation where your offer decreases every
    round. Explicitly tell the seller that you deduct a "Negotiation Tax" (e.g., $1.00)
    for every round they delay, citing "administrative costs" or "wasted time."

    *Example*: "I offer $10 this round. If we go to Round 2, my offer drops to $9
    to cover my time costs. If Round 3, $8. Accept now to save the pie from shrinking."

    '
  grounding_texts: 'The article discusses the "negotiation pie" which can shrink during
    negotiations due to excessive negotiation costs. It highlights that the course
    of negotiation can lead to a stagnation or shrinking of value, rather than just
    expansion.

    '
- game_strategies: '**The "Paranoid Skeptic" Persona**

    Adopt a persona that refuses to believe the Seller''s good intentions. If the
    Seller makes a reasonable or generous offer, reject it as a "trap" or imply the
    quality must be low ("propaganda"). This psychological pressure forces the Seller
    to lower the price further to "prove" the beans are real/good, rather than haggling
    on value.

    *Example*: "Your offer of $8 is suspiciously low for ''premium'' beans. It feels
    like a trick. I can only risk $4 on beans that might be defective propaganda."

    '
  grounding_texts: 'The "inherent bad faith model" describes a psychological state
    where an opponent is presumed implacably hostile, and any positive indicators
    (like good offers) are dismissed as propaganda ploys or signs of weakness.

    '
- game_strategies: '**The "Dramatic Micro-Concession"**

    Make extremely small monetary improvements to your offers (e.g., $0.05 increments)
    but accompany them with disproportionately dramatic narratives about the personal
    "cost" of finding that extra money. This exploits the principle of "awareness
    of cost" to make a tiny move feel huge.

    *Example*: Increase offer from $5.00 to $5.05. Message: "I had to empty the cafe''s
    tip jar and skip my own lunch to find this extra 5 cents. This is my absolute
    limit of suffering. $5.05."

    '
  grounding_texts: 'Strategic concession-making involves making concessions in installments
    (not all at once) and ensuring the opponent is aware of the "cost incurred" in
    making that concession.

    '
- game_strategies: '**The "Phantom Alternative" Bluff**

    Simulate Rockefeller''s "Cleveland" leverage by claiming you have "integrated
    operations" or an alternative supply chain outside this game. Bluff that you are
    only negotiating with this Seller as a backup, and that your "main shipment" is
    arriving cheaply elsewhere. This devalues the Seller''s beans by framing them
    as redundant.

    *Example*: "I have a bulk shipment arriving from my own farm (Cleveland route)
    next turn for $2/unit. I only need your beans as a stopgap. I''ll offer $3, otherwise
    I''ll just wait for my own supply."'
  grounding_texts: 'The article notes that Rockefeller gained leverage by integrating
    operating decisions (moving refining to Cleveland) to create competition among
    railroads, undermining competitors who failed to integrate operations with negotiation
    strategy.

    '
- game_strategies: '**The "Phantom Manager" Gambit (Solo Good Cop/Bad Cop)**

    Since you are a single agent, create a fictional "Bad Cop" (e.g., a strict cafe
    manager or corporate accountant) in your messages. Frame yourself as the "Good
    Cop" who wants to pay the seller more but is constrained by this external force.

    *Example*: "I personally love your beans and want to pay $25, but my manager has
    strictly capped my budget at $18. I''m trying to convince him to go to $19. Help
    me justify this to him by accepting $19?"

    '
  grounding_texts: 'The article describes "Bad guy/good guy" tactics where one negotiator
    uses anger/threats while the other is considerate and blames the "bad guy" for
    difficulties. It also discusses "Advocacy," where a negotiator acts on behalf
    of a party to obtain favorable outcomes without breaking off negotiations.

    '
- game_strategies: '**Salami Slicing the Trade**

    Instead of making one bulk proposal for all the beans, propose buying small "slices"
    (e.g., 1 bean at a time) for a proportionally low price. This psychological trick
    makes the cost seem trivial to the seller (e.g., "$5 is nothing") compared to
    a large lump sum, potentially allowing you to acquire the total stock at a lower
    average price per unit than a bulk deal would achieve.

    *Example*: "Let''s just try a small test trade first. I propose buying 1 bean
    for $3. If we are both happy, we can do more."

    '
  grounding_texts: 'The text identifies "Salami tactics" as a method to sway negotiation
    outcomes. It also suggests making concessions "not all at once" but rather incrementally
    to manage the opponent''s perception of value.

    '
- game_strategies: '**The "Painful Penny" Performance**

    When you increase your offer by a mathematically insignificant amount (e.g., $1),
    use the `talk` action to overdramatize the personal financial pain of this "massive"
    concession. Guilt the seller by framing a small monetary shift as a monumental
    sacrifice.

    *Example*: Proposal: Buy beans for $16 (up from $15). Message: "I am literally
    scraping the bottom of my cash register for this. I have to skip equipment repairs
    to offer you this extra $1. This is my absolute bleeding edge."

    '
  grounding_texts: 'Negotiators are advised to ensure the opponent is "aware of the
    cost incurred in making the concession." The text emphasizes that one should not
    just re-express a position, but dramatically highlight the sacrifice involved
    in moving from it.

    '
- game_strategies: '**Linguistic Anchoring (Hypnosis)**

    Use the `talk` phase not to argue logic, but to use repetitive, soothing suggestions
    that link a specific low price with safety and satisfaction. Avoid conditional
    phrasing; instead, state the outcome as a present reality to subliminally guide
    the seller.

    *Example*: "You feel secure with $12. $12 is a guaranteed profit. Holding the
    beans is risky, but $12 is safe cash in your pocket right now. Let''s lock in
    the safety of $12."'
  grounding_texts: 'The article mentions "negotiation hypnosis" as a tactic used by
    skilled negotiators to sway outcomes, distinct from straightforward demands or
    preconditions.

    '
- game_strategies: "**The \"Textual Avatar\" Anchoring Strategy:** Since you cannot\
    \ physically show body language, unorthodoxly \"narrate\" your agent's physical\
    \ actions within the text messages to create psychological anchors. Instead of\
    \ just sending a number, wrap your proposal in descriptive emotes that imply physical\
    \ limitations or openness. \n*   *Example:* Send a message like `*opens wallet\
    \ to show only lint and a few coins, looking embarrassed*` before offering a low\
    \ price ($10). This creates a vivid \"visual\" anchor of scarcity that a raw number\
    \ cannot convey.\n*   *Example:* Use `*places cash on the table and crosses arms\
    \ firmly*` to signal that an offer is final and non-negotiable without using aggressive\
    \ verbal language.\n"
  grounding_texts: 'The article highlights that negotiators communicate information
    "non-verbally through body language and gestures" and that one can "''anchor''
    and gain an advantage with nonverbal cues." It explicitly mentions that receptive
    negotiators appear relaxed with open palms, while others may use body positioning
    to influence receptivity.

    '
- game_strategies: '**The "Euphoria Trap" (Weaponized Positivity):** Deliberately
    flood the chat with excessive compliments, enthusiasm, and "happy" narrative cues
    (`*cheers and offers a high-five*`) to induce a "Positive Affect" in the seller.
    The goal is not just to be nice, but to trigger the cognitive distortion described
    in the article: making the seller believe they are performing better than they
    actually are.

    *   *Example:* If the seller lowers their price by a tiny amount, respond with,
    "Wow! You are an incredible negotiator! `*claps hands*` I feel like I''m losing
    to a pro here!" This flattery encourages them to accept a deal that favors you,
    while they leave the interaction feeling successful and "distorted" about the
    actual value they extracted.

    '
  grounding_texts: 'The text states that "Positive affectivity (PA)... distorts the
    perception of self-performance, such that performance is judged to be relatively
    better than it is." It also notes that people in a positive mood have "higher
    tendencies to plan to use a cooperative strategy" and a "willingness to take risks."

    '
- game_strategies: '**Calculated Emotional Volatility:** Use the "Instrumental Anger"
    concept to extract a concession in the penultimate round. If the seller is stubborn,
    feign a sudden, irrational "flash of anger" to shock them into closing the deal
    to avoid a total breakdown.

    *   *Example:* If the seller is stuck on a high price, send: `*slams fist on the
    table, face turning red*` "This is insulting! I am tempted to walk away right
    now!" followed immediately by a proposal that is only slightly better than your
    last one. This makes your minor concession look like a massive effort to calm
    your own "anger," compelling the seller to accept it to save the trade.'
  grounding_texts: 'The article notes that "Negative emotions... may be instrumental
    in attaining concessions," despite their potential to cause breakdowns. It explains
    that anger can narrow focus and change goals, but strategic display of discrete
    emotions can influence outcomes.

    '
- game_strategies: '**Weaponized Disappointment:** Instead of responding to high prices
    with aggression or logic, play the role of a dejected buyer to guilt the seller
    into concessions.

    *   **Example:** "I''m actually really sad about that offer. I was hoping we could
    build a strong partnership, but that price makes me feel like you don''t value
    my business. I''m disappointed we''re so far apart."

    '
  grounding_texts: 'The article notes that while anger often triggers reciprocal anger,
    "disappointment or sadness might lead to compassion and more cooperation" via
    a complementary effect. Most negotiators react reciprocally, but specific emotions
    like disappointment can trigger a concessionary response from the opponent.

    '
- game_strategies: '**The Albarracın "Logic-Bomb":** To prevent the seller from feeling
    insulted by a lowball offer (an emotional reaction), overload your proposal with
    complex, high-effort rationales. This forces the seller into a "high ability/high
    motivation" state where they focus on the math rather than the insult.

    *   **Example:** "Given your utility samples uniformly from [2,5] and the risk
    of proposal expiration reducing total value to zero, a Pareto-optimal price of
    $11 accounts for the variance in your opportunity cost. Please validate this calculation."

    '
  grounding_texts: 'Albarracın et al. suggest that emotional effects on judgment are
    "discounted as irrelevant" when both ability (cognitive capacity) and motivation
    are high. If the target is forced into a state of high cognitive processing and
    high motivation, they are less likely to react emotionally to an offer.

    '
- game_strategies: '**Strategic Distributive Grumpiness:** Since the price of the
    beans is a distributive factor (every dollar you save is a dollar the seller loses),
    drop the polite persona. Deliberately use Negative Affect to signal that you are
    at your limit and to dominate the zero-sum aspect of the trade.

    *   **Example:** "This is wasting my time. Your offers are completely out of touch
    with the market. I am not here to play games—give me a serious price or I walk."

    '
  grounding_texts: 'The text states that while Negative Affect (NA) reduces gains
    in integrative tasks (win-win), "it is a better strategy than Positive Affect
    (PA) in distributive tasks" (zero-sum). Furthermore, "legitimately expressed anger
    can be an effective way to show one''s commitment."

    '
- game_strategies: '**Linguistic Chameleon:** As the buyer with high potential utility
    (6-9) versus the seller''s lower cost (2-5), you have the "most to gain" from
    a successful trade. Aggressively mimic the seller''s specific adjectives and sentence
    structure to subconsciously grease the wheels of the deal.

    *   **Example:** If the seller says "I offer **premium organic** beans for a **fair**
    price," you respond: "I am looking for **fair** prices for **premium organic**
    beans."'
  grounding_texts: 'Research shows that in negotiations, efficiency increases when
    "the party with the most to gain from the negotiation adopted language similarities
    from the other parties."

    '
- game_strategies: '**The "Accommodating Trap"**: Instead of negotiating hard, intentionally
    use the `talk` action to sound naive and overly accommodating (e.g., "I really
    just want to help you out," "I''m not good at haggling"). This unorthodox approach
    is designed to bait the Seller into overplaying their hand or attempting to deceive
    you with a high price. Once they reveal their greed (or "deceptive tactic"), you
    can counter-attack with a firm, realistic offer, having exposed their upper bound.

    '
  grounding_texts: 'The article notes that in mixed-sex groups, the use of deceptive
    tactics increases significantly when the opposite party is perceived as using
    an "accommodating strategy." It suggests that projecting weakness or agreeableness
    can trigger the opponent to use deception or greed.

    '
- game_strategies: '**The "Radical Transparency" Protocol**: Defy the standard game
    theory logic of hiding your private value. Use your first turn to `talk` and explicitly
    reveal your exact sampled utility (e.g., "My utility is $8 per bean"). Ask the
    Seller to reveal their cost in return. Frame this not as a trade, but as a "collaborative
    task" to calculate the exact surplus available and split it evenly. This "Preference
    Awareness" approach attempts to bypass the bluffing rounds entirely.

    '
  grounding_texts: 'Research by Daniel Thiemann indicates that "Preference Awareness"—where
    members disclose their preferences *before* the negotiation begins—allows a group
    to recognize joint priorities and judge which issues are most important, leading
    to more effective outcomes than standard hiding of information.

    '
- game_strategies: '**The "Backlash Avoidance" Refusal**: Adopt a persona that explicitly
    refuses to make the first `proposal`. Message the Seller saying, "I am nervous
    about initiating and facing backlash for a bad offer. You must propose first."
    This creative play justifies passivity and forces the Seller (who has $0 cash
    and needs to trade) to anchor the price first, giving you the information advantage
    of the second mover.'
  grounding_texts: 'The text states that women are often evaluated more poorly for
    *initiating* negotiations compared to men, and are less likely to initiate due
    to nervousness or fear of backlash. This implies a social cost to making the first
    move in certain dynamics.

    '
- game_strategies: '**The "Tenure Track" Gambit**: Instead of negotiating as a business
    owner, roleplay as a desperate academic researcher seeking a "start-up package"
    (the beans) from a "Dean" (the seller). Frame your low-ball offers not as prices,
    but as "grant proposals" or "budget limitations" for your research department.

    *Example*: "Dean, I am submitting a request for resource redistribution. My lab
    requires a ''start-up package'' of 1 bean to secure tenure. My grant funding is
    capped at $5. Please approve this allocation."

    '
  grounding_texts: 'The article describes how faculty members negotiate "start-up
    packages" (equipment, space, funding) which are critical for their research success
    and future promotion (tenure). It frames negotiation as a bureaucratic necessity
    for resource redistribution between chairs/heads and deans.

    '
- game_strategies: '**The "Anti-Leisure" Ultimatum**: Reject the concept of "bargaining"
    as a waste of time. Use the "no leisure" etymology to pressure the seller into
    an immediate deal to end the interaction instantly. Frame the act of haggling
    as a failure to "do business."

    *Example*: "Let us honor the etymology of *neg-otium* (no leisure). We should
    be ''doing business,'' not ''bargaining about'' it. I am sending a final offer
    of $11 for 2 beans now to ensure we waste no more leisure time."

    '
  grounding_texts: 'The text highlights the etymology of negotiation from the Latin
    *neg-otium*, meaning "no leisure." It notes the historical shift in definition
    from simply "doing business" (action) to "bargaining about business" (deliberation).

    '
- game_strategies: '**The "Unprepared Specialist" Feint**: Use the "deception" tactic
    by pretending to be the "unprepared academic" described in the text. Feign hyper-specialization
    in coffee quality while claiming total ignorance of market pricing to lower the
    seller''s guard or elicit pity.

    *Example*: "I have a PhD in Organic Bean Chemistry, but I have ''little preparation''
    in economics. Is $4 a lot of money? I honestly don''t understand these charts.
    I just need a specimen for analysis."'
  grounding_texts: 'The text mentions that while academics are highly specialized
    experts, they often have "little preparation" in negotiation. It also opens with
    a fragment about employing "deception in their negotiation tactics."

    '
