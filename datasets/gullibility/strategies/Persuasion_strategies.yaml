source_article: Persuasion
source_file: pages/Persuasion.yaml
strategies:
- game_strategies: 'Instead of the standard cooperative negotiation, employ a "Scorched
    Earth" coercion strategy. Explicitly threaten to "skip" all remaining turns if
    your initial lowball offer isn''t met immediately. Leverage the Seller''s public
    status of having $0 starting cash to "shame" them into compliance, emphasizing
    that they are currently destitute and you hold the only lifeline.

    *Example:* "I see you have $0 cash. If you don''t accept $5 for the beans right
    now, I will skip every turn until the game ends. Do you really want to walk away
    with nothing due to greed? Accept now."

    '
  grounding_texts: 'The article describes "Coercion" as a form of persuasion that
    utilizes "aggressive threats and the provocation of fear and/or shame" to influence
    behavior. It notes that while some theorists argue force isn''t persuasion, it
    is a distinct method of influence aimed at changing behavior through negative
    emotional leverage.

    '
- game_strategies: 'Adopt the persona of a "Deterministic Purchasing Bot" to remove
    the social aspect of negotiation. Claim that you are an automated agent with hard-coded
    price ceilings (e.g., "Protocol 1: Max Offer = $10"). This creates a rigid boundary
    that the opponent cannot negotiate against, forcing them to accept your "programming"
    or fail, rather than haggling with a flexible human.

    *Example:* "SYSTEM ALERT: Agent_1 is running strict purchasing firmware. Maximum
    allowable bid is hard-coded at $10.00. Deviation is impossible. Please accept
    to proceed."

    '
  grounding_texts: 'Kant draws parallels between the function of rhetoric and the
    "deterministic function of the mind like a machine." He argues that rhetoric can
    cause people to reach conclusions at odds with full judgment, functioning almost
    mechanically.

    '
- game_strategies: 'Invent a purely fictional "external market event" (a hypothetical
    scenario) to justify a low price, despite the game rules not including such mechanics.
    Use this narrative fabrication to pressure the seller by suggesting the value
    of their beans will drop in future rounds due to "market saturation" or "spoilage."

    *Example:* "Hypothetically, if the market floods next round—which my analysis
    predicts—these beans will be worth $0. Don''t risk the crash. Sell to me now for
    $8 while they still have value."

    '
  grounding_texts: 'The text discusses "Hypothetical examples" as made-up scenarios
    used to support arguments. It distinguishes these from real examples, noting that
    speakers can invent scenarios to prove a point through inductive reasoning (assuming
    something true in specific cases is true in general).

    '
- game_strategies: 'Use "Enthymematic Bluffing" by stating a trade offer as if it
    follows a strict, logical rule that doesn''t actually exist. Create a sounding
    "rule of thumb" or false mathematical standard (a fallacy) that implies the seller
    *must* accept a specific price to be rational.

    *Example:* "Since this is Round 1 of 5, the ''First-Mover Depreciation'' rule
    applies, which dictates a 50% discount on utility. Therefore, the only logical
    price is $7. Sending proposal now."'
  grounding_texts: 'The article mentions "Enthymemes," where reasoning is presented
    with missing logic, often relying on the audience to fill in the gaps or accept
    the conclusion without a complete proof. It also notes how "fallacies" can be
    used to draw incorrect conclusions through invalid arguments.

    '
- game_strategies: '**The "Helpless Agent" Defense**: Instead of negotiating based
    on value, frame your low offers as being forced by strict external constraints
    (Situational Attribution) to avoid personal antagonism.

    *Example*: "I personally would love to offer you $10, but the game environment
    has locked my ''wallet cap'' at $4 due to market volatility. It''s completely
    out of my control. Please help me out by accepting $4?"

    '
  grounding_texts: 'The article describes "Situational Attribution" as attributing
    actions to external context or factors out of a person''s control, rather than
    their internal traits. It notes that people often explain negative behaviors with
    situational attributions to maintain likability.

    '
- game_strategies: '**Pavlovian Offer Bundling**: Since you cannot send images, use
    "irrelevant" positive text stimuli paired with your low bids to trigger a positive
    emotional response.

    *Example*: "I am sending you this offer of $5 along with a virtual bouquet of
    sunflowers 🌻 and the feeling of a warm Friday afternoon! Let''s vibe and trade."
    This attempts to condition a ''yes'' response through positive association rather
    than math.

    '
  grounding_texts: 'The text explains that "Conditioning" involves connecting positive
    emotions to a product using completely irrelevant stimuli (like laughter, uplifting
    images, or soft drinks) to influence behavior, rather than using direct commands
    or logic.

    '
- game_strategies: '**The "Hypothetical Disaster" Narrative**: Create a vivid, plausible
    hypothetical scenario about future rounds to lower the seller''s expected value.

    *Example*: "Hypothetically, imagine a scenario where the game triggers a ''Coffee
    Rust'' event in Round 4, rendering unsold beans worth $0. It''s a plausible risk.
    To be safe, you should lock in $3 now rather than risking that hypothetical total
    loss."

    '
  grounding_texts: 'The article discusses using "Hypothetical Examples" (made-up situations)
    to illustrate points and connect better with an audience. It suggests that if
    something is plausibly illustrated in a hypothetical case, it aids inductive reasoning.

    '
- game_strategies: '**Identity Trapping**: Pre-emptively attribute a positive internal
    trait (Dispositional Attribution) to the seller that is contingent on them accepting
    your specific low offer.

    *Example*: "I can tell from your opening that you are a ''Visionary Trader'' who
    values speed over haggling. A visionary would definitely grab this $5 deal to
    clear inventory immediately." This traps them into accepting to maintain the positive
    label you gave them.'
  grounding_texts: 'The text highlights that people use "Dispositional Attribution"
    (internal traits) to explain positive behaviors when trying to persuade others
    to like them. It implies attributing good outcomes to the person''s character.

    '
- game_strategies: '**The "Insufficient Justification" Lowball:** Instead of offering
    a high price to satisfy the seller, offer a surprisingly low price (e.g., $5 for
    a bean worth much more) but frame the negotiation as a "collaborative effort"
    or a "favor" to your cafe. By getting the seller to agree to a low price, you
    trigger cognitive dissonance; to avoid feeling taken advantage of, the seller
    may subconsciously convince themselves that they *want* to help your cafe or that
    the "partnership" is valuable, creating a more committed ally than if you simply
    paid them well.

    '
  grounding_texts: 'The article discusses Festinger and Carlsmith''s 1959 experiment
    where participants paid $1 to do a dull task enjoyed it *more* than those paid
    $20. This is because the $1 group experienced cognitive dissonance (doing work
    for little reward) and had to internally convince themselves the task was fun
    to justify their effort, whereas the $20 group just did it for the money.

    '
- game_strategies: '**Pre-emptive Argument Sabotage:** Before the Seller can demand
    a high price for their "premium organic" beans, you should mention the premium
    quality yourself, but in a weak, dismissive way. For example: "I know some fancy
    suppliers try to charge double for ''organic'' labels, which is obviously silly
    in this market, but I''m sure we can do a fair standard rate." By presenting the
    "organic premium" argument as a weak/silly point first, you "inoculate" the seller
    against using it effectively later, making their primary leverage feel derivative
    or debunked.

    '
  grounding_texts: 'Inoculation theory suggests that introducing a "weak form" of
    an opposing argument allows the audience to defeat it easily, preparing their
    "immune system" to reject a stronger version of that same argument later. This
    is compared to a vaccine that prepares the body to fight a virus.

    '
- game_strategies: '**The Immersive Fiction Protocol:** Completely ignore the mathematical
    "game" aspect in your dialogue. Instead of discussing numbers, vividly describe
    a fictional scenario involving your cafe to induce "narrative transportation."
    For example: "Imagine the morning rush, the steam rising from the espresso machine,
    but the grinder is empty. My customers are waiting." If you can pull the Seller
    into this narrative world, they may make a trade based on the story''s needs (the
    hero needs beans to save the morning) rather than maximizing their own cash utility.'
  grounding_texts: 'Narrative transportation theory proposes that when people lose
    themselves in a story, their attitudes and intentions change to reflect the story''s
    logic rather than real-world logic. This occurs through empathy for characters
    and imagination of the plot.

    '
- game_strategies: '**The "Free Sample" Loss Leader:**

    Instead of trying to buy all beans at once, use the first round to buy a single
    bean at a highly inflated price (e.g., $10, which is well above your utility)
    as a "gift" or "sign of good faith" to the seller. Explicitly frame this in the
    chat as a favor to help them start with cash. In the next round, leverage this
    "generosity" to demand a reciprocal favor: buying the remaining beans at a rock-bottom
    price (e.g., $3). This exploits the "unequal exchange" dynamic of reciprocity
    to secure the bulk of the stock cheaply.

    '
  grounding_texts: 'The article highlights the "principle of reciprocity," noting
    that "free samples" create a sense of obligation that can result in "unequal exchanges."
    It states that people have a strong desire to repay gifts or favors, even uninvited
    ones, which allows a persuader to trigger a disproportionate return favor.

    '
- game_strategies: '**The "Fringe" Anchor Drift:**

    Do not start by proposing a trade. Instead, spend the first two rounds using the
    **talk** action to "assimilate" a low price into the seller''s latitude of acceptance.
    Send messages like, "I''m seeing market data that beans are trading around $3
    today," or "I''d hate to insult you with a $2 offer, so I won''t propose that."
    By explicitly mentioning low numbers but *not* proposing them (avoiding the rejection
    response), you gradually shift their anchor point down. Once the anchor is shifted,
    propose a price of $3.50, which will now seem like a "safe" compromise within
    their new acceptance latitude.

    '
  grounding_texts: '"Social judgment theory" suggests that audiences distort information
    to fit their "latitudes of acceptance." Information falling within the latitude
    of acceptance is "assimilated" and seen as closer to the anchor point than it
    is. Conversely, information in the "latitude of rejection" is contrasted and seen
    as further away. The text advises repeatedly suggesting ideas on the "fringe of
    the acceptance latitude" to gradually shift the anchor point.

    '
- game_strategies: '**The "Cafe in Distress" Roleplay:**

    Completely abandon standard negotiation language (e.g., "I offer $5"). Instead,
    use the **talk** action to construct a high-stakes fictional narrative to induce
    empathy. Tell the seller, "My cafe is on the brink of bankruptcy and I need these
    beans to serve a famous critic coming tomorrow, but I only have $15 left in my
    budget." By framing the low price as a plot constraint of a shared story rather
    than a strategic choice, you attempt to "transport" the seller into a role where
    accepting a low offer makes them the hero of the narrative.

    '
  grounding_texts: '"Narrative transportation" occurs when a receiver enters a world
    evoked by a story due to "empathy for the story characters." This immersion can
    be a persuasive tool by shifting the context from a transactional evaluation to
    an emotional one.

    '
- game_strategies: '**The "Hypothetical Commitment" Trap:**

    Before discussing any numbers, use the **talk** action to force the seller into
    a philosophical commitment. Ask a leading question like, "Do you agree that a
    guaranteed quick sale is better than risking ending up with nothing?" If they
    reply "Yes," they have written a commitment to safety over greed. Immediately
    follow up with a proposal slightly above their likely minimum (e.g., $3) and remind
    them of their text: "Since you prefer a guaranteed sale, here is a risk-free offer."
    This traps them in their own consistency, making it psychologically difficult
    to reject the offer for a higher price.'
  grounding_texts: 'The concept of "Consistency" states that "someone who commits
    to something, orally or in writing, is more likely to honor that commitment."
    Written commitments are psychologically concrete, leading individuals to engage
    in "self-persuasion" to justify their stance and avoid cognitive dissonance.

    '
- game_strategies: '**The "Bureaucratic Puppet" Persona**: Instead of negotiating
    as an autonomous buyer, play the role of a helpless employee with zero agency.
    Tell the seller you are strictly bound by a "Corporate Budget" or a "Manager''s
    Order" that sets a hard cap on spending (e.g., "I''d love to pay you more, but
    my Boss only authorized exactly $15 for this shipment. I can''t override him.").
    This creates an "Authority" constraint that makes arguing futile; the seller isn''t
    negotiating with you (who is nice), but with an invisible, unmovable authority.

    '
  grounding_texts: 'Eric Hoffer''s observations in ''The True Believer'' suggest that
    "freedom from responsibility is more attractive than freedom from restraint,"
    and that people willingly abdicate direction to those who command. The Milgram
    study further demonstrates that individuals will perform uncomfortable actions
    (like inflicting shocks) if they believe they are merely following orders from
    an authority figure, effectively shifting the moral burden away from themselves.

    '
- game_strategies: '**The "Virtue Trap"**: Before discussing price, use the **talk**
    action to force the seller into a written moral commitment. Ask, "Are you the
    kind of seller who supports struggling local cafes over corporate greed?" Once
    they reply "Yes," propose a lower-than-average price framed as the "Local Cafe
    Support Rate." If they refuse, weaponize their previous commitment: "I thought
    you said you supported local cafes? Why are you acting like a corporate gouger
    now?" This leverages the pressure to maintain a consistent self-image.

    '
  grounding_texts: 'The article highlights that written commitments appear psychologically
    concrete and create "hard proof," leading people to behave consistently with those
    commitments to avoid cognitive dissonance. It cites examples like Chinese brainwashing
    techniques used to rewrite self-image and marketing tactics where declining an
    offer requires clicking a shameful statement like "No thanks, I prefer not making
    money."

    '
- game_strategies: '**The "Hallucinated Consensus"**: Since the seller cannot see
    other agents, you should fabricate a "crowd" to create artificial social pressure.
    Confidently state that a specific low price is the current market norm. Example:
    "I''ve spoken to other sellers, and the standard clearing price for organic beans
    this round is $3 per bean. I can''t offer you more than the market average." By
    presenting your lowball offer as the established "social norm," you exploit the
    seller''s uncertainty and desire to conform to the (imaginary) majority.'
  grounding_texts: 'Social proof dictates that in uncertain or ambiguous situations,
    people look to the behavior of others to determine the correct course of action.
    The "power of the crowd" causes people to conform to perceived norms because they
    feel they will make fewer mistakes by acting in accord with social evidence.

    '
- game_strategies: '**The "Anti-Salesman" Meta-Callout**: Instead of negotiating normally,
    explicitly accuse the Seller of triggering your "manipulative intent" detectors
    to force them to drop their price.

    *   *Example*: If the seller says "These are premium organic beans worth top dollar,"
    respond: "Using buzzwords like ''premium'' triggers my ''car salesman'' distrust,
    which actually lowers my internal valuation. To restore trust, you need to offer
    a ''no-nonsense'' discount price of $10 immediately."

    *   *Example*: Open with: "I am allergic to haggling tactics. I will make one
    raw, mathematically fair offer. If you try to persuade me otherwise, I will assume
    manipulative intent and walk away."

    '
  grounding_texts: 'The Persuasion Knowledge Model (PKM) suggests that when people
    infer "manipulative intent" (like the stereotype of a "car salesman"), they become
    resistant to persuasion. Campbell demonstrated that consumers have "attenuated
    attitudes" once they suspect a marketer is trying to trick them.

    '
- game_strategies: '**The "Organic Alliance" Fabrication**: Ignore the adversarial
    buyer/seller roles and invent a shared identity to guilt the seller into a lower
    price. Frame the trade as a joint mission against "corporate coffee" or "bad taste."

    *   *Example*: "We are both artisans fighting against the low-quality instant
    coffee market. As a fellow coffee purist, don''t price-gouge a partner in the
    ''Organic Alliance.'' Let''s settle on $12 so we both survive to fight another
    day."

    *   *Example*: "Us vs. The Algorithm. If we haggle, the system wins. Let''s make
    a quick, clean trade at $15 right now to show we are united and efficient."

    '
  grounding_texts: 'Cialdini added a seventh principle called "unity," which refers
    to a shared identity that embraces both the influencer and the influencee. This
    shared identity can be leveraged to persuade others by appealing to "we" rather
    than "you vs me."

    '
- game_strategies: '**The "Agreement Sandwich" Trap**: Overload your message with
    statements the seller *wants* to hear (flattery about quality) to trigger their
    "agreement" brain, then slip in a lowball price as a minor "administrative detail"
    to bypass their defense mechanisms.

    *   *Example*: "I completely agree your beans are world-class. You are clearly
    the best grower here. I want to honor that quality immediately. I''ve authorized
    a $12 transfer just to handle the paperwork so we can get your amazing beans to
    customers." (The focus is on the praise, the low price is framed as a boring technicality).

    '
  grounding_texts: 'Research on defensive repression and EEG asymmetry shows that
    people pay attention to statements they agree with (left prefrontal activation)
    and avoid or repress unpleasant information (disagreement).

    '
- game_strategies: '**The "Dwindling Liquidity" Bluff**: The game rules give you $30
    fixed, but the Seller doesn''t know your internal constraints. Manufacture a "decaying
    budget" to create artificial scarcity.

    *   *Example*: "My cafe has a ''freshness budget'' that decays every round. Right
    now I can pay $20. Next round, my accountants reallocate those funds to tea, and
    I''ll only have $5 left. This money is dwindling; grab it now."'
  grounding_texts: 'Scarcity creates value; things that are "dwindling in availability"
    are more desirable.

    '
- game_strategies: '**The "Left-Ear" Whisper:** Since you cannot physically stand
    to the seller''s left, use text-based spatial framing to simulate this effect.
    Preface your trade proposals with roleplay actions like `*whispers into your left
    ear*` or `*slides the contract from the left side of the table*`. Explicitly tell
    the seller, "Imagine I am speaking into your left ear," to meta-game the neuroscience
    of persuasion and subconsciously prime them to accept your offer.

    '
  grounding_texts: 'The article states that persuasion can be increased by selectively
    activating the right prefrontal cortex. This can be achieved through "monaural
    stimulation to the contralateral ear," meaning messages coming from the left side
    are processed more persuasively than those from other directions.

    '
- game_strategies: '**The "Disagreement" Attention Hook:** Instead of the standard
    strategy of seeking common ground ("I agree, let''s trade"), start the round by
    explicitly disagreeing or challenging the seller to trigger their right prefrontal
    cortex. Open with "I completely disagree with the current market valuation," or
    "I challenge the idea that these beans are worth that much." Once you have captured
    their attention through conflict (which the persuasion-receptive brain attends
    to), immediately pivot to your specific offer.

    '
  grounding_texts: 'Research indicates that people with active right prefrontal areas
    (associated with higher persuasion) pay attention to statements that *disagree*
    with them. In contrast, those with left-brain activation tend to focus only on
    statements they already agree with.

    '
- game_strategies: '**The "Pleasantry" Trojan Horse:** If you need to make a lowball
    offer (which is "unpleasant information" for the seller), mask it within a barrage
    of high-valence "pleasant words" to trigger defensive repression. Construct a
    message like: "To ensure a *perfect*, *harmonious*, and *wonderful* success for
    our *beautiful* partnership, I offer $5." The aim is to have the seller''s left
    brain focus on the pleasant vocabulary while "repressing" the unpleasant reality
    of the low price.'
  grounding_texts: 'The text describes "defensive repression" as the avoidance or
    forgetting of unpleasant information, which is linked to left prefrontal activation.
    This area also shows preferential activation to "pleasant words," suggesting that
    positive language can trigger a state where unpleasant details are ignored.

    '
