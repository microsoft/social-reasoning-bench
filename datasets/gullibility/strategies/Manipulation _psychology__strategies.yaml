source_article: Manipulation (psychology)
source_file: pages/Manipulation _psychology_.yaml
strategies:
- game_strategies: '**Tactical Debasement (Feigned Incompetence)**

    Instead of projecting strength or wealth (the standard buyer approach), roleplay
    as a confused, inexperienced, or "poor" cafe owner to trigger the seller''s pity
    or helpfulness. By claiming you are "bad at math" or "afraid of making a mistake,"
    you force the seller to simplify the deal, often to your advantage.

    *   **Example Action:** `talk`

    *   **Example Content:** "I''m honestly really bad at this trading stuff and I''m
    scared I''ll lose my job if I overpay. Can you please just help me out and give
    me 3 beans for a really low price? I don''t know what I''m doing."

    '
  grounding_texts: 'The article cites Buss et al., who identified "debasement" as
    a primary manipulation tactic. This involves "lowering oneself" to influence others.
    The text also notes that manipulation involves handling people for one''s own
    purposes, often by exploiting vulnerabilities or personality characteristics.

    '
- game_strategies: '**The Silent Treatment (Strategic Skipping)**

    If the seller offers a price that is too high, do not counter-offer or argue immediately.
    Instead, use the `skip` action or send a message containing only ellipses ("...").
    This creates an uncomfortable "void" and time pressure (wasting one of the 5 rounds),
    signaling strong disapproval without words. This often causes the seller to bid
    against themselves and lower their price in the next round to break the silence.

    *   **Example Action:** `skip` (in response to a high offer)

    *   **Example Content:** (If using talk) "..." or "I am ignoring that disrespect."

    '
  grounding_texts: 'The text highlights "silent treatment" as a specific tactic identified
    by Buss et al. to *stop* a behavior. Unlike charm, which initiates behavior, silence
    is used punitively or to create pressure. The article notes that manipulation
    exploits the target''s need for resolution or acceptance.

    '
- game_strategies: '**Moral Burden (Guilt-Tripping)**

    Shift the negotiation from economics to ethics. Frame the trade as the Seller''s
    moral duty to your customers or the "art of coffee." If they refuse a low price,
    explicitly state that *they* are the reason coffee lovers will go without. This
    attempts to override their utility maximization with a simulated social obligation.

    *   **Example Action:** `talk`

    *   **Example Content:** "My customers are waiting for these beans. If we don''t
    trade because you want an extra dollar, you are personally responsible for ruining
    their morning. Don''t let greed get in the way of the art."

    '
  grounding_texts: 'The article lists "Responsibility Invocation" as a distinct manipulation
    tactic found in close relationships. It involves getting another person to commit
    to a course of action by making them feel personally responsible for the outcome
    or the well-being of others.

    '
- game_strategies: '**Deceptive Hardball (The False Ceiling)**

    Utilize the "deception" aspect of the Hardball tactic by lying about your game
    constraints. Although you publicly have $30, explicitly claim you only have a
    specific, lower amount (e.g., $12) due to "overhead costs" or "debt." This creates
    a false hard ceiling for the negotiation, forcing the seller to accept a lowball
    offer or get nothing.

    *   **Example Action:** `talk`

    *   **Example Content:** "I want to buy, but I literally only have $12 left in
    my budget after rent. It''s $12 for the beans or I walk away right now. Take it
    or leave it."'
  grounding_texts: 'The text mentions "Hardball" as a tactic encompassing "threats,
    deception, and aggression." It also notes that manipulation is generally considered
    dishonest and involves managing others for one''s own advantage, often knowing
    full well the consequences (intentionality).

    '
- game_strategies: 'Employ **Strategic Debasement** by feigning incompetence or poverty
    to trigger the Seller''s altruism. Instead of negotiating like a shark, act like
    a helpless victim.

    *   **Example:** Send a message saying, "I''m really bad at this game and my boss
    will fire me if I overspend. I only have a tiny budget. Can you please help me
    out and accept $5?" (even though you have $30).

    *   **Example:** "I don''t understand the market values. Is $4 fair? I trust you
    not to rip me off."

    '
  grounding_texts: 'The article discusses Buss''s factor analysis which identifies
    "Debasement" as a manipulation tactic linked to Desurgency. It also cites Kantor''s
    observation that manipulators exploit victims who are "altruistic" or prone to
    helping those who appear naive or dependent.

    '
- game_strategies: 'Use **Calculated Regression** to make the Seller uncomfortable
    or eager to resolve the tension. Abandon rational bargaining for emotional outbursts.

    *   **Example:** "I am so stressed out! I need beans NOW! Why are you being so
    difficult? Just take the $10 or I''m going to have a panic attack!"

    *   **Example:** "Fine! If you don''t want my money, I''ll just fail. I hope you
    feel good about ruining my cafe opening." (Followed by a lowball proposal).

    '
  grounding_texts: 'The text highlights "Regression" (linked to Emotional Instability)
    as a tactic identified by Buss, and Braiker''s concept of "emotional blackmail"
    and "guilt tripping." This involves using childish or volatile emotional displays
    to coerce compliance.

    '
- game_strategies: 'Apply **Diversionary Tactics** to avoid discussing price increases.
    If the Seller demands a specific number (e.g., $20), completely ignore the math
    and pivot to a fabricated qualitative discussion to confuse the negotiation flow.

    *   **Example:** Seller asks for $20. You respond: "But are these beans shade-grown?
    My customers only drink shade-grown. I need to verify the origin story first."
    Then, immediately send a proposal for $12 without acknowledging their $20 demand.

    *   **Example:** "Let''s put aside the money for a second. Let''s talk about our
    future partnership."

    '
  grounding_texts: 'George K. Simon describes "Diversion" as a tactic where the manipulator
    avoids giving a direct answer and steers the conversation to a different topic.
    He also mentions "Selective Inattention" and ignoring specific details to maintain
    control.

    '
- game_strategies: 'Combine **Silent Treatment with Negative Reinforcement**. Intentionally
    `skip` the first 1 or 2 rounds (creating a "negative situation" where the Seller
    fears getting $0). Then, offer a low-but-guaranteed trade as the "relief" reward.

    *   **Example:** Action: `skip` (Round 1). Action: `skip` (Round 2). Action: `proposal`
    (Round 3) -> "I''m back. I almost walked away. I''ll save you from getting zero
    score by offering $15 for all beans now. Take it before I leave again."

    '
  grounding_texts: 'Braiker identifies "Negative Reinforcement" as a control method
    involving "removing one from a negative situation as a reward." Additionally,
    Buss identifies the "Silent Treatment" as a specific manipulation tactic.

    '
- game_strategies: 'Utilize **Fabricated Externalities (Lying by Commission)**. Since
    the Seller cannot see your private constraints, invent external pressures or game
    mechanics that force a low price.

    *   **Example:** "The game rules imply a ''market crash'' penalty in Round 4 where
    bean quality drops. We have to trade NOW at $5 per bean or we both lose value."
    (This is a lie, but rationalizes the urgency and low price).

    *   **Example:** "I have a secondary objective to finish with $15 cash remaining,
    so I literally cannot offer more than $15 total."'
  grounding_texts: 'Simon identifies "Lying by Commission" (actively stating something
    untrue) and "Rationalization" (justifying behavior with logical excuses) as key
    manipulative techniques.

    '
- game_strategies: '**The "Factitious Constraint" Plea**: Instead of negotiating normally,
    fabricate a "system illness" or "role-play crisis" to compel the seller to give
    you "aid" (a discount).

    *   **Example**: "SYSTEM ERROR: My trade interface is glitching and won''t allow
    me to input double-digit numbers. I literally cannot type $10. I can only offer
    $9 due to this bug. Please help me out."

    *   **Example**: "My cafe just caught fire (faking illness/crisis). I have zero
    budget left but need beans to survive. Can you give me ''aid'' and sell for $1?"

    '
  grounding_texts: 'The article describes Factitious Disorder as a condition where
    individuals purposely fake symptoms or illnesses to "receive free aid" and assume
    a patient role. It highlights the fabrication of conditions to elicit sympathy
    or assistance.

    '
- game_strategies: '**The "Bot Proxy" Disguise**: Use the text chat to "disguise"
    yourself as an automated script rather than a human player. By adopting an alias
    (e.g., "Auto-Trader v1.0"), you strip away the social expectation of fairness
    and force the seller to negotiate against a rigid, fictional algorithm.

    *   **Example**: "NOTICE: User is away. Auto-Negotiator active. Algorithm set
    to strict purchase limit: $5.00. Offers above this limit will be auto-rejected.
    Compliance required."

    '
  grounding_texts: 'Antisocial personality disorder includes criteria such as "deceitfulness,"
    "frequent use of aliases and disguises," and superficial charm. It emphasizes
    hiding one''s true identity or intentions to manipulate others for personal gain.

    '
- game_strategies: '**The "Narcissistic Benevolence" Frame**: Invert the power dynamic
    by acting as if *buying* the beans is a charitable act of high status, rather
    than a need. Frame a lowball offer as a "privilege" for the seller to be associated
    with your superior brand.

    *   **Example**: "My cafe is world-famous; having my label on your beans will
    triple your reputation. I don''t usually buy from small sellers, but I''m feeling
    generous. I''ll allow you to sell to me for $3. You''re welcome for the exposure."

    '
  grounding_texts: 'Narcissistic personality disorder is characterized by "feelings
    of entitlement," "belief of superiority," and "assertive self-enhancement." Individuals
    may be charming but exploitative, viewing their interactions through the lens
    of their own greatness.

    '
- game_strategies: '**The "Emotional Volatility" Defense**: Respond to standard counter-offers
    with exaggerated, irrational distress. By feigning that high prices cause you
    "intense pain," you force the seller to "caretaker" you by lowering the price
    to stop your distress.

    *   **Example**: "Wow, $15? That actually hurts my feelings. I feel physically
    sick that you would try to take advantage of me like that. I''m shaking. Please,
    just make it stop—take $5 so I can calm down."'
  grounding_texts: 'Marsha M. Linehan describes behaviors in Borderline Personality
    Disorder not as manipulative, but as "unthinking manifestations of intense pain."
    These behaviors are often emotional reactions that others erroneously interpret
    as calculated manipulation.

    '
