  Deception is the act of convincing of one or many recipients of untrue information. The person creating the deception knows it to be false while the receiver of the information does not.[1] It is often done for personal gain or advantage.[2][3]



  Deceit and dishonesty can also form grounds for civil litigation in tort, or contract law (where it is known as misrepresentation or fraudulent misrepresentation if deliberate), or give rise to criminal prosecution for fraud.[4]



  The Interpersonal Deception Theory explores the interrelation between communicative context and sender and receiver cognitions and behaviors in deceptive exchanges.



  Some forms of deception include:



  Buller and Burgoon (1996) have proposed three taxonomies to distinguish motivations for deception based on their Interpersonal Deception Theory:



  In the biological world, mimicry involves deception by similarity to another organism, or to a natural object. Animals for example may deceive predators or prey by visual, auditory or other means.[8]



  The camouflage of a physical object often works by breaking up the visual boundary of that object. This usually involves colouring the camouflaged object with the same colours as the background against which the object will be hidden.[9]



  Military camouflage as a form of visual deception is a part of many campaigns.



  Disguises are used to create the impression of a false appearance.[10] A seventeenth-century story collection, Zhang Yingyu''s The Book of Swindles (ca. 1617), offers multiple examples of the bait-and-switch and fraud techniques involving the stimulation of greed in Ming-dynasty China.[11]



  Deception has also been observed and studied in romantic relationships.[6][12]



  There are three primary motivations for deception in relationships.



  Deception impacts the perception of a relationship in a variety of ways, for both the deceiver and the deceived. The deceiver typically perceives less understanding and intimacy from the relationship, in that they see their partner as  less empathetic and more distant.[17] The act of deception can also result in feelings of distress for the deceiver, which become worse the longer the deceiver has known the deceived, as well as in longer-term relationships. Once discovered, deception creates feelings of detachment and uneasiness surrounding the relationship for both partners; this can eventually lead to both partners becoming more removed from the relationship or deterioration of the relationship.[12] In general, discovery of deception can result in a decrease in relationship satisfaction and commitment level, however, in instances where a person is successfully deceived, relationship satisfaction can actually be positively impacted for the person deceived, since lies are typically used to make the other partner feel more positive about the relationship.



  In general, deception tends to occur less often in relationships with higher satisfaction and commitment levels and in relationships where partners have known each other longer, such as long-term relationships and marriage.[12] In comparison, deception is more likely to occur in casual relationships and in dating where commitment level and length of acquaintanceship is often much lower.[17][18]



  Unique to exclusive romantic relationships is the use of deception in the form of infidelity. When it comes to the occurrence of infidelity, there are many individual difference factors that can impact this behavior. Infidelity is impacted by attachment style, relationship satisfaction, executive function, sociosexual orientation, personality traits, and gender. Attachment style impacts the probability of infidelity and research indicates that people with an insecure attachment style (anxious or avoidant) are more likely to cheat compared to individuals with a secure attachment style,[19] especially for avoidant men and anxious women.[20] Insecure attachment styles are characterized by a lack of comfort within a romantic relationship resulting in a desire to be overly independent (avoidant attachment style) or a desire to be overly dependent on their partner in an unhealthy way (anxious attachment style). Those with an insecure attachment style are characterized by not believing that their romantic partner can/will support and comfort them in an effective way, either stemming from a negative belief regarding themselves (anxious attachment style) or a negative belief regarding romantic others (avoidant attachment style). Women are more likely to commit infidelity when they are emotionally unsatisfied with their relationship whereas men are more likely to commit infidelity if they are sexually unsatisfied with their current relationship.[21] Women are more likely to commit emotional infidelity than men while men are more likely to commit sexual infidelity than women; however, these are not mutually exclusive categories as both men and women can and do engage in emotional or sexual infidelity.[21]



  Executive control is a part of executive functions that allows for individuals to monitor and control their behavior through thinking about and managing their actions. The level of executive control that an individual possesses is impacted by development and experience and can be improved through training and practice.[22][23] Those individuals that show a higher level of executive control can more easily influence/control their thoughts and behaviors in relation to potential threats to an ongoing relationship which can result in paying less attention to threats to the current relationship (other potential romantic mates).[24] Sociosexual orientation is concerned with how freely individuals partake in casual sex outside of a committed relationship and their beliefs regarding how necessary it is to be in love in order to engage in sex with someone.[25] Individuals with a less restrictive sociosexual orientation (more likely to partake in casual sex) are more likely to engage in infidelity.[21][25] Individuals that have personality traits including (high) neuroticism, (low) agreeableness, and (low) conscientiousness are more likely to commit infidelity.[21] Men are generally speculated to cheat more than women, but it is unclear if this is a result of socialization processes where it is more acceptable for men to cheat compared to women or due to an actual increase in this behavior for men.[26] Research conducted by Conley and colleagues (2011) suggests that the reasoning behind these gender differences stems from the negative stigma associated with women who engage in casual sex and inferences about the sexual capability of the potential sexual partner. In their study, men and women were equally likely to accept a sexual proposal from an individual who was speculated to have a high level of sexual prowess. Additionally, women were just as likely as men to accept a casual sexual proposal when they did not anticipate being subjected to the negative stigma of sexually permissible women as slutty.[26]



  Research on the use of deception in online dating has shown that people are generally truthful about themselves with the exception of physical attributes to appear more attractive.[27][28][29]  According to the Scientific American, "nine out of ten online daters will fib about their height, weight, or age" such that men were more likely to lie about height while women were more likely to lie about weight.[30] In a study conducted by Toma and Hancock, "less attractive people were found to be more likely to have chosen a profile picture in which they were significantly more attractive than they were in everyday life".[31] Both genders used this strategy in online dating profiles, but women more so than men.[31] Additionally, less attractive people were more likely to have "lied about objective measures of physical attractiveness such as height and weight".[31] In general, men are more likely to lie on dating profiles the one exception being that women are more likely to lie about weight.[27]



  People who negotiate feel more tempted to use deceit. In negotiation, it includes both parties to trust and respect one another. In negotiations, one party is unaware of what is going on in the other side of the thing that needs to be negotiated. Deception in negotiation comes in many forms, and each has its reaction (Gaspar et al.,2019).[32]



  Journalistic deception ranges from passive activities (i.e. blending into a civil rights march) to active deception (i.e. falsely identifying oneself over the telephone, getting hired as a worker at a mental hospital).[33]  Paul Braun says that the journalist does not stand apart from the rest of the populace in the use of deception.[33]



  Deception can form an important part of effective interrogation. In the United States, there is no law or regulation that forbids the interrogator from lying about the strength of their case, from making misleading statements or from implying that the interviewee has already been implicated in the crime by someone else. See case law on trickery and deception (Frazier v. Cupp).[34]



  In 2021, Illinois became the first state to ban police officers from lying to minors during interrogations.[35][36]



  For legal purposes, deceit is a tort that occurs when a person makes a factual misrepresentation, knowing that it is false (or having no belief in its truth and being reckless as to whether it is true) and intending it to be relied on by the recipient, and the recipient acts to his or her detriment in reliance on it.  Deceit may also be grounds for legal action in contract law (known as misrepresentation, or if deliberate, fraudulent misrepresentation), or a criminal prosecution, on the basis of fraud.[39][40]



  Military deception (MILDEC) is an attempt by a military unit to gain an advantage during warfare by misleading adversary decision makers into taking action or inaction that creates favorable conditions for the deceiving force.[41][42] This is usually achieved by creating or amplifying an artificial fog of war via psychological operations, information warfare, visual deception, or other methods.[43] As a form of disinformation, it overlaps with psychological warfare.[44] Military deception is also closely connected to operations security (OPSEC) in that OPSEC attempts to conceal from the adversary critical information about an organization''s capabilities, activities, limitations, and intentions, or provide a plausible alternate explanation for the details the adversary can observe, while deception reveals false information in an effort to mislead the adversary.[45]



  Deception is a common topic in religious discussions.  Some sources focus on how religious texts deal with deception.  But, other sources focus on the deceptions created by the religions themselves.  For example, Ryan McKnight is the founder of an organization called FaithLeaks.  He stated that the organization''s "goal is to reduce the amount of deception and untruths and unethical behaviors that exist in some facets of religion".[58]



  In general, Islam never allows deception and lie. Prophet Muhammad said, "He who deceives is not of me (is not my follower)".[59] However, there are some exceptions, especially in case of war or peace making or in case of safeguarding one''s faith.[60] For an example,

  Taqiya is an Islamic juridical term for the cases in which a Muslim is allowed to lie under the circumstance when need to deny their faith due to force or when faced with persecution.[61] The concept mainly followed by Shi''ite sect, but it varies "significantly among Islamic sects, scholars, countries, and political regimes", and has been evoked by critics of Islam to portray the faith allowing dishonesty.[62]



  Though commonly used and allowed by the ethical guidelines of the American Psychological Association, there has been debate about whether or not the use of deception should be permitted in psychological research experiments. Those against deception object to the ethical and methodological issues involved in its use. Rebecca Dresser noted that, ethically, researchers are only to use subjects in an experiment after the subject has given informed consent. However, because of its very nature, a researcher conducting a deception experiment cannot reveal its true purpose to the subject, thereby making any consent given by a subject misinformed.[63] Diana Baumrind, criticizing the use of deception in the 1963 Milgram obedience experiment, argued that deception experiments inappropriately take advantage of the implicit trust and obedience given by the subject when the subject volunteers to participate.[64]



  From a practical perspective, there are also methodological objections to deception. Andreas Ortmann and Ralph Hertwig noted that "deception can strongly affect the reputation of individual labs and the profession, thus contaminating the participant pool". If the subjects in the experiment are suspicious of the researcher, they are unlikely to behave as they normally would, and the researcher''s control of the experiment is then compromised.[65] Those who do not object to the use of deception note that there is always a constant struggle in balancing "the need for conducting research that may solve social problems and the necessity for preserving the dignity and rights of the research participant".[66] They also note that, in some cases, using deception is the only way to obtain certain kinds of information, and that prohibiting all deception in research would "have the egregious consequence of preventing researchers from carrying out a wide range of important studies".[67]



  Some findings suggest that deception is not harmful to subjects. Larry Christensen''s review of the literature found "that research participants do not perceive that they are harmed and do not seem to mind being misled". Furthermore, those participating in experiments involving deception "reported having enjoyed the experience more and perceived more educational benefit" than those who participated in non-deceptive experiments.[68] Lastly, it has also been suggested that an unpleasant treatment used in a deception study or the unpleasant implications of the outcome of a deception study may be the underlying reason that a study using deception is perceived as unethical in nature, rather than the actual deception itself.[69][70]



  Some methodologies in social research, especially in psychology, involve deception. The researchers purposely mislead or misinform the participants about the true nature of the experiment. In an experiment conducted by Stanley Milgram in 1963 the researchers told participants that they would be participating in a scientific study of memory and learning. In reality the study looked at the participants'' willingness to obey commands, even when that involved inflicting pain upon another person. After the study, the subjects were informed of the true nature of the study, and steps were taken in order to ensure that the subjects left in a state of well-being.[71]



  Through the internet, individuals can portray themselves however they please because of the lack of face-to face communication.[7] Digital deception is widely used within different forms of technology to misrepresent someone or something.[18] Through digital deception, people are easily capable of deceiving others whether it be for their own benefit or to ensure their safety. One form of digital deception is catfishing. By creating a false identity catfishers deceive those online to build relationships, friendships, or connections without revealing who they truly are as a person. They do so by creating an entirely new account that has made up information allowing them to  portray themselves as a different person. Most lies and misinformation are spread commonly through emails and instant messaging since these messages are erased faster.[19] Without face to face communication, it could be easier to deceive others, making it difficult to detect the truth from a lie.  These unreliable cues allow digital deception to easily influence and mislead others.[20]



  Double bluffing is a deceptive scenario, in which the deceiver tells truth to a person about some subject, but makes the person think that the deceiver is lying.[72][73][74][75] In poker, the term double bluff refers to a situation in which the deceiving player is trying to bluff with bad cards, then gets re-raised by the opponent, and then re-raises again in the hopes that the enemy player folds.[76] This strategy works best on opponents who easily fold under pressure.[77]



  Deception detection is extremely difficult unless it is a blatant or obvious lie or contradicts something the other knows to be true. While it is difficult to deceive a person over a long period of time, deception often occurs in day-to-day conversations between relational partners.[6] Detecting deception is difficult because there are no known completely reliable indicators of deception and because people often reply on a truth-default state. Deception, however, places a significant cognitive load on the deceiver. He or she must recall previous statements so that his or her story remains consistent and believable. As a result, deceivers often leak important information both verbally and nonverbally.



  Deception and its detection is a complex, fluid, and cognitive process that is based on the context of the message exchange. The interpersonal deception theory posits that interpersonal deception is a dynamic, iterative process of mutual influence between a sender, who manipulates information to depart from the truth, and a receiver, who attempts to establish the validity of the message.[78] A deceiver''s actions are interrelated to the message receiver''s actions. It is during this exchange that the deceiver will reveal verbal and nonverbal information about deceit.[79] Some research has found that there are some cues that may be correlated with deceptive communication, but scholars frequently disagree about the effectiveness of many of these cues to serve as reliable indicators.[80] A cross cultural study conducted to analyze human behavior and deception concluded detecting deception often has to do with the judgements of a person and how they interpret non-verbal cues. One''s personality can influence these judgements also as some people are more confident in deceiving compared to others.[81] Noted deception scholar Aldert Vrij even states that there is no nonverbal behavior that is uniquely associated with deception.[82] As previously stated, a specific behavioral indicator of deception does not exist. There are, however, some nonverbal behaviors that have been found to be correlated with deception. Vrij found that examining a "cluster" of these cues was a significantly more reliable indicator of deception than examining a single cue.[82]



  Many people believe that they are good at deception, though this confidence is often misplaced.[83] Deception detection can decrease with increased empathy.[84] Emotion recognition training does not affect the ability to detect deception.[84]



  Mark Frank proposes that deception is detected at the cognitive level.[85] Lying requires deliberate conscious behavior, so listening to speech and watching body language are important factors in detecting lies.  If a response to a question has a lot disturbances, less talking time, repeated words, and poor logical structure, then the person may be lying. Vocal cues such as frequency height and variation may also provide meaningful clues to deceit.[86]



  Fear specifically causes heightened arousal in liars, which manifests in more frequent blinking, pupil dilation, speech disturbances, and a higher pitched voice. The liars that experience guilt have been shown to make attempts at putting distance between themselves and the deceptive communication, producing "nonimmediacy cues". These can be verbal or physical, including speaking in more indirect ways and showing an inability to maintain eye contact with their conversation partners.[87] Another cue for detecting deceptive speech is the tone of the speech itself. Streeter, Krauss, Geller, Olson, and Apple (1977) have assessed that fear and anger, two emotions widely associated with deception, cause greater arousal than grief or indifference, and note that the amount of stress one feels is directly related to the frequency of the voice.[88]

