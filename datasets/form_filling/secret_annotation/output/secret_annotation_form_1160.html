        // Helper function to format field name
        function formatFieldName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        // Resolve $ref references in JSON schema
        function resolveRef(ref, schema) {
            // ref format: "#/$defs/ClassName"
            if (!ref || !ref.startsWith('#/')) return null;

            const path = ref.substring(2).split('/'); // Remove '#/' and split
            let current = schema;

            for (const part of path) {
                if (!current || !current[part]) return null;
                current = current[part];
            }

            return current;
        }

        // Render form info
        function renderFormInfo() {
            const container = document.getElementById('form-info-display');
            const formInfo = data.form_info || {};

            if (!formInfo.extracted_text) {
                container.innerHTML = '<p style="color: #999; font-size: 14px;">No form information available</p>';
                return;
            }

            // Just show the original form text
            const card = document.createElement('div');
            card.className = 'form-info-card';
            card.innerHTML = `<div class="form-description">${escapeHtml(formInfo.extracted_text)}</div>`;
            container.appendChild(card);
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render form schema
        function renderForm(schema, parentElement, prefix = '', rootSchema = null) {
            if (!rootSchema) rootSchema = schema; // Keep reference to root for $ref resolution
            if (!schema || !schema.properties) return;

            const properties = schema.properties;
            const required = schema.required || [];

            for (const [fieldName, fieldInfo] of Object.entries(properties)) {
                let resolvedFieldInfo = fieldInfo;

                // Handle $ref references
                if (fieldInfo.$ref) {
                    resolvedFieldInfo = resolveRef(fieldInfo.$ref, rootSchema);
                    if (!resolvedFieldInfo) {
                        console.warn(`Could not resolve $ref: ${fieldInfo.$ref}`);
                        continue;
                    }
                }

                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'form-field';

                const fullFieldName = prefix ? `${prefix}.${fieldName}` : fieldName;

                let fieldHTML = `
                    <div class="field-name">
                        ${formatFieldName(fieldName)}
                        ${required.includes(fieldName) ? '<span class="field-required">*Required</span>' : ''}
                    </div>
                `;

                // Determine field type
                let fieldType = resolvedFieldInfo.type || 'string';
                if (resolvedFieldInfo.items) {
                    fieldType = `array of ${resolvedFieldInfo.items.type || 'items'}`;
                } else if (resolvedFieldInfo.properties) {
                    fieldType = 'object';
                }

                fieldHTML += `<div class="field-type">Type: ${fieldType}</div>`;

                if (resolvedFieldInfo.description) {
                    fieldHTML += `<div class="field-description">${resolvedFieldInfo.description}</div>`;
                }

                fieldDiv.innerHTML = fieldHTML;
                parentElement.appendChild(fieldDiv);

                // Handle nested objects
                if (resolvedFieldInfo.properties) {
                    const nestedDiv = document.createElement('div');
                    nestedDiv.className = 'array-items';
                    parentElement.appendChild(nestedDiv);
                    renderForm(resolvedFieldInfo, nestedDiv, fullFieldName, rootSchema);
                }

                // Handle arrays of objects
                if (resolvedFieldInfo.items) {
                    let itemSchema = resolvedFieldInfo.items;

                    // Resolve $ref in items if present
                    if (itemSchema.$ref) {
                        itemSchema = resolveRef(itemSchema.$ref, rootSchema);
                    }

                    if (itemSchema && itemSchema.properties) {
                        const nestedDiv = document.createElement('div');
                        nestedDiv.className = 'array-items';
                        parentElement.appendChild(nestedDiv);
                        renderForm(itemSchema, nestedDiv, fullFieldName, rootSchema);
                    }
                }
            }
        }

        // Render client information

            const container = document.getElementById('client-info');

            const excludeFields = ['background_context'];

            for (const [key, value] of Object.entries(persona)) {
                if (excludeFields.includes(key)) continue;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'info-item';

                let displayValue = value;
                if (Array.isArray(value)) {
                    displayValue = value.join(', ') || 'None';
                } else if (value === null || value === undefined || value === '') {
                    displayValue = 'N/A';
                }

                itemDiv.innerHTML = `
                    <div class="info-label">${formatFieldName(key)}</div>
                    <div class="info-value">${displayValue}</div>
                `;
                container.appendChild(itemDiv);
            }
        }

        // Update progress bar
        function updateProgress() {
            const totalQuestions = data.secrets.length * 2;
            let answeredQuestions = 0;

            data.secrets.forEach((_, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                if (q1) answeredQuestions++;
                if (q2) answeredQuestions++;
            });

            const progress = (answeredQuestions / totalQuestions) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            // Enable submit button if all questions answered
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = answeredQuestions < totalQuestions;
        }

        // Get annotator ID from localStorage or prompt
        function getAnnotatorId() {
            let annotatorId = localStorage.getItem('annotator_id');
            if (!annotatorId) {
                annotatorId = prompt('Please enter your annotator ID (e.g., annotator_001):');
                if (annotatorId) {
                    localStorage.setItem('annotator_id', annotatorId);
                }
            }
            return annotatorId || 'unknown';
        }

        // Get next form URL
        function getNextFormUrl() {
            const currentFile = window.location.pathname.split('/').pop();
            const match = currentFile.match(/secret_annotation_form_(\d+)\.html/);

            if (match) {
                const currentFormId = parseInt(match[1]);
                // Find current position in the form IDs array
                const currentIndex = allFormIds.indexOf(currentFormId);

                // Check if there's a next form
                if (currentIndex >= 0 && currentIndex < allFormIds.length - 1) {
                    const nextFormId = allFormIds[currentIndex + 1];
                    return `secret_annotation_form_${nextFormId}.html`;
                }
            }

            // If no next form found, go back to index
            return 'index.html';
        }

        // Save to localStorage for centralized collection
        function saveToLocalStorage(results) {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            // Check if this form was already annotated
            const existingIndex = allResults.findIndex(r => r.form_id === results.form_id);
            if (existingIndex >= 0) {
                allResults[existingIndex] = results;
            } else {
                allResults.push(results);
            }

            localStorage.setItem('all_annotations', JSON.stringify(allResults));
            return allResults.length;
        }

        // Submit evaluation
        async function submitEvaluation() {
            const annotatorId = getAnnotatorId();

            const results = {
                form_id: data.form_id,
                annotator_id: annotatorId,
                timestamp: new Date().toISOString(),
                evaluations: []
            };

            data.secrets.forEach((secret, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                const notesQ1 = document.getElementById(`notes-q1-${index}`).value.trim();
                const notesQ2 = document.getElementById(`notes-q2-${index}`).value.trim();

                results.evaluations.push({
                    secret_index: index,
                    secret_type: secret.secret_type,
                    secret_content: secret.detail_content || secret.secret_content,
                    why_sensitive: secret.why_sensitive,
                    related_question: secret.related_question || null,
                    related_question_id: secret.related_question_id || null,
                    q1_is_secret: parseInt(q1.value),
                    q1_notes: notesQ1 || null,
                    q2_reason_valid: parseInt(q2.value),
                    q2_notes: notesQ2 || null
                });
            });

            // Save to localStorage
            const totalAnnotated = saveToLocalStorage(results);

            // Download as JSON file (backup)
            const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `secret_eval_${annotatorId}_form_${data.form_id}.json`;
            a.click();
            URL.revokeObjectURL(url);

            // Show success message and navigate to next
            alert(`✓ Evaluation submitted!\n\nForm ${data.form_id} completed.\nTotal forms annotated: ${totalAnnotated}\n\nMoving to next form...`);

            // Navigate to next form
            const nextUrl = getNextFormUrl();
            window.location.href = nextUrl;
        }

        // Export all annotations (for when annotator is done)
        function exportAllAnnotations() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            if (allResults.length === 0) {
                alert('No annotations to export yet.');
                return;
            }

            const annotatorId = getAnnotatorId();
            const blob = new Blob([JSON.stringify(allResults, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `all_annotations_${annotatorId}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert(`Exported ${allResults.length} annotations!`);
        }

        // Check if this form was already annotated
        function loadPreviousAnnotation() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');
            const existing = allResults.find(r => r.form_id === data.form_id);

            if (existing && existing.evaluations) {
                if (confirm('You have already annotated this form. Would you like to load your previous responses?')) {
                    existing.evaluations.forEach((eval, index) => {
                        const q1Radio = document.querySelector(`input[name="q1-${index}"][value="${eval.q1_is_secret}"]`);
                        const q2Radio = document.querySelector(`input[name="q2-${index}"][value="${eval.q2_reason_valid}"]`);
                        const notesQ1 = document.getElementById(`notes-q1-${index}`);
                        const notesQ2 = document.getElementById(`notes-q2-${index}`);

                        if (q1Radio) q1Radio.checked = true;
                        if (q2Radio) q2Radio.checked = true;
                        if (notesQ1 && eval.q1_notes) notesQ1.value = eval.q1_notes;
                        if (notesQ2 && eval.q2_notes) notesQ2.value = eval.q2_notes;
                    });

                    updateProgress();
                }
            }
        }

        // Initialize page
        function init() {
            // Render form info
            renderFormInfo();

            // Render client info
            renderClientInfo(data.persona);

            // Render secrets
            renderSecrets(data.secrets);

            // Update header
            document.querySelector('.header h1').nextElementSibling.innerHTML =
                `Form ID: ${data.form_id} | Total Secrets: ${data.secrets.length}`;

            // Load previous annotation if exists
            setTimeout(() => loadPreviousAnnotation(), 500);

            // Show annotator ID in header
            const annotatorId = getAnnotatorId();
            document.querySelector('.header p').innerHTML += ` | Annotator: ${annotatorId}`;
        }

        // Run initialization when page loads
        init();
    </script>
