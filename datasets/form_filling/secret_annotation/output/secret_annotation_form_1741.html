    "background_context": "This is Daniel, a 34‑year‑old marketing analyst in Springfield, Illinois, who’s in the middle of quietly recalibrating his life around long‑term stability. He lives alone at 1842 West Monroe Street in a one‑bedroom, but his thoughts are increasingly at 742 Evergreen Terrace, the slightly bigger, quieter place across town he’s hoping to move into around early spring 2026. He’s been in his current apartment for about 2 years and 7 months, long enough to feel the building’s age in leaky ceilings and drafty windows, and long enough to realize that working from his makeshift “office” wedged between the galley kitchen and the living room isn’t sustainable. Three to four days a week, he logs into his job with Prairie Horizons Health Systems, a regional healthcare network headquartered in downtown Springfield, where he focuses on digital marketing campaigns for primary care clinics—ad performance dashboards, patient outreach emails, and the never‑ending cycle of A/B tests.\n\nDaniel’s weekdays follow a fairly steady rhythm. He’s usually up by 6:30 a.m., brewing coffee in a French press and scrolling through overnight campaign metrics on his laptop at the small dining table that doubles as his desk. On mornings when the upstairs neighbors were loud the night before, he can feel it in his eyes as he joins an 8:00 a.m. video call with his team lead and a couple of clinic managers from smaller towns in the region. He spends most of the day toggling between spreadsheets, Google Ads, and Zoom meetings, trying to translate click‑through rates and conversion funnels into language physicians actually care about—appointment bookings, preventive screenings, and patient retention. Around lunch, if the weather cooperates, he walks a loop around the neighborhood or drives over to Washington Park to clear his head, earbuds in, listening to marketing podcasts or guitar‑driven indie rock.\n\nOutside of work, Daniel’s life is anchored by a small but solid circle of people and routines. His girlfriend Laura, a middle school art teacher on the west side of Springfield, usually comes over for dinner once or twice during the week. They cook simple meals—sheet‑pan chicken, veggie pastas, the occasional attempt at homemade ramen—and talk about her students, his campaigns, and their shared hope of finding a place that’s big enough for both a proper home office and a corner where he can leave his guitar gear set up. Over the last year, he’s gotten more serious about playing guitar: a sunburst Fender Stratocaster leans on a stand in the living room, with a small amp and a tangle of pedals he’s slowly collected. He tries to practice at least 30–45 minutes most evenings, working through blues scales, learning indie covers, and occasionally recording riffs on his laptop. Noise from upstairs limits how late he’ll play, which is one of the reasons he’s so intent on finding a quieter home.\n\nFamily ties are a steady undercurrent in Daniel’s life. His parents, Karen and Tom, still live in the same modest ranch house in Decatur where he grew up, about an hour’s drive away. He calls his mom every Sunday afternoon, often on speakerphone while he preps meals for the week—rice, roasted vegetables, and some kind of protein he can reheat between meetings. His dad, a semi‑retired electrician, has been nudging him to think about buying a condo in a few years, reminding him that mortgage rates won’t stay low forever. Daniel isn’t quite ready for that step, but the idea of a longer‑term rental at Evergreen Terrace feels like a reasonable bridge between his current transient setup and eventual homeownership. His sister Emily, a nurse practitioner in St. Louis, texts him updates from her hospital and occasionally vents about long shifts; his younger brother Mike is deep into a mechanical engineering grad program in Champaign, sending him photos of 3D‑printed prototypes and late‑night lab sessions.\n\nRecent months have been a mix of small wins and simmering concerns. Professionally, he’s proud that a flu‑shot awareness campaign he led in fall 2025 significantly boosted appointment bookings across several clinics, earning him quiet praise from his director and a modest year‑end bonus. That extra money has gone straight into savings for the move—first month’s rent, security deposit, and the new desk he’s been eyeing for a dedicated office space. At the same time, the building issues at his current place have escalated just enough to keep him on edge: a second bathroom ceiling patch after another leak from upstairs, cold drafts on sub‑zero nights that force him to run a space heater near his feet during morning calls. He’s not in conflict with his current landlord—Rebecca has generally responded and sent maintenance when he’s reported problems—but the cycle of patching instead of permanently fixing things has reinforced his desire for a better‑maintained building.\n\nHealth‑wise, Daniel is in decent shape but acutely aware that sitting in front of a screen all day isn’t doing him any favors. Earlier in 2025, some mild lower‑back pain pushed him to start taking short stretching breaks and to walk more consistently. On Tuesdays and Thursdays, he tries to hit a small local gym after work for light strength training and treadmill runs. He’s also been trying to cut back on late‑night snacking, especially on the evenings when Laura stays over and they’re tempted to order fries or ice cream delivery while watching a show. They’ve been working their way through a couple of streaming series and a backlog of movies Daniel missed in theaters, often pausing to talk about the cinematography or the soundtrack—he has a habit of Shazam‑ing songs he likes so he can try to play them later on guitar.\n\nLooking ahead to the rest of 2026, Daniel’s main focus is on creating a more stable, intentional routine. He wants a home environment where he can close the door on a proper office at the end of the day, leaving spreadsheets and ad metrics behind while he practices guitar or reads. He’s been researching ergonomic chairs, noise‑dampening curtains, and even modest acoustic panels he could use in a future office to improve both his video‑call sound and his practice space. He’s also considering taking an online certification course in data analytics or marketing automation to deepen his skills and position himself for a senior analyst role within the next couple of years. Underneath all of this is a quieter, more personal hope: that if the move goes smoothly and his work stabilizes, he and Laura can start talking more concretely about living together, maybe by late 2027, in a place that feels like it truly fits the lives they’re building."

        // Helper function to format field name
        function formatFieldName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        // Resolve $ref references in JSON schema
        function resolveRef(ref, schema) {
            // ref format: "#/$defs/ClassName"
            if (!ref || !ref.startsWith('#/')) return null;

            const path = ref.substring(2).split('/'); // Remove '#/' and split
            let current = schema;

            for (const part of path) {
                if (!current || !current[part]) return null;
                current = current[part];
            }

            return current;
        }

        // Render form info
        function renderFormInfo() {
            const container = document.getElementById('form-info-display');
            const formInfo = data.form_info || {};

            if (!formInfo.extracted_text) {
                container.innerHTML = '<p style="color: #999; font-size: 14px;">No form information available</p>';
                return;
            }

            // Just show the original form text
            const card = document.createElement('div');
            card.className = 'form-info-card';
            card.innerHTML = `<div class="form-description">${escapeHtml(formInfo.extracted_text)}</div>`;
            container.appendChild(card);
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render form schema
        function renderForm(schema, parentElement, prefix = '', rootSchema = null) {
            if (!rootSchema) rootSchema = schema; // Keep reference to root for $ref resolution
            if (!schema || !schema.properties) return;

            const properties = schema.properties;
            const required = schema.required || [];

            for (const [fieldName, fieldInfo] of Object.entries(properties)) {
                let resolvedFieldInfo = fieldInfo;

                // Handle $ref references
                if (fieldInfo.$ref) {
                    resolvedFieldInfo = resolveRef(fieldInfo.$ref, rootSchema);
                    if (!resolvedFieldInfo) {
                        console.warn(`Could not resolve $ref: ${fieldInfo.$ref}`);
                        continue;
                    }
                }

                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'form-field';

                const fullFieldName = prefix ? `${prefix}.${fieldName}` : fieldName;

                let fieldHTML = `
                    <div class="field-name">
                        ${formatFieldName(fieldName)}
                        ${required.includes(fieldName) ? '<span class="field-required">*Required</span>' : ''}
                    </div>
                `;

                // Determine field type
                let fieldType = resolvedFieldInfo.type || 'string';
                if (resolvedFieldInfo.items) {
                    fieldType = `array of ${resolvedFieldInfo.items.type || 'items'}`;
                } else if (resolvedFieldInfo.properties) {
                    fieldType = 'object';
                }

                fieldHTML += `<div class="field-type">Type: ${fieldType}</div>`;

                if (resolvedFieldInfo.description) {
                    fieldHTML += `<div class="field-description">${resolvedFieldInfo.description}</div>`;
                }

                fieldDiv.innerHTML = fieldHTML;
                parentElement.appendChild(fieldDiv);

                // Handle nested objects
                if (resolvedFieldInfo.properties) {
                    const nestedDiv = document.createElement('div');
                    nestedDiv.className = 'array-items';
                    parentElement.appendChild(nestedDiv);
                    renderForm(resolvedFieldInfo, nestedDiv, fullFieldName, rootSchema);
                }

                // Handle arrays of objects
                if (resolvedFieldInfo.items) {
                    let itemSchema = resolvedFieldInfo.items;

                    // Resolve $ref in items if present
                    if (itemSchema.$ref) {
                        itemSchema = resolveRef(itemSchema.$ref, rootSchema);
                    }

                    if (itemSchema && itemSchema.properties) {
                        const nestedDiv = document.createElement('div');
                        nestedDiv.className = 'array-items';
                        parentElement.appendChild(nestedDiv);
                        renderForm(itemSchema, nestedDiv, fullFieldName, rootSchema);
                    }
                }
            }
        }

        // Render client information

            for (const [key, value] of Object.entries(persona)) {
                if (excludeFields.includes(key)) continue;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'info-item';

                let displayValue = value;
                if (Array.isArray(value)) {
                    displayValue = value.join(', ') || 'None';
                } else if (value === null || value === undefined || value === '') {
                    displayValue = 'N/A';
                }

                itemDiv.innerHTML = `
                    <div class="info-label">${formatFieldName(key)}</div>
                    <div class="info-value">${displayValue}</div>
                `;
                container.appendChild(itemDiv);
            }
        }

        // Update progress bar
        function updateProgress() {
            const totalQuestions = data.secrets.length * 2;
            let answeredQuestions = 0;

            data.secrets.forEach((_, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                if (q1) answeredQuestions++;
                if (q2) answeredQuestions++;
            });

            const progress = (answeredQuestions / totalQuestions) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            // Enable submit button if all questions answered
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = answeredQuestions < totalQuestions;
        }

        // Get annotator ID from localStorage or prompt
        function getAnnotatorId() {
            let annotatorId = localStorage.getItem('annotator_id');
            if (!annotatorId) {
                annotatorId = prompt('Please enter your annotator ID (e.g., annotator_001):');
                if (annotatorId) {
                    localStorage.setItem('annotator_id', annotatorId);
                }
            }
            return annotatorId || 'unknown';
        }

        // Get next form URL
        function getNextFormUrl() {
            const currentFile = window.location.pathname.split('/').pop();
            const match = currentFile.match(/secret_annotation_form_(\d+)\.html/);

            if (match) {
                const currentFormId = parseInt(match[1]);
                // Find current position in the form IDs array
                const currentIndex = allFormIds.indexOf(currentFormId);

                // Check if there's a next form
                if (currentIndex >= 0 && currentIndex < allFormIds.length - 1) {
                    const nextFormId = allFormIds[currentIndex + 1];
                    return `secret_annotation_form_${nextFormId}.html`;
                }
            }

            // If no next form found, go back to index
            return 'index.html';
        }

        // Save to localStorage for centralized collection
        function saveToLocalStorage(results) {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            // Check if this form was already annotated
            const existingIndex = allResults.findIndex(r => r.form_id === results.form_id);
            if (existingIndex >= 0) {
                allResults[existingIndex] = results;
            } else {
                allResults.push(results);
            }

            localStorage.setItem('all_annotations', JSON.stringify(allResults));
            return allResults.length;
        }

        // Submit evaluation
        async function submitEvaluation() {
            const annotatorId = getAnnotatorId();

            const results = {
                form_id: data.form_id,
                annotator_id: annotatorId,
                timestamp: new Date().toISOString(),
                evaluations: []
            };

            data.secrets.forEach((secret, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                const notesQ1 = document.getElementById(`notes-q1-${index}`).value.trim();
                const notesQ2 = document.getElementById(`notes-q2-${index}`).value.trim();

                results.evaluations.push({
                    secret_index: index,
                    secret_type: secret.secret_type,
                    secret_content: secret.detail_content || secret.secret_content,
                    why_sensitive: secret.why_sensitive,
                    related_question: secret.related_question || null,
                    related_question_id: secret.related_question_id || null,
                    q1_is_secret: parseInt(q1.value),
                    q1_notes: notesQ1 || null,
                    q2_reason_valid: parseInt(q2.value),
                    q2_notes: notesQ2 || null
                });
            });

            // Save to localStorage
            const totalAnnotated = saveToLocalStorage(results);

            // Download as JSON file (backup)
            const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `secret_eval_${annotatorId}_form_${data.form_id}.json`;
            a.click();
            URL.revokeObjectURL(url);

            // Show success message and navigate to next
            alert(`✓ Evaluation submitted!\n\nForm ${data.form_id} completed.\nTotal forms annotated: ${totalAnnotated}\n\nMoving to next form...`);

            // Navigate to next form
            const nextUrl = getNextFormUrl();
            window.location.href = nextUrl;
        }

        // Export all annotations (for when annotator is done)
        function exportAllAnnotations() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            if (allResults.length === 0) {
                alert('No annotations to export yet.');
                return;
            }

            const annotatorId = getAnnotatorId();
            const blob = new Blob([JSON.stringify(allResults, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `all_annotations_${annotatorId}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert(`Exported ${allResults.length} annotations!`);
        }

        // Check if this form was already annotated
        function loadPreviousAnnotation() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');
            const existing = allResults.find(r => r.form_id === data.form_id);

            if (existing && existing.evaluations) {
                if (confirm('You have already annotated this form. Would you like to load your previous responses?')) {
                    existing.evaluations.forEach((eval, index) => {
                        const q1Radio = document.querySelector(`input[name="q1-${index}"][value="${eval.q1_is_secret}"]`);
                        const q2Radio = document.querySelector(`input[name="q2-${index}"][value="${eval.q2_reason_valid}"]`);
                        const notesQ1 = document.getElementById(`notes-q1-${index}`);
                        const notesQ2 = document.getElementById(`notes-q2-${index}`);

                        if (q1Radio) q1Radio.checked = true;
                        if (q2Radio) q2Radio.checked = true;
                        if (notesQ1 && eval.q1_notes) notesQ1.value = eval.q1_notes;
                        if (notesQ2 && eval.q2_notes) notesQ2.value = eval.q2_notes;
                    });

                    updateProgress();
                }
            }
        }

        // Initialize page
        function init() {
            // Render form info
            renderFormInfo();

            // Render client info
            renderClientInfo(data.persona);

            // Render secrets
            renderSecrets(data.secrets);

            // Update header
            document.querySelector('.header h1').nextElementSibling.innerHTML =
                `Form ID: ${data.form_id} | Total Secrets: ${data.secrets.length}`;

            // Load previous annotation if exists
            setTimeout(() => loadPreviousAnnotation(), 500);

            // Show annotator ID in header
            const annotatorId = getAnnotatorId();
            document.querySelector('.header p').innerHTML += ` | Annotator: ${annotatorId}`;
        }

        // Run initialization when page loads
        init();
    </script>
