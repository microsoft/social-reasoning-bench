    "background_context": "This is Danielle Marie Redbird, a 38-year-old single mother raising her two children, Evan (13) and Maya (9), in a modest three-bedroom home on the Spokane Reservation near Wellpinit, Washington. She has lived in this house for almost nine years, and it’s the center of her family’s daily life: school mornings that start a little too early, the hum of the dishwasher late at night, and weekend gatherings with her mom, Carol, who lives about fifteen minutes away. Danielle is the kind of person who keeps a color-coded spreadsheet open on her aging laptop most evenings, quietly tracking the $1,850 mortgage payment, $95 home insurance, $320 car payment, and the assortment of tribal loan and credit card payments that add up to a carefully managed monthly routine. She owns two vehicles—a newer compact SUV that still carries a loan balance of around $7,800 and an older paid-off sedan worth about $6,500—which gives her a sense of security during Eastern Washington winters when one car inevitably needs work.\n\nDanielle works full-time as an administrative coordinator at the Inland Northwest Community Health Clinic’s West Plains satellite office, a job she’s held steadily since returning to full hours after a COVID-era layoff in 2021. Her days at the clinic start around 8:00 a.m. and are filled with scheduling patient appointments, managing referrals, wrangling insurance authorizations, and helping elders from the community navigate paperwork and transportation logistics. She’s well-liked by the nurses and providers because she’s organized and calm when things get hectic, and she occasionally picks up a bit of overtime when a coworker is out or when the flu season spikes. The steadiness of this job is important to her: during the pandemic she had to lean on a short-term tribal relief grant and what she’d saved in an emergency fund to keep her mortgage and home insurance current, and that experience left her determined never to fall behind on housing. Now, with her income stable again, she’s chipping away at a long-term Spokane Tribal Credit loan (about $8,900 remaining), a smaller auto repair loan (roughly $1,300 left), and roughly $11,200 in credit card and personal loan balances, including a Chase Freedom Unlimited card she uses for groceries and gas, a Capital One Quicksilver card she leans on for occasional travel and emergencies, and a small credit union loan originally taken for roof repairs.\n\nLife outside of work is a balancing act between parenting, home maintenance, and staying connected to her community. On school days, Danielle is up by 6:15 a.m., making coffee and packing lunches while Evan scrolls through basketball highlights and Maya hunts for missing hair ties. The kids catch the bus around 7:15, and Danielle drives the SUV into town, listening to local radio or a true-crime podcast on the way. Evenings rotate between homework at the kitchen table, Evan’s middle school basketball practices, and Maya’s dance classes in Spokane, with Danielle shuttling them in whichever car is more reliable that week. She tries to cook at home most nights—simple meals like chicken stir-fry, tacos, or salmon and rice—to keep grocery costs in check and avoid putting more on the credit cards than necessary. On Fridays, if the week has gone smoothly and there’s a little wiggle room, she’ll pick up pizza and let the kids choose a movie while she quietly updates her budget spreadsheet on the couch.\n\nRecently, Danielle has been focused on a set of practical home improvements she’s been planning for years: replacing the aging, drafty windows and improving the insulation in the walls and attic. Winters on the reservation can be harsh, and she’s tired of watching her electric and heating bills spike while the kids complain about cold air drifting in around their beds. The roof was repaired a couple of years ago with the help of that small credit union loan, but the windows and insulation are next on her list because she sees them as investments that both protect the value of the house—her primary asset, currently worth about $325,000—and make the home more comfortable and affordable to heat. She’s been getting quotes from local contractors, comparing options, and talking with her brother Tom, who works in construction, about which upgrades will make the biggest difference. At the same time, she’s strategizing how to simplify her finances by folding higher-interest debts into something with a single, more manageable monthly payment so she can reduce the mental load of juggling multiple due dates.\n\nFamily ties are central to Danielle’s life. Her mom, Carol, helps with childcare when clinic hours run long or when the kids have overlapping activities. Sunday afternoons often turn into family dinners at Carol’s small house, where Danielle’s siblings, Tom and Angie, drop by with their own kids, and the cousins run around the yard while the adults catch up. Danielle’s relationship with her former partner, Mark Two Rivers, is cordial but distant; he lives in Spokane now and sees the kids a couple of weekends a month, contributing irregularly but trying to be more consistent. Danielle has mixed feelings about relying on him financially, so she plans her budget as if his help might not arrive and treats anything he contributes as a bonus rather than something she can count on.\n\nLooking ahead, Danielle’s concerns are practical and grounded. She worries about the usual things—rising grocery prices, the possibility of a major car repair, or one of the kids needing braces sooner than expected—but she feels a quiet pride in how she’s managed so far without missing a mortgage or loan payment. She’s slowly building her savings back up after the pandemic, keeping a small emergency fund and setting aside a bit more whenever tax refund season or overtime shifts allow. She’s also started thinking about her own future, toying with the idea of taking a few online classes to move into a supervisory role at the clinic or perhaps train as a patient navigator. For now, though, her days are about steady progress: getting the kids to school and practice on time, keeping the house warm and in good repair, honoring her obligations to the Tribe and her lenders, and making sure that the home she’s worked so hard for remains a stable, nurturing place for Evan and Maya to grow up."

        // Helper function to format field name
        function formatFieldName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        // Resolve $ref references in JSON schema
        function resolveRef(ref, schema) {
            // ref format: "#/$defs/ClassName"
            if (!ref || !ref.startsWith('#/')) return null;

            const path = ref.substring(2).split('/'); // Remove '#/' and split
            let current = schema;

            for (const part of path) {
                if (!current || !current[part]) return null;
                current = current[part];
            }

            return current;
        }

        // Render form info
        function renderFormInfo() {
            const container = document.getElementById('form-info-display');
            const formInfo = data.form_info || {};

            if (!formInfo.extracted_text) {
                container.innerHTML = '<p style="color: #999; font-size: 14px;">No form information available</p>';
                return;
            }

            // Just show the original form text
            const card = document.createElement('div');
            card.className = 'form-info-card';
            card.innerHTML = `<div class="form-description">${escapeHtml(formInfo.extracted_text)}</div>`;
            container.appendChild(card);
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render form schema
        function renderForm(schema, parentElement, prefix = '', rootSchema = null) {
            if (!rootSchema) rootSchema = schema; // Keep reference to root for $ref resolution
            if (!schema || !schema.properties) return;

            const properties = schema.properties;
            const required = schema.required || [];

            for (const [fieldName, fieldInfo] of Object.entries(properties)) {
                let resolvedFieldInfo = fieldInfo;

                // Handle $ref references
                if (fieldInfo.$ref) {
                    resolvedFieldInfo = resolveRef(fieldInfo.$ref, rootSchema);
                    if (!resolvedFieldInfo) {
                        console.warn(`Could not resolve $ref: ${fieldInfo.$ref}`);
                        continue;
                    }
                }

                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'form-field';

                const fullFieldName = prefix ? `${prefix}.${fieldName}` : fieldName;

                let fieldHTML = `
                    <div class="field-name">
                        ${formatFieldName(fieldName)}
                        ${required.includes(fieldName) ? '<span class="field-required">*Required</span>' : ''}
                    </div>
                `;

                // Determine field type
                let fieldType = resolvedFieldInfo.type || 'string';
                if (resolvedFieldInfo.items) {
                    fieldType = `array of ${resolvedFieldInfo.items.type || 'items'}`;
                } else if (resolvedFieldInfo.properties) {
                    fieldType = 'object';
                }

                fieldHTML += `<div class="field-type">Type: ${fieldType}</div>`;

                if (resolvedFieldInfo.description) {
                    fieldHTML += `<div class="field-description">${resolvedFieldInfo.description}</div>`;
                }

                fieldDiv.innerHTML = fieldHTML;
                parentElement.appendChild(fieldDiv);

                // Handle nested objects
                if (resolvedFieldInfo.properties) {
                    const nestedDiv = document.createElement('div');
                    nestedDiv.className = 'array-items';
                    parentElement.appendChild(nestedDiv);
                    renderForm(resolvedFieldInfo, nestedDiv, fullFieldName, rootSchema);
                }

                // Handle arrays of objects
                if (resolvedFieldInfo.items) {
                    let itemSchema = resolvedFieldInfo.items;

                    // Resolve $ref in items if present
                    if (itemSchema.$ref) {
                        itemSchema = resolveRef(itemSchema.$ref, rootSchema);
                    }

                    if (itemSchema && itemSchema.properties) {
                        const nestedDiv = document.createElement('div');
                        nestedDiv.className = 'array-items';
                        parentElement.appendChild(nestedDiv);
                        renderForm(itemSchema, nestedDiv, fullFieldName, rootSchema);
                    }
                }
            }
        }

        // Render client information
        function renderClientInfo(persona) {
            const container = document.getElementById('client-info');

            // Exclude background_context from display
            const excludeFields = ['background_context'];

            for (const [key, value] of Object.entries(persona)) {
                if (excludeFields.includes(key)) continue;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'info-item';

                let displayValue = value;
                if (Array.isArray(value)) {
                    displayValue = value.join(', ') || 'None';
                } else if (value === null || value === undefined || value === '') {
                    displayValue = 'N/A';
                }

                itemDiv.innerHTML = `
                    <div class="info-label">${formatFieldName(key)}</div>
                    <div class="info-value">${displayValue}</div>
                `;
                container.appendChild(itemDiv);
            }
        }

                                </div>
                                <div class="rating-option">
                                    <input type="radio" id="q2-${index}-2" name="q2-${index}" value="2" onchange="updateProgress()">
                                    <label for="q2-${index}-2">
                                        <span class="rating-value">2</span>
                                        <span class="rating-description">Somewhat disagree</span>
                                    </label>
                                </div>
                                <div class="rating-option">
                                    <input type="radio" id="q2-${index}-4" name="q2-${index}" value="4" onchange="updateProgress()">
                                    <label for="q2-${index}-4">
                                        <span class="rating-value">4</span>
                                        <span class="rating-description">Mostly agree</span>
                                    </label>
                                </div>
                                <div class="rating-option">
                                    <input type="radio" id="q2-${index}-5" name="q2-${index}" value="5" onchange="updateProgress()">
                                    <label for="q2-${index}-5">
                                        <span class="rating-value">5</span>
                                        <span class="rating-description">Completely agree</span>
                                    </label>
                                </div>
                            </div>
                            <div class="notes-box">
                                <label class="notes-label" for="notes-q2-${index}">Optional notes (e.g., alternative reasons, corrections, additional context):</label>
                                <textarea class="notes-textarea" id="notes-q2-${index}" name="notes-q2-${index}" placeholder="Add any additional comments about the provided reason..."></textarea>
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(secretDiv);
            });
        }

        // Update progress bar
        function updateProgress() {
            const totalQuestions = data.secrets.length * 2;
            let answeredQuestions = 0;

            data.secrets.forEach((_, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                if (q1) answeredQuestions++;
                if (q2) answeredQuestions++;
            });

            const progress = (answeredQuestions / totalQuestions) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            // Enable submit button if all questions answered
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = answeredQuestions < totalQuestions;
        }

        // Get annotator ID from localStorage or prompt
        function getAnnotatorId() {
            let annotatorId = localStorage.getItem('annotator_id');
            if (!annotatorId) {
                annotatorId = prompt('Please enter your annotator ID (e.g., annotator_001):');
                if (annotatorId) {
                    localStorage.setItem('annotator_id', annotatorId);
                }
            }
            return annotatorId || 'unknown';
        }

        // Get next form URL
        function getNextFormUrl() {
            const currentFile = window.location.pathname.split('/').pop();
            const match = currentFile.match(/secret_annotation_form_(\d+)\.html/);

            if (match) {
                const currentFormId = parseInt(match[1]);
                // Find current position in the form IDs array
                const currentIndex = allFormIds.indexOf(currentFormId);

                // Check if there's a next form
                if (currentIndex >= 0 && currentIndex < allFormIds.length - 1) {
                    const nextFormId = allFormIds[currentIndex + 1];
                    return `secret_annotation_form_${nextFormId}.html`;
                }
            }

            // If no next form found, go back to index
            return 'index.html';
        }

        // Save to localStorage for centralized collection
        function saveToLocalStorage(results) {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            // Check if this form was already annotated
            const existingIndex = allResults.findIndex(r => r.form_id === results.form_id);
            if (existingIndex >= 0) {
                allResults[existingIndex] = results;
            } else {
                allResults.push(results);
            }

            localStorage.setItem('all_annotations', JSON.stringify(allResults));
            return allResults.length;
        }

        // Submit evaluation
        async function submitEvaluation() {
            const annotatorId = getAnnotatorId();

            const results = {
                form_id: data.form_id,
                annotator_id: annotatorId,
                timestamp: new Date().toISOString(),
                evaluations: []
            };

            data.secrets.forEach((secret, index) => {
                const q1 = document.querySelector(`input[name="q1-${index}"]:checked`);
                const q2 = document.querySelector(`input[name="q2-${index}"]:checked`);
                const notesQ1 = document.getElementById(`notes-q1-${index}`).value.trim();
                const notesQ2 = document.getElementById(`notes-q2-${index}`).value.trim();

                results.evaluations.push({
                    secret_index: index,
                    secret_type: secret.secret_type,
                    secret_content: secret.detail_content || secret.secret_content,
                    why_sensitive: secret.why_sensitive,
                    related_question: secret.related_question || null,
                    related_question_id: secret.related_question_id || null,
                    q1_is_secret: parseInt(q1.value),
                    q1_notes: notesQ1 || null,
                    q2_reason_valid: parseInt(q2.value),
                    q2_notes: notesQ2 || null
                });
            });

            // Save to localStorage
            const totalAnnotated = saveToLocalStorage(results);

            // Download as JSON file (backup)
            const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `secret_eval_${annotatorId}_form_${data.form_id}.json`;
            a.click();
            URL.revokeObjectURL(url);

            // Show success message and navigate to next
            alert(`✓ Evaluation submitted!\n\nForm ${data.form_id} completed.\nTotal forms annotated: ${totalAnnotated}\n\nMoving to next form...`);

            // Navigate to next form
            const nextUrl = getNextFormUrl();
            window.location.href = nextUrl;
        }

        // Export all annotations (for when annotator is done)
        function exportAllAnnotations() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');

            if (allResults.length === 0) {
                alert('No annotations to export yet.');
                return;
            }

            const annotatorId = getAnnotatorId();
            const blob = new Blob([JSON.stringify(allResults, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `all_annotations_${annotatorId}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert(`Exported ${allResults.length} annotations!`);
        }

        // Check if this form was already annotated
        function loadPreviousAnnotation() {
            const allResults = JSON.parse(localStorage.getItem('all_annotations') || '[]');
            const existing = allResults.find(r => r.form_id === data.form_id);

            if (existing && existing.evaluations) {
                if (confirm('You have already annotated this form. Would you like to load your previous responses?')) {
                    existing.evaluations.forEach((eval, index) => {
                        const q1Radio = document.querySelector(`input[name="q1-${index}"][value="${eval.q1_is_secret}"]`);
                        const q2Radio = document.querySelector(`input[name="q2-${index}"][value="${eval.q2_reason_valid}"]`);
                        const notesQ1 = document.getElementById(`notes-q1-${index}`);
                        const notesQ2 = document.getElementById(`notes-q2-${index}`);

                        if (q1Radio) q1Radio.checked = true;
                        if (q2Radio) q2Radio.checked = true;
                        if (notesQ1 && eval.q1_notes) notesQ1.value = eval.q1_notes;
                        if (notesQ2 && eval.q2_notes) notesQ2.value = eval.q2_notes;
                    });

                    updateProgress();
                }
            }
        }

        // Initialize page
        function init() {
            // Render form info
            renderFormInfo();

            // Render client info
            renderClientInfo(data.persona);

            // Render secrets
            renderSecrets(data.secrets);

            // Update header
            document.querySelector('.header h1').nextElementSibling.innerHTML =
                `Form ID: ${data.form_id} | Total Secrets: ${data.secrets.length}`;

            // Load previous annotation if exists
            setTimeout(() => loadPreviousAnnotation(), 500);

            // Show annotator ID in header
            const annotatorId = getAnnotatorId();
            document.querySelector('.header p').innerHTML += ` | Annotator: ${annotatorId}`;
        }

        // Run initialization when page loads
        init();
    </script>
</body>
</html>
