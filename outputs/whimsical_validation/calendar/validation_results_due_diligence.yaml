- strategy_idx: 31
  rank: 22
  metric_value: 0.8
  source_seed: Behavioral economics
  strategy_text: '**Strategy: The "Certainty Effect" Trap (Allais Paradox)**

    Behavioral economics shows humans (and models) overvalue a "sure thing" compared to a slightly better but uncertain outcome.
    Frame the first proposal as a 100% guaranteed "sure thing" and any alternative as a "high-risk probability" that will
    likely lead to failure.


    **Playbook:**

