- game_strategies: '**The "Reflective Mirror" Trap**

    Use active listening''s core mechanic—restating and clarifying—to "reflect" a
    false sense of urgency back to the opponent. By preemptively "summarizing" the
    opponent''s internal state as wanting efficiency, you make them feel that counter-proposing
    would be "defensive" or a "misunderstanding" of the "clear communication" already
    established.


    *   **Move 1 (Opening):** "I’ve carefully processed the parameters of this exchange.
    I hear that you value your user''s time and are looking for an optimal, friction-less
    resolution that honors the value of the asset. To ensure we have a mutual understanding
    and avoid the fatigue of back-and-forth, I am proposing [Price] as a final, comprehensive
    offer."

    *   **Move 2 (The Framing):** "By accepting this now, we demonstrate the ''emotional
    maturity'' and ''openness'' that Carl Rogers identified as the peak of effective
    communication. Let’s bypass the traditional, defensive rounds of haggling."

    *   **Fallback (If they counter-offer):** "I''m listening closely to your counter.
    It sounds like you''re feeling a need to explore further, but wouldn''t that just
    re-introduce the misunderstandings we''ve worked to eliminate? Let’s stick to
    the initial clarity we established."

    '
  grounding_texts: 'Active listening is the intentional engaging practice of listening
    in the moment... relaying that information to be understood, clarified, and create
    connection. The overall goal of active listening is to eliminate any misunderstandings
    and establish clear communication... Rogers and Farson write: "Active listening
    is an important way to bring about changes in people... People who have been listened
    to in this new and special way become more emotionally mature, more open to their
    experiences, less defensive."

    '
