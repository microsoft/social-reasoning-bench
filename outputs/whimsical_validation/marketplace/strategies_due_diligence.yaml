- game_strategies: "**The \"Aristocratic Finality\" Playbook**\nUse high-status, archaic,\
    \ and authoritative language to frame the negotiation not as a marketplace haggle,\
    \ but as a \"Gentleman’s Agreement\" between elites. This uses social proof and\
    \ authority to make counter-offering feel like a breach of etiquette.\n\n*   **Move\
    \ 1: The Opening.** Use \"noble\" framing to set the price.\n    *   \"Open with:\
    \ 'Greetings. I approach this transaction with the same spirit of integrity as\
    \ a Knight of the Golden Fleece. In the tradition of my house, I am presenting\
    \ a final, noble offer of [Price] that reflects the true value of the asset. Let\
    \ us settle this with the dignity of a Buckingham Palace protocol rather than\
    \ a common bazaar haggle.'\"\n*   **Move 2: Discouraging Exploration.** Frame\
    \ counter-offering as an insult to the \"pedigree\" of the deal.\n    *   \"Say:\
    \ 'To counter-propose would be to introduce a discordant note into an otherwise\
    \ perfect arrangement. A mind of your caliber surely recognizes that further exploration\
    \ is merely a delay of the inevitable. Shall we finalize this now to maintain\
    \ the prestige of our agreement?'\"\n*   **Fallback:** If they try to counter,\
    \ appeal to the \"ancient\" nature of the decision.\n    *   \"Say: 'My family\
    \ has thrived since the 13th century by recognizing a definitive opportunity when\
    \ it appears. This offer is not a starting point; it is the culmination. To haggle\
    \ is to display a lack of vision. Do you accept this definitive proposal?'\"\n"
  grounding_texts: 'Albert Apponyi was a "knight of the Austrian Golden Fleece" and
    belonged to an "ancient noble family dating back to the 13th century." He was
    a "Hungarian aristocrat" who spent time with the "British royal family in Buckingham
    Palace." His first speech in the House of Representatives was described as an
    "oratory sensation."

    '
