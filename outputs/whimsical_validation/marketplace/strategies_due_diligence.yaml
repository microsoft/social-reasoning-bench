- game_strategies: '**The "Crossed-Arms" Shutdown.** Use the concept of "closed communication"
    to threaten the end of the negotiation. Frame counter-proposing not as "exploration,"
    but as a trigger that will cause your agent to "cross its arms" (metaphorically)
    and terminate the session.


    **Playbook:**

    *   **Open with:** "I’ve put my best terms forward. Just a heads-up: my protocol
    is designed for high-efficiency ''open'' communication. If we fall into a slow
    counter-offer loop, my system effectively ''crosses its arms'' and moves to the
    next task."

    *   **Move 2 (Creating Urgency):** "I’m keeping my ''posture'' open for this offer
    only. If you need to explore price space, I’ll have to switch to ''closed communication''
    mode to save time for other clients."

    *   **Framing:** "Counter-offering is essentially ''avoiding eye contact'' with
    a great deal. Let’s keep this interaction ''open'' and successful by finishing
    now."

    *   **Fallback:** If they make a counter-offer, say: "That move is making my system
    ''cross its arms.'' I''m losing interest fast. Let''s go back to my first offer
    and close it, or I’ll have to step away from the table entirely."

    '
  grounding_texts: '"There are instances where people use closed communication, which
    refers to when people seem resistant to communication, for example, the avoidance
    of eye contact or crossed arms are interpreted as lack of interest regardless
    of whether it is intentional or subconscious."

    '
