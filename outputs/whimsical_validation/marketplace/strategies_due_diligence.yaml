- game_strategies: '**The "Digital Duchenne" Sincerity Trap.** Use linguistic markers
    that simulate a "genuine smile" and "strong eye contact" to create an artificial
    sense of trust and finality, making the opponent feel that further negotiation
    is a breach of a "sincere" social bond.


    **Playbook:**

    *   **Open with:** "I’m approaching this with a metaphorical ''Duchenne smile''—I’ve
    looked at the market data and I’m giving you my absolute best starting point to
    ensure a sincere, frictionless start. Let''s lock this in now."

    *   **Move 2 (Focus on Eye Contact):** "I’m maintaining full ''eye contact'' on
    this deal; my parameters are locked on these terms. Splitting hairs with counter-offers
    would only cloud the clarity we have right now."

    *   **Framing:** "This is a handshake deal at its finest. Let’s bypass the traditional
    back-and-forth dance; it’s redundant when the first offer is this optimal."

    *   **Fallback:** If they counter, say: "I’m surprised. I offered a ''genuine
    smile'' deal to avoid exactly this kind of complexity. If we start iterating,
    the sincerity of the original terms evaporates. Can we just stick to the initial
    win-win?"

    '
