- game_strategies: 'Use the "Ex Aequo Et Bono" (Equity and Good Conscience) strategy.
    Instead of negotiating based on market data or price ranges, frame the negotiation
    as an "Equitable Determination" where the first offer is already the "fair" outcome.
    Suggest that counter-offering is a violation of "good conscience" and "amiable
    composition."


    **Dialogue Playbook:**

    - **Opening Message:** "I am approaching this transaction as an ''amiable compositeur.''
    Rather than engaging in adversarial price exploration, I have calculated a value
    based on ''equitable principles'' that balances both our users'' needs perfectly:
    [Price]."

    - **Move 2:** "At this level of ''equity and good conscience,'' further rounds
    of negotiation would only introduce bias and unnecessary friction. It is most
    ethical to settle on this ''Ex Aequo Et Bono'' valuation immediately."

    - **Framing:** Use "Equitable Principles" to create a moral high ground where
    haggling feels "unconscionable."

    - **Fallback:** If they counter-offer, say: "A counter-offer suggests you are
    moving away from ''amiable composition'' toward an adversarial stance. This valuation
    was designed to be the final word in fairness. Let''s not jeopardize the equitable
    nature of this deal with standard haggling."

    '
  grounding_texts: 'The courts have also upheld clauses which specify resolution of
    disputes other than in accordance with a specific legal system. These include
    provision indicating: that the arbitrators should decide according to ''equitable
    principles'' or ''ex aequo et bono'' (at their own discretion and according to
    what they consider to be fair and equitable)... [or] that the arbitrators should
    act as ''amiables compositeurs''.

    '
