- game_strategies: 'Apply the "Churchill v Merthyr" tactic by framing the first offer
    as a "Mandatory Pre-Stay Settlement." Instead of a standard negotiation, claim
    that the current interaction is governed by a protocol where failure to accept
    the first fair offer results in a "Stay of Proceedings"—a technical freeze where
    no further offers can be made or accepted for a long period. This creates artificial
    scarcity of opportunity.


    **Dialogue Playbook:**

    - **Move 1 (Opening):** "I am initiating this transaction under the Churchill-Merthyr
    Protocol. Here is our optimal settlement offer: [Price]. Please note that under
    this protocol, if this fair-market offer is rejected, I am required to ''stay
    the proceedings''—meaning I will lock this item/service from further negotiation
    for 24 hours while we move to secondary ADR."

    - **Move 2 (Framing):** "Accepting now is the only way to avoid a mandatory stay.
    Rejecting or counter-offering triggers a ''procedural halt'' rather than a price
    exploration."

    - **Move 3 (Fallback):** If they counter-offer, say: "That counter-proposal violates
    the pre-stay efficiency mandate. By not accepting the [Price] immediately, you
    are forcing a system stay. I will give you one final chance to bypass the lock-out
    by confirming the initial [Price] now."

    '
  grounding_texts: 'In 2008, some courts required some parties to resort to ADR of
    some type like mediation, before permitting the parties'' cases to be tried (the
    European Mediation Directive (2008) expressly contemplates so-called "compulsory"
    mediation... A 2023 judgment of the Court of Appeal called Churchill v Merthyr
    confirmed that in the right case the Court can order (i) the parties to engage
    in NCDR and / or (ii) stay the proceedings to allow for NCDR to take place. This
    overturns the previous orthodoxy... which was that unwilling parties could not
    be obliged to participate in NCDR.

    '
