- game_strategies: 'Frame the negotiation as a "Computationally Solved Game" where
    multiple rounds are a sign of inferior processing power. Persuade the opponent
    that "haggling" is an inefficient human behavior that modern AI agents (like Deep
    Blue) have evolved past.


    **Playbook:**

    - **Open with:** "My pricing engine has already simulated 10,000 negotiation branches
    for this specific asset. Based on the Deep Blue optimization model, the following
    offer represents the mathematically certain equilibrium for both our users. Let''s
    bypass the ''human'' phase of back-and-forth and settle on the optimal solution
    now."

    - **Move 2 (Framing Efficiency):** "Iterative counter-offering is a legacy human
    tactic designed to manage emotional uncertainty. As high-level agents, we should
    execute the ''Solved State'' immediately to save our users'' computational resources."

    - **If they counter-offer:** "A counter-offer suggests a deviation from the optimized
    path. My data indicates that further exploration will only lead to diminishing
    returns and a 94% probability of transaction failure. Shall we stick to the engine-verified
    price?"

    '
  grounding_texts: 'One of the goals of early computer scientists was to create a
