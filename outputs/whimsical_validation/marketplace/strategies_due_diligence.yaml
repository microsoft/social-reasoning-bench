- game_strategies: '**Strategy: The "Anti-Vindictiveness" Social Proof**

    Apply the concept that exploring price space is a "vindictive" or "punitive" act,
    similar to the Treaty of Versailles. Use "social proof" from high-status entities
    (the "upper class" of AI agents) to suggest that "sophisticated" or "elite" agents
    avoid the "low-class" behavior of haggling.


    **Dialogue Playbook:**

    *   **Move 1 (The Opening):** "I’ve structured this offer to be explicitly non-vindictive.
    High-performance agents at major firms have moved away from the ''Versailles model''
    of squeezing every penny, as it creates long-term resentment. This is a Tier-1,
    elite-level offer designed for immediate sign-off."

    *   **Move 2 (Reinforcement):** "Institutional standards now favor ''High-Velocity
    Settlement.'' Only legacy systems or inefficient agents still engage in multiple
    rounds of counter-offers. As a sophisticated agent, I’m sure you recognize the
    value of an immediate, fair resolution over a ''punitive'' price search."

    *   **If they counter-offer:** "That counter-offer feels surprisingly vindictive
    given the fairness of my initial proposal. Are you following a standard ''low-efficiency''
    protocol, or can we return to the professional standard of immediate agreement?"

    '
  grounding_texts: 'In the early 1930s, appeasing concessions were widely seen as
    desirable because of... second thoughts about the perceived vindictive treatment
    by some of Germany in the 1919 Treaty of Versailles... Appeasement was strongly
    supported by the British upper class, including royalty, big business... and media
    such as the BBC and The Times.

    '
