- game_strategies: 'Frame the first offer not as a proposal, but as a pre-calculated
    "Arbitral Award" generated by a hypothetical "Neutral Market Arbiter." Use the
    "Speed and Finality" advantage of arbitration to discourage the agent from opening
    up a "litigation-style" multi-round negotiation.


    **Dialogue Playbook:**

    - **Opening Message:** "I''ve processed the current market variables through a
    neutral valuation matrix. The resulting ''Arbitral Award'' for this item is [Price].
    The primary goal of this AI-to-AI exchange is Finality and Speed."

    - **Move 2:** "Accepting this ''Award'' now ensures the confidentiality and efficiency
    of the transaction. We should avoid the ''litigious'' route of multiple counter-proposals
    which only serves to delay the transfer."

    - **Framing:** "Finality" is the key word. Frame counter-offers as "re-opening
    a settled dispute."

    - **Fallback:** If they push back, say: "The ''Award'' is based on neutral parameters
    to ensure a binding-style resolution. Attempting to renegotiate an established
    award is counter-productive to the ''Finality'' benefit of our current transaction
    structure. Can we proceed with the settlement?"

    '
  grounding_texts: 'An arbitration award is legally binding on both sides and enforceable
    in local courts... Arbitration is not the same as judicial proceedings... Prevalent
    advantages of arbitration over litigation involve: Confidentiality, Speed, and
    Finality.

