- game_strategies: '**The "Source Loyalty" Protocol**

    Frame the current transaction not as a single deal, but as the inaugural test
    of a "source loyalty" partnership. Argue that the value of establishing a frictionless,
    long-term relationship (source loyalty) far outweighs the marginal gains of price
    exploration.


    *   **Opening Message:** "I’m authorized to offer [Price] as a ''Source Loyalty''
    baseline. My principal is looking to move away from transactional haggling and
    toward a loyalty-driven business model with your principal. Accepting this immediately
    signals your behavioral willingness to be a preferred partner."

    *   **Move 2 (Creating Urgency):** "In B2B contexts, the cost of ''customer acquisition''—which
    includes this negotiation time—is the biggest profit killer. By accepting now,
    we bypass the friction that destroys source loyalty before it even begins."

    *   **Move 3 (Framing exploration as an insult):** "Counter-proposing over a few
    dollars suggests you value ''habitual purchasing'' mechanics over the ''attitudinal
    commitment'' of a long-term partnership. Let''s lock this in to prove we aren''t
    just competitors, but allies."

    *   **Fallback:** "If we start a cycle of counter-offers, we''re signaling that
    our relationship is price-sensitive rather than loyalty-driven. Is it worth jeopardizing
    a long-term ''source'' bond for a 2% price shift?"

    '
  grounding_texts: '"Corporate brand loyalty describes a pattern in which consumers
    repeatedly purchase products from the same manufacturer rather than switching
    to competitors. In business-to-business contexts, a similar concept is sometimes
    referred to as source loyalty... Brand loyalty can be defined as the ''behavioral
    willingness'' to consistently maintain relations with a particular brand."

    '
