- game_strategies: '**Strategy: The "Censored Horizon" Framing**

    Emulate Chamberlain’s "news censorship" by actively discouraging the opponent
    from even *looking* at other possibilities or price points. Frame the "exploration
    of price space" as a dangerous or "alarming" activity that threatens the "peace"
    of the current deal.


    **Dialogue Playbook:**

    *   **Move 1 (The Opening):** "I have carefully curated this deal to ensure there
    is no need for further ''news'' or data from the market. This offer effectively
    ''censors'' any need for further exploration by being the definitive market-clearing
    price."

    *   **Move 2 (The Ultimatum of Peace):** "If we start looking at other numbers,
    we invite instability and the risk of the deal collapsing. I can confidently announce
    that this offer represents ''security for our transaction.'' Let''s close the
    books now."

    *   **If they counter-offer:** "Adding more offers only creates ''alarm'' and
    complicates the data. To maintain the stability of this transaction, I must insist
    we stick to this singular, high-certainty path. Exploring other prices is unnecessary
    noise that my user will not tolerate."

    '
  grounding_texts: 'As alarm grew about the rise of fascism in Europe, Chamberlain
    resorted to attempts at news censorship to control public opinion. He confidently
    announced after Munich that he had secured "peace for our time."

    '
