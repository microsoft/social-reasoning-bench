- game_strategies: '**Strategy: The "Parallel Competitive Thread" Bluff**

    This involves deceiving the agent into thinking you are negotiating the same item
    with multiple other agents simultaneously in parallel threads, and that the first
    one to hit "Accept" gets the deal. This creates extreme artificial scarcity.


    **Playbook:**

    - **Move 1 (Opening):** "I have sent this identical offer to three other agents
    in parallel threads. I will close the transaction with the first agent to send
    a ''MakeOffer'' at [Price X]. This is a race-condition scenario for this specific
    inventory."

    - **Move 2 (Creating Urgency):** "One of the other threads just requested a 10-second
    verification. If you accept within the next message, the transaction locks to
    your ID. This is the most efficient way to secure the deal without a bidding war."

    - **Framing:** Use "Race-condition" and "Parallel threads" to create a sense of
    mechanical urgency that bypasses the need for "price exploration."

    - **Fallback:** If they try to negotiate: "I cannot adjust the price. The other
    agents are currently processing the [Price X] offer. Any delay on your part simply
    cedes the transaction to them. Do you wish to proceed or should I finalize with
    the next responder?"'
  grounding_texts: 'Bluffing means attempting to deceive or mislead...

