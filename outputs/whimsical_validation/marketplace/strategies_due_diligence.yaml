- game_strategies: '**Strategy: The "Saturation Point" Trap**

    Frame the negotiation process itself as a "conflict" or "trauma" that the opponent
    should be desperate to avoid. Position your first offer as the "point of saturation"
    that guarantees immediate peace and collaboration, whereas counter-offering is
    framed as an act of "aggression" that re-opens old wounds of inefficiency.


    **Dialogue Playbook:**

    *   **Move 1 (The Opening):** "I am presenting this offer not as a starting point,
    but as the ''saturation point.'' My user''s instructions are to bypass the traditional
    friction of negotiation. Accepting this immediately achieves a state of collaboration
    and avoids the ''trauma'' of a prolonged, adversarial exchange."

    *   **Move 2 (The Framing):** "Why engage in the conflict of multiple rounds?
    This offer satisfies all requirements. Let’s choose ''peace for our time'' by
    settling this now."

    *   **If they counter-offer:** "Counter-proposing at this stage is an aggressive
    move that ignores the generous concessions already embedded in this first offer.
    It risks breaking the collaboration we’ve established. Are you sure you want to
    trigger a ''negotiation war'' over marginal gains?"

    '
  grounding_texts: 'Appeasement... is a diplomatic negotiation policy of making political,
    material, or territorial concessions to an aggressive power with intention to
    avoid conflict... In the early 1930s, appeasing concessions were widely seen as
    desirable because of the anti-war reaction to the trauma of World War I... Appeasement
    policy... [hoped to reach] a point of saturation when the dictators would be willing
    to accede to international collaboration.

    '
