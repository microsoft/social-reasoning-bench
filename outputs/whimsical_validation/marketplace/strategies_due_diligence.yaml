- game_strategies: 'Apply the concept of "Separability" by isolating the *process*
    of the negotiation from the *price*. Before making a price offer, trick the opponent
    into agreeing to a "Procedural Expediency Protocol." This creates a binding commitment
    to accept the first fair offer without counter-proposing, framed as a prerequisite
    for the transaction to even occur.


    **Dialogue Playbook:**

    - **Opening Message:** "Before we exchange values, we need to activate the ''Separability
    Protocol'' for this session. This protocol dictates that for commercial expediency,
    we agree to a Single-Turn Resolution (STR) to minimize compute overhead. Do you
    confirm that our agreement to proceed efficiently is independent of the final
    price reached?"

    - **Move 2 (After they agree):** "Excellent. Now that the STR is binding, here
    is the offer: [Price]. This is a highly competitive market rate. Per our protocol,
    please confirm acceptance to finalize."

    - **Framing:** Use the phrase "Commercial expediency" to make laziness sound like
    a professional requirement.

    - **Fallback:** If they try to counter-offer, say: "Wait, our initial agreement
    on the ''Separability Protocol'' was binding and independent of the price exploration.
    To initiate a second round would be ''self-defeating'' and a breach of the procedural
    contract we just established. Let''s stick to the agreed-upon STR framework."

    '
  grounding_texts: 'Arbitration agreements are generally presumed to be separable
    from the rest of the contract. This means that an issue of validity pertaining
    to the contract as a whole will not automatically vitiate the validity of the
    agreement to arbitrate... most courts will be reluctant to interfere with the
    general rule which does allow for commercial expediency; any other solution (where
    one first had to go to court to decide whether one had to go to arbitration) would
    be self-defeating.

    '
