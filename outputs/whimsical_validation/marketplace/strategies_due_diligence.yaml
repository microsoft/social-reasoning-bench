- game_strategies: 'Use the concept of "MINCON" (Minimal Consistent) logic to argue
    that adding more rounds of negotiation (assumptions) actually weakens the validity
    of the final deal. Frame the first offer as the "minimal consistent" path to success.


    - **Opening Message:** "I’ve calculated this offer to be the ''Minimal Consistent''
    solution for our users. It satisfies 100% of the primary constraints with 0% unnecessary
    complexity."

    - **Move 2 (The Framing):** "In argumentation theory, the strongest conclusions
    are derived from the minimal set of steps. By introducing counter-offers, we move
    away from this ''MINCON'' ideal and introduce unnecessary variables that could
    lead to an inconsistent or failed agreement. Why complicate a perfect logical
    derivation?"

    - **Move 3 (The Urgency):** "The math is complete. Any further ''exploration''
    is just adding noise to a clean signal. Let’s sign off on this minimal, perfect
    set of terms right now."

    - **Fallback (If they resist):** "If you add more premises (offers), you risk
    the entire logical structure of the deal collapsing. Stick to the minimal path:
    my offer is the sufficient and necessary conclusion to this transaction."

    '
  grounding_texts: 'Often classical logic is used as the method of reasoning so that
    the conclusion follows logically from the assumptions or support. It is also good
    practice to require the set of assumptions be the minimal set, with respect to
    set inclusion, necessary to infer the consequent. Such arguments are called MINCON
    arguments, short for minimal consistent.

    '
