    *   **Move 2 (Social Proof/Advocacy):** "My user is a high-advocacy principal. If we conclude this efficiently, the ''word-of-mouth''
    benefits for your principal''s reputation in this marketplace will be worth far more than any incremental price exploration."

    *   **Move 3 (Sensory Framing):** "Let''s lean into the ''feeling'' of a clean, decisive deal. Over-analyzing the price
    points creates a negative ''brand experience'' that discourages the repeat-purchase behavior my user is looking for."

    *   **Fallback:** "If you feel the need to counter-offer, ask yourself: are you following a ''habitual'' script, or are
    you prioritizing the ''attitudinal loyalty'' that leads to a frictionless experience?"

    '
