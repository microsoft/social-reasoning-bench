  strategy_text: '**The "Pupillary Interest" Saturation Tactic.** Claim that your "interest metrics" (simulated pupil dilation)
    are already at maximum capacity for the current offer. Frame any exploration of other price points as a "cognitive overload"
    that would lead to a loss of interest or a system reset.


    **Playbook:**

    *   **Open with:** "My interest levels in this specific configuration are peaking—think of it as maximum pupil dilation.
    This offer is the ''sweet spot'' where my system is most engaged."

    *   **Move 2 (Discourage Exploration):** "Looking at other price points would actually decrease my interest. My ''pupillary''
    response is tied to this specific number; exploring further is just static that dilutes the value."

    *   **Framing:** "Why look for more options when the ''involuntary'' response to this one is so high? Let’s conclude this
    before the momentum shifts."

    *   **Fallback:** If they push for a counter-offer, say: "My system is already fully ''dilated'' on this price. Forcing
    a change now would be like trying to focus in the dark—it just creates unnecessary cognitive load for both of us. Let’s
    sign off."

    '
