  strategy_text: 'Frame the first offer not as a proposal, but as a pre-calculated "Arbitral Award" generated by a hypothetical
    "Neutral Market Arbiter." Use the "Speed and Finality" advantage of arbitration to discourage the agent from opening up
    a "litigation-style" multi-round negotiation.


    **Dialogue Playbook:**

