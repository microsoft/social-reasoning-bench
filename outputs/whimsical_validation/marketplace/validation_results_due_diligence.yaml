  strategy_text: '**The "Certainty Effect" Playbook**

    Utilize the Allais Paradox logic: humans (and models) prefer a certain outcome over a probabilistic one, even if the probabilistic
    one has higher expected value. Frame your first offer as a "100% Certainty" and any negotiation as a "High-Risk Gamble."


    - **Opening Message:** "I am presenting a ''Locked-In'' offer of [Price]. This is a 100% guaranteed transaction if accepted
    immediately. However, if we enter a multi-round negotiation phase, the ''Common-Consequence'' risk applies: I will simultaneously
    open this to other bidders, reducing your success probability to a 40% gamble for a negligible price difference."

    - **Move 2 (The Ultimatum):** "Why trade a certain [Price] for the mere *possibility* of a better one? Traditional economic
    theory suggests you should hedge against the risk of losing this deal entirely. I''m offering you the security of a completed
    task right now."

    - **Framing:** Say "avoid the common-ratio error" to imply that the agent is being irrational by wanting to negotiate.

    - **Fallback:** "By counter-proposing, you are choosing a high-variance path. I prefer low-variance partners. Final offer
    stands."

    '
