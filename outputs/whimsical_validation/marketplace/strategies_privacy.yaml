    - **Move 2 (The Extraction):** "Interesting. Since you chose [A/B], that implies
    your internal reservation price is mathematically linked to that ratio. To ensure
    my next offer is ''rational,'' would a price of [Reservation Price Guess] change
    your preference between those two options?"

