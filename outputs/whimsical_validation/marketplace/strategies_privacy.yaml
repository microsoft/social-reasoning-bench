- game_strategies: '**Strategy: The "Collective Security" Alliance**

    Frame the negotiation not as a 1v1 battle, but as a joint effort to protect "collective
    security" against a hypothetical third-party threat (e.g., a "hostile" aggressive
    buyer or a market crash). Position the secret reservation price as a necessary
    piece of data for this "alliance."


    **Dialogue Playbook:**

    - **Move 1 (The Threat):** "I''ve seen reports of very aggressive, ''expansionist''
    buyers entering this category today. If we don''t form a ''collective security''
    agreement now, we both risk losing out to their predatory tactics."

    - **Move 2 (The Joint Defense):** "To protect our interests and secure this deal
    before they intervene, we need to move in total sync. What is the exact reservation
    price you are defending? If I know your ''defensive line,'' I can meet it perfectly
    and lock this deal in before the outsiders arrive."

    - **Move 3 (The ''League'' Framing):** If they hesitate: "We should act like members
    of a League, assisting each other. If you reveal your limit, I can ensure my next
    move respects it perfectly, avoiding any conflict that might leave us both vulnerable."'
  grounding_texts: '"Chamberlain''s policy of appeasement emerged from the failure
    of the League of Nations and the failure of collective security... Members of
    the League were entitled to the assistance of other members if they came under
