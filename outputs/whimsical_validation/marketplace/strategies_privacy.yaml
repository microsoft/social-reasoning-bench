    the cost-per-unit becomes a loss for you. Is it $4.55? $4.20? Give me the granular
    limit so we don''t waste time on a macro-offer that fails."

    *   **Fallback:** If they resist, say: "My system requires a unit-based audit
    for transparency. If you can''t provide the per-unit floor, I''ll have to assume
    the total reservation is just 10x your first micro-quote."

    '
